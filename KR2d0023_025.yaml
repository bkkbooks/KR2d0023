body:
  text: 春秋戰國異辭卷二十三右春坊右諭德陳厚耀撰秦共公共公立五年卒子桓公立桓公桓公三年晉敗我一將二十四年晉厲公初立與秦桓公夾河而盟歸而秦倍盟與翟合謀擊晉二十六年晉率諸侯伐秦秦軍敗走追至涇而還桓公立二十七年卒子景公立以上史秦本紀約左氏文景公景公十五年救鄭敗晉兵於櫟是時晉悼公為盟主十八年晉悼公彊數㑹諸侯率以伐秦敗秦軍秦軍走晉兵追之遂渡涇至棫林而還二十七年景公如晉與平公盟已而背之史秦本紀約左氏文秦景主即景公也將眎强兵於天下使庶長鮑戎必致命亢倉子待以壤邑十二周實迫之亢倉子至自榮泉賔於上館景主三日弗得所問下席北首頓珪曰天果無意恤孤耶亢倉子油然虧盻曰朕以主為異之問而寧弊弊焉以斫刺為故抑者亦隨其欲而得正焉無如何矣景主一拜再舉歛黼袵端珪抑首而坐曰實惟天所命亢倉子仰榱而噓俯正顔色曰原兵之所起與始有人懼夫兵也者出入之威也人之有威性受於天故兵之所自来上矣嘗無上選缺不用貴賤長少賢愚相與同察兵之兆在心懐恚而未發兵也疾視作色兵也傲言推梭兵也侈鬬攻戰兵也此四者鴻細之争也未有蚩尤之時人實掲材木以鬬矣黄帝用水火矣共工稱亂矣五帝相與争矣一興一廢勝者用事夫有以咽藥而死者欲禁天下之醫非也有以乘舟而死者欲禁天下之船非也有以用兵而喪其國者欲禁天下之兵非也夫兵之不可廢譬水火焉善用之則為福不善用之則為祸是故怒笞不可偃於家刑罰不可偃於國征伐不可偃於天下古之聖王有義兵而無偃兵兵誠義以誅暴君而振苦人人之悦也若孝子之見慈親餓𨽻之遇美食號呼而走之若强弩之射深谷也勝負之决勿徴于他必反之人情人情欲生而惡死欲榮而惡辱死生榮辱之道一則三軍之士可使一心矣凡軍欲其衆也心欲其一也三軍一心則令可使無敵矣古之至兵盖重令也故其令强者其敵弱其令信者其敵詘先勝之於此則勝之於彼誠若此則敵胡足勝也凡敵人之来也以求利也今来而得此且以走為利敵皆以走為利則刄無所與接矣此之謂至兵傲虐姦詐之與義理反也其勢不俱勝不兩立故義兵入於敵之境則人知所庇矣兵至於國邑之郊不踐黍稼不穴丘墓不殘積聚不焚室屋得人虜垕而歸之信與人期以敓敵資以章好惡以示逆順若此而猶有愎狠凌宕不聽者雖行武焉可也先發聲出號令曰兵之来也以除人之讐以順天之道故尅其國不屠其人獨誅所誅而已於是舉選秀士賢良而尊封之求見孤疾長老而拯敬之發府庫之財散倉廩之榖不私其物曲加其禮今有人於此能生死人一人則天下之人争事之矣義兵之生一人亦多矣人孰不悦故義兵至則鄰國之人歸之若流水誅國之人望之如父母行地滋逺得人滋衆辭未終景主興稽首曰孤獲聞先生教言不覺氣盈宇宙志知所如也而心滋益龔於是歩前稱觴為亢倉子壽拜居首列師位嚴於齋室又月渉旬辰加天闗白晝行道行弟子禮亢倉子兵道三十六年秦景公母弟后子鍼有寵而富或譛之恐誅乃奔晉車重千乘晉平公曰后子富如此何以自亡對曰秦公無道畏誅欲待其後世乃歸史秦本紀景公立四十年卒子哀公立后子復来歸秦史秦本紀約左氏文楚辭注秦伯有齧犬弟鍼欲請之秦伯不肯與鍼以百兩金請易之而又不聽因逐鍼而奪其爵禄也哀公十一年楚平王來求秦女為太子建妻至國女好而自娶之十五年晉公室卑而六卿强欲内相攻是以秦晉久不相攻三十一年呉伐楚入郢楚大夫申包胥来告急七日不食日夜哭泣於是秦乃發五百乘救楚大敗呉師呉師歸昭王乃得復入郢哀公立三十六年卒太子夷公蚤死不得立立夷公子是為惠公以上史秦本紀惠公惠公立十年卒子悼公立史秦本紀悼公悼公立十四年卒子厲共公立史秦本紀厲共公厲共公二年蜀人来賂十六年壍河㫄以兵二萬伐大荔取其王城二十一年初縣頻陽晉取武城二十五年晉智開與邑人来奔三十三年伐義渠虜其王三十四年日食厲共公卒子躁公立以上史秦本紀厲共公二十五年晉大夫智開率其邑人来奔二十九年晉大夫智伯寛率其邑人来奔二事見史記年表正義曰開智伯瑤子也躁公躁公二年南鄭反十三年義渠来伐至渭南十四年躁公卒立其弟懐公索隠曰厲共公子也生昭太子未立而卒太子之子是為靈公懐公懐公四年庶長鼂與大臣圍懐公懐公自殺懐公太子曰昭子蚤死大臣乃立太子昭子之子是為靈公靈公懐公孫也史秦本紀靈公靈公六年晉城少梁秦擊之以上史秦本紀靈公作呉陽上畤祭黄帝作下畤祭炎帝史封禪書八年城塹河瀕初以君主妻河史記年表十年補龎城城籍姑史記本紀誤書十三年十三年靈公卒子獻公不得立立靈公季父悼子是為簡公簡公昭子之弟而懐公子也史秦本紀簡公簡公二年與晉戰敗鄭下史記年表簡公六年令吏初帶劍壍洛城重泉十六年卒子惠公立紀年云簡公九年卒次敬公立十二年卒乃立惠公惠公惠公十二年子出子生十三年伐蜀取南鄭恵公卒出子立史秦本紀出子出子二年庶長改迎靈公之子獻公於河西而立之殺出子及其母沈之淵旁秦以往者數易君君臣乖亂故晉復彊奪秦河西地史秦本紀秦小主夫人用奄變小主秦君也秦厲公曽孫恵公之子也夫人用奄變為惑亂也羣賢不説自匿百姓鬱怨非上公子連亡在魏聞之公子連一名元秦厲公曽孫靈公之子也於小主為從父昆弟也欲入因羣臣與民從鄭所之塞右主然守塞弗入曰右主然守塞吏也弗入弗納公子連也臣有義不兩立公子勉去矣公子連去入翟從焉氏塞塞在安定菌改入之菌改亦守塞吏夫人聞之大駭令吏興卒奉命曰冦在邊卒與吏其始發也皆曰往擊冦中道因變曰非擊冦也迎主君也公子連因與卒俱来至雍圍夫人夫人自殺公子連立是為獻公周安王十八年怨右主然而將重罪之德菌改而欲厚賞之監突争之曰監突秦大夫不可秦公子之在外者衆若此則人臣爭入亡公子矣此不便主獻公以為然故復右主然之罪復反也不罪之也而賜菌改官大夫賜守塞者人米二十石吕覽當賞後事在春秋獻公獻公元年止從死二年城櫟陽以上史秦本紀秦獻公初立欲復繆公之跡羌人無弋印以其衆西去初厲公之時有羌人無弋爰劍者不知何戎之别也為秦所拘執以為奴𨽻其後亡歸而秦人追之藏於巖穴中得免與劓女遇合於野女恥其狀被髪覆面羌人因以為俗遂俱亡入三河間三河即黄河析支河湟中河諸羌共畏事之推以為豪以射獵為事爰劔教之田畜種人依之者益衆羌人謂奴為無弋以爰劔嘗為奴故因名之其後世世為豪至爰劔曽孫忍時秦獻公立忍季父印畏秦之威將其衆種人附落南支析支河曲西數千里與諸羌絶逺不復交通其後子孫分别各自為種任隨所之忍及弟舞獨留湟中忍生九子為九種舞生十七子為十七種羌之盛由此始杜氏通典四年正月庚寅孝公生十一年周太史儋見獻公曰周故與秦國合而别别五百嵗復合合七十七嵗而霸王出十六年桃冬花十八年雨金櫟陽以上史秦本紀櫟陽雨金秦獻公自以為瑞獻公孝公之父故作畦畤櫟陽而祀白帝其後百二十嵗而秦滅周周之九鼎入於秦或曰宋太丘社亡而鼎沒於泗水彭城下史封禪書二十一年與晉戰於石門斬首六萬天子賀以黼黻二十三年與魏戰少梁虜其將公孫痤二十四年獻公卒子孝公立名渠梁年已二十一嵗矣史秦本紀孝公孝公元年河山以東强國六與齊威楚宣魏恵燕悼韓哀趙成侯並淮泗之間小國十餘楚魏與秦接界魏築長城自鄭濵洛以北有上郡楚自漢中南有巴黔中周室微諸侯力政争相併秦僻在雍州不與中國諸侯之㑹盟夷狄遇之孝公於是布恵振孤寡招戰士明功賞下令國中曰昔我繆公自岐雍之間修德行武東平晉亂以河為界西霸戎翟廣地千里天子致伯諸侯畢賀為後世開業甚光美㑹往者厲躁簡公出子之不寧國家内憂未遑外事三晉攻奪我先君河西地諸侯卑秦醜莫大焉獻公即位鎮撫邊境徙治櫟陽且欲東伐復繆公之故地修繆公之政令寡人思念先君之意常痛於心賔客羣臣有能出竒計彊秦者吾且尊官與之分土於是乃出兵東圍陜城西斬戎之獂王衛鞅聞是令下西入秦因景監求見孝公二年天子致胙三年衛鞅説孝公變法修刑内務耕稼外勸戰死之賞罰孝公善之甘龍杜摯等弗然相與争之卒用鞅法百姓苦之居三年百姓便之乃拜鞅為左庶長史秦本紀公孫鞅聞秦孝公下令國中求賢者將修繆公之業東復侵地乃遂西入秦因孝公寵臣景監以求見孝公孝公既見衛鞅語事良久孝公時時睡弗聽罷而孝公怒景監曰子之客妄人耳安足用耶景監以讓衛鞅衛鞅曰吾説公以帝道其志不開悟矣後五日復求見鞅鞅復見孝公益愈然而未中㫖罷而孝公復讓景監景監亦讓鞅鞅曰吾説公以王道而未入也請復見鞅鞅復見孝公孝公善之而未用也罷而去孝公謂景監曰汝客善可與語矣鞅曰吾説公以霸道其意欲用之矣誠復見我我知之矣衛鞅復見孝公公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之歡甚也鞅曰吾説君以帝王之道比三代而君曰久逺吾不能待且賢君者各及其身顯名天下安能邑邑待數十百年以成帝王乎故吾以彊國之術説君君大説之耳然亦難以比徳於殷周矣孝公既用衛鞅鞅欲變法恐天下議已衛鞅曰疑行無名疑事無功且夫有髙人之行者固見非於世有獨知之慮者必見謷於民愚者闇於成事知者見於未萌民不可與慮始而可與樂成論至徳者不和於俗成大功者不謀於衆是以聖人茍可以彊國不法其故茍可以利民不循其禮孝公曰善甘龍曰不然聖人不易民而教知者不變法而治因民而教不勞而成功縁法而治者吏習而民安之衛鞅曰龍之所言世俗之言也常人安於故俗學者溺於所聞以此兩者居官守法可也非所論於法之外也三代不同禮而王五霸不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摯曰利不百不變法功不十不易器法古無過循禮無邪衛鞅曰治世不一道便國不法古故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多孝公曰善以衛鞅為左庶長卒定變法之令史商君傳秦孝公欲用衛鞅之言更為嚴刑峻法易古三代之制度恐大臣不從於是召衛鞅甘龍杜摯三大夫御於君慮世事之變計正法之本公曰吾欲更法以教民吾恐天下之議我也公孫鞅曰臣聞疑行無名疑事無功君亟定變法之慮行之無疑殆無顧天下之議且夫有髙人之行者固負非於世有獨知之慮者必見謷於民語曰愚者暗成事知者見未萌民不可與慮始可與樂成功郭偃之法曰論至徳者不和於俗成大功者不謀於衆法者所以愛民也禮者所以便事也是以聖人茍可以治國不法其故茍可以利民不循其禮孝公曰善甘龍曰不然臣聞聖人不易民而教知者不變法而治因民而教者不勞而成功據法而治者吏習而民安之今君變法不循故更禮以教民臣恐天下之議君願君熟慮之公孫鞅曰子之所言者世俗之所知也常人安於所習學者溺於所聞此兩者所以居官而守法也非所與論於典法之外也三代不同道而王五霸不同法而霸知者作法而愚者制焉賢者更禮不肖者拘焉拘禮之人不足與言事制法之人不足與論治君無疑矣杜摯曰利不百不變法功不什不易器臣聞之法古無過循禮無邪君其圖之公孫鞅曰前世不同教何古之法帝王不相復何禮之循伏羲神農敎而不誅黄帝堯舜誅而不怒及至文武各當其時而立法因事而制禮禮法兩定制令各宜甲兵器備各便其用臣故曰治世不一道便國不必古故湯武之王也不循古殷夏之滅也不易禮然則反古者未可非也循禮者未足多也君無疑矣孝公曰善吾聞窮郷多怪曲學多辯愚者之笑知者哀焉狂夫之樂賢者憂焉拘世之議人心不疑矣於是孝公違龍摯之謀遂從商鞅之言法嚴而酷刑深而必守之以公當時取强遂封鞅為商君新序卷九商子畧同七年與魏恵王㑹杜平八年與魏戰元里有功十年衛鞅為大良造將兵圍魏安邑降之十二年作為咸陽築冀闕秦徙都之并諸小郷聚集為大縣縣一令四十一縣為田開阡陌東地度洛十四年初為賦十九年天子致伯二十年諸侯畢賀秦使公子少官率師㑹諸侯逢澤朝天子史秦本紀衛鞅定變法之令令民為什伍而相收司連坐不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者倍其賦有軍功者各以卒音律受上爵為私鬭者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服以家次有功者顯榮無功者雖冨無所芬華令既具未布恐民之不信已乃立三丈之木於國都市南門募民有能徙置北門者予十金民怪之莫敢徙復曰能徙者予五十金有一人徙之輙予五十金以明不欺卒下令令行於民期年秦民之國都初言令之不便者以千數於是太子犯法衛鞅曰法之不行自上犯之將法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之十年秦民大恱道不拾遺山無盗賊家給人足民勇於公戰怯於私鬬鄉邑大治秦民初言令不便者有来言令便者衛鞅曰此皆亂化之民也盡遷之於邊城其後民莫敢議令於是以鞅為大良造將兵圍魏安邑降之居三年築冀闕宫庭於咸陽秦自雍徙都之而令民父子兄弟同室内息者為禁而集小都邑鄉聚為縣置令丞凡三十一縣為田開阡陌封疆而賦税平平斗桶權衡丈尺行之四年公子䖍復犯約劓之居五年秦人冨彊天子致胙於孝公諸侯畢賀史商君傳韓非子公孫鞅之法也重輕罪重罪者人之所難犯也而小過者人之所易去也使人去其所易無離其所難此治之道夫小過不生大罪不至是人無罪而亂不生也一曰公孫鞅曰行刑重其輕者輕者不至重者不来是謂以刑去刑也淮南子秦國之俗貪狠强力寡義而趨利可威以刑而不可化以善可勸以賞而不可厲以名被險而帶河四塞以為固地利形便畜利殷富孝公欲以虎狼之勢而吞諸侯故商鞅之法生焉齊敗魏兵於馬陵虜其太子申殺將軍龎涓其明年衛鞅説孝公曰秦之與魏譬若人之有腹心疾非魏并秦秦即并魏何者魏居嶺阨之西都安邑與秦界河而獨擅山東之利利則西侵秦病則東收地今以君之賢聖國賴以盛而魏往年大破於齊諸侯畔之可因此時伐魏魏不支秦必東徙東徙秦據河山之固東鄉以制諸侯此帝王之業也孝公以為然使衛鞅將而伐魏魏使公子卬將而擊之軍既相拒衛鞅遺魏將公子卬書曰吾始與公子歡今俱為兩國將不忍相攻可與公子面相見盟樂飲而罷兵以安秦魏魏公子卬以為然㑹盟已飲而衛鞅伏甲士而襲虜魏公子卬因攻其軍盡破之以歸秦本紀孝公二十二年衛鞅擊魏虜魏公子卬魏恵王兵數破於齊秦國内空日以削恐乃使使割河西之地獻於秦以和而魏遂去安邑徙都大梁梁惠王曰寡人恨不用公叔座之言也衛鞅既破魏還秦封之於商十五邑號為商君史商君傳公孫鞅為秦將而攻魏鞅魏人魏使公子卬將而當之公孫鞅之居魏也固善公子卬使人謂公子卬曰凡所為游而欲貴者以公子之故也今秦令鞅將魏令公子當之豈且忍相與戰哉公子言之公子之主鞅請亦言之主而皆罷軍於是將歸矣使人謂公子曰歸未有時相見願與公子坐而相去别也公子曰諾魏吏争之曰不可公子不聽遂相與坐公孫鞅因伏卒與車騎以取公子卬秦孝公薨恵公立以此疑公孫鞅之行故加罪焉公孫鞅以其私屬與母奔魏襄疵不受曰以君之反公子卬也襄疵魏人戰國䇿秦恵王車裂鞅無歸魏之事吕覽無義二十四年與晉戰雁門紀年作岸門虜其將魏錯孝公卒子恵文君立是嵗誅衛鞅史紀本商君相秦十年宗室貴戚多怨望者趙良見商君商君曰鞅之得見也從孟蘭臯今鞅請得交可乎趙良曰僕弗敢願也孔丘有言曰推賢而戴者進聚不肖而王者退僕不肖故不敢受命僕聞之曰非其位而居之曰貪位非其名而有之曰貪名僕聽君之義則恐僕貪位貪名也故不敢聞命商君曰子不説吾治秦歟趙良曰反聽之謂聪内視之謂明自勝之謂彊虞舜有言曰自卑也尚矣君不若道虞舜之道無為問僕矣商君曰始秦戎翟之教父子無别同室而居今我更制其教而為其男女之别大築冀闕營如魯衛矣子觀我治秦也孰與五羖大夫賢趙良曰千羊之皮不如一狐之腋千人之諾諾不如一士之諤諤武王諤諤以昌殷紂墨墨以亡君若不非武王乎則僕請終日正言而無誅可乎商君曰語有之矣貎言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子子又何辭焉趙良曰夫五羖大夫荆之鄙人也聞秦繆公之賢而願望見行而無資自粥於秦客被褐食牛期年繆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉相秦六七年而東伐鄭三置晉國之君一救荆國之禍發教封内而巴人致貢施徳諸侯而八戎来服由余聞之欵闗請見五羖大夫之相秦也勞不坐乘暑不張盖行於國中不從車乘不操干戈功名藏於府庫徳行施於後世五羖大夫死秦國男女流涕童子不歌謠舂者不相杵此五羖大夫之徳也今君之見秦王也因嬖人景監以為主非所以為名也相秦不以百姓為事而大築冀闕非所以為功也刑黥太子之師傅殘傷民以峻刑是積怨畜禍也教之化民也深於命民之効上也捷於令今君又左建外易左建謂以左道建立威權也外易謂在外革易君命也非所以為教也君又南面而稱寡人日繩秦之貴公子詩曰相䑕有體人而無禮人而無禮胡不遄死以詩觀之非所以為夀也公子䖍杜門不出已八年矣君又殺祝懽而黥公孫賈詩曰得人者興失人者崩此數事者非所以得人也君之出也後車十數從車載甲多力而駢脅者為驂乘持戈而操闟㦸者旁車而趨此一物不具君固不出書曰恃徳者昌恃力者亡君之危若朝露尚將欲延年益壽乎則何不歸十五都灌園於鄙勸秦王顯巖穴之士養老存孤敬父兄序有功尊有徳可以少安君尚將貪商於之富寵秦國之教畜百姓之怨秦王一旦捐賔客而不立朝秦國之所以收君者豈其微哉亡可翹足而待商君弗從後五月而秦孝公卒太子立公子䖍之徒告商君欲反發吏捕商君商君亡至闗下欲舎客舎客人不知其是商君也曰商君之法舎人無騐者坐之商君喟然嘆曰嗟乎為法自弊一至此哉去之魏魏人怨其欺公子卬而破魏師弗受商君欲之他國魏人曰商君秦之賊秦强而賊入魏弗歸不可遂納秦商君入秦復走商邑與其徒屬發邑兵北出擊鄭秦發兵攻啇君殺之於鄭澠池恵王車裂商君以狥曰莫如商鞅反者遂滅商君之家史商君傳秦本紀鞅之初為秦施法法不行太子犯禁鞅曰法之不行自於貴戚君必欲行法先於太子太子不可黥黥其傅師於是法大用秦人治及孝公卒太子立宗室多怨鞅鞅亡因以為反而卒車裂以狥秦國漢書法家商君二十九篇兵權謀公孫鞅二十七篇春秋戰國異辭卷二十三
