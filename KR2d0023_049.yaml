body:
  text: 春秋戰國異辭卷四十六右春坊右諭徳陳厚耀撰魏雜録仲尼見梁君梁君問仲尼曰吾欲長有國吾欲列都之得吾欲使民安不惑吾欲使士竭其力吾欲使日月當時吾欲使聖人自來吾欲使官府治為之奈何仲尼對曰千乘之君萬乘之主問於丘者多矣未甞有如主君問丘之術也然而盡可得也丘聞之兩君相親則長有國君恵臣忠則列都之得毋殺不辜毋釋罪人則民不惑益士禄賞則竭其力尊天敬鬼則日月當時善為刑罰則聖人自來尚賢使能則官府治梁君曰豈有不然哉説苑政理戴晉生敝衣冠而往見梁王梁王曰前日寡人以上大夫之禄要先生先生不留今過寡人耶戴晉生欣然而笑仰而永嘆曰嗟乎君曽不足與遊也君不見大澤中雉乎五步一噣終日乃飽羽毛悦澤光照於日月奮翼爭鳴聲響於陵澤者何彼樂其志也援置之囷倉中常噣粱粟不旦時而飽然猶羽毛憔悴志氣益下低頭不鳴夫豈食不善哉彼不得其志故也今臣不逺千里而從君遊者豈食不足竊慕君之道耳臣始以君為好士天下無雙乃今見君不好士明矣辭而去終不復往韓詩卷九鄒子説梁王曰伊尹故有莘氏之媵臣也湯立以為三公天下之治太平管仲故城隂之狗盗也天下之庸夫也齊桓公得之為仲父百里奚為媵於他國賣五羊之皮秦穆公委之以政寗戚故將車人也叩轅行歌於康之衢桓公任以國司馬喜髕脚於宋而卒相中山范睢折脅拉齒於魏而後為應侯太公望故老婦之出夫也朝歌之屠佐也棘津迎客之舍人也年七十而相周九十而封齊故詩曰緜緜之葛在於曠野良工得之以為絺紵良工不得枯死於野此七士者不遇明君聖主㡬行乞丐枯死於中野譬猶緜緜之葛矣説苑尊賢陳子説梁王梁王説而疑之曰子何為去陳侯之國而教小國之孤於此乎陳子曰夫善亦有道而遇亦有時昔傅説衣褐𢃄劔而築於秕傅之城武丁夕夢旦得之時王也寗戚飯牛康衢擊車輻而歌顧見桓公得之時覇也百里奚自賣五羊之皮為秦人虜穆公得之時强也論若三子之行未得為孔子駿徒也今孔子經營天下南有陳蔡之阨而北干景公三坐而五立未甞離也孔子之時不行而景公之時怠也以孔子之聖不能以時行説之怠亦獨能如之何乎説苑善説按梁稱王陳滅久矣萹内云云未詳其故梁甞有疑獄羣臣半以為當罪半以為無罪梁王疑之曰陶之朱公以布衣富侔國是必有竒智乃召朱公而問曰梁有疑獄獄吏半以為當罪半以為不當罪雖寡人亦疑吾子决是奈何朱公曰臣鄙民也不知當獄雖然臣之家有二白璧其色相如也其徑相如也其澤相如也然其價一者千金一者五百金王曰何也朱公曰側而視之一者厚倍是以千金梁王曰善故獄疑則從去賞疑則從與梁國大悦故施政教者宜厚之而可耳新序卷四梁王出獵見白鴈羣梁君下車彀弓欲射之道有行者梁君謂行者且止行者不止白鴈羣駭梁君怒欲射之其御公孫襲下車撫矢曰君止梁君忿然作色曰襲不與其君而顧與他人何也襲對曰昔齊景公之時天大旱三年卜之曰必以人祠乃雨景公下堂頓首曰凡吾所以求雨者為民也今必使吾以人祠乃雨寡人將自當之言未卒而天大雨方千里何也為有徳而恵於民也今主君以白鴈之故而欲射人襲謂主君言無異於虎狼梁主援其手與上車歸入廟門呼曰幸哉今日也他人獵皆得禽獸吾獵得善言而歸新序卷二又荘子更嬴謂魏王曰臣能射為虚發而下烏王曰然可於此乎聞有鳥從東來嬴虚發而下之博物志魏田父耕於野而得玉弗識也隣人隂欲得之紿曰此怪石也田父置玉於室其光燭夜果以為怪棄之於野隣人從而盗之以獻魏王玉工望而拜曰此無價寳也續博物志魏田父有耕於野者得玉徑尺不知其玉也以告隣人隣人詐之曰此怪石也畜之弗利其家田父雖疑猶豫以歸置於廡下其玉明照一室大怖遽而棄之於逺野隣人取之以獻魏王魏王召玉工相之玉工望之再拜賀曰大王得天下之寳臣所未甞見王問其價玉工曰此無價以當也五城之都僅可一觀魏王賜獻玉者千金長食上大夫之禄尹文子犀首與張夀為怨陳需新人不善犀首因使人㣲殺張夀魏王以為犀首也乃誅之韓子内儲下魏王臣二人不善濟陽君濟陽君因偽令人矯王命而謀攻已王使人問濟陽君曰誰與恨對曰無敢與恨雖然甞與二人不善不足以至於此王問左右左右固然因誅二人者韓子内儲下魏有老儒不善濟陽君客有與老儒私怨者因攻老儒殺之以徳於濟陽君曰臣為其不善君也故為君殺之濟陽君因不察而賞之一曰濟陽君有少庶子不見知欲入愛於君者齊使老儒掘藥於馬梨之山濟陽少庶子欲以為功入見於君曰齊使老儒掘藥於馬梨之山名掘藥也實間君之國君殺之是將以濟陽君抵罪於齊矣臣請刺之君曰可於是明日得之城隂而刺之濟陽君還益親之韓子内儲下經侯往適魏太子左帯羽玉具劔右帯環珮左光照右右光照左坐有頃太子不視也又不問也經侯曰魏國亦有寳乎太子曰有經侯曰其寳何如太子曰主信臣忠百姓上戴此魏之寳也經侯曰吾所問者非是之謂也乃問其噐而已太子曰有徒師沼治魏而市無預賈郄辛治陽而道不拾遺芒卯在朝而四隣賢士無不相因而見此三大夫乃魏國之大寳於是經侯黙然不應左解玉具右解環珮委之坐愆然而起黙然不謝趨而出上車驅去魏太子使騎操劔佩逐與經侯使告經侯曰吾無徳所寳不能為珠玉所守此寒不可衣饑不可食無為遺我賊於是經侯杜門不出傳死説苑反質陳需魏王之臣也善於楚王而令楚攻魏楚攻魏陳需因請為魏王行解之因以楚勢相魏韓子内儲下吕倉魏王之臣也而善於秦楚㣲諷秦楚令之攻魏因請行和以自重也韓子内儲下樂羊子之妻素有節義奉姑惟謹甞有他舍雞入園中姑盗殺而食之妻對雞不飡而泣姑怪問其故妻曰自傷居貧使食有他肉姑竟棄之後盗有欲犯妻者乃先刼其姑妻因操刄而出盗曰釋汝刃從我可全不則殺汝姑妻仰天而嘆舉刃刎頸而死盗愍之亦不殺其姑太守聞之即捕殺盗而賜婦縑帛以禮𦵏之號曰貞義烈女傳同又烈女傳河南貞義者樂羊子之妻其事不未知即一人否見類函賢婦人下梁大夫有宋就者甞為邊縣令與楚隣界梁之邊亭與楚之邊亭皆種𤓰各有數梁之邊亭人劬力數灌其𤓰𤓰美楚人窳而稀灌其𤓰𤓰惡楚令因以梁𤓰之美怒其亭𤓰之惡也楚亭人心惡梁亭之賢已因往夜竊搔梁亭之𤓰有死焦者梁亭覺之因請於其尉亦欲竊往報搔楚亭之𤓰尉以請宋就就曰惡是何可搆怨禍之道也人惡亦惡何褊之甚也若我教子必每暮令人往竊為楚亭夜善灌其𤓰勿令知也於是梁亭乃每夜竊灌楚亭之𤓰楚亭旦而行𤓰則皆已灌矣𤓰日以美楚亭怪而察之則乃梁亭也楚令聞之大悦因具以聞楚王楚王聞之惄然愧以意自閔也告吏曰㣲搔𤓰者得毋有他罪乎此梁之隂讓也乃謝以重幣而請交於梁王故梁楚之歡自宋就始新序卷四此疑漢事魏王與龍陽君共船而釣龍陽君得千餘魚而涕下曰臣之始得魚也臣甚喜後得益大臣欲棄前所得矣今以臣之凶惡也而得為王拂枕席夫四海之内其美人亦多矣聞臣之得幸於王也畢褰裳而趨王矣亦曩臣之所棄前魚也史記畧此出戰國策史引之耳魏太子造百辟七首三其一理似堅氷名曰清剛其二曜似朝日名曰揚文其三状似龍文名曰龍鱗典論魏人有東門呉者其子死而不憂其相室曰公之愛子天下無有今子死不憂何也東門呉曰吾甞無子無子之時不憂今子死乃與向無子同臣奚憂焉農赴時商趣利工追術士逐勢勢使然也然農有水旱商有得失工有成敗士有遇否命使然也列子力命虞氏梁之富人財無量登髙樓臨大道設樂陳酒擊慱其上而遊俠相隨行行者射中而笑飛鳶適墜腐䑕中俠客俠客相謂曰虞氏富久矣常有輕人之志吾不侵犯之而樂乃辱我以腐䑕乃聚衆攻之滅其家故驕侈之致禍非一途也列子梁之節婦榮於色美於行夫早死不嫁梁王使相聘焉再三往婦曰婦人之義一醮不改忘死而貪生棄義而從利何以為人乃援鏡持刀割其鼻曰王之求妾者非以色耶刑餘之人殆可釋矣相以報王王旌之曰髙行地志開封府春秋戰國異辭卷四十六
