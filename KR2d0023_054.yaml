body:
  text: 春秋戰國異辭卷五十一右春坊右諭徳陳厚耀撰趙孝成王孝成王元年秦伐我拔三城趙王新立太后用事秦急攻之趙氏求救于齊齊曰必以長安君為質兵乃出太后不肯太后恵文后也長安君其少子也大臣强諫太后眀謂左右曰復言長安君為質者老婦必唾其面左師觸讋願見太后太后盛氣而胥之入徐趨而坐自謝曰老臣病足曽不能疾走不得見久矣竊自恕而恐太后體之有所苦也故願望太后太后曰老婦恃輦而行曰食得毋衰乎曰恃粥耳曰老臣間者殊不欲食乃强歩日三四里少益嗜食和于身也太后曰老婦不能太后不和之色少解左師公曰老臣賤息舒祺最少不肖而臣衰竊憐愛之願得補黒衣之缺以衛王宫昧死以聞太后曰敬諾年㡬何矣對曰十五嵗矣雖少願及未填溝壑而託之太后曰丈夫亦愛憐少子乎對曰甚於婦人太后曰婦人異甚對曰老臣竊以為媪春秋後語媪字俱作太后之愛燕后賢於長安君太后曰君過矣不若長安君之甚左師公曰父母愛子則為之計深逺媪之送燕后也持其踵為之泣念其逺也亦哀之矣已行非不思也祭祀則祝之曰必勿使反豈非計長久為子孫相繼為王也哉太后曰然左師公曰今三世以前至於趙主之子孫為侯者其繼有在者乎曰無有曰微獨趙諸侯有在者乎曰老婦不聞也曰此其近者禍及其身逺者及其子孫豈人主之子孫則不善哉位尊而無功奉厚而無勞而挾重器多也今媪尊長安之位而封之以膏腴之地多與之重器而不及今令有功于國一旦山陵崩長安君何以自託于趙老臣以媪為長安君之計短也故以為愛之不若燕后太后曰諾恣君之所使之于是為長安君約車百乗質于齊齊兵乃出子義聞之子義趙之賢者曰人主之子骨肉之親也猶不能持無功之尊無勞之奉而守金玉之重也而况于予乎與國䇿字句小異齊安平君田單將趙師而攻燕中陽拔之又攻韓注人拔之二年恵文后卒田單為相空雄之遇秦趙相與約空雄地名約曰自今以來秦之所欲為趙助之趙之所欲為秦助之居無㡬何秦興兵攻魏趙欲救之秦王不說使人讓趙王曰約曰秦之所欲為趙助之趙之所欲為秦助之今秦欲攻魏而趙因欲救之此非約也趙王以告平原君平原君以告公孫龍公孫龍曰亦可以發使而讓秦王曰趙欲救之今秦王獨不助趙此非約也吕覽淫辭子髙衣長裙振褒袖方屐麄翣翣扇也見平原君平原君曰吾子亦儒服乎子髙曰此布衣之服非儒服也儒服非一也平原君曰請吾子言之答曰夫儒者居位行道則有衮冕之服統御師旅則有介胄之服從容徒歩則有若穿之服故曰非一也平原君曰儒之為名何取爾子髙曰取包衆美兼六藝動静不失中道孔叢子中子髙逰趙平原君客有鄒文季節者與子髙相善及將還魯諸故人訣既畢文節送行三宿臨别文節流涕交頥子髙徒抗手而已分背就路其徒問曰先生與彼二子善彼有戀戀之心未知後㑹何期悽愴流涕而先生厲聲髙揖此無乃非親親之謂乎子髙曰始焉謂此二子丈夫爾乃今知其婦人也人生則有四方之志豈鹿豕也哉而長聚乎其徒曰若此二子之泣非邪答曰斯二子良人也有不忍之心若于取㫁必不足矣其徒曰凡泣者一無取乎子髙曰有二焉大姦之人以泣自信婦人懦夫以泣著愛孔叢子中平原君問子髙曰吾聞子之先君親見衛夫人南子又云南逰遇乎阿谷而交辭於漂女信有之乎答曰士之相信聞流言而不信者何哉以其所已行之事占之也昔先君在衛衛君問軍旅焉拒而不告問不已攝駕而去攝取也衛君請見猶不能終何夫人之能覿乎古者大饗夫人與焉于時禮儀雖廢猶有行之者意衛君夫人饗夫子則夫子亦弗獲已矣若夫阿谷之言起于近世殆是假其類以行其心者之為也孔叢子中平原君與子髙飲强子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼古之聖賢無不能飲也吾子何辭焉子髙曰以穿所聞賢聖以道徳兼人未聞以飲食也平原君曰即如先生所言則此言何生子髙曰生于嗜酒者盖其勸厲奨戯之辭非實然也平原君欣然曰吾不戯子無所聞此雅言也孔叢子中李寅言曹良于平原君欲仕之平原君以問子髙子髙曰不識也平原君曰良嘗得見於先生矣故敢問子髙曰世人多自稱上用我則國無患夫用智莫若觀其身其身猶不免于患國用之亦烏得無患乎平原君曰良之有患時不眀也居家理治可移于官良能殖貨故欲仕之子髙曰未可知也今有人于此身脩計眀而貧者志不存也身不修㑹計闇而富者非盜無所得之也孔叢子中公孫龍又與子髙記論于平原君所辨而理至于臧三耳公孫龍言臧之三耳甚辨析子髙弗應俄而辭出眀日復見平原君曰疇昔公孫之言信辨也先生寔以為何如答曰然㡬能臧三耳矣雖然實難僕願得有問於君今為臧三耳甚難而寔非也謂臧両耳甚易而寔是也不知君將從易而是者乎亦從難而非者乎平原君弗能應眀日謂公孫龍曰公無復與孔子髙辨事也其人理勝于辭公辭勝于理辭勝於理終必受詘孔叢子中吕覽浮辭公孫龍者平原君之客好刑名以白馬為非白馬或謂子髙曰子髙孔穿之字孔箕之子伋之𤣥孫此人小辨而毁大道子盍往正諸子髙曰大道之悖天下之校枉也吾何病焉或曰雖然子為天下故往也子髙適趙與龍㑹平原君家謂之曰僕居魯遂聞下風而髙先生之行也願受業之日久矣然所不取于先生者獨不取先生以白馬為非白馬爾誠去非白馬之學則穿請為弟子公孫龍曰先生之言悖也龍之學正以白馬非白馬者也今使龍去之則龍無以教矣今龍為無以教而乃學於龍不亦悖乎且夫學於龍者以智與學不逮也今教龍去白馬非白馬是先教也而後師之不可也先生之所教龍者似齊王之問尹文也齊王曰寡人甚好士而齊國無士尹文曰今有人于此事君則忠事親則孝交友則信䖏鄉則順有此四行者可謂士乎王曰善是真吾所謂士者也尹文曰王得此人肯以為臣乎王曰所願不可得也尹文曰使此人于廣庭大衆之中見侮而不敢鬭王將以為臣乎王曰夫士也見侮而不鬭是辱則寡人不以為臣矣尹文曰雖見侮而不鬭是未失所以為士也然而王不以為臣則鄉所為士者乃非士乎夫王之令殺人者死傷人者刑民有畏王令故見侮終不敢鬭是全王之法也而王不以為臣是罸之也且王以不敢鬭為辱必以敢鬭為榮是王之所賞吏之所罰也上之所是法之所非也賞罰是非相與曲謬雖十黄帝固所不能治也齊王無以應且白馬非白馬者乃子先君仲尼之所取也龍聞楚王張繁弱之弓載忘歸之矢以射蛟兕于雲夢之囿反而䘮其弓左右請求之王曰止也楚人遺弓楚人得之又何求乎仲尼聞之曰楚王仁義而未遂亦曰人得之而已矣何必楚乎若是者仲尼異楚人于所謂人也夫是仲尼之異楚人于所謂人而非龍之異白馬于所謂馬悖也先生好儒術而非仲尼之所取也欲學而使龍去所以教雖百龍之智固不能當前也子髙莫之應退而告人曰言非而博巧而不理此固無所不答也異日平原君㑹衆賔而延子髙平原君曰先生聖人之後也不逺千里來顧臨之欲去夫公孫子白馬之學今是非未分而先生飜然欲髙逝可乎子髙曰理之至精者則自眀之豈任穿之退哉平原君曰至精之說可得聞乎答曰其說皆取之經傳不敢以意春秋記六鶂退飛覩之則六察之則鶂鶂猶馬也六猶白也覩之得見其白察之則知其馬色以名别内由外顯謂之白馬名寔當矣若以絲麻加之女工為緇素青黄色名雖殊其質則一是以詩有素絲不曰絲素禮有緇布不曰布緇􅀈牛𤣥武此類甚衆先舉其色後名其質萬物之所同聖賢之所常也君子之謂貴當物理不貴繁辭若尹文之折齊王之所言與其法錯故也穿之所說于公孫子髙其智悦其行也去白馬之說智行固存是則穿未失其所師者也稱此云云沒其理也是楚王之言楚人亡弓楚人得之先君夫子探其本意欲以示廣其實狹之故曰不如亦曰人得之而已也是則異楚王之所謂楚非異楚王之所謂人也以此為喻乃相擊切矣凡言人者總謂人也亦猶言馬者總謂馬也楚自國也白自色也欲廣其人宜在去楚欲正名色不宜去白忱察此理則公孫之辨破矣平原君曰先生言于理善矣因顧謂衆賔曰公孫子能答此乎燕客史由對曰辭則有焉理則否矣孔叢子中公孫龍在趙之時謂弟子曰人而無能者龍不能與逰有客衣褐帶索而見曰臣能呼公孫龍謂弟子曰門下故有能呼者乎對曰無有公孫龍曰與之弟子之籍後數日往說燕王至于河上而航在一汜一汜或作水北使善呼者呼之一呼而航來故曰聖人之䖏世不逆有伎能之士淮南子道應孫卿與臨武君臨武君盖楚将議兵于趙孝成王之前王曰敢問兵之要臨武君曰夫兵之要上得天時下得地利觀敵之變動後之發先之至此兵之要也孫卿曰不然臣聞古用兵之要在附親士民而已六馬不和則造父不能以致逺弓矢不調則羿不能以中微士民不親附則湯武不能以戰勝由此觀之要在附親士民而已矣臨武君曰不然夫兵之用變故也其所貴謀詐也善用之者猶脱兎莫知其用孫呉用之無敵于天下由此觀之豈待親士民而後可哉孫卿曰不然子之所道者諸侯之兵謀臣之事也臣之所道者仁人之兵聖王之事也彼可詐者必怠慢者也君臣上下之際渙然有離徳者也夫以跖而詐桀猶有工拙焉以桀而詐堯如以指撓沸以卵投石抱羽毛而赴烈火入則燋沒耳夫何可詐也且夫暴國之君將孰與至哉彼其所與至者必欺其民民之親我也芬若椒蘭歡如父子彼顧其上如憯毒蜂蠆之人雖桀跖豈肯為其所至惡而賊其所至愛哉是猶使人之子孫自賊其父母也彼則先覺其失何可詐哉且仁人之兵聚則成卒散則成列鋌則若莫邪之利刃嬰之者斷銳則若莫邪之利鋒當之者潰圓居則若邱山之不可移也方居則若盤石之不可拔也觸之摧角折節而退爾夫何可詐也詩曰武王載斾有虔秉鉞如火烈烈則莫我敢曷此謂湯武之兵也孝成王避席仰首曰寡人雖不敏請依先生之兵也韓詩卷三兵又荀子議畧同史記白起傳秦昭王之四十五年伐韓之野王野王降秦上黨道絶其守馮亭與民謀曰鄭道已絶韓必不可得為民秦兵日進韓不能應不如以上黨歸趙趙若受我秦怒必攻趙趙被兵必親韓韓趙為一則可以當秦因使人報趙趙孝成王與平陽君平原君計之平陽君曰不如勿受受之禍大于所得平原君曰無故得一郡受之便趙受之因封馮亭為華陽君孝成王四年王夢衣偏裻之衣乗飛龍上天不至而墜見金玉之積如山眀日王召筮史敢占之曰夢衣偏裻衣者殘也乗飛龍上天不至而墜者有氣而無實也見金玉之積如山者憂也後三日韓氏上黨守馮亭使者至曰以上亦見國䇿而小異韓不能守上黨入之于秦其吏民皆安為趙不欲為秦有城市邑十七願再拜入之趙聽王所以賜吏民王大喜召平陽君豹告之曰馮亭入城市邑十七受之何如對曰聖人甚禍無故之利王曰人懐吾徳何謂無故乎對曰夫秦蠶食韓氏地中絶不令相通固自以為坐而受上黨之地也韓氏所以不入于秦者欲嫁其禍于趙也秦服其勞而趙受其利雖彊大不能得之于小弱小弱顧能得之于强大乎豈可謂非無故之利哉且夫秦以牛田之水通粮蠶食上乗倍戰者裂上國之地其政行不可與為難必勿受也王曰今發百萬之軍而攻踰年厯嵗未得一城也今以城市邑十七幣吾國此大利也趙豹出王召平原君與趙禹而告之對曰發百萬之軍而攻踰嵗未得一城今坐受城市邑十七此大利不可失也王曰善乃令趙勝受地告馮亭曰敝國使者臣勝敝國君使勝致命以萬戸都三封太守千戸都三封縣令皆世世為侯吏民皆益爵三級吏民能相安皆賜之六金馮亭垂涕不見使者曰吾不䖏三不義也為主守地不能死固不義一矣入之秦不聽主令不義二矣賣主地而食之不義三矣趙遂發兵取上黨㢘頗將軍軍長平史趙世家與國策小異嚴尤三將論趙孝成王曰誰能當武安君平原君曰澠池之㑹臣察武安君小頭而鋭瞳子白黒分眀視瞻不轉小頭而鋭敢㫁行也目黒白分眀見事眀也視瞻不轉執志强也可與持乆難與争鋒㢘頗足以當之孝成王七年秦與趙兵相距長平時趙奢已死而藺相如病篤趙使㢘頗將攻秦秦數敗趙軍趙軍固壁不戰秦數挑戰㢘頗不肯趙王信秦之間秦之間言曰秦之所惡獨畏馬服君趙奢之子趙括為將耳趙王因以括為將代㢘頗藺相如曰王以名使括若膠柱而鼓瑟耳括徒能讀其父書傳不知合變也趙王不聽遂將之趙括自少時學兵法言兵事以天下莫能當嘗與其父奢言兵事奢不能難然不謂善括母問奢故奢曰兵死地也而括易言之使趙不將括即已若必將之破趙軍者必括也及括將行其母上書言于王曰括不可使將王曰何以對曰始妾事其父時為將身所奉飯飲而進食者以十數所友者以百數大王及宗室所賞賜者盡以予軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無敢仰視之者王所賜金帛歸蔵于家而日視便利田宅可買者買之王以為何如其父父子異心願王勿遣王曰母置之吾已决矣括母因曰王終遣之即有如不稱妾得無隨坐乎王許諾趙括既代㢘頗悉更約束易置軍吏秦將白起聞之縱竒兵佯敗走而絶其粮道分㫁其軍為二士卒離心四十餘日軍餓趙括出銳卒自摶戰秦軍射殺趙括括軍敗數十萬之衆遂降秦秦悉坑之趙前後所亡凡四十五萬地志山西髙平縣有丹山相傳白起坑趙卒于此流血成川故名又有省寃谷亦此地趙王亦以括母先言竟不誅也史㢘頗傳孔叢子子髙以為趙平原君霸世之士惜其不遇時也其子子順以為衰世之好事公子無霸相之才也申叔問子順曰子之家公有道先生既論之矣今易之是非焉在答曰言貴盡心亦各抒其所見也若是非則眀智者裁之史虞卿傳虞卿者㳺說之士也躡蹻擔簦説趙孝成王一見賜黄金百謚白璧一雙再見為趙上卿故號為虞卿秦趙戰於長平趙不勝亡一都尉趙王召樓昌與虞卿曰軍戰不勝尉復死寡人使束甲而趨之何如樓昌曰無益也不如發重使為媾虞卿曰昌言媾者以為不媾軍必破也而制媾者在秦且王之論秦也欲破趙之軍乎不邪王曰秦不遺餘力矣必且欲破趙軍虞卿曰王聽臣發使出重寳以附楚魏楚魏欲得王之重寳必内吾使趙使入楚魏秦必疑天下之合從且必恐如此則媾乃可為也趙王不聽與平陽君為媾發鄭朱入秦秦内之趙王召虞卿曰寡人使平陽君為媾於秦秦已内鄭朱矣卿以為奚如虞卿對曰王不得媾軍必破矣天下賀戰勝者皆在秦矣鄭朱貴人也入秦秦王與應侯必顯重以示天下楚魏以趙為媾必不救王秦知天下不救王則媾不可得成也應侯果顯鄭朱以示天下賀戰勝者終不肯媾長平大敗遂圍邯鄲為天下笑七年王悔不聽趙豹之計故有長平之禍焉王還不聽秦秦圍邯鄲在九年秦之圍邯鄲秦昭王也趙使平原君求救合從于楚史年表在趙孝成王九年約與食客門下有勇力文武備具者二十人偕平原君曰使文能取勝則善矣文不能取勝則㰱血于華屋之下必得定從而還士不外索取于食客門下足矣得十九人餘無可取者無以滿二十人門下有毛遂者前自贊于平原君曰遂聞君將合從於楚約與食客門下二十人偕不外索今少一人願君即以遂備員而行矣平原君曰先生處勝之門下㡬年于此矣毛遂曰三年于此矣平原君曰夫賢士之處世也譬若錐之處囊中其末立見今先生處勝之門下三年于此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留毛遂曰臣乃今日請處囊中耳使遂早得處囊中乃頴脫而出非特其末見而已平原君乃竟與毛遂偕十九人相與目笑之而未發也毛遂比至楚與十九人論議十九人皆服平原君與楚合從言其利害日出而言之日中不决十九人謂毛遂曰先生上毛遂按劍厯階而上謂平原君曰從之利害两言而决耳今日出而言從日中不决何也楚王謂平原君曰客何為者也平原君曰是勝之舎人也楚王叱曰胡不下吾乃與而君言汝何為者也毛遂按劍而前曰王之所以叱遂者以楚國之衆也今十歩之内王之命懸于遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威今楚地方五千里持㦸百萬此霸王之資也以楚之强天下弗能當白起小䜿子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷而以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當㰱血而定從次者吾君次者遂遂定從于殿上毛遂左手持盤血而右手招十九人曰公相與㰱此血于堂下公等録録所謂因人成事者也平原君已定從而歸歸至于趙曰勝不敢復相士勝相士多者千人自以為不失天下之士今乃扵毛先生而失之也毛先生一至楚而使趙重于九鼎大吕毛先生以三寸之舌强于百萬之師勝不敢復相士遂以為上客史平原君傳史平原君傳平原君者趙勝趙之諸公子也諸子中勝最賢喜賔客賔客至者數千人平原君相趙恵王及孝成王三去相三復位封于東武城平原君家樓臨民家民家有躄者槃散行汲平原君美人居樓上臨見大笑之眀日躄者至平原君門請曰臣聞君之喜士士不逺千里而至者以君能貴士而賤妾也臣不幸有罷癃之病而君之後宫臨而笑臣臣願得笑臣者頭平原君笑應曰諾躄者去平原笑曰觀此䜿子乃欲以一笑之故殺吾美人不亦甚乎終不殺居嵗餘賔客門下舎人稍稍引去者過半平原君怪之曰勝所以待諸君者未嘗敢失禮而去者何多也門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去耳於是平原君乃斬笑躄者美人頭自造門進躄者因謝焉其後門下乃復稍稍來是時齊有孟嘗魏有信陵楚有春申故争相傾以待士平原君既返趙楚使春申君將兵赴救趙魏信陵君亦矯奪晋鄙軍往救趙皆未至秦急圍邯鄲邯鄲急且降平原君甚患之邯鄲𫝊舎吏子李同一名談說平原君曰君不憂趙亡耶平原君曰趙亡則勝為虜何為不憂乎李同曰邯鄲之民炊骨易子而食可謂急矣而君之後宫以百數婢妾被綺縠餘粱肉而民褐衣不完糟糠不厭民困兵盡或剡木為矛矢而君器物鍾罄自若使秦破趙君安得有此使趙得全君何患無有今君誠能令夫人以下編于士卒之間分功而作家之所有盡𣪚以饗士士方其危苦之時易徳耳于是平原君從之得敢死之士三千人李同遂與三千人赴秦軍秦軍為之却三十里亦㑹楚魏救至秦兵遂罷邯鄲復存李同戰死封其父為李侯史平原君傳作又說苑復思李同李談史記魯仲連傳魯仲連者齊人也好竒偉俶儻之畫筞而不肯仕宦任職好持髙節㳺于趙趙孝成王時而秦王使白起破趙長平之軍前後四十餘萬秦兵遂東圍邯鄲趙王恐諸侯之救兵莫敢擊秦軍魏安釐王使將軍晋鄙救趙畏秦止于蕩隂不進魏王使客將軍辛垣衍閒入邯鄲因平原君謂趙王曰秦所為急圍趙者前與齊湣王争强為帝已而復歸帝今齊湣王已弱方今惟秦雄天下此非必貪邯鄲其意欲復求為帝趙誠發使尊秦昭王為帝秦必喜罷兵去平原君猶豫未有所决此時魯仲連適㳺趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆扵外今又内圍邯鄲而不能去魏王使客將軍辛垣衍令趙帝秦今其人在是勝也何敢言事魯仲連曰吾始以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客辛垣衍安在吾請為君責而歸之平原君曰勝請紹介而見之于先生平原君遂見辛垣衍曰東國有魯仲連先生者今其人在此勝請為紹介交之于將軍辛垣衍曰吾聞魯仲連先生齊國之髙士也衍人臣也使事有職吾不願見魯仲連先生平原君曰勝既已泄之矣辛垣衍許諾魯連見新垣衍而無言辛垣衍曰吾視居此圍城之中者皆有求于平原君者也今吾觀先生之玉貎非有求于平原君者也曷為久居此圍城之中而不去魯仲連曰世以鮑焦為無從容而死者皆非也衆人不知則為一身彼秦者棄禮義而上首功之國也權使其士虜使其民彼即肆然而為帝過而為政于天下則連有蹈東海而死耳吾不忍為之民也所為見將軍者欲以助趙也辛垣衍曰先生助之將奈何魯連曰吾將使梁及燕助之齊楚則固助之矣辛垣衍曰燕則吾請以從矣若乃梁者則吾乃梁人也先生惡能使梁助之魯連曰梁未睹秦稱帝之害故耳使梁睹秦稱帝之害則必助趙矣辛垣衍曰秦稱帝之害何如魯連曰昔者齊威王嘗為仁義矣率天下諸侯而朝周周貧且微諸侯莫朝而齊獨朝之居嵗餘周烈王崩齊後往周怒赴于齊曰天崩地坼天子下席東藩之臣田嬰齊後至則斮齊威王勃然怒曰叱嗟而母婢也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固然其無足恠辛垣衍曰先生獨不見夫僕乎十人而從一人者寜力不勝而智不若邪畏之也魯仲連曰嗚呼梁之比于秦若僕邪辛垣衍曰然魯仲連曰吾將使秦王烹醢梁王辛垣衍怏然不悦曰噫嘻亦大甚矣先生之言也先生又惡能使秦王烹醢梁王魯仲連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好獻之于紂紂以為惡醢九侯鄂侯争之彊辯之疾故脯鄂侯文王聞之喟然而嘆故拘之羑里之庫百日欲令之死曷為與人俱稱王卒就脯醢之地齊湣王將之魯夷維子為執筞而從謂魯人曰子將何以待吾君魯人曰吾將以十太牢待子之君夷維子曰子安取禮而來吾君彼吾君者天子也天子廵狩諸侯辟舎納管籥攝袵抱几視膳于堂下天子已食乃退而聽朝也魯人投其籥不果納不得入于魯將之薛假途于鄒當是時鄒君死湣王欲入弔夷維子謂鄒之孤曰天子弔主人必將倍殯棺設北面于南方然後天子南面弔也鄒之羣臣曰必若此吾將伏劍而死故不敢入于鄒鄒魯之臣生則不得事養死則不得賻襚然且欲行天子之禮於鄒魯鄒魯之臣不果納今秦萬乗之國也梁亦萬乗之國也俱據萬乗之國各有稱王之名睹其一戰而勝欲從而帝之是使三晋之大臣不如鄒魯之僕妾也且秦無已而帝則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女䜛妾為諸侯妃姬處梁之宫梁王安得晏然而已乎而將軍又何以得故寵乎於是辛垣衍起再拜謝曰始以先生為庸人吾乃今日知先生為天下之士也吾請出不敢復言帝秦秦將聞之為却軍五十里適㑹魏公子無忌奪晋鄙軍以救趙擊秦軍秦軍遂引而去于是平原君欲封魯連魯連辭讓使者三終不肯受平原君乃置酒酒酣起前以千金為魯連夀魯連笑曰所謂貴于天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之事也而連不忍為也遂辭平原君而去終身不復見漢書儒家魯連十四篇八年平原君如楚請救還楚來救及魏公子無忌亦來救秦圍邯鄲解趙世家年年表在九史記虞卿傳秦既解邯鄲圍而趙王入朝使趙郝約事扵秦割六縣而媾虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦復攻王王無救矣王以虞卿之言告趙郝趙郝曰虞卿誠能盡秦力之所至乎誠知秦力之所不能進此彈丸之地弗予令秦来年復攻王王得無割其内而媾乎王曰請聽子割矣子能必使來年秦之不復攻我乎趙郝對曰此非臣之所敢任也他日三晋之交于秦相善也今秦善韓魏而攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻開闗通幣齊交韓魏至來年而王獨取攻于秦此王之所以事秦必在韓魏之後也此非臣之所敢任也王以告虞卿虞卿對曰郝言不媾来年秦復攻王王得無割其内而媾乎今媾郝又以不能必秦之不復攻也今雖割六城何益来年復攻又割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能取六縣趙雖不能守終不失六城秦倦而歸兵必罷我以六城收天下以攻罷秦是我失之于天下而取償于秦也吾國尚利孰與坐而割地自弱以彊秦哉今郝曰秦善韓魏而攻趙者必以為韓魏不救趙也而王之軍必孤又以王之事秦不如韓魏也是使王嵗以六城事秦也即坐而城盡來年秦復求割地王將與之乎弗與是棄前功而挑秦禍也與之則無地而給之語曰彊者善攻弱者不能守今坐而聽秦秦兵不弊而多得地是彊秦而弱趙也以益彊之秦而割愈弱之趙其計故不止矣且王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣趙王計未定樓緩從秦來趙王與樓緩計之曰予秦地何如毋予孰吉緩辭讓曰此非臣之所能知也王曰雖然試言公之私樓緩對曰王亦聞夫公甫文伯母乎公甫文伯仕于魯病死女子為自殺于房中者二人其母聞之弗哭也其相室曰焉有子死而弗哭者乎其母曰孔子賢人也逐于魯而是人不隨也今死而婦人為之自殺者二人若是者必其于長者薄而於婦人厚也故從母言之是為賢母從妻言之是必不免為妬妻故其言一也言者異則人心變矣今臣新從秦來而言勿予則非計也言予之恐王以臣為為秦也故不敢對使臣得為大王計不如予之王曰諾虞卿聞之入見王曰此飾説也王眘勿予樓緩聞之往見王王又以虞卿之言告樓緩對曰不然虞卿得其一不得其二夫秦趙構難而天下皆説何也曰吾且因彊而乗弱矣今趙兵困于秦天下之賀戰勝者則必盡在于秦矣故不如急割地為和以疑天下而慰秦之心不然天下將因秦之强怒乗趙之弊𤓰分之趙且亡何秦之圖乎故曰虞卿得其一不得其二願王以此决之勿復計也虞卿聞之往見王曰危哉樓子之所以為秦者是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿予者非固勿予而已也秦索六城于王而王以六城賂齊齊秦之深讐也得王之六城并力西擊秦齊之聽王不待辭之畢也則是王失之于齊而取償于秦也而齊趙之深讐可以報矣而示天下有能為也王以此發聲兵未窺于境臣見秦之重賂至趙而反媾于王也從秦為媾韓魏聞之必盡重王重王必出重寳以先于王則是王一舉而結三國之親而與秦易道也趙王曰善則使虞卿東見齊王與之謀秦虞卿未返秦使者已在趙矣樓緩聞之亡去趙于是封虞卿以一城居頃之而魏請為從趙孝成王召虞卿謀過平原君平原君曰願君之論從也虞卿入見王王曰魏請為從對曰魏過王曰寡人固未之許對曰王過王曰魏請從卿曰魏過寡人未之許又曰寡人過然則從終不可乎對曰臣聞小國之與大國從事也有利則大國受其福有敗則小國受其禍今魏以小國請其禍而王以大國辭其福臣故曰王過魏亦過語亦見國策而互異竊以為從便王曰善乃合魏為從虞卿既以魏齊之故詳秦范雎事不重萬戸侯卿相之印與魏齊間行卒去趙困于梁魏齊已死不得意乃著書上採春秋下觀近世曰節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之曰虞氏春秋藝文志曰十五篇史虞卿傳虞卿著書名曰春秋魏齊曰子無然也春秋孔聖所以名經也今子之書大抵談説而已亦以為名何答曰經者取其事常也可常則為經矣且不為孔子其無經乎齊問子順子順曰無傷也魯之史記曰春秋經因以為名焉又晏子之書亦曰春秋吾聞泰山之上封禪者七十有二君其見稱述數不盈十所謂貴賤不嫌同名也孔叢子中虞卿欲以信陵君之存邯鄲為平原君請封公孫龍聞之夜駕見平原君曰龍聞虞卿欲以信陵君之存邯鄲為君請封有之乎平原君曰然龍曰此甚不可且王舉君而相趙者非以君之智能為趙國無有也割東武城而封君者非以君為有功也而以國人無勛乃以君為親戚故也君受相印不辭無能割地不言無功者亦自以為親戚故也今信陵君存邯鄲而請封是親戚受城而國人計功也此甚不可且虞卿操其兩權事成操右劵以責事不成以虚名徳君君必勿聽也平原君遂不聽虞卿語亦見國筞而多平原君厚待公孫龍公孫龍善為堅白之辯及鄒衍過趙言至道乃絀公孫龍史平原君傳劉向别録齊使鄒衍過趙平原君見公孫龍及其徒綦母子之屬論白馬非白馬之辯以問鄒子鄒子曰不可彼天下之辯有五勝三至而辭正為下辯者别殊類使不相害序異端使不相亂抒意通指眀其所謂使人與知焉不務相迷也故勝者不失其所守不勝者得其所求若是故辯可為也及至煩文以相假飾辭以相悖巧譬以相移引人聲使不得及其意如此害大道夫繳紛争言而競後息不能無害君子坐皆稱善史平原君傳小註引十年燕攻昌壮壮當作城此時屬趙五月拔之趙將樂乗慶舎攻秦信梁軍破之信梁盖王齕號也太子死秦攻西州拔之州注作周徒父祺出十一年城元氏縣上原武陽君鄭安平死故秦降將也收其地十二年邯鄲廥燒廥積蒭藁之所以上史趙世家趙王問子順曰寡人聞孔氏之世自正考父以來儒林相繼仲尼重之以大聖自茲以降世業不替天下諸侯咸資禮焉先生承其緒作二國師從古及今載徳流聲未有若先生之嗣率由前訓將與天地相敝矣答曰若先祖父並禀聖人之性如君王之言也至如臣者學行不敏寄食于趙禄仕于魏幸遇二國之君寛以容之若乃師也未敢承命假令頼君之願後世克祚不忝前人不冺祖業豈徒一家之賜哉亦天下之慶也王曰必然必然孔叢子中趙王問相于平原君平原君曰鄒文可趙人王曰其行如何對曰夫孔子髙天下之髙士也取友以行交㳺以道文與之逰稱曰好義王其用之王卒不用後以平原君言問子順且曰先生知之乎答曰先父之所交也何敢不知王曰寡人雖失之在前猶願聞其行于先生也答曰行不茍合雖賤不渝君子人也王遂禮之固以老辭孔叢子中齊攻趙圍廪邱趙使孔青帥五萬擊之克齊軍獲尸三萬趙王詔勿歸其尸將以困之子順聘趙問王曰不歸尸其困何也曰其父兄子弟悲苦無已廢其産也子順曰非所以困之也死一也歸尸與不悲苦胡異焉以臣愚計貧齊之術乃宜歸尸王曰何謂對曰使其家逺來迎尸不得事農一費也歸所𦵏使其送死終事二費也二年之中䘮卒三萬三費也欲無困貧不能得已王曰善既而齊大夫聞其子順之謀曰君子之謀其利溥哉孔叢子中吕覽不廣齊攻廪邱趙使孔青將死士而救之與齊人戰大敗之齊將死得車二千得尸三萬以為京京觀也寗越謂孔青曰寗越趙之中牟人惜矣不如歸尸以内攻之趙聞之古善戰者沙隨賁服沙隨猶相守不進不却賁置也服退也却舎延尸却舎以緩其尸使人得收𦵏以盡其財車甲盡于戰府庫盡于𦵏此之謂内攻之孔青曰敵齊不尸則如何寗越曰戰而不勝其罪一與人出而不與人入其罪二與之尸而弗取其罪三民以此三者怨上無以使下下無以事上是之謂重攻之趙孝文王問曰昔伊尹為臣而放其君其君不怨何行而得乎此也子順答曰伊尹執人臣之節而弼其君以禮亦行此道而已矣王曰方以放君為名而先生稱禮何也子順曰以禮括其君使入于善也曰其說可得聞乎答曰其在商書太甲嗣立而干冡宰之政伊尹曰惟王舊行不義習與性成予不狎于不順王始即桐邇于先王其訓罔以後人迷王往居憂允思厥祖之眀徳是言太甲在䘮不眀乎人子之道而欲知政于是伊尹使之居相近湯之墓處憂哀之地放之不俾知政三年服竟然後反之即所以奉禮執節事太甲者也率其君以義强其君以孝道未有行此見怨也王曰善哉我未之聞也孔叢子中為趙孝成王七年以子順相尋以病免十四年平原君趙勝死史趙世家年年表在十五史平原君傳平原君以趙孝成王十五年卒子孫代後竟趙俱亡十五年以尉文封相國㢘頗為信平君尉文地名燕王令丞相栗腹約驩以五百金為趙王酒還歸報燕王曰趙氏壮者皆死長平其孤未壮可伐也王召昌國君樂間而問之對曰趙四戰之國也其民習兵伐之不可王曰吾以衆伐寡二而伐一可乎對曰不可王曰吾即以五而伐一可乎對曰不可燕王大怒群臣皆以為可燕卒起二軍車二千乗栗腹將而攻鄗卿秦将而攻代㢘頗為趙將破殺栗腹虜卿秦樂間史趙世家史㢘頗傳自邯鄲圍解五年而燕用栗腹之謀舉兵擊趙趙使㢘頗將擊之大破燕軍於鄗殺栗腹遂圍燕燕割五城請和乃聽之趙以尉文封㢘頗為信平君為假相國㢘頗之免長平歸也失勢之時故客盡去及復用為將客又復至頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎十六年以樂乗為武襄君十七年假相大將武襄君攻燕圍其國十八年延陵鈞率師從相國信平君助魏攻燕秦拔我榆次三十七城十九年趙與燕易土以龍兑汾門臨樂與燕燕以葛武陽平舒與趙二十年秦王政初立秦拔我晋陽使㢘頗伐魏之繁陽拔之以上史趙世家二十一年孝成王卒子悼襄王立名偃使樂乗代㢘頗頗怒攻樂乗樂乗走㢘頗遂奔魏之大梁㢘頗居梁久之魏不能信用趙以數困于秦兵思復得㢘頗㢘頗亦思復用于趙趙王悼襄王使使者視㢘頗尚可用否㢘頗之仇郭開多與使者金令毁之趙使者既見㢘頗㢘頗為之一飯斗米肉十斤被甲上馬以示尚可用趙使還報王曰㢘將軍雖老尚善飯然與臣坐頃之三遺矢矣趙王以為老遂不召楚聞㢘頗在魏隂使使迎之㢘頗一為楚將無功曰我思用趙人㢘頗卒扵夀春史㢘頗傳悼襄王悼襄王元年大備行大備之禮備疑當作酺魏欲通平邑中牟之道不成中牟山之側二邑皆属魏欲渡黄河作道相通而不成也二年李牧將攻燕拔武遂方城李牧者趙之北邉良將也孝成王時常居代雁門􅍯匈奴以便宜置吏市租輸入幕府為士卒費日擊數牛享士習射騎謹烽火多間諜厚遇戰士為約曰匈奴即入盗急入收保有敢捕虜者斬匈奴每入烽火謹輙入收保不敢戰如是數嵗亦不亡失然匈奴以李牧為怯雖趙邉兵亦以為吾將怯趙王讓李牧李牧如故趙王怒召之使他人代將嵗餘匈奴毎來出戰出戰數不利失亡多邉不得田畜復請李牧牧杜門不出固稱疾趙王乃復彊起使將兵牧曰王必用臣臣如前乃敢奉令王許之李牧至如故約匈奴數嵗無所得終以為怯邉士日得賞賜而不用皆願一戰于是乃具選車得千三百乗選騎得萬三千匹百金之士五萬人能破敵者賞百金彀者十萬人悉勒習戰大縱畜牧人民滿野匈奴小入佯北不勝以數千人委之單于聞之大率衆來入李牧多為竒陣張左右翼擊之大破殺匈奴十餘萬騎滅䄡襤破東胡降林胡單于奔走其後十餘嵗匈奴不敢近趙邉城史李牧傳趙間魏將以求親于秦子順謂趙王曰趙悼襄王此君之下吏計過也比目之魚所以不見得于人者以偶視而俱走也今秦有兼吞天下之志日夜間伺不忘于側息也趙魏與之隣接而强弱不敵秦所以不敢圖并趙魏者徒以二國并目周旋者也今無故自離以資强秦天下拙謀無過此者故臣曰君之下吏計過也夫連雞不能上㨗亦猶二國搆難不能自免于秦也願王熟慮之趙王曰敬受教孔叢子中史記自晋悼公使魏絳和戎翟戎翟朝晋後百有餘年趙襄子喻句注而破并代以臨胡貉其後既與韓魏共滅智伯分晋地而有之則趙有代句注之北魏有西河上郡以與戎界邊其後義渠之戎築城郭以自守而秦稍蠶食至于恵王遂㧞義渠二十五城恵王擊魏魏盡入西河及上郡于秦秦昭王時義渠戎王與宣太后亂有二子宣太后詐而殺義渠戎王于甘泉遂起兵伐殘義渠于是秦有隴西北地上郡築長城以拒胡而趙武靈王亦變俗胡服習騎射北破林胡樓煩築長城自代并隂山下髙闕為塞而置雲中雁門代郡其後燕有賢將秦開為質於胡胡甚信之歸而襲破走東胡東胡却千餘里與荆軻刺秦王秦舞陽者開之孫也燕亦築長城自造陽至襄平置上谷漁陽右北平遼西遼東郡以拒胡當是之時冠帶戰國七而三國邊于匈奴其後趙將李牧時匈奴不敢入趙邊魏王使相國修好鄰國遂連和于趙趙王既賔之而燕問子順曰今寡人欲來北狄不知其所以然答曰誘之以其所利而與之通市則自至矣王曰寡人欲因而弱之若與交市分我國貨散于夷狄是强之也可乎答曰夫與之市者將以我無用之貨取其有用之物是固所以弱之術也王曰何謂我之無用彼之有用荅曰衣服之物則有珠玉五采飲食之物則有酒醪五熟五味也此即我之所有而彼之所利者也夷狄之貨唯牛馬㫋裘弓矢之器是其所饒而輕以與人者也以吾所有易彼所饒如斯不已則夷狄之用將縻於衣食矣殆可舉棰而驅之豈徒弱之而已乎趙王曰敬受教孔叢子中邯鄲之民以正月之旦獻雀于趙王而綴之以五絲絲亦作采趙王大悦申叔以告子順曰王何以為也對曰正旦放之示有生也子順曰此委巷之鄙事爾非先王之法也且又不令申叔曰敢問何謂不令答曰夫雀者取其名焉則宜受之于上不宜取之于下下人非所得制爵也而王悦此殆非吉祥矣昔虢公祈神神賜之土田是失國而更受田之祥也今以一國之王受民之雀將何悦哉孔叢子中卓襄王問龎煖曰夫君人者亦有為其國乎卓當作悼此趙悼襄王也孝成王之子悼襄王三年龎煖將攻燕擒其將劇辛龎煖曰王獨不聞俞跗之為醫乎已成必治鬼神避之傳云上古之時醫有俞跗治病不以湯液醴灑鑱石橋引案機毒熨而割皮解肌訣脉結筋搦髓腦浣腸胃練精易形此雖已成所以必治而鬼神避之楚王臨朝為隨兵故若堯之任人也不用親戚而必使能其治病也不任所愛必使舊醫語曰老醫善卜盖老醫更病多矣堯故使之楚王聞傳暮􅀈在身􅀈盖病也必待俞跗俞跗盖非楚人此亦寓言卓襄王曰善龎煖曰王其忘乎昔伊尹醫殷太公醫周武王百里醫秦申麃醫郢原季醫晋范蠡醫越管仲醫齊而五國覇其善一也然道不同數卓襄王曰願聞其數煖曰王獨不聞魏文侯之問扁鵲耶扁鵲鄭人姓秦氏名越人曰子昆弟三人其孰最善為醫扁鵲曰長兄最善中兄次之扁鵲最為下魏文侯曰可得聞耶扁鵲曰長兄于病視神未有形而除之故名不出于家中兄治病其在毫毛故名下出于閭若扁鵲者鑱血脉投毒葯副肌膚間而名出聞于諸侯魏文侯曰善使管子行醫術以扁鵲之道曰桓公㡬能成其覇乎凡此者不病病治之無名使之無形至功之成其其一作六下謂之自然故良醫化之拙醫敗之雖幸不死創伸股維維牽攣也卓襄王曰善寡人雖不能無創孰能加秋毫寡人之上哉鶡冠子世賢秦召春平君因而留之泄鈞為之謂文信侯曰春平君者趙王甚愛之而郎中姤之故相與謀曰春平君入秦秦必留之故相與謀而内之秦也今君留之是絶趙而郎中之計中也君不如遣春平君而留平都國筞作平都侯春平君言行信于王王必厚割趙而贖平都文信侯曰善因遣之年表云太子從質秦歸按太子即春平君也城韓臯三年龎煖將攻燕禽其將劇辛四年龎煖將趙楚魏燕之鋭師攻秦蕞不拔移攻齊取饒安五年傅抵將居平邑傅抵趙將姓名慶舎將東陽河外師守河梁六年封長安君以饒魏與趙鄴九年趙攻燕取貍陽城貍當作漁兵未罷秦攻鄴拔之悼襄王卒子幽繆王遷立世本王遷無謚此獨稱幽繆者盖秦滅趙之後代王嘉謚之也幽繆王幽繆王遷元年城柏人二年秦攻武城年表云秦抜我平陽扈輙率師救之軍敗死焉三年秦攻赤麗宜安李牧率師與戰肥下却之封牧為武安君史李牧傳秦破趙殺將扈輙于武遂城斬首十萬趙乃以李牧為大將軍擊秦軍於宜安大破秦軍走秦將桓齮封李牧為武安君四年秦攻番吾李牧與之戰却之李牧傳云擊破秦軍南距韓魏五年代地大動自樂徐以西北至平隂臺屋墻垣大半壊地坼東西百三十歩六年大飢民訛言曰趙為號秦為笑以為不信視地之生毛七年秦人攻趙趙大將李牧將軍司馬尚將擊之李牧誅司馬尚免趙忽及齊將顔聚代之忽當作蔥趙忽軍破顔聚亡去以王遷降八年邯鄲為秦史李牧傳趙王遷七年秦使王翦攻趙趙使李牧司馬尚禦之秦多與趙王寵臣郭開金為反間言李牧司馬尚欲反趙王乃使趙蔥及齊將顔聚代李牧李牧不受命趙使人微捕得李牧斬之廢司馬尚後三月王翦因急擊趙大破殺趙蔥虜王遷及其將顔聚遂滅趙史趙世家太史公曰吾聞馮王孫曰趙王遷其母娼也嬖于悼襄王悼襄王廢適子嘉而立遷遷素無行信䜛故誅其良將李牧用郭開豈不謬哉秦既虜遷趙之亡大夫共立嘉為王王代六嵗秦進兵破嘉遂滅趙以為郡列女傳趙悼襄王后娼婦也以其美而取之李牧諫曰不可女之不正國之所以覆而不安也此女亂一宗大王不畏乎王曰亂在寡人為政遂取之初王后生子嘉為太子娼后既入生子遷隂譛后及太子于王使人犯太子而䧟之于罪王遂廢嘉而立遷黜后而立娼姬為后及王薨遷立娼后滛泆不止通于春平君多受秦賂而使王誅李牧其後秦兵徑入莫能拒遂見虜于秦趙亡大夫怨娼后之譛太子及李牧乃殺娼后而滅其家共立嘉于代淮南子趙王遷流于房陵思故鄉則為作山水之謳聞之者莫不隕涕括地志趙王遷墓在房州房陵縣西九里地志湖廣秦使王翦滅趙徙王于房陵王懐鄉作歌聞者流涕今鄖陽府房縣有趙王冢雜録路說謂周頗曰公不愛趙天下必從周頗曰固欲天下之從也天下從則秦利也路說應之曰然則公欲秦之利夫周頗曰欲之路說曰公既欲之則胡不為從矣吕覧應言王子於期為趙簡主取道争千里之表其始發也彘伏溝中王子於期齊轡䇿而進彘突出于溝中馬驚駕敗一旦王子於期為宋君為千里之逐已駕察手吻文且發矣驅而前之輪中繩引而却之馬掩迹拊而發之彘出于竇中馬退而却筞不能進前也馬駻而走轡不能正也韓子外儲右扁鵲過趙趙王太子暴疾而死鵲造宫門曰吾聞國中卒有壤土之事得無有急乎中庶子之好方者應之曰然王太子暴疾而死扁鵲曰入言鄭毉秦越人能活太子中庶子難之曰吾聞上古之為毉者曰苗父苗父之為毉也以營為席以芻為狗北面而祝發十言耳請扶而來者舉而來者皆平復如故子之方能如此乎扁鵲曰不能又曰吾聞中古之為毉者曰俞跗俞跗之為毉也搦腦髓束肓膜炊灼九竅而定經絡死人復為生人故曰俞跗子之方能若是乎扁鵲曰不能中庶子曰子之方如此譬若以管窺天以錐刺地所窺者甚大所見者甚少鈞若子之方豈足以變駭童子哉扁鵲曰不然物故有昧揥而中蛟頭掩目而别白黒者太子之疾所謂尸厥者也以為不然入診之太子股隂當濕耳中焦焦如有嘯聲然者皆可治也中庶子入報趙王趙王跣而趨出門曰先生逺辱幸臨寡人先生幸而有之則糞土之息得䝉天履地而長為人矣先生不有之則先犬馬填溝壑矣言未己涕泣沾襟扁鵲遂為診之先造軒光之灶八成之湯砥針礪石取三陽五輸子容𢷬葯子眀吹耳陽儀反神子越扶形子㳺矯摩太子遂得復生天下聞之皆曰扁鵲能生死人鵲辭曰予非能生死人也特死夫當生者活耳夫死者猶不可藥而生也悲夫亂君之不治不可藥而息也說苑辨物異韓詩作虢世子叙致各不妨並存趙王逰于圃中左右以莵與虎而輟觀之盻然環其眼環轉其眼以作怒也王曰可惡哉虎目也左右曰平陽君之目可惡過此見此未有害也見平陽君之目如此者則必死矣眀日平陽君聞之使人殺言者而王不加誅也韓子外儲右趙急求李欬李言續經與之俱如衛抵公孫與公孫與見而與入續經因告衛吏使捕之捕李欬也續經以此仕趙五大夫莫與同朝子孫不可以交友賤續經之行也吕覽無義鄴令襄疵隂善趙王左右趙王謀襲鄴襄疵輙聞而先言之魏王魏王􅍯之趙乃輙還韓子内儲下邯鄲師有出新曲者託之李竒古之名倡諸人皆争學之後知其非也而皆棄其曲此未始知音者也鄙人有得玉璞者喜其狀以為寳而蔵之以示人人以為石也因而棄之此未始知玉者也淮南子修務趙王使人于楚鼓瑟而遣之曰慎無失吾言使者受命伏而不起曰大王鼓瑟未嘗若今日之悲也王曰調使者曰調則可記其柱王曰不可天有燥濕絃有緩急柱有推移不可記也使者曰請借此以喻楚之去趙也千有餘里亦有吉凶之變凶則弔之吉則賀之猶柱之有推移不可記也故王之使人必慎其所之而不任以辭詩曰征夫㨗㨗毎懐靡及盖傷自上而御下也韓詩卷七此不知何時或漢初事説苑奉使趙王遣使者之楚方鼓瑟而遣之誡之曰必如吾言使者曰王之鼓瑟未嘗悲若此也王曰宫商固方調矣使者曰調則何不書其柱耶王曰天有燥濕絃有緩急宫商移徙不可知是以不書使者曰眀君之使人也任之以事不制以辭遭吉則賀之凶則弔之今楚趙相去千有餘里凶吉憂患不可豫知猶柱之不可書也又韓詩外傳語少别春秋戰國異辭卷五十一
