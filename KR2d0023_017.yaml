body:
  text: 春秋戰國異辭卷十五右春坊右諭德陳厚耀撰齊桓公上桓公元年齊君無知遊於雍林賈逵曰渠丘大夫也杜左傳作雍廩殺無知預曰雍廩齊大夫此云遊于雍林蓋以雍林為邑名賈云渠丘大夫者或雍林為渠丘之大夫也雍林人嘗有怨于無知及其往遊雍林人襲殺無知告齊大夫曰無知殺襄公自立臣謹行誅惟大夫更立公子之當立者惟命是聽初襄公殺魯桓公通其夫人殺誅數不當淫于婦人數欺大臣羣弟恐禍及故次弟糾奔魯其母魯女也管仲召忽傅之次弟小白奔莒鮑叔傅之小白母衛女也有寵於僖公小白少善大夫髙徯及雍林殺無知議立君髙國先隂召小白于莒魯聞無知死亦發兵送公子糾而使管仲别將兵遮莒道射中小白帶鈎小白佯死管仲使人馳報魯魯送糾者行益遲六日至齊則小白已入髙徯立之是為桓公桓公之中鈎佯死以誤管仲也已而載溫車中馳行亦有髙國內應故得先入立發兵距魯秋敗魯兵于乾時掩絶魯歸道齊遺魯書曰子糾兄弟弗忍誅請魯自殺之召忽管仲仇也請得而甘心醢之不然將圍魯魯人患之遂殺子糾于笙瀆召忽自殺管仲請囚桓公之立心欲殺管仲鮑叔牙曰臣幸得從君君竟以立君之尊臣無以增君君將治齊即髙徯與叔牙足也君且欲霸王非管夷吾不可夷吾所居國國重不可失也於是桓公從之乃佯為召管仲甘心實欲用之管仲知之故請往鮑叔牙迎受管仲及堂阜而脫桎梏齋袚而見桓公桓公厚禮以為大夫任政桓公既得管仲與鮑叔隰朋髙徯修齊國政連五家之兵設輕重魚鹽之利以贍貧窮祿賢能齊人皆説史齊世家管子大匡公孫無知虐于雍廩雍廩殺無知桓公自莒先入魯人伐齊納公子糾戰于乾時管仲射桓公中鈎魯師敗績桓公踐位於是劫魯使魯殺公子糾桓公問于鮑叔曰將何以定社稷鮑叔曰得管仲與召忽則社稷定矣公曰夷吾與召忽吾賊也鮑叔乃告公其故圖公曰然則可得乎鮑叔曰若急召則可得也不亟不可得也夫魯施伯知夷吾為人之慧也必將令魯致政于夷吾夷吾受之則彼知能弱齊矣夷吾不受彼知其將反于齊也必將殺之公曰然則夷吾將受魯之政乎否也鮑叔曰不受夫夷吾之不死糾也為欲定齊國之社稷也今受魯之政是弱齊也夷吾之事君無二心雖知死必不受也公曰其於我也曽若是乎鮑叔對曰非為君為先君也其於君不如親糾也糾之不死而况君乎君若欲定齊則亟迎之公曰恐不及奈何鮑叔曰夫施伯之為人也敏而多畏公若先反恐注怨焉必不殺也公曰諾施伯進告魯君曰管仲有急其事不濟今在魯君其致魯之政焉若受之則齊可弱也若不受則殺之殺之以説於齊也與同怒尚賢於己君曰諾魯未及致政而齊之使至曰夷吾與召忽寡人之賊也今在魯寡人願生得之若不得也是君與寡人賊比也魯君問施伯施伯曰君與之臣聞齊君惕而亟驕雖得賢庸必能用之乎及齊君之能用之也管子之事濟也夫管仲天下之大聖也今彼反齊天下皆鄉之豈獨魯乎今若殺之此鮑叔之友也鮑叔因此以作難君必不能待也不如與之魯君乃縛管仲與召忽管仲謂召忽曰子懼乎召忽曰何懼吾不蚤死將胥有所定也今既定矣令子相齊之左必令忽相齊之右雖然殺君而用吾身是再辱我也子為生臣忽為死臣忽也知得萬乘之政而死公子糾可謂有死臣矣子生而霸諸侯公子糾可謂有生臣矣死者成行生者成名名不兩立行不虛至子其勉之死生有分矣乃行入齊境自刎而死管仲遂入此與國語文大别君子聞之曰召忽之死也賢其生也管仲之生也賢其死也或曰襄公逐小白小白走莒三年襄公薨公子糾踐位國人召小白鮑叔曰胡不行矣小白曰不可夫管仲知召忽強武雖國人召我我猶不得入也鮑叔曰管仲得行其知於國國可謂亂乎召忽強武豈能獨圖我哉小白曰夫雖不得行其知其衆豈不足以圖我哉鮑叔曰夫國之亂也智人不得作內事朋友不能合摎而國乃可圖也乃命車駕鮑叔御小白乘而出於莒小白曰夫二人者奉君令吾不可以試也乃將下鮑叔履其足曰事之濟也在此時事若不濟老臣死之公子猶可免也乃行至於邑郊鮑叔令車二十乘先十乘後曰事之濟也聽我令事之不濟也免公子者為上死者為下吾以五乘之實距路鮑叔乃為前驅遂入國逐公子糾管仲射小白中鈎管仲與公子糾召忽遂走魯桓公踐位魯伐齊納公子糾而不能吕覽貴幸國人殺無知未有君公子糾與公子小白皆歸俱至爭先入公家管仲扞弓射公子小白中鈎鮑叔御公子小白僵管子以為小白死告公子糾曰安之公子小白已死矣鮑叔因疾驅先入故公子小白得以為君鮑叔之智應射而令公子小白僵也韓子説林下公子糾將為亂桓公使使者視之使者報曰笑不樂視不見必為亂乃使魯人殺之吕覽順説管子得于魯魯束縳而檻之使役人載而送之齊其人謳歌而引管子恐魯之止而殺已也欲速至齊因謂役人曰我為汝唱汝為我和其所唱適冝走役人不倦而取道甚速管子可謂能因矣韓子外儲左管仲束縳自魯之齊道而飢渴過綺烏封人而乞食烏封人跪而食之甚敬封人因竊謂仲曰適幸及齊不死而用齊將何報我曰如子之言我且賢之用能之使勞之論我何以報子封人怨之桓公自莒反于齊使鮑叔牙為宰鮑叔辭曰臣君之庸臣也君有加惠于臣使臣不凍飢則君之賜也若必治國家則非臣之所能也其唯管夷吾乎臣之所不如管夷吾者五寬惠愛民臣不如也治國不失柄臣不如也忠信可結于諸侯臣不如也制禮義可法于四方臣不如也介胄執枹立于軍門使百姓皆加勇臣不如也以上鮑叔薦管仲語亦見韓詩卷十而語小異夫管仲者民之父母也將欲治其子不可棄其父母公曰管夷吾親射寡人中鈎殆于死今乃用之可乎鮑叔曰彼為其君也君若宥而反之其為君亦猶是也公曰為之奈何鮑叔曰君使人請之魯公曰施伯魯之謀臣也彼知吾將用之必不吾豫鮑叔曰君詔使者曰寡君有不令之臣在君之國願請之以戮于羣臣魯君必諾且施伯知夷吾之才必將致魯之政夷吾受之則魯能弱齊矣夷吾不受彼知將反于齊必殺之公曰然則夷吾受乎鮑叔曰不受也夷吾事君無二心公曰其于寡人猶如是乎對曰非為君也為先君與社稷之故君若欲定宗廟則亟請之不然無及也公乃使鮑叔行成曰公子糾親也請君討之魯人為殺公子糾又曰管仲讐也請受而甘心焉魯君許諾魯君莊公施伯謂魯侯曰勿豫非戮之也將用其政也管仲者天下之賢人也大器也所在之國必得志于天下今齊求而得之則必長為魯憂君何不殺而授之其尸魯君曰諾將殺管仲鮑叔進曰殺之齊是戮齊也殺之魯是戮魯也敝邑寡君願生得之以徇于國為羣臣戮若不生得是君與寡君賊比也非敝邑之所請也使臣不能受命于是魯君乃不殺遂生束縳而柙以豫齊鮑叔受而哭之三舉施伯從而笑之謂大夫曰管仲必不死夫鮑叔之忍不僇賢人其智稱賢以自成也今囚管仲以豫齊鮑叔知無後事必將勤管仲以勞其君以顯其功衆必豫之有得力死之功猶尚可加也顯生之功將何如是昭德以二君也鮑叔之知不是失也至于堂阜之上鮑叔袚而浴之三桓公親迎之郊管仲詘纓插衽使人操斧而立其後公辭斧三然後退之公曰垂纓下衽寡人將見管仲再拜稽首曰應公之賜殺之黃泉死且不朽公遂與歸禮之于廟三酌而問為政之道焉管子小匡語多同國語吕覽賢能桓公欲相鮑叔鮑叔曰吾君欲霸王則管夷吾在彼臣弗若也公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾為其君射人者也君若得而臣之則彼亦將為君射人桓公不聽強相鮑叔固辭桓公于是乎使人告魯曰管夷吾寡人之讐也願得之而親加手焉魯君許諾乃使吏鞹其手膠其目盛之以鴟夷置之車中至境中桓公使人以朝車迎之袚以爟火爨以犧猳生與之如國命有司除廟筵几而薦之曰自孤之聞夷吾之言也目益明耳益聰孤弗敢專敢以告于先君因顧而命管仲曰夷吾佐豫管仲還走再拜稽首受令而出管子治齊國舉事有功桓公必先賞鮑叔曰使齊國得管子者鮑叔也齊桓公令羣臣曰寡人將立管仲為仲父善者入門而左不善者入門而右東郭牙中門而立公曰子何為中門而立也牙曰以管仲之智為能謀天下乎公曰能以斷為敢行大事乎公曰敢牙曰君知能謀天下斷敢行大事因專屬之國柄焉以管仲之能乘公之勢以治齊國得無危乎公曰善乃令隰朋治內管仲治外以相參韓子外儲左説苑善説桓公立仲父致大夫曰善吾者入門而右不善吾者入門而左有中門而立者桓公問焉對曰管子之知可與謀天下其強可與取天下君恃其信乎內政委焉外事斷焉驅民而歸之是亦可奪也桓公曰善乃謂管仲政則卒歸于子矣政之所不及唯子是匡管仲故築三歸之臺以自傷于民管仲夷吾者潁上人也既任政相齊以區區之齊在海濵通貨積財富國強兵與俗同好惡故其稱曰倉廩實而知禮節衣食足而知榮辱上服度則六親固四維不張國乃滅亡下令如流水之原令順民心故論卑而易行俗之所欲因而豫之俗之所否因而去之其為政也善因禍而為福轉敗而為功貴輕重慎權衡齊國遵其政常強于諸侯齊中衰管子修之設輕重九府則桓公因以霸而管氏亦有三歸位在陪臣富有列國之君史管子列傳節文桓公二年踐位召管仲管仲至公問曰社稷可定乎管仲對曰君霸王社稷定君不霸王社稷不定公曰吾不敢至此其大也定社稷而已管仲又請君曰不能管仲辭于君曰君免臣于死臣之幸也然臣之不死糾也為欲定社稷也社稷不定臣祿齊國之政而不死糾也臣不敢乃走出至門公召管仲管仲反公汗出曰勿已其勉霸乎管仲再拜稽首而起曰今日君成霸臣貪承命趨立于相位乃令五官行事異日公告管仲曰欲以諸侯之間無事也小修兵革管仲曰不可百姓病公先與百姓而藏其兵與其厚于兵不如厚于人齊國之社稷未定公未始于人而始于兵外不親于諸侯內不親于民公曰諾政未能有行也管子大匡二年伐滅郯郯子奔莒初桓公亡時過郯郯無禮故伐之鮑叔謂管仲曰異日者公許子霸今國彌亂子將何如管仲曰吾君惕其智多誨姑少胥其自及也鮑叔曰比其自及也國無闕亡乎管仲曰未也國中之政夷吾尚微為焉亂乎尚可以待外諸侯之佐既無有吾二人者未有敢犯我者明年朝之爭祿者相刺裚領而刎頸者不絶鮑叔謂管仲曰國死者衆矣毋乃害乎管仲曰安得已然此皆其貪民也夷吾之所患者諸侯之為義者莫肯入齊齊之為義者莫肯仕此夷吾之所患也若夫死者吾安用而愛之管子大匡桓公內修兵三年將伐魯曰魯于寡人近于是其救宋也疾寡人且誅焉管仲曰不可臣聞有土之君不勤于兵不忌于辱不輔其過則社稷安勤于兵忌于辱輔其過則社稷危公不聽興師伐魯造于長勺魯莊公興師逆之大敗之桓公二年事桓公曰吾兵猶尚少吾參圍之安能圉我四年修兵同甲十萬同甲謂完堅齊等車五千乘謂管仲曰吾士既練吾兵既多寡人欲服魯管仲喟然嘆曰齊國危矣君不競于德而競于兵天下之國帶甲十萬者不鮮矣吾欲發小兵以服大兵內失吾衆諸侯設備吾人設詐力不足則詐以繼之國欲無危得已乎公不聽果伐魯桓公五年魯不敢戰去國五十里而為之關魯請比于關內以從于齊齊亦毋復伐魯桓公許諾魯人請盟曰魯小國也固不帶劔今而帶劔是交兵聞于諸侯君不如已請去兵桓公曰諾乃令從者毋以兵管仲曰不可諸侯加忌于君君如是以退可君果弱魯君諸侯又加貪于君後有事小國彌堅大國設備非齊國之利也桓公不聽管仲又諫曰君必不去魯胡不用兵曹劌之為人也堅強以忌不可以約取也桓公不聽果與之遇莊公自懷劔曹劌亦懷劔踐壇莊公抽劔其懷曰魯之境去國五十里亦無不死而已左揕桓公右自承曰均之死也戮死于君前管仲走君曹劌抽劔當兩階之間曰二君將改圖無有進者管仲曰君與之地以汶為境桓公許諾以汶為境而歸桓公歸而修于政不修于兵革自圉辟人以過弭師既不修兵革故出入自圉以先者之過故弭息其師管子大匡五年伐魯魯將師敗魯莊公請獻遂邑以平桓公許與魯會柯而盟魯將盟曹洙以匕首劫桓公于壇上曰反魯之侵地桓公許之已而曹洙去匕首北靣就臣位桓公後悔欲無與魯地而殺曹洙管仲曰夫劫許之而倍信殺之愈一小快耳而棄信於諸侯失天下之援不可於是遂與曹洙三敗所亡地於魯諸侯聞之皆信齊而欲附焉管子大匡吕覽貴信齊桓公伐魯魯人不敢輕戰去魯國五十里而封之魯請比關內侯以聽桓公許之曹劌謂魯莊公曰君寧死而又死乎其寧生而又生乎莊公曰何謂也曹劌曰聽臣之言國必廣大身必安樂是生而又生也不聽臣之言國必危亡身必危辱是死而又死也莊公曰請從于是明日將盟莊公與曹劌皆懷劔至于壇上莊公左摶桓公右抽劔以自承曰魯國去境數百里今去境五十里亦無生矣鈞其死也戮于君前管仲鮑叔進曹劌按劔當兩階之間曰且二君將改圖毋或進者莊公曰封于汶則可不則請死管仲曰以地衛君非以君衛地君其許之乃遂封于汶南與之盟歸而欲勿豫管仲曰不可人特劫君而不盟君不知不可謂智臨難而不能勿聽不可謂勇許之而不豫不可謂信不智不勇不信有此三者不可以立功名豫之雖亡地亦得信以四百里之地見信于天下君猶得也晉人伐邢齊桓公將救之鮑叔曰太蚤邢不亡晉不敝晉不敝齊不重且夫持危之功不如存亡之德大君不如晚救之以敝晉齊實利待邢亡而復存之其名實美桓公乃弗救韓子説林齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥也公胡不雪之以政公曰善因發倉囷賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺冠乎韓子難二桓公問于管子曰寡人幼弱惛愚不通諸侯四鄰之義仲父不當盡語我昔者有道之君乎吾亦鑑焉管仲對曰夷吾之所能與所不能盡在君所矣君胡有辱令桓公又問曰仲父寡人幼弱惛愚不能通四鄰諸侯之義仲父不當盡告我昔者有道之君乎吾亦鑑焉管子對曰夷吾聞之于徐伯曰昔者有道之君敬其山川宗廟社稷及至先故之大臣收聚以忠而大富之固其武臣宣用其力聖人在前貞亷在側競稱于義上下皆飾形正明察四時不貸民亦不憂五榖蕃殖外內均和諸侯臣伏國家安寧不用兵革受其幣帛以懷其德昭受其令以為法式此亦可謂昔者有道之君也桓公曰善哉桓公曰仲父既已語我昔者有道之君矣不當盡語我昔者無道之君乎吾亦鑒焉管子對曰今若君之美好而宣通也既官職美道又何以聞惡為桓公曰是何言耶以繬緣繬吾何以知其美也以素緣素吾何以知其善也仲父己語我其善而不語我其惡吾豈知善之為善也管子對曰夷吾聞之徐伯曰昔者無道之君大其宫室髙其臺榭良臣不使讒賊是舍有家不治借人為圖政令不善墨墨若夜辟若野獸無所朝處不修天道不鑑四方有家不治辟若生狂衆所怨詛希不滅亡進其諛優繁其鐘鼓流于博塞戲其工瞽誅其良臣敖其婦女獠獵畢弋暴遇諸父馳騁無度戲樂笑語式政既輮刑罰則烈內削其民以為攻伐辟若漏釜豈能無竭此亦可謂昔者無道之君矣桓公曰善哉桓公曰仲父既已語我昔者有道之君與昔者無道之君矣仲父不當盡語我昔者有道之臣乎吾以鑑焉管子對曰夷吾聞之徐伯曰昔者有道之臣委質為臣不賓事左右君知則仕不知則已若有事必圖國家遍其發揮循其祖德辨其順逆推育賢人讒慝不作事君有義使下有禮貴賤相親若兄若弟忠于國家上下得體居處則思義語言則謀謨動作則事居國則冨處軍則克臨難據事雖死不悔近君為拂逺君為輔義以與交亷以與處臨官則治酒食則慈不謗其君不毁其辭君若有過進諫不疑君若有憂則臣服之此亦可謂昔者有道之臣矣桓公曰善哉桓公曰仲父既以語我昔者有道之臣矣不當盡語我昔者無道之臣乎吾亦鑑焉管子曰夷吾聞之于徐伯曰昔者無道之臣委質為臣賓事左右執説以進不蘄亡已遂進不退假寵鬻貴尊其貨賄卑其爵位進曰輔之退曰不可以敗其君皆曰非我不仁羣處以攻賢者見賢若貨見賤若過貪于貨賄競于酒食不與善人唯其所事倨敖不恭不友善士讒賊與鬭不彌人爭唯趣人詔湛湎于酒行義不從不修先故變易國常擅創為令迷惑其君生奪之政保貴寵矜遷損善士捕援貨人入則乘等出則黨駢貨財相入酒色相親俱亂為君君若有過各奉其身此亦可謂昔者無道之臣桓公曰善哉管子四稱桓公謂管子曰今子教寡人法天合德合德長久合德而兼覆之則萬物受命象地無親無親安固無親而兼載之則諸生皆植參于日月無私葆光無私而兼照之則美惡不隱然則君子之為身無好無惡然已乎管子對曰不然夫學者所以自化所以自撫故君子惡稱人之惡惡不忠而怨妬惡不公議而名當稱惡不位下而位上惡不親外而內放此五者君子之所恐行而小人之所以亡况人君乎管子版法解桓公在位管仲隰朋見立有間有二鴻飛而過之公嘆曰仲父今彼鴻鵠有時而南有時而北有時而往有時而來四方無逺所欲至而至焉非唯有羽翼之故是以能通其意于天下乎管仲隰朋不對公曰何故不對管子曰君有霸王之心而夷吾非霸王之臣也是以不能對公曰仲父胡為然寡人之有仲父也猶飛鴻之有羽翼也若濟大水之有舟楫也仲父不一言教寡人寡人有耳將安聞道而得度哉管子對曰君若將欲霸王舉大事乎則必從其本事矣公變躬遷席拱手而問曰敢問本管子對曰百姓公之本也人甚憂飢而稅斂重人甚懼死而刑政險人甚傷勞而上舉事不時公輕其稅斂則人不憂飢緩其刑政則人不懼死舉事以時則人不傷勞公曰仲父此三言者寡人聞命矣不敢擅也將薦之先君于是令百官有司削方墨筆明日皆朝于太廟朝定令于百吏使稅者百一鍾百石而取一鍾孤幼不刑澤梁時縱關飢而不征市書而不賦近者示之忠信逺者示以禮義行之數年而民歸之如流水管子霸形桓公曰吾欲勝民為之奈何管仲對曰此非人君之言也勝民為易夫勝民之為道非天下之大道也君欲勝民則使有司疏獄而謁有罪者償數省而嚴誅若此則民勝矣雖然勝民之為道非天下之大道也使民畏公而不見親禍亟及身雖能不久則人特莫之弒也危哉君之國岋乎管子小問管仲朝公曰寡人願聞國君之信對曰民愛之鄰國親之天下信之此國君之信公曰善請問信安始而可對曰始于為身中于為國成于為天下公曰請問為身對曰道血氣以求長年長心長德此為身也公曰請問為國對曰逺舉賢人慈愛百姓外存亡國繼絶世起諸孤薄稅斂輕刑罰此為國之大禮也法行而不苛刑亷而不赦有司寬而不凌菀濁困滯皆法度不亡往行不來而民遊世矣此為天下也管子小問齊桓公問于管仲曰王者何貴曰貴天桓公仰而視天管仲曰所謂天者非蒼蒼之天也王者以百姓為天百姓與之即安輔之即強非之即危倍之即亡詩曰民之無良相怨一方民皆居一方而怨其上不亡者未之有也韓詩卷四又説苑公問治民于管子管子對曰凡牧民者心知其疾而憂之以德勿懼以罪勿止以力慎此四者足以治民也公曰寡人睹其善也何為其寡也管仲對曰夫寡非有國者之患也昔者天子中正地方千里四言者該焉何為其寡也夫牧民不知其疾則民疾不憂以德則民多怨懼之以罪則民多詐止之以力則往者不反來者鷙距故聖王之牧民也不在其多也公曰善勿已如是又何以行之管仲對曰質信極忠嚴以有禮慎此四者所以行之也桓公曰請問其説管仲對曰信也者民信之忠也者民懷之嚴也者民畏之禮也者民美之語曰澤命不渝信也非其所欲勿施于人仁也堅中外正嚴也質信以讓禮也桓公曰善哉牧民何先管子對曰有時先事有時先政有時先德有時先恕飄雨暴雨不為人害涸旱不為民患百川道年穀熟糴貨賤禽獸與人聚食民食民不疾疫當此時也民富且驕牧民者厚收善藏以充倉廩焚藪澤此謂先之以事隨之以刑敬之以禮樂以振其淫此謂先之以政飄風暴雨為民患涸旱為民患年榖不熟歲飢糴貨貴民疾疫當此時也民貧且罷牧民者發倉廩山林藪澤以共其財後之以事先之以恕以振其罷此謂先之以德其收之也不奪民財其施之也不失有德富上而足下此聖王之至事也桓公曰善管子小問齊桓公得管仲隰朋辨其言説其義正月之朝令具太牢進之先祖桓公西靣而立管仲隰朋東靣而立桓公贊曰自吾得二子之言吾目加明耳加聰不敢獨擅願薦之先祖説苑君道稍又韓詩卷七略寧戚欲干齊桓公窮困無以自逹於是為商旅將任車以至齊暮宿于郭門之外桓公郊迎客夜開門辟任車爝火甚盛從者甚衆寧戚飯牛于車下望桓公而悲擊牛角而疾商歌桓公撫其僕之手曰異哉之歌者非常人也命後車載之桓公反至從者以請桓公賜之衣冠將見之寧戚見説桓公以治境內明日復見説桓公以治天下桓公大説將任之羣臣爭之曰客衛人也衛之去齊不逺不若使人問之而固賢者也用之未晚也桓公曰不然問之患其有小過以其小者棄其大者此人主所以失天下之士也乃舉火而授之以上卿新序卷五又吕氏舉難應淮南子道劉向别録載戚歌曰南山矸白石爛生不逢堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜漫漫何時旦滄浪之水白石粲中有鯉魚常尺半敝布單衣裁至骭清朝飯牛至夜半黃犢上坂且休息吾將舍汝相齊國出東門兮厲石斑上有松柏青且闌粗布衣兮緼縷時不遇兮堯舜主牛兮努力食細草大臣在爾側吾當與爾適楚國蜩笑外稿云此歌不類春秋時人語蓋後世所擬者高誘注吕氏春秋謂戚所歌乃詩碩鼠之辭雖未見所據亦可知南山白石之歌誘初未之見也然其辭亦激烈足以動人管子小問桓公使管仲求寧戚寧戚應之曰浩浩乎管仲不知中食而慮婢子曰公何慮管仲曰非婢子之所知也婢子曰公其母少少母賤賤昔者吳干戰未齓不得入軍門國子擲其齒遂入為于國多百里徯秦國之飯牛者也穆公舉而相之遂霸諸侯由是觀之賤豈可賤少豈可少哉管子曰然公使我求寧戚寧戚應我曰浩浩乎吾不識婢子曰詩有之浩浩者水育育者魚未有家室而安召我居寧子其欲室乎列女傳寧戚欲見桓公道無從乃為人僕將車宿齊東門之外桓公出寧戚擊牛角而商歌甚悲桓公異之使管仲迎之寧戚曰浩浩乎白水管仲不知所謂五日不朝有憂色妾婧進曰君不朝五日矣而有憂色敢問國家之事耶君之謀也仲曰非汝所知婧曰妾聞之母老老母賤賤母少少母弱弱仲曰何謂也婧曰昔者太公望年七十屠牛于朝歌市八十為天子師九十而封于齊由是觀之老可老耶伊尹有姺氏之媵臣也湯立以為三公天下治平由是觀之賤可賤耶睪子生五歲而贊禹由是觀之少可少耶駃騠生七日而超其母由是觀之弱可弱耶仲下席曰吾語子故昔公使我迎寧戚戚曰浩浩乎白水吾不知所謂故憂之婧笑曰人已語君矣古有白水之詩曰浩浩白水鯈鯈之魚君來召我我將安居國家未定從我焉如此寧戚之欲得仕國家也仲大悅以告桓公公乃修宫府齋戒五日見寧子因以為相初桓公郊迎管子而問焉管仲辭讓然後對以參國伍鄙立五鄉以崇化建五屬以厲武寄兵于政因罰備器械加兵無道諸侯以事周室桓公大説于是齋戒十日將相管仲管仲曰斧鉞之人幸以獲生以屬其腰領臣之祿也若知國政非臣之任也公曰子大夫受政寡人勝任子大夫不受政寡人恐崩管仲許諾再拜而受相三日公曰寡人有大邪三其猶尚可以為國乎對曰臣未得聞公曰寡人不幸而好田晦夜而至禽側日莫不見禽而後返諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人不幸而好酒日夜相繼諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人有汚行不幸而好色而姑姊有不嫁者新序云齊桓公好婦人之色妻姑姊妹而國人多淫于骨肉對曰惡則惡矣然非其急者也公作色曰此三者皆可則烏有不可者矣對曰人主唯優與不敏為不可優則亡衆不敏不及事公曰善吾子就舍異日請與吾子圖之對曰時可將與夷吾何待異日乎公曰奈何對曰公子舉為人博聞而知禮好學而辭遜請使遊于魯以結交焉公子開方為人巧轉而兊利請使遊于衛以結交焉曹孫宿之為人小亷而苛􅏸足恭而辭結正荆之則也請使往遊以結交焉遂立行三使者而後退相三月請論百官公曰諾管仲曰升降揖讓進退間習辨辭之剛柔臣不如隰朋請立為大司行墾草入邑辟土聚粟多衆盡地之利臣不如寧戚請立為大司田平原廣牧車不結轍士不旋踵鼓之而三軍之士視死如歸臣不如王子城父請立為大司馬決獄折中不殺不辜不誣無罪臣不如賓須無請立為大司理犯君顔色進諫必忠不辟死亡不撓富貴臣不如東郭牙請立以為大諫之官此五子者夷吾一不如然而以易夷吾夷吾不為也君若欲治國強兵則五子者存矣若欲霸王則夷吾在此公曰善管子小匡韓子外儲左桓公問置吏于管仲管仲曰辨察于辭清潔于貨習人情夷吾不如絃商請立以為大理登降肅讓以明禮待賔臣不如隰朋請立以為大行墾草創邑辟地生粟臣不如寧武請以為大田三軍既成陳使士視死如歸臣不如公子城父請以為大司馬犯顔極諫臣不如東郭牙請立以為諫臣治齊此五子足矣將欲霸王夷吾在此吕覽勿躬管子復于桓公曰墾田創邑辟土蓻粟盡地利之力臣不若寧遫即寧戚也請置以為大田登降辭讓進退間習臣不若隰朋請置以為大行蚤入晏出犯君顔色進諫必忠不辟死亡不重富貴臣不若東郭牙請置以為大諫臣平原廣城車不結軌士不旋踵鼓之而三軍之士視死如歸臣不若王子城父請置以為大司馬決獄折中不殺不辜不誣無罪臣不如弦章請置以為大理君若欲治國強兵則五子者足矣君欲霸王則夷吾在此桓公曰善令五子皆任其事以受令于管子又新序卷四管子曰見其可説之有證見其不可惡之有形賞罰信于所見雖所不見其敢為之乎見其可説之無證見其不可惡之無形賞罰不信于所見而求于所不見之外不可得也又曰言于室滿于室言于堂滿于堂是謂天下王謂明白洞達衆人所共見共聞韓子難三桓公謂管仲曰吾國甚小而財用甚少而羣臣衣服輿馬甚汰吾欲禁之可乎管仲曰臣聞之君嘗之臣食之君好之臣服之今君之食也必桂之漿衣練紫之衣狐白之裘此羣臣之所以奢汰也詩云不躬不親庶民不信君欲禁之胡不自親乎桓公曰善于是更制練帛之衣太白之冠朝一年而齊國儉也説苑反質齊桓公即位三年三言而天下稱賢羣臣皆説去肉食之獸去食粟之馬去絲罝之網是三言也子吕覽慎小又淮南又韓詩桓公曰四郊之民貧商賈之民富寡人欲殺商賈之民以益四郊之民為之奈何管子對曰請以令決瓁洛之水通之杭莊之間桓公曰諾行令未及一歲而四郊之民殷然益富商賈之民廓然益貧桓公召管子而問曰此其故何也管子對曰決瓁洛之水通之杭莊之間則屠酤之汁肥流水蚊虻巨雄翡燕小鳥皆歸之冝昏飲此水上之樂也賈人蓄物而賣為讐買為取市未央畢而委舍其守列投蚊蛇巨雄新冠五尺請挾彈懷丸遊水上彈翡燕小鳥被于暮故賤賣而貴買四郊之民賣賤何為不富哉商賈之人何為不貧乎桓公曰善桓公曰五衢之民衰然多衣弊而屨穿寡人欲使帛布絲纊之價賤為之有道乎管子曰請以令沐塗旁之樹枝使無尺寸之隂桓公曰諾行令未能一歲五衢之民皆多衣帛完屨桓公召管子而問曰此其何故也管子對曰塗旁之樹未沐之時五衢之民男女相好往來之市者罷市相賭樹下談語終日不歸男女當壯扶輦推輿相賭樹下戲笑超距終日不歸父兄相賭樹下論議玄語終日不歸是以田不發五穀不播桑麻不種繭縷不治內嚴一家而三不歸則帛布絲纊之價安得不貴桓公曰善管子輕重丁又管子輕重戊齊桓公問管子曰民飢而無食寒而無衣應聲之正無以給上空屋漏而不居墻垣壞而不築為之奈何管子對曰沐塗樹之枝也桓公曰諾令謂左右伯沐塗樹之枝左右伯受沐塗樹之枝濶其年民被白布清中而濁應聲之正有以給上室屋漏者得居墻垣壞者得築公召管子問曰此何故也管子對曰齊者夷萊之國也一樹而百乘息其下者以其不􅀈也衆鳥居其上丁壯者胡丸操彈居其下終日不歸父老拊枝而論終日不歸歸市亦惰倪終日不歸今吾沐塗樹之枝日中無尺寸之隂出入者長時行者疾走父老歸而治生丁壯者歸而薄業彼臣歸其三不歸此以鄉不資也齊桓公問于管仲曰國何患管仲對曰患社鼠公曰何謂也管仲對曰夫社束木而塗之鼠因往託焉燻之則恐燒其木灌之則恐敗其塗此鼠所以不可得殺者以社故也夫國亦有社鼠人主左右是也內則蔽善惡于君上外則賣權重于百姓不誅之則為亂誅之則為人主所察據腹而有之此亦國之社鼠也人有酤酒者為器甚潔清置表甚長而酒酸不售問之里人其故里人云公之狗猛人挈器而入且酤公酒狗迎而噬之酒所以酸而不售也夫國亦有猛狗用事者是也有道術之士欲千萬乘之主而用事者迎而齕之此亦國之猛狗也左右為社鼠用事者為猛狗則道術之士不得用矣此治國之所患也説苑政理對又晏子卷一作晏子景公語韓子外儲右桓公問管仲曰治國最奚患對曰最患社鼠公曰何患社鼠哉對曰君亦見夫為社者乎樹木而塗之鼠穿其間堀穴託其中燻之則恐焚本灌之則恐塗阤此社鼠之所以不得也今人主之左右出則為勢重而收利于民入則比周而蔽惡于君內間主之情以告外外內為重諸臣百吏以為富吏不誅則亂法誅之則君不安據而有之此亦國之社鼠也齊桓公謂管仲曰吾欲舉事于國昭然如日月無愚夫愚婦皆曰善可乎仲曰可然非聖人之道桓公曰何也對曰夫短綆不可汲深井知鮮不可以與聖人之言慧士可與辨物智士可與辨無方聖人可與辨神明夫聖人之所為非衆人之所及也民知十已則尚與之爭曰不如吾也百已則疵其過千已則誆而不信是故民不可稍而掌也可并而牧也不可暴而殺也可麾而致也衆不可户説也可舉而示也説苑政理桓公問于管仲曰吾欲使酒腐于爵肉腐于俎得無害于霸乎管仲對曰此極非其貴者耳然亦無害于霸也桓公曰何如而害霸管仲對曰不知賢害霸知而不用害霸用而不任害霸任而不信害霸信而復使小人參之害霸公曰善説苑尊賢管子曰權不兩大政不二門故曰脛大于股者難以步指大于臂者難以把本小末大不能相使也説苑桓公問管仲富有涯乎答曰水之以涯其無水者也富之以涯其富已足者也人不能自止于足而亡其富之涯乎韓子説林下桓公問管仲曰官少而索者衆寡人憂之管仲曰君無聽左右之請因能而受祿録功而與官則莫敢索官君何患焉韓子外儲左管仲會國用三分二在賔客其一在國管仲懼而復之公曰吾子猶如是乎四鄰賔客入者説出者譽光名滿天下入者不説出者不譽汚名滿天下壤可以為粟木可以為貨粟盡則有生貨散則有聚君人者名之為貴財安可有管仲曰此君之明也公曰民辦軍事矣則可乎對曰不可甲兵未足也請薄刑罰以厚甲兵于是死罪不殺刑罪不罰使以甲兵贖死罪以犀甲一戟刑罪以脅盾一戟過罪以金軍無所計而訟者成以束矢公曰甲兵既足矣吾欲誅大國之不道者可乎對曰愛四封之內而後可以惡境外之不善者安卿大夫之家而後可以救危敵之國賜小國地而後可以誅大國之不道者舉賢良而後可以廢慢法鄙賤之民是故先王必有置也而後必有廢也必有利也而後必有害也桓公曰昔三王者既弒其君今言仁義則必以三王為法度其故何也對曰昔者禹平治天下及桀而亂之湯放桀以定禹功也湯平治天下及紂而亂之武王伐紂以定湯功也且善之伐不善也自古及今未之有改君何疑焉公又問曰古之亡國其何失對曰計得地與寶而不計失諸侯計得財委而不計失百姓計見親而不計見棄三者之屬一足以削遍而有者亡矣古之隳國家隕社稷者非故且為之也必少有樂焉不知其陷于罪惡也管子中匡桓公踐位令釁社塞禱祝鳬已疵獻胙已疵祝者名祝曰除君苛疾與君之多虛而少實桓公不説瞋目而視祝鳬已疵祝鳬已疵授酒而祭之曰又與君之若賢桓公怒將誅之而未也以復管仲管仲以是知桓公之可以霸也管子小問齊桓公之時晉客至有司請禮桓公曰以告仲父有司又請公曰以告仲父若是者三而優笑曰易哉為君一曰仲父二曰仲父桓公曰吾聞君人者勞于索人佚于使人吾未得仲父則難得仲父之後曷為其不易也吕覽任數及韓子難二新序卷四合刪説苑齊桓公使管仲治國管仲對曰賤不能臨貴桓公以為上卿而國不治曰何故管仲對曰貧不能使富桓公賜之齊市租而國不治曰何故對曰疏不能制近桓公立以為仲父齊國大安而遂霸天下也孔子曰管仲之賢而不得此三權者亦不能使其君南靣而稱霸韓子外儲左管仲相齊曰臣貴矣然而臣貧桓公曰使子有三歸之家曰臣富矣然而臣卑桓公使立于高國之上高子國子齊世卿曰臣尊矣然而臣疏乃立為仲父桓公將東遊問于管仲曰我遊猶軸轉斛南至琅琊司馬曰亦先王之遊已何謂也管仲對曰先王之遊也春出原農事之不本者謂之遊秋出補人之不足者謂之夕夫師行而糧食其民者謂之亡從樂而不反者謂之荒先王有遊夕之業于人無荒亡之行于身桓公退再拜命曰寶法也管仲復于桓公曰無翼而飛者聲也無根而固者情也無方而富者生也公亦因情謹聲以言尊生此謂之榮桓公退再拜請若此言管仲復于桓公曰任之重者莫如身塗之畏者莫如口期而逺者莫如年以重任行畏塗至逺期唯君子乃能矣桓公退再拜之曰夫子數以此言教寡人管仲對曰滋味動靜生之養也好惡喜怒哀樂生之變也聰明當物生之德也是故聖人齊滋味而時動靜御正六氣之變禁止聲色之淫邪行亡乎體違言不存口靜然定生聖也仁從中出義從外作仁故不以天下為利義故不以天下為名仁故不代王義故七十而致政是故聖人上德而下功尊道而賤物道德當身故不以物惑是故身在草茅之中而無懾意南靣聽天下而無驕容如此而後可以為天下王所以謂德者不動而疾不相告而知不為而成不召而至是德也故天不動四時云下而萬物化君不動政令陳下而萬功成心不動使四肢耳目而萬物情寡交多親謂之知人寡事多功謂之知用聞一言以貫萬物謂之知道多言而不當不如其寡也博學而不自及必有邪孝弟者仁之祖也忠信者交之慶也內不考孝弟外不正忠信澤其四經而誦學者是亡其身者也桓公明日弋在廩管仲隰朋朝公望二子弛弓脫釬而迎之曰今夫鴻鵠春北而秋南而不失其時夫唯有羽翼以通其意于天下乎今孤之不得意于天下非皆二子之憂也公再言二子不對公曰孤既言矣二子何不對乎管仲對曰今夫人患勞而上使不時人患飢而上重斂焉人患死而上急刑焉如此而又近有色而逺有德雖鴻鵠之有翼濟大川之有舟楫也其將若君何桓公蹴然逡巡管仲曰昔先王之理人也人患勞而上使之以時則人不患勞也人患飢而上薄斂焉則人不患飢也人患死而上寬刑焉則人不患死矣如此而近有德而逺有色則四封之內視君其猶父母四方之外歸吾其猶流水乎公輟射援綏而乘自御管仲為左隰朋參乘朔月三日進二子于里官再拜頓首曰孤之聞二子之言也耳加聰而視加明于孤不敢獨聽之薦之先祖管仲隰朋再拜頓首曰如君之王也此非臣之言也君之教也于是管仲與桓公盟誓為令曰老弱勿刑參宥而後弊關譏而不征市正而不布山林梁澤以時禁發而不正也草封澤鹽者之歸之也譬若市人三年教人四年選賢以為長五年始興車踐乘遂南伐楚門傅絶城北伐山戎出冬蔥與戎菽布之天下果三匡天子而九合諸侯管子戒篇桓公問管子曰治而不亂明而不蔽若何管子對曰明分任職則治而不亂明而不蔽矣公曰請問冨國奈何管子對曰力地而動于時則國必冨矣公又問曰吾欲行廣仁大義以利天下奚為而可管子對曰誅暴禁非存亡繼絶而赦無罪則仁廣而義大矣吾聞之也誅暴禁非而赦無罪者必有戰勝之器攻取之數公曰請問戰勝之器上文疑管子之言管子對曰選天下之豪傑致天下之精材來天下之良工則有戰勝之器矣公曰攻取之數何如管子對曰毁其備散其積奪之食則無固城矣公曰然則取之若何管子對曰假而禮之厚而勿欺則天下之士至矣公曰致天下之精材若何管子對曰五而六之九而十之不可為數公曰來工若何管子對曰三倍不逺千里公曰吾已知戰勝之器攻取之數矣請問行軍襲邑舉措而知先後不失地利若何管子對曰用貨察圖公曰野戰必勝若何管子對曰以竒公曰吾欲遍知天下若何管子對曰小以吾不識則天下不足識也公曰守戰逺見有患夫民不必死則不可與出乎守戰之難不必信則不可恃而外知夫恃不死之民而求以守戰恃不信之人而求以外知此兵之三暗也公曰使民必死必信若何管子對曰明三本公曰何謂三本管子對曰三本者一曰固二曰尊三曰質公曰何謂也管子對曰故國父母墳墓之所在固也田宅爵祿尊也妻子質也三者備然後大其威厲其意則民必死而不我欺也管子小問五年宋伐把桓公謂管仲與鮑叔曰夫宋寡人固欲伐之無若諸侯何夫把明王之後也今宋伐之豫欲救之其可乎管仲對曰不可臣聞內政之不修外舉義不信君若外舉義以行先之則諸侯可令附桓公曰于此不救後無以伐宋管仲曰諸侯之君不貪于土貪于土必勤于兵勤于兵必病于民民病則多詐夫詐密而後動者勝詐則不信于民夫不信于民則亂內動則危于身是以古之人聞先王之道者不競于兵公曰然則奚若管仲對曰以臣則不而令人以重幣使之使之而不可君受而封之公問鮑叔曰奚若鮑叔曰君行夷吾之言公乃命曹孫宿使于宋宋不聽果伐把桓公築緣陵以封之豫車百乘甲一千明年狄人伐邢邢君出致于齊桓公築夷儀以封之豫車百乘卒千人明年狄人伐衛衛君出致于虛桓公且封之隰朋賔須無諫曰不可二國所以亡者絶以小今君蘄封亡國國盡若何公問管仲曰奚若管仲曰君有行之名安得有其實君其行也公又問鮑叔鮑叔曰君行夷吾之言桓公築楚丘以封之與車三百乘甲五千既以封衛明年桓公問管仲將何行管仲曰公內修政而勤民可以信于諸侯矣公許諾乃輕稅弛關市之征為賦祿之制既已管子又請曰問病臣願賞而無罰五年諸侯可令傅公曰諾既行之管仲又請曰諸侯之禮令齊以豹皮往小侯以鹿皮報齊以馬往小侯以犬報桓公許諾行之管仲又請賞于國以及諸侯君曰諾行之管仲賞于國中君賞于諸侯諸侯之君有行事善者以重幣賀之從列士以下有善者衣裳賀之凡諸侯之臣有諫其君而善者以璽問之以信其言公既行之又問管仲曰何行管子曰隰朋聰明捷給可令為東國賔須無堅強以良可以為西土衛國之教危傅以利相傅以利謂以利成俗公子開方之為人也慧以給不能久而樂始可遊于衛魯邑之教好通而訓于禮季友之為人也恭以精博于糧糧疑禮字之誤多小信可遊于魯楚國之教巧文以利不好立大義而好立小信小匡季友一曰季勞一曰公子舉蒙孫博于教而文巧于辭不好立大義而好結小信可遊于楚蒙孫小匡作曹孫宿一曰曹宿孫小侯既服大侯既附則可以施政矣君曰諾乃遊公子開方于衛遊季友于魯遊蒙孫于楚管子大匡按篇中築緣陵夷儀城楚丘與春秋年次皆不合蓋事後之論也姑附於此五年諸侯附狄人伐謂入伐齊桓公告諸侯曰請救伐諸侯許諾大侯車二百乘卒二千人小侯車百乘卒千人齊車千乘卒先致緣陵戰于後故後故地名敗狄其車卒與貨小侯受之車甲與貨皆與小侯大侯近者以其縣分之終不踐其國近齊之大侯則以齊縣分之終不踐其國北州侯莫來北州謂幽州營州莫來謂不來救齊桓公遇南州侯于召陵曰狄為無道犯天子令以伐小國小國齊自謂以天子之故敬天之命以救伐而北州侯莫至上不聽天子令下無禮諸侯寡人請誅于北州之侯許侯許諾桓公乃北伐令支下鳬之山斬孤竹遇山戎顧問管仲曰將何行管仲對曰君教諸侯為民聚食諸侯之兵不足者君助之發如此則始可以加政矣桓公乃告諸侯必足三年之食安以其餘修兵革兵革不足以引其事告齊齊助之發管子大匡公又問管仲曰何行管子對曰君會其君臣父子則可以加政矣會謂考合其宜公曰會之道奈何曰諸侯毋專立妾以為妻毋専殺大臣無國勞毋専豫祿士庶人毋専棄妻毋曲隄毋貯粟毋禁材行此卒歲則始可以罰矣君乃布之于諸侯諸侯許諾受而行之卒嵗吳人伐穀桓公告諸侯未遍諸侯之師竭至以待桓公桓公以車千乘會諸侯于竟都師未至吳人逃諸侯皆罷桓公歸問管仲曰將何行管仲曰可以加政矣曰從今以往二年適子不聞孝不聞愛其弟不聞敬老國良三者無一焉可誅也諸侯之臣及國事三年不聞善可罰也君有過大夫不諫士庶人有善而大夫不進可罰也士庶人聞之吏賢孝悌可賞也桓公受而行之近侯莫不請事兵車之會六乘車之會三享國四十有二年管子大匡公曰昔先君襄公髙臺廣池湛樂飲酒田獵畢弋不聽國政卑聖侮士唯女是崇九妃六嬪陳妾數千食必梁肉衣必文繡而戎士凍飢戎馬待遊車之弊戎士待陳妾之餘倡優侏儒在前而賢大夫在後是以國家不日益不月長吾恐宗廟之不掃除社稷之不血食敢問為之奈何管子對曰昔吾先王昭王穆王世法文武之逺迹以成其名合羣國比校民之有道者設象以為民紀式美以相應比綴以書原本窮末勸之以慶賞糾之以刑罰糞除其顛旄賜豫以鎮撫之以為民終始公曰為之奈何管子對曰昔者聖王之治其民也參其國而伍其鄙定民之居成民之事以為民紀謹用其六秉如是而民情可得而百姓可御桓公曰六秉者何也管子曰殺生貴賤貧富此六秉也桓公曰參國奈何管子對曰制國以為二十一鄉商工之鄉六士農之鄉十五公帥十一鄉高子帥五鄉國子帥五鄉參國故為三軍公立三官之臣市立三鄉工立三族澤立三虞山立三衡制五家為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有良人三鄉一師公曰五鄙奈何管子對曰制五家為軌軌有長六軌為邑邑有司十邑為率率有長十率為鄉鄉有良人三鄉為屬屬有帥五屬一大夫武政聽屬文政聽鄉各保而聽毋有淫佚者公曰定民之居成民之事奈何管子對曰士農工商四民者國之石民也不可使雜處雜處則其言哤其事亂是故聖王之處士必于間燕處農必就田野處工必就官府處商必就市井今夫士羣萃而州處間燕則父與父言義子與子言孝其事君者言敬長者言愛幼者言弟旦夕從事于此以教其子弟少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故士之士常為士今夫農羣萃而州處審其四時權節具備其械器用比耒耜穀芨及寒擊稿除田以待時乃耕深耕均種疾耰先雨藝耨以待時雨時雨既至挾其槍刈耨鎛以旦莫從事于田野稅衣就功别苗莠列疏遫首戴苧蒲身服襏襫沾體塗足暴其髮膚盡其四支之力以疾從事于田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故農之子常為農朴野而不匿其秀才之能為士者則足賴也故以耕則多粟以仕則多賢是以聖王敬畏戚農今夫工羣萃而州處相良材審其四時辦其功苦權節其用論比計制斷器尚完利相語以事相示以功相陳以巧相高以知事旦夕從事于此以教其子弟少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故工之子常為工今夫商羣萃而州處觀凶飢審國變察其四時而監其鄉之貨以知其市之價負任擔荷服牛輅馬以周四方料多寡計貴賤以其所有易其所無買賤鬻貴是以羽毛不求而至竹箭有餘于國竒怪時來珍異物聚旦夕從事于此以教其子弟相語以利相示以時相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子常為商相地而衰其政則民不移矣正旅舊旅舊視故舊如旅也則民不惰山澤各以其時至則民不茍陵陸丘井田疇均則民不惑無奪民時則百姓冨犧牲不勞則牛馬育桓公又問曰寡人欲修政以干時于天下其可乎管子對曰可公曰安始而可管子對曰始于愛民公曰愛民之道奈何管子對曰公修公族家修家族使相連以事相及以祿則民相親矣放舊罪收舊宗立無後則民殖矣省刑罰薄賦斂則民富矣鄉建賢士使教于國則民有禮矣出令不改則民正矣此愛民之道也公曰民富而以親則可以使之乎管子對曰舉財長工以止民用陳力尚賢以勸民知加刑無苛以濟百姓行之無私則足以容衆矣出言必信則令不窮矣此使民之道也公曰民居定矣事已成矣吾欲從事于天下諸侯其可乎管子對曰未可民心未吾安公曰安之奈何管子對曰修舊法擇其善者舉而嚴用之慈于民豫無財寬政役敬百姓則國富而民安矣公曰民安矣其可乎管子對曰未可君若欲正卒伍修甲兵則大國亦將正卒伍修甲兵君有征戰之事則小國諸侯之臣有守圉之備矣然則難以速得意于天下公欲速得意于天下諸侯則事有所隱而政有所寓公曰為之奈何管子對曰作內政而寄軍令焉為髙子之里為國子之里為公里三分齊國以為三軍擇其賢民使為里君鄉有行伍卒長則其制令且以田獵因以賞罪則百姓通于軍事矣桓公曰善於是管仲乃制五家以為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌則五人為伍軌長率之十軌為里故五十人為小戎里有司率之四里為連故二百人為卒連長率之十連為鄉故二千人為旅鄉良人率之五鄉一師故萬人一軍五鄉之師率之三軍故有中軍之鼓有髙子之鼓有國子之鼓春以田曰搜振旅秋以田曰獮治兵是故卒伍政定于里軍旅政定于郊內教既成令不得遷徙故卒伍之人人與人相保家與家相愛小相居長相遊祭祀相福死喪相恤禍福相憂居處相樂行作相和哭泣相哀是故夜戰其聲相聞足以無亂晝戰其目相見足以相識歡欣足以相死是故以守則固以戰則勝君有此教士三萬人以橫行于天下誅無道以定周室天下大國之君莫之敢圉也管子小匡多本國語桓公踐位十九年弛關市之征五十而取一賦祿以粟案田而稅二歲而稅一上年什取三中年什取二下年什取一歲飢不稅歲飢弛而稅桓公使鮑叔識君臣之有善者晏子識不仕與耕者之有善者高子識工賈之有善者國子為李隰朋為東國賔須無為西土弗鄭為宅凡仕者近宫不仕與耕者近門外門工賈近市三十里置遽委焉有司職之從諸侯欲通吏從行者令一人為負以車若宿者令人飬其馬食其委客與有司别契至國八契費義數而不當有罪凡庶人欲通鄉吏不通七日囚士欲通吏不通五日囚貴人子欲通吏不通三日囚凡縣吏進諸侯士而有善觀其能之大小以為之賞有過無罪令鮑叔進大夫勸國家得之成而不悔為上舉從政治為次野為原人多不發起訟不驕次之勸國家得之成而悔從政雖治而不能野原又多發起訟驕行此三者為下令晏子進貴人之子出不仕處不華而友有少長為上舉得二為次得一為下士處靖敬老與貴交不失禮行此三者為上舉得二為次得一為下耕者農農用力應于父兄事賢多行此三者為上舉得二為次得一為下令髙子進工賈應于父兄事長飬老承事敬行此三者為上舉得二者為次得一者為下令國子以情斷獄三大夫既已選舉使縣行之管仲進而舉言上而見之于君以卒年君舉管仲告鮑叔曰勸國家不得成而悔從政不治不能野原又多而發訟驕凡三者有罪無赦告晏子曰貴人子處華好飲食不交行此三者有罪無赦士出入無常不敬老而營冨行此三者有罪無赦耕者出入不應于父兄用力不農不事賢行此三者有罪無赦告國子曰工賈出入不應父兄承事不敬而違老治危行此三者有罪無赦凡于父兄無過于州里莫稱吏進之君用之有善無賞有過無罰吏不進亷意于父兄無過于州里莫稱吏進之君用之善為上賞不善吏有罰君謂國子凡貴賤之義入與父俱出與師俱上與君俱凡三者遇賊不死不知賊則無赦斷獄情與義易義與祿易易祿可無斂有可無赦管子大匡詩傳入齊風齊桓公相管仲以匡天下齊人美之賦風雨詩説略同詩序入鄭風思君子也管子管子曰夫士懷耿介之心不蔭惡木之枝况與惡人同處此假今本無春秋戰國異辭卷十五
