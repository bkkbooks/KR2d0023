body:
  text: 春秋戰國異辭卷五十右春坊右諭徳陳厚耀撰趙烈侯烈侯元年魏文侯伐中山使太子擊守之六年魏韓趙皆相立為諸侯追尊獻子為獻侯史趙世家烈侯好音謂相國公仲連曰寡人有愛可以貴之乎公仲曰富之可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝公仲曰諾不與居一月烈侯從代來問歌者田公仲曰求未有可者有頃烈侯復問公仲終不與乃稱疾不朝番吾君自代來謂公仲曰君實好善而未知所持今公仲相趙於今四年亦有進士乎公仲曰未也番吾君曰牛畜荀欣徐越皆可公仲乃進三人及朝烈侯復問歌者田何如公仲曰方使擇其善者牛畜侍烈侯以仁義約以王道烈侯逌然明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功徳所與無不充君恱烈侯使使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為内使賜相國衣二襲史趙世家九年烈侯卒弟武公立史趙世家公當作侯武公武公十三年卒趙復立烈侯太子章是為敬侯史趙世家魏文侯卒敬侯敬侯元年武公子朝作亂不克出奔魏趙始都邯鄲二年敗齊於靈丘三年救魏於廩丘大敗齊人四年魏敗我兔臺築剛平以侵衛五年齊魏為衛攻趙取我剛平六年借兵於楚伐魏取棘蒲八年拔魏黃城九年伐齊齊伐燕趙救燕十年與中山戰於房子十一年魏韓趙共滅晉分其地伐中山又戰於中人十二年敬侯卒子成侯種立以上史趙世家成侯成侯元年公子勝與成侯争立為亂二年六月雨雪三年太戊午為相伐衛取鄉邑七十三衛敗我藺四年與秦戰髙安敗之五年伐齊於鄄魏敗我懷攻鄭敗之以與韓韓與我長子六年中山築長城伐魏敗涿澤圍魏惠王七年侵齊至長城與韓攻周八年與韓分周以為兩九年與齊戰阿下十年攻衛取鄄十一年秦攻魏趙救之石阿十二年秦攻魏少梁趙救之十三年魏敗我澮取皮牢成侯與韓昭侯遇上黨昭侯此時未立當作懿十四年與韓攻秦十五年助魏攻齊十六年與韓魏分晉封晉君以端氏十七年成侯與魏惠王遇葛孽十九年與齊宋會平陸與燕會阿二十年魏獻榮椽因以為檀臺二十一年魏圍我邯鄲二十二年魏惠王拔我邯鄲齊亦敗魏於桂陵二十四年魏歸我邯鄲與魏盟漳水上秦攻我藺以上史趙世家韓子外儲左梁車新為鄴令其姊徃看之暮而後門閉因踰郭而入車遂刖其足成侯以為不慈奪之璽而免其令二十五年成侯卒公子緤與太子肅侯争立緤敗亡奔韓史趙世家肅侯名語肅侯元年奪晉君端氏徙處屯留二年與魏惠王遇於隂晉三年公子范襲邯鄲不勝而死四年朝天子六年攻齊拔髙唐七年公子刻攻魏首垣十一年秦孝公使商君伐魏虜其將公子卭趙伐魏十二年秦孝公卒商君死十五年起壽陵十六年肅侯游大陵出於鹿門大戊午扣馬曰耕事方急一日不作百日不食肅侯下車謝十七年圍魏黃不克築長城十八年齊魏伐我我決河水灌之兵去以上史趙世家蘇秦者東周雒陽人也字季子葢蘇忿生之後兄弟五人秦最少兄代代弟厲及辟鵠並為遊說之士或云代厲皆秦之弟東事師於齊而習之於鬼谷先生出游數歲大困而歸兄弟嫂妹妻妾竊皆笑之曰周人之俗治産業力工商逐什二以為務今子釋本而事口舌困不亦宜乎蘇秦聞之而慙自傷乃閉室不出出其書徧觀之曰夫士業已屈首受書而不能以取尊榮雖多亦奚以為於是得周書隂符伏而讀之期年以出揣摩曰此可以說當世之君矣國䇿揣摩在說秦後求說周顯王顯王左右素習知蘇秦皆少之弗信乃西至秦孝公卒說惠王曰秦四塞之國被山帶渭東有關河西有漢中南有巴蜀北有代馬此天府也以秦士民之衆兵法之敎可以吞天下稱帝而治秦王曰毛羽未成不可以髙蜚文理未明不可以兼并方誅商鞅疾辯士弗用乃東之趙典畧蘇秦如趙逢其鄰子於易水之上從貸一匹布約償千金而鄰子不與趙肅侯令其弟成為相號奉陽君奉陽君弗說之去游燕歲餘而後得見說燕文侯二十八年曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有滹沱易水地方二千餘里帶甲數十萬車六百乗騎六千匹粟支數年南有碣石鴈門之饒北有棗栗之利民雖不佃作而足於棗栗矣此所謂天府者也夫安樂無事不見覆軍殺將無過燕者大王知其所以然乎夫燕之所以不犯㓂被甲兵者以趙之為蔽其南也秦趙五戰秦再勝而趙三勝秦趙相斃而王以全燕制其後此燕之所以不犯㓂也且夫秦之攻燕也踰雲中九原過代上谷彌地數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之軍軍於東垣矣渡滹沱涉易水不至四五日而距國都矣故曰秦之攻燕也戰于千里之外趙之攻燕也戰于百里之内夫不憂百里之患而重千里之外計無過于此者是故願大王與趙從親天下為一則燕國必無患矣文侯曰子言則可然吾國小西迫強趙南近齊齊趙強國也子必欲合從以安燕寡人請以國從於是資蘇秦車馬金帛以至趙而奉陽君已死即因說趙肅侯曰肅侯十七年天下卿相人臣及布衣之士皆髙賢君之行義皆願奉敎陳忠於前之日乆矣雖然奉陽君妬君而不任事是以賓客游士莫敢自盡於前者今奉陽君捐館舍君乃今復與士民相親也臣故敢進其愚慮竊為君計者莫若安民無事且無庸有事于民也安民之本在于擇交擇交而得則民安擇交而不得則民終身不安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭斷絶人之交也願君慎勿出于口請别白黑所以異隂陽而已矣君誠能聽臣燕必致旃裘狗馬之地齊必致魚鹽之海楚必致橘柚之園韓魏中山皆可使致湯沐之奉而貴戚父兄皆可以受封侯夫割地包利五伯之所以覆軍禽將而求也封侯貴戚湯武之所以放弑而争也今君髙拱而兩有之此臣之所以為君願也今大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外韓弱則效宜陽即韓城在洛州西宜陽效則上郡絶河外割則道不通楚弱則無援此三策者不可不孰計也夫秦下軹道則南陽危刼韓包周則趙氏自操兵據衛取淇卷則齊必入朝秦秦欲已得乎山東則必舉兵而向趙矣秦甲渡河踰漳據番吾常山有蒲吾縣則兵必戰于邯鄲之下矣此臣之所為君患也當今之時山東之建國莫强于趙趙地方二千餘里帶甲數十萬車千乗騎萬匹粟支數年西有常山南有河漳東有清河北有燕國燕固弱國不足畏也秦之所害于天下者莫如趙然而秦不敢舉兵伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也無有名山大川之限稍蠶食之傅國都而止傅音附韓魏不能支秦必入臣于秦秦無韓魏之規則禍必中于趙矣此臣之所為君患也臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乗卒不過三萬立為天子誠得其道也是故明主外料其敵之强弱内度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形於胷中矣豈揜於衆人之言而以冥冥決事哉臣竊以天下之地圗案之諸侯之地五倍于秦料度諸侯之卒十倍于秦六國為一幷力西鄉而攻秦秦必破矣今西面而事之見臣於秦夫破人之與見破於人也臣人之與見臣於人也豈可同日而論哉夫衡人者皆欲割諸侯之地以予秦秦成則髙臺榭美宫室聽竽瑟之音前有樓闕軒轅後有長姣美人國被秦患而不與其憂是故夫衡人日夜務以秦權恐愒諸侯以求割地故願大王孰計之也臣聞明主絶疑去讒屛流言之迹塞朋黨之門故尊主廣地强兵之計臣得陳忠於前矣故竊為大王計莫如一韓魏齊楚燕趙以從親以畔秦令天下之將相會於洹水之上通質刳白馬而盟要約曰秦攻楚齊魏各出銳師以佐之韓絶其糧道趙涉河漳燕守常山之北秦攻韓魏則楚絶其後齊出銳師而佐之趙涉河漳燕守雲中秦攻齊則楚絶其後韓守成臯魏塞其道趙涉河博關東郡有博平縣燕出銳師以佐之秦攻燕則趙守常山楚軍武關齊涉渤海韓魏皆出銳師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊涉清河燕出銳師以佐之諸侯有不如約者以五國之兵共伐之六國從親以賓秦則秦甲必不敢出函谷以害山東矣趙王曰寡人年少立國日淺未甞得聞社稷之長計也今上客有意存天下安諸侯寡人敬以國從乃飾車百乗黃金千鎰白璧百雙錦繡千純以約諸侯是時天子致文武之胙於秦惠王惠王使犀首攻魏禽將龍賈取魏之雕隂或載此事于蘇秦合從之後且欲東兵蘇秦恐秦兵之至趙也乃激怒張儀入之秦激怒張儀事史詳張儀傳於是說韓宣惠王曰韓北有鞏洛成臯之固西有宜陽商阪之塞東有宛穰洧水南有陘山地方九百餘里帶甲數十萬天下之强弓勁弩皆從韓出谿子南方谿子蠻夷柘弩皆善材少府時力距來時力距來二弩名少府之所造者皆射六百步之外韓卒超足而射百發不暇止逺者括蔽洞胷近者鏑弇心韓卒之劒㦸皆出於冥山棠谿墨陽合賻皆出劒地鄧師宛馮鄧國有工鑄劒因名鄧師宛人於馮池鑄劒故號宛馮龍淵太阿楚風胡子所鑄二劒皆陸斷牛馬水截鵠鴈當敵則斬堅甲鐵幕幕臂脛之衣革抉吠芮決射韝也以革為之吠謂楯也芮謂繫楯之紛綬無不畢具以韓卒之勇被堅甲蹠勁弩帶利劒一人當百不足言也夫以韓之勁與大王之賢乃西面事秦交臂而服羞社稷而為天下笑無大於此者矣是故願大王孰計之大王事秦秦必求宜陽成臯今兹效之明年又復求割地與則無地以給之不與則棄前功而受後禍且大王之地有盡而秦之求無已以有盡之地而逆無已之求此所謂市怨結禍者也不戰而地已削矣臣聞鄙諺曰寧為雞口無為牛後今西面交臂而臣事秦何異於牛後乎夫以大王之賢挾强韓之兵而有牛後之名臣竊為大王羞之於是韓王勃然作色攘臂瞋目按劒仰天太息曰寡人雖不肖必不能事秦今主君詔以趙王之敎敬奉社稷以從主君指蘇秦又說魏襄王曰大王之地南有鴻溝陳汝南許郾昆陽召陵舞陽新都新郪東有淮潁煮棗無胥西有長城之界北有河外卷衍酸棗地方千里地名雖小然而田舍廬廡之數曽無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆臣竊量大王之國不下楚然衡人怵王交虎狼之秦以侵天下卒有秦患不顧其禍夫挾强秦之勢以内刼其主罪無過此者魏天下之强國也王天下之賢王也今乃有意西面而事秦稱東藩築帝宫備巡狩也受冠帶祠春秋受其冠帶之制奉其春秋之祭臣竊為大王耻之臣聞越王句踐戰敝卒三千人禽夫差於干遂江干之道曰干遂在蘇州吳縣西北四十餘里武王卒三千人革車三百乗制紂於牧野豈其士卒衆哉誠能奮其威也今竊聞大王之卒武士二十萬蒼頭二十萬奮擊二十萬厮徒十萬車六百乗騎五千匹此其過越王句踐武王逺矣今乃聽於羣臣之說而欲臣事秦夫事秦必割地以効實故兵未用而國已虧矣凡羣臣之言事秦者皆姦人非忠臣也夫為人臣割其主之地以求外交偷取一時之功而不顧其後破公家而成私門外挾强秦之勢以内刼其主以求割地願大王孰察之周書曰緜緜不絶蔓蔓奈何毫釐不伐將用斧柯前慮不定後有大患將奈之何大王誠能聽臣六國從親專心并力壹意則必無强秦之患故敝邑趙王使臣效愚計奉明約在大王之詔詔之魏王曰寡人不肖未甞得聞明敎今主君以趙王之詔詔之敬以國從因東說齊宣王曰齊南有泰山東有琅邪西有清河即貝州北有勃海此所謂四塞之國也齊地方二千餘里帶甲數十萬粟如丘山三軍之良五家之兵管子軍令始於五家為軌進如鋒矢戰如雷霆解如風雨即有軍役未甞倍泰山絶清河涉勃海也勃海滄州也臨菑之中七萬户臣竊度之不下户三男子三七二十一萬不待發於逺縣而臨菑之卒固已二十一萬矣臨菑甚富而實其民無不吹竽鼓瑟彈琴擊筑鬬雞走狗六博蹋鞠者蹋鞠所以練武士知有材也因嬉戱而練兵勢臨菑之塗車轂擊人肩摩連袵成帷舉袂成幕揮汗成雨家殷人足志髙氣揚夫以大王之賢與齊之强天下莫能當今乃西面而事秦臣竊為大王羞之且夫韓魏之所以重畏秦者為與秦接境壤界也兵出而相當不出十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡随其後是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衛陽晉之道徑乎亢父之險車不得方軌騎不得比行百人守險千人不能過也秦雖欲深入則狼顧恐韓魏之議其後也是故恫疑虚喝驕矜而不敢進則秦之不能害齊亦明矣夫不深料秦之無奈齊何而欲西面而事之是羣臣之計過也今無臣事秦之名而有强國之實臣是故願大王少留意計之齊王曰寡人不敏僻逺守海窮道東境之國也未甞得聞餘敎今足下以趙王詔詔之敬以國從乃西面說楚威王曰楚天下之強國也王天下之賢王也西有黔中巫郡東有夏州海陽夏水口在荆州江陵縣東南二十五里海陽當是海陵南有洞庭蒼梧北有陘塞郇陽陘山在鄭州郇陽當是新陽汝南有新陽縣地方五千餘里帶甲百萬車千乗騎萬匹粟支十年此霸王之資也夫以楚之強與王之賢天下莫能當也今乃欲西面而事秦則諸侯莫不西面而朝于章臺之下矣秦之所害莫如楚楚强則秦弱秦强則楚弱其勢不兩立故為大王計莫如從親以孤秦大王不從秦必起兩軍一軍出武關一軍下黔中則鄢郢動矣臣聞治之其未亂也為之其未有也患至而後憂之則無及已故願為大王蚤孰計之大王誠能聽臣臣請令山東之國奉四時之獻以承大王之明詔委社稷奉宗廟練士厲兵在大王之所用之大王誠能聽用臣之愚計則韓魏齊燕趙衛之妙音美人必充後宫燕代橐駝良馬必實外廏故從合則楚王衡成則秦帝今釋霸王之業而有事人之名臣竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讎也衡人皆欲割諸侯之地以事秦此所謂養仇而奉讎者也夫為人臣割其主之地以外交强虎狼之秦以侵天下卒有秦患不顧其禍夫外挾強秦之威以内刼其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚衡合則楚割地以事秦此兩策者相去逺矣二者大王何居焉故敝邑趙王使臣效愚計奉明約在大王詔之楚王曰寡人之國西與秦接境秦有舉巴蜀并漢中之心秦虎狼之國不可親也而韓魏迫於秦患不可與深謀與深謀恐反人以入于秦故謀未發而國已危矣寡人自料以楚當秦不見勝也内與羣臣謀不足恃也寡人卧不安席食不甘味心搖搖然如縣旌而無所終薄今主君欲一天下收諸侯存危國寡人謹奉社稷以從於是六國從合而并力焉蘇秦為從約長并相六國北報趙王乃行過雒陽國策過雒陽在說趙王之後車騎輜重諸侯各發使送之甚衆擬於王者周顯王聞之恐懼除道使人郊勞蘇秦之昆弟妻嫂側目不敢仰視俯伏侍取食蘇秦笑謂其嫂曰何前倨而後恭也嫂委蛇蒲服以面掩地而謝曰見季子位髙金多也蘇秦喟然歎曰此一人之身富貴則親戚畏懼之貧賤則輕易之况衆人乎且使我有雒陽負郭田二頃吾豈能佩六國相印乎於是散千金以賜宗族朋友初蘇秦之燕貸百錢為資及得富貴以百金償之徧報諸所嘗見徳者其從者有一人獨未得報乃前自言蘇秦曰我非忘子子之與我至燕再三欲去我易水之上方是時我困故望子深是以後子子今亦得矣蘇秦旣約六國從親歸趙趙肅侯封為武安君乃投從約於秦秦兵不敢闚函谷關十五年史云不窺函谷十五年誇大之辭也秦本紀云惠文王七年公子卬與魏戰虜其將龍賈僅次年事耳史蘇秦傳小文與國策異張儀者魏人也始嘗與蘇秦俱事鬼谷先生學術蘇秦自以不及張儀蘇秦已說趙王而得相約從親然恐秦之攻諸侯敗約後負念莫可使用於秦者乃使人微感張儀曰子始與蘇秦善今秦已當路子何不往游以求通子之願張儀於是之趙上謁求見蘇秦蘇秦乃誡門下人不為通又使不得去者數日已而見之坐之堂下賜僕妾之食因而數讓之曰以子之材能乃自令困辱至此吾寧不能言而富貴子子不足收也謝去之張儀之來也自以為故人求益反見辱怒念諸侯莫可事獨秦能苦趙乃遂入秦蘇秦已而告其舍人曰張儀天下賢士吾殆弗如也今吾幸先用而能用秦柄者獨張儀可耳然貧無因以進吾恐其樂小利而不遂故召辱之以激其意子為我隂奉之乃言趙王發金幣車馬使人微隨張儀與同宿舍稍稍近就之奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舍人乃辭去張儀曰賴子得顯方且報徳何故去也舍人曰臣非知君知君乃蘇君蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感怒君使臣隂奉給君資盡蘇君之計謀今君已用請歸報張儀曰嗟乎此吾在術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言且蘇君在儀寧渠能乎史張儀傳史蘇秦傳其後秦使犀首欺齊魏與共伐趙欲敗從約齊魏伐趙趙王讓蘇秦蘇秦恐請使燕必報齊蘇秦去趙而從約皆解自初說燕至此三年二十二年張儀相秦趙疵與秦戰秦殺疵河西取我藺離石二十三年韓舉與齊魏戰死于桑丘韓舉趙將徐廣以為韓將非也二十四年肅侯卒秦楚燕齊魏出銳師各萬人來會葬子武靈王立名雍世以上史趙家武靈王武靈王元年陽文君趙豹相梁襄王與太子嗣韓宣王與太子倉來朝信宫武靈王少未能聽政置博聞師三人左右司過三人及聽政先問先王貴臣肥義加其秩國三老年八十月致其禮三年城鄗四年與韓會於區鼠五年娶韓女為夫人八年五國稱王趙獨否曰無其實敢處其名乎令國人謂己曰君九年與韓魏共擊秦秦敗我斬首八萬級齊敗我觀澤十年秦取我西都及中陽齊破燕十一年王召公子職於韓立以為燕王使樂池送之十三年秦拔我藺虜將軍趙莊楚魏王來過邯鄲十四年趙何攻魏十六年王遊大陵今太原府文水縣有大陵城他日王夢見處女鼔琴而歌詩曰美人熒熒兮顔若苕之榮命乎命乎曽無我嬴異日王飲酒樂數言所夢想見其狀吳廣聞之因夫人而内其女娃嬴孟姚也孟姚甚有寵於王是為惠后十七年王出九門趙邑在常山為野臺以望齊中山之境十八年秦武王與孟說舉龍文赤鼎絶臏而死趙王使代相趙固迎公子稷於燕送歸立為秦王是為昭王十九年春正月大朝信宫召肥義與議天下五日而畢王北略中山之地至於房子遂之代北至無窮西至河登黃華之上召樓緩謀曰我先王因世之變以長南藩之地屬阻障滏之險立長城又取藺郭狼敗林人於荏而功未遂今中山在我腹心北有燕東有胡西有林胡樓煩秦韓之邊而無强兵之救是亡社稷奈何夫有髙世之名必有遺俗之累吾欲胡服樓緩曰善羣臣皆不欲於是肥義侍王曰簡襄王之烈計胡翟之利為人臣者寵有孝悌長幼順明之節寵國策作窮通有補民益主之業此兩者臣之分也今吾欲繼襄王之跡開於胡翟之鄉而卒世不見也為敵弱用力少而功多可以毋盡百姓之勞而序徃古之勲夫有髙世之功者負遺俗之累有獨智之慮者任驁民之怨今吾將胡服騎射以教百姓而世必議寡人奈何肥義曰臣聞疑事無功疑行無名王旣定負遺俗之慮殆無顧天下之議矣夫論至徳者不和於俗成大功者不謀於衆昔者舜舞有苗禹袒裸國非以養欲而樂志也務以論徳而約功也愚者闇成事智者睹未形則王何疑焉王曰吾不疑胡服也吾恐天下笑我也狂夫之樂智者哀焉愚者所笑賢者察焉世有順我者胡服之功未可知也雖驅世以笑我胡地中山吾必有之於是遂胡服矣使王緤告公子成曰寡人胡服將以朝也亦欲叔服之家聽於親而國聽於君古今之公行也子不反親臣不逆君兄弟之通義也今寡人作敎易服而叔不服吾恐天下議之也制國有常利民為本從政有經令行為上明徳先論於賤而行政先信於貴今胡服之意非以養欲而樂志也事有所止而功有所出事成功立然後善也今寡人恐叔之逆從政之經以輔叔之議且寡人聞之事利國者行無邪因貴戚者名不累故願慕公叔之義以成胡服之功使緤謁之叔請服焉公子成再拜稽首曰臣願聞王之胡服也臣不佞寢疾未能趨走以滋進也王命之臣敢對因竭其愚忠曰臣聞中國者葢聰明徇智之所居也萬物財用之所聚也賢聖之所敎也仁義之所施也詩書禮樂之所用也異敏技能之所試也逺方之所觀赴也蠻夷之所義行也今王舍此而襲逺方之服變古之敎易古之道逆人之心而怫學者離中國故臣願王圗之也使者以報王曰吾固聞叔之疾我將自往請之王遂往之公子成家因自請之曰夫服者所以便用也禮者所以便事也聖人觀鄉而順宜因事而制禮所以利其民而厚其國也夫剪髪文身錯臂左衽甌越之民也黒齒雕題却冠秫絀絀縫紩之别名秫絀葢言其女工之粗拙也大呉之國也故禮服莫同其便一也鄉異而用變事異而禮易是以聖人果可以利其國不一其用果可以便其事不同其禮儒者一師而俗異中國同禮而敎離况於山谷之便乎故去就之變智者不能一逺近之服聖賢不能同窮鄉多異曲學多辯不知而不疑異於己而不非者公焉而衆求盡善也今叔之所言者俗也吾所言者所以制俗也吾國東有河薄洛之水與齊中山同之無舟楫之用自常山以至代上黨東有燕東胡之境而西有樓煩秦韓之邊今無騎射之備故寡人無舟楫之用夾水居之民將何以守河薄洛之水變服騎射以備燕三胡秦韓之邊林胡樓煩東胡是三胡也且昔者簡主不塞晉陽以及上黨而襄主并戎取代以攘諸胡此愚智所明也先時中山負齊之强兵侵暴吾地係累吾民引水圍鄗微社稷之神靈則鄗㡬於不守也先王醜之而怨未能報也今騎射之備近可以便上黨之形而逺可以報中山之怨而叔順中國之俗以逆簡襄之意惡變服之名以忘鄗事之醜非寡人之所望也公子成再拜稽首曰臣愚不達於王之義敢道世俗之聞臣之罪也今王將繼簡襄之意以順先王之志臣敢不聽命乎再拜稽首乃賜胡服明日服而朝於是始出胡服令也文與國策小異以上史趙世家淮南子趙武靈王貝帶鵕翿而朝趙國化之釋名鞞本胡服也趙武靈王服之趙文趙造周祒趙俊皆諫止王毋胡服如故法便文造問答語詳國策史文略之王曰先王不同俗何古之法帝王不相襲何禮之循虙戲神農敎而不誅黃帝堯舜誅而不怒及至三王隨時制法因事制禮法度制令各順其宜衣服器械各便其用故禮也不必一道而便國不必古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒者志淫則是鄒魯無竒行也俗辟者民易則是呉越無秀士也且聖人利身謂之服便事謂之禮夫進退之節衣服之制所以齊常民也非所以論賢者也故齊民與俗流賢者與變俱故諺曰以書為御者不盡馬之情以古制今者不達事之變循法之功不足以髙世法古之學不足以制今子不及也遂胡服招騎射二十年王畧中山地至寧葭西畧胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵二十一年攻中山趙袑為右軍許鈞為左軍公子章為中軍王并將之牛剪將車騎趙希并將胡代趙與之陘合軍曲陽攻取丹丘華陽䲭之塞王軍取鄗石邑封龍東垣中山獻四邑和王許之罷兵以工史趙世家武靈王問龎煥曰煥葢煖之兄一作煖寡人聞飛語流傳曰百戰而勝非善之善者也不戰而勝善之善者也願聞其解龎煥曰工者貴無與争工猶善也故太上用計謀其次因人事其下戰克用計謀者熒惑敵國之主使變更淫俗哆暴驕恣而無聖人之數愛人而與無功而爵未勞而賞喜則釋罪怒則妄殺法民而自慎刑人而自以為慎少人而自至狹人而自以為至繁無用嗜龜占缺二字髙義下合意内之人下或作不所謂因人事者結幣帛用貨財閉近人之復其口以賂買近臣使順其口使其所謂是者盡非也所謂非者盡是也離君之際用忠臣之路離之言間所謂戰克者其用已素破兵從而攻之因句踐用此而呉國亡楚用此而陳蔡舉三家用此而智氏亡韓用此而東分今世之言兵也皆强大者必勝小弱者必滅則是小國之君無霸王者而萬乗之主無破亡也昔夏廣而湯狹殷大而周小越弱而呉强此所謂不戰而勝善之善者也此隂經之法夜行之道天武之類也今或僵尸百萬流血千里而勝未決也以為功計之每已不若是故聖人昭然獨思忻然獨喜若夫耳聞金鼓之聲而希功目見旌旗之色而希陳手握兵刃之枋而希戰出進合鬬而希勝是襄王之所破亡也武靈王慨然歎曰存亡在身微乎哉寡人聞此日月有以自觀鶡冠子武靈王李兌治中山苦陘令上計而入多李兌曰語言辯聽之說不度於義謂之窕言茍且也無山林澤谷之利而入多者謂之窕貨君子不聽窕言不受窕貨子姑免矣韓子難二二十三年攻中山二十五年惠后卒即呉娃孟姚也乃惠文王之生母故曰惠后使周袑胡服傅王子何二十六年復攻中山攘地北至燕代西至雲中九原以上史趙世家杜氏通典武靈王築長城自代傍隂山下至髙闕為塞而至雲中雁門代郡二十七年五月戊申大朝於東宫傳國立王子何以為王王廟見禮畢出臨朝大夫悉為臣肥義為相國并傅王是為惠文王惠文王惠后呉娃子也武靈王自號為主父主父欲令子主治國而身胡服將士大夫西北畧胡地而欲從雲中九原直南襲秦於是詐自為使者入秦秦昭王不知已而怪其狀甚偉非人臣之度使人逐之而主父馳已脫關矣審問之乃主父也秦人大驚主父所以入秦者欲自畧地形因觀秦王之為人也史趙世家惠文王惠文王二年主父行新地遂出代西遇樓煩王於西河而致其兵三年滅中山遷其王於膚施起靈壽北地方從代道大通還歸行賞大赦置酒酺五日以上史趙世家韓子外儲左趙主父使李疵視中山可攻否還報曰中山可伐也君不亟伐將後齊燕主父曰何故可攻李疵對曰其君好巖穴之士所傾葢與車以見窮閭隘巷之士以十數抗禮下布衣之士以百數矣君曰以子言之是賢君也安可攻疵曰不然夫好顯岩穴之士而朝之則戰士怠於行陣上尊學者下士居朝則農夫惰於田戰士怠於行陣者兵弱農夫惰於田者國貧兵弱於敵國貧於内而不亡者未之有也伐之不亦可乎主父曰善舉兵而伐中山遂滅之吕覽趙氏攻中山中山之人曰安丘鴆衣鐵甲操鐵杖以戰而所擊無不碎所衝無不陷以車投車以人投人也㡬至將所而後死世本中山武公居顧桓公徙靈壽為趙武靈王所滅韓子外儲左趙主父令工施鈎梯而縁潘吾刻疎人迹其上廣三尺長五尺而勒之曰主父常游於此惠文王三年封故太子章為代安陽君章素侈心不服其弟所立主父又使田不禮相章也李兊謂肥義曰公子章彊壯而志驕黨衆而欲大殆有私乎田不禮之為人也忍殺而驕二人相得必有謀隂賊起一出身徼幸夫小人有欲輕慮淺謀徒見其利而不顧其害同類相推俱入禍門以吾觀之必不乆矣子任重而勢大亂之所始禍之所集也子必先患仁者愛萬物而智者備禍于未形不仁不智何以為國子奚不稱疾毋出傳政于公子成毋為怨府毋為禍梯肥義曰不可昔者主父以王屬義也曰毋變而度毋異而慮堅守一心以殁而世義再拜受命而籍之今畏不禮之難而忘吾籍變孰大焉進受嚴命退而不全負孰甚焉變負之臣不容于刑諺曰死者復生生者不愧吾言已在前矣吾欲全吾言安得全吾身且夫貞臣也難至而節見忠臣也累至而行明子則有賜而忠我矣雖然吾有語在前者也終不敢失李兊曰諾子勉之矣吾見子已今年耳涕泣而出李兊數見公子成以備田不禮之事異日肥義謂信期曰信期即下文髙信公子與田不禮甚可憂也其於義也聲善而實惡此為人也不子不臣吾聞之也姦臣在朝國之殘也讒人在中主之蠧也此人貪而欲大内得王而外為暴矯令為慢以擅一旦之命不難為也禍且逮國今吾憂之夜而忘寐飢而忘食盗賊出入不可不備自今以來若有召王者必見吾面我將先以身當之無故而王乃入信期曰善哉吾得聞此也史趙世家四年朝羣臣安陽君亦來朝主父令王聽朝而自從旁觀窺羣臣宗室之禮見其長子章傫然也反北面為臣詘於其弟心憐之於是乃欲分趙而王章於代計未決而輟主父及王游沙丘異宫公子章即以其徒與田不禮作亂詐以主父令召王肥義先入殺之髙信即與王戰公子成與李兊自國至乃起四邑之兵入距難殺公子章及田不禮滅其黨賊而定王室公子成為相號安平君李兊為司㓂公子章之敗往走主父主父開之成兊因圍主父宫公子章死公子成李兊謀曰以章故圍主父即解兵吾屬夷矣乃遂圍主父令宫中人後出者夷宫中人悉出主父欲出不得又不得食探爵鷇而食之三月餘而餓死沙丘宫主父定死乃發䘮赴諸侯是時王少成兊專政畏誅故圍主父主父初以長子章為太子後得呉娃愛之為不出者數嵗生子何乃廢太子章而立何為王呉娃死愛弛憐故太子欲兩王之猶豫未決故亂起以至父子俱死為天下笑豈不痛乎史趙世家韓子外儲右武靈王使惠文王涖政李兊為相武靈王不以身躬親殺生之柄故刼於李兊主父死惠文王立立五年與燕鄭易八年城南行唐以上史趙世家水經注行唐城内北門東側有玉女神廟趙武靈王營斯邑城彌載不立聖女發歎百堵皆興不日而就九年趙梁將與齊合軍攻韓至魯關下十年秦自置為西帝十一年董叔與魏氏伐宋得河陽於魏秦取梗陽十二年趙梁將攻齊十三年韓徐為將攻齊公主死呉娃女惠文王之妹十四年相國樂毅將趙秦韓魏燕攻齊取靈丘與秦會中陽十五年燕昭王來見趙與韓魏秦共擊齊齊王敗走齊王齊湣王也燕獨深入取臨淄以上史趙世家趙惠文王十六年秦復與趙數擊齊齊人患之蘇厲為齊遺趙王書曰臣聞古之賢君其徳行非布於海内也敎順非洽于民人也祭祀時享非數常於鬼神也常一作當甘露降時雨至年穀豐熟民不疾疫衆人善之然而賢主圖之今足下之賢行功力非數加于秦也怨毒積怒非素深于齊也秦趙與國以彊徵兵於韓秦誠愛趙乎其實憎齊乎物之甚者賢主察之秦非愛趙而憎齊也欲亡韓而吞二周故以齊餤天下恐事之不合故出兵以刼魏趙恐天下畏己也故出質以為信恐天下亟反也故徵兵於韓以威之聲以徳與國而實伐空韓臣以秦計為必出於此夫物固有勢異而患同者楚乆伐而中山亡今齊乆伐而韓必亡破齊王與六國分其利也亡韓秦獨擅之收二周西取祭器秦獨私之賦田計功王之獲利孰與秦多說士之計曰韓亡三川魏亡晉國市朝未變而禍已及矣燕盡齊之北地去沙丘鉅鹿歛三百里歛減也韓之上黨去邯鄲百里燕秦謀王之河山間三百里而通矣秦之上郡近挺關至於榆中者千五百里秦以三郡攻王之上黨羊腸之西勾注之南非王有已踰勾注斬常山而守之三百里而通於燕代馬胡犬不東下昆山之玉不出此三寶者亦非王有已王乆伐齊從彊秦攻韓其禍必至於此願王孰慮之且齊之所以伐者以事王也天下屬行以謀王也燕秦之約成而兵出有日矣五國三分王之地齊倍五國之約而殉王之患西兵以禁彊秦秦廢帝請服反髙平根柔於魏反巠分分當作山先先當作西二山并在代州雁門趙地也俞於趙齊之事王宜為上佼佼一作交而今乃扺罪臣恐天下後事王者之不敢自必也願王孰計之也今王毋與天下攻齊天下必以王為義齊抱社稷而厚事王天下必盡重王義王以天下善秦秦暴王以天下禁之是一世之名寵制於王也於是趙乃輟謝秦不擊齊史趙世家與國策文小異趙惠文王喜劒劒士夾門而客三千餘人日夜相擊于前死傷者歲百餘人好之不厭如是三年國衰諸侯謀之太子悝患之募左右曰孰能說王之意止劒士者賜之千金左右曰莊子能太子乃使人以千金奉莊子荘子弗受與使者俱往見太子曰太子何以敎周賜周千金太子曰聞夫子明聖謹奉千金以幣從者夫子弗受悝尚何敢言荘子曰聞太子所欲用周者欲絶王之喜好也使臣上說大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上說大王下當太子趙國何求而不得也太子曰然吾王所見惟劒士也莊子曰諾周善為劒太子曰然吾王所見劒士皆蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難王乃說之今夫子必儒服而見王事必大逆莊子曰請治劒服治劒服三日乃見太子太子乃與見王王脫白刃待之莊子入殿門不趨見王不拜王曰子欲何以敎寡人使太子先曰臣聞大王喜劒故以劒見王王曰子之劒何能禁制曰臣之劒十步一人千里不留行王大說之曰天下無敵矣莊子曰夫為劒者示之以虚開之以利後之以發先之以至願得試之王曰夫子休就舍待命令設戲請夫子王乃校劒士七日死傷者六十餘人得五六人使奉劒于殿下乃召莊子曰今日試使士敦劒莊子曰望之乆矣王曰夫子所御杖長短何如曰臣之所奉皆可然臣有三劒惟王所用請先言而後試王曰願聞三劒曰有天子劒有諸侯劒有庶人劒王曰天子之劒何如曰天子之劒以燕谿石城為鋒齊岱為鍔晉魏為脊周宋為鐔韓魏為鋏包以四夷裹以四時繞以渤海帶以常山制以五行論以刑徳開以隂陽持以春夏行以秋冬此劒直之無前舉之無上案之無下運之無旁上決浮雲下絶地紀此劒一用匡諸侯天下服矣此天子之劒也文王芒然自失曰諸侯之劒何如曰諸侯之劒以知勇士為鋒以清廉士為鍔以賢良士為脊以忠聖士為鐔以豪傑士為鋏此劒直之亦無前舉之亦無上案之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中和民意以安四鄉此劒一用如雷霆之震也四封之内無不賓服而聴從君命者矣此諸侯之劒也王曰庶人之劒何如曰庶人之劒蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難相擊于前上斬頸領下決肝肺此庶士之劒無異于鬭雞一旦命已絶矣無所用于國事今大王有天子之位而好庶人之劒臣竊為大王薄之王乃牽而上殿宰人上食王三環之三環自進食者三而環繞于席前也莊子曰王安坐定氣劒事已畢奏矣于是文王不出宫三月劒士皆服斃其處也服斃謂忿不見禮皆自殺也莊子說劒語近戰國非莊子本書趙惠文王造武冠一曰惠文冠或曰齊人見千歲涸澤之神名曰慶忌冠乗小車疾馳因象其冠而服焉白帖魏牟見趙王王方使冠工制冠于前問治國于牟對曰誠能重國若此二縰則國治且安王曰社稷至重而比之二尺縰何也牟曰大王治冠不使親近而必求良工者非為其敗縰而冠不成歟桓子新論藺相如者趙人為趙宦者令繆賢舍人趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與大將軍㢘頗諸大臣謀欲予秦秦城恐不可得徒見欺欲勿予即患秦兵之來計未定求人可使報秦者未得宦者令繆賢曰臣舍人藺相如可使王問何以知之對曰臣甞有罪竊計欲亡走燕臣舍人相如止臣曰君何以知燕王臣語曰臣甞從大王與燕王會境上燕王私握臣手曰願結交以此知之故欲往相如謂臣曰夫趙彊而燕弱而君幸于趙王故燕欲結于君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧質請罪則幸得脫矣臣從其計大王亦幸赦臣臣竊以為其人勇士有智謀宜可使於是王召見問藺相如曰秦王以十五城請易寡人之璧可予不相如曰秦彊而趙弱不可不許王曰取我璧不予我城奈何相如曰秦以城求璧而趙不許曲在趙趙予璧而秦不予趙城曲在秦均之二䇿寧許以負秦曲王曰誰可使者相如曰王必無人臣願奉璧往使城入趙而璧留秦城不入臣請完璧歸趙趙王於是遂遣相如奉璧西入秦秦王坐章臺見相如相如奉璧奏秦王秦王大喜傳以示美人及左右左右皆呼萬歲相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髮上衝冠謂秦王曰大王欲得璧使人發書至趙王趙王悉召羣臣議皆曰秦貪負其彊以空言求璧償城恐不可得議不欲予秦璧臣以為布衣之交尚不相欺况大國乎且以一璧之故逆彊秦之驩不可於是趙王乃齋戒五日使臣奉璧拜送書於庭何者嚴大國之威以修敬也今臣至大王見臣列觀禮節甚倨得璧傳之美人以戲弄臣臣恐大王無意償趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圗指從此以往十五都予趙相如度秦王特以詐佯為予趙城實不可得乃謂秦王曰和氏璧天下所共傳寶也趙王恐不敢不獻趙王送璧時齋戒五日今大王亦宜齋戒五日設九賓於廷臣乃敢上璧秦王度終不可彊奪遂許齋五日舍相如廣成傳舍相如度秦王雖齋決負約不償乃使其從者衣褐懷其璧從徑道亡歸璧于趙秦王齋五日後乃設九賓禮于廷引趙使者藺相如相如至謂秦王曰秦自繆王以來二十餘君未甞有堅明約束者也臣誠恐見欺于王而負趙故令人持璧歸間至趙矣且秦彊而趙弱大王遣一介之使至趙趙立奉璧來今以秦之彊而先割十五都予趙趙豈敢留璧而得罪于大王乎臣知欺大王之罪當誅臣請就湯鑊唯大王與羣臣熟計議之秦王與羣臣相視而嘻左右或欲引相如去秦王因曰今殺相如終不能得璧也而絶秦趙之驩不如因而厚遇之使歸趙趙王豈以一璧之故欺秦耶卒廷見相如畢禮而歸之相如旣歸趙王以為賢大夫使不辱於諸侯拜相如為上大夫秦亦不以城予趙趙亦終不予秦璧史藺相如傳年惠文王十六王與燕王遇廉頗將攻齊昔陽取之十七年樂毅將趙師攻魏伯陽而秦怨趙不與已擊齊伐趙拔我兩城十八年秦拔我石城王再之衛東陽決河水伐魏氏大潦漳水出魏冉來相趙十九年秦敗我二城趙與魏伯陽趙奢將攻齊麥丘取之以上史趙世家二十年廉頗將攻齊王與秦昭王遇西河外年表云與秦會澠池秦王使使者告趙王欲與王為好會于西河外澠池趙惠文王二十年趙王畏秦欲毋行廉頗藺相如計曰王不行示趙弱且怯也趙王遂行相如從㢘頗送至境與王訣曰王行度道里會遇之禮畢還不過三十日三十日不還則請立太子為王以絶秦望王許之遂與秦王會澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某年月日秦王與趙王會飲令趙王鼓瑟藺相如前曰趙王竊聞秦王善為秦聲請奉盆缻秦王以相娯樂秦王怒不許于是相如前進缻因跪請秦王秦王不肯擊缻相如曰五步之内相如請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡於是秦王不懌為一擊缻相如顧召趙御史書曰某年月日秦王為趙王擊缻秦之羣臣曰請以趙十五城為秦王壽藺相如亦曰請以秦之咸陽為趙王壽秦王竟酒終不能加勝於趙趙亦盛設兵以待秦秦不敢動既罷歸國以相如功大拜為上卿位在亷頗之右亷頗者趙之良將也惠文王十六年廉頗為趙將伐齊大破之取晉陽拜為上卿以勇氣聞于諸侯亷頗曰我為趙將有攻城野戰之大功而藺相如徒以口舌為勞而位居我上且相如素賤人吾羞不忍為之下宣言曰我見相如必辱之相如聞不肯與會相如每朝時常稱病不欲與亷頗争列已而相如出望見亷頗相如引車避匿於是舍人相與諫曰臣所以去親戚而事君者徒慕君之髙義也今君與亷頗同列亷君宣惡言而君畏匿之恐懼殊甚且庸人尚羞之况於將相乎臣等不肖請辭去藺相如固止之曰公之視亷將軍孰與秦王曰不若也相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑獨畏亷將軍哉顧我念之彊秦之所不敢加兵於趙者徒以吾兩人在也今兩虎共鬭其勢不俱生吾所以為此者先國家之急而後私讎也亷頗聞之肉袒負荆因賓客至藺相如門謝罪曰鄙賤之人不知將軍寛之至此也卒相與驩為刎頸之交是歲廉頗東攻齊破其一軍史藺相如傳趙惠文王謂公孫龍曰寡人事偃兵十餘年矣而不成兵不可偃乎公孫龍對曰偃兵之意兼愛天下之心也兼愛天下不可以虛名為也必有其實今藺離石入秦二縣叛趙自入於秦今屬西河而王縞素出總出一作布䘮國之服東攻齊得城而王加膳置酒秦得地而王出總出一作布齊亡地而王加膳此非兼愛之心也此偃兵之所以不成也今有人於此無禮慢易而求敬阿黨不公而求令煩號數變而求静暴戾貪得而求定雖黃帝猶若困吕覽審應二十一年趙徙漳水武平西二十二年大疫置公子丹為太子二十三年樓昌將攻魏㡬幾或屬齊或屬魏當在相潞之間不能取十二月廉頗將攻㡬取之二十四年廉頗將攻魏房子拔之因城而還又攻安陽取之二十五年燕周將攻昌城髙唐取之與魏共擊秦秦將白起破我華陽是時韓魏趙聚兵於華陽西攻秦得一將軍二十六年取東胡歐代地二十七年徙漳水武平南封趙豹為平陽君豹惠文王母弟河水出大潦二十八年藺相如伐齊至平邑罷城北九門大城二十九年秦韓相攻而圍閼與趙使趙奢將擊秦大破秦軍閼與下賜號為馬服君括地志云馬服山邯鄲縣西北十里以上史趙世家惠文王二十九年秦伐韓軍于閼與趙王召廉頗而問曰可救否對曰道逺險狹難救又召樂乗而問焉樂乗對如亷頗言又召問趙奢趙奢者趙之田部吏也收租稅而平原君家不肯出趙奢以法治之殺平原君用事者九人平原君怒將殺奢奢因說曰君于趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國彊國彊則趙固而君為貴戚豈輕于天下乎平原君以為賢言之于王王用之治國賦太平民富而府庫實奢對曰其道逺險狹譬之猶兩䑕鬭於穴中將勇者勝王乃令趙奢將救之兵去邯鄲三十里而令軍中曰有以軍事諫者死秦軍軍武安西秦軍鼓譟勒兵武安屋瓦盡振軍中候有一人言急救武安趙奢立斬之堅壁留二十八日不行復益増壘秦間來入趙奢善食而遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃増壘閼與非趙地也趙奢既已遣秦間乃卷甲而趨之二日一夜至令善射者去閼與五十里而軍軍壘成秦人聞之悉甲而至軍士許歴請以軍事諫趙奢曰内之許歴曰秦人不意趙師至此其來氣盛將軍必厚集其陣以待之不然必敗趙奢曰請受令許歴曰請就鈇質之誅趙奢曰胥後令邯鄲索隠曰邯鄲二字當作欲戰許歴復請諫曰先據北山上者勝後至者敗趙奢許諾即發萬人趨之秦兵後至争山不得上趙奢縱兵擊之大破秦軍秦軍解而走遂解閼與之圍而歸趙惠文王賜奢號為馬服君以許歴為國尉趙奢于是與廉頗藺相如同位史廉頗傳三十三年惠文王卒太子丹立是為孝成王史趙世家春秋戰國異辭卷五十
