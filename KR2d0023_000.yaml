body:
  text: 春秋戰國異辭目録别史類卷首上目録凡例通表上卷首下通表下卷一周卷二周卷三魯卷四魯卷五魯卷六魯卷七魯卷八晉卷九晉卷十晉卷十一晉卷十二衛卷十三鄭卷十四齊卷十五齊卷十六齊卷十七齊卷十八齊卷十九齊卷二十齊卷二十一齊卷二十二秦卷二十三秦卷二十四秦卷二十五秦卷二十六宋卷二十七楚卷二十八楚卷二十九楚卷三十楚卷三十一楚卷三十二燕卷三十三陳卷三十四蔡卷三十五吳卷三十六吳卷三十七吳卷三十八田齊卷三十九田齊卷四十田齊卷四十一田齊卷四十二魏卷四十三魏卷四十四魏卷四十五魏卷四十六魏卷四十七韓卷四十八趙卷四十九趙卷五十趙卷五十一趙卷五十二越卷五十三越卷五十四諸小國曹莒虢許邾鄒郭中山巴蜀卷五十五托遺臣等謹案春秋戰國異辭五十五卷通表二卷國朝陳厚耀撰厚耀字泗源泰州人康熙丙戌進士官蘇州教授以通算術入直內廷改授檢討官至右諭德是編採羣書所載與春秋三傳國語戰國䇿異同者分國編次以備考證又取史記十二諸侯表六國年表合而聨之為通表二卷其諧談瑣記神仙藝術無關體要難以年次者别為托遺一卷以附于後其年表排比詳明頗有條理異詞以切實可據者為正文而百家小說悠謬荒唐之論皆降一格附于下亦頗有體例雖其間真贋雜糅如莊列之寓言亢倉子之僞書皆見采録未免稍失裁斷而采托浩繁用力可稱勤至又所引諸書多著某篇某卷蓋仿程大昌演繁露王應麟韓詩考之例令觀者易于檢核亦無明人杜撰炫博之弊蓋馬驌繹史用袁樞紀事本末體厚耀是書則用齊履謙諸國統記體而驌書兼采三傳國語國䇿厚耀則皆托于五書之外尤為其難者雖涉蕪雜未可斥也厚耀又有春秋長厯家語廣輯二書皆與是編相表裏而自言平生精力用于是書者為多云乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋戰國異辭凡例一學非博則不能約春秋戰國學者童而習之然諸子百家言人人殊矣公羊子曰所見異辭所聞異辭所傳聞又異辭不輯其異無以證其同也周秦作者叙述己事指陳當代固不可誣即西京諸儒傳聞有緒非盡鑿空臆說也謹廣輯之以附孔門多聞多見之義為通表兩卷異辭五十四卷托遺一卷一史記世家列傳仿左氏編年之法而變通之於分載之中仍寓編年之意故能詳而不紊兹遵其體制首周次魯次晉次衛次鄭次齊次秦次宋次楚次燕次陳次蔡次吳次田齊次魏次韓次趙次越次諸小國終焉一談春秋者主三傳國語談戰國者主國策自漢已然録春秋異辭録其異於三傳國語者也録戰國異辭録其異於國策者也三傳國語國策可無録焉爾經則戴記史則史記子則老莊以下至新書說苑新序旁及類書說部以及諸家注疏有足資異聞者備録之近馬氏繹史考據詳審時採其確論附載篇末間有鄙見亦附志之一史記十二諸侯年表及六國年表斷續未清中多未貫故合而聯之為通表又表前國名止標首一行某王某公某侯止標元年其餘槩填年數首尾橫絶殊苦檢查兹於每頁之首必書國名每年之上必書某王某公某侯此年無事乃不書則展卷瞭然不須覆檢一史表年經國緯橫填事實其所書不過一二句而空白實多且有同一事而各國互見者不免重復兹稍變其例每年為表表與事實相間無空白之患無重復之病而橫行視之通為一線與年經國緯之法初不相悖也一是表止附於春秋戰國異辭之前異辭已全載大段矣其單句隻行及提綱撮要語見於年表及本紀世家中者悉收入表中以備闕略一是表諸侯王名及世系年次史與左多不盡合然而從史不從左者異辭故也異同相參不妨並存故悉注明於本句之下其已載春秋而史記未收者亦不贅一戰國策所載多無年月又無經傳可考故事多訛錯以致鮑吳兩注紛紛聚訟訖無定論兹表一以史記為主而參以資治通鑑撮其大概載入表中有異同處略為辨析一表中所書止取詳明不用書法於褒貶之義無涉一從史公原表而已其一事而互異者亦注明之一竹書紀年多史所未載可備異聞兹亦採入而以竹書二字别之其與史不合者注之亦異辭之緒餘也一厚耀性顓魯書卷之外無他嗜好幼而専心厯算寢食俱廢丙戌成進士教授吳門吳中士大夫家多藏書得借而讀之樂甚既䝉召入直內廷得讀中祕書益私自幸嵗己亥䝉天恩豫告歸田里雖目昏手戰然一日不事鉛槧輒惘惘如有所失結習難忘還自笑也所著春秋長厯家語廣輯皆次第録副而平生精力用之異辭者尤多所憾私家書少加以癃老踈漏舛復莫能詳校惟博學君子賜之是正則幸甚矣海陵後學陳厚耀識
