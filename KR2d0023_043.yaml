body:
  text: 春秋戰國異辭卷四十右春坊右諭德陳厚耀撰田齊湣王元年秦使張儀與諸侯執政會于齧桑史田齊世家蘇秦説湣王厚葬以明孝髙宫室大苑囿以明得意欲敝齊而為燕其後齊大夫多與蘇秦爭寵者而使人刺蘇秦不死殊而走齊王使人求賊不得蘇秦且死乃謂齊王曰臣即死車裂臣以徇于市曰蘇秦為燕作亂于齊如此則臣之賊必得矣于是如其言而殺蘇秦者果自出齊王因而誅之燕聞之曰甚矣齊之為蘇生報仇也時燕王噲立蘇秦既死其事大泄齊後聞之乃恨怒燕史蘇秦傳代蘇秦之弟曰代代弟厲見兄遂亦皆學及秦死乃求見燕王欲襲故事語見國策三年封田嬰于薛史田齊世家田嬰者齊威王少子而齊宣王庶弟也初田嬰自威王時任職用事與成侯鄒忌及田忌將而救韓伐魏成侯與田忌爭寵成侯賣田忌田忌懼襲齊之邊邑不勝亡走説苑田忌去齊奔楚襄王郊迎至舍會威王卒宣王立知成侯賣田忌乃復召田忌以為將宣王二年田忌與孫臏田嬰俱伐魏敗之馬陵虜魏太子申而殺魏將龎涓宣王七年田嬰使于韓魏韓魏服于齊嬰與韓昭侯魏惠王會齊宣王東阿南盟而去宣王九年田嬰相齊齊宣王與魏襄王會徐州而相王也楚威王聞之怒田嬰明年楚伐敗齊師于徐州而使人逐田嬰田嬰使張丑説楚威王威王乃止田嬰相齊十一年宣王卒湣王即位三年而封田嬰于薛史孟嘗君傳紀年城梁惠王後元十三年齊威王封田嬰于薛十月齊薛十四年薛子嬰來朝十五年齊威王薨與索隱引此史不同莊周隱于山嶽湣王遣使齎金百鎰聘以相位周謝使者去引聲歌曰天地之道近在胸臆呼吸精神以養九德渴不求飲飢不索食避世守道志潔如玉卿相之位難可直當巖巖之石幽而清涼枕塊寢處樂在其央寒涼回固可以久長古今樂録莊子將死弟子欲厚葬之莊子曰吾以天地為棺槨日月為連璧星辰為珠璣萬物為齎送吾葬具豈不備邪何以加此弟子曰吾恐烏鳶之食夫子也莊子曰在上為烏鳶食在下為螻蟻食奪彼與此何其偏也以不平平其平也不平以不徴徴其徴也不徴明者唯為之使神者徴之夫明之不勝神也久矣而愚者恃其所見入于人其功外也不亦悲乎莊子列禦冦齊使淳于髠到楚髠形體短小楚薄賤之曰齊無人也而使子來對曰臣無長腰中七尺劍欲斬無狀王王曰吾戲子耳即與髠共飲説苑説苑齊遣淳于髠到楚為人短小楚人甚薄之謂曰齊無人邪而使子來子何長也對曰臣無長腰中七尺之劍欲斬無狀王王曰止吾但戲子耳即與髠共飲酒謂髠曰吾有仇在吳國子定能為報之乎對曰來見道傍郢民持一豆而上田祝曰上得萬木下得千斛臣竊笑之以為禮薄而願多際輕而望重王今與吾半日之樂而委以吳王非其計楚王默然此假御覽引今本無亦前事之訛也四年迎婦于秦七年與宋攻魏敗之觀澤十二年攻魏楚圍雍氏秦敗屈丐以上史田齊世家孟嘗君名文姓田氏文之父曰靖郭君田嬰初田嬰有子四十餘人其賤妾有子名文文以五月五日生嬰告其母曰勿舉也其母竊舉生之及長其母因兄弟而見其子文于田嬰田嬰怒其母曰吾令若去此子而敢生之何也文頓首因曰君所以不舉五月子者何故嬰曰五月子者長與戶齊將不利其父母文曰人生受命于天乎將受命于戶邪嬰默然文曰必受命于天君何憂焉必受命于戶則髙其戶耳誰能至者嬰曰子休矣久之文承間問其父嬰曰子之子為何曰為孫孫之孫為何曰為玄孫玄孫之孫為何曰不能知也文曰君用事相齊至今三王矣齊不加廣而君私家富纍萬金門下不見一賢者文聞將門必有將相門必有相今君後宫蹈綺縠而士不得短褐僕妾餘粱肉而士不厭糟粳今君又尚厚積餘藏欲以遺所不知何人而忘公家之事日損文竊怪之于是嬰乃禮文使主家待賔客賔客日進名聲聞于諸侯諸侯皆使人請薛公田嬰以文為太子卒諡為靖郭君而文果代立于薛是為孟嘗君史孟嘗君傳孟嘗君前在于薛楚人攻之淳于髠為齊使于楚還反過于薛孟嘗君令人禮貌而親郊送之謂淳于髠曰楚人攻薛夫子勿為憂文無以復待矣待見也淳于髠曰敬聞命矣至于齊畢報王曰何見于楚對曰楚甚固而薛亦不量其力王曰何謂也對曰薛不量其力而為先王立清廟楚因而攻薛薛清廟必危故曰薛不量其力而楚亦甚固齊王知顔色齊王宣王也知發也曰嘻先君之廟在焉疾舉兵救之由是薛遂全吕覽報更孟嘗君請學于閔子使車往迎閔子閔子曰禮有來學無往教致師而學不能禮往教則不能化君也君所謂不能學者也臣所謂不能化者也于是孟嘗君曰敬聞命矣明日袪衣請受業韓詩卷三楚丘先生行年七十披簑帶索往見孟嘗君孟嘗君曰先生老矣春秋髙矣多遺亡矣何以教文楚丘先生曰惡君謂我老惡君何謂我老意者將使我投石超距乎追車赴馬乎逐麋鹿摶豹虎乎吾則死矣何暇老哉將使我深計逺謀乎定猶豫而決嫌疑乎出正辭而當諸侯乎吾乃始壯耳何老之有孟嘗君赧然汗出至踵曰文過矣文過矣韓詩卷十五又新序卷孟嘗君問于白圭曰魏文侯名過于桓公而功不及五伯何也白圭對曰魏文侯師卜子夏田子方敬段干木此名之所以過桓公也卜相則曰成與黃孰可此功之所以不及五伯也以私愛妨公舉在職者不堪其事故功廢然而名號顯榮者三士翊之也如相三士則王功成豈特伯哉新序卷四吕覽舉難孟嘗君問于白圭曰魏文侯名過桓公而功不及五伯何也白圭對曰文侯師子夏友田子方敬段干木此名之所以過桓公也卜相曰成與璜孰可此功之所以不及五伯也相也者百官之長也擇也者欲其博也今擇而不去二人與用其仇亦逺矣雍門周以琴見孟嘗君孟嘗君曰先生鼓琴亦能令文悲乎雍門子周曰臣何獨能令足下悲哉臣之所能令悲者有先貴而後賤先富而後貧者也不若身材髙妙適遭暴亂無道之士忘加不道之理焉不若處勢隱絶不及四鄰詘折厭襲于窮巷厭一作擯無所告訴不若交歡相愛無怨而任離逺赴絶國無復相見之時不若少失二親兄弟别離家室不足憂蹙盈胸當是之時也固不可以聞飛鳥疾風之聲窮窮焉固無樂矣凡若是者臣一為之徽膠援琴而長太息徽膠一作徴操則流涕沾襟矣今若足下千乘之君也居則廣厦邃房下羅帷來清風倡優侏儒處前迭進而諂諛燕則鬬象棋而舞鄭女激楚之功風綵色以淫目綵一作麗流聲以娛耳水遊則連方舟載羽旗鼓吹乎不測之淵野遊則馳騁弋獵乎平原廣囿格猛獸入則撞鐘擊鼓乎深宫之中方此之時視天地曽不若一指忘死與生雖有善鼓琴者固未能令足下悲也孟嘗君曰否否文固以為不然雍門子周曰然臣之所為足下悲者事也夫聲敵帝而困秦者君也連五國之約南面而伐楚者又君也天下未嘗無事不從則橫從成則楚王橫成則秦帝必報仇于薛矣夫以秦楚之強而報仇于弱薛譬之猶摩蕭斧而伐朝菌也必不留行矣天下有識之士無不為足下寒心酸鼻者千秋萬嵗之後宗廟必不血食矣髙臺既已壞曲池既以漸墳墓既以下而青庭矣嬰兒豎子樵採薪蕘者蹢躅其足而歌其上衆人見之無不愀焉為足下悲之曰夫以孟嘗君尊貴乃可使若此乎于是孟嘗君泫然泣涕承睫而未隕雍門子周引琴而鼓之徐動宫徴微揮羽角切終而成曲孟嘗君涕浪汙增欷而就之曰先生之鼓琴令文若破國亡邑之人也説苑善説有地志今徐州城東南雍門村即雍門周鼓琴地荆山子雍門周以琴見孟嘗君孟嘗君曰先生鼓琴亦能令文悲乎對曰臣之所能令悲者先貴而後賤昔富而今貧擯壓窮巷不交四鄰不若身材髙妙懷質抱真逢讒罹謗結怨而不得伸不若交歡而結愛無怨而生離逺赴絶國無相見期不若幼無父母壯無妻兒出以野澤為鄰入用窟穴為家困于朝夕無所假貸若此人者但聞飛鳥之號秋風鳴條則傷心矣臣一為援琴而長太息未有不悽惻而涕泣者也今若足下居則廣厦髙堂連闥洞房下羅帷來清風倡優在前諂諛侍側揚激楚舞鄭妾流聲以娛耳綵色以淫目水戲則舫龍舟建羽旗鼓釣乎不測之淵野遊則登平原馳廣囿強弩下髙鳥勇士格猛獸置酒娛樂沉醉忘歸方此之時視天地曽不若一指雖有善鼓琴未能動足下也孟嘗君曰固然雍門周曰臣竊為足下有所常悲夫角帝而困秦者君也連五國而伐楚者又君也天下未嘗無事不從則橫從成則楚王衡成則秦帝夫以秦楚之強而報弱薛猶磨蕭斧而伐朝道一作菌也有識之士莫不為足下寒心天道不常寒暑更進退千秋萬嵗之後宗廟必不血食髙臺既以傾曲池又已平墳墓生荆棘狐狸穴其中遊兒牧竪躑躅其足而歌其上曰孟嘗之尊貴亦猶若是乎于是孟嘗君喟然太息涕淚交睫而下雍門周引琴而鼓之徐動宫徴叩角羽終而成曲孟嘗君遂歔欷而就之曰先生鼓琴令文立若亡國之人也張祿掌門見孟嘗君曰衣新而不舊倉庾盈而不虛為之有道君亦知之乎孟嘗君曰衣新而不舊則是修也倉庾盈而不虛則是富也為之奈何其説可得聞乎張祿曰願君貴則舉賢富則振貧若是則衣新而不舊倉庾盈而不虛矣孟嘗君以其言為然説其意辨其辭明日使人奉黃金百斤文織百純進之張先生先生辭而不受後先生復見孟嘗君孟嘗君曰前先生幸教文曰衣新而不舊倉庾盈而不虛為之有説汝亦知之乎文竊説教故使人奉黃金百斤文織百純進之先生以補門內之不贍者先生曷為辭而不受乎張祿曰君將掘君之偶錢發君之庾粟以補士則衣敝履穿而不贍耳何暇衣新而不舊倉庾盈而不虛乎孟嘗君曰然則為之奈何張祿曰夫秦者四塞國也遊官者不得入焉願君為吾為丈尺之書寄我與秦王我往而遇乎固君之入也往而不遇乎雖人求間謀固不遇臣矣孟嘗君曰敬聞命矣因為之書寄之秦王往而大遇謂秦王曰自祿之來入大王之境田疇益辟吏民益治然而大王有一不得者大王知之乎王曰不知曰夫山東有相所謂孟嘗君者其人賢人天下無急則已有急則能收天下英乂雄俊之士與之合交連友者疑獨此耳然則大王胡不為我友之乎秦王曰敬受命奉千金以遺孟嘗君孟嘗君輟食察之而寤曰此張生所謂衣新而不舊倉庾盈而不虛者也説苑善説孟嘗君在薛招致諸侯賔客及亡人有罪者皆歸孟嘗君舍業厚遇之以故傾天下之士食客數千人無貴賤一與文等孟嘗君待客坐語而屏風後常有侍史主記君所與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚孟嘗君曾待客夜食有一人蔽火光客怒以飯不等輟食辭去孟嘗君起自持其飯比之客慚自剄士以此多歸孟嘗君孟嘗君客無所擇皆善遇之人人各自以為孟嘗君親己秦昭王聞其賢乃先使涇陽君為質于齊齊湣王二十四年以求見孟嘗君孟嘗君將入秦賔客莫欲其行諌不聽蘇代謂曰蘇代語亦見國策然少異木偶人作桃梗今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生于土敗則歸土今天雨流子而行未知所止息也今秦虎狼之國也而君欲往如有不得還君得毋為土偶人所笑乎孟嘗君乃止史孟嘗君傳齊東郭採桑之女項有大瘤號曰宿瘤女齊閔王出遊至東郭百姓聚觀宿瘤採桑如故王怪之召問曰寡人出遊車騎甚衆百姓無少長皆棄事來觀汝採桑如故曽不一視何也對曰妾受父母教採桑不受教觀大王王曰此竒女也惜哉宿瘤女曰婢妾之職屬之不二豫之不忘中心謂何宿瘤何傷王大悅之曰此賢女也命後乘載之女曰妾父母在使妾不受父母教而隨大王是奔女也大王又安用之王大慚曰寡人失之矣于是遣歸使使者加金百鎰往聘迎之父母驚惶欲洗浴加衣裳女曰如是見王則變容更服不見識也請死不從于是如故隨使者閔王歸見諸夫人曰今日出遊得一聖女今至斥汝屬矣諸夫人怪之盛服而衛遲其至則宿瘤也皆掩口而笑左右失笑不止王曰無笑不飾耳夫飾與不飾固相去十百也女曰夫飾相去千萬何獨十百也王曰何以言之對曰性相近也習相逺也昔者堯舜桀紂俱天子也堯舜自飾以仁義雖為天子安于節儉茅茨不剪采椽不斫後宫衣不重采食不重味至今數千嵗天下歸善焉桀紂不自飾以仁義習為苛文造為髙臺深池後宫蹈綺縠弄珠玉意非有饜時也身死國亡為天下笑相去千萬尚不足言何獨十百也于是諸夫人皆大慚閔王大感瘤女以為后出令卑宫室填池澤損膳減樂后宫不得重采期月之間化行鄰國諸侯朝之列女傳列女傳及女死之後燕遂屠齊湣王逃亡而弒死于外十三年秦惠王卒二十三年與秦擊敗楚於重丘二十四年秦使涇陽君質于齊二十五年歸涇陽君于秦孟嘗君薛文入秦即相秦文亡去以上史田齊世家齊湣王二十五年復使孟嘗君入秦昭王即以孟嘗君為秦相人或説昭王曰孟嘗君賢而又齊族也今相秦必先齊而後秦秦其危矣於是秦昭王乃止囚孟嘗君謀欲殺之孟嘗君使人抵昭王幸姬求解幸姬曰妾願得君狐白裘此時孟嘗君有一狐白裘直千金天下無雙入秦獻之昭王更無他裘孟嘗君患之遍問客莫能對最下坐有能為狗盜者曰臣能得狐白裘乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦王幸姬幸姬為言昭王昭王釋孟嘗君孟嘗君得出即馳去更封傳變名姓以出關夜半至函谷關秦昭王後悔出孟嘗君求之已去即使人馳傳逐之孟嘗君至關關法雞鳴而出客孟嘗君恐追至客之居下坐者有能為雞鳴而雞盡鳴遂發傳出出如食頃秦追果至關已後孟嘗君出乃還始孟嘗君列此二人于賔客賔客盡羞之及孟嘗君有秦難卒此二人拔之自是之後客皆服孟嘗君過趙趙平原君客之趙人聞孟嘗君賢出觀之皆笑曰始以薛公為魁然也今視之乃渺小丈夫耳孟嘗君聞之怒客與俱者下斫擊殺數百人遂滅一縣以去齊湣王不自得以其遣孟嘗君孟嘗君至則以為齊相任政史孟嘗君傳二十六年齊與韓魏共攻秦至函谷軍焉史田齊世家孟嘗君怨秦將以齊為韓魏攻楚因與韓魏攻秦而借兵食於西周蘇代為西周謂曰蘇代國䇿作韓慶君以齊為韓魏攻楚九年九當作六取宛葉以北以強韓魏今復攻秦以益之韓魏南無楚憂西無秦患則齊危矣韓魏必輕齊畏秦臣為君危之君不如令弊邑深合于秦而君無攻又無借兵食君臨函谷而無攻令弊邑以君之情謂秦昭王曰薛公必不破秦以強韓魏其攻秦也欲王之令楚王割東國以與齊而秦出楚懷王以為和君令弊邑以此惠秦秦得無破而以東國自免也秦必欲之楚王得出必德齊齊得東國益強而薛世世無患矣秦不大弱而處三晉之西弱當作強三晉必重齊薛公曰善因令韓魏賀秦韓魏賀秦國䇿作韓慶入秦使三國無攻而不借兵食於西周矣是時楚懷王入秦秦留之故必欲出之秦不果出楚懷王史孟嘗君傳孟嘗君使公孫𢎞西觀秦見昭王王曰薛地大小幾何𢎞曰百里王笑曰地方百里而欲以難寡人可乎𢎞對曰孟嘗君好士不臣天子不友諸侯如此者三人可為管商之師能致主霸王如此者五人萬乘之嚴主辱其使者退而自刎必以其血汚其衣有如臣者七人昭王謝曰客何為若此寡人善孟嘗君欲客之必謹諭寡人意也吕氏春秋孟嘗有舍人而弗説欲逐之三柱子魯仲連號謂孟嘗君曰猿獮猴錯木據水則不若魚鱉厯險乘危則騏驥不如狐狸曹沫會柯之劍一軍不能當使曹沫釋其三尺之劍而操銚耨與農夫居隴畝之中則不若農夫故物舍其所長用其所短堯亦有所不及矣今使人而不能則謂之不肖教人而不能則謂之拙拙則罷之不肖則棄之使人有棄逐不相與處而來害相報者豈非世之立教首也哉言後人視此為戒孟嘗曰善乃勿逐三柱子逐客孟嘗君寄客于齊王三年而不見用客反謂孟嘗君曰君之寄臣也三年而不見用不知臣之罪也君之過也孟嘗君曰寡人聞之縷因針而入不因針而急嫁女因媒而成不因媒而親夫子之材必薄矣尚何怨乎寡人哉客曰不然臣聞周氏之嚳韓氏之盧天下疾狗也見兔而指屬則無失兔矣望見而放狗也則纍世不能得兔矣狗非不能屬之者罪也孟嘗君曰不然昔華舟把梁戰而死其妻悲之向城而哭隅為之崩城為之阤君子誠能刑於內則物應於外矣夫土壤且可為忠况有食榖之君乎客曰不然臣見鷦鷯巢于葦苕著之髮毛建之女工不能為也可謂完堅矣大風至則苕折卵破子死者何也其所託者使然也且夫狐者人之所攻也鼠者人之所燻也臣未嘗見稷狐見攻社鼠見燻也何則所託者然也于是孟嘗君復屬之於齊齊王使為相説苑善説初馮歡聞孟嘗君好客躡屩而見之孟嘗君曰先生逺辱何以教文也馮歡曰歡國策作暖聞君好士以貧身歸于君孟嘗君置傳舍十日孟嘗君問傳舍長曰客何所為答曰馮先生甚貧猶有一劍耳又蒯緱蒯繩類緱把劍之處言其劍把無物可裝以小繩纒之也彈其劍而歌曰長鋏歸來乎食無魚孟嘗君遷之幸舍食有魚矣五日又問傳舍長答曰客復彈劍而歌曰長鋏歸來乎出無輿孟嘗君遷之代舍出入乘輿車矣五日孟嘗君復問傳舍長舍長答曰先生又嘗彈劍而歌曰長鋏歸來乎無以為家孟嘗君不悅居期年馮歡無所言孟嘗君時相齊封萬戶於薛其食客三千人邑入不足以奉客使人出錢于薛嵗餘不入貸錢者多不能與其息客奉將不給孟嘗君憂之問左右何人可使收債于薛者傳舍長曰代舍客馮公形容狀貌甚辨長者無他伎能宜可令收債孟嘗君乃進馮歡而請之曰賔客不知文不肖幸臨文者三千餘人邑入不足以奉賔客故出息錢于薛薛嵗不入民頗不與其息今客食恐不給願先生責之馮歡曰諾辭行至薛召取孟嘗君錢者皆會得息錢十萬乃多釀酒買肥牛召諸取錢者能與息者皆來不能與息者亦來皆持取錢之劵書合之齊為會日殺牛置酒酒酣乃持劵如前合之能與息者與為期貧不能與息者取其劵而燒之曰孟嘗君所以貸錢者為民之無者以為本業也所以求息者為無以奉客也今富給者以要期貧窮者燔劵書以捐之諸君強飲食有君如此豈可負哉坐者皆起再拜孟嘗君聞馮歡燒劵書怒而使使召歡歡至孟嘗君曰文食客三千人故貸錢于薛文奉邑少而民尚多不以時與其息客食恐不足故請先生收責之聞先生得錢即以多具牛酒而燒劵書何馮歡曰然不多具牛酒即不能畢會無以知其有餘不足有餘者為要期不足者雖守而責之十年息愈多急即以逃亡自損之若急終無以償上則為君好利不愛士民下則有離上抵負之名非所以厲士民彰君聲也焚無用虛債之劵捐不可得之虛計令薛民親君而彰君之善聲也君有何疑焉孟嘗君乃拊手而謝之齊王惑于秦楚之毁以為孟嘗君名髙其主而擅齊國之權遂廢孟嘗君諸客見孟嘗君廢皆去馮歡曰借臣車一乘可以入秦者必令君重於國而奉邑益廣可乎孟嘗君乃約車幣而遣之馮歡乃西説秦王曰天下之遊士憑軾結靷西入秦者無不欲強秦而弱齊憑軾結靷東入齊者無不欲強齊而弱秦此雄雌之國也勢不兩立為雄雄者得天下矣秦王跽而問之曰何以使秦無為雌而可馮歡曰王亦知齊之廢孟嘗君乎秦王曰聞之馮歡曰使齊重于天下者孟嘗君也今齊王以毁廢之其心怨必背齊背齊入秦則齊國之情人事之誠盡委之秦齊地可得也豈直為雄也君急使使載幣隂迎孟嘗君不可失時也如有齊覺悟復用孟嘗君則雌雄之所在未可知也秦王大悅乃遣車十乘黃金百鎰以迎孟嘗君馮歡辭以先行至齊説齊王曰天下之遊士憑軾結靷東入齊者無不欲強齊而弱秦憑軾結靷西入秦者無不欲強秦而弱齊夫秦齊雄雌之國秦強則齊弱矣此勢不兩雄今臣竊聞秦遣使車十乘載黃金百鎰以迎孟嘗君孟嘗君不西則已西入相秦則天下歸之秦為雄而齊為雌雌則臨淄即墨危矣王何不先秦使之未到復孟嘗君而益與之邑以謝之孟嘗君必喜而受之秦雖強國豈可以請人相而迎之哉折秦之謀而絶其霸強之略齊王曰善乃使人至境候秦使秦使車適入齊境使還馳告之王召孟嘗君而復其相位而與其故邑之地又益以千戶秦之使者聞孟嘗君復相齊還車而去矣自齊王毁廢孟嘗君諸客皆去後召而復之馮歡迎之未到孟嘗君太息歎曰文常好客遇客無所敢失食客三千有餘人先生所知也客見文一日廢皆背文而去莫顧文者今賴先生得復其位客亦有何面目復見文乎如復見文者必唾其面而大辱之馮歡結轡下拜孟嘗君下車接之曰先生為客謝乎馮歡曰非為客謝也為君之言失夫物有必至事有固然君知之乎孟嘗君曰愚不知所謂也曰生者必有死物之必至也富貴多士貧賤寡友事之固然也君獨不見夫朝趨市者乎明旦側肩爭門而入日暮之後過市朝者掉臂而不顧非好朝而惡暮所期物亡其中今君失位賔客皆去不足以怨士而徒絶賔客之路願君遇客如故孟嘗君再拜曰敬從命矣聞先生之言敢不奉教焉史孟嘗君傳列士傳孟嘗君食客三千人上客食肉中客食魚下客食菜馮暖無袴面有飢色孟嘗君相齊其舍人魏子為孟嘗君收邑入三反而不致一入孟嘗君問之對曰有賢者竊假與之以故不致入孟嘗君怒而退魏子居數年人或毁孟嘗君於齊湣王曰孟嘗君將為亂及田甲劫湣王湣王意疑孟嘗君孟嘗君乃奔湣王三十年田甲劫王薛文走魏子所與粟賢者聞之乃上書言孟嘗君不作亂請以身為盟遂自剄宫門以明孟嘗君湣王乃驚而蹤迹驗問孟嘗君果無反謀為復召孟嘗君孟嘗君因謝病歸老于薛湣王許之史孟嘗君傳孟嘗君逐于齊湣王三十年談裕子曰富貴則就貧賤則去此物之必至而理固然也願君勿怨請以市論市朝則盈夕則虛非朝愛而夕憎之也求存故往求亡故去勢使然也魯連子鶡冠子或曰楚人隱居幽山衣被屢空以鶡為冠莫測其名因服成號著書言道家馮諼常師事之後顯于趙鶡冠子懼其薦已也乃與諼絶袁淑真隱傳秦亡將吕禮相齊欲困蘇代代乃謂孟嘗君曰周最於齊至厚也周最周之公子而齊王逐之而聽親弗親弗人姓名國策作親弗焉得之相吕禮者欲取秦也齊秦合則親弗與吕禮重矣有用齊秦必輕君君不如急北兵趨趙以和秦魏收周最以厚行且反齊王之信又禁天下之變齊無秦則天下集齊親弗必走則齊王孰與為其國也于是孟嘗君從其計而吕禮嫉害於孟嘗君孟嘗君懼乃遺秦相穰侯魏冉書曰吾聞秦欲以吕禮收齊齊天下之強國也子必輕矣齊秦相取以臨三晉吕禮必并相矣是子通齊以重吕禮也若齊免于天下之兵其讎子必深矣子不如勸秦王伐齊齊破吾請以所得封子齊破秦畏晉之強秦必重子以取晉晉國弊於齊而畏秦晉必重子以取秦秦晉交重子若齊不破吕禮復用子必大窮於是穰侯言于秦昭王伐齊而吕禮亡史孟嘗君傳狐援説齊湣王曰殷之鼎陳于周之庭其社蓋於周之屏周存殷社而屋其上屏之以為戒也其干戚之音在人之遊亡國之音不得至於廟亡國之社不得見於天亡國之器陳於庭所以為戒王必勉之其無使齊之大吕陳之庭無使太公之社蓋之屏無使齊音充人之遊齊王不受受納也狐援出而哭國三日其辭曰先出也衣絺紵出去也後出也滿囹圄吾見民之洋洋然東走而不知所處齊王問吏曰哭國之法若何吏曰斫斬也王曰行法吏陳斧質于東閭不欲殺之而欲去之狐援聞而蹶往過之吏曰哭國之法斫先生之老歟昏歟狐援曰曷為昏哉于是乃言曰有人自南方來鮒入而鯢居鮒小魚鯢太魚魚之賊也能啖食小魚使人之朝為草而國為墟殷有比干吳有子胥齊有狐援已不用若言又斫之東閭其以吾參大二子者乎吕覽貴直尹文見齊王尹文齊人作名書一篇在公孫龍前公孫龍稱之齊王湣王也齊王謂尹文曰寡人甚好士尹文曰願聞何謂士王未有以應尹文曰今有人於此事親則孝事君則忠交友則信居鄉則悌有此四行者可謂士乎齊王曰此真所謂士已尹文曰王得若人肻以為臣乎王曰所願而不能得也尹文曰若使人於廟朝中深見侮而不鬬王將以為臣乎王曰否大夫見侮而不鬬則是辱矣辱則寡人勿以為臣矣尹文曰雖見侮而不鬬未失其四行也未失其四行者是未失其所以為士一矣未失其所以為士一而王以為臣失其所以為士一而王不以為臣則向之所謂士者乃士乎王無以應尹文曰今有人於此將治其國民有非則非之民有罪則罰之民無罪則罰之而惡民之難治可乎王曰不可尹文曰竊觀下吏之治齊也方若此也王曰使寡人治信若是則民雖不治寡人勿怨也意者未之然乎尹文曰言之不敢無説請言其説王之令曰殺人者死傷人者刑民有畏王之令深見侮而不敢鬬者是全王令也而王曰見侮而不敢鬭是辱也夫謂之辱者非此之謂也以為臣不以為臣者罪之也此無罪而王罰之也齊王無以應吕覽正名漢書名家尹文子一篇説齊宣王據吕氏春秋尹文説齊湣王列子老成子學幻於尹文先生三年不告老成子請其過而求退尹文先生揖而進之於室屏左右而與之言曰昔老𥅆之徂西也顧而告豫曰有生之氣有形之狀盡幻也造化之所始隂陽之所變者謂之生謂之死窮數逹變因形移易者謂之化謂之幻造物者其巧妙其功深固難窮難終因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與學幻矣吾與汝亦幻也奚須學哉老成子歸用尹文先生之言深思三月遂能存亡自在幡校四時冬起雷夏造氷飛者走走者飛終身不著其術故世莫傳焉漢書道家老成子十八篇列精子髙聽行乎齊湣王列精子髙六國時賢人也聽行其德行見敬於齊王也善衣東布衣白縞冠顙推之履特會朝雨袪步堂下謂其侍者曰我何若顙推之履弊履也袪步舉衣而步也我何若問其好醜何如也侍者曰公姣且麗列精子髙因步而窺于井粲然惡丈夫之狀也喟然歎曰侍者為吾聽行於齊王也夫何阿哉又况於所聽行乎萬乘之主人之阿之亦甚矣而無所鏡其殘亡無日矣孰當可而鏡其唯士乎人皆知説鏡之明己也而惡士之明己也鏡之明己也功細士之明己也功大得其細失其大不知類耳吕覽逹鬱子髙見齊王齊王問誰可臨淄宰稱管穆焉王曰穆容貌陋民不敬答曰夫見敬在德且臣所稱稱其材也君王聞晏子趙文子乎晏子長不過三尺面貌惡齊國上下莫不宗焉趙文子其身如不勝衣其言如不出口非但體陋辭氣又呐呐然其相晉國晉國以寧諸侯敬服皆有德故也以穆軀形方之二子猶悉賢之昔臣嘗行臨淄市見屠商焉身修八尺鬚髯如戟面正紅白市之男女未有敬之者無德故也王曰是所謂祖龍始者也祖龍始乃屠商姓名誠如先生之言于是乃以管穆為臨淄宰孔叢子中齊王行車裂之刑群臣諍之勿聽子髙見于齊王曰聞君行車裂之刑無道之刑也而君行之臣竊以為下吏之過也王曰寡人以民多犯法為法之輕也子髙曰然此誠君之盛意也夫人含五常之性有喜怒哀樂喜怒哀樂無過其節節過則毁于義民多犯法以法重無所措手足也今天下悠悠士無定處有德則往無德則去欲規霸王之業與衆大國為難而行酷刑以懼逺近國內之民將叛四方之士不至此乃亡國之道君之下吏不具以聞徒恐逆主意以為憂不慮不諌之危亡其所矜者小所喪者大故曰下吏之過也臣觀之又非徒不諍而已也心知此事之為不可將有非議在後則因曰君忿意實然我諌諍必有龍逄比干之禍是為虛自居於忠正之地而暗推君主使同於桀紂也且夫為人臣見主非而不諍以陷主於危亡罪之大者也人主疾臣之弼已而惡之資臣以箕子比干之忠惑之大者也齊王曰謹聞命遂除車裂之法焉孔叢子中子髙任司馬乂為將于齊與燕戰而敗齊君曰以子賢明故信子也答曰君知穿孰若周公齊君曰周公聖人而子賢者弗如也子髙曰然臣固弗如周公也以臣之知乂孰若周公之知其弟齊君曰兄弟審於他人子髙曰君之言是也夫以周公之聖兄弟相知之審而近失于管蔡明人難知也臣與乂相見觀其材志察其所履齊國之士弗能過也書曰知人則哲惟帝難之穿何慚焉且曹子為魯三與齊戰三敗失地然後以勇敢之節奮三尺之劍要桓公管仲于盟壇卒收其所喪夫君子之敗如日月之蝕人各有能又庸可棄乎今燕以詐破乂是乂不能于詐也臣之稱乂稱其武勇才藝不稱其詐也乂雖敗臣固不失其所稱焉齊君屈辭而不黜司馬乂孔叢子中齊令章子將而與韓魏攻楚楚令唐蔑將而拒之二十八年軍相當六月而不戰齊令周最趣章子急戰其辭甚刻章子對周最曰殺之免之殘其家王能得此于臣不可以戰而戰可以戰而不戰王不能得此于臣與楚人夾泚水而軍章子令人視水可絶者楚人射之水不可得近有芻水旁者告齊候者曰候視也水淺深易知楚人所盛守盡其淺者也所簡守皆其深者也候者載芻者與見章子章子甚喜因練卒以夜掩楚人之所甚守果殺唐蔑吕覽處方三十六年王為東帝秦昭王為西帝蘇代自燕來入齊見於章華東門齊王曰嘻善子來秦使魏冉致帝子以為何如對曰王之問臣也卒而患之所從來微願王受之而勿備稱也秦稱之天下安之王乃稱之無後也且讓爭帝名無傷也秦稱之天下惡之王因勿稱以收天下此大資也且天下立兩帝王以天下為尊齊乎尊秦乎王曰尊秦曰釋帝天下愛齊乎愛秦乎王曰愛齊而憎秦曰兩帝立約伐趙孰與伐桀宋之利王曰伐桀宋利對曰夫約鈞然與秦為帝而天下獨尊秦而輕齊釋帝則天下愛齊而憎秦伐趙不如伐桀宋之利故願王釋帝以收天下倍約賔秦無爭重而王以其間舉宋夫有宋衛之陽地危有濟西趙之阿東國危有淮北楚之東國危有陶平陸梁門不開釋帝而貸之以伐桀宋之事國重而名尊燕楚所以形服天下莫敢不聽此湯武之舉也敬秦以為名而後使天下憎之此所謂以卑為尊者也願王熟慮之於是齊去帝復為王秦亦去帝位史田齊世家齊王問于文子曰治齊何如對曰夫賞罰之為道利器也君固握之不可以示人若如臣者猶獸鹿也唯薦草而就韓子內儲上齊王疾痏齊王湣王也使人之宋迎文摯文摯至視王之疾謂太子曰王之疾必可已也雖然王之疾已則必殺摯也太子曰何故文摯對曰非怒王則疾不可治怒王則摯必死太子頓首強請曰茍己王之疾臣與臣之母以死力爭之於王王必幸臣與臣之母幸哀也願先生之勿患也文摯曰諾請以死為王為治也與太子期而將往不當者三齊王固已怒矣文摯至不解履登牀履王衣問王之疾王怒而不與言文摯因出辭以重怒王王叱而起疾乃遂已王大怒不悅將生烹文摯太子與王后急爭之而不能得果以鼎生烹文摯爨之三日三夜顔色不變文摯曰誠欲殺我則胡不覆之以絶隂陽之氣王使覆之文摯乃死夫忠於治世易忠於濁世難文摯非不知活王之疾而身獲死也為太子行難以成其義也吕覽至忠列子龍叔謂文摯曰子之術微矣吾有疾子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以為榮國毁不以為辱得而不喜失而不憂視生如死視富如貧視人如豕視吾如人處吾之家如逆旅之舍觀吾之鄉如戎蠻之國凡此衆疾爵賞不能勸刑罰不能威盛衰利害不能易哀樂不能移固不可事國君交親友御妻子制僕𨽻此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯自後向明而望之既而曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達今以聖智為疾者或由此乎非吾淺術所能已也齊湣王三十八年伐宋秦昭王怒曰吾愛宋與愛新城陽晉同韓聶與吾友也而攻吾所愛何也蘇代為齊謂秦王曰韓聶之攻宋所以為王也齊強輔之以宋楚魏必恐恐必西事秦是王不煩一兵不傷一士無事而割安邑也年表云秦昭王二十一年魏割安邑及河內此韓聶之所禱於王也秦王曰吾患齊之難知一縱一衡其説何也對曰天下國令齊可知乎齊以攻宋其知事秦以萬乘之國自輔不西事秦則宋治不安中國白頭遊敖之士皆積智欲離齊秦之交伏軾結軼西馳者未有一人言善齊者也伏式結軼東馳者未有一人言善秦者也何則皆不欲齊秦之合也何晉楚之智而齊秦之愚也晉楚合必議齊秦齊秦合必圖晉楚請以此決事秦王曰諾于是齊伐宋宋王出亡死于溫齊南割楚之淮北西侵三晉欲以并周室為天子泗上諸侯鄒魯之君皆稱臣諸侯恐懼史田齊世家鹽鐵論湣王奮二世之餘烈南舉楚淮北并巨宋苞十二國西摧三晉郤強秦五國賔從鄒魯之君泗上諸侯皆入臣矜功不休百姓不堪諸侯諌不從各分散慎到捷子亡去田駢如薛而孫卿適楚內無良臣故諸侯合謀而伐之史記齊湣王滅宋益驕欲去孟嘗君孟嘗君恐乃如魏魏昭王以為相西合於秦趙與燕共伐破齊齊湣王亡在莒遂死薛公之相魏昭侯也左右有欒子者曰陽胡潘其於王甚重而不為薛公薛公患之于是乃召與之博豫之人百金令之昆弟博俄又益之人二百金方博有間謁者言客張季之子在門公怫然怒撫兵而授謁者曰殺之吾聞季不為文也立有間時季羽在側曰不然竊聞季為公甚顧其人隂未聞耳乃輟不殺客大禮之曰曩者聞季之不為文也故欲殺之今誠為文也豈忘季哉告廪獻千石粟告府獻五百金告騶私廄獻良馬固車二乘因令奄將宫人之美妾二十人並遺季也欒子因相謂曰為公者必利不為公者必害吾曹何愛不為公因私競勸而遂為之薛公以人臣之勢假人主之術也韓子外儲右以齊湣王三十八年田文奔魏為相薛公即孟嘗耳三十九年秦來伐我拔我列城九史田齊世家湣王四十年燕秦楚三晉合謀各出鋭師以伐敗我濟西王解而却燕將樂毅遂入臨淄盡取齊之寶藏器湣王出亡之衛衛君辟宫舍之稱臣而共具湣王不遜衛人侵之湣王去走鄒魯有驕色鄒魯君弗納遂走莒史田齊世家昌國君將五國之兵以攻齊昌國君樂毅也為燕昭王伐齊齊使觸子將以迎天下之兵於濟上齊王欲戰使人赴觸子耻而訾之曰不戰必剗若類掘若壟觸子苦之欲齊軍之敗于是與天下兵戰戰合擊金而却之卒北天下兵乘之觸子因以一乘去莫知其所不聞其聲逵子又帥其餘卒以軍於秦周無以賞秦周齊城門名使人請金于齊王積金以賞功也齊王怒曰若殘竪子之類烏能給若金與燕人戰大敗逵子死齊王走莒燕人逐北國人相與爭金於美唐甚多美唐金藏也此貪小利以失大利者也吕覽權勳齊湣王亡居於衛晝日步足謂公玉丹曰我已亡矣而不知其故吾所以亡者果何故哉公玊丹答曰臣以王為已知之矣王故尚未之知耶王之所以亡者以賢也以天下之王皆不肖而惡王之賢也因相與合兵而攻王此王之所以亡也湣王慨焉太息曰賢固若是其苦耶以上見吕覽審已丹又謂閔王曰臣聞古人有辭天下而無恨色者臣聞其聲於王而見其寶王名稱東帝寶有天下去國居衛容貌充滿顔色發揚無重國之意王曰甚善丹知寡人自去國居衛也帶三益矣𢃄益三倍茍活者肥令腹大耳覽以上見吕過理遂以自賢驕盈日甚閔王亡走衛衛君辟宫舍之稱臣而供具閔王不遜衛人侵之閔王去走鄒魯鄒魯不納遂走莒楚使淖齒將兵救齊因相閔王淖齒擢閔王之筋而懸之廟梁宿昔而殺之而與燕共分齊地通見新序卷五楚使淖齒將兵救齊因相齊湣王淖齒遂殺湣王而與燕共分齊之侵地鹵器湣王之遇殺其子法章變名姓為莒太史敫家傭太史敫女竒法章狀貌以為非恆人憐而常竊衣食之而與私通焉淖齒既已去莒莒中人及齊亡臣相聚求湣王子欲立之法章懼其誅己也久之乃敢自言我湣王子也于是莒人共立法章是為襄王以保莒城而布告齊國中王已立在莒矣史田齊世家燕之初入齊聞晝邑人王蠋賢令軍中曰環晝邑三十里無入以王蠋之故已而使人謂蠋曰齊人多髙子之義吾以子為將封子萬家蠋固謝燕人曰子不聽吾引三軍而屠晝邑王蠋曰忠臣不事二君貞女不更二夫齊王不聽吾諌故退而耕于野國既破亡吾不能存今又劫之以兵為君將是助桀為暴也與其生而無義固不如烹遂經其頸於樹枝自奮絶脰而死齊亡大夫聞之曰王蠋布衣也義不北面于燕况在位食祿者乎乃相聚如莒求諸子立為襄王史田單傳蓋又説苑立節晝邑作邑蠋作歜淖齒聞齊王之惡已也乃矯為秦使以知之齊人有欲為亂者恐王知之因詐逐所愛者令走王知之韓子內儲上初淖齒之殺湣王也莒人求湣王子法章得之太史嬓之家為人灌園嬓女憐而善遇之後法章私以情告女女遂與通及莒人共立法章為齊王以莒距燕而太史女遂為后所謂君王后也史田單傳國䇿更詳春秋戰國異辭卷四十
