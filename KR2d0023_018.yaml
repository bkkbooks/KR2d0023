body:
  text: 春秋戰國異辭卷十六右春坊右諭德陳厚耀撰桓公中七年諸侯㑹桓公於甄而桓公於是始霸焉十四年陳厲公子完號敬仲來奔齊齊桓公欲以為卿讓於是以為工正田成子常之祖也史齊世家桓公問于管子曰自燧人以來其大㑹可得而聞乎管子對曰燧人以來未有不以輕重為天下也共工之王水處什之七陸處什之三乘天勢以隘制天下至于黃帝之王謹逃其爪牙不利其器燒山林破增藪焚沛澤逐禽獸實以益人然後天下可得而牧也至于堯舜之王所以化海內者北用禺氏之玉南貴江漢之珠其勝禽獸之仇以大夫隨之桓公曰何謂也管子對曰令諸侯之子將委質者皆以雙虎之皮卿大夫豹飾列大夫豹幨大夫散其邑粟與其財物以市虎豹之皮故山林之人刺其猛獸若從親戚之仇此君冕服于朝而猛獸勝于外大夫已散其財物萬人得受其流此堯舜之數也管子揆度桓公問于管子曰今欲調高下分并財散積聚不然則世且并兼而無止蓄餘藏羡而不息貧賤鰥寡獨老不得與焉散之有道分之有數乎管子對曰唯輕重之家為能散之耳請以令輕重之家桓公曰諾東車五乘迎癸乙于周下原桓公問四因之道於癸乙管子寧戚相與四坐桓公曰請問輕重之數癸乙曰重籍其民者失其下數欺諸侯者無權輿管子差肩而問曰吾不籍吾民何以奉車革不籍吾民何以待鄰國癸乙曰唯好心為可耳夫好心則萬物通萬物通則萬物運萬物運則萬物賤萬物賤則萬物可因知萬物之可因而不因者奪于天下奪于天下者國之大賊也桓公曰請問好心萬物之可因癸乙曰有餘富無餘乘者責之卿諸侯足其所不賂其遊者責之令大夫若此則萬物通萬物通則萬物運萬物運則萬物賤萬物賤則萬物可因矣故知三准同策者能為天下不知三淮之同策者不能為天下故申之以號令抗之以徐疾也民乎其歸我若流水此輕重之數也管子輕重甲桓公曰輕重有數乎管子對曰輕重無數物發而應之聞聲而乘之故為國不能來天下之財致天下之民則國不可成桓公曰何謂來天下之財管子對曰昔者桀之時女樂三萬人端譟晨樂聞于三衢是無不服文繡衣裳者伊尹以亳之游女工文繡纂組一純得粟百鍾于桀之國夫桀之國者天子之國也桀無天下憂飾婦女鐘鼓之樂故伊尹得其粟而奪之流此之謂來天下之財桓公曰何謂致天下之民管子對曰請使州有一掌里有積五窖民無以與正籍者豫之長假死而不葬者豫之長度饑者得食寒者得衣死者得葬不資者得振則天下之歸我者若流水此之謂致天下之民故聖人善用非其有使非其人動言搖辭萬民可得而親桓公曰善桓公問管子曰夫湯以七十里之亳兼桀之天下其故何也管子對曰桀者冬不為杠夏不束柎以觀凍溺弛牝虎充市以觀其驚駭至湯而不然夷競而積粟饑者食之寒者衣之不資者振之天下歸湯若流水此桀之所以失其天下也桓公曰桀使湯得為是其故何也管子曰女華者桀之所愛也湯事之以千金曲逆者桀之所善也湯事之以千金內則有女華之隂外則有曲逆之陽隂陽之議合而得成其天子此湯之隂謀也管子輕重甲桓公問于管子曰國准可得聞乎管子對曰國准者視時而立儀桓公曰何謂視時而立儀對曰黃帝之王謹逃其瓜牙有虞之王枯澤童山夏后之王燒增藪焚沛澤不益民之利殷人之王諸侯無牛馬之牢不利其器周人之王官能以備物五家之數殊而用一也桓公曰然則五家之數籍何者為善也管子對曰燒山林破增藪焚沛澤猛獸衆也童山竭澤者君智不足也燒增藪焚沛澤不益民利逃械器閉智能者輔己者也諸侯無牛馬之牢不利其器者曰淫器而一民心者也以人御人逃戈刃高仁義乘天固以安己者也五家之數殊而用一也桓公曰五代之王以盡天下數矣來世之王者可得而聞乎管子對曰好饑而不亂亟變而不變時至則為過則去王數不可豫致此則五家之國准也管子國准桓公問于管子曰請問大凖管子對曰大凖者天下皆制我而無我焉此謂大凖桓公曰何謂也管子對曰今天下起兵加我臣之能謀厲國定名者割壤而封臣之能以車兵進退成功立名者割壤而封然則是天下盡封君之臣也非君封之也天下已封君之臣十里矣天下每動重封君之民二十里君之民非富也鄰國封之鄰國每動重冨君之民貧者重貧富者重富大准之數也桓公曰何謂也管子對曰今天下起兵加我民棄其耒耜出持戈于外然則國不得耕此非天凶也此人凶也君朝令而夕求具民肆其財物與其五穀為讎厭而去賈人受而廩之然則國財之一分在賈人師罷民反其事萬物反其重賈人出其財物國幣之少分廩于賈人若此則幣重三分財物之輕重三分賈人市于三分之間國之財物盡在賈人而君無策焉民更相制君無有事焉此輕重之大凖也又曰人君操本民不能操末人君操始民不能操卒其在涂者籍之于衢塞其在穀者守之春秋其在萬物者立資而行故物動則應之豫奪其涂則民無遵君守其流則民失其高故守四方之高下國無游賈貴賤相當此謂國衡以利相守則數歸于君矣管子揆度桓公曰輕重之數國准之分吾已得而聞之矣請問用兵奈何管子對曰五戰而至于兵桓公曰此言何謂也管子對曰請戰衡戰准戰流戰權戰勢此所謂五戰而至于兵者也桓公曰善管子輕重甲桓公問管子曰事之至數可聞乎管子對曰何謂至數桓公曰秦奢教我曰帷蓋不修衣服不衆則女事不泰俎豆之禮不致牲諸侯太牢大夫少牢不若此則六畜不育非高其臺榭美其宫室則羣材不散此言何如管子曰非數也桓公曰何謂非數管子對曰此定壤之數也彼天子之定壤方千里齊諸侯方百里負海子七十里男五十里若胸臂之相使也故淮徐疾羸不足雖在下也不為君憂彼壤狹而欲舉與大國爭者農夫寒耕暑耘力歸于上女勤緝績徽織功歸于府者非怨民心傷民意也非有積蓄不可以用人非有積財無以勸下秦奢之數不可用于危隘之國桓公曰善管子事語桓公又問管子曰佚田謂寡人曰善者用非其有使非其人何不因諸侯權以制天下管子對曰佚田之言非也彼善為國者壤辟舉則民留處倉廩實則知禮節且無委致圍城脆致衝夫不定內不可以持天下佚田之言非也管子又曰嵗藏一十年而十也嵗藏二五年而十也穀十而守五綈素滿之五在上故視嵗而藏縣時積嵗國有十年之蓄富勝貧勇勝怯智勝愚微勝不微有義勝無義練士勝毆衆凡十勝者盡有之故發如風雨動如雷霆獨出獨入莫之能禁止不待權輿故佚田之言非也桓公曰善管子事語管子入復桓公曰終歲之租金四萬二千請以一朝素賞軍士桓公曰諾以令至鼓期于泰舟之野期軍士桓公乃即壇而立寧戚鮑叔隰朋易牙賔須無皆差肩而立管子執枹而揖軍士曰誰能陷陳破衆者賜之百金三問不對有一人秉劔而前問曰幾何人之衆也管子曰千人之衆千人之衆臣能陷之賜之百金管子又曰兵接弩張誰能得卒長者賜之百金問曰幾何人卒之長也管子曰千人之長千人之長臣能得之賜之百金管子又曰誰能聽旌旗之所指而得執將首者賜之千金言能得者壘千人賜之人千金其餘言能外斬首者賜之人千金一朝素賞四萬二千金廓然虛桓公惕然太息曰吾曷以識此管子對曰君勿患且使外為名于其內鄉為功于其親家為德于其妻子若此則士必爭名報德無北之意矣吾舉兵而攻破其軍并其地則非特四萬二千之利也五子曰善桓公曰諾乃誡大將曰百人之長必為之朝禮千人之長必拜而送之降兩級其有親戚者必遺之酒四石肉四鼎其無親戚者必遺其妻子酒三石肉三鼎行教半嵗父教其子兄教其弟妻諫其夫曰見其若此其厚而不死列陳可以反于鄉乎桓公終舉兵攻萊戰于莒必市里鼓旗未相望衆少未相知而萊人大遁故遂破其軍兼其地而虜其將此素賞之計也管子輕重乙桓公問管子曰請問乘馬管子對曰國無儲在令公曰何為國無儲在令管子對曰一農之量壤百畝也春事二十五日之內桓公曰何謂春事二十五日之內管子曰日至六十日而陽凍釋七十日而隂凍釋隂凍釋而藝稷百日不藝稷故春事二十五日之內耳也今君立扶臺五衢之衆皆作君過春而不止民失其二十五日則五衢之內阻棄之地也起一人之繇百畝不舉起十人之繇千畝不舉起百人之繇萬畝不舉起千人之繇十萬畝不舉春已失二十五日而尚有起夏作是春失其地夏失其苗秋起繇而無止此之謂穀地數亡穀失其時君之衡藉而無止民食什五之穀則君已藉九矣有衡求弊焉此盜暴之所以起刑罰之所以衆也隨之以暴謂之內戰桓公曰善哉策乘馬之數求盡也彼王者不奪民時故五穀興豐五穀興豐則士輕祿民簡賞彼善為國者使農夫寒耕暑耘力歸于上女勤于纎微而織歸于府者非怨民心傷民意高下之策不得不然之理也公曰為之奈何管子曰虞國得策乘馬之數矣公曰何謂策乘馬之數管子曰百畝之夫豫之策率二十七日為子之春事資子之幣春秋子穀大登國穀之重去分謂農夫曰幣之在子者以為穀而廩之州里國穀之分在上國穀之重再十倍謂逺近之縣里邑百官皆當奉器械備曰國無幣以穀准幣國穀之擴一切什九還穀而應穀國器皆資無藉于民此有虞之策乘馬也管子臣乘馬桓公曰糴賤寡人恐五穀之歸于諸侯寡人欲為百姓萬民藏之為此有道乎管子曰今者夷吾過市有新成囷京者二家君請式壁而聘之公曰諾行令半嵗萬民聞之舍其作業而為囷京以藏菽粟五穀者過半公問管子曰此其故何也管子曰成囷京者二家君式壁而聘之名顯于國中國中莫不聞是民上則無功顯名于百姓也功立而名成下則實其囷京上以給上為名一舉而名實俱在也民何為也桓公問于管子曰請問王數之守終始可得聞乎管子曰正月之朝穀始也日至百日黍秫之始也九月斂實平麥之始也管子問于桓公敢問齊方于幾何里桓公曰方五百里管子曰隂雍長城之地其于齊國三分之一非穀之所生也龍夏其于齊四分之一也朝夕外之所墆齊地者五分之一非穀之所生也然則吾非託食之主耶桓公遽然起曰然則為之奈何管子對曰動之以言潰之以辭可以為國基且君幣籍而務則賈人獨操國趣君穀籍而務則農人獨操國固君動言操辭左右之流君獨因之物之始吾已見之矣物之終吾已見之矣物之賈吾已見之矣管子曰長城之陽魯也長城之隂齊也三敗殺君二重臣定社稷者吾此皆以孤突之地封者也故山地者山也水地者澤也薪芻之所生者斥也公曰託食之主及吾地亦有道乎管子對曰守其三原公曰何謂三原管子對曰君守布則籍于麻十倍其賈布五十倍其賈此數也君以織籍籍于糸未為糸籍糸撫織再十倍其賈如此則云五穀之籍是故籍于布則撫之糸籍于穀則撫之山籍于六畜則撫之術籍于物之終始而善御以言公曰善管子輕童丁桓公問于管子曰吾欲籍于臺雉何如管子對曰此毁成也吾欲籍于樹木管子對曰此伐生也吾欲籍于六畜管子對曰此殺生也吾欲藉于人何如管子曰此隱情也桓公曰然則吾何以為國管子對曰惟官山海為可耳公曰何謂官山海管子曰海王之國謹正鹽莢公曰何謂正鹽莢管子曰十口之家十人食鹽百口之家百人食鹽終月大男食鹽五升少半大女食鹽三升少半吾子食鹽二升少半此其大厯也鹽百升而釡令鹽之重升加分彊釡五十也升加一彊釡百也升加二彊釡二百也鍾二千十鍾二萬百鍾二十萬千鍾二百萬萬乘之國人數問口千萬也禺莢之商日二百萬十日二千萬一月六千萬萬乘之國正九百萬也月人三十錢之籍為錢三千萬今吾非籍之諸君吾子而有二國之籍者六千萬使君施令曰吾將籍于諸君吾子則必囂號今給之鹽莢則百倍歸于上人無以避此者數也今鐵官之數曰一女必有一針一刀若其事立耕者必有一耒一耜一銚若其事立行服連軺輦者必有一斤一鋸一錐一鑿若其事立不爾而成事者天下無有今針之重加一也三十針一人之籍刀之重加六五六三十五刀一人之籍也耜鐵之重加七三耜鐵一人之籍也其餘輕重皆准此而行然則舉臂勝事無不服籍者公曰然則國無山海不王乎管子曰因人之山海假之名有海之國讐鹽于吾國釡十五吾受而官出之以百我未與共本事也受人之事以重相推此人用之數也管子海王管子輕重甲桓公曰寡人欲籍于室屋管子曰不可是毁成也欲籍于萬民管子曰不可是隱情也欲籍于六畜管子曰不可是殺生也欲籍于樹木管子曰不可是伐生也然則寡人安籍而可管子曰君請籍于鬼神桓公忽然作色曰萬民室屋六畜樹木且不可得籍鬼神乃可得而籍夫管子曰厭宜乘勢事之利得也計議因權事之囿大也王者乘勢聖乘幼與物皆宜公曰行事奈何管子曰昔堯之五吏五官無所食君請立五厲之祭祭堯之五吏春獻蘭秋獻落原魚以為脯鯢以為殽若此則澤魚之正百倍異日則無屋粟邦布之籍此之謂設之以祈祥推之以禮義也然則自足何求于民也桓公曰皮幹筋角之徴甚重重籍于民而貴市之皮幹筋角非為國之數也管子曰請以令高杠柴池使東西不相睹南北不相見公曰諾行事期年而皮幹筋角之徴去分民之籍去分桓公召管子而問曰此何故也管子曰杠池平之時夫妻服簞輕至百里今高杠柴池東西南北不相睹天酸然雨十人之力不能上廣澤遇雨十人之力不可得而恃夫舍牛馬之力無所因牛馬絶罷而相繼死其所者相望皮幹筋角徒豫人而莫之取牛馬之價必坐長而百倍天下聞之必離其牛馬而歸齊若流故高杠柴池所以致天下之牛馬而損民之籍也道若祕云物之所生不若其所聚管子輕重甲管子曰隂王之國有三而齊與在焉公曰此言可得聞乎管子曰楚有汝漢之黃金而齊有渠展之鹽燕有遼東之煮此隂王之國也且楚之有黃金中齊有薔石也茍有操之不工用之不善天下倪而是耳使夷吾得居楚之黃金吾能令農毋耕而食女毋織而衣今齊有渠展之鹽請君伐菹薪煮沸火為鹽正而積之公曰諾十月始正至于正月成鹽三萬六千鍾召管子而問曰安用此鹽而可管子曰孟春既至農事且起大夫無得繕塜墓理宫室立臺榭築墻垣北海之衆無得聚庸而煮鹽若此則鹽必坐長而十倍公曰善行事奈何管子曰請以令糴之梁趙宋衛濮陽彼盡饋食之也國無鹽則腫守圉之國用鹽獨甚公曰諾乃以令使糶之得成金萬一千餘斤桓公召管子而問曰安用金而可管子曰請以令使貢獻出正藉者必以金金坐長而百倍運金之重以衡萬物盡歸于君故此所謂用若挹于河海若輸之給馬此隂王之業管子輕重甲桓公二十年齊伐衛吕覽精諭齊桓公合諸侯衛人後至公朝而與管仲謀伐衛退朝而入衛姬望見君下堂再拜請衛君之罪公曰吾於衛無故子曷為請對曰妾望見君之入也足高氣彊有伐國之志也見妾而有動色伐衛也明日公朝揖管仲而進之管仲曰君舍衛乎公曰仲父安識之管仲曰君之揖朝也恭而言也徐見臣而有慚色臣是以知之公曰善仲父治外夫人治內寡人知終不為諸侯笑矣列女傳齊桓公夫人衛姬衛侯之女公好淫樂姬為之不聽鄭衛之音公用管仲寧戚行霸道諸侯皆朝而衛獨不至公與管仲謀伐衛罷朝還閨衛姬望見桓公脫簮珥解環珮下堂再拜曰願請衛之罪公曰吾與衛無故姬何請耶對曰妾聞之君有三色顯然喜樂容貌淫樂者鐘鼓酒食之色寂然清靜意氣沉抑者喪禍之色忿然充滿手足矜動者攻伐之色今妾望君舉趾高色厲音揚意在衛也是以請之公許諾明日朝管仲趨進曰君之涖朝也恭而氣下言則徐無伐國之志是釋衛也公曰善乃立衛姬為夫人曰夫人治內仲父治外寡人雖愚足以立于世矣據此則桓公不伐衛矣然桓公之二十年齊伐衛衛人敗績已見春秋詩傳桓公好內衛姬針之賦雞鳴詩說衛姬勸桓公以勤政故作此詩詩序云哀公荒淫怠慢故陳賢妃夙夜警戒相成之道焉未按詩序與詩傳詩說不同而齊無哀公亦知所指齊桓公與管仲謀伐莒謀未發而聞于國公怪之曰與仲父謀伐莒謀未發而聞于國其何故也管仲曰國必有聖人也桓公曰嘻日之役者有執跖􅲘而上視者意者其是耶乃令復役無得相代少頃東郭牙至牙一作垂管仲曰此必是已乃令賔者延之而上分級而立管子曰子耶言伐莒者對曰然管子曰我不言伐莒子何故言伐莒對曰臣聞君子善謀小人善意臣竊意之也管子曰子何以意之對曰臣聞君子有三色顯然善樂者鐘鼓之色也湫然清淨者衰絰之色也艴然充盈手足矜者兵革之色也日者臣視二君之在堂上也艴然充盈手足矜者此兵革之色也君呿而不􅀈呿開也􅀈閉也所言者莒也君舉臂而指所當者莒也臣竊以慮諸侯之不服者其惟莒乎臣故言之吕覽重言說苑權謀又韓詩卷四略又又管子小問同而東郭牙作東郭郵跖􅲘作席食管子小問楚伐莒莒君使人求救于齊桓公將救之管仲曰君勿救也公曰其故何也管仲對曰臣與其使者言三辱其君顔色不變臣使官無滿其禮三強其使者爭之以死莒君小人也君勿救桓公果不救而莒亡齊桓公將欲征伐甲兵不足令有罪者出犀甲一㦸有輕罪者贖以金分訟而不勝者出一束箭百姓皆說乃矯箭為矢鑄金為刃以伐不義而征無道遂霸天下淮南子汜論桓公曰卒伍定矣事已成矣吾欲從事于諸侯其可乎管子對曰未可若軍令則吾既寄諸內政矣夫齊國寡甲兵吾欲輕重罪而移之于甲兵公曰為之奈何管子對曰制重罪入以甲兵犀脅二㦸輕罪入蘭盾鞈革二㦸小罪入以金鈞分宥薄罪入以半鈞無坐抑而訟獄者正三禁之而不直則入一束矢以罰之美金以鑄戈劔矛㦸試諸狗馬惡金以鑄斤斧鉏夷鋸􅠁試諸木土桓公曰甲兵大足矣吾欲從事于諸侯可乎管仲對曰未可治內者未具也為外者未備也故使鮑叔牙為大諫王子城父為將弦子旗為理寧戚為田隰朋為行曹宿孫處楚商容處宋季勞處魯徐開封處衛匽尚處燕審友處晉又遊士八千人奉之以車馬衣裘多其資糧財幣足之使出周游于四方以號召收求天下之賢士飾玩好使鬻之諸侯以觀其上下之所貴好擇其沈亂者而先政之公曰內外定矣可乎管子對曰未可鄰國未吾親也公曰親之奈何管子對曰審吾彊埸反其侵地正其封界毋受其貨財而美為皮幣以極聘俯于諸侯以安四鄰則鄰國親我矣桓公曰甲兵大足矣吾欲南伐何主管子對曰以魯為主反其侵地常潛使海于有弊渠彌于河渚綱山于有牢房元齡曰使海于有弊言或遇水災教令泄于海使有弊盡也渠彌禆海之名言髙山大海可為險阻也綱山依山為綱而有牢國桓公曰吾欲西伐何主管子對曰以衛為主反其侵地吉臺原姑與㭍里㭍國語作漆使海于有弊渠彌于有渚綱山于有牢桓公曰吾欲北伐何主管子對曰以燕為主反其侵地柴夫吠狗使海于有弊渠彌于有渚綱山于有牢四鄰大親既反其侵地正其封疆地南至于岱隂西至于濟北至于海東至于紀隨地方三百六十里三嵗治定四嵗教成五嵗兵出有教士三萬人革車八百乘管子小匡桓公謂管仲曰吾欲伐大國之不服者奈何管仲對曰先愛四封之內然後可以惡境外之不善者先定卿大夫之家然後可以危鄰之敵國是故先王必有置也然後有廢也必有利也然後有害也管子小問桓公曰天下之國莫强于越今寡人欲北舉事孤竹離枝恐越人之至為此有道乎管子對曰君請遏原流大夫立沼池令以矩游為樂則越人安敢至桓公曰行事奈何管子對曰請以令隱三川立員都立大舟之都大身之都有深淵壘十仭令曰能游者賜千金未能用金千齊民之游水不避吳越桓公終北舉事于孤竹離枝越人果至隱曲薔以水齊管子有扶身之士五萬人以待戰于曲薔大敗越人此之謂水豫管子輕重甲遠春秋之時越荒小侯耳胡曰莫強且伐孤竹而備越何其逺也按經傳無敗越事二十三年山戎伐燕燕告急于齊齊桓公救燕遂伐山戎至于孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮于燕于是分溝割燕君所至與燕命燕君復修召公之政納貢于周如成康之時諸侯聞之皆從齊史齊世家說苑貴德齊桓公北伐山戎氏其道過燕燕君逆而出境桓公問管仲曰諸侯相逆固出境乎管仲曰非天子不出境桓公曰然則燕君畏而失禮也寡人不道而使燕君失禮乃割燕君所至之地以與燕君諸侯聞之皆朝于齊管子小問桓公北伐孤竹未至卑耳之溪十里闟然止瞪然視援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右袪衣走馬前疾寡人大惑管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山神見且走馬前疾道也袪衣示前有水也右袪衣示從右方涉也至卑耳之溪有贊水者曰從左方涉其深及冠從右方涉其深至膝若右涉其大濟桓公立拜管仲于前曰仲父之聖至此寡人之抵罪也久矣管仲對曰夷吾聞之聖人先知無形今已有形而後知之臣非聖也善承教也又說苑辨物語小異地志永平府西北有孤竹三塜雙子山長君之塜團子山次君之塜馬鞭山少君之塜傳曰國人立其中子蓋次君也伯夷名墨允字公信諡夷叔齊名墨智字叔達諡齊管仲隰朋從桓公而伐孤竹春往冬反迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仭有水乃掘地遂得水以管仲之聖隰朋之智至其所不知不難師于老馬與蟻今人不知其愚而師聖人之智不亦過乎韓子說林博物志史補齊桓公出因與管仲故道自燉煌西涉流沙往外國沙石千餘里中無水時則有沃流處人莫能知皆乘駱駝駱駝知水脈遇其處輒停不肯行以足踏地人于其踏處掘之輒得水說苑權謀桓公將伐山戎使請助于魯魯君進羣臣而謀皆曰師行數千里入蠻夷之地必不反矣于是魯君許助之而不行齊已伐山戎孤竹而欲移兵于魯管仲曰不可諸侯未親今又伐逺而還誅近鄰鄰國不親非霸王之道君所得山戎之寶器中國之所鮮也不可以不進周公之廟桓公乃分山戎之寶獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至說苑指武齊桓公北伐山戎氏請兵于魯魯不與桓公怒將攻之管仲曰不可我已刑北方諸侯矣今又攻魯毋乃不可乎魯必事楚是我一舉而失兩也桓公曰善乃輟攻魯桓公曰魯梁之于齊也千穀也蜂螫也齒之有唇也今吾欲下魯梁何行而可管子對曰魯梁之民俗為綈公服綈令左右服之民從而服之公因令齊勿敢為必仰于魯梁則是魯梁釋其農事而作綈矣公曰諾即為服于泰山之陽十日而服之管子告魯梁之賈人曰子為我致綈千匹賜子金三百斤什至而金三千金則是魯梁不賦于民而財用足也魯梁之君聞之則教其民為綈十三月而管子令人之魯梁魯梁郭中之民道路揚塵十步不相見絏繑而踵相隨車轂齺騎連伍而行管子曰魯梁可下矣公曰奈何對曰公宜服帛率民去綈閉關毋與魯梁通使公曰諾後十月管子令人之魯梁魯梁之民餓餒相及應聲之正無以給上魯梁之君即令其民去綈修農穀不可三月而得魯梁之人糴十百齊糴十錢二十四月魯梁之民歸齊者十分之六三年魯梁之君請服管子輕重戊桓公二十七年魯湣公母曰哀姜桓公女弟也哀姜淫于魯公子慶父慶父弒湣公哀姜欲立慶父魯人更立釐公桓公召哀姜殺之史齊世家狄人伐邢齊救之遷邢于夷儀補桓公二十八年齊盟江黃于貫補江黃小國也在江淮之間近楚楚數侵伐欲滅取之江人黃人患楚桓公方存亡繼絶救危扶傾為陽穀之㑹貫澤之盟與諸侯將伐楚江人黃人慕桓公之義來盟于貫澤管仲曰江黃逺齊而近楚若楚伐之而不能救無以宗諸侯不可受也桓公不聽遂與之盟及管仲死楚人伐江滅黃桓公不能救君子閔之新序卷九衛文公有狄亂告急于齊齊率諸侯城楚丘而立衛君補管子霸形初宋伐把狄伐邢衛桓公不救裸體紉胸稱疾紉猶摩也召管仲曰寡人有千嵗之食而無百嵗之夀今有疾病姑樂可乎管子曰諾于是令縣鐘磬之榬陳歌舞竽瑟之樂日殺數十牛者數旬羣臣進諫曰宋伐把狄伐邢衛君不可不救公曰寡人疾病姑樂乎且彼非伐寡人之國也伐鄰國也子無事焉宋已取把狄已拔邢衛矣桓公起行筍簴之間管子從至大鐘之西桓公南面而立管仲北向對之大鐘鳴桓公視管仲曰樂夫仲父管子曰此臣之所謂哀非樂也臣聞之古之言樂于鐘磬之間者不如此言脫于口而令行乎天下游鐘磬之間而無四面兵革之憂今君之事言脫于口令不得行于天下在鐘磬之間而有四面兵革之憂此臣之所謂哀非樂也桓公曰善于是伐鐘磬之縣併歌舞之樂伐謂斷也併猶除也宫中虛無人不令人守掌之桓公曰寡人已伐鐘磬之縣併歌舞之樂矣請問所始于國將為何行管子曰宋伐把狄伐邢衛而君不之救也臣請以慶以不救為慶臣聞之諸侯爭于彊者勿與分于彊今君何不定三君之處哉公曰諾因命以車百乘卒千人以緣陵封把車百乘卒千人以夷儀封邢車五百乘卒五千人以楚丘封衛公曰寡人已定三君之居處矣今又將何行管子對曰臣聞諸侯貪于利勿與分于利君何不發虎豹之皮文錦以使諸侯令諸侯以縵帛鹿皮報公曰諾于是以虎豹皮文錦使諸侯諸侯以縵帛鹿皮報令始行于天下二十九年桓公與夫人蔡姬戲船中蔡姬習水蕩公公懼止之不止出船怒歸蔡姬弗絶蔡亦怒嫁其女桓公聞而怒興師往伐三十年春齊桓公率諸侯伐蔡蔡潰遂伐楚楚成王興師問曰何故涉吾地管仲對曰昔召康公命我先君太公曰五侯九伯若實征之以夾輔周室賜我先君履東至海西至河南至穆陵北至無棣楚貢包茅不入王祭不共是以來責昭王南征不復是以來問楚王曰貢之不入有之寡人罪也敢不共乎昭王之出不復君其問之水濵齊師進次于陘夏楚王使屈完將兵扞齊齊師退次召陵桓公矜屈完以其衆屈完曰君以道則可若不則楚方城以為城江漢以為溝君安能進乎乃與屈完盟而去過陳陳袁濤塗詐齊令出東方覺秋齊伐陳是嵗晉殺太子申生史齊世家桓公三十年伐楚至于召陵補初蔡女為桓公妻桓公與之乘舟夫人蕩舟桓公大懼禁之不止怒而出之乃且復召之因復更嫁之桓公大怒將伐蔡仲父諫曰夫以寢席之戲不足以伐人之國功業不可冀也請無以此為規也桓公不聽仲父曰必不得已楚之菁茅不貢于天子三年矣君不如舉兵為天子伐楚楚服因還襲蔡曰余為天子伐楚而蔡不以兵從也桓公從之遂滅蔡韓子內儲左管子大匡桓公與宋夫人飲船中夫人蕩船而懼公公怒出之宋受而嫁之蔡侯明年公怒告管仲曰欲伐宋管仲曰不可臣聞內政不修外舉事不濟公不聽果伐宋諸侯興兵而救宋大敗齊師公怒歸告管仲曰請修兵革吾士不練吾兵不實諸侯故敢救吾讎內修兵革管仲曰不可齊國危矣內奪民用士勸于勇外亂之本也外犯諸侯民多怨也為義之士不入齊國君為不義故義士不入齊安得無危鮑叔曰公必用夷吾之言公不聽乃令四封之內修兵關市之征侈之分乃遂用以勇授祿朱長春曰蕩船事國異年異人異梅生曰宋夫人左傳作蔡姬宋受而嫁之蔡侯左傳作蔡人嫁之非宋嫁與蔡也事見魯僖公三年乃齊桓公二十九年也按齊桓踐祚之二年宋從齊伐魯三年宋再伐魯四年宋有宋萬之亂而閔公弒五年春㑹于北杏以平宋亂冬㑹于柯始及魯平宋人背北杏之㑹六年春齊率陳曹以伐宋取成于宋而還自此征伐㑹盟魯宋無不共命安得有齊伐宋而諸侯救如大匡所云者管子霸形楚欲吞宋鄭而畏齊號令于國中曰寡人之所明于人君者莫如齊公所賢于人臣者莫如管仲明其君而賢其臣寡人願事之誰能為我交齊者寡人不愛封侯之賞焉于是楚國之士皆抱其重寶幣帛以事齊桓公之左右無不受重寶幣帛者于是桓公召管仲曰寡人聞之善人者人亦善之今楚王之善寡人一甚矣寡人不善將拂于道仲父何不遂交楚哉管子對曰不可楚人攻宋鄭燒焫熯焚鄭地使城壞者不得復築也屋之燒者不得復葺也令人有喪雌雄居室如鳥鼠處穴要宋田夾塞兩川使水不得東流東山之西水深滅垝四百里而後可田也楚欲吞宋鄭久矣思人衆兵强而能害己者必齊故欲以文克齊而以武取宋鄭也楚取宋鄭而不禁是失宋鄭也禁之則是又不信于楚也知失于內兵困于外非善舉也公曰善然則奈何管子對曰請興兵而南存宋鄭而令曰無攻楚言與楚王遇至于遇上而以鄭城及宋水為請楚若許則是我以文令也不許則遂以武令焉公曰善于是遂興兵而南存宋鄭與楚王遇于召陵之上而令于遇曰毋貯粟毋曲隄毋擅廢適子無置妾以為妻因以鄭城與宋水為請于楚楚人不許遂退七十里而舍使軍人城鄭南之地立百代城焉取其百代不毁曰自此而北至于河者鄭自城之而楚不敢墮也東發宋田夾兩川使水復東流而楚不敢塞也遂南伐踰方城濟于汝水望汶山南致楚越之君而西伐秦北伐狄南存晉公反位已霸修鐘磬而復樂管子曰此臣之所謂樂也三十四年桓公㑹諸侯于洮以定王室立王太子鄭是為襄王補三十五年夏㑹諸侯于葵丘周襄王使宰孔賜桓公文武胙彤弓矢大路命無拜桓公欲許之管仲曰不可乃下拜受賜史齊世家管子小匡葵丘之㑹天子使宰孔致胙于桓公曰余一人之命有事于文武使宰孔致胙且有後命曰以爾自卑勞謂爾伯舅毋下拜桓公召管仲而謀管仲對曰為君不君為臣不臣亂之本也桓公曰余乘車之㑹三兵車之㑹六九合諸侯一匡天下北至于孤竹山戎穢貉拘秦夏西至流沙西虞南至吳越巴牂牱不庾雕題黑齒荆夷之國莫違寡人之命而中國卑我昔三代之命者其異于此乎管子對曰夫鳯凰鸞鳥不降而鷹隼鴟梟豐庶神不格守龜不兆握粟而筮者屢中時雨甘露不降飄風暴雨數臻五穀不蕃六畜不育而蓬蒿藜􅀢竝興夫鳯凰之文前德義後日昌昔人之受命者龍龜假河出圖雒出書地出乘黃今三祥未有見者雖曰受命毋乃失諸侯乎桓公懼出見客曰天威不違顔咫尺小白承天子之命而毋下拜恐顛蹶于下以為天子羞遂下拜登受賞服大路龍旗九斿渠門赤旗天子致胙于桓公而拜受天下諸侯稱順焉三十八年周襄王弟帶與戎翟合謀伐周齊使管仲平戎於周周欲以上卿禮管仲管仲頓首曰臣陪臣安敢三讓乃受下卿禮以見史齊世家三十九年周襄王弟帶來奔齊齊使仲孫請王為帶謝襄王怒弗聽史齊世家秋復㑹諸侯于葵丘益有驕色周使宰孔㑹諸侯頗有叛者晉侯病後遇宰孔宰孔曰齊侯驕矣第無行從之是時周室微唯齊楚秦晉為强晉初與㑹獻公死國內亂秦穆公辟逺不與中國㑹盟楚成王初收荆蠻有之夷狄自置惟獨齊為中國㑹盟而桓公能宣其德故諸侯賔㑹于是桓公稱曰寡人南伐至召陵望熊山北伐山戎離枝孤竹西伐大夏涉流沙束馬懸車登太行至卑耳山而還諸侯莫違寡人寡人兵車之㑹三乘馬之㑹六九合諸侯一匡天下昔三代受命有何以異于此乎吾欲封泰山禪梁父管仲固諫不聽乃說桓公以逺方珍怪物至乃得封桓公乃止史齊世家史記封禪書齊桓公既霸㑹諸侯于葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封泰山禪云云云云山在梁父東虙羲封泰山虙義一作黃帝禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭亭亭山在巨平顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束車懸馬上卑耳之山南伐至召陵登熊耳山以望江漢兵車之㑹三乘車之㑹六九合諸侯一匡天下諸侯莫違我昔三代之命亦何以異乎于是管仲知桓公不可窮以辭因設之以事曰古之封禪鄗上之黍鄗音霍所以為盛江漢之間一茅三脊所以為藉東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳯凰麒麟不來嘉穀不生而蓬蒿藜莠茂鴟鳥數至而欲封禪毋乃不可乎于是桓公乃止又管子封禪尚書中候桓公謂管仲曰寡人日暮仲父年艾吾欲封禪泰山何如管仲曰昔者聖王功成道格符瑞出乃封泰山今比目之魚不至鳯麟不臻不可封也晉獻公卒里克殺奚齊卓子秦穆公以夫人入公子夷吾為晉君桓公于是討晉亂至高梁使隰朋立晉君還史齊世家桓公曰寡人欲西朝天子而賀獻不足為此有數乎管子對曰請以令城隂里使其牆三重而門九襲因使玉人刻石而為璧尺者萬泉八寸者八千七寸者七千圭中四千瑗中五百壁之數已具管子西見天子曰敝邑之君欲率諸侯而朝先王之廟觀于周室請以令使天下諸侯朝天王之廟觀于周室者得以彤弓石璧不以彤弓石璧者不得入天子許之曰諾號令于天下天下諸侯載黃金珠玉五穀文采布帛輸齊以收石璧石璧流而之天下天下財物流而之齊故國八嵗而無籍隂里之謀也管子輕重丁桓公曰天子之養不足號令賦于天下則不信諸侯為此有道乎管子對曰江淮之間有一茅而三脊毋至其本名之曰菁茅請使天子之吏環封而守之天子封于太山禪于梁父號令于天下諸侯曰諸從天子封于太山禪于梁父者必抱菁茅一束以為禪籍不如令者不得從天子下諸侯載其黃金爭秩而走江淮之菁茅坐長而十倍其價一束而百金故天子三日即位天下之金四流而歸周若流水故周天子七年不求賀獻者菁茅之謀也管子輕重丁管子小匡諸侯多沈亂不服于天子于是桓公東救徐州分吳半存魯蔡陵割越地南據宋鄭征伐楚濟汝水踰方地望文山使貢絲于周室成周反胙于隆嶽荆州諸侯莫不來服中救晉公禽狄王敗胡貉破屠何而騎寇始服北伐山戎制令支斬孤竹而九夷始聽海濵諸侯莫不來服西征攘白狄之地遂至于西河方舟投柎乘桴濟河至于石沈縣車束馬踰大行與卑耳之貉拘秦夏西服流沙西虞而秦戎始從故兵一出而大功十二東夷西戎南蠻北狄中諸侯莫不賔服與諸侯飾牲為載書以誓要于上下薦神然後率天下定周室大朝諸侯于陽穀故兵車之㑹六乘車之㑹三九合諸侯一匡天下甲不解壘兵不解翳韜無弓服無矢寢武事行文道以朝天子桓公憂天下諸侯魯有夫人慶父之亂而二君弒死國絶無後桓公聞之使髙子存之男女不淫馬牛選具執玉以見請為關內之侯而公不使也狄人攻邢桓公築夷儀以封之男女不淫馬牛選具執玉以見請為關內之侯而公不使也狄人攻衛衛人出旅于曹桓公城楚丘封之其畜已散亡故桓公豫之繫馬三百天下諸侯稱仁焉于是天下之諸侯知桓公之為已勒也是以歸之也譬若市人桓公知諸侯之歸已也故使輕其幣而重其禮諸侯以疲馬犬羊為幣齊以良馬報諸侯以縷帛布鹿皮四分以為幣齊以文錦虎豹皮報諸侯之使垂櫜而入攟載而歸故鈞之以愛致之以利結之以信示之以武是故天下小國諸侯既服莫之敢倍而歸之喜其愛而貪其利信其仁而畏其武桓公知天下小國諸侯之多與已也于是又大施忠焉可為憂者為之憂可為謀者為之謀可為動者為之動伐談萊而不有也諸侯稱仁焉通齊國之魚鹽東萊使關市譏而不征㙻而不稅以為諸侯之利諸侯稱寬焉築蔡鄢陵培夏靈父丘以衛戎狄之地所以禁暴于諸侯也築五鹿中牟鄴蓋與社丘以衛諸夏之地所以示勸于中國也教大成是故天下之于桓公逺國之民望如父母近國之民從如流水故行地滋逺得人彌衆懷其文而畏其武故殺無道定周室天下莫之能圉武事立也定三革偃五兵朝服以濟河而無怵惕焉文事勝也是故大國之君慙愧小國諸侯比附大國之君事如臣僕小國之君歡如父母夫然故大國之君不尊小國諸侯不卑大國之君不驕小國諸侯不懾於是列廣地以益狹地損有財以與無財周其君子不失成功周其小人不失成命夫如是居處則順出則有成功不稱動甲兵之事以遂文武之迹于天下桓公能假其羣臣之謀以益其智也其相曰夷吾大夫曰寧戚隰朋賔須吾鮑叔牙因此五子者度義光德繼法紹終以遺後嗣貽孝昭穆大霸天下名聲廣裕不可掩也則唯有明君在上察相在下也春秋戰國異辭卷十六
