body:
  text: 春秋戰國異辭卷二十六右春坊右諭德陳厚耀撰宋史宋世家微子啓者殷帝乙之首子而紂之庶兄也紂既立不明淫亂于政微子數諌紂不聽微子曰父子有骨肉而臣主以義屬故父有過子三諌不聽則隨而號之人臣三諌不聽則其義可以去矣于是太師少師乃勸微子去遂行周武王伐紂克殷微子乃持其祭器造于軍門武王乃釋微子復其位如故武王封紂子武庚祿父以續殷祀使管叔蔡叔傅相之武王崩成王少周公旦代行政當國管蔡疑之乃與武庚作亂周公既承成王命誅武庚殺管叔放蔡叔乃命微子啓代殷後奉其先祀作微子之命以申之國于宋微子仁賢故殷之餘民甚戴愛之微子啓卒立其弟衍是為微仲微仲卒子宋公稽立宋公稽卒子丁公申立丁公申卒子湣公共立湣公共卒弟煬公熙立煬公即位湣公子鮒祀弒煬公而自立曰我當立是為厲公厲公卒子釐公舉立釐公十七年周厲王出奔彘二十八年釐公卒子惠公覸立惠公四年周宣王即位三十年惠公卒子哀公立哀公元年卒子戴公立戴公戴公二十九年周幽王為犬戎所殺秦始列為諸侯三十四年戴公卒子武公司空立史宋世家武公武公生女為魯惠公夫人生魯桓公十八年武公卒子宣公力立史宋世家宣公宋宣公有太子與夷宣公病十九年讓其弟和曰父死子繼兄死弟及天下通義也我其立和和亦三讓而受之宣公卒弟和立是為穆公史宋世家穆公穆公九年病召大司馬孔父謂曰先君宣公舍太子與夷而立我我不敢忘我死必立與夷也孔父曰羣臣皆願立公子馮穆公曰毋立馮吾不可以負宣公于是使馮出居于鄭八月穆公卒兄宣公子與夷立是為殤公君子曰宋宣公可謂知人矣立其弟以成義然卒其子復享之史宋世家殤公殤公元年衛公子州吁弒其君完自立欲得諸侯使告於宋曰馮在鄭必為亂可與我伐之宋許之與伐鄭至東門而還二年鄭伐宋以報東門之役其後諸侯數來侵伐九年大司馬孔父嘉妻好出道遇太宰華督督說目而觀之督利孔父妻乃使人宣言國中曰殤公即位十年耳而十一戰民苦不堪皆孔父為之我且殺孔父以寧民十年華督攻殺孔父取其妻殤公怒遂弒殤公而迎穆公子馮于鄭而立之是為莊公以上史宋世家莊公莊公元年華督為相九年執鄭之祭仲要以立突為鄭君祭仲許竟立突十九年莊公卒子湣公捷立以上史宋世家湣公七年齊桓公即位九年宋水魯使臧文仲往弔水湣公自罪曰寡人以不能事鬼神政不修故水臧文仲善此言此言乃公子子魚教湣公也史宋世家宋大水魯人弔之曰天降淫雨害於粢盛延及君地以憂執政使臣敬弔宋人應之曰寡人不仁齊戒不修使民不時天加以災又遺君憂拜命之辱孔子聞之曰宋國其庶幾乎昔桀紂不任其過其亡也忽焉成湯文王知任其過其興也勃焉過而改之是不過也宋人聞之乃夙興夜寐弔死問疾戮力宇內三嵗年豐政平諱詩卷三人左傳莊十一年宋閔公九年宋大水魯弔之宋公御說應之云云孔子語作臧文仲語說苑君道宋大水魯人弔之曰天降淫雨溪谷滿盈延及君地以憂執政使臣敬弔宋人應之曰寡人不佞齊戒不謹邑封不修使人不時天加以殃又遺君憂拜命之辱君子聞之曰宋國其庶幾乎問曰何謂也昔者夏桀殷紂不任其過其亡也忽焉成湯文武知任其過其興也勃焉夫過而改之是猶不過也故曰其庶幾乎宋人聞之夙興夜寐早朝晏退弔死問疾戮力宇內三年嵗豐政平十年宋伐魯戰于乘丘魯生虜宋南宫萬宋人請萬萬歸宋史宋世家宋閔公臣長萬以勇力聞萬與魯戰師敗為魯所獲囚之宫中數月歸之宋宋閔公博婦人在側公謂萬曰魯君孰與寡人美萬曰魯君美天下諸侯惟魯君耳宜其為君也魯君莊公閔公矜婦人妬因言曰爾魯之囚虜爾何知萬怒遂搏閔公頰齒落于口絶吭而死仇牧聞君死趨而至遇萬于門攜劍而叱之萬臂擊仇牧而殺之齒著于門闔新序卷八同與公羊略十一年秋湣公與南宫萬獵因博爭行湣公怒辱之曰始吾敬若今若魯虜也萬有力病此言遂以局殺湣公于蒙澤大夫仇牧聞之以兵造公門萬搏牧牧齒著門闔死因殺太宰華督乃更立公子游為君諸公子奔蕭公子禦說奔亳萬弟南宫牛將兵圍亳冬蕭及宋之諸公子共擊殺南宫牛弒宋新君游而立湣公弟禦說是為桓公宋萬奔陳宋人請以賂陳陳人使婦人飲之醇酒以革褁之歸宋宋人醯萬史宋世家桓公桓公二年諸侯伐宋至郊而去三年齊桓公始霸以上史宋世家宋桓姬閔衛之破也賦泉水詩序申公詩說宋桓夫人憫衛之破而作詩序云衛女嫁于諸侯父母終思歸寧而不得故作是詩狄滅衛在宋桓公二十一年宋桓姬之媵和其小君之賦賦竹竿子貢詩傳申公詩說宋桓夫人之媵和泉水而作詩序云衛女思歸也適異國而不見答思而能以禮者也三十年桓公病太子茲父讓其庶兄目夷為嗣桓公義太子意竟不聽史宋世家說苑立節宋茲父為桓公太子桓公有後妻子曰公子目夷公愛之兹父為公愛之也欲立之請于公曰請使目夷立臣為之相兄以佐之公曰何故也對曰臣之舅在衛愛臣若終立則不可以往絶迹于衛是背母也且臣自知不足以處目夷之上公不許彊以請公公許之將立公子目夷目夷辭曰兄立而弟在下是其義也今弟立而兄在下不義也不義而使目夷為之目夷將逃乃逃之衛茲父從之三年桓公有疾使人召兹父若不來是使我以憂死也兹父乃反公復立之以為太子然後目夷歸三十一年春桓公卒太子兹父立是為襄公以其庶兄目夷為相未葬而齊桓公㑹諸侯于葵丘襄公往㑹史宋世家襄公宋襄公母歸于衛思而不止作河廣之詩詩序同詩傳略申公詩說宋桓夫人生襄公而出歸于衛襄公即位夫人思之而義不可往故作此詩宋襄公葬其夫人醯醢百甕曽子曰既曰明器矣而又實之檀弓上襄公七年宋地霣星如雨與雨偕下六鶂退蜚風疾也八年齊桓公卒宋欲為盟㑹十二年春宋襄公為鹿上之盟以求諸侯於楚楚人許之公子目夷諫曰小國爭盟禍也不聽秋諸侯㑹宋公盟于盂目夷曰禍其在此乎君欲己甚何以堪之於是楚執宋襄公以伐宋冬㑹于亳以釋宋公子魚曰禍猶未也十三年夏宋伐鄭子魚曰禍在此矣秋楚伐宋以救鄭襄公將戰子魚諫曰天之棄商久矣不可冬十一月襄公與楚成王戰於泓楚人未濟目夷曰彼衆我寡及其未濟擊之公不聽己濟未陳又曰可擊公曰待其已陳陳成宋人擊之宋師大敗襄公傷股國人皆怨公公曰君子不困人於厄不鼓不成列子魚曰兵以勝為功何常言與必如公言即奴事之耳又何事戰為楚成王已救鄭鄭享之去而取鄭二姬以歸叔瞻曰成王無禮其不沒乎為禮卒于無别有以知其不遂霸也是年晉公子重耳過宋襄公以傷于楚欲得晉援厚禮重耳以馬二十乘以上史宋世家韓非子宋襄公與楚人戰涿谷上襄公曰今楚未濟而擊之害義請使楚畢涉成陳而後鼓士進之右司馬曰君不愛宋民腹心不完特為義耳公曰不反列且行法右司馬反列楚人已成列撰陳矣公乃鼓之宋人大敗公傷股三日而死此乃慕自親仁義之禍夫必恃人主之自躬親而後民聽從是則將令人主耕以為上服戰鴈行也民乃肯耕戰則人主不泰危乎而人臣不泰安乎韓子外儲左宋襄公與楚人戰於涿谷上宋人既成列矣楚人未及濟右司馬購强請擊之公弗聽宋人大敗公傷股三日而死與左氏小異十四年夏襄公病傷于泓而竟卒子成公王臣立以上史宋世家成公三年倍楚盟親晉以有德于文公也四年楚成王伐宋宋告急于晉五年晉文公救宋楚兵去九年晉文公卒十六年秦穆公卒十七年成公卒成公弟禦殺太子及大司馬公孫固而自立為君宋人共殺禦而立成公少子杵臼是為昭公以上史宋世家約左氏文昭公昭公四年宋敗長翟緣斯於長丘史宋世家七年楚莊王即位史宋世家九年昭公無道國人不附昭公弟鮑革一本無革字賢而下士先襄公夫人欲通于公子鮑不可乃助之施于國昭公出獵夫人王姬使衛伯攻殺昭公弟鮑革立是為文公史宋世家約左氏文韓子內儲下戴歡為宋太宰皇喜重於君二人爭事而相害也皇喜遂殺宋母而奪其政按左傳宋維昭公遇弒歡即昭公時人皇喜未見傳韓子內儲上戴歡宋太宰夜使人曰吾聞數夜有乘輼車至李史門者謹為我伺之使人報曰不見輼車見有奉笥而與李史語者有間李史受笥文公文公元年晉率諸侯伐宋責以弒君聞文公定立乃去二年昭公子因文公母弟須與武繆戴莊桓之族為亂文公盡誅之出武繆之族史宋世家約左氏文四年春鄭命楚伐宋宋使華元將鄭敗宋囚華元華元之將戰殺羊以食士其御羊羮不及故怨馳入鄭軍故宋師敗得囚華元宋以兵車百乘文馬四百匹贖華元未盡入華元亡歸宋十四年楚莊王圍鄭鄭伯降楚楚復釋之十六年楚使過宋宋有前仇執楚使九月楚莊王圍宋史宋世家楚莊王圍宋宋文公十七年五月不解宋城中急無食華元乃夜私見楚將子反子反告莊王王問城中何如曰析骨而炊易子而食莊王曰誠哉言我軍亦有二日糧以信故遂罷兵去史宋世家異與左氏小二十二年文公卒子共公瑕立始厚葬君子譏華元不臣矣史宋世家墨子宋文君鮑之時有臣曰􅀈觀辜固嘗從事於厲株子杖楫出與言曰觀辜是何陸璧之不滿度量酒醴粢盛之不淨潔也犧牲之不全肥春夏秋冬選失時豈女為之與意鮑為之與觀辜曰鮑幼弱在荷繦之中鮑何與識焉官臣觀辜特為之株子舉楫而槀之殪於壇上共公共公元年華元善楚將子重又善晉將欒書兩盟晉楚史宋世家共公十三年卒華元為右師魚石為左師司馬唐山攻殺太子肥欲殺華元華元奔晉魚石止之至河乃還誅唐山乃立共公少子成是為平公史宋世家約左氏文平公平公三年楚共王拔宋之彭城以封宋左師魚石史宋世家四年諸侯共誅魚石而歸彭城於宋史宋世家三十五年楚公子圍弒其君自立為靈王史宋世家宋之野人耕而得玉獻之司城子罕子罕不受野人請曰此野人之寶也願相國為之賜而受之也子罕曰子以玉為寶我以不受為寶吕覽異寶五又新序卷七十詳左襄十年即宋平之八年韓非子宋之鄙人得璞玉而獻之子罕平公十八年子罕不受鄙人曰此寶也宜為君子器不宜為細人用子罕曰爾以玉為寶我以不受子玉為寶是鄙人欲玉而子罕不欲玉故曰欲不欲不貴難得之貨新序故宋國之長者子罕非無寶也所寶者異也今以百金與搏黍以示兒子兒子必取搏黍矣以和氏之璧與百金以示鄙人鄙人必取百金矣以和氏之璧與道德之至言以示賢者賢者必取至言矣其知彌精其取彌精其知彌粗其取彌粗子罕之所寶者至矣士尹池為荆使於宋司城子罕觴之南家之牆犨犨一作擁於前而不直犨猶出曲出子罕堂前也西家之潦經其宫而不止止禁也士尹池問其故司城子罕曰南家工人也為鞔者也吾將徙之其父曰吾恃為鞔以食三世矣今徙之宋國之求鞔者不知吾處也吾將不食願相國之憂吾不食也為是故吾弗徙也西家高吾宫痺潦之經吾宫也利故弗禁也士尹池歸荆王適興兵而攻宋士尹池諫於荆王曰宋不可攻也其主賢其相仁賢者能得民仁者能用人荆國攻之其無功而為天下笑乎故釋宋而攻鄭宋在三大萬乘之間南有楚北有晉東有齊子罕之時無所相侵邊境四益相平公元公景公以終其身吕覽召類說苑君道司城子罕相宋謂宋君曰國家之危定百姓之治亂在君行之賞罰也賞當則賢人勸罰當則姦人止賞罰不當則賢人不勸姦人不止姦邪比周欺上蔽主以爭爵祿不可不愼也夫賞賜讓與者人之所好也君自行之刑罰殺戮者人之所惡也臣請當之君曰善子主其惡寡人行其善吾知不為諸侯笑矣於是宋君行賞賜而與子罕刑罰國人知刑戮之威專在子罕也大臣親之百姓附之居期年子罕逐逐一作却其君而專其政又淮南子道應韓子外儲右司城子罕謂宋君曰慶賞賜豫者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之宋君曰諾於是出威令誅大臣君曰問子罕也於是大臣畏之細民歸之處期年子罕殺宋君而奪其政殺一作劫韓子二柄子罕謂宋君曰夫慶賞賜豫者民之所喜也君自行之殺戮刑罰者民之所惡也臣請當之於是宋君失刑而子罕用之故宋君見劫此條屢見按子罕是宋賢臣即樂善也安得有弒君之事豈别有子罕耶宋司城子罕之貴子韋也入與共食出與同衣司城子罕亡子韋不從子罕來復召子韋而貴之左右曰君之善子韋也君亡不從來又復貴之君獨不愧於君之忠臣乎子罕曰吾唯不能用子韋故至于亡今吾之得復也尚是子韋之遺德餘教也吾故貴之且我之亡也吾臣之削迹拔樹以從我者奚益于吾亡哉說苑尊賢陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反告于晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也孔子聞之曰善哉覘國乎詩云凡民有喪扶服救之雖微晉而已天下其孰能當之檀弓下宋宫災平公三十三年伯姬在焉伯姬魯女宋共公夫人也公薨伯姬執節守貞有司請曰火將至矣伯姬曰吾聞婦人夜出不見傅母不下堂逮乎火而死其保母自傷行遲悼伯姬之遇災援琴而歌曰嘉名潔兮行彌彰托節鼓兮令躬喪歍欽何辜遇斯殃嗟嗟奈何罹斯殃琴苑要録琴苑要録伯姬逮乎火而死諡共姫其保母自傷行遲悼伯姬之遇災援琴而歌曰嘉名潔兮行彌彰託節鼓兮令躬喪歍欽何辜遇斯殃嗟嗟奈何罹斯殃名伯姫引列女傳伯姬者魯宣公之女成公之妹也嫁於宋共公三月廟見當行夫婦之道伯姬以共公不親迎故不肯聽命宋人告魯魯使大夫季文子如宋致命於伯姬十年共公卒伯姬寡至景公時伯姬嘗遇夜失火遂逮於火而死諸侯聞之莫不悼痛以為死者不可以生財物猶可復故相與聚㑹于澶淵償宋之所喪春秋善之四十四年平公卒子元公佐立史宋世家元公八年宋火十年元公母信詐殺諸公子大夫華向氏作亂楚平王太子建來奔見諸華氏相攻亂去如鄭十五年元公為魯昭公避季氏居外為之求入魯行道卒子景公頭曼立史宋世家約左氏文景公宋桓司馬有寶珠抵罪出亡桓司馬桓魋抵當也王使人問珠之所在曰投之池中魯哀十四年桓魋欲害公公知之攻魋魋出奔衛公則宋景公也春秋時宋未稱王此云王使人者誤於是竭池而求之無得魚盡死吕覽必已景公十六年魯陽虎來奔己復去史宋世家二十五年孔子過宋宋司馬桓魋惡之欲殺孔子孔子微服去史宋世家三十年曹倍宋又倍晉宋伐曹晉不救遂滅曹史宋世家三十六年齊田常弒簡公史宋世家三十七年楚惠王滅陳熒惑守心心宋之分野也景公憂之司星子韋曰可移於相景公曰相吾之股肱曰可移於民景公曰君者待民曰可移於嵗景公曰嵗饑民困吾誰為君子韋曰天高聽卑君有君人之言三熒惑宜有動於是候之果徙三度史宋世家宋景公之時景公三十七年熒惑守心公懼召子韋而問焉曰熒惑在心何也子韋曰熒惑者天罰也心者宋之分野也禍當於君雖然可移於宰相公曰宰相所與治國家也而移死焉不祥子韋曰可移於民公曰民死寡人將誰為君乎寧獨死子韋曰可移於嵗公曰嵗害則民饑民饑必死為人君而殺其民以自活也其誰以我為君乎寡人之命固盡己子無復言矣子韋還走北面載拜曰臣敢賀君天之處髙而聽卑君有至德之言三天必三賞君今夕熒惑其三徙舍君延年二十一嵗公曰子何以知之對曰有三善言必有三賞星必徙三舍舍行七星星一徙當一年三七二十一臣故曰君延年二十一嵗臣請伏於陛下以候之熒惑不徙臣請死公曰可是夕熒惑果徙三舍吕覽制樂南又新序卷四又淮子道應宋景公時大旱三年卜以人祀乃雨公下堂頓首曰吾所以求雨者為人今殺人不可將自當之言未卒天大雨方千里莊子宋景公之世有善星文者許以上大夫之位處於層樓延閣之上以望氣象設以珍食施以寶衣其食則有渠滄之鳬煎以桂髓叢庭之鷃蒸以蜜沫淇漳之鱧脯以青茄九江珠穟爨以蘭蘇華清夏潔灑以纎縞華清井之澄華也饔人視時而叩鐘伺食以擊盤言每食而輒擊鐘磬也懸四時之衣春夏金玉為飾秋冬以翡翠為溫燒異香于臺上忽有野人披草負笈扣門而進曰聞國君愛隂陽之術好象緯之祕請見景公乃延之崇堂語則及未來之兆次及已往之事萬不失一夜則觀星望氣晝則執算披圖不服寶衣不甘竒食景公謝曰今國喪亂微君則何以輔之曰德之不均亂將及矣修德以來人則天應之祥人美其化景公曰善遂賜姓曰子氏名之曰韋即子韋也拾遺記周靈王韋漢書陰陽家宋司星子三篇闕子宋景公使弓工為弓九年來見公曰為弓亦遲矣對曰臣不得見公矣臣之精盡于弓矣獻弓而歸三日而死公張弓登臺東面而射矢踰孟霜之山集彭城之東其餘力逸徑飲羽于石梁初邢史子臣謂宋景公曰從今以往五祀日臣死自臣死後五年五月丁亥吳亡以後五祀八月辛巳君薨邢史子臣至死日朝見景公夕而死後吳亡景公懼思邢史子臣之言將死日乃逃于瓜圃遂死焉求得已蟲矣古文瑣語六十四年宋景公卒公子特攻殺太子而自立是為昭公昭公者元公之曾庶孫也昭公父公孫糾糾父公子褍秦褍音端褍秦即元公少子也景公殺昭公父糾故昭公怨殺太子而自立史宋世家異與左氏全昭公宋昭公出亡謂其御曰吾知所以亡矣御者曰何哉昭公曰吾被服而立侍御者數十人無不曰吾君麗者也吾發言動事朝臣數百人無不曰吾君聖者也吾外內不見吾過失是以亡也於是改操易行安義行道不出二年而美聞於宋宋人迎而復之諡為昭韓詩卷六新書卷之七宋昭公出亡至于境喟然嘆曰嗚呼吾知所以亡矣吾朝臣千人發政舉吏無不曰吾君聖者侍御者數百人被服而立無不曰吾君麗者吾外內不聞吾過吾是以至此吾困宜矣于是革心易行衣苴布食􅀈餕晝學道而夕講之二年美聞于宋宋人車徒迎而復位卒為賢君諡為昭公昭公四十七年卒子悼公購由立史宋世家悼公子思年十六適宋宋大夫樂朔與之言學焉朔曰尚書虞夏數四篇善也下此以訖于秦費效堯舜之言耳殊不如也子思答曰事變有極正自當耳假令周公堯舜不更時異處其書同矣樂朔曰凡書之作欲以喻民也簡易為上而乃故作難知之辭不亦繁乎子思曰書之意兼復深奧訓詁成義古人所以為典雅也曰昔魯委巷亦有似君之言者伋答之曰道為智者傳茍非其人道不傳矣今君何似之甚也樂朔不悅而退曰孺子辱吾其徒曰魯雖以宋為舊然世有讐焉請攻之遂圍子思宋君聞之不待駕而救子思子思既免曰文王困於羑里作周易祖君屈於陳蔡作春秋吾困於宋可無作乎於是撰中庸之書四十九篇孔叢子上悼公八年卒子休公田立史宋世家休公休公二十三年子辟公辟兵立史宋世家璧索隱云紀年作桓侯兵則辟兵諡桓也又莊子云桓侯行未出城門其前驅呼辟蒙人止之辟公辟公三年卒子剔成立史宋世家剔成墨翟宋大夫善守禦公輸般為雲梯之械將攻宋墨子見之乃解帶為城以堞為械九設攻城之機墨子九却之公輸般攻械盡墨子守有餘公輸屈曰吾知所以拒我者吾不言楚王問之墨子曰公輸意過欲殺臣然臣弟子禽滑等三百人在宋楚乃不攻宋也墨子公輸般為高雲梯欲以攻宋公輸魯般之號也在楚為楚設攻宋之具墨子聞之自魯往裂裳裹足日夜不休十日十夜而至於郢楚都也見楚王曰臣北方之鄙人也聞大王將攻宋信有之乎王曰然墨子曰必得宋乃攻之乎亡其不得宋且不義猶攻之乎王曰必不得宋且有不義必一作既則曷為攻之墨子曰甚善臣以宋必不可得王曰公輸般天下之巧人也已為攻宋之械矣墨子曰請令公輸般試攻之臣請試守之於是公輸般設攻宋之械墨子設守宋之備九攻之墨子九却之不能入故荆輟不攻宋吕覽愛類修又淮南子務語稍别公輸子削竹木為鵲成而飛之三日不下自以為至巧墨子謂曰子之為鵲也不如匠之為車轄也須㬰豎三寸之木而任五十石之重故利于人謂之巧不利于人謂之拙墨子史記荀卿傳蓋墨翟宋之大夫善守禦為節用或曰並孔子時或曰在其後漢書墨家墨子七十一篇墨子子墨子游公尚過於越公尚過說越王越王大說謂公尚過曰先生茍能使子墨子於越而教寡人請裂故吳之地方五百里以封子墨子公尚過許諾遂為公尚過束車五十乘以迎子墨子於魯曰吾以夫子之道說越王越王大說謂過曰茍能使子墨子至於越而教寡人請裂故吳之地方五百里以封子子墨子謂公尚過曰子觀越王之志何若意越王將聽吾言用吾道則翟將往量腹而食度身而衣自比於羣臣奚能以封為哉抑越不聽吾言不用吾道而我往焉則是我以義􅀈也鈞之􅀈亦於中國耳何必於越哉墨子為木鳶三年而成蜚一日而敗弟子曰先生之巧至能使木鳶飛墨子曰不如為車輗者巧也用咫尺之木不費一朝之事而引三十石之任致逺力多久於嵗數今我成鳶三年成蜚一日而敗惠子聞之曰墨子大巧巧為輗拙為鳶韓子外儲左淮南子墨子服役者百八十人皆可使赴火蹈刃死不還踵化之所致也尸子繞梁之鳴許史鼓之非不樂也墨子以為傷義是弗聽也新語墨子皇皇席不及暖按鄒陽書云邑號朝歌而墨子回車顔氏家訓云顔子不舍未知孰是風俗通公輸般之水見蠡曰見汝形遂出頭般以足畫圖之蠡引閉其戶終不可得開般遂施之門户云人閉藏如是故周密矣世本公輸般作石磑水經注忖留神嘗與魯班語班令其人出忖留曰我貌獰醜卿善圖物容我不能出班于是拱手與言曰出頭見我忖留乃出首班於是以腳畫地忖留覺之便還沒水故置其像於水唯背以上立水上述異記天姥山南峯昔魯班刻木為鶴一飛七百里後放於北山西峯上東北巗海畔有大石龜俗云魯班所作夏則入海冬復止於山魯班刻石為禹九州圖七里洲中有魯班刻木蘭為舟論衡魯般為母作木車馬木人御者機關備具載母其上一驅不還遂失其母鄒陽上梁王書宋信子冉之言囚墨翟注子冉子罕也墨翟被囚之故未詳剔成四十一年剔成弟偃攻襲剔成剔成敗奔齊偃自立為宋君史宋世家皆索隱曰戰國䇿吕氏春秋以偃諡曰康王康王偃君偃十一年自立為王魯鄙人遺宋元王閉鄙人小人也閉結不解者也一云元王即康王元王號令於國有巧者皆來解閉人莫之能解兒說之弟子請往解之乃能解其一不能解其一且曰非可解而我不能解也固不可解也問之魯鄙人鄙人曰然固不可解也我為之而知其不可解也今不為而知其不可解也是巧於我故如兒說之弟子者以不解解之也吕覽君守繹史諸子稱宋元君或曰元王春秋有宋元公非王也未詳所指宋有蘭子者以技干宋元君宋元君召而使見其技以雙枝長倍其身屬其脛並趨並馳弄七劍迭而躍之五劍常在空中元君大驚立賜金帛又有能燕戲者聞之復以干元君元君大怒曰昔有異技干寡人者技無庸適值寡人有歡心故賜金帛彼必聞此而進復望吾賞拘而擬戮之經月乃放列子說符宋元君將畫圖衆史皆至受揖而立䑛筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣槃礴裸槃礴箕踞也裸與祼同君曰可矣是真畫者也莊子田子方有見宋王者錫車十乘以其十乘驕稚莊子莊子曰河上有家貧恃緯蕭而食者緯蕭以織葦為業者其子沒於淵得千金之珠其父謂其子曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉言得禍非小今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子為韲粉矣莊子列禦寇宋人有曹商者為宋王使秦其往也得車數乘王說之益車百乘反於宋見莊子曰夫處窮閭厄巷困窘織屨槁項黃馘者商之所短也一悟萬乘之主而從車百乘者商之所長也莊子曰秦王有病召醫破癰潰痤者得車一乘䑛痔者得車五乘所治愈下得車愈多子豈治其痔耶何得車之多也子行矣莊子列禦寇宋元君夜半而夢人被髮窺阿門曰豫自宰路之淵豫為清江使河伯之所漁者余且得豫元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰漁何得對曰且之網得白龜焉箕圜五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑽而無遺策仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑽而無遺策不能避刳腸之患如是則知有困神有所不及也莊子外物史記龜䇿列傳宋元王問博士衛平曰寡人夢一丈夫衣𤣥繡之服而乘輜車曰我為江使于河而豫且得我而不能去身在患中莫可告語王有德義故來訴之是何物也衛平乃援式而起對曰昔壬子宿在牽牛使者當囚衣𤣥服而乘輜車其名為龜王可使人問而求之王曰善哉按此本莊子寓言而褚生以補史傳衍至二千八百餘言文雖竒傑而實迂誕今悉刪之存其數語宋王謂其相唐鞅曰宋王康王也寡人所殺戮者衆矣而羣臣愈不畏其故何也唐鞅對曰王之所罪盡不善者也罪不善善者故為不畏王欲羣臣之畏也不若無辨其善不善而時罪之若此則羣臣畏矣居無幾何宋君殺唐鞅吕覽淫辭惠盎見宋康王康王蹀足謦咳疾言曰寡人之所說者勇有力也不說為仁義者也客將何以教寡人惠盎對曰臣有道於此使人雖有勇刺之不入雖有力擊之弗中大王獨無意耶王曰善此寡人之所欲聞也惠盎曰夫刺之不入擊之不中此猶辱也臣有道于此使人雖有勇弗敢刺雖有力不敢擊大王獨無意耶王曰善此寡人之所欲知也惠盎曰夫不敢刺不敢擊非無其志也臣有道於此使人本無其志也大王獨無意耶王曰善此寡人之所願也惠盎曰夫無其志也未有愛利之心也臣有道於此使天下丈夫女子莫不歡然皆欲愛利之此其賢於勇有力也居四纍之上大王獨無意耶四纍謂卿大夫士及民四等也王曰此寡人之所欲得也惠盎對曰孔墨是也孔丘墨翟無地而為君無官而為長天下丈夫女子莫不延頸舉踵而願安利之今大王萬乘之主也誠有其志有孔墨之志則四境之內皆得其利矣其賢於孔墨也逺矣宋王無以應惠盎趨而出宋王謂左右曰辨矣客之以說服寡人也盎一作孟昭惠盎宋人惠施族也康王宋公曾孫辟公之子名侵立十一年僣號稱王四十五年大為不道齊湣公伐滅之吕覽順說又列子黃帝又淮南子道應稍節數語齊攻宋齊湣王攻宋滅之宋王使人侯齊冦之所至使者還曰齊冦近矣國人恐矣左右皆謂宋王曰此所謂肉自生蟲者也以宋之彊齊兵之弱惡能如此宋王因怒而詘殺之詘枉也又使人往視齊冦使者報如前宋王又怒詘殺之如此者三其後又使人往視齊冦近矣國人恐矣使者遇其兄曰國危甚矣若將安適其弟曰為君視齊冦不意其近而國人恐如此也今又私患鄉之先視齊冦者皆以冦之近也報而死今也報其情死以齊冦至之情實告宋王必誅死也不報其情又恐死不以冦至之情報而設備齊冦至殺人是又恐死將若何其兄曰如報其情有且先夫死者死於是報於王曰殊不知齊冦之所在國人甚安王大喜左右皆曰鄉之死者宜矣王多賜之金冦至王自投車上馳而走此人得以富於他國吕覽壅塞列仙傳琴高趙人也以鼓琴為宋康王舍人行涓彭之術浮遊冀州涿郡之間二百餘年後辭入涿水中取龍子與諸弟子期曰皆潔齊待於水旁設祠果乘赤鯉來出坐祠中旦有萬人觀之留一月餘復入水去韓憑為宋康王舍人妻何氏美地志憑妻息氏封丘人王欲之捕舍人築青陵臺何氏作烏鵲歌以見志曰南山有烏北山張羅烏自高飛羅當奈何烏鵲雙飛不樂鳯凰妾是庶人不樂宋王又答其夫曰其雨淫淫河大水深日出當心康王得書以問蘇賀賀曰雨淫淫愁且思也河水深不得往來也日當心有死志也俄而憑自殺妻乃陰腐其衣王與登臺遂自投臺下左右攬之衣不中手而死遺書于帶曰王利其生不利其死願以尸骨賜憑而合葬王怒弗聽使里人埋之冡相望也宿昔有文梓木生于二冢之端旬日而大合抱屈體相就根交于下枝錯于上又有鴛鴦雌雄各一恆棲樹上交頸悲鳴宋人哀之遂號其木曰相思樹搜神記宋王築為蘖帝鴟夷血高懸之宋王康王也蘖當作䡾帝當作臺以鴟夷之革囊血於臺上高懸之以象天也射著甲胄從下血墜流地左右皆賀曰王之賢過湯武矣湯武勝人今王勝天賢不可以加矣宋王大悅飲酒室中有呼萬嵗者堂上盡應堂上已應堂下盡應門外庭中聞之莫敢不應不適也吕覽過理宋君偃十一年自立為王東敗齊取五城南敗楚取地三百里西敗魏軍乃與齊魏為敵國盛血以韋囊懸而射之命曰射天淫于酒婦人羣臣諫者輒射之于是諸侯皆曰桀宋宋其復為紂所為不可不誅告齊伐宋王偃立四十七年齊湣王與魏楚伐宋殺王偃遂滅宋而三分其地史宋世家宋康王時有爵生鸇於城之陬使史占之曰小而生巨必霸天下康王大喜於是滅滕伐薛取淮北之地乃愈自信欲霸之亟成故射天笞地斬社稷而焚之曰吾伏天地鬼神罵國老之諫者為無頭之棺以示有勇剖傴者之背鍥朝涉之脛而國人大駭齊聞而伐之民散城不守王逃于郳侯之館得病而死新序卷四新書卷六雜録齊攻宋宋使臧孫子南求救于楚楚大悅許救之甚歡臧孫子憂而反其御曰索救而得今子有憂色何也臧孫子曰宋小而齊大夫救小宋而患於大齊此人之所憂也而楚王說必以堅我也我堅而齊敝楚之所利也臧孫子乃歸齊人拔五城於宋而楚救不至韓子說林宋王與齊仇也築武宫謳癸倡行者止觀築者不倦王聞召而賜之對曰臣師射稽之謳又賢于癸王召射稽使之謳行者不止勸力之歌過者不顧築者知倦用力深也王曰其謳不如癸美何也對曰王試度其功癸四板射稽八板功多也擲其堅癸五寸射稽二寸入深也夫良藥苦于口而智者勸而飲之知其入而己已疾也忠言拂于耳而明主聽之知其可以致功也韓子外儲左宋康公攻阿屠單父宋無康公疑即康王成公趙曰始吾不自知以為在千乘則萬乘不敢伐在萬乘則天下不敢圖今趙在阿而宋屠單父則是趙無以自立也且往誅宋誅刺之也趙遂入宋三月不得見或曰何不因鄰國之使而見之成公趙曰不可吾因鄰國之使而刺之則使後世之使不信荷節之信不用皆曰趙使之然也不可或曰何不因羣臣道徒處之士而刺之成公趙曰不可吾因羣臣道徒處之士而刺之則後世之忠臣不見信辨士不見顧皆曰趙使之然也不可吾聞古之士怒則思理危不忘義必將正行以求之耳朞年宋康公病死成公趙曰廉士不辱名信士不惰行今吾在阿宋屠單父是辱名也事誅宋王朞年不得是惰行也吾若是而生何面目而見天下之士遂立槁于彭山之上說苑立節晉楚之君相與為好㑹于宛丘之上宋使人往覘之晉楚大夫曰趣以見天子禮見于吾君我為見子焉使者曰冠雖敝宜加其上履雖新宜居其下周室雖微諸侯末之能易也師升宋城臣猶不更臣之服也揖而去之諸大夫瞿然遂以諸侯之禮見之說苑奉使白圭謂宋令尹曰令一作大君長自知政公無事矣今君少主也而務名不如令楚賀君之孝也則君不奪公位公位一作大后之事而大敬重公則公常用宋矣韓子說林下宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐今不識先後不識今闔室毒之謁史而卜之弗占謁巫而禱之弗禁謁醫而攻之弗已魯有儒生自媒能治之華子之妻子以居産之半請其方儒生曰此固非卦兆之所占非祈請之所禱非藥石之所攻吾試化其心變其慮庶幾有瘳乎於是試露之而求衣饑之而求食幽之而求明儒生欣欣然告其子曰疾可已也然吾之方密傳世不以告人試屏左右獨與居室七日從之莫知其所施為也而積年之疾一朝都除華子既悟乃大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然不知天地之有無今頓識既往數十年來存亡得失哀樂好惡擾擾萬緒起矣吾恐將來之存亡得失哀樂好惡之亂吾心如此也須㬰之忘可復得乎子貢聞而異之以告孔子孔子曰此非汝所及乎顧謂顔回記之列子周穆王兒說宋人善辨者也持白馬非馬也持白馬非馬之說服齊稷下之辨者乘白馬而過關則顧白馬之賦故籍之虛辭則能勝一國考實按形不能謾于一人韓子外儲左昭績昧醉寐而亡其裘宋君曰醉足以亡裘乎對曰桀以醉亡天下而康誥曰毋彛酒彛酒常酒也常酒者天子失天下匹夫失其身韓子說林上宋太宰貴而主斷季子將見宋君梁子聞之曰語必可與太宰三坐乎不然將不免季子因說以貴主而輕國韓子說林下宋人好善者三世不解家無故而黑牛生白犢以問先生曰此吉祥以享鬼神居一年其父無故而盲牛又復生白犢其父又復使其子以問先生其子曰前聽先生言而失明今又復問之奈何其父曰聖人之言先忤而後合其事未究固試往復問之其子又復問先生先生曰此吉祥也復以享鬼神歸致命其父其父曰行先生之言也居一年其子又無故而盲其後楚攻宋圍其城當此之時易子而食析骸而炊丁壯者死老病童兒皆上城牢守不下楚王大怒城已破諸城守者皆屠之此父子獨以盲故得無乘城軍罷圍解則父子俱視淮南子人間訓生又列子說符先作孔子宋崇門之巷人服喪而毁甚瘠上以為愛親舉以為官師明年人之毁死者十餘人韓子內儲上韓子曰子之服親喪者為愛之也而尚可以賞勸也况君上之於民乎高陽魋將為室問匠人匠人對曰未可也木尚生加塗其上必將撓高陽宋邑因以為氏魋或作應宋大夫也撓弱曲也以生材任重塗今雖成後必敗高陽魋曰不然夫木枯則益徑塗乾則益輕以徑材任輕塗今雖惡後必善匠人無辭以對受令而為之室之始成竘然善也其後果敗竘高壯也間淮南子人訓别又吕覽類宋之丁氏家無井而出汲常一人居外及其家穿井告人曰吾穿井得一人有聞而傳之者曰丁氏穿井得一人國人道之聞之於宋君宋君令人問之於丁氏丁氏對曰得一人之使非得一人於井中也吕覽察傳宋人有以玉為楮葉者三年而成鋒殺莖柯毫芒繁澤亂之楮葉之中而不可别也此人遂以巧食祿于宋邦列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣列子說符作又韓子喻老玉象宋有富人天雨牆壞其子曰不築將必有盜其鄰人之父亦云暮而果大亡其財其家甚智其子而疑鄰人之父韓子說難宋鮑蘇之妻曰女宗養姑甚謹鮑蘇仕衛三年而取外妻女宗不妬愈謹因往來者請問其夫賂遺外妻甚厚女宗之姒謂曰可以去矣女宗曰何故姒曰夫人既有所好子何留乎女宗曰婦人一醮不改夫死不嫁執麻枲治絲繭織紝組紃以供衣服以事夫室徹漠酒醴羞饋食以事舅姑以專一為貞以善從為順豈有専夫室之好也夫禮天子十二諸侯九卿大夫三士二今吾夫誠士也有二不亦宜乎且婦人有七見去夫無一去義七去之道妬正為首淫僻竊盜長舌驕侮無子惡疾皆在其後吾姒不教吾以居室之禮而反欲使吾為見棄之行將安所用此遂不聽事姑愈謹宋公聞之表其閭號曰女宗列女傳宋有田夫常衣黂緼以過冬黂音焚麻之牡者暨春東作自暴于日不知天下之有廣厦隩室綿纊狐貉顧其妻曰負日之暄人莫知者以獻吾君將有賞博物志宋人有耕者田中有株兔走觸株折頸而死因釋耕守株冀復得兔為宋國所笑韓子五蠧宋之愚人得燕石于梧臺之東歸而藏之以為寶周客聞而觀焉主人齊三日端冕𤣥服以發寶革匱十重緹巾十襲客見之掩口而笑曰此特燕石耳與瓦甓不殊闞子韓非子說林宋之富賈有監止子者與人爭買百金之璞玉因佯失而毁之負其百金而理其毁瑕得千鎰焉事有舉之而有敗而賢其毋舉之者負之時也韓非子外儲說右下王子於期為宋君為千里之逐已駕察手吻文且發矣驅而前之輪中繩引而郤之馬掩跡拊而發之彘逸出於竇中馬退而卻策不能進前也馬駻而走轡不能止也韓非子右傳宋崇門之巷人服喪而毁甚瘠上以為慈愛於親舉以為官師明年人之所以毁死者嵗十餘人子之服親喪者為愛之也而尚可以賞勸也况君上之於民乎吕氏春秋宋有澄子者亡緇衣求之塗見婦人衣緇衣援而弗舍欲取其衣曰今者我亡緇衣婦人曰公雖亡緇衣此實吾所自為也澄子曰子不如速與我衣昔吾所亡者紡緇也今子之衣襌緇也以襌緇當紡緇子豈不得哉春秋戰國異辭卷二十六
