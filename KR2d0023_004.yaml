body:
  text: 春秋戰國異辭卷二右春坊右諭德陳厚耀撰周敬王敬王元年晉人入敬王子朝自立敬王不得入居澤四年晉率諸侯入敬王于周子朝為臣左傳云子朝奔楚皇覽云子朝冡在南陽西鄂縣今西鄂朝氏自謂子朝後也諸侯城周十六年子朝之徒復作亂敬王奔于晉十七年晉定公遂入敬王于周以上史周本紀敬王二十八年殺其大夫萇𢎞周劉氏與晉范氏世為婚姻𢎞事劉氏故與范氏趙鞅以為討周人殺𢎞通鑑前編資𢎞蜀巾人叔向之讒萇𢎞也為萇𢎞書謂叔向曰子為我謂晉君所與君期者時可矣何不亟以兵來因佯遺其書周君之庭而急去行周以萇𢎞為賣周也乃誅萇𢎞韓子內儲下吕覽必已篇萇𢎞矢心王室而王不能用且殺𢎞以悅趙鞅𢎞死藏其血三年而為碧以殺之不當其罪也說苑權謀叔向之欲殺萇𢎞也數見萇𢎞于周因佯遺書曰萇𢎞謂叔向曰子起晉國之兵以攻周吾廢劉氏而立單氏劉氏請之君曰此萇𢎞也乃殺之萇𢎞忠于王晉趙鞅殺之周人傷之賦有兔詩傳說同詩詩序云桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生作免爰老子修道德其學以自隱無名為務居周久之見周之衰乃遂去至關關令尹喜曰子將隱矣彊為我著書于是老子乃著書上下篇言道德之意五千餘言而去莫知其所終或曰老萊子亦楚人也著書十五篇言道家之用與孔子同時列仙傳曰關令喜者周大夫也善內學星宿服精華隱德行仁時人莫知老子西遊喜見其氣知真人當過候物色而迹之果得老子老子亦知其竒為著書與老子俱之流沙之西服具勝實莫知其所終亦著書九篇名關尹子列異傳云老子西遊關令尹喜望見有紫氣浮關而老子果乘青牛而過也蓋老子百有六十餘嵗或言二百餘嵗以其修道而養夀也史老子傳髙士傳老子李耳字伯陽陳人也生于殷時為周柱下史好養精氣貴接而不施轉為守藏史積八十餘年史記云二百餘年時稱為隱君子諡曰聃仲尼至周見之知其聖人乃師之後周德衰乃乘青牛車去入于秦敬王元年也過西關關令尹喜望氣先知乃物色遮候之已而老子果至乃强使著書作道德經五千餘言為道家之宗以其年老故號其書為老子拾遺録老子當周之末居山與世人絶迹惟有黃髮友五人手杖青笻之杖出入室中與老子談神仙傳老子姓李名耳字伯陽楚國苦縣賴鄉人也其母感大星而有娠生于李家以李為姓又云其母懷之八十一嵗乃生生時剖其母左腋而出出而白首故謂之老子又云母到李樹下生老子生而能言指李樹曰以此為我姓又有老聃之號老子鶴髮龍顔黃色美眉廣顙長耳大目疏齒方口厚唇額有參牛達理日角月庭鼻純骨雙柱耳有三門足蹈三五手把十文以周武王時為柱下史時俗見其久夀故號之老子所出度世之法九丹八石玉醴金液養性絶榖變化役使鬼神之法本行經云太上老君託胎洪氏之胞凝神瓊胎之府又老子內傳云其母曽見日精下落如流星飛入口中因有娠七十二嵗而生常有五色雲繞其形五行之獸衛其堂於陳國渦水李樹下剖左腋而生又曰頂有日光身濕白血面凝金色舌絡錦文形長一丈二尺齒有四十八受元君神圖寶章變化之方及還丹伏火水汞液金之術凡七十二篇又神仙傳老子將去周而出關以升崑崙關令尹喜占風逆知當有神人來過乃掃道見老子老子知喜命應得道乃停關下以長生之術授之陽子居南之沛老聃西遊于秦邀于郊至于梁而遇老子老子中道仰天而歎曰始以汝為可教今不可也陽子居不答至舍進盥潄巾櫛脫屨户外膝行而前日向者弟子欲請夫子夫子行不間是以不敢今間矣請問其故老子曰而睢雎仰目而盱盱張目而誰與居太白若辱盛德若不足陽子居蹴然變容曰敬聞命矣其往也舍者迎將其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣莊子寓言地志鞏昌府尹喜秦州人函谷關令見紫氣東來謂有真人過果遇老子授以道德經後仙去與老子㑹于蜀賜號文始先生關令內傳關令尹喜周之大夫也母氏嘗晝寢夢天下絳霄流繞其身見長人語令咽之既覺口有盈味及真人生時有雙光若日飛遊其側室內皆明良久不知所在其家陸地自生蓮華光色鮮盛眼有日精姿形長雅垂臂下膝堂堂有天人之貌少好學墳素善于天文祕緯仰看俯察莫不洞察雖鬼神無以匿其真狀老子感焉未至九十日關令登樓四望見東極有紫氣西邁喜曰夫陽氣盡九星宿值合嵗月並王復九十日之外法應有聖人經過京邑至期齊戒其日果見老子乘青牛車來度又周元極極當作王極元極一作無元年嵗在癸丑癸當作乙冬十二月二十五日老子度函谷關關令尹喜先敇門吏曰若有老翁從東來乘青牛薄板車者勿聽過關其日果見老翁乘青牛車求度關關吏入白喜曰諾道今來矣我見聖人矣即帶印綬出迎設弟子之禮老子授喜道德五千言又老子與尹喜登崑崙山金臺玉樓七寶宫殿晝夜光明乃天帝四王之所遊處有珠玉七寶之狀又尹喜共老子西遊省太真王母共食碧桃紫梨玉文之棗其實如瓶又真人遊時各坐蓮花之上一花輒徑十丈顧歡夷夏論老子入關之天竺維衛國國王夫人名曰净妙老子因其晝寢乘日精入妙净口中後年四月八日夜半時剖右脅而生墜地即行七步于是佛道興焉此出𤣥妙內篇經見宋書四十一年楚滅陳孔子卒四十二年敬王崩子元王仁立元王元王八年崩子定王介立定王一作貞王定王定王二十八年崩長子去疾立是為哀王哀王立三月弟叔襲殺哀王而自立是為思王思王立五月少弟嵬攻殺思王而自立是為考王此三王皆定王之子以上史周本紀考王考王元年封弟揭于河南王城也以續周公之職是為西周桓公通鑑前編考王十五年崩子威烈王午立史周本紀威烈王周威王時有匡裕者字子希裕一作俗生而神靈廬于廬山世稱廬君故山亦曰匡廬周景式廬山記地志江西南康府府城西北匡廬山周時匡裕七人結廬隱此故名叠嶂九層崇巖萬仭周五百餘里費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今以一人之身憂世之不治而涕泣不禁是憂河水濁而以泣清之也尸子二十三年九鼎震命韓魏趙為諸侯二十四年王崩子安王驕立安王安王立二十六年崩子烈王喜立烈王烈王二年周太史儋見秦獻公曰獻公十一年見始周與秦國合而别别五百載復合周封非子為附庸邑之秦是始合也及秦襄公始列為諸侯是别之也自秦列為諸侯至昭王五十二年西周君臣獻邑二十六城以入于秦凡五百一十六年是合也云五百舉其大數合十七歲秦紀作七十七而霸王者出焉武王昭王皆霸至始皇而王天下十年烈王崩弟扁立是為顯王以上俱史周本紀顯王西周桓公卒子威公立威公卒子惠公代立復封其少子名班于鞏以奉王號東周惠公世本西周桓公名揭居河南東周惠公名班居洛陽韓子內儲下周太子公子朝其弟公子根甚有寵于君君死遂以東周叛分為兩國括地志史記周顯王二年西周惠公封少子班於鞏為東周其武公為秦所滅正義引據此東周之分在顯王二年即趙世家所謂分周為兩者周本紀無此事是史疏也顯王五年賀秦獻公獻公稱伯九年致文武胙於秦孝公二十五年秦㑹諸侯於周二十六年周致伯於秦孝公三十三年賀秦惠王三十五年致文武胙於秦惠王史周本紀秦師臨周以求九鼎顯王患之以告顔率此事詳國䇿然以顯王為周君謂東周惠公也率曰請救于齊遂說齊王曰秦無道欲興師求周之鼎君臣計不若歸齊即願王圖之齊王悅發師救周秦師罷齊求鼎顔率曰周即獻鼎然不可懷挾提揭不識何塗之從王曰塗于梁率曰梁欲求鼎謀暉臺之下小海之上梁必不出也王曰從楚率曰謀于章華臺之上楚必不出矣齊王乃止春秋後語初晉太史屠黍黍一作餘見晉之亂也見晉公之驕而無德義也以其圖法歸周屠黍晉出公之太史也出公頃公之孫定公之子也史記曰智伯攻出公出公奔齊而道死焉周威公見而問焉考王封其弟於河南為桓公威公桓公之子也曰天下之國孰先亡對曰晉先亡威公問其故對曰臣比在晉也不敢直言示晉公以天妖日月星辰之行多不當曰是何能為又示以人事多不義百姓皆鬱怨曰是何能傷又示以鄰國不服賢良不舉曰是何能害如是是不知所以亡也故臣曰晉先亡居三年晉果亡威公又見屠黍而問焉曰孰次之對曰中山次之威公問其故對曰天生民而令有别有别人之義也所異於禽獸麋鹿也君臣上下之所以立也中山之俗以晝為夜以夜繼日男女切倚固無休息切磨也倚近也無休息晝夜宣淫也淫昏康樂歌謳好悲樂極則繼之以悲也其主弗知惡此亡國之風也臣故曰中山次之居二年中山果亡威公又見屠黍而問焉曰孰次之屠黍不對威公固問焉對曰君次之威公乃懼求國之長者得義蒔義蒔一作錡疇田邑而禮之二人賢者也得史驎趙駢驎一作理駢一作巽以為諫臣去苛令三十九物物事也以告屠黍對曰其尚終君之身乎臣聞之國之興也天遺之賢人與極言之士國之亡也天遺之亂人與善諛之士威公薨肂九月不得葬周乃分而為二下棺置地中謂之肂說吕覽先識人苑權謀周威公問于寧子曰取士有道乎對曰有窮者達之亡者存之廢者起之四方之士則四面而至矣窮者不達亡者不存廢者不起四方之士則四面而畔矣夫城固不能自守兵利不能自保得士而失之必有其間夫士存則君尊士亡則君卑周威公曰士一至如此乎對曰君不聞夫楚平王有士曰楚傒胥丘負容王將殺之出亡之晉晉人用之是為城濮之戰又有士曰苗賁皇王將殺之出亡走晉晉人用之是為鄢陵之戰又有士曰上解于王將殺之出亡走晉晉人用之是為兩堂之戰又有士曰伍子胥王殺其父兄出亡走吳闔閭用之于是興師而襲郢故楚之大得罪於梁鄭宋衛之君猶未遽至于此也此四得罪於其士三暴其民骨一亡其國由是觀之士存則國存士亡則國亡子胥怒而亡之申包胥怒而存之士胡可無貴乎說苑尊賢一漢書儒家寧越篇寧越中牟鄙人也苦耕之勞謂其友曰何為而可以免此苦也友曰莫如學學二十年一作三十年則可以達矣寧越曰請十五嵗一作十嵗人將休吾將不休人將卧吾不敢卧十五嵗而周威公師之說苑建又吕覽本田開之見周威公威公曰吾聞祝腎學生養生也吾子與祝腎遊亦何聞焉田開之曰聞之操拔篲以待門庭亦何聞于夫子威公曰田子無讓寡人願聞之開之曰聞之夫子曰善養生者若牧羊然視其後者而鞭之威公曰何謂也田開之曰魯有單豹者岩居而水飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者髙門縣簿髙門大家也縣簿小户也無不走也行年四十而有內熱之病以死豹養其內而虎食其外毅養其外而病攻其內此二子者皆不鞭其後者也仲尼曰無入而藏無出而陽柴立其中央柴立木偶無心也三者若得其名必極夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者袵席之上飲食之間而不知為之戒者過也祝宗人𤣥端以臨牢策說彘曰汝奚惡死吾將三月㹖汝十日戒三日齊藉白茅加汝肩尻乎雕爼之上則汝為之乎彘謀曰不如食以糠糟而錯之牢策之中自為謀則茍生有軒冕之尊死于腞楯之上聚僂之中則為之腞楯畫盾也聚僂曲薄所以捲聚物者言被刑戮而置于此也為彘謀則去之自為謀則取之所異彘者何也莊子達生張儀蘇秦二人同志好學迭剪髮而鬻之以相養或傭力寫書非聖人之言不讀遇見墳典行途無所題記以墨書掌及股裏夜還而寫之折竹為簡二人每假食于路剝樹皮編以為書帙以盛天下良書嘗息大樹之下假息而寐有一先生問二子何勤苦也儀秦又問之子何國人答曰吾生于歸谷亦云鬼谷鬼者歸也又云歸者谷名也乃謂其術教以干世出俗之辨即探胸內得二卷說書言輔時之事拾遺記周有豪士居鬼谷號為鬼谷先生蘇秦張儀往見之先生曰吾將為二子陳言至道子其齊戒擇日而學後儀秦齊戒而往鬼谷子鬼谷先生隱居韜志居鬼谷山因以為稱蘇秦張儀師之遂立功名先生遺書責之曰二君豈不見河邉之樹乎僕御折其枝波浪蕩其根上無徑尺之隂身被數千之痕此木豈與天地有仇怨所居然也子不見嵩岱之松柏華霍之檀桐乎上枝干于青雲下根通于三泉千秋萬嵗不受斧斤之患此木豈與天地有骨肉哉蓋所居然也袁淑真隱傳蘇秦張儀學縱橫之術于鬼谷先生掘地為坑曰下說令我泣出則能分人君之地秦說鬼谷先生先生泣下霑襟論衡地志河南鬼谷子晉平公時人姓王名詡顔如童居青溪之鬼谷戰國時蘇秦張儀嘗問道三年辭去鬼谷子曰二子輕松喬之永夀貴一旦之浮雲惜哉張儀魏氏餘子也大夫庶子為餘受氏為張將西遊於秦過東周客有語之於昭文君者曰魏氏人張儀材士也將西遊於秦願君之禮貌之也昭文君見而謂之曰聞客之秦寡人之國小不足以留遊客雖然豈必遇哉客或不遇請為寡人一歸也國雖小請與客共之張儀還走北面再拜張儀行昭文君送而資之至於秦留有間惠王說而相之張儀所得於天下者無若文君令秦惠王師之師昭文君逢澤之㑹魏王嘗為御韓王為右秦㑹諸侯於逢澤魏王為昭文君御韓王為之右也名號至今不忘此張儀之力也吕覽報更録異記鬼谷先生者古之真仙也云姓王氏自軒轅之代歷於商周隨老君西化流沙洎周末復還中國居漢濱鬼谷山受道弟子百餘人惟張儀蘇秦不慕神仙好縱橫之術時王綱頽弛諸侯相征陵弱暴寡干戈雲擾二子得志肆唇吻於戰國之中或遇或否或屯或泰以辨譎相髙爭名貪祿無復雲林之志先生遺儀秦書曰二君足下功名赫赫但春到秋不得久茂日既將盡時既將老君不見河邉之樹乎僕馭折其枝波浪激其根此木非與天下人有仇怨所居者然也子不見嵩岱松柏華霍之樹上葉凌青雲下根通三泉上有𤣥狐黑猿下有豹隱龍潜千秋萬嵗不逢斤斧之患此木非與天下人有骨肉蓋所居者然也今二子好雲路之榮慕長久之功輕喬松之永延貴一夕之浮爵痛焉悲夫二君痛焉悲夫二君儀秦答書曰先生秉德含𢎞饑必噉芝英渴必飲玉漿德與神靈齊明與三光同不忘賜書戒以貪昧儀以不敏名聞不昭入秦匡霸欲翼時君刺以河邉喻以深山雖素空暗誠銜斯㫖儀等曰偉哉先生𤣥覽遐鑒興亡皎然二子不能抑志退身甘蓼蟲之樂棲竹葦之巢自掇泯滅悲夫痛哉說苑鬼谷子曰人之不善而能矯之者難矣說之不行言之不從者其辨之不明也既明而不行者持之不固也既固而不行者未中其心之所善也辨之持之明之固之又中其人之所善其言神而珍白而分能入於人之心如此而說不行者天下未嘗聞也此之謂善說鬼谷子鬼谷先生曰蘇秦張儀一體也然其矯尾厲角含吐縱橫儀不如秦是能分人主之地也今本無典略邯鄲之北有蘇大侯者蘇秦往說之大侯送以黃金百鎰其家亟諫曰君侯之與客無故舊而送之百金其說可得聞邪蘇大侯曰客天下辨士也立談之間再奪吾地而復歸之吾地雖小豈直百金耶漢書從橫家蘇子三十一篇名秦張子十篇名儀周顯王四十二年九鼎淪沒泗淵後秦始皇時見于泗水始皇大喜使數千人入水系而行末出龍齒嚙斷其系故泗上為之謡云稱樂大早絶鼎系水經注九史紀周末鼎沒于泗水彭城下秦始皇過彭城齊戒禱祠使千人沒水求之不得四十四年秦惠王稱王其後諸侯皆為王四十八年顯王崩子慎靚王立紀年魏惠成王十一年即顯王九年東周惠公傑夢後元八年即顯王四十二年九鼎淪泗沒於淵慎靚王慎靚王立六年崩子赧王延立王赧時東西周分治王赧徙都西周以上史周本紀赧王周赧王四年濟東有二石髙三尺有餘相從而行入海數百步樂資春秋後傳周赧王負責無以歸之主迫責急乃逃于臺後因名逃責臺責同債政北堂書鈔失注前漢書諸侯王年表第二二周有逃責之臺帝王世紀赧王多負債於民上臺以避之名曰逃債臺雒陽南宫謻臺是也赧王八年秦攻宜陽楚救之而楚以周為秦故將伐之宜陽韓地秦攻而楚救之周為韓出兵而楚疑周為秦因伐周蘇代為周說楚王曰何以周為秦之禍也言周之為秦甚于楚者欲令周入秦也故謂周秦也周秦相近秦欲并周而外睦于周故當時諸侯咸謂周秦周知其不可解必入于秦此為秦取周之精者也為王計者周于秦因善之不于秦亦言善之以疏之于秦周絶于秦必入于郢矣史周本紀秦借道兩周之間將以伐韓周恐借之畏於韓不借畏於秦史厭謂周君曰何不令人謂韓公叔曰秦之敢絶周而伐韓者信東周也公何不與周地發質使之楚秦必疑楚不信周是韓不伐也又謂秦曰韓彊與周地將以疑周於秦也周不敢不受秦必無辭而令周不受是受地於韓而聽於秦史周本紀秦召西周君西周君惡往故令人謂韓王曰秦召西周君將以使攻王之南陽也王何不出兵於南陽周君將以為辭於秦周君不入秦秦必不敢踰河而攻南陽矣史周本紀東周與西周戰韓救西周或為東周說韓王曰西周故天子之國多名器重寶王案兵毋出可以德東周而西周之寶必可以盡矣王赧謂成君史周本紀徐廣曰戰國䇿云韓兵入西周西周令成君辨說求救按徐廣注引戰國䇿一假今本所無且下文亦有脫文也楚圍雍氏韓徴甲與粟於東周東周君恐召蘇代而告之代曰君何患於是臣能使韓毋徴甲與粟於周又能為君得髙都周君曰子茍能請以國聽子代見韓相國曰楚圍雍氏期三月也今五月不能拔是楚病也今相國乃徴甲與粟於周是告楚病也韓相國曰善使者已行矣代曰何不與周髙都韓相國大怒曰吾毋徴甲與粟於周亦已多矣何故與周髙都也代曰與周髙都是周折而入於韓也秦聞之必大怒忿周即不通周使是以弊髙都得完周也曷為不與相國曰善果與周髙都史周本紀三十四年蘇厲謂周君曰秦破韓魏撲師武北取趙藺離石者皆白起也是善用兵又有天命今又將兵出塞攻梁梁破則周危矣君何不令人說白起乎曰楚有養由基者善射者也去柳葉百步而射之百發而百中之左右觀者數千人皆曰善射有一夫立其旁曰善可教射矣養由基怒釋弓扼劔曰客安能教我射乎客曰非吾能教子支左詘右也夫去柳葉百步而射之百發而百中之不以善息少焉氣衰力倦弓撥矢鈎一發不中者百發盡息今破韓魏撲師武北取趙藺離石者公之功多矣今又將兵出塞過兩周倍韓攻梁一舉不得前功盡棄公不如稱病而無出史周本紀楚欲圖周周王赧使西周武公謂楚相昭子曰三國以兵割周郊地以便輸而南器以尊楚三國楚齊韓也臣以為不然夫弒共主臣世君大國不親以衆脅寡小國不附大國不親小國不附不可以致名實名實不得不足以傷民夫有圖周之聲非所以為號也昭子曰乃圖周則無之雖然周何故不可圖也對曰軍不五不攻城不十不圍夫一周為二十晉公之所知也韓嘗以二十萬之衆辱于晉之城下鋭士死中士傷而晉不拔公之無百韓以圖周此天下之所知也夫怨結于西周以塞鄒魯之心交絶于齊聲失天下其為事危矣夫危兩周以厚三川方城之外必為韓弱矣何以知其然也西周之地絶長補短不過百里名為天下共主裂其地不足以肥國得其衆不足以徑兵雖無攻之名為弒君然而好事之君喜攻之臣發號用兵未嘗不以周為終始是何也見祭器在焉欲器之至而忘弒君之亂今韓以器之在楚臣恐天下以器讎楚也臣請譬之夫虎肉臊其兵利身人猶攻之也若使澤中之麋蒙虎之皮人之攻之必萬之于虎裂楚之地足以肥國詘楚之名足以尊主今子將以欲誅殘天下之共主居三代之傳器吞三翮六翼以髙世主非貪而何周書曰欲起無先故器南則兵至矣于是楚計輟不行史楚世家西周武公之共太子死有五庶子毋適立司馬剪謂楚王曰不如以地資公子咎請立為太子左成曰司馬剪左成皆楚臣不可周不聽是公之知困而交疏于周也不如請周君孰欲立以微告剪剪請令楚賀之以地果立公子咎為太子史周本紀明此較國䇿更赧王四十二年秦破華陽約馬犯謂周君曰請令梁城周馬犯見秦破華陽約懼周危故謂請梁城周也乃謂梁王曰周王病若死則犯必死矣周以國破猶身之病犯請以九鼎自入于王王受九鼎而圖犯圖收也梁王曰善遂與之卒言戍周因謂秦王曰梁非戌周也將伐周也王試出兵境以觀之言梁非戍周實欲取周寶鼎王試出兵于境以觀梁王之變秦果出兵又謂梁王曰馬犯又歸說梁王周王病甚矣犯請後可而復之今王使卒之周諸侯皆生心後舉事且不信不若令卒為周城以匿事端梁王曰善遂使城周史周本紀四十五年周君之秦客謂周最曰公不若譽秦王之孝因以應為太后養地秦王必喜是公有秦交交善周君必以為公功交惡勸周君入秦者必有罪矣秦攻周而周最謂秦王曰為王計者不攻周攻周實不足以利聲畏天下天下以聲畏秦必東合於齊兵弊於周合天下於齊則秦不王矣天下欲弊秦勸王攻周秦與天下弊則令不行矣史周本紀五十八年三晉距秦周令其相國之秦以秦之輕也還其行客謂相國曰秦之輕重未可知也秦欲知三國之情公不如急見秦王曰請為王聽東方之變秦王必重公重公是秦重周周以取秦也齊重則固有周聚以收齊是周常不失重國之交也秦信周發兵攻三晉同上五十九年秦取韓陽城負黍西周恐倍秦與諸侯約縱將天下鋭師出伊闕攻秦令秦無得通陽城秦昭王怒使將軍摎攻西周西周君奔秦頓首受罪盡獻其邑三十六口三萬秦昭王之五十一年秦受其獻歸其君于周周民遂東亡秦取九鼎寶器而遷西周公於􅓆狐西周公蓋武公之太子文公也國策有周文君不知滅時定當何主周王赧亦卒後七嵗秦莊襄王滅東周東西周皆入于秦周既不祀史周本紀史記秦本紀莊襄王元年東周君與諸侯謀秦秦使相國吕不韋誅之盡入其國秦不絶其祀以陽人地賜周君奉其祭祀法言周之順赧以成周而西傾秦之惠文昭襄以西山而東并孰愈曰周也羊秦也狼然則狼愈歟曰羊狼一也吳澄二周辨曰敬王四年子朝奔楚王雖返國然以子朝餘黨多在王城乃徙都成周而王城之都廢至考王封其弟于王城以續周公之官職是為西周桓公自此以後東有王西有公而東西之名未立也桓公生威公威公生惠公惠公之少子班又别封于鞏以奉王是為東周惠公父子同諡以鞏與成周皆在王城之東故謂之東班之兄則仍襲父爵居于王城是為西周武公以王城在成周之西故自此以後西有公東亦有公二公各有所食而周尚為一也顯王二年趙韓分周地為二二周公治之王寄焉而已矣周之分東西自此始九年東周惠公卒子傑嗣慎靚王以上皆在東赧王立始遷于西周即王城舊都也史記云王赧時東西周分治今按顯王二年已分為二不待此時矣前建都以鎬京為西周對洛邑為東周後二公封邑以王城為西周對成周為東周雜録周主亡玉簪令吏求之三日不能得也周主令人求而得之家人之屋間周主曰吾知吏之不事事也求簪二日不得之吾令人求之不移日而得之豈謂忠我哉於是吏皆悚懼以為君神明也韓子內儲上枝玉簪一作曲衛侯朝于周周行問其名曰衛侯辟彊周行還之曰啓彊辟彊天子之號也諸侯弗得用衛侯更其名曰􅀈然後受之新書卷之二杜赫以安天下說周昭文君昭文君曰願學所以安周杜赫對曰臣之所言者不可則不能安周矣臣之所言者可則周自安矣此所謂弗安而安之者也吕覽務大淮南子道應溫人之周周不納客問之曰客耶對曰主人問其巷人而不知也吏因囚之君使人問之曰子非周人也而自謂非客何也對曰臣少也誦詩曰普天之下莫非王土率土之濱莫非王臣今君天子則我天子之臣也豈有為人之臣又為之客哉故曰主人也君使出之韓子說林公子沓相周申向說之而戰申向周人申不害之族也戰懼也公子沓訾之曰申子說我而戰為吾相也夫申向曰向則不肖雖然公子年二十而相見老者而使之戰請問孰病哉公子沓無以應吕覽審應嚴遂不善周君患之馮沮曰嚴遂相而韓傀貴於君不如行賊於韓傀則君必以為嚴氏也韓子說林客有為周君畫莢者三年而成君觀之與髹莢者同狀髹赤黑色言不明也周君大怒畫莢者曰築十版之牆鑿八尺之牖而以日始出時加之其上而觀周君為之望見其狀盡成龍蛇禽獸車馬萬物之狀備具周君大悅畫莢之功非不微難也然其用與素髹莢同韓子外儲左周武君使人刺伶悝於東周伶悝僵周武君西周之君伶悝東周之臣也僵斃而未死也令其子速哭曰以誰刺我父也刺者聞以為死也周以為不信因厚罪之刺者聞伶悝已死因報西周武君曰伶悝已死矣厚罪之者罪所使刺伶悝者也吕覽貴卒春秋戰國異辭卷二
