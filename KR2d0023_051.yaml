body:
  text: 春秋戰國異辭卷四十八右春坊右諭徳陳厚耀撰趙史趙世家趙氏之先與秦共祖至中衍為帝大戊御其後世蜚㢘有子二人而命其一子曰惡來事紂為周所殺其後為秦惡來弟曰季勝其後為趙季勝生孟増孟増幸于周成王是為宅臯狼臯狼生衡父衡父生造父造父幸于周繆王造父取驥之乗匹與桃林盜驪驊騮騄耳獻之繆王繆王使造父御西巡狩見西王母樂之忘歸而徐偃王反繆王日馳千里馬攻徐偃王大破之乃賜造父以趙城由此為趙氏自造父已下六世至奄父曰公仲周宣王時伐戎為御及千畝之戰奄父脱宣王奄父生叔帶叔帶之時周幽王無道去周如晉事晉文侯始建趙氏于晉國自叔帶以下趙宗益興五世而生趙夙晉獻公之十六年伐霍魏耿趙夙為將伐霍霍公奔齊晉大旱卜曰霍太山為祟使趙夙召霍君于齊復之以奉霍太山之祀晉復穰獻公賜趙夙耿夙生共孟當魯閔公之元年也共孟生趙衰字子餘趙衰卜事晉獻公及諸公子莫吉卜事公子重耳吉即事重耳重耳以驪姬之亂亡奔翟趙衰従翟伐廧咎如得二女翟以其少女妻重耳長女妻趙衰而生盾初重耳在晉時趙衰妻亦生趙同趙括趙嬰齊趙衰従重耳出亡凡十九年得反國為晉文公趙衰為原大夫居原任國政文公所以反國及霸多趙衰計䇿趙衰既反晉晉之妻固要迎翟妻而以其子盾為適嗣晉妻三子皆下事之晉㐮公之六年而趙衰卒諡為成季趙盾代成季任國政二年而晉襄公卒太子夷臯年少盾欲立襄公弟雍太子母日夜啼泣盾恐其宗與大夫襲誅之詳左傳乃遂立太子是為靈公靈公立十四年趙穿弑之詳左傳立㐮公弟黒臀是為成公成公子景公時趙盾卒諡為宣孟子朔嗣朔娶晉成公姊為夫人景公之三年大夫屠岸賈誅趙氏後朔子武復嗣趙氏詳晉事中趙武續趙宗二十七年晉平公立平公十二年而趙武為正卿十三年吴延陵季子使于晉曰晉國之政卒歸于趙韓魏之後矣趙武死諡為文子文子生景叔景叔卒生趙鞅是為簡子趙簡子在位晉頃公之九年世本公明生共孟及趙夙夙生成季衰衰生宣孟盾國語云趙衰趙夙弟也諸説互異簡子趙簡子游於河而樂之歌曰安得賢士而與處焉舟人古乗跪而對曰夫珠玉無足去此數千里而所以能來者人好之也今士有足而不來者意吾君不好之乎趙簡子曰吾門左右客千人朝食不足暮收市征暮食不足朝收市征吾尚可謂不好士乎舟人古乗對曰鴻鵠髙飛逺翔其所恃者六翮也背上之毛腹下之毳無尺寸之數去之滿把飛不能為之益卑益之滿把飛不能為之益髙不知門下左右客千人者有六翮之用乎將盡毛毳也説苑尊賢新序韓詩外傳俱作晉平公事趙簡子有臣曰周舎好直諫周舎死簡子每聴朝常不悦大夫請罪簡子曰大夫無罪吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舎之諤諤是以憂也簡子由此能附趙邑而懐晉人史趙世家韓詩卷七趙簡子有臣曰周舎立於門下三日三夜簡子使人出問之曰子欲見寡人何事周舎對曰願為諤諤之臣墨筆操牘従君之後書君之過而日有記也月有效也嵗有得也簡子居則與之居出則與之出居無幾何而周舎死簡子如䘮子厚葬之三年之後與大夫飲于洪波之臺酒酣簡子涕泣諸大夫起而出曰臣有罪而不自知也簡子曰大夫反無罪昔者吾有周舎有言曰千羊之皮不若一狐之腋衆人之唯唯不若一士之諤諤昔者商紂嘿嘿而亡武王諤諤而昌今自周舎之死吾未嘗聞吾之過也吾亡無日矣是以泣也新序卷一趙簡子問于成摶曰吾聞夫羊殖者賢大夫也是行奚然對曰臣摶不知也簡子曰吾聞之子與友親子而不知何也摶曰其為人也數變其十五年也廉以不匿其過其二十也仁以喜義其三十也為晉中軍尉勇以喜仁其年五十也為邉城將逺者復親今臣不見五年矣恐其變是以不敢知趙簡子曰果賢大夫也毎變益上矣説苑善説説苑公叔文子問于史叟曰武子勝事趙簡子乆矣其寵不解奚也史叟曰武子勝博聞多能而位賤君親而近之致敏以愻藐而䟽之則恭而無怨色入與謀國家出不見其寵君賜之禄知足而辭故能久也按家語作晉平公問祁奚曰羊舌大夫何如按羊舌氏當趙簡子時乆滅矣家語近是楊因見趙簡主曰臣居鄉三逐事君五去聞君好士故來見簡主聞之絶食而嘆跽而行左右進諫曰居鄉三逐是不容衆也事君五去是不忠上也今君有士見過八矣簡主曰子不知也夫美女者醜婦之仇也盛徳之士亂世所䟽也正直之行邪枉所憎也遂出見之因授以為相而國大治説苑尊賢薄疑謂趙簡主曰君之國中飽簡主欣然而喜曰何如對曰府庫空虚於上百姓貧賤於下然而姦吏富矣韓子外儲右或謂趙簡子曰君何不更乎簡子曰諾左右曰君未有過何更君曰吾謂是諾未必有過也吾將求以來諫者也今我却之是却諫者諫者必止我過無日矣説苑君道解狐薦其讐於簡主以為相其讐以為且幸釋己也乃因往拜謝狐乃引弓送而射之曰夫薦汝公也以汝能當之也讐汝吾私怨也不以私怨汝之故擁汝於吾君故私怨不入公門一曰解狐舉邢伯柳為上黨守柳往謝之曰子釋罪敢不再拜曰舉子公也怨子私也子往矣怨子如初也韓子外儲左趙簡子沈鸞徼於河曰吾嘗好聲色矣而鸞徼致之吾嘗好宫室臺榭矣而鸞徼為之吾嘗好良馬善御矣而鸞徼來之今吾好士六年矣而鸞徼未嘗進一人也是長吾過而絀善也吕覽驕恣作又説苑君道鸞徼欒激趙簡主出税者吏請輕重簡主曰勿輕勿重重則利入於上若輕則利歸於民吏無私利而正矣韓子外儲右趙簡子上羊腸之坂羣臣皆偏袒推車虎虎一作唐㑹獨擔㦸行歌不推車簡子曰寡人上坂羣臣皆推車而㑹獨否是為人臣而侮其主也為人臣侮其主罪何若虎㑹對曰為人臣而侮其主者死而又死簡子曰何謂死而又死虎㑹曰身死妻子又死是為死而又死君亦聞為人君而侮其臣者乎簡子曰何若虎㑹對曰為人君而侮其臣者智者不為謀辯者不為使勇者不為鬭智者不為謀則社稷危辯者不為使則使不通勇者不為鬭則邉境侵三者不使則君難保簡子曰善乃罷羣臣不推車為士大夫置酒與羣臣飲以虎㑹為上客新序卷一説苑晉文侯隨㑹事語同簡主謂左右車席太美夫冠雖賤頭必戴之屨雖貴足必履之今車席如此太美吾將何屩以履之夫美上而耗下妨義之本也韓子外儲左趙簡子乗弊車膄馬衣羖羊裘其宰進諫曰車新則安馬肥則往來疾狐白之裘温且輕簡子曰吾非不知也吾聞之君子服善則益恭細人服善則益倨我以自備恐有細人之心也傳曰周公位尊愈卑勝敵愈懼家富愈儉故周氏八百餘年此之謂也説苑伯樂教二人相踶馬相與之簡子廏觀馬一人舉踶馬其一人従後而循之三撫其尻而馬不踶此自以為失相其一人曰子非失相也此其為馬也踒肩而踵膝夫踶馬也者舉後而任前腫膝不可任也故後不舉腫膝言無力不能任也子巧於相踶馬而拙於任腫膝夫事有所必歸而以有所腫膝而不任智者之所獨知也惠子曰置猿於押中則與豚同故勢不便非所以逞能也伯樂教其所憎者相千里之馬教其所愛者相駑馬千里之馬周時一售其利緩駑馬日售其利急此書所謂下言而上用者惑也韓子説林下趙簡子有兩白騾而甚愛之陽城胥渠處陽城姓胥渠名處猶病也廣門之官夜欵門而謁曰主君之臣胥渠有疾醫教之曰得白騾之肝病則止不得則死謁者入通董安于御於側愠曰譆胥渠也期吾君騾請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是召庖人殺白騾取肝以與之無幾何趙興兵而攻翟廣門之官左七百人右七百人皆先登而獲甲吕覽愛士趙簡子問於翟封荼曰吾聞翟雨榖三日信乎曰信又聞雨血三日信乎曰信又聞馬生牛牛生馬信乎曰信簡子曰大哉妖亦足以亡國矣對曰雨榖三日䖟風之所飄也雨血三日鷙鳥擊于上也馬生牛牛生馬雜牧也此非翟之妖也簡子曰然則翟之妖奚也對曰其國數散其君幼弱其諸卿貨其大夫比黨以求禄爵其百官肆㫁而無告其政令不竟而數化其士巧貪而有怨此其妖也説苑辨物趙簡子南擊楚與津吏期津吏醉卧不能渡簡子怒欲殺之其女娟懼持檝走前曰妾父聞君王將渡恐風波之起水神動駭故禱祀九江三淮之神不勝杯杓餘瀝尚醉于此君命誅之恐心不知非而體不知痛也願以微軀易父之死簡子釋弗誅將渡少檝者一人娟攘拳操檝而請曰妾居河濟之間習舟檝之事願備父役簡子不許娟曰湯伐夏左驂牝驪右驂牝黄而放桀武王伐殷左驂牝騏右驂牝駵而克紂主君但欲渡耳用一婦人何傷簡子遂與渡中流發河激之歌以鳴其意歌曰升彼河兮面觀清水揚波兮冒冥冥禱求福兮醉不醒誅將加兮妾心驚罰既釋兮瀆乃清妾持檝兮操其維蛟龍助兮主將歸呼來櫂兮行勿疑簡子悦曰昔者不榖夢娶豈此女耶將使人祝袚以為夫人娟曰婦人之道非媒不嫁妾有嚴親在不敢聞命簡子歸乃納幣于其父母而以為夫人列女傳陽虎去齊走趙左定公九年簡主問曰吾聞子善樹人虎曰臣居魯樹三人皆為令尹及虎抵罪于魯皆搜索於虎也臣居齊薦三人一人得近王一人為縣令一人為候吏及臣得罪近王者不見臣縣令者迎臣執縛候吏者追臣至境上不及而止虎不善樹人主俛而笑曰樹橘柚者食之則甘嗅之則香樹枳棘者成而刺人故君子慎所樹韓子外儲左陽虎得罪於衞北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人臣所樹者過半矣朝廷之吏臣所立者亦過半矣邉境之士臣所立者亦過半矣今堂上之人親却臣于君朝廷之吏親危臣於衆邉境之士親却臣於兵簡子曰唯賢者為能報恩不肖者不能夫樹桃李者夏得休息秋得食焉樹蒺藜者夏不得休息秋得刺焉今子之所樹蒺藜也自今以來擇人而樹毋已樹而擇之説苑復恩韓詩卷七魏文侯之時子質仕而獲罪焉去而北游謂簡主曰自今已後不復樹徳於人矣簡主曰何以也質曰吾所樹堂上之士半吾所樹朝廷之大夫半吾所樹邉境之人亦半今堂上之士恐我以法邉境之人劫我以兵是以不樹徳於人也簡子曰噫子之言過矣夫春樹桃李夏得隂其下秋得隂其實春樹蒺藜夏不得採其葉秋得其刺焉由此觀之在所樹也今子所樹非其人也故君子先擇而後種也魏文侯立在簡子後不同時作簡子謂陽虎語者近是陽虎議曰主賢明則悉心以事之不肖則節姦而試之逐于魯疑於齊走而之趙趙簡主迎而相之左右曰虎善竊人國政何故相也簡子曰陽子務取之我務守之遂執術而御之陽虎不敢為非以善事簡子興主之强幾至於霸韓子外儲左趙簡子將襲衞使史黙往覩之期以一月六月而後返趙簡子曰何其久也史黙曰謀利而得害猶弗察也今蘧伯玉為相史鰌佐焉孔子為客子貢使令於君前甚聴易曰渙其羣元吉渙者賢也羣者衆也元者吉之始也渙其羣元吉者其佐多賢也趙簡子按兵而不動吕覽召類又説苑奉使趙簡子晝居喟然太息曰異哉吾欲伐衞十年矣而衞不伐侍者曰以趙之大而伐衞之細君若不欲則可也君若欲之請令伐之簡子曰不如而言也衞有士十人於吾所吾乃且伐之十人者其言不義也而我伐之是我為不義也故簡子之時衞以十人者按趙之兵殁簡子之身吕覽期賢趙簡子疾五日不知人大夫皆懼醫扁鵲視之出董安于問扁鵲曰血脈治也而何怪在昔秦穆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以久者適有學也帝告我晉國將大亂五世不安其後將霸未老而死霸者之子且令而國男女無别公孫支書而藏之秦䜟於是出矣獻公之亂文公之霸而㐮公敗秦師于殽而歸縦淫此子之所聞今主君之疾與之同不出三日疾必間間必有言也居二日半簡子寤語大夫曰我之帝所甚樂與百神游于鈞天廣樂九奏萬舞不類三代之樂其聲動人心有一熊欲來援我帝命我射之中熊熊死又有一羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人于范魁之西而亦不能有也今余思虞舜之勲適余將以其胄女孟姚配而七世之孫董安于受言而書藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝他日簡子出有人當道辟之不去従者怒將刃之當道者曰吾欲有謁于主君従者以聞簡子召之曰譆吾有所見子晰也當道者曰屏左右願有謁簡子屏人當道者曰主君之疾臣在帝側簡子曰然有之子之見我我何為當道者曰帝令主君射熊與羆皆死簡子曰是且何也當道者曰晉國且有大難主君首之帝令主君滅二卿夫熊與羆皆其祖也范氏中行氏之祖簡子曰帝賜我二笥皆有副何也當道者曰主君之子將克二國於翟皆子姓也謂代及智氏簡子曰吾見兒在帝側帝屬我一翟犬曰及而子之長以賜之夫兒何謂以賜翟犬當道者曰兒主君之子也翟犬者代之先也主君之子且必有代及主君之後嗣且有革政而胡服并二國於翟簡子問其姓而延之以官當道者曰臣野人致帝命耳遂不見以上又見風俗通卷一簡子書藏之府異日姑布子卿見簡子徧召諸子相之子卿曰無為将軍者簡子曰趙氏其滅乎子卿曰吾嘗見一子於路殆君之子也簡子召子毋䘏毋䘏至則子卿起曰此真將軍矣簡子曰此其母賤翟婢也翟一作越奚道貴哉子卿曰天所授也雖賤必貴自是之後簡子盡召諸子與語毋䘏最賢簡子乃告諸子曰吾藏寳符於常山上先得者賞一作往得者立為後諸子馳之常山上求無所得毋䘏還曰已得符矣簡子曰奏之毋䘏曰従常山上臨代代可取也簡子曰是知符矣於是知毋䘏果賢乃廢太子伯魯而以毋䘏為太子後二年晉定公之十四年范中行作亂簡子滅之史趙世家繹史云史遷好竒語怪此段殊腐穢可刋列仙傳任光上蔡人善餌丹賣藥于都市里間積八十九年乃知是故時任光也皆悦如數十嵗面顔長老識之趙簡子聘與俱歸常在栢梯山上三世不知所在晉人常服其丹也尹鐸為晉陽下有請於趙簡子尹鐸簡子家臣晉陽簡子邑為治也簡子曰往而夷夫壘我將往往而見壘是中行寅與范吉射也夷平也中行文子與范昭子伐趙晉陽所作壘壘培堙也簡子不欲見故使尹鐸平之鐸往而増之簡子上之晉陽望見壘而怒曰譆鐸也欺我於是乃舎於郊將使人誅鐸也孫明進諫曰以臣私之私惟也鐸可賞也鐸之言固曰見樂則淫侈見憂則諍治此人之道也今君見壘念憂患而況羣臣與民乎夫便國而利於主雖兼於罪鐸為之夫順令以取容者衆能之而况鐸歟君其圖之簡子曰微子之言寡人幾過於是乃以免難之賞賞尹鐸吕覽似順趙簡子曰厥也愛我鐸也不愛我厥趙厥鐸尹鐸皆家臣也厥之諫我也必於無人之所鐸之諫我也喜質我於人中必使我醜尹鐸對曰厥也愛君之醜也而不愛君之過也鐸也愛君之過也而不愛君之醜也臣嘗聞相人於師敦顔而土色者忍醜不質君於人中恐君之不變也吕覽逹鬱説苑臣術簡子有臣尹綽赦厥簡子曰厥愛我諫我必不於衆人中綽也不愛我諫我必於衆人中尹綽曰厥也愛君之醜而不愛君之過也臣愛君之過而不愛君之醜孔子曰君子哉尹綽面訾而不譽也趙簡子春築臺于邯鄲天雨而不息謂左右曰可無趨種乎尹鐸對曰公事急厝種而懸之臺夫雖欲趨種不能得也簡子惕然乃釋臺罷役曰我以臺為急不知民之急也民以不為臺故知吾之愛也説苑貴德董安于治晉陽問政于蹇老蹇老曰曰忠曰信曰敢董安于曰安忠乎曰忠於主曰安信乎曰信於令曰安敢乎曰敢於不善人董安于曰此三者足矣說苑政理董閼于閼于即安于為趙上地守行石邑山中見深澗峭如牆深百仞因問其旁鄉左右曰人嘗有入此者乎對曰無有曰嬰兒癡聾狂悖之人嘗有入此者乎對曰無有牛馬犬彘有嘗入此者乎對曰無有董閼于喟然太息曰吾能治矣使吾法之無赦猶入澗之必死也則人莫之敢犯也何為不治之韓子内儲上趙簡子従晉陽之邯鄲中路而止引車吏進問君何為止簡主曰董安于後吏曰此三軍之事也君奈何以一人留三軍也簡主曰諾驅之百步又止吏将進諫董安于適至簡主曰秦道之與晉國交者吾忘令人塞之董安于曰此安于之所為後也簡主曰官之寳璧吾忘令人載之對曰此安于之所為後也簡主曰行人燭過年長矣言未嘗不為晉國法也吾行忘令人辭且聘焉對曰此安于之所為後也説苑臣術荘子趙簡子出田鄭龍為右有一野人簡子曰龍下射彼使無驚吾馬三命鄭龍鄭龍不對簡子怒鄭龍曰昔吾先君伐衞克曹退為踐土之盟不戮一人吾今一朝田而曰必為我殺人是虎狼食人故将救之簡子愀焉曰不愛其身以活人者可無従乎還車輟田曰人之田也得獸今吾田也得士逸篇今本無亦作梁君公孫龍事趙簡子獵于晉山之陽撫轡而嘆董安于曰敢問何嘆曰吾有食榖之馬數千多力之士數百欲以獵獸也吾恐鄰國養賢以獵吾也子家子字子家子孔子𤣥孫名求子家子上之子子華子居于苓塞子華子姓程名本晉人也博學性爽闓善持論不茍容于世聚徒著書自號程子名聞諸侯孔子遇諸郯嘆曰天下賢士也趙簡子将用之使使者将幣于閭曰寡大夫乏使使下臣敬修不腆以勤先生之将命者子華子反幣再拜以肅使者而進之於庭辭曰主君之民某如獲罪戾其敢逃刑以其弗嗇之故而適抱薪􅀈音纒約也之憂疾且有間則我請造于朝其敢重辱我主君之命使者曰寡大夫且有緒言使下臣敬致執事惟是晉國之寵靈願與先生共之先生不違勤而貺以行請禄従者以爵執珪子華子没階而進再拜言曰主君之民某未有職業于朝也且有惡疾不堪君之命弗敢與聞再拜送使者于門反其室聚帑將行其弟子族立而疑北宫子名意曰意聞之身修于私名升于公主君國之宗卿也政所自出以禮交而弗答毋乃不可乎子華子曰意吾以爾為可以忘言也而猶有萌焉夫萌于中必瞢于外其意之謂矣且彼召我者夫豈徒哉必有以處我者矣為人之所處者不得安其所自處矣是故古之人慎於其所以處也昔者吾友有郯聞語于孔子屬屬焉不忘於心孔子之所志其過人者逺矣日者主君之召也孔子轍環于河滸弗濟援琴冩志命之曰臨河之操其辭曰河之水洋洋兮丘之不濟此命也夫孔子之所以弗至是乃我所以行也意吾以爾為忘言也而猶有萌焉夫以小人之所察而量君子之心意爾其殆矣北宫子强以見簡子簡子聞子華至再拜迎曰不榖得奉先人之靈以撫有四封之内先君有禮所以貺賓客而交際之紀廬人實典治之吾子辱在敝邑有日矣以嵗之不易而𨽻人有朝夕之虞願致戎邑方三四十里若五六十里以為芻秣之共吾子其曲意以臨之子華子曰臣也不武懼不任君之事以為司敗愛也君有四圉以扞四方臣弗堪也明日子華行食于茭亭之口北宫子曰晉未有失也絶人之善意又刮迹以去之夫子所以責人者太察矣子華子曰然非爾所及也夫晉君志大而求逺其所望于我者厚則我無以堪其求矣且爾聞牧野之事乎周之六師壓郊而陳武王韤係解焉有五臣者將受誓事于前王顧而使之係五臣者相目而對曰臣之所以事君王非為係韈者也王不得已乃釋旄鉞而親係之夫人臣能致其君能有所不為然後可責之以有為人臣能有所不為然後能無不為也本也未能無不為也能有所不為矣子華子子華子違趙趙簡子不悦燭過典廣門之左簡子召而語之以其故燭過對曰彼庶人也而傲侮公上法所弗寘也且無以為國矣簡子曰爾士以兵之燭過至苓塞子華子之行者五日矣燭過反命曰無及也簡子悔之使使者于齊而使董安于寓書以招之子華子稽首而來再拜以肅使者于庭而授之辭曰主君之亡臣某不能束修越在諸侯以為主君憂臣聞之物扄于所甘士扄于所守主君之亡臣不佞而有四方之志其敢以為執事者之所辱夫丘陵崇而穴成於上狐狸藏矣溪谷深而淵成於下魚鼈安矣松栢茂而隂成于林塗之人則䕃矣主君之亡臣不佞實有隠𠂻惟執事者昭明其所存如日月之升以光燭于晉國將四海之士重繭狎至以承主君之令聞夫豈惟亡臣亡臣雖復野死以寘溝甽其敢忘主之賜惟執事幸裁焉簡子得書召無䘏而戒之曰燭過小人也實使我獲罪於士吾且死汝必反之慎不忘也㐮子曰善子華子邯鄲之民以正月之旦獻鳩于簡子簡子大悦厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之故競而捕之死者衆矣君如欲生之不若禁民勿捕捕而放之恩過不相補矣簡子曰然列子説符佛肸用中牟之懸畔左哀二年設禄邑炊鼎曰與我者受邑不與我者受烹中牟之士皆與之城北餘子田基獨後至袪衣將入鼎曰基聞之義者軒冕在前非義弗乗斧鉞於後義死不避遂袪衣將入鼎佛肸播之趙簡子屠中牟得而取之論有功者用田基為始田基曰吾聞廉士不耻人如此而受中牟之功則中牟之士終身慚矣襁負其母南徙于楚楚王髙其義待以司馬説苑立節新序佛肸以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫皆従之至於田卑田卑中牟之邑人也曰義死不避斧鉞之罪義窮不受軒冕之服無義而生不仁而富不如烹蹇裳將就鼎佛肸脱屨而生之趙氏聞其叛也攻而取之聞田卑不肯與也求而賞之田卑曰不可也一人舉而萬夫俛首智者不為也賞一人以慙萬夫義者不取也我受賞使中牟之士懐耻不義辭賞従處父以行臨人不道吾去矣遂南之楚繹史田卑田基一事也簡子當作㐮子二書俱出中壘之手而所載駁異如此列女傳佛肸以中牟叛趙之法以城叛者身死家收佛肸之母將論自言我不當㐮子見而問之曰母不能教子故使至於反母何為不當死也母曰吁以主君殺妾為有説也乃以母無教邪妾之職盡久矣此乃在於主君妾聞子少而慢者母之罪也長而不能使者父之罪也今妾之子少而不慢長又能使妾何負哉妾能為君長子君自擇以為臣妾之子與在論中此君之臣非妾之子君有暴臣妾無暴子是以言妾無罪也㐮子曰善遂釋之趙簡子曰晉有澤鳴犢犨魯有孔丘吾殺此三人則天下可圖也于是乃召澤鳴犢犨任之以政而殺之使人聘孔子于魯孔子至河臨水而觀曰美哉水洋洋乎邱之不濟于此命也夫子路趨進曰敢問奚謂也孔子曰夫澤鳴犢犨晉國之賢大夫也趙簡子之未得志也與之同聞見及其得志殺之而後従政丘聞之刳胎焚夭麒麟不至乾澤而漁蛟龍不遊覆巢毁卵則鳳凰不翔君子重傷其類者也説苑權謀趙簡子使聘夫子哀公二年夫子將至焉及河地志今山東高唐縣有鳴犢河即孔子嘆處聞鳴犢與竇犨之見殺也回輿而旋之衞息鄹遂為操曰周道衰微禮樂陵遲文武既墜吾將焉歸周遊天下靡邦可依鳳鳥不識珍寳梟鴟眷然顧之慘然心悲巾車命駕將適唐都黄河洋洋攸攸之魚臨津不濟還轅息鄹傷予道窮哀彼無辜翺翔于衞復我舊廬従吾所好其樂只且孔叢子上琴操孔子將西見趙簡子至河而返作將歸操又名息鄹操作槃琴以哀之曰乾澤而漁蛟龍不遊覆巢毁卵鳳不翔留慘予心悲還原息陬又孔子歴聘諸侯諸侯莫能任自衞反魯隠谷之中見薌蘭獨茂喟然嘆曰蘭當為王者香今乃與衆草為伍止車援琴皷之自傷不逢時托辭于蘭云習習谷風以隂以雨之子于歸逺送于野何彼蒼天不得其所逍遥九州無所定處時人闇蔽不知賢者年紀逝邁一身將老趙簡子曰吾欲得范中行氏良臣左哀五年范中行氏奔齊史黶曰安用之簡子曰良臣人所願也又何問焉曰君以為無良臣故也夫事君者諫過而薦可章善而替否獻能而進賢朝夕誦善敗而納之聴則進否則退今范中行氏之良臣也不能匡相其君使至於難出在於外又不能入亡而棄之何良之為若不棄君安得之夫良臣將營其君使復其位死而後止若未能乃非良也簡子曰善説苑尊賢趙簡子攻陶有二人先登死于城上簡子欲得之陶君不與承盆疽謂陶君曰簡子將掘君之墓以與君之百姓市曰踰邑梯城者將舍之不者將掘其墓朽者揚其灰未朽者辜其尸陶君懼請効二人之尸以為和説苑善説趙簡子舉兵而攻齊令軍中有敢諫者罪至死被甲之士名曰公盧望見簡子大笑簡子曰子何笑對曰臣有夙笑當桑之時臣鄰家夫與妻俱之田見桑中女因往追之不能得還反其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也于是罷師而歸説苑正諫公盧一作申䕶趙襄子㐮子當作簡子謂仲尼曰先生委質以見人主七十君矣而無所通不識世無明君乎意先生之道固不通乎仲尼不對異日襄子見子路曰嘗問先生以道先生不對知而不對則隠也隠則安得為仁若信不知安得為聖子路曰建天下之鳴鍾而撞之以挺豈能發其聲乎哉君問先生無乃猶以挺撞乎説苑善説趙簡子問子貢曰孔子為人何如子貢對曰賜不能識也簡子不説曰夫子事孔子數十年終業而去之寡人問子子曰不能識何也子貢曰賜譬渇者之飲江海知足而已孔子猶江海也賜則奚足以識之簡子曰善哉子貢之言也説苑善説趙簡子攻衞附郭自將兵及戰且逺立立於矢石所不及也又居於犀蔽屏櫓之下皷之而士不起簡子投桴而嘆曰嗚呼士之遫弊一若此乎行人燭過免胄横戈而進曰亦猶君不能耳何弊之有簡子艴然作色曰寡人之無使汝身自將是衆也子親謂寡人之無能有説則可無説則死對曰昔吾先君獻公即位五年兼國十九用此士也惠公即位二年淫色暴慢身好玉女秦人襲我遜去絳七十用此士也文公即位二年底之以勇故三年而士盡果敢城濮之戰五敗荆人圍衞取曹拔石社定天子之位成尊名於天下用此士也亦有君不能耳士何弊之有簡子乃去犀蔽屏櫓而立於矢石之所及一皷而士畢乗之簡子曰與吾得革車千乗也不如聞行人燭過之一言吕覽貴直韓子難二趙簡子圍衞之郛郭犀楯犀櫓立於矢石之所及皷之而士不起簡子投枹曰嗚乎吾之士數弊也行人燭過免胄而對曰臣聞之亦有君之不能耳士無弊者但君不能用之耳昔者吾先君獻公并國十七服國三十八戰十有二勝是民之用也獻公没惠公即位淫衍暴亂身好玉女秦人恣侵去絳十七里是亦人之用也惠公没文公受之圍衞取鄴城濮之戰五敗荆人取尊名於天下亦此人之用也亦有君不能耳士無弊也簡子乃去楯櫓立矢石之所及皷之而士乗之戰大勝簡子曰與吾得革車千乗不如聞行人燭過之一言晉定公三十年定公與吴王夫差争長于黄池趙簡子従晉定公卒長吴定公三十七年卒而簡子除三年之䘮期而已是嵗越滅呉史趙世家趙簡子之長子曰伯魯幼曰毋䘏将置後不知所立乃書訓戒之詞于二簡以授二子曰謹識之三年而問之伯魯不能舉其詞求其簡已失之矣問毋䘏誦其詞甚習求其簡出諸袖中奏之于是立毋䘏為後史趙世家韓詩外傳趙簡子大子名伯魯小子名毋䘏簡子自為一書牘曰節用聴聰敬賢勿慢使能勿賤親自表之與二子使誦之居三年簡子坐清臺之上問二書所在伯魯亡其表令誦不能得毋䘏出其書於袖且誦習焉乃出伯魯而立毋䘏是為襄子通鑑本此今本無晉出公十一年知伯伐鄭趙簡子疾使太子毋䘏將而圍鄭知伯醉以酒灌擊毋䘏毋䘏羣臣請死之毋䘏曰君所以置毋䘏為能忍訽然亦愠知伯知伯歸因謂簡子使廢毋䘏簡子不聴毋䘏由此怨知伯史趙世家趙簡子以襄子為後董安于曰安一作閼毋䘏賤今以為後何也簡子曰是其為人也能為社稷忍辱異日知伯與襄子飲而灌襄子之首灌一作批大夫請殺之襄子曰先君之立我也曰能為社稷忍辱豈曰能刺人哉處十月知伯圍襄子于晉陽襄子䟽隊而擊之大敗知伯漆其首以為飲器淮南子道應又説苑建本晉出公十七年簡子卒太子毋䘏代立是為襄子張華曰簡子冡在臨水界二冡併上氣成樓閣史趙世家春秋戰國異辭卷四十八
