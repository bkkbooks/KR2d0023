body:
  text: 春秋戰國異辭卷三十二右春坊右諭德陳厚耀撰燕史燕世家召公奭與周同姓姓姬氏周武王之滅紂封召公於北燕其在成王時召公為三公自召公以下九世至惠侯惠侯當周厲王奔彘共和之時惠侯卒子釐侯立索隱曰燕四十二代有二惠侯二釐侯二宣侯三桓侯二文侯蓋國史微失本諡故重耳是時周宣王初立三十六年釐侯卒子頃侯立頃侯二十年周幽王淫亂為犬戎所弒秦始列為諸侯頃侯頃侯二十一年周平王之元年也二十四年頃侯卒子哀侯立哀侯哀侯二年卒子鄭侯立鄭侯鄭侯三十六年卒子繆侯立繆侯繆侯七年而魯隱公元年也十八年卒子宣侯立宣侯宣侯十三年卒子桓侯立桓侯桓侯七年卒子莊公立莊公莊公十二年齊桓公始霸十六年與宋衛共伐周惠王惠王出奔溫立惠王弟頽為周王十七年鄭執燕仲父而內惠王於周二十七年山戎來侵我齊桓公救燕遂北伐山戎而還燕君送齊桓公出境桓公因割燕所至地豫燕使燕共貢天子如成周時職使燕復修召公之法三十三年卒子襄公立襄公襄公二十六年晉文公為踐土之會稱伯四十年襄公卒桓公立桓公桓公十六年卒宣公立宣公宣公十五年卒昭公立昭公昭公十三年卒武公立是時晉滅三郤大夫武公武公十九年卒文公立文公懿公惠公文公六年卒懿公立懿公四年卒子惠公立惠公元年齊高止來奔六年惠公多寵姬公欲去諸大夫而立寵姬宋宋一作宗大夫共誅姬宋惠公懼奔齊九年齊髙偃如晉請共伐燕入其君晉平公許與齊伐燕入惠公惠公至燕而死燕人立悼公悼公共公悼公七年卒共公立共公五年卒平公立平公時晉公室卑六卿始強大平公十八年吳王闔閭破楚入郢十九年卒簡公立簡公燕簡公殺其臣莊子儀而不辜莊子儀曰吾君王殺我而不辜死人無知亦已死人有知不出三年必使吾君知之期年燕將馳祖燕之有祖當齊之社稷宋之有桑林楚之有雲夢也此男女之所屬而觀也日中燕簡公方將馳於祖塗莊子儀荷朱杖而擊之殪於車上墨子論衡作趙簡公簡公十二年卒獻公立獻公十二年齊田常殺其君簡公十四年孔子卒二十八年獻公卒孝公立孝公成公孝公十二年韓趙魏滅知伯分其地三晉強十五年孝公卒成公立成公十六年卒湣公立湣公湣公三十一年卒釐公立釐公桓公是嵗三晉列為諸侯釐公三十年伐齊敗於林營釐公卒桓公立桓公十一年卒文公立文公文公元年秦獻公卒秦益強十九年齊威王卒二十八年蘇秦始來見説文公語已詳國策文公豫車馬金帛以至趙趙肅侯用之因約六國為從長秦惠王以其女為燕太子婦二十九年文公卒太子立是為易王以上俱史燕世家易王燕易王初立齊宣王因燕喪伐燕取十城易王謂蘇秦曰往者先生至燕而先王資先生見趙遂約六國從今齊先伐趙次至燕以先生之故為天下笑先生能為燕得侵地乎蘇秦大慙曰請為王取之蘇秦見齊王再拜俯而慶仰而弔齊王曰是何慶弔相隨之速也蘇秦曰臣聞飢人所以飢而不食烏喙者為其愈充腹而與餓死同患也今燕雖弱小即秦王之少壻也大王利其十城而長與強秦為仇今使弱燕為雁行而強秦敝其後以招天下之精兵是食烏喙之類也齊王愀然變色曰然則奈何蘇秦曰臣聞古之善制事者轉禍為福因敗為功大王誠能聽臣計即歸燕之十城燕無故而得十城必喜秦王知以己之故而歸燕之十城亦必喜此所謂棄仇讎而得石交者也夫燕秦俱事齊則大王號令天下莫敢不聽是王以虛辭附秦以十城取天下此霸王之業也王曰善乃歸燕之十城史蘇秦傳燕易王之母燕文侯之夫人也與蘇秦私通燕王知之而事之加厚蘇秦恐誅乃説燕王曰臣居燕不能使燕重而在齊則燕必重燕王曰唯先生之所為於是蘇秦佯為得罪於燕而亡走齊齊宣王以為客卿史蘇秦傳鄒陽上梁王書蘇秦相燕人惡之於燕王易王燕王按劍而怒食以駃騠敬秦雖有讒惡王更膳以珍竒之味也十年燕君為王蘇秦與燕文公夫人私通懼誅乃説王使齊為反間欲以亂齊易王立十二年卒子噲立燕噲既立齊人殺蘇秦以上俱史燕世家王噲史記蘇秦之在燕與其相子之為婚姻而其弟蘇代與子之交及蘇秦死而齊宣王復用蘇代燕噲三年與楚三晉攻秦不勝而還子之相燕貴重主斷蘇代為齊使於燕燕王問曰齊王奚如對曰必不霸燕王曰何也對曰不信其臣蘇代欲以激燕王以尊子之也於是燕王大信子之子之因遺蘇代百金而聽其所使鹿毛夀謂燕王不如以國讓相子之人之謂堯賢者以其讓天下於許由許由不受有讓天下之名而實不失天下今王以國讓於子之子之必不敢受是王與堯同行也燕王因屬國於子之子之大重或曰禹薦益已而以啓人為吏及老而以啓人為不足任乎天下傳之於益己而啓與交黨攻益奪之天下謂禹名傳天下於益己而實令啓自取之今王言屬國於子之而吏無非太子人者是名屬子之而實太子用事也王因收印自三百石吏已上而效之子之子之南面行王事而噲老不聽政顧為臣國事皆決於子之史燕世家潘夀隱者也燕使人聘之夀見燕王曰臣恐子之如益也王曰何哉對曰昔者禹死將傳天下於益啓之人因相與攻益而立啓今王信愛子之將傳國焉太子之人盡懷印璽子之之人無一人在朝廷者王不幸棄羣臣則子之亦益也王因收吏璽自三百石以上皆效之子之子之大重韓子外儲與國策小異子之相燕坐而佯言曰走出門者何白馬也左右皆言不見有一人走追之報曰有子之以此知左右之不誠信韓子內儲上蘇代為秦使燕見無益子之則必不得事而還貢賜又不出於是見燕王乃譽齊王燕王曰齊王何若是之賢也則將必王乎蘇代曰救亡不暇安得王哉燕王曰何也曰其任所愛不均燕王曰昔者齊桓公愛管仲置以為仲父內事理焉外事斷焉舉國而歸之故一匡天下九合諸侯今齊任所愛不均是以知其亡也燕王曰今吾任子之天下未之聞也於是明日張朝而聽子之韓子外儲右三年國大亂百姓恫恐將軍市被與太子平謀將攻子之諸將謂齊湣王曰因而赴之破燕必矣齊王因令人謂燕太子平曰寡人聞太子之義將廢私而立公飭君臣之義明父子之位寡人之國小不足以為先後雖然則唯太子所以令之太子因要黨聚衆將軍市被圍公宫攻子之不克將軍市被及百姓反攻太子平將軍市被死以徇因構難數月死者數萬衆人恫恐百姓離志孟軻謂齊王曰今伐燕此文武之時不可失也王因令章子將五都之兵以因北地之衆以伐燕士卒不戰城門不閉燕君噲死齊大勝燕子之亡國策作齊宣王是史年誤也又按六國表云君噲及相子之皆死二年而燕人共立太子平是為燕昭王史燕世家年徐廣曰噲立七年而死其九燕人共立太子平燕王噲讓國於其相子之噲之五年而噲老不聽政顧為臣三年燕國大亂齊湣王使章子伐燕取之醢子之殺燕王噲又二年而燕人共立太子平為君是為昭王類函家約史燕世文竹書紀年子之殺太子平不克齊殺子之醢其身史趙世家趙武靈王十二年召公子職於韓立以為燕王使樂池送之事不見於燕世家蓋史踈也昭王燕昭王問於郭隗曰寡人地狹人寡齊人削取八城胸奴驅馳樓煩之下以孤之不肖得承宗廟恐危社稷存之有道乎郭隗曰有然恐王之不能用也昭王避席願請聞之郭隗曰帝者之臣其名臣也其實師也王者之臣其名臣也其實友也霸者之臣其名臣也其實賔也危國之臣其名臣也其實虜也今王東面目指氣使以求臣則厮役之材至矣南面聽朝不失揖讓之禮以求臣則人臣之材至矣西面等禮相亢下之以色不乘勢以求臣則朋友之材至矣北面拘指逡巡而退以求臣則師傅之材至矣如此則上可以王下可以霸唯王擇焉燕王曰寡人願學而無師郭隗曰王誠欲興道隗請為天下之士開路於是昭王常置郭隗上坐南面居三年蘇子聞之從周歸燕鄒衍聞之從齊歸燕樂毅聞之從趙歸燕屈景聞之從楚歸燕四子畢至果以弱燕并強齊説苑君道鄒衍如燕昭王擁篲先驅請列弟子之坐而受業碣石宫史孟子荀卿傳地志鄒衍臨淄人著書十萬餘言名重列國燕昭王師之又有鄒忌鄒奭號三鄒劉向别録燕有谷地美而寒不生黍稷鄒衍吹律以溫其氣今名黍谷山在順天府懷柔縣燕昭王於易水築黃金臺延天下士鄒衍聞之乃自梁入燕昭王築碣石宫師事之易州有候臺相傳周武王築為日者占候之所燕昭建五樓於上更名五花臺述異記燕昭王為郭隗築臺今在幽州燕王故城中土人呼為賢士臺又謂之招賢臺燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士以共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士先從隗始况賢於隗者豈逺千里哉於是昭王為隗改築宫而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趨燕燕王弔死問孤與百姓同甘苦二十八年燕國殷富士卒樂軼輕戰於是遂以樂毅為上將軍與秦楚三晉合謀伐齊齊兵敗湣王出亡於外燕兵獨追北入至臨淄盡取齊寶燒其宫室宗廟齊城之不下者獨唯聊莒即墨其餘皆屬燕史燕世家燕王使人入海求蓬萊方丈瀛州此三神山者相傳在渤海中去人不逺未至望之如雲及到三神山反居水下有仙人及不死之藥皆在焉其物禽獸盡白而黃金白銀為宫闕史記封禪書拾遺記方丈山燕昭王二年海人乘霞舟以雕壺盛數斗膏以獻昭王王坐通雲之臺亦曰通霞臺以龍膏為燈光耀百里煙色丹紫國人望之咸言瑞光世人遙拜之燈以火浣布為纒山西有照石去石十里視人物之影如鏡焉碎石片片皆能照人而質方一丈則重一兩昭王舂此石為泥泥通霞之臺與西王母常遊居此臺上常有衆鸞鳳鼓舞如琴瑟和鳴神光照耀如日月之出臺左右種恆春之樹葉如蓮花芬芳如桂花隨四時之色昭王之末仙人貢焉列國咸賀王曰寡人得恆春矣何憂太清不至恆春一名沈生如今之沈香也又燕昭王王即位三年廣延國來獻善舞者二人一名旋娟一名提嫫並玉質凝膚體輕氣馥綽約而窈窕絶古無倫或行無蹤影或積年不飢昭王處以單綃華幄飲以瓀珉之膏飴以丹泉之粟王登崇霞之臺乃召二人徘徊翔舞殆不自支王以纓縷拂之二人皆舞容冶妖麗靡於鸞翔而歌聲輕揚乃使女伶代唱其曲清響流韻雖飄梁動木未足嘉也其舞一名縈塵言其體輕與塵相亂次曰集羽言其婉轉若羽毛之從風其末曰旋懷言其支體纒蔓若入懷袖也乃設麟文之席散荃蕪之香香出波弋國浸地則土石皆香著朽木腐草莫不鬱茂以燻枯骨則肌肉皆生以屑噴地厚四五寸使二女舞其上彌日無迹體輕故也時有白鸞孤翔銜千莖穟穟於空中自生花實落地則生根葉一嵗百穫一莖滿車故曰盈車嘉穟麟文者錯雜寶以飾席也皆為雲霞麟鳳之狀昭王復以衣袖麾之舞者皆止昭王知其神異處於崇霞之臺設枕席以寢宴遣侍人以衛之王好神仙之術玄天之女託形作此二人昭王之末莫知所在或云遊於漢江或伊洛之濵四年王居正寢召其臣甘需曰寡人志於仙道欲學長生久視之法可得遂乎需曰臣遊昆臺之山見有垂白之叟宛若少童貌如氷雪形如處子血清骨徑膚實腸輕乃歷蓬瀛而超碧海經涉升降遊往無窮此為上仙之人也蓋能去滯欲而離嗜愛洗神滅念常遊於太極之門今大王以妖容惑目美味爽口列女成羣迷心動慮所愛之容恐不及玉纎腰皓齒患不如神而欲卻老雲遊何異操圭爵以量滄海執毫釐而回日月其可得乎昭王乃徹色減味居乎正寢賜甘需羽衣一襲表其墟為明真里也七年沐胥之國來朝則申毒國之一名也有道術人名尸羅問其年云百三十嵗荷錫持鉼云發其國五年乃至燕都善衒惑之術於其指端出浮屠十層高三尺乃諸天神仙巧麗特絶人皆長五六分列幢蓋鼓舞繞塔而行歌唱之音如真人矣尸羅噴水為氛霧暗數里間俄而復吹為疾風氛霧皆止又吹指上浮圖漸入雲裏又於左耳出青龍右耳出白虎始出之時才一二寸稍至八九尺俄而風至雲起即以一手揮之則龍虎皆入耳中又張口向日則見人乘羽蓋駕螭鵠直入於口內復以手抑胸上而聞懷袖之中轟轟雷聲更張口則見羽蓋螭鵠相隨從口中而出尸羅常坐日中漸漸覺其形小或化為老叟或為嬰兒倐忽而死香氣盈室時有清風來吹之更生如向之形咒術衒惑神怪無窮八年盧扶國來朝渡河萬國方至云其國中山川無惡禽獸水不揚波風不折木人皆夀三百嵗結草為衣是為卉服至死不老咸知孝讓夀登百嵗以上相敬如至親之禮死葬於野外以香木靈草瘞掩其尸閭里助送號泣之音動於林谷河源為之流止春木為之改色居喪水漿不入於口至死者骨為塵埃然後乃食昔大禹隨山導川乃旌其地為無老純孝之國九年昭王思諸神異有谷將子學道之人也言於王曰西王母將來遊必語虛無之術不踰一年王母果至與昭王遊於燧林之下説炎帝鑽火之術取緑桂之膏燃以照夜忽有飛蛾銜火狀如丹雀來拂於桂膏之上此蛾出於員丘之穴穴洞達九天中有細珠如流砂可穿而結因用為珮此是神蛾之矢也蛾慿氣飲露飛不集下羣仙殺此蛾合丹藥西王母與羣仙遊員丘之上聚神蛾以瓊筐盛之使玉童負筐以遊四極來降燕庭出此蛾以示昭王王曰今乞此蛾以合九轉神丹王母弗與昭王坐握日之臺參雲上可捫日時有黑鳥白頭集王之所銜洞光之珠圓徑一尺此珠色黑如漆懸照於室內百神不能隱其精靈此珠出隂泉之底隂泉在寒山之北員水之中言水波常圎轉而流也有黑蚌飛翔來去於五嶽之上昔黃帝時霧成子遊寒山之嶺得黑蚌在髙崖之上故知黑蚌能飛矣至燕昭王時有國獻於昭王王取瑶漳之外洗其沙泥乃嗟嘆曰自懸日月以來見黑蚌生珠已八九十遇此蚌千嵗一生珠也珠漸輕細昭王常懷此珠當隆暑之月體自輕涼號曰銷暑招涼珠符子朔人有獻燕昭王以大豕者曰於今百二十嵗朔人謂之豕仙羣臣言於昭王曰是豕無用王命宰夫膳之豕既死乃見夢於燕相曰造化勞我以豕形食我以人穢今仗君之靈而化吾生也始得為魯津之伯而浮舟者食我粳糧之珍而欣君之惠將報子焉後燕相遊於魯津有赤龜銜夜光而獻之齊攻宋燕昭王使張魁將燕兵以從焉齊王殺之燕王聞之泣數行而下召有司而告之曰余興事而齊殺我使請令舉兵以攻齊也使受命矣凡繇進見爭之曰賢主故願為臣今王非賢主也願辭不為臣昭王曰是何也對曰松下之亂先君以不安棄羣臣昭王燕王子噲之子先君謂子噲也松下地名齊伐燕子噲於松下戰為齊所獲王苦痛之而事齊者力不足也今魁死而王攻齊是視魁而賢於先君王曰諾請王止兵王曰然則若何凡繇對曰請王縞素避舍於郊遣使於齊而謝焉曰此盡寡人之罪也大王賢主也豈盡殺諸侯之使者哉然而燕之使者獨死此弊邑之擇人不謹也願得變更請罪使者行至齊齊王方大飲左右官實御者甚衆因令使者進報使者報言燕王之甚恐懼而請罪也畢又復之以矜左右官實官實官長也因乃發小使以反令燕王復舍此濟上之所以敗也吕覽行論齊湣王南敗楚相唐昧於重丘西摧三晉於觀津遂與三晉擊秦助趙滅中山破宋廣地千餘里諸侯皆欲背秦而服於齊湣王自矜百姓弗堪於是燕昭王問伐齊之事於樂毅樂毅者其先祖曰樂羊為魏文侯將伐取中山文侯封樂羊以靈夀樂羊死葬於靈夀其後子孫因家焉中山復國至趙武靈王時復滅中山而樂氏後有樂毅樂毅賢好兵趙人舉之及武靈王有沙丘之亂乃去趙適魏聞昭王以子之之亂而齊大敗燕燕昭王怨齊未嘗一日而忘報齊也燕國小辟逺力不能制於是屈身下士先禮郭隗以招賢者樂毅於是為魏昭王使於燕燕王以客禮待之樂毅辭讓遂委質為臣燕昭王以為亞卿樂毅對曰齊霸國之餘業也地大人重未易獨攻也王必欲伐之莫如與趙及楚魏於是使樂毅約趙惠文王别使連楚魏令趙嚪秦以伐齊之利諸侯害齊湣王之驕暴皆爭合從與燕伐齊樂毅還報燕昭王悉起兵使樂毅為上將軍趙惠文王以相國印授樂毅樂毅於是并護趙楚韓魏燕之兵以伐齊破之濟西諸兵罷歸而燕軍樂毅獨追至於臨災齊湣王之敗濟西亡走保於莒樂毅獨留徇齊齊皆城守樂毅攻入臨災盡取齊寶物祭器輸之燕燕昭王大説親至濟上勞軍行賞饗士封樂毅於昌國號為昌國君於是燕昭王收齊鹵獲以歸而使樂毅復以兵平齊城之不下者以上史樂毅傳公孫龍説燕昭王以偃兵公孫龍魏人昭王曰甚善寡人願與客計之公孫龍曰竊意大王之弗為也王曰何故公孫龍曰日者大者欲破齊諸天下之士其欲破齊者大王盡飬之知齊之險阻要塞君臣之際者大王盡飬之雖知而弗欲破者大王猶若弗飬其卒果破齊以為功今大王曰我其偃兵諸侯之士在大王之本朝者盡善用兵者也臣是以知大王之弗為也王無以應吕覽應言燕有賢將秦開為質於胡胡甚信之歸而襲破東胡却地千餘里築長城自造陽至襄平置上谷漁陽右北平遼西遼東郡以拒胡史胸奴傳史蘇秦傳秦召燕王燕王欲往蘇代約燕王曰楚得枳而國亡齊得宋而國亡齊楚不得以有枳宋而事秦者何也則有功者秦之深讎也秦取天下非行義也暴也秦之行暴正告天下告楚曰蜀地之甲乘船浮於汶乘夏水而下江五日而至郢漢中之甲乘船出於巴乘夏水而下漢四日而至五渚寡人積甲宛東下隨智者不及謀勇士不及怒寡人如射隼矣王乃欲待天下之攻函谷不亦逺乎楚王為是故十七年事秦秦正告韓曰我起乎少曲一日而斷大行我起乎宜陽而觸平陽二日而莫不盡繇我離兩周而觸鄭五日而國舉韓氏以為然故事秦秦正告魏曰我舉安邑塞女戟韓氏太原卷我下軹道南陽封冀包兩周乘夏水浮輕舟強弩在前錟戈在後決滎口魏無大梁決白馬之口魏無外黃濟陽決宿胥之口魏無虛頓丘陸攻則擊河內水攻則滅大梁魏氏以為然故事秦秦欲攻安邑恐齊救之則以宋委於齊曰宋王無道為木人以寫寡人射其面寡人地絶兵逺不能攻也王茍能破宋有之寡人如自得之已得安邑塞女戟因以破宋為齊罪秦欲攻韓恐天下救之則以齊委於天下曰齊王四與寡人約四欺寡人必率天下以攻寡人者三有齊無秦有秦無齊必伐之必亡之已得宜陽少曲致藺石因以破齊為天下罪秦欲攻魏重楚則以南陽委於楚曰寡人固與韓且絶矣殘均陵塞鄳厄茍利於楚寡人如自有之魏棄與國而合於秦因以塞鄳厄為楚罪兵困於林中重燕趙以膠東委於燕以濟西委於趙趙得講於魏至公子延因犀首屬行而攻趙兵傷於譙石遇敗於陽馬而重魏則以葉蔡委於魏已得講於趙則劫魏不為割困則使太后弟穰侯為和嬴則兼欺舅與母適燕者曰以膠東適趙者曰以濟西適魏者曰以葉蔡適楚者曰以塞鄳厄適齊者曰以宋此必令言如循環用兵如刺蜚母不能制舅不能約龍賈之戰岸門之戰封陵之戰髙商之戰趙莊之戰秦之所殺三晉之民數百萬今其生者皆死秦之孤也西河之外上雒之地三川晉國之禍三晉之半秦禍如此其大也而燕趙之秦者皆以爭事秦説其主此臣之所大患也燕昭王不行蘇代復重於燕燕使約諸侯從親如蘇秦時或從或不而天下由此宗蘇氏之從約代厲皆以夀死名顯諸侯昭王三十三年卒子惠王立史燕世家惠王樂毅留徇齊五嵗下齊七十餘城皆為郡縣以屬燕唯獨莒即墨未服會燕昭王死子立為燕惠王惠王自為太子時嘗不快於樂毅及即位齊之田單聞之乃縱反間於燕曰齊城不下者兩城耳然所以不早拔者聞樂毅與燕新王有隙欲連兵且留齊南面而王齊齊之所患惟恐他將之來於是燕惠王固已疑樂毅得齊反間乃使騎劫代將而召樂毅樂毅知燕惠王之不善代之畏誅遂西降趙趙封樂毅於觀津號曰望諸君尊寵樂毅以警動於燕齊齊田單後與騎劫戰果設詐誑燕軍遂破騎劫於即墨下而轉戰逐燕北至河上盡復得齊城而迎襄王於莒入於臨災史樂毅傳樂毅為燕昭王謀連四國之兵以伐齊大破之閔王亡逃僅以身匿莒樂毅追之遂屠七十餘城臨淄盡降惟莒即墨未下盡復收燕寶器而歸復易王之辱樂毅謝罷諸侯之兵而獨圍莒即墨時田單為即墨令患樂毅善用兵田單不能詐也欲去之昭王又賢不肯聽讒會昭王死惠王立田單使人讒之惠王燕世家惠王為太子時與樂毅有隙及即位疑毅惠王使騎劫代樂毅樂毅去之趙不歸燕騎劫既為將軍田單大喜設詐大破燕軍殺騎劫盡收復七十餘城是時齊閔王已死田單得太子於莒立為齊襄王而燕惠王大慚自悔易樂毅以致此禍惠王乃使人遺樂毅戰國策作樂間書曰寡人不佞不能奉順君志故君捐國而去寡人不肖明矣敢竭其願而君弗肯聽也故使使者陳愚志君誠諭之語曰仁不輕絶智不輕怨君於先王世之所明知也寡人望有非則君覆蓋之不虞君明棄之也望有過則君教誨之不虞君明罪之也寡人之罪百姓弗聞君微出明怨以棄寡人寡人必有罪矣然恐君之未盡厚矣諺曰厚者不損人以自益仁者不危軀以要名故覆人之邪者厚之行也救人之過者仁之道也世有覆寡人之邪救寡人之過非君烏所望之今君厚受德於先王之成尊輕棄寡人以快心則覆邪救過難得於君矣且世有厚薄故施異行有得失故患同今寡人任不肖之罪而君有失厚之纍於為君擇無所取國有封疆猶家之有垣牆所以合好覆惡也室不能相和出訟鄰家未為通計也怨惡未見而明棄之未為盡厚也寡人雖不肖未如殷紂之亂也君雖未得志未如商容箕子之纍也然不內盡寡人明怨於外恐其適足以傷髙義而薄於行也非然茍可以成君之髙明君之義寡人雖惡名不難受也本以為明寡人之薄而君不得厚揚寡人之毁而君不得榮是一舉而兩失也義者不毁人以自益况傷人以自損乎願君無以寡人之不肖纍往事之美昔者栁下季為理於魯三絀而不去或曰可以去矣柳下季曰茍與人異惡往而不絀乎猶且絀也寧故國耳柳下季不以絀自纍故逺近無議寡人之罪國人不知而議寡人者遍天下諺曰仁不輕絶知不簡功簡功棄大者仇也輕絶厚利者怨也仇而棄之怨而纍之宜在逺者不望之乎君今寡人無罪君豈怨之乎願君捐忿和怒追順先王以復教寡人寡人意君之曰余將快心以成而過不顧先王以明而惡使寡人進不得循初退不得變過此君所制惟君圖之此寡人之愚志敬以書謁之新序卷三與國策少異其樂毅報書同國策燕惠王後悔使騎劫代樂毅以故破軍亡將失齊又怨樂毅之降趙恐趙用樂毅而乘燕之弊以伐燕燕惠王乃使人讓樂毅且謝之曰先王舉國而委將軍將軍為燕破齊報先王之讎天下莫不震動寡人豈敢一日而忘將軍之功哉會先王棄羣臣寡人新即位左右誤寡人寡人之使騎劫代將軍為將軍久暴露於外故召將軍且休計事將軍過聽以與寡人有隙遂捐燕歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎樂毅報遺燕惠王書曰臣不佞不能奉承王命以順左右之心恐傷先王之明有害足下之義故遁逃走趙今足下使人數之以罪臣恐侍御者不察先王之所以畜幸臣之理又不白臣之所以事先王之心故敢以書對臣聞賢聖之君不以祿私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣竊觀先王之舉也見有髙世主之心故假節於魏以身得察於燕先王過舉厠之賔客之中立之羣臣之上不謀父兄以為亞卿臣竊不自知自以為奉令承教可幸無罪故受令而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣曰夫齊霸國之餘業而最勝之遺事也練於兵甲習於戰攻王若欲伐之必與天下圖之與天下圖之莫若結於趙且又淮北宋地楚魏之所欲也趙若許而約四國攻之齊可大破也先王以為然具符節南使臣於趙顧反命起兵擊齊以天之道先王之靈河北之地隨先王而舉之濟上濟上之軍受命擊齊大敗齊人輕卒鋭兵長驅至國齊王遁而走莒僅以身免珠玉財寶車甲珍器盡收入於燕齊器設於寧臺大吕陳於元英故鼎反乎磨室薊丘之植植於汶篁自五伯已來功未有及先王者也先王以為慊於志故裂地而封之使得比小國諸侯臣竊不自知自以為奉命承教可幸無罪是以受命不辭臣聞賢聖之君功立而不廢故著於春秋蚤知之士名成而不毁故稱於後世若先王之報怨雪耻夷萬乘之強國收八百嵗之蓄積及至棄羣臣之日餘教未衰執政任事之臣修法今慎庶孽施及乎萌𨽻皆可以教後世臣聞之善作者不必善成善始者不必善終昔伍子胥説聽於闔閭而吳王逺迹至郢夫差弗是也賜之鴟夷而浮之江吳王不寤先論之可以立功故沈子胥而不悔子胥不蚤見主之不同量是以至於入江而不化夫免身立功以明先王之迹臣之上計也離毁辱之誹謗墮先王之名臣之所大恐也臨不測之罪以幸為利義之所不敢出也臣聞古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教於君子矣恐侍御之親左右之説不察踈逺之行故敢獻書以聞惟君王之留意焉按樂毅書與國策稍異於是燕王復以樂毅子樂間為昌國君而樂毅往來復通燕燕趙以為客卿樂毅卒於趙史樂毅傳燕將攻下聊城聊城人或讒之燕燕將懼誅因保聊城不敢歸齊田單攻之嵗餘士卒多死而聊城不下魯連乃為書約之矢以射城中遺燕將書書曰吾聞之智者不倍時而棄利勇士不怯死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣非忠也殺身亡聊城而威不信於齊非勇也功敗名滅後世無稱焉非智也三者世主不臣説士不載故智者不再計勇士不怯死今死生榮辱貴賤尊卑此時不再至願公詳計而無與俗同且楚攻齊之南陽魏攻平陸而齊無南面之心以為亡南陽之害小不如得濟北之利大故定計審處之今秦人下兵魏不敢東面衡秦之勢成楚國之形危齊棄南陽斷右壤定濟北計猶且為之也且夫齊之必決聊城公勿再計今楚魏交退於齊而燕救不至以全齊之兵無天下之規與聊城共據期年之敝則臣見公之不能得也且燕國大亂君臣失計上下迷惑栗腹以十萬之衆五折於外以萬乘之國被圍於趙壤削主困為天下僇笑國敝而禍多民無所歸心今公又以敝聊城之民距全齊之兵是墨翟之守也食人炊骨士無反外之心是孫臏之兵也能見於天下雖然為公計者不如全車甲以報於燕車甲全而歸燕燕王必喜身全而歸於國士民如見父母交遊攘臂而議於世功業可明上輔孤主以制羣臣下飬百姓以資説士矯國更俗功名可立也亡意亦捐燕棄世東遊於齊乎裂地定封富比乎陶衛世世稱孤與齊久存又一計也此兩計者顯名厚實也願公詳計而審處一焉且吾聞之規小節者不能成榮名惡小耻者不能立大功昔者管夷吾射桓公中其鈎篡也遺公子糾不能死怯也束縛桎梏辱也若此三行者世主不臣而鄉里不通鄉使管子幽囚而不出身死而不反於齊則亦名不免為辱人賤行矣臧獲且羞與之同名矣况世俗乎故管子不恥身在縲紲之中而耻天下之不治不恥不死公子糾而恥威之不信於諸侯故兼三行之過而為五霸首名髙天下而光燭鄰國曹子為魯將三戰三北而亡地五百里鄉使曹子計不反顧議不還踵刎頸而死則亦名不免為敗軍禽將矣曹子棄三北之恥而退與魯君計桓公朝天下會諸侯曹子以一劍之任枝桓公之心於壇坫之上顔色不變辭氣不悖三戰之所亡一朝而復之天下震動諸侯驚駭威加吳越若此二士者非不能成小廉而行小節也以為殺身亡軀絶世滅後功名不立非智也故去感忿之怨立終身之名棄忿悁之節定纍世之功是以業與三王爭流而名與天壤相弊也願公擇一而行之燕將見魯連書泣三日猶豫不能自決欲歸燕已有隙恐誅欲降齊所殺虜於齊甚衆恐已降而後見辱喟然嘆曰與人刃我寧自刃乃自殺聊城亂田單遂屠聊城歸而言魯連欲爵之魯連逃隱於海上曰吾與富貴而詘於人寧貧賤而輕世肆志焉史魯仲連傳鄒衍事燕惠王盡忠左右譖之王繫之衍仰天而哭夏五月天為之降霜淮南子惠王七年卒韓魏楚共伐燕燕武成王立史燕世家惠按趙世家文王二十八年燕相成安君公孫操弒其王樂資以為即惠王也而燕世家不載何歟武成王武成王七年齊田單伐我拔中陽史燕世家十三年秦敗趙於長平四十餘萬史燕世家十四年武成王卒子孝王立史燕世家孝王孝王元年秦圍邯鄲者解去史燕世家三年孝王卒子今王喜立史燕世家王喜四年燕王喜命相栗腹約歡趙以五百金為趙王酒還報燕王曰趙王壯者皆死長平其孤未壯可伐也王召昌國君樂間問之對曰趙四戰之國其民習兵不可伐王曰吾以五而伐一對曰不可燕王怒羣臣皆以為可卒起二軍車二千乘栗腹將而攻鄗卿秦攻代惟大夫將渠謂燕王曰與人通關約交以五百金飲人之王使者報而反攻之不祥燕王不聽自將偏軍隨之將渠引燕王綬止之曰王必無自往往無成功王蹴之以足將渠泣曰臣非以自為為王也燕軍至宋子趙使亷頗將擊破栗腹於鄗破卿秦樂乘於代樂間奔趙廉頗逐之五百餘里圍其國燕人請和趙人不許史燕世家六年秦滅東西周置三川郡史燕世家七年秦拔趙榆次三十七城秦置太原郡史燕世家九年秦王政初即位史燕世家樂間居燕三十餘年燕王喜用其相栗腹之計欲攻趙而問昌國君樂間樂間曰趙四戰之國也其民習兵伐之不可燕王不聽遂伐趙趙使亷頗擊之大破栗腹之軍於鄗禽栗腹樂乘樂乘者樂間之宗也於是樂間奔趙趙遂圍燕燕重割地以與趙和趙乃解而去燕王恨不用樂間樂間既在趙乃遺樂間書曰書與國策異紂之時箕子不用犯諫不怠以冀其聽商容不達身祗辱焉以冀其變及民志不入獄囚自出然後二子退隱故紂負桀暴之纍二子不失忠聖之名何者其憂患之盡矣今寡人雖愚不若紂之暴也燕民雖亂不若殷民之甚也室有語不相盡以告鄰里二者寡人不為君取也樂間樂乘怨燕不聽其計二人卒留趙趙封樂乘為武襄君其明年樂乘亷頗為趙圍燕燕重禮以和乃解史樂毅傳十年趙孝成王卒襄王使樂乘代廉頗亷頗攻樂乘樂乘走廉頗亡入魏後十六年而秦滅趙史樂毅傳劇辛故居趙與龎暖善已而亡走燕燕見趙數困於秦而亷頗去令龎暖將也欲因趙弊攻之問劇辛辛曰龎暖易與耳燕使劇辛將擊趙趙使龎暖擊之取燕軍二萬殺劇辛王喜十二年後事秦拔魏二十城置東郡史燕世家十九年秦拔趙之鄴九城趙悼襄王卒史燕世家二十三年太子丹質於秦亡歸燕史燕世家二十五年秦虜滅韓王安置潁川郡史燕世家二十七年秦虜趙王遷滅趙趙公子嘉自立為代王燕見秦且滅六國秦兵臨易水禍且至燕太子丹隂飬壯士二十人使荆軻獻督亢地圖於秦因襲刺秦王秦王覺殺軻使將軍王翦擊燕史燕世家荆軻者衛人也地志淇縣人其先乃齊人徙於衛衛人謂之慶卿而之燕博物志軻字次非荆人即殺蛟者燕人謂之荆卿荆卿好讀書擊劍以術説衛元君衛元君不用其後秦伐魏置東郡徙衛元君之支屬於野王荆軻嘗遊過榆次與蓋聶論劍蓋聶怒而目之荆軻出人或言復召荆卿蓋聶曰曩者吾與論劍有不稱者吾目之試往是宜去不敢留使使往之主人荆卿則已駕而去榆次矣使者還報蓋聶曰固去也吾曩者目攝之荆軻遊於邯鄲魯句踐與荆軻博爭道魯句踐怒而叱之荆軻默而逃去遂不復會荆軻既至燕愛燕之狗屠及善擊築者髙漸離荆軻嗜酒日與狗屠及髙漸離飲於燕市地志太子丹與樊將軍飲華陽臺出美人佐酒酒酣以往髙漸離擊築荆軻和而歌於市中相樂也已而相泣旁若無人者荆軻雖逰于酒人乎然其為人沈深好書其所遊諸侯盡與其賢豪長者相結其之燕燕之處士田光先生亦善待之知其非庸人也居頃之會燕太子丹質秦亡歸燕燕太子丹者故嘗質於趙而秦王政生於趙其少時與丹歡及政立為秦王而丹質於秦秦王之遇燕太子丹不善故丹怨而亡歸歸而求為報秦王者國小力不能其後秦稍蠶食諸侯且至於燕燕君臣皆恐禍之至太子丹患之問其傅鞠武鞠武使太子請於田光先生田光薦荆軻於太子太子使荆軻持樊將軍首及督亢圖獻秦王因刺之不中殺荆軻並詳國策秦使王翦伐燕拔薊城燕王喜太子丹等率其精兵東保於遼東秦益遣李信追擊燕王史刺客傳博物志燕太子丹質於秦秦王遇之無禮不得意思欲歸請於秦王王不聽謬言曰令烏頭白馬生角乃可丹仰而嘆烏即頭白俯而嗟馬生角秦王不得已而遣之為機發之橋欲陷丹丹驅馳過之而橋不發遁到關關門不開丹為雞鳴於是衆雞悉鳴遂歸又燕丹子列士傳燕丹使田光值候荆軻值其醉唾其耳中軻覺曰此出口入耳之言必大事也則往見光風俗通燕太子丹仰嘆天為雨粟燕丹子田光謂荆軻曰太子傾心於足下荆軻曰有鄙志嘗謂心合意沒身不顧情有異一毛不拔荆軻之燕太子曰田先生今無恙乎軻曰光臨送軻之時言太子戒以國事恥以丈夫而不見信向軻吞舌而死矣燕丹子太子自喜得荆軻永無憂秦後日與軻之東宫臨池而觀軻拾瓦投蛙太子令人奉盤金軻用抵蛙復進軻曰非為太子愛金也但臂痛耳又曰太子常與荆軻同案而食同牀而寢太子與荆軻置酒美人鼓瑟軻曰好手太子即斷其手以玉盤盛而奉之地志涿州華陽臺燕丹與樊將軍飲此出美人佐酒二十九年秦攻拔我薊燕王亡徙居遼東斬丹以獻秦三十年秦滅魏三十三年秦拔遼東虜燕王喜卒滅燕是嵗秦將王賁亦虜代王嘉史燕世家史刺客傳代王嘉遺燕王喜書曰秦所以尢追燕急者以太子丹故也今王誠殺丹獻之秦王秦王必解而社稷幸得血食其後李信追丹丹匿衍水中燕王乃使使斬太子丹欲獻之秦秦復進兵攻之後五年秦卒滅燕虜王喜秦逐太子丹荆軻之客皆亡髙漸離變名姓為人庸保匿作於宋子宋子縣名也久之作苦聞其家堂上客擊築倣徨不能去每出言曰彼有善有不善從者以告其主曰彼庸乃知音竊是非家丈人召使前擊築一坐稱善賜酒而高漸離念久隱畏約無窮時乃退出其裝匣中築與其善衣更容貌而前舉坐客皆驚下與抗禮以為上客使擊築而歌客無不流涕而去者宋子傳客之聞於秦始皇秦始皇召見人有識者乃曰高漸離也秦始皇惜其善擊築重赦之乃矐其目使擊築未嘗不稱善稍益近之高漸離乃以鉛置築中復進得近舉築撲秦皇帝不中於是遂誅髙漸離終身不復近諸侯之人太史公曰世言荆軻其稱太子丹之命天雨粟馬生角也太過又言荆軻傷秦王皆非也風俗通卷之六燕太子丹遣荆軻欲西刺秦王與客送之易水而設祖道髙漸離擊築荆軻和歌為濮上音士皆垂髮涕泣後為羽聲慷慨而索瞋目髮盡上指冠荆軻入秦事敗而死漸離變名易姓為人庸保匿作於宋子久之作苦聞其家堂上客擊築伎癢不能止出言曰彼有善不善從者告其主曰彼庸乃知音竊言是非家丈人作樂召前使擊築一坐稱美賜酒而漸離念久畏約毋窮已時乃退出裝匣中築與其善衣更容貌而前莫不驚愕下與亢禮以為上客使擊築無不涕泣而去者宋子客傳之聞於秦始皇始皇召見人有識者乃髙漸離始皇惜其善擊築重殺之乃矐其目使擊築未嘗不稱善稍益近之漸離乃以鉛置築木中後進得近舉築撲始皇不中於是遂誅雜録人有言有知不死之道者燕君使人受之不捷而言者死燕君甚怒其使者將加誅焉幸臣諫曰人所憂者莫急乎死已所重者莫過乎生彼自喪其生安能令君不死也乃不誅有齊子亦欲學其道聞言者之死乃撫膺而恨富子聞而笑之曰夫所欲學不死其人已死而猶恨之是不知所以為學胡子曰富子之言非也凡人有術不能行者有矣能行而無其術者亦有矣衛人有善數者臨死以訣喻其子其子志其言而不能行者也他人問之以其父所言告之問者用其言而行其術與其父無差焉若然死者奚為不能言生術哉列子説符客有教燕王為不死之道者王使人學之所使學者未及學而客死王大怒誅之王不知客之欺已而誅學者之晚也韓子外儲左宋人有請為燕王以棘刺之端為母猴者必三月齋然後能觀之燕王因以三乘飬之右御冶工言於王曰臣聞人主無十日不燕之齋今知王不能久齋以觀無用之器也故以三月為期凡刻削者以其所以削必小今臣冶人也無以為之削此不然物也不然之物謂無益於用也王必察之王因囚而問之果妄乃殺之冶人謂王曰計無度量言談之士多棘刺之説也一曰衛有人好微巧能以棘刺之端為母猴燕王説之飬之以五乘之奉王曰吾試觀客為棘刺之母猴客曰人主欲觀之必半嵗不入宫不飲酒食肉雨霽日出視之晏隂之間乃可見也鄭有臺下之冶者謂燕王曰臣削者也諸微物必以削削之而所削必大於削今棘刺之端不容削鋒王試觀客之削能與不能可知也王曰善謂衛人曰客為棘刺之端以削吾欲觀之客曰臣請之舍取之因逃韓子外儲左公行子之之燕遇曾元於塗曰燕君何如曾元曰志卑志卑者輕物輕物者不求助何能舉荀子大略燕人李季好逺出其妻私有通於士季突至士在內中妻患之其室婦曰令公子裸而解髮直出門吾屬佯不見也於是公子從其計疾走出門季曰是何人也家人皆曰無有季曰吾見鬼乎婦人曰然為之奈何曰取五姓之矢一云尿浴之季曰諾乃浴以矢一曰浴以蘭湯韓子內儲下燕人生長於楚及老而還本國過晉同行者誑之指城曰此燕國之城其人愀然變容指社曰此君里之社乃喟然而嘆指舍曰此君先人之廬乃潸然而泣指壠曰此君先人之冢其人泣不自禁列子郢人有遺燕相國書者夜書火不明因謂持燭者舉燭云而過書舉燭非書意也燕相受書而説之曰舉燭者尚明也尚明也者舉賢而任之也燕相白王王大悅國以治治則治矣非書意也韓非子春秋戰國異辭卷三十二
