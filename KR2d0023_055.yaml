body:
  text: 春秋戰國異辭卷五十二右春坊右諭德陳厚耀撰越吳越春秋禹周行天下還歸大越登茅山以朝四方羣臣封有功爵有德崩而葬焉至于少康恐禹迹宗廟祭祀之絶乃封其庶子於越號曰無餘越絶記云無餘都會稽山南故越城是也史越世家越王其先禹之苗裔而夏后帝少康之庶子也封于會稽以奉禹之祀文身斷髮披草萊而邑焉後二十餘世至于允常允常之時與吳王闔廬戰而相怨伐允常越王允常聘區冶子作名劍五枚一曰純鉤二曰湛盧三曰豪曹或曰盤郢四曰魚腸五曰巨闕秦客薛燭善相劍一作句踐時事王取純鉤示之薛燭矍然望之曰沈沈如芙蓉始生于湖觀其文如列星之行觀其光如水之溢塘觀其色煥煥如氷將釋見日之光王曰客有賣此劔者有市之鄉三十駿馬千匹千戶之都二其可與乎薛燭曰不可臣聞王之造此劔赤堇之山破而出錫若耶之溪涸而出銅吉日良時雨師灑道雷公發鼓蛟龍捧爐天帝裝炭太一下觀于是區冶子因天地之精造為此劔取湛盧示之薛燭曰善哉銜金鐡之英行氣託靈服此劔者可以折衝伐敵人君有逆謀則去之自秦客薛燭以下至此或載入闔閭下越此下類函所引與今吳春秋小異允常以魚腸湛盧豪曹獻吳王僚後闔閭為一女殺生以送死湛盧之劔惡其無道乃去如楚昭王寐而得之召風胡子問之此劔值幾何對曰赤堇之山已合若耶之溪深而不測羣神上天區冶子已死雖有傾城量金珠玉猶不可與况駿馬萬戶之都乎吳越春秋吳越春秋越王允常聘歐冶子作劔五枚地志浙江歐冶子吳闔閭大夫之子三大二小三曰豪曹秦客薛燭善相劔王取豪曹示之薛燭曰非寶劔也今豪曹五色黯然無華已殞其光亡其神此劔不登斬而辱則墮于飲中矣王曰寡人置劔竹盧上過而墜之斷金獸之頸飲濡其刃以為利也地志浙江處州府龍泉縣有劔池湖相傳歐冶子鑄劔于此號龍淵劔允常卒子句踐立句踐上句踐元年吳王闔廬聞允常死乃興師伐越越王句踐使死士挑戰三行至吳陳呼而自剄吳師觀之越因襲擊吳師吳師敗于檇李射傷吳王闔廬闔廬且死告其子夫差曰必毋忘越三年句踐聞吳王夫差日夜勒兵且以報越越欲先吳未發往伐之范蠡諫曰不可臣聞兵者凶器也戰者逆德也爭者事之末也隂謀逆德好用凶器試身於所末上帝禁之行者不利越王曰吾已決之矣遂興師吳王聞之悉發精兵擊越敗之夫椒越王乃以餘兵五千人保棲于會稽吳王追而圍之越王謂范蠡曰以不聽子故至於此為之奈何蠡對曰持滿者與天定傾者與人節事者以地卑辭厚禮以遺之不許而身與之市句踐曰諾乃令大夫種行成于吳膝行頓首曰君王亡臣句踐使陪臣種敢告下執事句踐請為臣妻為妾吳王將許之子胥言于吳王曰天以越賜吳勿許也種還以報句踐句踐欲殺妻子燔寶器觸戰以死種止句踐曰夫吳太宰嚭貪可誘以利請間行言之於是句踐乃以美女寶器令種間獻吳太宰嚭嚭受乃見大夫種于吳王種頓首言曰願大王赦句踐之罪盡入其寶器不幸不赦句踐將盡殺其妻子燔其寶器五千人觸戰必有當也嚭因説吳王曰越已服為臣若將赦之此國之利也吳王將許之子胥進諫曰今不滅越後必悔之句踐賢君種蠡良臣若反國將為亂吳王弗聽卒赦越罷兵而歸史越世家越絶書紀策范蠡始居楚生于宛槖或伍戶之虛其為結僮之時一癡一醒時人盡以為狂然獨有聖賢之明人莫可與語內視若盲反聽若聾大夫種入其縣知有賢者未覩所在求邑中不得其邑人以為狂夫多賢士衆賤有君子泛求之焉得蠡而悅乃從官屬問治術蠡修衣冠有頃而出進退揖讓君子之容終日而語陳霸王之道志合意同捐其官位相要而往止于吳二人以為子胥在無所聞其辭種曰今將安之蠡曰彼為我何邦不可乎去吳之越句踐賢之種躬正內蠡出治外臣主同心遂霸越邦越絶書內傳句踐欲伐吳闔廬范蠡諫曰不可臣聞之天貴持盈持盈者言不失隂陽日月星辰之綱紀地貴定傾定傾者言地之長生丘陵平均無不得宜人貴節事節事者言王者以下公卿大夫當調隂陽和順天下事來應之物來知之天下莫不盡其忠信從其政教謂之節事節事者至事之要也天道盈而不溢盛而不驕言天生萬物以養天下蠉飛蠕動各得其性春生夏長秋收冬藏不失其常故曰天道盈而不溢盛而不驕者也地道施而不德勞而不矜其功言地生長五穀持養萬物功盈德博是所謂施而不德勞而不矜其功者也人道不逆四時言王者以下至于庶人皆當和隂陽四時之變順之者有福逆之者有殃故曰人道不逆四時之謂也因惛視動者言存亡吉凶之應善惡之敘必有漸也天道未作不先為客言客者去其國入人國也地兆未發不先動衆言非春夏之時不可以種五穀國家不見死亡之失不可伐也越絶書范伯范蠡始居楚曰范伯自謂衰賤未嘗世祿故自菲薄食則甘天下之無味居則安天下之賤位復被髮佯狂不與于世謂大夫種曰三王則三皇之苗裔也五伯乃五帝之末世也天運歷紀千嵗一至黃帝之元執辰破已霸王之氣見于地戶于是要大夫種入吳此時馮同相與共戒之伍子胥在自與不能關其辭蠡曰吳越二邦同氣共俗地戶之位非吳則越乃入越越王常與言盡日大夫石買居國有權辨口進曰衒女不貞衒士不信和氏之璧求者不爭賈騏驥之材不難險阻之路客歷諸侯無所售無因自致殆非真賢惟大王察之于是范蠡退而不言逰于楚越之間大夫種進曰昔者市偷自衒于晉晉用之而勝楚伊尹負鼎入殷遂佐湯取天下有智之士不在逺近取也謂之帝王求備者亡易曰有髙世之材必有負俗之纍有至智之明者必破庶衆之議成大功者不拘于俗論大道者不合于衆唯大王察之王曰石買知往而不知來其使寡人棄賢後遂師二人竟以禽吳石買益疏其後使將兵于外遂為軍士所殺列仙傳范蠡字少伯徐人也事周師太公望好服桂飲水為越大夫破吳後乘輕舟入海變名適齊為鴟夷子更後百餘年見于陶為陶朱君財纍億萬復棄之蘭陵賣藥後人世世識見之云新論知人范蠡吠于犬竇文種聞而拜之史記正義會稽録范蠡字少伯越之上將軍也本楚宛三戶人佯狂倜儻負俗文種為宛令遣吏謁奉吏還曰范蠡本國狂人生有此病種笑曰吾聞士有賢俊之姿必有佯狂之譏內懷獨見之明外有不智之毁此固非二三子之所知也駕車而往蠡避之後知種之必來謁謂兄嫂曰今日有客願假衣冠有頃種至抵掌而談旁人觀者聳聽之矣吳越春秋文種字子禽荆平王時為宛令之三戶之里范蠡從犬竇蹲而吠之從吏恐文種慙令人引衣而障之文種曰無障也吾聞犬之所吠者人今吾到此有聖人之氣行而求之來至於此且人身而犬吠者謂我是人也乃下車拜蠡不為禮今本無吳越春秋文種楚平王時為宛令不治官職有若狂也地志文種字子禽浙江鄞縣人句踐之困於會稽也喟然嘆曰吾終于此乎種曰湯繫夏臺文王囚羑里晉重耳奔翟齊小白奔莒其卒王霸由此觀之何遽不為福乎吳既赦越越王句踐反國乃苦身焦思置膽於坐坐卧即仰膽飲食亦嘗膽也曰女忘會稽之恥耶身自耕作夫人自織食不加肉衣不重采折節下賢人厚遇賓客振貧弔死與百姓同其勞欲使范蠡治國政蠡對曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種於是舉國政屬大夫種而使范蠡與大夫柘稽行成為質於吳二嵗而吳歸蠡史越世家越絶書德序句踐困于會稽嘆曰我其不伯乎欲殺妻子角戰以死蠡對曰殆哉王失計也愛其所惡且吳王賢不離不肖不去若卑辭以地讓之天若棄彼彼必許句踐曉焉曰豈然哉遂聽之新書夫差即位乃與越人戰江上棲之會稽越王之窮至乎吃山草飲腑水易子而食於是履甓戴璧號吟告毋罪呼皇天使大夫種行成於吳王吳王將許子胥曰不可越國之俗勤勞而不愠好亂勝而無禮溪徼而輕絶俗好詛而倍盟放此類者鳥獸之儕徒狐狸之醜類也生之為患殺之無咎請無與成大夫種拊心嘷啼沫泣而言信割白馬而為犧指九天而為證請婦人妾丈夫為臣百世名寶因間官為積孤身為關內諸侯世為忠臣吳王不忍結師與成越絶書會稽山土城者句踐與吳戰大敗棲其中因以下為目魚池其利不租吳越春秋越王既棲會稽范蠡等曰臣竊見會稽之山有魚池上下二處水中有三江四瀆之流九溪六谷之廣上池宜于君王下池宜于臣民畜魚三年其利可以致千萬越國當富盈地志紹興府句乘山在諸暨縣句踐所都闔閭侵越句踐退保于城山在蕭山縣山顛有泉産嘉魚吳王意其乏水餽以米鹽句踐取雙鯉報之吳兵夜遁句踐入官於吳身執干戈為吳王洗馬韓子越絶書記地句踐入官于吳夫人從道産女于亭養子李鄉句踐勝吳更名亭為女陽亭更李鄉為語兒鄉吳越春秋越王句踐五年五月與大夫文種范蠡入臣于吳羣臣皆送至浙江之上臨水祖道軍陳固陵文種前為祝詞曰皇天祐助前沈後揚禍為德根憂為福堂威人者滅服從者昌王雖雖一作離牽致其後無殃君臣生離感動上皇衆夫哀悲莫不感傷臣請薦薦一作薄脯行酒三觴越王仰天太息舉杯垂涕默無所言種復前祝曰大王德夀無疆無極乾坤受靈神祗輔翼我王厚之祉祐在側德銷百殃利受其福去彼吳庭來歸越國觴酒既升請稱萬嵗越王曰孤承前王餘德守國于邊幸蒙諸大夫之謀遂保前王邱墓今遭辱恥為天下笑將孤之罪耶諸大夫之責也大夫扶同曰扶史作逢何言之鄙也昔湯繫于夏臺伊尹不離其側文王囚于石室太公不棄其國興衰在天存亡繫于人湯改儀而媚于桀文王服從而幸于紂夏殷恃力而虐二聖兩君屈已以得天道故湯王不以窮自傷周文不以困為病越王曰昔堯任舜禹而天下治雖有洪水之害不為人災變異不及于民况于人君乎大夫苦成曰不如君王之言天有歷數德有厚薄黃帝不讓堯傳天子三王臣弒其君五霸子弒其父德有廣狹氣有髙下今之世猶人之市置貨以設詐抱謀以待敵不幸陷厄求伸而已大王不覽于斯而懷喜怒越王曰任人者不辱身自用者危其國大夫皆前圖未然之端傾敵破仇坐招泰山之福今寡人守窮若斯而云湯文困厄後必霸何言之違禮乎夫君子爭寸隂而棄珠玉今寡人冀得免于軍旅之憂而復反係於敵人之手身為傭𨽻妻為僕妾往而不返客死敵國若魂魄有知愧於前君其無知體骨棄捐何大夫之言不合於寡人於是大夫種范蠡曰古人曰居不幽志不廣形不愁思不逺聖王賢主皆遇困厄之難蒙不赦之恥身居而名尊軀辱而聲榮處卑而不以為惡居危而不以為薄五帝德厚無窮厄之恨然尚有泛濫之憂此下疑有闕文三守暴困之辱不離三獄之困涕泣而受寃行哭而為𨽻演易作卦天道祐之時過於期否終則泰諸侯並救王命見符朱鬛玄豹輔臣結髮折獄破械反國修德遂討其仇擢假海內若覆手背天下宗之功垂萬世大王屈厄臣誠盡謀夫截骨之劔無削剟之利臽鐵之矛無分髮之便建策之士無暴興之説今臣遂天文案墜籍二氣共萌存亡異處彼興則我辱我霸則彼亡二國爭道未知所就君王之厄天道之數何必自傷哉夫吉者凶之門福者禍之根今大王雖在危困之際孰知其非暢達之兆哉大夫計􅒍越絶作計倪史作計然裴駰按范子曰計然者葵丘濮上人姓辛氏字文子其先晉國亡公子也南遊於楚范蠡師事之曰今君王國於會稽窮入於吳言悲辭苦羣臣泣之雖則恨悷之心莫不感動而君王何為謾辭譁説用而相欺臣誠不取越王曰寡人將去入吳以國纍諸侯大夫願各自述吾將屬焉大夫臯如曰臣聞大夫種忠而善慮民親其知士樂為用今委國一人其道必守何順心佛命羣臣佛大也大夫曳庸曰左傳作后庸國語作舌庸大夫文種者國之梁棟君之爪牙夫驥不可與匹馳日月不可並照君王委國於種則萬綱千紀無不舉者越王曰夫國者前王之國孤力弱勢劣不能遵守大夫客官於吳委國歸民以付二三子吾之由也亦子之憂也君臣同道父子同氣天性自然豈得以在者盡忠亡者為不信乎何諸大夫論事一合一離令孤心不定也夫推國任賢度功績成者君之命也奉教順理不失分者臣之職也吾願諸大夫以其所能而云委質而已於乎悲哉計􅒍曰君王所陳者固其理也昔湯入夏委國於文祀西伯之殷委國於一老今懷憂將滯志在於還夫適市之妻教嗣糞除出亡之君勑臣守禦子問以事臣謀以能今君王欲士之所志各陳其情舉其能者議其宜也越王曰大夫之論是也吾將逝矣願聞諸君之風大夫種曰夫內修封疆之役外修耕戰之備荒無遺土百姓親附臣之事也大夫范蠡曰輔危主存亡國不恥屈厄之難安守被辱之地往而必反與君復仇臣之事也大夫苦成曰發君之令明君之德窮與俱厄進與俱霸統煩理亂使民知分臣之事也大夫曳庸曰奉令受使結和諸侯通命達旨賂往遺來解憂釋患使無所疑出不忘命入不被尤臣之事也大夫皓進曰一心齊志上與等之下不違令動從君命修德履義守信溫故臨非決疑君誤臣諫直心不撓舉過列平不阿親戚不私於外推身致君終始一分臣之事也大夫諸稽郢曰望敵設陳飛矢揚兵履腹涉尸血流滂滂貪進不退二師相當破敵攻衆威凌百邦臣之事也大夫臯如曰修德行惠撫慰百姓身臨憂勞動輒躬親弔死存疾救活民命蓄陳儲新食不二味國富民實為君養器臣之事也大夫計􅒍曰候天察地紀歷隂陽觀變參災分别妖祥日月含色五精錯行福見知吉妖出知凶臣之事也越王曰孤雖入於北國為吳窮虜有諸大夫懷德抱術各守一分以保社稷孤何憂焉遂别於浙江之上羣臣垂泣莫不咸哀越王仰天嘆曰死者人之所畏若孤之聞死其於心胸曽無怵惕遂登船徑去終不返顧越王夫人乃據船哭顧烏鵲啄江渚之蝦飛去復來因哭而歌之曰仰飛鳥兮烏鳶凌玄虛兮翩翩集洲渚兮優恣啄蝦矯翮兮雲間任厥性兮往還妾無罪兮負地有何辜兮譴天帆帆獨兮西往孰知返兮何年心惙惙兮若割淚泫泫兮雙懸又哀吟曰彼飛鳥兮鳶烏已回翔兮翕蘇心在専兮素蝦何居食兮江湖徊復翔兮遊揚去復返兮於乎始事君兮去家終我命兮君都終來遇兮何辜離我國兮去吳妻衣褐兮為婢夫去冕兮為奴嵗遙遙兮難極寃悲痛兮心惻腸千結兮服膺於乎哀哉忘食願我身兮如鳥身翺翔兮矯翼去我國兮心搖情憤惋兮誰識越王聞夫人怨歌心慟乃曰孤何憂吾之六翮備矣於是入吳見夫差稽首再拜稱臣曰東海賤臣句踐上愧皇天下負后土不裁功力汚辱王之軍士抵罪邊境大王赦其深辜裁加役臣使執箕帚誠蒙厚恩得保須臾之命不勝仰感俯愧臣句踐叩頭頓首吳王夫差曰寡人於子亦過矣子不念先君之仇乎越王曰臣死則死矣惟大王原之伍胥在旁目若熛火聲如雷霆乃進曰飛鳥在青雲之上尚欲繳微矢以射之豈况近卧於華池集於庭廡乎今越王放於南山之中遊於不可存之地幸來涉我壤土入吾梐梱此乃厨宰之食也豈可失之乎吳王曰吾聞誅降殺服禍及三世吾非愛越而不殺也畏皇天之咎教而赦之太宰嚭諫曰子胥明於一時之計不通安國之道願大王遂其所執無拘羣小之口夫差遂不誅越王令駕車養馬祕於宫室之中三月吳王召越王入見越王伏於前范蠡立於後吳王問范蠡曰寡人聞貞婦不嫁破亡之家仁賢不官絶滅之國今越王無道國已將亡社稷壞崩身死世絶為天下笑而子及主俱為奴僕來歸於吳豈不鄙乎吾欲赦子之罪子能改心自新棄越歸吳乎范蠡對曰臣聞亡國之臣不敢語政敗軍之將不敢語勇臣在越不忠不信令越王不奉大王命號用兵與大王相持至令獲罪君臣俱降蒙大王鴻恩得君臣相保願得入備掃除出給趨走臣之願也越王伏地流涕自謂遂失范蠡吳王知范蠡不可臣謂曰子既不移其志吾復置子於石室之中范蠡曰臣請如命吳王起入宫中越王范蠡趨入石室越王服犢鼻著樵頭夫人衣無緣之裳施左關之襦夫斫銼養馬妻給水除糞灑掃三年不慍怒面無恨色吳王登髙逺望見越王及夫人范蠡坐於馬糞之旁君臣之禮存夫婦之儀具王顧謂太宰嚭曰彼越王者一節之人范蠡一介之士雖在窮厄之地不失君臣之禮寡人傷之太宰嚭曰願大王以聖人之心哀窮孤之士吳王曰為子赦之後三月乃擇吉日而欲赦之召太宰嚭謀曰越之與吳同土連域句踐愚黠親欲為賊寡人承天之神靈前王之遺德誅討越冦囚之石室寡人心不忍見而欲赦之於子奈何太宰嚭曰臣聞無德不復大王垂仁恩加越越豈敢不報哉願大王卒意越王聞之召范蠡告之曰孤聞於外心獨喜之又恐其不卒也范蠡曰大王安心事將有意在玉門第一今年十二月戊寅之日時加日出戊囚日也寅隂後之辰也合庚辰嵗後會也夫以戊寅日聞喜不以其罪罰日也時加卯而賊戊功曹為騰蛇而臨戊謀利事在青龍青龍在勝光而臨酉死氣也而尅寅是時尅其日用又助之所求之事上下有憂此豈非天網四張萬物盡傷者乎王何喜焉子胥果諫吳王曰昔桀囚湯而不誅紂囚文王而不殺天道還反福轉成禍故夏為湯所誅殷為周所滅今大王既囚越君而不行誅臣謂大王惑之深也得無夏殷之患乎吳王召越王久之不見范蠡文種憂而占之曰吾王見擒也有頃太宰嚭出見大夫種范蠡而言越王復拘於石室伍子胥復諫吳王曰臣聞王者攻敵克之則加以誅故後無報復之憂遂免子孫之患今越王已入石室宜早圖之後必為吳之患太宰嚭曰昔者齊桓割燕所至之地以貺燕公而齊君獲其美名宋襄濟河而戰春秋以多其義功立而名稱軍敗而德存今大王誠赦越王則功冠於五霸名越於前古吳王曰待吾疾愈赦之後一月越王坐石室召范蠡曰吳王疾三月不愈吾聞人臣之道主疾臣憂且吳王遇孤恩甚厚矣疾之無瘳惟公卜焉范蠡曰吳王不死明矣到己巳日當瘳惟大王留意越王曰孤所以窮而不死者賴公之策耳中復猶豫豈孤之志哉可與不可惟公圖之范蠡曰臣竊見吳王真非人也數言成湯之義而不行願大王請問疾得見因求其糞而嘗之觀其顔色當拜賀焉言其不死以瘳起日期之既言信後則大王何憂越王明日謂太宰嚭曰囚臣欲一見問疾太宰嚭入言于吳王王召而見之適遇吳王之便太宰嚭奉溲惡以出逢戶中越王因拜請嘗大王之溲以決吉凶即以手取其便與惡而嘗之因入曰囚臣句踐賀於大王王之疾己巳日有瘳至三月壬申病愈吳王曰何以知之越王曰下臣嘗事師聞糞者順穀味逆時氣者死順時氣者生今日臣嘗大王之糞其味苦且楚酸是味也應春夏之氣臣以是知之吳王大悅曰仁人也乃赦越王得離其石室去就宫室執牧養之事如故越王從嘗糞惡之後遂病口臭范蠡乃令左右皆食岑草以亂其氣其後吳王如期日疾愈心念其忠臨政之後大縱酒於文臺吳王出令曰今日為越王陳北面之坐羣臣以客禮事之伍子胥趨出不御坐酒酣太宰嚭曰異乎今日坐者不仁者逃仁者留臣聞同聲相和同心相求今國相剛勇之人意者內慙至仁之存也而不御坐乎吳王曰然於是范蠡與越王俱起為吳王夀其辭曰下臣句踐從小臣范蠡奉觴上千嵗之夀辭曰皇在上令昭下四時并心察慈仁者大王躬親鴻恩立義行仁九德四塞威服羣臣於乎休哉傳德無極上感太陽降瑞翼翼大王延夀萬嵗長保吳國四海咸承諸侯賓服觴酒既升永受萬福於是吳王大悅明日伍子胥入諫曰昨日大王何見乎臣聞內懷虎狼之心外執美詞之説但為外情以存其身豺不可謂亷狼不可謂親今大王好聽須臾之説不慮萬嵗之患放棄忠直之言聽用讒夫之語不滅瀝血之仇不絶懷毒之怨猶縱毛爐炭之上幸其不焦投卵千鈞之下望其必全豈不殆哉臣聞桀登髙自知危然不知所以自安也前據白刃自知死而不知所以自存也惑者知返迷道不逺願大王察之吳王曰寡人有疾三月不聞相國一言是相國之不慈也又不進口之所嗜心不相思是相國之不仁也夫為人臣不仁不慈焉得知其忠信者乎越王迷惑棄守邊之事親將其臣民來歸寡人是其義也躬親為虜不愠寡人寡人有疾親嘗寡人之溲是其慈也虛其府庫盡其寶幣不念舊故是其忠信也三者既立以養寡人寡人聽相國而誅之是寡人之不智也而為相國快意耶豈不負皇天乎子胥曰何大王之言反也夫虎之卑勢將以有擊也狸之卑身將求所取也雉以眩移拘於網魚以有悅死於餌且大王初臨政負玉門之第九誠事之敗無咎矣今年三月甲戌時加雞鳴甲戌嵗位之會將也青龍在酉德在土刑在金是日賊其德也知父將有不順之子君有逆節之臣大王以越王歸吳為義以飲溲食惡為慈以虛府庫為仁是故為無愛於人其不可親面聽貌觀以存其身今越王入臣於吳是其謀深也虛其府庫不見恨色是欺我王也下飲王之溲者是上食王之心也下嘗王之惡者是上食王之肝也大哉越王之崇吳吳將為所擒也惟大王留意察之臣不敢逃死以負前王一旦社稷丘墟宗廟荆棘其悔可追乎吳王曰相國置之勿復言矣寡人不忍復聞於是遂赦越王歸國送於蛇門之外羣臣祖道吳王曰寡人赦君使其返國必念終始王其勉之越王稽首曰今大王哀臣孤窮使得生全還國與種蠡之徒願死於轂下上天蒼蒼臣不敢負吳王曰於乎吾聞君子一言不再今已行矣王勉之越王再拜跪伏吳王乃引越王登車范蠡執御遂去至三津之上仰天嘆曰嗟乎孤之危屯誰念復生渡此津也謂范蠡曰今三月甲辰時加日昳孤蒙上天之命還歸故鄉得無後患乎范蠡曰大王勿疑直視道行越將有福吳當有憂至浙江之上望見大越山川重秀天地再清王與夫人嘆曰吾已絶望永辭萬民豈料再還重復鄉國言竟掩面涕泣闌干此時萬民咸歡羣臣畢賀盛𢎞之荆州記興安縣水邊有平石其上有石櫛石履各一具俗云越王渡溪脫履墮櫛於此吳越春秋越王句踐臣吳至歸越句踐七年也百姓拜之於道曰君王苦矣今受天之福復於越國霸王之迹自斯而起王曰寡人不慎天教無德於民今勞萬姓擁於岐路將何德化以報國人顧謂范蠡曰今十有二月己巳之日時加禺中孤欲以此到國何如蠡曰大王且留以臣卜日於是范蠡進曰異哉大王之擇日也王當疾趨車馳人走越王策馬飛輿遂復宫闕吳封地百里於越東至炭瀆西至周宗南造於山北薄於海越王謂范蠡曰孤獲辱連年勢足以死得相國之策再返南鄉今欲定國立城人民不足其功不可以興為之奈何范蠡對曰唐虞卜地夏殷封國古公營城周雒威折萬里德致八極豈欲破強敵收鄰國乎越王曰孤不能承前君之制修德自守亡衆棲於會稽之山請命乞恩受辱被恥囚結吳宫幸來歸國追以百里之封將遵前君之意復以會稽之上而宜釋吳之地范蠡曰昔公劉去邰而德彰於夏亶父讓地而名發於岐今大王欲立國樹都并敵國之境不處平易之都據四達之地將焉立霸王之業越王曰寡人之計未有決定欲築城立郭分設里閭委屬於相國於是范蠡乃觀天文擬法於紫宫築作小城周千一百二十一步一圓三方西北立龍飛翼之樓以象天門東南伏漏石竇以象地戶陵門四達以象八風外郭築城而缺西北示服事吳也不敢壅塞內以取吳故缺西北而吳不知也北向稱臣委命吳國左右易處不得其位明臣屬也城既成而怪山自生者琅琊東武海中山也一夕自來故名怪山范蠡曰臣之築城也其應天矣崑崙之象存焉越王曰寡人聞崑崙之山乃地之林上承皇天氣吐宇內下處后土稟受無外滋聖生神嘔養帝會故五帝處其陽陸三王居其正地吾之國也偏天地之壤乘東南之維斗去極北非糞土之城何能與王者比隆盛哉范蠡曰君徒見外未見內臣乃承天門制城合氣於后土嶽象已設崑崙故出越之霸也越王曰茍如相國之言孤之命也范蠡曰天地卒號以著其實名東武起遊臺其上東南為司馬門立層樓冠其山巔以為靈臺起離宫於淮陽中宿臺在於髙平駕臺在於成丘立苑於樂野燕臺在於石室齋臺在於襟山句踐之出遊也休息食室於氷厨越王乃召相國范蠡大夫種大夫郢問曰孤欲以今日上明堂臨國政専恩致令以撫百姓何日可也惟三聖紀綱維持范蠡曰今日丙午日也丙陽將也是日吉矣又因良時臣愚以為可無始有終得天下之中大夫種曰前車已覆後車必戒願王深察范蠡曰夫子故不一二見也吾王今以丙午復初臨政解救其本是一宜夫金制始而火救其終是二宜蓄金之憂轉而及水是三宜君臣有差不失其理是四宜王相俱起天下立矣是五宜臣願急升明堂臨政越王是日立政翼翼小心出不敢奢入不敢侈越王念復吳仇非一日也苦身勞心夜以接日目卧則攻之以蓼足寒則漬之以水冬常抱氷夏還握火愁心苦志懸膽於戶出入嘗之不絶於口中夜潛泣泣而復嘯越王曰吳王好服吾欲采葛使女工織細布獻之以求吳王之心於子何如羣臣曰善乃使國中男女入山采葛以作黃絲之布欲獻之未及遣使吳王聞越王盡心自守食不重味衣不重綵雖有五臺之遊未嘗一日登玩因賜之以書增封東至於句甬西至於檇李南至於姑末即姑蔑今衢州北至於平原越絶作武原今海鹽縣縱橫八百餘里越王乃使大夫種索葛布十萬甘蜜九黨文笥七枚狐皮五雙晉竹十廋以復封禮吳王得之曰以越僻狄之國無珍今舉其貢貨而以復禮此越小心念切不忘吳之效也夫越本國千里吾雖封之未盡其國子胥聞之退卧於舍謂侍者曰吾君失其石室之囚縱於南林之中但因虎豹之野而與荒外之草于吾之心其無損也吳王得葛布之獻乃復增越之封賜羽毛之飾几杖諸侯之服越國大悅采葛之婦傷越王用心之苦乃作何苦之詩曰一作若何之歌葛不連蔓􅀢台台我君心苦命更之嘗膽不苦甘如飴令我采葛以作絲女工織兮不敢遲弱於羅兮輕霏霏號絺素兮將獻之越王悅兮忘罪除一作辜吳王歡兮飛尺書增封益地賜羽奇一作旗几杖茵褥諸侯儀羣臣拜舞天顔舒我王何憂能不移於是越王內修其德外布其道君不名教臣不名謀民不名使官不名事國中蕩蕩無有政令越王內實府庫墾其田疇民富國強衆安道泰越王遂師八臣四友時問政焉大夫種曰愛民而已越王曰奈何種曰利之無害成之無敗生之無殺與之無奪越王曰願聞種曰無奪民所好則利之民不失其時則成之省刑去罰則生之薄其賦斂則與之無多臺遊則樂之靜而無苛則喜之民失所好則害之農失其時則敗之有罪不赦則殺之重賦厚斂則奪之多作臺遊以罷民則苦之勞擾民力則怒之臣聞善為國者遇民如父母之愛其子如兄之愛其弟聞有飢寒為之哀見其勞苦為之悲越王乃緩刑薄罰省其賦斂於是人民殷富皆有帶甲之勇九年正月越王召五大夫而告之曰昔者越棄宗廟身為窮虜恥聞天下辱流諸侯今寡人念吳猶躃者不忘走盲者不忘視孤未知策謀惟大夫誨之扶同曰昔之亡國天下莫不聞今欲有計不宜前露其辭臣聞猛獸將擊必弭毛帖伏鷙鳥將摶必卑飛戢翼聖人將動必順辭和衆聖人之謀不可見其象不可知其情臨事而伐故前無剽過之兵後無伏襲之患今大王臨敵破吳宜損之辭無令泄也臣聞吳王兵強於齊晉而怨結於楚大王宜親於齊深結於晉隂固於楚而厚事於吳夫吳之志猛驕而自矜必輕諸侯而凌鄰國三國還敵必角勢交爭越承其弊因而伐之可克也雖五帝之兵無以過此范蠡曰臣聞謀國破敵動觀其符孟津之會諸侯曰可武王辭之方今吳楚結仇搆怨不解齊雖不親外為其救晉雖不附猶效其義夫內臣謀而決仇其策鄰國通而不絶其援斯正吳之興霸諸侯之上尊臣聞峻髙者隤茂葉者摧日中則移月滿則虧四時不並盛五行不俱馳隂陽更唱氣有盛衰故溢堤之水不淹其量熻乾之火不復其熾水靜則無漚瀴之怒火消則無熹毛之熱今吳乘諸侯之威以號令於天下不知德薄而恩淺道狹而怨廣權懸而智衰力竭而威折兵挫而軍退士散而衆解臣請按師整兵待其壞敗隨而襲之兵不血刃士不旋踵吳之君臣為虜矣臣願大王匿聲無見其動以觀其靜大夫苦成曰夫水能浮草木亦能沈之地能生萬物亦能殺之江海能下溪谷亦能朝之聖人能從衆亦能使之今吳承闔閭之軍制子胥之典教政平未虧戰勝未敗大夫嚭者狂佞之人達於策慮輕於朝事子胥力於戰伐死於諫議二人權必有壞願王虛心自匿無示謀計則吳可滅矣大夫浩曰今吳君驕臣奢民飽軍勇外有侵境之敵內有爭臣之震其可攻也大夫句如曰天有四時人有五勝昔湯武乘四時之利而制夏殷桓繆據五勝之便而列六國此乘其時而勝者也王曰未有四時之利五勝之便願各就職也越絶書枕中句踐問范子曰古之賢主聖王之治何左何右何去何取范子對曰臣聞聖主之治左道右術去末取實越王曰何謂道何謂術何謂末何謂實范子對曰道者天地先生不知老曲成萬物不名巧故謂之道道生氣氣生隂隂生陽陽生天地天地立然後有寒暑燥濕日月星辰四時而萬物備術者天意也盛夏之時萬物遂長聖人緣天心助天喜樂萬物之長故舜彈五絃之琴歌南風之詩而天下治言其樂與天下同也當是之時頌聲作所謂末者名也故名過實則百姓不附親賢士不為用而外缺一字諸侯聖主不為也所謂實者穀富也得人心任賢士也凡此四者邦之寶也越王曰寡人躬行節儉下士求賢不使名過實此寡人所能行也多貯穀富百姓此乃天時水旱寧在一人耶何以備之范子曰百里之神千里之君湯執其中和舉伊尹收天下雄雋之士練卒兵率諸侯伐桀為天下除殘去賊萬民皆歌而歸之是所謂執其中和者越王曰善哉中和所致也寡人雖不及賢主聖王欲執其中和而行之今諸侯之地或多或少強弱不相當兵革暴起何以應之范子曰知保人之身者可以王天下不知保人之身失天下者也越王曰何謂保人之身范子曰天生萬物而教之而生人得穀即不死穀能生人能殺人故謂人身越王曰善哉今寡人欲保榖為之奈何范子曰欲保必親於野覩諸所多少為備越王曰所少可得為因其貴賤亦有應乎范子曰夫八穀貴賤之法必察天之三表即決矣越王曰請問三表范子曰水之勢勝金隂氣蓄積大盛水據金而死故金中有水如此者嵗大敗八穀皆貴金之勢勝木陽氣蓄積大盛金據木而死故木中有火如此者嵗大美八穀皆賤金木水火更相勝此天之三表者也不可不察能知三表可為邦寶不知三表之君千里之神萬里之君故天下之君發號施令必順於四時四時不正則隂陽不調寒暑失常如此則嵗惡五穀不登聖王施令必審於四時此至禁也越王曰此寡人所能行也願欲知圖穀上下貴賤欲與他貨之內以自實為之奈何范子曰夫八穀之賤也如宿穀之登其明也諦審察隂陽消息觀市之反覆雌雄之相逐天道乃畢越王曰何執而昌何行而亡范子曰執其中則昌行奢侈則亡越王曰寡人欲聞其説范子曰臣聞古之賢主聖君執中和而原其終始即位安而萬物定矣不執其中和不原其終始即尊位傾萬物散文武之業桀紂之迹可知矣古者天子及至諸侯自滅至亡漸漬乎滋味之費沒溺於聲色之類牽攣於珍怪貴重之器故其邦空虛困其士民以為須臾之樂百姓皆有悲心瓦解而倍畔者桀紂是也身死邦亡為天下笑此謂行奢侈而亡也湯有七十里地務執三表可謂邦寶不知三表身死棄道又越王問於范子曰春肅夏寒秋榮冬泄人治使然乎將道也范子曰天道三千五百嵗一治一亂終而復始如環之無端此天之常道也四時易次寒暑失常治民然也故天生萬物之時聖人命之曰春春不生遂者故天不重為春春者夏之父也故春生之夏長之秋成而殺之冬受而藏之春肅而不生者王德不究也夏寒而不長者臣下不奉主命也秋順而復榮者百官刑不斷也冬溫而泄者發府庫賞無功也此所謂四時者邦之禁也越王曰寒暑不時治在於人可知也願聞嵗之美惡穀之貴賤何以紀之范子曰夫隂陽錯繆即為惡嵗人生失治即為亂世夫一亂一治天道自然八穀亦一賤一貴極而復反言亂三千嵗必有聖王也八穀貴賤更相勝故死凌生者逆大貴生凌死者順大賤越王曰善越王苦會稽之恥欲深得民心以致必死於吳身不安枕席口不甘厚味目不視靡曼耳不聽鐘鼓三年苦身勞力焦唇乾肺內親羣臣下養百姓以求其心有甘脆不足分弗敢食有酒流之江與民同之身親耕而食妻親織而衣味禁珍衣禁襲包禁二時出行路從車載食以視孤寡老弱之漬病公羊傳曰大漬者大病也困窮顔色愁悴不贍者必身自食之於是屬諸大夫而告之曰願一與吳徼天下之衷今吳越之國相與俱殘士大夫履肝肺同日而死孤與吳王接頸交臂而僨此孤之大願也若此而不可得也內量吾國不足以傷吳外事之諸侯不能害之則孤將棄國家釋羣臣服劔臂創變容貌易名姓執箕帚而臣事之以與吳王爭一旦之死孤雖知要領不屬首足異處四支布裂為天下笑孤之志必將出焉呂覽順民越絶書枕中越王問於范子曰寡人聞人失其魂魄者死得其魂魄者生物皆有之將人也范子曰人有之萬物亦然天地之間人最為貴物之生穀為貴以生人與魂魄無異可得豫知也越王曰其善惡可得聞乎范子曰欲知八穀之貴賤上下衰極必察其魂魄視其動靜觀其所舍萬不失一問曰何謂魂魄對曰魂者槖也魄者生氣之源也故神生者出入無門上下無根見所而功自存故名之曰神神主生氣之精魂主元氣之舍也魄者主賤魂者主貴故當安靜而不動魂者方盛夏而行故萬物得以自昌神者主氣之精主貴而雲行故方盛夏之時不行即神氣稿而不成物矣故死凌生者嵗大敗生凌死者嵗大美故觀其魂魄即知嵗之善惡矣越王問曰寡人聞隂陽之治不同力而功成不同氣而物生可得而知乎願聞其説范子曰臣聞隂陽不同處萬物生焉冬三月之時草木既死萬物各異藏故陽氣避之下藏伏壯於內使隂陽得成功於外夏三月盛暑之時萬物遂長隂氣避下藏伏壯於內然而萬物親而信之是所謂也陽者主生萬物方夏三月之時大熱不至則萬物不能成隂氣主殺方冬三月之時地不內藏則根荄不成即春無生故一時失度即四序為不行越王曰善寡人已聞隂陽之事穀之貴賤可得而知乎范子曰陽者主貴隂者主賤故當寒而不寒者穀為之暴貴當溫而不溫者穀為之暴賤譬猶形影聲響相聞豈得不復哉故曰秋冬貴陽氣施於隂隂極而復貴春夏賤隂氣施於陽陽極而不復越王曰善哉以丹書帛置之枕中以為國寶越絶書枕中越五日困於吳請於范子曰寡人守國無術負於萬物幾危社稷為旁邦所議無定足而立欲捐軀出死以報吳仇為之奈何范子曰臣聞聖主為不可為之行不惡人之謗己為足舉之德不德人之稱已舜循之歷山而天下從風使舜釋其所循而求天下之利則恐不全其身昔者神農之治天下務利之而已矣不望其報不貪天下之財而天下共富之所以其智能自貴於人而天下共尊之故曰富貴者天下所置不可奪也今王利地貪財接兵血創僵尸流血欲以顯於世不亦謬乎越王曰上不逮於神農下不及於堯舜今子以至聖之道説寡人誠非所及也且吾聞之也父辱則子死君辱則臣死今寡人親已辱於吳矣欲行一切之變以復吾仇願子更為寡人圖之范子曰君辱則死固其義也立死下士人而求成邦者上聖之計也且夫廣天下尊萬乘之主使百姓安其居樂其業者唯兵兵之要在於人人之要在於穀故民衆則主安穀多則兵強王而備此二者然後可以圖之也越王曰吾欲富邦強兵地狹民少奈何為之范子曰夫陽動於上以成天文隂動於下以成地理審察開置之要可以為富凡欲先知天門開及地戶閉其術天髙五寸減天寸六分以成地謹司八穀初見出於天者是謂天門開地戶閉陽氣不得下入地戶故氣轉動而上下隂陽俱絶八穀不成大貴不應其嵗而起此天變見符也謹司八穀初見入於地者是謂地戶閉隂陽俱會八穀大成其嵗大賤來年大飢此地變見端也謹司八穀初見半於人者糴平熟無災害故天倡而見符地應而見瑞聖人上知天下知地中知人此之謂天平地平以此為天圖漢書兵權謀范蠡二篇大夫種二篇吳越春秋越王句踐十年二月王深念侵辱於吳蒙天祉福得返越國羣臣教誨各畫一策辭合意同句踐敬從其國已富反越五年未聞敢死之友或謂諸大夫愛身惜軀者乃登漸臺觀其羣臣有憂與否相國大夫種句如之屬儼然列坐雖懷憂患不形顔色越王即鳴鐘驚􅊾而召羣臣與之盟曰寡人獲辱受恥上愧周王下慚晉楚幸蒙諸大夫之策得返國修政富民養士而五年未聞敢死之士雪仇之臣奈何而有功乎羣臣默然莫對者越王仰天嘆曰孤聞主憂臣辱主辱臣死今孤親被奴虜之厄受囚破之恥不能自輔須賢任仁然後討吳重負諸臣大夫何易見而難使也於是計􅒍年少官卑列坐於後乃舉手而趨蹈席而前進曰謬哉君王之言也非大夫易見而難使君王之不能使也越王曰何謂計􅒍曰夫官位財幣金賞者君之所輕也操鋒履創艾命投死者士之所重也今王易財之所輕易宜作吝而責士之所重何其殆哉於是越王默然不悅面有愧色即辭羣臣進計􅒍而問曰孤之所得士心者何等計􅒍對曰夫君人尊其仁義者治之門也士民者君之根也開門固根莫如正身正身之道謹左右左右者君之所以盛衰者也願王明選左右得賢而已昔太公九聲而足足字誤磻溪之餓人也西伯任之而王管仲魯之亡囚有貪分之毁齊桓得之而霸故傳曰失士者亡得士者昌願王審於左右何患羣臣之不使也越王曰吾使賢任能各殊其事孤虛心髙望冀聞報復之謀今咸匿聲隱形不聞其語厥咎安在計􅒍曰選賢實士各有一等逺使以難以效其誠內告以匿以知其信與之論事以觀其智飲之以酒以視其亂指之以使以察其能示之以色以别其態五色以設士盡其實人竭其智知其竭智盡實則君臣何憂越王曰吾以謀士效實人盡其智而士有未盡進辭有益寡人也計􅒍曰范蠡明而知內文種逺以見外願王請大夫種與深議則霸王之術在矣越王乃請大夫種而問曰吾昔日受夫子之言自免於窮厄之地今欲奉不羈之計以雪吾之宿仇何行而功乎大夫種曰臣聞髙飛之鳥死於美食深泉之魚死於芳餌今欲伐吳必前求其所好參其所願然後能得其實越王曰人之所好雖其願何以定而制之死乎大夫種曰夫欲報怨復仇破吳滅敵者有九術君王察焉越王曰寡人被辱懷憂內慙朝臣外愧諸侯中心迷惑精神空虛雖有九術安能知之大夫種曰夫九術者湯文得之以王桓穆得之以霸其攻城取邑易於脫屣願大王覽之一曰尊天事鬼以求其福二曰重財幣以遺其君多貨賄以喜其臣三曰貴糴粟稿以虛其國利所欲以疲其民四曰遺美女以惑其心而亂其謀五曰遺之巧工良材使之起宫室以盡其財六曰遺之諛臣使之易伐七曰強其諫臣使之自殺八曰君王國富而備利器九曰利甲兵以承其弊凡此九術君王閉口無傳守之以神取天下不難而况於吳乎越王曰善乃行第一術立東郊以祭陽名曰東皇公立西郊以祭隂名曰西王母祭陵山於會稽祀水澤於江州事鬼神一年國不被災越王曰善哉大夫之術願論其餘種曰吳王好起宫室用工不輟王選名山神材奉而獻之越王乃使木工千餘人入山伐木一年師無所幸作士思歸皆有怨望之心而歌木客之吟一夜天生神木一雙大二十圍長五十尋陽為文梓隂為楩柟巧工施校制以規繩雕治圓轉刻削磨礱分以丹青錯畫文章嬰以白璧鏤以黃金伏類龍蛇文采生光乃使大夫種獻之於吳王曰東海役臣臣孤句踐使臣種敢因下吏聞於左右賴大王之力竊為小殿有餘材謹再拜獻之吳王大悅子胥諫曰王勿受也昔者桀起靈臺紂起鹿臺隂陽不和寒暑不時五穀不熟天與其災民虛國變遂取滅亡大王受之必為越王所戮吳王不聽遂受而起姑蘇之臺三年聚材五年乃成髙見二百里行路之人道死巷哭不絶嗟嘻之聲民疲士苦人不聊生越王曰善哉第二術也十一年越王欲伐吳乃問計􅒍曰吾欲伐吳恐不能破惟問於子計􅒍對曰夫興師舉兵必且內蓄五穀實其金銀滿其府庫勵其甲兵凡此四者必察天地之氣原於隂陽明於孤虛審於存亡乃可量敵越王曰天地存亡其要奈何計􅒍曰天地之氣物有死生原隂陽者物貴賤也明孤虛者知會際也審存亡者别真偽也越王曰何謂死生真偽乎計􅒍曰春種八穀夏長而養秋成而聚冬蓄而藏夫天時有生而不救種是一死也夏長無苗二死也秋成無聚三死也冬藏無蓄四死也雖有堯舜之德無如之何夫天時有生勸者老作者少反氣應數不失厥理一生也留意省察謹除苗穢穢除苗盛二生也前時設備物至則收國無逋稅民無失穗三生也倉已封塗除陳入新君樂臣歡男女及信四生也夫隂陽者太陽所居之嵗留息三年貴賤見矣夫孤虛者謂天門地戶也存亡者君之道德也越王曰何子之年少於物之長也計􅒍曰有美之士不拘長少越王曰善哉子之道也乃仰觀天文集察緯宿歷象四時以下者上虛設八倉從隂收著望陽出糶策其極計三年五倍越國熾富句踐嘆曰吾之霸矣善計􅒍之謀也十二年越王謂大夫種曰孤聞吳王淫而好色惑亂沉湎不領政事因此而謀可乎種曰可破夫吳王淫而好色宰嚭佞以曳心往獻美女其必受之惟王選擇美女二人而進之越王曰善乃使相者國中得苧蘿山鬻薪之女曰西施鄭旦苧蘿山在諸暨縣南山下有西施浣沙石本孔皋會稽記諸暨縣北界有羅山越時西施鄭旦處名苧蘿村所在有方石是西施曬紗處今名苧蘿山飾以羅縠教以容步習於土城臨於都巷三年學服而獻於吳乃使相國范蠡進曰越王句踐竊有二遺女越國汙下困迫不敢稽留謹使臣蠡獻之大王不以鄙陋寢容願納以供箕帚之用吳王大悅曰越貢二女乃句踐盡忠於吳之證也子胥諫曰不可王勿受也臣聞五色令人目盲五音令人耳聾昔桀易湯而滅紂易文王而亡大王受之後必有殃臣聞越王朝晝不倦晦誦竟夜且聚敢死之士數萬是人不死必得其願越王服誠行仁聽諫進賢是人不死必成其名越王夏被毛裘冬御絺綌是人不死必為對隙臣聞賢士國之寶美女國之咎夏亡以妹喜殷亡以妲己周亡以褒姒吳王不聽遂受其女越王曰善哉第三術也史記西施越之美女越王句踐以獻之吳王夫差幸之每入市人願見者先輸金錢一文孟子注疏引今本無越絶書丘土城句踐所習教美女西施鄭旦宫臺也女出於苧蘿山欲獻於吳自謂東垂僻陋恐女朴鄙故近大道居述異記香水溪俗云西施浴處人呼為脂粉瑭吳王宫人濯粧於此溪上源至今馨香吳王夫差築姑蘇之臺三年乃成周旋佶屈橫亘五里崇飾土木殫耗人力宫妓數千人上别立春宵宫為長夜之飲造千石酒鍾夫差作天池池中造青龍舟舟中盛陳妓樂日與西施為水嬉吳王於宫中作海靈館館娃閣銅溝玉檻宫之楹檻珠玉飾之梧桐園在吳宫本吳王夫差舊園也一名鳴琴川十三年越王謂大夫種曰孤蒙子之術所圖者吉未嘗有不合也今欲復謀吳奈何種曰君王自陳越國微鄙年穀不登願王請糴以卜其意天若棄吳必許王矣越乃使大夫種於吳因宰嚭求見吳王辭曰越國汙下水旱不調年穀不登人民飢乏道薦飢餒願從大王請糴來嵗即復太倉惟大王救其窮窘吳王曰越王信誠守道不懷二心今窮歸訴吾豈愛惜財寶奪其所願子胥諫曰不可非吳有越越必有吳吉往則凶來是養生冦而破國家者也與之不為親不與未成寃且越有聖臣范蠡勇以善謀將有修飾攻戰以伺吾間觀越王之使來請糴者非國貧民困而請糴也以入吾國伺吾王間也吳王曰寡人卑服越王而有其衆壞其社稷以愧句踐句踐氣服為駕車却行馬前諸侯莫不聞知今吾使之歸國奉其宗廟復其社稷豈有反吾之心乎子胥曰臣聞士窮非難抑心下人其後有激人之色越國飢餓民之困窮可因而破也今不用天之道順地之理而反輸之食固狐雉之相戲也夫狐卑體而雉信之故狐得其志而雉死可不慎哉吳王曰句踐國憂而寡人給之以粟恩往義來亦何憂乎子胥曰臣聞狼子有野心仇讎不可親虎不可餧以食蝮蛇不恣其意今大王損國家之福以饒無益之讎棄忠臣之言而順敵人之欲臣必見越之破吳豸鹿遊於姑蘇之臺荆榛蔓於宫闕願王覽武王伐紂之事太宰嚭從旁對曰武王非紂王臣耶率諸侯以伐其君雖勝可謂義乎子胥曰武王即成其名太宰嚭曰親戮主以為名吾不忍也子胥曰盜國者封侯盜金者誅令使武王失其理則周何為三家之表謂箕子比干商容太宰嚭曰子胥為人臣徒欲干君之好咈君之心以自稱滿君何不知過乎子胥曰太宰嚭前縱石室之囚受其寶女之遺外交敵國內惑於君大王察之無為羣小所侮譬若浴嬰兒雖啼無聽宰嚭之言吳王曰宰嚭子無乃聞寡人言非忠臣之道類佞諂之人太宰嚭曰臣聞鄰國有急千里馳救是乃王者封亡國之後五霸輔絶滅之末者也吳王乃與越粟萬石而令之曰寡人逆羣臣之議而輸於越年豐而歸寡人大夫種曰臣奉使返越嵗登誠還吳貸大夫種歸越越國羣臣皆稱萬嵗即以粟賞賜羣臣及於萬民二年越稔擇精粟而蒸還於吳復斗斛之數使大夫種歸之吳王王得越粟長太息謂太宰嚭曰越地肥沃其種甚嘉可留使吾民植之於是吳種越粟粟種無生者吳民大飢越王曰彼窮可攻也大夫種曰未可國始貧耳忠臣尚在天氣未見須俟其時越王又問相國范蠡曰孤有報復之謀水戰則乘舟陸行則乘輿輿舟之利頓於兵弩今子為寡人謀事莫不謬者乎范蠡對曰臣聞古之聖人莫不習戰用兵然行陳隊伍軍鼓之事吉凶決在其工今聞越有處女出於南林國人稱善願王請之立可見越王乃使使聘之問以劔戟之術處女將北見於王道逢一翁自稱曰袁公問於處女曰吾聞子善劔願一見之女曰妾不敢有所隱惟公試之於是袁公即杖籃箊竹竹枝上頡橋未墮地女即捷末藝文類聚引吳越春秋云袁公即挽林之竹似枯稿未折墮地女接取其未按此未當作末捷當作接袁公則飛上樹變為白猿遂别去劔俠傳云袁公即挽林杪之竹似桔槔末折地女接取其末公操其本而刺女女因舉杖擊之公即飛上樹化為白猿見越王越王問曰夫劔之道如之何女曰妾生深林之中長於無人之野無道不習不達諸侯竊好擊劔之道誦之不休妾非受於人也而忽自有之越王曰其道如何女曰其道甚微而易其意甚幽而深道有門戶亦有隂陽開門閉戶隂衰陽興凡手戰之道內實精神外示安儀見之似好婦奪之似懼虎布形候氣與神俱往杳之若日偏如騰兔追形逐影光若倣佛呼吸往來不及法禁縱橫逆順直復不聞斯道者一人當百百人當萬王欲試之其驗即見越王即加女號號曰越女乃命五板之墮長髙習之墮當作隊髙是人名教軍士當世莫勝越女之劔於是范蠡復進善射者陳音音楚人也越王請音而問曰孤聞子善射道何所生音曰臣楚之鄙人嘗步於射術未能悉知其道越王曰然願子一二其辭音曰臣聞弩生於弓弓生於彈彈起古之孝子越王曰孝子彈者奈何音曰古者人民朴質飢食鳥獸渴飲霧露死則裹以白茅投於中野孝子不忍見父母為禽獸所食故作彈以守之絶鳥獸之害故歌曰斷竹續竹飛土逐害之謂也於是神農黃帝弦木為弧剡木為矢弧矢之利以威四方黃帝之後楚有弧父弧父者生於楚之荆山生不見父母為兒之時習用弓矢所射無脫以其道傳於羿羿傳逄蒙逄蒙傳於楚琴氏琴氏以為弓矢不足以威天下當是之時諸侯相伐兵刃交錯弓矢之威不能制服琴氏乃橫弓著臂弩柄曰臂施機設樞加之以力然後諸侯可服琴氏傳之楚三侯文選注引此云琴氏傳大魏大魏傳楚三侯所謂句亶鄂章人號麋侯翼侯魏侯也熊渠三子長子康為句亶王紅為鄂王少子執疵為越章王三侯者未僣王號時所稱也自楚之三侯傳之靈王纍世以桃弓棘矢而備鄰國自靈王之後射道分流百家能人用莫得其正臣前人受之於楚五世於臣矣臣雖不明其道惟王試之越王曰弩之狀何法焉陳音曰郭為方城守臣子也牙為執法守吏卒也牛為中將主內裹也關為守禦檢去止也錡為侍從聽人主也臂為道路通所使也弓為將軍主重負也弦為軍師禦戰士也矢為飛客主教使也衛為副使正道里也乂為受教知可否也縹為都尉執左右也敵為百死不得駭也鳥不及飛獸不暇走弩之所向無不死也臣之愚劣道悉如此越王曰願聞正射之道音曰臣聞正射之道道衆而微古之聖人射弩未發而前名其所中臣未能如古之聖人請悉其要夫射之道身若戴板頭若激卯左足蹉右足橫左手若附枝右手若抱兒舉弩望敵翕心咽煙與氣俱發得其和平神定思去去止分離右手發機左手不知一身異教豈况雄雌此正射持弩之道也越王曰願聞望敵儀表投分飛矢之道音曰夫射之道從分望敵合以參連弩有斗石矢有輕重石取一兩其數乃平逺近髙下求之銖分道具在斯無有遺言越王曰善盡子之道願子悉以教吾國人音曰道出於天事在於人人之所習無有不神於是乃使陳音教士習射於北郊之外三月軍士皆能用弓弩之巧陳音死越王傷之葬於國西號其葬所曰陳音山在山隂縣吳越絶書麻林山句踐欲伐種麻為弓弦使齊人守之拾遺記周靈王越謀滅吳蓄天下奇寶美人異味進於吳殺三牲以祈天地殺龍蛇以祠川嶽矯以江南億萬戶民輸吳為傭保越又有美女二人一名夷光二名修明即西施鄭旦之别名以貢於吳吳處以椒華之房貫細珠為簾幌朝下以蔽景夕捲以待月二人當軒并坐理鏡靚粧於珠幌之內竊窺者莫不動心驚魂謂之神人吳王妖惑忘政及越兵入國乃抱二女以逃吳苑越軍亂入見二女在樹下皆言神女望而不敢侵今吳城蛇門內有朽株尚為祠神女之處初越王入國有丹烏夾王而飛故句踐入國起望烏臺言丹烏之異也范蠡相越日致千金家童間算術者萬人收四海難得之貨盈積於越都以為器銅鐡之類積如山之阜或藏之井塹謂之寶井奇容麗色溢於閨房謂之逰宫歷古以來未之有也越王句踐一決獄不辜援龍淵而切其股血流至足以自罰也而戰士必其死淮南子人間墨子昔越王句踐好士之勇教馴其臣和合之焚舟失火試其士曰越王之寶盡在此越王親自鼓其士而進之曰士聞鼓音破碎亂行蹈火而死者左右百人有餘越王擊金而退之越王將復吳而試其教燔臺而鼓之使民赴火者賞臨江而鼓之使民赴水者賞一日句踐見怒蛙而式之御者曰何為式王曰蛙有氣如此可無式乎士人聞之曰蛙有氣王猶為式况士人有勇者乎是嵗人有自剄死以其頭獻者韓子內儲上吳越春秋越王念吳欲復讎愁心苦志中夜抱柱而哭承之以嘯羣臣聞之曰君王何愁心之甚也夫復讎謀敵非君王之憂自臣下之急務也藝文引越絶書計􅒍句踐脅諸臣而與之盟曰吾欲伐吳奈何有功羣臣默然無對王曰夫主憂臣辱主辱臣死何大夫易見而難使也計􅒍官卑年少其居在後舉首而起曰殆哉非大夫易見難使是大王不能使臣也王曰何謂也計􅒍對曰夫官位財幣王之所輕死者士之所重王愛所輕責士所重豈不艱哉王自揖進計􅒍而問焉計􅒍對曰夫仁義者治之門士民者君之根本也闓門固根莫如正身正身之道謹選左右左右選則孔主日益上不選則孔主日益下二者貴質浸之漸也願君王公選於衆精鍊左右非君子至誠之人無與居使邪僻之氣無漸以生仁義之行有階人知其能官知其治爵賞刑罰一由君出則臣下不敢毁譽以言無功者不敢干治故明主用人不由所從不問其先説取一焉是故周文齊桓躬於任賢太公管仲明於知人今則不然臣故曰殆哉越王勃然曰孤聞齊威淫佚九合諸侯一匡天下蓋管仲之力也寡人雖愚惟在大夫計􅒍對曰齊桓除管仲罪大責任之至易此故南陽蒼句太公九十而不伐磻溪之餓人也聖人不計其辱以為賢者一乎仲二乎仲斯可致王但霸何足道桓稱仲父文稱太公計此二人曽無跬步之勞大呼之功乃忘弓矢之怨授以上卿傳曰直能三公今置臣而不尊使賢而不用譬如門戶像設倚而相欺蓋智士所恥賢者所羞君王察之越王曰誠者不能匿其辭大夫既在何須言哉計􅒍曰臣聞智者不妄言以成其勞賢者始於難動終於有成傳曰易之謙遜對過問抑威權勢利器不可示人言賞罰由君此之謂也故賢君用臣略責於絶施之職而成其功逺使以效其誠內告以匿以知其信與之講事以觀其智飲之以酒以觀其態選士以備不肖者無所置越王大愧乃壞池填塹開倉穀貸貧乏使羣臣身問疾病躬視死喪不厄窮僻尊有德與民同苦樂激河井泉示不獨食行之六年士民一心不謀同辭不呼自來皆欲伐吳越絶書內經句踐既得返國欲隂圖吳乃召計􅒍而問焉曰吾欲伐吳恐未能取山林幽冥不知利害所在西則迫江東則薄海水屬蒼天下不知所止交錯相過波濤濬流沈而復起動作若驚駭聲音若雷霆船失不能救不知命之所維念樓船之苦涕泣不可止非不欲為也謀不成而息恐為天下咎以敵攻敵未知誰負吾聞先生明於時交察於道理恐動而無功故問其道計􅒍曰是固不可興師者必須先蓄積食錢布帛不先蓄積則士卒數飢飢則易傷重遲不可戰戰則耳目不聰明什部之不能使退之不能解進之不能行飢饉不可以動神氣去而萬里伏弩而乳郅頭而皇皇強弩不彀發不能當旁軍見弱走之如犬逐羊伏地而死前頓後僵與人同戰獨受天殃未必天之罪也亦在其將王興師以年數恐一旦而亡筋骨為野越王曰善請問其方吾聞先生明於治嵗萬物盡長子明以告我寡人弗敢忘計􅒍曰凡人生或老或弱或強或怯不早備生不能相葬王其審之必先省賦斂勸農桑飢饉在問或水或塘因熟積以備四方師出無時未知所當應變而動隨物常羊常羊猶徜徉卒然有師彼日以弱我日以強得世之和擅世之陽王無忽忘慎無如會稽之飢不可再更嘗言息貨王不聽臣故退而不言處於吳楚越之間以魚三邦之利乃知天下之易反也臣聞君自耕夫人自織此竭於用力而不斷時與智也時斷則循智斷則備知此二者形於體萬物之情短長逆順可觀而已臣聞炎帝有天下以傳黃帝黃帝上事天下治地故少昊治西方蚩尤佐之使主金玄冥治北方白辨佐之使主水太皥治東方袁何佐之使主木祝融治南方僕程佐之使主火后土治中央后稷佐之使主土並有五方以為綱紀是為易地而輔萬物之常王審用臣之議大則可王小則可霸於何有哉越王曰請問其要計􅒍曰太隂三嵗處金則穰三嵗處水則毁三嵗處木則康三嵗處火則旱故散有時積糴有時領則決萬物不過三嵗而發矣以智論之以決斷之以道佐之斷長續短一嵗再倍其次一倍其次而反水則資車旱則資舟物之理也天下六嵗一穰六嵗一康凡十二嵗一飢是以民相離也故聖人早知天地之反為之預備故湯之時比七年旱而民不飢禹之時比九年水而民不流其主能通習源流以任賢使能則轉轂乎千里外貨可來也不習則百里之內不可致也人主所求其價十倍其所擇者則無價矣夫人主利源流非必身為之也視民所不足及其有餘為之命以利之而來諸侯守法度任賢使能償其成事傳其驗而已如此則邦富兵強而不衰矣羣臣無空恭之禮淫佚之行務於有道術不習源流又不任賢使能諫者則誅則邦貧兵弱刑繁則羣臣多空恭之禮淫佚之行矣夫諛者反有德忠者反有刑去刑就德人之情也邦貧兵弱致亂雖有聖臣亦不諌也務在諛主而已矣今夫民有明父母亦如邦有明主父母利源流明其法術以任賢子徼成其事而已則家富而不衰不能利源流又不任賢子賢子有諫者憎之如此者不習於道術也愈信其意而行其言後雖有敗不自過也夫父子之為親也非得不諫諫而不聽家貧致亂雖有聖子亦不治也務在於諛之而已父子不和兄弟不調雖欲富也必貧而日衰越王曰善子何年少於物之長也計􅒍曰人固不同慧種生聖癡種生狂桂實生桂桐實生桐先生者未必能知後生者未必不能明是故聖王置臣不以少長有道者進無道者退愚者日以退聖者日以長人主無私賞者有功越王曰善論事若是其審也物有妖祥乎計􅒍曰有隂陽萬物各有紀綱日月星辰刑德變為吉凶金木水火土更勝月朔更建莫主其常順之有德逆之有殃是故聖人能明其刑而處其鄉從其德而避其衡凡舉百事必順天地四時參以隂陽用之不審舉事有殃人主不如卧之頃也欲變天地之常數發無道故貧而命不長是以聖人并包而隂行之以感愚夫衆人容容盡欲富貴莫知其鄉越王曰善請問其方計􅒍曰從寅至未陽也太隂在陽嵗德在隂嵗美在是聖人動而應之制其收發當以太隂在隂而發隂且盡之嵗亟賣六畜貨財以益收五穀以應陽之至也陽且盡之嵗亟發糴以收田宅牛馬積斂貨財聚棺木以應隂之至也此皆十倍者也其次五倍天有時而散是故聖人反其刑順其衡收斂而不散越王曰善今嵗比熟尚有貧乞者何也計􅒍曰是故不等猶同母之人異父之子動作不同術貧富故不等如此者積負於人不能救其前後志意侵下作務日給非有道術又無上賜貧乞故久長越王曰善大夫佚同若成若當作苦嘗與孤議於會稽石室孤非其言也今大夫言獨與孤比請遂受教焉計􅒍曰糴石二十則傷農九十則病末農傷則草木不辟末病則貨不出故糴髙不過八十下不過三十農末俱利矣故古之治邦者本之貨物官市開而至越王曰善計􅒍乃傳其教而圖之傳之後世以為法治江南七年而擒吳也甲貨之戶曰粢為上物賈七十乙貨之戶曰黍為中物石六十丙貨之戶曰赤豆為下物石五十丁貨之戶曰稻粟令為上種石四十戊貨之戶曰麥為中物石三十己貨之戶曰大豆為下物石二十庚貨之戶曰穬比疏食故無賈辛貨之戶曰果比疏食無賈壬癸無貨句踐困於會稽之上乃用范蠡計然計然葵丘濮上人姓辛氏字文子其先晉國亡公子也嘗南遊於楚范蠡師事之計然曰知鬭則修備時用則知物二者形則萬貨之情可得而觀已故嵗在金穰水毁木飢火旱旱則資舟水則資車物之理也六嵗穰六年旱十二嵗一大飢夫糶二十病農九十病末米斗值二十則病農值九十則病商賈末病則財不出農病則草不辟矣上不過八十下不減三十則農末俱利平糶齊物關市不乏治國之道也積著之理務完物無息幣以物相貿易腐敗而食之貨勿留無敢居貴論其有餘不足則知貴賤貴上極則反賤賤下極則反貴貴出無糞土賤取如珠玉財幣欲其行如流水修之十年國富厚賂戰士士赴矢石如渴得飲遂報強吳觀兵中國號稱五霸史貨殖傳范子計然計然本葵丘濮上人姓辛名文子其先晉國公子也為人有內無外形狀似不及人少而明學隂陽見微而知著其行浩浩其志泛泛不肯自顯諸侯隂取所利者七國天下莫知故稱曰計然時遨逰海澤號曰漁父范蠡請見越王計然曰越王為人烏喙不可同利也范子問何用九宫計然曰隂陽之道非獨於一物也聖人之變如水隨形形平則平形險則險五穀者萬民之命國之重寶故無道之君及無道之民不能積其盛有餘之時以待其衰不足也德取象於春夏刑取象於秋冬越絶書獨婦山者句踐將伐吳徙寡婦致獨山上以為死士示得専一也後之説者蓋句踐所以逰軍士也防塢者越所以遏吳軍也雞山豕山者句踐以畜雞豕將伐吳以食士也浙江南路西城者范蠡敦兵城也其陵固可守故謂之固陵舟室者句踐船宮也石塘者越所害軍船也塘廣六十五步長三百五十三步杭塢者句踐杭也二百石長員卒七士人度之會夷巫里句踐所徙巫為一里巫山者越􅸾神巫之官也死葬其上江東中巫葬者越神巫無杜子孫也死句踐於中江而葬之巫神欲使覆禍吳人船述異記句踐得范蠡之謀乃示民以耕桑延四方之士作臺於外而館賢士今會稽山有越王臺今交州麻林一名紵林句踐種麻將以弦弓交州粳頭山句踐貯米於其上春積粳為山今會稽之上有越王鑄劔洲箭鏃洲往往有得古箭鏃蓋古制也越絶書龜山者句踐起怪遊臺也東南司馬門因以照龜又仰望天氣觀天怪也髙四十六丈五尺二寸周五百三十二步一曰怪山怪山者往古一夜自來民怪之故謂怪山樂野者越之弋獵處大樂故謂樂野其山上石室句踐所休謀也東郭外南小城者句踐冰室句踐之出入也齋於稷山往從田里去從北郭門照龜龜山更駕臺馳於離丘逰於美人宫興樂中宿過歷馬丘射於樂野之衢走犬若邪休謀石室食於冰厨領功銓土已作昌土臺藏其形隱其情一曰冰室者所以備膳羞也北郭外路南溪北城者句踐築鼓鐘宫也葛山者句踐罷吳種葛使越女織治葛布獻於吳王夫差犬山者句踐罷吳畜犬獵南山白鹿欲得獻吳神不可得故曰犬山其髙為犬亭六山者句踐鑄銅鑄銅不爍埋之東坂其上馬箠句踐遣使者取於南社徙種六山飾治為馬箠獻之吳姑中山者越銅官之山也越人謂之銅姑瀆長二百五十里朱餘者越鹽官也越人謂鹽曰餘官瀆者句踐工官也富中大塘者句踐治以為義田為肥饒謂之富中越絶書越王句踐反國六年皆得士民之衆而欲伐吳於是乃使之維甲維甲者治甲系斷修內矛赤雞稽繇者也越人謂人鎩也方舟航買儀塵者越人往如江也治須慮者越人謂船為須慮亟怒紛紛者怒貌也怒至士擊髙文者躍勇士也習之於夷夷海也宿之於萊萊野也致之於單單者堵也越國大飢王恐召范蠡而謀范蠡曰王何患焉今之飢此越之福而吳之禍也夫吳國甚富而財有餘吳王年少智寡材輕好須臾之名不思後患王若重幣卑辭以請糴於吳則食可得也食得其卒越必有吳而王何患焉越王曰善乃使人請食於吳吳王將與之伍子胥進諫曰不可與也夫吳之與越接土鄰境道易人通仇讎敵戰之國也非吳喪越越必喪吳若燕秦齊晉山處陸居豈能踰五湖九江越十七厄以有吳哉故曰非吳喪越越必喪吳今將輸之粟與之食是長吾讎而養吾仇也財匱而民恐悔無及也不若勿與而攻之固其數也此昔吾先王之所以霸且夫飢代事也猶淵之與阪誰國無有吳王曰不然吾聞之義兵不攻服仁者食飢餓今服而攻之非義兵也飢而不食非仁體也不仁不義雖得十越吾不為也遂與之食不出三年而吳亦飢使人請食於越越王弗與呂覽長攻説苑權謀越飢句踐懼四水進諫曰夫飢越之福也而吳之禍也夫吳國甚富而財有餘其君好名而不思後患若我卑辭重幣以請糴於吳吳必與我與我則吳可取也越王從之吳將與之子胥諫曰不可夫吳越接地鄰境道易通仇讎敵戰之國也非吳有越越必有吳矣夫齊晉不能越三江五湖以亡吳越不如因而攻之是吾先王闔廬之所以霸也且夫飢何哉亦猶淵也敗伐之事誰國無有君若不攻而輸之糴則利去而凶至財匱而民怨悔無及也吳王曰吾聞義兵不服仁人不以餓飢而攻之雖得十越吾不為也遂與糴三年吳亦飢請糴於越越王不與而攻之遂破吳句踐自會稽歸七年拊循其士民士民欲用以報吳大夫逄同諫曰國新流亡今乃復殷給繕飾備利吳必懼懼則難必至且鷙鳥之擊也必匿其形今吳兵加齊晉怨深於楚越名髙天下實害周室德少而功多必淫自矜為越計莫若結齊親楚附晉以厚吳吳之志廣必輕戰是我連其權三國伐之越承其弊可克也句踐曰善居二年吳王將伐齊子胥諫曰未可臣聞句踐食不重味與百姓同苦樂此人不死必為國患吳有越腹心之疾齊與吳疥癬也願王釋齊先越吳王弗聽遂伐齊敗之艾陵虜齊髙國以歸讓子胥子胥曰王毋喜王怒子胥欲自殺王聞而止之越大夫種曰臣觀吳王政驕矣請試嘗之貸粟以卜其事請貸吳王欲與子胥諫勿與王遂與之越乃私喜子胥言曰王不聽諫後三年吳其墟乎太宰嚭聞之乃數與子胥爭越議因讒子胥曰伍員貌忠而實忍人其父兄不顧安能顧王王前欲伐齊員強諫已而有功用是反怨王王不備伍員員必為亂與逄同共謀讒之王王始不從乃使子胥於齊聞其託子於鮑氏王乃大怒曰伍員果欺寡人欲反使人賜子胥屬鏤劔以自殺子胥大笑曰我令而父霸我又立若若初欲分吳國半豫我我不受已今若反以讒誅我嗟乎嗟乎人固不能獨立報使者曰必取吾眼置吳東門以觀越兵入也史越世家韓非子越王入宦於吳而勸之伐齊以弊吳吳兵既勝齊人於艾陵張之於江濟強之於黃池故可制於五湖故曰將欲吸之必固張之將欲弱之必固強之吳越春秋句踐十五年謀伐吳左哀十三年謂大夫種曰孤用夫子之策免於天虐之誅還歸於國吾誠已説於國人國人喜悅而子昔日云有天氣即來陳之今豈有應乎種曰吳之所以強者為有子胥今子胥忠諫而死是天氣前見亡國之證也願君悉心盡意以説國人越王曰以下略見國語寡人不知其力之不足以大國報仇以暴露百姓之骨於中原此則寡人之罪也寡人誠更其術於是乃葬死問傷弔有憂賀有喜送往迎來除民所害然後卑事夫差往宦士三百人於吳吳封孤數百里之地因約吳國父兄昆弟而誓之曰寡人聞古之賢君四方之民歸之若水寡人不能為政將率二三子夫婦以為藩輔令壯者無娶老妻老者無娶壯婦女子十七未嫁其父母有罪丈夫二十不娶其父母有罪將娩者以告於孤令醫守之生男二貺之以壺酒一犬生女二賜之以壺酒一豚犬陽畜豚隂畜生子三人孤與乳母生子二人孤與一養長子死三年釋吾政季子死三月釋吾政必哭泣葬埋之如吾子也令孤子寡婦疾疹貧病者納官其子欲仕量其居好其衣飽其食而簡鋭之凡四方之士來者必朝而禮之載飯與羮以遊國中國中僮子戲而遇孤孤哺而啜之施以愛問其名非孤飯不食非夫人事不衣七年不收於國民家有三年之畜男即歌樂女即會笑今國之父兄日請於孤曰昔夫差辱吾君王長為天下所恥今越國富饒君王節儉請可報恥孤辭之曰昔者我辱也非二三子之罪也如寡人者何敢勞吾國之人以塞吾之宿仇父兄又復請曰四封之內盡吾君子子報父仇臣復君隙豈敢有不盡力者乎臣請復戰以除君王之宿仇孤悅而許之大夫種曰臣觀吳王得志於齊晉謂當遂涉吾地以兵臨境今疲師休卒一年而不試以忘於我我不可以怠臣當卜之於天吳民既疲於軍困於戰鬪市無赤米之積國廩空虛其民必有移徙之心寒就蒲螺於東海之濱夫占兆人事又見於卜筮王若起師以可會之利犯吳之邊鄙未可往也吳王雖無伐我之心亦難動之以怒不如詮其間以知其意越王曰孤不欲征伐國人請戰者三年矣吾不得不從民人之欲於是乃大會卒臣而令之曰有敢諫伐吳者罪不赦蠡種相謂曰吾諫已不合矣猶聽君王之令越王會軍列士而誓之曰寡人聞古之賢君不患其衆之不足而患其志行之少恥也今夫差衣水犀甲者十有三萬人不患其志行之少恥也而患其衆之不足今寡人將助天威吾不欲匹夫之小勇也吾欲士卒進則思賞退則避刑於是越民父勉其子兄勸其弟曰吳可伐也文冗不若國語越王復召范蠡謂曰吳已殺子胥導諛者衆吾國之民又勸孤伐吳其可伐乎范蠡曰未可須明年之春王曰何也范蠡曰臣聞吳王北會諸侯於黃池精兵從王國中空虛老弱在後太子留守兵出境未逺聞越掩其空虛兵還不難也不如來春其夏六月丙子句踐復問范蠡曰可伐矣乃發習流二千人俊士四萬君子六千君子謂君所子養者諸御千人以乙酉與吳戰丙戌遂虜殺太子丁亥入吳焚姑胥臺吳告急於夫差夫差方會諸侯於黃池恐天下聞之即密不令泄已盟乃使人請成於越句踐自度未能滅吳乃與吳平越王問於大夫種曰吾欲伐吳可乎對曰可矣吾賞厚而信罰嚴而必君欲知之何不試焚宫室於是遂焚宫室人莫救之乃下令曰人之救火死者比死敵之賞救火而不死者比勝敵之賞不救火者比北降之罪人塗其體被濡衣而赴火者左三千人右三千人此知必勝之勢也韓子內儲上春秋戰國異辭卷五十二
