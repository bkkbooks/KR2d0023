body:
  text: 春秋戰國異辭巻七右春坊右諭徳陳厚耀撰魯雜録魯有恭士名曰機汜行年七十其恭益甚冬日行陰夏日行陽市次不敢不行參行必隨坐必危一食之間三起不羞見衣裘褐之士則爲之禮魯君問曰機子年甚長矣不可釋恭乎機汜對曰君子好恭以成其名小人學恭以除其刑對君之坐豈不安哉尚有差跌一食之上豈不羙哉尚有哽噎今若汜所謂幸者也固未能自必鴻鵠飛沖天豈不高哉熷繳尚得而加之虎豹爲猛人尚食其肉席其皮譽人者少惡人者多行年七十常恐斧鑕之加於汜者何釋恭焉説苑敬慎色本魯國先賢傳潤數語魯侯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯納之以爲諸公子之傅好兵者之楚以法干楚王王悦之以爲軍正禄富其家爵榮其親施氏之鄰人孟氏同有二子所業亦同而窘于貧羨施氏之有因從請進趣之方二子以實告孟氏孟氏之二子之秦以術干秦王秦王曰當今諸侯力爭所務兵食而已若用仁義治吾國是滅亡之道遂宫而放之其一子之衛以術干衛侯衛侯曰吾弱國也而攝乎大國之間大國吾事之小國吾撫之是求安之道若賴兵權滅亡可待矣若全而歸之適于他國爲吾之患不輕矣遂刖之而還諸魯既反孟氏之父子叩胸而讓施氏施氏曰凡得時者昌失時者亡子道與吾同而功與吾異失時者也非行之謬也且天下理無常是事無常非先日所用今或棄之今之所棄後或用之此用與不用無定是非也投隙抵時應事無方屬于智智茍不足使若博如孔子術如吕尚焉往而不窮哉孟氏父子舍然無愠容曰吾知之矣子勿重言列子説符魯人身善織屨妻善織縞而徙于越或謂之曰子必窮矣魯人曰何也曰屨爲履之也而越人跣行縞爲冠之也而越人被髪以子之所長遊於不用之國欲使無窮其可得乎韓子説林魯人有公孫悼者淮南記曰王孫綽告人曰我能起死人人問其故對曰我固能治偏枯今吾倍所以爲偏枯之藥則可以起死人矣吕覧别類瓠巴鼓琴而鳥舞魚躍鄭師文聞之棄家從師襄游柱指鈞絃三年不成章師襄曰子可以歸矣師文舍其琴嘆曰文非絃之不能鈞非章之不能成文所存者不在絃所志者不在聲内不得于心外不應于噐故不敢發手而動絃且小假之以觀其後無幾何復見師襄師襄曰子之琴何如師文曰得之矣請嘗試之於是當春而叩商絃以召南吕涼風忽至草木成實及秋而叩角絃以激夾鐘温風徐回草木發榮當夏而叩羽絃以召黄鐘霜雪交下川池暴沍及冬而叩徴絃以激㽔賓陽光熾烈堅氷立散將終命宫而總四絃則景風翔慶雲浮甘露降醴泉湧師襄乃撫心高蹈曰㣲矣子之彈也雖師曠之清角鄒衍之吹律亡以加之彼將挟琴執管而從子之後耳列子湯問魯人攻鄪曽子辭于鄪君曰請出冦罷而後復來請姑毋使狗豕入吾舍鄪君曰寡人之於先生也人無不聞今魯人攻我而先生去我我胡守先生之舍魯人果攻鄪而數之罪十而曾子之所爭者九魯師罷鄪君復脩曽子舍而後迎之説苑尊賢曽子至孝送親喪悲哀攀援柩車而挽者感之爲之止輴淮南子説山註曽子有疾孟儀往問之曽子曰鳥之將死必有悲聲君子集大辟必有順辭禮有三儀知之乎對曰不識也曽子曰坐吾語汝君子脩禮以立志則貪欲之心不來君子思禮以脩身則怠惰慢易之節不至君子脩禮以仁義則忿爭暴亂之辭逺若夫置罇俎列籩豆此有司之事也君子雖勿能可也説苑修文市南冝僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道脩先君之業吾敬鬼尊賢親而行之無須臾離居然不免于患吾是以憂市南子曰君之除患之術淺矣夫豐狐文豹棲于山林伏于巖穴靜也夜行晝居戒也雖飢渴隠約猶胥䟽于江湖之上而求食焉定也然且不免于罔羅機辟之患是何罪之有哉其皮爲之灾也今魯國獨非君之皮邪吾願君刳形去皮灑心去欲而遊于無人之野南越有邑焉名爲建德之國其民愚而朴少私而寡欲知作而不知藏與而不求其報不知義之所適不知禮之所將猖狂妄行乃蹈乎大方其生可樂其死可葬吾願君去國捐俗與道相輔而行君曰彼其道逺而險又有江山我無舟車奈何市南子曰君無形倨無留居以爲君車君曰彼其道幽逺而無人吾誰與爲隣吾無糧而無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足君其涉于江而浮于海望之而不見其崖愈往而不知其所窮送君者皆自崖而反君自此逺矣故有人者累見有于人者憂故堯非有人非見有于人也吾願去君之累除君之憂而獨與道遊于大莫之國方舟而濟于河有虚舩來觸舟雖有惼心之人不怒有一人在其上則呼張歙之一呼而不聞再呼而不聞於是三呼邪則必以惡聲隨之向也不怒而今也怒向也虚而今也實人能虛已以遊世其孰能害之莊子山木梓慶削木爲鐻鐘鼓之懸兩端各有刻鏤鐻成見者驚猶鬼神魯侯見而問焉曰子何術以爲焉對曰臣工人何術之有雖然有一焉臣將爲鐻未甞敢以耗氣也必齊以靜心齊三日而不敢懷慶賞爵禄齊五日不敢懷非譽巧拙齊七日輙然忘吾有四枝形體也當是時無公朝其巧専而外滑消然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則已則以天合天器之所以凝神者其是歟莊子達生海鳥止魯郊魯侯御而觴之奏九韶具太牢鳥能眩視悲憂不食一臠三日而死非以鳥養也養鳥者冝棲之深林莊子達生節文猗頓故魯之貧士問術陶朱公家西河之上大畜牛羊遂成巨富今山西猗氏縣有猗頓宅廣輿記孟孫獵得麑使秦西巴載之持歸麑母隨之而啼秦西巴弗忍縱而與之孟孫歸至而求麑答曰余弗忍而與其母孟孫大怒逐之居三月三月一作一年復召以爲其子傅其御曰秦西巴曩有罪于君今召以爲子傅何也孟孫曰夫一麑而不忍又何況于人乎故曰巧詐不如掘誠樂羊以有功見疑秦西巴以有罪見信韓子説林說苑貴徳又又淮南子人間訓魯人有爲父報仇于齊者刳其腹而見其心坐而正冠起而更衣徐行而出門上車而步馬顔色不變其御欲驅撫而止之曰今日爲父報仇以出死非爲生也今事已成矣又何去之追者曰此有節行之人不可殺也觧圍而去之淮南子人間季孫好士終身莊居處衣服常如朝廷而季孫適懈有過失暫廢其矜莊也客以爲厭易已相與怨之遂殺季孫韓子外儲左齊攻魯至郊見一婦人棄其所抱抱其所携而走于山兒隨而啼婦人行不顧齊將追及問曰汝抱者誰也汝棄者誰也婦人曰抱者妾兄之子棄者妾之子也見軍之至力不能兩䕶故棄妾之子齊將曰母于子至愛痛甚于心今釋汝子而反抱兄之子何對曰已之子私愛也兄之子公義也背公義而向私愛亡兄子而存妾子獨謂義何故忍棄子而行義不能無義而視魯國于是齊將按兵而止使人言于齊君曰魯未可伐也山澤之婦人猶知行義而況朝臣士大夫乎請還齊君許之魯君聞之賜婦人束帛百端號曰義姑姊云列女傳魯秋胡子娶妻邵氏五日往仕于陳五年乃歸未至家見路旁一羙婦人採桑悦之下車與語曰暑日若曝獨採桑吾行道逺願托桑陰下一食婦人採桑不顧秋胡子謂曰力田不如遇豐年採桑不如見貴郎吾有金願以與夫人婦人曰嘻夫採桑力作紡績織紉以供衣食奉二親養夫子而已吾不願人之金也所願子無有外意妾亦無淫佚之志收子之笥金秋胡子遂去至家奉金與母使人唤婦至乃向採桑者也秋胡子慙婦曰子束髪辭親往仕五年乃還所當馳驟揚塵疾至以悦其親今乃悦路旁婦人以金與之是忘母也忘母不孝好色淫佚是汚行也汚行不義夫事親不孝則事君不忠處家不義則居官不理孝義並亡必不遂矣妾不忍見子改娶也妾亦不嫁遂去而東投河而死列女傳魯監門之女嬰相從績中夜而涕泣其偶曰何為而泣也嬰曰吾聞衛世子不肖所以泣也其偶曰衛世子不肖諸侯之憂也子曷爲泣也嬰曰吾聞之異乎子之言也昔宋之桓司馬得罪於宋君出於魯其馬佚而𩥇吾園而食吾園之葵是歳吾聞園人亡利之半越王句踐起兵而攻呉諸侯畏其威魯往獻女吾姊與焉兄往視之道畏而死越兵威者吳也兄死者我也由是觀之禍與福相反也今衛世子甚不肖好兵吾男弟三人能無憂乎韓詩巻二魯監門之女陶嬰少寡養母無强昆弟紡績爲産魯人聞其義將求焉嬰聞之恐不得免作歌明己之不貳也歌曰黄鵠早寡兮七年不雙宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行鳴呼哀哉兮死者不可忘飛鳴尚然兮況于貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得已遂不敢復求列女傳魯公欲高大其宫室而畏王制乃以時尺増一寸召班授之班知其意復増一寸進于公曰臣家相傳之尺乃舜時同度之尺也乃以其尺爲之度諸侯聞之爭召班苑浴志樂列女傳魯漆室女過時未適人當穆公時君老太子㓜女倚柱而嘯其鄰人婦從之遊曰何嘯之悲也子欲嫁邪漆室女曰嗟乎吾始以子爲有知今無識也吾憂魯君老太子㓜鄰婦笑曰此乃魯大夫之憂婦人何與焉漆室女曰非子所知也昔晉客舍吾家繫馬園中馬佚馳走踐吾葵使吾終歳不食葵鄰人女奔隨人亡其家倩吾兄行追之逢霖水出溺流而死令吾終身無兄吾聞河潤九里漸洳三百步今魯君老悖太子少愚魯國有患君臣父子皆被其辱禍及衆庶婦人獨安所避乎吾甚憂之三年魯果亂齊楚攻之男子戰鬭婦人轉輸不得休息君子曰逺矣漆室女之思也詩云知我者謂我心憂不知我者謂我何求此之謂也琴操魯漆室女倚柱悲吟鄰人進而問之曰有淫心欲嫁邪何吟之悲也漆室女曰嗟乎吾憂國傷人心豈欲嫁哉自傷懷潔而爲人所疑於是褰裳入山林之中見女貞之木喟然歎息援琴而歌女貞之辭曰菁菁茂木隠獨榮兮變化垂枝含㽔英兮修身養志建令名兮厥道不同善惡并兮屈躬就濁世疑清兮懷忠見疑何貪生兮遂自經而死一本作次室女春秋戰國異辭卷七
