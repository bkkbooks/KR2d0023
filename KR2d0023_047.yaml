body:
  text: 春秋戰國異辭卷四十四右春坊右諭德陳厚耀撰魏惠王初武侯卒也子罃與公中緩爭為太子公孫頎自宋入趙自趙入韓謂韓懿侯曰魏罃與公中緩爭為太子君亦聞之乎今魏罃得王錯挾上黨固半國也因而除之破魏必矣不可失也懿侯説乃與趙成侯合軍并兵以伐魏戰於濁澤魏氏大敗魏惠王元年魏君為為一本作圍趙謂韓曰除魏君立公中緩割地而退我且利韓曰不可殺魏君人必曰暴割地而退人必曰貪不如兩分之魏分為兩不強於宋衛則我終無魏之患矣趙不聼韓不説以其少卒夜去惠王之所以身不死國不分者二家謀不和也若從一家之謀則魏必分矣故曰君終無適子其國可破也史魏世家紀年惠成王元年趙成侯偃韓懿侯若伐我葵二年魏敗韓於馬陵敗趙於懷史魏世家紀年二年我師伐趙圍蜀陽魏大夫王錯出奔韓三年齊敗我觀史魏世家以齊世家云獻觀和齊紀年四年河水赤於龍門三日五年與韓會宅陽城武堵為秦所敗秦年表云敗韓魏洛陽史魏世家六年伐取宋儀臺史魏世家紀年六年夏四月甲寅徙邦於大梁王發逄忌之藪以賜民紀年七年公子緩如邯鄲以作難八年我師伐邯鄲取列人我師伐邯鄲取肥九年伐敗韓於澮與秦戰少梁虜我將公孫痤年表云虜我太子也取龎秦獻公卒子孝公立史魏世家十年伐取趙皮牢彗星見史魏世家紀年十年入河水於圃田又為大溝而引圃水瑕陽人自秦導岷山青衣水來歸十一年城殷十二年星晝墜有聲十四年與趙會鄗十五年魯衛宋鄭來朝以上史魏世家紀年魯哀侯宋桓侯衛成侯鄭釐侯來朝魏瑩與田侯牟約田侯牟背之魏瑩怒將使人刺之犀首聞而耻之曰君為萬乘之君也而以匹夫從讎衍請受甲二十萬為君攻之衍犀首名犀首官名虜其民人係其牛馬使其君內熱發於背然後拔其國忌也出走言畏忌出奔然後抶其背折其脊季子聞而耻之曰築十仭之城城者既十仭矣則又壞之此胥靡之所苦也今兵不起七年矣此王之基也衍亂人不可聼也季子以魏之休飬已久為垂成之績不可廢也比衍又髙一層華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也君曰然則若何曰君求其道而已矣惠子聞之而見戴晉人以戴晉人見魏君也戴晉人曰有所謂蝸者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反君曰噫其虛言與曰臣請為君實之君以意在四方上下有窮乎君曰無窮曰知逰心於無窮而反在通達之國若存若亡乎君曰然曰通達之中有魏於魏中有梁於梁中有王王與蠻氏有辨乎君曰無辨客出而君惝然若有亡也客出惠子見君曰客大人也聖人不足以當之惠子曰夫吹管也猶有嗃也吹劔首者吷而已矣堯舜之人所譽也道堯舜於戴晉人之前譬猶一吷也管孔小猶以形氣相戛而有聲若劔首之環吹之則吷然過矣今道聖人於大人之前則聖將失其為聖安得有聲乎哉莊子則陽梁王贅其羣臣而議其過任座進諌曰主君國廣以大民堅而衆國中無賢辨士奈何王曰寡人國小以狹民弱臣少寡人獨治之安所用賢人辨士乎任座曰不然昔者齊無故起兵攻魯魯君患之召其相曰為之奈何相對曰夫栁下惠少好學長而嘉智主君試召使於齊魯君曰吾千乘主也身自使於齊齊不聼夫栁下惠特布衣韋帶之士也使之又何益乎相對曰臣聞之乞火不得不望其炮矣今使栁下惠於齊縱不解於齊兵終不愈益攻於魯矣魯君乃曰然乎相即使人召栁下惠來入門袪衣不趨魯君避席而立曰寡人所謂飢而求黍稷渴而穿井者未嘗能以歡喜見子今國事急百姓恐懼願藉子大夫使齊栁下惠曰諾乃東見齊侯齊侯曰魯君將懼乎栁下惠曰臣君不懼齊侯忿然怒曰吾望而魯城芒若類失亡國百姓發屋伐木以救城郭吾視若魯君類吾國子曰不懼何也栁下惠曰臣之君所以不懼者以其先人出周封於魯君之先君亦出周封於齊相與出周南門刳羊而約曰自後子孫敢有相攻者令其罪若此刳羊矣臣之君固以刳羊不懼矣不然百姓非不急也齊侯乃解兵三百里夫栁下惠特布衣韋𢃄之士至解齊釋魯之難奈何無賢士聖人乎説苑奉使衛鞅少好刑名之學事魏桓公叔痤為中庶子鞅衛之庶孽公子也姓公孫氏其祖本姬姓公叔痤知其賢未及進會痤病魏惠王親往問病曰公叔有如不可諱將奈社稷何公叔曰痤之中庶子公孫鞅年雖少有竒才願王舉國而聼之王默然王且去痤屏人言曰王即不聼用鞅必殺之無令出境王許諾而去公叔召鞅謝曰今者王問可以為相者我言若王色不許我我方先君後臣因謂王即弗用鞅當殺之王許我汝可疾去矣且見禽鞅曰彼王不能用君之言任臣又安能用君之言殺臣乎卒不去惠王既去而謂左右曰公叔病甚悲乎欲令寡人以國聼公孫鞅也豈不悖哉史商君傳詳較國策更魏惠王使人謂韓昭侯曰夫鄭乃韓氏亡之也願君之封其後也韓哀侯滅鄭昭侯哀侯之孫也此所謂存亡繼絶之義君若封之則大名昭侯患之公子食我曰臣請往對之公子食我至於魏見魏王曰大國命弊邑封鄭之後弊邑不敢當也弊邑為大國所患昔出公之後聲氏為晉國拘於銅鞮大國弗憐也出公聲氏韓之先君也曽為晉公所執於銅鞮魏國不救故曰大國不憐也而使弊邑存亡繼絶弊邑不敢當也魏王慙曰固非寡人之志也客請勿復言吕覽審應楊朱見梁王言治天下如運諸掌梁王曰先生有一妻一妾而不能治三畝之園而不能藝而言治天下如運諸掌何也對曰君見其牧羊者乎百羊而羣使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣且臣聞之吞舟之魚不逰枝流鴻鵠髙飛不集汙池何則其極逺也黃鐘大吕不可從煩奏之舞何則其音疏也將治大者不治細成大功者不成小此之謂矣列子楊朱理又説苑政楊朱之弟楊布衣素衣而出天雨解素衣衣緇衣而反其狗不知而吠之楊布怒將擊之楊朱曰子毋擊也子亦猶是曩者使女狗白而往黑而來子豈能毋怪哉韓子説林下楊子之鄰人亡羊既率其黨又請楊子之竪追之楊子曰嘻亡一羊何追者之衆鄰人曰多岐路既反問獲羊乎曰亡之矣曰奚亡之曰岐路之中又有岐焉吾不知所之所以反也楊子戚然變容不言者移時不笑者竟日門人怪之請曰羊賤畜又非夫子之有而損言笑者何哉楊子不答門人不獲所命弟子孟孫陽出以告心都子心都子他日與孟孫陽偕入而問曰昔者有昆弟三人逰齊魯之間同師而學進仁義之道而歸其父曰仁義之道若何伯曰仁義使我愛身而後名仲曰仁義使我殺身以成名叔曰仁義使我身名並全彼三術相反而同出於儒孰是孰非邪楊子曰人有濱河而居者習於水勇於泅操舟鬻渡利供百口褁糧就學者成徒而溺死者幾半本學泅不學溺而利害如此若以為孰是孰非心都子默然而出孟孫陽讓之曰何吾子問之迂夫子答之僻吾惑愈甚心都子曰大道以多岐亡羊學者以多方喪生學非本不同非本不一而末異若是唯歸同反一為亡得喪子長先生之門習先生之道而不達先生之况也哀哉列子説符孟孫陽問楊子名朱曰有人於此貴生愛身以蘄不死可乎曰理無不死以蘄久生可乎曰理無久生生非貴之所能存身非愛之所能厚且久生奚為五情好惡古猶今也四體安危古猶今也世事苦樂古猶今也變易治亂古猶今也既聞之矣既見之矣既更之矣百年猶厭其多况久生之苦也乎孟孫陽曰若然速亡愈於久生則踐鋒刃入湯火得所志矣楊子曰不然既生則廢而任之究其所欲以俟於死將死則廢而任之究其所之以放於盡無不廢無不任何遽遲速於其間乎禽子問楊朱曰禽子名骨釐墨子弟子也去子體之一毛以濟一世汝為之乎楊子曰世固非一毛之所濟禽子曰假濟為之乎楊子弗應禽子出語孟孫陽孟孫陽曰子不達夫子之心吾試言之有侵若肌膚獲萬金者若為之乎曰為之孟孫陽曰有斷若一節得一國子為之乎禽子默然有間孟孫陽曰一毛微於肌膚肌膚微於一節省矣然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之乎禽子曰吾不能所以答子然則以子之言問老𥅆關尹則子言當矣以吾言問大禹墨翟則吾言當矣孟孫陽因顧與其徒説他事列子楊朱梁惠王問尉繚子曰尉繚子魏人司馬錯也鬼谷高弟魏惠王聘陳兵法二十四篇其談兵分本末别賓主崇儉右文雖未純王政亦窺見其本矣黃帝刑德可以百勝有之乎尉繚子對曰刑以伐之德以守之非所謂天官時日隂陽向背也黃帝者人事而已矣今有城東西攻不能取南北攻不能取四方豈無順時乘之者乎然不能取者城髙池深兵器偹具財榖多積豪士一謀也由是觀之天官時日不若人事也按天官曰背水陳為絶紀向阪陳為廢軍武王伐紂背濟水向山阪而陳以二萬二千五百人擊紂之億萬而滅商豈紂不得天官之故哉楚將公子心與齊人戰時有彗星出柄在齊柄所在勝不可擊公子心曰彗星何知以彗鬪者固倒而勝焉明日與齊戰大敗之黃帝曰先神先鬼先稽我智謂之天官人事而已尉繚子天官韓非子魏王謂鄭王曰始鄭梁一國也已而别今願得鄭而合之梁鄭君患之召羣臣而與之謀所以對魏鄭公子謂鄭君曰此甚易對也君對魏曰以鄭為故魏而可合也則弊邑亦願得梁而合之鄭魏王乃止按此鄭亦謂韓也十六年與秦孝公會社平侵宋黃池宋復取之史魏世家十七年與秦戰元里秦取我少梁圍趙邯鄲史魏世家紀年十七年鄭釐侯來朝中陽十八年拔邯鄲趙請救於齊齊使田忌孫臏救趙敗魏桂陵史魏世家韓非子魏惠王為臼里之盟將復立於天子彭喜謂鄭君曰君勿聼大國惡有天子小國利之君與大不聼魏焉能與小立之按國䇿臼作九彭喜作房喜鄭君作韓王十九年諸侯圍我襄陵築長城塞固陽二十年歸趙邯鄲與盟漳水上二十一年與秦會彤趙成侯卒二十八年齊威王卒中山君相魏魏文侯滅中山使子擊守之後尋復國至是使令相魏其中山後又為趙所滅也以上魏世家三十年魏伐趙趙告急齊齊宣王用孫子計救趙擊魏魏遂大興師使龎涓將而令太子申為上將軍過外黃外黃徐子謂太子曰臣有百戰百勝之術太子曰可得聞乎客曰太子自將攻齊大勝并莒則富不過有魏貴不益為王若戰不勝齊則萬世無魏矣此臣之百戰百勝之術也太子曰諾請必從公之言而還矣客曰太子雖欲還不得矣彼勸太子戰攻欲啜汁者衆兾功者衆也太子雖欲還恐不得矣太子因欲還其御曰將出而還與北同太子果與齊人戰敗於馬陵與國䇿略同齊虜魏太子申殺將軍涓軍遂大破史魏世家子吕覽自知篇云鑽茶龎涓太申不自知而死三十一年秦趙齊共伐我秦將商君詐我將軍公子卭而襲奪其軍破之秦用商君東地至河而齊趙數破我安邑近秦於是徙都大梁以公子赫為太子史魏世家紀年十三十一年三月為大溝於北郛以行圃田之水三六年改元稱一年史注紀年梁惠成王九年徙都大梁今本在六年紀年稱惠成王改元稱一年史記以為襄王之元年二説不同三十三年秦孝公卒商君亡秦歸魏魏怒不入史魏世家三十五年與齊宣王會平阿南惠王數敗於軍旅卑禮厚幣以招賢者鄒衍淳于髠孟軻皆至梁梁惠王曰寡人不佞兵三折於外太子虜上將死國以空虗以羞先君宗廟社稷寡人甚醜之叟不逺千里辱幸至弊邑之廷將何以利吾國孟軻曰君不可以言利若是夫君欲利則大夫欲利大夫欲利則庶人欲利上下爭利國則危矣為人君仁義而已矣何以利為史魏世家淳于髠齊人也地志山東登州府黃縣人博聞強記學無所主其諌説慕晏嬰之為人也然而承意觀色為務客有見髠於梁惠王者惠王屏左右獨坐而再見之終無言也惠王怪之以讓客曰子之稱淳于先生管嬰不及及見寡人寡人未有得也豈寡人不足為言耶何故哉客以謂髠髠曰固也吾前見王王志在驅逐後復見王王志在音聲吾是以默然客具以報王王大駭曰嗟乎淳于先生誠聖人也前淳于先生之來人有獻善馬者寡人未及視會先生至後先生之來人有獻謳者未及試亦會先生來寡人雖屏人然私心在彼有之後淳于髠見一語連三日三夜無倦惠王欲以卿相位待之髠因謝去於是送以安車駕駟束帛加璧黃金百鎰終身不仕史孟軻傳齊人有淳于髠者以從説魏王魏王辨之以為辨逹也約車千乘將之楚辭而行有以橫説魏王魏王乃止其行失從之意又失橫之事吕覽離謂魏惠王謂卜皮曰子聞寡人之聲聞亦何如焉對曰臣聞王之慈惠也王欣然喜曰然則功且安至對曰王之功至於亡王曰慈惠行善也行之而亡何也卜皮對曰夫慈者不忍而惠者好與也不忍則不誅有過好豫則不待有功而賞有過不罪無功受賞雖亡不亦可乎韓子內儲上韓子卜皮為縣令其御吏汚穢而有愛妾卜皮乃使少庶子佯愛之以知御吏隂情淮南子齊人淳于髠以從説魏王魏王辨之約車十乘將使荆辭而行又以為從未足也復以橫説其辭若然魏王乃止其行而疏其身失從心志而又不能成衡之事是其所以固也梁相死惠子欲之梁渡河而遽墮水中船人救之船人曰子欲何之而遽墮也曰梁無相吾欲往相之船人曰子居船楫之間而困無我則子死矣子何能相梁乎惠子曰子居艘楫之間則吾不如子至於安國家全社稷子之比我蒙蒙如未視之狗子耳説苑雜言惠子為魏惠王為國法已成以示諸人惠子惠施宋人仕魏為魏王相人皆善之獻之惠王惠王善之以示翟剪翟剪翟黃之後剪亦作煎翟剪曰善也惠王曰可行耶翟剪曰不可惠王曰善而不可行何故翟剪對曰今舉大木者前前呼輿謣或作邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若此其宜也治國有禮不在文辨言惠子之法若鄭衛之音宜於衆人之耳於治國之法未可用也淮南子道應又吕覽淫辭魏惠王謂惠子曰上世之有國必賢者也今寡人實不若先生願得傳國惠子辭王又固請曰寡人莫有之國於此者也而傳之賢者民之貪爭之心止矣欲先生之以此聼寡人也惠子曰若王之言則施不可而聼矣王固萬乘之主也以國與人猶尚可今施布衣也可以有萬乘之國而辭之此其止貪心愈甚也惠王布冠而拘於鄄鄄邑名自拘於鄄將服於齊也齊威王幾弗受惠王易衣變冠乘輿而走幾不出乎魏境吕覽不屈此惠王戰敗讓國史不具載等可補闕疑符子惠子家窮餓數日不舉火乃見梁王王曰夏麥方熟請以割子可乎惠子曰施方來遇羣川之水長有一人溺流而下呼施救之施應曰吾不善遊方將為子告急於東越之王簡其善遊者以救子可乎溺人曰我得一瓢之力則活矣子方告急於東越之王簡其善遊者以救我是不如求我於重淵之下魚龍之腹矣類莊子西江之説韓非子惠子曰羿執鞅持扞操弓關機越人爭為持的弱子扞弓慈母入室閉户故曰可必則越人不疑羿不可必則慈母逃弱子漢書名家有惠子一萹客謂梁王曰惠子之言事也善譬王使無譬則不能言矣王曰諾明日見謂惠子曰願先生言事則直言耳無譬也惠子曰今有人於此而不知彈者曰彈之狀何若應曰彈之狀如彈則諭乎王曰未諭也於是更應曰彈之狀如弓而以竹為弦則知乎王曰可知矣惠子曰夫説者固以其所知諭其所不知而使人知之今王曰無譬則不可矣王曰善説苑善説惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日三夜莊子往見之曰南方有鳥其名鵷雛子知之乎夫鵷雛發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是鴟得腐鼠鵷雛過之仰而視之曰嚇今子欲以子之梁國嚇我耶嚇怒其聲恐其奪己食也莊子與惠子遊於濠梁之上莊子曰倏魚出逰從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣魚非異類人皆不知故為不知之全莊子曰請循其本惠子曰女安知魚樂云者既已知吾知之而問我我知之濠上也莊子秋水莊子逸萹惠子始與莊子相見而問乎莊子曰今日自以為鳯凰而徒遭燕雀耳坐者俱笑淮南子惠子從車百乘以過孟諸莊子見之棄其餘魚莊子衣大布而補之正緳係履正緳結𢃄也係履履敝而係之以繩也而過魏王惠王魏王曰何先生之憊耶莊子曰貧也非憊也士有道德不能行憊也衣弊履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章攬蔓其枝而王長其間雖羿逄蒙不能眄睨也及其得柘棘枳枸之間也危行側視振動悼栗此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪此比干之見剖心徴也夫莊子山木陳軫貴於魏王惠子曰必善事左右夫楊橫樹之即生倒樹之即生折而樹之又生然使十人樹之而一人拔之即無生楊矣夫以十人之衆樹易生之物而不勝一人者何也樹之難而去之易也子雖工自樹於王而欲去子者衆子必危矣韓子説林匡章謂惠子於魏王之前曰蝗螟農夫得而殺之奚故為其害稼也今公行多者數百乘步者數百人少者數十乘步者數十人此無耕而食者其害稼亦甚矣惠王曰惠子施也難以辭與公相應公謂匡章雖然請言其志惠子曰今之城者或者操大築乎城上或負畚而赴乎城下或操表掇以善晞望若施者其操表掇者也施惠子名表掇儀度使工女化而為絲不能治絲使大匠化而為木不能治木使聖人化而為農夫不能治農夫施而治農夫者也而能也公何事比施於螣螟乎惠子之治魏為本其治不治當惠王之時五十戰而二十敗所殺者不可勝數大將愛子有禽者也大術之愚為天下笑得舉其諱諱惡也乃請令周太史更著其名圍邯鄲三年而弗能取士民罷潞潞羸也國家空虛天下之兵四至衆庶誹謗諸侯不譽謝於翟剪而更聼其謀社稷乃存名寶四出土地四削魏國從此衰矣白圭新與惠子相見也惠子説之以強白圭無以應惠子出白圭告人曰人有新取婦者婦至宜安矜緩視媚行媚行徐行竪子採蕉火而巨新婦曰蕉火大巨入於門門中有斂陷斂讀曰脅新婦曰塞之將傷人之足此非不便之家氏也然而有大甚者今惠子之遇我尚新其説我有大甚者惠子聞之曰不然詩曰愷悌君子民之父母愷者大也悌者長也君子之德長且大者則為民父母父母之教子也豈待久哉何事比我於新婦乎詩豈曰愷悌新婦哉吕覽不屈按白圭已見文侯時豈惠王時尚在耶白圭謂魏王曰市丘之鼎以烹雞多洎之則淡而不可食市丘魏邑名肉汁曰洎汁多無味故淡不可食少洎之則焦而不熟然而視之蝺焉美無所可用蝺讀齲齒之齲鼎好貌惠子之言有似於此似鼎好而不可用惠子聞之曰不然使三軍飢而居鼎旁適為之甑則莫宜此鼎矣白圭聞之曰無所可用者意者徒加其甑耶吕覽應言白圭相魏暴譴相韓白圭謂暴譴曰子以韓輔我於魏我請以魏待子於韓臣長用魏子長用韓韓子內儲下唐尚敵年為史史國史也其故人謂唐尚願之唐尚明習天文審咎徴之應故為願之也以謂唐尚唐尚曰吾非不得為史也羞而不為也其故人不信也及魏圍邯鄲唐尚説惠王而解之危以與伯陽以伯陽邑與唐尚其故人乃信其羞為史也居有間其故人為其兄請請於唐尚欲仕其兄唐尚曰魏君死吾舉汝兄以代之其故人反興再拜而信之夫可信而不信不可信而信此愚者之患也吕覽士容三十六年復與齊王會甄是嵗惠王卒子襄王立史魏世家年紀年云惠成王三十六改元稱一年未卒也魏惠王死葬有日矣天大雨雪至於牛目羣臣多諌於太子者曰雪甚如此而行葬民必甚疾之官費又恐不給請弛期更日太子曰為人子者以民勞與官費用之故而不行先王之葬不義也子勿復言羣臣皆莫敢諌而以告犀首犀首曰吾未有以言之是其唯惠公乎請告惠公惠公魏相惠施也惠公曰諾駕而見太子曰葬有日矣太子曰然惠公曰昔王季厯葬於渦山之尾欒水齧其墓見棺之前和棺頭曰和文王曰嘻先君必欲一見羣臣百姓也天故使欒水見之於是出而為之張朝百姓皆見之三日而後更葬此文王之義也今葬有日矣而雪甚及牛目難以行太子為及日之故得無嫌於欲亟葬乎願太子易日先王必欲少留而撫社稷安黔首也故使雨雪甚因弛期而更為日此文王之義也若此而不為意者羞法文王也太子曰甚善敬弛期更擇葬日吕覽開春按與戰國䇿略同襄王襄王元年與諸侯會徐州相王也追尊父惠王為王史魏世家魏襄王與羣臣飲酒酣王為羣臣祝令羣臣皆得志史起興而對曰羣臣或賢或不肖賢者得志則可不肖者得志則不可王曰皆如西門豹之為人臣也史起對曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁而西門豹弗知用是其愚也知而弗言是不忠也愚與不忠不可效也魏王無以應之明日召史起而問焉曰漳水猶可以灌鄴田乎史起對曰可王曰子何不為寡人為之史起曰臣恐王之不能為也王曰子誠能為寡人為之寡人盡聼子矣史起敬諾言之於王曰臣為之民必大怨臣大者死其次乃籍臣雖死籍願王之使他人遂之也遂成也王曰諾使之為鄴令史起因往為之引漳水溉鄴鄴民大怨欲籍史起史起不敢出而避之王乃使他人遂為之水已行民大得其利河內以富相與歌之曰鄴有聖令兮為史公決漳水兮灌鄴旁終古斥鹵兮斥一作舄生稻粱吕覽樂成侯或以史起為魏文時人魏襄王將起中天臺令曰敢諌者死許綰負操鍤入曰聞大王將起中天臺臣願加一力王曰子何力有加綰曰雖無力能商之王曰若何曰臣聞天與地相去萬五千里今王因而半之當起七千五百里之臺高既如是其趾須方八千里盡王之地不足以為臺趾古者堯舜建諸侯地方五千里王必起此臺先以兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以為臺趾林木之積人徒之衆倉廩之儲數以萬億度八千里之外當定農畝之地足以奉給王之臺者臺具以備乃可以作魏王默然無以應乃罷起臺新序卷六張儀欲以秦韓與魏之勢伐齊荆而惠施欲以齊荆偃兵以齊荆為授則秦韓不敢加兵二人爭之羣臣左右皆為張子言而以攻齊荆為利而莫為惠子言王果聼張子王魏襄王而以惠子言為不可攻齊荆事已定惠子入見王言曰先生毋言矣攻齊荆之事果利矣一國盡以為然惠子曰説不可不察也夫齊荆之事也誠利一國盡以為利是何智者之衆也攻齊荆之事誠不利一國盡以為利何愚者之衆也凡謀者疑也疑也者誠疑以為可者半以為不可者半今一國盡以為可是王亡半也無至疑之人故亡其半劫主者固亡其半者也惠子與又韓子內儲上國䇿少别秦韓攻魏昭卯西説而秦韓罷齊楚攻魏卯東説而齊楚罷魏襄王飬之以五乘將軍卯曰伯夷以將軍葬於首陽山之下而天下曰夫以伯夷之賢與其稱仁而以將軍葬是手足不掩也今臣罷四國之兵而王乃與臣五乘此其稱功猶贏勝而履蹻以薄賞報大功猶賈者贏利倍勝而履草蹻也外韓子儲左淮南子孟卯妻其嫂有五子焉然而相魏寧其危解其患五年秦敗我龍賈軍四萬五千於雕隂圍我焦曲沃豫秦河西之地六年與秦會應秦取我汾隂皮氏焦魏伐楚敗之陘山七年魏盡入上郡於秦秦降我蒲陽八年秦歸我焦曲沃十二年楚敗我襄陵諸侯執政與秦相張儀會齧桑在梁與彭城之間紀年魏襄王十二年秦公孫爰帥師伐我圍皮氏翟章帥師救皮氏圍疾西風十三年城皮氏魏襄十二年秦武王之四年十三年張儀相魏魏有女子化為丈夫秦取我曲沃平周十六年襄王卒子哀王立張儀復歸秦十三年張儀相魏也以上史魏世家地志河南魏襄王冡在衛輝府城西南漢初有人盜發得竹簡世號汲冡周書哀王哀王元年五國共攻秦不勝而去史魏世家陳軫使於秦楚使之也過梁欲見犀首犀首謝弗見軫曰吾為事來公不見軫軫將行不得待異日犀首見之陳軫曰公何好飲也犀首曰無事也曰吾請令公饜事可乎曰奈何曰田需約諸侯從親田需國䇿作李從楚王疑之未信也公謂於王曰臣與燕趙之王有故數使人來曰無事何不相見願謁行於王王雖許公公請無多車以車三十乘可陳之於庭明言之燕趙燕趙客聞之馳車告其王使人迎犀首楚王聞之大怒曰田需與寡人約而犀首之燕趙是欺我也怒而不聼其事齊聞犀首之北使人以事委焉犀首遂行三國相事皆斷於犀首軫遂至秦史陳軫傳按與國䇿文少異史犀首傳犀首者魏之隂晉人也名衍姓公孫氏與張儀不善張儀為秦之魏魏王相張儀犀首弗利故令人謂韓公叔曰張儀已合秦魏矣其言曰魏攻南陽秦攻三川魏王所以貴張子者欲得韓地也且韓之南陽已舉矣子何不少委焉以為衍功則秦魏之交可錯矣然則魏必圖秦而棄儀收韓而相衍公叔以為便因委之犀首以為功果相魏張儀走二年齊敗我觀津五年秦使樗里子伐取我曲沃走犀首岸門六年秦求立公子政為太子與秦會臨晉以上史魏世家魏哀王使使者為太子擇妃而美王將自納焉魏大夫如耳母曲沃婦也敕其子如耳諌王未遇間會使於齊婦因欵王門而上書曰妾聞男女之别國之大節也婦人脆於志窳於心不可以邪開也是故必十五而笄二十而嫁早成其號諡所以就之也聘則為妻奔則為妾所以開善遏淫也節成然後許嫁親迎然後隨從貞女之義也今大王為太子求妃而自納之於後宫此毁貞女之行而亂男女之别也自古聖王必正妃匹妃匹正則興不正則亂夏之興也以塗山亡也以末喜殷之興也以有姺亡也以妲己周之興也以太姒亡也以褒姒夫男女之盛合之以禮則父子生焉君臣成焉故為萬物始君臣父子夫婦三者天下之大綱紀也三者治則治亂則亂今大王亂人道之始棄綱紀之務敵國五六南有從楚西有橫秦而魏居其間可謂僅存矣王不憂此而從亂無别父子同女妾恐大王之國政危矣王曰然寡人不知也遂與太子妃而賜婦三十鍾如耳還而爵之王勤行自修勞來國家而齊楚強秦不敢加兵焉列女傳列女傳秦立魏公子政為魏太子魏哀王使使者為太子納妃而美王將自納焉曲沃婦謂其子如耳曰王亂於無别汝胡不匡之今魏不能強王又無義有禍必及吾家汝言以盡忠忠以除禍不可失也如耳未遇間會使於齊婦因款王門而上書曰曲沃之老婦也心有所懷願以聞於王王召入婦曰妾聞男女之别國之大節也今大王為太子求妃而自納之於後宫此毁貞女之行亂男子之别也自古聖王必正妃匹妃匹正則興不正則亂周之康王夫人晏出朝關雎起興思得淑女以配君子夫雎鳩之鳥猶未嘗見乘居而匹處也今大王亂人道之始棄綱紀之大大國五六南有強楚西有橫秦而魏國居其間可謂僅存矣王不憂此從亂無别父子同女妾恐大王之國政危矣王曰然寡人不知也遂與太子妃而賞婦三十鍾如耳還而爵之哀王勤行自修勞來國家而齊楚強秦不敢加兵焉終哀王之世未見強鄰之不敢加兵也七年攻齊與齊伐燕史魏世家八年伐衛拔列城二衛君患之如耳見衛君曰請罷魏兵免成陵君可乎衛君曰先生果能孤請世世以衛事先生如耳見成陵君曰昔者魏伐趙斷羊腸拔閼與約斬趙趙分而為二所以不亡者魏為從主也今衛已迫亡將西請事於秦與其以秦醳衛不如以魏醳衛醳音釋衛之德魏必終無窮成陵君曰諾如耳見魏王曰臣有謁於衛衛故周室之别也其稱小國多寶器今國迫於難而寶器不出者其心以為攻衛醳衛不以王為主故寶器雖出必不入於王也臣竊料之先言醳衛者必受衛者也如耳出成陵君入以其言見魏王魏王聼其説罷其兵免成陵君終身不見史魏世家翟紀年魏襄王八年章伐衛義渠君朝於魏犀首聞張儀復相秦害之犀首者魏之隂晉人也名衍姓公孫氏與張儀不善犀首乃謂義渠君曰道逺不得復過請謁事情曰中國無事秦得燒掇焚杆君之國有事秦將輕使重弊事君之國其後五國伐秦年表秦惠王後元七年楚魏齊韓趙五國共攻秦會陳軫謂秦王曰義渠君者蠻夷之賢君也不如賂之以撫其志秦王曰善乃以文繡千純婦女百人遺義渠君義渠君致羣臣而謀曰此公孫衍所謂耶乃起兵襲秦大敗秦人李伯之下張儀已卒之後張儀卒在哀王十年犀首入相秦嘗佩五國之相印為約長史犀首傳國䇿小異與九年與秦王會臨晉史魏世家史記魏世家張儀魏章皆歸於魏魏相田需死哀王九年楚害張儀犀首薛公楚相昭魚謂蘇代曰田需死吾恐張儀犀首薛公有一人相魏者也代曰然相者欲誰而君便之昭魚曰吾欲太子之自相也代曰請為君北必相之昭魚曰奈何對曰君其為梁王代請説君昭魚曰奈何對曰代也從楚來昭魚甚憂曰田需死吾恐張儀犀首薛公有一人相魏者也代曰梁王長主也必不相張儀張儀相必右秦而左魏犀首相必右韓而左魏薛公相必右齊而左魏梁王長主也必不便也王曰然則寡人孰相代曰莫若太子之自相太子之自相是三人者皆以太子為非常相也皆將務以其國事魏欲得丞相璽也以魏之強而三萬乘之國輔之魏必安矣故曰莫若太子之自相也遂北見梁王以此告之太子果自相十年張儀死十一年與秦武王會應十二年太子朝於秦秦來伐我皮氏未拔而解十四年秦來歸武王后十六年秦拔我蒲反反一作阪陽晉封陵十七年與秦會臨晉秦豫我蒲反紀年魏襄王十七年邯鄲命使大夫奴遷於九原又命將軍大夫適子代吏皆貂服襄王即哀王十八年與秦伐楚二十一年與齊韓共敗秦軍函谷即田文敗秦事二十三年秦復豫我河外及封陵為和哀王卒子昭王立以上史魏世家昭王昭王元年秦拔我襄城二年與秦戰不利三年佐韓攻秦秦將白起敗我軍伊闕二十四萬六年豫秦河東地方四百里芒卯以詐重以上史魏世家魏令孟卬割絳􅀢安邑之地以與秦王王喜令起賈為孟卬求司徒於魏王魏王不説應起賈曰卬寡人之臣也寡人寧以臧為司徒無用卬臧亦魏臣願大王之更以他人詔之也起賈出遇孟卬於廷曰公之事何如起賈曰公甚賤於公之主公之主曰寧用臧為司徒無用公孟卬入見謂魏王曰秦客何言王曰求以女為司徒孟卬曰王應之謂何王曰寧以臧無用卬也孟卬太息曰宜矣王之制於秦也王何疑秦之善臣也以絳􅀢安邑令負牛書與秦猶乃善牛也卬雖不肖獨不如牛乎且王令三將軍為臣先曰視卬如身王身是重臣也令二二疑也輕臣也令臣責受秦之責卬雖賢固能乎居三日魏王乃聼起賈吕覽應言魏淮南子汜論云孟卯妻其嫂有五子焉然而相注孟卯齊人為魏臣戰國䇿曰芒卯七年秦拔我城大小六十一史記白起傳白起為大良造攻魏拔之取城大小六十一事在秦昭王十八年起傳攻韓魏伊闕明年云云紀年疏略八年秦昭王為西帝齊湣王為東帝月餘皆復稱王歸帝以上史魏世家秦王立帝秦稱帝在魏昭王八年宜陽令許綰誕魏王許綰秦臣也誕詐也詐魏王言帝欲令魏王入朝也魏王將入秦魏敬謂王曰以河內孰與梁重王曰梁重又曰梁孰與身重王曰身重又曰若使秦求河內則王將與之乎王曰弗與也魏敬曰河內三論之下也三論謂河內與梁及身也身三論之上也秦索其下而王弗聼索其上而王聼之臣竊不取也王曰甚然乃輒輟行吕覽應言魏昭王問於田詘曰寡人在東宫之時聞先生之議曰為聖易有諸乎田詘對曰臣之所舉也昭王曰然則先生聖于于乎也田詘對曰未有功而知其聖也是堯之知舜也今詘未有功而王問詘曰若聖乎敢問王亦其堯耶昭王無以應吕覽審應九年秦拔我新垣曲陽之城史魏世家十年齊滅宋宋王死我溫史魏世家魏昭王昭王十年田文奔魏魏以為相謂孟嘗君曰寡人欲與官事君曰王欲與官事則何不試習讀法昭王讀法十餘簡而卧曰寡人不能讀此法也韓子外儲左十二年與秦趙韓燕共伐齊敗之濟西湣王出亡燕獨入臨災與秦王會西周十三年秦拔我安城兵到大梁去十八年秦拔郢楚王徙陳以上史魏世家十九年昭王卒子安釐王立世本安釐王名圉以上史魏世家春秋戰國異辭卷四十四
