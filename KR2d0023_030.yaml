body:
  text: 春秋戰國異辭巻二十七右春坊右諭德陳厚耀撰楚史楚世家楚之先祖出自帝顓頊髙陽髙陽生稱稱生巻章巻章生重黎重黎為帝嚳髙辛居火正甚有功能光融天下帝嚳命曰祝融共工氏作亂帝嚳使重黎誅之而不盡帝乃以庚寅日誅重黎而以其弟吳回為重黎後復居火正為祝融吳回生陸終陸終生子六人拆剖而産焉長曰昆吾二曰參胡三曰彭祖四曰會人五曰曹姓六曰季連芈姓楚其後也昆吾氏夏之時嘗為侯伯桀之時湯滅之彭祖氏殷之時嘗為侯伯殷之末世滅彭祖氏季連生附沮附沮生穴熊其後中微或在中國或在蠻夷弗能紀其世周文王之時季連之苖裔曰鬻熊鬻熊子事文王蚤卒其子曰熊麗熊麗生熊狂熊狂生熊繹熊繹當周成王之時舉文武勤勞之後嗣而封熊繹于楚蠻封以子男之田姓芉氏居丹陽徐廣曰在南郡枝江縣熊繹生熊艾熊艾生熊䵣熊䵣生熊勝熊勝以弟熊楊為後熊楊生熊渠熊渠生子三人當周夷王之時王室微諸侯或不朝相伐熊渠甚得江漢間民和乃興兵伐庸楊粤至于鄂熊渠曰我蠻夷也不與中國之號謚乃立其長子康為句亶王地志即荆州府江陵縣中子紅為鄂王少子執疵為越章王皆在江上楚蠻之地及周厲王暴虐熊渠畏其伐楚亦去其王後為熊母康徐廣曰即熊渠之長子母康蚤死熊渠卒子熊摰紅立摰紅卒其弟弑而代立曰熊延熊延生熊勇熊勇六年而周人作亂攻厲王王奔彘熊勇十年卒弟熊嚴為後熊嚴十年卒有子四人長子伯霜中子仲雪次子叔堪少子季徇熊嚴卒長子伯霜代立是為熊霜熊霜元年周宣王初立熊霜六年卒三弟爭立仲雪死叔堪亡避難于濮而少弟季徇立是為熊徇熊徇二十二年卒子熊咢立熊咢九年卒子熊儀立是為若敖若敖二十年周幽王為犬戎所弑周東徙而秦襄公始列為諸侯古史考熊渠卒子熊翔立長子摰有疾少子熊延立宋均云熊摰有疾不傳為後别居于䕫後曰䕫子若敖若敖二十一年周平王元年二十七年若敖卒子熊坎立是為霄敖史楚世家霄敖霄敖六年卒子熊眴立是為蚡冐史楚世家蚡冐蚡冐十三年晉始亂以曲沃之故史楚世家楚厲王有警鼓以與百姓為戌飲酒醉過而擊之民大驚使人止曰吾醉而與左右戲過擊之也民皆罷居數月有警擊鼓而民不赴乃更令明號而民始信之韓子外儲左按史記無厲王厲王疑即蚡冒楚人卞和得玉璞楚山中奉而獻之厲王厲王使玉尹相之曰石也王以和為誑而刖其左足及厲王薨疑即蚡冒武王即位和又奉其璞而獻之武王武王使王尹相之又曰石也王又以和為誑而刖其右足武王薨文王文王一作共王即位和乃抱其璞而哭于楚山之下三日三夜淚盡而繼之以血王聞之使人問其故曰天下之刖者多矣子奚哭之悲也和曰吾非悲刖也悲夫寶玉而題之以石貞士而名之以誑此吾所以悲也王曰惜矣吾先王未剖石而斬人之足夫死者不可生斷者不可續何聽之殊也乃使玉人理其璞而得寶焉遂命曰和氏之璧新序巻五氏又韓子和蔡邕琴操楚野民卞和得玉璞以獻懐王此事或載厲王或作懐王然懐王之後無平王從厲王為是王使樂正子占之言玉石也以為欺謾斬其一足懐王死子平王立和復獻之又以為欺斬其一足平王死子立為荆王欲獻之恐復見害乃抱玉而哭涕盡繼之以血荆王使剖之中果有玉乃封和為陵陽侯和辭不受而作退怨之歌歌曰悠悠沂水經荆山精氣鬱洽一作浹谷巖巖中有神寶灼明明穴山采玉難為功于何獻之楚先王遇王暗昧信䜛言斷截兩足離余身俛仰嗟嘆心摧傷紫之亂朱粉墨同空山歔欷涕龍鍾天鑒孔明竟以彰沂水滂沛流于汶進寶得刖足離分斷者不續豈不怨地志夀州卞和嘗于荆山得玉璞獻之懐王以為石也刖其左足未幾復獻之刖其右足及文王即位乃抱璞泣曰臣非悲刖也寶玉而題之以石真士而目之以詐所以悲也王使玉人琢之果得玉封零陽侯不就新序巻四楚熊渠子夜行見寢石以為伏虎闗弓射之滅矢飲羽下視知石也却復射之矢摧無迹故誠心而金石為之開况人心乎據史記熊渠當周夷王之時若敖之六世祖也此熊渠子或别一人韓詩巻六楚熊渠子夜行寢石以為伏虎彎弓而射之没金飲羽下視知其為石蚡冒十七年卒蚡冒弟熊通弑蚡冒子而代立是為武王史楚世家武王武王十七年晉之曲沃莊伯弑主國晉孝侯十九年鄭伯弟叚作亂二十一年鄭侵天子之田二十三年衛弑其君桓公二十九年魯弑其君隠公三十一年宋太宰華督弑其君殤公三十五年楚伐隨隨曰我無罪楚曰我蠻夷也今諸侯皆為叛相侵或相殺我有敝甲欲以觀中國之政請王室尊吾號隨人為之周請尊楚王室不聽還報楚三十七年楚熊通怒曰吾先鬻熊文王之師也蚤終成王舉我先公乃以男子田令居楚蠻夷皆率服而王不加位我自尊耳乃自立為武王與隨人盟而去于是始開濮地而有之五十一年周召隨侯數以立楚為王楚怒以隨背已伐隨武王卒師中而兵罷子文王熊貲立始都郢以上史楚世家文王文王二年伐申過鄧鄧人曰楚王易取鄧侯不許也六年伐蔡虜蔡哀侯以歸已而釋之楚强陵江漢間小國小國皆畏之十一年齊桓公始霸楚亦始大十二年伐鄧滅之以上史楚世家楚文王伐鄧使王子革王子靈共捃菜二子出採見老丈人載畚乞焉不與搏而奪之王聞之令皆拘二子將殺之大夫辭曰取畚信有罪然殺之非其罪也君若何殺之言卒丈人造君而言曰鄧為無道故伐之今君之公子搏而奪吾畚無道甚于鄧呼天而號君聞之羣臣恐君見之曰討有罪而横奪非所以禁暴也恃力虐老非所以教幼也愛子棄法非所以保國也私二子滅三行非所以從政也丈人舍之矣謝之軍門之外説苑至公荆文王得如黄之狗箘簬之矰以畋于雲夢三月不反得舟一作丹之姬淫期年不聽朝保申諌曰先王卜以臣為保吉今王得如黄之狗箘簬之矰畋于雲澤三月不反及得舟之姬淫期年不聽朝王之罪當笞匍伏將笞王王曰不榖免于襁褓託于諸侯矣願請變更而無笞保申曰臣承先王之命不敢廢王不受笞是廢先王之命也臣寧得罪于王無負于先王王曰敬諾乃席王王伏保申束細箭五十跪而加之王背如此者再謂王起矣王曰有笞之名一也遂致之保申曰臣聞之君子恥之小人痛之恥之不變痛之何益保申趨出欲自流于淵請死王曰此不榖之過保將何罪王乃變行從保申殺如黄之狗折箘簬之矰逐舟之姬務治乎荆兼國三十九説苑正諫宛又見吕覽正諫如黄作茹黄箘簬作路舟作丹細箭作細荆幽明錄楚文王少時好田獵天下快犬名鷹畢聚焉有人獻一鷹曰非王鷹之儔俄而雲際有一物凝翔飄颻鮮白鷹見之便竦翮而升矗若飛電須臾羽墮如雪血灑如雨有大鳥墮地而死度其兩翅廣數十里喙邉有黄衆莫能知有博物君子曰此鵬雛也始飛故為鷹所制文王乃厚賞獻者又孔氏志怪文王汚膺鮑申傴背以成楚國之治汚膺陷匈也鮑申楚相淮南子説山楚文王好服獬冠楚人效之淮南子主術訓文王一作莊王楚王欲取息與蔡楚王文王也息蔡二國名於是佯善蔡侯而與之謀曰吾欲得息奈何蔡侯曰息夫人吾妻之姨妻之女弟為姨吾請為饗息侯與其妻而與王俱因而襲之楚王曰諾於是與蔡侯以饗禮入于息因與俱遂取息旋舍于蔡又取蔡吕覽長攻列女傳楚伐息虜其君使息君守門將妻其夫人而納之于宫楚王出遊夫人遂出見息君曰人生一死而已何至自苦妾無須臾忘君也終不以身更貳與其生離乎地上豈若死歸于地下哉乃作詩曰榖則異室死則同穴謂予不信有如皦日息君止之夫人不聽遂自殺息君亦自殺同日死楚王賢其守節有義乃以諸侯之禮合𦵏之與左傳别文王十年滅息在楚按左傳息媯不死豈别有夫人耶然大車詩亦不云息夫人所作王孫厲謂楚文王曰徐偃王好行仁義之道漢東諸侯三十二國盡服矣王若不伐徐必事徐王曰若信有道不可伐也對曰大之伐小强之伐弱猶大魚之吞小魚也若虎之食豚也惡有其不得理文王遂興師伐徐殘之徐偃王將死曰吾賴于文德而不明武備好行仁義之道而不知詐人之心以至於此説苑指武淮南子人間徐偃王好行仁義陸地之朝者三十二國王孫厲謂楚王曰王不伐徐必反朝徐王曰偃王有道之君也好仁行義不可伐王孫厲曰臣聞之大之與小强之與弱也猶石之投卵虎之㗖豚又何疑焉且夫為文而不能達其德為武而不能任其力亂莫大焉楚王曰善乃舉兵而伐徐遂滅之韓子五蠧徐偃王處漢東地方五百里行仁義割地而朝者三十六國楚文王恐其害己也舉兵伐徐滅之楚文王有疾告大夫曰筦饒犯我以義違我以禮與處不安不見不思然吾有得焉必以吾時爵之申侯伯吾所欲者勸我為之吾所樂者先我行之與處則安不見則思然吾有喪焉必以吾時遣之大夫許諾乃爵筦饒以大夫贈申侯伯而行之申侯伯將至鄭王曰必戒之矣而為人也不仁而欲得人之政毋以之魯衛宋鄭不聽遂之鄭三年而得鄭國之政五月而鄭人殺之説苑君道吕覽長見荆文王曰莧譆人名數犯我以義違我以禮與處則不安曠之而不榖得焉不以吾身爵之後世有聖人將以非不榖于是爵之五大夫申侯伯善持養吾意吾所欲則先我為之與處則安曠之而不榖喪焉不以吾身逺之後世有聖人將以非不榖于是送而行之魯莊七年申侯伯如鄭阿鄭君之心先為其所欲三年而知鄭國之政也五月而鄭人殺之説苑君道杜敖文王十三年卒子熊囏立是為杜敖杜敖五年欲殺其弟熊惲惲奔隨與隨襲殺杜敖代立是為成王史楚世家成王楚成王元年初即位布德施惠結舊好于諸侯使人獻天子天子賜胙曰鎮爾南方夷越之亂無侵中國于是楚地千里十六年齊桓公以兵侵楚至陘山楚成王使將軍屈完以兵禦之與桓公盟桓公數以周之賦不入王室楚許之乃去十八年成王以兵北伐許許君肉袒謝乃釋之二十二年伐黄二十六年滅英三十三年宋襄公欲為盟㑹召楚楚王怒曰召我我將好徃襲辱之遂行至盂遂執辱宋公已而歸之三十四年鄭文公南朝楚楚成王北伐宋敗之泓射傷宋襄公襄公遂病瘡死三十五年晉公子重耳過楚成王以諸侯客禮饗而厚送之于秦三十九年魯僖公来請兵以伐齊楚使申侯將兵伐齊取榖置齊桓公子雍焉齊桓公七子皆奔楚楚盡以為上大夫滅䕫䕫不祀祝融鬻熊故也夏伐宋宋告急於晉晉師救宋成王罷歸將軍子玉請戰成王曰重耳出亡居外久卒得反國天之所開不可當子玉固以請乃與之少師而去晉果敗子玉于城濮成王怒誅子玉以止史楚世家説苑楚成王贊諸屬諸侯使魯君為僕魯君致大夫而謀曰我雖小亦周之建國也今成王以我為僕可乎大夫皆曰不可公儀休曰不可不聽楚王身死國亡君之臣乃君之有也為民君也魯君遂為僕按公儀休相魯穆公與楚成王異時人也此疑有誤楚成王讀書于殿上而輪扁在下作而問曰未審主君所讀何書也成王曰先聖之書輪扁曰此真先聖王之糟粕耳非美者也成王曰子何以言之輪扁曰以臣輪言之夫以規為圓以矩為方此其可付乎子孫者也若夫合三木而為一應乎心動乎體其不可得而傳者也以為所傳真糟粕耳故虞唐之法可得而改也其喻人心不可及矣詩云上天之載無聲無臭其孰能及之韓詩卷五少莊子作齊桓公事其文别今並存之别卷楚成王登臺臨後宫宫人皆傾觀子瞀直行不顧徐歩不變王曰顧吾以汝為夫人子瞀復不顧王曰顧吾又與女千金而封若父兄子瞀遂不顧于是王下臺而問曰不顧何也子瞀曰妾聞婦人以端正和顔為容今大王在臺上而妾顧則是失儀節也告以夫人之尊示以封爵之重而後顧是妾貪貴樂利以忘禮義也何以事王王曰善遂立以為夫人處期年王立公子商臣為太子後王又欲立公子職子瞀曰吾聞信不見疑吾懼禍亂之作也而言之于王王不應其以太子為非吾子疑吾譛之乎不如以死明之遂自殺君子曰非至仁孰能以身誡之列女傳楚令尹子文之族子文為令尹當在成王時有干法者廷理拘之聞其令尹之族也而釋之子文召廷理而責之曰凡立廷理者將以司犯王令而察觸國法也夫直士持法柔而不撓剛而不折今弃法而背令而釋犯法者是為理不端懐心不公也豈吾營私之意也何廷理之駮于法也吾在上位以率士民士民或怨而吾不能免之于法今吾族犯法甚明而使廷理因縁吾心而釋之是吾不公之心明著于國也執一國之柄而以私聞與吾生不以義不若吾死也遂致其族人于廷理曰不是刑也吾將死廷理懼遂刑其族人成王聞之不及履而至于子文之室曰寡人幼少置理失其人以違夫子之意于是黜廷理而尊子文使及内政國人聞之曰若令尹之公也吾黨何憂乎乃相與作歌曰子文之族犯國法程廷理釋之子文不聽恤顧怨萌方正公平説苑至公潛夫論楚鬭子文三為令尹而有饑色妻子凍餒朝不及夕太子商臣怨令尹子上也楚攻陳晉救之夾汦水而軍陽處父知商臣之怨子上也因謂子上曰少却吾渉而從子子上却因令晉軍曰楚遁矣使人告商臣曰子上受晉賂而去之商臣訴之成王成王遂殺之説苑權謀楚成王時有朱鷺合沓飛翔復有赤色者舊鼓吹音樂朱鷺曲是也藝文類聚思革子尹文子叔儋子相與為友聞楚成王賢俱徃見之至嶔巖之間卒逢飄風暴雨共伏於空栁之下衣寒糧乏自度不能俱活以革子為賢乃共以衣糧與之二子遂凍餓而死革子見楚王楚王知其賢陳酒設鐘鼓而樂之革子操琴而作别散之音楚王賜之百金以𦵏二子琴操四十六年初成王將以商臣為太子語令尹子上子上曰君之齒未也而又多内寵絀乃亂也楚國之舉常在少者且商臣蠭目而豺聲忍人也不可立也王不聽立之後又欲立子職而絀太子商臣商臣聞而未審也告其傅潘崇曰何以得其實崇曰饗王之寵姬江芉而勿敬也商臣從之江芉怒曰宜乎王之欲殺若而立職也商臣告潘崇曰信矣崇曰能事之乎曰不能能亡去乎曰不能能行大事乎曰能冬十月商臣以宫衛兵圍成王成王請食熊蹯而死不聽丁未成王自絞殺商臣代立是為穆王史楚世家穆王穆王立以其太子宫與潘崇使為太師掌國事三年滅江四年滅六蓼六蓼皋陶之後八年伐陳十二年卒子莊王侣立以上並史楚世家左傳侣作旅莊王莊王即位三年不出號令日夜為樂令國中曰有敢諌者死無赦伍舉入諌莊王左抱鄭姬右抱越女坐鐘鼓之間伍舉曰願有進隠曰有大鳥集於楚廷三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣居數月淫益甚大夫蘇從乃入諌王曰若不聞令乎對曰殺身以明君臣之願也于是乃罷淫樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大説是嵗滅庸史楚世家同吳越春秋畧按大鳥之喻諸家所記甚多人異語異今備録之以俟考訂楚莊王蒞政三年不治而好隠戲士慶問左右羣臣曰胡不入諌左右曰子其入矣士慶入再拜而進曰隠有大鳥來止南山之陽三年不蜚不鳴何也王曰子去矣寡人知之矣士慶曰願聞其説王曰此鳥不飛以長羽翼不鳴以觀羣臣之慝雖不飛飛必沖天雖不鳴鳴必驚人士慶稽首曰所願聞也王以士慶為令尹授之相印士慶喜出門顧左右曰吾王成王也中庶子聞之跪而泣曰臣尚衣冠御郎十三年矣前為豪矢而後為藩蔽王賜士慶相印而不賜臣臣死將有日矣王曰寡人居泥塗中子所與寡人言者内不及國家外不及諸侯如子者可富而不可貴也於是乃出其國寶璧玉以賜之曰忠行者士之行也言語者士之道路也道路不修治士無所行矣新序巻二楚又史吕覽重言楚莊王立三年不聽而好讔讔謬言也成公賈入諌王曰不榖禁諌者今子諌何故對曰臣非敢諌也願與君王讔也王曰胡不設不榖矣設施也何不設讔言于不榖也對曰有鳥止于南方之阜三年不動不飛不鳴是何鳥一作祥也王射之使王射何意也曰鳥止于南方之阜其三年不動將以定志意也其不飛將以長羽翼也其不鳴將以覽民則也是鳥雖無飛飛將沖天雖無鳴鳴將駭人賈出矣不榖知之矣明日朝所進者五人一作五十人下同所退者十人羣臣大恱楚國之衆相賀也韓子喻老楚莊王蒞政三年無令發無政為也右司馬御坐而與王隠曰有鳥止南方之阜三年不翅不飛不鳴嘿然無聲此為何名王曰三年不翅將以長羽翼不飛不鳴將以觀民則雖無飛飛必沖天雖無鳴鳴必驚人子釋之不榖知之矣處半年乃自聽政所廢者十所起者九誅大臣五舉處士六而國大治舉兵誅齊敗之徐州勝晉于河雍合諸侯于宋遂霸天下楚莊王立為君三年不聽朝乃令于國曰寡人惡為人臣而遽諌其君者今寡人有國家立社稷有諌則死無赦蘇從曰處君之髙爵食君之厚禄愛其死而不諌其君則非忠臣也乃入諌莊王立鼓鐘之間左伏楊姬右擁越姬左裯袵右朝服曰吾鼓鐘之不暇何諌之聽蘇從曰臣聞之好道者多資好樂者多迷好道者多糧好樂者多亡荆國亡無日矣死臣敢以告王王曰善左執蘇從手右抽隂刀刎鐘鼓之懸明日授蘇從為相説苑正諫楚莊王聽朝罷晏樊姬下堂而迎之曰何罷之晏也得無饑倦乎莊王曰今日聽忠賢之言不知饑倦也樊姬曰王之所謂忠賢者諸侯之客與中國之士與莊王曰則沈令尹也樊姬掩口而笑王曰姬之所笑何也姬曰妾侍于王尚湯沐執巾櫛振袵席十有一年矣然妾未嘗不遣人之梁鄭之間求美人而進之于王也與妾同列者十人賢于妾者二人妾豈不欲擅王之寵哉不敢私願蔽衆美欲王之多見則娛今沈令尹相楚數年矣未嘗見進賢而退不肖也又焉得為忠賢乎莊王旦朝以樊姬之言告沈令尹令尹避席而進孫叔敖叔敖治楚三年而楚國霸楚史援筆而書之于䇿曰楚之霸樊姬之力也韓詩巻二又楚史又列女傳莊王即位好狩獵樊姬諌不止乃不食禽獸之肉王改過勤于政事王嘗聽朝罷晏姬下殿迎曰何罷晏也得無饑倦乎王曰與賢者語不知饑倦也姬曰王之所謂賢者何也曰虞丘子也姬掩口而笑王曰姬之所笑何也曰虞丘子賢則賢矣未忠也妾執巾櫛十一年遣人至鄭衛求美人進于王今賢于妾者二人同列者七人妾豈不欲擅王之愛寵乎妾聞堂上兼女所以觀人能也妾不能以私蔽公妾聞虞丘子相楚十餘年所薦非子弟則族昆弟未聞進賢退不肖是蔽君而塞賢路妾之所笑不亦可乎王恱明日以姬言告虞丘子虞丘子避席不知所對于是避舍使人迎孫叔敖而進之王以為令尹治楚三年而莊王以伯楚史書曰莊王之伯樊姬之力也述異記楚莊王時宫人一旦而化為野蛾飛去楚令尹虞丘子復于莊王曰臣聞奉公守法可以得榮能淺行薄無望上位不名仁智無求顯榮才之所不著無當其處臣為令尹十年矣國不加治獄訟不息處士不升淫禍不討久踐髙位妨羣賢路尸禄素飱貪欲無厭臣之罪當稽于理臣竊選國俊下里之士曰孫叔敖秀羸一作才多能其性無欲君舉而授之政則國可使治而士民可使附莊王曰子輔寡人寡人得以長于中國令行于絶域遂伯諸侯非子如何虞丘子曰久固禄位者貪也不進賢達能者誣也不讓以位者不亷也不能三者不忠也為人臣不忠君王又何以為忠臣願固辭莊王從之賜虞丘子采地三百號曰國老以孫叔敖為令尹少焉虞丘子家千法孫叔敖執而戮之虞丘子喜入見于王曰臣言孫叔敖果可使持國政奉國法而不黨施刑戮而不骫可謂公平莊王曰夫子之賜也説苑至公楚又史孫叔敖沈尹莖相與友叔敖遊于郢三年聲問不知修行不聞沈尹莖謂叔敖曰説義以聽方術信行能令人主上至于王下至于伯我不若子也耦世接俗説義調均以適主心子不如我也子何以不歸耕乎吾將為子遊沈尹莖遊于郢五年楚王欲以為令尹沈尹莖辭曰期思之鄙人有孫叔敖者聖人也王必用之臣不若也楚王于是使人以王輿迎叔敖以為令尹十二年而莊王伯此沈尹莖之力也吕覽贊能荀子非相篇楚之孫叔敖期思之鄙人也期思楚邑名突秃長左軒較之下而以楚霸淮南子孫叔敖恬卧而郢人無所害其鋒地志河南期思城在今汝寧府固始縣孫叔敖所産春秋弦子邑孫叔敖為嬰兒時出遊見兩頭蛇殺而埋之歸而泣母問其故叔敖對曰聞見兩頭蛇者死向者吾見之恐去母而死也其母曰蛇今安在曰恐他人又見殺而埋之矣其母曰吾聞有隂德者天必報之福汝不死也及長為楚令尹未治而國人信其仁新序巻一又見新書巻六孫叔敖决期思之水而灌雩婁之野莊王知其可以為令尹淮南子人間莊王誅里史孫叔敖制冠浣衣里史佞臣惡人死叔敖自知當見用故制冠浣衣山淮南子說史記循吏傳孫叔敖者楚之處士也虞丘相進之於楚莊王以自代也三月為楚相施教導民上下和合世俗盛美政緩禁止吏無姦邪盜賊不起秋冬則勸民山採春夏以水各得其所便民皆樂其生莊王以為幣輕更以小為大百姓不便皆去其業市令言之相曰市亂民莫安其處次行不定相曰如此幾何須乎市令曰三月頃相曰罷吾今令之復矣後五日朝相言于王曰前日更幣以為輕今市令來言曰市亂民莫安其處次行之不定臣請遂令復如故王許之下令三日而市復如故楚民俗好庳車王以為庳車不便馬欲下令使髙之相曰令數下民不知所從不可王必欲髙車臣請教閭里使髙其捆乗車者皆君子君子不能數下車王許之居半嵗民悉自髙其車此不教而民從其化近者視而效之逺者四面望而法之故三得相而不喜知其材自得之也三去相而不悔知非己之罪也説苑孫叔敖相楚三年不知軛在衡後務大者固忘小吕氏春秋荆莊王好周遊田獵馳騁弋射歡樂無遺盡傳其境内之勞與諸侯之憂于孫叔敖孫叔敖日夜不息不得以便生為故故使莊王功迹著乎竹帛傳乎後世韓非子孫叔敖相楚棧車牝馬糲餅菜羮枯魚之膳冬羔裘夏葛衣面有饑色則良大夫也其儉逼下孫叔敖為楚令尹一國吏民皆來賀有一老父衣麤衣冠白冠後來弔孫叔敖正衣冠而出見之謂老父曰楚王不知臣不肖使臣受吏民之垢人盡來賀子獨後來弔豈有説乎父曰有説身已貴而驕人者民去之位已髙而擅權者君惡之禄已厚而不知足者患處之孫叔敖再拜曰敬受命願聞餘教父曰位已髙而意益下官益大而心益小禄已厚而慎不敢取君謹守此三者足以治楚矣説苑敬慎繒丘之封人見楚相孫叔敖曰吾聞之也處官久者士妬之禄厚者民怨之位尊者君恨之今相國有此三者而不得罪楚之士民何也孫叔敖曰吾三相楚而心愈卑每益禄而施愈博位滋尊而禮愈恭是以不得罪于楚之士民也荀子堯問孫叔敖遇狐丘丈人狐丘丈人曰僕聞之有三利必有三患患一作怨子知之乎孫叔敖蹵然易容曰小子不敏何足以知之敢問何謂三利何謂三患狐丘丈人曰夫爵髙者人妬之官大者主惡之禄厚者怨歸之此之謂也孫叔敖曰不然吾爵益髙吾志益下吾官益大吾心益小吾禄益厚吾施益博可以免于患乎狐丘丈人曰善哉言乎堯舜其猶病諸韓詩卷七列又淮南子道應語稍畧又子説符語畧同地志孫叔敖為令尹築芍坡大興水利夀人至今德之叔敖相楚期年而楚國大治莊王以伯叔敖妻不衣帛馬不食粟嘗乗棧車牝馬披羖羊之裘從者曰車新則安馬肥則疾狐裘則温何不為也叔敖曰吾聞君子服美益恭小人服美益倨吾無德以堪之矣桓譚論國是篇肩吾問于孫叔敖曰子三為令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨柰何孫叔敖曰吾何以過人哉吾以其來不可卻也其去不可止也吾以為得失之非我也而無憂色而已矣我何以過人哉且不知其在彼乎其在我乎其在彼也亡乎我在我耶亡乎彼方將躊躇方將四顧何暇知乎人貴人賤哉莊子田子方楚莊王問于孫叔敖曰寡人未得所以為國是也孫叔敖曰國之有是衆非之所惡也臣恐王之不能定也王曰不定獨在君乎亦在臣乎孫叔敖曰國君驕士曰士非我無逌貴富士驕君曰國非士無逌安强人君或至失國而不悟士或至饑寒而不進君臣不合國是無逌定矣夏桀殷紂不定國是而以合其取舍者為是以不合其取舍者為非故致亡而不知莊王曰善哉願相國與諸侯士大夫共定國是寡人豈敢以𥚹國驕士民哉新序卷二杌又楚史檮莊王學書于沈尹華昭釐惡之王好制使中謝佐制者乗間謂王曰國人皆曰王乃沈尹華之弟子也王不恱因疏沈尹華大夫曰中謝小人也一言而使王不聞先王之道令昭釐得行其私不可不審也莊王于是罰中謝而黜昭釐楚史檮杌事此條一作楚威王見後楚莊王問詹何曰何隠者治國柰何對曰臣明于治身而不明于治國莊王曰寡人得奉宗廟社稷願學所以守之詹何對曰臣未聞身治而國亂者也又未聞身亂而國治者也故本在于身不敢對以末楚王曰善淮南子道應又列子說符吕覽執一詹何以獨繭絲為綸芒鍼為鈎荆篠為竿剖粒為餌引盈車之魚于百仞之淵汩流之中綸不絶鈎不伸竿不撓楚王聞而異之召問其故詹何曰臣聞先大夫之言蒲且子之弋也弱弓纎繳乗風振之連雙鶬于青雲之際用心專動手均也臣因其事放而學釣五年始盡其道當臣之臨河持竿心無雜慮唯魚之念投綸沈鈎手無輕重物莫能亂魚見臣之鈎餌猶沈埃聚沫吞之不疑所以能以弱制强以輕制重也大王治國誠能若此則天下可運于一握將亦奚事哉楚王曰善列子湯問韓子解老詹何坐弟子侍有牛鳴于門外弟子曰是黒牛而白題詹何曰然是黒牛也而白在其角使人視之果黒牛而以布裹其角楚莊王見天不見妖而地不出孽則禱于山川曰天其忘予與此能求過于天必不逆諌矣安不忘危故能終而成霸功焉説苑君道楚莊王使使齎金百斤聘北郭先生先生曰臣有箕箒之使願入計之即謂婦人曰楚欲以我為相今日相即結駟列騎食方丈于前如何婦人曰夫子以織屨為食食粥毚履無怵惕之憂者何哉與物無治也今如結駟列騎所安不過容膝食方丈于前所甘不過一肉以容膝之安一肉之味而殉楚國之憂其可乎于是遂不應聘與婦去之韓詩卷九又列女傳楚莊王欲伐陽夏師久而不罷羣臣欲諌而莫敢莊王獵于雲夢椒舉進諫曰王所以多得獸者馬也而王國亡王之馬豈可得哉莊王曰善不榖知詘强國之可以長諸侯也知得地之可以為富也而忘吾民之不用也明日飲諸大夫酒以椒舉為上客罷陽夏之師説苑正諫六年伐宋獲五百乗史楚世家八年伐陸渾戎遂至洛觀兵于周郊周定王使王孫滿勞楚王楚王問鼎大小輕重對曰在德不在鼎莊王曰子無阻九鼎楚國折鉤之喙足以為九鼎王孫滿曰嗚乎君王其忘之乎昔虞夏之盛逺方皆至貢金九牧鑄鼎象物百物而為之備使民知神姦桀有亂德鼎遷於殷載祀六百殷紂暴虐鼎遷于周德之休明雖小必重其姦回昏亂雖大必輕昔成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也楚王乃歸史楚世家太繹史云折鉤之語恐是史公所增九年相若敖氏人或讒之王恐誅反攻王王擊滅其族十三年滅舒以上史楚世家楚莊王獵于雲夢射科雉科雉一作隨兕得之申公子倍倍一作培攻而奪之王將殺之大夫諌曰子倍自好也爭王雉必有説王姑察之不出三月子倍病而死邲之戰楚大勝晉歸而賞功申公子倍之弟進請賞于王曰人之有功也賞于車下王曰奚謂也對曰臣之兄讀故記曰射科雉者不出三月必死臣之兄爭而得之故夭死也王命發故府而視之于記果有焉乃厚賞之説苑立節畧又楚史檮杌同吕氏春秋荆莊哀王獵于雲夢射隨兕中之申公子培刦王而奪之王曰何其暴而不敬也命吏誅之左右大夫皆進諫曰子培賢者也又為王百倍之臣此必有故願察之也不出三月子培疾而死荆興師戰于兩棠大勝晉歸而賞有功者申公子培之弟進請賞于軍旅曰臣兄之有功也于車下王曰何謂也對曰臣之兄犯暴不敬之名觸死亡之罪于王之側其愚心將以忠于君王之身而持千嵗之夀也臣之兄嘗讀故記曰殺隨兕者不出三月是以臣之兄驚懼而爭之故伏其罪而死王令人發平府而視之于故記果有乃厚賞之楚莊王好獵大夫諫曰晉楚敵國也楚不謀晉晉必謀楚今王無乃耽于樂乎王曰吾獵將以求士也其榛藂刺虎豹者吾是以知其勇也其攫犀搏兕者吾是以知其勁有力也罷田而分所得吾是以知其仁也因是道也而得三士焉楚國以安説苑君道辭又楚史檮杌其文全同淮南子楚莊王裾衣博袍令行乎天下遂霸諸侯楚廷有神白猿楚之善射者莫之能中楚王自射之搏矢而熙使養由基射之養由基矯弓操矢而徃未之發猿擁柱而號矣發之則猿應矢而下王大恱楚史檮杌又吕覽博志基幽通記曰養由睇而猿號養由基射虎中石矢乃飲羽誠乎虎也吕覽精通見論衡養由基寢石以為兕也射之矢飲羽荆莊王命養由基射蜻蛉王曰吾欲得之養由基援弓而射之拂左翼王大喜列子養由基射楊葉去葉百歩百發百中人皆曰善有一人曰可教矣由基怒曰子必能教我曰非能教子支左屈右也夫百歩穿楊而不善息少焉氣衰力喪弓撥矢鉤一發不中百發盡息史周本紀楚雨雪莊王披裘當户曰我猶寒彼百姓賓客甚矣乃使巡國中求百姓賓客之無居宿絶糧者賑之國人大恱尸子淮南子主術訓楚莊王好觟冠楚國倣之觟一作獬楚人有獻魚楚王莊王也者曰今日獲魚食之不盡賣之不售棄之又惜故來獻也左右曰鄙哉辭也王曰子不知漁者仁人也盖聞倉有餘粟者國有餓民後宫多幽女者下民多曠夫餘衍之蓄聚于府庫者境内多貧困之民皆失人君之道故庖有肥魚廐有肥馬民有餓色是以亡國之君藏于府庫寡人聞之久矣未能行也漁者知之其以此諭寡人也且今行之矣于是遣使恤鰥寡存孤獨出倉粟發幣帛而賑不足罷去後宫不御者出以妻鰥夫楚民大恱鄰國歸之新序莊王謀事而當羣臣莫逮退朝而有憂色申公巫臣進問曰王朝而有憂色何也莊王曰不榖謀事而當羣臣莫能逮是以憂也其在中蘬之言曰中蘬與仲虺同湯左相也諸侯自為得師者王得友者霸得疑者存自為謀而莫己若者亡今以不榖之不肖而羣臣莫吾逮吾國其幾于亡乎是以憂也荀子堯問楚莊王之時有所愛馬衣以文繡置之華屋之下席以露牀啗以棗脯馬病肥死使羣臣喪之欲以棺槨大夫禮𦵏之左右爭之以為不可王下令曰有敢以馬諫者罪至死優孟聞之優孟者楚之樂人長八尺多辯常以談笑諷諫索隠曰優者倡優也孟者優之字也入殿間仰天大哭王驚而問其故優孟曰馬者王之所愛也以楚國堂堂之大何求不得而以大夫禮𦵏之薄請以人君禮𦵏之王曰何如對曰臣請以雕玉為棺文梓為槨楩楓豫章為題凑發甲卒為穿壙老弱負土齊趙陪位于前韓魏翼衛其後廟食太牢奉以萬户之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎為之奈何優孟曰請為大王六畜𦵏之以壠竈為椁銅厯為棺齎以薑棗薦以木蘭祭以粳稻衣以火光𦵏之于人腹腸于是王乃使以馬屬太官無令天下久聞也史滑稽列傳令尹子佩請飲莊王莊王許諾子佩具王不徃子佩疏揖北面立于殿下疏徒跣揖舉手也曰昔者君王許之今不果徃意者臣有罪乎莊王曰吾聞子具于强臺强臺者南望料山以臨方皇水名左江而右淮其樂忘死若吾薄德之人不可以當此樂也恐留而不能反淮南子道德又楚史檮杌晉人伐楚見左宣九年當楚莊王十四年三舍不止大夫曰請擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也如之何其辱諸大夫也大夫曰先君之時晉不伐楚及臣之身而晉伐楚是臣之罪也請擊之莊王俛泣而起拜諸大夫晉人聞之曰君臣爭以過為在己且君下其臣猶如此所謂上下一心三軍同力未可攻也乃夜還師孔子聞之曰楚莊王覇有其方矣下士以一言而敵國還師以安社稷以定民人其於覇也不亦宜乎新序韓非子楚莊王欲伐越杜子諫曰王之伐越何也曰政亂兵弱杜子曰臣患之智如目也能見百歩之外而不能自見其睫王之兵自敗于秦晉喪地數百里此兵之弱也莊蹻為盜于境内而吏不能禁此政之亂也王之弱亂非越之下也而欲伐越此智之如目王乃止故知之難不在見人在自見故曰自見之謂明按莊王喪地于秦晉其事未聞楚莊王欲伐陳使人視之使者曰陳不可伐也莊王曰何故對曰其城郭髙溝壑深蓄積多其國寧也王曰陳可伐也夫陳小國也而蓄積多蓄積多則賦歛重賦歛重則民怨上矣城郭髙溝壑深則民力罷矣興兵伐之遂取陳説苑權謀楚又吕覽似順又史檮杌楚莊王伐陳吳救之雨十日十夜晴左史倚相曰吳必夜至甲列壘壊彼必薄我何不行列鼓出待之吳師至楚見成陳而還左史倚相曰追之吳行六十里而無功王罷卒寢果擊之大破吳師説苑指武杌又楚史檮韓子説林下楚伐陳吳救之軍間三十里雨十日夜星左史倚相謂子期曰雨十日甲輯而兵聚吳人必至不如備之乃為陳陳未成也而吳人至見楚陳而反左史曰吳反復六十里其君子必休小人必食我行三十里擊之必可敗也乃從之遂破吳軍繹史云莊王時陳國道茀事廢淫于夏南此云城髙積多非其時也至左史倚相尤非莊王之臣二事俱舛誤姑存其說楚有善相人者所言無遺䇿聞于國中莊王召見而問焉對曰臣非能相人也能相人之友者也觀布衣者其友皆孝敬篤敬畏令如此者家必日益而身日安此所謂吉人者也觀事君者其友皆誠信有行好善如此者措事日益官職日進此所謂吉臣者也人主朝臣多賢左右多忠主有失敗皆交爭正諫如此者國日安主日尊名聲日顯此所謂吉主者也臣非能相人也能觀友者也王曰善乃招聘四方之士以成霸功韓詩卷九吕覽貴當又新序巻五楚史檮杌楚莊王賜羣臣酒日暮酒酣燭滅有人引美人之衣者美人援絶其冠纓告王曰今者燭滅有引妾衣者妾援得其冠纓持之趣火來上視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人之節而辱士乎乃命左右曰今日與寡人飲不絶冠纓者不懽羣臣百有餘人皆絶去其冠纓而上火卒盡懽而罷居三年晉與楚戰有一臣常在前五合五奮首却敵卒得勝之莊王怪而問曰寡人德薄又未嘗異子子何故出死不疑如是對曰臣當死徃者醉失禮王隠忍不加誅也臣終不敢以䕃蔽之德而不顯報王也常願肝膽塗地用頸血湔敵久矣臣乃夜絶纓者也遂敗晉軍楚得以强説苑復恩巻又楚史又韓詩七畧同美人作王后楚莊王築層臺延石千重延壤百里士有反三月之糧者大臣諌者七十二人皆死矣有諸御已者違楚百里而耕謂其耦曰吾將入見于王其耦曰以身乎吾聞之説人主者皆閒暇之人也然且至而死矣今子特草茅之人耳諸御己曰若與子同耕則比力也至于説人主不與子比智矣委其耕而入見莊王莊王謂之曰諸御己來汝將諫耶諸御己曰君有義之用有法之行且已聞之土負水者平木負繩者正君受諌者聖君築層臺延石千重延壤百里民之爨咎血成于通塗然且未敢諫也己何敢諫乎顧臣愚竊聞昔者虞不用宫之竒而晉并之陳不用子家羈而楚并之曹不用僖負羈而宋并之萊不用子猛而齊并之吳不用子胥而越并之秦不用蹇叔之言而秦國危桀殺闗龍逢而湯得之紂殺王子比干而武王得之宣王殺杜伯而周室卑此三天子六諸侯皆不能尊賢用辯士之言故身死而國亡遂趨而出楚王遽追之曰己子反矣吾將用子之諫先日説寡人者其説也不足以動寡人之心又危一作色加諸寡人故皆至而死今子之説足以動寡人之心又不危加諸寡人故吾將用子之諫明日令曰有能入諫者吾將與為兄弟遂解層臺而罷民楚人歌之曰薪乎菜乎無諸御己訖無子乎菜乎薪乎無諸御己訖無人乎説苑正諫亦又楚史此繹史云曹陳吳之亡俱在後諸御己之説平平耳事非實姑存其說以廣異聞可也楚莊王將興師伐晉告士大夫曰敢諫者死無赦孫叔敖曰臣聞畏鞭箠之言而不敢諫其父非孝子也懼斧鉞之誅而不敢諫其君非忠臣也于是遂進諫曰臣園中有榆其上有蟬蟬方奮翼悲鳴欲飲清露不知螳螂之在後曲其頸欲攫而食之也螳螂方欲食蟬而不知黄雀在後舉其頸欲啄而食之也黄雀方欲食螳螂不知童子挾彈丸在下迎而欲彈之童子方欲彈黄雀不知前有深坑後有窟也此皆言前之利而不顧後害者也非獨昆蟲衆庶若此也人主亦然今君貪彼之土而勤其士卒所謂知前之利而不顧後害者也臣敢愛死而不以告哉王遂止不伐晉而士卒以寧韓詩巻十此又楚史語屡見之矣大抵相襲非實楚莊王欲伐晉使豚尹觀焉反曰不可伐也其憂在上其樂在下且賢臣在焉曰沈駒明年又使豚尹觀反曰可矣初之賢人死矣諂諛多在君之廬者其君好樂而無禮其下危處以怨上上下離心興師伐之其民必先反莊王從之果如其説説苑奉使尹又楚史豚尹作豚十六年伐陳殺夏徵舒徴舒弑其君故誅之也已破陳即縣之羣臣皆賀申叔時使齊來不賀王問對曰鄙語曰牽牛徑人田田主取其牛徑者則不直矣取之牛不亦甚乎且王以陳之亂而率諸侯伐之以義伐之而貪其縣亦何以復令于天下莊王乃復陳國後史楚世家十七年春楚莊王圍鄭三月克之入自皇門鄭伯肉袒牽羊以逆曰孤不天不能事君君用懐怒以及敝邑孤之罪也敢不唯命是聽賓之南海若以臣妾賜諸侯亦唯命是聽若君不忘厲宣桓武不絶其社稷使改事君孤之願也非所敢望也敢布腹心楚羣臣曰王勿許莊王曰其君能下人必能信用其民庸可絶乎莊王自手旗左右麾軍引兵去三十里而舍遂許之平潘尫入盟子良出質夏六月晉救鄭與楚戰大敗晉師河上遂至衡雍而歸史楚世家楚莊王與晉戰勝之懼諸侯之畏己也乃築為五仞之臺臺成而觴諸侯諸侯請約莊王曰我薄德之人也諸侯請為觴乃仰而曰將將之臺窅窅其謀我言而不當諸侯伐之于是逺者來朝近者入賓説苑權謀新書昔者楚莊王即位自靜三年以講得失乃退僻邪而進中正能者任事而後在髙位内領國政辟草而施教百姓富民恒一路不失遺國無獄訟當是時也周室壊微天子失制宋鄭無道欺昧諸侯莊王圍宋伐鄭鄭伯肉袒牽羊奉簮而獻國莊王曰古之伐者亂則整之服則舍之非利之也遂弗受乃南與晉人戰于兩棠大克晉人㑹諸侯于漢陽申天子之辟禁而諸侯恱服莊王歸過申侯之邑申侯進飯日中而王不食申侯請罪曰臣齋而具食甚潔日中而不飯臣敢請罪莊王喟然嘆曰非子之罪也吾聞之曰其君賢君也而又有師者王其君中君也而有師者伯其君下君也而羣臣又莫若者亡今我下君也而羣臣又莫若不榖不榖恐亡自憂也吾聞之世不絶賢天下有賢而我獨不得若吾生者何以食為故莊王戰服大國義從諸侯戚然憂懼聖知在身而自錯不肖思得賢佐日中忘飯可謂明君矣説苑道畧同又楚史檮杌畧同楚莊王既勝晉于河雍之間河雍即邲莊王十七年歸而封孫叔敖叔敖辭而不受病疽將死謂其子曰吾則死矣王必封汝女必讓肥饒之地而受沙石之間有寑丘者其地确石而名醜寑丘今汝南固始地前有垢谷後有㽵荆人鬼好鬼也越人禨禨祥也人莫之利也孫叔敖死王果封其子以肥饒之地其子辭而不受請有寑之丘楚國之俗功臣二世而爵禄收惟孫叔敖獨存九世而祀不絶淮南子人間喻又楚史韓子老覽列子説符同吕異寳俱略孫叔敖病且死屬其子曰我死汝必貧困若徃見優孟言我孫叔敖之子也居數年其子窮困負薪逢優孟與言曰我孫叔敖之子也父且死時屬我貧困徃見優孟叔敖知優孟之賢嘗善之優孟曰若無逺有所之即為孫叔敖衣冠扺掌談語嵗餘像孫叔敖楚王左右不能别也莊王置酒優孟前為夀莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日後優孟復來王曰婦言謂何孟曰婦言慎無為楚相不足為也如孫叔敖之為楚相盡忠為亷以治楚楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺因歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大罪身死而家滅貪吏安可為也念為亷吏奉法守職竟死不敢為非亷吏安可為也廣文選載孫叔敖古碑優孟歌與史記小異其歌曰貪吏不可為而可為亷吏可為而不可為貪吏不可為當時有汚名而可為者子孫以成家亷吏而可為當時有清名而不可為者子孫困窮被褐以賣薪貪吏常苦富亷吏常苦貧獨不見楚相孫叔敖亷潔不受錢此歌之有韻語者楚相孫叔敖持亷至死方今妻子窮困負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封之寢丘四百户以奉其祀後十世不絶史滑稽傳孫叔敖碑楚相孫君諱饒字叔敖本是縣人也君受純靈之精懐絶世之材有大賢次聖之質少見枝首虵對其母泣吾將死母問其故曰吾聞見枝首虵者死今日見之母曰若柰之何吾殺通行數十歩念獨吾死可恐復令他人見之死為因埋掩其荆刑作形母曰若無憂焉其隂德𤣥善遂為父母九族所異及其為相布政以道考天象之度敬授民時聚同藏于山殖物于藪宣導川谷波陂通障源湶泉同溉灌沃澤堤防湖浦以為池沼鍾天地之美收九􅀢之利以慇殷同潤國家家富人喜優噡瞻同樂業式序在朝野無螟􅀈􅀈豐年蕃庶人有曽閔貞孝之行四民美好從容中節髙梱改幣一朝而化其憂國忘私乗馬三秊不别牝牡繼髙陽重黎五伍通舉子文之統其忠信亷勇禮樂文章軌儀同制其富國充民明天時盡地力霆堅禹稷不能踰也專國寵權而不榮華一旦可得百金至于没齒而無分銖之蓄破玉玦不以寶財遺子孫終始若失去不善如絶絃辟患害于無刑形通徹節髙義敦良竒介自曹臧孤竹吳札子罕之倫不能驂也生于季末仕于靈王立溷濁而澄清處幽暗而昭明其遺武餘典恨不與戲皇帝代同世世為列姃姬同國在朝廷其意常墨墨若冠章甫而坐塗炭也病其臨卒將無棺槨令其子曰優孟曽許千金貸吾孟故楚之樂長與相君相善雖言千金實不貸也卒後數季莊王置酒以為歡優孟乃言孫君相楚之功即慨慷高歌曲曰貪吏而可為而不可為亷吏而可為而不可為貪吏而不可為者當時有汚名而可為者子孫以家成亷吏而可為者當時有清名而不可為者子孫困窮披褐而負薪貪吏常苦富亷吏常苦貧獨不見楚相孫叔敖亷潔不受錢涕泣數行若投首王王心感動覺悟問孟孟具列對即來其子而加封焉子辭父有命如楚不忘亡臣社稷圖而欲有賞必于潘國下濕燒埆人所不貪遂封潘鄉熹是碑立于漢延三年失作者之姓名所載叔敖德業最詳而優孟一歌與史傳逈異或謂非此碑將不知叔敖之諱然傳所稱蒍艾獵又何等也楚莊王使文無畏于齊過于宋不先假道還反華元言于宋昭公曰徃不假道來不假道是以宋為鄙野也楚之㑹田也故鞭君之僕于孟諸徃日無畏撻宋公之僕請誅之乃殺文無畏于楊梁之隄莊王方削袂聞之曰嘻投袂而起履及諸庭劍及諸門車及之蒲疏之市逐舍于郊興師圍宋九月宋人易子而食之析骨而爨之宋公肉袒執犧委服告病曰大國若宥圖之惟命是聽莊王曰情矣宋公之言也乃為却四十里而舍于盧門之闔為成而歸吕覽行論異與左傳小楚莊王舉兵伐宋莊王二十年宋告急晉景公欲發兵救宋伯宗諌曰天方開楚未可伐也乃求壯士得霍人解揚字子虎徃命宋母降道過鄭鄭新與楚親乃執解揚而獻之楚楚王厚賜與約使反其言令宋趣降三要解揚乃許於是楚乗揚以樓車令呼宋使降遂倍楚約而致其晉君命曰晉方悉國兵以救宋宋雖急慎毋降楚晉兵今至矣楚莊王大怒將烹之解揚曰君能制命為義臣能承命為信受吾君命以出雖死無二王曰汝之許我已而倍之其信安在解揚曰死以許王欲以成吾君命臣不恨也顧謂楚君曰為人臣無忘盡忠而得死者楚王諸弟皆諌王赦之於是莊王卒赦解揚而歸之晉爵之為上卿故後世言霍虎説苑奉使檮與左傳畧同又楚史杌亦畧同楚莊王攻宋厨有臭肉樽有敗酒將軍子重諌曰今君厨肉臭而不可食罇酒敗而不可飲而三軍之士皆有饑色欲以勝敵不亦難乎莊王曰請有酒投之士有食饋之賢王孫子新書三十二年圍宋以殺楚使也圍宋五月城中食盡易子而食析骨而炊宋華元出告以情莊王曰君子哉遂罷兵去史楚世家楚莊王圍宋左宣十五年有七日之糧曰盡此而不剋將去而歸于是使司馬子反乗闥而窺宋宋使華元乗闥而應之子反曰子之國何若矣華元曰憊矣易子而食之析骸而爨之子反曰嘻甚矣憊雖然吾聞圍者之國䈤馬而秣之使肥者應客今何吾子之情也華元曰吾聞君子見人之困則矜之小人見人之困則幸之吾望見吾子似于君子是以情也子反曰諾子勉之矣吾軍有七日糧爾揖而去子反告莊王王曰若何子反曰憊矣易子而食之析骸而爨之莊王曰嘻甚矣憊今得此而歸爾子反曰不可吾已告之矣軍有七日糧爾莊王怒曰吾使子視之子曷為而告之子反曰區區之宋有不欺之臣何以楚國而無乎吾是以告之莊王曰雖然吾子今得此而歸爾子反曰王請處此臣請歸耳王曰子去吾孰與處此吾將從子而歸遂師而歸韓詩巻二公又楚史羊傳同韓詩外傳楚莊王寢疾卜之曰河為祟大夫曰請用牲莊王曰止古者聖王之祭不過望濉漳江漢楚之望也寡人雖不德河非所獲罪也遂不祭三日而疾有瘳孔子聞之曰楚莊王之伯其有方矣制節守職反身不貳其伯不亦宜乎詩曰嗟嗟保介莊王之謂也此左傳楚昭王事楚王莊王急召太子楚國之法車不至于茒門一作茅門天雨廷中有潦太子遂驅車至于茒門廷理曰車不得至茒門非法也太子曰王召急不得須無潦遂驅之廷理舉殳而擊其馬敗其駕太子入為王泣曰廷中多潦驅至茒門廷理曰非法也舉殳擊臣馬敗臣駕王必誅之王曰前有老主而不踰後有儲主而不屬是具吾守法之臣也乃益爵二級而開後門出太子勿復過韓子外儲右楚莊王之時太子車立于茅門之内少師慶逐之太子怒入謁王曰少師慶逐臣之車王曰舍之老君在前而不踰少君在後而不豫是國之寶臣也説苑至公楚莊王有茅門者法曰羣臣大夫諸公子入朝馬蹄蹂霤者斬其輈而戮其御太子入朝馬蹄蹂霤廷理斬其輈而戮其御太子大怒入為王泣曰為我誅廷理王曰法者所以敬宗廟尊社稷故能立法從令尊敬社稷者社稷之臣也安可以加誅夫犯法廢令不尊敬社稷是臣棄君下陵上也臣棄君則主失威下陵上則上位危社稷不守吾何以遺子太子乃還走避舎再拜請死説苑至公杌又楚史檮二十三年卒莊王卒子共王審立史楚世家春秋戰國異辭巻二十七
