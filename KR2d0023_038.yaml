body:
  text: 春秋戰國異辭巻三十五右春坊右諭德陳厚耀撰吳史呉世家吳太伯弟仲雍皆周太王之子而王季歴之兄也季歴而有聖子昌太王欲立季歴以及昌於是太伯仲雍二人乃奔荆蠻文身斷髪示不可用以避季歴季歴果立是為王季而昌為文王太伯之奔荆蠻自號勾吳荆蠻義之從而歸之千餘家立為吳太伯太伯卒無子弟仲雍立是為呉仲雍仲雍卒子季簡立季簡卒子叔達立叔達卒子周章立是時周武王克殷求太伯仲雍之後得周章周章已君吳因而封之乃封周章弟虞仲于周之北故夏墟是為虞仲列為諸矦周章卒子熊遂立熊遂卒子柯相立柯相卒子彊鳩夷立彊鳩夷卒子餘橋疑吾立餘橋疑吾卒子柯盧立柯盧卒子周繇立周繇卒子屈羽立屈羽卒子夷吾立夷吾卒子禽處立禽處卒子轉立轉卒子頗高立頗高卒子句卑立索隱曰譙周古史考轉作柯轉頗髙作頗夢句卑作畢軫是時晋獻公滅周北虞公以開晋伐虢也句卑卒子去齊立去齊卒子夀夢立夀夢立而吳始益大稱王自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在夷蠻十二世而晉㓕中國之虞中國之虞㓕二世而夷蠻之吳興大凡從太伯至夀夢十九世夀夢夀夢元年朝周適楚觀諸矦禮樂吳越春秋夀夢二年當魯成七年楚之亡大夫申公巫臣適吳教吳用兵乘車令其子為行人教吳射御導之伐楚楚荘王怒使子反将敗吳師二國從斯結仇於是吳始通中國而與諸矦為敵蠻夷屬楚者吳盡取之始大通於上國五年伐楚敗子反夀夢與魯成公㑹于鍾離深問周公禮樂成公悉為陳前王之禮樂因為詠歌三代之風夀夢曰孤在夷蠻徒以椎髻為俗豈有斯之服哉因嘆而去曰於乎哉禮也十六年楚共王怨吳為巫臣伐之也乃舉兵伐吳至衡山而還十七年夀夢以巫臣子狐庸為相任以國政以上俱吳越春秋二十五年夀夢病將卒有子四人同母昆弟長曰諸樊次曰餘祭次曰餘昧次曰季札季札小而賢三兄皆愛之夀夢欲立之季札讓曰禮有舊制奈何廢前王之禮而行父子之私乎夀夢曰我欲𫝊國及札爾無忘寡人之言諸樊曰周之太王知西伯之聖廢長立少王之道興今欲授國于札臣請耕于野王曰昔周之德加于四海今汝于區區之國荆蠻之鄉奚能成天子之業且子不忘前人之言必授國以次及於季札諸樊曰敢不如命夀夢卒左襄十二年諸樊以適長攝行事當國政諸樊新序作遏説苑作謁越史記合説苑吳春秋諸樊世本諸樊徙吳吳王諸樊元年已除喪讓位季札曰昔前王未薨時嘗晨昧不安吾望其色也意在于季札又復三朝悲吟而命我曰吾知札賢欲廢長立少重發于口雖然我心已許之前王不忍行其私計以國付我我敢不從命乎今國者子之國也吾願達前王之義季札謝曰夫適長當國非前王之私乃宗廟社稷之制豈可變乎諸樊曰茍可施于國何先王之命有句太王改立季歴二伯来入荆蠻遂成為國前人誦之不絶于口子之所習也札復謝曰曹宣公之卒也諸矦與曹人不義曹君將立子臧子臧去之以成曹君君子曰能守莭矣君義嗣誰敢干君有國非吾節也札雖不才願附于子臧之義吳人固立季札季札棄其室而耕乃舍之諸樊乃為約曰請無與子而與弟弟兄迭為君而致諸季子季子賢吳則可以興皆曰諾乃兄弟相繼諸樊驕恣輕慢鬼神飲食必祝曰使吾早死令國及季子合史記吳越春秋秋吳伐楚楚敗我師四年晉平公初立十三年王諸樊卒有命授弟餘祭欲傳以次必致國於季札而止以稱先王夀夢之意且嘉季札之義兄弟皆欲致國令以漸至焉季札封於延陵故號曰延陵季子史呉世家陵按越絶書毗陵故為延吳季子所居餘祭餘祭二年楚靈王㑹諸矦伐吳圍朱方誅慶封史在餘祭之十年慶封數為吳伺察故晉楚伐之吳王餘祭怒即舉兵伐楚取二邑而去三年楚怨吳為慶封故伐之乃伐吳至乾谿吳擊之楚師敗走以上吳越春秋吳王餘三年齊相慶封有罪自齊来犇吳吳予慶封以朱方之縣以為奉邑以女妻之富於在齊史吳世家四年吳使季札聘於魯請觀周樂為歌周南召南曰美哉始基之矣猶未也歌弼鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎歌王曰美哉思而不懼其周之東乎歌鄭曰其細已甚民不堪也是其先亡乎歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也歌豳曰美哉蕩蕩乎樂而不滛其周公之東乎歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎歌魏曰美哉渢渢乎大而婉儉而易行以徳輔此則盟主也歌唐曰思深哉其有陶唐氏之遺風乎不然何憂之逺也非令德之後誰能若是歌陳曰國無主其能久乎自鄶以下無譏焉歌小雅曰美哉思而不貳怨而不言其周德之衰乎猶有先王之遺民也歌大雅曰廣哉熈熈乎曲而有直體其文王之德乎歌頌曰至矣哉直而不倨曲而不詘近而不偪逺而不攜遷而不滛復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象箾南籥者曰美哉猶有憾見舞大武曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也猶有慙德聖人之難也見舞大夏曰美哉勤而不德非禹其誰能及之見舞招箾曰德至矣哉大矣如天之無不燾也如地之無不載也雖甚盛德無以加矣觀止矣若有他樂吾不敢觀去魯遂使齊説晏平仲曰子速納邑與政無邑與政乃免於難齊國之政将有所歸未得所歸難未息也故晏子因陳桓子以納政與邑是以免於欒高之難去齊使於鄭見子産如舊交謂子産曰鄭之執政侈難将至矣政必及子子為政慎以禮不然鄭國將敗去鄭適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子其未有患也自衛如晉将舍於宿聞鐘聲曰異哉吾聞之辯而不德必加於戮夫子獲罪於君以在此懼猶不足而又可以畔乎夫子之在此猶燕之巢于幕也居在殯而可以樂乎遂去之文子聞之終身不聼琴瑟適晋説趙文子韓宣子魏獻子曰晉國其萃於三家乎将去謂叔向曰吾子勉之君侈而多良大夫皆富政将在三家吾子直必思自免於難史吳世家十年楚靈王㑹諸侯而以伐吳之朱方以誅齊慶封吳亦攻楚取三邑而去十一年楚伐吳至􅟔婁十二年楚復来伐次於乾谿楚師敗走史吳世家韓非子荆王楚靈王時事伐呉吳使沮衛蹶融犒於荆之師吳餘祭十一年事左傳昭公五年荆将軍曰縳之殺以釁鼓使問之曰女来卜乎答曰卜卜吉乎曰吉荆人曰今荆将以女釁鼓其何吉也答曰是故其所以吉也吳使下臣来也固視将軍将軍怒将深溝高壘将軍不怒殆将懈怠今也将軍殺臣則吳必警守矣且國之卜葢非為一臣卜夫殺一臣而存一國其不言吉何也且使死者無知則以臣釁鼓無益也死者有知也臣且於當戰之時臣使鼔不鳴荆人因不殺也說苑秦與楚轂兵秦王使人使楚楚王使人戯與言曰子来亦卜之乎對曰然卜之謂何對曰吉楚人笑曰噫甚矣子之國無良龜也王方殺子以釁鐘其為吉如何使者曰秦楚轂兵吾王使我先窺我死而不復還則吾王知警戒整齊兵以備楚是吾所謂吉者也且使死者而無知也又何釁於鐘死者而如有知也吾豈錯秦相楚哉我将使楚之鐘鼔無聲鐘鼓而無聲則将無以整齊其士卒而理君軍夫殺人之使而絶人之好啟人之謀非古之通議也子大夫試為孰計之使者以報楚王楚王赦之此之謂造命按此即前事之舛十七年王餘祭卒弟餘昩立史吴世家餘昩四年王餘昩卒當魯昭十五年欲授弟季札季札讓逃去于是吳人曰先王有命兄卒弟代立必致季子季子今逃位則王餘昩後立今卒其子當代乃立王餘昩之子僚為王公羊傳以僚為夀夢庶長子公子光者王諸樊之子也常以為吾父兄弟四人次當傳之季子季子即不受國光父先立即不傳季子則光真適嗣當立故隂納謀臣賢士欲以襲王僚史吳世家餘昩立四年卒餘昩説苑作夷昩欲授位季札季札讓逃去曰吾不受位明矣昔前君有命已附子臧之義潔身清行仰髙履尚惟仁是處富貴之於我如秋風之過耳遂逃歸延陵吳人立餘昩子州于號為吳王僚吳越春秋説苑至公篇同新序略夷昩死次及季子季子時行不在庶兄僚曰我亦兄也史以僚為夷昩子乃自立為吳王季子使還復事如故遏之子王子光不悦曰以吾父之意則國當歸季子以繼嗣之法則我嫡也當代為君僚何為者王僚王僚二年使公子光伐楚以報前誅慶封也吳師敗而亡舟光懼因揜復得王舟而還光欲謀殺王僚未有所與議隂求賢乃命善相者為吳市吏五年楚之亡臣伍子胥来奔吳公子光客之以上吳越春秋季札之初使北過徐君徐君好季札劔口弗敢言季札心知之為使上國未獻還至徐徐君已死于是乃觧其寳劔繫之徐君冡樹而去從者曰徐君已死尚誰予乎季子曰不然始吾心已許之豈以死倍吾心哉史吳世家新序巻七季札聘晋帯寳劔以過徐君徐君觀劔不言而色欲之季子為有上國之使未獻也然已心許之矣致使於晉及反則徐君死于楚於是脱劔致之嗣君從者止之曰此吳國之寳非所以贈也季子曰吾非贈之也先日吾来徐君觀吾劔不言而其色欲之吾為有上國之使未獻也雖然吾心許之矣今死而不進是欺吾心也愛劔偽心㢘者不為也遂脱劔致之嗣君嗣君曰先君無命孤不敢受劔於是季子以劔𢃄徐君墓樹而去徐人歌之曰延陵季子兮不㤀故脱千金之劔兮帯丘墓地志山東東阿張秋城南相傳季札吊徐君處以括地志考之在泗洲徐城者為是然墓旁挂劔草亦竒跡也草形似劔可療心疾地志常州府季札墓在江隂申浦孔子題其碑曰嗚呼有吳延陵季子之墓越絶書毗陵上湖中冡者延陵季子冡也古名延陵墟延陵季子適齊于其反也其長子死葬于嬴博之間孔子曰延陵季子吳之習于禮者也徃而觀其葬焉其坎深不至于泉其歛以時服既葬而封廣輪揜坎其髙可隱也既封左袒右還其封且號者三曰骨肉歸復于土命也若魂氣則無不之也而遂行孔子曰延陵季子于禮也其合矣乎檀弓下吳延陵季子遊於齊見遺金呼牧者取之牧者曰子居之髙視之下貌之君子而言之野也吾有君不君有友不友當暑衣裘君謂取金者乎延陵子知其為賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去延陵季子立而望之不見乃止韓詩巻十髙士傳披裘公者吳人也延陵季子出遊見道中有遺金顧披裘公曰取彼金公投鎌瞋目拂手而言曰何子自處之髙而視人之卑五月披裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士何足語姓名也伍子胥欲見吳王而不得吳王王僚也客有言之於王子光者見之而惡其貌不聼其説而辭之客請之王子光王子光曰其貌適吾所甚惡也客以聞伍子胥伍子胥曰此易故也願令王子居於堂上重帷而見其衣若手請因説之王子許伍子胥説之半王子光舉帷摶其手而與之坐説畢王子光大悦伍子胥以為有吳國者必王子光也退而耕於野吕覧首時伍胥未至吳而疾中道乞食張勃曰子胥乞食處在丹陽溧陽縣至於吳吳王僚方用事公子光為將伍胥乃因公子光以求見吳王久之吳使公子光伐楚㧞其鍾離居巢而歸伍子胥説吳王僚曰楚可破也願復遣公子光公子光謂吳王曰彼伍子胥父兄為戮於楚而勸王伐楚者欲以自報其仇耳伐楚未可破也伍胥知公子光有内志欲殺王而自立未可説以外事乃進專諸于公子光退而與太子建之子勝耕于野史伍子胥傳越絶書子胥至吳徒跣被髪乞于吳市三日市正疑之而道于闔廬曰市中有非常人徒跣被髪乞于吳市三日矣闔廬曰吾聞荆王殺其臣伍子奢而非其罪其子子胥勇且智必經諸矦之邦可以報其父仇者王即使召子胥入吳王下階迎而唁數之曰吾知子非恒人也何素窮如此子胥跪而垂泣曰胥父無罪而平王殺之并及其子尚胥遯逃出走唯大王可以歸骸骨者惟大王哀之吳王曰諾上殿與語三日三夜語無復者王乃號令邦中無貴賤長少有不聼子胥之教者猶不聼寡人也罪死不赦子胥居吳三年大得吳衆吳王将為之報仇子胥曰不可臣聞諸矦不為匹夫興師于是止越絶書紀策闔廬始得子胥之時甘心賢之以為上客曰聖人前知乎千嵗後覩萬世深問其國世得無衰極子胥唯唯不對王曰子其明之子胥曰對而不明恐獲其咎王曰願一言之以試直士子胥曰難乎言哉邦其不昌王其圖之存無忘傾安無忘亡臣始入邦伏見衰亡之證當覇吳厄㑹之際後王復空王曰何以言之子胥曰後必将有失道王食禽肉坐而待死佞諛之臣将至不久安危之兆各有明紀虹蜺牽牛其異女黄氣在上青黒于下太嵗八㑹壬子數九王相之氣自十一倍死由無氣如法而止太子無氣其異三世日月光明歴南斗吳越為隣同俗并土西州大江東絶大海两邦同城相亞門户憂在于斯必将為咎越有神山難與為隣願王定之毋洩臣言吳越春秋子胥之吳乃被髪佯狂跣足塗靣行乞于市市人觀之罔有識者翌日吳市吏善相者見之曰吾之相人多矣未嘗見斯人也非異國之亡臣乎乃白吳王僚具陳其状王僚曰與之俱入公子光聞之私喜曰吾聞楚殺忠臣伍奢其子伍胥勇而且智彼必復父之仇来入于吳隂欲飬之市吏與子胥俱入見王王僚怪其状偉身長一丈腰十圍眉間一尺王僚與語三日辭無復者王曰賢人也子胥知王好之每入語語有勇壮之氣稍道其仇有切切之色王僚知之欲為興師報仇公子光謀殺王僚恐子胥害其謀因讒伍胥之謀伐楚者非為吳也但欲自復其私耳王勿用之子胥知光欲害王僚乃曰彼有内志未可説以外事入見王僚曰臣聞諸矦不為匹夫興師王僚曰何以言之子胥曰諸矦專政非以義救急不興師今大王踐國制威為匹夫興兵其義非也臣固不敢如王之命吳王乃止子胥退耕于野求勇士薦之公子光欲以自媚乃得勇士專諸吳越春秋專諸者堂邑人也伍胥之亡楚如吳時遇之於途專諸方與人鬭将敵其怒有萬人之氣甚不可當其妻一呼即還子胥怪而問其状夫子何怒盛也聞一女子之聲而折道寜有説乎專諸曰子視吾之儀寜類愚者也何言之鄙也夫屈一人之下必伸萬人之上子胥因相其貌碓顙而深目虎膺而熊背知其勇士隂結之以為用遭公子光之有謀也而進之光既得專諸禮待之光曰天以夫子輔孤之失根也專諸曰前王餘昩卒僚立自其分也公子何因而欲害之乎光曰前君有子四人長則光之父也季曰札最賢將卒𫝊付適長以及季札念季札為使亡在諸矦未還宜立者適長也適長之後即光之身也今僚何以當代立乎吾力弱無助非用有力不能安吾志吾雖代立季子東還不吾廢也專諸曰何不使近臣從容言于王側陳前王之命以諷其意令知國之所歸何須私備劍士以損先王之德光曰僚素貪而恃力知進之利不知退讓吾故求同憂之士欲與之并力惟夫子詮斯義也專諸曰君言甚露何意也光曰否也此社稷之言也惟委命於子矣專諸曰願公子命之公子光曰時未可也專諸曰凡欲殺人必先求其所好吳王何好光曰好味專諸曰何味是甘光曰好嗜魚之炙專諸乃去從太湖學炙魚三月得其味安坐待公子命之八年吳使公子光伐楚敗楚師迎楚故太子建母於居巢以歸因北伐敗陳蔡之師八年僚遣公子伐楚大敗楚師因迎故太子建母于鄭鄭君送建母珠玉簮珥以觧殺建之過吳越春秋與左氏稍異九年公子光伐楚抜居巢鍾離史吳世家初楚邉邑卑梁氏之處女與吳邉邑之女争桑二女家怒相㓕两國邉邑長聞之怒而相攻㓕吳之邉邑吳王怒故遂伐楚取两都而去史吳世家伍子胥之初犇吳説吳王僚以伐楚之利公子光曰胥之父兄為僇於楚欲自報其仇耳未見其利於是伍員知光有他志乃求勇士專諸見之光光喜乃客伍子胥子胥退而耕於野以待專諸之事史吳世家十二年冬楚平王卒伍子胥謂白公勝曰平王卒吾志不悉矣然楚國有子吾何憂矣白公黙然不對伍子胥坐泣于室吳越春秋十三年春昭二十七年吳因楚喪伐之使其二弟公子蓋餘燭庸以兵圍楚之六灊使季札于晉以觀諸矦之變楚發兵絶吳兵後吳兵不得還于是吳公子光曰此時不可失也告專諸曰不索何獲我真王嗣當立吾欲求之季子雖至不吾廢也專諸曰王僚可殺也母老子弱專諸託其母子于光也而两弟将兵攻楚楚絶其路方今吳外困于楚而内空無骨鯁之臣是無奈我何光頓首曰我身子之身也四月丙子光伏甲士于窟室中而具酒請王僚飲王僚使兵陳于道自王宫至光之家門階戸席皆王僚之親也人夹立侍皆持鈹酒既酣公子光佯為足疾入于窟室使專諸置七首于炙魚之腹中以進既至王前專諸擘魚手七首刺王僚僚立死左右殺專諸鈹交于匈公子光出其伏甲以攻王僚之徒盡滅之遂自立為王是為闔廬闔廬乃以專諸子為上卿季子至曰茍先君無廢祀人民無廢主社稷有奉乃吾君也吾敢誰怨乎哀死事生以待天命非我生亂立者從之先人之道也復命哭僚墓復位而待吳公子燭庸蓋餘二人將兵遇圍于楚者聞公子光弑王僚自立乃以其兵降楚楚封之于舒史吳世家及專諸傳别與左昭二十七年文小吳越春秋十三年春吳欲因楚葬而伐之使公子盖餘燭傭以兵圍楚使季札于晋以觀諸矦之變楚發兵絶吳後吳兵不得還于是公子光心動伍胥知光之見機也乃説光曰今吳王伐楚二弟将兵未知吉凶專諸之事于斯急矣時不再来不可失也于是公子見專諸曰今二弟伐楚季子未還當此之時不求何獲時不可失且光直王嗣也專諸曰僚可殺也母老子弱弟伐楚楚絶其後方今吳外困于楚内無骨鯁之臣是無如我何也四月公子光伏甲于窟室中具酒而請王僚僚白其母曰公子光為我具酒来請期無變悉乎母曰光心氣怏怏常有愧恨之色不可不慎王僚乃披棠銕之甲三重使兵衛陳于道自宫門至于光之門階席左右皆王僚之親戚使坐立侍皆操長㦸交軹酒酣公子光佯為足疾入窟室裹足使專諸置魚膓劔炙魚中進之吳地記僚好炙魚非專諸炙不食公子光潜以百金令專諸進魚置七首于炙魚中刺僚死既至王僚前專諸乃擘炙魚因推七首立㦸交軹倚專諸胷胷斷臆開匕首如故以刺王僚貫甲達背王僚既死左右共殺專諸衆士擾動公子光出其甲士以攻僚衆盡㓕之遂自立是為吳王闔閭也乃封專諸之子拜為客卿季札使還至吳光以位讓季札札曰茍前君無廢社稷以奉君也吾誰怨乎哀死待生以俟天命非我生亂立者從之是前人之道也説苑至公篇季子曰爾殺吾君吾受爾國則吾與爾為共簒也爾殺吾兄吾又殺汝則是昆弟父子相殺無巳時也卒去之延陵終身不入吳故曰延陵季子復命哭僚墓復位而待公子盖餘燭傭聞之以兵降楚楚封之于舒史記伍子胥傳吳王僚因楚喪使二公子將兵徃襲楚楚發兵絶吳兵之後不得歸吳國内空而公子光乃令專諸襲刺吳王僚而自立是為吳王闔廬闔廬既立得志乃召伍員以為行人而與謀國事前王僚所遣二公子将兵伐楚者道絶不得歸後聞闔廬弑王僚自立遂以其兵降楚楚封之於舒春秋戰國異辭巻三十五
