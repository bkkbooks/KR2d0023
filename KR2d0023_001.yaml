body:
  text: 春秋戰國異辭卷首上右春坊右諭徳陳厚耀撰春秋戰國通表上自平王元年東遷至秦始皇二十六年并六國共五百五十年周魯晉衞鄭齊秦宋楚陳蔡曹燕周東遷洛邑晉侯㑹衞侯鄭伯秦伯以師從王入于成周錫晉文侯仇命命衞侯和為公始命秦列為諸侯取岐豐之地鄭伯東取鄶虢十邑國之秦初立西畤祀白帝一載次年楚侵申及許乘王室之難也賜秦晉以邠岐之田竹書魯孝公卒子恵公弗湟立王錫司徒鄭伯命竹書以鄭伯掘突為司徒齊人滅祝竹書燕頃侯卒子哀侯立鄭人滅虢竹書秦襄公伐戎至岐卒于師子文公立居西垂宫宋戴公卒子武公司空立燕哀侯卒子鄭侯立鄭遷于溱洧竹書楚若敖卒竹書作楚子儀卒子霄敖立熊坎年一載次鄭殺其大夫關其思竹書秦文公東徙卜居汧渭之間營邑之蔡釐侯所事卒子共侯興立鄭武公取申侯女為夫人是為武姜秦遷于汧渭竹書蔡共侯卒子戴侯立曹恵公伯雉卒世家作恵伯兕子石甫立其弟武殺之代立是為繆公繆一作穆衞武公和卒子莊公揚立楚霄敖卒子蚡冐立熊眴鄭武公生太子寤生曹繆公卒子桓公終生立晉人滅韓竹書秦初作鄜畤用三牢陳平公燮卒子文公圉立取蔡女生子佗鄭武公生次子叔段秦初有史以紀事秦文公大敗戎師于岐來歸岐東之地竹書秦文公伐戎戎敗走收周餘民有之地至岐岐以東獻之周蔡戴侯卒子宣侯措一作考父立年表措父作楷論晉文侯殺王子余臣于攜竹書宗周宫室圯詩人作黍離秦作陳寳祠竹書秦初有三族之法晉文侯仇卒子昭侯伯立宋武公卒竹書載入平王二十三年子宣公力立晉昭侯封其叔父成師于曲沃竹書作封其弟成師陳文公卒子桓公鮑立鄭武公掘突卒太子寤生立是為莊公武公時武姜欲立叔叚公不聽鄭封其弟叔段于京一載鄭莊公元年衞公子州吁好兵楚蚡冐卒弟熊通弑蚡冐子而代立是為武王一載次年秦伐南山大梓豐大特徐廣曰今武都故道有怒特祠圖大牛從樹中出晉潘父弑其君昭侯而納曲沃桓叔不克晉人立昭侯子平是為孝侯晉人殺潘父竹書楚人侵申竹書衞莊公卒公子完立夫人莊姜無子立公子完是為桓公王人戍申竹書衞桓公黜其弟州吁州吁奔鄭與鄭叔叚友齊莊公購卒子僖公䘵甫立晉曲沃桓叔成師卒子鱓代是為莊伯春晉大雨雪竹書宋宣公卒命立其弟和舍其子與夷是為穆公燕鄭侯卒子穆侯立魯恵公使宰讓請郊廟之禮王使史角如魯諭止之竹書狄人伐翼至于晉郊竹書晉曲沃莊伯弑其君孝侯于翼時曲沃强于晉晉人逐之立孝侯之子郄是為鄂侯魯恵公卒長庶子息一作名息姑攝國行君事是為隠公晉無雲而雷竹書周魯晉衞鄭齊秦宋楚陳蔡曹燕邾魯隠公及邾莊公盟于姑蔑邾莊公即邾子克字儀父鄭叔段作亂奔共莊公遷其母武姜于城潁魯晉齊宋陳蔡鄭衞曹楚秦燕凡十二國春秋始此鄭莊公復迎其母武姜以歸鄭人伐衞春二月乙巳日有食之竹書作春秋乙巳己巳三月庚戌天王崩竹書王崩皆作王陟太子洩父蚤死立其子林是為桓王平王孫也鄭侵周取禾宋穆公卒使子馮出居鄭立兄子與夷是為殤公衞州吁收聚亡人以襲殺桓公而自立與宋陳蔡伐鄭石碏與陳共謀使右宰醜進食因殺州吁于濮而迎桓公弟晉于邢而立之是為宣公曲沃莊伯伐翼公子萬救之荀叔軫追至于家谷翼侯焚曲沃之禾而還竹書翼侯伐曲沃大㨗武公請成于翼至相而還竹書侯以鄂為翼侯與史記不同魯隠公觀魚於棠曲沃莊伯伐翼王使尹氏武氏助之鄂侯奔随晉鄂侯卒左氏鄂侯未卒次年復掃立曲沃叛王王命虢公伐曲沃而立哀侯子翼哀侯鄂侯之子名光秦太子卒賜諡為竫公立其長子為太子文公孫也衞及宋陳伐鄭至東門而還鄭復伐宋鄭莊公始朝王王不禮怒其取禾也冬京師饑周魯晉曲沃衛鄭齊秦宋楚陳蔡曹燕邾曲沃莊伯卒子稱代是為武公尚一軍竹書秦文公卒孫立是為寧一作靈公秦葬文公于西山滕侯卒滕始見其後或稱子鄭以祊與魯易許田蔡宣公考父卒公一作侯子桓侯封人立芮人乘京竹書荀人董人皆叛曲沃竹書秦寧公徙居平陽遣兵伐蕩社蕩音湯一作杜西戎之君號曰亳王葢成湯之𦙍其邑曰蕩社秦與亳戰亳王奔戎遂滅蕩社諸侯伐宋宋與衞人伐鄭魯弑其君隠公弟允一作軌立是為桓公滕侯薛侯朝于魯薛始見其後或稱伯鄭莊公伐許許莊公奔衞許始見鄭以璧如魯易許田燕穆侯卒子宣侯立宋華督殺其大夫孔父宋華督弑其君殤公迎穆公子馮于鄭而立之是為莊公年表即于此年紀元曲沃武公虜晉哀侯晉人立哀侯子小子為君是為小子侯竹書載入次年魯迎夫人于齊即文姜芮伯萬出奔魏萬之母逐萬竹書王師秦師圍魏取芮伯萬而東之竹書王率陳蔡衞虢伐鄭鄭射王中臂陳桓公卒蔡人為其弟佗殺五父及桓公太子免而立佗佗母蔡女故是為厲公與左傳稍異戎人逆芮伯萬于郊竹書晉曲沃滅荀以其地賜大夫原氏黯是為荀叔竹書北戎伐齊鄭使太子忽救齊楚伐随俾請王之號于王王不許曲沃武公誘召晉小子侯殺之竹書載入上年王命虢仲伐曲沃晉立哀侯弟緡為晉侯一載次年陳厲公生子完字敬仲後為田齊秦伐蕩氏取之楚復伐随與之盟楚始稱王秦寧公卒葬西山子出公立三父廢世子而立之杞武公卒立四十七年子靖公立周魯晉􅀢衞鄭齊秦宋楚陳蔡曹燕邾杞曹桓公卒子莊公夕姑立年表作射姑衞宣公殺其太子伋及公子壽鄭莊公卒子昭公忽立祭仲以宋要立其弟突是為厲公忽出奔衞陳厲公淫于蔡蔡人殺之立桓公子躍是為利公與左傳異利公五月卒仲弟林立是為莊公衞宣公卒子恵公朔立齊僖公同母弟夷仲年死其子曰公孫無知僖公愛之令其秩服奉養比太子諸侯伐鄭報宋故秦三父殺出公復立其兄故太子是為武公燕宣侯卒子桓公立世家桓公作桓侯徙臨易見史記注齊僖公卒太子諸兒立是為襄公三月乙未桓王崩子莊王佗立秦武公伐彭戱氏至于華山下居平陽封宫齊襄公貶其弟無知秩服無知怨鄭祭仲復迎立昭公忽突出居櫟邊邑諸侯伐鄭弗克而去衞恵公出奔齊立公子黔牟左傳載次年王生子頽諸侯㑹于曹謀伐鄭入厲公鄭祭仲取昭公母鄧女曲沃尚一軍異于晉竹書蔡桓侯卒無子弟哀侯獻舞立鄭髙渠彌弑其君昭公立昭公弟子亹秦夷三父族討其殺出公之罪也魯桓公以夫人如齊齊襄公使公子彭生殺桓公于車上夫人因留齊不敢歸子莊公同立齊殺鄭君子亹及高渠彌鄭人立其弟子嬰子嬰左作子儀周公黒肩欲殺王立王子克辛伯告王王殺黒肩王子克奔燕南燕上左傳載年陳莊公卒少弟杵臼立是為宣公宋莊公卒子湣公㨗立燕桓侯卒子莊公立五月葬桓王竹書齊伐紀紀遷去其邑楚武王伐隨卒于軍子文王熊貲立始都于郢王召隨侯責其尊楚齊㑹諸侯伐衞納恵公左傳載入衞在次年楚伐申還伐鄧秦伐邽冀戎初縣之衞恵公復入于衞黔牟奔周年表載次年星隕如雨與雨偕秦初縣杜鄭滅小虢小虢文王母弟虢叔所封是曰西虢齊無知弑其君襄公而自立公子小白奔莒公子糾奔魯與管仲召忽俱齊人殺無知公子小白入立是為桓公齊使魯殺公子糾生致管仲召忽死之齊伐魯為子糾故魯敗之楚伐蔡虜蔡哀侯以歸釋之留于楚自是江漢之國皆服于楚齊相管仲齊伐郯滅之郯子奔莒初桓公亡時過郯郯無禮故伐之宋大水湣公自責魯使臧文仲往弔莊王崩子釐王胡齊立春秋未載宋南宫萬弑其君湣公及大夫仇牧因殺太宰華督更立公子游為君諸公子奔蕭冬蕭及宋諸公子共擊新君游而立湣公弟禦說是為桓公南宫萬奔陳宋人賂陳陳以革搏之歸宋宋人醢之齊伐魯敗之魯莊公請獻遂邑以平桓公與魯㑹柯而盟魯曹沬刼桓公反所侵地杞靖公卒子共公立齊桓公㑹諸侯于北杏以平宋亂竹書鄭故君厲公使人殺子嬰復入立周魯晉衞鄭齊秦宋楚陳蔡曹燕邾杞齊桓公始覇㑹諸侯于鄄曲沃武公伐晉侯緡滅之以寳器獻周周釐王命武公以一軍為晉侯武公已立三十八年不更元諸侯伐宋至郊而去楚伐鄧滅之諸侯伐鄭竹書晉猶不與齊桓公之盟秦武公卒葬雍初以人從死立其弟徳公邾子克卒即儀父邾子瑣立釐王崩子恵王閬立春秋未載秦初徙居雍城大鄭宫以犧三百牢祠鄜畤梁伯芮伯朝于秦晉武公卒子獻公詭諸立楚文王卒子熊囏立是為杜敖囏一作杜一作堵恵文王卒左載王二年恵王取陳女為后秦初伏以狗禦蠱年表作初作伏祠社磔狗邑四門晉獻公朝周竹書秦徳公卒三十五嵗長子宣公立徳公三子長宣公中成公少穆公王如成周周陽白兔舞于市竹書燕宋衞伐王王出奔温立子頽恵王弟恵譙周曰春秋傳燕逐王者乃南燕姞姓也史以為北燕失之宋桓公取衞女文公女弟蔡哀侯死于楚留九嵗蔡人立其子肹是為繆侯王子頽亂王居于鄭鄭人入王府多取玉玉化為蜮射人竹書鄭執燕仲父為伐王故鄭厲公發兵擊周王子頽弗勝乃以王居于櫟鄭虢復誅王子頽入恵王把共公卒子徳公立一作恵公秋鄭厲公卒子文公踕立踕一作㨗七月魯文姜卒莊公之母也秦作密畤秦與晉戰河陽陽一作曲勝之陳厲公子完奔齊齊桓公欲以為卿完讓乃以為工正田成子常之祖也晉獻公伐驪戎得驪姬楚熊惲杜敖之弟與隨襲殺杜敖而代立是為成王王太子母早死恵后生叔𢃄晉患桓莊之族偪去富子二族之富强者楚脩好于諸侯使人獻王王賜之胙曹莊公卒子釐公夷立夷一作赤晉盡殺其羣公子衞恵公卒子懿公赤立晉使士蔿城絳自翼徙都之以隄防故晉之遺孽晉伐虢責其納羣公子也王賜齊桓公為伯邾子瑣卒文公籧篨立晉獻公使太子申生居曲沃公子重耳居蒲城夷吾居屈山戎侵燕秦宣公卒子九人莫立立其弟成公山戎伐燕齊救之遂伐山戎次于孤竹燕君送齊桓公出境桓公因割燕君所至地予燕使燕共貢天子如成周時職復修召公之法梁伯芮伯朝于秦魯莊公同卒季友立子班為君慶父弑之立公子開始八嵗是為閔公閔同湣季友奔陳曹釐公卒子昭公班立晉獻公滅霍狄伐衞殺懿公竹書載入次年衞人立黔牟之弟申為君是為戴公晉獻公作二軍滅耿以賜大夫趙夙滅魏以賜大夫畢萬史載此于恵王十八年竹書魯慶父復弑閔公季友自陳奉公子申立之是為釐公釐同僖使人殺慶父晉獻公使太子申生伐東山衞戴公卒立其弟燬為君是為文公秦成公卒子七人莫立立其弟繆公名任好齊桓公殺其女弟哀姜哀姜魯莊公夫人淫于慶父故殺之秦繆公自將伐茅津勝之茅津戎號衞文公有狄亂告急于齊齊率諸侯城楚丘而立衞君晉假道于虞以伐虢燕莊公卒子襄公立晉獻公㑹虞師伐虢滅下陽虢公醜奔衞公命瑕父吕甥邑于國都竹書齊桓公率諸侯伐蔡蔡潰虜蔡侯遂伐楚次召陵盟而還諸侯為蔡謝齊齊歸蔡侯晉太子申生自縊于新城以驪姬讒故晉公子重耳奔蒲夷吾奔屈秦繆公迎婦于晉太子申生姊也晉公子重耳奔狄晉滅虢還師滅虞秦繆公自将伐晉戰于河曲杞徳公卒一作恵公子成公立一無成公晉公子夷吾奔梁楚伐許許君肉袒謝乃釋之曹昭公卒子共公襄立閏月恵王崩太子鄭惡叔帶之難未得立而告于齊齊桓公㑹諸侯于洮以定王室立王太子鄭是為襄王晉伐翟春正月狄人伐晉竹書宋桓公卒太子兹甫立是為襄公太子讓其庶兄目夷為嗣桓公弗許以其庶兄目夷為相未葬而㑹齊桓公于葵丘齊桓公㑹諸侯于葵丘襄王使宰孔賜桓公文武胙秋復㑹諸侯于葵丘晉獻公卒使荀息立奚齊里克殺之荀息復立卓子里克復殺之荀息死之里克使迎公子夷吾于梁立之是為恵公齊桓公率魯討晉亂至髙梁而還晉恵公殺里克齊桓公率許男伐北戎許男僖公晉改葬共世子申生王子叔帯召戎伐周秦晉來救楚伐黄世家在前年鄭文公生公子蘭妾夢天與之蘭而生雨金于晉竹書襄王以戎難故欲誅叔𢃄叔帯奔齊齊使管仲平戎于周陳宣公卒子欵立是為穆公齊使仲孫請王為叔𢃄謝王怒弗聽晉饑請粟于秦秦與之秦饑請粟于晉晉倍之楚滅英蔡繆侯卒子莊侯甲午立齊管仲卒隰朋亦卒秦伯涉河伐晉竹書秦晉戰于韓原秦獲晉侯恵公以歸十一月秦歸晉侯宋隕星如雨與雨偕下六鶂退蜚風疾也秦置河東官司戎伐周周告急于齊齊令諸侯各發卒戍周晉公子重耳以管仲死去翟之齊齊桓公妻之齊桓公卒易牙與䜿刁因内寵殺羣吏而立公子無詭為君左氏無詭作無虧太子昭奔宋昭孝公也宋襄公率師送齊太子昭入立是為孝公齊人殺無詭秦滅梁滅芮鄭伐滑王使人請滑鄭人囚之宋襄公為鹿上之盟以求諸侯于楚秋㑹于盂楚執宋襄公已復歸之襄王召叔帯復歸于周本紀在襄王十二年晉太子圉質秦亡歸鄭文公朝于楚宋伐鄭楚敗宋師于泓王以翟師伐鄭以翟女為后齊伐宋以其不同盟也宋襄公卒傷于泓也子成公王臣立晉恵公卒子圉立是為懐公把成公卒弟桓公姑容立晉公子重耳去齊過曹過衞過鄭皆不禮遂至楚秦穆公帥師送公子重耳圍令狐桑泉臼衰皆降秦師狐尾晉先軫禦秦至于廬栁秦穆公使公子縶來與師言次于郇盟于軍公子重耳渉自河曲竹書秦繆公率師入晉公子重耳于晉立之是為文公使人殺懷公于髙梁鄭入滑王與翟人伐鄭弗克王絀翟后后通于叔帶故翟人來侵殺譚伯富辰死之王出奔汜汜鄭邑叔帶立為王晉以魏武為魏大夫趙衰為原大夫王使人告難于秦晉秦軍河上晉文公納王誅叔帯衞文公卒子成公鄭立晉城荀竹書宋倍楚盟而親晉以有徳于文公也楚滅䕫楚伐齊取榖置齊桓公子雍齊孝公卒弟潘因衛公子開方殺孝公子而自立是為昭公桓公子也楚成王使子玉伐宋宋告急于晉晉文公伐曹衞以救宋晉文公伐衞取五鹿晉假道于衞救宋成公不許更從南河渡徴師于衞成公又不肯大夫元喧攻成公衞成公奔陳晉伐曹虜曹共公分曹衞地以予宋晉敗楚子玉于城濮詳左傳晉文公朝王于河陽踐土諸侯畢㑹王錫晉侯命稱伯衞成公復入于衞晉以其㑹朝復之元喧出奔晉元喧初立叔武衞侯殺之故元喧出奔陳穆公卒子共公朔立晉復執衞成公于京師元喧自晉歸立公子瑕晉歸曹共公或說晉文公曰昔齊桓㑹諸侯復同姓今君囚曹君滅同姓何以令于諸侯公說許之晉以衞與宋秦晉圍鄭既而罷之衞成公復入于衞周請于晉釋之殺元喧衞君瑕出奔與左稍别鄭立子蘭為太子齊師逐鄭太子齒奔城張南鄭竹書鄭文公卒子穆公蘭立晉文公卒子襄公驩立秦師襲鄭鄭司城繒賀以鄭情賣之秦兵故來晉襄公敗秦師于殽虜其三帥魯僖公卒子文公興立晉歸秦三帥戎王使由余于秦晉伐衞衞亦伐晉楚太子商臣弑其父成王而代立詳左傳是為穆王秦使孟明視等伐晉戰于彭衙不利引歸楚以潘崇為太師掌國事以其太子宫與之秦伐晉取汪鄭世家云鄭發兵從晉伐秦敗秦兵于汪與年表異秦復使孟明視等伐晉渡河焚舟大敗晉人取王官及鄗以報殽之役晉人皆城守不敢出秦封殽尸作秦誓以悔過魯文公朝于晉衞成公朝于晉晉伐秦圍邧取新城楚滅江秦伐西戎破國十二王使召公過賜秦伯金鼓命為西方諸侯伯晉趙成子衰欒貞子枝臼季胥臣子犯狐偃霍伯先且居皆卒趙盾代趙衰執政楚滅六蓼洛絶于泂竹書秦繆公卒葬于雍殉死者百七十七人秦良臣子輿氏奄息仲行鍼虎三人亦在其中秦人哀之為作黄鳥之詩太子罃立是為康公繆公子四十人晉襄公卒太子夷臯立是為靈公趙盾欲立公子雍恐誅遂立太子晉隨㑹奔秦秋齊宋衞鄭曹許之君皆㑹晉趙盾盟于扈以靈公初立故宋成公卒年表云公孫固殺成公弟禦殺太子及大司馬公孫固而自立宋人共殺禦而立成公少子杵臼是為昭公年表云襄公之子按左傳無弟禦自立事襄王崩子頃王王臣立王使衞求金于魯以葬楚伐鄭以其服晉陳世家作伐曹共公卒子文公壽立燕襄公卒子桓公立譙周云襄伯生宣伯無桓公晉伐秦取少梁秦亦取晉北徴北徴世家作殽魯敗長翟于鹹宋敗長翟縁斯于長丘魯世家云宋武公之世秦伐晉取羈馬晉使趙盾趙穿郤缺擊秦河曲秦師遁本紀作秦大敗晉軍晉隨㑹自秦歸晉陳共公卒子靈公平國立邾文公卒子定公貜且立楚穆王卒子莊王侣立彗星入北斗周史曰十年齊君晉君死齊昭公卒子舍立昭公弟商人弑之而自立是為懿公頃王崩子匡王班立公卿爭政故不赴晉趙盾帥師平王室六月辛丑日蝕齊伐魯蔡莊侯卒子文侯申立楚以伍舉蘇從為政楚滅庸宋襄夫人使衞伯攻殺昭公立昭公弟鮑革年表無革字為君是為文公齊伐魯晉率諸侯伐宋責以弑君聞文公定立乃還魯文公卒襄仲殺太子惡及視而立子俀一作倭是為宣公齊邴歜父閻職弑其君懿公齊人迎公子元于衞而立之是為恵公桓公子也其母衛女曰少衛姫避齊亂故在衞秦康公卒子共公立名和一作猳一作稻楚與鄭伐宋獲五百乘又伐陳以服晉故晉使趙盾伐鄭鄭伐宋獲華元長翟侵齊王子城父攻殺之城一作成齊大夫埋之于北門穀梁傳曰身横九畆斷其首而載之眉見于軾晉趙盾弑其君靈公使趙穿迎公子黒臋于周而立之是為成公成公襄公之弟文公少子其母周女也匡王崩弟瑜立是為定王晉成公賜趙氏為公族晉使趙穿伐鄭鄭倍晉故楚莊王伐陸渾之戎次洛使人問九鼎王孫滿辭却之宋圍曹鄭穆公卒子靈公夷立宋華元亡歸宋鄭子公子家弑其君靈公而立公子堅靈公庶弟是為襄公以穆公子皆為大夫是為七穆楚若敖氏反莊王伐之滅其族鄭復倍楚親晉楚莊王伐鄭陳及楚平晉使中行桓子荀林父也救鄭伐陳秦共公卒子桓公榮立老𥅆生黄河徙燕桓公卒宣公立晉伐秦竹書晉與狄伐秦虜秦將赤年表作獲諜左傳云殺之絳市六日而蘇楚滅舒蓼七月日蝕楚伐陳陳復從晉故是年呉越始見于傳晉與楚争彊㑹諸侯于扈使荀林父伐陳陳畏楚不㑹故因救鄭與楚戰敗之晉成公卒于扈子景公據立一作孺衞成公卒世本成公徙濮陽子穆公遫立楚伐鄭晉救之敗楚四月日食齊恵公卒子頃公無野立崔杼奔衞崔杼初有寵于恵公公卒髙國畏其偪也逐之陳大夫夏徴舒弑其君靈公晉與楚伐鄭鄭子家卒國人逐其族以弑靈公故齊高國奔衞年表于齊云公卒崔杼有寵髙國奔衞于衞又云齊髙國來奔按左傳是年崔杼奔衞無髙國奔衛之事且是冬國武子報聘于魯則國氏未嘗奔衞也晉與鄭盟于鄢陵左傳作辰陵楚莊王伐陳誅夏徴舒立靈公子午是為成公晉趙盾卒諡為宣孟子朔立楚莊王圍鄭鄭伯降楚晉使荀林父等帥師救之大敗于邲虜知罃晉景公赦林父弗誅晉司冦屠岸賈請誅趙氏之弑靈公者遂殺趙朔趙同趙括趙嬰齊等滅其族晉先縠奔翟縠先軫之子以軍敗恐誅故奔與翟謀伐晉晉覺乃族縠晉伐鄭為助楚故宋殺楚使者申舟楚王圍宋曹文公卒子宣公廬立世家廬作彊楚圍宋急宋使告于晉晉使解揚于宋宋華元求成于楚楚釋宋圍楚莊王始覇秦伐晉晉魏顆敗秦師于輔氏魯初稅畆晉使士㑹為政盗奔于秦周宣王宫榭火晉使郤克如齊齊頃公母從樓上觀而笑之以克僂故也克歸謀伐齊蔡文侯卒子景侯固立世家固作同六月日蝕晉范武子即士㑹請老以郤克為政晉伐齊齊以公子彊質于晉晉兵去楚莊王卒子共王審立魯宣公卒子成公黒肱立逐東門氏奔齊齊頃公伐魯取隆隆左作龍齊伐魯衞魯衞大夫如晉請師皆因郤克晉使郤克以車八百乘為中軍將以救魯衞伐齊敗齊師于鞌虜逢丑父丑父後亡歸齊令反魯衞之侵地宋文公卒子共公瑕立瑕一作固始厚葬衞穆公卒子定公臧立楚申公巫臣奔晉竊夏姬以逃晉以為邢大夫楚伐衞晉率諸侯伐鄭晉知罃自楚歸晉初置六卿賞鞌之功齊頃公朝于晉鄭襄公卒子悼公㵒立魯成公如晉晉景公不敬魯魯欲背晉合于楚或諫乃止晉欒書伐鄭取汜一作范楚使子反救鄭燕宣公卒昭公立晉梁山崩以問伯宗伯宗以為不足􅏜也定王崩子簡王夷立楚伐鄭鄭悼公來訟許公惡鄭于楚悼公使弟睔于楚自訟訟不直楚囚睔于是鄭悼公與晉平遂親睔私于楚子反子反言歸睔于鄭許公世家作鄦公鄭復與晉平呉子去齊卒子乘立是為壽夢自泰伯至壽夢凡十九世周魯晉衞鄭齊秦宋楚陳蔡曹燕呉邾把鄭悼公卒立其弟睔是為成公楚伐鄭晉使欒書救鄭楚師還晉侵蔡呉壽夢始稱王呉伐楚冬呉壽夢朝于周楚伐鄭楚子反族巫臣之家巫臣怨楚令其子通于呉為呉行人與晉謀伐楚晉景公有疾復趙庶子武田邑晉伐蔡鄭與楚盟齊頃公卒子靈公環立鄭成公如晉晉執之以其貳干楚使欒書伐鄭楚子重侵陳以救鄭秦伐晉冬楚與晉成晉景公病立其太子壽曼左傳作州蒲以伐鄭鄭賂晉晉釋鄭成公歸晉景公卒壽曼立是為厲公魯成公如晉送葬諱之宋華元善楚將子重又善晉將欒書兩盟晉楚晉與秦桓公夾河而盟秦歸倍盟與翟謀伐晉晉程嬰攻屠岸賈于公宫滅其族一載上年晉楚㑹盟于宋西門之外華元合晉楚之成書前編曰晉楚之盟春秋不史年表亦不見今存之以備叅考晉使吕相讓秦因㑹諸侯伐秦至于涇敗秦于麻隧虜其將成差曹宣公卒于師弟成公負芻立殺世子而自立衞定公卒子獻公衎立秦桓公卒子景公立晉㑹諸侯伐曹執曹成公以歸立子臧子臧逃奔宋宋共公卒司馬唐山攻殺太子肥欲殺華元華元奔晉魚石止之至河乃還誅唐山左傳唐山作子山即蕩澤乃立共公少子成是為平公晉殺伯宗伯宗好直諫三郤䜛殺之許遷于葉畏鄭故魯始與呉通㑹壽夢于鍾離鄭倍晉與楚盟晉厲公自將伐鄭楚救鄭晉敗楚于鄢陵射中共王目楚將子反醉不能戰王殺子反晉釋曹成公歸使子臧復反子臧不仕魯宣伯告晉誅季文子晉人弗許邾定公卒宣公牼立燕昭公卒武公立楚與鄭伐宋㧞彭城為魚石故以封魚石晉厲公殺其大夫三郤郤錡郤犨郤至左傳載上年魯成公卒子襄公午立是時襄公三嵗十二月壬午晉欒書中行偃囚其君厲公左傳載上年尋弑之使人迎公子周于京師而立之是為悼公襄公孫楚共王㑹宋平公于湖陽竹書晉率諸侯圍宋彭城晉誅魚石歸宋彭城晉悼公伐鄭兵于洧上鄭城守晉亦去丘楚侵宋救鄭取犬丘宋地晉伐齊以齊不救鄭也齊令公子光質于晉簡王崩子靈王泄心立靈王生而有髭鄭成公卒子釐公惲立釐一作僖頑釐公一名髠晉帥諸侯伐鄭城虎牢晉敗鄭師遂至陳楚共王使子重伐呉至衡山呉敗之楚子重卒齊伐呉未見左傳晉悼公㑹諸侯于雞澤悼公弟揚干亂行魏絳戮其僕呉子不至陳倍楚盟楚使公子何忌侵陳楚伐陳即上年何忌之師陳成公卒子哀公弱立楚以陳䘮罷兵去晉使魏絳和戎戎朝于晉魯襄公如晉時公七嵗楚伐陳魯季文子卒晉率諸侯㑹呉于戚把桓公卒立七十年史作十七誤子孝公匄立楚子囊圍陳為哀公亡歸故復釋之鄭子駟弑其君釐公使賊夜殺之詐以病卒赴諸侯立釐公子嘉年表作喜是為簡公時年五歳魯襄公如晉鄭侵蔡楚伐鄭秦伐晉楚為秦援師于武城晉率齊魯宋衞曹蔡伐鄭㑹河上與鄭盟晉悼公冠魯襄公于衞季武子從行相禮楚伐鄭鄭復與楚盟齊立子光為太子髙厚傅之令㑹諸侯盟于鍾離鄭伐宋衞救之楚鄭侵魯西鄙晉率諸侯伐鄭鄭殺子駟楚使子囊救鄭王叔奔晉晉韓厥卒子起代是為宣子徙居州鄭子孔作亂子産攻之此見年表左傳未載晉荀罃伐秦魯三桓分為三軍各將一軍楚與鄭伐宋晉率諸侯伐鄭冬秦使庶長鮑救鄭敗晉兵于櫟晉易秦不設備故呉子壽夢卒長子諸樊立魯襄公如晉楚共王卒子康王招立年表載共王太子出奔呉未詳秋呉伐楚楚敗之二月日蝕晉率諸侯伐秦大敗秦軍度涇至棫林而還衞孫林父攻其君獻公公奔齊衞人立定公弟秋為君年表秋作狄是為殤公楚伐呉齊伐魯八月日蝕晉悼公卒子平公彪立齊伐魯地震晉伐楚敗之于湛坂齊復伐魯北鄙宋伐陳衞伐曹齊伐魯北鄙曹伐衞左傳未載邾宣公卒子悼公華立晉使中行獻子㑹魯宋衞鄭伐齊齊師敗靈公走入臨淄晉兵圍臨淄臨淄城守不敢出晉焚郭中而去曹成公卒于師子武公滕立楚伐鄭燕武公卒文公立齊靈公卒太子光即位是為莊公初靈公取魯女生子光以為太子戎姬嬖公又立其子牙為太子而廢太子光使髙厚傅牙靈公卒崔杼迎故太子光而立之是為莊公莊公殺戎姬執太子牙于勾竇之丘殺之又殺髙厚晉聞齊亂率諸侯伐齊至髙唐鄭簡公誅大夫子孔以子産為卿晉㑹十二國之君盟于澶淵十月日蝕魯襄公朝晉九月日蝕十月又日蝕晉殺羊舌虎晉大夫欒逞逞左傳作盈奔齊齊莊公厚客待之晏嬰田文子諫公弗聽晉盟諸侯于沙隨一作商任以錮欒氏十一月庚子孔子生于魯孔子及諸賢生卒年俱照甲子㑹紀把孝公卒弟文公益姑立益姑一作姑容齊伐衞齊莊公使欒逞間入晉曲沃為内應以兵隨之上大行入孟門欒逞為晉所殺齊兵還取朝歌魯侯如晉與晉侯盟已而背之左傳未載齊莊公襲莒把梁死之魯侵齊齊畏晉通楚晏子謀也七月日蝕八月又日蝕楚率陳蔡伐鄭救齊燕文公卒懿公立莒子朝齊齊伐魯以報孝伯之師齊崔杼弑其君莊公立莊公異母弟杵臼是為景公景公母魯叔孫宣伯女也景公立以崔杼為右相慶封為左相晉伐齊至髙唐以報朝歌之役鄭伐陳入之秦景公如晉與平公盟已而背之左傳在下年呉諸樊伐楚廹于巢門楚射傷之諸樊卒諸樊一名遏弟餘祭立齊景公如晉請歸衞獻公齊晉殺衞殤公復内獻公左傳衞寗喜弑殤公復入獻公晉人執寗喜及獻公齊侯鄭伯為之請十二月衞人歸衞姬于晉乃釋獻公明年獻公復殺寗喜楚率陳蔡伐鄭晉以趙武為正卿與韓起魏綘同執國命㑹諸侯之大夫于宋從宋向戌之請且弭兵也齊慶封盡滅崔杼之家崔杼自殺慶封専國十一月日蝕齊田鮑髙欒四氏共謀攻慶封慶封奔魯齊人徙葬莊公僇崔杼尸于市以說衆齊慶封復奔呉呉予慶封朱方之縣以為奉邑以女妻之富于在齊靈王崩太子晉早卒次子貴立是為景王楚康王卒子員立員一作麋是為郟敖魯襄公如楚葬康王燕懿公卒子恵公欵立一作簡公衞獻公卒子襄公惡立呉守門閽弑餘祭年表于餘祭四年載此一句與左傳同而四年之後仍引至十七年明年始書呉餘昧元年不知何以既弑而仍稱其年也世家不載閽弑之事至十七年始云王餘祭卒弟餘昧立與年表同則四年所載為誤也呉使公子季札聘魯觀周樂又至齊與晏嬰歡又至鄭至衞至晉曰晉政歸韓趙魏矣齊高止奔于燕蔡世子般弑其君景侯而自立景侯為太子般娶婦于楚而景侯通焉太子弑之自立是為靈侯鄭諸公子争寵相殺子産止之鄭以子産為政六月魯襄公卒九月太子野卒魯人立齊歸之子稠為君是為昭公年十九猶有童心季武子専政楚以其季父公子圍為令尹魯仲由生秦后子奔晉后子景公弟車千乘邾悼公卒莊公穿立鄭使子産問疾于晉楚公子圍弑其君郟敖而自立殺其子幕及平是為靈王齊田無宇送女于晉魯昭公如晉至河晉謝還之蔡漆雕開生齊使晏嬰如晉夏鄭簡公朝晉燕恵公多寵姬欲去諸大夫而立寵姬宋年表公欲殺公卿立幸臣然則宋即幸臣名而云寵姬宋者或姬之父兄大夫共誅姬宋恵公懼奔齊悼公攝國左傳燕簡公事與此相似冬鄭簡公又朝楚畏楚靈王之强子産從楚靈王㑹十二國諸侯于申魯衞曹邾辭不㑹鄭君疾使子産往㑹之以伐呉朱方誅齊慶封冬呉伐楚取三邑而去年表作取五城魯有若生秦景公卒子哀公立后子自晉復歸秦楚率諸侯伐呉至雩婁正月把文公卒弟平公鬰立鬰一作郁釐楚復伐呉次于乾谿楚師敗走齊髙偃如晉請共伐燕晉平公許之齊景公如晉請伐燕入其君魯閔損生齊晉伐燕入恵公左傳作簡公恵公至燕而卒燕人立悼公楚靈王為章華之宫四月日蝕衞襄公卒夫人姜氏無子以賤妾之子元為子子靈公元立魯季武子卒陳哀公疾其弟司徒招殺世子偃師而立公子留哀公縊留奔鄭魯昭公如楚楚留之賀章華臺賜昭公寳器已而悔復詐取之楚令内亡人實章華臺楚滅陳楚使公子棄疾將兵奉陳哀公孫呉以定陳呉即陳恵公年表于滅陳之侯仍以恵公紀元然恵公實未立也立在景王十六年春有星出于婺女四月日蝕此見年表春秋未載十月晉平公卒子昭公夷立宋平公卒子元公佐立魯以孔子為委吏孔子生伯魚呉王餘祭卒弟餘昧立說見景王元年餘一作夷楚召蔡靈侯醉而殺之楚以靈侯弑父誘之于申伏甲飲之醉而殺之刑其士卒七十人使公子棄疾定蔡因為蔡公河水赤于龍門三里竹書鄭簡公卒子定公寧立齊景公復如晉見昭公衞靈公朝于晉秋鄭定公朝于晉魯昭公朝晉至河晉謝還之楚靈王伐徐以恐呉年表徐作舒次于乾谿民罷于役怨王楚公子棄疾自蔡入立改名熊居是為平王楚靈王自殺楚復陳蔡立陳故悼太子之子呉是為恵公復求蔡景侯少子廬立之是為平侯平侯徙下蔡楚歸鄭所侵地燕悼公卒共公立呉滅楚州來曹武公卒子平公須立須一作頃呉王餘昧卒春秋餘昧作夷末子僚立季札讓不立故國人立僚六月日蝕王太子聖卒景王子壽左傳聖作王后崩太子之母楚平王為太子建娶婦于秦婦至自娶之晉昭公卒子頃公去一作棄疾立六卿强公室卑魯昭公如晉晉留之葬魯恥之左傳無此冬十二月桃杏花竹書鄭火鄭人欲禳子産弗許正月朔日食春秋六月日食彗星見辰呉公子光伐楚敗而亡王舟光懼襲楚復得王舟而還周鑄大錢曹平公卒子悼公午立宋衞陳鄭火燕共公卒平公立地震楚使其太子建出守城父齊景公獵魯郊因入魯與晏嬰問魯禮楚平王欲殺太子建太子建奔宋遂殺其傅伍奢奢之子伍員奔呉呉公子光客之宋元公無信詐殺諸公子大夫華氏向氏作亂蔡平侯卒靈侯般之孫東國殺平侯子而自立是為悼侯悼侯父曰隠太子友者靈侯之子平侯立而殺隠太子故平侯卒而隠太子子東國攻平侯子而自立異與左傳楚太子建復自宋奔鄭因華氏亂也鄭子産卒太叔為政魯冉雍冉求商瞿生孔子自魯適周問禮于老𣆀訪樂于萇𢎞七月日蝕蔡悼侯東國左傳作蔡侯朱奔楚魯昭公如晉至河晉謝之歸晉有軍事故辭齊髙柴生魯巫馬期生景王崩王室亂景王愛子朝欲立之㑹崩不果朝景王之長庶子也國人立長子猛為王王子朝攻殺之是為悼王楚太子建與晉謀襲鄭鄭殺建建子勝奔呉年表載下年晉人平王室亂攻子朝立王子丐猛同母弟是為敬王十二月日蝕衞端木賜生蔡悼侯卒于楚弟昭侯申立呉使公子光伐楚敗楚師因北伐陳取胡沈二國名而去又敗蔡師敬王出居于澤晉人入敬王子朝自立于王城故不得入而居澤澤春秋作狄泉地震呉迎楚故太子建母于居巢以歸楚城郢鄭定公如晉鄭與晉謀誅周亂臣入敬王周老𥅆西入昆崙燕平公如晉請内敬王左傳未載把平公卒子悼公成立呉公子光伐楚㧞居巢鍾離以邊邑卑梁氏女争桑故魯有鸜鵒來巢左傳載下年晉使趙鞅為政㑹諸侯之大夫于黄父以謀王室魯昭公伐季氏三桓攻公公奔齊齊景公欲以千社封之子家止之宋元公卒子景公頭曼立齊伐魯取鄆以居昭公年表載下年孔子自魯適齊楚平王卒子昭王珍立將軍子常欲立子西子西不可乃立珍珍一作軫晉趙鞅率諸侯内敬王于王城子朝奔楚彗星見齊分呉因楚䘮伐楚使公子蓋餘燭庸蓋一作掩圍楚之六灊公子光使専諸刺王僚而自立是為闔廬廬一作閭楚殺費無忌以說衆曹悼公朝于宋宋囚之曹立其弟野是為聲公年表聲作襄葬悼公死于宋歸魯原憲生齊樊須生魯昭公如晉求入晉弗聽處之乾侯呉以伍員為行人與謀伐楚楚伯州犁之孫伯嚭亡奔呉呉以為行人晉韓起與趙魏共分祁氏羊舌氏十縣晉六卿誅公族分其邑各令其子為大夫晉益弱六卿强鄭定公卒子獻公蠆立定公立十六年世家作十三年魯顔回生魯昭公歸于鄆齊侯卑之復入晉次于乾侯秋龍見于晉郊晉頃公卒子定公午立呉公子掩餘燭庸亡奔楚楚封之以扞呉呉伐楚㧞舒殺呉亡將二公子魯澹臺滅明生呉伐楚取六與潛十二月日蝕陳陳亢生呉伐越敗之晉率諸侯築城于周曹平公弟通弑聲公代立是為隠公左傳未載魯昭公卒于乾侯孔子自齊反魯魯昭公之䘮至自乾侯三桓廢世子共立昭公弟宋為君是為定公楚使囊瓦伐呉呉迎而擊之大敗楚軍于豫章取楚之居巢而還左傳在下年蔡昭侯朝楚楚留之魯公西赤生邾莊公卒子隠公乞立楚釋蔡昭侯歸留楚三年得裘始釋歸詳左傳昭侯如晉請伐楚衞卜商生陳恵公卒子懷公栁立曹聲公弟露弑隠公代立是為靖公春秋未載周與晉㑹諸侯侵楚衞與蔡争長衞侵之五月把悼公卒于㑹子隠公乞立七月隠公弟遂遂一作過弑隠公自立是為釐公蔡為晉滅沈楚怒攻蔡蔡昭侯質子于呉請共伐楚呉王闔廬與唐蔡伐楚入郢楚昭王亡奔隨楚申包胥乞救于秦漢不見于天竹書呉言偃生王使人殺王子朝于楚三月日蝕越子允常伐呉因呉在楚也魯季平子卒陽虎囚季桓子與盟釋之楚申包胥率秦師救楚呉師敗歸楚昭王復入郢楚滅唐燕平公卒簡公立魯曾參生鄭滅許魯侵鄭呉使太子夫差伐楚取番楚恐而去郢北徙都于鄀王子朝之徒復作亂敬王奔于晉周魯晉衞鄭齊秦宋楚陳蔡曹燕呉越邾把齊侵衞與衞盟齊伐魯取鄆為陽虎邑晉定公入敬王于周凡王室亂十七年始定劉子迎立之楚令尹謀伐蔡蔡昭侯懼陳顓孫師生魯伐齊齊復伐魯陳懐公如呉呉留之因卒于呉子湣公越立晉魯侵衞魯陽虎欲攻三桓三桓攻陽虎虎奔陽關曹靖公卒子伯陽立魯宓不齊生鄭獻公卒子聲公勝立是時晉六卿强侵鄭鄭遂弱魯陽虎奔齊請齊伐魯鮑子諫止景公乃囚陽虎陽虎亡奔晉公山弗狃召孔子孔子欲往不果秦哀公卒太子夷公蚤死不得立立其子是為恵公魯閔損生魯以孔子為司冦魯定公㑹齊景公于夾谷孔子相禮齊歸魯侵地彗星見秦分齊晏嬰卒魯仲由為季氏宰將墮三都叔孫氏墮郈公山弗狃以費人襲魯弗克奔齊遂墮費孟氏不肯墮成衞伐曹齊歸魯女樂季桓子受之孔子去魯晉范氏中行氏作亂孔子適衞衞靈公禄之如魯晉趙鞅殺邯鄲大夫午十月晉范中行氏伐趙鞅鞅奔晉陽十一月晉伐范中行氏二子奔朝歌趙鞅復入于絳越王允常卒子句踐立是為菼執呉伐越聞允常卒也越王句踐迎擊之檇李呉王闔廬傷指而死子夫差立呉怨越而不西伐楚楚滅頓衞太子蒯瞶奔宋已而之晉趙氏孔子自衞適陳畏于匡反衞呉王夫差伐陳取三邑而去見呉世家左傳不載曹伯陽好獵使野人公孫彊為司城以聽政呉以伯嚭為太宰習戰射將以報越楚滅胡以胡助呉倍楚魯定公卒子哀公蔣立鄭伐宋八月日蝕晉韓宣子卒子貞子代徙居平陽孔子去衞過曹適宋及鄭楚率諸侯圍蔡以呉怨故呉王夫差悉精兵以伐越敗之夫椒報檇李也越王請平呉王許之盟而罷兵呉伐陳齊衞伐晉救范氏也晉趙鞅圍范中行氏于朝歌中行文子奔邯鄲晉青虹見竹書衞靈公卒立太子蒯瞶之子輒是為出公晉趙鞅與陽虎納衞太子蒯瞶衞不内蒯瞶遂居于戚晉范中行氏告急于鄭鄭救之晉趙鞅伐鄭敗鄭軍于鐵齊輸粟于晉范中行氏蔡遷于州來州來近呉畏楚故遷燕簡公卒獻公立晉佛肸以中牟叛召孔子孔子欲往不果行孔子過宋宋桓魋伐之孔子微服去至于陳魯地震魯桓僖廟災魯季桓子卒子康子代周殺其大夫萇𢎞洛絶于周竹書孔子如蔡蔡人弑其君昭侯子成侯朔立齊田乞救晉范氏晉趙鞅圍邯鄲㧞之中行文子奔栢人秦恵公卒子悼公立左傳載上年晉趙鞅圍栢人敗之范昭子中行文子氏二子奔齊趙竟有邯鄲栢人范中行餘邑入于晉趙専晉權奉邑侔于諸侯晉趙鞅伐衞救范氏故齊景公卒立嬖姬子茶為太子子荼立是為晏孺子呉伐陳陳告急于楚楚昭王率師救之呉師去昭王卒于城父楚迎越女之子章立之是為恵王齊田乞立公子陽生是為悼公殺孺子荼呉王夫差北伐齊聞景公死也敗之左傳未載宋伐曹孔子自蔡如葉自楚反蔡復至陳宋侵鄭又侵衞晉侵衞呉王夫差伐齊至繒魯哀公㑹之呉徴百牢于魯使子貢謝之曹伯陽背晉奸宋宋景公伐之晉人不救鄭救曹宋滅曹執曹伯陽及公孫彊以歸而殺之呉為邾伐魯邾一作騶及萊門盟于城下而還齊伐魯取讙及闡年表云取三邑既而歸之以季姬故把釐公卒子湣公維立楚子西召故太子建之子勝于呉以為巢大夫號曰白公周魯晉衞鄭齊秦宋楚陳蔡燕呉越邾把鄭圍宋敗于雍丘呉自魯復伐齊敗之艾陵左傳艾陵之戰在後年使人召陳侯陳侯恐如呉楚伐陳陳與呉故宋伐鄭呉城䢴溝通江淮呉與魯伐齊齊鮑牧弑悼公鮑牧與悼公有郄赴于呉齊人共立悼公子壬是為簡公呉王聞悼公死哭于軍門外三日乃從海上攻齊齊人敗呉呉王乃引兵歸晉趙鞅伐齊至賴而還楚伐鄭宋伐鄭齊田乞卒子常代是為田成子呉殺其大夫伍員左傳載下年孔子自陳復于衞齊伐魯冉求却之呉與魯伐齊大敗之于艾陵虜齊國書等以歸魯使子貢于齊及呉越晉魯迎孔子孔子自衞歸于魯淇絶于舊衞竹書魯初用田賦呉召魯衞之君㑹于槖臯宋伐鄭楚白公勝請子西伐鄭為殺其父建故弗許魯孔鯉卒顔回卒鄭敗宋師呉王夫差北㑹諸侯于黄池與晉争長卒先呉趙鞅從晉定公越王句踐入呉執其太子友呉王乃歸與越平燕敗宋師魯西狩獲麟齊田常弑簡公立其弟驁是為平公田常相之専齊之政割齊安平以東為田氏封邑晉伐鄭楚使子西救之衞太子蒯瞶復入立是為莊公出公輒奔魯左載下年仲由死于衞㑹紀載入孔子卒之年晉城頓丘竹書魯子服景伯如齊子貢為介齊歸魯侵地田常初相欲親諸侯熒惑守心楚白公勝殺令尹子西子綦于朝刼恵王置髙府白公自立葉公率師入救攻白公殺之恵王復位以兵北伐殺陳湣公遂滅陳而縣之孔子卒于魯周魯晉衞鄭齊秦宋楚蔡燕呉越邾把越王句踐伐呉敗呉師于笠澤晉伐衞衞人出莊公與晉平立公子班師為君班師襄公之孫齊虜班師更立公子起靈公之子戎州人殺莊公宋殺其大夫皇瑗于丹水之上丹水壅不流竹書敬王崩左傳在下年竹書同子元王仁立秦悼公卒子厲共公立衞石曼専年表作石専無曼字糓梁作曼姑専當作專音姑或音圃左傳作石圃逐其君起奔齊衞出公輒自齊復立越王句踐復伐呉晉知伯伐鄭取九邑呉伐楚越王句踐圍呉晉定公卒子出公鑿立鑿一作錯趙鞅除三年之䘮君䘮也服期左傳是年云越圍呉趙孟降于䘮食注趙孟襄子無恤時有父簡子之䘮知為無恤者以下文楚隆告呉王有寡君之老無恤句也而年表云簡子在位六十年至晉出公十七年始卒故以此為趙鞅事蜀人賂秦呉殺公子慶忌越敗呉師圍其國越遣使聘魯又聘于齊越既勝呉欲覇中國始遣使適魯及齊邾子自齊奔越越人歸之按左傳魯哀八年邾隠公為呉所囚立太子革十年奔齊自齊奔越越人歸之太子革奔越越滅呉致貢于王王命為伯范蠡去越越句踐殺其大夫文種周魯晉衞鄭齊秦宋楚蔡燕越邾把楚人賂秦晉知伯瑶帥師伐齊戰于犁丘齊師敗績把湣公弟閼路弑閔公代立是為哀公一載下年蔡成侯卒年表作景侯卒索隠曰景字誤合作成子聲侯産立侯一作公越復執邾隠公以歸而立公子何邾隠公歸又無道故越執之而立公子何何太子革弟也何又無道魯哀公以公子荆之母為夫人荆為世子荆為哀公庶子嬖其母而立之魯哀公朝于越義渠賂秦義渠古西戎國今慶陽府繇諸乞援于秦繇一作緜彗星見衞出公奔宋公飲大夫酒大夫不解履公怒即攻公公奔宋使人如越請師楚王子英奔秦晉澮絶于梁丹水三日絶不流竹書越使臯如后庸㑹魯人宋人納衞出公不克而還衞人立公子黔蒯瞶庶弟也出公遂處于城鉏此據左傳而史記無之宋景公無子取公孫周之子得與啓周元公孫畜于宫中按左傳是年景公卒立得是為昭公而史記云景公立六十四年始卒與傳不合冬十月元王崩子定王介立介一作赤不竹書作貞定王皇按周有定王代數又逺則定當作貞甫謐兩從之謂為貞定王亦未確也齊人鄭人伐衞竹書晉荀瑶城宅陽水經注周魯晉衞鄭齊秦宋楚蔡燕越把魯季康子卒晉荀瑶伐鄭齊田常救鄭晉師還於越徙都于瑯琊竹書彗星見魯哀公奔衞遂如越國人迎歸卒于有山氏左傳載上年其語稍異亦未載卒年子悼公寧立悼公時三桓勝魯如小侯卑于三桓之家秦庶長將兵㧞魏城晉地震燕獻公卒孝公立十一月越句踐卒是為菼執子王鼫與立鼫音石與音餘謂左傳作適郢竹書作鹿郢越語鹿郢為鼫與也晉知伯瑶帥師伐鄭是時趙簡子疾使子無恤圍鄭駟桓子如齊求救齊救鄭晉師去晉知伯使趙簡子廢其太子無恤襄子也無恤怨知伯晉人楚人賂秦鄭聲公卒子哀公易立晉河絶于扈竹書晉荀瑶城南梁竹書把哀公卒湣公之子欶立欶一作速是為出公一作哀公卒于定王四年秦塹阿旁世家塹作壍阿作河秦以兵二萬伐大荔荔音戾取其王城年表作補龎戯城越王鼫與卒子王不壽立是為肓姑晉趙簡子卒通鑑載于元王元年子無恤代是為襄子晉知伯瑶與趙無恤襄子韓虎康子魏侈襄子共滅范氏中行氏而分其地晉出公奔齊出公告齊魯欲以伐四鄉反攻出公奔齊晉荀瑶滅夙繇晉出公道卒知伯乃立昭公曾孫驕驕一作忌為君是為哀公哀公趙世家作懿公之竹書貞定王十七年晉出公薨乃立昭公孫是為敬公與史異趙襄子滅代襄子未除服登夏屋誘代王以金斗殺代王封伯魯子周為代成君此事或亦載于元王三年秦將師伐緜諸蔡聲侯卒子元侯立晉荀瑶襲衞至境而還宴三卿于籃臺晉河水赤三日竹書晉荀瑶伐中山取窮魚之丘竹書秦初縣頻陽晉取秦武成竹書晉韓龎取秦武成衞出公卒季父黔立攻殺太子而自立是為悼公初出公立十二年出亡在外四年復入稱後元年賞從亡者復立二十一年卒齊平公卒子宣公積立年表宣公名就匝齊田常卒是為成子子襄子盤代盤世本作班相齊宣公晉荀瑶大治宫室晉茍瑶約魏駒韓虎攻趙無恤無恤奔晉陽鄭人弑其君哀公而立聲公弟丑是為共公晉荀瑤及韓魏圍晉陽晉趙無恤約魏駒韓虎反攻荀瑶于晉陽滅之而三分其地齊田盤盡以其兄弟宗人為都邑大夫與三晉通使將以有齊國晉趙無恤使新稚狗伐狄勝之取左人中人本國語通鑑載于是年晉豫讓為知伯報仇刺趙無恤不克死之知伯荀瑶也晉大夫知開率其邑人奔秦開茍瑶之族也自荀首以來或稱知氏或云開即知伯子秦左庶長城南鄭蔡元侯卒子齊立衞悼公卒子敬公弗立宋景公卒世家景公立六十四年而以年表計實立六十六年公子特攻殺太子而自立是為昭公昭公者元公之曾庶孫也昭公父公孫糾糾父公子褍秦褍秦即元公少子也景公殺昭公父糾故昭公怨殺太子而自立按左傳與此全異而載景公之卒于魯哀二十六年實立四十八年燕孝公卒成公立竹書云名載杞出公卒簡公春立一作出公卒于定王十五年越肓姑卒子王翁立竹書於越子不壽見殺是為肓姑次朱勾立越人逆女于秦越王翁迎婚也晉大夫知伯寛率其邑人奔秦楚恵王滅蔡侯齊出亡蔡遂絶祀世自叔度至齊凡二十四周魯晉衞鄭齊秦宋楚燕越杞楚滅杞夏禹之裔亡四按把世家簡公立一年於楚恵王之四十年滅而譜其年實不止一年楚與秦平是時越已滅呉而不能正江淮北楚東侵廣地至泗上周魯晉衞鄭齊秦宋楚燕越秦伐義渠虜其王晉伐伊洛隂戎滅之其遺脱者皆西走踰汧隴自此中國無戎冦惟餘義渠一種焉日食晝晦星見秦厲共公卒子躁公立秦南鄭反定王崩長子去疾立是為哀王哀王立三月弟叔襲殺哀王而自立是為思王思王立五月少弟嵬攻殺思王而自立是為考王三王皆定王子猶史云少弟嵬然考王有弟掲不得云少也王封其弟掲于河南王城初平王東遷都于王城敬王以子朝之亂餘黨多在王城者乃徙都成周至是考王以王城故地封其弟掲以續周公之職是為西周桓公王城在西成周在東魏文侯立此竹書所紀而史年表以威烈王二年為魏文侯元年龍門河水赤三日晉哀公卒子幽公栁立是時晉衰幽公獨有絳曲沃餘皆入三晉反朝韓趙魏之君一載上年夏六月秦雨雪日月蝕燕成公卒湣公立彗星見楚恵王卒子簡王仲立衞敬公卒子昭公糾立是時三晉强衞如小侯屬之楚北伐滅莒義渠伐秦侵至渭陽晉敬公卒竹書栁敬公卒明年幽公元年與史異魯悼公卒子元公嘉立前編載于考王十年秦躁公卒太子昭早死立其弟懐公晉桃李冬實竹書魯季孫㑹晉幽公于楚丘竹書考王崩子威烈王午立衞公子亹弑其君昭公而自立是為懷公周河南恵公復封其少子班于鞏以奉王是為東周君秦庶長鼂與大臣攻其君懷公公自殺立太子昭子之子昭子未立早死是為靈公晉趙襄子無恤卒襄子娶空同氏生五子襄子以伯魯之不立也不欲立已子欲傳伯魯子代成君成君先死乃取代成君子浣立為世子以兄伯魯孫浣為後襄子弟嘉逐浣而自立于代是為桓子世本云襄子之子桓公與史不同晉韓康子卒子啓章代是為武子晉魏桓子駒卒子斯代是為文侯世家云桓子之孫曰文侯都周魯晉衛鄭齊秦宋楚燕越魏韓趙魏文侯韓武子趙桓子始列于諸侯皆稱元年鄭共公卒子幽公已立一載上年晉趙桓子嘉卒國人殺其子迎浣復位是為獻侯晉韓武子伐鄭殺其君幽公鄭立幽公弟駘年表作幽公子是為繻公晉大旱地生鹽竹書秦作上下畤于呉陽上畤祭黄帝下畤祭炎帝晉丹水出反潔竹書盗殺晉幽公公滛婦人夜竊出邑中夫人秦嬴賊公于髙寢魏文侯誅亂者立幽公弟止一作幽公子是為烈公此與竹書合年一載威烈王四魏斯城少梁秦擊之趙獻侯城泫氏韓武子都平陽秦與魏戰于少梁楚滅郯此據外紀竹書謂郯為越所滅趙城平邑竹書魏復城少梁以備秦也秦城塹河頻以備魏也秦初以君主妻河楚人伐晉南鄙至于上洛竹書秦補龎城城籍姑以備魏也少梁籍姑二城南北對壘秦靈公卒子獻公師隰不得立立靈公季父悼子是為簡公簡公是厲共公之孫懷公之子昭子之弟衞公子頽弑懷公而自立是為慎公敬公之孫公子適之子也田公子居思伐邯鄲圍平邑竹書是田公子疑魏臣於越滅滕竹書康按滕滅矣而孟子時尚有滕則知滕未滅也攷說苑宋王偃欲覇天下起兵滅滕則滕之滅當在宋偃之末年中山武公初立徐廣云周定王之孫西周桓公之子後為趙所滅於越子朱勾伐郯以郯子鴣歸竹書齊田襄子盤卒一載定王十六年子白代是為莊子相齊宣公齊田白伐晉毁黄城圍陽狐秦與晉戰于鄭下秦人敗績晉河岸崩壅龍門至于底柱春秋後河患始此齊田白伐魯莒及安陽世家莒作葛陽作陵晉魏斯使其子擊圍繁龎出其民越王翁卒即朱勾子王翳立竹書同晉趙氏城平邑齊田白伐魯取一城年表作取都日蝕齊田莊子白卒子和立是為太公相齊宣公齊田盻及邯鄲韓舉戰于平邑邯鄲之師敗遂獲韓舉取平邑新城盻一作汾邯鄲趙邑竹書秦初令吏帶劍晉魏斯伐秦築臨晉元里晉韓武子啓章卒子䖍代是為景侯晉趙獻子浣卒獻子追稱獻侯子籍代是為烈侯田悼子卒田布殺其大夫公孫孫公孫孫以廪丘叛于趙田布圍廪丘翟角趙孔屑韓氏救廪丘及田布戰于龍澤田師敗逋竹書卒索隠云田莊子明年立田悼子悼子卒乃次立田和是莊子後有悼子盖立年無㡬所以史記不録晉魏斯伐宋使樂羊伐中山克之以子擊守之趙倉唐為傅秦塹洛城重泉齊田和伐魯取郕秦初租禾晉魏斯伐秦至鄭而還築雒陽合陽竹書雒作汾合作郃楚簡王卒子聲王當立魯元公卒子穆公顯立秦初令百姓𢃄劍晉韓䖍伐鄭取雍丘鄭城京以備韓也王命韓景子趙烈子及魏師伐齊入長垣竹書晉魏斯尊禮卜子夏田子方段干木過段干木之廬常式齊侯鄭伯㑹于西城鄭敗韓于負黍齊田和伐衞取毌毋音貫丹年表毌丘作陽晉魏斯以呉起西河守西門豹為鄴令李悝為上地守魯穆公尊禮孔伋以公儀休為相泄栁申詳為臣一載威烈王十七年齊宣公卒子康公貸立齊田㑹以廪丘反叛田氏也晉魏斯以魏成為相晉趙籍以公仲連為相宋昭公卒或云立六十五年子悼公購由立春秋戰國異辭卷首上
