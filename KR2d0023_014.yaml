body:
  text: 春秋戰國異辭卷十二右春坊右諭德陳厚耀撰衛史衛世家康叔名封周武王同母少弟也周公旦以成王命封康叔為衛君居河淇間故商墟成王長用事舉康叔為周司冦賜衛寶祭器以章有德康叔卒子康伯代立康伯卒子考伯立考伯卒子嗣伯立嗣伯卒子􅕆伯立􅕆音捷􅕆伯卒子靖伯立靖伯卒子貞伯立貞伯卒子頃侯立頃侯厚賂周夷王夷王命衛為侯頃侯立十二年卒子釐侯立釐侯十三年周厲王出奔于彘共和行政焉二十八年周宣王立四十二年釐侯卒太子共伯餘立為君共伯弟和有寵于釐侯多豫之賂和以其賂賂士以襲攻共伯于墓上共伯入釐侯羡自殺衛人因葬之釐侯旁諡曰共伯而立和為諸侯是為武公史衛世家語索隱曰按季札美康叔武公之德國稱武公為睿聖又詩著衛世子共伯早卒不云被殺若武公殺兄而立豈可以為訓而形之于國史乎蓋太史公採雜説而為此記耳武公武公即位修康叔之政百姓和集四十二年犬戎殺周幽王武公將兵往佐周平戎甚有功周平王命武公為公以上史衛世家衛人美武公之德有文章又能聼規諫以禮自防故能入相於周而作淇奧之詩詩序詩傳衛武公好學明德國人美之賦淇奧衛武公飲酒悔過賦賓之初筵詩傳自詩説云衛武公警之詩詩序賓之初筵衛武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫佚武公既入而作是詩衛武公自警兼訓國人賦懿戒即抑詩以詩傳詩説同詩序為衛武公刺厲王亦以自警之詩衛武公年九十有五猶針警于國曰自卿以下至于師長士茍在朝者無謂我老耄而舍我必交戒訓導我在輿有旅賁之規位寧有官師之典倚几有誦訓之諫居寢有􅉏御之針臨事有瞽史之道宴居有師工之誦史不失書矇不失誦以訓御之于是乎作懿戒以自警懿讀為抑大雅抑詩及其沒也謂之􅌖聖武公通鑑前編約國語文五十五年卒子莊公揚立史衛世家莊公衛莊公不能繼先公之業使賢者退而窮處作考槃以以刺之詩序詩傳鄘人美其君子不仕亂邦賦考槃子曰見遁世而無悶矣詩説美隱者之詩莊公五年取齊女為夫人好而無子又取陳女為夫人生子早死陳女女弟亦幸于莊公而生子完完母死莊公令夫人齊女子之立為太子莊公有寵妾生州吁史衛世家約左氏文列女傳齊女為衛莊公夫人號曰莊薑始往操行衰惰心淫佚冶容傅母見其婦道不正諭之云子之家世世尊榮當為民法則子之質聰達於事當為人表式儀貌莊麗不可不修整衣錦絅裳飾在輿馬是不貴德也乃作詩曰碩人其頎衣錦絅衣衛侯之妻東宫之妹邢侯之姨談公維私砥厲女以髙節女遂感而自修君子善傅母之防未然也與毛詩異見下十八年州吁長好兵莊公使將石碏諫莊公曰庶子好兵使將亂將自此起不聼史衛世家約左氏文衛莊公之嬖人生州吁好兵莊薑憂之賦菉衣詩傳同詩説詩序緑衣衛莊薑傷已也妾上僭夫人失位而作是詩莊薑見怒于公賦終風詩傳詩説莊薑戒州吁公不悅薑憂而作此詩詩序終風莊薑傷已也遭州吁之暴見侮而不能正也衛莊公惑于嬖妾使驕上僭莊薑賢而不答終以無子國人閔而憂之賦碩人詩序略詩傳詩説同二十三年莊公卒太子完立是為桓公史衛世家桓公州吁桓公二年弟州吁驕奢桓公絀之州吁出奔史衛世家史記十三年鄭伯弟假攻其兄不勝亡而州吁求與之友十六年州吁收聚衛亡人以襲殺桓公州吁自立為衛君為鄭伯弟段欲伐鄭請宋陳蔡與俱三國皆許州吁史衛世家衛州吁弒其君桓公莊薑歸于齊賦日月詩傳詩説州吁弒桓公莊薑大歸而作詩序日月衛莊薑傷已也遭州吁之難傷已不見答于先君以至困窮之詩戴媯歸于陳莊薑贈之于野賦燕燕詩傳薑詩説云燕燕莊與弟戴媯皆為州吁所逐同出衛野而别莊薑作詩以贈媯焉詩序燕燕衛莊薑送歸妾也州吁求寵於諸侯使公孫文仲帥師及宋公陳侯魯人蔡人伐鄭衛人怨之賦擊鼓詩傳同詩説略詩序擊鼓怨州吁也州吁用兵暴亂使公孫文仲將而平陳與宋國人怨其勇而無禮也事見春秋隱四年州吁新立好兵弒桓公衛人皆不愛石碏乃因桓公母家於陳佯為善州吁至鄭郊石碏與陳侯共謀使右宰醜進食因殺州吁於濮而迎桓公弟晉于邢而立之是為宣公史衛世家約左氏文宣公衛宣公為子伋娶婦而美作新臺于河上而要之國人惡之作新臺之詩詩序同詩傳詩説亦新作親衛宣公淫亂不恤國事軍旅數起大夫久役男女怨曠國人患之而作雄雉之詩詩序諫詩傳詩説皆以為弼之臣管叔而作此詩也衛宣公與夫人並為淫亂作匏有苦葉刺之詩序説詩傳詩皆以為弼人刺管叔之詩宣薑不間于禮衛人風之賦君子偕老詩傳宣詩説亦云刺薑之詩詩序衛夫人淫亂失事君之道故陳人君之德服飾之盛宜與君子偕老也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其配耦故作氓詩以序其事而諷焉美反正刺淫佚也詩序詩傳女歸無禮衰而見棄賦氓詩説淫婦為人所棄鄘人述其事以刺之衛人化其上淫於新昏而棄其舊室夫婦離絶國俗傷敗作谷風以刺之詩序詩傳良婦棄于夫賦谷風詩説谷風弼之良婦見棄於夫而作衛之男女失時喪其配耦故賦有狐以刺之詩序詩傳國亂民貧君子傷之賦有狐子曰見惻隱之仁焉詩説君子于寒夜見貧民與狐涉水而傷之衛宣公之子伋也壽也朔也伋前母子壽與朔後母子後母與朔欲殺太子伋而立壽使人與伋乘舟于河中將沈而殺之壽知不能止也因與之同舟舟人不得殺伋方乘舟時伋傅母恐其死也閔而作詩二子乘舟之詩是也其詩曰二子乘舟泛泛其景願言思子中心養養於是壽閔其兄之且見害作憂思之詩黍離之詩是也其詩曰行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉又使伋之齊將使盜見載旌要而殺之壽止伋伋曰棄父之命非子道也不可壽又與之偕行壽之母知不能止也因戒之曰壽無為前也壽又竊伋旌以先行幾及齊盜見而殺之伋至見壽之死痛之遂載其尸還至境而自殺新序卷七以黍離為壽所作大異初衛宣公愛夫人夷薑生子伋以為太子而令右公子傅之右公子為太子取齊女未入室而宣公見所欲為太子婦者好説而自取之更為太子取他女宣公得齊女生子壽子朔令左公子傅之左右媵之子因以為號太子伋母死宣公正夫人即齊女與朔共讒惡太子伋宣公自以其奪太子妻也心惡太子欲廢之及聞其惡大怒乃使太子伋于齊而令盜遮界上殺之與太子白旄而告界盜見持白旄者殺之且行子朔之兄壽太子異母弟也知朔之惡太子而君欲殺之乃謂太子曰太子可毋行太子曰逆父命求生不可遂行壽乃盜其白旄而先馳至界界盜見其驗即殺之壽已死而太子伋又至謂盜曰所當殺乃我也盜并殺太子伋以報宣公宣公十八年事宣公乃以子朔為太子史衛世家衛宣公之二子爭相為死國人傷而思之作二子乘舟之詩詩序詩傳宣公殺其世子伋及母弟壽衛人傷之賦二子乘舟詩説宣公欲立少子朔使伋壽如齊而沈之于河衛人傷之而作是詩十九年宣公卒太子朔立是為惠公史衛世家惠公宣薑召公子頑于公桑久處而逺送之國人刺之作采唐詩説詩序桑中刺奔也衛之公室淫亂男女相奔至於世族在位相竊妻妾期於幽逺政散民離而不可止詩傳亦云公室無禮衛人刺之公子頑通乎君母國人疾之而不可道作牆有茨詩序詩傳詩説皆以為鄘人刺三監之詩衛昭伯無禮於宣薑國人惡之作鶉之奔奔詩傳云詩説亦刺宣薑與公子頑之詩詩序鶉之奔奔刺衛宣薑也衛人以為宣薑鶉鵲之不若也惠公驕而無禮大夫刺之賦芄蘭詩序以詩説云刺霍叔也童子偕成人之服比其不度德量力而助武庚作亂詩傳云童子不遜鄘人刺之賦芄蘭左右公子不平朔之立也惠公四年乃作亂攻惠公立太子伋之弟黔牟為君惠公奔齊黔牟立八年齊襄公率諸侯奉王命共伐衛納惠公誅左右公子衛君黔牟奔周惠公復立惠公立三年出亡亡八年復入與前通凡十三年矣史衛世家繹史春秋諸侯逆王命此云奉王命誤也又按左氏朔立四年出亡亡八年復入通年十二年此云十三年既與左氏不同復與上數不合年表十年復入也石駘音苔仲子卒無嫡子有庶子六人卜所以為後者曰卜人之言沐浴佩玉則兆五人皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也檀弓下當石祁子見左莊公十二年衛惠公十八年二十五年惠公怨周之容舍黔牟與燕伐周周惠王奔溫衛燕立惠王弟頺為王二十九年鄭復納惠王三十一年惠公卒子懿公赤立史衛世家懿公懿公即位好鶴淫樂奢侈九年翟伐衛衛懿公欲發兵兵或畔大臣言曰君好鶴鶴可令擊翟於是遂入殺懿公史衛世家衛懿公喜鶴鶴有飾以文繡而乘軒者賦斂繁多而不顧其民貴優而輕大臣群臣或諫則面叱之及翟伐衛冦挾城堞矣衛君垂泣而拜其臣民曰冦迫矣士民其勉之士民曰君亦使君之貴優將君之愛鶴以為君戰矣我儕棄人也安能守戰乃潰門而出走翟冦遂入衛君奔死遂喪其國新書卷之六衛懿公之時有臣曰𢎞演者受命而使未反而狄人攻衛於是懿公欲興師迎之其民皆曰君之所貴而有祿位者鶴也所愛者宫人也亦使鶴與宫人戰余安能戰遂潰而皆去狄人至攻懿公於熒澤殺之盡食其肉獨舍其肝𢎞演至報使於肝辭畢呼天而號盡哀而止曰臣請為表表一作襮遂自刳出腹實內懿公之肝乃死桓公聞之曰衛之亡也以無道也今有臣若此不可不存於是復立衛於楚丘韓詩卷七吕又新序卷八又覽忠廉戴公文公懿公之立也百姓大臣皆不服自懿公父惠公朔之讒殺太子伋代立至于懿公常欲敗之卒滅惠公之後而更立黔牟之弟昭伯頑之子申為君是為戴公戴公申元年卒齊桓公以衛數亂乃率諸侯伐翟為衛築楚丘立戴公弟燬為君是為文公賈誼書曰衛侯朝于周周行人問其名答曰衛侯辟疆行人還之曰啓疆辟疆天子之號諸侯弗得用衛侯更其名曰燬然後受之又見韓非子外儲右文公以亂故奔齊齊人入之初翟殺懿公也衛人思復立前太子伋之後伋子又死而代伋死者子壽又無子太子伋同母弟二人其一曰黔牟黔牟嘗代惠公為君八年復去其二曰昭伯昭伯黔牟皆已前死故立昭伯子申為戴公戴公卒復立其弟燬為文公文公立輕賦平罪身自勞與百姓同苦以收衛民史衛世家衛懿公為狄人所滅國人分散露于漕邑許穆公夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦載馳之詩詩序同詩説詩傳狄入衛衛戴公次于漕許穆姬閔之賦載馳詩序載馳許穆夫人作也閔其宗國顛覆自傷不能救也衛懿公為狄人所滅國人分散露于漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也列女傳許穆夫人者衛懿公之女初許求之齊亦求之懿公將與許女因其傅母而言曰古者諸侯之有女子也所以繫援於大國也今許小而逺齊大而近如使邊境有冦戎之事控告大國妾在不猶愈乎衛侯不聼其後翟人攻衛大破之而許不能救許夫人馳驅而弔唁衛侯因疾之而作詩君子善其慈惠而逺識也許穆夫人非懿公女衛有狄人之難出處于漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之賦木瓜詩序贈詩傳云朋友相賦木瓜子曰見苞苴之禮行焉詩説亦同衛為狄所滅東徙渡河野處漕邑齊桓公攘戎狄而封之文公徙居楚丘始建城市而營宫室得其時制百姓説之國家殷富焉作定之方中美文公也詩序以詩傳詩説為美魯僖公之詩曰楚宫入魯頌衛文公臣子多好善賢者樂告以善道國人賦干旄以美之詩序美詩傳衛武公好賢與善國人之賦干旄詩説同衛文公能以道化其民淫奔之恥國人不齒也作蝃蝀詩序為詩傳詩説皆謂刺靈公南子召宋朝之事衛文公能正其群臣作相鼠以刺在位承先君之化無禮義也詩序人詩傳詩説皆以為鄘刺三叔之詩文公十六年晉公子重耳過無禮史衛世家十七年齊桓公卒史衛世家二十五年文公卒子成公鄭立史衛世家成公成公三年晉欲假道於衛救宋成公不許晉更從南河渡救宋徴師於衛衛大夫欲許成公不肯大夫元咺攻成公成公出奔晉文公伐衛分其地豫宋討前過無禮及不救宋患也元咺立公子瑕成公遂出奔陳二歲如周求入與晉文公會晉使人鴆成公成公私於周主鴆令薄得不死已而周為請于晉文公卒入之衛而誅元咺衛君瑕出奔史衛世家異約左氏文小成公六年徙濮陽世本七年晉文公卒十二年成公朝晉襄公史衛世家三十五年成公卒子穆公遫立史衛世家穆公狄人迫逐黎侯黎侯寓于衛衛穆公時衛不能修方伯連率之職黎之臣子作旄丘之詩以責之黎侯寓於衛其臣勸之以歸作式微之詩詩序詩序式微黎侯寓于衛其臣勸以歸也旄丘責衛伯也狄人迫逐黎侯黎侯寓于衛衛不能修方伯連率之職黎之臣子以責於衛也按左傳魯宣公十六年晉滅赤狄數之以其奪黎氏地與此吻合但彼在衛穆公時去宣公逺矣或黎氏世受狄害不得強合為一事也詩傳狄逐黎侯黎侯出奔衛衛穆公不禮焉黎人怨之賦旄丘黎大夫勸其君以歸國賦式微詩説略同衛侯之女為黎莊公夫人既往而不同欲未嘗得見甚不得意其傅母憫夫人之賢而不見納又恐其已見遣而不以時去謂夫人曰夫婦之道有義則合無義則去今不得意胡不去乎乃作詩曰式微式微胡不歸夫人曰婦人之道一而已矣彼雖不吾以吾何可以離於婦道乎乃作詩曰微君之故胡為乎中路終執貞一不違婦道以俟君命列女傳别與詩序穆公十一年孫良夫救魯伐齊復得侵地穆公卒子定公臧立史衛世家新書禮天子之樂宫縣諸侯之樂軒縣大夫直縣士有琴瑟叔于奚者衛之大夫也曲縣者衛君之樂禮也繁纓者君之駕飾也齊人攻衛叔于奚率師逆之衛穆公十一年大敗齊師衛於是賞以溫叔于奚辭溫而請曲縣繁纓以朝衛君許之孔子聞之曰惜也不如多與之邑夫樂者所以載國國者所以載君彼樂亡而禮從之禮亡而政從之政亡而國從之國亡而君從之惜也不如多與之邑定公定公十二年卒子獻公衎立史衛世家定薑者衛定公之夫人公子之母也公子既娶而死其婦無子定薑歸其婦而自送之至於野乃賦詩曰燕燕于飛差池其羽之子于歸逺送於野瞻望不及泣涕如雨送去歸泣而望之又作詩曰先君之思以朂寡人君子謂定薑為慈姑列女傳釋坊記注亦以為定薑詩與毛傳異文曰此是魯詩非衛詩獻公十三年公令師曹教宫妾鼓琴妾不善曹笞之妾以幸惡曹於公公亦笞曹三百十八年公戒孫文子寧惠子食皆往日旰不召而去射鴻於囿二子從之公不釋射服與之言二子怒如宿亦音戚孫文子子數侍公飲使師曹歌巧言之卒章師曹又怒公之嘗笞三百乃歌之欲以怒孫文子報衛獻公文子語蘧伯玉伯玉曰臣不知也遂攻出獻公獻公奔齊齊置獻公于聚邑孫文子寧惠子共立定公弟秋為衛君是為殤公左傳作公孫剽又徐廣云獻公弟焱殤公立封孫文子林父于宿史衛世家吕覽慎小衛獻公戒孫林父寧殖食鴻集于囿虞人以告公如囿射鴻二子待君日宴公不至來不釋皮冠而見二子二子不説逐獻公立公子黚公子黚乃靈公太子蒯聵之弟于獻公為曾孫黚字誤孔叢子子貢問曰昔孫文子以衛侯哭之不哀知其將為亂不敢舍其重器而行盡置諸戚而善晉大夫二十人詳左傳成公七年或稱其知何如孔子曰人知其為知也吾未知其為知也子貢曰敢問何謂也子曰食其祿者必死其事孫子知衛君之將不君不念伏死以爭而纍規去就尸利攜二非人臣也臣而有不臣之心明君所不赦幸哉孫子之以此免戮也殤公十二年寧喜與孫林父爭寵相惡殤公使寧喜攻孫林父林父奔晉復求入故衛獻公獻公在齊齊景公聞之與衛獻公如晉求入晉為伐衛誘與盟衛殤公會晉平公平公執殤公與寧喜而復入衛獻公獻公亡在外十二年而入史衛世家約左氏文衛獻公出奔反於衛及郊將班邑于從者而後入柳莊曰柳莊衛太史如皆守社稷則孰執羈靮而從如皆從則孰守社稷君反其國而有私也毋乃不可乎弗果班以上亦見韓詩卷七及柳莊寢疾公曰若疾革雖當祭必告及其死也果當祭時公再拜稽首請于尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以禭之與之邑裘氏與縣潘氏書而納諸棺曰世世萬子孫毋變也檀弓下獻公後元年誅寧喜史衛世家新語春秋書衛侯之弟鱄出奔晉衛獻公後元年書鱄絶骨肉之親棄大夫之位越先人之境附他人之域窮涉寒飢織履而食不明之效也衛獻公後三年吳延陵季子使過衛見蘧伯玉史鰌曰衛多君子其國無故過宿孫林父為擊磬曰不樂音大悲使衛亂乃此矣是年獻公卒子襄公惡立史衛世家襄公六年楚靈王會諸侯襄公稱病不往史衛世家九年襄公卒初襄公有賤妾幸之有身夢有人謂曰我康叔也令若子必有衛名而子曰元妾怪之問孔成子成子曰康叔者衛祖也及生子男也以告襄公襄公曰天所置也名之曰元襄公夫人無子於是乃立元為嗣是為靈公史衛世家靈公五年朝晉昭公六年楚公子棄疾弒靈王自立為平王十一年火史衛世家衛靈公問于史鰌曰政孰為務對曰大理為務聼獄不中死者不可生也斷者不可屬也故曰大理為務少焉子路見公公以史鰌言告之子路曰司馬為務兩國有難兩軍相當司馬執枹以行之一鬭不當死者數萬以殺人為非也此其為殺人亦衆矣故曰司馬為務少焉子貢入見公以二子言告之子貢曰不識哉昔禹與有扈氏戰三陳而不服禹於是修教一年而有扈氏請服故曰去民之所事奚獄之所聼兵革之不陳奚鼓之所鳴故曰教為務也説苑政理王孫子衛靈公坐重華之臺侍御數百隨後照日羅衣從風仲叔敖入諫曰昔桀紂行此而亡今四境內侵諸侯加兵土地日削百姓乖離今君內寵無乃太盛與靈公再拜曰寡人過矣微子之言社稷幾傾於是出宫女之不進者數百人百姓大説王孫子昔衛君衛靈公重裘纍茵而坐見路有負薪而哭之者問曰何故也對曰雪下衣薄是以哭之於是衛君懼見於顔色曰為君而不知民孰以我為君於是開府金出倉粟以賑貧窮衛靈公天寒鑿池宛春諫曰天寒起役恐傷民公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒今民衣敝不補履決不組一作苴君則不寒矣民則寒矣公曰善令罷役左右諫曰君鑿池不知天之寒也而春也知之以春之知之也而令罷之德將歸于春也而怨將歸於君公曰不然夫春也魯國之匹夫也而我舉之民未有見焉今將令民以此見之曰春也有善寡人有春之善非寡人之善歟吕覽分職六又新序卷衛靈公之時蘧伯玉賢而不用彌子瑕不肖而任事衛大夫史鰌患之數以諫靈公而不聼史鰌病且死謂其子曰我即死治喪於北堂吾不能進蘧伯玉而退彌子瑕是不能正君也生不能正君者死不當成禮置尸北堂於吾足矣史鰌死靈公往弔見喪在北堂問其故其子以其父言對靈公蹴然易容寤然失位曰夫子生欲進賢而退不肖死且不懈又以尸諫可謂忠而不衰矣乃召蘧伯玉而進以為卿退彌子瑕徙喪正堂成禮而後返新序卷一韓詩卷七云生以身諫死以尸諫可謂直矣家語史魚病將卒命其子曰吾在衛朝不能進蘧伯玉退彌子瑕是吾為臣不能正君也生而不能正君則死無以成禮我死汝置尸牖下於我畢矣其子從之靈公弔焉怪而問焉其子以其父言告公公愕然失容曰是寡人之過也於是命之殯於客位進蘧伯玉而用之退彌子瑕而逺之孔子聞之曰古之列諫者死則已矣未有若史魚死而尸諫感其君者也不可謂直乎淮南子蘧伯玉為相子貢往觀之曰何以治國曰以弗治治之簡子欲伐衛使史黯往覿焉還報曰蘧伯玉為相未可以加兵固塞險阻何足以致之淮南子蘧伯玉年五十而知四十九年非何者先者難為之而後者易為攻也莊子蘧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也未知今之所謂是之非五十九非也萬物有乎生而莫見其根有乎出而莫見其門人皆尊其知之所知而莫知恃其知之所不知而後知可不謂大疑乎已乎已乎且無所逃此則所謂然與然乎韓詩外傳外寬而內直自設於隱括之中直已不直人善廢而不悒悒蘧伯玉之行也故為人父者則願以為子為人子者則願以為父為人君者則願以為臣為人臣者則願以為君名昭諸侯天下願焉詩曰彼其之子邦之彥兮此君子之行也説苑魯哀公問於孔子曰當今之時君子誰賢對曰衛靈公公曰吾聞之其閨門之內姑姊妹無别對曰臣觀於朝廷未觀於堂陛之間也靈公之弟曰公子渠牟其知足以治千乘之國其信足以守之而靈公愛之又有士曰王林國有賢人必進而任之無不達也不能達退而與分其祿而靈公尊之又有士曰慶足國有大事則進而治之無不濟也而靈公説之史鰌去衛靈公邸舍三月琴瑟不御待史鰌之入也而後入臣是以知其賢也説苑蘧伯玉使至楚逢公子晳濮水之上子晳接草而待曰敢問上客將何之蘧伯玉為之軾車公子晳曰吾聞上士可以託色中士可以託辭下士可以託財三者固可得而託邪蘧伯玉曰謹受命蘧伯玉見楚王使事畢坐談語從容言至於士楚王曰何國最多士蘧伯玉曰楚最多士楚王大悅蘧伯玉曰楚最多士而楚不能用王造然曰是何言也蘧伯玉曰伍子胥生於楚逃之吳吳受而相之發兵攻楚墮平王之墓伍子胥生於楚吳善用之釁蚠黃生於楚走之晉治七十二縣道不拾遺民不妄得城郭不閉國無盜賊蚠黃生於楚而晉善用之今者臣之來逢公子晳濮水之上辭言上士可以託色中士可以託辭下士可以託財以言三者固可得而託身邪又不知公子晳將何治也於是楚王發使一駟副使二乘追公子晳濮水之上子晳還重於楚蘧伯玉之力也故詩曰誰能烹魚溉之釜鬵誰將西歸懷之好音此之謂也物之相得固微甚矣與聲子椒舉事同疑即其事而誤也聲子事詳左傳顔闔將傅衛靈公太子而問於蘧伯玉曰其德天殺音晒所賦最薄與之為無方則危吾國與之為有方則危吾身與許也方正則也其知適足以知人之過而不知其所以過若然者吾奈之何蘧伯玉曰善哉問乎戒之慎之正汝身哉形莫若就將順于外心莫若和調停于內雖然之二者有患就不欲入和不欲出形就而入且為顛為滅為崩為蹶心和而出且為聲為名為妖為孽彼且為嬰兒亦與之為嬰兒彼且為無町畦亦與之為無町畦彼且為無崖亦與之為無崖嬰兒童心好㺯也無町畦不循法制也無崖甘處卑汚也六句是就而不入妙用達之入於無疵此句是和而不出妙用汝不知夫螳螂乎怒其臂以當車轍不知其不勝任也是其才之美也戒之慎之積伐而美者以犯之幾矣汝不知夫飬虎者乎不敢以生物與之為其殺之之怒也不敢全物與之為其決之之怒也時其飢飽達其怒心虎之與人異類而媚養已者順也故其殺者逆也夫愛馬者以筐盛矢糞也以蜄盛溺適有蚉虻僕緣而拊之不時則缺銜毁首碎胸意有所至而愛有所亡可不慎邪莊子人間世衛靈公之時彌子瑕有寵専於衛國侏儒有見公者曰臣之夢踐矣公曰何夢對曰夢見竈為見公也公怒曰吾聞見人主者夢見日奚為見寡人而夢見竈對曰夫日兼燭天下一物不能擁也人主兼燭一國一人不能擁也故將見人主者夢見日夫竈一人煬焉則後人無從見矣今或者一人有煬君者乎則臣雖夢見竈不亦可乎遂退雍鉏彌子瑕而用司空徇韓子內儲上與又韓子難四國䇿稍異韓非子侏儒善假於夢以見主道矣然靈公不知侏儒之言也去雍鉏退彌子瑕而用司空徇者是去所愛而用所賢也鄭子都賢慶建而壅焉燕之噲賢子之而壅焉夫去所愛而用所賢未免使一人煬已也不肖者煬主不足以害明今不加知而使賢者煬已則必危矣或曰屈到嗜芰文王嗜菖蒲葅非正味也而二賢尚之所味不必美晉靈侯説參無恤燕噲賢子之之非正士也而二君尊之所賢不必賢也非賢而用之與愛而用之同賢誠賢而舉之與用所愛異狀故楚莊舉孫叔而霸商辛用費仲而滅此皆用所賢而事相反也燕噲雖舉所賢而同於用所愛衛奚距然哉則侏儒之未見也君壅而不知其壅也已見之後而知其壅也故退壅臣是加知之也曰不加知而使賢者煬已則必危而今已加知矣則雖煬已必不危矣彌子瑕有寵於衛君衛國之法竊駕君車者罪刖彌子瑕母病人聞往夜告彌子彌子矯駕君車以出君聞而賢之曰孝哉為母之故忘其則罪異日與君遊於果園食桃而甘不盡以其半啖君君曰愛我哉忘其口味以啖寡人及彌子色衰愛弛得罪於君君曰是固嘗矯駕吾車又嘗啖我以餘桃故彌子之行未變於初也而前之見賢而後獲罪者愛憎之變也韓子説難言又説苑難蘧伯玉為人恭儉篤禮夜行過公門必下靈公嘗與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公謂夫人曰知車為誰夫人曰必蘧伯玉也公曰何以知之夫人曰伯玉衛之篤禮者也夫禮下公門式路馬今車當闕無聲是下公門也敬於事上必不暗行廢禮公使問之果伯玉也孟儀同載恭合列女傳見類函敬下列女傳衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭變節不為冥冥墮行蘧伯玉衛之賢大夫也仁而有智敬以事上此其人必不以暗昧廢禮是以知之公使視之果伯玉也公反之以戲夫人曰非也夫人酌觴再拜賀公公曰子何以賀寡人夫人曰始妾獨以衛為有蘧伯玉爾今衛復有與之齊者是君有二臣也國多賢臣國之福也妾是以賀公驚曰善哉遂語夫人其實焉按夫人即南子耳列蓋傳記此於仁智而别記南子於嬖孽則此夫人在南子前非一人可知師涓出於衛靈公之世寫列代之樂造新曲以代古樂故有四時之樂春有離鴻去鴈應蘋之歌夏有明晨焦泉之華流金之調秋有商風白雲落葉吹蓬之曲冬有凝河流隂沈雲之操以此四時之聲奏於靈公靈公情湎心惑忘于政事蘧伯玉趨階而諫曰此雖以發揚氣律終為沈湎淫漫之音無合于風雅非下臣宜薦于君也靈公乃去其聲而親政務故衛人美其化焉師涓悔其乖于雅頌失為臣之道乃退而隱迹蘧伯玉焚其樂器於九達之衢恐後世傳造焉拾遺記時事周靈王北宫奢為衛靈公賦斂以為鐘為壇乎郭門之外三月而成上下之縣王子慶忌見而問焉曰子何術之設奢曰一之間無敢設也奢聞之既雕既琢復歸于朴侗乎其無識儻乎其怠疑萃乎芒乎其送往而迎來來者勿禁往者勿止從其強梁隨其曲附因其自窮故朝夕賦斂而毫毛不挫而况有大塗者乎莊子山木地志開州衛靈公嘗坐重華臺上侍者數百人仲叔圉諫曰昔桀紂行此而亡今君寵妾無乃盛歟靈公出之民大悅衛靈公有臣公孫吕身長七尺面長三尺廣三寸鼻目耳具而名動天下荀子非相篇趙簡子使成何涉他與衛靈公盟于剸澤靈公三十一年靈公未喋盟成何涉他捘靈公之手而樽之靈公怒欲反趙王孫商曰君欲反趙不如與百姓同惡之公曰若何對曰請命臣令于國曰有姑姊妹女者家一人質于趙百姓必怨君因返之矣君曰善乃令之三日遂徴之五日而令畢國人巷哭君乃召國大夫而謀曰趙為無道反之可乎大夫皆曰可乃出西門閉東門趙氏聞之縳涉他而斬之以謝于衛成何走燕説苑權謀説苑子貢曰王孫商可謂善謀矣憎人而能害之有患而能處之欲用民而能附之一舉而三物俱至可謂善謀矣趙簡子使人以明白之乘六先以一璧為遺于衛衛叔文子曰見不意可以生故此小之所以事大也今我未以往而簡子先以來必有故于是斬林除圍聚斂蓄積而後遣使者簡子曰吾舉也為不可知也今既已知之矣乃輟圍衛也説苑權謀公叔文子問于史叟曰武子勝事趙簡子久矣其寵不解奚也史叟曰武子勝博聞多能而位賤君親而近之致敏以遜藐而疏之則恭而無怨色入與謀國家出不見其寵君賜之祿知足而辭故能久也説苑臣術公叔文子升于瑕丘蘧伯玉從文子曰樂哉斯丘也死則我欲葬焉蘧伯玉曰吾子樂之則瑗請前檀弓上公世本衛叔文子作輗軸公叔文子卒靈公三十八年其子戌請諡于君靈公曰日月有時將葬矣請所以易其名者君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聼衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子檀弓下説苑衛叔孫文子問於王孫夏曰吾先君之廟小吾欲更之可乎對曰古之君子以儉為禮今之君子以汰易之夫衛國雖貧豈無文履一竒以易十稷之繡哉以為非禮也文子乃止三十八年孔子來祿之如魯後有隙孔子去後復來史衛世家孔子去魯遂適衛靈公三十八年主于子路妻兄顔濁鄒家衛靈公問孔子居魯得祿幾何對曰奉粟六萬衛人亦致粟六萬居頃之或譛孔子于衛靈公靈公使公孫余假一出一入孔子恐獲罪焉居十月去衛孔子去衛將適陳過匡顔刻為僕以其䇿指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽嘗暴匡人孔子狀類陽虎匡人以甲士圍孔子子路怒奮戟將與戰孔子止之曰惡有修仁義而不免世俗之惡者乎夫詩書之不講禮樂之不習是丘之過也若以述先王好古法而為咎者則非丘之罪也命夫歌豫和汝子路彈琴而歌孔子和之曲三終匡人解甲而罷五日遂去匡即過蒲月餘反乎衛主蘧伯玉家靈公三十九年史記及家語琴操孔子使顔淵執輿到匡郭外顔淵舉䇿指匡穿垣曰往與陽虎正從此入匡人聞其言孔子貌似陽虎告匡君曰往者陽虎今復來至乃令桓魋圍孔子數日不解弟子皆有飢色孔子仰天而嘆曰君子固亦窮乎子路聞孔子之言悲感勃然大怒張目奮劍聲如鐘鼓顧謂二三子曰使吾有此厄也孔子曰由來今汝欲鬭名為戮于天下我為汝悲歌而感之汝皆和我由等唯唯孔子乃引琴而歌音曲甚哀有暴風擊拒軍士偃仆于是匡人乃知孔子聖人瓦解而去孔子返衛衛夫人南子使人謂之曰四方君子來者必見寡小君孔子不得已見之夫人在錦帷中孔子北面稽首夫人自帷中再拜環珮之聲璆然典略詩説蝃蝀衛靈為南子召宋朝國人譏之衛靈公謂孔子曰有語寡人為國家者謹之於廟堂之上而國家治矣其可乎孔子曰可愛人者則人愛之惡人者則人惡之知得之已者亦知得之人所謂不出于環堵之室而知天下者知返之已者也説苑政理孔叢子孔子適衛衛將軍文子問曰吾聞魯公父氏不能聼獄信乎孔子答曰不知其不能也夫公父氏之聼獄有罪者懼無罪者恥文子曰有罪者懼是聼之察刑之當也無罪者恥何乎孔子曰齊之以禮則民恥矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也以刑齊民譬之於御則鞭也執轡於此而動於彼御之良也無轡而用䇿則馬失道矣文子曰以御言之左手執轡右手運䇿不亦速乎若徒轡無䇿馬何懼哉孔子曰吾聞古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛於禮而薄於刑故民從命今也廢禮而尚刑故民彌暴文子曰吳越之俗無禮而亦治何也孔子曰夫吳越之俗男女無别同厠而浴民輕相犯故其刑重而不勝由無禮也中國之教為外內以别男女異器服以殊等類故其民篤而法其刑輕而勝由有禮也孔子居衛月餘靈公與夫人南子同車出而令宦者雍梁梁一作渠參乘使孔子為次乘招搖過市孔子恥之顔刻曰刻一作高夫子何恥之孔子曰詩云覯爾新婚以慰我心乃嘆曰吾未見好德如好色者也于是去衛適曹曹人不答乃適宋與弟子習禮大樹下宋司馬桓魋欲殺孔子拔其樹孔子去適鄭因遂至于陳合史記家語衛靈公晝寢而起志氣益衰使人馳召勇士公孫悁道遭行人卜商卜商曰何馳之疾也對曰公晝寢而起使我召勇士公孫悁子夏曰微悁而勇若悁者可乎御者曰可子夏曰載我而反至君曰使子召勇士何為召儒使者曰行人曰微悁而勇若悁者可乎臣曰可即載與來君曰諾延先生上趣召公孫悁至入門仗劍疾呼曰商下我存若頭子夏顧咄之曰咄內劍吾將與若言勇於是君令內劍而上子夏曰來吾嘗與子從君而西見趙簡子簡子披髮杖矛而見吾君我從十三行之後趨而進曰諸侯相見不宜不朝服不朝服行人卜商將以頸血濺君之服矣使反朝服而見吾君子耶我耶悁曰子也子夏曰子之勇不若我一矣又與子從君而東至阿齊君重鞇而坐吾君單鞇而坐我從十三行之後趨而進曰禮諸侯相見不宜相臨以席揄其一鞇而去之者子耶我耶曰子也子夏曰子之勇不若我二矣又與子從君於囿中於是兩寇肩逐我君拔戈下格而還子耶我耶悁曰子也子夏曰子之勇不若我三矣所貴為士者上攝萬乘下不敢敖乎匹夫外立節矜而敵不侵擾內禁殘害而君不危殆是士之所長君子之所致貴也若夫以長掩短以衆暴寡凌轢無罪之民而成威於閭巷之間者是士之甚毒而君子之所致惡也衆之所誅鋤也夫何以論勇於人主之前哉於是靈公避席抑手曰寡人雖不敏請從先生之勇韓詩卷六衛靈公襜被以與婦人遊子貢見公公曰衛其亡乎對曰昔者夏桀殷紂不任其過故亡成湯文武知任其過故興衛奚其亡也説苑權謀孔子居陳三歲會晉楚爭強更伐陳及吳侵陳陳常被冦于是孔子去陳適衛路出于蒲會公叔氏以蒲叛衛蒲人止孔子弟子有公良儒者為人賢長有勇力以私車從孔子行喟然曰昔吾從夫子遇難于匡伐樹于宋今又遇難于此命也夫與其見夫子仍遇于難寧我鬭死挺劍而合衆將與之戰蒲人懼謂孔子曰茍無適衛吾出子與之盟出孔子東門孔子遂適衛子貢曰盟可負乎孔子曰要盟也神不聼衛靈公聞孔子來喜郊迎問曰蒲可伐乎對曰可公曰吾大夫以為蒲者衛之所以待晉楚也伐之無乃不可乎孔子曰其男子有死之志死不適他國也婦人有保西河之志無戰心也吾所伐者不過四五人靈公曰善然卒不伐蒲靈公老怠於政不用孔子孔子喟然歎曰茍有用我者期月而已三年有成他日靈公又與夫子語見飛雁過而仰視之色不悅孔子乃行將西見趙簡子至於河而復還息乎陬鄉作為陬操以哀之而反乎衛入主蘧伯玉家他日靈公問陳孔子不對明日遂行復如陳而孔子年六十矣合史記家語三十九年太子蒯瞶與靈公夫人南子有惡欲殺南子蒯聵與其徒戲陽遫謀朝使殺夫人戲陽後悔不果蒯瞶數目之夫人覺之懼呼曰太子欲殺我靈公怒太子蒯聵奔宋已而之晉趙氏史衛世家四十二年春靈公遊于郊令子郢僕郢公少子也字子南公怨太子出奔謂郢曰我將立若為後郢對曰郢不足以辱社稷君更圖之夏靈公卒夫人命子郢為太子曰此公命也郢曰亡人太子蒯聵之子輒在也不敢當於是衛乃以輒為君是為出公六月趙簡子欲入蒯瞶乃令陽虎詐命衛十餘人衰絰歸簡子送蒯瞶衛人聞之發兵擊蒯瞶不得入入宿而保衛人亦罷兵史衛世家班固幽通賦序衛靈公太子蒯瞶好帶劍長一丈公諫乃作短者長一尺公知不可以傳國乃逐之博物志衛靈公葬得石槨銘曰不逢箕子靈公奪我里一云不馮其子靈公奪而藏之出公出公先立十二年莊公入立莊公莊公立三年弒出公復入立二十一年衛出公使人問孔子曰寡人之任臣無大小一一自觀察之猶復失人何故答曰如君之言此即所以失之也人既難知非言問所及觀察所盡且人君之慮者多多慮則意不精以不精之意察難知之人宜其有失也君未之聞乎昔者舜臣堯官才任士堯一從之左右曰人君用士當自任耳目而取信于人無乃不可乎堯曰吾之舉舜已耳目之矣今舜所舉人吾又耳目之是則耳目人終無己已也君苟付可付則已不勞而賢才不失矣孔叢子上子貢既學于仲尼退而仕于衛廢著著亦作貯鬻財于曹魯之間七十子之徒賜最為饒益原憲不厭糟粳匿于窮巷子貢結駟連騎束帛之幣以聘享諸侯所至國君無不分庭與之抗禮孔子名布揚于天下者子貢先後之也史貨殖列傳陳子車死于衛其妻與其家大夫謀以殉葬殺人以殉定而后陳子亢至以告曰夫子疾莫養于下請以殉葬子亢曰以殉葬非禮也雖然則彼疾當養者孰若妻與宰得已則吾欲已不得已則吾欲以二子者之為之也於是弗果用檀弓下仲尼問於太史大韜伯常騫狶韋曰夫衛靈公飲酒湛樂不聼國家之政田獵畢弋不應諸侯之際其所以為靈公者何邪大韜曰是因是也言靈本非美諡亦因其荒亂故名之耳伯常蹇曰夫靈公有妻三人同濫而浴史鰌奉御而進所摶幣而扶翼其慢若彼之甚也見賢人若此其肅也是其所以為靈公也狶韋曰夫靈公也死卜葬于故墓不吉卜葬于沙丘而吉掘之數仭得石槨焉洗而視之有銘焉曰不馮其子靈公奪而里之夫靈公之為靈也久矣之二子何足以識之莊子則陽出公輒四年齊田乞弒其君孺子八年齊鮑子弒其君悼公孔子自陳入衛九年孔文子問兵於仲尼仲尼不對其後魯迎仲尼仲尼反魯十二年初孔圉文子取太子蒯瞶之姊生悝孔氏之豎渾良夫美好孔文子卒良夫通於悝母太子在宿悝母使良夫於太子太子與良夫言曰茍能入我國報之以乘軒免子三死毋所與與之盟許以悝母為妻閏月良夫與太子入舍孔氏之外圃昏二人蒙衣而乘宦者羅御如孔氏孔氏之老欒寧問之稱姻妾以告遂入適伯姫氏既食悝母杖戈而先太子與五人介輿猳從之伯姫劫悝於厠強盟之遂劫以登臺欒寧將飲酒炙未熟聞亂使告仲由召護駕乘車行爵食炙奉出公輒奔魯史衛世家衛出公輒奔魯仲由將入遇子羔將出曰門已閉矣子路曰吾姑至焉子羔曰不及莫踐其難子路曰食焉不辟其難子羔遂出子路入及門公孫敢闔門曰毋入為也子路曰是公孫也求利而逃其難由不然利其祿必救其患有使者出子路乃得入曰太子焉用孔悝雖殺之必或繼之且曰太子無勇若燔臺必舍孔叔太子聞之懼下石乞盂黶敵子路以戈擊之割纓子路曰君子死冠不免結纓而死孔子聞衛亂曰嗟乎柴也其來乎由也其死矣孔悝竟立太子蒯瞶是為莊公莊公蒯瞶者出公父也居外怨大夫莫迎立元年即位欲盡誅大臣曰寡人居外久矣子亦嘗聞之乎羣臣欲作亂乃止史衛世家子羔為衛政刖人之足衛之君臣亂子羔走郭門郭門閉刖者守門曰于彼有缺子羔曰君子不踰曰于彼有竇子羔曰君子不遂曰於此有室子羔入追者罷子羔將去謂刖者曰吾不能虧損主之法令而親刖子之足吾在難中此乃子之報怨時也何故逃我刖者曰斷足固我罪也無可奈何君之治臣也傾側法令先後臣以法欲臣之免于法也臣知之獄決罪定臨當論刑君愀然不樂見于顔色臣又知之君豈私臣哉天生仁人之心其固然也此臣之所以脫君也孔子聞之曰善為吏者樹德不善為吏者樹怨公行之也其子羔之謂歟説苑至公韓子外儲左孔子相衛弟子子臯為獄吏刖人足所跀者守門人有惡孔子於衛君者衛君欲執孔子孔子走弟子皆逃子臯出門跀危引之而逃之門下室中吏追不得夜半子臯問跀危曰吾不能虧主之法令而親跀子之足是子報仇之時也而子何故乃肯逃我我何以得此於子跀危曰吾斷足也固吾罪當之不可奈何然方公之欲治臣也公傾側法令先後臣以言欲臣之免也甚而臣知之及獄決罪定公憱然不悅形于顔色臣又知之非私臣而然也夫天性仁心固然也此臣之所以悅而德公也當從家語所載此與家語殊異衛孔悝之鼎銘曰六月丁亥公假于太廟公莊公蒯瞶也公曰叔舅乃祖莊叔七世祖孔達左右成公成公乃命莊叔隨難於漢陽即宫于宗周奔走無射啓右獻公成公曾孫獻公乃命成叔莊叔之孫纂乃祖服乃考文叔文子孔圉興舊嗜欲作慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅豫汝銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于蒸彛鼎祭統衛莊公立欲逐石圃登臺以望見戎州而問之曰是何為者也侍者曰戎戎州也戎州戎之邑也莊公曰我姫姓也戎人安敢居國使奪之宅殘其州晉人適攻衛戎州人因與石圃殺莊公立公子起莊公之弟同起奔齊出公復入立吕覽慎小與左傳二年魯孔丘卒莊公三年莊公上城見戎州曰戎虜何為是戎州病之十月戎州告趙簡子簡子圍衛十一月莊公出奔與左傳别衛人立公子班師為衛君齊伐衛虜班師更立公子起為衛君衛君起元年衛石曼専逐其君起起奔齊衛出公輒自齊復歸立史衛世家異與左氏小智伯欲襲衛故遺之乘馬先之一璧衛君大悅酌酒諸大夫皆喜南文子獨不喜有憂色衛君曰大國禮寡人寡人故酌諸大夫酒諸大夫皆喜子獨不喜有憂色者何也南文子曰無方之禮無功之賞禍之先也我未有往彼有以來是以憂也於是衛君乃修梁津而擬邊城智伯聞衛兵在境上乃還説苑權謀衛將軍文子問子貢曰季文子三窮而三通何也子貢曰其窮事賢其通舉窮其富分貧其貴禮賤窮以事賢則不侮通而舉窮則忠於朋友富而分貧則宗族親之貴而禮賤則百姓戴之其得之固道也失之命也曰失而不得者何也曰其窮不事賢其通不舉窮其富不分貧其貴不禮賤其得之命也其失之固道也説苑善説衛將軍文子見曾子曾子不起而延於坐席正身於奧文子謂其御曰曾子愚人也哉以我為君子也君子安可毋敬也以我為暴人也暴人安可侮也曾子不僇命也韓子説林下司冦惠子衛將軍文子彌牟之弟之喪子遊為之麻衰牡麻絰文子辭曰子辱與彌牟之弟遊又辱為之服敢辭子遊曰禮也文子退反哭子遊趨而就諸臣之位文子又辭曰子辱與彌牟之弟遊又辱為之服又辱臨其喪敢辭子遊曰固以請文子退扶適子南面而立曰子辱與彌牟之弟遊又辱為之服又辱臨其喪虎也敢不復位子遊趨而就客位檀弓上將軍文子之喪既除喪而后越人來弔主人文子之子深衣練冦待於廟垂涕洟子遊觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中檀弓上初出公立十二年亡亡在外四年復入出公後元年賞從亡者立二十一年卒先立十二年復立九年通立二十一年也合出亡四年共二十五年而卒或曰卒於越出公季父黔攻出公子而自立是為悼公史衛世家悼公悼公五年卒子敬公弗立世本云名費史衛世家敬公子思自齊反衛衛君館而問曰衛敬公先生魯國之士然不以衛之褊小猶步玉趾而慰存之願有賜于寡人也子思曰臣羇旅于此而辱君之威尊亟臨蓽門其榮多矣欲報君以財幣則君之府藏已盈而伋又貧欲報君以善言恐未合君志而徒言不聼也顧未有可以報君者唯進賢耳衛君曰賢固寡人之所願也子思曰未審君之願將何以為君曰必用以治政子思曰君弗能也君曰何故答曰衛國非無賢才之士而君未有善政是賢才不見用故也君曰雖然願聞先生所以為賢者答曰君將以名取士耶以實取士耶君曰必以實子思曰衛之東境有李音者賢而有實者也君曰其父祖何也答曰世農夫也衛君乃胡盧大笑曰寡人不好農農夫之子無所用之且世臣之子未悉官之子思曰臣稱李音稱其賢才也周公大聖康叔大賢今魯衛之君未必皆同其祖考李音父祖雖善農則音亦未必與之同也君言世臣之子未悉官之則臣所謂有賢才而不見用果信矣臣之問君固疑君之取士不以實也今君不問李音之所以為賢才而聞其世農夫因笑而不愛則君取士果信名而不由實者也衛君屈而無辭孔叢子上子思居衛言茍變于衛君曰其材可將五百乘君任軍旅率得此人則無敵於天下矣衛君曰吾知其材可將然變也嘗為吏賦于民而食人二雞子以故弗用也子思曰夫聖人之官人猶大匠之用木也取其所長棄其所短故把梓連抱而有數尺之朽良工不棄何也知其所妨者細也卒成不訾之器今君處戰國之世選爪牙之士而以二卵棄干城之將此不可使聞於鄰國者也衛君再拜曰謹受教矣孔叢子上侯通鑑載此于顯王時當衛成之世去孔子卒已兩甲子矣子思生於孔子未卒之先不應年永如此也據孟子魯穆公之時子栁子思為臣則子思當魯穆公時而孔叢子注衛君為敬公敬公在魯穆公之前蓋子思先仕衛而後仕魯也衛君言計是非而羣臣和者如出一口子思曰以吾觀所為君不君臣不臣者也公丘懿子曰何乃若是子思曰人主自臧則衆謀不進事是而臧之猶却衆謀况和非以長乎夫不察事之是非而悅人之讃已暗莫甚焉不度理之所在而阿諛求容諂莫甚焉君暗臣諂以居百姓之上民弗與也若此不已國無類矣孔叢子上子思謂衛君曰君之國事將日非矣君曰何故對曰有由然焉君出言皆自以為是而卿大夫莫敢矯其非卿大夫出言亦皆自以為是而士庶莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍故使如此如此則善安從生詩曰具曰豫聖誰知烏之雌雄抑亦似衛之君臣乎孔叢子上衛君問子思曰寡人之政何如答曰無非君曰寡人不知其不肖亦望其如此也子思曰希旨容媚則君親之中正弼非則君疏之夫能使人富貴貧賤者君也在朝之士孰肯舍所以見親而取其所以見疏者乎是故競求射君之心而莫敢有非君之非者此臣所謂無非也公曰然乎寡人之過也今知改矣答曰君弗能焉口順而心不懌者臨其事必疣君雖有命臣未敢受也孔叢子上篇衛君曰夫道大而難明非吾所能也今欲學術何如子思曰君無然也體道者逸而不窮任術者勞而無功古之篤道君子生不足以喜之利何足以動之死不足以禁之害何足以怨之禁或作懼怨或作忌故明於死生之分通於利害之變雖以天下易其脛毛無所槩於志矣是以與聖人居使窮士忘其貧賤使王公簡其富貴君無然也衛君曰善孔叢子上篇衛公子交見於子思曰先生聖人之後執清髙之操天下之君子莫不服先生之大名也交雖不敏竊慕下風願師先生之行幸顧恤之子思曰公子不宜也夫清髙之節不以私自纍不以利煩意擇天下之至道行天下之正路今公子紹康叔之緒處戰伐之世當務收英雄保其疆土非所以明臧否立規檢修匹夫之行之時也孔叢子上衛公子交饋馬四乘于子思曰交不敢以此求先生之歡而辱先生之潔也先生久降于鄙土蓋為賓主之餼焉子思曰伋寄命以來度身以服衛之衣量腹以食衛之粟矣又且朝夕受酒脯及祭燔之賜衣食已優意氣已定以無行志未嘗當車馬之貺禮雖有爵賜人不踰父兄今重違公子之盛旨則有失禮之僭焉若何公子曰交已言于君矣答曰不可為人子者三賜不及車馬公子曰我未之聞也謹受教孔叢子上子思居於衛緼袍無表二旬而九食田子方聞之使人遺狐白之裘恐其不受因謂之曰吾假人遂忘之吾與人如棄之子思辭而不受田子方當衛慎公時子思猶在衛子方曰我有子無何故不受子思曰伋聞之妄與不如遺棄物於溝壑伋雖貧也不忍以身為溝壑是以不敢當也説苑立節子思居貧其友有饋之粟者受二車焉或獻樽酒束修子思弗受曰費而無當也或曰子取人粟而辭酒是辭少而受多也於義無名於分則不全行之何也子思曰然伋不幸而貧至及困乏將絶先人之祀夫所以受粟為周之也酒脯則所飲宴也方乏於食而乃飲宴非義也吾豈以為分哉度義而行之或擔其酒脯以歸孔叢子孔叢子衛將軍文子之內子死復者曰臯媚女復子思聞之曰此女氏之字非夫氏之名也婦人於夫氏以姓氏稱禮也孔叢子胡母豹謂子思曰子好大世莫能容子也盍亦隨時乎子思曰大非所病所病不大也凡所以求容於世為行道也毁道以求容容何行焉大不見容命也毁大而求容罪也吾弗改矣孔叢子曾子謂子思曰昔者吾從夫子巡守於諸侯夫子未嘗失人臣之禮而猶聖道不行今吾觀子有傲世主之心無乃不容乎子思曰時移世異人有宜也當吾先君周制雖毁君臣固位上下相持若一體然夫欲行其道不執禮以求之則不能入也今天下諸侯方欲力爭競招英雄以自輔翼此乃得士則昌失士則亡之秋也伋於此時不自髙人將下吾不自貴人將賤吾舜禹揖讓湯武用師非故相詭乃各時也孔叢子曾申謂子思曰屈己以伸道乎抗志以貧賤乎子思曰道伸吾所願也今天下王侯其孰能哉與屈己以富貴不若抗志以貧賤屈己則制於人抗志則不愧於道漢書儒家子思二十三篇孔叢子費子陽謂子思曰吾念宗周將滅泣涕不可禁也子思曰然此亦子之善意也人能以智知可知不能以智知未可知危之道也今以一人之身憂世之不治而泣涕不禁是憂河水之濁而以泣清之也其為無益莫大焉故微子去殷紀季入齊良知時也唯能不憂世之亂而患身之不治者可與言道矣孔叢子公叔木謂申祥曰吾於子思親而敬之子思未吾察也申祥以告曰人求親敬於子子何辱焉子思答曰義也申祥曰請聞之答曰公叔氏之子愛人之同己慢而不知賢夫其親敬非心見吾所可親敬也以人口而親敬吾則亦以人口而疏慢吾矣申祥曰其不知賢奈何答曰有龍穆者徒好飾美辭説觀於坐席相人眉睫以為之意天下之淺人也而公叔子交之橋子良修實而不修名為善不為人之知己不撞不發如大鐘然天下之深人也而公叔子與之同邑而弗能知此其所以為愛同已而不知賢也孔叢子魯人有同姓死而弗弔者人曰在禮當免不免當弔不弔有司罰之如之何子之無弔也答曰吾以其踈遠也子思聞之曰無恩之甚也昔者季孫問於夫子曰百世之宗有絶道乎子曰繼之以姓義無絶也故同姓為宗合族為屬雖國子之尊不廢其親所以崇愛也是以綴之衣食序列昭穆萬世婚姻不通忠篤之道也孔叢子子思謂子上曰有可以為公侯之尊而富貴人衆不與焉者非唯志乎成其志者非唯無欲乎夫錦繢紛華所服不過溫體三牲大牢所食不過充腹知以身取節者則知足茍知足則不纍其志矣孔叢子子思曰吾之富貴甚易而由不能夫不取於人謂之富不辱於人謂之貴不取不辱其於富貴庶矣哉孔叢子子思謂子上曰白乎吾嘗深有思而莫之得也於學則寤焉吾嘗企有望而莫之見也登髙則覩焉是故雖有本性而加之以學則無惑矣按孔叢子所記無甚深義故朱子謂其書之偽詐孔叢子子思在魯使以書如衛問子上子上北面再拜受書伏讀然後與使者晏遂為復書返中􅒉北面再拜以授使者既受書然後退使者還魯問子思曰吾子堂上南面立授臣書事畢送臣子上中庭拜授臣書而不送何也子思曰拜而不送敬也使而送之賓也禮記子上之母死而不喪門人問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道汚則從而汚伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不喪出母自子思始也史記子思生白字子上年四十七子上生求字子家年四十五子家生箕字子京年四十六子京生穿字子髙年五十一皇覽子思冢在孔子冡南大小相望説苑子思曰學所以益才也礪所以致刃也吾嘗幽處而深思不若學之速吾嘗跂而望不若登髙之博見故順風而呼聲不加疾而聞者衆登丘而招臂不加長而見者逺故魚乘於水鳥乘於風草木乘於時鹽鐵論子思子之銀佩美於虞公之垂棘敬公十九年卒子昭公糾立是時三晉強衛如小侯屬之史衛世家昭公昭公六年公子亹弒之代立是為懷公懷公懷公十一年公子頽弒懷公而代立是為慎公慎公父公子適適父敬公也慎公慎公四十二年卒子聲公訓立聲公聲公十一年卒子成侯速立成侯成侯十六年衛更貶號曰侯二十九年成侯卒子平侯立平侯平侯八年卒子嗣君立嗣君嗣君五年更貶號曰君獨有濮陽以上史衛世家衛嗣君之時有胥靡逃之魏因為襄王之后治病魏襄王之后也衛嗣君聞之使人請以五十金買之五反而魏王不與乃以左氏易之左氏地名羣臣左右諫曰夫以一都買胥靡可乎君曰非子之所知也夫治無小亂無大法不立而誅不必雖有十左氏無益也法立而誅必雖失十左氏無害也魏王聞之曰主欲治而不聼之不祥因載而往徒獻之不取其地也策韓子內儲上與國稍别如耳説衛嗣公衛嗣公説而太息左右曰公何為不相也公曰夫馬似鹿者而題之千金然而有百金之馬而無一金之鹿者馬為人用而鹿不為人用也今如耳萬乘之相也外有大國之意其心不在衛雖辨智亦不為寡人用吾是以不相也韓子外儲右衛嗣君重如耳愛世姫而恐其皆因愛重以壅已也乃貴薄疑以敵如耳尊魏姫以耦世姫曰以是相參也嗣君知欲無壅而未得其術也韓子外儲上衛嗣君好察微隱縣令有發褥而席弊者嗣君聞之乃賜之席令大驚以君為神又使人為客過關市關市苛難之因賂以金關吏乃舍之嗣公召關吏問曰某時有客過而所與汝金而汝因遣之關吏乃大恐而以嗣公為明察韓子內儲上薄疑説衛嗣君以王術嗣君平侯之子嗣君應之曰豫所有者千乘也願以受教薄疑對曰烏獲舉千鈞又况一斤乎淮南子道應吕覽務大衛嗣君欲重稅以聚粟民弗安以告薄疑曰民甚愚矣夫聚粟也將以為民也其自藏之與在於上奚擇薄疑曰不然其在於民而君弗知其不如在上也其在於上而民弗知其不如在民也知猶得也凡聼必反諸己審則令無不聼矣吕覽審應衛嗣君謂薄疑曰子小寡人之國以為不足仕則寡人力能任子請進爵以子為上卿乃進田萬頃薄子曰疑之母親疑以疑為能相萬乘而不宨也然疑家有巫蔡嫗者疑母甚愛信之屬之家事焉疑智足以信言家事疑母盡以聼疑也然已與疑言者亦必復決之於蔡嫗也今疑之於人主也非子母之親而人主皆有蔡嫗人主之蔡嫗必其重人也重人者能行私者也夫行私者繩之外也而疑之所言法之內也繩之外與法之內讐也不相受也一曰衛君至晉謂薄疑曰吾欲與子皆行薄疑曰媪也在中請歸與媪計之衛君自請薄媪薄媪曰疑君之臣也君有意從之甚善衛君曰吾以請之媪媪許我矣薄疑歸言之媪曰衛君之愛疑奚與媪媪曰不如吾愛子也衛君之賢疑奚與媪曰不如吾賢子也媪與疑計家事已決矣乃更請決之於卜者蔡嫗今衛君從疑而行雖與疑決計必與他蔡嫗敗之如是則疑不得長為臣矣韓子外儲右嗣君四十二年卒子懷君立懷君懷君三十一年朝魏魏囚殺懷君魏更立嗣君弟是為元君元君為魏壻故立之元君元君十四年秦拔魏置東郡更徙衛野王縣而并濮陽為東郡二十五年元君卒子君角立以上史衛世家列女傳秦滅衛君乃封靈王世家使奉其祀靈王死夫人無子而守寡傅妾有子事夫人甚謹夫人曰主君之母不妾事人我無子本當黜得留盡節幸也孺子不改故節吾甚內慙願出居外以時相近吾甚便安妾泣曰吾聞君子處順奉上下之儀修先王之禮此順道也今夫人難我欲居外使我居內此逆理也處逆而生寧若處順而死將自殺其子泣救不從夫人聞之懼留不出君角君角九年秦并天下立為始皇帝二十一年二世廢君角為庶人衛絶祀史衛世家雜録吳赤市使于智氏假道于衛寧文子具紵絺三百製將以送之大夫豹曰吳雖大國也不壤交假之道則亦敬矣又何禮焉寧文子不聼遂致之吳赤市至于智氏既得事將歸吳智伯命造舟為梁吳赤市曰吾聞之天子濟于水造舟為梁諸侯維舟為梁大夫方舟方舟臣之職也且敬太甚必有故使人視之視則用兵在後矣將以襲衛吳赤市曰衛假吾道而厚贈吾我見難而不告是與為謀也稱疾而留使人告衛衛人警戒智伯聞之乃止説苑復恩詳是時吳滅久矣未所云顔讐由善事親子路義之後讐以非罪執于義將危子路以金贖焉孔叢子上衛司徒敬子死子夏弔焉主人未小斂絰而往子遊弔焉主人既小斂子遊出絰反哭子夏曰聞之也歟曰聞諸夫子主人未改服則不絰檀弓下衛叔孫文子問于王孫夏曰吾先君之廟小吾欲更之可乎對曰古之君子以儉為禮今之君子以汰易之夫衛國雖貧豈無文履一竒以易十稷之繡哉以為非禮也文子乃止説苑反質衛君問於田讓曰寡人封侯盡千里之地賞賜盡御府繒帛而士不至何也田讓對曰君之賞賜不可以功及也君之誅罰不可以理避也猶舉杖而呼狗張弓而祝雞矣雖有香餌而不能致者害之必也説苑尊賢曽從子善相劍者也衛君怨吳王曾從子曰吳王好劍臣好劍者也臣請為吳王相劍拔而示之因為君刺之衛君曰子為之是也非緣義也為利也吳強而富衛弱而貧子必往吾恐子為吳王用之於吾也因逐之韓子説林宋石魏將也衛君楚將也兩國搆難二子皆將宋石遺衛君書曰二軍相當兩旗相望惟毋一戰戰必不兩存此乃兩主之事也與子無有私怨善者相避也韓子內儲下衛有五丈夫俱負缶而入井灌韭終日一區鄧析過下車為教之曰為機重其後輕其前命曰橋終日溉韭百區不倦五丈夫曰吾師言曰有機知之巧必有機知之敗我非不知也不欲為也子其往矣我一心溉之不知改已鄧析去行數十里顔色不悅懌自病弟子曰是何人也而恨我君請為君殺之鄧析曰釋之是所謂真人者也可令守國説苑反質陽山君相衛聞王之疑己也乃偽謗樛豎以知之樛豎王之所愛謗之必憤而言王之疑巳也韓子內儲上衛人有夫妻禱者祝曰使我無故得百束布其夫曰何少也對曰益是子將以買妾韓子內儲下衛頃公之時仁人不遇小人在側詩人作柏舟詩序詩詩傳説皆以為康叔憂三監叛之詩時查史衛世家有頃侯當周夷王衛世子共伯蚤死其妻共薑守義父母欲奪而嫁之誓而弗許作柏舟之詩以絶之詩序在衛風有兩柏舟王共伯春秋前當周宣時史謂為武公所弒者也然武公賢主必無其事或别有共伯歟子貢詩傳衛世子餘未立而卒共薑誓以守志作柏舟申公詩説衛釐侯在位恭伯先卒恭薑守義齊武公欲召之歸而嫁之恭薑不許故作此詩衛女嫁于齊太子中道聞太子死問傅母曰何如傅母曰且往當喪喪畢不肯歸終之以死傅母悔之取女所自操琴于塜上鼓之忽二雉俱出墓中傅母撫雉曰女果為雉耶言未畢俱飛而起忽不見傅母悲痛援琴作操曰雉朝飛揚雄琴清操齊侯之女嫁于衛至城門而衛君死保母曰可以還矣女不聼遂入持三年之喪畢弟立請曰衛小國也不容二庖願與同庖不聼衛君使人訴于齊兄弟皆欲與君使人告女女終不聼乃作詩曰我心匪石不可轉也我心匪席不可卷也衛君知不可奪聼女守志云列女傳此與詩序别衛君重裘纍茵而坐見路有負薪而哭者問曰何故也對曰雪下衣薄是以哭之于是衛君懼見於顔色曰為君而不知民之寒孰以我為君于是開府金出倉粟以賑貧窮王孫子衛有賢女劭王聞其賢請聘之未至王薨劭王不知何指太子曰吾聞齊桓得衛姫霸今衛女賢者欲留之大夫曰不可若賢必不我聼聼亦不賢不足取太子不聼遂拘留深宫思歸不得乃援琴而歌作思歸引曲終自縊而死樂府解題樂羊子妻榖丘人羊子嘗行路得遺金妻曰志士不飲盜泉之水亷者不受嗟來之食奈何拾遺以汙行乎羊子乃捐其金遊學一年來歸妻因斷織曰夫子績學以成德也若中道而歸何異于是羊子復卒業七年不反妻紡績以養姑兼饋羊子一夕盜至欲犯之遂自刎地志歸德府伯樂羊子疑漢人然地志序在宋姫之前則春秋時人也韓非子衛人嫁其子而教之曰必私積聚為人婦而出常也其成居幸也其子因私積聚其姑以為多私而出之其所以自反者陪其所以嫁其父不自罪於教子非也而自知其益富今人臣之處官者皆是類也春秋戰國異辭卷十二
