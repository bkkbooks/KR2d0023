body:
  text: 春秋戰國異辭卷四十三右春坊右諭徳陳厚耀撰魏武侯武侯元年趙敬侯初立公子朔為亂不勝奔魏與魏襲邯郸魏敗而去史魏世家魏武侯問元年於吳子吳子對曰言國君必慎始也慎始奈何曰正之正之奈何曰明智智不明何以見正多聞而擇焉所以明智也是故古者君始聽治大夫而一言士而一見庶人有謁必達公族請問必語四方至者勿距可謂不壅蔽矣分禄必及用刑必中君心必仁思君之利除民之害可謂不失民衆矣君身必正近臣必選大夫不兼官執民柄者不在一族可謂不權勢矣此春秋之意而元年之本也説苑建本武侯問曰願聞治兵料人固國之道起對曰古之明王必謹君臣之禮飾上下之儀安集吏民順俗而教簡募良材以備不虞昔齊桓募士五萬以霸諸侯晉文召為前行四萬以獲其志秦穆置䧟陣三萬以服鄰敵故强國之君必料其民民有膽勇氣力者聚為一卒樂以進戰效力以顯其忠勇者聚為一卒能踰髙超逺輕足善走者聚為一卒王臣失位而欲見功於上者聚為一卒棄城去守欲除其醜者聚為一卒此五者軍之練鋭也有此三千人内出可以決圍外入可以屠城矣武侯問曰願聞陣必定守必固戰必勝之道起對曰立見且可豈直聞乎君能使賢者居上不肖者處下則陣已定矣民安其田宅親其有司則守已固矣百姓皆是吾君而非隣國則戰已勝矣吳子圖國武侯謂吳起曰今秦脇吾西楚帶吾南趙衝吾北齊臨吾東燕絶吾後韓據吾前六國之兵四守勢甚不便憂此奈何起對曰夫安國家之道先戒為寳今君已戒祸其逺矣臣請論六國之俗夫齊陳重而不堅秦陳散而自鬭楚陳整而不乆燕陳守而不走三晉陳治而不用夫齊性剛其國富君臣驕奢而簡於細民其政寛而禄不均一陳兩心前重後輕故重而不堅擊此之道必三分之獵其左右脇而從之其陳可壊秦性强其地險其政嚴其賞罰信其人不讓皆有鬭心故散而自戰擊此之道必先示之以利而引去之士貪於徳而離其將乘乖獵散設伏投機其將可取楚性弱其地廣其政騷其民疲故整而不乆擊此之道襲亂其屯先奪其氣輕進速退弊而勞之勿與爭戰其軍可敗燕性慤其民慎好勇義寡詐謀故守而不走擊此之道觸而廹之陵而逺之馳而後之則上疑而下懼謹我車騎必避之路其將可虜三晉者中國也其性和其政平其民疲于戰習于兵輕其將薄其禄士無死志故治而不用擊此之道阻陳而壓之衆來則拒之去則追之以倦其師此其勢也然則一軍之中必有虎賁之士力輕扛鼎足輕戎馬搴旗斬將必有能者若此之等選而别之愛而貴之是謂軍命其有工用五兵材力健疾志在吞敵者必加其爵列可以決勝厚其父母妻子勸賞畏罰此堅陣之士可與持乆能審料此可以擊彼武侯曰善吳子料敵武侯問曰吾欲觀敵之外以知其内察其進以知其止以定勝負可得聞乎起對曰敵人之來蕩蕩無慮旌旗煩亂人馬數顧一可擊十必使無措諸侯未㑹君臣未知溝壘未成禁令未施三軍洶洶欲前不能欲去不敢以半擊倍百戰不殆武侯問敵必可擊之道起對曰用兵必須審敵虚實而趨其危敵人逺來新至行列未定可擊既食未設備可擊奔走可擊勤勞可擊未得地利可擊失時不從可擊涉長道後行未息可擊涉水半渡可擊險道狹路可擊旌旗亂動可擊陳數移動可擊將離士卒可擊心怖可擊凡若此者選鋭衝之分兵繼之急擊勿疑吳子料敵武侯問曰用兵之道何先起對曰先明四輕二重一信曰何謂也對曰使地輕馬馬輕車車輕人人輕戰明知險易則地輕馬芻秣以時則馬輕車膏鐧有餘則車輕人鋒鋭甲堅則人輕戰進有重賞退有重刑行之以信審能達此勝之主也武侯問曰兵何以為勝起對曰以治為勝又問曰不在衆乎起對曰若法令不明賞罰不信金之不止皷之不進雖有百萬何益于用所謂治者居則有禮動則有威進不可當退不可追前却有節左右應麾雖絶成陣雖散成行與之安與之危其衆可合而不可離可用而不可疲投之所往天下莫當名曰父子之兵吳子治兵武侯問曰三軍進止豈有道乎起對曰無當天竈無當龍頭天竈者大谷之口龍頭者大山之端必左青龍右白虎前朱雀後𤣥武招揺在上從事於下將戰之時審候風所從來風順致呼而從之風逆堅陣以待之武侯問曰凡蓄卒騎豈有方乎起對曰夫馬必安其處所適其水草節其饑飽冬則温廐夏則涼廡刻剔毛鬛謹落四下戢其耳目無令驚駭習其馳逐閑其進止人馬相親然後可使車騎之具鞍勒銜轡必令完堅凡馬不傷於末必傷於始不傷於饑必傷於飽日暮道逺必數上下寧勞於人慎勿勞馬常令有餘備敵覆我能明此者横行天下吳子治兵二年城安邑王垣七年伐齊至桑丘九年翟敗我於澮使吳起伐齊至靈丘齊威王初立以上史魏世家武侯浮西河而下中流顧謂吳起曰起事魏文侯時為西河守文侯卒又事武侯美哉乎山河之固此魏國之寳也起對曰在徳不在險昔三苗氏左洞庭右彭蠡徳義不修禹滅之夏桀之居左河濟右泰華伊闕在其南羊腸在其北修政不仁湯放之殷紂之國左孟門右太行常山在其北大河經其南修政不徳武王殺之由此觀之在徳不在險若君不修徳舟中之人盡為敵國也武侯曰善即封吳起為西河守甚有聲名史孫吳傳策又説苑貴徳國畧同武侯曰兩軍相望不知其將我欲相之其術如何起對曰令賤而勇者將輕鋭以嘗之務於北無務於得觀敵之來一坐一起其政以理其追北佯為不及其見利佯為不知如此將者名為智將勿與戰也若其衆讙譁旌旗煩亂其卒自行自止其兵或縱或横其追北恐不及見利恐不得此為愚將雖衆可獲吳子論將吳子武侯問曰嚴刑明賞足以勝乎起對曰嚴明之事臣不能悉雖然非所恃也夫發號布令而人樂聞興師動衆而人樂戰交兵接刅而人樂死此三者人主之所持也武侯曰致之奈何對曰君舉有功而進饗之無功而勵之於是武侯設坐廟庭為三行饗士大夫上功坐前行餚席兼重器上牢次功坐中行餚席器差減無功坐後行餚席無重器饗畢而出又頒賜有功者父母妻子於廟門外亦以功為差有死事之家嵗遣使者勞賜其父母著不忘於心行之三年秦人興師臨於西河魏士聞之不待吏令介胄而奮擊之者以萬數武侯召吳起而謂曰子前日之教行矣起對曰臣聞人有短長氣有盛衰君試發無功者五萬人臣請率以當之脱其不勝取笑於諸侯失權於天下矣今使一死賊伏於壙野十人追之莫不梟視狼顧何者恐其暴起而害己也是以一人投命足懼千夫今臣以五萬之衆而為一死賊率以討之故難敵矣於是武侯從之兼車五百乘騎三千匹而破秦五十萬衆此勵士之功也先戰一日吳起令三軍曰諸吏士當從受敵車騎與徒若車不得車騎不得騎徒不得徒雖破軍皆無功故戰之日其令不煩而威震天下尉繚子吳起臨戰左右進劒起曰將專主旗皷爾臨難決疑揮兵指刄此將事也一劒之任非將事也三軍成行一舍而後成三舍三舍之餘如決川源望敵在前因其所長而用之敵白者堊之赤者赭之吳起與秦戰未合一夫不勝其勇前獲雙首而還吳起立斬之軍吏諌曰此材士也不可斬起曰材士則是也非吾令也斬之十一年與韓趙三分晉地滅其後十三年秦獻公縣櫟陽十五年敗趙比藺吳起為魏武侯西河之守秦有小亭臨境吳起欲攻之不去則甚害田者去之則不足以徵甲兵於是乃倚一車轅於北門之外而令之曰有能徙此南門之外者賜之上田上宅人莫之徙也及有徙之者還賜之如令俄又置一石赤菽東門之外而令之曰有能徙此於西門之外者賜之如初人爭徙之乃下令大夫曰明日且攻亭有能先登者仕之國大夫賜之上田宅人爭趨之於是攻亭一朝而拔之韓子内儲上吳起治西河欲諭其信於民吳起衛人為魏武侯西河守夜日置表於南門之外表柱也令於邑中曰明日有人僨南門之外表者仕長大夫長大夫上大夫也明日日晏矣莫有僨表者民相謂曰此必不信有一人曰試往僨表不得賞而已何傷往僨表來謁吳起吳起自見而出仕之長大夫夜日又復立表又令於邑中如前人守門爭表表加植不得所賞表深植而不能僨不得其所賞自是之後民信吳起之賞罰矣吕覽慎小韓子外儲左吳起為魏將而攻中山軍人有病疽者吳起跪而自吮其膿吳起懐瘳實而吮傷傷者之母立泣人問曰將軍於若子如是尚何為而泣對曰吳起吮其父之創而父死於涇水之戰今是子又將死也吾是以泣又説苑復恩畧同吳起謂商文曰吳起衛人為楚將又相魏為西河太守商文葢魏臣事君果有命矣夫商文曰何謂也吳起曰治四境之内成訓教變習俗使君臣有義父子有序子與我孰賢商文曰吾不若子曰今日置質為臣其主安重今日釋璽辭官其主安輕子與我孰賢商文曰吾不若子曰士馬成列馬與人敵人在馬前援桴一皷使三軍之士樂死若生子與我孰賢商文曰吾不若子吳起曰三者子皆不吾若也位則在吾上命也夫事君商文曰善子問我我亦問子世變主少羣臣相疑黔首不定屬之子乎屬之我乎吳起黙然不對少選曰與子商文曰是吾所以加於子之上也吕覽執一吳起出遇故人而止之食故人曰諾令返而御吳子曰待公而食故人至暮不來起不食待之明日蚤令人求故人故人來方與之食韓子外儲左魏武侯謀事而當羣臣莫能逮朝而有喜色朝一作退朝下同吳起進曰今者有以楚莊王之語聞者乎武侯曰未也荘王之語奈何吳起曰楚莊王謀事而當羣臣莫能逮朝而有憂色申公巫臣進曰君朝而有憂色何也荘王曰吾聞之諸侯自擇師者王自擇友者霸足已而羣臣莫之若者亡今以不榖之不肖而議於朝則羣臣莫能逮吾國其㡬於亡矣吾是以有憂也荘王之所以憂而君獨有喜色何也武侯逡巡而謝曰天使夫子振寡人之過也天使夫子振寡人之過也新序卷一吳又荀子堯問又子圖國稍畧吕覽驕恣魏武侯謀事而當攘背疾言於庭曰大夫之慮莫如寡人矣立有間再三言李悝趨進曰昔者楚莊王謀事而當有大功退朝而有憂色敢問其説王曰仲虺有言能自為取師者王能自取友者存其所擇而莫如已者亡今以不榖之不肖也羣臣之謀又莫吾及也我其亡乎曰此霸主之所憂也而君獨伐之其可乎武侯曰善吳起行魏武侯送之絶河西與起相辭曰何以治西河對曰以忠信吕氏春秋吳起治西河之外王錯譛之於魏武侯武侯使人召之吳起治於岸門止車而休望西河泣數行而下其僕謂之曰竊觀公之志視舍天下若舍屣今去西河而泣何也吳起雪泣而應之曰子弗識也君誠知我而使我畢能秦必可亡而西河可以王今君聽䜛人之議而不知我西河之為秦也不乆矣魏國從此削矣吳起果去魏入楚而西河畢入秦魏日以削吕覽觀表又長見篇田文既死公叔為相尚魏公主公叔韓之公族而害吳起公叔之僕曰起易去也公叔曰奈何其僕曰吳起為人節亷而自喜名也君因先與武侯言曰夫吳起賢人也而侯之國小又與疆秦壤界臣竊恐起之無留心也武侯即曰奈何君因謂武侯曰試延以公主起有留心則必受之無留心則必辭矣以此卜之君因召吳起而與歸即令公主怒而輕君吳起見公主之賤君也則必辭於是吳起見公主之賤魏相果辭魏武侯武侯疑之而弗信也吳起懼得罪遂去即之楚史孫吳傳徐無鬼因女商見魏武侯武侯勞之曰先生病矣苦於山林之勞顧乃肯見於寡人徐無鬼曰我則勞於君君有何勞於我君將盈耆欲長好惡則性命之情病矣君將黜耆欲掔好惡掔音牽則耳目病矣我將勞君君有何勞於我武侯超然不對少焉徐無鬼曰嘗語君吾相狗也下之質執飽而止是狸徳也中之質若視日上之質若亡其一吾相狗又不若吾相馬也吾相馬直者中䋲曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若䘏若佚若喪其一若是者超軼絶塵不知其所武侯大説而笑徐無鬼出女商曰先生獨何以説吾君乎吾所以説吾君者横説之則以詩書禮樂從説之則以金板六弢奉事而大有功者不可為數而吾君未嘗啓齒今先生何以説吾君使吾君説若此乎徐無鬼曰吾直告之吾相狗馬耳女商曰若是乎曰子不聞越之流人乎去國數日見其所知而喜去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣不亦去人滋乆思人滋深乎夫逃虚空者藜藋拄乎鼪鼬之逕踉位其空踉欲行貌位處也言欲行且止聞人足音跫然而喜矣又況乎昆弟親戚之謦欬其側者乎乆矣夫莫以真人之言譬欬吾君之側乎莊子徐無鬼徐無鬼見武侯武侯曰先生居山林食芋栗厭葱韭以賓寡人乆矣夫今老邪其欲干酒肉之味邪其寡人亦有社稷之福邪徐無鬼曰無鬼生於貧賤未嘗敢飲食君之酒肉將來勞君也君曰何哉奚勞寡人曰勞君之神與形武侯曰何謂邪徐無鬼曰天地之養也一登髙不可以為長居下不可以為短君獨為萬乘之主以苦一國之民以養耳目鼻口夫神者不自許也夫神者好和而惡姦夫姦病也故勞之惟君所病之何也人則不病而君獨病之何哉武侯曰欲見先生乆矣吾欲愛民而為義偃兵可乎徐無鬼曰不可愛民害民之始也為義偃兵造兵之本也君自此為之則殆不成美惡器也君雖為仁義幾且偽哉形固造形成固有伐變固外戰有為而形者能造其形於外若心執定而不化則有攻伐之形心為物所變亂則有戰鬭之形君亦必無盛鶴列於麗譙之間無徒驥於錙壇之宫鶴列陣名麗譙樓名錙壇祭祀之地言人心若茍與物鬬則一室之内無非爭奪之境兵騎之象無之者去其心中之兵也無藏逆於得無以巧勝人無以謀勝人無以戰勝人夫殺人之士民兼人之土地以養吾私與吾神者其戰不知孰善勝之惡乎在君若勿已矣修胸中之誠以應天地之情而勿攖夫民死已脱矣君將惡乎用夫偃兵哉莊子徐無鬼十六年伐楚取魯陽武侯卒子罃立是為惠王史魏世家春秋戰國異辭卷四十三
