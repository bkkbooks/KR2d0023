body:
  text: 春秋戰國異辭卷十一右春坊右諭德陳厚耀撰晉昭公紀年晉昭公元年河水赤于龍門三日中行穆子圍鼓晉昭公五年鼓人有以城反者不許軍吏曰師徒不勤可得城奚故不受曰有以吾城反者吾所甚惡也人以城來我獨奚好焉賞所甚惡是失賞也若所好何若不賞是失信也奚以示民鼓人又請降使人視之其民尚有食也不聽鼓人告食盡力竭而後取之克鼓而反不戮一人說苑貴德别與左氏稍中行穆伯攻鼓弗能下餽聞倫曰鼓之嗇夫聞倫知之請無罷武大夫而鼓可得也穆伯弗應左右曰不折一㦸不傷一卒而鼓可得也君奚為弗使穆伯曰聞倫為人佞而不仁若使聞倫下之吾可以勿賞乎若賞之是賞佞人侫人得志是使晋國之武舍仁而為佞雖得鼓將何所用之淮南子人間昭公六年卒六卿彊公室卑子頃公去疾立史晉世家頃公晉襄公襄當作頃使人於周曰弊邑寡君寢疾卜以守龜曰三塗為祟使下臣願藉途而祈福焉天子許之天子景王朝禮使者事畢客出萇𢎞謂劉康公曰夫祈福於三塗而受禮於天子此柔嘉之事也而客武色殆有他事願公備之也劉康公乃警戎車卒士以待之晋果使祭事先因令楊子將卒十二萬而隨之涉於棘津襲聊阮梁欒氏滅三國焉吕覽精諭洛左傳昭十七年晉使屠蒯如周請事於遂滅陸渾之戎此晉頃公事非襄公也且萇𢎞乃景王敬王之大夫亦在晉頃公時頃公六年周景王崩王子爭立晉六卿平王室亂立敬王九年魯季氏逐其君昭公昭公居乾侯十一年衛宋使使請晉納魯君季平子私賂范獻子獻子受之乃謂晉君曰季氏無罪不果入魯君史晉世家十二年晉之宗家祁徯孫叔向子相惡於君六卿欲弱公室乃遂以法盡滅其族而分其邑為十縣各令其子為大夫晉益弱六卿皆大史晉世家約左氏文十四年頃公卒子定公午立史晉世家定公紀年晉定公六年漢不見于天十八年青虹見定公十一年魯陽虎奔晉趙鞅簡子舍之十二年孔子相魯十五年趙鞅使邯鄲大夫午不信欲殺午午與中行寅范吉射親攻趙鞅鞅走保晉陽定公圍晉陽荀躒韓不侫魏哆與范中行為仇乃移兵伐范中行范中行反晉君擊之敗范中行范中行走朝歌保之韓魏為趙鞅謝晉君乃赦趙鞅復位史晋世家家語陽虎既奔齊自齊奔晉晉定公十一年適趙氏孔子聞之謂子路曰趙氏其世有亂乎子路曰權本不在焉豈能為亂孔子曰非女所知夫陽虎親富而不親仁有寵於季孫又將殺之不克而奔求容於齊齊人囚之乃亡歸晉齊魯二國已去其疾趙簡子好利而多信必溺其說而從其謀禍敗所終非一世可知也晉定公之十四年范中行作亂明年春簡子謂邯鄲大夫午曰歸我衛氏五百家吾將置之晉陽午許諾歸而其父兄不聽倍信趙鞅捕午囚之晉陽乃告邯鄲人曰我私有誅午也諸君欲誰立遂殺午趙稷涉賓以邯鄲反晉君使籍秦圍邯鄲荀寅范吉射與午善不肯助秦而謀作亂董安于知之十月范中行伐趙鞅鞅奔晉陽晉人圍之范吉射荀寅仇人魏襄等謀逐荀寅以梁嬰父代之逐吉射以范臯繹代之荀躒言於晉侯曰君命大臣始亂者死今三臣始亂三臣范中行趙也而獨逐鞅用刑不均請皆逐之十一月荀躒韓不侫魏哆奉公命以伐范中行氏不克范中行氏反伐公公擊之范中行敗走丁未二子奔朝歌韓魏以趙氏為請十二月辛未趙鞅入絳盟于公宫其明年知伯文子謂趙鞅曰范中行雖信為亂安于發之是安于與謀也晉國有法始亂者死夫二子已伏罪而安于獨在趙鞅患之安于曰臣死趙氏定晉國寧吾死晚矣遂自殺趙氏以告知伯然後趙氏寧孔子聞趙簡子不請晉君而執邯鄲午保晉陽故書春秋曰趙鞅以晉陽畔史趙世家略同左氏列女傳范獻子之三子遊於趙氏趙簡子乘馬園中園中多株問三子曰奈何長者曰明君不問不為亂君不問而為中者曰愛馬足則無愛民力愛民力則無愛馬足少者曰可以三德使民設令伐株於山將有馬為也已而閒囿示之株夫山遠而囿近是民說一矣去險阻之山而伐平林之株民說二矣既畢而賤賣民說三矣簡子從之民果大說少子伐其謀歸以告母母喟然歎曰終滅范氏者必是子也夫伐功恃勞鮮能布仁乘僞行詐莫能久長其後智伯滅范氏古文瑣語范獻子卜獵命占之其繇曰君子得黿小人遺冠范獻子獵而無得遺其豹冠佛肸以中牟叛晉定公十九年置鼎于庭致士大夫曰與我者受邑不與我者烹大夫皆從之至于田卑田卑中牟之邑人也曰義死不避斧鉞之罪義窮不受軒冕之服無義而生不仁而富不如烹褰衣將就鼎佛肸脫屨而生之趙氏聞其叛也攻而取之聞田卑不肯與也求而賞之田卑曰不可也一人舉而萬夫俯首智者不為賞一人以慚萬夫義者不取我受賞使中牟之士懷耻不義辭賞從處以行臨人不道吾去矣遂南之楚新序卷八孔子自衛將入晉晉定公十九年至河聞趙簡子殺竇犨鳴犢及舜華史記作竇鳴犢舜華乃臨河而嘆曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇犨鳴犢舜華晉之賢大夫也趙氏未得志之先須此二人而後從政及其已得志也而殺之丘聞之刳胎殺夭則麒麟不至其郊竭澤而漁則蛟龍不處其淵覆巢破卵則鳯凰不翔其邑何則君子違傷其類者也鳥獸之于不義尚知避之况于人乎遂還之衛息于鄹作槃操以哀之曰周道衰微禮樂陵遲文武既墜吾將焉歸周遊天下靡邦可依鳯鳥不識珍寶梟鴟眷然顧之慘然心悲巾車命駕將適唐都黃河洋洋攸攸之魚臨津不濟還轅息鄹傷豫道窮哀彼無辜翺翔于衛復我舊廬從吾所好其樂只且合家語及孔叢子水經注孔子適趙臨河不濟嘆而作歌曰狄水衍兮風揚波舟楫顛倒更相加歸來歸來胡為斯晉中行文子出亡晉定公二十二年晉敗范中行氏二子奔齊過於縣邑從者曰此嗇夫公之故人公奚不休舍且待後車文子曰吾嘗好音此人遺我鳴琴吾好佩此人遺我玉環是振我過者也以求容於我者吾恐以我求容於人也乃去之果收文子後車二乘而獻之其君韓子說林下又說苑權謀中行寅將亡乃召其大祝而欲加罪焉曰子為我祝犧牲不肥澤耶且齊戒不敬耶使吾國亡何也祝簡對曰昔者吾先君中行穆子皮車十乘不憂其薄也憂德義之不足也今主君有革車百乘不憂德義之薄惟患車之不足也夫舟車飾則賦斂厚賦斂厚則民怨謗詛矣且君茍以祝為有益於國乎則詛亦將為損一人祝之一國詛之一祝不勝萬詛國亡不亦宜乎祝其何罪中行子乃慚新序卷一吕氏春秋范氏之亡也百姓有得鐘者欲負而走則鐘大不可負以椎毁之鐘况然有音恐人聞之而奪已也遽掩其耳惡人聞之可也惡己自聞之悖矣家語子路問於孔子曰賢君治國所先者何孔子曰在於尊賢而賤不肖子路曰由聞晉中行氏尊賢而賤不肖矣其亡何也孔子曰中行氏尊賢而不能用賤不肖而不能去賢者知其不用而怨之不肖者知其必已賤而仇之怨仇并存於國鄰敵構兵於郊中行氏雖欲無亡其可得乎紀年晉定公二十八年淇絶于舊衛三十年定公與吳王夫差㑹黃池爭長趙鞅時從卒長吳三十一年齊田常弒其君簡公而立簡公弟驁為平公三十三年孔子卒史晉世家三十七年定公卒子出公鑿立史晉世家出公晉智伯伐鄭晉出公七年齊田恆救之有登蓋必身立焉車徒有不進者必令助之壘合而後敢處井竈成而後敢食智伯曰吾聞田恆新得國而愛其民內同其財外同其勤勞治軍若此其得衆也不可待也乃去之說苑指武晉出公十一年智伯伐鄭趙簡子疾使太子母恤將而圍鄭智伯醉以酒灌擊母恤母恤羣臣請死之母恤曰君所以置母恤為能忍詬然亦愠智伯智伯歸因謂簡子使廢母恤簡子不聽母恤由此怨智伯史趙世家出繹史云晉公十一年即魯悼之四年也按左傳哀公二十年趙襄子稱先臣志父是簡子之卒已久何得此時簡子猶在史記誤甚中山之國有夙繇者智伯欲攻之而無道也為鑄大鐘方車二軌以遺之夙繇之君將斬岸堙溪以迎鐘赤章蔓枝諫曰詩云唯則定國我胡則以得是於智伯夫智伯之為人也貪而無信必欲攻我而無道也故為大鐘方車二軌以遺君若斬岸堙溪以迎鐘師必隨之弗聽有頃諌之君曰大國為權而子逆之不祥子釋之赤章蔓枝曰為人臣不忠貞罪也忠身不用遠身可也斷轂而行至衛七日而夙繇亡晉出公十七年吕覽下賢智伯將伐仇由由一作猶地志今太原府孟縣有仇猶城而道難不通乃鑄大鐘遺仇由之君仇由之君大說除道將內之赤章蔓枝枝一作伯曰不可此小之所以事大也而今也大以來卒必隨之不可內也仇由之君不聽遂內之赤章蔓枝因斷轂而驅至於齊七月而仇由亡韓子說林下智伯將襲仇由遺之以廣車故曰將欲取之必固與之韓子喻老智伯欲襲衛乃佯亡其太子顔使奔衛南文子曰太子顔之為其君子也甚愛非有大罪也而亡之必有故然人亡而不受不祥使吏逆之曰車過五乘慎勿內也智伯聞之乃止說苑權謀晉太史屠黍出公時太史見晉之亂也見晉公之驕而無德義也以其圖法歸周吕覽先識出公十七年智伯與趙韓魏共分范中行地以為邑出公怒告齊魯欲以伐四卿四卿恐遂反攻出公出公奔齊道死故智伯乃立昭公曽孫驕為晉君是為哀公史晉世家約左氏文年索隱曰趙世家云驕是為懿公又年表云出公十八次哀公忌二年次懿公驕十七年紀年又云出公二十三年奔楚乃立昭公之孫是為敬公世本亦云昭公生扎桓公子雍生忌忌生懿公驕然晉趙世家及年表並皆不同何况紀年之誤也哀公晉哀公大父雍晉昭公少子也號為戴子戴子生忌忌善智伯蚤死故智伯欲盡并晉未敢乃立忌子驕為君晉國政皆决智伯晉哀公不得有所制智伯遂有范中行地最強史晉世家智伯瑶率趙韓魏而伐范中行氏滅之反歸休兵數年因令人請地於韓韓康子將欲勿與段規諫曰不可不與也夫智伯之為人也好利而驁愎彼來請地而弗與則移兵於韓必矣君其與之與之彼狃又將請地他國他國且有不聽不聽則智伯必加之兵如是韓可以免於患而待其事之變康子曰諾因令使者致萬家之縣益於智伯智伯說又令人請地於魏宣子欲勿與趙葮諫曰彼請地於韓韓與之今請地於魏魏弗與則是魏內自強而外怒智伯也如是弗豫其措兵於魏必矣不如豫之宣子諾因令人致萬家之縣益於智伯智伯又令人之趙請蔡臯狼之地趙襄子弗與智伯因隂約韓魏將以伐趙襄子召張孟談而告之曰夫智伯之為人也陽規而隂疏三使韓魏而寡人不與焉其措兵於寡人必矣今吾安居而可張孟談曰夫董閼于簡主之才臣也其治晉陽而尹鐸循之其餘教猶存君其定居晉陽而已矣君曰諾乃召延陵生令將軍車騎先至晉陽君因從之君至而行其城郭及五官之藏城郭不治倉無積粟府無儲錢庫無甲兵邑無守具襄子懼乃召張孟談曰寡人行城郭及五官之藏皆不備具吾將何以應敵張孟談曰臣聞聖人之治藏於臣不藏於府庫務修其教不治城郭君其出令令民自遺三年之食有餘粟者入之倉遺三年之用有餘財者入之府有竒人者竒餘也謂閒人使治城郭之繕君夕出令明日倉不容粟府無積錢庫不受甲兵居五日而城郭已治守備已具君召張孟談而問之曰吾城郭已治守備已具錢粟已足甲兵有餘吾奈無箭何張孟談曰臣聞董子之治晉陽也公宫之垣皆以荻蒿􅀢楚墻之有􅀢高至於丈君發而用之於是發而試之其堅則雖菌幹之徑弗能過也君曰吾箭已足矣奈無金何張孟談曰臣聞董子治晉陽也公宫令舍之堂皆以鍊銅為柱質君發而用之於是發而用之有餘金矣號令已定守備已具三國之兵果至至則乘晉陽之城遂戰三月弗能拔因舒車而圍之决晉陽之水以灌之圍晉陽三年城中窠居而處懸釡而炊財食將盡士大夫羸病襄子謂張孟談曰糧食匱財力盡士大夫羸病吾恐不能守矣欲以城下何國之可下張孟談曰臣聞之亡弗能存危弗能安則無為貴智矣君失此計者臣請試潜行而出見韓魏之君張孟談見韓魏之君曰臣聞唇亡齒寒今智伯率二君而伐趙趙將亡矣趙亡則二君為之次二君曰我知其然也雖然智伯之為人也粗中而少親我謀而覺則其禍必至矢為之奈何張孟談曰謀出二君之口而入臣之耳人莫知之也二君因與張孟談約三軍之反與之期日夜遣孟談入晉陽以報三軍之反於襄子襄子迎孟談而再拜之且恐且喜二君以約遣張孟談因朝智伯而出遇智過於轅門之外智過怪其色因入見智伯曰二君貌將有變君曰何如曰其行矜而意高非他時之節也君不如先之君曰吾與二主約謹矣破趙而三分其地寡人所以親之必不侵欺兵之著於晉陽三年今旦暮將拔之而嚮其利何乃將有他心必不然子釋勿憂勿出於口明日二主又朝而出復見智過於轅門智過入見曰君以臣之言告二主乎君曰何以知之今日二主朝而出見臣而其色動而視屬臣此必有變君不如殺之君曰子置勿復言智過曰不可必殺之若不能殺遂親之君曰親之奈何智過曰魏宣子之謀臣曰趙葮韓康子之謀臣曰段規此皆能移其君之計君與其二君約破趙國因封二子者各萬家之縣一如是則二主之心可以無變矣智伯曰破趙而三分其地又封二子者各萬家之縣一則吾所得者少不可智過見其言之不聽也出因更其族為輔氏至於期日之夜趙氏殺其守隄之吏而决其水灌智伯軍智伯軍救水而亂韓魏翼而擊之襄子將卒犯其前大敗智伯之軍而擒智伯智伯身死軍破國分為三為天下笑史記文約國䇿智伯索地於魏宣子宣子弗豫任章曰何故不豫宣子曰無故索地故弗豫任章曰無故索地鄰國必恐彼重欲無厭天下必懼君豫之地智伯必驕而輕敵鄰邦必懼而相親以相親之兵待輕敵之國則智氏之命不長矣周書曰將欲敗之必姑輔之將欲取之必姑與之君不如與之以驕智伯且君何惜以天下圖智氏而獨以吾國為智氏質乎君曰善乃與之萬户之邑智伯大悅因索地於趙弗與因圍晉陽韓魏反之外趙氏應之內智氏自亡韓子說林任又淮南人間語稍略章作任登智伯從韓魏之兵以攻趙圍晉陽之城而溉之城不沒者三板絺疵謂智伯曰韓魏之君必反矣智伯曰何以知之對曰夫勝趙而三分其地今城未沒者三板臼竈生蛙人馬相食城降有日矣而韓魏之君無善志而有憂色是非反何也明日智伯謂韓魏之君曰疵言君之反也韓魏之君曰必勝趙而三分其地今城將勝矣夫二家雖愚不棄美利而偕約為難不可成之事其勢可見也是疵必為趙說君且使君疑二主之心而解于攻趙也今君聽讒臣之言而離二主之交為君惜之智伯出欲殺絺疵絺疵逃韓魏之君果反說苑權謀詳國䇿智伯軍敗晉陽身死髙良之東韓子喻老世本逝遨生莊子首首生武子罃罃生莊子朔朔生悼子盈盈生文子櫟櫟生宣子申申生智伯瑶淮南子張武為智伯謀曰晉六將軍中行文子最弱而上下離心可伐以廣地於是伐范中行氏而滅之矣又教智伯求地於韓魏趙韓魏裂地而授之趙氏不與乃率韓魏而伐趙圍晉陽三年襄子鑽龜筮占兆以視利害謂張孟談曰吾恐不能守矣欲以城下何國之可下孟談乃潛行而出三國隂謀同計以擊智氏遂滅之韓非子智伯兼范中行而攻趙不已韓魏反之軍敗晉陽身死髙良之東遂卒被分漆其首以為溲器故曰禍莫大於不知足說苑智伯厨人亡炙􅳢而知之韓魏反而不改淮南子智伯圍襄子於晉陽襄子疏隊而擊之大敗智伯破其首以為飲器吕氏春秋張孟談踰城潛行與魏桓韓康期而擊智伯斷其頭以為觴遂定三家史記韓魏殺智伯埋於鑿壺之下智伯囂之時有士曰長兒子魚絶智伯而去之三年將東之越而道聞智伯囂之見殺也謂御曰還車反吾將死之御曰夫子絶智伯而去之三年矣今反死之是絶屬無别也長兒子魚曰不然吾聞仁者無餘愛忠臣無餘祿吾聞智伯之死而動吾心餘祿之加于我者至今尚存吾將往依之反而死新序卷八智伯與趙襄子戰于晉陽下而死智伯之臣豫讓者怒以精氣能使襄主動心乃漆身變形吞炭更聲襄主將出豫讓僞為死人處于梁下駟馬驚不進襄主動心使使視梁下得豫讓襄主重其義不殺也又盜為抵罪被形人赭衣入繕宫襄主動心則曰必豫讓也襄主報而問之曰子始事中行君智伯殺中行君子不能死還反事之今吾殺智伯乃漆身為癘吞炭為啞欲殺寡人何與先行異也豫讓曰中行君衆人畜臣臣亦衆人事之智伯朝士待臣臣亦朝士為之用襄子曰非義也子壯士也乃自置車庫中水漿毋入口者三日以禮豫讓讓自知遂自殺也說苑復思詳國䇿十八年哀公卒子幽公桞立幽公之時晉畏反朝韓魏之君獨有絳曲沃餘皆入三晉世本懿公生幽公桞文紀年敬公十八年魏侯初立二十二年敬公卒子幽公立與史互異幽公紀年幽公七年晉大旱地生鹽九年丹水出反相擊十年夫人秦嬴賊公于高寢之上魏文侯立幽公子止是為烈公史年表云魏誅晉幽公立其弟止蓋脫字世本幽公生烈成公止十八年幽公淫婦人夜竊出邑中盜殺幽公魏文侯以兵誅晉亂立幽公子止是為烈公烈公紀年晉烈公公元年韓武子都平陽趙獻子城泫氏十九年周威烈王賜趙韓魏皆為諸侯二十七年烈公卒子孝公頎立孝公九年魏武侯初立襲邯鄲不勝而去十七年孝公卒子靜公俱酒立靜公二年魏武侯韓哀侯趙敬侯滅晉後而三分其地靜公遷為家人晉絶不祀以上俱晉世家晉雜録晉僖公儉不中禮國人作蟋蟀以刺之欲其以禮自娛樂也詩序相詩說云唐人戒之詩范氏有子曰子華善飬私名舉國服之有寵于晉君不仕而居三卿之右目所偏視晉國爵之口所偏肥晉國黜之遊其庭者侔于朝子華使其俠客以知鄙相攻強弱相凌雖傷破于前不用介意終日夜以此為戲樂國殆成俗禾生子伯范氏之上客出行經坰外宿于田更商丘開之舍中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者富商丘開先窘于饑寒潜于牖北聽之因假糧荷畚之子華之門子華之門徒皆世族也縞衣乘軒緩步濶視顧見商丘開年老力弱靣目黧黑衣冠不檢莫不賤之既而狎侮欺詒攩㧙挨抌亡所不為商丘開常無愠容而諸客之技單憊于戲笑模寫收拾備盡遂與商丘開俱乘高臺于衆中漫言曰有能自投下者賞百金衆皆競應商丘開以為信然遂先投下形若飛鳥揚于地􅟨骨無䃣范氏之黨以為偶然未詎怪也因覆指河曲之淫隈曰彼中有寶珠泳可得也商丘開復從而泳之既出果得珠焉衆昉同疑子華昉令豫肉食衣帛之次俄而范氏之藏大火子華曰若能入火取錦者從所得多少賞若商丘開往無難色入火自還埃不漫身不焦范氏之黨以為有道乃共謝之曰吾不知子之有道而誕子吾不知子之神人而辱子子其愚我也子其聾我也子其盲我也古語别敢問其道商丘開曰吾亡道雖吾之心亦不知所以雖然有一于此試與子言之曩子二客之宿吾舍也聞譽范氏之勢能使存者亡亡者存富者貧貧者富吾誠之無二心故不遠而來及來以子黨之言皆實也唯恐誠之之不至行之之不及不知形體之所措利害之所存也心一而物無忤者如斯而已今昉知子黨之誕我我內藏猜慮外矜觀聽追幸昔日之不焦溺也怛然內熱怵然震悸矣水火豈復可近哉情辭曲折皆當自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝弗知乎夫至信之人可以感物也動天地感鬼神橫六合而無逆者豈但履危險入水火而已哉商丘開信僞物猶不逆况彼我皆誠哉小子識之列子黃帝烈士傳干將為晉君作劔三年而成劔有雌雄天下名器也以雌劔獻君留其雄者謂妻曰吾藏劔在南山之隂北山之陽松生石上劔在其中君若覺殺吾爾生男以告之及君覺殺干將妻後生男名赤鼻具以告之赤鼻斫南山之松得劔欲往刺之晉君夢一人眉廣三寸辭欲報仇君覺購求甚急赤鼻乃逃朱興山中遇客欲為之報乃刎首以奉晉君客令鑊煮之頭三日三夜不爛君往視之客以雄劔倚擬君君頭墮鑊中客又自刎三夜悉爛不可分别葬之名曰三王塜列異傳莫邪為楚王作劔春秋戰國異辭卷十一
