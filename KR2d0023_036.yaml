body:
  text: 春秋戰國異辭卷三十三右春坊右諭德陳厚耀撰陳史陳世家陳胡公滿者虞帝舜之後也昔舜為庶人時堯妻之二女居於媯汭其後因為氏姓姓媯氏舜已崩傳禹天下而舜子商均為封國夏后之時或失或續至於周武王克殷紂乃復求舜後得媯滿封之於陳以奉帝舜祀是為胡公胡公卒子申公犀侯立申公卒弟相公臯羊立相公卒立申公子突是為孝公孝公卒子慎公圉戎立慎公當周厲王時慎公卒子幽公寧立幽公十二年周厲王奔於彘二十三年幽公卒子釐公孝立釐公六年周宣王即位三十六年釐公卒子武公靈立武公十五年卒子夷公説立是嵗周幽王即位夷公三年卒弟平公燮立平公平公七年周幽王為犬戎所殺周東徙秦始列為諸侯二十三年平公卒子文公圉立文公文公元年取蔡女生子他十年文公卒長子桓公鮑立以上陳世家桓公陳他無良師傅以至於不義惡加於萬民國人賦墓門以刺之詩序刺詩傳詩説皆以為泄冶孔寧儀行父之詩三十八年正月甲戌己丑陳桓公鮑卒桓公病而亂作國人分散故再赴桓公弟他母蔡女故蔡人為他殺五父及桓公太子免而立他是為厲公史陳世家與左氏異厲公利公莊公厲公二年生子敬仲完周太史過陳陳厲公使以周易筮之卦得觀之否是為觀國之光利用賔於王此其代陳有國乎不在此其在異國非此其身在其子孫若在異國必薑姓薑姓太嶽之後物莫能兩大陳衰此其昌乎史陳世家陳厲公取蔡女蔡女與蔡人亂厲公數如蔡淫七年厲公所殺桓公太子免之三弟長曰躍中曰林少曰杵臼共令蔡人誘厲公以好女與蔡人共殺厲公而立躍是為利公利公者桓公子也利公立五月卒立仲弟林是為莊公莊公七年卒少弟杵臼立是為宣公春秋傳厲公名躍無利公公按他即五父躍為厲公而無利史記誤舛也史陳世家宣公宣公三年楚武王卒楚始強史陳世家十七年周惠王娶陳女為后史陳世家二十一年宣公後有嬖姬生子欵欲立之乃殺其太子禦寇禦寇素愛厲公子完完懼禍及已乃奔齊齊桓欲使陳完為卿完曰羈旅之臣幸得免負擔君之惠也不敢當髙位桓公使為工正史陳世家齊懿仲欲妻陳敬仲卜之占曰是謂鳳凰于飛和鳴鏘鏘有媯之後將育于薑五世其昌並于正卿八世之後莫之與京史陳世家三十七年齊桓公伐蔡蔡敗南侵楚至召陵還過陳陳大夫轅濤塗惡其過陳詐齊令出東道東道惡桓公怒執陳轅濤塗史陳世家四十五年宣公卒子欵立是為穆公史陳世家穆公十六年穆公卒子共公朔立共公十八年共公卒子靈公平國立以上史陳世家靈公靈公元年楚莊王即位史陳世家六年楚伐陳史陳世家十年陳及楚平史陳世家陳靈公通乎夏姬國人刺之賦株林子貢詩傳詩説同詩序株林刺靈公也淫乎夏姬驅馳而往朝夕不息焉夏姬者陳大夫徴舒之母御叔之妻也孔寧儀行父從君荒淫泄冶刺之賦墓門子貢詩傳刺詩序以為陳他之詩今兩存之以闕疑詩説泄冶諫靈公孔寧儀行父譖而囚之冶作是詩陳幽公荒淫昏亂遊蕩無度國人作宛丘以刺之詩序詩説云陳人譏其大夫之詩陳無幽公蓋即靈公也陳靈公行僻而言失泄冶曰陳其亡矣吾驟諫君君不吾聽而愈失威儀夫上之化下猶風靡草風東則草靡而西風西則草靡而東在風所由而草為之靡是故人君之動不可不慎也夫曲木者惡得直景人君不直其行不敬其言者未有能保帝王之號垂顯令之名者也易曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其乎言出於身加於民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主君子之所以動天地可不慎乎天地動而萬物變化詩曰慎爾出話敬爾威儀無不嘉此之謂也今君不是之慎而縱恣焉不亡必弒靈公聞之以泄冶為妖言而殺之後果弒於徴舒説苑君道陳靈公與其大夫孔寧儀行父皆通於夏姬泄冶諫曰君臣淫亂民何效焉公以告二子二子請殺泄冶公弗禁遂殺泄冶十五年靈公與二子飲於夏氏公戲二子曰徴舒似汝二子曰亦似公徴舒怒靈公罷酒出徴舒伏弩廄門射殺靈公二子皆奔楚太子午奔晉徴舒自立為陳侯史陳世家舒按左傳不言徴自立列女傳陳女夏姬者大夫夏徴舒之母也其狀美好無匹內挾技術蓋老而復壯者三三為王后七為夫人公侯爭之莫不迷惑失意公孫寧儀行父與陳靈公皆通於夏姬或衣其衣以戲於朝泄冶見之謂曰君有不善子宜掩之今自子率君而為之不待幽間於朝廷以戲士民其謂爾何二人以告靈公靈公曰衆人知之吾不善無害也泄冶知之寡人恥焉乃使人賊泄冶而殺之新書陳靈公殺泄冶而鄧元去陳以族徙靈公聽讒囚泄冶內子憂之賦防有鵲巢詩傳詩説泄冶被讒內子憂之而作詩序以為憂宣公信讒之詩陳殺其大夫泄冶君子傷之賦澤陂詩傳諫詩説亦云泄冶而死君子傷之詩序澤陂刺時也言靈公君臣淫於其國男女相説憂思感傷焉楚莊王為徴舒殺靈公率諸侯伐陳謂陳曰無驚吾誅徴舒而已已誅徴舒因縣陳而有之羣臣畢賀申叔時使於齊來還獨不賀莊王問其故對曰鄙語有之牽牛徑入田田主奪之牛徑則有罪矣奪之牛不亦甚乎今王以徴舒為賊弒君故徴兵諸侯以義伐之已而取之以利其地則後何以令於天下是以不賀莊王曰善乃迎陳靈公太子午於晉而立之復君陳如故是為成公孔子讀史記至楚復陳曰賢哉楚莊王輕千乘之國而重一言史陳世家别與左傳稍家語孔子讀史至楚復陳喟然嘆曰賢哉楚王輕千乘之國而重一言之信匪申叔之言不能達其義匪楚莊王之賢不能受其訓成公二十八年楚莊王卒史陳世家二十九年陳倍楚盟史陳世家三十年楚共王伐陳是嵗成公卒子哀公弱立楚以陳喪罷去兵史陳世家哀公哀公三年楚圍陳復釋之史陳世家三十四年初陳哀公娶鄭長姬生悼太子師少姬生偃左傳鄭姬生太子偃師今此云兩姬又分偃師為二人未知孰是二嬖妾長妾生留少妾生勝留有寵哀公屬之其弟司徒招哀公病三月招殺悼太子立留為太子哀公怒欲誅招招發兵圍守哀公哀公自經殺三十五年招卒立留為君四月陳使使赴楚楚靈王聞陳亂乃殺陳使者使公子棄疾伐陳陳君留奔鄭十一月滅陳使棄疾為陳公招之殺悼太子也太子之子名吳出奔晉楚靈王滅陳五嵗楚公子棄疾弒靈王代立是為平王平王初立欲和諸侯乃求故陳悼太子師之子吳立為陳侯是為惠公惠公立探續哀公卒時年而為元空籍五嵗矣史陳世家惠公七年陳火史陳世家十五年吳王僚使公子光伐陳取胡沈而去史陳世家二十八年惠公卒子懷公柳立史陳世家懷公懷公元年吳破楚在郢召陳侯陳侯欲往大夫曰吳新得意楚王雖亡與陳有故不可倍懷公乃以疾謝吳四年吳復召懷公懷公恐如吳吳怒其前不往留之因卒吳乃立懷公子越是為湣公史陳世家湣公吳侵陳斬祀祀木殺厲疫人師還出竟陳太宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何太宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王討敝邑之罪又矜而赦之師與有無名乎檀弓下三史記吳王夫差伐陳取邑而去在陳湣公六年湣公六年孔子適陳過鄭與弟子相失遂至陳主司城貞子家陳惠公賔之上館惠公當作湣公孟子所謂陳侯周也時有隼鳥集於陳侯之庭而死陳湣公七年楛矢貫之石砮其長尺有咫公使人持隼如孔子館而問焉孔子曰隼之來也逺矣此肅慎氏之矢也昔武王克商通道於九夷百蠻各使以其方賄來貢而無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令德之致逺物也以示後人使永鑒焉故銘其楛曰肅慎氏貢楛矢以分大姬配胡公而封諸陳古者封同姓以珍玉所以展親親也分異姓以逺方之職貢所以無忘服也故分陳以肅慎氏貢焉君若使有司求諸故府其可得也公使求得之金牘如之合史記及家語國語略同孔子在陳陳湣公十年陳侯就之燕遊焉行路之人云魯司鐸火及宗廟以告孔子曰所及者其桓僖之廟事見左哀三年陳侯曰何以知之子曰禮祖有功而宗有德故不毁其廟焉今桓僖之親盡矣又功德不足以存其廟而不毁是以天災加之三日魯使至則桓僖也陳侯謂子貢曰吾乃今知聖人之可貴對曰君今知之可矣未若専其道而行其化之善也家語衡波傳孔子去衛至於陳途中見二女採桑子曰南枝窈窕北枝長答曰夫子遊陳必絶糧九曲明珠穿不得著來問我採桑娘夫子不聽而去既至陳陳大夫發兵圍之使穿九曲明珠始釋夫子不能思採桑女所言令門人返至採桑處不見二女見桑枝土一塊地遺粳三簇回謂賜曰木邊加土必姓杜粳三簇必名康三姐姊妹詣其家問之謬言女出外以一瓜獻二子子貢曰瓜子在內汝女必在家其母乃呼出見誨之曰絲將繫蟻蟻將繫絲如不肯過用煙薰之夫子如其言乃能穿之於是絶糧七日矣一統志亦載此列女傳陳國采桑之女陳辨女也晉大夫解君甫使於宋道過陳遇采桑之女止而戲之曰女為我歌吾將舍女女乃歌曰墓門有棘斧以斫之夫也不良國人知之大夫乃服而釋之十三年吳復來代陳陳告急楚楚昭王來救軍城父吳師去是年楚昭王卒於城父時孔子在陳史陳世家楚伐陳陳西門燔因使其降民修之孔子過之不軾子路曰禮過三人則下車過二人則軾今陳修門者人數衆矣夫子何為不軾孔子曰丘聞之國亡而不知不智知而不爭不忠忠而不死不廉今陳修門者不行一於此丘故不為軾也説苑立節傳又韓詩外陳惠公大城因趙凌陽之臺惠公宜作湣公未終而坐法死者數十人又執三監吏夫子適陳聞之見陳侯與俱登臺而觀焉夫子曰美哉斯臺自古聖王之為城臺未有不戮一人而能致功若此者也陳侯默而退遂竊赦所執吏既而見夫子問曰昔周作靈臺亦戮人乎答曰文王之興附者六州六州之衆各以子道來故區區之臺未及期日而已成矣何戮之有乎夫以少少之衆能立大大之功惟君爾孔叢子上陳有惡人焉曰敦洽讎糜雄顙廣顔色如浹頳垂眼一作髮臨鼻長肘而盩陳侯見而甚説之外使治其國內使制其身楚合諸侯陳侯病不能往使敦洽讎糜往謝焉楚王怪其名而先見之客有進狀有惡其名言有惡狀楚王怒合大夫而告之曰陳侯不知其不可使是不知也知而使之是侮也侮且不智不可不攻也興師伐陳然後喪吕覽遇合陳乾昔寢疾乾音干屬其兄弟而命其子尊己曰尊己乾昔子如我死則必大為我棺使吾二婢子夾我陳乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺檀弓下湣公十六年吳王夫差伐齊敗之艾陵使人召陳侯恐如吳楚伐陳史陳世家二十四年楚惠王以兵北伐殺陳湣公遂滅陳而有之史陳世家詳左氏春秋戰國異辭卷三十三
