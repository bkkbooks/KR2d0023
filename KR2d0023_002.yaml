body:
  text: 春秋戰國異辭卷首下右春坊右諭徳陳厚耀撰春秋戰國通表下通鑑以三家分晉為戰國之始今從之其次秦於周從六國年表也周秦晉齊楚燕魏韓趙魯鄭衛宋越九鼎震王命韓䖍趙籍魏斯列為諸侯趙追尊父獻子為獻侯燕湣公卒釐公立釐一作僖趙以牛畜為師荀欣為中尉徐越為内史賜相國公仲連衣二襲威烈王崩子安王驕立盗殺楚聲王子悼王類立類世家作熊疑秦伐魏至陽狐三晉伐楚至乘丘而還乗丘年表作桑丘鄭圍韓陽翟魏太子擊生子罃秦簡公卒子恵公立韓景侯卒子列侯取立世本作武侯趙烈侯卒弟武公立公當作侯王子定奔晉虢山崩壅河楚歸榆關于鄭楚伐鄭圍之鄭殺其相駟子陽日蝕三月聶政殺韓相俠累戰國策作殺韓傀髙誘云即俠累也宋悼公卒子休公田立鄭相子陽之黨共弑其君繻公而立幽公弟乙是為康公秦伐諸繇齊伐魯取最韓救魯鄭負黍反復歸韓魏伐鄭城酸棗魏敗秦於注楚伐韓取負黍晉烈公卒子孝公傾立竹書孝公作桓公作世家傾作頎世本傾欣秦伐韓宜陽取六邑三晉伐楚敗之于大梁榆關楚厚賂秦與之平秦晉戰于武城秦縣陜齊伐魏取襄陵魯敗齊于平陸秦太子生即出子也一載下年齊與晉戰秦侵魏隂晉齊田和㑹魏文侯于濁澤求為諸侯魏侯為之請于王王許之一載安王十五年據世家也秦伐蜀取南鄭年表作蜀取我南鄭誤秦恵公卒子出子立年表作出公魏伐秦敗我武下我當作之得其將識魏文侯卒或云在位五十年子擊立是為武侯韓列侯卒子文侯立竹書無文侯世本無列侯趙武公卒復立烈侯太子章是為敬侯大風晝昏竹書晉太子喜出奔竹書魏呉起奔楚楚以為相周秦晉齊楚燕魏韓趙􅀢魯鄭衞宋越齊田常曾孫田和始列為諸侯和先代立已二十四年紀元年是為太公遷其君康公于海上食一城康公淫于酒婦人不聽政和廢之以奉其先祀一載安王十一年趙始都邯鄲趙公子朝作亂朝武公子也魏世家作朔不克出奔魏與魏襲邯鄲魏敗而還魏封其公子緩竹書秦庶長改改名迎靈公之子于河西而立之是為獻公名師隰遂殺出子及其母沈之淵旁晉復奪秦河西地奪前所上八城乖秦以往者數易君君臣亂故晉復强齊伐魯破之齊太公卒子桓公午立竹書云齊田午弑其君郯及孺子喜而為公是為桓侯魏城安邑王垣韓伐鄭取陽城伐宋到彭城執宋君宋世家無被執之事趙敗齊于靈丘秦止從死趙救魏于廩丘大敗齊人秦城櫟陽徙都之魏敗趙于兎臺趙築剛平以侵衞日蝕晝晦齊魏為衞伐趙取剛平正月庚寅秦太子生即孝公也楚悼王卒子肅王臧立楚人殺呉起趙借兵于楚以伐魏取棘蒲秦魏攻韓韓求救于齊齊隂許韓使韓自以為得齊之救因與秦魏戰楚趙起兵救之齊因襲燕取桑丘魏與韓趙伐齊救燕也至桑丘鄭敗晉韓世家云鄭反晉齊康公卒無子田氏遂有齊國太公望之後絶祀秦初縣蒲藍田善明氏趙襲衞不克齊救衞齊桓公卒子因齊立是為威王趙㧞魏黄城於越遷于呉竹書周秦晉楚燕魏韓趙齊魯鄭衞宋越晉孝公卒子静公俱酒立静一竹靖世本云静公俱翟敗魏于澮三晉伐齊至靈丘因齊䘮也齊魏世家云使呉起伐至靈丘齊伐燕趙救燕秦初為市蜀伐楚取兹方楚為扞關以拒之趙與中山戰于房子韓文侯卒子哀侯立魯穆公卒子共公奮立魏韓趙滅晉後而分其地遷静公為家人晉絶不祀趙伐中山戰于中人安王崩子烈王喜立越王翳卒子王之侯立竹書云三十六年越太子諸咎弑其君翳十月越殺諸咎越滑呉人立孚錯枝為君周秦楚燕魏韓趙齊魯鄭衛宋越日蝕韓哀侯滅鄭竹書載于安王二十一年因自陽翟徙都于鄭趙敬侯卒子成侯種立魏公子緩如邯鄲以作難竹書地邯鄲趙於越大夫寺區定越亂立初無余是為莾安竹書周太史儋入秦見獻公宜載下年周秦楚燕魏韓趙齊魯衞宋越秦初縣櫟陽趙公子勝與成侯爭立為亂秦胡蘇帥師伐韓韓將韓襄敗胡蘇于酸水竹書魏觴諸侯于范臺竹書晉桓公邑哀侯於鄭竹書韓山堅殺其君哀侯竹書五史哀侯之弑在烈王年今宜從史燕敗齊于林營世家作燕伐齊敗狐于林營營一作燕釐公卒桓公立魯伐齊入陽關魏伐齊至博陵年表作鱄陵夏六月趙雨雪衞慎公卒子聲公訓立世本作聖公馳宋休公卒子辟公辟兵立一作辟公兵諡索隠曰竹書紀年作桓侯璧兵則璧兵桓也又莊子云桓侯行未出城門其前驅呼辟䝉人止之後為狂也司馬彪云呼辟使人避道蒙人以桓侯名辟而前驅呼之故為狂也衞伐齊取薛陵魏敗趙于北藺趙以大戊午為相戊一作成趙伐衞取鄉邑七十二鄉邑年表作都鄙魏伐楚取魯陽韓嚴弑其君哀侯戰國䇿以刺俠累弑哀侯為一事而史以為兩事也子懿侯立趙與秦戰于髙安敗之魏武侯卒子罃立是為恵王楚伐齊齊使淳于髠請救于趙趙大發兵救之楚聞之引去據滑稽傳魏侯罃與公中緩争立武侯未立太子故也韓趙合兵以伐魏大敗魏于濁澤遂圍安邑既而解去一載下年罃殺緩而立趙伐齊取甄一作鄄魏敗趙于懷趙攻鄭鄭已滅矣此疑即韓之地名也敗之以與韓韓與之長子齊威王朝周齊封即墨大夫烹阿大夫遂起兵西擊趙衞敗魏于濁澤圍魏侯魏侯請獻觀以和趙人歸我長城楚肅王卒無子立其弟熊良夫是為宣王宋辟公卒子剔成立韓侯趙侯遷晉桓公于屯留竹書無以後更晉事韓趙伐魏于葵竹書魏敗韓于馬陵魏敗趙于懷按史記此事一見趙成侯五年一見魏恵王二年疑一事而年次不同耳今姑兩存之中山築長城趙伐魏敗之涿澤圍魏侯日蝕烈王崩弟扁立是為顯王秦大疫桃冬花魏師伐趙圍蜀陽竹書魏大夫王錯出奔韓竹書秦櫟陽雨金四月至八月齊伐魏取觀津魏世家作齊敗我觀師竹書云齊田壽帥伐我圍觀觀降趙侵齊取長城趙與韓攻周鄭城邢丘竹書鄭韓改稱秦子向命為藍君竹書西周恵公初考王封弟于王城為西周桓公桓公卒子威公立威公卒子恵公立封少子班于鞏以奉王鞏地近王是為東周仍襲父號曰恵公韓趙分周為兩于是有東西二周今史記係于考王十五年葢因西周桓公事連書之耳兩存之以備叅考通鑑大事記俱載考王末年未詳河水赤於龍門三日竹書秦敗韓魏于洛陽魏與韓㑹宅陽魏城武都都世家作堵趙與齊戰阿下魏公子景賈帥師伐鄭韓明戰于韓魏師敗逋竹書魏伐宋取儀臺趙攻衞取甄夏四月甲寅魏徙邦于大梁竹書王發逢忌之藪以賜民竹書於越寺區弟思弑其君莾安次無顓立竹書秦攻魏趙救之石阿秦章蟜敗三晉之師于石門斬首六萬天下賀以黼黻秦始稱覇雨碧于郢地忽長十丈有餘髙尺半竹書秦攻魏少梁趙救之魏師伐邯鄲取列人及肥竹書雨黍于齊竹書魏敗韓趙之師于澮秦使庶長國伐魏少梁虜其將公孫痤年表云虜其太子取龎韓大雨三月趙侯韓侯遇于上黨史作韓昭侯然昭侯此時尚未立也秦獻公卒子孝公渠梁立年已二十一嵗燕桓公卒文公立衞聲公卒子成侯速立世本名不逝魏與趙榆次陽邑竹書魏王㑹鄭釐侯于巫沙竹書彗星見西方衞公孫鞅入秦魏伐趙取虎牢趙與韓攻秦魏入河水于圃田又為大溝引圃水瑕陽人自秦導岷山青衣水來歸竹書周致文武胙于秦東周恵公傑卒見年表徐廣注一作恵公班卒子傑嗣趙助魏攻齊秦師伐鄭次于懷竹書魏城殷竹書魏有星晝墜有聲秦以衞鞅為左庶長定變法之令韓懿侯卒子昭侯立趙與韓魏分晉封晉君以端氏晉已滅矣而趙世家復載此豈其裔尚存耶後十年肅侯徙之屯留魏龍賈帥師築長城于西邊竹書楚師出河水以水長垣之外竹書鄭取屯留長子竹書秦敗韓于西山趙成侯與魏恵王遇于葛孽鄒忌以鼓琴見齊威王鄭釐侯使許息來致地平丘户牖首垣諸邑及鄭馳地魏取枳道與鄭鹿王及鄭釐侯盟于巫沙以釋宅陽之圍歸釐于鄭竹書趙魏㑹于鄗宋取韓黄池魏取韓朱韓世家作魏取宋楚君尹黒迎女于秦君當作令趙孟如齊趙孟未詳何人疑即成侯於越子無顓卒是為菼蠋卯次無彊立竹書王史越世家云之侯卒子王無彊立但未載其年齊封鄒忌以下邳號曰成侯齊趙宋㑹于平陸魯衞宋鄭君朝于魏索隠曰竹書紀年云魯恭侯宋桓侯衞成侯鄭釐侯來朝皆在魏恵十四年宋桓侯者即宋剔成也鄭釐侯者韓昭侯也韓哀侯滅鄭而徙都之遂改號曰鄭趙與燕㑹于阿竹書云邯鄲成侯㑹燕成侯于安邑疑即此秦孝公與魏恵王㑹于杜平杜平魏世家作社平秦以衞鞅為左庶長齊威王與魏恵王㑹田于郊魏侵宋黄池宋復取之魏獻榮椽于趙榮椽屋材也趙以為檀臺秦公孫壯伐鄭圍焦城不克帥師城上枳安陵山民竹書邯鄲伐衞取漆富兵城之竹書齊師及燕戰于洵水齊師遁竹書秦與魏戰于元里斬首七千取魏少梁魏圍趙邯鄲楚使景舍救之齊田期伐魏東鄙戰于桂陽魏師敗逋竹書東周與鄭髙都竹書鄭釐侯朝魏中陽竹書宋景鼓衞公孫倉㑹師圍魏襄陵竹書韓伐東周取陵觀廪丘世家作邢丘楚以昭奚恤為相魯共公卒子康公屯立十月魏㧞邯鄲齊使田忌孫臏救趙大敗魏于桂陵于是齊最强自稱為王以令天下王以韓師諸侯帥縣于襄陵竹書魏王葢指王齊侯使楚景舍來求成竹書秦以衞鞅為大良造伐魏安邑降之諸侯圍魏襄陵魏築長城塞固陽燕伐趙圍濁鹿趙靈王及代人救濁鹿敗燕師于勺晉取𤣥武濩澤即雷澤舜漁處竹書秦城商塞秦衞鞅圍魏固陽降之魏歸趙邯鄲與盟漳水上韓以申不害為相修術行道國内以治諸侯不敢來侵伐秦攻趙藺齊築房以為長城竹書秦作咸陽築闕徙都之秦並小邑為四十一縣縣置一令三年表作十一縣秦廢井田開阡陌東地度洛皆衞鞅之謀也秦魏㑹于彤趙成侯卒公子緤與太子語争立緤敗亡奔韓語立是為肅侯魏王如衞命公子南為侯竹書秦初為縣置秩史韓姬弑其君悼公姬音怡韓之大夫姓名韓無悼公不知悼公何君也趙奪晉君端氏徙處屯留秦衞鞅初定賦法韓昭侯如秦趙肅侯與魏恵王遇于隂晉魏殷臣趙公孫裒伐燕還取夏屋城曲逆竹書趙公子范襲邯鄲不勝而死楚伐徐州竹書衞更貶號曰侯服屬三晉是時子思仕于衞公衞本侯爵春秋時率僭號至是自貶以求容于三晉耳齊殺其大夫牟辛大夫一作夫人趙肅侯朝于王魏章帥師及鄭師伐楚取上蔡孫何取㶏陽竹書秦孝公㑹諸侯于逢澤竹書綘中地坼西絶于汾竹書魏敗韓馬陵竹書秦㑹諸侯于周㑹而不朝齊田忌襲臨淄不勝而奔田忌與成侯鄒忌有郤故襲臨淄求之陵此據史記也國策田忌之奔在戰馬後為是趙攻齊㧞髙唐魯康公卒子景公匽立匽年表作偃丹封名㑹丹魏大臣年表魏有此八字未知何解而魏世家恵王二十一年與秦㑹彤趙成侯卒之下徐廣注又引此語亦未詳何説也周致伯于秦秦城武城年表武城下有從東方牡丘來歸七字未詳齊威王卒子宣王辟彊立趙公子刻攻魏首垣魏穰庇帥師及鄭孔夜戰于梁赫鄭師敗逋竹書魏與齊田肹戰于馬陵竹書八史載二十年諸侯賀秦秦使公子少官率師㑹諸侯于逢澤朝天子中山君相魏魏文侯滅中山使子撃守之後尋復國至是始令相魏其後又為趙所滅五月齊田肹及宋人伐魏東鄙圍平陽竹書邯鄲伐我北鄙竹書魏伐韓趙與韓共撃之趙戰于南梁不利韓請救于齊齊以田忌田嬰田肹為將孫臏為帥伐魏以救韓大敗之于馬陵殺其將軍龎涓虜太子申秦有馬生人魏城濟陽竹書齊田忌奔楚鄒忌譖之也秦使衞鞅撃魏虜魏公子卬魏獻河西地于秦秦封鞅為列侯號商君竹書云秦封衞鞅于鄔改名曰尚秦侵楚楚宣王卒子威王熊商立齊趙㑹伐魏魏去安邑徙都大梁邳遷于薛竹書三月魏為大溝于北郛以行圃田之水竹書秦與晉戰于岸門本紀作雁門書韓趙魏猶稱三晉故史秦與晉戰虜其將魏錯魏以太子赫為太子趙伐魏秦大荔圍合陽秦孝公卒子恵文王駟立生十九年而立秦紀作恵文君衞鞅奔魏魏人不納反之秦秦車裂以徇滅其家楚韓趙蜀人皆朝秦韓申不害卒相韓十五年諸侯不侵周賀秦秦初行錢宋大丘社亡齊宣王魏恵王㑹于平阿南年表阿作河孟軻至魏史作軻先至齊而後至魏今以孟子為定鄭威侯與邯鄲圍魏襄陵竹書秦王冠秦㧞韓宜陽齊魏復㑹于甄趙起壽陵魏恵王卒子襄王立竹書紀年云恵王三十六年改元稱一年後十六年卒杜預和嶠皆以為史誤分恵王後十六年為襄王之年而増哀王二十三年也世本恵王生襄王而無哀王於越子無彊伐楚竹書田嬰相齊周致文武胙於秦魏夫人如秦齊魏初稱王齊魏㑹于徐州竹書載上年以相王也魏追尊其父為恵王旱韓作髙門秦以其女為燕太子即易王婦趙侯游大陵出于鹿門大戊午叩馬而諫楚滅越殺王無彊據綱目彊竹書載下年之史越世家云王之侯卒子無立當楚威王時越興師伐楚楚大敗之殺王無彊盡取呉故地越以此散諸族子争立或為王或為君濵于江南海上服朝于楚蘇秦說燕文公予車馬金帛以至趙趙肅侯用之因約六國為從長楚吾得帥師及秦伐鄭圍綸氏竹書周秦楚燕魏韓趙齊魯衞宋秦以隂晉人犀首即公孫衍為大良造齊田嬰欺楚楚伐齊敗之于徐州秦恵王以其女為燕太子婦燕文公卒子易王立韓髙門成昭侯卒子宣恵王立趙圍魏黄不克趙築長城秦敗魏于雕隂燕趙韓魏齊楚合從以擯秦以蘇秦為約從長并相六國燕易王初立齊宣王因燕䘮伐之取十城蘇秦説齊使復歸於燕衞成侯卒子平侯立秦使公孫衍欺齊魏以伐趙趙決河水灌之齊魏兵罷蘇秦去趙適燕從約皆解魏納隂晉以和于秦秦更名寧秦今華隂義渠内亂秦庶長操將兵定之秦公子卬與魏戰虜其將龍賈斬首八萬史記魏五年秦敗我龍賈軍四萬五千于雕隂疑即此一事而年次軍數偶誤也竹書亦同魏王㑹鄭威侯于巫沙竹書秦圍魏焦曲沃魏入少梁河西地于秦秦與魏㑹應秦渡河取魏汾隂皮氏圍焦降之竹書載上年楚威王卒子懷王熊槐立魏伐楚因楚䘮也取陘山宋公剔成弟偃攻襲剔成剔成奔齊偃自立戰國策吕氏春秋皆云偃諡康王一作元公秦以張儀為相秦公子桑圍魏蒲陽降之魏盡入上郡十五縣于秦秦敗趙疵于河西殺之取趙藺離石秦陳軫奔楚秦縣義渠義渠君為臣秦歸魏焦曲沃秦更少梁曰夏陽韓舉與齊魏戰死于桑丘史係此于趙世家則韓舉乃趙将也而徐廣以為韓将考之韓世家宣恵王八年魏敗我將韓舉在後二年則韓舉未死也死桑丘者趙將耳九鼎淪泗没于淵竹書秦初臘㑹龍門趙肅侯卒秦楚燕齊魏帥師各萬人來㑹葬子武靈王雍立趙置博聞師及左右司過各三人加先臣肥義之秩趙以陽文君趙豹為相梁襄王與太子嗣韓宣恵王與太子倉來朝信宫秦初稱王綱目四月戊午魏君為王韓亦為王秦本紀于恵文王四年書齊魏為王矣又于十三年書魏君為王未知何說衞平侯卒子嗣君立魏敗韓將韓舉魏敗趙將趙䕶秦初更稱元年秦相張儀將兵伐魏取陜出其人與魏齊宣王卒子湣王地立通鑑増宣王為二十九年卒以合于孟子伐燕之事今仍從史記趙城鄗楚敗魏于襄陵竹書宋王偃滅滕伐薛取淮淮姬姓國一載上年秦使其相張儀與齊楚魏大臣㑹盟于齧桑楚使柱國昭陽將兵攻魏破之于襄陵得八邑又攻齊齊使陳軫說罷之燕初稱王蘇秦自燕奔齊一載上年韓魏太子朝于秦秦使張儀相魏魏有女子化為丈夫秦伐魏取曲沃平周韓初稱王年表載上年而秦紀于宣恵王八年已載韓亦稱王今兩存之韓趙㑹于區鼠顯王崩子慎靚王定立趙取韓女為夫人齊封田嬰于薛綱目是年書齊號薛公田文為孟嘗君未詳何據又紀事年表齊田嬰卒文嗣立號孟嘗君與此大異燕易王卒子噲立秦王北游戎地至河上衞更貶號曰君獨有濮陽齊迎婦于秦秦取魏曲沃平周竹書楚城廣陵魏襄王卒子哀王立竹書于此年云魏恵成王薨明年稱今王元年通鑑以此年為魏恵王卒子襄王立而無哀王張儀復歸秦秦伐韓取鄢孟軻去魏適齊孟子在梁十八年而去據綱目樂池相秦楚韓趙魏燕五國帥匈奴共伐秦以楚懷王為從長蘇秦為從約長攻函谷關秦使庶長疾出兵撃之皆敗走疾即樗里疾宋公偃自稱為王趙令國人謂已曰君是時五國皆王而趙獨否宋敗齊師取五城又敗魏師又敗楚師取地三百里紀事年表齊與宋攻魏趙韓魏共伐秦秦庶長疾敗韓于脩魚虜其將䱸申差二將名又敗趙公子渇韓太子奐斬首八萬二千齊敗趙魏于觀澤齊趙世家皆作觀澤而魏世家及年表俱作觀津未知孰是齊秦爭長魏請成于秦張儀復歸相秦齊人殺蘇秦齊王復用其弟蘇代秦取趙中都西陽安邑趙世家作秦取西都及中陽無安邑二字齊破燕燕王噲讓國于其相子之噲老不聽政願為之臣秦司馬錯伐蜀滅之趙召燕公子職于韓立以為燕王使樂池送之燕世家無趙送公子職之事當是趙聞燕亂遥立職為王雖使樂池送之竟未能入秦取韓石章秦敗趙將軍英秦紀作伐敗趙將泥慎靚王崩子赧王延立竹書赧王作隠王是時六國皆稱王魯景公卒子平公叔立世本叔作旅鄭侯使韓辰歸魏陽及向二月城陽向更名陽為河雍向為髙平竹書王自成周徙都王城從西周武公居焉西周公共太子卒立公子咎為太子秦侵義渠得二十五城魏復背秦為從秦使樗里疾伐魏取曲沃攻焦降之又敗韓于岸門斬首萬走其將犀首韓質太子倉于秦以和齊使章子伐燕取之醢子之殺燕王噲竹書云子之殺太子平不克齊殺子之醢其身秦封公子通于蜀年表載下年通作繇通以陳莊為相孟軻去齊鄭宣王朝于梁竹書秦使魏立公子政為太子魏復事秦也秦王與魏王㑹于臨晉秦使庶長疾攻趙㧞藺虜其將趙莊樗里子傳云虜趙將軍莊豹秦使張儀相楚楚使使絶交于齊張儀歸秦楚使屈匄攻秦秦使庶長章發兵擊之楚魏王來過趙邯鄲齊地景長二丈餘高一尺竹書楚圍韓雍氏秦助韓攻楚圍景痤秦使樗里疾助庶長章擊楚于丹陽虜其大將屈匄及禆將逢侯丑等七十餘人斬首八萬攻漢中取地六百里置漢中郡楚復襲秦又大敗于藍田韓魏襲楚至于鄧楚割兩城以和于秦韓宣恵王卒子襄王倉立秦封樗里疾為嚴君齊攻魏魏擊齊虜聲子于濮聲一作贅秦使庶長疾助韓攻齊到滿助魏攻燕燕人共立太子平為王是為昭王趙何攻魏韓明帥師伐襄丘竹書秦王來見于蒲坂關竹書四月越王使公師隅來獻舟三百箭五百萬及犀角象齒竹書秦伐楚取召陵丹犁臣于蜀丹犁二戎號也蜀相陳壯一作莊殺蜀侯降秦魏伐衞㧞列城二竹書云翟章伐衞楚懷王囚張儀既而釋之張儀說楚韓連衡以事秦儀歸報秦封儀為武信君復使說齊趙燕皆下之秦恵文王卒子武王蕩立一作悼武王生十九年而立諸侯復合從張儀歸報未至咸陽而武王已立武王自為太子時不悦張儀群臣多譖之諸侯聞之皆畔衡魏敗趙將韓舉竹書秦武王與魏哀王㑹于臨晉秦使甘茂定蜀誅蜀相壯秦張儀魏章出之魏年表于是年書張儀魏章皆死于魏魏相田需卒以太子為相趙呉廣内其女娃嬴于趙王孟姚也是為恵后有寵生子曰何秦伐義渠丹犁洛入成周山水大出竹書齊迎婦于秦秦初置丞相以樗里疾甘茂為左右丞相張儀死于魏竹書載赧王三年趙王出九門為野臺以望齊中山之境十月大霖雨疾風河氷酸棗竹書楚庶章帥師來㑹魏次于襄丘竹書秦武王與韓襄王㑹臨晉外秦魏㑹于應樗里疾相韓秋秦使甘茂庶長封伐韓宜陽秦武王欲容車通三川窺周室秦南公掲卒翟章救鄭次于南屈竹書秦甘茂㧞宜陽斬首六萬渉河城武遂韓王使公仲侈入謝與秦平魏太子朝于秦八月秦武王卒立其異母弟稷一名則是為昭襄王年表作昭王母芈氏治國事以舅魏冉為將軍趙始胡服招騎射秦公孫爰帥師伐魏皮氏翟章帥師救皮氏圍疾西風竹書齊與宋攻魏敗之觀澤紀事年表秦以嚴君疾為相樗里疾封嚴君秦使向壽平宜陽使樗里疾甘茂伐魏秦復以武遂歸韓甘茂言之也甘茂出奔齊向壽公孫奭譖之也秦樗里疾擊魏皮氏未㧞而解與魏講罷兵樗里傳云樗里攻衞蒲阪觧而去還擊皮氏甘茂傳云樗里子甘茂伐魏皮氏楚與齊韓復合從趙君畧中山地至寧葭西畧胡地至榆中遣使約秦韓楚魏齊并致胡兵城皮氏竹書彗星見趙伐中山取數邑中山復獻四邑以和楚復倍齊合秦秦厚賂楚楚往迎婦年表楚懷二十四年秦來迎婦秦庶長壯與大臣諸侯公子作亂魏冉誅之及恵文后皆不得良死出悼武后歸于魏武王后也冉遂為政秦桑君為亂誅本紀桑君作庶長壯秦王冠秦王楚王㑹于黄棘秦復與楚上庸漢中有上庸縣故屬楚彗星見秦取魏蒲坂晉陽封陵晉陽一作陽晉封陵一作封谷齊韓魏共伐楚以楚負約合秦也楚以太子横質于秦請救秦遣客卿通將兵救楚三國引兵去秦復與韓武遂趙攻中山魏王朝秦于應亭魏世家作與秦㑹臨晉秦復與魏蒲坂楚太子横亡歸秦大夫有私與楚太子鬬者太子殺之而亡歸韓太子嬰與秦王㑹臨晉因至咸陽而歸朝秦也邯鄲命吏大夫奴遷于九原將軍大夫適子代史皆貂服竹書日食晝晦秦伐韓取穰蜀侯煇叛秦年表作蜀守煇秦使司馬錯定蜀誅煇華陽國志曰秦封王子煇為蜀侯歸胙于王後母加毒以進王大怒使司馬錯賜煇劍秦與齊韓魏共伐楚殺楚將唐昧取重丘秦紀云庶長奐伐楚斬首二萬年表云齊與秦撃楚公子將大有功俱此事也趙恵后卒即呉娃孟姚也使周祒胡服傅王子何趙伐中山秦使涇陽君公子悝質于齊求見孟嘗君孟嘗將入秦以客諫而止後卒入秦秦樗里疾卒秦魏冉為相楚圍韓雍氏秦使將軍芈戎攻楚取新市秦復伐楚大破楚軍斬首三萬殺其將軍景缺㧞新城年表作襄城楚使太子横質于齊以求平韓太子嬰卒齊章子魏公孫喜韓暴鳶共攻楚方城取唐昧趙破中山中山君亡死于齊攘地北至燕代西至雲中九原魏封公子勁韓封公子長為諸侯薛侯來㑹魏王于釡丘竹書楚入魏雍氏敗之竹書齊歸涇陽君于秦五月趙君廢其太子章而傳國于少子何是為恵文王自號主父秦庶長奐伐楚取八城殺其將景快秦誘楚懷王于武關執之以歸楚請太子横于齊而立之是為頃襄王齊魏㑹于韓韓立公子咎為太子齊孟嘗君田文入秦秦以為相楚大夫屈原自投于汨羅以死秦田文免相自秦逃歸于齊秦以樓緩為丞相秦攻楚大敗楚軍斬首五萬取十六城田文相齊與韓魏共攻秦敗秦軍于函谷關河渭絶一日秦使公子池割河東三城以和趙以公子勝為相封平原君楚懷王自秦走趙不納秦追執之趙主父行新地遂出代西遇樓煩于西河而致其兵彗星見齊韓魏趙宋中山五國共攻秦至鹽氏而還秦與韓武遂與魏封陵以和楚懷王卒于秦歸葬魯平公卒子文公賈立世本文公作湣公而年表又作文侯魏哀王卒子昭王遫立韓襄王卒子釐王咎立秦樓緩免以穰侯魏冉為丞相秦與楚粟五萬石秦尉錯撃魏㧞襄城趙主父與齊燕共滅中山趙世家在恵文三年遷其君于虜施歸大赦酺五日趙故太子章作亂公子成李兌誅之遂弑主父于沙丘圍之沙丘三月餘餓死秦敗魏師于解秦向壽伐韓取武始秦左更白起攻韓新城秦五傳齊大夫吕禮出奔魏穰侯傳作奔齊秦以任鄙為漢中守齊田甲刼其王王疑孟嘗君故甲為之刼王相田文走既而王復召文文歸老于薛趙與燕鄚昜鄚音莫韓魏攻秦秦左更白起敗之于伊闕斬首二十四萬虜韓將公孫喜穰侯傳作魏將㧞五城白起遷為國尉渉河取韓安邑以東到乾河秦大良造白起攻魏取垣復予之又攻楚取宛葉楚頃襄王迎婦于秦秦楚復平秦魏冉免相秦紀在下年以客卿壽燭代之壽燭一作燭壽秦伐韓㧞宛陵秦左更錯取軹及鄧秦相燭免魏冉復相封冉於陶初封穰益封陶公子市于宛公子悝于鄧為諸侯市為髙陵君悝為涇陽君索隠曰悝號髙陵君昭襄王弟也趙城南行唐城陽君入朝于秦東周君朝秦秦魏冉伐魏魏入河東地四百里韓入武遂地二百里以和秦王之宜陽秦以垣易蒲坂皮氏芒卯以詐見重于魏王趙以趙梁為將與齊合軍攻韓至魯關下春正月孟軻卒于鄒年八十四秦將錯攻垣河雍决橋取之秦將錯綱目作大良造白起伐魏至軹取城大小六十一秦吕禮來自魏秦任鄙卒趙董叔與魏伐宋得河陽于魏秦㧞趙梗陽年表作桂陽十月秦自稱西帝遣使立齊為東帝十二月復去之皆為王秦㧞魏新垣曲陽秦昭王之漢中又之上郡北河趙趙梁將攻齊秦將錯攻魏河内魏獻安邑以和秦出其人徙河東賜爵赦罪人遷之秦涇陽君封于宛即公子市齊與魏楚共伐宋殺王偃或云偃走死温遂滅宋而三分其地秦敗韓師于夏山趙韓徐為將攻齊趙公主死呉娃之女恵文王之妹也齊田文奔魏魏以為相一載下年秦䝉武伐齊取河東為九縣齊世家云㧞列城九秦昭王與楚頃襄王㑹宛結和親秦與趙恵文王㑹中陽趙秦韓魏燕攻齊取靈丘齊殺狐咺陳舉燕使樂毅如趙約攻齊也秦命尉斯離與三晉燕伐齊燕以樂毅為上將軍合秦楚魏趙韓之師以伐齊敗之于濟西毅獨入臨淄齊湣王出走莒其相淖齒殺之燕封毅為昌國君下齊七十餘城楚取齊淮北秦昭王與魏昭王㑹宜陽與韓釐王㑹新城年表云與秦王㑹西周周秦楚燕魏韓趙齊魯衞秦王與楚王㑹于鄢秋又㑹穰燕王與趙王遇秦取魏安城兵至大梁燕趙救之乃還齊人討殺淖齒而立湣王之子法章保莒城是為襄王趙亷頗攻齊昔陽取之年表在上年晉亷頗傳昔陽作陽秦魏冉免相衞嗣君卒子懷君立趙使藺相如獻璧于秦魏大水秦王與韓王㑹新城年表韓與秦㑹西周間與魏王㑹新明邑樂毅將趙師攻魏伯陽秦伐趙㧞兩城怨趙不與已撃齊也秦魏冉復為相楚遣使于諸侯復為從感弋人之言也楚謀入周王使西周武公喻止之綱目作東周公未詳何據秦㧞趙石城趙王再之衞東陽决河水伐魏大潦漳水出秦魏冉相趙此據趙世家而冉傳無之地動壞城秦將錯攻楚赦罪人遷之南陽秦白起攻趙取代光狼城年表云秦擊趙斬首三萬又使司馬錯發隴西因蜀攻楚黔中㧞之楚割上庸漢北地予秦趙與魏伯陽趙將趙奢攻齊麥丘取之秦大良造白起攻楚㧞西陵取鄢鄧五城赦罪人遷之趙亷頗攻齊破其一軍秦趙㑹于澠池趙藺相如從澠池趙世家作西河外燕昭王卒子恵王立以騎刼代樂毅攻齊毅亡走趙齊田單襲破燕軍殺騎刼盡復齊地迎齊襄王于莒入臨淄齊封單為安平君趙封樂毅為望諸君薛公田文卒齊魏共滅薛初田文相魏與諸侯共破齊襄王復位而文中立為諸侯無所屬襄王畏之與連和至是卒諸子争立齊魏共滅之秦大良造白起攻楚㧞郢燒夷陵楚先王墓東至竟陵置南郡楚王去郢東北徙都陳秦封白起為武安君年表在下年周君入秦趙徙漳水武平西秦王與楚王㑹于襄陵秦使蜀守若一作白起伐楚復取巫郡及江南置黔中郡趙大疫趙立公子丹為太子魏昭王卒子安釐王圍立秦白起攻魏取兩城年表兩作南楚王收東地兵得十餘萬復取秦所㧞江旁十五邑以為郡距秦黔中郡反歸楚江旁一作江南趙樓昌攻魏㡬不克十二月趙亷頗攻㡬取之魏封其弟公子無忌為信陵君秦穰侯攻魏㧞二城軍大梁下韓使暴鳶救魏秦破之鳶走開封斬首四萬魏入三縣以和魏世家云予秦温以和趙亷頗攻魏房子㧞之因城而還又攻安陽取之秦客卿胡傷攻魏巻蔡陽長社取之秦魏冉伐魏㧞四城斬首四萬穰侯傳云秦使穰侯伐魏走魏將暴鳶得魏三縣穰侯益封趙將燕周攻昌城髙唐取之趙與魏共撃秦秦將白起破之華陽得一將軍魏復與齊合從據綱目趙魏攻韓華陽秦使白起救之破魏將芒卯得趙一將軍斬首十五萬魏入南陽于秦以和秦白起與趙將賈偃戰沉其卒二萬人于河秦以魏韓上庸地為一郡南陽免臣遷居之趙取東胡歐代地韓釐王卒子桓恵王立魯文公卒子頃公讎立楚及秦平使黄歇侍太子完質于秦黄歇楚世家作左徒歇官名也燕恵王卒趙世家恵文二十八年燕將成安君公孫操弑其王樂資云即恵王也子武成王立秦楚佐韓魏共伐燕趙徙漳水武平南趙封趙豹為平陽君趙河水出大潦秦初置南陽郡趙藺相如伐齊至平邑趙罷城北九門大城趙平原君薦其部吏趙奢于王秦圍趙閼與音曷余攻趙世家云秦韓相而圍閼與趙使趙奢將撃之大破秦軍閼與下趙封奢為馬服君周君之秦周君西周君也秦魏冉使客卿竈攻齊取剛壽以廣其陶邑一載上年秦太后詐殺義渠王于甘泉遂起兵滅義渠魏人范睢入秦秦以為客卿秦中更胡傷攻趙閼與不㧞秦使五大夫綰攻魏㧞懷用范睢之謀也秦悼太子死于魏質于魏者歸葬芷陽夏秦攻魏取邢丘懷邢丘魏世家作郪丘年表作廪丘秦廢其母宣太后不治事逐穰侯魏冉華陽君芉戎髙陵君市涇陽君悝于關外以范睢為丞相封應侯趙恵文王卒子孝成王丹立齊楚攻魏魏使唐睢求救于秦秦救却之秦以次子安國君柱為太子秦攻韓少曲髙平㧞之秦伐趙㧞三城趙以長安君出質于齊齊救却之齊安平君田單遂以趙師攻燕㧞中陽又攻韓㧞注人趙以平原君勝為相九月秦穰侯魏冉出之陶十月秦宣太后芉氏以憂卒葬芷陽酈山齊襄王卒子建立國事皆決于母太史氏秦武安君白起攻韓㧞九城斬首五萬秦白起攻韓陘城㧞汾旁五城斬首五萬因城河上廣武趙恵文后卒田單相趙秦攻韓取南陽一作南郡絶太行道楚王疾太子完自秦逃歸秋楚項襄王卒子考烈王完立世家作太子熊元以左徒黄歇為令尹號春申君賜淮北地十二縣秦五大夫賁攻韓取十城秦公子悝葉陽君出之國未至而死楚納州于秦以平是時楚益弱楚以春申君黄歇為相秦伐韓㧞野王上黨路絶韓上黨守馮亭以其城降趙趙使平原君往受之趙使亷頗軍長平以拒秦秦王之南鄭秦攻韓緱氏藺㧞之秦使左庶長王齕攻上黨㧞之上黨民走趙遂攻亷頗軍趙以趙括代亷頗將秦使白起大破趙軍于長平殺趙括坑降卒四十萬人一作四十五萬人正月旦秦太子之子異人生子政于邯鄲時異人質于趙吕不韋進其所幸姬生子政即始皇帝也秦軍分為二秦武安君罷歸王齕將伐趙㧞武安虎牢秦司馬梗北定太原盡有韓上黨韓割垣雍趙割六城以和趙武垣令傅豹王容蘇射率衆反燕地趙以靈丘封楚相春申君魏以孔斌為相斌字子順㝷以病免秦誘執趙公子勝既而歸之十月秦復使五大夫王陵攻趙邯鄲不克正月秦復發兵佐陵陵戰不克使王齕代將圍邯鄲趙平原君如楚請救還楚使黄歇帥師救趙年表在下年楚世家云楚遣將軍景陽救趙十月秦將軍張唐攻魏魏使晉鄙帥師救趙止于鄴魯仲連傳作止于蕩隂燕武成王卒子孝王立秦武安君白起有罪免為士伍遷隂宻秦益發卒軍汾城旁秦武安君白起有罪賜死于杜郵益遣鄭安平撃趙魏公子無忌矯殺晉鄙奪其軍以救趙大破秦軍于邯鄲秦王齕觧圍走鄭安平以二萬人降趙無忌因留趙不敢歸秦王齕還奔汾軍二月餘攻晉軍斬首六千晉走流死河二萬人攻汾城即從唐㧞寧新中寧新中更名安陽秦張唐攻鄭㧞之三晉距秦秦初作河橋一載上年秦太子之子異人自趙逃歸更名曰楚韓魏楚救趙新中秦兵罷楚世家云考烈六年秦圍邯鄲楚使將軍景陽救之七年至新中秦兵罷秦將軍樛攻韓取陽城負黍斬首四萬攻趙取二十餘城斬首九萬秦使將軍樛攻西周西周君入秦獻地秦歸其君于周未㡬卒燕攻趙昌壯壯當作城五月㧞之趙將樂乗慶舍攻秦信梁軍破之信梁盖王齕號趙太子死史失名秦攻西州㧞之徒父祺出州當作周徒父趙大夫趙見秦㧞西周故令徒父祺將兵出境也赧王崩秦楚燕魏韓趙齊魯衞周民東亡秦取其九鼎寳器而遷西周公于􅓆狐聚西周公葢武公之子秦河東守王稽有罪誅丞相范睢免以蔡澤為丞相數月亦免秦使樛伐魏取呉城韓王入朝于秦魏委國聽令于秦以上三條一載下年楚黄歇以荀卿為蘭陵令楚使黄歇北取魯遷魯君于莒魯世家云頃公十九年楚伐我取徐州相去一年葢即此也趙城元氏縣上原趙武陽君鄭安平死故秦降將收其地燕孝王卒子喜立趙邯鄲廥燒廥庫廐之名秦王郊見上帝于雍楚徙于鉅陽陽年表誤作錫衞懷君朝魏魏囚殺之而立嗣君之弟是為元君元君為魏壻故魏立之徐廣曰班氏云元君者懐君之弟一載下年燕使栗腹攻趙趙使亷頗擊殺之擒樂乘遂圍燕燕割五城以將渠為相而請和趙師乃解趙以尉文封亷頗為信平君為假相國秋秦昭襄王卒一作昭王子孝文王柱立尊母唐八子為唐太后合葬于先王以華陽夫人為后子楚為太子韓王衰絰入秦弔祠楚使春申君弔祠于秦諸侯皆使其將相來弔祠視喪事趙平原君趙勝卒一載上年楚柱國景伯卒秦赦罪人脩先王功臣褒厚親戚弛苑囿十月辛丑秦孝文王卒孝文王除䘮十月己亥即位三日辛丑卒葬壽陵子莊襄王楚立年三十二尊華陽夫人為華陽太后孝文王后也夏姬為夏太后莊襄王生母也趙以樂乘為武襄君燕伐齊㧞聊城齊田單攻取之據綱日秦大赦罪人脩先王功臣施德厚骨肉而布恵于民秦以吕不韋為相國封文信侯東周君與諸侯謀秦秦使相國吕不韋滅之以陽城地賜周君奉其祭祀周比亡凡有七邑陽一云遷東周君于人聚秦使䝉驁伐韓驁齊人蒙恬之祖韓獻成臯鞏年表作㧞我成臯滎陽置三川郡秦界至大梁齊君王后卒楚滅魯頃公亡遷于卞邑為家人魯絶祀頃公卒于柯魯自周公至頃公凡三十四世趙假相大將武襄君樂乘攻燕圍其國毅傳云樂乘廉頗為趙圍燕燕重禮以和乃解秦使䝉驁攻趙㧞榆次新城狼孟取三十七城四月日蝕趙延陵鈞率師從相國信平君亷頗助魏攻燕楚春申君黄歇徙封于呉秦使王齕悉㧞上黨諸城置太原郡秦䝉騖攻魏取髙都汲魏公子無忌歸魏率五國之師敗秦軍于河外䝉驁解而去追至函谷而還五月丙午秦莊襄王卒葬陽陵一作芷陽子政立是為始皇帝年十三趙以龍兌汾門臨樂與燕燕以葛武陽平舒易之晉陽叛秦秦楚燕魏韓趙齊衞秦王委國于吕不韋號仲父年少故也秦䝉驁撃定晉陽秦鑿涇水為渠號鄭國渠秦麃公將卒攻卷斬首三萬趙使亷頗攻魏繁陽㧞之趙孝成王卒子悼襄王偃立趙使樂乘代亷頗頗攻樂乘乘走頗亡入魏秦䝉驁攻韓取十二城一作十三城秦王齕卒十月秦䝉驁攻魏暢有詭二邑名趙大備魏欲通平邑中牟之道不成二邑皆屬魏欲渡黄河作道相通遂不成也秦大饑秦䝉驁㧞暢有詭三月軍罷秦質子歸自趙趙太子春平君從質秦歸七月天下大疫蝗從東來蔽天秦令民内粟千石拜爵一級趙使李牧伐燕取武遂方城魏公子無忌卒魏安釐王卒子景湣王増立趙城韓臯秦將軍䝉驁攻魏定酸棗燕虛長平雍丘山陽城皆㧞之取二十城置東郡趙相魏相㑹魯柯盟燕使劇辛擊趙趙龎煖破殺之冬雷楚趙魏韓衞共伐秦取壽陵秦兵出五國皆敗走秦㧞魏朝歌並衞濮陽置東郡徙魏元君居野王阻山以保魏之河内楚東徙都壽春命曰郢趙龎煖將趙楚魏燕之銳師攻秦蕞不㧞移攻齊取饒安彗星見出東方見北方五月見西方秦蒙驁死秦攻魏取汲彗星復見西方十六日秦夏太后卒莊襄王所生母趙使傅抵將居平邑慶舎將東陽河外師守河梁秦王弟長安君成蟜撃趙反死屯留軍吏皆斬遷其民于臨洮河魚大上水溢也民東就食秦封嫪毐為長信侯予之山陽地令毐居之宫室車馬衣服苑囿馳獵恣毐事無大小皆决于毐又以河西太原郡為毐國韓桓恵王卒子王安立趙封長安君以饒魏與趙鄴彗星見或竟天秦攻魏取垣蒲陽四月秦大寒民有凍死者秦王宿雍己酉王冠帶劒九月秦長信侯毐作亂矯王御璽及太后璽以發縣卒及衞卒官騎戎翟君公舎人將欲攻蘄年宫為亂王知之令相國昌平君昌文君發卒攻毐斬首数百皆拜爵及宦者皆在戰中亦拜爵一級毐等敗走即令國中有生得毐賜錢百萬殺之五十萬盡得毒等衞尉竭内史肆佐戈竭中大夫令齊等二十人皆梟首車裂之以狥滅其家及其舎人輕者為鬼薪及奪爵遷蜀四千餘家家房陵秦王遷其太后于雍秦楊端和伐魏取衍氏彗星復見西方又見北方從斗以南八十日楚考烈王卒子幽王悍立李園殺春申君黄歇冬十月秦相國吕不韋坐嫪毐免秦以桓齮為將軍齊趙入朝秦置酒咸陽宫秦王復迎太后于雍入居甘泉宫秦大索逐客李斯上書召復故官遂除其令大梁人尉繚說秦秦以為國尉秦相國吕不韋之河南秦以李斯為丞相秦王翦桓齮楊端和攻趙鄴取九城秦王翦攻㧞趙閼與橑陽皆並為一軍趙攻燕取貍陽城兵未罷秦攻鄴㧞之趙悼襄王卒子幽繆一作湣王遷立遷母娼也嬖于王王廢適子嘉而立遷遷素無行秦文信侯吕不韋徙蜀自殺其舍人臨葬者奪爵遷逐之天下大旱自六月不雨至于八月秋秦復嫪毐舍人遷蜀者秦發關東四郡兵助魏擊楚趙城柏人正月彗星見東方秦桓齮攻趙武城及平陽殺其將軍扈輒斬首十萬趙以李牧為大將軍撃秦軍于宜安大破之走桓齮秦王之河南秦桓齮攻趙于平陽取宜安破之殺其將軍定平陽武城秦攻趙李牧與秦戰肥下却之封牧為武安君韓使韓非稱臣于秦秦用李斯謀留非非死雲陽韓王入臣于秦秦大興兵攻趙一軍至鄴一軍至太原取狼孟鄱吾趙李牧與戰却之燕太子丹質于秦自秦亡歸地動九月秦發卒受韓南陽地秦初令男子書年魏獻地于秦秦置麗邑代地大動自樂徐以西北至平隂臺屋墻垣大半壞地坼東西百三十步秦内史騰年表騰作勝攻韓滅之虜其王安置潁川郡地動秦華陽太后卒與孝文王合葬夀陵秦趙大饑衞元君卒子角立世家元君二十五年卒秦楚燕魏趙齊衞秦大發兵攻趙王翦將上地下井陘端和將河内圍邯鄲趙大將李牧將軍司馬尚禦之趙殺其大將李牧免司馬尚以趙葱一作忽及齊將顔聚代之秦破趙葱走顔聚遂圍邯鄲秦王翦滅趙虜其王遷遂屯中山以臨燕十月秦王之邯鄲故與母家有仇者皆殺之從太原上郡歸秦太后卒始皇母也號曰帝太后與莊襄王合葬芷陽趙公子嘉率其宗數百人之代自立為代王與燕兵合軍上谷秦大饑楚幽王卒同母弟猶代立是為哀王郝年表哀王名立二月餘其庶兄負芻之徒襲殺之而立負芻為王魏景湣王卒子王假立燕太子丹使荆軻刺秦王不克秦遂使王翦辛勝擊破燕代兵于易水之西進圍薊秦王賁攻薊秦益兵詣王翦軍破燕太子軍取薊城燕王走遼東斬其太子丹以獻于秦秦王賁撃楚賁王翦子取十餘城秦使李信及䝉恬伐楚王翦謝病歸秦新鄭反昌平君徙于郢秦大雨雪深二尺五寸秦王賁攻魏引河溝以灌大梁城壞魏王假降殺之盡取其地遂滅魏秦兵次于齊厯下楚敗秦軍李信奔還一載下年秦楚燕趙齊衞秦復使王翦撃楚取陳以南至平輿虜楚王負芻年表在下年秦王游至郢陳楚將項燕立昌平君為楚王反秦于淮南昌平君即楚公子為秦相國徙于郢者淮一作江秦王翦䝉武大破楚軍于蘄殺其將項燕一云項燕自殺秦王翦䝉武攻楚破之昌平君死一載上年遂滅楚置楚郡秦燕趙齊衞秦王賁攻燕遼東虜燕王喜還攻代虜代王嘉秦王翦定楚江南地降越君置㑹稽郡五月天下大酺齊使相后勝發兵守西界不通秦秦使王賁從燕南攻齊虜齊王建遂滅齊為郡秦并天下更號曰皇帝衞至二世兄年廢君角為庶人春秋戰國異辭卷首下
