body:
  text: 春秋戰國異辭卷十八右春坊右諭徳陳厚耀撰齊孝公孝公元年三月宋襄公率諸侯兵送齊太子昭而伐齊齊人恐殺其君無詭無詭立三月死無諡齊人將立太子昭四公子之徒攻太子太子走宋宋遂與齊人四公子戰五月宋敗齊四公子師而立太子昭是為孝公宋以桓公與管仲屬之太子故來征之以亂故八月乃塟桓公史齊世家列女傳齊孝公夫人孟姬華氏之長女好禮貞一過時不嫁齊中求之禮不備終不往孝公聞之乃備禮樂迎於華氏之室父母送孟姬不下堂母醮之房中結其衿縭誡之曰必敬必戒無違宫事父誡之中階之上曰夙興夜寐必無違命其有大妨於王命者亦勿從諸母誡之兩階之間曰敬之敬之必終父母之命夙夜無怠姑姊妹誡之門内曰夙夜無愆爾之衿縭無忘父母之言孝公親迎孟姬三顧父母而出親迎之綏自御輪三曲納於宫三月廟見而後行夫婦之道既居久之公遊於瑯琊華孟姬從車奔姬墮車碎公使駟馬立車載姬以歸姬使侍御者舒帷以自障蔽而使傅母應使者曰妾聞妃后踰閾必乘安車輜軿下堂必從傅母保阿進退則鳴玉環珮内飾則結紐綢繆野處則帷裳擁蔽所以正心一意自歛制也今立車無辨非所敢受命也野處無衛非所敢久居也二者失禮多矣夫無禮而生不若早死使者馳以告公更取安車比其反也則自經矣傅母救之不絶使者至輜車悉具姬氏蘇然後乘而歸孝公六年齊伐宋以其不同盟於齊也十年孝公卒孝公弟潘因衛公子開方殺孝公子而自立是為昭公昭公桓公子也其母曰葛嬴以上史齊世家昭公昭公元年晉文公敗楚於城濮六年翟侵齊十九年五月昭公卒子舎立為齊君舎之母無寵於昭公國人莫畏昭公之弟商人以桓公死爭立而不得隂交賢士撫愛百姓百姓悦及昭公卒子舎立孤弱即與衆弑舎於墓上而商人自立是為懿公桓公子也其母曰密姬以上齊世家懿公懿公四年春初懿公為公子時與丙戎之父獵左傳丙戎作邴歜争獲不勝及即位斷丙戎之父足而使丙戎僕庸職之妻好左傳庸作閻公内之宫使庸職驂乘五月公遊於申池二人浴戯職曰斷足子戎曰奪妻者二人俱病此言乃怨謀與公遊竹中二人弑懿公車上棄竹中而亡去懿公之立驕民不附齊人廢其子而迎公子元於衛立之是為惠公惠公桓公子也其母衛女曰少衛姬避齊亂故在衛史齊世家與左傳小異惠公惠公二年長翟來王子城父攻殺之埋之於北門十年惠公卒子頃公無野立以上史齊世家頃公搜神記齊惠公之妾蕭同叔子見御有身以其賤不敢言也取薪而生頃公於野又不敢舉也有貍乳而鸇覆之人見而收因名曰無野是為頃公頃公元年楚莊王彊伐陳二年圍鄭鄭伯降已復國鄭伯六年春晉使郤克於齊齊使夫人帷中而觀之郤克上夫人笑之郤克曰不是報不復渉河歸請伐齊晉侯弗許齊使至晉郤克執齊使者四人河内殺之八月晉伐齊齊以公子彊質晉晉兵去史齊世家頃公六年晉使郤克於齊齊使夫人帷而觀之郤克上夫人笑之郤克曰不是報不復渉河歸請伐齊晉侯弗許齊使至晉郤克執四人河内殺之八月晉伐齊齊以公子彊質晉晉兵去節左氏文十年春齊伐魯衛魯衛大夫如晉請師皆因郤克晉使郤克以車八百乘為中軍將士爕將上軍欒書將下軍以救魯衛伐齊六月壬申與齊侯兵合靡笄下癸酉陳於鞍逢丑父為齊頃公右頃公曰馳之破晉軍㑹食射傷郤克流血至履克欲還入壁其御曰我始入再傷不敢言疾恐懼士卒願子忍之遂復戰戰齊急丑父恐齊侯得乃易處頃公為右車絓於木而止晉小將韓厥伏齊侯車前曰寡君使臣救魯衛戯之丑父使頃公下取飲因得亡脱去入其軍晉郤克欲殺丑父丑父曰代君死而見僇後人臣無忠其君者矣克舎之丑父遂得亡歸齊於是晉軍追齊至馬陵齊侯請以寳器謝不聼必得笑克者蕭桐叔子令齊東畆對曰叔子齊君母齊君母亦猶晉君母子安置之且子以義伐而以暴為後其可乎於是乃許令反魯衛之侵地史齊世家十一年初置六卿賞鞌之功頃公朝晉欲尊王晉景公景公不敢受乃歸歸而頃公弛苑囿薄賦歛振孤問疾虚積聚以救民民亦大説厚禮諸侯竟頃公之世百姓附諸侯不犯十七年頃公卒子靈公環立史齊世家靈公十年晉悼公伐齊齊令公子光質晉十九年立子光為太子髙厚傅之令㑹諸侯盟于鍾離靈公二十六年齊晏桓子卒左傳晏子居桓子之䘮麤衰斬苴絰帶杖菅屨食粥居倚廬寢苫枕草其家老曰非大夫䘮父之禮也晏子曰唯卿為大夫曽子以問孔子孔子曰晏子可謂能逺害矣不以己之是駁人之非遜辭以避咎義也夫晏子二十七年晉使中行獻子伐齊齊師敗靈公走入臨菑晏嬰止靈公靈公弗從曰君亦無勇矣晉兵遂圍臨菑臨菑守城不敢出晉焚郭中而去史齊世家二十八年初靈公娶魯女生子光以為太子仲姬戎姬戎姬嬖仲姬生牙屬之戎姬戎姬請以為太子公許之仲姬曰不可光之立列於諸侯矣今無故廢之君必悔之公曰在我耳遂東太子光使髙厚傅牙為太子靈公疾崔杼迎故太子光而立之是為莊公莊公殺戎姬五月壬辰靈公卒莊公即位執太子牙於勾竇之丘殺之八月崔杼殺髙厚晉聞齊亂伐齊至髙唐史齊世家莊公莊公奮乎勇力不顧行義勇力之士無忌於國晏子見公公曰古者亦有以勇力立於世者乎晏子對曰嬰聞之輕死以行禮謂之勇誅暴不避彊謂之力故勇力之立也以行其禮義也湯武用兵而不為逆并國而不為貪仁義之理也誅暴不避强替罪不避衆勇力之行也古之為勇力者行禮義也今上無仁義之理下無替罪誅暴之行而徒以勇力立於世則諸侯以國危匹夫以家殘昔夏之衰也有推侈大戯殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天下威戮無罪崇尚勇力不顧義理是以桀紂以滅殷夏以衰今公自奮乎勇不顧行義勇力之士無忌於國身立威强行本滛暴貴戚不薦善逼邇不引過反聖王之徳而循㓕君之行用此存者嬰未聞有也晏子卷一墨子齊莊君之時有所謂王里國中里徼者此二子者訟三年而獄不斷齊君由謙殺之恐不辜由謙釋之恐失其罪乃使二人共一羊盟齊之神社於是泏洫􅀈羊而漉其血讀王里國之辭既已終矣讀中里徼之辭未半也羊起而觸之折其脚社神而槀之殪之盟所莊公將伐晉問於晏子晏子對曰不可君得合而欲多飬欲而意驕得合而欲多者危養欲而意驕者困今君任勇力之士以伐盟主若不濟國之福也不徳而有功憂必及君公作色不悅晏子辭不為臣退而窮處堂下生蓼藿門外生荆棘莊公終任勇力之士西伐晉取朝歌及太行孟門茲於兑朞而民散晏子卷二晏子臣於莊公公不悦飲酒令召晏子晏子至入門公令樂人奏歌曰已哉已哉寡人不能説也爾何來為晏子入坐樂人三奏然後知其謂己也遂起北面坐地公曰夫子從席曷為坐地晏子對曰嬰聞訟者坐地今嬰將與君訟敢毋坐地乎嬰聞之衆而無義强而無禮好勇而惡賢者禍必及其身若公之謂矣且嬰言不用願請身去遂趨而歸管籥其家者納之公財在外者斥之市曰君子有力於民則進爵祿不辭富貴無力於民而旅食不惡貧賤遂徒行而東耕於海濵居數年果有崔杼之難晏子卷三齊莊公出獵有螳螂舉足將搏其輪問其御曰此何蟲也御者曰此螳螂也其為蟲知進而不知退不量力而輕就敵莊公曰以為人必為天下勇士矣於是回車避之而勇士歸之韓詩卷八間又淮南子人吕覧離俗齊莊公之時有士曰賔卑聚夢有壯士白縞之冠丹績之䘩䘩纓也東布之衣新素履墨劒室從而叱之唾其面惕然而寤徒夢也終夜坐不自快明日召其友而告之曰吾少好勇年六十而無所挫辱今夜辱吾將索其形期得之則可不得將死之毎朝與其友立乎衢三日不得却而自殁謂此當務則未也雖然其心之不辱也有可以加乎莊公三年晉大夫欒盈奔齊莊公厚客待之晏嬰田文子諌公弗聽四年齊莊公使欒盈間入晉曲沃為内應以兵隨之上太行入孟門欒盈敗齊兵還取朝歌齊世家莊公闔門而圖莒國人以為有亂也皆操長兵而立於閭公召睢休相而問曰寡人闔門圖莒國人不知皆操長兵而立於衢閭奈何休相對曰無亂而國以為有則仁人不存請令於國曰晏子在也公曰諾以令於國孰謂國有亂者晏子在焉然後皆散兵而歸晏子卷四齊莊公五年且伐莒為車五乘之賔而杞梁華周獨不與焉故歸而不食其母曰汝生而無義死而無名則雖非五乘孰不汝笑也汝生而有義死而有名則五乘之賔盡汝下也趨食乃行把梁華周同車侍於莊公而行至莒莒人逆之把梁華周下鬬獲甲首三百莊公止之曰子止與子同齊國把梁華周曰君為五乘之賔而周梁不與焉是少吾勇也臨敵渉難止我以利是汚吾行也深入多殺者臣之事也齊國之利非吾所知也遂進鬬壊軍陷陣三軍弗敢當至莒城下莒人以炭置地二人立有間不能入隰侯重為右曰吾聞古之士犯患渉難者其去遂於物也来吾踰子隰侯重仗楯伏炭二子乘而入顧而哭之華周後息把梁曰汝無勇乎何哭之久也華周曰吾豈無勇哉是其勇與我同也而先吾死是以哀之莒人曰子毋死與子同莒國杞梁華周曰去國歸敵非忠臣也去長受賜非正行也且鷄鳴而期日中而忘之非信也深入多殺者臣之事也莒國之利非吾所知也遂進鬬殺二十七人而死其妻聞之而哭城為之㢮而隅為之崩説苑立節齊莊公襲莒於奪音兌把梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執君之臣免於罪則有先人之敝廬在君無所辱命檀弓下古今注把梁妻把植妻妹明月之所作也把植戰死妻乃抗聲長哭把都城感之而頺遂投水而死其妹悲其姊之貞操乃為作歌名曰把梁妻焉梁植字也琴操把植死其妻援琴作歌曰樂莫樂兮新相知悲莫悲兮生别離列女傳把梁妻無子内外皆無有服之親既無所歸乃枕其夫之屍於城下而哭内誠動人道路過者莫不為之揮涕十日而城為之崩既塟曰吾何歸矣夫婦人必有所倚者父在則倚父夫在則倚夫子在則倚子今吾上則無父中則無夫下則無子内無所依以見吾誠外無所倚以見吾節吾豈能更二哉亦死而已遂赴淄水死湖上笠翁曰余讀他𫝊有謂秦孟姜富人女也贅范把梁三日夫赴長城之役久而不歸為製寒衣送之至長城㝷問知夫已故地志山海衛長城北石上有婦人跡相傳為秦時孟姜女㝷夫之跡乃號天頓足哭聲震地城崩㝷夫骸難認嚙指血滴之入骨不可拭者知其為夫骸負之而歸至潼闗筋力已竭知不能歸乃置骸岩下坐其傍而死潼闗人重其節義立像祀之然則范杞梁固齊杞梁殖而孟姜乃殖之妻無疑第姓名互異或後人相傳之誤耳齊莊公無禮齊人刺之賦東方之日詩傳詩説齊莊公好女樂君子譏之詩序云刺襄也君臣失道男女滛奔不能以禮化也齊崔杼之妻美莊公通之數如崔氏之室及公往崔子之徒賈舉率徒而攻公公入室請與之分國崔子不許公請自刃於廟崔子又不聽乃走踰於北墻賈舉射公中其股公墜崔子之徒以戈斫公而死之而立其弟景公韓子姦刼弑莊公立六年六年初棠公妻好棠公死崔杼取之莊公通之數如崔氏以崔杼之冠賜人侍者曰不可崔杼怒因其伐晉欲與晉合謀襲齊而不得間莊公嘗笞宦者賈舉賈舉復侍為崔杼間公以報怨五月莒子朝齊齊以甲戌饗之崔杼稱病不視事乙亥公問崔杼病遂從崔杼妻崔杼妻入室與崔杼自閉户不出公擁柱而歌宦者賈舉遮公從宫而入閉門崔杼之徒持兵從中起公登臺而請解不許請盟不許請自殺於廟不許皆曰君之臣杼疾病不能聽命近於公宫陪臣争趨有滛者不知二命公踰牆射中公股公反墜遂弑之晏嬰立崔杼門外曰君為社稷死則死之為社稷亡則亡之若為己死已亡非其私暱誰敢任之門開而入枕公尸而哭三踊而出人謂崔杼必殺之崔杼曰民之望也舎之得民丁丑崔杼立莊公異母弟杵臼是為景公景公母魯叔孫宣伯女也景公立以崔杼為右相慶封為左相二相恐亂起乃與國人盟曰不與崔慶者死晏子仰天曰嬰所不獲唯忠於君利社稷者是從不肯盟慶封欲殺晏子崔杼曰忠臣也舎之齊太史書曰崔杼弑莊公崔杼殺之其弟復書崔杼復殺之少弟復書崔杼乃舎之史齊世家齊崔杼弑莊公有陳不占者聞君難將赴之比去餐則失匕上車失軾御者曰怯如是去有益乎不占曰死君義也無勇私也不以私害公遂往聞戰鬬之聲恐駭而死人曰不占可謂仁者之勇也新序卷八齊崔杼弑莊公邢蒯聵使晉而反其僕曰崔杼弑莊公子將奚如邢蒯聵曰驅之將入死而報君其僕曰君之無道也四鄰諸侯莫不聞也以夫子而死之不亦難乎邢蒯聵曰善能言也然亦晩矣子早言我我能諌之諌不聽我能去今既不諌又不去吾聞食其祿者死其事吾既食亂君之祿矣又安得治君而死之遂驅車入死其僕曰人有亂君猶死之我有治長可毋死乎乃結轡自刎於車上説苑立節又韓詩卷八作荆蒯芮新序齊崔杼弑莊公申蒯漁於海將入死門者以告崔杼令勿内之申蒯曰汝疑乎吾與汝臂乃斷左臂而與門者以示崔杼杼陳八列令入申蒯援劒呼天而鬬死晏子為莊公臣言大用毎朝賜爵益邑俄而不用毎朝致邑與爵爵邑盡退朝而乘嘳然而嘆終而笑其僕曰何歡笑相從數也晏子曰吾嘆也哀吾君不免於難吾笑也喜吾自得也吾亦無死矣崔杼果弑莊公晏子立於崔杼之門啓而入崔子曰子胡不死晏子曰禍始吾不在也禍終吾不知也吾何為不不字當作死且吾聞之以亡為行者不足以存君以死為義者死足以立功嬰豈婢子也哉其從之也遂袒免坐枕君尸而哭興三踊而出人謂崔子必殺之崔子曰民之望也舎之得民晏子卷二晏子與崔杼盟其辭曰不與崔氏而與公孫氏者受其不祥晏子俛而飲血仰而呼天曰不與公孫氏而與崔氏者受此不祥崔杼不説直兵造胸勾兵鈎頸謂晏子曰子變子言則齊國吾與子共之子不變子言則今是已晏子曰崔子子獨不為詩乎詩曰莫莫葛藟施於條枚凱弟君子求福不回子惟之矣崔杼曰此賢者不可殺也罷兵而去晏子受綏而乘其僕將馳晏子乃撫其僕之手曰安之無失節疾不必生徐不必死鹿生於山而命縣於厨今嬰之命有所懸矣晏子可謂知命矣吕覧知分崔杼弑莊公令士大夫盟盟者皆脱劒而入言不疾指不至血者死所殺者十餘人次及晏子晏子奉杯血仰天而嘆曰惡乎崔杼將為無道而殺其君於是盟者皆視之崔杼謂晏子曰子與我吾將與子分國子不與我吾將殺子直兵將推之曲兵將鈎之吾願子之圖之也晏子曰吾聞回以利而倍其君者非仁也刼以刄而失其志者非勇也直兵推之曲兵鈎之嬰不之革也崔杼曰舎晏子晏子起而出授綏而乘其僕將馳晏子撫其手曰麋鹿在山林麋鹿一作虎豹其命在庖厨馳不益生緩不益死命有所懸安在疾驅安行成節然後去之韓詩卷二子又新序卷八晏卷三韓非子慶封為亂於齊而欲走越其族人曰晉近奚不之晉慶封曰越逺利以避難族人曰變是心也居晉而可不變是心也雖逺越其可以安乎吕氏春秋崔杼與慶封謀殺齊莊公莊公死更立景公崔杼相之慶封又欲殺崔杼而代之相於是㧻崔杼之子令之爭後崔杼之子相與私闂崔杼往見慶封而告之慶封謂崔杼曰且留吾將興甲以殺之因令盧蒲嫳興甲以誅之盡殺崔杼之妻子及枝屬燒其室屋報崔杼曰吾已誅之矣崔杼歸無可歸因而自絞也慶封相景公景公苦之慶封出獵景公與陳無宇公孫竈公孫蠆誅慶封封以其屬鬬不勝走於魯齊人以為讓又去魯而如吳王予之朱方荆靈王聞之率諸侯以攻吴圍朱方㧞之得慶封負之斧質以徇於諸侯軍因令其呼之曰毋或如齊慶封弑其君而弱其孤以亡其大夫乃殺之楚靈三年春秋戰國異辭卷十八
