body:
  text: 春秋戰國異辭卷三十八右春坊右諭德陳厚耀撰田齊史田齊世家陳完者陳厲公他之子厲公者文公少子也其母蔡女文公卒厲公兄鮑立是為桓公桓公與他異母及桓公病蔡人為他殺桓公及太子免而立他為厲公厲公既立娶蔡女蔡女淫于蔡人數歸厲公亦數如蔡桓公之少子林怨厲公殺其父與兄乃令蔡人誘厲公而殺之林自立是為莊公故陳完不得立為大夫厲公之殺以淫出國故春秋曰蔡人殺陳他罪之也莊公卒弟宣公杵臼立宣公十一年殺其太子禦冦禦冦與完相愛恐禍及己完故奔齊齊桓公欲使為卿辭曰羈旅之臣幸得免負擔君之惠也不敢當髙位桓公使為工正初完之奔齊齊桓公立十四年矣完卒諡為敬仲仲生稚孟夷敬仲之如齊以陳字為田氏應劭云始食采地由是改姓田氏田稚孟夷生湣孟莊田湣孟莊生文子須無文子卒生桓子無宇田桓子無宇有力事齊莊公甚有寵無宇卒生武子開與釐子乞田釐子事齊景公為大夫其收賦稅于民以小斗受之其粟豫民以大斗行隂德于民而景公弗禁由此田氏得齊衆心宗族益強民思田氏晏子數諫景公景公弗聽已而使于晉與叔向私語曰齊國之政其卒歸田氏矣晏嬰卒後范中行氏反晉晉攻之急范中行請粟于齊田乞欲為亂樹黨于諸侯乃説景公曰范中行數有德于齊齊不可不救齊使田乞救之而輸之粟景公太子死後有寵姬曰芮子生子荼景公病命其相國惠子與髙昭子以子荼為太子惠子名夏昭子名張景公卒兩相髙國立荼是為晏孺子而田乞不説欲立景公他子陽生陽生素與乞歡晏孺子之立也陽生奔魯田乞偽事昭子惠子每朝代驂乘言曰始諸大夫不欲立孺子孺子既立君相之大夫皆自危謀作亂又紿大夫曰髙昭子可畏也及未發先之諸大夫從之田乞鮑牧與大夫以兵入公室攻髙昭子昭子聞之與國惠子救公公師敗田乞之衆追國惠子惠子奔莒遂反殺髙昭子晏孺子奔魯田乞使人之魯迎陽生陽生至齊匿田乞家請諸大夫曰常之母有魚菽之祭幸而來會飲會飲田氏田乞盛陽生橐中置坐中央發橐出陽生曰此乃齊君矣大夫皆伏謁將盟立之田乞誣曰吾與鮑牧謀共立陽生也鮑牧怒曰大夫忘景公之命乎諸大夫欲悔陽生乃頓首曰可則立之不可則已鮑牧恐禍及己乃復曰皆景公之子何為不可遂立陽生于田乞之家是為悼公乃使人遷晏孺子于駘而殺孺子荼悼公既立田乞為相專齊政左傳所載甚悉四年田乞卒子常代立是為田成子田成子鮑牧與齊悼公有郤悼公立四年弒悼公左傳無鮑牧弒悼公事因吳伐齊齊人弒悼公耳齊人共立其子壬是為簡公田常成子與監止俱為左右相相簡公田常心害監止監止幸于簡公權弗能去于是田常復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子齊大夫朝御鞅諫簡公曰田監不可並也君其擇焉君弗聽子我者監止之宗人也賈逵云子我即監止尋其文意當是今云宗人太史誤耳常與田氏有郤田氏疏族田豹事子我有寵子我曰吾欲盡滅田氏適以豹代田氏宗豹曰臣于田氏疏矣不聽已而豹謂田氏曰子我將誅田氏田氏弗先禍及矣子我舍公宫田常兄弟四人乘如公宫欲殺子我子我閉門簡公與婦人飲檀臺將欲擊田常太史子餘曰田常非敢為亂將除害簡公乃止田常出聞簡公怒恐誅將出亡田子行曰需事之賊也田常于是擊子我子我率其徒攻田氏不勝出亡田氏之徒追殺子我及監止簡公出奔追執簡公于徐州簡公曰蚤從御鞅之言不及此難田氏之徒恐簡公復立而誅己遂弒簡公簡公立四年而殺于是田常立簡公弟驁是為平公平公即位田常為相田常既殺簡公懼諸侯共誅已乃盡歸魯衛侵地西約晉韓魏趙氏南通吳越之使修功行賞親于百姓以故齊復定田常言于齊平公曰德施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸田常常于是盡誅鮑晏監止及公族之強者而割齊自安平以東至琅邪自為封邑封邑大于平公之所食以上史田齊世家列子齊田氏祖于庭食客千人中坐有獻魚鴈者田氏視之乃歎曰天之于民厚矣植五穀生魚鳥以為之用衆客和之如響鮑氏之子年十二預于次進曰不如君言天地萬物我與並生類也類無貴賤徒以小大智力而相制迭相食非相為而生之人取可食者而食之豈天本為人生之是蚊蚋噆膚虎狼食肉豈天本為蚊蚋生人虎狼生肉者哉齊有貧者嘗乞于城市城市患其亟也衆莫之與遂適田氏之廏從馬醫作役而假食郭中人戲之曰從馬醫而食不以辱乎乞兒曰天下之辱莫過于乞乞猶不辱豈辱馬醫哉韓非子隰斯彌見田成子田成子與登臺四望三面皆畼南面隰子家之樹蔽之田成子亦不言隰子歸使人伐之斧離數創隰子止之其相室曰何變之數也隰子曰古者有諺曰知淵中之魚者不祥夫田子將有事事大而我示之知微我必危矣不伐樹未有罪也知人之所不言其罪大矣乃不伐也韓非子昔者田成子遊于海而樂之號令諸大夫曰言歸者死顔涿聚曰君逰海而樂之奈臣有圖國者何君雖樂之將安得田成子曰寡人布令曰言歸者死今子犯寡人之令援戈將擊之顔涿聚曰昔桀殺關龍逄而紂殺王子比干今君雖殺臣之身以三之可也臣言為國非為身也延頸而前曰君擊之矣君乃釋戈趨駕而歸至三日而聞國人有謀不內田成子者矣田成子所以遂有齊國者顔涿聚之力也齊説苑作景公事田常乃選齊國中女子長七尺以上為後宫後宫以百數而使賔客舍人出入後宫者不禁及田常卒有七十餘男田常卒子襄子盤代立齊平公立二十五年卒子宣公立是年田常亦卒襄子世本襄子名班諡常為成子田襄子既相齊宣公三晉殺知伯分其地襄子使其兄弟宗人盡為齊都邑大夫與三晉通使且以有齊國襄子卒子莊子伯立田莊子相齊宣公史田齊世家莊子世本莊子名伯紀年齊宣公十五年田莊子卒明年立田悼子宣公四十七年田悼子卒次立田和據此田莊子之後有悼子世本及史記不録繹史魯穆公立在齊宣公四十七年據此是無田悼子也宣公四十三年伐晉毁黃城圍陽狐明年伐魯葛及安陵明年取魯之一城莊子卒相齊四年子太公和立田齊世家紀年晉烈公十年齊田盼及邯鄲韓舉戰于平邑邯鄲之師敗逋獲韓舉取平邑新城十一年田悼子卒史記無悼子太公田太公復相齊宣公宣公四十八年取魯之郕明年宣公與鄭人會西城伐衛取毌丘毌音貫宣公五十一年卒田會自廩丘反田齊世家紀年田布殺其大夫公孫孫公孫會以廩丘叛于趙田布圍廩丘翟角趙孔屑韓氏救廩丘及田布戰于龍澤田師敗逋吕氏春秋齊攻廪丘趙使孔青將死士而救之與齊人戰大敗之齊將死得車二千得尸三萬以為二京寧越謂孔青曰惜矣不如歸尸以內攻之越聞之古善戰者沙隨賁服却舍延尸車甲盡于戰府庫盡于葬此之謂內攻之孔青曰敵齊不尸則如何寧越曰戰而不勝其罪一與人出而不與人入其罪二與之尸而弗取其罪三民以此三者怨上上無以使下下無以事上是之謂重攻之宣公卒子康公貸立貸立十四年淫於酒婦人不聽政太公乃遷康公于海上食一城以奉其先祀明年魯敗齊平陸三年太公與魏文侯會濁澤求為諸侯魏文侯乃使使言周天子及諸侯請立齊相田和為諸侯周天子許之康公之十九年田和立為諸侯列于周室紀元年齊侯太公和立二年和卒子桓公午立田齊世家紀年齊康公五年田侯午生二十二年田侯剡立後十年齊田午弒其君及孺子喜而為公春秋後傳亦云然桓公齊王謂子思曰今天下擾擾諸侯無伯吾國大人衆圖帝何如子思曰不可也君不能去君貪利之心王曰何害子思曰夫水之性清而土壤泊之人之性安而嗜欲亂之故能有天下者必無以天下為者也能有名譽者必無以名譽為者也達此則其利心外矣孔叢子上齊王謂子思曰先生名髙于海內吐言則天下之士莫不屬耳目今寡人欲相梁起起也名少願先談説之也子思曰天下之士所以屬耳目者欲伋之言是非當也今君使伋虛談于起則天下之士必改耳目矣耳目既改又無益于起是兩有喪也故不敢承命齊君曰起之不賢何也子思曰君豈未之知乎厚于財物必薄于德自然之道也今起以貪成富聞于諸侯而無救施之惠焉以好色聞于齊國而無男女之别焉有一于此猶受其咎而起二之能無纍乎王曰寡人之言實過願先生赦焉孔叢子上子思適齊齊君之嬖臣美鬚眉立乎側齊君指之而笑且言曰假貌可相易寡人不惜此之鬚眉于先生也子思曰非所願也所願者唯君修禮義富百姓而伋得寄帑于君之境內從繦負之列其榮多矣若無此鬚鬛非伋所病也昔堯身修十尺眉乃八彩實聖舜身修八尺有竒而頷無毛亦聖禹湯文武及周公勤思勞體或折臂望視或禿骭背僂亦聖不以鬚眉美鬛為稱也人之聖賢在德豈在貌乎且吾性無鬚眉而天下王侯不以此損其敬由是言之伋徒患德之不劭美也不病毛鬢之不茂也孔叢子上齊王戮其臣不辜謂子思曰吾知其不辜而適觸吾忿故戮之以為不足傷義也子思曰文王葬枯骨而天下知仁商紂斬朝涉而天下稱暴夫義者不必遍利天下也暴者不必盡虐海內也以其所施而觀其意民乃去就焉今君因心之忿遷戮不辜以為無傷于義此非臣之所敢知也王曰寡人實過乃今聞命請改之孔叢子上孔叢子子思在齊尹文子生子不類怒而杖之告子思曰此非吾子也吾妻殆不婦吾將黜之子思曰若子之言則堯舜之妃復可疑也此二帝聖者之英而丹朱商均不及匹夫以是推之豈可類乎然舉其多者有此父斯有此子道之常也若夫賢父之有愚子此由天道自然非子之妻之罪也尹文子曰先生止之願無言文留妻矣桓公午五年秦魏攻韓韓求救于齊齊桓公召大臣而謀曰索隱曰大臣謂騶忌假干朋如戰國䇿威王二十六年邯鄲之役有此謀臣耳又南梁之難在宣王二年有騶子田忌孫臏之謀戰國策又有張丑其詞前後交互記者所取各異故不同也蚤救之孰與晚救之騶忌曰不若勿救段干朋曰國策作段干綸不救則韓且折而入于魏不若救之田臣思曰國策作田期思過矣君之謀也秦魏攻韓楚趙必救之是天以燕與齊也桓公曰善乃隂告韓使者而遣之韓自以為得齊之救因與秦魏戰楚趙聞之果起兵而救之齊因起兵襲燕國取桑丘史田齊世家事與國䇿稍别國䇿作威王又别見宣王扁鵲見齊桓侯立有間扁鵲曰君有疾在腠理不治將恐深桓侯曰寡人無疾扁鵲出桓侯曰醫之好利也欲治不病以為功居十日扁鵲復見曰君之病在肌膚不治將益深桓侯不應扁鵲出桓侯不恱居十日扁鵲復見曰君之病在腸胃不治將益深桓侯又不應扁鵲出桓公又不悅居十日扁鵲復見望桓侯而還走桓侯使人問之扁鵲曰病在腠理湯尉之所及也在肌膚針石之所及也在腸胃火劑之所及也在骨髓司命之所無奈何也今在骨髓臣是以無請也居五日桓侯體痛使人索扁鵲已逃之秦矣桓侯遂死新序卷二桓韓子喻老篇作蔡侯事地志扁鵲姓秦名緩字越人寓于盧即今山東長清縣地少時為舍長舍客長桑君過扁鵲厚遇之長桑君乃出其懷中方密豫扁鵲醫遂著左傳晉景公有疾秦使醫緩治之即扁鵲也新語扁鵲居宋得罪于宋君出亡之衛衛人有病將死者扁鵲至其家欲為治之病者之父謂扁鵲曰吾子病甚篤將為迎良醫治非子所能治也退而不用乃使靈巫求福請命對扁鵲而咒病者卒死靈巫不能治也夫扁鵲天下之良醫而不能與靈巫爭用者知與不知也故事求逺而失近廣藏而狹棄斯之謂也史記扁鵲傳扁鵲名聞天下過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫來入咸陽聞秦人愛小兒即為小兒醫隨俗為變秦太醫令李醯自知伎不如扁鵲也使人刺殺之至今天下言脈者由扁鵲也漢書扁鵲內經九卷外經十三卷列子魯公扈趙齊嬰二人有疾同請扁鵲求治扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者因藥石之所已今之偕生之疾與體偕長今為汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志強而氣弱故足于謀而寡于斷齊嬰志弱而氣強故少于慮而傷于專若換汝之心則均于善矣扁鵲遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既悟如初二人辭歸于是公扈反齊嬰之室而有其妻子妻子弗識齊嬰亦反公扈之室有其妻子妻子亦弗識二室因相與訟求辨于扁鵲扁鵲辨其所由訟乃已鶡冠子魏文侯問扁鵲曰子昆弟三人其孰最善為醫扁鵲曰長兄最善中兄次之扁鵲最為下魏文侯曰可得聞邪扁鵲曰長兄于病視神未有形而除之故名不出于家中兄治病其在毫毛故名不出于閭若扁鵲者鑱血脈投毒藥副肌膚間而名出聞于諸侯魏文侯曰善六年救衛桓公卒一云桓公十九年卒子威王因齊立是嵗故齊康公卒絶無嗣奉邑皆入田氏史田齊世家威王元年三晉因齊喪來伐我靈丘六年魯伐我入陽關晉伐我至博陵七年衛伐我取薛陵九年趙伐我取甄威王自初即位以來不治委政卿大夫九年之間諸侯並伐國人不治于是威王召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽言日聞然使使視阿田野不闢民貧苦昔者趙攻甄子弗能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者皆並烹之遂起兵西擊趙衛敗魏于濁澤而圍惠王惠王請獻觀以和趙人歸我長城于是齊國震懼人人不敢飾非務盡其誠齊國大治諸侯聞之莫敢致兵于齊二十餘年田齊世家史記滑稽傳淳于髠者齊之贅壻也長不滿七尺滑稽多辨數使諸侯未嘗屈辱齊威王之時喜隱好為淫樂長夜之飲沈湎不治委政卿大夫百官荒亂諸侯並侵國且危亡在于旦暮左右莫敢諫淳于髠説之以隱曰國中有大鳥止王之廷三年不蜚又不鳴王知此鳥何也王曰此鳥不飛則已一飛沖天不鳴則已一鳴驚人于是乃朝諸縣令長七十二人賞一人誅一人奮兵而出諸侯震驚皆還齊侵地威行三十六年列女傳齊威王夫人虞姬名娟之王即位九年不治委政大臣佞臣周破胡專權擅勢嫉賢妬能即墨大夫賢而日毁之阿大夫不肖反日譽之虞姬謂王曰破胡讒諂之臣也不可不退齊有北郭先生者賢明有道可置左右破胡聞之乃惡虞姬曰其幼弱在于閭巷之時嘗與北郭先生通王疑之乃閉虞姬于九層之臺而使有司即窮驗問破胡賂執事者使竟其罪王視其詞不合于意乃召虞姬而自問焉虞姬力辨其誣王大悟出虞姬顯之于宫封即墨大夫以萬户烹阿大夫與周破胡遂起兵收侵地齊國震懼由是大治淮南子汜論齊威王設大鼎于庭中而數無鹽令曰子之譽日聞吾耳察子之事田野蕪倉廩虛囹圄實子以姦事我者也乃烹之列女傳虞姬名娟之齊威王之姬也威王即位九年不治委政大臣佞臣周破胡專權擅勢即墨大夫賢而日毁之阿大夫不肖反日譽之虞姬謂王曰破胡讒諛之臣也不可不退齊有北郭先生者賢明有道可置左右破胡聞之乃惡虞姬曰其幼在閭巷之時嘗與北郭先生通王疑之乃閉虞姬于九層之臺而使有司驗問破胡賂執事者誣其詞而上之王視其詞不合于意乃召虞姬而問焉虞姬對曰妾娟之幸去蓬蘆之下侍明王之宴昵附王著薦牀蔽席供執掃除掌奉湯沐至今十餘年矣惓惓之心冀幸補一言而為邪臣所擠湮于百重之下不意大王乃復見與語妾聞寡婦哭城城為之崩亡臣歎市市為之罷妾之寃明于白日雖獨號于九層之內而衆人莫為毫釐既有汙名義固不可以生願戒大王羣臣為邪破胡最甚王不執政國殆危矣于是王大悟出虞姬顯之于朝市封即墨大夫以萬户烹阿大夫與周破胡遂起兵收故侵地齊國震懼人不敢飾非務盡其職齊國大治齊威王出令曰能面刺寡人過者受上賞上書諫者受中賞謗議于市朝聞寡人之耳者受下賞于是齊國大治白帖納諫威王八年楚大發兵加齊使淳于髠之趙求救齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶索訓盡王曰先生少之乎髠曰何敢王曰笑豈有説乎髠曰今者臣從東方來見道傍有穰田者操一豚蹄酒一盂而祝曰甌窶滿篝窶音樓篝音溝籠也甌窶謂髙地狹小之區得滿篝籠也汙邪滿車汙邪下地也五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之于是齊王乃益齎黃金千鎰白璧十雙車馬百駟髠辭而行至趙趙王與之精兵十萬革車千乘楚聞之夜引兵而去威王大説置酒後宫召髠賜之酒問曰先生能飲幾何而醉對曰臣飲一斗亦醉一石亦醉威王曰先生飲一斗而醉烏能飲一石哉其説可得聞乎髠曰賜酒大王之前執法在旁御史在後髠恐懼俯伏而飲不過一斗徑醉矣若親有嚴客髠􅀢韝鞠􅎽帣音卷收袖也韝音溝臂捍也鞠曲也􅎽與跽同小跪也侍酒于前時賜餘瀝奉觴上夀數起飲不過二斗徑醉矣若朋友交逰久不相見卒然相覩歡然道故私情相語飲可至五六斗徑醉矣若乃州閭之會男女雜坐行酒稽留六博投壺相引為曹握手無罰目眙不禁眙直視也前有墮珥後有遺簪髠竊樂此飲可八斗而醉二參日暮酒闌合尊促坐男女同席履舄交錯杯盤狼藉堂上燭滅主人留髠而送客羅襦襟解微聞薌澤當此之時髠心最歡能飲一石故曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷諫焉齊王曰善乃罷長夜之飲以髠為諸侯主客宗室置酒髠嘗在側史滑稽傳説苑尊賢十三年諸侯舉兵以伐齊齊王聞之惕然而恐召其羣臣大夫告曰有智為寡人用之于是博士淳于髠仰天大笑而不應王復問之又大笑不應王艴然作色不悅曰先生以寡人語為戲乎對曰臣非敢以大王語為戲也臣笑臣鄰之祠田也以一奩飯一壺酒祝曰蟹堁者宜禾汙邪者百車傳之後世洋洋有餘臣笑其賜鬼薄而請之厚也于是王乃立淳于髠為上卿賜之千金革車百乘與平諸侯之事諸侯聞之立罷其兵休其士卒不敢攻齊又復思楚魏會于晉陽將以伐齊齊王患之使人召淳于髠曰楚魏謀欲伐我願先生與寡人共憂之淳于髠大笑而不應王復問之又復大笑而不應三問而不應王怫然作色曰先生以寡人國為戲乎淳于髠對曰臣不敢以王國為戲也臣笑臣鄰之祠田也以奩飯與一鮒魚祝曰下田汙邪得穀百車蟹堁者宜禾臣笑其所以祠者少而所求者多王曰善賜之千金革車百乘立為上卿齊王使淳于髠獻鵠于楚出邑門道飛其鵠徒揭空籠造詐成辭往見楚王曰齊王使臣來獻鵠過于水上不忍鵠之渴出而飲之去我飛亡吾欲刺腹絞頸而死恐人議吾王以鳥獸之故令士自傷殺也鵠毛物多相類者吾欲買而代之是不信而欺吾王也欲赴他國奔亡痛吾兩主使不通故來服過叩頭受罪大王楚王曰善齊王有信士若此哉厚賜之財倍鵠在也史滑稽傳獻與魏文侯鵠于齊略同韓詩外傳齊使使獻鵠于楚鴻渴使者道飲鵠玃笞潰失使者遂之楚曰齊使臣獻鵠鵠渴道飲玃笞潰失臣欲亡為失兩君之使不通欲拔劍而死人將以吾君賤士貴鵠也玃笞在此願以汙事楚王賢其言辨其詞因留而賜之終身以為上客故使者必矜文辭喻誠信明氣志解結申屈然後可使也詩曰辭之懌矣民之莫矣騶忌子以鼓琴見威王威王二十一年威王説而舍之右室須臾王鼓琴騶子推户入曰善哉鼓琴王勃然不恱去琴按劍曰夫子見容未察何以知其善也騶忌子曰夫大弦濁以春溫者君也小弦亷折以清者相也攫之深醳之愈者政令也鈞諧以鳴大小相益回邪而不相害者四時也吾是以知其善也王曰善語音騶忌子曰何獨語音夫治國家而弭人民皆在其中王又勃然不悅曰語五音之紀信未有如夫子者也若夫治國家而弭人民又何為乎絲桐之間騶忌子曰夫大弦濁以春溫者君也小弦廉折以清者相也攫之深而舍之愈者政令也鈞諧以鳴大小相益回邪而不相害者四時也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治夫治國家而弭人民無若乎五音者王曰善史田齊世家騶忌子見三月而受相印淳于髠見之曰善説哉髠有愚志願陳諸前騶忌子曰謹受教淳于髠曰得全全昌失全全亡騶忌子曰謹受令請謹毋離前淳于髠曰狶膏棘軸所以為滑也然而不能運方穿騶忌子曰謹受令請謹事左右淳于髠曰弓膠昔幹昔久舊也幹弓幹也所以為合也然而不能傅合疏罅騶忌子曰謹受令請謹自附于萬民淳于髠曰狐裘雖敝不可補以黃狗之皮騶忌子曰謹受令請謹擇君子毋雜小人其間淳于髠曰大車不較不能載其常任琴瑟不較不能成其五音騶忌子曰謹受令請謹修法律而督姦吏淳于髠説畢趨出至門而面其僕曰是人者吾語之微言五其應我若響之應聲是人必封不久矣居期年封以下邳號曰成侯史田齊世家齊威王逰于瑶臺成侯卿來奏事從車羅綺甚衆王望之謂左右曰來者何為者也左右曰成侯卿也王曰國至貧也何出之盛也左右曰與人者有以責之也受人者有以易之也王試問其説成侯卿至上謁曰忌也王不應又曰忌也王不應又曰忌也王曰國至貧也何出之盛也成侯卿曰赦其死罪使臣得言其説王曰諾對曰忌舉田居子為西河而秦梁弱舉田解子為南城而楚人抱羅綺而朝舉黔涿子為冥州而燕人給牲趙人給盛舉田種首子為即墨而于齊足究舉北郭刁勃子為大士而九族益親民益富舉此數良人者王枕而卧耳何患國之貧哉説苑臣術二十三年與趙王會平陸史田齊世家二十四年齊與魏王會田于郊魏王問曰王亦有寶乎威王曰無有魏王曰若寡人國小尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘之國而無寶乎威王曰寡人之所以為寶與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有朌子者使守髙唐則趙人不敢東漁于河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁惠王慙不懌而去史田齊世家韓詩卷十作齊宣王事非唐子短陳駢子于齊威王威王欲殺之陳駢子與其屬出亡奔薛孟嘗君聞之孟嘗君非威王時人姑録于此使人以車迎之至而養以芻豢黍梁五味之膳日三至冬日被裘罽音計夏日服絺紵出則乘牢車駕良馬孟嘗君問之曰夫子生于齊長于齊夫子亦何思于齊對曰臣思夫唐子者孟嘗君曰唐子非短子者耶曰是也孟嘗君曰子何為思之對曰臣之處于齊也糲粢之飯藜藿之羮冬日則寒凍夏日則暑傷自唐子之短臣也以身歸君食芻豢飯黍粢服輕暖乘牢良臣故思之此謂毁人而反利之也淮南子人間靖郭君時事或云此又吕覽孫臏生于阿鄄之間亦孫武之後世子孫也臏嘗與龎涓俱學兵法涓既事魏得為惠王將軍而自以為能不及孫臏乃隂使召臏臏至龎涓恐其賢于己疾之則以法刑斷其兩足而黥之欲隱勿見齊使者如梁孫臏以刑徒隂見説齊使齊使以為竒竊載與之齊齊將田忌善而客待之忌數與齊諸公子馳逐重射孫子見其馬足不甚相逺馬有上中下輩于是孫子謂田忌曰君第重射臣能令君勝田忌信然之與王及諸公子逐射千金及臨質孫子曰今以君之下駟與彼上駟取君上駟與彼中駟取君中駟與彼下駟既馳三輩畢而田忌一不勝而再勝卒得王千金于是忌進孫子于威王威王問兵法遂以為師史孫吳列傳魏伐趙趙急請救于齊齊威王欲將孫臏臏辭謝曰刑餘之人不可于是乃以田忌為將而孫子為師居輜車中坐為計謀田忌欲引兵之趙孫子曰夫解雜亂紛糾者不控捲救鬭者不摶撠批亢搗虛形格勢禁則自為解耳今梁趙相攻輕兵鋭卒必竭于外老弱罷于內君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自救是我一舉解趙之圍而收弊于魏也田忌從之魏果去邯鄲與齊戰于桂陵大破梁軍史孫吳傳七紀年云梁惠王十年齊田忌敗梁桂陵之按梁惠王十七年當齊威王二十五年也二十六年魏惠王圍邯鄲趙求救于齊齊威王召大臣而謀曰救趙孰與勿救騶忌子曰不如勿救段干朋曰不救則不義且不利威王曰何也對曰夫魏氏并邯鄲其于齊何利哉且夫救趙而軍其郊是趙不伐而魏全也故不如南攻襄陵以弊魏邯鄲拔而乘魏之弊威王從其計其後成侯騶忌與田忌不善公孫閲謂成侯忌曰公何不謀伐魏田忌必將戰勝有功則公之謀中也戰不勝非前死則後北而命在公矣于是成侯言于威王使田忌南攻襄陵十月邯鄲拔齊因起兵擊魏大敗之桂陵于是齊最強于諸侯自稱為王以令天下史記田齊世家與國策小異史司馬穰苴傳威王用兵行威大放穰苴之法而諸侯朝齊齊威王使大夫追論古者司馬兵法而附穰苴于其中因號曰司馬穰苴兵法三十三年殺其大夫牟辛大夫一作夫人三十五年公孫閲又謂成侯忌曰公何不令人操千金于市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎不吉乎卜者出因令人捕為之卜者驗其辭于王之所田忌聞之因遂率其徒襲攻臨淄求成侯不勝而奔史田齊世家與國䇿小異説苑田忌去齊奔楚楚王郊迎至舍問曰楚萬乘之國也齊亦萬乘之國也常欲相并為之奈何對曰易知耳齊使申孺將則楚發五萬人使上將軍將之至禽將軍首而反耳齊使田居將則楚發二十萬人使上將軍將之分别而相去也齊使盼子將楚發四封之內王自出將而忌從相國上將軍為左右司馬如是則王僅得存耳于是齊使申孺將楚發五萬人使上將軍至擒將軍首反于是齊王忿然乃更使盼子將楚悉發四封之內王自出將田忌從相國上將軍為左右司馬益王車屬九乘僅得免耳至舍王北面正領齊袪問曰先生何知之早也田忌曰申孺為人侮賢者而輕不肖者賢不肖者俱不為用是以亡也田居為人尊賢者而賤不肖者賢者負任不肖者退是以分别而相去也盼子之為人也尊賢者而愛不肖者賢不肖皆負任是以王僅得存耳三十六年威王卒子宣王辟疆立史田齊世家春秋戰國異辭卷三十八
