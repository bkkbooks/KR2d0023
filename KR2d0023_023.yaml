body:
  text: 春秋戰國異辭卷二十一右春坊右諭德陳厚耀撰齊悼公悼公元年齊伐魯取讙闗左傳載於悼公二年初悼公亡在魯季康子以其妹妻之及歸即位使迎之季姬與季魴侯通言其情魯弗敢與故齊伐魯竟迎季姬季姬嬖齊復歸魯侵地史齊世家鮑子與悼公有卻不善四年吴魯伐齊南方鮑子弑悼公左傳言齊人弑悼公不言鮑子弑之鮑子前為悼公所殺赴於吴吴王夫差哭於軍門外三日將從海入討齊齊人敗之吴師乃去晉趙鞅伐齊至賴而去齊人共立悼公子壬是為簡公年表云簡公者景公之子也見徐廣註今年表無此語史齊世家簡公田常與監止俱為左右相相簡公監止左傳作闞止田常心害監止監止幸於簡公權弗能去於是田常復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子齊大夫朝御鞅諫簡公曰田監不可並也君其擇焉君弗聴子我者監止之宗人也左傳子我即監止常與田氏有卻田氏疏族田豹事子我有寵子我曰吾欲盡滅田氏適同摘以豹代田氏宗豹曰臣於田氏疏矣不聴已而豹謂田氏曰子我將誅田氏田氏弗先禍及矣子我舍公宫田常兄弟四人乗如公宫欲殺子我子我閉門簡公與婦人飲檀臺將欲擊田常太史子餘曰田常非敢為亂將除害簡公乃止田常出聞簡公怒恐誅將出亡田子行曰需事之賊也田常於是擊子我子我率其徒攻田氏不勝出亡田氏之徒追殺子我及監止簡公出奔田氏之徒追執簡公於徐州簡公曰蚤從御鞅之言不及此田氏恐簡公復立而誅已遂弑簡公簡公四年事史田齊世家我監止字子我宰予亦字子故訛作宰予簡公四年春初簡公與父陽生俱在魯也闞止有寵焉及即位使為政田成子憚之驟顧於朝御鞅言簡公曰田闞不可並也君其擇焉弗聴子我夕田逆殺人逢之遂捕以入田氏方睦使囚病而遺守囚者酒醉而殺守者得亡子我盟諸田於陳宗初田豹欲為子我臣使公孫言豹豹有喪而止後卒以為臣幸於子我子我謂曰吾盡逐田氏而立女可乎對曰我逺田氏矣且其違者不過數人何盡逐焉遂告田氏子行曰彼得君弗先必禍子子行舍於公宫夏五月壬申成子兄弟四乗如公子我在幄出迎之遂入閉門宦者禦之子行殺宦者公與夫人飲酒於檀臺成子遷諸寢公執戈將擊之太史子餘曰非不利也將除害也成子出舍於庫聞公猶怒將出曰何所無君子行拔劍曰需事之賊也誰非田宗所不殺子者有如田宗乃止子我歸屬徒攻闈與大門皆弗勝乃出田氏追之豐邱人執子我以告殺之郭闗成子將殺大陸子方田逆請而免之以公命取車於道出雍門田豹與之車弗受曰逆為余請豹與余車余有私焉事子我而有私於其讎何以見魯衛之士庚辰田常執簡公於徐州公曰余蚤從御鞅言不及此甲午田常弑簡公於徐州史齊世家吕氏春秋慎勢齊簡公有臣曰諸御鞅諫於簡公曰陳成常與宰予之二臣者甚相憎也臣恐其相攻也相攻唯固則危上矣願君之去一人也簡公曰非而細人之所能識也君無幾何陳成常果攻宰予於庭賊簡公於朝簡公喟然太息曰余不用鞅之言以至此患也又説苑正諫淮南子人間説苑指武田成子常與宰我争宰我夜伏卒將以攻田成子令於卒中曰不見旌節毋起鴟夷子皮聞之告田成子田成子因為旌節以起宰我之卒以攻之遂殘之也田常弑簡公乃盟於國人曰不盟者死及家石他曰古之事君者死其君之事舍君以全親非忠也舍親以死君之事非孝也他則不能然不盟是後吾親也從人而盟是背吾君也嗚呼生於亂世不得正行刦乎暴人不得全義悲夫乃進盟以免父母退伏劍以死新序卷八陳恒弑簡公而盟盟者皆完其家不盟者殺之石他人曰昔之事君者皆得其君而事之今謂他人曰舍而君而事我他人不能雖然不盟則殺父母也從而盟是無君臣之禮也生於亂世不得正行刦於暴上不得道義故雖盟不以父母之死不如退而自殺以禮其君乃自殺淮南子齊簡公釋其國家之柄而專任其大臣將相攝威擅勢私門成黨而公道不行故使陳成田常鴟夷子皮得成其難使吕氏絶祀而陳氏有國者此柔懦之所生也陳恒弑君使勇士六人刦子淵棲子淵棲曰子之欲與我以我為知乎以我為仁乎以我為勇乎臣弑君非知也見利而背君非仁也刦我以兵懼而與子非勇也使吾無此三者與何補於子若吾有此三者終不從子矣乃舍之新序卷八田常既弑簡公於徐州乃立簡公弟驁是為平公平公即位田常相之專齊之政割齊安平以東為田氏封邑史齊世家平公田常既弑簡公懼諸侯共誅已乃盡歸魯衛侵地西約晉韓衛趙氏南通吴越之使修功行賞親於百姓以故齊復定田常言於齊平公曰德施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸田常田常於是盡誅鮑晏及公族之强者而割齊自安平以東至琅琊自為封邑封邑大於平公之所食田常乃選齊國女子長七尺以上為後宫後宫以百數而使賔客舍人出入後宫者不禁及田常卒有七十餘男及其子盤襄子代立相齊乃使其兄弟宗人盡為齊都邑大夫與三晉通使且以有齊國史田齊世家田成子有兄曰完子仁且勇越人興師誅田成子曰奚故殺君而取國田成子患之完子請率士大夫以逆越師請必戰戰請必敗敗請必死田成子曰夫必與越戰可也戰必敗敗必死寡人疑焉完子曰君之有國也百姓怨上賢良又有死之臣䝉恥以完觀之也國已懼矣今越人起師臣與之戰戰而敗賢良盡死不死者不敢入於國君與諸孤處於國以臣觀之國必安矣完子行田成子泣而遣之吕覽似順陳成子謂鴟夷子皮曰何與常也對曰君死吾不死君亡吾不亡陳成子曰然子何以與常對曰未死去死未亡去亡其有何死亡矣從命利君謂之順從命病君謂之諛逆命利君謂之忠逆命病君謂之亂君有過不諫諍將危國殞社稷也有能盡言於君用則留之不用則去之謂之諌用則可生不用則死謂之諍有能比和同力率羣下相與强矯君君雖不安不能不聴遂解國之大患除國之大害成於尊君安國謂之輔有能亢君之命反君之事竊君之重以安國之危除主之辱攻伐足以成國之大利謂之弼故諫諍輔弼之人社稷之臣也眀君之所尊禮而闇君以為已賊故明君之所賞闇君之所殺也明君好問闇君好獨明君上賢使能而享其功闇君畏賢妬能而滅其業罰其忠而賞其賊夫是之謂至闇桀紂之所以亡也詩云曾是莫聴大命以傾此之謂也説苑臣術鴟夷子皮事田成子田成子去齊走而之燕鴟夷子皮負𫝊而從至望邑子皮曰子獨不聞涸澤之蛇乎涸澤蛇將徙有小蛇謂大蛇曰子行而我隨之人以為蛇之行者耳必有殺子者不如相啣負我以行人必以我為神君也乃相啣負以越公道而行人皆避之曰神君也今子美而我惡以子為我上客千乗之君也以子為我使者萬乗之卿也子不如為我舍人田成子因負𫝊而隨之至逆旅逆旅之君待之甚敬因獻酒肉韓子説林隰斯彌見田成子田成子與登臺四望三面皆暢南望隰子家之樹蔽之田成子亦不言隰子歸使人伐之斧離數創隰子止之其相室曰何變之數也隰子曰古者有諺曰知淵中之魚者不祥夫田子將有事事大而我示之知微我必危矣不伐樹未有罪也知人之所不言其罪大矣乃不伐也韓子説林田成子遊於海上而樂之號令諸大夫曰言歸者死顔涿聚曰君遊海而樂之奈臣有圖國者何君雖樂之將安得田成子曰寡人布令曰言歸者死今子犯寡人之令援戈將擊之顔涿聚曰昔桀殺闗龍逢而紂殺王子比干今君雖殺臣之身以三之可也臣言為國非為身也延頸而前曰君擊之矣君乃釋戈趣駕而歸至三日而聞國人有謀不内田成子者矣田成子所以遂有國者顔涿聚之力也韓子十過公説苑作齊景事國昭子之母死問於子張曰𦵏及墓男子婦人安位子張曰司徒敬子之喪夫子相男子西鄉婦人東鄉曰噫母曰我喪也斯沾覘同爾専之賔為賔焉主為主焉婦人從男子皆西鄉昭子失禮檀弓下平公二十五年卒子宣公積立宣公宣公五十一年卒子康公貸立田㑹反廪丘康公康公二年韓魏趙始列為諸侯十九年田常曾孫田和始為諸侯遷康公於海濵二十六年康公卒吕氏絶祀田氏卒有齊國為齊威王强於天下以上史齊世家史記田齊世家貸立十四年淫於酒婦人不聴政太公乃遷康公於海上食一城以奉其先祀墨子昔者齊康公興樂萬人不可衣短褐不可食糠糟曰食飲不美面目顔色不足視也衣服不美身體容貌不足觀也是以食必粱肉衣必文繡史記田齊世家明年魯伐齊平陸三年太公與魏文侯㑹濁澤求為諸侯魏文侯乃使使言周天子及諸侯請立齊相田和為諸侯周天子許之繹史徐廣曰康公十六年索隠曰廣葢依年表為説而不省此上文貸立十四年又云明年又三年是十八年年表及此註竝誤按田和急於簒齊既為天子所許復遲至三年始稱侯不合於事理索隠説是也史記齊康公之十九年田和立為齊侯列於周室紀元年紀年齊康公五年田侯午生二十二年田侯剡立後十年齊田午弑其君剡及孺子喜而為公雜録齊晉相與戰平阿之餘子餘子官氏也亡㦸得矛却而去不自快謂路之人曰亡㦸得矛可以歸乎路之人曰㦸亦兵也戈亦兵也亡兵得兵何為不可以歸去行心猶不自快遇髙唐之孤叔無孫髙唐齊邑孤尊位叔姓無孫名守髙唐之大夫也當其馬前曰今日戰亡㦸得矛可以歸乎叔無孫曰矛非㦸也㦸非矛也亡㦸得矛豈亢責也哉亢當也平阿之餘子曰嘻還反戰趨尚及之遂戰而死叔無孫曰吾聞君子濟人以患必離其難疾驅而從之亦死而不反吕覽離俗齊太子坐清臺之上燕莊侯他髙冠嚴色左帶玉具劍右帶環珮左光照右右光照左太子讀書不視莊侯他問曰齊國有寳乎太子曰主信臣忠百姓戴上齊國之寳也莊侯他應聲解劍而去亢倉子訓道戎夷違齊如魯天大寒與弟子宿於郭外謂弟子與我衣我國士為天下惜死子不肖不足愛弟子曰不肖之人安能與國士衣戎夷解衣與弟子夜半而死吕氏春秋齊牧犢子年七十無妻朝日見飛雉雌雄相隨感之撫琴而歌曰雉朝飛鳴相和雄雌羣遊於山阿琴操齊女顔文姜適李氏事姑甚孝姑嗜新泉水水去家甚逺姜竭力取供無難色忽室側湧出一泉與新泉一味母飲甚喜鄉人名為孝泉後人立廟祀之列女傳説苑齊王起九重之臺募國中能畫者賜之錢有敬君居常饑寒其妻妙色敬君工畫臺貪賜畫錢去家日久思憶其妻畫像向之而笑傍人見以白王王召問之對曰有妻如此去家日久心常念之竊畫其像以慰離心不悟上聞藝文類聚引説苑吕氏春秋戎夷違齊如魯天大寒而後門與弟子一人宿於郭外寒愈甚謂其弟子曰子與我衣我活也我與子衣子活也我國士也為天下惜死子不肖人也不足愛也子與我子之衣弟子曰夫人不肖也又惡能與國士之衣哉戎夷太息歎曰嗟乎道其不濟矣解衣與弟子夜半而死弟遂活謂戎夷其能必定一世則未之識若夫欲利人之心不可以加矣春秋戰國異辭卷二十一
