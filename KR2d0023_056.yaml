body:
  text: 春秋戰國異辭卷五十三右春坊右諭徳陳厚耀撰越句踐下越與呉平後四年越復伐呉呉士民罷弊輕鋭盡死於齊晉而越大破呉因而留圍之三年呉師敗越遂復棲呉王於姑蘇之山呉王使公孫雄肉胆膝行而前請成越王曰孤臣夫差敢布腹心異日嘗得罪於㑹稽夫差不敢逆命得與君王成以歸今君王舉玉趾而誅孤臣孤臣唯命是聽意者亦欲如㑹稽之赦孤臣之罪乎句踐不忍欲許之范蠡曰㑹稽之事天以越賜呉呉不取今天以吳賜越越其可逆天乎且夫君王早朝晏罷非為呉耶謀之二十二年一旦而棄之可乎且夫天與不取反受其咎伐柯者其則不逺君忘㑹稽之厄乎句踐曰吾欲聽子言吾不忍其使者范蠡乃鼔進兵曰王已屬政於執事使者去不者且得罪呉使者泣而去句踐憐之乃使人謂呉王曰吾置王甬東君百家呉王謝曰吾老矣不能事君王遂自殺乃蔽其面曰吾無面以見子胥也越王乃葬呉王而誅太宰嚭史越世家越伐呉乃先宣言曰我聞呉王築如皇之臺掘深池罷苦百姓煎靡財貨以盡民力余為民誅之韓子外儲左呉越春秋二十一年七月越王復悉國中士卒伐呉㑹楚使申包胥聘于越越王乃問包胥問荅見國語冬十月越王乃請八大夫國語作五大夫其辭少異曰昔呉為不道殘我宗廟夷我社稷以為平原使不血食吾欲徼天之衷兵革既具無所以行之吾問于申包胥既已命孤矣敢告大夫如何大夫曳庸曰審賞則可戰也審其賞明其信無功不及有功必加則士卒不怠王曰聖哉大夫苦成曰審罰則可戰審罰則士卒望而畏之不敢違命王曰勇哉大夫文種曰審物則可戰審物則别是非是非明察人莫能惑王曰辨哉大夫范蠡曰審備則可戰審備慎守以待不虞備設守固必有應難王曰慎哉大夫臯如曰審聲則可戰審于聲音以别清濁清濁者謂吾國君名聞于周室令諸侯不怨于外王曰得哉大夫扶同曰廣恩知分則可戰廣恩以博施知分而不外王曰神哉大夫計􅒍曰候天察地叅應其變則可戰天變地應人道便利三者前見則可王曰明哉於是句踐乃退齋而命國人曰吾將有不虞之議自近及逺無不聞者乃復命有司與國人曰承命有賞皆造國門之期有不從命者吾將有顯戮句踐恐民不信令國中曰五日之内則吾良民也過五日之外則非吾之民也又將加誅令既行乃入命于夫人王背屏夫人向屏而立王曰自今日之後内政無出外政無入各守其職以盡其信内辱者則子境外辱者則我也吾見子於是以為明誡矣王出宫夫人送王不過屛王因反闔其門填之以土夫人去笄側席而坐安心無容三月不掃王出則復背垣而立大夫向垣而敬王乃令大夫曰食士不均地壤不修使孤有辱於國是子之罪臨敵不戰軍士不死有辱於諸侯功隳于天下是孤之責自今以徃内政無出外政無入吾固誡子大夫敬受命矣王乃出大夫送出垣反闔外宫之門填之以土大夫側席而坐不御五味不答所勸句踐有命于夫人大夫曰國有守禦乃坐露壇之上列鼔而鳴之軍行成陣即斬有罪者三人以徇于軍令曰不從吾令者如斯明日徙軍于郊斬有罪者三人徇之於軍令曰不從吾令者如斯王乃令國中不行者與之訣而告之曰爾安土守職吾方徃征討我宗廟之仇以謝于二三子令國人各送其子弟郊境之上軍士各與父兄昆弟取訣國人悲哀皆作離别相去之詞曰躒躁摧長恧兮擢㦸馭殳所離不降兮以泄我王氣蘇三軍一飛降兮所向皆殂一士判死兮而當百夫道祐有徳兮呉卒自屠雪我王宿恥兮威振八都軍伍難更兮勢如貔貙行行各努力兮於乎於乎于是觀者莫不悽惻明日復徙軍于境上斬有罪者三人狥之于軍曰有不從令者如此後三日復徙軍於檇李斬有罪者三人以狥于軍曰其淫心慝行不當敵者如斯句踐乃命有司大狥軍曰其有父母無昆弟者來告我我有大事子離父母之養親老之愛赴國家之急子在軍冦之中父母昆弟疾病吾視之如吾父母昆弟之疾病也其有死亡者吾葬埋殯送之明日又狥于軍曰士有疾病不能隨軍者吾與之醫藥給其糜粥與之同食明日又狥于軍曰筋力不足以勝甲兵志行不足以聽王命者吾輕其重和其任明日旋軍于江南更陳嚴法復誅有罪者五人曰吾愛士也雖吾子不能過也及其犯誅雖吾子亦不能脱也道見鼃張腹而怒將有戰爭之氣即為之軾士卒有問于王曰君何為敬鼃而為之軾句踐曰吾思士卒之怒乆矣而未有稱吾意者今鼃蟲無知之物見敵而有怒氣故為之軾于是軍士聞之莫不懐心樂死人致其命有司將軍大徇軍中曰隊各自令其部部各自令其士歸而不歸處而不處進而不進退而不退左而不左右而不右不如令者斬于是呉悉兵屯於江北越軍於江南越王中分其師以為左右軍皆被兕甲又令安廣之人佩石碣之矢張盧生之弩躬率君子之軍六千人以為中陣明日将戰於江乃以黄昬令于左軍衘枚遡江而上五里以須呉兵復令于右軍衘枚踰江十里復須呉兵於夜半使左軍涉江鳴鼓水中以待呉發呉師聞之夜中大駭相謂曰今越軍分為二師将以攻我我衆亦即以夜暗中分其師以圍越越王隂使左右軍與呉望戰以大鼓相聞潛伏其私卒六千人衘枚不鼔攻呉呉師大敗越之左右軍乃遂伐之大敗之于囿又敗之於郊又敗之于津三戰三北徑至呉以上較國語更詳圍呉於西域呉王大懼夜遁越王追奔攻呉兵入于江陽松陵欲入胥門來至六七里望呉南城見伍子胥頭巨若車輪目若耀電鬚髪四張射于十里越兵大懼留兵假道即日夜半暴風疾雨雷奔電激飛石揚砂疾如弓弩越軍却退兵士僵斃人衆分解莫可禁止范蠡文種乃稽顙肉袒拜謝子胥願乞假道子胥乃與種蠡夢曰吾知越之必入呉矣故求置吾頭于南門以觀汝之破吳也惟吾心又不忍故為風雨以還汝軍然越之伐呉自是天也吾安能止哉越如欲入更從東門我當為汝開道貫城以通汝路于是越軍明日更從江出入海陽于三道之翟水乃穿東南隅以達越軍遂圍呉守一年呉師累敗遂棲呉王于姑胥之山呉使王孫駱國語作王孫䧺肉袒膝行而前請成於越王曰孤臣夫差敢布腹心異日得罪于㑹稽夫差不敢逆命得與君王結成以歸今君王舉兵而誅孤臣孤臣惟命是聽意者猶以今日之姑胥曩日之㑹稽也若徼天之衷得赦其大辟則呉願長為臣妾句踐不忍其言將許之范蠡曰㑹稽之事天以越賜呉呉不取今天以呉賜越越可逆命乎且君王早朝晏罷切齒銘骨謀之二十餘年豈不縁一朝之事耶今日得而棄之其可乎天與不取還受其咎君何㤀㑹稽之厄乎句踐曰吾欲聽子言不忍對其使者范蠡遂鳴鼓而進兵曰王已屬政于執事使者急去不時得罪呉使涕泣而去句踐憐之使令人謂呉王曰吾置君于甬東給君三百餘家以没王世可乎呉王辭曰天降禍于呉國不在前後正孤之身失滅宗廟社稷者呉之土地民臣越既有之孤老矣不能臣王遂伏劍自殺韓非子越王攻呉王呉王謝而告服越王欲許之范蠡大夫種曰不可昔天以越予呉呉不受今天反夫差亦天禍也以呉予越再拜受之不可許也句踐已平呉乃以兵北渡淮與齊晋諸侯㑹於徐州致貢于周周元王使人賜句踐胙命為伯句踐已去渡淮南以淮上地與楚歸呉所侵宋地于宋與魯泗東方百里當是時越兵横行於江淮東諸侯畢賀號稱覇王史越世家句踐既平呉致貢于周元王賜之胙命為伯句踐使使號令齊楚秦晋皆輔周室血盟而去秦不如命句踐選呉越將士西渡河以攻秦㑹秦怖懼引咎越乃還軍通鑑前編紀年晋出公七年於越徙都瑯琊水經注瑯琊山名也越王句踐之故國也句踐并呉欲覇中國徙都瑯琊呉越春秋句踐已滅呉乃以兵北渡江淮與齊晋諸侯㑹于徐州致貢于周周元王使人賜句踐已受命號去還江南以淮上地與楚歸呉所侵宋地與魯泗東方百里當是之時越兵横行于江淮之上諸侯畢賀初學記引呉越春秋曰越王平呉後立賀臺于越此書無之亦闕文越絶書徳序句踐度兵徐州致貢周室元王以之中興號為州伯以沛歸于宋浮陵以付楚臨期開陽復之於魯中邦侵伐因斯衰止越王既平呉春祭三江秋祭五湖因以其時為之立祠垂之末世傳之萬載越絶書地志紹興府蕺山府治東北山巔産蕺越王嘗采食之蕺蔬類也葛山府城東句踐種葛于此使越女治布獻之呉蘭渚山府城西南句踐種蘭于此呉㑹分地記夏山者句踐于此山鑄銅不鑠埋之土生馬箠句踐遣使取徙于南社種之飾治以為箠獻之于呉搜神記越王将食膾而未切堕半于水肉化為魚越王句踐與呉人戰大敗之兼有九夷當是時也南靣而立近臣三逺臣五令羣臣曰聞吾過而不告者其罪刑説苑君道越絶書枕中越王既已勝呉三日反邦未至息自雄問大夫種曰夫聖人之術何以加于此乎大夫種曰不然王得范子之所言故天地之符應邦以藏聖人之心矣越王愀然而恐而有憂色請于范子稱曰寡人用夫子之計幸得勝呉盡夫子之力也寡人聞夫子明于隂陽進退豫知未形推徃引前後知千歲可得聞乎寡人虗心垂意聽于下風范子曰夫隂陽進退前後幽㝠未見未形此特殺生之柄而王制于四海此邦之重寳也王而毋泄此事臣請為王言之越王曰夫子幸教寡人願與之自藏至死不敢㤀范子曰隂陽進退者固天道自然不足怪也夫隂入淺者則歳善陽入深者則歳惡幽幽㝠㝠豫知未形故聖人見物不疑是謂知時固聖人所不傳也夫堯舜禹湯皆有豫見之勞雖有凶年而民不窮越王曰善以丹書帛置之枕中以為邦寳此謂天地之圖也呉越春秋越王還于呉當歸而問范蠡曰何子言之有合于天范蠡曰此素女之道一言即合實金匱之要在于上下越王曰善哉吾不稱王其可悉乎蠡曰不可昔呉之稱王僭天子之號天變于上日為隂蝕今君遂僭號不歸恐天變復見越王還呉置酒文臺羣臣為樂乃命作伐呉之曲樂師曰臣聞即事作操功成樂作君王崇徳化有道之國誅無義之人復仇還恥威加諸侯功可象于圖畫徳可刻于金石聲可託于弦管名可留于竹帛臣請引琴而鼔之遂作章暢辭曰屯乎今欲伐呉未可耶大夫范蠡曰呉殺忠臣伍子胥今不伐呉又何須大夫種進祝酒其辭曰皇天祐助我王受福良臣集謀我王之徳宗廟輔政鬼神承翼君不忘臣臣盡其力上天蒼蒼不可掩塞觴酒二升萬福無極于是越王黙然無言大夫種曰我王賢仁抱道懐徳滅仇破呉不㤀返國賞無所恡羣邪杜塞君臣同和福祐千億觴酒二升萬歳難極臺上羣臣大悦而笑越王靣無喜色范蠡知句踐謀成國定必不復須功臣返國故不悦從呉欲去恐句踐未返失人臣之義乃從行入越謂文種曰子去矣越王必将誅子種不然其言蠡復為書遺種曰吾聞天有四時春生冬伐人有盛衰泰終必否知進退存亡而不失其正惟賢人乎蠡雖不才明知進退高鳥已盡良弓将藏狡兎已盡良犬就烹夫越王為人長頸烏喙鷹視狼步可以共患難而不可共處樂可以履危不可與安子若不去將害子明矣文種不信二十四年九月丁未范蠡辭于王曰臣聞主憂臣勞主辱臣死義一也今臣事大王前則無滅未萌之端後則無救已傾之禍欲成君覇故不辭萬死一生臣竊自惟乃使于呉王之慙辱所以不死者誠恐讒于太宰嚭成伍子胥之事故且須㬰而生夫恥辱之心不可以乆流汗之愧不可以忍幸頼宗廟之神靈大王之威徳以敗為成斯湯武克夏商而成王業者定功雪耻臣所以當席見乆臣請從斯辭矣越王惻然泣下霑衣言曰國之士大夫是子國之人民是子使孤寄身託號以俟命今子云去是天之棄越而喪孤也亦無所恃矣孤竊有言公位乎位當作住分國共之去乎妻子受戮范蠡曰臣聞君子俟時計不數謀死不被疑内不自欺臣既逝矣妻子何法乎王其勉之臣從此辭乃乘扁舟出三江入五湖人莫知其所適范蠡既去越王愀然變色召大夫種曰蠡可追乎種曰不及也王曰奈何種曰蠡去時隂畫六陽畫三日前之神莫能制者𤣥武天空威行孰敢止者度天關涉天梁後入天一前翳神光言之者死視之者狂臣願大王勿復追也蠡終不還矣越王乃収其妻子封以百里之地有敢侵之者上天所殃于是使良工鑄金象范蠡之形置之坐側朝夕論政自是之後計􅒍佯狂大夫曵庸扶同臯如之徒日益踈逺不親于朝大夫種内憂不朝人或讒之于王曰文種棄宰相之位而令君王覇于諸侯今官不加增位不益封乃懐怨望之心憤發于内色變于外故不朝耳異日種諫曰臣所以早朝而晏罷若身疾作者但為呉耳今已滅之王何憂乎越王嘿然越絶書記地句踐伐吳還封范蠡于苦竹城其城僻居徑六十步因為民治田塘長千五百三十二步其冢名土山范蠡苦勤功篤故封其子去山隂縣十八里范蠡佐越王句踐滅呉殺夫差與大夫種曰吾聞隂謀人者其禍必復夫姑蘇之滅夫差之死由吾與子隂謀也况王之為人也可與共患不可共樂且功成名遂身退天之理也吾将退子其偕乎大夫種曰夫天地之于萬物也春生冬殺萬物豈以冬殺而反禍天地乎吾聞聖人不貴乎獨善而貴乎除害成物苟成于物除害可也是以黄帝殺蚩尤舜去四凶我今除吾之亂成越之覇亦成物除害耳何禍之復哉况王方以滅呉徳子與我必相終始子無遽于退也范蠡曰不然夫天地無心且不自宰况宰物乎天地自天地萬物自萬物春以和自生冬以寒自殺非天地使之然也聖人雖有心其用也體乎天地天地雖無心機動則應事廹則順事過則逆除害成物無所憎愛故害除而無禍物成而無福今王以怨呉之心禄我與子以取其謀我與子利其禄而謀呉以滅人為功以報禄我者人之姦也自謂天地之生殺聖人之除害成物不其欺邪大夫種不悦疑之不决范蠡竟辭句踐泛扁舟于五湖俄而越殺大夫種無能子中范蠡遂去自齊遺大夫種書曰蜚鳥盡良弓藏狡兎死走狗烹越王為人長頸烏喙可與共患難不可與共樂子何不去種見書稱病不朝人或讒種且作亂越王乃賜種劔曰子教寡人伐呉七術寡人用其三而敗呉其四在子子為我從先王試之種遂自殺史越世家呉越春秋二十五年丙午平旦越王召相國大夫種而問之吾聞知人易自知難其知相國何如人也種曰哀哉大王知臣勇也不知臣仁也知臣忠也不知臣信也臣誠數以損聲色減淫樂竒說怪諭盡言竭忠以犯大王逆心咈耳必以獲罪臣非敢愛死不言言而後死昔子胥于呉矣夫差之誅也謂臣曰狡兎死良犬烹敵國滅謀臣亡范蠡亦有斯言何大王問犯玊門之第八臣見王志也越王黙然不應大夫亦罷其妻曰君賤一國之相少王禄乎無乃為貪乎何其志忽忽若斯種曰悲哉子不知也吾王既免于患難雪恥于呉我悉徙宅自投死亡之地盡九術之謀在君為忠王不察也乃曰知人易自知難吾答之又無他語是凶妖之證也吾将復入恐不再還與子長訣相求於𤣥㝠之下妻曰何以知之種曰吾見王時正犯玊門之第八也辰尅其日上賊于下是為亂醜必害其良今日尅其辰上賊不止吾命須㬰之間耳越王復召相國謂曰子有隂謀兵法傾敵取國九術之策今用其三已破彊呉其六尚在子所願幸以餘術為孤前王于地下謀之于是種仰天嘆曰嗟乎吾聞大恩不報大功不還其謂斯乎吾悔不隨范蠡之謀乃為越所戮越王遂賜文種屬盧之劔種得劔又嘆曰南陽之宰而為越王之擒自笑曰後百世忠臣必以吾為喻矣遂伏劔而死越王葬種于國之西山樓船之卒三千餘人造鼎足之羨或入三峯之下葬一年伍子胥從海上穿山脅而持種去與之俱浮于海故前潮水潘侯者伍子胥也後重水者大夫種也范蠡既雪㑹稽之恥乃喟然而嘆曰計然之策七越用其五而得意既已施于國吾欲用之家乃乘扁舟浮于江湖變名易姓適齊為鴟夷子皮之陶為朱公朱公以為陶天下之中諸侯四通貨物所交易也乃治産積居與時逐而不責于人擇人而任時十九年之中三致千金再分散與貧交疏昆弟子孫修業而息之遂至巨萬萬萬也故言富者皆稱陶朱公史貨殖傳呉地記句踐令范蠡取西施以獻夫差西施于路與范蠡濳通三年始達于呉遂生一子于此亭其子一歲能言因名語兒亭在嘉興縣南一百里西施亡呉後復歸范蠡同泛五湖而去范蠡事越王句踐既苦身戮力與句踐深謀二十餘年竟滅呉報㑹稽之恥北渡兵于淮以臨齊晋號令中國以尊周室句踐以覇而范蠡稱上將軍還反國范蠡以為大名之下難以乆居且句踐為人可與同患難與處安為書辭句踐曰臣聞主憂臣勞主辱臣死昔者君王辱於㑹稽所以不死為此事也今既以雪恥臣請從㑹稽之誅句踐曰孤将與子分國而有之不然將加誅于子范蠡曰君行令臣行意乃装其輕寳珠玉自與其私屬乘舟浮海以行終不反于是句踐表㑹稽山以為范蠡奉邑范蠡浮海出齊變姓名自謂鴟夷子皮耕于海畔苦身戮力父子治産居無幾何致産數千萬齊人聞其賢以為相范蠡喟然嘆曰居家則致千金居官則至卿相此布衣之極也乆受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懐其重寳間行以去止于陶以為此天下之中交易有無之路通為生可以致富矣于是自謂陶朱公復約要父子耕畜廢居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公朱公居陶地志山東定陶縣有范蠡湖俗傳陶朱公飬魚處生少子少子及壮而朱公中男殺人囚于楚朱公曰殺人而死職也然吾聞千金之子不死于市告其少子徃視之乃装黄金千溢置褐器中載以一牛車且遣其少子朱公長男固請欲行朱公不聼長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言曰今遣少子未必能生仲子也而先空亡長男奈何朱公不得已而遣長子為一封書遺故所善荘生曰至則進千金于荘生所聼其所為慎無與爭事長男既行亦自私齎數百金至椘荘生家負郭披藜藿到門居甚貧然長男發書進千金如其父言荘生曰可疾去矣慎毋留即弟出勿問所以然長男既去不過荘生而私留以其私齎獻遺楚國貴人用事者荘生雖居窮閻然以亷直聞于國自楚王以下皆師尊之及朱公進金非有意受也欲以成事後復歸之以為信耳故金至謂其婦曰此朱公之金有如病不宿誡後復歸勿動而朱公長男不知其意以為殊無短長也荘生間時入見楚王言某星宿某此則害于楚楚王素信荘生曰今為奈何荘生曰獨以徳為可以除之楚王曰生休矣寡人将行之王乃使使者封三錢之府楚貴人驚告朱公長男曰王且赦曰何以也曰每王且赦常封三錢之府昨夜王使使封之朱公長男以為赦弟固當出也重千金虗棄荘生無所為也乃復見荘生荘生驚曰若不去耶長男曰固未也初為事弟弟今議自赦故辭生去荘生知其意欲復得金曰若自入室取金長男即自入室取金持去獨自歡幸荘生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以修徳報之今臣出道路皆言陶之富人朱公之子殺人囚楚其家多持金錢賂王左右故王弗能恤楚國而赦乃以朱公子故也楚王大怒曰寡人雖不徳奈何以朱公之子故而施恵乎令論殺朱公子明日遂下赦令朱公長男竟持其弟喪歸至其母及邑人盡哀之惟朱公獨笑曰吾固知必殺其弟也彼非不愛其弟顧有所不能忍者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乘堅驅良逐狡兎豈知財所從來故輕棄之非所吝惜前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也無足悲者吾日夜固以望其喪之來也故范蠡三徙成名于天下非苟去而已所止必成名卒老死于陶故世傳曰陶朱公史越世家符子陶朱公喪其中子鄰人往弔之朱公方擁膝蹲踞捧頭而笑鄰人曰聞有喪将唁子之哀朱公曰生不致哀死而唁何鄰人之不通也孔叢子猗頓魯之窮士也耕則常飢喪則常寒聞陶朱公富徃而問術焉朱公告之曰子欲速富當畜五㹀于是乃適西河大畜牛羊于猗氏之南十年之間其滋息不可計貲擬王公馳名天下以興富于猗氏故曰猗頓飬魚經威王聘朱公問之曰聞公在湖為漁父在齊為鴟夷子皮在西戎為赤精子在越為范蠡有之乎曰有之曰公任足千萬家累億金何術乎朱公曰夫治生之法有五水畜第一水畜所謂魚池也以六畆地為池池中有九洲求懐子鯉魚長三尺者二十頭牡鯉魚長三尺者四頭以二月上庚日納池中令水無聲魚必生至四月納一神守六月納二神守八月納三神守神守者鼈也所以納鼈者魚滿三百六十則蛟龍為之長而將魚飛去納鼈則魚不復去在池中周繞九洲無窮自謂江湖也至來年二月得鯉魚長一尺者一萬五千枚三尺者四萬五千枚二尺者萬枚枚直五十得錢一百二十五萬至明年得長一尺者十萬枚長二尺者五萬枚長三尺者五萬枚長四尺者四萬枚留長二尺者二千枚作種所餘皆取錢五百一十五萬錢候至明年不可勝計也王乃于後苑治池一年得錢三十餘萬池中九洲八谷谷上立水二尺又谷中立水六尺所以飬鯉魚者鯉不相食又易長也述異記洞庭湖中有釣洲昔范蠡乘扁舟至此遇風止釣於洲上刻石記焉有一陂陂中有范蠡魚昔范蠡釣得大魚烹食之小者放於陂中陂邉有范蠡石牀石硯鈷䥈范蠡宅在湖中多桑紵英果有海杏大如拳若年楸新序梁嘗有疑獄羣臣半以為當罪半以為無罪雖梁王亦疑梁王曰陶之朱公以布衣富侔國是必有竒智乃召朱公而問曰梁有疑獄獄吏半以為當罪半以為不當罪雖寡人亦疑吾子决是奈何朱公曰臣鄙民也不知當獄雖然臣之家有二白璧其色相如也其徑相如也其澤相如也然其價一者千金一者五百金王曰徑與色澤相如也一者千金一者五百金何也朱公曰側而視之一者厚倍是以千金梁王曰善故獄疑則從去賞疑則從與梁國大悦由此觀之牆薄則亟壊繒薄則亟裂器薄則亟毀酒薄則亟酸夫薄而可以曠日持乆者殆未有也故有國蓄民施政教者宜厚之而可耳越句踐索卒于楚而攻晋左史倚相謂楚子曰越已破呉豪士死鋭卒盡大甲傷索兵攻晋示我病也不如起師與之分呉楚子曰善起師從之越伯怒将擊楚文種曰我憊矣與戰必不克不如賂之乃割露山之西五百里以與楚通鑑外紀夲韓非子越王句踐使亷稽獻民與楚王楚王使者曰越夷狄之國也臣請欺其使者楚王曰越王賢人也其使者亦賢子其慎之使者出見亷稽曰冠則得以俗見不冠不得見亷稽曰夫越亦周室之列封也不得處於大國而處江海之陂與魭鱣魚鱉為伍文身剪髪而後處焉今来至上國必曰冠得俗見不冠不得見如此則上國使適越亦将劓墨文身剪髪而後得以俗見可乎楚王聞之披衣出謝韓詩卷八淮南子越王句踐劗髪文身無皮弁搢笏之服拘罷拒折之容然而勝夫差於五湖南面而覇天下泗上十二諸侯皆率九夷以朝呉越春秋越王既覇關東從瑯琊起觀臺周七里以望東海死士八千人戈船三百艘居無㡬躬求賢士孔子聞之從弟子奉先王雅琴禮樂徃奏于越越王乃被唐夷之甲𢃄步光之劔杖屈盧之矛出死士三百人為陣關下孔子有頃到越王曰唯唯夫子何以教之孔子曰吾能述五帝三王之道故奉雅琴以獻之大王按越滅呉稱覇在魯二十二年而夫子卒在十六年夫子未嘗入越也越王喟然嘆曰越性脆而愚水行山處以船為車以檝為馬徃若飄風去則難從鋭兵敢死越之常也夫子何説而欲教之孔子不答因辭而去以上又見越絶書越王使人如木客山取允常之喪欲徙葬琅琊三穿允常之墓墓中生熛風飛砂石以射人人莫能入句踐曰吾前君其不徙乎遂置而去句踐乃使使號令齊楚秦晋皆輔周室血盟而去秦桓公不如越王之命按史年表句踐二十五年是為秦厲共公六年句踐乃選呉越將士西渡河以攻秦軍士苦之㑹秦怖懼逆自引咎越乃還軍軍人悦樂遂作河梁之詩曰渡河梁兮渡河梁舉兵所伐攻秦王孟冬十月多雪霜隆寒道路誠難當陳兵未濟秦師降諸侯怖懼皆恐惶聲傳海内威逺邦稱伯穆桓齊楚荘天下安寧壽考長悲去歸兮河無梁自越滅呉中國皆畏之十六年越王以邾子無道執以歸立其太子何冬魯哀公以三桓之逼來奔越王欲為伐三桓以諸侯大夫不用命故不果魯人悲之來迎哀公與之俱歸越絶書寳劔越王句踐有寳劔五聞于天下客有能相劔者名薛燭一作允常時事王召而問之曰吾有寳劔五請以示之薛燭對曰愚理不足與言大王請不得已乃召掌者王使取毫曹薛燭對曰毫曹非寳劔也夫寳劔五色並見莫能相勝毫曹已擅名矣非寳劔也王曰取巨闕薛燭曰非寳劔也寳劔者金錫和銅而不離今巨闕已離矣非寳劔也王曰然巨闕初成之時吾坐于露壇之上宫人有四駕白鹿而過者車奔鹿驚吾引劍而指之四駕上飛揚不知其絶也穿銅釜絶鐵䥶胥中决如粢米故曰巨闕王取純鈎薛燭聞之忽如敗有頃懼如悟下階而深惟簡衣而坐望之手振拂揚其華捽如芙蓉始出觀其鈲爛如列星之行觀其光渾渾如水之溢于塘觀其斷巖巖如瑣石觀其才煥煥如氷釋此所謂純鈎耶王曰是也客有直之者有市之鄉二駿馬千匹千户之都二可乎薛燭對曰不可當造此劔之時赤堇之山破而出錫若耶之溪涸而出銅雨師掃灑雷公撃槖蛟龍捧爐天帝装炭太乙下觀天精下之歐冶乃因天之精神悉其伎巧造為大劍三小劍二一曰湛盧二曰純鈎三曰勝邪四曰魚腸五曰巨闕呉王闔廬之時得其勝邪魚腸湛盧闔廬無道子女死殺生以送之湛盧之劔去之如水行秦過楚楚王卧而寤得湛盧之劔将首魁漂而存焉秦王聞而求不得興師擊楚曰與我湛盧之劔還師去汝楚王不與時闔廬又以魚腸之劔刺呉王僚使披腸夷之甲三事闔廬使專諸為奏炙魚者引劔而刺之遂弑王僚此其小試于敵邦未見其大用于天下也今赤堇之山已合若耶之溪深而不測羣神不下歐冶子即死雖復傾城量金珠玉竭河猶不能得此一物有市之鄉二駿馬千匹千户之都二何足言哉拾遺記越王句踐有劔曰真剛以之切玉斷金如刻削土木案句踐以白牛白馬祀昆吾山神以成八劔一曰掩日二曰斷水三曰轉魄四曰懸翦五曰驚鯢六曰滅魂七曰却邪八曰真剛拾遺記越王句踐使工人以白馬白牛祠昆吾之神採金鑄之以成八劔之精一名掩日以之指日則光晝暗金隂也隂盛則陽滅二名斷水以之畫水開即不合三名轉魄以之指月蟾兎為之倒轉四名懸翦飛鳥遊過偶觸其刅如斬截焉五名驚鯢以之泛海鯨鯢為之深入六名滅魂挾之夜行不逢魑魅七名卻邪有妖魅者見之則伏八名真剛以切玉斷金如削土木矣以應八方之氣鑄之也其山有獸大如兎毛色如金食土下之丹石深穴地以為窟亦食銅鐵膽腎皆如鐵其雌者色白如銀昔呉國武庫之中兵刃鐵器俱被食盡而封署依然王令檢其庫穴獵得䨇兎一白一黄殺之開其腹而有鐵膽腎方知兵刃之鐵為兎所食王乃召其劔工令鑄其膽腎以為劔一雌一雄號干将者雄號鏌鎁者雌其劔可以切玉斷犀王深寳之遂覇其國新書范蠡負石而蹈五湖大夫種䋢領謝室渠如處車裂回泉自此之後句踐不樂憂悲薦至内崩而死呉越春秋二十七年冬句踐寝疾将卒通鑑外紀句踐三十三年薨謂太子興夷曰吾自禹之後承允常之徳蒙天靈之祐神祗之福從窮越之地藉楚之前鋒以摧呉跨江涉淮從晋齊之地功徳巍巍自致于斯其可不誡乎夫覇者之後難以乆立其慎之哉遂卒興夷即位一年卒子翁翁卒子不揚不揚卒子無疆無疆卒子玊玊卒子尊尊卒子親自句踐至親歴八主皆稱覇積二百二十四年親衆皆失而去瑯琊徙于呉越從無余始封至餘善滅凢一千九百二十二年句踐卒子王鼫與立王鼫與卒子王不壽立王不壽卒子王翁立王翁卒子王翳立王翳卒子王之侯立王之侯卒子王無疆立史越世家王無疆時越興師北伐齊西伐楚與中國爭彊當楚威王之時越北伐齊齊威王使人説越王曰越不伐楚大不王小不覇圖越之所以不伐楚者為不得晋也韓魏固不攻楚韓之攻楚覆其軍殺其将則葉陽翟危魏亦覆其軍殺其將則陳上蔡不安故二晉之事越也不至於覆軍殺将馬汗之力不效所重於得晉者何也越王曰所求於晉者不至頓刃接兵而况於攻城圍邑乎願魏以聚大梁之下願齊之試兵南陽莒地以聚常郯之境則方城之外不南淮泗之間不東商於析酈宋胡之地夏路以左不足以備秦江南泗上不足以待越矣則齊秦韓魏得志於楚也是二晋不戰而分地不耕而穫之不此之為而頓刃於河山之間以為齊秦用所待者如此其失計奈何其以此王也齊使者曰幸也越之不亡也吾不貴其用智者之如目見豪毛而不見其睫也今王知晋之失計而不自知越之過是目論也王所待於晋者非其汗馬之力也又非可與合軍連和也将待之以分楚衆也今楚衆已分何待於晋越王曰奈何曰楚三大夫張九軍北圍曲沃於中曲沃晋地於中秦地二地相近故楚圍之以至無假之關者三千七百里景翠之軍北聚魯齊南陽分有大此者乎且王之所求者鬬晋楚也晋楚不鬬越兵不起是二五而不知十也此時不攻楚臣以是知越大不王小不覇復讎龎長沙楚之粟也竟澤陵楚之材也越窺兵通無假之關此四邑者不上貢事於郢矣臣聞之圗王不王其敝可以覇然而不伯者王道失也故願大王之轉攻楚也於是越遂釋齊而伐楚楚威王興兵而伐之大敗越殺王無彊盡取故呉地至浙江北破齊於徐州而越以此散諸族子争立或為王或為君濱於江南海上服朝於楚後七世至閩君揺佐諸侯平秦漢高帝復以揺為越王以奉越後東越閩君皆其後也史越世家越王授有子四人越王之弟豫欲盡殺之而為之後越王授句踐五世孫惡其三人而殺之矣國人不說大非上非猶咎也又惡其一人而欲殺之越王未之聽其子恐必死因國人之欲逐豫圍王宫越王太息曰余不聽豫之言以罹此難也不知其所以亡也吕覧審已越王翳逃巫山穴許甚曰翳越王之太子當立讓逃巫山之穴中薰而出之遂不得已立為王淮南子吕覧貴生越人三世殺其君王子搜患之王子搜淮南子云越王翳也逃乎丹穴越國無君求王子搜而不得從之丹穴王子搜不肯出越人薰之以艾乘之以王輿王子子搜援綏登車仰天而呼曰君乎君乎獨不可以舎我乎又荘子譲王紀年晋出公十年十一月於越子句踐卒是為菼執次鹿郢立十六年於越子鹿郢卒次不壽立敬公三年於越子不壽見殺是為肓姑次朱句立烈公五年於越滅滕六年於越子朱句伐郯以郯子鴣歸八年於越子朱句卒子翳立桓公十三年於越遷于呉十六年於越太子諸咎弑其君翳十月越殺諸咎越滑呉人立孚錯枝為君十七年於越大夫寺區定越亂立初無余是為莽安魏恵成王六年於越寺區弟思弑其君莽安卒無顓立十年於越子無顓卒是為菼燭卯索隠曰按紀年無顓薨後十年楚伐徐州無殺無彊之語是無彊為無顓之後紀年不得錄也雜錄越使諸發執一枝梅遺梁王梁王之臣曰韓子顧謂左右曰惡有以一枝梅以遺列國之君者乎請為二三子慚之出謂諸發曰大王有命客冠則以禮見不冠則否諸發曰彼越亦天子之封也不得冀兖之州乃處海垂之際屏蕃以為居而蛟龍又與我爭焉是以剪髪文身爛然成章以像龍子者将避水神也今大國有命冠則見以禮不冠則否假令大國之使時過敝邑敝邑之君亦有命矣曰客必剪髪文身然後見之于大國何如意而安之願假冠以見意如不安願無變國俗梁王聞之披衣出以見諸發令逐韓子說苑奉使公孫𢎞斷髪而為越王騎公孫喜使人絶之曰吾不與子為昆弟矣公孫𢎞曰我斷髪子斷頸而為人用兵我將謂子何周南之戰公孫喜死焉韓子說林下子墨子游公上過於越公上過子墨子弟子也公上過語墨子之義越王說之謂公上過曰子之師苟肯至越請以故呉之地隂江之浦書社三百以封夫子社二十五家也三百社七千五百家也公上過徃復於子墨子子墨子曰子之觀越王也能聽吾言用吾道乎公上過曰殆未能也墨子曰不唯越王不知翟之意雖子亦不知翟之意若越王聽吾言用吾道翟度身而衣量腹而食比於賓萌萌作氓未敢求士越王不聽吾言不用吾道雖全越以與我吾無所用之越王不聴吾言不用吾道而受一作愛其國是以義翟也義翟何必越雖於中國亦可吕覧高義風土記越俗性率朴初與人交有禮封土壇祭以犬雞祝曰君乘車我戴笠他日相逢下車揖君擔簦我跨馬他日相逢為君下吕氏春秋海上之人有好蜻者每居海上從蜻游蜻之至者百數而不止前後左右盡蜻也終日玩之而不去其父告之曰聞蜻皆從女居取而去吾將玩之明日之海上而蜻無至者矣春秋戰國異辭卷五十三
