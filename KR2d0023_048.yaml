body:
  text: 春秋戰國異辭卷四十五右春坊右諭徳陳厚耀撰魏安釐王安釐王元年秦㧞我兩城二年又㧞我二城軍大梁下韓來救予秦温以和三年秦㧞我四城斬首四萬四年秦破我及韓趙殺十五萬人走我將芒卯魏將叚干子請予秦南陽以和蘇代謂魏王曰欲璽者叚干子也欲地者秦也今王使欲地者制璽使欲璽者制地魏氏地不盡則不知已且夫以地事秦譬猶抱薪救火薪不盡火不滅王曰是則然也雖然事始已行不可更矣對曰王獨不見夫慱之所以貴梟者便則食不便則止矣今王曰事始已行不可更是何王之用智不如用梟也九年秦㧞我懐十年秦太子外質於魏死十一年秦㧞我郪丘以上史魏世家子髙適魏㑹秦兵將至信陵君懼造子高之館而問祈勝之禮焉子高曰命勇謀之將以禦敵先使之迎於敵所從來之方為壇祈克於五帝衣服隨其方色執事人數從其方之數牲則用其方之牲祝史告於社稷宗廟邦域之内名山大川君親素服誓衆於太廟曰某人不道侵犯大國二三子尚皆同心比力死守將帥稽首再拜受命既誓將帥勒士卒陳於廟之右君立太廟之庭祝史立於社百官各警其事御於君以待命乃大鼓於廟門詔將帥命卒習射三發擊刺三行告廟用兵於敵也五兵備効乃鼓而出以即敵此諸侯應敵之禮也信陵君曰敬受教信陵君問子髙曰古者君旅賞人必於祖戮人必於社其義何也答曰賞功於祖告分之均示不敢専也戮罪於社告中於土示聼之當也孔叢子中周趮謂宫他曰周趮魏人為我謂齊王曰以齊資我於魏請以魏事王宫他曰不可是示之無魏也齊王必不資於無魏者而以怨有魏者公不如曰以王之所欲臣請以魏聼王齊王必以公為有魏也必因公是公有齊也因以有齊魏也韓子説林下與國䇿稍别秦魏為與國齊楚約而欲攻魏魏使人求救於秦冠盖相望秦救不出魏人有唐且者年九十餘謂魏王曰老臣請西説秦令兵先臣出可乎魏王曰敬諾遂約車而遣之且見秦王秦王曰丈人罔然乃逺至此甚若矣魏來求救數矣寡人知魏之急矣唐且答曰大王已知魏之急而救不至是大王籌䇿之臣失之也且夫魏一萬乘之國也稱東藩受冠帯祠春秋者為秦之强足以為與也今齊楚之兵已在魏郊矣大王之救不至魏急則且割地而約齊楚王雖欲救之豈有及哉是亡一萬乘之魏而强二敵之齊楚也竊以為大王籌䇿之臣失之矣秦王懼然而悟遽發兵救之齊楚聞之引兵而去新序卷三唐與史記國䇿畧同且作唐雎中山公子牟者魏國之賢公子也好與賢人遊不恤國事而悦趙人公孫龍樂正子輿之徒笑之公子牟曰子何笑牟之悦公孫龍也子輿曰公孫龍之為人也行無師學無友佞給而不中漫衍而無家好怪而妄言欲惑人之心屈人之口與韓檀等肄之公子牟變容曰何子状公孫龍之過歟請聞其實子輿曰吾笑龍之詒孔穿言善射者能令後鏃中前括發發相及矢矢相屬前矢造凖而無絶落後矢之括猶銜弦視之若一焉孔穿駭之龍曰此未其妙者逄蒙之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭射其目矢來注眸子而眶不睫矢墜地而塵不揚是豈智者之言與公子牟曰智者之言固非愚者之所曉後鏃中前括鈞後於前矢注眸子而眶不睫盡矢之勢也子何疑焉樂正子輿曰子龍之徒焉得不飾其闕吾又言其尤者龍誑魏王曰有意不心有指不至有物不盡有影不移髪引千鈞白馬非馬孤犢未甞有母其負類反倫不可勝言也公子牟曰子不諭至言而以為尤也尤其在子矣夫無意則心同無指則皆至盡物者常有影不移者説在改也髪引千鈞勢至等也白馬非馬形名離也孤犢未甞有母非孤犢也甚簡而不可勝辨影髪之理尤精樂正子輿曰子以公孫龍之鳴皆條也設今發於餘竅子亦將承之公子牟黙然良久告退曰請待餘日更謁子論列子仲尼荘子公孫龍問魏牟曰龍少學先生之道長而明仁義之行合同異離堅白然不然可不可困百家之知窮衆口之辯吾自以為至達己今吾聞荘子之言茫焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方公子牟隐几太息仰天而笑曰子獨不聞夫埳井之鼃乎謂東海之鼈曰吾樂與吾跳梁乎井榦之上入休乎缺甃之崖赴水則接腋持頥蹶泥則没足滅跗還虷蠏與科斗莫吾能若也且夫擅一壑之水而跨跱埳井之樂此亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已縶矣於是逡廵而却告之海曰夫千里之逺不足以舉其大千仭之髙不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損夫不為頃久推移不以多少進退者此亦東海之大樂也於是埳井之鼃聞之適適然驚規規然自失也且夫知不知是非之竟而猶欲觀於荘子之言是猶使蚉負山啇蚷馳河也必不勝任矣且夫知不知論極妙之言而自適一時之利者是非埳井之鼃與且彼方􅝌黄泉而登大皇無南無北奭然四解淪於不測無東無西始於𤣥冥反於大通子乃規規然而求之以察索之以辯是直用管闚天用錐指地也不亦小乎子往矣且子獨不聞夫夀陵餘子之學行於邯郸與未得國能又失其故行矣直匍匐而歸耳今子不去將忘子之故失子之業公孫龍口呿而不合舌舉而不下乃逸而走漢書道家公子牟四篇魏王問人主所以為患魏安釐王子高對曰建大臣而不與謀嬖倖者言用則知士以踈自疑自疑上之踈已也嬖臣以遇徼幸者内則射合主心外則挺主之非此最人主之大患也孔叢子中子髙謂魏王曰臣入魏國見君之二計臣焉張叔謀有餘范威智不逮然其功一也王曰叔也有餘威也不逮何同乎答曰駑驥同轅伯樂為之咨嗟玉石相揉和氏為之嘆息故賢愚共貫則能士匿謀真偽相錯則正士結舌叔雖有餘猶威不逮也孔叢子中魏王問何如可謂大臣子高答曰大臣則必取衆人之選能犯顔諫爭公正無私者計陳事成主裁其賞事敗臣執其咎主任之而無疑臣當之而弗避君縂其美臣行其義然則君不猜於臣臣不隐於君故動無過計舉無敗事是以臣主並各有得也孔叢子中趙使人謂魏王安釐王曰為我殺范痤吾請獻七十里之地魏王曰諾使吏捕之圍而未殺痤因上屋騎危國䇿無上屋騎危事謂使者曰與其以死痤市不如以生痤市有如痤死趙不與王地則王將奈何故不若與先定割地然後殺痤魏王曰善痤因上書信陵君曰痤故魏之免相也趙以地殺痤而魏王聼之有如强秦亦將襲趙之欲則君且奈何信陵君言於王而出之史魏世家苑詳戰國策又説善説魏王遣使者奉黄金束帛聘子順孔武後名斌字子順子髙之子為相安釐王十八年子順謂使者曰若王信能用吾道吾道固為治世也雖䟽食飲水吾猶為之若徒欲制服吾身委以重禄吾猶一夫爾則魏王不少於一夫子度魏王之心以告我使者曰魏國狹小乏於聖賢寡君久聞下風願委國先生親受教訓如肯降節豈惟魏國君臣是賴其亦社稷之神祗實永受慶於是乃之魏魏王郊迎謂子順曰寡人不肖嗣先君之業先生聖人之後道徳懿邵幸見顧臨願圖國政對曰臣覊旅之臣慕君髙義是以戾此君辱貺而問以政事敢不敬受君之明令孔叢子中子順相魏改嬖寵之官以事賢才奪無任之禄以賜有功諸喪職秩者不悦乃造謗言文咨魏人以告且曰夫不害前政而有成孰與變之而起謗哉子順曰民不可與慮始久矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不能及聖賢庸知謗止獨無時乎文咨曰子産之謗甞亦聞之未識先君之謗何也子順曰先君初相魯魯人謗誦曰麛裘而芾投之無戾芾之麛裘投之無郵及三年政成化既行民又作誦曰衮衣章甫實獲我所章甫衮衣恵我無私文咨喜曰乃知先生亦不異乎聖賢矣孔叢子中甞史記相子髙生子慎年五十七為魏慎當作順魏安釐王問子順曰馬囘之為人雖少才梗梗亮直梗一作緶有大丈夫之節吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未明也王曰何故答曰聞諸孫卿云其為人也長目而豕視者必體方而心圎每以其法相人千百不失臣見囘非不偉其體幹也然甚疑其目王卒用之三月果以諂得罪孔叢子中魏王謂子順曰吾欲致天下之士奈何子順對曰昔周穆王問祭公謀父曰吾欲得天下賢才對曰去其帝王之色則㡬乎得賢才矣今臣亦請君去其尊貴之色而已王曰吾欲得無欲之士為臣何如子順曰人之可使以有欲也故欲多者其所得用亦多欲少者其所得用亦少夫夷齊無欲雖文武不能制君安得而臣之孔叢子中魏安釐王問天下髙士子順曰世無其人也抑可以為次其魯仲連乎王曰魯仲連强作之者非體自然也答曰人皆作之作之不止乃成君子文武欲作尭舜而至焉昔我先君夫子欲作文武而至焉作之不變習與體成習與體成則自然矣孔叢子中魏王問子順曰寡人聞昔者上天神異后稷而為之下嘉榖周以遂興往中山之地無故有榖非人所為云天雨之反亡國何故也答曰天雖至神自古及今未聞下榖與人也詩美后稷能大教民種嘉榖以利天下故詩曰誕降嘉種猶書所謂稷降播種農殖嘉榖皆説種之其義一也若中山之榖妖怪之事非所謂天祥也孔叢子中魏王朝羣臣問理國之所先季文對曰唯在知人王未之應子順進曰知人則哲帝尭所病故四岳在朝鯀任無功夫豈樂然哉人難知故也今文之對不稱吾君之所能行而乃欲强吾君以聖人所難此不可行之説也王曰先生言之對曰當今所急在修仁尚義崇徳敦禮以接隣國而已昔舜命衆官羣臣競讓徳禮之致也茍使朝臣皆有推賢之心主雖不知人則臣位必當若皆以知人為治則人主宜未過尭且其目所不見者亦必漏矣王曰善矣孔叢子中魏王曰吾聞道士登華山則長生吾意亦願之對曰古無是道非所願也王曰吾聞信之對曰未審君之所聞親聞之於不死者耶聞之於傳聞者耶君聞之於傳聞者妄也若聞之於不死者今安在者君學之勿疑不在者君勿學無疑孔叢子中魏王問相國曰今秦負强以無道陵天下天下莫不患寡人欲割地之半以親諸侯求從事於秦可乎子順對曰以臣觀之殆無益也今天下諸侯畏秦之日乆矣數被其毒無欲復之之志心無所計委國於游説之士游説之士挾强秦以為資賣其國以收利义手服從曽不能制如君之謀未獲其利而祗為名適足以速秦之首誅則無以得之不如守常以須其變也王曰秦其遂有天下乎對曰必然焉雖然取不以道得不以道自古以來未有能終之者五國西誅秦子順㑹之秦未入境而還諸侯留兵於成臯子順謂市丘子曰此師楚為之主今兵罷而不𣪚殆有異意君其備之市丘子曰先生幸而教之願以國寄先生子順許諾遂見楚王曰王約五國而西伐秦事既不集又乆師於市丘謗君者或以君欲攻市丘以償兵費天下之士且以是輕君而重秦又且不義君之為矣王可不卜交乎楚王曰奈何子順曰王出令使五國勿攻市丘五國重王則聼王之令矣不重王則且反王之令而攻市丘以此卜五國交王之輕重必明矣楚王敬諾而五國𣪚孔叢子中宫他魏人見子順曰他困貧賤將欲自託富貴之門庶克免乎子順曰夫富而可以託貧貴而可以寄賤者天下寡矣非信義君子明識窮達則不可今子所欲託者誰也宫他曰將適趙公子子順曰非其人矣雖好飬士自奉而已終弗能稱也宫他曰將適燕相國子順曰彼徒兄弟甥舅各濟其私無求賢之志不足歸也宫他曰將適齊田氏子順曰齊大國也其士大夫皆有自多之心不能容子也他曰然則何向而可子順曰吾勿識也宫他曰唯先生知人願告所擇將往庇焉子順曰濟子之欲則宜若郈成子者也昔郈成子自魯聘晉過乎衛右宰榖臣止而觴之陳樂而不作送以寳璧反過而不辭其僕曰日者右宰之觴吾子甚歡也今過而不辭何也成子曰夫止而觴我與我歡也陳樂而不作告我哀也送我以璧寄之我也若由此觀之衛其有亂乎背衛三十里聞寗喜作難右宰死之還車而臨三舉而歸反命於君乃使人迎其妻子隔宅而居之分禄而食之其子長而反其璧夫子聞之曰智可與徴謀仁可與託孤亷可以寄財者其郈成子之謂乎今子求若人之比庇焉可也宫他曰循先生之言舎先生將安之請從執事子順辭不得已乃言之魏王而升諸朝孔叢子中李由之母少寡與李音竊相好而生由由有才藝仕於魏王甚愛之或曰李由母姦不知其父不足貴也王以告由且曰吾不以此賤子也雖然古之聖賢亦有似子者乎吾將舉以折毁子者李由對曰今人不通於逺在臣欲言誰爾且孔子少孤則亦不知其父者也孔子母死殯於五父之衢人見之皆以為孤𦵏問鄹曼父之母得合𦵏於防此則聖人與臣同者也王笑曰善子順聞之問魏王曰李由安得斯言王曰假以自顯無傷也對曰虚造謗言以誣聖人非無傷也且夫明主之於臣唯徳所在不以小疵妨大行也昔鬭子文生於淫而不害其為令尹李由可則寵之何患於人之言而使横生不然之説若欺有知則有知不受若欺凡人則凡人無知必亦問臣則臣亦不為君之故誣祖以顯由也如此羣臣更知由惡此必聚矣所謂求白潔而益其垢猶抱石以救溺愈不濟矣孔叢子中秦王得西戎利刀以之割玉如割木焉以示東方諸侯魏王問子順曰古亦有之乎對曰周穆王大征西戎西戎獻錕鋘之劔火浣之布其劔長尺有咫鍊銅赤劔用之切玉如泥焉是則古亦有也王曰火浣之布若何對曰周書火浣布垢必投諸火布則火色垢乃灰色出火振之皜然疑乎雪焉王曰今何以獨無對曰秦貪而多求求欲無厭是故西戎閉而不致此以素防絶之也然則人主貪欲乃異物所以不至不可不慎也孔叢子中秦兵攻趙魏大夫以為於魏便子順曰何謂曰勝趙則吾因而服焉不勝趙則可乘弊而擊之子順曰不然秦自孝公以來戰未甞屈今皆良將何弊之乘大夫曰縱其勝趙於我何損隣之不修國之福也子順曰秦貪暴之國也勝趙必復他求吾恐於時受其師也先人有言燕雀處屋子母相哺呴呴然其相樂也自以為安矣竈突炎上棟宇將焚燕雀顔不變不知禍之及己也今子不悟趙破患將及己可以人而同於燕雀乎孔叢子中信陵君問曰古之善為國至於無訟其道何由答曰由乎政善也上下勤徳而無私徳無不化俗無不移衆之所譽政之所是也衆之所毁政之所非也毁譽是非與政相應所以無訟也孔叢子中魏安釐王觀翔鵠而樂之曰寡人得如鵠之飛視天下如芥也客有隐遊者聞之作木鵠而獻王王曰此有形無用者也夫作無用之噐世之奸民也召遊欲加刑焉遊曰大王知有用之用未寤無用之用也今臣請為大王翔之乃取而乘焉遂翻然飛去莫知所之異苑魏公子無忌方食有鳩飛入案下公子使人顧望見一鷂在屋上飛去公子乃縱鳩鷂逐而殺之公子暮而不食曰鳩避患歸無忌竟為鷂所得吾負之為吾捕得此鷂者無忌無所愛於是左右宣公子慈聲旁國左右捕得鷂二百餘頭以奉公子公子欲盡殺之恐有辜乃自按劍至其籠上曰誰獲罪無忌者耶一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲流布天下歸焉烈士傳魏安釐王三十四年以秦救之故欲親秦而伐韓以求故地無忌謂魏王曰秦與戎翟同俗有虎狼之心貪戾好利無信不識禮義徳行茍有利焉不顧親戚兄弟若禽獸耳此天下之所識也非有所施厚積徳也故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚若此而况於仇讐之國乎今王與秦共伐韓而益近秦患臣甚惑之而王不識則不明羣臣莫以聞則不忠今韓氏以一女子奉一弱主内有大亂外交彊秦魏之兵王以為不亡乎韓亡秦有鄭地與大梁隣王以為安乎王欲得故地今負彊秦之親王以為利乎秦非無事之國也韓亡之後必將更事更事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絶韓上黨而攻彊趙是復閼與之事秦必不為也若道河内倍鄴朝歌絶漳滏水與趙兵决於邯郸之郊是知伯之禍也秦又不敢伐楚道涉山谷行三千里而攻冥阨之塞所行甚逺所攻甚難秦又不為也若道河外倍大梁右蔡左召陵與楚兵决於陳郊秦又不敢故曰秦必不伐楚與趙矣又不攻衛與齊矣夫韓亡之後兵出之日非魏無攻已秦固有懐茅邢丘城垝津以臨河内河内共汲必危有鄭地得垣雍決滎澤水灌大梁大梁必亡王之使者出過而惡安陵氏於秦秦之欲誅之久矣秦葉陽昆陽與武陽隣聼使者之惡之隨安陵氏而亡之繞武陽之北以東臨許南國必危國無害己夫憎韓不愛安陵氏可也夫不患秦之不愛南國非也異日者秦在河西晉國去梁千里有河山以闌之有周韓以間之從林鄉軍以至於今秦七攻魏五入囿中邊城盡㧞文䑓墮垂都焚林木伐糜鹿盡而國繼以圍又長驅梁北東至陶衛之郊北至平監所亡於秦者山南山北河外河内大縣數十名都數百秦乃在河西晉去梁千里而禍若是矣又况於使秦無韓有鄭地無河山而䦨之無周韓而間之去大梁百里禍必由此矣異日者從之不成也楚魏疑而韓不可得也今韓受兵三年秦橈之以講識亡不聼投質於趙請為天下鴈行頓刃楚趙必集兵皆識秦之欲無窮也非盡亡天下之國而臣海内必不休矣是故臣願以從事王王速受楚趙之約趙挾韓之質以存韓而求故地韓必效之此士民不勞而故地得其功多於與秦共伐韓而又與彊秦隣之禍也夫存韓安魏而利天下此亦王之天時已通韓上黨於共寗使道安成出入賦之是魏重質韓以其上黨也今有其賦足以富國韓必徳魏愛魏重魏畏魏韓必不敢反魏是韓則魏之縣也魏得韓以為縣衛大梁河水必安矣今不存韓二周安陵必危楚趙大破衛齊甚畏天下西鄉而馳秦入朝而為臣不久矣史魏世家二十年秦圍邯郸信陵君無忌矯奪將軍晉鄙兵以救趙趙得全無忌因留趙史魏世家魏公子無忌者魏昭王少子而安釐王異母弟也昭王薨安釐王封公子為信陵君是時范雎亡魏相秦以怨魏齊故秦兵圍大梁破魏華陽下軍走芒卯魏王及公子患之公子為人仁而下士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年公子與魏王博而北境𫝊舉𤇺言趙㓂至且入界魏王釋博欲召大臣謀公子止王曰趙王田獵耳非為㓂也復博如故王恐心不在博居頃復從北方來傳言曰趙王獵耳非為㓂也魏王大驚曰公子何以知之公子曰臣之客有能探得趙王隂事者趙王所為客輙以報臣臣以此知之是後魏王畏公子之賢能不敢任以國政初魏有隐士曰侯嬴年七十家貧為大梁夷門監者公子聞之往請欲厚遺之不肯受曰臣修身絜行數十年終不以監門困故而受公子財公子於是乃置酒大㑹賔客坐定公子從車騎虚左自迎夷門侯生侯生攝弊衣冠直上載公子上坐不讓欲以觀公子公子執轡愈恭侯生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱亥俾倪故久立與其客語㣲察公子公子顔色愈和當是時魏將相宗室賔客滿堂待公子舉酒市人皆觀公子執轡從騎皆竊罵侯生侯生視公子色終不變乃謝客就車至家公子引侯生坐上坐徧贊賔客賔客皆驚酒酣公子起為夀侯生前侯生因謂公子曰今日嬴之為公子亦足矣嬴乃夷門抱闋者也而公子親枉車騎自迎嬴於衆人廣坐之中不宜有所過今公子故過之然嬴欲就公子之名故久立公子車騎市中過客以觀公子公子愈恭市人皆以嬴為小人而以公子為長者能下士也於是罷酒侯生遂為上客侯生謂公子曰臣所過屠者朱亥此子賢者世莫能知故隐屠間耳公子往數請之朱亥故不復謝公子怪之魏安釐王二十年秦昭王已破趙長平軍又進兵圍邯郸公子姊為趙恵文王弟平原君夫人數遺魏王及公子書請救於魏魏王使將軍晉鄙將十萬衆救趙秦王使使者告魏王曰吾攻趙旦暮且下而諸侯敢救者已㧞趙必移兵先擊之魏王恐使人止晉鄙留軍壁鄴名為救趙實持兩端以觀望平原君使者冠盖相屬於魏讓魏公子曰勝所以自附為㛰姻者以公子之髙義為能急人之困今邯郸旦暮降秦而魏救不至安在公子能急人之困也且公子縱輕勝棄之降秦獨不憐公子姊邪公子患之數請魏王及賔客辯士説王萬端魏王畏秦終不聼公子公子自度終不能得之於王計不獨生而令趙亡乃請賓客約車騎百餘乘欲以客往赴秦軍與趙俱死行過夷門見侯生具告所以欲死秦軍狀辭决而行侯生曰公子勉之矣老臣不能從公子行數里心不快曰吾所以待侯生者備矣天下莫不聞今吾且死而侯生曽無一言半辭送我我豈有所失哉復引車還問侯生侯生笑曰臣固知公子之還也曰公子喜士名聞天下今有難無他端而欲赴秦軍譬若以肉投餒虎何功之有哉尚安事客然公子遇臣厚公子往而臣不送以是知公子恨之復返也公子再拜因問侯生乃屏人問語曰嬴聞晉鄙之兵符常在王卧内而如姫最幸出入王卧内力能竊之嬴聞如姫父為人所殺如姫資之三年自王以下欲求報其父仇莫能得如姫為公子泣公子使客斬其仇頭敬進如姫如姫之欲為公子死無所辭顧未有路耳公子誠一開口請如姫如姫必許諾則得虎符奪晉鄙軍北救趙而西却秦此五覇之伐也公子從其許請如姫如姫果盗晉鄙兵符與公子公子行侯生曰將在外主令有所不受以便國家公子即合符而晉鄙不授公子兵而復請之事必危矣臣客屠者朱亥可與俱此人力士晉鄙聼大善不聼可使擊之於是公子泣侯生曰公子畏死耶何泣也公子曰晉鄙嚄唶宿將往恐不聼必當殺之是以泣耳豈畏死哉於是公子請朱亥朱亥笑曰臣乃市井鼓刀屠者而公子親數存之所以不報謝者以為小禮無所用今公子有急此乃臣効命之秋也遂與公子俱公子過謝侯生侯生曰臣宜從老不能請數公子行日以至晉鄙軍之日北鄉自剄以送公子公子遂行至鄴矯魏王令代晉鄙晉鄙合符疑之舉手視公子曰吾擁十萬之衆屯於境上國之重任今單車來代之何如哉欲無聼朱亥袖四十斤鐵椎椎殺晉鄙公子遂將晉鄙軍勒兵下令軍中曰父子俱在軍中父歸兄弟俱在軍中兄歸獨子無兄弟歸飬得選兵八萬人進兵擊秦軍秦軍解去遂救邯郸存趙趙王及平原君自迎公子於界平原君負韊矢為公子先引趙王再拜曰自古賢人未有及公子者也當此之時平原君不敢自比於人公子與侯生决至軍侯生果北鄉自剄魏王怒公子之盗其兵符矯殺晉鄙公子亦自知也已却秦存趙使將將其軍歸魏而公子獨與客留趙趙孝成王徳公子存趙乃與平原君計以五城封公子公子聞之有自功之色客有説公子曰物有不可忘或有不可不忘夫人有徳於公子公子不可忘也公子有徳於人願公子忘之也且矯魏王令奪晉鄙兵以救趙於趙則有功矣於魏則未為忠臣也公子乃自驕而功之竊為公子不取也於是公子立自責似若無所容者趙王埽除自迎執主人之禮引公子就西階公子側行辭讓從東階上自言罪過以負於魏無功於趙趙王侍酒至暮口不忍獻五城以公子退讓也公子竟留趙趙王以鄗為公子湯沭邑魏亦以信陵奉公子公子留趙史信陵君傳一漢書兵形勢魏公子二十篇圖十卷趙有處士毛公藏於博徒薛公藏於賣漿家公子欲見兩人兩人自匿不肯見公子公子聞所在乃閒步往從此兩人游甚歡平原君聞之謂其夫人曰始吾聞夫人弟公子天下無雙今吾聞之乃妄從博徒賣漿者游公子妄人耳夫人以告公子公子乃謝夫人去曰始吾聞平原君賢故負魏王而救趙以稱平原君平原君之游徒豪舉耳不求士也無忌自在大梁時常聞此兩人賢至趙恐不得見以無忌從之游尚恐其不我欲也今平原君乃以為羞其不足從游乃装為去夫人具以語平原君平原君乃免冠謝固留公子平原君門下聞之半去歸公子天下士復往歸公子公子傾平原君客史信陵君傳公子留趙十年不歸秦聞公子在趙日夜出兵東伐魏魏王患之使使往請公子公子恐其怒之乃誡門下有敢為魏王使通者死賓客皆背魏之趙莫敢勸公子歸毛公薛公兩人往見公子曰公子所以重於趙名聞諸侯者徒以有魏也今秦攻魏魏急而公子不恤使秦破大梁而夷先王之宗廟公子當何靣目立天下乎語未及卒公子立變色告車趣駕歸救魏魏王見公子相與泣而以上將軍印授公子公子遂將魏安釐王三十年公子使使遍告諸侯諸侯聞公子將各遣將將兵救魏公子率五國之兵破秦軍於河外走䝉驁遂乘勝逐秦軍至函谷關抑秦兵秦兵不敢出當是時公子威振天下諸侯之客進兵法公子皆名之故世俗稱魏公子兵法史信陵君傳三十年無忌歸魏率五國兵攻秦敗之河内走蒙驁魏太子增質於秦秦怒欲囚魏太子增或為增謂秦王曰公孫喜固謂魏相曰請以魏疾擊秦秦王怒必囚増魏王又怒擊秦秦必傷今王囚增是喜之計中也故不若貴増而合魏以疑之於齊韓秦乃止増史魏世家秦召魏公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著猛獸圈中亥瞋目視之眥裂血出濺猛獸猛獸終不敢動烈士傳秦王行金萬斤於魏求晉鄙客令毁公子於魏王曰公子亡在外十年矣今為魏將諸侯將皆屬諸侯徒聞魏公子不聞魏王公子亦欲因此時定南靣而王諸侯畏公子之威方欲共立之秦數使反間偽賀公子得立為魏王未也魏王日聞其毁不能不信後果使人代公子將公子自知再以毁廢乃謝病不朝與賓客為長夜飲飲醇酒多近婦女日夜為樂飲者四嵗竟病酒而卒其嵗安釐王亦薨秦聞公子死使蒙驁攻魏景湣王元年事史信陵君傳三十四年安釐王卒太子増立是為景湣王史魏世家魏公子無忌死韓君將親弔焉其子榮之以告子順子順曰必辭之禮隣國君弔君主之今君不命子則子無所受其君也其子辭韓韓君乃止孔叢子中景湣王景湣王元年秦㧞我二十城以為秦東郡史魏世家二年秦㧞我朝歌衛徒野王史魏世家三年秦㧞我汲史魏世家五年秦㧞我垣蒲陽衍史魏世家秦急攻魏王恐或謂子順曰如之何答曰吾私有計然豈能賢於執政故無言焉魏王聞之駕如孔氏親問焉曰國亡矣如之何對曰夫棄之不如用之之易也死之不如棄之之易也人能棄之弗能用也能死之不能棄也今王亡地數百里亡城數十而患不解是王棄之非用之也秦之强天下無敵魏之弱甚矣而王是以質秦景閔王為太子時嘗質于秦此王能死不能棄之也是重過也若能用臣之計則虧地不足傷國卑體不足苦身行見患除怨報矣今秦四境之内執政以下固曰與嫪氏乎與吕氏乎門閭之下廊廟之上猶皆如是今王誠能割地賂秦以為嫪毐功卑身尊秦以固嫪毐王是以國贊嫪毐也則嫪毐勝矣於是太后之徳王也深如骨肉王之交最為天下之上矣孰不棄吕氏而從嫪毐天下皆然則王怨必報矣按此䇿甚踈必非子順語孔叢子中子順相魏凡九月陳大計輙不用乃喟然嘆曰不見用是吾言之不當也言不當於主而居人之官食人之禄是尸利也尸利素餐吾罪深矣退而以病致事魏王遣使入其館謝曰寡人昩於政事不顯明是非以啟罪於先生今知改矣願先生為百姓故幸起而教之辭曰臣有犬馬之疾不任國事茍得從四民之列子弟供魏國之征乃君恵也敢辱君命以速刑書人謂子順曰王不用子子其行乎答曰吾將行如之山東則山東之國將并於秦秦為不義義所不入遂寝於家孔叢子中通鑑載於安釐王時新垣固謂子順曰賢者所在必興化致治今子相魏未聞異政而即自退其有志不得白何去之速也答曰以無異政所以自退也且死病無良毉今秦有吞食天下之心以義事之固不獲安救亡不暇何化之興昔伊摰在夏吕望在商而二國不理豈伊吕之不欲哉勢不可也當如今日山東之國弊而不振三晉割地以求安二周折節而入秦燕齊宋楚已屈服矣以此觀之不出二十年天下盡為秦乎孔叢子中十五年景湣王卒子王假立史魏世家王假三年秦灌大梁虜王假遂滅魏以為郡縣史魏世家秦太史公曰之破梁引河溝而灌大梁三月城壊王請降遂滅魏秦滅魏盡殺魏諸公子獨一公子弗得下令得遺公子者賜千鎰匿者族遺公子之乳母獨與公子逃魏之舊臣見而問曰公子安在汝言之於秦可以千金自利不言昆弟且無類矣乳母曰吾縱知之亦不忍言凡為人飬子者務生之也豈可利不義之賞畏死行逆節而令公子擒耶遂抱公子逃澤中故臣以告秦秦軍知而追之爭以亂箭射之乳母以身蔽公子矢著身數十尚不忍舎遂與公子俱死秦王聞之𦵏以卿禮祠以太牢列女傳韓詩卷九秦攻魏破之少子亡而不得令魏國曰有得公子賜金千斤匿者罪至十族公子乳母與俱亡人謂乳母曰得公子者賞甚重乳母當知公子處而言之乳母應之曰我不知其處雖知之死則死不可以言也為人飬子不能隐而言之是畔上畏死也吾聞忠不畔上勇不畏死凡飬人子者生之非務殺之也豈可以見利畏誅之故廢義而行詐哉吾不能生而使公子獨死矣遂與公子俱逃澤中秦軍見而射之乳母以身蔽之著十二矢遂不令中公子秦王聞之享以太牢且爵其兄為大夫春秋戰國異辭卷四十五
