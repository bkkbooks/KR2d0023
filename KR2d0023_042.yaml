body:
  text: 春秋戰國異辭卷三十九右春坊右諭徳陳厚耀撰田齊宣王宣王元年秦用商鞅周致伯于秦孝公二年魏伐趙趙與韓共擊魏趙不利戰于南梁宣王召田忌復故位韓氏請救于齊宣王召大臣而謀曰紀年作威王十四年事蚤救孰與晚救騶忌子曰不如勿救田忌曰弗救則韓且折而入于魏不如蚤救之戰國策南梁之難有張丐對云蚤救之此云騶忌者王邵云此時騶忌死已四年又宣王作田侯指威王盖此時威王未稱王也今此以田侯為宣王又稱騶忌盖皆誤耳孫子曰漢書兵權謀齊孫子八十九篇圖四卷夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命于韓也且魏有破國之志韓見亡必東面而愬于齊矣吾因深結韓之親而晚承魏之弊則可重利而得尊名也宣王曰善乃隂告韓之使者而遣之韓因恃齊五戰不勝而東委國于齊齊因起兵使田忌田嬰将孫子為帥救韓趙以擊魏大敗之馬陵在宣王二年殺其将龎涓虜太子申其後三晉之王皆因田嬰朝齊王于博望盟而去史田齊世家與國策小異魏與趙攻韓韓急告于齊齊使田忌将而徃直走大梁魏将龎涓聞之去韓而歸齊軍既已過而西矣孫子謂田忌曰彼三晉之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趣利者蹶上将五十里而趣利者軍半至使齊軍入魏地為十萬竈明日為五萬竈又明日為三萬竈龎涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃棄其步軍與其輕銳倍日并行逐之孫子度其行暮當至馬陵地志遼州和順縣有孫臏坡山勢盤曲西接馬陵闗道相傳即孫子伏兵處馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死于此樹之下扵是令齊軍善射者萬弩夾道而伏期曰暮見火舉而俱發龎涓果夜至斫木下見白書乃鑽火燭之讀其書未畢齊軍萬弩俱發魏軍大亂相失龎涓自知智窮兵敗乃自剄曰遂成豎子之名齊因乗勝盡破其軍虜魏太子申以歸孫臏以此名顯天下世傳其兵法史孫呉傳年紀年云梁恵王十七十二月齊田盼敗梁馬陵史在梁惠王三十年當齊宣王二年七年與魏王㑹平阿南八年復㑹甄魏恵王卒九年與魏襄王㑹徐州諸侯相王也十年楚圍我徐州以上史田齊世家田嬰相齊齊宣王九年人有說王者曰終嵗之計王不一以數日之間自聽之則無以知吏之姦好得失也王曰善田嬰聞之即遽請扵王而聽其計王将聽之矣田嬰令官具押劵斗石叅升之計王自聽計計不勝聽罷食後復坐不復暮食矣田嬰復謂曰羣臣所終嵗日夜不敢偷怠之事也王以一夕聽之則羣臣有為勸勉矣王曰諾俄而王已睡矣吏盡偷刀削其押劵升石之計王自聽之亂乃始生韓子外儲右筞又淮南子道應稍畧國載孟嘗君事薛公靖郭君相齊齊威王夫人死威王當作宣王中有十孺子皆貴扵王薛公欲知王所欲立而請置一人以為夫人扵是為玉珥而美其一而獻之王以賜十孺子明日坐視美珥之所在而勸王以為夫人韓子外儲右靖郭君相齊與故人久語則故人富懐左右刷則左右重韓子内儲下靖郭君殘虐國人將叛而逐之其御知之豫装齎食及亂作靖郭君出亡至扵野而饑其御出所装食進之靖郭君曰何以知之而齎食對曰君之暴虐其臣下之謀久矣靖郭君怒不食曰以吾賢至聞也何謂暴虐其御懼曰臣言過也君實賢惟羣臣不肖故共害賢耳靖郭君悅然後食新序卷五史楚世家齊孟嘗君父田嬰欺楚楚威王伐齊敗之扵徐州而令齊必逐田嬰田嬰恐張丑偽謂楚王曰王所以戰勝扵徐州者田盼子不用也盼子者有功扵國而百姓為之用嬰子弗善而用申紀申紀者大臣不附百姓不為用故王勝之也今王逐嬰子嬰子逐盼子必用矣復搏其士卒以與王遇必不便扵王矣楚王因弗逐也韓非子成驩謂齊王曰王太仁太不忍人王曰太仁太不忍人非善名耶對曰此人臣之善也非人主之所行也夫人臣必仁而後可與謀不忍人而後可近也不仁則不可與謀忍人則不可近也王曰然則寡人安所太仁安不忍人對曰王太仁扵薛公而太忍扵諸田太仁薛公則大臣無重太不忍諸田則父兄犯法大臣無重則兵弱扵外父兄犯法則政弱扵内兵弱扵外政弱扵内此亡國之本也孟子說齊宣王而不悅淳于髠侍孟子曰今日說公之君公之君不悅意者其未知善之為善乎淳于髠曰夫子亦誠無善耳昔者瓠巴鼓琴而潛魚出聽伯牙鼓琴而六馬仰秣魚馬猶知善之為善而况君人者也孟子曰夫雷霆之起也破竹折木震驚天下而不能使聾者卒有聞日月之明徧照天下而不能使盲者卒有見今公之君若此也淳于髠曰不然昔者揖封生高商齊人好歌杞梁之妻悲哭而人稱咏夫聲無細而不聞行無隱而不形夫子茍賢居魯而魯國之削何也孟子曰不用賢削何有也吞舟之魚不居潛澤度量之士不居汙世夫蓻冬至必彫吾亦時矣詩曰不自我先不自我後非遭彫世者歟韓詩卷六載即名實章而記不同孟子三見宣王不言事門人曰曷為三遇王而不言事孟子曰我先攻其邪心荀子大畧史孟荀列傳孟軻鄒人也受業子思之門人道既通㳺事齊宣王宣王不能用適梁梁恵王不果所言則見以為迂逺而濶扵事情當是之時秦用商君富國彊兵楚魏用吳起戰勝弱敵齊威王宣王用孫子田忌之徒而諸侯東面朝齊天下方務扵合縱連衡以攻伐為賢而孟軻乃述唐虞三代之徳是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇風俗通孟軻受業于子思既通㳺扵諸侯所言皆以為迂逺而濶于事情然終不屈道趣合枉尺以直尋嘗仕扵齊位至卿後不能用孟子去齊又絶糧扵鄒薛困殆甚退與萬章之徒序詩書述仲尼之意作書中外十一篇梁恵王復聘請之以為上卿列女傳孟子處齊而有憂色孟母見之曰子若有憂色何也孟子曰不敏異日閒居擁楹而歎孟母見之曰鄉見子有憂色曰不敏也今擁楹而歎何也孟子對曰軻聞之君子稱身就位不為茍得而受賞不貪榮禄諸侯不聽則不達其上聽而不用則不踐其朝今道不用扵齊願行而母老是以憂也孟母曰夫婦人之禮精五飯冪酒漿養舅姑縫衣裳而已矣故有閫内之修而無境外之志易曰在中饋無攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三從之道也故年少則從乎父母出嫁則從乎夫夫死則從乎子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道繹史曰文選注云雖來屯難不見仕用終亦為周威王師其事則未聞也十一年與魏伐趙趙決河水灌齊魏兵乃罷十八年秦恵王稱王以上史田齊世家齊宣王坐淳于髠侍宣王曰先生論寡人何好淳于髠曰古者所好四而王所好三焉宣王曰古者所好何與寡人所好淳于髠曰古者好馬王亦好馬古者好味王亦好味古者好色王亦好色古者好士王獨不好士宣王曰國無士耳有則寡人亦悅之矣淳于髠曰古者有驊騮騏驥今無有王選于衆王好馬矣古者有豹象之胎今無有王選扵衆王好味矣古者有毛廧西施今無有王選扵衆王好色矣王必将待堯舜禹湯之士而後好之則禹湯之士亦不好王矣宣王嘿然無以應說苑尊賢齊王欲淳于髠傅太子髠辭曰臣不肖不足以當大任也王不若擇國之長者而使之齊王曰子無辭也寡人豈責子之令太子必如寡人也哉寡人固生而有之也子為寡人令太子如堯乎其如舜乎凡説之行也道不智聽智從自非受是也今日以為賢過扵堯舜彼且胡可以聞說哉吕覽壅塞田駢以道術說齊齊王應之曰寡人所有者齊國也道術難以除患願聞齊國之政田駢對曰臣之言無政而可以為政譬之若林木無材而可以為材願言察其所謂而自取齊國之政焉雖無除其患害天地之間六合之内可陶冶而變化也齊國之政何足問哉淮南子道應又吕氏春秋客有見田駢者被服中法進退中度趨翔閑雅辭令遜美田駢聽之畢而辭之客出田駢送之以目弟子謂田駢曰客士歟田駢曰殆乎非士也今者客所弇斂士所術施也士所弇斂客所術施也術當作述客殆乎非士也吕覽士客齊宣王喜文學㳺說之士自如騶衍淳于髠田駢接子愼到環淵之徒七十六人皆賜列第為上大夫不治而議論齊稷下學士復盛且數百千人史田齊世家自騶衍與齊之稷下先生如淳于髠愼到環淵接子田駢騶奭之徒各著書言治亂之事以干世主史孟荀傳愼到趙人田駢接子齊人環淵楚人皆學黄老道徳之術因發明序其指意故愼到著十二論環淵著上下篇而田駢接子皆有論騶奭者亦頗采騶衍之術以紀文扵是齊王嘉之自淳于髠以下皆命曰列大夫為開第康荘之衢髙門大屋尊寵之覽天下諸侯賔客言齊能致天下賢士也史孟荀傳齊之辯士田巴辯扵徂丘議扵稷下毁五帝罪三王訾五伯離堅白合同異一日而服千人有徐刦者其弟子曰魯仲連謂徐刦曰臣願得當田子使之必不復談可乎徐刦言之巴曰走弟子年十二然千里駒也願得代議扵前可乎田巴曰可魯仲連得見曰臣聞堂上不奮郊草不芸白刃交前不救流矢急不暇緩也今楚軍南陽趙伐髙唐燕人十萬在聊國亡在旦暮先生将奈何田巴曰無奈何魯連曰危不能為安亡不能為存無貴學士矣今臣将罷南陽之師還髙唐之兵所貴談說此之謂也如先生之言有似梟鳴出聲人皆惡之願先生勿復談田巴曰謹受教明日見徐刦曰先生之駒乃飛兔騕䮍也豈特千里哉田巴扵是杜口為業終身不談也三柱子子即魯連齊王聘田巴先生而問政焉對曰政在正身正身之本在扵羣臣王召臣臣改制鬋飾問于妾奚若妾愛臣䛕臣曰佼臣臨淄水而觀然後自知醜惡也今齊之臣䛕王者衆王能臨淄水見己之惡過而自改則齊國治矣新序子按國筞之鄒衍吕覽之列精髙此之田巴其辭一也鄒忌以鼓琴見齊宣王宣王善之鄒忌曰夫琴所以象政也遂為王言琴象政状及霸王事宣王大恱與語三日拜為相齊稷下先生淳于髠之屬七十二人皆輕忌以為設以辭忌不能及乃相與徃見忌髠之徒禮倨忌之禮卑髠等曰狐白之裘補以弊羊皮何若忌曰敬諾請無雜賢以不肖髠曰方内而員缸何若忌曰敬諾請謹門内無留賔客髠曰三人共牧一羊羊不得食人不得息何若忌曰敬諾減吏省員使無擾民髠等三稱忌三應之如響髠等乃辭屈而去新序卷二忌此疑即威王時鄒子事齊有三騶子其前騶忌以鼓琴干威王因及國政封為成侯而受相印先孟子其次騶衍後孟子騶衍暏有國者益淫侈不能尚徳乃深觀隂陽消息而作怪迂之變終始大聖之篇十餘萬言其語閎大不經必先驗小物推而大之至于無垠先序今以上至黄帝學者所共術大並世盛衰因載其禨祥度制推而逺之至天地未生窈㝠不可考而原也先列中國名山大川通谷禽獸水土所殖物類所珍因而推之及海外人之所不能睹稱引天地剖判以來五徳轉移治各有宜而符應若兹以為儒者所謂中國者于天下乃八十一分居其一分耳中國名曰赤縣神州赤縣神州内自有九州禹之序九州是也不得為州數中國外如赤縣神州者九乃所謂九州也扵是有禆海環之人民禽獸莫能相通者如一區中者乃為一州如此者九乃有大瀛海環其外天地之際焉其術皆此類也然要其歸必止乎仁義節儉君臣上下六親之施始也濫耳其言濫漫于耳王公大人初見其術瞿然顧化其後不能行之是以騶子重于齊適梁恵王郊迎執賔主之禮適趙平原君側行襒席如燕昭王擁篲先驅請列弟子之座而受業築碣石宫身親徃師之作主運鄒子書有主運篇其㳺諸侯見尊禮如此史孟荀傳法言或言荘周有取乎曰少欲鄒衍有取乎曰自持至周罔君臣之義衍無知扵天地之間雖隣不覿也齊田稷相齊受下吏之金百鎰以遺其母母素賢曰子為相三年矣禄未嘗多若此也安徃得此對曰受之下吏母曰吾聞修身潔行不為茍得竭情盡實不行詐偽非義之事不計于心非禮之利不入扵家今君設官以待子厚禄以奉子夫為人臣不忠是為人子不孝不孝之子非吾子也不義之財非吾有也田稷子大慚出而反其金自歸罪于宣王請就誅宣王聞之大賞其母之義遂舍稷子之罪復其相位而以金賜母列女傳列女傳田稷子相齊受下吏之金百鎰以遺其母其母曰子為相三年矣禄未嘗多若此也豈修士大夫之費哉安所得此對曰誠受之扵下其母曰吾聞士修身潔行不為茍得竭情盡實不行詐偽非義之事不計于心非理之利不入扵家言行若一情貌相副今君設官以待子厚禄以奉子盡力竭能務在效忠廉潔公正故遂而無患今子反是逺忠矣夫為人臣不忠是為人子不孝也田稷子慙而出反其金自歸罪于宣王請就誅焉宣王聞之大賞其母之義遂舍田稷子之罪復其相位而以公金賜母漢書隂陽家鄒子四十九篇居稷下號談天衍鄒子終始五十六篇師古曰亦鄒衍所說漢書法家愼子四十二篇道家􅀈子十三篇名淵楚人老子弟子㨗子二篇田子二十五篇㳺稷下號天口駢隂陽家鄒奭子十二篇齊人號曰雕龍奭慎子四十二篇今五篇非全書也别見諸家引用齊宣王謂田過曰吾聞儒者親喪三年君與父孰重過對曰殆不如父重王忿然曰曷為士去親而事君對曰非君之土地無以處吾親非君之禄無以養吾親非君之爵無以尊顯吾親受之扵君致之扵親凡事君以為親也宣王悒然無以應之韓詩巻七文又說苑修吕氏春秋能意見齊宣王宣王曰寡人聞子好直有之乎對曰意惡能直意聞好直之士家不處亂國身不見汚君身今得見王而家宅乎齊意惡能直宣王怒曰野士也将罪之能意曰臣少而好事長而行之王胡不能與野士乎将以彰其所好邪王乃舍之齊宣王謂尹文曰人君之事何如尹文對曰人君之事無為而能容下夫事寡易從法省易因故民不以政獲罪也大道容衆大徳容下聖人寡為而天下理矣書曰睿作聖詩人曰岐有夷之行子孫其保之宣王曰善説苑君道尹文子見齊宣王宣王嘆國寡賢尹文子曰使國悉賢孰處王下又使國悉不肖孰理王朝王曰賢與不肖皆無可乎文子曰不然有賢有不肖故王尊扵上臣卑扵下賢賢退不肖所以有上下也尹文子齊宣王為太室大蓋百畆堂上三百户以齊國之大具之三年而未能成羣臣莫敢諫春居春居一作香居下同問扵宣王曰楚王釋先生之禮樂而為淫樂敢問楚國為有主乎王曰為無主賢臣以千數而莫敢諫敢問楚國為有臣乎王曰為無臣居曰今王為太室以齊國之大具之三年而弗能成羣臣莫敢諫敢問王為有臣乎王曰為無臣春居曰臣請辟矣趨而出王曰春子春子反何諫寡人之晚也寡人請今止之遽召掌書曰書之寡人不肖而好為太室春子止寡人也吕覽驕恣六又新序卷齊宣王問弋于唐易子曰弋者奚貴唐易子曰在于謹廩廩與同王曰何謂謹廩對曰鳥以數十目視人人以二目視鳥奈何不謹廩也王曰然則為天下何以異此廩今人主以二目視一國一國以萬目視人主将何以自為廩乎對曰鄭長者有言曰夫虚静無為而無見也其可以為此廩乎一曰田子方問唐易鞠曰弋者何慎對曰鳥以數百目視子子以二目御之子謹周于廩田子方曰善子加之弋我加之國鄭長者聞之曰田子方知欲為廩而未得所以為廩夫虚無無見者廩也右韓子外儲齊宣王問匡倩曰儒者博乎曰不也王曰何也匡倩對曰博貴梟勝者必殺梟殺梟者是殺所貴也儒者以為害義故不博也又問曰儒者弋乎曰不也弋者從下害上者也是傷君也儒者以為害義故不弋又謂儒者鼓瑟乎曰不也夫瑟以小絃為大聲以大絃為小聲是大小易序貴賤易位儒者以為害義故不鼓宣王曰善韓子外儲左齊宣王出獵于社山社山父老十三人相與勞王王曰父老苦矣謂左右賜父老田不租父老皆拜閭丘先生不拜王曰父老以為少耶謂左右賜父老無徭役父老皆拜閭丘先生又不拜王曰拜者皆去不拜者前曰寡人今日來觀父老幸而勞之故賜父老田不租父老皆拜先生獨不拜寡人自以為少故賜父老無徭役父老皆拜先生又獨不拜先生得無有過乎閭丘先生對曰惟聞大王來逰所以為勞大王望得夀于大王望得富于大王望得貴于大王王曰天殺生有時非寡人所得與也無以夀先生倉廩雖實以備菑害無以富先生大官無缺小官卑賤無以貴先生閭丘先生對曰此非人臣所敢望也願大王選良富家子有修行者以為吏平其法度如此臣少可以得夀焉春秋冬夏振之以時無煩擾百姓如是臣可少得以富焉願大王出令令少者敬長長者敬老如是臣可少得以貴焉今大王幸賜臣田不租然則倉廩将虚也賜臣無役徭然則官府無使焉此故非人臣之所敢望也齊王曰善願請先生為相說苑善說齊有閭丘卭年十八道遮宣王曰家貧親老願得小仕宣王曰子年尚稚未可也閭丘卭對曰不然昔顓頊行年十二而治天下秦項槖七嵗為聖人師由此觀之卭不肖耳年不稚矣宣王曰未有咫角驂駒而能服重致逺者也由此觀之夫士亦華髮墮顚而後可用耳閭丘卭曰不然夫尺有所短寸有所長驊騮緑驥天下之俊馬也使之與貍鼬試于釜竈之間其疾未必能過貍鼬也黄鵠白鶴一舉千里使之與燕服翼試之堂廡之下廬室之間其便未必能過燕服翼也辟閭巨闕天下之利器也擊石不缺刺石不銼使之與管槀决目出眯其便未必能過管槀也由此觀之華髮墮顚與卭何以異哉宣王曰善子有善言何見寡人之晩也卭對曰夫雞豚讙嗷即奪鐘鼓之音雲霞充咽則奪日月之明䜛人在側是以見晩也詩曰聽言則對譖言則退庸得進乎宣王拊軾曰寡人有過遂載與之俱歸而用焉新序卷五齊宣王時處士牧犢子年七十無妻出薪于野見雉雌雄相隨而心悲乃仰天嘆曰聖王在上恩及草木鳥獸而我獨不獲援琴而歌作雉朝飛以自傷樂府解題琴操雉朝飛者齊宣王時處士牧犢子所作也年七十無妻出薪于野見雉雌雄相隨而心悲乃仰天歎曰聖王在上恩及草木鳥獸而我獨以不獲援琴而歌以自傷曰雉朝飛兮鳴相和雌雄羣遊扵山阿我獨何命兮未有家時将暮兮可奈何嗟嗟暮兮可奈何古今注作犢沐子齊宣王時有人鬭死扵道者被一創吏訊之二子兄弟立其旁兄曰我殺之弟曰非兄也我殺之朞年推不决召其母問所欲殺活母泣對曰殺少者吏曰少子人之所愛今欲殺之何也母曰少者妾之子長者前妻之子其父疾且死之時囑妾曰善養視之妾曰諾今既受人之託豈可忘哉殺兄活弟是以私愛廢公義也背言忘信是欺死者也吏言扵王王美其義皆赦之號曰義母列女傳齊宣王好射説人之謂己能用彊弓也其嘗所用不過三石以示左右左右皆試引之中闗而止皆曰此不下九石非王其孰能用宣王悅之是宣王之情所用不過三石而終身自以為用九石豈不悲哉吕覽壅塞又尹文子齊宣王使人吹竽必三百人南郭處士請為王吹竽宣王說之廩食以數百人宣王死湣王立好一一聽之而處士逃韓子内儲上匡章謂惠子曰公之學去尊今又王齊王何其倒也去尊棄尊位也今王事齊王居其尊位謂恵子言行何其相違背也恵子曰今有人扵此欲必擊其愛子之頭石可以代之舍愛子頭而擊石故曰石可以代之匡章曰公取之代乎其不與施曰施恵子名取代之子頭所重也石所輕也擊其所輕以免其所重豈不可哉匡章曰齊王之所以用兵而不休攻擊人而不止者其故何也恵子曰大者可以王其次可以霸也今可以王齊王而夀黔首之命免民之死是以石代愛子頭也何為不為民寒則欲火暑則欲水燥則欲濕濕則欲燥寒暑燥濕相反其扵利民一也利民豈一道哉當其時而已矣吕覽愛類有婦人鐘離春極醜無雙齊無鹽邑地志今山東東平縣有無鹽城女其為人也臼頭深目長肚大節昻鼻結喉肥項少髮折腰出胷皮膚若漆行年三十無所容入衒嫁不售流棄莫執扵是乃拂拭短褐自詣宣王願一見謂謁者曰妾齊之不售女也聞君王之聖徳願備後宫之掃除頓首司馬門外唯王幸許之謁者以聞宣王方置酒扵漸臺左右聞之莫不掩口而大笑曰此天下强顔女子也扵是宣王乃召而見之謂曰昔先王為寡人取妃匹皆已備有列位矣寡人今日聽鄭衛之聲嘔吟感傷揚激楚之遺風今女不容鄉里布衣而欲干萬乗之主亦有竒能乎無鹽女對曰無有也竊慕大王之美義耳王曰雖然何喜良久曰竊嘗喜隱王曰隱固寡人之所願也試一行之言未卒怱然不見宣王大驚立發隱書而讀之退而惟之又不能得明日復更召而問之又不以隱對但揚目銜齒舉手拊肘曰殆哉殆哉如此者四宣王曰願遂聞命無鹽女對曰今大王之君國也西有衡秦之患南有强楚之讐外有三國之難内聚姦臣衆人不附春秋四十壮男不立不務衆子而務衆婦尊所好而忽所恃一旦山陵崩弛社稷不定此一殆也漸臺五重黄金白玉琅玕龍疏翡翠珠璣莫落連飾萬民罷極此二殆也賢者伏匿扵山林諂䛕强于左右邪偽立扵本朝諫者不得通入此三殆也酒漿流湎以夜續朝女樂俳優從横大笑外不修諸侯之禮内不秉國家之治此四殆也故曰殆哉殆哉扵是宣王掩然無聲意入黄泉忽然而昻喟然而嘆曰痛乎無鹽君之言吾今乃一聞寡人之殆不幾全于是立停漸臺罷女樂退諂䛕去雕琢選兵甲實府庫四闢公門招進直言延及側陋擇吉日立太子進慈母顯隱女拜無鹽君為王后而國大安新序卷二王列女傳鍾離春齊無鹽邑之女宣之夫人也云云與新序略同人有毁蘇秦者曰左右賣國反覆之臣也将作亂蘇秦恐得罪歸從齊歸而燕王不復官也蘇秦見燕王曰語詳國策燕王曰先生復就故官益厚遇之易王母文侯夫人也與蘓秦私通燕王知之而事之加厚蘇秦恐誅乃說燕王曰臣居燕不能使燕重而在齊則燕必重燕王曰唯先生之所為扵是蘇秦乃陽為得罪于燕而亡走齊齊宣王以為客卿燕易王十年史蘓秦傳十九年宣王卒子湣王地立史田齊世家春秋戰國異辭巻三十九
