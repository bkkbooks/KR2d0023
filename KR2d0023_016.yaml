body:
  text: 春秋戰國異辭卷十四右春坊右諭德陳厚耀撰齊史齊太公世家太公望吕尚者東海上人其先嘗為四嶽佐禹平水土有功虞夏之際封于吕吕在南陽宛縣西或封于申姓薑氏夏商之時申吕子孫或為庶人尚其後苗裔也從其封姓故曰吕尚窮困年老以漁釣干周西伯西伯將出獵卜之曰非龍非彲非虎非羆所獲霸王之輔果遇吕尚于渭之陽與語大悅曰自吾先君太公曰當有聖人適周周以興子真是耶吾太公望子久矣故號之曰太公望載與俱歸立為師與之隂謀修德以傾商政其事多兵權與竒計故後世之言兵皆宗太公為本謀天下三分其二歸周者太公之謀居多文王崩武王即位修文王業將伐紂卜兆不吉風雨暴至羣公盡懼唯太公強之勸武王十一年正月甲子誓於牧野紂師敗遂斬紂遷九鼎修周政與天下更始師尚父謀居多於是封師尚父于齊營丘太公至國修政因其俗簡其禮通商工之業便魚鹽之利而人民多歸齊齊為大國及周成王時使召康王命太公曰東至海西至河南至穆陵北至無棣五侯九伯實得征之齊由此得專征伐為大國蓋太公之卒百有餘年子丁公吕伋立丁公卒子乙公得立乙公卒子癸公慈母立癸公卒子哀公不辰立哀公時紀侯譛之周周烹哀公而立其弟靜是為胡公胡公徙都薄姑當周夷王之時哀公之同母少弟山怨胡公乃與其黨襲殺胡公而自立是為獻公獻公元年盡逐胡公子因徙薄姑都臨淄九年獻公卒子武公壽立武公二十四年周宣王初立二十六年武公卒子厲公無忌立胡公之子復入齊攻殺厲公胡公子亦戰死齊人乃立厲公子赤為君是為文公而誅殺厲公者七十人文公十二年卒子成公脫立成公九年卒子莊公購立莊公二十四年周東徙洛六十四年莊公卒子僖公祿甫立僖公僖公生公子諸兒公子糾糾同糾公子小白使鮑叔傅小白鮑叔辭稱疾不出管仲與召忽往見之曰何故不出鮑叔曰先人有言曰知子莫若父知臣莫若君今君知臣不肖也是以使賤臣傅小白賤臣知棄矣召忽曰子固辭無出吾權任子以死亡必免子鮑叔曰子如是何不免之有乎管仲曰不可持社稷宗廟者不讓事不廣間將有國者未可知也子其出乎召忽曰不可吾三人者之於齊國也辟之鼎之有足也去一焉則必不立矣吾觀小白必不能為後管仲曰不然也夫國人憎糾之母以及糾之身而憐小白之無母也諸兒長而賤事未可知也夫所以定齊國者非此二公子將無已也小白之為人無小智惕而有大慮非夷吾莫容小白天不幸降禍于齊糾雖得立事將不濟非子定社稷其將誰也召忽曰百嵗之後吾君卜世犯吾君命而廢吾所立奪吾糾也雖得天下吾不生也况與我齊國之政也受君命而不改奉所立而必濟是吾義也管仲曰夷吾之為君臣也將承君命奉社稷以持宗廟豈死一糾哉夷吾之所死者社稷破宗廟滅祭犯絶則夷吾死之非此三者則夷吾生夷吾生則齊利夷吾死則齊不利鮑叔曰然則奈何管仲曰子出奉令則可鮑叔許諾乃出遂傅小白朱長春曰管召二人語應是小白既立請魯殺糾之時忽于此言奪糾死糾何居又與鮑叔辭傅不相當記者代為之辭又錯為序也鮑叔謂管仲曰何行管仲曰為人臣者不盡力於君則不親信不親信則言不聽言不聽則社稷不定故盡事者無二心鮑叔許諾管子大匡吕覽不廣鮑叔管仲召忽三人相善欲相與定齊國以公子糾為必立召忽曰吾三人者於齊國也譬如鼎之有足去一焉則不成且小白則必不立矣不若三人佐公子糾也管仲曰不可夫國人惡公子糾之母以及公子糾公子小白無母而國人憐之事未可知不若令一人事公子小白夫有齊國必此二公子也二公子僖公之子襄公之弟故令鮑叔傅公子小白管子召忽居公子糾所僖公九年魯隱公初立十九年魯桓公弒其兄隱公而自立為君二十五年北戎伐齊鄭使太子忽來救齊齊欲妻之忽曰鄭小齊大非我敵遂辭之三十二年僖公同母弟夷仲年死其子曰公孫無知僖公愛之令其秩服奉養比太子三十三年僖公卒太子諸兒立是為襄公史齊世家襄公襄公元年始為太子時嘗與無知鬭及立絀無知秩服無知怨四年魯桓公與夫人如齊齊襄公故嘗私通魯夫人魯夫人者襄公女弟也自僖公時嫁為魯桓公婦及桓公來而襄公復通焉魯桓公知之怒夫人夫人以告齊襄公齊襄公與魯君飲醉之使力士彭生抱上魯君車因拉殺魯桓公桓公下車則死矣魯人以為讓而齊襄公殺彭生以謝魯八年伐紀紀遷去其邑齊襄公荒淫怠於國政陳賢妃夙夜警戒欲令君早起視朝乃作雞鳴之詩以誡之其詩曰雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲餘詳毛詩列女傳襄公無禮義而求大功不修德而求諸侯志大心勞故作甫田之詩以刺之詩序於詩傳詩説皆云景公急圖霸大夫諷之襄公好田大夫諷之賦盧詩傳序詩説略同詩作盧令詩序盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉襄公好田獵襄公或作哀公從禽無厭國人化之遂成風俗習于田獵謂之賢間於馳逐謂之好故作還以刺荒也詩序賦詩説云齊俗好田君子刺之營營即還也詩傳亦同襄公伐衛薑氏會之于師齊人刺之賦載驅詩傳詩説齊襄納衛朔抗王人魯人從之文薑歸齊以犒師齊人刺之詩序載驅刺襄公也無禮義而盛其車服疾驅于通道大都與文薑淫播其惡於萬民焉漢書云襄公淫亂姑姊妹不嫁于是令國中長女不得嫁名曰巫兒為家主祠然則不獨文薑矣襄公久留文薑于齊魯桓公不能制齊人刺之賦南山詩説同詩傳略詩序南山刺襄公也鳥獸之行淫乎其妹大夫作詩而去之魯莊公朝于齊遂及齊大夫狩于禚齊人刺之賦猗嗟詩説同詩傳亦詩序猗嗟刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉管仲鮑叔相謂曰君亂甚矣必失國齊之諸公子可輔者非公子糾則小白也與子人事一人焉先達者相收管仲乃從公子糾鮑叔從小白國人果殺君韓子説林下初僖公之母弟夷仲年生公孫無知有寵於僖公衣服禮秩如適嫡同僖公卒以諸兒長得為君是為襄公襄公立後絀無知無知怒公令連稱管至父戍葵丘曰瓜時而往及瓜時而來期戍公問不至請代不許故二人因公孫無知以作亂魯桓公夫人文薑齊女也公將如齊與夫人皆行申俞諫曰俞左傳作繻不可女有家男有室無相瀆也謂之有禮公不聽遂以文薑會齊侯於濼文薑通于齊侯桓公聞責文薑文薑告齊侯齊侯怒享公使公子彭生乘魯侯脅之公薨於車豎曼曰賢者死忠以振疑百姓寓焉智者究理而長慮身得免焉今彭生二于君無盡言而諛行以戲我君使我君失親戚之禮又力成吾君之禍以搆二國之怨彭生其得免乎禍理屬焉夫君以怒遂禍不畏惡親聞容昏生無醜也豈及彭生而能止之哉魯若有誅必以彭生為説二月魯人告齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸死請以彭生除之齊人為殺彭生以謝于魯五月襄公田于貝丘見豕彘從者曰公子彭生也公怒曰彭生安敢見射之豕人立而啼公懼墜於車下傷足亡屨反誅屨於徒人費不得也鞭之見血費走而出遇賊于門脅而束之費袒而示之背賊信之使費先入伏公而出鬭死于門中石之紛如死于階下孟陽代君寢于牀賊殺之曰非君也不類見公之足於戶下遂殺公而立公孫無知鮑叔牙奉公子小白奔莒管夷吾召忽奉公子糾奔魯管子大匡增較左傳小有減十二年初襄公使連稱管至父戍葵丘瓜時而往及瓜而代往戍一嵗卒瓜時而公弗為發代或為請代公弗許故此二人怒因公孫無知謀作亂連稱有從妹在公宫無寵使之間襄公曰事成以女為無知夫人史記齊世家十二年冬十二月襄公遊姑棼遂獵沛丘見彘從者曰彭生公怒射之彘人立而啼公懼墜車傷足失屨反而鞭主屨者茀三百茀左作費茀出宫而公孫無知連稱管至父等聞公傷乃遂率其衆襲宫逢主屨茀茀曰且無入驚宫驚宫未易入也無知弗信茀示之創乃信之待宫外令茀先入茀入即匿襄公戶間良久無知等恐遂入宫茀反與宫中及公之幸臣攻無知等不勝皆死無知入宫求公不得或見人足於戶間發視乃襄公遂弒之而無知自立為君增左氏文詩傳齊風公子小白適莒齊人慕之賦丰詩説齊風襄公無道即位之四年公弟小白避之莒齊人慕之而作是詩詩序入鄭風云刺亂也婚姻之道缺陽倡而隂不和男行而女不隨春秋戰國異辭卷十四
