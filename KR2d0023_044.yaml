body:
  text: 春秋戰國異辭卷四十一右春坊右諭德陳厚耀撰田齊襄王襄王既立立太史氏女為王后是為君王后生子建太史敫曰女不取媒因自嫁非吾種也汙吾世終身不覩君王后君王后賢不以不覩故失人子之禮史田齊世家燕既盡降齊城唯獨莒即墨不下燕軍聞齊王在莒并兵攻之淖齒既殺湣王於莒因堅守距燕軍數年不下燕引兵東圍即墨即墨大夫出與戰敗死城中相與推田單田單者齊諸田疏屬也湣王時單為臨淄市掾不見知及燕使樂毅破齊湣王出奔已而保莒城田單走安平令其宗人盡斷其車軸末而傳鐵籠已而燕軍攻安平城壞齊人走爭塗以轊折車敗為燕所虜唯田單宗人以鐵籠故得脫東保即墨曰安平之戰田單宗人以鐵籠得全習兵立以為將軍以即墨距燕頃之燕昭王卒惠王立與樂毅有隙田單聞之乃縱反間於燕宣言曰齊王已死城之不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面而王齊齊人未附故且緩攻即墨以待其事齊人所懼惟恐他將之來即墨殘矣燕王以為然使騎劫代樂毅樂毅因歸趙燕人士卒忿而田單乃令城中人食必祭其先祖於庭飛鳥悉翔舞城中下食燕人怪之田單因宣言曰神來下教我乃令城中人曰當有神人為我師有一卒曰臣可以為師乎因反走田單乃起引還東向坐師事之卒曰臣欺君誠無能也田單曰子勿言也因師之每出約束必稱神師乃宣言曰吾惟懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊諸降者盡劓皆怒堅守惟恐見得單又縱反間曰吾懼燕人掘吾城外塜墓僇先人可為寒心燕軍盡掘壟墓燒死人即墨人從城上望見皆涕泣共欲出戰怒自十倍田單知士卒之可用乃身操版插與士卒分功妻妾編於行伍之間盡散飲食享士令甲卒皆伏使老弱女子乘城遣使約降於燕燕軍皆呼萬嵗田單又收民金得千鎰令即墨富豪遺燕將曰即墨即降願無虜掠吾族家妻妾令安堵燕將大喜許之燕軍由此益懈田單乃收城中得千餘牛為絳繒衣畫以五彩龍文束兵刃于其角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫耀燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走齊人遂殺其將騎劫燕軍擾亂奔走齊人追亡逐北所過城邑皆畔燕而歸田單兵日益多乘勝卒至河上而齊七十餘城皆復為齊乃迎襄王於莒襄王在莒五年入臨淄而聽政襄王封田單號曰安平君史田單傳田單為齊上將軍興師十萬將以攻翟往見魯仲連子仲連子曰將軍之攻翟必不能下矣田將軍曰單以五里之城十里之郭復齊之國何為攻翟不能下去上車不與言決攻翟三月而不能下齊嬰兒謡之曰大冠如箕長劍柱頥攻翟不能下壘于梧丘于是田將軍恐駭往見仲連子曰先生何以知單之攻翟不能下也仲連子曰夫將軍在即墨之時坐則織蕢立則杖臿為士卒倡曰宗廟亡矣魂魄喪矣歸何黨矣故將有死之心士卒無生之氣今將軍東有掖邑之封西有淄上之寶金銀黃帶馳騁乎淄澠之間是以樂生而惡死也田將軍明日結髮徑立矢石之所乃引枹而鼓之翟人下之説苑指武齊襄王立而孟嘗君中立為諸侯無所屬齊襄王新立畏孟嘗君與連和復親薛公文卒諡為孟嘗君諸子爭立而齊魏共滅薛孟嘗絶嗣無後史孟嘗君傳荀卿趙人年五十始來遊學於齊騶衍之術迂大而閎辨奭也文具難施淳于髠久與處時有得善言故齊人曰談天衍雕龍奭炙轂過髠一本談天衍上有天口駢三字田駢之屬皆已死齊襄王時而荀卿最為老師齊尚修列大夫之缺而荀卿三為祭酒焉史荀卿傳魯仲連者齊人也好竒偉俶儻之策而不肻仕官任職好持髙節遊於趙趙孝成王時秦使白起破長平軍東圍邯鄲魏王使客將軍新垣衍間入邯鄲新國策作辛欲尊秦王為帝仲連聞之乃見平原君曰語詳國策新垣衍不敢復言帝秦史魯連傳齊狐逐者即墨之女也狀甚醜三逐于鄉五逐于里齊相婦亡造襄王之門而求見王輟食而起左右曰王何貴此女王曰子不識也夫牛鳴而馬不應者異類故也其人必有異者遂見與之語女曰夫屋堅不堅在乎柱國家安不安在乎相王曰吾國相若何對曰王之國相比目之魚也外比內比然後能成其事王曰何謂對曰明其左右賢其妻子是外比內比也王曰善遂尊其相以逐女妻之居三月四方之士多歸于齊而國以大治列女傳十四年秦擊我剛夀史田齊世家十九年襄王卒子建立史田齊世家王建王建立六年秦攻趙齊楚救之秦計曰齊楚救趙親則退兵不親遂攻之趙無食請粟於齊齊不聽周子曰不如聽之以退秦兵不聽則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚扞蔽也猶齒之有脣也脣亡則齒寒今日亡趙明日患及齊楚且救趙之務宜若奉漏甕沃焦釡也夫救趙髙義也却秦兵顯名也義救亡國威却強秦之兵不務為此而務愛粟為國計者過矣齊王勿聽秦破趙於長平四十餘萬遂圍邯鄲田齊世家十六年秦滅周君王后卒古今注齊王后忿而死變為蟬登庭樹嘒唳而鳴故世名蟬曰齊女也二十八年王入朝秦秦王政置酒咸陽三十八年燕使荆軻刺秦王秦王覺殺軻明年秦破燕燕王走遼東明年秦滅魏秦兵次於厯下四十二年秦滅楚明年虜代王嘉滅燕王喜王建四十四年秦兵擊齊齊王聽相后勝計不戰以兵降秦秦虜王建遷之共遂滅齊為郡始君王后賢事秦謹與諸侯信齊亦東邊海上秦日夜攻三晉燕楚五國各自救以故王建立四十餘年不受兵君王后死后勝相齊多受秦間金多使賔客入秦秦又多豫金客皆為反間勸王去從朝秦不修攻戰之偹不助五國攻秦秦以故得滅五國五國已亡秦兵卒入臨淄民莫敢格者王建遂降遷於共故齊人怨王建不早與諸侯合從攻秦聽姦臣賔客以亡其國歌之曰松耶柏耶住建共者客耶疾建用客之不詳也以上史田齊世家雜録三國伐齊圍平陸三國韓魏趙也括子以報於牛子曰三國之地不接於我踰鄰國而圍平陸利不足貪也然則求名於我也請以齊侯往牛子以為善括子出無害子入三子皆齊臣牛子以括子言告無害子無害子曰異乎臣之所聞牛子曰國危而不安患結而不解何謂貴智無害子曰臣聞之有裂壤土以安社稷者有殺身破家以存其國者不聞出其君以為封疆者牛子不聽無害子之言而用括子之計三國之兵罷而平陸之地存自此之後括子日以疏無害子日以進淮南子人間宗衛相齊遇逐罷歸舍召門尉田饒等二十有七人而問焉曰士大夫誰能與我赴諸侯者乎田饒等皆伏而不對宗衛曰何士大夫之易得而難用也饒對曰非士大夫之難用也是君不能用也宗衛曰不能用士大夫何若田饒對曰厨中有臭肉則門下無死士今夫三升之稷不足於士而君雁鶩有餘粟紈素綺繡靡麗堂楯從風而弊而士曽不得以緣衣果園梨栗後宫婦人托以相擲而士曽不得一嘗且夫財者君之所輕也死者士之所重也君不能用所輕之財而欲使士致所重之死豈不難乎哉于是宗衛面有慚色逡巡避席而謝曰此衛之過也説苑尊賢相新序作燕宋燕相齊見逐罷歸之舍召門尉陳饒等二十六人曰諸大夫有能與我赴諸侯者乎陳饒等皆伏而不對宋燕曰悲乎哉何士大夫易得而難用也饒曰君勿能用也則有不平之心是失之已而責諸人也宋燕曰夫失諸己而責諸人者何陳饒曰三斗之稷不足於士而君雁鶩有餘粟是君之一過也果園梨栗後宫婦人以相提擲士曽不得一嘗是君之二過也綾紈綺縠靡麗於堂從風而弊士曽不得以為緣是君之三過也且夫財者君之所輕也死者士之所重也君不能行君之所輕而欲使士致其所重猶鉛刀畜之而干將用之不亦難乎宋燕面有慚色逡巡避席曰燕之過也韓詩卷七齊壯子請攻越問於和子和子曰先君有遺令曰無攻越越猛虎也莊子曰雖猛虎也而今已死矣和子曰以告梟子梟子齊相梟子曰已死矣以為生為民所説故猶以為生凡舉事必先審民心然後可舉吕覽順民成歡謂齊王曰王太仁太不忍人王曰太仁太不忍人非善名耶對曰此人臣之善也非人主之所行也夫人臣必仁而後可與謀不忍人而後可近也不仁則不可與謀忍人則不可近也王曰然則寡人安所太仁安不忍人對曰王太忍於薛公而太不忍於諸田太仁薛公則大臣無重太不忍諸田則父兄犯法大臣無重則兵弱於外父兄犯法則政亂於內此亡國之本也韓子內儲上齊中大夫有夷射者御飲於王醉甚而出倚於郎門門者刖跪請曰足下無意賜之餘瀝乎夷射曰叱去刑餘之人何事乃敢乞飲長者刖跪走退及夷射去刖跪因捐水郎門霤下類溺者之狀明日王出而訶之曰誰溺於是刖跪對曰臣不見也雖然昨日中大夫夷射立於此王因誅夷射而殺之韓子內儲下造父為齊王駙駕以渴服馬百日而服成請效駕齊王王曰效駕於圃中造父驅車入圃渴馬見圃池去車走池駕敗造父不能禁韓子外儲右客有為齊王畫者齊王問曰畫孰最難者曰犬馬難孰易者曰鬼魅最易犬馬人所知也旦暮罄於前不可類之故難鬼神無形者不罄於前故易之也韓子外儲左齊有居士田仲者宋人屈榖見之曰榖聞先生之義不恃仰人而食今榖有樹瓠之道堅如石厚而無竅獻之仲曰夫瓠所貴者謂其可以盛也今厚而無竅則不可剖以盛物而任重如堅石則不可以剖而以斟吾無以瓠為也曰然榖將以欲棄之今先生不恃仰人而食亦無益人之國亦堅瓠之類也堅瓠喻務光卞隨鮑焦墨翟之類韓子外儲左齊王厚送女欲妻屠牛吐牛一作門屠牛吐辭以疾其友曰子終死腥臭之肆而已乎何為辭之吐應之曰其女醜其友曰子何以知之吐曰吾以屠知之其友曰何謂也吐曰吾肉善如量而去若少耳吾肉不善雖以他附益之尚猶不售今厚送子子醜故耳友後見之果醜傳曰目如劈杏齒如編貝韓詩卷九越甲至齊雍門子狄請死之齊王曰鼓鐸之聲未聞矢石未交長兵未接子何務死之為人臣之禮邪雍門子狄對曰臣聞之昔者王田于囿左轂鳴車右請死之王曰子為何死車右對曰為其鳴吾君也王曰左轂鳴者工師之罪也子何事之有焉車右曰臣不見工師之乘而見其鳴吾君也遂刎頸而死誠有之乎齊王曰有之雍門子狄曰今越甲至其鳴吾君也豈左轂之下哉車右可以死左轂而臣獨不可以死越甲也遂刎頸而死是日越人引甲而退七十里曰齊王有臣鈞如雍門子狄擬使越社稷不血食遂引甲而歸齊王葬雍門子狄以上卿之禮説苑立節齊將軍田瞶出將張生郊送曰昔者堯讓許由以天下洗耳而不受將軍知之乎曰唯然知之伯夷叔齊辭諸侯之位而不為將軍知之乎曰唯然知之於陵仲子辭三公之位而傭為人灌園將軍知之乎曰唯然知之智過去君弟變姓名免為庶人將軍知之乎曰唯然知之孫叔敖三去相而不悔將軍知之乎曰唯然知之此五大夫者名辭之而實羞之今將軍方吞一國之權提鼓擁旗被堅執鋭旋回十萬之師擅斧鉞之誅慎毋以士之所羞者驕士田瞶曰今日諸君皆為瞶祖道具酒脯而先生獨教之以聖人之大道謹聞命説苑尊賢齊王起九重之臺募國中能畫者賜之錢有敬君居常飢寒其妻妙色敬君工畫貪賜畫臺去家日久思憶其妻畫像向之而笑傍人見以白王王召問之對曰有妻如此去家日久心常念之竊畫其像以慰離心不悟上聞説苑子竒年十八齊君使之治阿既行矣悔之使使追之未到阿及之還之已到弗還也使者及之而不還君問其故對曰臣見其所共載者白首也夫以老者之智以幼者決之必能治阿矣是以不還既而魏起兵擊阿邑人父率子兄率弟以私兵戰立破魏師新序齊有貧士命其狗為富命其子為樂方將祭入於空叱之曰富出祝曰不祥家果有禍長子死哭之曰樂乎而不自悲也尸子東海有勇士災川欣過神泉飲馬其僕曰飲馬此者馬必致死飲馬果沉欣拔劍而入三日三夜殺二蛟而出雷神隨而擊之眇其左目韓非子齊女徐吾者東海上貧婦人其鄰婦李吾之屬合燭夜績徐最貧而燭不屬李吾曰徐吾燭數不屬請無與夜績徐吾曰妾以貧故起常先去常後灑掃陳席以待來者坐常處下為貧故也今一室之中益一人燭不為益明去一人燭不為益暗何愛東壁餘光莫之能應遂復與夜績列女傳説苑楚使使聘於齊齊王饗之梧宫使者曰大哉梧乎王曰江漢之魚吞舟大國之樹必巨使何怪焉使者曰昔燕攻齊遵雒路渡濟橋焚雍門擊其左而虛其右王歜絶頸而死於杜山公孫差格死於龍門飲馬乎淄澠定獲乎琅琊王與太后奔於莒逃於城陽之間當此之時則梧之大何如乎王曰陳先生對之陳子曰臣不如刁勃王曰刁先生應之刁勃曰使者問梧之年邪昔者荆平王為無道加諸申氏殺子胥父與其兄子胥被髮乞食於吳闔閭以為將相三年將吳兵復讎乎楚戰勝乎柏舉級頭百萬囊瓦奔鄭王保於隨引師入郢軍行乎郢之都子胥親射宫門掘平王塜笞其墳數以其罪曰吾先人無罪而子殺之士卒人加百焉然後止當若此時梧可以為其柎矣春秋戰國異辭卷四十一
