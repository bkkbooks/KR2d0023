body:
  text: 春秋戰國異辭卷五右春坊右諭徳陳厚耀撰魯哀公季桓子病輦而見魯城歎曰昔此國幾興矣以我獲罪于孔子故不興也顧謂康子曰我即死若必相魯相魯必召仲尼後數日桓子卒魯哀公三年康子嗣位欲召仲尼公之魚曰昔吾先君用之不終爲諸侯笑今又用之不能終是再爲諸侯笑康子曰誰召而可曰必召冉求于是康子使召冉求史孔子世家衛靈公適魯遭季桓子之喪哀三年衛君請弔哀公辭不得命公為主客入弔康子立于門右北面公揖讓升自東階西鄉客升自西階弔公拜興哭康子拜稽顙于位有司弗辨也曽子問禮記朝服之以縞也自季康子始也哀公使人弔蕢尚遇諸道辟于路畫宫而受弔焉曽子曰蕢尚不如把梁之妻之知禮也檀弓下季孫之母死哀公弔焉曽子與子貢弔焉閽人爲君在弗納也曽子與子貢入于其廏而脩容焉子貢先入閽人曰鄉者已告矣曽子後入閽人辟音避之涉内霤卿大夫皆辟位公降一等而揖之君子曰盡飾之道斯其行者逺矣檀弓下季康子之母死陳䙝衣敬姜曰婦人不飾不敢見舅姑將有四方之賓來䙝衣何爲陳于斯命徹之檀弓下季康子之母死公輸若若其名也方小歛般請以機封封音窆下棺于槨以機闗轉動之不用碑與繂將從之公肩假曰不可夫魯有初故事也公室視豐碑三家視桓楹般爾以人之母嘗巧則豈不得以其毋以嘗巧者乎則病者乎弗果從檀弓下孺子􅀈青吞哀公少子之喪哀公欲設撥門于有若有若曰其可也君之三臣猶設之顔栁曰天子龍輴而椁幬諸侯輴而設幬爲榆沈以水浸榆白皮之汁播地取其引車滑而不滯故設撥三臣者廢輴而設撥竊禮之不中者也而君何學焉檀弓下魯公甫文伯死其母不哭季孫氏聞之曰公甫文伯之母貞女也子死不哭必有方矣使人問焉對曰昔是子也吾使之事仲尼仲尼去魯送之不出魯郊贈之不與家珍病不見士之視者死不見士之流淚者死之日宫女縗絰而從者十人此不足於士而有餘於婦人也吾是以不哭也韓詩卷一穆伯之喪敬姜晝哭文伯之喪晝夜哭穆伯敬姜之夫文伯敬姜之子孔子曰知禮文伯之喪敬姜據其牀而不哭曰昔者吾有斯子也吾將以爲賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠于禮矣夫檀弓下列女傳敬姜者公父穆伯之妻文伯之母也博達知禮穆伯先死文伯出學而還歸敬姜側目而盼之見其友上堂從後降階而卻行奉劔而正履若事父兄敬姜召而數之曰昔者武王罷朝而結絲􅙋絶左右顧無可使結之者俯而自申之故能成王道桓公坐友三人諫臣五人日舉過者三十人故能成霸業周公一食而三吐哺一沐而三握髪所執贄而見於窮閭隘巷者七十餘人故能存周室彼二聖一賢者伯王之君也而下人如此其所與遊皆過已者也是以日益而不自知也今以子年之少而位之卑所與遊者皆爲服役子之不益明矣文伯乃謝罪擇嚴師而事之所與游皆黄髦兒齒也文伯引衽攘帣而親饋之敬姜曰子成人矣文伯相魯敬姜謂之曰吾語汝治國之要盡在經矣夫幅者所以正曲枉也不可不彊故幅可以爲將畫者所以均不均服不服也故畫可以爲正物者所以治蕪與莫也故物可以爲都大夫持交而不失出入而不絶者捆也捆可以爲大行人也推而往引而來者綜也綜可以爲開内之闕主多少之數者均也均可以爲内史服重任行達道正直而固者軸也軸可以爲相舒而無窮者摘也摘可以爲三公文伯再拜受教孔叢子公父文伯死室人有從死者其母怒而不哭相室諫之其母曰孔子天下之賢人也不用於魯退而去是子素宗之而不能隨今死而内人從死者二人焉若此於長者薄於婦人厚也既而夫子聞之曰季氏之婦尚賢哉子路愀然對曰夫子亦好人之譽已乎夫子死而不哭是不慈也何善爾子曰怒其子之不能隨賢所以爲尚賢者吾何有焉其亦善此而已矣禮記帷殯非古也自敬姜之哭穆伯始也哀公七年呉王夫差彊伐齊至繒徴百牢于魯季康子使子貢説呉王及太宰嚭以禮詘之呉王曰我文身不足責禮乃止魯史世家八年呉為鄒伐魯至城下盟而去齊伐我取三邑十年伐齊南鄙十一年齊伐魯季氏用冉有有功思孔子孔子自衞歸魯以上史魯世家冉有爲季氏將與齊戰于郎克之哀公十一年季康子曰子之于軍旅學之乎性之乎冉求曰學之于孔子季康子曰孔子何如人哉對曰用之有名播之百姓質之鬼神而無憾求之至于此道雖累千社夫子不利也康子曰我欲召之可乎對曰欲召之則毋以小人固之則可矣而衞孔文子將攻太叔問䇿于仲尼仲尼辭不知退而命駕而行曰鳥能擇木木豈能擇鳥乎文子固止會季康子逐公華公林公賓以幣迎孔子孔子歸魯孔子之去魯凡十四歳而反乎魯史孔子世家禮記檀弓戰於郎公叔禺人遇負杖入保者息曰使之雖病也任之雖重也君子不能爲謀也士弗能死也不可我則既言矣與其鄰重汪踦往皆死焉魯人欲勿殤重汪踦問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎重當作童孔子在衞冉求言于季孫曰國有聖人而不能用欲以求治是猶却步而欲求及前人不可得已今孔子在衞衞將用之已有才而以資鄰國難以言智也請以重幣迎之季孫以告哀公公從之家語哀公以幣如衞迎夫子而卒不能用故夫子作丘陵之歌曰登彼丘陵峛崺其阪仁道在邇求之若逺遂迷不復自嬰屯蹇喟然廻慮題彼㤗山鬱確其高梁甫廻連枳棘充路陟之無縁將伐無柯患兹蔓延惟以永嘆涕霣潺湲孔叢子記問十四年齊田常弑其君簡公於徐州孔子請伐之哀公不聽十五年使子服景伯子貢爲介適齊齊歸我侵地田常初相欲親諸侯故也史魯世家魯終不能用孔子孔子亦不求仕孔子之時周室微而禮樂廢詩書缺乃追迹三代之禮序書傳上紀唐虞之際下至秦穆編次其事曰夏禮吾能言之把不足徵也殷禮吾能言之宋不足徴也足則吾能徵之矣觀夏殷所損益曰後雖百世可知也以一文一質周監二代郁郁乎文哉吾從周故書傳禮記自孔氏孔子語魯太師樂然後樂正雅頌各得其所古者詩三千餘篇及至孔子去其重取可施于禮義上采契后稷中述殷周之盛至幽厲之缺始于衽席故曰闗雎之亂以爲風始鹿鳴爲小雅始文王爲大雅始清廟爲頌始三百五篇孔子皆絃歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六藝孔子晚而喜易序彖繫象説卦文言讀易韋編三絶一本此下有鐵擿三折漆書三滅二語曰假我數年若是我于易則彬彬矣孔子以詩書禮樂教弟子盖三千焉身通六藝者七十有二人史孔子世家孔子曰吾道不行矣吾何以自見于後世哉乃因魯史記作春秋上至隠公下訖哀公十四年十二公據魯親周其辭文而指慱故吴楚之君自稱王而春秋貶之曰子踐土之會實召周天子而春秋諱之曰天王狩于河陽推此類以䋲當世則天下亂臣賊子懼焉筆則筆削則削子夏之徒不能贊一辭孔子曰後世知丘者以春秋罪丘者亦以春秋史孔子世家衛君朝于吴吴王囚之欲流之于海説者冠盖相望而弗能止魯君聞之撤鐘鼓之縣縞素而朝仲尼入見曰君胡爲有憂色魯君曰諸侯無親以諸侯爲親大夫無黨以大夫爲黨今衞君朝于吴王吴王囚之而欲流之於海孰衞君之仁義而遭此難也吾欲免之而不能奈何仲尼曰若欲免之則請使子貢行魯君召子貢授之將軍之印子貢曰貴無益于觧患在所由之道歛躬而行至于吴見太宰嚭太宰嚭甚悅之欲薦之于王子貢曰子不能行説于王奈何吾因子也太宰嚭曰子焉知嚭之不能也子貢曰衞君之來也衞國之半曰不若朝于晉其半曰不若朝于吴然衞君以爲吴可以歸骸骨也故束身以受命今子受衞君而囚之又欲流之于海是賞言朝于晉者而罰言朝于吴也且衞君之來也諸侯皆以爲蓍龜兆以卜朝吴之吉凶今朝于吴而不利則皆移心于晉矣欲成霸王之業不亦難乎太宰嚭入復之于王王出令于百官曰比十日而衛君之禮不具者死淮南子人間齊將伐魯魯使子貢説之齊人曰子言非不辯也吾所欲者土地也非斯言所謂也遂舉兵伐魯去門十里以爲界韓子五蠧齊攻魯子貢見哀公請求救于吴公曰奚先君寳之用子貢曰使吴責吾寳而與我師是不可恃也于是以楊斡麻䈥之弓六往子貢謂吴王曰齊爲無道欲使周公之後不血食且魯賦五百邾賦三百不識以此益齊吴之利與非與吴王懼乃興師救魯諸侯曰齊伐周公之後而吴救之遂朝于吴説苑奉使魯左傳哀七年邾請救於吴有賦邾賦語此恐舛誤吴越春秋初齊大夫陳成恒欲興兵伐魯魯君憂之孔子召門人謂曰諸侯有相伐者丘常恥之夫魯父母之國也丘墓在焉今齊將伐之子無意一出耶子路辭出孔子止之子張子石請行孔子弗許子貢辭出孔子遣之子貢北之齊見成恒曰夫魯者難伐之國而君伐之過矣成恒曰魯何難伐也子貢曰其城薄以卑其池狹以淺其君愚而不仁大臣無用士惡甲兵不可與戰君不若伐吴夫吴城厚而崇池廣而深甲堅士選器飽弩勁又使明大夫守之此易伐也陳恒忿然作色曰子之所難人之所易子之所易人之所難而以教恒何也子貢曰臣聞君三封而三不成者大臣有所不聽也今君又欲破魯以廣齊隳魯以自尊而君功不與焉是君上驕主心下恣羣臣而求以成大事難矣且夫上驕則犯臣驕則爭是君上與主有卻而下與大臣交爭如此則君立於齊危如累卵故曰不如伐吴且吴王剛猛而毅能行其令百姓習于戰守明於法禁齊遇爲擒必矣今君悉四境之中出大臣以環之人民外死大臣内空是君上無强敵之臣下無黔首之士孤主制齊者君也陳恒曰善雖然吾兵已在魯之城下矣吾去之吴大臣將有疑我之心爲之奈何子貢曰君按兵無伐請爲君南見吴王請之救魯而伐齊君因以兵迎之陳恒許諾子貢南見吴王謂吴王曰臣聞之王者不絶世而霸者無强敵千鈞之重加銖而移今萬乗之齊而私千乗之魯而與吴爭强臣竊爲君恐焉且夫救魯顯名也伐齊大利也義存亡魯害暴齊而威彊晉則王不疑也吴王曰雖然吾嘗與越戰棲之會稽入臣於吴不即誅之三年使歸夫越君賢主苦身勞力夜以接日内飾其政外事諸侯必將有報我之心子待我伐越而聽子子貢曰不可夫越之强不過于魯吴之强不過于齊王以伐越而不聽臣齊亦已私魯矣且畏小越而惡强齊不勇也見小利而忘大害不智也臣聞仁人不因居越絶因居作困厄以廣其徳智者不棄時以舉其功王者不絶世以立其義且夫畏越如此臣請東見越王使出師以從下吏吴王大悅子貢東見越王王聞之除道郊迎身御至舍問曰此僻狹之國蠻夷之民大夫何索然不辱乃至于此子貢曰弔君故來越王勾踐再拜稽首曰孤聞禍與福爲鄰今大夫之弔孤之福矣孤敢不問其説子貢曰臣今者見吴王告以救魯而伐齊其心畏越且夫無報人之志而使人疑之拙也有報人之意而使人知之殆也事未發而先聞之者危也三者舉事之大忌也越王再拜曰孤少失前人内不自量與吴人戰軍敗身辱上棲會稽下守海濵唯魚鼈是見矣今大夫辱弔而身見之又發玉聲以教孤孤賴天之賜也敢不承教子貢曰臣聞明主任人不失其能直士舉賢不容於世故臨財分利則使仁涉患犯難則使勇用智圖國則使賢正天下定諸侯則使聖兵强而不能行其威勢在上位而不能施其政令于下者其君幾乎難矣臣竊自擇可與成功而至王者惟臣幾乎今吴王有伐齊晉之志君無愛重器以喜其心無惡卑辭以盡其禮而伐齊齊必戰不勝君之福也彼戰而勝必以其兵臨晉騎士鋭兵弊乎齊重寳車騎羽毛盡乎晉則君制其餘矣越王再拜曰昔者吴王分其民之衆以殘吾國殺敗吾民鄙吾百姓夷吾宗廟國爲壚棘身爲魚鼈孤之怨吴深于骨髓而孤之事吴如子之畏父弟之敬兄此孤之死言也今大夫有賜故孤敢以報情一作疑請孤身不安重席口不甞厚味目不視羙色耳不聽雅音既已三年矣焦唇乾舌苦身勞力上事羣臣下養百姓願一與吴交戰于平原之野正身臂越絶作整襟交臂而奮吴越之士繼踵連死肝腦塗地者孤之願也思之三年不可得也今内量吾國不足以傷吴外事諸侯而不能也願空國棄羣臣變容貌易姓名執箕帚養牛馬以事之孤雖知要領不屬手足異處四支布陳爲鄉邑笑孤之意出焉今大夫有賜存亡國舉死人孤賴天賜敢不待令乎子貢曰夫吴王爲人貪功名而不知利害越王慥然避位子貢曰臣觀吴王數戰士卒不恩大臣内引䜛人益衆夫子胥爲人精誠中亷外明而知時不以身死隠君之過正言以忠君直行以爲國其身死而不聽太宰嚭爲人智而愚强而弱巧言利辭以内其身善爲詭詐以事其君知其前而不知其後順君之過以安其私是殘國傷君之侫臣也越王大悦子貢去越王送之金百鎰寳劔一良馬二子貢不受至吴謂吴王曰臣以下吏之言告於越王越王大恐曰昔者孤身不幸少失前人内不自量抵罪于吴軍敗身辱逋逃出走棲于會稽國爲墟莽身爲魚鼈賴大王之賜使得奉俎豆修祭祀死且不敢忘何謀之敢其志甚恐將使使者來謝于王子貢館五日越果使來曰東海役臣勾踐之使者臣種敢修下吏少聞于左右昔孤不幸少失前人内不自量抵罪上國軍敗身辱逋逃會稽賴王之賜得奉祭祀死且不忘今竊聞大王興大義誅强救弱困暴齊而撫周室故使賤臣奉前王所藏甲二十領屈盧之矛步光之劍以賀君吏若將逐大義弊邑雖小請悉四方之内士卒三千人以從下吏請躬被堅執鋭以前受矢石君臣死無所恨吴王大悦乃召子貢曰越使果來請出士卒三千其君從之與寡人伐齊可乎子貢曰不可夫空人之國悉人之衆又從其君不仁也受弊許其師辭其君即可吴王許諾子貢去晉見定公曰臣聞慮不預定不可以應卒兵不預辦不可以勝敵今吴齊將戰戰而不勝越亂之必矣戰而勝必以其兵臨晉君爲之奈何定公曰何以待之子貢曰休兵伏卒以待之晉君許之子貢返魯吴王果興九郡之兵以伐齊越絶書大同小異繹史子貢歴説一案本出䇿士附會之談史記信之而爲列傳家語又信之而益以孔子吴亡越霸之言夫越之滅吴孔子卒已八年矣斯之不實居然可知哀公問孔子曰寡人生乎深宫之中長於婦人之手未甞知哀也未甞知憂也未甞知勞也未甞知懼也未甞知危也孔子避席曰君之問乃聖君之問也丘小人也何足以言之哀公曰否吾子就席㣲吾子無所聞之矣孔子就席曰然君入廟門升自阼階仰見榱棟俯見几筵其器存其人亡君以此思哀則哀將安不至矣君昧爽而櫛冠平旦而聽朝一物不應亂之端也君以此思憂則憂將安不至矣君平旦而聽朝日昃而退諸侯之子孫必有在君之門廷者君以此思勞則勞將安在不至矣君出魯之四門以望魯之四郊亡國之墟列必有數矣君以此思懼則懼將安不至矣丘聞之君者舟也庻人者水也水則載舟水則覆舟君以此思危則危將安不至矣夫執國之柄履民之上懔乎如以腐索御奔馬易曰履虎尾詩曰如履薄氷不亦危乎哀公再拜曰寡人雖不敏請事斯語矣新序卷四荀子哀公又莊子莊子見魯哀公哀公曰魯多儒士少爲先生方者莊子曰魯少儒哀公曰舉魯國而儒服何謂少乎莊子曰周聞之儒者冠圜冠者知天時履句履者知地形緩珮玦者事至而㫁君子有其道者未必爲其服也爲其服者未必知其道也公固以爲不然何不號於國中曰無此道而爲此服者其罪死於是哀公號之五日而魯國無敢儒服者獨有一丈夫儒服而立乎公門公即召而問以國事千轉萬變而不窮莊子曰以魯國而儒者一人耳可謂多乎按莊子後於魯哀公逺矣此其寓言新論魯哀公好儒服舉國皆著儒衣哀公問於孔子曰吾欲論吾國之士與之治國敢問何如之耶孔子對曰生今之世志古之道居今之俗服古之服舍此而爲非者不亦鮮乎哀公曰然則夫章甫絇屨紳而搢笏者此賢乎孔子對曰不必然夫端衣𤣥裳絻而乗路者志不在于食葷斬衰菅屨杖而啜粥者志不在于酒肉生今之世志古之道居今之俗服古之服舍此而爲非者雖有不亦鮮乎哀公曰善孔子曰人有五儀有庸人有士有君子有賢人有大聖哀公曰敢問何如斯可謂庸人矣孔子對曰所謂庸人者口不能道善言心不知色色不知選賢人善士託其身焉以爲已憂勤行不知所務止交不知所定日選擇於物不知所貴從物如流不知所歸五鑿爲正心從而壞如此則可謂庸人矣哀公曰善敢問何如斯可謂士矣孔子對曰所謂士者雖不能盡道術必有率也雖不能徧羙善必有處也是故知不務多務審其所知言不務多務審其所謂行不務多務審其所由故知既已知之矣言既已謂之矣行既已由之矣則若性命肌膚之不可易也故富貴不可以益也卑賤不足以損也如此則可謂士矣哀公曰善敢問何如斯可謂君子矣孔子對曰所謂君子者言忠信而心不徳仁義在身而色不伐思慮明通而辭不爭故猶然如將可及者君子也哀公曰善敢問何如斯可謂賢人矣孔子對曰所謂賢人者行中規繩而不傷于本言足法於天下而不傷于身富有天下而無怨財怨讀爲蘊言藴畜私財布施天下而不病貧如此則可謂賢人矣哀公曰善敢問何如斯可謂大聖人矣孔子對曰所謂大聖者知通乎大道應變而不窮辨乎萬物之情性者也大道者所以變化遂成萬物也情性者所以理然不取舍也是故其事大辨乎天地明察乎日月㧾要萬物于風雨繆繆肫肫其事不可循若天之嗣其事不可識百姓淺然不識其鄰若此則可謂大聖矣哀公曰善哀公問舜冠于孔子孔子不對三問不對哀公曰寡人問舜冠于子何以不言也孔子對曰古之王者有務而拘領者矣其政好生而惡殺焉務讀爲冐拘與句同典領也言雖冠衣拙朴而行仁政也尚書大傳曰古之人衣上有冐而句領者鄭康成注曰冐覆項句領繞頸也是以鳯在列樹麟在郊野烏鵲之巢可俯而窺也君不此問而問舜冠所以不對也荀子哀公篇魯哀公問于孔子曰紳委章甫有益于仁乎孔子蹴然曰君號然也資衰苴杖者不聽樂非耳不能聞也服使然也黼衣黻裳者不茹翬非口不能味也服使然也且丘聞之好肆不守折長者不爲市竊其有益與其無益君其知之矣竊讀爲察子哀公荀魯哀公問于孔子曰子從父命孝乎臣從君命貞乎三問孔子不對孔子趨出以語子貢曰向者君問丘曰子從父命孝乎臣從君命貞乎三問而丘不對賜以爲何如子貢曰子從父命孝矣臣從君命貞矣夫子有奚對焉孔子曰小人哉賜不識也昔萬乗之國有争臣四人則封疆不削千乗之國有爭臣三人則社稷不危百乗之家有爭臣二人則宗廟不毁父有爭子不行無禮士有爭友不爲不義故子從父奚子孝臣從君奚臣貞審其所以從之之謂孝之謂貞也荀子子道魯哀公問政於孔子對曰政有使民富且夀哀公曰何謂也孔子曰薄賦歛則民富無事則逺罪逺罪則民夀公曰若是則寡人貧矣孔子曰詩云凱悌君子民之父母未見其子富而父母貧者也説苑政理哀公問取人子曰無取健無取侫無取口䜛健驕也侫謟也䜛誕也故弓調然後求勁焉馬服然後求良焉士信慤而後求知焉士不信焉又多知譬之豺狼其難以身近也周書曰爲虎傅翼也不亦殆乎詩曰匪其止恭惟王之卭言其不恭職事而病其主也韓詩巻四荀子哀公又哀公問於孔子曰人何若而可取也孔子對曰毋取拑者無取健者無取口銳者哀公曰何謂也孔子曰拑者大給利不可盡用健者必欲兼人不可以爲法也口鋭者多誕而寡信後恐不騐也夫弓矢和調而後求其中焉馬慤愿順然後求其良材焉人必忠信重厚然後求其知能焉今人有不忠信重厚而多知能如此人者譬猶豺狼與不可以身近也是故先其仁信之誠者然後親之於是有知能者然後任之故曰親仁而使能夫取人之術也觀其言而察其行夫言者所以抒其匃而發其情者也能行之士必能言之是故先觀其言而揆其行夫以言揆其行雖有姦軌之人無以逃其情矣哀公曰善説苑尊賢魯哀公問於仲尼曰吾欲小則守大則攻其道若何仲尼曰若朝廷有禮上下有親民之衆皆君之畜也君將誰攻若朝廷無禮上下無親民衆皆君之讐也君將誰與守于是廢澤梁之禁弛闗市之征以爲民惠也説苑指武魯哀公問於孔子曰當今之時君誰賢對曰衛靈公公曰吾聞之其閨門之内姑姊妹無别對曰臣觀於朝廷未觀於堂陛之間也靈公之弟曰公子渠牟其知足以治千乗之國其信足以守之而靈公愛之又有士曰王林國有賢人必進而任之無不達也不能達退而與分其禄而靈公尊之又有士曰慶足國有大事則進而治之無不濟也而靈公説之史鰌去衛靈公邸舍三月琴瑟不御待史鰌之入也而後入臣是以知其賢也説苑尊賢魯哀公問於孔子曰鄙諺曰莫衆而迷舉事不與衆謀者必迷惑今寡人舉事與羣臣慮之而國愈亂其故何也孔子對曰明主之問臣一人知之一人不知也如是者明主在上羣臣直議於下今羣臣無不一辭同軌乎季孫者舉魯國盡化爲一君雖問境内之人猶不免於亂也一曰晏子聘魯哀公問曰語云莫三人而迷今寡人與一國慮之魯不免於亂何也晏子曰古之所謂莫三人而迷者一人失之二人得之三人足以爲衆矣故曰莫三人而迷今魯國之羣臣以千百數一言於季氏之私人數非不衆所言者一人也安得二哉韓子内儲上孔子見魯哀公哀公曰有語寡人曰爲國家者爲之堂上而已矣寡人以爲迂言也孔子曰此非迂言也丘聞之得之於身者得之人失之於身者失之人不出於門戸而天下治者其惟知反於已身者乎吕覧先已魯哀公問於仲尼曰春秋之記曰冬十二月霣霜不殺菽何爲記此仲尼對曰此言可以殺而不殺也夫冝殺而不殺梅李冬實天失道草木猶犯干之而況於君人乎韓子内儲上魯哀公問於孔子曰有智者夀乎孔子曰然人有三死而非命也者人自取之夫寢處不時飲食不節佚勞過度者疾共殺之居下位而上忤其君嗜慾無厭而求不止者刑共殺之少以犯衆弱以侮强忿怒不量力者兵共殺之此三者非命也人自取之詩云人而無儀不死何爲此之謂也説苑襍言魯哀公問書稱䕫曰於予擊石拊石百獸率舞庶尹允諧何謂也孔子對曰此言善政之化乎物也古之帝王功成作樂其功善者其樂和樂和則天地猶且應之況百獸乎䕫爲帝舜樂正實能以樂盡治理之情公曰然則政之大本莫尚䕫乎孔子曰夫樂所以歌其成功非政之本也衆官之長既咸熈熈然後樂乃和焉公曰吾聞䕫一足有異于人信乎孔子曰昔重黎舉䕫而進又求人而佐焉舜曰夫樂天地之精也唯聖人爲能和六律均五音知樂之本以通八風䕫能若此一而足矣故曰一足非一足也公曰善孔叢子上孔子御坐於魯哀公哀公賜之桃與黍仲尼先飯黍而後㗖桃左右皆揜口而笑哀公曰黍者非飯之也以雪桃也仲尼對曰丘知之矣夫黍者五穀之長也祭先王爲上盛果蓏有六而桃爲下祭先王不得入廟丘之聞也君子以賤雪貴不聞以貴雪賤今以五穀之長雪果蓏之下是從上雪下也丘以爲妨義故不敢以先於宗廟之盛也韓子外儲左魯人燒積澤天北風火南倚恐燒國哀公懼自將衆趣救火者左右無人盡逐獸而火不救乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火之所以無救也哀公曰善仲尼曰事急不及以賞救火者盡賞之則國不足以賞於人乃下令曰不救火者比降北之罪逐獸者比入禁之罪令未下遍而火已救矣韓子内儲上孟氏之臣叛武伯問孔子曰如之何荅曰臣人而叛天下所不容也其將自反子姑待之三旬果自歸孟氏武伯將執之訪于夫子夫子曰無也子之于臣禮意不至是以去子今其自反罪以反除又何執焉子修禮以待之則臣去子將安往武伯乃止孔叢子上公儀仲子之喪公儀氏仲子字魯之同姓檀弓免音問焉仲子舍其孫而立其子檀弓曰何居我未之前聞也趨而就子服伯子于門右曰仲子舍其孫而立其子何也伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也子游問諸孔子孔子曰否立孫檀弓下秦莊子死孟武伯問于孔子曰古者同寮有服乎荅曰然同寮有相友之義貴賤殊等不爲同官聞諸老𣆀昔者虢叔閎夭太顛散冝生南宫适五臣同寮比徳以賛文武及虢叔死四人者爲之服朋友之服古之達理者行之也孔叢子上魯哀公問於仲尼曰衛有惡人焉曰哀駘它貌醜者姓名丈夫與之處者思而不能去也婦人見之請于父母曰與人爲妻寧爲夫子妾者十數而未止也未甞有聞其唱也常和人而已矣寡人召而觀之果以惡駭天下與寡人處不至以月數而寡人有意乎其爲人也不至乎期年而寡人信之國無宰而寡人傳國焉悶然而後應汜然而若辭無幾何也去寡人而行寡人䘏焉若有亡也若無與樂是國也是何人者也仲尼曰丘也甞使于楚矣適見㹠子食于其死母者少焉眴若皆棄之而走不見已焉爾不得類焉爾所愛其母者非愛其形也愛使其形者也戰而死者其人之葬也不以翣資刖者之屨無爲愛之皆無其本矣爲天子之諸御妃嬪也不𤓰剪不穿耳取妻者止于外不得復使形全猶足以爲爾可以邀至尊之盻結新昏之歡而況全徳之人乎今哀駘它未言而信無功而親使人授已國惟恐其不受也是必才全而德不形者也哀公曰何謂才全仲尼曰死生存亡窮逹貧富賢與不肖毁譽飢渴寒暑是事之變命之行也日夜相代乎前而知不能規乎其始者也故不足以滑和不可入于靈府使之和豫通而不失于兑使日夜無卻而與物爲春是接而生時于心者也是之謂才全何謂徳不形曰平者水停之盛也盛極也其可以爲法也内保之而外不蕩也徳者成和之修也和不可滑則成徳不形者物不能離也哀公異日以告閔子曰始也吾以南面而君天下執民之紀而憂其死自以爲至通矣今吾聞至人之言恐吾無其實輕用吾身而亡吾國吾與孔子非君臣也徳友而已矣莊子徳充符魯哀公欲西益宅史爭之以爲西益宅不祥哀公作色而怒左右數諫不聽乃以問其傅宰折睢曰吾欲益宅而史以爲不祥子以爲何如宰折睢曰天下有三不祥西益宅不與焉哀公大悦而喜頃復問曰何謂三不祥對曰不行禮義一不祥也嗜慾無止二不祥也不聽强諫三不祥也哀公嘿然深念憤然自反遂不西益宅淮南子人間魯哀公問於顔闔曰吾以仲尼爲貞幹國其有瘳乎曰殆哉圾乎仲尼方且飾羽而畫從事華辭以支爲㫖忍性以視民而不知不信受乎心宰乎神夫何足以上民彼冝汝與予頥與誤而可矣今使民離實學僞非所以視民也爲後世慮不若休之難治也施于人而不忘非天布也商賈不齒雖以事齒之神者弗齒爲外刑者金與木也爲内刑者動與過也宵人之離外刑者金木訊之離内刑者陰陽食之夫免乎外内之刑者惟真人能之莊子列禦冦魯哀公祖載其父孔子問曰寕設五穀囊乎公曰否五穀囊者起伯夷叔齊不食周粟而餓死首陽山恐䰟之飢故作五穀囊吾父食味含哺而死何用此爲王肅喪服要記田饒事魯哀公而不見察田饒謂哀公曰臣將去君而黄黄一作鴻下同鵠舉矣哀公曰何謂也曰君獨不見夫鷄乎首戴冠者文也足傅距者武也敵在前敢鬭者勇也得食相呼仁也守夜不失時信也雞雖有此五徳君猶日瀹而食之何則以其所從來者近也夫黄鵠一舉千里止君園池食君魚鼈啄君黍粱無此五者君猶貴之以其所從來者逺也臣請去君黄鵠舉矣哀公曰止吾將書子言也田饒曰臣聞食其食者不毁其器陰其樹者不折其枝有臣不用何書其言遂去之燕燕立以爲相三年燕政太平國無盗賊哀公爲之辟寢三月減損上服曰不慎其前而悔其後何可復得韓詩巻二新序巻五又魯哀公爲室而大公宣子諫曰室大衆與人處則譁少與人處則悲願公之適公曰寡人聞命矣築室不輟公宣子復見曰國小而室大百姓聞之必怨吾君諸侯聞之必輕吾國魯君曰聞命矣築室不輟公宣子復見曰左昭而右穆為大室以臨二先君之廟得母害于子乎公乃令罷役除版而去之淮南子人間魯人有周豐者哀公執摯請見之而曰不可公曰我其已夫使人問焉曰有虞氏未施信于民而民信之夏后氏未施敬于民而民敬之何施而得斯于民也對曰墟墓之間未施哀于民而民哀社稷宗廟之中未施敬于民而民敬殷人作誓而民始畔周人作會而民始疑茍無禮義忠信誠慤之心以涖之雖固結之民其不觧乎檀弓下哀公問於子夏曰必學然後可以安國保民乎子夏曰不學而能安國保民者未之有也哀公曰然則五帝有師乎子夏曰臣聞黄帝學乎大墳墳一作真顓頊學乎禄圖禄一作緑帝嚳學乎赤松子堯學乎務成子附附一作跗舜學乎尹夀舜一作克與上句互禹學乎西王國湯學乎貸子相貸子相一作威子伯文王學乎錫疇子斯錫疇一作鉸時武王學乎太公太公一作郭叔周公學乎虢仲虢仲一作太公仲尼學乎老𣆀此十二聖人未遭此師則功業不能著乎天下名號不能傳乎後世者也韓詩巻五新序巻五又魯哀公問冉有曰凢人之質而已將必學而後爲君子乎冉有對曰臣聞之雖有良玉不刻鏤則不成器雖有羙質不學則不成君子何以知其然也夫子路卞之野人也子貢衞之賈人也皆學問於孔子遂爲天下顯士諸侯聞之莫不尊敬卿大夫聞之莫不親愛學故也昔吴楚燕代謀一舉而伐秦桃賈監門之子也爲秦往使之遂絶其謀止其兵及其反國秦王大悦立爲上卿百里奚齊之乞者也逐於齊西無以進自賣五羊皮爲一軛車見秦繆公立爲相遂霸西戎太公望少爲人壻老而見去屠羊朝歌賃於棘津釣於磻溪文王舉而用之封於齊管仲親射桓公遂除報仇之心立以爲相存亡繼絶九合諸侯一匡天下此四子者皆嘗卑賤窮辱矣然其名聲馳于後世豈非學問之所致乎由此觀之士必學問然後成君子詩曰日就月將於是哀公嘻然笑曰寡人雖不敏請奉先生之教矣韓詩卷八子張見魯哀公七日而哀公不禮託僕夫而去曰臣聞君好士故不逺千里之外犯霜露冐塵垢百舍重趼不敢休息以見君七日而君不禮君之好士也有似葉公子高之好龍也葉公子高好龍鈎以寫龍鑿以寫龍屋室雕文以寫龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而還走失其䰟魄五色無主是葉公非好龍也好夫似龍而非龍者也今臣聞君好士故不逺千里之外以見君七日不禮君非好士也好夫似士而非士者也詩曰中心藏之何日忘之敢託而去新序巻五季孫子之治魯也衆殺人而必當其罪多罰人而必當其過子貢曰暴哉治乎季孫聞之曰吾殺人必當其罪罰人必當其過先生以爲暴何也子貢曰子產之治鄭一年而負罸之過省二年而刑殺之罪亡三年而庫無拘人故民歸之如水就下愛之如孝子敬父母子産病將死國人皆吁嗟曰誰可使代子産死者乎及其死也士大夫哭之於朝商賈哭之於市農夫哭之於野皆如喪父母今竊聞夫子疾之時則國人喜活則國人皆駭以死相賀以生相恐非暴而何哉賜聞之託法而治謂之暴不戒致期謂之虐不教而誅謂之賊以身勝人謂之責責者失身賊者失臣虐者失政暴者失民賜聞居上位行此四者而不能亡者未之有也於是季孫稽首謝曰謹聞命矣韓詩巻三古文瑣語魯國多盜季康子治之獲一人焉詰之曰汝胡以盜對曰此猶之乎蟻羶也慕羶而附寧可已邪子夫夫爲政不能不盜何以詰吾盜栁下蹠魯之民盜也嘯其徒數千人驪山之陽抉人肝而食之享年九十而邑宰不得問也子大夫陪臣陽貨魯之家盜也國命出其手叛費囚桓以意行國中自如寳玉大弓夫誰非先王所遺子孫世守之謂何今貨偃然竊以逋也而子大夫不得問也子大夫之家魯之國盜也名則魯臣實魯君焉國政爲家事國賦爲家賦藐然魯君如無有焉而魯君不得問也魯君魯之大盜也乾侯之難亦惟季孫意如之故不得正其終魯君靦然不斥季孫之立而以爲身則魯何以有王章也逐一君復易一君而周天子不得問也吾儕小人其何知知則於人而已矣子大夫與吾儕小人其俱負翳以謀朝夕耳詰安用之康子曰辨哉盜也去之縶於獄中魯國之法魯人有贖臣妾於諸侯者取金於府子貢贖人于諸侯而還其金孔子聞之曰賜失之矣聖人之舉事也可以移風易俗而教導可施於百姓非獨適其身之行也今魯國富者寡而貧者衆贖而受金則為不亷不受則後莫復贖自今以來魯人不復贖矣説苑政理季孫相魯子路爲郈令魯以五月起衆爲長溝當此之爲子路以其私秩衆爲漿飯要作溝者於五父之衢而飡之孔子聞之使子貢往覆其飯擊毁其器曰魯君有民子奚爲乃飡之子路怫然怒攘肱而入請曰夫子疾由之爲仁義乎仁義者與天下共其所有而同其利者也今以由之秩粟而飡民不可何也孔子曰由之野也吾以女知之女故如是之不知也女之飡之爲愛之也夫禮天子愛天下諸侯愛境内大夫愛官職士愛其家過於所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未卒而季孫使者至讓曰肥也起民而使之先生使弟子令徒役而飡之將奪肥之民耶孔子駕而去魯韓子外儲右叔孫氏之車士曰子鉏商采薪于大野獲麟焉折其前左足載以歸叔孫以爲不祥棄之郭外使人告孔子曰有麏而角者何也孔子往觀之曰麟也胡爲來哉胡爲來哉反袂拭面涕泣沾衿叔孫聞之然後取之子貢問曰夫子何泣爾孔子曰麟之至爲明王也出非其時而見害吾是以傷焉孔叢子記問叔孫氏之車子曰鉏商樵于野而獲獸焉衆莫之識以爲不祥棄之五父之衢冉有告夫子曰􅍪身而肉角豈天之妖乎夫子曰今何在吾將觀焉遂往謂其御高柴曰若求之言其必麟乎則視之果信言偃問曰飛者宗鳯走者宗麟爲其難致也敢問今見其誰應之子曰天子布德將致太平則麟鳯龜龍先為之祥今宗周將滅天下無主孰爲來哉遂泣曰予之于人猶麟之于獸也麟出而死吾道窮矣乃歌曰唐虞世兮麟鳯遊今非其時吾何求麟兮麟兮我心憂孔子晨作負手曳杖逍遥于門而歌曰泰山其頽乎梁木其壞乎喆人其萎乎既歌而入當戸而坐子貢聞之曰泰山其頽吾將安仰梁木其壞吾將安仗喆人其萎吾將安放夫子殆將病也遂趨而入夫子歎而言曰賜女來何遲予疇昔夢坐奠于兩楹之間夏后氏殯于東階之上則猶在阼殷人殯于兩楹之間即與賓主夾之周人殯于西階之上則猶賓之而丘也殷人也夫明王不興則天下其孰能宗余余殆將死遂寢病公孫子孔子有疾哀公使醫視之醫曰居處飲食何如子曰丘春居葛籠夏居宻陽秋不風冬不煬飲食不過飲酒不勤醫曰是良醫也七日而終時年七十三矣哀公十六年四月己丑卒葬于魯城北泗水上論衡孔子當泗水而葬泗水爲之却流藏入地不及泉而封爲偃斧之形高四尺樹松栢爲志焉稽命録孔子墳方一里弟子各以四方竒木來植之弟子皆家于墓行心喪之禮三年喪畢或留或去惟子貢廬于墓六年自後羣弟子及魯人處于墓如家者百有餘家因名其居曰孔里焉家語弓又錯見檀史記魯哀公誄孔丘曰天不遺耆老莫相予位焉嗚呼哀哉尼父檀弓上異與左傳小拾遺記周靈王夫子未生時有麟吐玉書于闕里文云水精之子繼衰周而爲素王孔母賢明知爲神異乃以繡紱繫麟角信宿而去至魯哀公十四年魯人鋤商田于大澤得麟以示夫子繫角之紱尚在焉夫子知命將終乃抱麟觧紱涕泗滂沱皇覽冢墓記孔子冢在魯城北便門外南去城十里冢塋方百畝冢南北廣十步東西十步高丈二尺冢爲祠壇方六尺與地方平祠堂冢塋中樹皆以百數皆異種魯人世世皆無能名其樹者盖孔子弟子異國人各持其國數來種之孔子塋中不生荆棘及刺人草悼公之母死哀公爲之齊衰有若曰爲妾齊衰禮與公曰吾得已乎哉魯人以妻我檀弓下南宫敬子問顏涿聚曰季孫養孔子之徒所朝服與坐者以十數而遇賊何也曰昔周成王近優侏儒以逞其意而與君子斷事是以能成其欲於天下今季孫養孔子之徒所朝服而與坐者以十數而與優侏儒斷事是以遇賊故曰不在所與居在所與謀也韓子外儲左季康子謂子㳺曰仁者愛人乎子㳺曰然人亦愛之乎子㳺曰然康子曰鄭子產死鄭人丈夫舍玦珮婦人舍珠珥夫婦巷哭三月不聞竿瑟之聲仲尼之死吾不聞魯國之愛夫子奚也子游曰譬子產之與夫子其猶浸水之與天雨乎浸水所及則生不及則死斯民之生也必以時雨既以生莫愛其賜故曰譬子產之與夫子也猶浸水之與天雨乎説苑貴徳哀公射而中稷其口疾不肉食祠稷而善卜之巫官巫官變曰稷負五種託株而從天下未至于地而株絶獵谷之老人張衽以受之何不告祀之公從之而疾去説苑辨物二十七年春季康子卒夏哀公患三桓將欲因諸侯以刼之三桓亦患公作難故君臣多間公游于陵阪遇孟武伯於衢曰請問余及死乎對曰不知也公欲以越伐三桓八月哀公如陘氏三桓攻公公奔于衞去如鄒遂如越國人迎哀公復歸卒于有山氏子寧立是爲悼公悼公之時三桓勝魯知小侯卑於三桓之家史魯世家春秋戰國異辭巻五
