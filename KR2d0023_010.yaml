body:
  text: 春秋戰國異辭卷八右春坊右諭德陳厚耀撰晉史晉世家周成王封其弟虞于唐唐在河汾之東方百里故曰唐叔虞字子于唐叔子燮是為晉侯毛詩譜云叔虞子燮父以堯墟南有晉水改曰晉侯晉侯子寧族是為武侯武侯之子服人是為成侯成侯子福是為厲侯厲侯之子宜臼是為靖侯靖侯以來年紀可推自唐叔至靖侯五世無其年數靖侯十七年周厲王出奔于彘十八年靖侯卒子釐侯司徒立釐侯十八年卒子獻侯籍立獻侯十一年卒子穆侯費王立一本王作生穆侯文侯穆侯四年取齊女姜氏為夫人七年伐條生太子仇十年伐千畝有功生少子名曰成師晉人師服曰異哉君之命子也太子曰仇仇者讎也少子曰成師成師大號成之者也名自命也物自定也今適庶名反逆此後晉其能毋亂乎二十七年穆侯卒弟殤叔自立太子仇出奔殤叔三年周宣王崩四年穆侯太子仇率其徒襲殤叔而立是為文侯文侯十年周東徙三十五年文侯仇卒子昭侯伯立史晉世家約左氏文昭侯元年封叔父成師于曲沃曲沃邑大于翼翼晉君都邑也成師封曲沃號為桓叔靖侯庶孫欒賓相桓叔靖侯叔虞五世孫穆侯之曽祖也桓叔是時年五十八矣好德晉國之衆皆附焉君子曰晉之亂其在曲沃矣末大于本而得民心不亂何待史晉世家晉昭侯封公子成師于曲沃成師治聚盛强師服憂之而賦茮茮即椒聊申公詩說詩序椒聊刺晉昭公也君子見沃之盛彊能修其政知其蕃衍盛大子孫將有晉國焉曲沃强盛成師有篡國之謀唐人知之賦揚之水詩傳詩說同詩序揚之水刺晉昭公也昭公分國以封沃沃盛强昭公微弱國人將叛而歸沃焉晉昭公不能修道以正其國有財不能用有鐘鼓不能以自樂有朝廷不能灑掃政荒民散將以危亡四國謀取其國而不知國人作山有樞以刺之詩序憂詩說云唐人國之詩七年晉大臣潘父弒其君昭侯而迎曲沃桓叔桓叔欲入晉晉人發兵攻桓叔桓叔敗還歸曲沃晉人共立昭侯子平為君是為孝侯誅潘父史晉世家孝侯孝侯八年曲沃桓叔卒子鱓代是為曲沃莊伯史晉世家孝侯十五年曲沃莊伯弒其君孝侯于翼晉人攻莊伯莊伯復入曲沃晉人復立孝侯子㕁為君是為卾侯史晉世家鄂侯鄂侯二年魯隱公初立鄂侯六年卒曲沃莊伯聞之乃興兵伐晉周平王使虢公將兵伐曲沃莊伯平王當作桓王莊伯走保曲沃晉人共立鄂侯子光是為哀侯史晉世家詩序鴇羽刺時也昭公之後大亂五世君子下從征役不得養其父母而作是詩也紀年鄂侯五年十月莊伯以曲沃叛伐翼公子萬救翼茍叔軫追之至於家谷翼侯焚曲沃之禾而還翼侯伐曲沃大捷武公請成於翼至相而還六年王使虢公伐晉之曲沃晉鄂侯卒曲沃莊伯復伐晉立鄂侯子光是為哀侯公子萬救翼荀叔軫追之至於家谷哀侯小子侯侯緡哀侯二年曲沃莊伯卒子稱代是為曲沃武公史晉世家哀侯八年晉侵陘廷陘廷與曲沃武公謀九年伐晉于汾旁虜哀侯晉人乃立哀侯子小子為君是為小子侯小子元年曲沃武公使韓萬殺所虜晉哀侯曲沃益彊晉無如之何晉小子之四年曲沃武公誘召晉小子殺之周桓王使虢仲伐曲沃武公武公入于曲沃乃立晉哀侯弟緡為晉侯史晉世家紀年哀侯二年曲沃莊伯卒子稱立是為武公尚一軍三年荀人董伯皆叛曲沃紀年晉曲沃滅荀以其地賜大夫原氏黯是為荀叔紀年晉侯緡九年曲沃尚一軍異于晉武公晉侯緡二十八年齊桓公始霸曲沃武公伐晉侯緡滅之盡以其寶器賂獻于周釐王釐王命曲沃武公為晉君列為諸侯于是盡併晉地而有之曲沃武公已即位三十七年矣更號曰公始都晉國前即位曲沃通年三十八年武公晉穆侯曽孫也曲沃桓叔孫也自桓叔初封曲沃以至武公滅晉凡六十七歲而卒代晉為諸侯武公代晉二歲卒與曲沃通即位凡三十九年而卒子獻公詭諸立史晉世家曲沃稱弒其三君僖王命為晉侯唐人刺之賦無衣子貢詩傳詩說唐公孫稱弒三君而取其國盡以寶器賂周僖王王命之為晉侯國人作此以刺之詩序有杕之杜刺晉武公也武公寡特兼其宗族而不求賢以自輔焉詩序無衣美晉武公也武公始并晉國其大夫為之請命乎天子而作是詩獻公晉獻公五年伐驪戎得驪姬與其弟俱愛幸之史晉世家八年士蒍說公曰故晉之羣公子多不誅亂且起乃使盡殺羣公子而城聚都之命曰絳始都絳九年晉羣公子多亡奔虢虢以故再伐晉弗克史晉世家十年晉欲伐虢士蒍曰且待其亂至十九年獻公曰始吾先君莊伯武公之誅晉亂而虢常助晉伐我又匿晉亡公子果為亂弗誅後為子孫憂乃使荀息以屈産之乘假道于虞地志今大原府靜樂縣有峽山晉假道于虞出此遂伐虢取其下陽以歸史晉世家韓子晉獻公欲伐虞乃遺之屈産之乘垂棘之璧女樂六以榮其意而亂其政晉獻公十二年驪姬生奚齊獻公有意廢太子乃曰曲沃吾先祖宗廟所在而蒲邊秦屈邊翟不使諸子居之我懼焉於是使太子申生居曲沃公子重耳居蒲公子夷吾居屈獻公與驪姬奚齊居絳晉國以此知太子不立也太子申生其母齊桓公女也與左氏異曰齊姜早死申生同母女弟為秦穆公夫人重耳母翟之狐氏女也夷吾母重耳母女弟也獻公子八人而太子申生重耳夷吾皆有賢行及得驪姬乃逺此三子十六年作二軍公將上軍太子將下軍趙夙御戎畢萬為右以滅霍魏耿還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫士蒍曰太子不得立矣分之都城而位以卿先為之極又安得立不如逃之無使罪至為吳太伯不亦可乎猶有令名太子不從史晉世家卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天開之矣天子曰兆民諸侯曰萬民今命之大以從盈數其必有衆初畢萬卜仕于晉國遇屯之比辛廖占之曰吉屯固比入吉孰大焉其後必蕃昌史晉世家十七年晉侯使太子申生伐東山里克諫獻公曰太子奉冡祀社稷之粢盛以朝夕視君膳者也故曰冡子君行則守有守則從從曰撫軍守曰監國古之制也夫率師專行謀也誓軍旅君與國政之所圖也非太子之事也師在制命而已禀命則不威專命則不孝故君之嗣適不可以帥師君失其官率師不威將安用之公曰寡人有子未知其太子誰立里克不對而退見太子太子曰吾其廢乎里克曰太子勉之教以軍旅不共是懼何故廢乎且子懼不孝毋懼不得立修已而不責人則免于難太子帥師公衣之偏衣佩之金玦里克謝病不從太子太子遂伐東山史晉世家獻公私謂驪姬曰吾欲廢太子以奚齊代之驪姬泣曰太子之立諸侯皆已知之而數將兵百姓附之奈何以賤妾之故廢適立庶君必行之妾自殺也驪姬佯譽太子而隂令人譛惡太子而欲立其子二十一年驪姬謂太子曰君夢見齊姜太子速祭曲沃歸釐于君太子于是祭其母齊姜于曲沃上其薦胙于獻公獻公時出獵置胙于宫中驪姬使人置毒藥胙中居二日獻公從獵來還宰人上胙獻公公欲享之驪姬從旁止之曰胙所從來逺冝試之祭地地墳與犬犬死與小臣小臣死驪姬泣曰太子何忍也其父而欲弒代之况他人乎且君老矣旦暮之人曽不能待而欲弒之謂獻公曰太子所以然者不過以妾及奚齊之故妾願子母辟之他國若早自殺毋徒使母子為太子所魚肉也始君欲廢之妾猶恨之至于今妾殊自失于此太子聞之奔新城公怒乃誅其傅杜原欵或謂太子曰為此藥者乃驪姬也太子何不自辭明之太子曰吾君老矣非驪姬寢不安食不甘即辭之君且怒之不可或謂太子曰可奔他國太子曰被此惡名以出人誰內我我自殺耳十二月戊申申生自殺于新城史晉世家約左氏文晉獻公將殺其世子申生公子重耳謂之曰子盍言子之志于公乎世子曰不可君安驪姬是我傷公之心也曰然則盍行乎世子曰不可君謂我欲弒君也天下豈有無父之國哉吾何行如之使人辭于狐突曰申生有罪不念伯氏之言也以至于死申生不敢愛其死雖然吾君老矣子少國家多難伯氏不出而圖吾君伯氏茍出而圖吾君申生受賜而死再拜稽首乃卒是以為恭世子也檀弓上晉驪姬譖太子申生于獻公獻公將殺之公子重耳謂申生曰為此者非子之罪也子胡不進辭辭之必免于罪申生曰不可我辭之驪姬必有罪矣吾君老矣微驪姬寢不安席食不甘味如何使吾君以恨終哉重耳曰不辭則不若速去矣申生曰不可去而免于死是惡吾君也夫彰父之過而取美諸侯孰肯納之入困于宗出困于逃是重吾惡也吾聞之忠不暴君智不重惡勇不逃死如是者吾以身當之遂伏劒死說苑立莭晉獻公太子之至靈臺蛇繞左輪御曰太子下拜吾聞國君之子蛇繞左輪者速得國太子遂不行返乎舍御人見太子太子曰吾聞為人子者盡和順君不行私欲恭嚴承命不逆君安今吾得國是失君安也見國之利而忘君安非子道也聞得國而拜其聲非君欲也廢子道不孝逆君欲不忠拔劔將死御止之曰夫禨祥妖孽天之道也拜祥戒孽禮也嚴恭承命不以身恨君孝也今太子見福不拜失禮殺身恨君失孝從僻心棄正行非臣之所聞也太子曰不然我得國君之孽也拜君之孽不可謂禮見禨祥而忘君之安國之賊也懷賊心以事君不可謂孝挾僞意以御天下懷賊心以事君邪之大者也而使我行之是欲國之危明也遂伏劔而死新序卷七又論衡語少略作衛獻公太子事晉獻公之時有士焉曰狐突𫝊太子申生公立驪姬為夫人而國多憂狐突稱疾不出六年獻公以譖誅太子太子將死使人謂狐突曰吾君老矣國家多難傅一出以輔吾君申生受賜以死不恨再拜稽首而死狐突乃復事獻公三年獻公卒狐突辭于諸大夫曰突受太子之詔今事終矣與其久生亂世也不若死而報太子乃歸自殺說苑立節殺據左傳懷公立乃狐突狐突曰國君好內則太子危好外則相室危韓子內儲下列仙傳馬丹耿人也當晉文侯時為大夫至獻公復為幕府正獻公滅耿殺共太子丹乃去至趙宣子時乘安車入晉都候諸大夫靈公欲仕之逼不以禮有迅風發屋丹入回風中而去北方人尊而祠之晉獻公信讒晉人諫之賦采苓申公詩說云詩傳同詩序亦刺晉獻公也獻公好聽讒焉紀年獻公十九年公命瑕父吕甥邑于國都二十二年晉復假道于虞以伐虢虞之大夫宫之竒諫虞君曰晉不可假道也是且滅虞虞君曰晉我同姓不冝伐我宫之奇曰太伯虞仲太王之子也太伯亡去是以不嗣虢仲虢叔王季之子也為文王卿士其記勳在王室藏於盟府將虢是滅何愛于虞且虞之親能親于桓莊之族乎桓莊之族何罪盡滅之虞之與虢唇之與齒唇亡則齒寒虞公不聼遂許晉宫之奇以其族去虞其冬晉滅虢虢公醜奔周還襲滅虞虜虞公及其大夫井伯百里奚以媵秦穆姬而修虞祀荀息牽曩所遺虞屈産之乘馬奉之獻公獻公笑曰馬則吾馬而齒亦老矣史晉世家晉獻公之時東郭民有祖朝者上書獻公曰草茅臣東郭民祖朝願請聞國家之計獻公使使出告之曰肉食者已慮之矣藿食者尚何與焉祖朝對曰大王獨不聞古之將曰桓司馬者朝朝其君舉而晏御呼車驂亦呼車御肘其驂曰子何越云為乎何為藉呼車驂謂其御曰當呼者呼乃吾事也子當御正子之轡銜耳子今不正轡銜使馬卒然驚妄轢道中行人必逢大敵下車免劒涉血履肝者固吾事也子寧能辟子之轡下佐我乎其禍亦及吾身與有深憂吾安得無呼車哉今大王曰食肉者已慮之矣霍食者尚何與焉設使肉食者一旦失計于廟堂之上若臣等之霍食者寧得無肝膽塗地于中原之野與其禍亦及臣之身臣與有其憂深臣安得無與國家之計乎獻公召而見之三日與語無復憂者乃立以為師也說苑善說晉獻公之時國人久于征役室家念之賦葛生申公詩說詩傳略同詩序葛生刺晉獻公也好攻戰則國人多喪矣晉獻公築九層臺荀息諫曰臣能纍十二碁子加卵于上公曰危哉遂止其役說苑陽或作晉靈公事尚地志今平府太平縣臺址存重耳夷吾來朝人或告驪姬曰二公子怨姬譖殺太子驪姬恐因譖二公子申生之藥胙二公子知之二子聞之恐重耳走蒲夷吾走屈保其城自備守史晉世家初獻公使士蒍為二公子築蒲屈城弗就夷吾以告公公怒士蒍士蒍謝曰邊城少冦安用之退而歌曰狐裘䝉茸一國三公吾誰適從卒就城及申生死二子亦歸保其城史晉世家二十二年獻公怒二子不辭而去果有謀矣乃使兵伐蒲蒲人之宦者勃鞮命重耳促自殺重耳踰垣宦者追斬其衣袪重耳遂奔翟使人伐屈屈城守不可下二十三年公遂發賈華等伐屈屈潰夷吾將奔翟冀芮曰不可重耳已在矣今往晉必移兵伐翟翟畏晉禍且及不如走梁梁近于秦秦强吾君百歲後可以求入焉遂奔梁二十五年晉伐翟翟以重耳故亦擊晉于齧桑晉兵解而去當此時晉彊西有河西與秦接境北邊翟東至河內驪姬弟生悼子左作卓子左史晉世家約氏文二十六年齊桓公㑹諸侯于葵丘晉獻公病行後未至周宰孔止之獻公亦病復還歸病甚乃謂荀息曰吾以奚齊為後年少諸大臣不服恐亂起子能立之乎荀息曰能公曰何以為驗對曰使死者復生生者不慙謂之驗于是遂屬奚齊于荀息荀息為相主國政秋九月獻公卒里克邳鄭欲納重耳以三公子之徒作亂謂荀息曰三怨將起秦晉輔之子將何如荀息曰吾不可負先君言十月里克殺奚齊于喪次獻公未葬也荀息將死之或曰不如立奚齊弟悼子而𫝊之荀息立悼子而葬獻公十一月里克弒悼子于朝荀息死之初獻公將伐驪戎卜曰齒牙為禍及破驪戎獲驪姬愛之竟以亂晉里克等已殺奚齊悼子使人迎公子重耳于翟欲立之重耳謝曰負父之命出奔父死不得修人子之禮侍喪重耳何敢入大夫其更立他子還報里克里克使迎夷吾于梁夷吾欲往吕省郤芮曰內猶有公子可立者而外求難信計非之秦輔彊國之威以入恐危乃使卻芮厚賂秦約曰即得入請以晉河西之地與秦及遺里克書曰誠得立請遂封子于汾陽之邑秦穆公乃發兵送夷吾于晉齊桓公聞晉內亂亦率諸侯如晉秦兵與夷吾亦至晉齊乃使隰朋㑹秦俱入夷吾立為晉君是為惠公齊桓公至晉之高梁而還史晉世家約左氏文列女傳乃戮驪姬鞭而殺之晉獻公之喪秦穆公使人弔公子重耳且曰寡人聞之亡國恆于斯得國恆于斯雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圖之以告舅犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利而天下其孰能說之孺子其辭焉公子重耳對客曰君惠弔亡臣重耳身喪父死不得與于哭泣之哀以為君憂父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私子顯使者名以致命于穆公穆公曰仁夫公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也檀弓下惠公惠公夷吾元年使邳鄭謝秦曰始夷吾以河西地許君今幸得入立大臣曰地者先君之地君亡在外何以得擅許秦者寡人爭之弗能得故謝秦亦不與里克汾陽邑而奪之權四月周襄王使周公忌父㑹齊秦大夫共禮晉惠公史晉世家晉君改葬恭太子申生秋狐突之下國遇申生申生與載而告之曰夷吾無禮余得請于帝將以晉與秦秦將祀余狐突對曰臣聞神不食非其宗君之祀毋乃絶乎君其圖之申生曰諾吾將復請帝後十日新城西偏將有巫者見我焉許之遂不見及期而往復見申生告之曰帝許罰有罪矣弊于韓兒乃謠曰恭太子更葬矣後十四年晉亦不昌昌乃在兄史晉世家惠公以重耳在外畏里克為變賜里克死謂曰微里子寡人不得立雖然子亦殺二君一大夫為子君者不亦難乎里克對曰不有所廢君何以興欲誅之其無辭乎乃言為此臣聞命矣遂伏劔而死于是邳鄭使謝秦未還故不及難史晉世家二年周使召公過禮晉惠公惠公禮倨召公譏之紀年晉惠公二年雨金于晉邳鄭在秦聞里克誅乃說秦繆公曰吕省卻稱冀芮實為不從若重賂與謀出晉君入重耳事必就秦繆公許之使人與歸報晉厚賂三子三子曰幣重言甘此必邳鄭賣我于秦遂殺邳鄭及里克邳鄭之黨七輿大夫邳鄭子豹奔秦言伐晉繆公弗聼詳左傳僖十年惠公之立倍秦地及里克誅七輿大夫國人不附四年晉饑乞糴于秦繆公問百里奚百里奚曰天菑流行國家代有救菑恤鄰國之道也與之邳鄭子豹曰伐之繆公曰其君是惡其民何罪卒與之自雍屬絳五年秦饑請糴于晉晉君謀之慶鄭曰以秦得立已而倍其地約晉饑而秦貸我今秦饑請糴與之何疑而謀之虢射曰往年天以晉賜秦秦弗知取而貸我今天以秦賜晉晉其可以逆天乎遂伐之惠公用虢射謀不與秦粟而發兵且伐秦秦大怒亦發兵伐晉六年春繆公伐晉晉惠公謂慶鄭曰秦師深矣奈何鄭曰秦內君君倍其賂晉饑秦輸粟秦饑而晉倍之乃欲因其饑而伐之其深不亦冝乎晉卜御右慶鄭皆吉公曰鄭不遜乃更令步陽御戎家僕徒為右九月壬戌秦晉合戰于韓原晉惠公馬騺不行秦兵至公窘召慶鄭為御鄭曰不用卜敗不亦當乎遂去更令梁繇靡御虢射為右輅秦繆公輅迎也繆公壯士冒敗晉軍晉軍敗遂失秦繆公反獲惠公以歸秦將以祀上帝晉君姊為繆公夫人衰絰涕泣公曰得晉侯將以為樂今乃如此且吾聞箕子見唐叔之初封曰其後必當大矣晉庸可滅乎乃與晉侯盟王城而許之歸晉侯亦使吕省等報國人曰孤雖得歸毋面目見社稷卜日立子圉晉人聞之皆哭秦繆公問吕省晉國和乎對曰不和小人懼失君亡親不憚立子圉曰必報讎寧事戎狄其君子則愛君而知罪以待秦命曰必報德有此二故不和于是秦繆公更舍晉惠公餽之七牢十一月歸晉侯晉侯至國誅慶鄭修政教謀曰重耳在外諸侯多利內之欲使人殺重耳于狄重耳聞之如齊八年使太子圉質秦史晉世家初惠公亡在梁梁伯以其女妻之生一男一女梁伯卜之男為人臣女為人妾故名男為圉女為妾史晉世家十年秦滅梁梁伯好土功治城溝民力罷怨其衆數相驚曰秦寇至民恐惑秦竟滅之史晉世家十三年晉惠公病內有數子太子圉曰吾母家在梁今秦滅之我外輕于秦而內無援于國君即不起大夫輕更立他公子乃謀與妻俱亡歸秦女曰子一國太子辱在此秦使婢子侍以固子之心子亡矣我不從子亦不敢言子圉遂亡歸晉十四年九月晉惠公卒太子圉立是為懷公子圉之亡秦怨之乃迎公子重耳于楚而妻以故子圉妻欲內之子圉之立畏秦之伐也乃令國中諸從重耳亡者與期期盡不到者盡滅其家狐突之子毛及偃從重耳在秦弗肯召懷公怒囚狐突突曰臣子事重耳有年數矣今召之是教之反君也何以教之懷公卒殺狐突秦繆公乃發兵送內重耳使人告欒卻之黨為內應殺懷公于高梁重耳立是為文公史晉世家約左氏文晉惠公時童謠云恭太子更葬兮十四年晉亦不昌昌乃在其兄漢書五行志春秋戰國異辭卷八
