body:
  text: 春秋戰國異辭卷四十七右春坊右諭德陳厚耀撰韓史韓世家節文韓之先與周同姓姓姬氏其後苗裔事晉得封於韓原曰韓武子武子後三世有韓厥從封姓為韓晉景公十一年厥與郤克將兵八百乗伐齊敗齊頃公于鞍於是晉作六卿而韓厥在一卿之位號為獻子晉悼公之十年獻子老尋卒子宣子代宣子徙居州宣子名起晉頃公十二年宣子與趙魏共分祁氏羊舌氏十縣定公十五年宣子與趙簡子侵伐范中行氏宣子卒子貞子代立貞子徙居平陽貞子卒子簡子代簡子卒子莊子代莊子卒子康子代康子與趙襄子魏桓子共敗知伯分其地地益大大於諸侯康子卒子武子代武子二年代鄭殺其君幽公十六年武子卒子景侯立世本韓萬生賕伯賕伯生定伯簡簡生輿輿生獻子厥厥生宣子起起生平子頃據國語自桓叔以下嘉吾子之賜或説韓氏是曲沃桓叔之後景侯景侯䖍元年伐鄭取雍丘二年鄭敗我負黍六年與趙魏俱得列為諸侯九年鄭圍我陽翟景侯卒子列侯取立以上史韓世家列侯列侯三年聶政殺韓相俠累史魏世家聶政者軹深井里人也殺人避仇與母姊如齊以屠為事久之濮陽嚴仲子事韓哀侯與韓相俠累有郤嚴仲子恐誅亡去遊求人可以報俠累者至齊齊人或言聶政勇敢士也避仇隠於屠者之間嚴仲子至門請數反然後具酒自觴聶政母前酒酣嚴仲子奉黄金百鎰前為聶政母夀聶政驚怪其厚因謝嚴仲子嚴仲子固進而聶政謝曰臣幸有老母家貧客遊以為狗屠可以旦夕得甘毳以養親親供養備不敢當仲子之賜嚴仲子辟人因為聶政言曰臣有仇而行遊諸侯衆矣然至齊竊聞足下義甚髙故進百金者將用為夫人麤糲之費得以交足下之驩豈敢以有求望邪聶政曰臣所以降志辱身居市井屠者徒幸以養老母老母在政身未敢以許人也嚴仲子固讓聶政竞不肯受也然嚴仲子卒備賓主之禮而去久之聶政母死既已𦵏除服聶政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣臣之所以待之至淺鮮矣未有大功可以稱者而嚴仲子奉百金為親夀我雖不受然是者徒深知政也夫賢者以感忿睚眦之意而親信窮僻之人而政獨安得嘿然而已乎且前日要政政徒以老母老母今以天年終政將為知己者用乃遂西至濮陽見嚴仲子曰前日所以不許仲子者徒以親在今不幸而母以天年終仲子所欲報仇者為誰請得從事焉嚴仲子具告曰臣之仇韓相俠累俠累又韓君之季父也宗族盛多居處兵衛甚設臣欲使人刺之衆終莫能就今足下幸而不棄請益其車騎壯士可為足下輔翼者聶政曰韓之與衛相去中間不甚逺今殺人之相相又國君之親此其勢不可以多人多人不能無生得失生得失則語泄語泄是韓舉國而與仲子為仇豈不殆哉遂謝車騎人徒聶政乃辭獨行杖劍至韓韓相俠累方坐府上持兵㦸而衛侍者甚衆聶政直入上階刺殺俠累左右大亂聶政大呼所擊殺者數十人因自皮面決眼自屠出腸遂以死韓取聶政屍暴於市購問莫知誰子於是韓購縣之有能言殺相俠累者予千金久之莫知也政姊榮一作嫈聞人有刺殺韓相者乃於邑曰其是吾弟與嗟乎嚴仲子知吾弟立起如韓之市而死者果政也㐲尸哭極哀曰是軹深井里所謂聶政者也市行者諸衆人皆曰此人暴虐吾國相王縣購其名姓千金夫人不聞與何敢來識之也榮應之曰聞之然政所以蒙汚辱自棄於市販之間者為老母幸無恙妾未嫁也親既以天年下世妾已嫁夫嚴仲子乃察舉吾弟困汚之中而交之澤厚矣可柰何士固為知己者死今乃以妾尚在之故重自刑以絶從妾其柰何畏殺身之誅終滅賢弟之名大驚韓市人乃大呼天者三卒於邑悲哀而死政之旁晉楚齊衛聞之皆曰非獨政能也乃其姊亦烈女也史刺客傳刺國䇿此文較簡貫博物志云聶政韓相白虹為之日韓非子嚴遂不善周君患之馮沮曰嚴遂相而韓傀貴於君不如行賊於韓傀則君必以為嚴氏也琴操聶政刺韓王者聶政之所作也政父為韓王治劍不成王殺之時政未生及壯問母父何在母告之政欲殺王乃學塗入王宫拔劍刺王不得踰城出去入太山遇僲人學鼓琴漆身為厲吞炭變其音七年而琴成欲入韓國道逢其妻妻對之泣政曰夫人何故泣妻曰聶政出遊七年不歸吾常夢見君對妾笑齒似政故悲而泣政曰天下齒盡政若耳曷為泣乎即復入山中仰天歎曰嗟乎變容易聲欲報仇而為妻所知父讎當何時復援石擊落其齒留山中三年復入韓國人莫知政政鼓琴闕下觀者成行王乃召政政内刀琴中而見王王使之琴政援琴而歌於是左手持衣右手持刀以刺王殺之知當及毋即自犁剥面皮斷其形體人莫能識乃梟裂政市懸金其側有知此人者賜金千斤一婦人徃哭曰嗟乎為父報仇邪顧謂市人曰此聶政也為父報仇知當及毋乃自犁面何愛一女子身而不揚吾子名哉抱政尸而哭絶行脈而死太平御覽引牽合聶政豫讓髙漸離等事為一附㑹明矣繹史史韓世家列侯三年聶政殺韓相俠累俠累即傀也刺客傳作哀侯者誤以後有韓嚴弑哀侯事嚴遂韓嚴兩名相亂故舛九年秦拔我宜陽取六邑十三年列侯卒子文侯立以上史韓世家文侯文侯二年伐鄭取陽城伐宋到彭城執宋君七年伐齊至桑丘鄭反晉九年伐齊至靈丘十年文侯卒子哀侯立以上史韓世家哀侯哀侯元年與趙魏分晉國史韓世家二年滅鄭因徙都鄭史韓世家六年韓嚴弑其君哀侯而子懿侯立年表懿侯作莊侯又紀年云韓山堅弑其君哀侯而若山立若山即懿侯也則韓嚴為韓山堅也戰國䇿又有韓仲子名遂又恐是韓嚴也兩存之懿侯懿侯二年魏敗我馬陵五年與魏惠王㑹宅陽九年魏敗我澮十二年懿侯卒子昭侯立以上史韓世家昭侯一作昭釐侯昭侯元年秦敗我西山二年宋取我黄池六年伐東周取陵觀邢丘八年申不害相韓修術行道國内以治諸侯不侵以上俱史韓世家淮南子申子者韓昭釐之佐韓晉别國也地墽民險而介於大國之閒晉國之故禮未滅韓國之新法重出先君之令未收後君之令又下新故相反前後相繆百官背亂不知所用故刑名之書生焉漢書法家申子六篇韓非子申子曰上明見人備之其不明見人惑之其知見人飾之不知見人匿之其無欲見人司之其有欲見人餌之故曰吾無從知之惟無為可以規之一日申子曰慎而言也人且知女慎而行也人且隨女而有知見也人且匿女而無知見也人且意女女有知也人且臧女女無知也人且行女故曰惟無為可以規之論衡韓用申不害行其三符兵不侵境盖十五年其後不能用之又不察其書兵挫軍破國并於秦十一年昭侯如秦史韓世家韓昭侯使人藏弊袴侍者曰君亦不仁矣弊袴不以賜左右而藏之昭侯曰非子之所知也吾聞明主之愛一嚬一笑嚬有為嚬而笑有為笑今夫袴豈特嚬笑哉吾必待有功者故收藏之未有予也韓子内儲上韓昭釐侯出弋靷偏緩昭釐侯居車上謂其僕曰靷不偏緩乎其僕曰然至舍昭釐侯射鳥其右攝其一靷適之適猶等也昭釐侯已射駕而歸上車適問曰鄉者靷偏緩今適何也其右從後對曰今者臣適之昭釐侯至詰庫令各避舍詰讓也故擅為妄意之道雖當賢主不由也由用也非吕覽處方按此與韓子罪典冠法同韓非子韓昭侯握爪而佯亡一爪求之甚急左右或割其爪而效之昭侯以此察左右之臣不誠韓非子韓昭侯曰吹竽者衆吾無以知其善者田嚴對曰一一而聽之申不害者京人也故鄭之賤臣學術以干韓昭侯昭侯用為相昭侯八年内修政教外應諸侯十五年終申子之身國治兵彊無侵韓者申子之學本于黄老刑名著書二篇號曰申子史申子傳韓昭侯謂申子曰法度甚易行也申子曰法者見功而與賞因能而受官今君設法度而聽左右之請此所以難行也昭侯曰吾自今以來知行法矣寡人奚聽矣韓子外諸左趙令人困申子於韓請兵將以攻魏申子欲言之君而恐君之疑已外市也不則恐惡於趙乃令趙紹韓沓嘗試君之動貌而後言之内則知昭侯之意外則有得趙之功韓子内儲上韓昭釐侯視所以祠廟之牲其豕小昭釐侯按韓昭侯懿侯之子也景侯五世孫昭釐侯令官更之官以是豕來也昭釐侯曰是非向者之豕耶官無以對命吏罪之從者曰君王何以知之君曰吾以其耳也申不害聞之曰申不害鄭之京人昭釐侯之相何以知其聾以其耳之聽也何以知其盲以其目之明也何以知其狂以其言之當也故曰去聽無以聞則聰去視無以見則明去智無以知則公去三者不任則治三者任則亂此以言耳目心智之不足恃也吕覽任數大成午從趙謂申不害於韓曰以韓重我於趙請以趙重子於韓是子有兩韓我有兩趙韓子内儲下申侯嘗請任其從兄昭侯不許申子有怨色昭侯曰所為學干子者欲以治國也今將聽子之謁而廢子之術乎抑其行子之術而廢子之請乎子嘗寡人修功勞視次第今有所私請將奚聽乎申子乃避舍請罪曰君真其人也史申子傳堂谿公見昭侯曰今有白玉之巵而無當無當者有漏不可飲有瓦巵而有當君渴將何以飲君曰以瓦巵堂谿公曰白玉之巵美而君不以飲者以其無當耶君曰然堂谿公曰為人主而漏泄其羣臣之語譬猶玉巵之無當堂谿公毎見而出昭侯必獨卧惟恐夢言泄於妻妾申子曰獨視者謂明獨聽者謂聰能獨斷者故可為天下主韓子外儲右韓昭侯使騎於縣使者報昭侯問曰何見也曰南門之外有黄犢食苗道左者昭侯謂使者毋洩吾所問於女乃下令曰當苗時禁牛馬入人田中國有令而吏不以為事牛馬多入人田中亟舉其數上之不得將重其罪於是三鄉舉而上之昭侯曰未盡也復徃審之乃得南門之外黄犢吏以昭侯為明察皆懼韓子内儲上二十二年申不害死史韓世家二十四年秦來拔我宜陽仝上韓昭侯醉而寢典冠者見君之寒也故加衣於君之上覺寢而說問左右曰誰加衣者左右對曰典冠君因兼罪典衣與典冠其罪典衣以為失其事也其罪典冠以為越其職也非不惡寒也以為侵官之害甚於寒韓子二柄韓昭侯之時黍種常貴甚昭侯令人覆廩吏果竊黍種而糶之甚多韓子内儲下昭僖侯之時宰人上食而羮中有生肝焉昭侯召宰人之次而誚之曰若何為置生肝寡人羮中宰人頓首服死罪曰竊欲去尚宰人也一曰僖侯浴湯中有礫僖侯曰尚浴免則有當代者乎左右對曰有僖侯曰召而來譙之曰何為置礫湯中對曰尚浴免則臣得代之是以然也韓子内儲下韓魏相與爭侵地子華子見昭釐侯昭釐侯韓哀侯之子昭釐侯有憂色子華子曰今使天下書銘於君之前書之曰左手攫之則右手廢右手攫之則左手廢然而攫之必有天下君將攫之乎亡其不與昭釐侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身又重於兩臂韓之輕於天下逺今之所爭者其輕於韓又逺君固愁身傷生以憂之臧不得也臧近也昭釐侯曰善教寡人者衆矣未嘗得聞此言也吕覽審為王又莊子讓韓昭侯二十五年旱作髙門屈宜臼曰屈宜臼楚大夫在魏也韓侯不出此門何也不時吾所謂時者非時日也人固有利不利時韓侯嘗利矣不作髙門徃年秦拔宜陽今年旱韓侯不以此卹民之急而顧益奢此謂時絀舉嬴二十六年髙門成昭侯卒果不出此門子宣惠王立史韓世家苑又說權謀宣惠王宣惠王五年張儀相秦八年魏敗我將韓舉史韓世家韓與魏有隙子順謂韓王曰昭釐侯一世之明君也申不害一世之賢相也韓與魏敵侔之國而釐侯執圭見梁君者非好卑而惡尊慮過而計失也與嚴敵為鄰而動有滅亡之變獨勁不能支二難故降心以相從屈已以求存也申不害慮事而言忠臣也昭釐侯聽而行之明君也今韓弱于始之韓魏弱于始之魏秦强于始之秦而背先人之舊好以區區之衆居二敵之間非良䇿也齊楚逺而難恃秦魏呼吸而至舍近而求逺是以虚名自累而不免近敵之困者也為王計者莫如除小忿全大好也吳越之人同舟濟江中流遇風波其相救如左右手者所患同也今不恤所同之患是不如吳越之舟人也韓王曰善孔叢子中十一年君號為王與趙㑹區鼠十四年秦伐敗我鄢韓宣王問於樛留吾欲兩用公仲公叔其可乎樛留對曰昔魏兩用樓翟樓緩翟璜而亡西河楚兩用昭景楚之二姓而亡鄢郢今君兩用公仲公叔此必將爭事而外市則國必憂矣韓子難一公叔相韓而有功齊公仲甚重於王公叔恐王之相公仲也使齊韓約而攻魏公叔因内齊軍於鄭以刦其君以固其位而信兩國之約韓子内儲下十六年秦敗我脩魚虜得韓將䱸申差於濁澤韓氏急公仲謂韓王曰與國非可恃也今秦之欲伐楚久矣王不如因張儀為和於秦賂以一名都具甲與之南伐楚此以一易二之計也韓王曰善乃警公仲之行將西購於秦楚王聞之大恐召陳軫告之陳軫曰秦之欲伐楚久矣今又得韓之名都一而具甲秦韓並兵而伐楚此秦所禱祀而求也今已得之矣楚國必伐矣王聽臣為之警四境之内起師言救韓命戰車滿道路發信臣多其車重其幣使信王之救已也縱韓不能聽我韓必德王也必不為鴈行以來是秦韓不和也兵雖至楚不大病也為能聽我絶韓於秦秦必大怒以厚怨韓韓之南交楚必輕秦輕秦其應秦必不敬是因秦韓之兵而免楚國之患也楚王曰善乃警四境之内興師言救韓命戰車滿道路發信臣多其車重其幣謂韓王曰不榖國雖小已悉發之矣願大國遂肆志於秦不穀將以楚徇韓韓王聞之大說乃止公仲之行公仲曰不可夫以實伐我者秦也以虚名救我者楚也王恃楚之虚名而輕絶彊秦之敵王必為天下大笑且楚韓非兄弟之國也又非素約而謀伐秦也已有伐形因發兵言救韓此必陳軫之謀也且王已使人報於秦矣今不行是欺秦也夫輕欺彊秦而信楚之謀臣恐王必悔之韓王不聽遂絶於秦秦因大怒益甲伐韓大戰楚救不至史韓世家十九年大破我岸門太子倉質於秦以和史韓世家客有說韓宣王宣王說而大息左右引王之說之以先告客以為德韓子外儲右吳章謂韓宣王曰人主不可佯愛人一日不可復憎不可以佯憎人一日不可復愛也故佯憎佯愛之徵見則諛者因資而毁譽之雖有明主不能復收而况於以誠借人也韓子外儲右二十一年與秦共攻楚圍景座也敗楚將屈匄斬首八萬於丹陽史韓世家史記齊世家楚圍雍氏秦敗屈匄二十四年蘇代謂田軫曰臣願有謁于公其為事甚完使楚利公成為福不成亦為福今者臣立於門客有言曰魏王謂韓馮張儀曰煑棗將拔齊兵又進子來救寡人則可矣不救寡人寡人弗能拔此特轉辭也秦韓之兵毋東旬餘則魏氏轉韓從秦秦逐張儀交臂而事齊楚此公之事成也田軫曰柰何使無東對曰韓馮之救魏之辭必不謂韓王曰馮以為魏必曰馮將以秦韓之兵東却齊宋馮因搏三國之兵乗屈匄之弊南割於楚故地必盡得之矣張儀救魏之辭必不謂秦王曰儀以為魏必曰儀且以秦韓之兵東距齊宋儀將搏三國之兵乗屈匄之弊南割於楚名存亡國實伐三川而歸此王業也公令楚王與韓氏地使秦制和謂秦王曰請與韓地而王以施三川韓氏之兵不用而得地於楚韓馮之東兵之辭且謂秦何曰秦兵不用而得三川伐楚韓以窘魏魏氏不敢東是孤齊也張儀之東兵之辭且謂何曰秦韓欲地而兵有案聲威發於魏魏氏之欲不失齊楚者有資矣魏氏轉秦韓爭事齊楚楚王欲而無與地公令秦韓之兵不用而得地有一大德也秦韓之王刦於韓馮張儀而東兵以狥服魏公常執左券以責於秦韓此其善於公而惡張子多資矣紀年云魏哀王七年楚景圍雍氏韓宣王卒秦助韓共敗楚屈匄史注引此今本不載繹史楚圍雍氏屢見於史記戰國䇿徐廣曰前圍雍氏在周赧王三年後圍雍氏在赧王十五年正義謂韓襄王十二年已下文並是後圍雍氏以規徐說之非索隠曰秦惠王二十六年楚圍雍氏至昭王七年又圍雍氏是再圍也其說與徐廣同劉氏曰前圍雍氏當赧王七年戰國䇿及紀年並不同凡此諸說皆恍惚無據殊不知楚圍雍氏有三考究史文可得而知其一則秦惠王後十三年敗楚屈丐楚圍雍氏齊世家蘇代謂田軫是其事也在周赧王三年其二則秦武王死昭王初立楚懐王怨前韓不救楚於丹陽乃圍雍氏戰國䇿韓令使者求救於秦及徵甲於周即此役也在周赧王八年其三則韓襄王十二年公子咎與蟣蝨爭國遂令楚圍雍氏在赧王十五年是嵗宣惠王卒太子倉立是為襄王史韓世家襄王襄王四年與秦武王㑹臨晉其秋秦使甘茂攻我宜陽五年秦拔我宜陽斬首六萬秦武王卒六年秦復與我武遂九年秦復取我武遂十年太子嬰朝秦而歸十一年秦伐我取穰穰本楚邑秦取之封公子理後屬韓秦昭王取之也與秦伐楚敗楚將唐昧十二年韓太子嬰死公子咎公子蟣虱國䇿作幾瑟爭為太子時蟣虱質于楚蘇代國䇿作冷向謂韓咎曰蟣虱亡在楚楚王欲内之甚今楚兵十餘萬在方城之外公何不令楚王築萬室之都雍氏之旁韓必起兵以救之公必將矣公因以韓楚之兵奉蟣虱而内之其聽公必矣必以楚韓封公也韓咎從其計以上史韓世家與國䇿小異史韓世家蘇代又謂秦太后弟芉戎曰公叔伯嬰恐秦楚之内蟣虱也公何不為韓求質於楚楚王聽入質子於韓則公叔伯嬰知秦楚之不以蟣虱為事必以韓合於秦楚秦楚挾韓以窘魏魏氏不敢合於齊是齊孤也公又為秦求質子於楚楚不聽怨結於韓韓挾齊魏以圍楚楚必重公公挾秦楚之重以積德於韓公叔伯嬰必以國待公於是蟣虱竟不得歸韓韓立咎為太子齊魏王來蘇代為韓立計故得齊魏王來史韓世家楚圍雍氏韓求救於秦秦未為發使公孫昧入韓公仲曰子以秦為且救韓乎對曰秦王之言曰請道南鄭藍田出兵於楚以待公殆不合矣公仲曰子以為果乎對曰秦王必祖張儀之故智楚威王攻梁也張儀謂秦王曰與楚攻魏魏折而入於楚韓固其與國也是孤秦也不如出兵以到國䇿作勁之魏楚大戰秦取西河之外以歸今其狀陽言與韓其實隂善楚公待秦而到必輕與楚戰楚隂得秦之不用也必易與公相支也公戰而勝楚遂與公乗楚施三川而歸公戰不勝楚楚塞三川守之公不能救也竊為公患之司馬庚三反於郢甘茂與昭魚遇於商於其言收璽實類有約也公仲恐曰然則柰何曰公必先韓而後秦先身而後張儀公不如亟以國合於齊楚齊楚必委國於公公之所惡者張儀也其實猶不無秦也於是楚解雍氏圍韓子内儲上三國兵至韓王謂樓緩曰三國之兵深矣寡人欲割河東而講何如對曰夫割河東大費也免國於患大功也此父兄之任也王何不召公子汜而問焉王召公子汜而告之對曰講亦悔不講亦悔王今割河東而講三國歸王必曰三國固且去矣吾特以三城送之不講三國也入韓則國必大舉矣王必大悔曰不獻三城也臣故曰王講亦悔不講亦悔王曰為我悔也寧亡三城而悔無危而悔寡人斷講矣國䇿作秦事在秦昭襄王九年韓襄王之十四年也十四年與齊魏王共擊秦至函谷而軍焉史韓世家十六年秦與我河外及武遂襄王卒太子咎立是為釐王史韓世家釐王釐王三年使公孫喜率周魏攻秦秦敗我二十四萬虜喜伊闕五年秦拔我宛六年與秦武遂二百里十年秦敗我師于夏山十二年與秦昭王㑹西周而佐秦攻齊齊敗湣王出亡十四年與秦㑹西周間西當作兩二十一年使暴䳒音捐救魏為秦所敗䳒走開封二十三年趙魏攻我華陽韓告急於秦秦不救韓相國謂陳筮曰事急願公雖病為一宿之行陳筮見穰侯穰侯曰事急乎故使公來陳筮國䇿作田苓曰未急也穰侯怒曰是可以為公之主使乎夫冠盖相望告敝邑甚急公來言未急何也陳筮曰彼韓急則將變而佗從以未急故復來耳穰侯曰公無見王請令發兵救韓八日而至敗趙魏於華陽之下是嵗釐王卒子桓惠王立以上史韓世家桓惠王桓惠王元年伐燕九年秦拔我陘城汾旁十年秦擊我於太行我上黨郡守以上黨郡降趙十四年秦拔趙上黨殺馬服子卒四十餘萬於長平十七年秦拔我陽城負黍二十二年秦昭王卒二十四年秦拔我城臯滎陽二十六年秦悉拔我上黨以上史韓世家韓聞秦之好興事欲疲之毋令東伐乃使水工鄭國間說秦韓桓惠王二十八年令鑿涇水自中山西扺瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺鄭國鄭國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠渠成用注填閼之水溉澤鹵之地四萬餘頃收皆畆一鍾于是闗中為沃野無凶年秦以富强卒併諸侯因名曰鄭國渠史河渠書二十九年秦拔我十三城史韓世家三十四年桓惠王卒子王安立史韓世家王安王安五年秦攻韓韓急使韓非使秦秦留非因殺之九年秦虜王安盡入其地為潁川郡韓遂亡以上史韓世家雜録韓氏城新城今河南新城故戎蠻子國期十五日而成段喬為司空有一縣後二日段喬執其吏而囚之囚者之子走告封人子髙曰惟先生能活臣父之死願委之先生封人子髙曰諾乃見段喬自扶而上城封人子髙左右望曰美哉城乎一大功也子必有厚賞矣自古及今功若此其大也而能無有罪戮者未嘗有也封人子髙出段喬使人夜解其吏之束縳也而出之吕覽開春張譴相韓病將死公乗無正懷三十金而問其病居一月自問張譴曰若子死將誰使代子答曰無正重法而畏上雖然不如公子食我之得民也張譴死因相公乗無正韓子說林說苑韓褐子濟於河津人告曰夫人過於此者未有不快用者也而子不用乎韓褐子曰天子祭海内之神諸侯祭封域之内大夫祭其親士祭其祖禰褐也未得事河伯也津人申楫舟中水而運津人曰向也役人固已告矣夫子不聽役人之言也今舟中水而運甚殆治裝衣而下遊乎韓子曰吾不為人之惡我而改吾志不為我將死而改吾義言未已舟泆然行韓褐子曰詩云莫莫葛藟施于條枚愷悌君子求福不回鬼神且不回况於人乎春秋戰國異辭卷四十七
