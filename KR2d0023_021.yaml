body:
  text: 春秋戰國異辭卷十九右春坊右諭德陳厚耀撰齊景公上景公元年初崔杼生子成及彊其母死取東郭女生明東郭女使其前夫子無咎與其弟偃相崔氏成有罪二相急治之立明為太子成請老於崔杼崔杼許之二相弗聽曰崔宗邑不可成彊怒告慶封慶封與崔杼有郤欲其敗也成彊殺無咎偃於崔杼家家皆奔亡崔杼怒無人使一宦者御見慶封慶封曰請為子誅之使崔杼仇盧蒲嫳攻崔氏殺成彊盡滅崔氏崔氏婦自殺崔杼歸亦自殺慶封為相國専權史齊世家晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人將加大誅於子晏子對曰臣請改道易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰甚善矣子之治東阿也晏子對曰前臣之治東阿也屬託不行貨賂不至陂池之魚以利貧民當此之時民無飢者而君反以罪臣今臣之後治東阿也屬託行貨賂至并㑹賦斂倉庫少內便事左右陂池之魚入於權家當此之時飢者過半矣君乃反迎而賀臣臣愚不能復治東阿願乞骸骨避賢者之路再拜便辟景公乃下席而謝之曰子强復治東阿東阿者子之東阿也寡人無復與焉說苑政理又晏子卷四晏子卷三景公使晏子為東阿宰三年毁聞於國景公不悅召免之晏子謝曰嬰知嬰之過矣請復治阿三年而譽必聞於國景公復使治阿三年譽果聞於國景公說召而賞之且問故對曰昔者嬰之治阿也築蹊徑急門閭之政而淫民惡之舉儉力孝弟罰偷窳而惰民惡之决獄不避貴彊惡之左右所求法則豫非法則否而左右惡之事貴人體不過禮而貴人惡之是以三邪毁乎外二讒毁於內三年而毁聞乎君也今臣請更之不築蹊徑而緩門閭之政而淫民悅不舉儉力孝弟不罰偷窳而惰民悅决獄阿貴彊而貴彊悅左右所求言諾而左右悅事貴人體過禮而貴人悅是三邪譽乎外二讒譽乎內三年而譽聞乎君也昔者嬰之所以當誅者宜賞今之所以當賞者宜誅是故不敢受景公知晏子賢乃任以國政三年而齊大興又子華子略同齊景公縱酒醉而解衣冠鼓琴以自樂琴一作缶顧左右曰仁人亦樂此乎左右曰左右一作梁丘子仁人耳目亦猶人也何為不樂乎景公曰速駕迎晏子晏子朝服而至景公曰今者寡人此樂願與大夫同之請去禮晏子曰君言過矣齊國五尺之童以上力皆能勝嬰與君所以不敢者畏禮也天子無禮則無以守社稷諸侯無禮則無以守其國大夫無禮則無以治其家為人上無禮則無以使其下為人下無禮則無以事其上夫麋鹿惟無禮故父子同麀人之所以貴於禽獸者禮也詩云人而無禮胡不遄死故禮不可去也景公色愧離席而謝曰寡人無良左右淫湎寡人以至此請殺左右以補其過晏子曰君好禮則有禮者至無禮者去君惡禮則無禮者至有禮者去左右何罪乎景公曰善哉乃更衣而坐觴酒三行晏子辭去景公拜送韓詩卷九卷又新序卷六晏子四略同翟王子羡臣於景公以重駕公觀之而不悅也嬖人嬰子欲觀之公曰及晏子寢病也居囿中臺上以觀之嬰子說之因為之請曰厚祿之公許諾晏子起病而見公公曰翟王子羡之駕寡人甚說之請使之示子晏子曰駕御之事臣無職焉公曰寡人一樂之是欲祿之以萬鍾其足乎對曰昔衛士東野之駕也公說之嬰子不說公因不說遂不觀今翟王子羡之駕也公不說嬰子說公因說之為請公許之則是婦人為制也且不樂治人而樂治馬不厚祿賢人而厚祿御夫昔者先君桓公之地狹於今修法制廣政教以霸諸侯今君一諸侯無能親也嵗凶年飢道途死者相望也君不此憂恥而惟圖耳目之樂不修先君之功烈而惟飾駕御之伎則公不顧民而忘國甚矣且詩曰載驂載駟君子所誡夫駕八固非制也今又重此其為非制也不滋甚乎且君茍美樂之國必衆為之田獵則不便道行致逺則不可然而用馬數倍此非御下之道也淫於耳目不當民務此聖王之所禁也君茍美樂之諸侯必或效我君無厚德善政以被諸侯而易之以僻此非所以子民彰名致逺親鄰國之道也且賢良廢滅孤寡不振而聽嬖妾以祿御夫而蓄怨與民為仇之道也詩曰哲夫成城哲婦傾城今君不思成城之求而惟傾城之務國之亡日至矣君其圖之公曰善遂不復觀乃罷歸翟王子羡而疏嬖人嬰子晏子卷一景公正晝被髮乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慚而不朝晏子睹裔欵欵一作敖而問曰君何故不朝對曰昔者君正晝被髮乘六馬御婦人出正閨則跪擊其馬而反之曰爾非吾君也公慚而反不果出是以不朝晏子入見公告之曰寡人以天子大夫之賜得率百姓以守宗廟今見戮於刖跪以辱社稷吾猶可齊於諸侯乎晏子對曰君無惡焉臣聞之下無直辭上無隱君民多諱言君有驕行古者明君在上下有直辭君上好善民無諱言今君有失行而刖跪有直辭是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諌公笑曰可乎晏子曰可於是令刖跪倍資無正時朝無事說苑正諌景公為西曲潢其深滅軌髙三仭橫木龍蛇立木鳥獸公衣黼黻之衣素繡之裳一衣而五綵具焉帶球玉而冠且被髮亂首南面而立傲然見晏子曰昔仲父之霸何如晏子抑首而不對公又曰昔管文仲之霸何如晏子對曰臣聞之維翟人與龍蛇比今君橫木龍蛇立木鳥獸亦室一就矣何睱及霸哉且伐宫室之美矜衣服之麗一衣而五綵具焉帶球玉而亂首被髮亦室一容矣萬乘之君而一心於邪君之魂魄亡矣誰與圖霸哉公下堂就晏子曰梁丘據裔欵以室之成告寡人是以竊襲此服與據為笑寡人請改室易服而敬聼命晏子曰夫二子營君以邪公安得知道且伐木不自其根則蘖又生也公何不去二子毋使耳目淫焉晏子卷一景公之嬖妾嬰子死公守之三日不食膚著於席不去左右以復而君無聽焉晏子入復曰有術客與醫俱言曰聞嬰子病死願請治之公喜遽起曰病猶可為乎晏子曰客之道也以為良醫也請嘗試之公請屏潔沐浴飲食間病者之宫彼亦將有鬼神之事公曰諾屏而沐浴晏子令棺人入殮已殮而復曰醫不能治病者殮矣不敢不以聞公作色不悅曰夫子以醫命寡人而不使視將殮而不以聞吾之為君名而已矣晏子曰君獨不知死者之不可以生耶嬰聞之君正臣從謂之順君僻臣從謂之逆今君不道順而行僻從邪者邇導害者逺讒諛萌而賢良滅是以諂諛繁於間邪行交於國也昔吾先君桓公用管仲而霸嬖豎刁而滅今君薄於賢人之禮而厚嬖妾之哀且古聖王畜私不傷行殮死不失愛送死不失哀行傷則溺已愛失則傷生哀失則害性是故聖王節之也畢殮不留生事棺槨衣衾不以害生養哭泣處哀不以害生道今朽尸以留生廣愛以傷行修哀以害性君之失矣故諸侯之賔客慙入吾國本朝之臣慙守其職崇君之行不可以導民從君之欲不可以持國且嬰聞之朽而不殮謂之僇尸臭而不收謂之陳胔明王之性行百姓之誹而內嬖妾於僇胔此之為不可公曰寡人不識請因夫子而為之晏子復曰國之士大夫諸侯四鄰賔客皆在外君其哭而節之仲尼聞之曰星之昭昭不如月之曀曀小事之成不若大事之廢君子之非賢於小人之是也其晏子之謂歟晏子卷一公孫接田開疆古冶子事景公以勇力搏虎聞晏子過而趨三子不起晏子入見公曰臣聞明君之蓄勇力之士也上有君臣之義下有長率之倫內可以禁暴外可以威敵上利其功下服其勇故尊其位重其祿今君蓄勇力之士上無君臣之義下無長率之倫內不以禁暴外不可威敵此危國之器也不若去之公曰三子者搏之恐不得刺之恐不中也晏子曰此皆力攻勍敵之人也無長幼之禮因請公使人餽之二桃曰三子何不計功而食桃公孫接迎天歎曰晏子智人也使公計吾功不受桃是無勇也士衆而桃寡何不計功而食桃矣吾一搏􅢢而再搏乳虎若接之功可以食桃矣援桃而起田開疆曰吾伏兵而却三軍者再若開疆之功亦可以食桃矣援桃而起古冶子曰吾嘗從君濟於河黿銜左驂以入砥柱之流冶少不能遊潛行逆流百步順流九里得黿而殺之左操驂尾右挈黿頭鶴躍而出津人皆曰河伯也冶視之則大黿之首若冶之功可以食桃而無與人同矣二子何不反桃抽劔而起公孫接田開疆曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也反桃皆挈領而死古冶子曰二子死之冶獨生之不仁恥人以言而夸其聲不義恨乎所行不死無勇雖然二子同桃而節冶専其桃而宜亦反其桃挈領而死使者復曰已死矣公斂之以服葬之以士禮焉晏子卷一城三齊記云三壯士冡在齊東南三百步蕩隂里中景公為履黃金之綦飾以銀連以珠良玉之絇其長尺氷月服之以聽朝晏子朝公迎之履重僅能舉足問曰天寒乎晏子曰君奚問天之寒也古聖人製衣服也冬輕而暖夏輕而凉今君之履氷月服之是重寒也履重不節是過任也失生之情矣故魯工不知寒溫之節輕重之量以害正性其罪一也作服不常以笑諸侯其罪二也用財無功以怨百姓其罪三也請拘而使吏度之公曰苦矣釋之晏子曰不可嬰聞之苦身為善者其賞厚苦身為非者其罪重公不對晏子出令吏拘魯工送之境吏不得入公撤履不復服也晏子卷一景公嘗賞賜及後宫文繡被臺榭菽粟食鳬雁出而見殣謂晏子曰此何為死晏子對曰此餒而死公曰嘻寡人之無德也何甚矣晏子對曰君之德著而彰何為無德也景公曰何謂也對曰君之德及後宫與臺榭君之玩物衣以文繡君之鳬雁食以菽粟君之營內自樂延及後宫之族何為其無德也顧臣願有請於君由君之自樂之心推而與百姓同之則何殣之有君不推此而茍營內好私使財貨偏有所聚菽粟幣帛腐於囷府惠不遍加於百姓公心不周乎國則桀紂之所以亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛德公布之於天下則湯武可為也一殣何足恤哉說苑至公子又晏卷四景公之時雨雪三日而不霽公被狐白之裘坐堂側陛晏子入見立有間公曰怪哉雨雪三日而天不寒晏子對曰天不寒乎公笑晏子曰嬰聞古之賢君飽而知人之飢溫而知人之寒逸而知人之勞今君不知也公曰寡人聞命矣乃令出裘發粟與飢寒令所覩於塗者無問其鄉所覩於里者無問其家循國計數無言其名士既事者兼月疾者兼嵗晏子卷一景公問於晏子曰寡人欲從夫子而善齊國之政對曰嬰聞之國具官而後政可善景公作色曰齊國雖小則何為不具官乎對曰此非臣之所復也昔先君桓公身體墮懈辭令不給則隰朋侍左右多過刑罰不中則弦章侍居處肆縱左右懾畏則東郭牙侍田野不修人民不安則寧戚侍軍吏怠戎士偷則王子城父侍德義不中信行衰微則管子侍先君能以人之長續其短以人之厚補其薄是以辭令窮逺而不逆兵加於有罪而不頓是故諸侯朝其德而天子致其胙今君之失多矣未有一士以聞者也故曰未具景公曰善吾聞髙繚與大夫游寡人請見之晏子曰臣聞為地戰者不能成王為祿仕者不能成政若髙繚與嬰為兄弟久矣未嘗干嬰之過補嬰之闕特進仕之臣也何足以補君說苑君道又晏子卷二少異齊侯問於晏子曰忠臣之事君也何若對曰有難不死出亡不送君曰列地而與之疏爵而貴之君有難不死出亡不送可謂忠乎對曰言而見用終身無難臣奚死焉諌而見從終身不亡臣奚送焉若言不見用有難而死是妄死也諌不見從出亡而送是詐為也故忠臣也者能盡善與君而不能與陷於難新序卷五子又說苑臣術晏卷二晏子復於景公曰朝居嚴乎公曰朝居嚴則曷害於治國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害治國家如何也且合菽粟之微以滿倉廩合疏縷之緯以成幃幕泰山之髙非一石也纍卑然後髙也夫治天下者非用一士之言也固有受而不用惡有距而不入者哉說苑正諌景公遊於壽宫覩長年負薪而有飢色公悲之喟然歎曰令吏養之晏子曰臣聞之樂賢而哀不肖守國之本也今君愛老而恩無不逮治國之本也公笑有喜色晏子曰聖王見賢以樂賢見不肖以哀不肖今請求老弱之不飬鰥寡之不室者論而供秩焉景公曰諾於是老弱有養鰥寡有室說苑貴德三又晏子卷景公大吕成謂晏子曰吾欲與夫子燕對曰未祀先君而以燕非禮也公曰何以禮為對曰夫禮者民之紀紀亂則民失亂紀失民危道也公曰善乃以祀焉晏子卷一晏子侍於景公朝寒請進熱食對曰嬰非君之厨養臣也敢辭公曰請進服裘對曰嬰非君田澤之臣也田澤一作茵席敢辭公曰然夫子於寡人奚為者也對曰社稷之臣也公曰何謂社稷之臣對曰社稷之臣能立社稷辨上下之宜使得其理制百官之序使得其宜作為辭令可分布於四方自是之後君不以禮不見晏子也說苑臣術又晏子卷三齊景公登射晏子修禮而侍公曰選射之禮寡人厭之矣吾欲得天下勇士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也夫臣勇多則弒其君子力多則弒其長然而不敢者惟禮之謂也禮者所以御民也轡者所以御馬也無禮而能治國家者嬰未之聞也景公曰善乃飭射更席以為上客終日問禮說苑修文又晏子卷一景公問晏子曰天下有極大乎晏子對曰有足遊浮雲背凌蒼天尾偃天問躍啄北海頸尾咳於天地乎然而漻漻不知六翮之所在公曰天下有極細乎晏子對曰有東海有蠱巢於蚊睫再乳再飛而蚊不為驚臣不知其名而東海漁者命曰焦冥晏子卷四然宋玉大小言之祖也殊無意義景公謂晏子曰東海之中有水而赤其中有棗華而不實何也晏子對曰昔者秦繆公乘龍而理天下以黃布裹蒸至東海而捐其布彼布黃故水赤棗蒸故華而不實公曰吾佯問子耳對曰嬰聞之佯問者亦佯對之也百家類纂引晏子今本無梁丘據謂晏子曰吾至死不及夫子矣晏子曰嬰聞之為者常成行者常至嬰非有異於人也常為而不置常行而不休者故難及也說苑建本又晏子卷三崔杼與慶封既謀殺齊莊公更立景公崔杼相之慶封又欲殺崔杼而代之相於是㧻崔杼之子令之爭後崔杼之子相與私闂闂讀近鴻鬪也崔杼往見慶封而告之慶封謂崔杼曰且留吾將興甲以殺之因令盧蒲嫳興甲以誅之盡殺崔杼之妻子及枝屬燒其室屋報崔杼曰吾已誅之矣崔杼歸無歸因而自絞也景公二年事襄吕覽愼行約左二十七年傳三年十月慶封出獵初慶封已殺崔杼益驕嗜酒好獵不聽政令慶舍用政已有內郤田文子謂桓子曰亂將作田鮑髙欒氏相與謀慶氏慶舍發甲圍慶封宫四家徒共擊破之慶封還不得入奔魯齊人讓魯封奔吳吳與之朱方聚其族而居之富於在齊其秋齊人徙葬莊公僇崔杼尸於市以說衆晏子使晉晉平公享之問曰昔吾先君得衆若何晏子對曰君享寡君施及使臣左襄二十八年齊景公朝晉御在君側恐懼不知所以對平公曰聞子大夫數矣今乃得見願終聞之晏子對曰臣聞君子如淵衆人歸之如魚若淵澤决竭其魚動流夫往者維雨乎不可復也公又問曰請問莊公與今孰賢晏子曰兩君之行不同臣不敢知也公曰王室之正也諸侯之専制也是以欲聞子大夫之言對曰先君莊公不安靜處樂節飲食不好鐘鼓好兵作武士與同飢渴寒暑君之强過人之量有一過不能已焉是以不免於難今君大宫室美臺榭以辟飢渴寒暑畏禍敬鬼神君之善足以沒身不及子孫矣晏子卷二景公問晏子曰昔吾先君桓公豫管仲狐與榖其縣十七著之於帛申之以䇿通之諸侯以為其子孫賞邑寡人不足以辱而先君今為夫子賞邑通之子孫晏子對曰昔聖王論功而賞賢賢者得之不肖者失之御德修禮無有怠荒今事君而免於罪者其子孫奚宜與焉若為齊國大夫者必有賞邑則齊君何以共其社稷與諸侯幣帛嬰請辭遂不受晏子卷四慶封為亂於齊而欲走越齊景公三年魯襄之二十八年其族人曰晉近奚不之晉慶封曰越逺利以避難族人曰變是心也居晋而可不變是心也雖逺越其可以安乎韓子說林景公祿晏子以平陰與槀邑及市者十一社晏子辭曰吾君好治宫室民之力弊矣又好盤游玩好以飾女子民之財竭矣又好興師民之死近矣弊其力竭其才近其死下之疾上甚矣此嬰之所以不敢受也公曰君子獨不欲富與貴乎晏子曰嬰聞為人臣者先君而後身安國而度家曷為不欲富與貴也公曰然則曷以祿夫子晏子對曰君薄商漁鹽關市譏而不征耕者十取一焉弛刑罰若死者刑刑者罰罰者免此三言者嬰之祿君之利也公曰此三言者寡人無事焉請以從夫子晏子卷三晏子朝乘敝車駕駑馬景公見之曰嘻夫子之祿寡耶何乘不任之甚也晏子對曰賴君之賜得以夀三族及國交遊皆得生焉臣得暖衣足食敝車駑馬以奉其身于臣足矣晏子出公使梁丘據遺之輅車乘馬三返不受公不悅趣召晏子晏子至公曰夫子不受寡人亦不乘晏子對曰君使臣臨百官之吏節其衣服飲食之養以先齊國之人然猶恐侈靡而不顧其行也今輅車乘馬君乘之上臣亦乘之下民之無義侈其衣食而不顧其行者臣無以禁之遂讓不受也說苑臣術又晏子卷三晏子方食君之使者至分食而食之晏子不飽使者返言之景公景公曰嘻夫子之家若是其貧也寡人不知也是寡人之過也令吏致千家之縣一于晏子晏子再拜而辭曰嬰之家不貧以君之賜澤覆三族延及交遊以振百姓君之賜也厚矣嬰之家不貧也嬰聞之厚取之君而厚施之人代君為君也忠臣不為也厚取之君而藏之是筐篚存也仁人不為也厚取之君而無所施之身死而財遷智者不為也嬰也聞為人臣進不事上以為忠退不克下以為廉八升之布一豆之食足矣使者三返遂辭不受也說苑臣術三又晏子卷晏子相景公食脫粟之食炙三弋五卵苔菜耳矣公聞之往燕焉睹晏子之食也公曰嘻夫子之家如是其貧乎而寡人不知寡人之罪也景子對曰以世之不足也脫粟之食飽士之一乞也炙三弋士之二乞也五卵士之三乞也嬰無倍人之行而有參士之食君之賜厚矣嬰家不貧也再拜而謝晏子卷三景公賜晏子狐白之裘𤣥豹之皮其資千金使梁丘據致之晏子辭而不受三反公曰寡人有此二將欲服之今夫子不受寡人不敢服與其閉藏之豈如弊之身乎晏子曰君就賜使嬰修百官之政君服之上而使嬰服之於下不可以為教固辭而不受晏子卷四景公飲酒陳桓子侍望見晏子而復於公曰請浮晏子公曰何故也對曰晏子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是隱君之賜也公曰諾酌者奉觴而進之曰君命浮子晏子曰何故也陳桓子曰君賜之卿位以尊其身寵之百萬以富其家羣臣之爵莫尊於子祿莫厚於子今子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝則是隱君之賜也故浮子晏子避席曰請飲而後辭乎其辭而後飲乎公曰辭然後飲晏子曰君賜卿位以顯其身嬰不敢為顯受也為行君令也寵之百萬以富其家嬰不敢為富受也為通君賜也臣聞古之賢臣有受厚賜而不顧其國族則過之臨事守職不勝其任則過之君之內𨽻臣之父兄若有離散在於野鄙者此臣之罪也君之外𨽻臣之所職若有播亡在四方者此臣之罪也兵革不完戰車不修此臣之罪也若夫敝車駑馬以朝主者非臣之罪也且臣以君之賜臣父之黨無不乘車者母之黨無不足於衣食者妻之黨無凍餒者國之簡士待臣而後舉火者數百家如此為隱君之賜乎彰君之賜乎公曰善為我浮無宇也說苑臣術子又晏卷三晏子之妻使人布衣紵表田無宇譏之曰出於室何為者也晏子曰家臣也田無宇曰位為中卿食田七十萬何用是人為畜之晏子曰棄老取少謂之瞽貴而忘賤謂之亂見色而說謂之逆吾豈以逆亂瞽之道哉韓詩卷九景公有愛女欲嫁於晏子公乃往燕晏子之家飲酒酣公見其妻曰此子之內子耶晏子曰然公曰嘻老且惡矣寡人有女少且姣請以滿夫子之宫晏子違席而對曰乃此則老且惡嬰與之居故矣故及其少而姣也且人固以壯託乎老姣託乎惡彼嘗託而嬰受之矣君雖有賜可以使嬰倍其託乎再拜而辭晏子卷三景公過晏子曰子宫小近市請徙子家豫章之圃晏子再拜而辭曰嬰家貧待市食而朝暮趨之不可以逺景公笑曰子家習市識貴賤乎是時景公繁於刑晏子對曰踊貴而屨賤公曰何故對曰刑多也公造然變色曰寡人其暴乎於是損刑五韓子難二年詳左昭三地志山東昌樂縣有清節里晏子之宅近市景公欲易之晏子曰吾生則近市死豈易志後人因名景公謂晏子曰寡人欲朝夕見為夫子築室於閨內可乎晏子對曰臣聞之隱而顯近而結惟至賢耳如臣者飾其容止以待承令猶恐罪戾今君近之是逺之也請辭晏子卷三晏子使於晉景公九年晉平公問曰吾子之君德行髙下何如晏子對以小善公曰否吾非問小善也晏子蹴然曰諸侯之交紹而相見辭之有所隱也君之命質臣無所隱嬰之君無稱焉平公蹴然而辭送再拜而反曰殆哉吾過誰曰齊君不肖直稱之士正在本朝也晏子卷二晏子之晋見披裘負芻息於途者以為君子也使人問焉曰曷為而至此對曰齊人纍之吾名曰越石甫晏子曰嘻遽解左驂以贖之載而與歸至舍不辭而入越石甫怒而請絶晏子使人應之曰嬰未嘗得交也今免子於患吾於子猶未可耶越石甫曰吾聞君子詘乎不知己而信乎知己者吾是以請絶也晏子乃出見之曰向也見客之容而今也見客之意嬰聞察實者不留聲觀行者不譏辭察人之實不留意考其聲名觀人之行不譏刺之以文辭嬰可以辭而弗棄乎越石甫曰夫子禮之敢不敬從晏子遂以為上客新序卷七世又吕覽觀九年景公使晏嬰之晋與叔向私語曰齊政卒歸田氏田氏雖無大德以公權私有德於民民愛之史齊世家史記管晏傳越石父賢在縲紲中晏子出遭之塗解左驂贖之載歸弗謝入閨久之越石甫請絶晏子戄然攝衣冠謝曰嬰雖不仁免子於厄何子求絶之速也石父曰不然吾聞君子詘於不知己而信於知己信伸同方吾在縲紲中彼不知我也夫子既以感寤而贖我是知己也知己而無禮固不如在縲紲之中晏子於是延為上客齊景公出田十有七日而不反晏子乘而往比至衣冠不正景公見而怪之曰夫子何遽乎得毋有急乎晏子對曰然有急國人皆以君為惡民好禽臣聞之魚鱉厭深淵而就乾淺故得於釣網禽獸厭深山而下於都澤故得於田獵今君出田十有七日而不反不亦過乎景公曰不然為賔客莫應待耶則行人子牛在為宗廟而不血食耶則祝人太宰在為獄不中耶則大理子幾在為國家有餘不足耶則巫賢在寡人有四子猶有四肢也而得代又何患焉晏子曰然人心有四肢而得代焉則善矣令四肢無心十有七日不死乎景公曰善哉言遂援晏子之手與驂乘而歸韓子卷十與晏子小異晏子卷一景公田於署梁十有八日而不返晏子自國往見公比至衣冠不正望游而馳公望見晏子下而急帶曰夫子為何遽國家無有故乎景子對曰不急也雖然嬰願有復也國人皆以君為安野而不安國好獸而惡民毋乃不可乎公曰何哉吾為夫婦獄訟之不正乎則泰仕子牛存矣為社稷宗廟之不享乎則泰祀子游存矣為諸侯賔客莫之應乎則行人子羽存矣為田野之不辟倉庫之不實則申田存矣為國家之有餘不足聘乎則吾子存矣寡人之有五子猶心之有四肢心有四肢故心得佚焉今寡人有五子故寡人得佚焉豈不可哉晏子對曰嬰聞之與君言異心有四肢而心得佚焉可令四肢無心十有八日不亦久乎公於是罷田而歸齊景公好馬令善畫者圗之訪似者朞年不得符子景公遊于紀得金刀發視之中有月書曰食魚無反勿乘駑馬公曰善哉知言食魚無反則惡其鱢也勿乘駑馬惡其取道不逺也晏子對曰不然食魚無反毋盡民力乎勿乘駑馬則無置不肖於側乎公曰紀有書何以亡也晏子對曰嬰聞之君子有道懸之閭紀有此言注之刀其不亡何待乎晏子卷三齊景公出獵上山見虎下澤見蛇歸召晏子而問之曰今日寡人出獵上山見虎下澤見蛇殆所謂不祥也晏子曰國有三不祥是不與焉夫有賢而不知一不祥知而不用二不祥用而不任三不祥今上山見虎虎之室也下澤見蛇蛇之穴也虎之室蛇之穴曷為不祥說苑臣道又晏子卷一景公獵休坐地而食晏子後至左右滅葭而席公不說曰寡人不席而坐地二三子莫席而子獨搴草而坐之何也晏子對曰吾聞介胄坐陳不席獄訟不席尸坐堂上不席三者皆憂也故不敢以憂侍坐公曰諾令人下席曰大夫皆席寡人亦席矣晏子卷一說苑雜言齊景公問晏子曰寡人自以坐地二三子皆坐地吾子獨搴草而坐之何也晏子對曰嬰聞之惟喪與獄坐於地今不敢以喪獄之事侍於君也齊景公出弋昭華之地顔鄧聚主鳥而亡之景公怒欲殺之晏子曰夫鄧聚有死罪四請數而誅之景公曰諾晏子曰鄧聚為吾君主鳥而亡之是罪一也使吾君以鳥之故而殺人是罪二也使四國諸侯聞之以吾君重鳥而輕士是罪三也天子聞之必將貶絀吾君危其社稷絶其宗廟是罪四也此四罪者故當殺無赦臣請加誅焉景公曰止是亦吾過矣願夫子為寡人敬謝焉韓詩卷九說苑正諫景公好弋使燭雛主鳥而亡之燭雛一作燭鄒一作顔涿聚景公怒而欲殺之晏子曰燭雛有罪請數之以其罪乃殺之景公曰可於是乃召燭雛數之景公前曰汝為吾君主鳥而亡之是一罪也使吾君以鳥之故殺人是二罪也使諸侯聞之以吾君重鳥而輕士是三罪也數燭雛罪已畢請殺之景公曰止勿殺而謝之又晏子卷四景公畋於梧邱夜猶蚤公姑坐睡而夢有五丈夫北面韋盧稱無罪焉公覺召晏子而告其所夢公曰我其嘗殺不辜而誅無罪耶晏子對曰昔者先君靈公畋五丈夫罟而駭獸故殺之斷其首而葬之曰五丈夫之丘其此耶公令人掘而求之則五頭同穴而存焉公曰嘻令吏葬之國人不知其夢也曰君憫白骨而况於生者乎不遺餘力矣不釋餘智矣說苑辨物又晏子卷三齊景公病水卧十日夜夢與二日鬪而不勝晏子朝公曰吾夢與二日鬪寡人不勝我其死也晏子曰請召占夢者立於閨使以車迎召占夢者至曰曷為見召晏子曰公夢與二日鬪不勝恐必死也占夢者曰請反具書晏子曰無反書公無所病病者隂也日者陽也一隂不勝二陽公病將已居三日公病大愈且賜占夢者曰此非臣之功也晏子教臣對也公召晏子將賜之晏子曰占夢者以臣之言對故有益也使臣身言之則不信矣此占夢者之力也臣無功焉公召吏而使兩賜之風俗通卷九子又詳晏卷三齊景公游於牛山北臨其國城而流涕曰美哉國乎鬱鬱芊芉若何滂滂去此國而死乎使古無死者寡人將去斯而何之史孔梁丘據皆從而泣曰臣賴君之賜脆食惡肉可得而食駑馬稜車可得而乘也且猶不欲死而况吾君乎晏子獨笑於旁公雪涕而顧晏子曰寡人今日之遊悲孔與據皆從寡人而泣子之獨笑何也晏子對曰使賢者常守之則太公桓公將常守之矣使有勇者而常守之則莊公靈公常守之矣數君者常守之吾君方將披蓑笠而立乎畎畝之中惟事之恤何暇念死乎何暇一作行假則吾君又安得此位而立焉以其迭處之迭去之至於君也而獨為之流涕是不仁也見不仁之君見諂諛之臣臣見此二者臣之所為獨竊笑也景公慙焉舉觴自罰罰二臣者各二觴焉列子力命又又晏子卷一韓詩卷十略同史孔梁丘據作國子髙子此與左昭二十年傳稍别齊景公遣晏子南使楚楚王聞之謂左右曰齊遣晏子使寡人之國幾至矣左右曰晏子天下之辨士也與之議國家之務則不如也與之論往古之術則不如也王可與晏子坐使有司束人過王王問之使言齊人善盜故束之是宜可以困之王曰善晏子至王與之坐圖國之急務辨當世之得失再舉再窮王默然無以續語居有間束徒以過王曰何為者也有司對曰是齊人善盜束而詣吏王欣然大笑曰齊乃冠帶之國辨士之化固善盜乎晏子曰然王不見夫江南之樹乎其名曰橘樹之江北則化為枳何則土地使然爾夫子處齊之時冠帶而立􅌂有伯夷之亷今居楚而善盜意土地之化使然爾王又何怪乎韓詩卷十晏子卷三晏子將至楚楚聞之謂左右曰晏嬰齊之習辭者也今方來吾欲辱之何以也左右對曰為其來也臣請縛一人過王而行王曰何為者也對曰齊人也王曰何坐曰坐盜晏子至楚王賜晏子酒酒酣吏縛一人詣王王曰縛者曷為者也對曰齊人也坐盜王視晏子曰齊人固善盜乎晏子避席對曰嬰聞之橘生淮南則為橘生於淮北則為枳葉徒相似其實味不同所以然者何水土異也今民生長於齊不盜入楚則盜得毋楚之水土使民善盜耶王笑曰聖人非所與嬉也寡人反取病焉又說苑奉使稍别晏子使楚晏子短楚人為小門於大門之側而延晏子晏子不入曰使至狗國者從狗門入今臣使楚不當從此門儐者更從大門入見楚王王曰齊無人耶晏子對曰齊之臨淄三百閭張袂成帷揮汗成雨比肩繼踵而在何為無人王曰然則何為使子晏子對曰齊命使各有所主其賢者使賢主不肖者使不肖主嬰最不肖故宜使楚耳說苑奉使三又晏子卷景公使晏子使於楚楚王進橘置削晏子不剖而并食之楚王曰橘當去剖晏子對曰臣聞之賜人主前者瓜桃不削橘柚不剖今萬乘無教臣不敢剖然臣非不知也說苑奉使三又晏子卷齊景公使人於楚楚王與之上九重之臺顧使者曰齊有臺若此乎使者曰吾君有治位之坐土階三等茅茨不剪朴椽不斫者猶以謂為之者勞居之者泰吾君惡有臺若此者於是楚王蓋悒如也韓詩卷八慶封走如魯齊人以為讓又去魯而如吳吳王豫之朱方楚靈王聞之率諸侯以攻吳圍朱方拔之得慶封齊景公十年事負之斧質以狥於諸侯軍因令其呼之曰毋或如齊慶封弒其君而弱其孤以亡其大夫乃殺之吕覽慎行約左傳文晏子使吳吳王謂行人曰吾聞晏嬰蓋北方之辨於辭習於禮者也命儐者客見則稱天子明日晏子有事行人曰天子請見晏子憱然者三曰臣受命敝邑之君將使於吳王之所以不敏而迷惑入於天子之朝敢問吳王惡乎存然後吳王曰夫差請見見以諸侯之禮晏子卷三又說苑奉使晏子使吳吳王曰寡人得寄僻陋蠻夷之鄉希見教君子之行請私而毋為罪晏子蹴然避位王曰吾聞齊君蓋賊以慢野以暴吾子容焉何甚也晏子逡巡而對曰臣聞之精事不通精一作微粗事不能者必勞大事不得小事不為者必貧大者不能致人小者不能至人之門者必困此臣之所以仕也如臣者豈能以道食人者哉晏子出王笑曰今日吾譏晏子猶倮而訾髙橛者也說苑奉使又晏子卷四晏子聘于吳吳王曰子大夫以君命辱在敝邑之地施貺寡人寡人願有私問焉晏子逡巡而對曰嬰北方之賤臣也得奉君命以趨於本朝恐辭令不審譏於下吏懼不知所以對吳王曰寡人聞夫子久矣今乃得見願終其問晏子避席問敬受命吳王曰國如何則可處如何則可去也晏子對曰嬰聞之親疏得處其倫大臣得盡其忠民無怨治國無虐刑則可處矣是以君子懷不逆之君居治國之位親疏不得居其倫大臣不得盡其忠民多怨治國有虐刑則可去矣是以君子不懷暴君之祿不處亂國之位晏子卷二晏子聘於吳吳王曰敢問長保威强勿失之道若何晏子對曰先民而後身先施而後誅强不暴弱貴不凌賤富不傲貧百姓並進有司不侵民和政平不以威强退人之君不以衆强兼人之地其用法為時禁暴故世不逆其志其用兵為衆屏惡故民不疾其勞此長保威强勿失之道也失此者危矣吳王忿然作色不說晏子曰寡君之事畢矣嬰無斧鑕之罪請辭而行遂不復見晏子卷二齊景公好婦人而丈夫飾者國人盡服之公使吏禁之曰女子而男子飾者裂其衣斷其帶裂衣斷帶相望而不止晏子見公曰寡人使吏禁女子而男飾者裂其衣斷其帶相望而不止者何也對曰君使服之於內而禁之於外猶懸牛首於門而求買馬肉也公胡不使內勿服則外莫敢為也公曰善使內勿服不旋月而國莫之服也說苑政理又晏子卷三作靈公誤景公覩嬰兒有乞於途者公曰是無歸夫晏子對曰君存何為無歸使養之可立而以聞說苑貴德三又晏子卷景公探爵鷇鷇弱故反之晏子聞之不待請而入見景公汗出惕然晏子曰君胡為者也景公曰我探爵鷇鷇弱故反之晏子逡巡北面再拜而賀曰吾君有聖王之道矣公曰何也晏子對曰是長幼也吾君仁愛禽獸且加焉而况於人乎此聖王之道也說苑貴德三又晏子卷景公射鳥野人駭之公怒令吏誅之晏子曰野人不知也臣聞賞無功謂之亂罪不知謂之虐兩者先王之禁也以飛鳥犯先王之禁不可今君不明先王之制而無仁義之心是以從欲而輕誅夫鳥獸固人之養也野人駭之不亦宜乎公曰善自今以後弛鳥獸之禁無以苛民也晏子卷一景公使圉人養所愛馬暴死公怒令人操刀解養馬者是時晏子侍前左右執刀而進晏子止而問於公曰堯舜支解人從何軀始公矍然曰從寡人始遂不支解公曰以屬獄晏子曰此不知其罪臣為君數之使知其罪然後致之獄公曰可晏子數之曰爾罪有三公使汝養馬而殺之當死罪一也又殺公之所最善馬當死罪二也使公以一馬之故而殺人百姓聞之必怨吾君諸侯聞之必輕吾國汝殺公馬使怨積乎百姓兵弱於鄰國汝當死罪三也令以屬獄公喟然嘆曰夫子釋之夫子釋之勿傷吾仁也晏子卷一又說苑正諫略同韓詩齊有得罪於景公者景公大怒縛置之殿下召左右肢解之敢諫者誅晏子左手持頭右手磨刀仰而問曰古者明王聖主其肢解人不審從何肢解始也景公離席曰縱之罪在寡人符子景公謂晏子曰寡人既得寶千乘聚萬駟矣方欲珍懸黎㑹金玉其得之即奚若晏子曰臣聞琬琰之外有鳥焉曰金翅民謂為羽豪其為鳥也非龍肝不食非鳯血不飲其食也常饑而不飽其飲常渴而不充生未幾何夭其天年珠玉之珍非乃為君之患也景公走狗死公令外共之棺內給之祭晏子聞之諫公曰亦細物也特以與左右為笑耳晏子曰君過矣夫厚藉斂不以及民棄貨財而笑左右傲細民之憂而崇左右之笑則國亦無望已且夫孤老凍餒而死狗有祭鰥寡不恤而死狗有棺行辟若此百姓聞之必怨吾君諸侯聞之必輕吾國怨聚於百姓而權輕於諸侯而乃以為細務君其圖之公曰善趣庖治狗以㑹朝屬晏子卷一景公有所愛槐令吏謹守之植木縣之下令曰犯槐者刑傷之者死有不聞令醉而犯之者公聞之曰是先犯我令使吏拘之且加罪焉其女往辭晏子之家託曰負郭之民賤妾請有道於相國不勝其欲願得充數乎下陳晏子聞之笑曰嬰其淫於色乎何為老而見奔雖然是必有故令內之女子入門晏子望見之曰怪哉有深憂進而問焉曰所憂何也對曰君樹槐懸令犯之者刑傷之者死妾父不仁不聞令醉而犯之吏將加罪焉妾聞之明君蒞國立政不損祿不益刑又不以私恚害公法不為禽獸傷人民不為草木傷禽獸不為野草傷禾苖吾君欲以樹木之故殺妾父孤妾身此令行于民而法於國矣雖然妾聞之勇士不以衆强凌孤獨明惠之君不拂是以行其所欲譬之治魚鱉者去其腥臊者而已昧墨與人比居庾肆而教人危坐今君出令於民茍可法於國而善益於後世則父死亦當矣妾為之收亦宜矣甚乎今之令不然以樹木之故罪法妾父妾恐其傷察吏之法而害明君之義也鄰國聞之皆謂吾君愛樹而賤人其可乎願相國察妾言以裁犯禁者晏子曰甚矣吾將為子言之於君使人送之歸明日早朝而復於公曰嬰聞之窮民財力以供嗜欲謂之暴崇玩好威嚴擬乎君謂之逆刑殺不辜謂之賊此三者守國之大殃今君窮民財力以羡餒食之具繁鐘鼓之樂極宫室之觀行暴之大者崇玩好懸愛槐之令載過者馳步過者趨威嚴擬乎君逆之明者也犯槐者刑傷槐者死賊民之深者君享國德行未見於衆而三辟著於國嬰恐其不可以蒞國子民也公曰微大夫教寡人幾有大罪以纍社稷今子大夫教之社稷之福寡人受命矣晏子出公令趨罷守槐之役拔置懸之木廢傷槐之法出犯槐之囚晏子卷一列女傳齊傷槐女者傷槐衍之女也名婧景公所有愛槐使人守之於是衍醉而傷槐景公使吏拘之且加罪焉婧懼乃造於晏子之門曰妾父衍幸得充城郭為公民見隂陽不調風雨不時五榖不滋之故禱祠於名山神女不勝麴蘖之味先犯君令醉至於此固當死妾聞昔者宋景公之時大旱三年不雨召太史而卜之曰當以人祀景公乃降堂北面稽首曰吾所以請雨者乃為吾民也今必以人祀寡人請自當之言未卒天大雨方千里所以然者何也以能順天慈民也今吾君樹槐犯令者死殺婧之父孤婧之身妾恐傷執法之法而害明君之義也晏子愓然而悟明日朝謂景公公曰寡人敬受命景公樹竹令吏謹守之公出過之有斬竹者焉公以車逐得而拘之將加罪焉晏子入見曰公亦聞吾先君丁公乎公曰何如晏子曰丁公伐曲沃勝之止其財出其民公曰自蒞之有輿死人以出者公怪之令吏視之則其中金與玉焉吏請殺其人收其金玉公曰以兵降城以衆圍財不仁且吾聞之人君者寬惠慈衆不身𫝊誅令捨之公曰善晏子退公令出斬竹之囚晏子卷一景公登箐室而望見人有斷雍門之橚者公令吏拘之顧謂晏子趣誅之晏子默然不對公曰雍門之橚寡人所甚愛也此見斷之故使夫子誅之默然而不應何也晏子對曰嬰聞之古者人君出則闢道十里非畏也冕前有旒惡多所見也纊紘珫耳惡多所聞也大𢃄重半鈞舄履倍重不欲輕也刑死之罪日中之朝君過之則赦之嬰未嘗聞為人君而自坐其民者也公曰赦之無使夫子復言晏子卷一景公令兵搏治當臘氷月之間而寒民多凍餒而功不成公怒曰為我殺兵二人晏子曰諾少為間晏子曰昔者先君莊公之伐晉也其役殺兵四人今令殺兵二人是師殺之半也公曰諾是寡人之過也令止之晏子卷一齊景公使人為弓三年乃成景公得弓而射不穿二札景公怒將殺弓人弓人之妻往見景公曰蔡人之子弓人之妻也此弓者太山之南烏號之柘騂牛之角荆麋之筋河魚之膠也四物者天下之練材也不宜穿札之少如此且妾聞奚公之車不能獨走莫邪雖利不能獨斷必有以動之夫射之道在手若附枝掌若握卵四指如斷短杖右手發之左手不知此蓋射之道景公以為儀而射之穿七札蔡人之夫立出韓詩卷八一一作秦穆公事作晉平公事齊景公時有庶女者夫死無子守節不嫁事姑謹敬姑有女利母財令母嫁婦婦不從女乃隂殺母以誣婦婦不能自明寃結呌天天作雷電下擊景公臺隕支體傷折海水大出列女傳子略見淮南春秋戰國異辭卷十九
