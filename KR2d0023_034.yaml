body:
  text: 春秋戰國異辭卷三十一右春坊右諭徳陳厚耀撰楚懐王懐王元年張儀始相秦惠王史楚世家四年秦惠王初稱王史楚世家六年楚使柱國昭陽將兵而攻魏破之於襄陵得八邑又移兵而攻齊齊王患之陳軫適為秦使齊齊王曰為之奈何陳軫曰王勿憂請令罷之即往見昭陽軍中曰願聞楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國封上爵執珪陳軫曰其有貴於此者乎昭陽曰令尹陳軫曰今君已為令尹矣此國冠之上臣請得譬之人有遺其舍人一巵酒者舍人相謂曰數人飲此不足以徧請遂畫地為蛇蛇先成者獨飲之一人曰吾蛇先成舉酒而起曰吾能為之足及其為之足而後成人奪之酒而飲之曰蛇固無足今為之足是非蛇也今君相楚而攻魏破軍殺將功莫大焉冠之上不可以加矣今又移兵而攻齊攻齊勝之官爵不加於此攻之不勝身死爵奪有毁於楚此為蛇為足之説也不若引兵而去以徳齊此持滿之術也昭陽曰善引兵而去史楚世家十一年蘇秦約從山東六國共攻秦楚懐王為從長至函谷關秦出兵擊六國六國兵皆引而歸齊獨後史楚世家十二年齊湣王伐敗趙魏軍秦亦伐敗韓與齊争長史楚世家楚懐王使屈原造為憲令屈原屬草藁未定上官大夫見而欲奪之屈原者名平楚之同姓也為楚懐王左徒博聞彊志明於治亂嫻於辭令入則與王圖議國事以出號令出則接遇賔客應對諸侯王甚任之上官大夫與之同列爭寵而心害其能屈原不與因讒之曰王使屈平為令衆莫不知毎一令出平伐其功曰以為非我莫能為也王怒而疏屈平史屈原傳十六年秦欲伐齊而楚與齊從親秦惠王患之乃宣言張儀免相使張儀南見楚王謂楚王曰敝邑之王所甚説者無先大王雖儀之所甚願為門闌之厮者亦無先大王敝邑之王所甚憎者無先齊王雖儀之所甚憎者亦無先齊王而大王和之是以敝邑之王不得事王而令儀亦不得為門闌之厮也王為儀閉關而絶齊今使使者從儀西取故秦所分楚商於之地方六百里如是則齊弱矣是北弱齊西徳於秦私商於以為富此一計而三利俱至也懐王大説乃置相璽於張儀日與置酒宣言吾復得吾商於之地羣臣皆賀而陳軫獨弔懐王曰何故陳軫對曰秦之所為重王者以王之有齊也今地未可得而齊交先絶是楚孤也夫秦又何重孤國哉必輕楚矣且先出地而後絶齊則秦計不為先絶齊而後責地則必見欺於張儀見欺於張儀則王必怨之怨之是西起秦患北絶齊交西起秦患北絶齊交則兩國之兵必至臣故弔楚王弗聴因使一將軍西受封地張儀至秦佯醉墜車稱病不出三月地不可得楚王曰儀以吾絶齊為尚薄邪乃使勇士宋遺北辱齊王齊王大怒折楚符而合於秦秦齊交合張儀乃起朝謂楚將軍曰子何不受地從某至某廣袤六里楚將軍曰臣之所以見命者六百里不聞六里即以命報懐王懐王大怒興師將伐秦陳軫又曰伐秦非計也不如因賂之一名都與之伐齊是我亡於秦取償於齊也吾國尚可全今王已絶於齊而責欺於秦是吾合秦齊之交而來天下之兵也國必大傷矣楚王不聴遂絶和於秦發兵西攻秦秦亦發兵擊之史楚世家秦欲伐齊齊楚從親於是使張儀往相楚十六年楚懐王聞張儀來虛上舍而自館之曰此僻陋之國子何以教之儀説楚王曰大王誠能聴臣閉關絶約於齊臣請獻商於之地六百里使秦女得為大王箕箒之妾秦楚娶婦嫁女長為兄弟之國此北弱齊而西益秦也計無便此者楚王大説而許之羣臣皆賀陳軫獨弔之楚王怒曰寡人不興師發兵得六百里地羣臣皆賀子獨弔何也陳軫對曰不然以臣觀之商於之地不可得而齊秦合齊秦合則患必至矣楚王曰有説乎陳軫對曰夫秦之所以重楚者以其有齊也今閉關絶約於齊則楚孤秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王是北絶齊交西生患於秦也而兩國之兵必俱至善為王計者不若隂合而陽絶於齊使人隨張儀茍與吾地絶齊未晚也不與吾地隂合謀計也楚王曰願陳子閉口毋復言以待寡人得地乃以相印授張儀厚賂之於是遂閉關絶約於齊使一將軍隨張儀張儀至秦佯失綏墜車不朝三月楚王聞之曰儀以寡人絶齊未甚耶乃使勇士至宋借宋之符北罵齊王齊王大怒折節而下秦秦齊之交合張儀乃朝謂楚使者曰臣有奉邑六里願以獻大王左右楚使者曰臣受令於王以商於之地六百里不聞六里還報楚王楚王大怒發兵而攻秦陳軫曰軫可發口言乎攻之不如割地反以賂秦與之并兵而攻齊是我出地於秦取償於齊也王國尚可存楚王不聴卒發兵而使將軍屈匄擊秦秦齊共攻楚斬首八萬殺屈匄遂取丹陽漢中之地楚又復益發兵而襲秦至藍田大戰楚大敗於是楚割兩城以與秦平秦要楚欲得黔中地欲以武關外易之楚王曰不願易地願得張儀而獻黔中地秦王欲遣之口弗忍言張儀乃請行惠王曰彼楚王怒子之負以商於之地是且甘心於子張儀曰秦彊楚弱臣善靳尚尚得事楚夫人鄭袖袖所言皆從且臣奉王之節使楚楚何敢加誅假令誅臣而為秦得黔中之地臣之上願遂使楚楚懐王至則囚張儀將殺之靳尚謂鄭袖曰子亦知子之賤於王乎鄭袖曰何也靳尚曰秦王甚愛張儀而不欲出之今將以上庸之地六縣賂楚以美人聘楚以宫中善歌謳者為媵楚王重地尊秦秦女必貴而夫人斥矣不若為言而出之於是鄭袖日夜言懐王曰人臣各為其主用今地未入秦秦使張儀來至重王王未有禮而殺張儀秦必大怒攻楚妾請子母俱遷江南毋為秦所魚肉也懐王後悔赦張儀厚禮之如故史張儀傳十七年春與秦戰丹陽秦大敗我軍斬甲士八萬虜我大將軍屈匄禆將軍逄侯丑等七十餘人遂取漢中之郡楚懐王大怒乃悉國兵復襲秦戰於藍田大敗楚軍韓魏聞楚之困乃南襲楚至於鄧楚聞乃引兵歸史楚世家楚懐王怒張儀之欺已也悉國兵襲秦大敗於丹陽又敗於藍田韓魏聞楚之困乃南襲楚至於鄧楚聞乃引兵歸十八年秦使使約復與楚親分漢中之半以和楚楚王曰願得張儀不願得地張儀聞之請之楚秦王曰楚且甘心於子奈何張儀曰臣善其左右靳尚靳尚又能事於楚王幸姫鄭袖袖所言無不從者且儀以前使負楚以商於之約今秦楚大戰交惡臣非面自謝楚不解且大王在楚不宜敢取儀誠殺儀以便國臣之願也儀遂使楚至懐王不見而囚張儀欲殺之儀私於靳尚靳尚為請懐王曰拘張儀秦王必怒天下見楚無秦必輕王矣又謂夫人鄭袖曰秦王甚愛張儀而王欲殺之今將以上庸之六縣賂楚以美人聘楚王以宫中善歌者為之媵楚王重地秦女必貴而夫人必斥矣夫人不若言而出之鄭袖卒言張儀於王而出之儀出懐王因善遇儀儀因説楚王以叛從約而與秦合親約婚姻張儀已去屈原使從齊來諫王曰何不誅張儀懐王悔使人追儀弗及史楚世家惡交惡一曰有懐王竟聴寵姫鄭袖言復釋張儀是時屈平既疏不復在位使於齊顧反諫懐王曰何不殺張儀懐王悔追張儀不及其後諸侯共擊楚大破之殺其將唐昧史屈原傳屈平疾王聴之不聰也讒諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷騷辭見楚辭離騷者猶離憂也屈平雖放睠顧楚國心繫懐王不忘欲反冀幸君之一悟俗之一改也其存君興國而欲反覆之一篇之中三致志焉然終無可奈何故不可以反卒以此見懐王之終不悟也史屈原傳史記屈原傳離騷者猶離憂也夫天者人之始也父母者人之本也人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎屈平之作離騷盖自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣上稱帝嚳下道齊桓中述湯武以刺世事明道徳之廣崇治亂之條貫靡不畢見其文約其辭㣲其志潔其行亷其稱文小而其指極大舉類邇而見義逺其志潔故其稱物芳其行亷故死而不容自踈濯淖汙泥之中蟬蜕於濁穢以浮游塵埃之外不獲世之滋垢皭然泥而不滓者也推此志也雖與日月争光可也繹史王逸曰離騷經者屈原之所作也屈與楚同姓仕於懐王為三閭大夫三閭之職掌王族三姓曰昭屈景屈原序其譜屬率其賢良以厲國士入則與王圖議政事决定嫌疑出則監察羣下應對諸侯謀行職修王甚珍之同列大夫上官靳尚妬害其能共譛毁之王乃䟽屈原屈原執履忠貞而被讒袤憂心煩亂不知所愬乃作離騷經離别也騷愁也經徑也言以放逐離别中心愁思猶陳直徑以風諫君也故上述唐虞三后之制下序桀紂羿澆之敗冀君覺悟反於正道而還已也是時秦昭王使張儀譎詐懐王令絶齊交又使誘楚請與俱㑹武關遂脅與俱歸拘留不遣卒客死於秦其子襄王復用讒言遷屈原於江南而屈原放在山野復作九章援天引聖以自證明終不見省不忍以清白久居濁世遂赴汨淵自沈而死離騷之文依詩取興引類譬諭故善鳥香草以配忠貞惡禽臭物以比讒佞靈修美人以嫓於君宓妃佚女以譬賢臣虬龍鸞鳳以託君子飄風雲霓以為小人其詞温而雅其義皎而朗凡百君子莫不慕其清高嘉其文采哀其不遇而閔其志焉楚王所愛妾有鄭袖者楚王新得美女鄭袖因教之曰王甚喜人之掩口也近王必掩口美女入見近王因掩口王問其故鄭袖曰此固言惡王之臭及王與鄭䄂美女三人坐䄂因先誡御者曰王適有言必亟聴從王言美女前近王甚數掩口王勃然怒曰劓之御因揄刀而劓美人韓子内儲下與國策稍别二十年秦惠文王卒齊湣王欲為從約長惡楚之與秦合乃使使遺楚王書曰寡人患楚之不察於尊名也今秦惠王死武王立張儀走魏樗里疾公孫衍用而楚事秦夫樗里疾善乎韓而公孫衍善乎魏楚必事秦韓魏恐必因二人求合於秦則燕趙亦宜事秦四國争事秦則楚為郡縣矣王何不與寡人并力收韓魏燕趙與為從而尊周室以案兵息民令於天下莫敢不樂聴則王名成矣王率諸侯並伐破秦必矣王取武關蜀漢之地私吳越之富而擅江海之利韓魏割上黨西薄函谷則楚之彊百萬也且王欺於張儀亡地漢中兵挫藍田天下莫不代王懐怒今乃欲先事秦願大王熟計之楚王業已欲和於秦見齊王書猶豫不决下其議羣臣羣臣或言和秦或曰聴齊昭睢曰王雖東取地於越不足以刷恥必且取地於秦而後足以刷恥於諸侯王不如深善齊韓以重樗里疾如是則王得韓齊之重以求地矣秦破韓宜陽而韓猶復事秦者以先王墓在平陽而秦之武遂去之七十里以故尤畏秦不然秦攻三川趙攻上黨楚攻河外韓必亡楚之救韓不能使韓不亡然存韓者楚也韓已得武遂於秦以河山為塞所報徳莫如楚厚臣以為其事王必疾齊之所信於韓者以韓公子昧為齊相也韓已得武遂於秦王甚善之使之以齊韓重樗里疾疾得齊韓之重其主非敢棄疾也今又益之以楚之重樗里疾必言秦復與楚之侵地於是懐王許之竟不合秦而合齊以善韓懐王二十二年秦拔宜陽取武遂二十三年秦復歸楚遂則此事當在此時二十四年復倍齊而合秦秦昭王初立乃厚賂於楚楚往迎婦史楚世家此戰國䇿未載文二十五年懐王入與秦昭王盟約於黄棘秦復與楚上庸史楚世家二十六年齊韓魏為楚負其從親而合於秦三國共伐楚楚使太子入質於秦而請救秦乃遣客卿通將兵救楚三國引兵去史楚世家二十七年秦大夫有私與楚太子鬬楚太子殺之而亡歸史楚世家二十八年秦乃與齊韓魏共攻楚殺楚將唐昧取我重而去史楚世家史記秦本紀秦昭王八年使將軍芉戎攻楚取新市齊使章子魏使公孫喜韓使暴鳶共攻楚方城取唐昧按楚懐王二十八年秦昭王六年也此本紀作八年誤於陵子齊楚有重丘之役問於於陵子曰齊子産也楚子居也得失子具焉今二國搆兵子將奚直於陵子曰古者公侯擅誅伐天子得按其罪而輕重之然殷湯殱葛桀未放也西伯戡黎紂未亡也彼所謂聖人者且首干而靡悔焉矧蔑天子未有如今者乎昔者泰山與江漢争王兩京之下泰山矢曰弗讓吾飄塵以實彼溝澮且不為齊主江漢亦矢曰弗汜吾餘瀝以蕩彼培塿且不為楚雄於是有中州之蝸將起而責其是非欲東之泰山㑹程三千餘嵗欲南之江漢亦㑹程三千餘嵗因自量其齒則不過旦暮之間於是悲憤莫勝而枯於蓬蒿之上為螻蟻所笑也今天子且拱手不能按其輕重而一匹之夫非有萬乘之號誅賞之權輙欲起而議之則何以異於中州之蝸為螻蟻所笑也二十九年秦復攻楚大破楚楚軍死者二萬殺我將軍景缺懐王恐乃使太子為質於齊以求平史楚世家三十年秦復伐楚取八城史楚世家秦昭王遺楚懐王書曰始寡人與王約為弟兄盟於黄棘太子為質至驩也太子陵殺寡人之重臣不謝而亡去寡人誠不勝怒使兵侵君王之邊今聞君王乃令太子質於齊以求平寡人與楚接境壤界故為婚姻所從相親久矣而今秦楚不驩則無以令諸侯寡人願與君王㑹武關面相約結盟而去寡人之願也敢以聞下執事楚懐王見秦王書患之欲往恐見欺無往恐秦怒昭睢曰王毋行而發兵自守耳秦虎狼不可信有并諸侯之心懐王子子蘭勸王行曰奈何絶秦之驩心於是徃㑹秦昭王昭王詐令一將軍伏兵武關號為秦王楚王至則閉武關遂與西至咸陽朝章臺如蕃臣不與亢禮楚懐王大怒悔不用昭子言秦因留楚王要以割巫黔中之郡楚王欲盟秦欲先得地楚王怒曰秦詐我而又彊要我以地不復許秦秦因留之史屈原傳初秦昭王與楚婚欲與懐王㑹懐王欲行屈平曰秦虎狼之國不可信不如無行懐王稚子子蘭勸王行奈何絶秦歡懐王卒行入武關秦伏兵絶其後因留懐王以求割地懐王怒不聴楚大臣患之乃相與謀曰吾王在秦不得還要以割地而太子為質於齊齊秦合謀則楚無國矣乃欲立懐王子在國者昭睢曰王與太子俱困於諸侯而今又倍王命而立其庶子不宜乃詐赴於齊齊湣王謂其相曰不若留太子以求楚之淮北相曰不可郢中立王是我抱空質而行不義於天下也或曰郢中立王因與其新王市曰予我下東國吾為王殺太子不然將與三國共立之然則東國必可得矣齊王卒用其相計而歸楚太子太子横至立為王是為頃襄王乃告於秦曰賴社稷神靈國有王矣史楚世家史屈原傳長子頃襄王立以其弟子蘭為令尹楚人既咎子蘭以勸懐王入秦而不反也屈平既嫉之雖放流睠顧楚國繫心懐王不忘欲反冀幸君之一悟俗之一改也其存君興國而欲反覆之一篇之中三致志焉然終無奈何故不可以反卒以此見懐王之終不悟也人君無愚智賢不肖莫不欲求忠以自為舉賢以自佐然亡國破家相隨屬而聖君治國累世而不見者其所謂忠者不忠而所謂賢者不賢也懐王以不知忠臣之分故内惑於鄭袖外欺於張儀䟽屈平而信上官大夫令尹子蘭兵挫地削亡其六郡身客死於秦為天下笑此不知人之禍也易曰井泄不食為我心惻可以汲王明並受其福王之不明豈足福哉令尹子蘭聞之大怒卒使上官大夫短屈原於頃襄王頃襄王怒而遷之頃襄王頃襄王元年秦要懐王不可得地楚立王以應秦秦昭王怒發兵出武關攻楚大敗楚軍斬首五萬取析十五城而去史楚世家二年楚懐王亡逃歸秦覺之遮楚道懐王恐乃從間道走趙以求歸趙主父在代其子惠王初立行王事恐不敢入楚王楚王欲走魏秦追至遂與秦使復之秦懐王遂發病史楚世家頃襄王三年懐王卒於秦秦歸其喪於楚楚人皆憐之如悲親戚諸侯由是不直秦秦楚絶史楚世家新書卷六楚懐王心矜好髙無道而欲伯王鑄金以象諸侯人君令大國之王編而先馬梁王御宋王驂乗周召畢陳滕薛衞中山之君皆象使隨而趨諸侯聞之以為不宜故興師而伐之楚王見士民為用之不勸也乃徴役萬人且掘國人之墓國人聞之振動書旅而夜亂齊人襲之楚師乃潰懐王逃適秦免尹殺之西河為天下笑頃襄王六年秦使白起伐韓於伊闕大勝斬首二十四萬秦乃遺楚王書曰楚背秦秦且率諸侯伐楚争一旦之命願王之飭士卒得一樂戰楚頃襄王患之乃謀復與秦平史楚世家七年楚迎婦於秦秦楚復平史楚世家頃襄王以其弟子蘭為令尹子蘭使上官大夫短屈原於頃襄王怒而遷之史屈原傳屈原既放三年不得見竭知盡忠而蔽障於讒心煩慮亂不知所從乃往見太卜鄭詹尹曰余有所疑願因先生決之詹尹乃端筴拂龜曰君將何以教之屈原曰吾寧悃悃欵欵朴以忠乎將送往勞來斯無窮乎寧誅鋤草茅以力耕乎將游大人以成名乎寧正言不諱以危身乎將從俗富貴以媮生乎寧超然高舉以保真乎將哫訾慄斯喔咿嚅唲强笑噱也以事婦人乎寧亷潔正直以自清乎將突梯滑稽如脂如韋以潔楹乎寧昻昻若千里之駒乎將汎汎若水中之鳬乎與波上下偷以全吾軀乎寧與騏驥亢軛乎將隨駑馬之迹乎寧與黄鵠比翼乎將與雞鶩爭食乎此孰吉孰凶何去何從世溷濁而不清蟬翼為重千鈞為輕黄鐘毁棄瓦釜雷鳴讒人高張賢士無名吁嗟黙黙兮誰知吾之亷貞詹尹乃釋筴而謝曰夫尺有所短寸有所長物有所不足知有所不明數有所不逮神有所不通用君之心行君之意龜䇿誠不能知此事玉虚子屈原至於江濱被髪行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫歟何故而至此屈原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人者不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而啜其醨何故懐瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣人又誰能以身之察察受物之汶汶者乎寧赴長流而葬乎江魚腹中耳又安能以皓皓之白而蒙世之温蠖乎乃作懐沙之賦賦辭見史記及楚辭於是懐石遂自投汨羅以死史屈原傳楚辭屈原既放遊於江潭行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫與何故至於斯屈原曰舉世皆濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人者不凝滯於物而能與世推移舉世皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而歠其釃何故懐瑾握瑜而自令放為屈原曰吾聞之新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎寧赴湘流葬於江魚之腹中又安能以皎皎之白而蒙世俗之塵埃乎漁父莞爾而笑鼓枻而去歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足遂去不復與言新序屈原者楚之同姓大夫有博通之知清潔之行懐王用之秦欲吞滅諸侯并兼天下屈原為楚東使於齊以結强黨秦國患之使張儀之楚貨楚貴臣上官大夫靳尚之屬上及令尹子蘭司馬子椒内賂夫人鄭䄂共譖屈原屈原逐放於外乃作離騷漢書屈原賦二十五篇水經注屈原有賢姊聞原放逐亦來歸喻令自寛全鄉人冀其見從因名曰姊歸即女嬃也屈原流放忽然暫歸鄉人喜説因名曰歸鄉拾遺記洞庭山浮於江山其下有金堂數百間玉女居之四時聞金石絲竹之聲徹於山頂楚懐王之時舉羣才賦詩於水湄故云瀟湘洞庭之樂聴者令人忘老後懐王好進姦雄羣賢逃越屈原以忠見斥隠於沅湘披蓁茹草混同禽獸不交世務採栢實以和桂膏用養心神被王逼逐乃赴清泠之水楚人思慕謂之水仙其神遊於天河精靈時降湘浦楚人為之立祠屈原仕楚為三閭大夫楚襄王無徳佞臣靳尚有寵楚國不治屈原憂之諫襄王請斥靳尚王不聴原極諌其非宋玉止之曰夫君子之心也脩乎己不病乎人晦其用不曜於衆時來則應物來則濟應時而不謀已濟物而不立功是以直無所歸怨無所集今王方眩於佞口酣於亂政楚國之人皆貪靳尚之貴而響隨之大夫乃孑孑然挈其忠信而呌譟其中言不從國不治徒彰乎彼非我是此賈仇而釣禍也原曰吾聞君子處必孝弟仕必忠信得其志雖死猶生不得其志雖生猶死諫不止靳尚怨之讒於王而逐之原彷徨湘濵歌吟悲傷宋玉復喻之曰始大夫孑孑然挈忠信而呌譟於羣佞之中玉為大夫危之而言之舊矣大夫不能從今胡悲耶豈爵禄是思國壊是念耶原曰非也悲夫忠信不用楚國不治也玉曰始大夫以為死孝弟忠信也又何悲乎且大夫貌容形骸非大夫之有也美不能醜之醜不能美之長不能短短不能長彊壯不能尫弱之尫弱不能彊壯之病不能排死不能留形骸似乎我者也而我非可専一一身尚若此乃欲使楚人之國由我理大夫之惑亦甚矣夫君子寄形以處世虚心以應物無邪無正無是無非無善無惡無功無罪虚乎心雖桀紂蹻跖非罪也存乎心雖堯舜䕫契非功也則大夫之忠信靳尚之邪佞孰分其是非耶無所分别則忠信邪佞一也有所分則分者自妄也而大夫離真以襲妄恃已以黜人不待王之棄逐而大夫自棄矣今求乎忠信而得乎忠信而又悲之而不能自止所謂兼失其妄心者也玉聞上達節中守節下失節夫虚其心而逺於有為者達節也存其心而分是非者守節也不得其所分又悲之者失節也原不答竟沈汨羅而死無能子中楚屈原既被放棄其姊女嬃詈之辭曰鯀婞直以亡身兮終然夭乎羽之野汝何博謇而好脩兮紛獨有此姱節薋菉葹以盈室兮判獨離而不服原不聴竟湛汨羅江而死列女傳原地志荆州府姊歸廟屈原舊宅原姊嬃賢聞放乃歸喻令自寛鄉人名曰姊歸異苑長沙羅縣有屈原自投之川山明水净異於常處民為立廟在汨潭之西岸側石盤馬跡尚存相傳云原投川之日乘白驥而來史屈原傳屈原既死之後楚有宋玉唐勒景差之徒者皆好辭而以賦見稱然皆祖屈原之從容辭令終莫敢直諫其後楚日以削續齊諧記屈原以五月五日投汨羅而死楚人哀之毎至此日取竹筒貯米投以祭之公輸般為楚設機械以攻宋墨子聞之自魯往裂裳裹足日夜不休十日十夜而至於郢見楚王曰臣北方之鄙人也聞大王將攻宋信有之乎王曰然墨子曰必得宋乃攻之乎不得宋且不義猶攻之乎王曰既不得宋且又不義曷為攻之墨子曰甚善臣以宋必不可得王曰公輸般天下之巧工也已為攻宋之械矣墨子曰請令公輸般試攻之臣請試守之於是公輸般設攻宋之械墨子設守宋之備九攻之墨子九却之不能入公輸般服焉請見之王墨子見楚王曰今有人於此舍其文軒鄰有敝輿而欲竊之舍其錦繡鄰有短褐而欲竊之舍其粱肉鄰有糟糠而欲竊之此為何若人也王曰必為有竊疾矣墨子曰楚之地方五千里宋方五百里此猶文軒之與敝輿也楚有雲夢犀象麋鹿盈之江漢魚鱉黿鼉為天下饒宋所謂無雉兔鮒魚者也此猶粱肉之與糟糠也楚有長松文梓楩柟豫章宋無長木此猶錦繡之與短褐也臣以王之攻宋與此同類也王曰善哉請無攻宋吕氏春秋又公輸般嘗為楚設機將以攻宋墨翟聞之往見般曰吾自宋聞子吾欲藉子殺王般曰吾義固不殺王墨子曰聞公為雲梯將以攻宋宋何罪之有義不殺王而攻國是不殺少而殺衆敢問攻宋何義也般不答九設攻城之機變墨子九距之般之攻械盡墨子之守固有餘般詘而言曰吾知所以距子也吾不言墨子亦曰吾知子之所以距我也吾不言般請墨子見之楚王楚王問其故墨子曰公輸子之意不過欲殺臣殺臣則宋莫能守可攻也然臣之弟子禽滑釐等三百人已持臣守國之器在宋城下而待楚冦矣雖殺臣不能絶也楚王曰善哉吾請無攻宋城矣按宋滅在項襄王十三年墨子公輸般為楚造雲梯之械成將以攻宋子墨子聞之起於齊行十日十夜而至於郢見公輸般公輸般曰夫子何命焉為子墨子曰北方有侮臣願藉子殺之公輸般不説子墨子曰請獻千金公輸般曰吾義固不殺人子墨子起再拜曰請説之吾從北方聞子為梯將以攻宋宋何罪之有荆國有餘於地而不足於民殺所不足而争所有餘不可謂智宋無罪而攻之不可謂仁知而不争不可謂忠争而不得不可謂彊義不殺少而殺衆不可謂知類公輸般服子墨子曰然乎不已乎公輸般曰不可吾既已言之王矣子墨子曰胡不見我於王公輸般曰諾子墨子見王曰今有人於此舍其文軒隣有敝輿而欲竊之舍其錦繡隣有短褐而欲竊之舍其粱肉隣有糟糠而欲竊之此為何若人王曰必為竊疾矣子墨子曰荆之地方五千里此猶文軒之與敝輿也荆有雲夢犀兕麋鹿滿之江漢魚鼈黿鼉為天下富宋所為無雉兔狐狸者也此猶梁肉之與糟糠也荆有長松文梓楩柟豫章宋無長木此猶錦繡之與短褐也臣以三事之攻宋也為與此類同王曰善哉雖然公輸般為我為雲梯必攻宋於是見公輸般子墨子解帶為城以牒為械公輸般九設攻城之機變子墨子九距之公輸般之攻械盡子墨子之守固有餘公輸般詘而曰吾知所以距子矣吾不言子墨子亦曰吾知子之所以距我吾不言楚王問其故子墨子曰公輸子之意不過欲殺臣殺臣宋莫能守可攻也然臣之弟子禽滑釐等三百人已持臣守圉之器在宋城上而待楚冦矣雖殺臣不能絶也楚王曰善哉吾請無攻宋矣子墨子歸過宋天雨庇其閭中守閭者不内也故曰治於神者衆人不知其功争於明者衆人知之墨子公輸子謂子墨子曰吾未見得之時我欲得宋我自見得之後予我宋而不義我不為子墨子曰翟之未見得之時也子欲得宋自翟得見子之後予子宋而不義子不為是我與子宋也子務為義翟又將與子天下楚襄王遣使者持金十斤白璧百雙聘莊子欲以為相莊子辭而不受使者曰黄金白璧寳之至也卿相尊位也先生辭而不受何也韓詩宋玉因其友以見於楚襄王襄王待之無以異宋玉讓其友其友曰夫薑桂因地而生不因地而辛婦人因媒而嫁不因媒而親子之事王未耳何怨於我宋玉曰不然昔者齊有良兔曰東郭㕙蓋一旦而走五百里於是齊有良狗曰韓盧亦一旦而走五百里使之遥見而指屬則雖韓盧不及衆兔之塵若躡迹而縱緤則雖東郭㕙亦不能離今子之屬臣也躡迹而縱緤與遥見而指屬與詩曰將安將樂棄我如遺此之謂也其友曰僕人有過僕人有過新序卷五又韓詩宋玉集宋玉事楚懐王言友人於王王以為小臣友人讓玉玉報友人書曰薑桂因地而生不因地而辛女因媒而嫁不因媒而親也宋玉事楚襄王而不見察意氣不得形於顔色或謂曰先生何談説之不揚計畫之疑也宋玉曰不然子獨不見夫𤣥蝯乎當其居桂林之中峻葉之上從容游戯超騰往來龍興而鳥集悲嘯長吟當此之時雖羿逢蒙不得正目而視也及其在枳棘之中也恐懼而掉慄危視而蹟行衆人皆得意焉此皮筋非加急而體益短也處世不便故也夫處世不便豈可以量功校能哉詩不云乎駕彼四牡四牡項領夫久駕而長不得行項領不亦宜乎易曰臀無膚其行趦趄此之謂也新序卷五楚襄王問於宋玉曰先生其有遺行歟何士民衆庶不譽之甚也宋玉對曰唯然有之願大王寛其罪使得畢其辭客有歌於郢中者其始曰下里巴人國中屬而和者數百人其為陽春白雪國中屬而和者不過數十人引商刻羽雜以流徴國中屬而和者不過數人而已是其曲彌高其和彌寡故鳥有鳳而魚有鯤鳳皇上擊九千里絶雲電負蒼天翺翔乎杳冥之上夫藩籬之鷃豈能與之料天地之高哉鯤魚朝發崑崙之墟暴鬐於碣石暮宿於孟諸夫尺澤之鯢豈能與之量江海之大哉故非獨鳥有鳳而魚有鯤也士亦有之夫聖人瑰意琦行超然獨處世俗之民又安知臣之所為哉鹿溪子卷又新序一襄王作威王宋玉識音而善文襄王好樂而愛賦既美其才而憎其似屈原也乃謂之曰子盍從楚之俗使楚人貴子之徳乎對曰昔楚有善歌者王聞之與始而曰下里巴人國中倡而和之者數萬人中而曰陽阿採菱國人倡而和之者數百人既而陽春白雪朝日魚麗含商吐角絶節越曲國中唱而和之者不過數人蓋其曲彌高其和彌寡襄陽耆舊傳與今宋玉對楚王問少異楚襄王與唐勒景差宋玉遊於陽雲之臺王曰能為寡人大言者上座王因唏曰操是太阿戮一世流血沖天車不可以厲至唐勒曰壯士憤兮絶天維北斗戾兮太山夷至宋玉曰方地為車圓天為蓋長劍耿介一作耿耿倚天外王曰未也玉曰并吞四夷飲枯河海跂越九州無所容止賦卒宋玉受賞王又曰有能為小言賦者賜之雲夢之田景差曰戴氛埃兮乘􅞎塵體盈蚊翼形㣲蚤鱗經由鍼孔出入羅巾唐勒曰析飛糠以為輿剖粃糟以為舟馮蚋眥以顧盼附蠛蠓而遐遊又曰館於蠅鬚宴於毫端烹虱腦一作脛切蟣肝㑹九族而同嚌猶委餘而不殫宋玉曰無内之中㣲物潜生比之無象言之無名蒙蒙景滅昧昧遺形纎於毳毛之㣲蔑陋於茸毛之方生視之則𦕈𦕈望之則冥冥離朱為之嘆悶神明不能察其情二子之言磊磊不小何如此之為精王曰善賜雲夢之田宋玉大言小言賦楚襄王與宋玉遊於雲夢之臺望高唐之觀其上有雲氣崪兮直上忽兮改容須臾之間變化無窮王問玉曰此何氣也玉對曰所謂朝雲者也王曰何謂朝雲玉曰昔者先王懐王也嘗遊高唐怠而晝寢夢見一婦人曰妾巫山之女也為高唐之客聞君遊高唐願薦枕席王因幸之去而辭曰妾在巫山之陽高邱之阻旦為朝雲莫為行雨朝朝莫莫陽臺之下旦朝視之如言故為立廟號曰朝雲宋玉高唐賦序楚襄王與宋玉遊於雲夢之浦使玉賦高唐之事其夜王寢果夢與神女遇其狀甚麗王異之明日以白玉玉曰其夢若何王曰晡夕之後精神怳惚若有所喜紛紛擾擾未知何意目色髣髴乍若有記見一婦人狀甚竒異寐而夢之寤不自識罔兮不樂悵然失志於是撫心定志復見所夢玉曰狀如何也王曰茂矣美矣諸好備矣盛矣麗矣難測究矣宋玉神女賦序楚襄王遊蘭臺之宫宋玉景差侍有風颯然而至王乃披襟而當之曰快哉此風寡人與庶人共者耶宋玉對曰夫此特大王之風耳庶人安得共之夫風生於地起於青蘋之末侵淫谿谷盛怒於土囊之口縁於太山之阿舞於松栢之下故其清涼雄風則飄舉升降乘陵高城入於深宫徘徊於桂椒之間翺翔於激水之上獵蕙草離秦蘅概辛夷被稊楊北上玉堂躋於羅帷經於洞房故其風清清泠泠愈病析醒發明耳目寧體便人此所謂大王之雄風也夫塕然起於窮巷之間動沙塸吹死灰此所謂庶人之雌風也宋玉風賦宋玉風賦楚襄王時宋玉休歸唐勒讒之於王曰玉為人身體容冶内多㣲詞出愛主人之女入事大王願王疏之玉休還王謂玉曰出愛主人之女入事寡人不亦薄乎玉曰臣嘗出行僕饑馬疲正值主人門開主人翁出嫗人到市獨有主人女在主人之女翳承日之華披翠雲之裘更被白縠之單衫垂珠歩揺來排臣户欲置臣堂上太髙堂下太卑乃為蘭房奥室止臣其中中有鳴琴焉為臣炊雕胡之飯烹露葵之羮以其翡翠之釵掛臣冠纓臣不忍仰視為臣歌曰嵗將暮兮日已寒中心亂兮勿多言臣復援琴而鼓之為秋竹積雪之曲主人女又為臣歌曰怵惕心兮徂玉狀横自陳兮君之傍君不御兮妾誰怨日將至兮下黄泉宋玉釣賦宋玉與登徒子偕受釣於𤣥洲上而並見於楚襄王登徒子曰夫𤣥洲天下之善釣者也以三尋之竿八絲之線以出三尺之魚於數仞之中可謂無䇿乎襄王曰善宋玉進曰今𤣥洲釣又焉足為大王言乎王曰子所謂善釣者何玉曰善釣者其竿非竹其絲非綸其鈎非鍼其餌非螾昔堯舜禹湯之釣也以聖賢為竿道德為綸仁義為鈎利人為餌四海為池萬民為魚其釣道至㣲也非聖孰能察之王曰釣未可見也宋玉曰其釣易見昔殷湯以七十里興利除害天下歸之其餌芳矣南面以掌天下歴載數百到今不廢其綸多矣羣生浸其澤民氓畏其罰其釣善矣功成而不墜名立而不改其竿强矣若夫竿折綸絶餌墮魚失則夏桀殷紂不通夫釣術也登徒子好色賦大夫登徒子侍於楚襄王短宋玉曰玉為人體貌閑麗口多㣲辭又性好色願王勿與出入後宫王以登徒子之言問於宋玉玉曰體貌閑麗所受於天也口多㣲辭所學於師也至於好色臣無有也王曰子不好色亦有説乎有説則止無説則退玉曰天下之佳人莫如楚國楚國之麗者莫若臣里臣里之美者莫若臣東家之子臣東家之子増之一分則太長減之一分則太短著粉則太白施朱則太赤眉如翠羽肌如白雪腰如束素齒如含貝嫣然一笑惑陽城迷下蔡然此女登牆闚臣三年至今未許也登徒子則不然其妻蓬頭攣耳齞唇歴齒旁行蝺僂又疥且痔登徒子説之使有五子王熟察之誰為好色者矣是時秦章華大夫在側因進而稱曰今夫宋玉盛稱隣之女以為美色愚亂之邪臣自以為守徳不如彼矣且夫南楚窮巷之妾焉足為大王言乎若臣之陋目所曽覩者未敢云也王曰試為説之大夫曰唯唯臣少曽逺遊周覽九土足歴五都出咸陽熈邯鄲從容鄭衞溱洧之間是時向春之末迎夏之陽鶬鶊喈喈羣女出桑此郊之姝華色含光體美容冶不待飾粧臣觀其麗者因稱詩曰遵大路兮攬子祛贈以芳華辭甚妙於是處子怳若有望而不來忽若有來而不見意宻體疏俯仰異觀含喜㣲笑竊視流眄復稱詩曰寤春風兮發鮮榮絜齋俟兮惠音聲贈我如此兮不如無生因遷延而辭避蓋徒以㣲辭相感動精神相依憑目欲其顔心顧其義揚詩守禮終不過差故足稱也於是楚王稱善宋玉遂不退宋玉大言賦楚襄王與唐勒景差宋玉遊於陽雲之臺王曰能為寡人大言者上座王因唏曰操是太阿戮一世流血沖天車不可以厲至唐勒曰壯士憤兮絶天維北斗戾兮太山夷至景差曰校士猛毅皋陶嘻大笑至兮摧覆思鋸牙雲晞甚大吐舌萬里唾一世至宋玉曰方地為車圓天為蓋長劍耿耿倚天外王曰未也玉曰并吞四夷飲枯河海跋越九州無所容止身大四塞愁不可長據地􅀈天迫不得仰宋玉小言賦楚襄王既登陽雲之臺令諸大夫景差唐勒宋玉等並造大言賦賦畢而宋玉受賞王曰此賦之迂誕則極巨偉矣抑未備也且一隂一陽道之所貴小往大來剥復之類也是故卑高相配而天地位三光並照則大小備能高而不能下非兼道也能麤而不能細非妙工也然則上坐者未足明賞賢人有能為小言賦者賜之雲夢之田景差曰載氛埃兮乘剽塵體輕蚊翼形㣲蚤鱗聿皇浮踊凌雲縱身經由鍼孔出入羅巾飄妙翩錦乍見乍冺唐勒曰析飛糠以為輿剖粃糟以為舟泛然投乎杯水中淡若巨海之洪流蠅蚋眥以顧盻附蠛蠓而遨逰寧隠㣲以無準原存亡而不憂又曰舘於蠅鬚宴於毫端烹蝨脛切蟣肝㑹九族而同嚌猶委餘而不殫宋玉曰無内之中㣲物潛生比之無象言之無名蒙蒙滅景昧昧遺形超於太虚之域出於未兆之庭纎於毳末之㣲蔑陋於茸毛之方生視之則𦕈𦕈望之則冥冥離朱為之歎悶神明不能察其情二子之言磊磊皆不小何如此之為精王曰善賜以雲夢之田新語楚襄王奢侈縱恣不能制下檢民以徳増駕百馬而行欲令天下人餒則富利明不可及於是楚國逾奢君臣無别淮南子頃襄王好色不使風議而民多昏亂其積至昭竒之難列女傳楚處莊姪者縣邑之女也初頃襄王好臺榭出入不時年四十不立太子諌者閉塞屈原放逐秦欲襲其國乃使張儀間之曰南遊於唐五百里有樂焉王將往是時莊姪年十二謂其母曰王已出奸臣倚敵國而發謀王必不得反國姪願往諫之其母不遣姪乃逃以緹竿為幟伏南郊道傍王車至姪舉其幟王見之而止曰女何為者也姪對曰妾縣邑之女也欲言隠事於王恐壅閼不得見因以幟見王曰子何以戒寡人姪對曰大魚失水有龍無尾牆欲内崩而王不視王曰不知也對曰大魚失水者王離國五百里也樂之於前不思禍之起於後也有龍無尾者年既四十無太子也國無彊輔必且殆也牆欲内崩而王不視者禍亂且成而王不改也王必遂往國非王之國也王曰善命後車載之立還反國門已閉王乃發鄢郢之師以擊之僅能勝之乃立姪為夫人位在鄭子袖之右為王陳節儉愛民之事楚國復彊按張儀鄭袖不得為襄王時人楚國復彊史亦不載其舛謬甚矣十一年齊秦各自稱為帝月餘復歸帝為王史楚世家十四年楚頃襄王與秦昭王㑹於宛結和親史楚世家十五年楚王與秦三晉燕共伐齊取淮北史楚世家十六年與秦昭王好㑹於鄢其秋復與秦王㑹穰史楚世家楚王謂干象曰吾欲以楚扶甘茂而相之秦可乎干象對曰不可也王曰何也曰甘茂少而事史舉先生史舉上蔡之監門也大不事君小不事家以苛刻聞天下茂事之順焉惠王之明張儀之辯也茂之取十官而免於罪是茂賢也王曰相人敵國而相賢其不可何也干象曰前時王使邵滑之越五年而能亡越所以然者越亂而楚治也日者知用之越今亡之秦不亦太亟乎王曰然則為之奈何干象對曰不如相共立共立一云公子赫王曰共立可相何也對曰共立少見愛幸長為貴卿被王衣含杜若握玉環以聴於朝且利以亂秦矣韓子内儲楚王問莊辛楚襄王時人曰君子之行奈何莊辛對曰居不為垣牆人莫能毁傷行不從周衛人莫能暴害此君子之行也楚王復問君子之富奈何對曰君子之富假貸人不徳也不責也其食飲人不使也不役也親戚愛之衆人喜之不肖者事之皆欲其夀樂而不傷於患此君子之富也楚王曰善説苑貴徳十八年楚人有好以弱弓㣲繳加歸雁之上者頃襄王聞召而問之對曰小臣之好射鶀雁羅鸗小矢之發也何足為大王道也且稱楚之大因大王之賢所弋非直此也昔者三王以弋道徳五覇以弋戰國故秦魏燕趙者鶀雁也齊魯韓衛者青首也鄒費郯邳者羅鸗也其餘則不足射者見鳥六雙以王何取王何不以聖人為弓以勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳬雁之實也王朝張弓而射魏大梁之南加其右臂而徑屬之於韓則中國之路絶而上蔡之郡壊矣還射圉之東解魏左肘而外擊定陶則魏之東外棄而大宋方與二郡者舉矣且魏㫁二臂顛越矣膺擊郯國大梁可得而有也王綪繳蘭臺綪縈也音争蘭臺恒山之别名飲馬西河定魏大梁此一發之樂也若王之於弋誠好而不厭則出寳弓碆新繳碆音波以石傳弋繳射噣鳥於東海噣音晝大鳥有鈎喙還蓋長城以為防朝射東莒夕發浿丘夜加即墨顧據午道則長城之東收而太山之北舉矣西結境於趙而北逹於燕三國布􅖬則從不待約而可成也北遊目於燕之遼東而南登望於越之㑹稽此再發之樂也若夫泗上十二諸侯左縈而右拂之可一旦而盡也今秦破韓以為長憂得列城而不敢守也伐魏而無功擊趙顧病則秦魏之勇力屈矣楚之故地漢中析酈可得而復有也王出寳弓碆新繳涉鄳塞而待秦之倦也山東河内可得而一也勞民休衆南面稱王矣故曰秦為大鳥負海内而處東面而立左臂據趙之西南右臂傅楚鄢郢膺擊韓魏垂頭中國處既形便勢有地利奮翼鼓􅖬方三千里則秦未可得獨招而夜射也欲以激怒襄王故對以此言襄王因召與語遂言曰夫先王為秦所欺而客死於外怨莫大焉今以匹夫有怨尚有報萬乘白公子胥是也今楚之地方五千里帶甲百萬猶足以踴躍中野也而坐受困臣竊為大王弗取也於是頃襄王遣使於諸侯復為從欲以伐秦秦聞之發兵來伐楚楚謀與齊韓連和伐秦因欲圗周楚史世家文國策無此周王赧使武公謂楚相昭子曰三國以兵割周郊地以便輸而南器以尊楚臣以為不然夫弑共主臣世君大國不親以衆脅寡小國不附大國不親小國不附不可以致名實名實不得不足以傷民夫有圖周之聲非所以為號也昭子曰乃圖周則無之雖然周何故不可圖也對曰軍不五不攻城不十不圍夫一周為二十晉公之所知也韓嘗以二十萬之衆辱於晉之城下鋭士死中士傷而晉不拔公之無百韓以圖周此天下之所知也夫怨結於兩周以塞鄒魯之心交絶於齊聲失天下其為事危矣夫危兩周以厚三川方城之外必為韓弱矣何以知其然也西周之地絶長補短不過百里名為天下共主裂其地不足以肥國得其衆不足以勁兵雖無攻之名為弑君然而好事之君喜攻之臣發號用兵未嘗不以周為終始是何也見祭器在焉欲器之至而忘弑君之亂今韓以器之在楚臣恐天下以器讐楚也臣請譬之夫虎肉臊其兵利身人猶攻之也若使澤中之麋䝉虎之皮人之攻之必萬之於虎裂楚之地足以肥國詘楚之名足以尊王今子將以欲誅殘天下之共主居三代之傳器吞三翮六翼以高世主非貪而何周書曰欲起無先故器南則兵至矣於是楚計輟不行史楚世家十九年秦伐楚楚軍敗割上庸漢北地予秦史楚世家二十年秦將白起拔我西陵史楚世家二十一年秦將白起遂拔我郢燒先王墓夷陵楚襄王兵散遂不復戰東北保於陳城史楚世家二十二年秦復拔我巫黔中郡史楚世家楚使黄歇於秦秦昭王使白起攻韓魏敗之於華陽禽魏將芒夘韓魏服而事秦昭王方令白起與韓魏共伐楚未行而黄歇適至聞其計是時秦已使白起攻楚取巫黔中之郡拔鄢郢東至竟陵楚頃襄王東徙治於陳縣黄歇上書於秦昭王欲使秦逺交楚而攻韓魏以解楚其書曰天下莫强於秦楚今聞大王欲伐楚此猶兩虎相與鬬而駑犬受其弊也不如善楚臣聞之物至則反冬夏是也致高則危累綦是也今大國之地徧天下有其二垂此從生民以來萬乘之地未嘗有也今王使盛橋守事於韓盛橋以其地入秦是王不用甲不信威而得百里之地王可謂能矣王又舉甲而攻魏杜大梁之門舉河内攻燕酸棗虚桃入邢魏之兵雲翔而不敢救王之功亦多矣王休甲息衆二年而復之又取滿史作蒲衍首垣以臨仁平丘黄濟陽甄城甄史作嬰而魏氏服王又割濮歴歴史作磨之北注秦齊之要絶楚趙之脊天下五合六聚而不敢相救王之威亦單矣王若能持功守威絀戰功之心而肥仁義之地使無後患則三王不足四五霸不足六也王若負人徒之衆兵革之强乘毁魏之威而欲以力臣天下之主臣恐其有後患也詩曰靡不有初鮮克有終易曰狐渉水濡其尾此言始之易終之難也何以知其然也智伯見伐趙之利而不知榆次之禍吳見伐齊之便而不知干遂之敗此二國者非無大功也没利於前而易患於後也吳之親越也從而伐齊既勝齊人於艾陵還為越人禽於三渚之浦知伯之信韓魏也從而伐趙攻晉陽之城勝有日矣韓魏畔之殺智伯瑶於樷臺樷史作鑿之上今王妬楚之不毁也而忘毁楚之强韓魏也臣為王慮而不取也詩云大武逺宅而不涉從此觀之楚國援也鄰國敵也詩曰趯趯毚兔遇犬獲之他人有心予忖度之今王中道而信韓魏之善王也此呉之親越也臣聞之敵不可假時不可失臣恐韓魏卑辭除患而實欺大國也何則王無重世之徳於韓魏而有累世之怨焉夫韓魏父子兄弟接踵而死於秦者將十世矣本國殘社稷壊宗廟隳刳腹絕腸折顙摺頸頸史作頥身首分離暴骨草澤頭顱僵仆相望於境父子老弱係脰束手為羣虜者相及於路鬼神潢洋潢洋史作孤傷無所血食民不聊生族類離散流亡為僕妾者盈海内矣故韓魏之不亡秦社稷之憂也今王齎之以攻楚不亦過乎且王攻楚將惡出兵王將藉路於仇讐之韓魏乎兵出之日而王憂其不及也是王以兵資於仇讎之韓魏也王若不借路於仇讎之韓魏必攻隨水右壤隨水右壤此皆廣川大水山林谿谷不食之地也王雖有之不為得地是王有毁楚之名而無得地之實也且王攻楚之日四國必悉起兵以應王秦楚之兵搆而不離韓魏氏將出兵而攻留方與銍胡陵碭蕭相故宋必盡齊人南面攻楚泗北必舉此皆平原四達膏腴之地也而使獨攻王破楚以肥韓魏於中國而勁齊韓魏之彊足以枝於秦齊南以泗水為境東負海北倚河而無後患天下之國莫大於齊魏齊魏得地保利而詳事下吏一年之後為帝未能其於楚王之為帝有餘矣夫以王壤土之博人徒之衆兵革之强一舉事而樹怨於楚遲令韓魏歸帝重於齊是王失計也臣為王慮莫若善楚秦楚合為一而以臨韓韓必拱手王施之以東山之險帶以曲河之利韓必為關内之侯若是而王以十萬戍鄭梁氏寒心許鄢陵嬰城而上蔡召陵不往來也如是而魏亦關内侯矣王一善楚而關内兩萬乘之王注地於齊齊右壤可拱手而取也王之地一桎桎史作經兩海要約天下是燕趙無齊楚齊楚無燕趙也然後危動燕趙直揺齊楚此四國者不待痛而服也昭王曰善於是乃止白起而謝韓魏發使賂楚約為與國黄歇受約歸楚新序卷九此又國䇿秦文與小異二十三年襄王乃收東地兵得十餘萬復西取秦所拔我江旁十五邑以為郡距秦史楚世家二十七年使三萬人助三晉伐燕復與秦平而入太子為質於秦使左徒侍太子於秦左徒黄歇也史楚世家史記春申君傳春申君者楚人也名歇姓黄氏游學博聞事楚頃襄王頃襄王以歇為辯使於秦秦昭王使白起攻韓魏敗之於華陽禽魏將芒夘韓魏服而事秦秦昭王方令白起與韓魏共伐楚未行而楚使黄歇適至於秦聞秦之計當是之時秦前已使白起攻楚取巫黔中之郡拔鄢郢東至竟陵楚頃襄王東徙治於陳縣黄歇見楚懐王之為秦所誘而入朝遂見欺留死於秦頃襄王其子也秦輕之恐壹舉兵而滅楚歇乃上書説秦昭王昭王曰善於是乃止白起而謝韓魏發使賂楚約為與國黄歇受約歸楚楚使歇與太子完入質於秦秦留之數年按楚襄王二十七年當秦昭王三十五年説昭王書見新序史春申君傳春申君者楚人名歇姓黄氏游學博聞事楚頃襄王頃襄王以歇為辨使於秦當是時韓魏已服而事秦秦昭王方令白起與韓魏共伐楚未行而楚使黄歇適至于秦歇乃上書説昭王曰語詳國䇿昭王曰善於是乃止白起而謝韓魏發使賂楚約為與國黄歇受約歸楚楚使歇與太子完入質於秦楚王之弟春申君有愛妾曰余春申君之正妻子曰甲余欲君之棄其妻也因自傷其身以視君而泣曰得為君之妾甚幸雖然適夫人非所以事君也適君非所以事夫人也身故不肖力不足以適二主其勢不俱適與其死夫人所者不若賜死君前妾以賜死若復幸於左右願君必察之無為人笑君因信妾余之詐為棄正妻余又欲殺甲而以其子為後因自裂其親身衣之裏以示君而泣曰余之得幸君之日久矣甲非弗知也今乃欲强戯余余與争之至裂余之衣而此子之不肖莫大於此矣君怒而殺甲韓子姦刼亦按莊王弟誤其事未聞三十六年楚頃襄王病秦留楚太子不得歸而楚太子與秦相應侯善於是黄歇乃説應侯曰相國誠善楚太子乎應侯曰然歇曰今楚王恐不起疾秦不如歸其太子太子得立其事秦必重而徳相國無窮是親與國而得儲萬乘也若不歸則咸陽一布衣耳楚更立太子必不事秦夫失與國而絶萬乘之和非計也願相國熟慮之應侯以聞秦王秦王曰令楚太子傅先往問楚王之疾返而後圖之黄歇為楚太子計曰秦之留太子也欲以求利也今太子力未能有以利秦也歇憂之甚而陽文君子二人在中王若卒大命太子不在陽文君子必立為後太子不得奉宗廟矣不如亡秦與使者俱出臣請止以死當之楚太子因變衣服為楚使者御以出關而黄歇守舍常為謝病度太子已逺秦不能追歇乃自言秦昭王曰楚太子已歸出逺矣歇當死願賜死昭王大怒欲聴其自殺也應侯曰歇為人臣出身以狥其主太子立必用歇故不如無罪而歸之以親楚秦因遣黄歇歇至楚三月秋楚頃襄王卒太子完立楚世家作太子熊元是為考烈王史春申君傳以左徒為令尹封以吳號春申君史楚世家考烈王考烈王元年納州於秦以平是時楚益弱以黄歇為相相即令尹也封為春申君賜淮北地十二縣史楚世家地志河南黄歇宅即光州治楚賜春申君淮北十二縣居此春申君既相楚是時齊有孟嘗君趙有平原君魏有信陵君方争下士招致賔客以相傾奪輔國持權春申君為楚相四年秦破趙之長平軍四十餘萬五年秦圍邯鄲告急於楚楚使春申君將兵往救之秦兵亦去春申君歸史春申君傳六年秦圍邯鄲趙告急於楚楚使將軍景陽救趙七年至新中秦兵去史楚世家春申君相楚八年為楚北伐滅魯以荀卿為蘭陵令當是時楚復强史春申君傳孫卿有秀才年十五始來遊學諸子之事皆以為非先王之法也孫卿善為詩禮易春秋至襄王時而孫卿最為老師齊尚循列大夫之缺而孫卿三為祭酒焉齊人或讒孫卿乃適楚楚相春申君以為蘭陵令考烈王八年人或謂春申君曰湯以七十里文王以百里孫卿賢者也今與之百里地楚其危乎春申君謝之孫卿去之遊趙應聘於秦是時七國交争尚於權詐而孫卿守禮義貴術籍雖見窮擯而猶不黜其志作書數十篇疾濁世之政國亂君危相屬不尊大道而營乎巫祝信禨祥蘇秦張儀以邪道説諸侯以大貴顯隨而笑之曰夫不以其道進者必不以其道仕又小五霸以為仲尼之門羞稱其功後客或謂春申君曰伊尹去夏入殷殷王而夏衰管仲去魯入齊魯弱而齊彊故賢者所在君尊國安今孫况天下賢人所去之國其不安乎春申君使請孫况况遺春申君書刺楚國因為歌賦以遺春申君因不得已乃行復為蘭陵令風俗通卷之七客有説春申君者曰湯以七十里文王百里皆兼天下一海内今夫孫子即荀卿者天下之賢人也君藉之百里之勢臣竊以為不便於君若何春申君曰善於是使人謝孫子去而之趙趙以為上卿客又説春申君曰昔伊尹去夏之殷殷王而夏亡管仲去魯而入齊魯弱而齊强由是觀之夫賢者之所在其君未嘗不善其國未嘗不安也今孫子天下之賢人何為辭而去春申君又云善於是使請孫子孫子因偽喜謝之韓詩卷四又詳國䇿荀子佹賦春申君又使人請荀子荀子不還而遺之賦天下不治請陳佹賦天地易位四時易鄉列星隕墜旦暮晦盲幽闇登昭日月下藏公正無私反見縱横志愛公利重樓疏堂無私罪人憼革二兵道徳純備讒口將將仁人絀約敖暴擅彊天下幽險恐失世英螭龍為蝘蜓鴟梟為鳳凰比干見刳孔子拘匡昭昭乎其知之明也郁郁乎其遇時之不祥也拂乎其欲禮義之大行也闇乎天下之晦盲也昊天不復憂無疆也千秋必反古之常也弟子勉學天不忘也聖人共手時幾將矣與愚亦疑願聞反辭其小歌也念彼逺方何其塞矣仁人絀約暴人衍矣忠臣危殆讒人般矣璇玉瑶珠不知佩也雜布與錦不知異也閭娵子奢莫之媒也嫫母刀父是之喜也以肓為明以聾為聪以危為安以吉為凶嗚呼上天曷維其同此賦與國䇿所載不同史荀卿傳春申君死而荀卿廢因家蘭陵李斯嘗為弟子已而相秦荀卿嫉濁世之政亡國亂君相屬不遂大道而營於巫祝信禨祥鄙儒小拘如莊周等又滑稽亂俗於是推儒墨道徳之行事興壊序列著數萬言而卒因葬蘭陵而趙亦有公孫龍為堅白同異之辯藝文志公孫龍子十四篇劇子之言趙有劇孟及劇辛魏有李悝盡地力之教藝文志李子三十二篇楚有尸子長盧尸子名佼衛鞅客也自為二十篇書凡六萬餘言長盧九篇阿有吁子焉阿今東阿齊藝文志吁子十八篇名嬰人七十子之後墨翟宋大夫善守禦為節用或曰並孔子時或曰在其後趙平原君使人於春申君春申君舍之於上舍趙使欲夸楚為瑇瑁簪刀劍室以珠玉飾之請命春申君客春申君客三千餘人其上客皆躡珠履以見趙使趙使大慙史春申君傳十二年秦昭王卒楚王使春申君弔祠於秦史楚世家十六年秦莊襄王卒秦王趙政立史楚世家越絶書白石山故為胥女山春申君初封呉過更名為白石呉市者春申君所造闕兩城以為市在湖里吳諸里大閈春申君所造吳兩倉春申君所造西倉名曰均輸東倉周一里八歩後燒今太守舍者春申君所造後璧屋以為桃夏宫無錫歴山春申君時盛祠以牛立無錫塘無錫湖者春申君治以為鑿語昭瀆以東到大田田名胥卑鑿胥卑下以南注大湖以寫西野吳獄庭周三里春申君造土山者春申君時治以為貴人冡次胥女南小蜀山春申君客衛公子冡也二十二年與諸侯共伐秦不利而去楚東徙都夀春命曰郢史楚世家春申君相二十二年諸侯患秦攻伐無巳時乃相與合從西伐秦始皇六年而楚王為從長春申君用事至函谷關秦出兵攻諸侯兵皆敗走考烈王以咎春申君春申君以此益疎客有觀津人朱英謂春申君曰人皆以楚為强而君用之弱其於英不然先君時善秦二十年而不攻楚何也秦踰黽隘之塞而攻楚不便假道於兩周背韓魏而攻楚不可今則不然魏旦暮亡不能愛許鄢陵其許魏割以與秦秦兵去陳百六十里臣之所觀者見秦楚之日鬭也楚於是去陳徙夀春而秦徙衛野王作置東郡春申君由此就封於呉行相事史春申君傳楚考烈王相春申君其吏李園女弟曰女環謂園曰我聞王老無嗣可見我於春申君我欲假春申君徑得見於王矣園曰春申君貴人也千里之佐吾何託敢言女環曰即不見我汝求謁於春申君才人告逺道客請歸待之彼必問汝汝因對曰園有女弟魯相聞之使使者來求之園才人必問汝女弟何能對曰能鼓音讀書通一經故彼必見我園曰諾明日辭春申君才人有逺道客請歸待之春申君果問汝家何等逺道客對曰園有女弟魯相聞之使使求之春申君曰何能對曰能鼓音讀書通一經春申君曰可得見乎明日使待於離亭園曰諾既歸告女環女環曰宜先供待之春申君到園馳人呼女環黄昏女環至大縱酒女環鼓琴曲未終春申君大悦留宿明日女環謂春申君曰妾聞王老無嗣屬邦於君君外淫不顧政事使王聞之君上負於王使妾兄下負於夫人為之奈何無泄此口君召而戒之春申君以告官屬莫有聞淫女也皆曰諾與女環通未終月女環謂春申君曰妾聞王老無嗣今懐君子一月矣可見妾於王幸産子男君即王公也而何為佐乎君戒念之五日而道之王邦中有好女中相可屬嗣者烈王曰諾即召之烈王悦取之十月産子男十年烈王死幽王立女環使園相春申君相之三年然後告園以呉封春申君使備東邊園曰諾即封春申君於吳列女傳又越絶書與國䇿别二十五年考烈王卒子幽王悍立李園殺春申君史楚世家楚考烈王無子春申君患之求婦人宜子者進之甚衆卒無子趙人李園持其女弟欲進之楚王聞其不宜子恐久毋寵李園求事春申君為舍人已而謁歸故失期還謁春申君問之狀對曰齊王使使求臣之女弟與其使者飲故失期春申君曰娉入乎對曰未也春申君曰可得見乎曰可於是李園乃進其女弟即幸於春申君知其有身李園乃與其女弟謀園女弟承間以説春申君曰楚王之貴幸君雖兄弟不如也今君相楚二十餘年而王無子即百嵗後將更立兄弟則楚更立君後亦各貴其故所親君又安得長有寵乎非徒然也君貴用事久多失禮於王兄弟兄弟誠立禍且及身何以保相印江東之封乎今妾自知有身矣而人莫知妾幸君未久誠以君之重而進妾於楚王王必幸妾妾賴天有子男則是君之子為王也楚國盡可得孰與身臨不測之罪乎春申君大然之乃出李園女弟謹舍而言之楚王楚王召入幸之遂生子男立為太子以李園女弟為王后楚王貴李園園用事李園既入其女弟立為王后子為太子恐春申君語泄而益驕隂養死士欲殺春申君以滅口而國人頗有知之者春申君相二十五年楚考烈王病朱英謂春申君曰世有毋望之福又有毋望之禍今君處毋望之世事毋望之主安可以無毋望之人乎春申君曰何謂毋望之褔曰君相楚二十餘年矣雖名相國實楚王也今楚王病旦暮且卒而君相少主因而代立當國如伊尹周公王長而反政不即遂南面稱孤而有楚國此所謂毋望之福也春申君曰何謂毋望之禍曰李園不治國而君之仇也不為兵而養死士之日久矣楚王卒李園必先入據權而殺君以滅口此所謂毋望之禍也春申君曰何謂毋望之人對曰君置臣郎中楚王卒李園必先入臣為君殺李園此所謂毋望之人也春申君曰足下置之李園弱人也僕又善之且又何至此朱英知言不用恐禍及身乃亡去後十七日楚考烈王卒李園果先入伏死士於棘門之内春申君入棘門園死士俠刺春申君斬其頭投之棘門外於是遂使吏盡滅春申君之家而李園女弟初幸春申君有身而入之王所生子者遂立是為楚幽王按楚捍有母弟猶猶有庶兄負芻及昌平君是楚君完非無子而上文云考烈王無子誤也史春申君列傳越絶書呉地春申君楚考烈王相也烈王死幽王立封春申君於吳與史不同三年幽王徴春申君為令尹春申君自使其子為假君治呉十一年幽王徴假王與春申君并殺之二君治吳凡十四年地志常州府黄山即春申君黄歇所封地俯瞰大江君山在江隂縣亦以春申君名申浦亦在江隂春申君鑿東入無錫西入武進溉田民賴其利幽王幽王三年秦魏伐楚秦相吕不韋卒史楚世家九年秦滅韓史楚世家十年幽王卒同母弟猶代立是為哀王史楚世家哀王楚哀王獵於雲夢一作莊哀王考烈王子射隨兕中之申公子培刼王而奪之隨兕惡獸名子培申邑宰也以殺隨兕凶物故刼奪王代王受殃也王曰何其暴而不敬也命吏誅之左右大夫皆進諫曰子培賢者也又為王百倍之臣此必有故願察之也不出三月子培疾而死為代王殺隨兕故死楚興師戰於西棠大勝晉歸而賞有功者申公子培之弟進請賞於軍旅曰臣兄之有功也於車下於王車下奪王隨兕以代王死故為有功王曰何謂也對曰臣之兄犯暴不敬之名觸死亡之罪於王之側其愚心將以忠於君王之身而持千嵗之夀也臣之兄嘗讀故記曰殺隨兕者不出三月三月必死故曰不出是以臣之兄驚懼而争之故伏其罪而死王令人發平府而視之於故記果有乃厚賞之申公子培其忠也可謂穆行矣穆行之意人知之不為勸人不知不為沮行無高乎此矣吕覽至忠哀王立二月餘庶兄負芻之徒襲殺哀王而立負芻為王是嵗秦虜趙王遷史楚世家王負芻二年秦使將軍伐楚大破楚軍亡十餘城史楚世家三年秦將王剪破我軍於蘄而殺將軍項燕史楚世家五年秦將王剪䝉武遂破楚虜王負芻滅楚名為楚郡史楚世家楚雜録楚有直躬者其父竊羊而謁之上上執而將誅之直躬者請代之將誅矣告吏曰父竊羊而謁之不亦信乎父誅而代之不亦孝乎信且孝而誅之國將有不誅者乎楚王聞之乃不誅也孔子聞之曰異哉直躬之為信也一父而載取名焉故直躬之信不若無信吕覽當務陳仲子齊人也其兄戴為齊卿食禄萬鍾仲子以為不義將妻子適楚居於陵自謂於陵仲子窮不茍求楚王聞其賢欲以為相遣使持金百鎰至於陵聘仲子仲子入謂妻曰楚王欲以我為相今日為相明日結駟連騎食方丈於前意可乎妻曰夫子左琴右書樂在其中矣結駟連騎所安不過容膝食方丈於前所甘不過一肉今以容膝之安一肉之味而懐楚國之憂亂世多害恐先生不保命也於是出謝使者遂相與逃去為人灌園髙士傳陳仲子字子終齊人適楚楚王欲以為相其妻曰子織履以為食恬淡而無為樂在其中矣不如辭之子終乃出謝使者列女傳老萊子為楚王所聘投其畚而去老萊子亦隨其妻至於江南曰鳥獸解毛可績而為衣其遺粒足食也王隠晉書楚老萊子迯世耕於蒙山之陽葭牆蓬室衣緼食菽楚王聞其賢駕至老萊之門老萊方織畚王曰寡人愚陋獨守宗廟願先生幸臨之老萊子曰諾王去其妻戴畚萊挾薪樵而來曰何車迹之衆也老萊子曰楚王欲吾守國之政妻曰許之乎曰然妻曰妾聞之可食以酒肉者可隨以鞭捶可授以官禄者可隨以鈇鉞今先生食人酒肉受人官禄為人所制也能免於患乎妾不能為人所制投其畚萊而去老萊子隨其妻至江南而居焉列女傳老萊子楚人也親没逃耕於䝉山之陽莞葭為牆蓬蒿為室枝木為牀蓍艾為席飲水食菽墾山播種人或言於楚王王於是駕至萊子之門萊子方織畚王曰守國之政孤願煩先生老萊子曰諾王去其妻樵還曰子許之乎老萊曰然妻曰妾聞之可食以酒肉者可隨而鞭捶可擬以官禄者可隨而鈇鉞妾不能為人所制者妻投其畚而去老萊子亦隨其妻至於江南而止曰鳥獸之毛可績而衣其遺粒足食也仲尼嘗聞其論而蹙然改容焉著書十五篇言道家之用人莫知其所終高士傳田忌去齊奔楚楚王郊迎至舍問曰楚萬乘之國也齊亦萬乘之國也常欲相并之奈何對曰易知耳齊使申孺將則楚發五萬人使上將軍將之至擒將軍首而反耳齊使田居將則楚發二十萬人使上將軍將之分别而相去也齊使盻子將楚發四封之内王自出將而忌從相國上將軍為左右司馬如是則齊王僅得存耳於是齊使申孺將楚發五萬人使上將軍至擒將軍首反於是齊王忿然乃更使盻子將楚悉發四封之内王自出將田忌從相國上將軍為左右司馬益王車属九乘僅得免耳至舍王北面正領齊袪問曰先生何知之早也田忌曰申孺為人侮賢者而輕不肖者賢不肖俱不為用是以亡也田居為人尊賢者而賤不肖者賢者負任不肖者退是以分别而相去也盻子之為人也尊賢者而愛不肖者賢不肖俱負任是以王僅得存耳説苑尊賢田贊衣補衣而見楚王田贊齊人楚王曰先生之衣何其惡也贊對曰衣又有惡於此者楚王曰可得而聞乎對曰甲惡於此王曰何謂也對曰冬日則寒夏日則熱衣無惡乎甲者贊也貧故衣惡也今大王萬乘之主也富貴無敵而好衣民以甲臣竊為大王不取也意者為其義耶甲兵之事刈人頸刳人之腹隳人之城郭刑人之父子其名又且不榮意者為其實耶實一作貴下同茍慮害人人亦必慮害之茍慮危人人亦必慮危之其實人甚不安之二者臣為大王無取焉楚王無以應吕覽順説補又新序卷五衣作儒衣襄成君始封之日衣翠衣帶玉劔履縞舄立於遊水之上大夫擁鍾鍾縣令執將號令呼誰能渡王者於是也楚大夫莊辛過而説之遂造託而拜謁起立曰臣願把君之手其可乎襄成君忿作色而不言莊辛遷延盥手而稱曰君獨不聞夫鄂君子晳之泛舟於新波之中也乘青翰之舟極􅀢芘張翠蓋而檢犀尾班麗桂社㑹鍾鼓之音畢榜枻越人擁楫而歌歌辭曰濫兮抃草濫子昌􅀈澤予昌州州􅳗州焉乎秦胥胥縵予乎昭澶秦踰㵕惿隨河朔鄂君子晳曰吾不知越歌子試為我楚説之於是乃召越譯乃楚説之曰今夕何夕兮搴中洲流今日何日兮得與王子同舟䝉羞被好兮不訾詬恥心幾頑而不絶兮知得王子山有木兮木有枝心説君兮君不知於是鄂君子晳乃㯓脩袂行而擁之舉繡被而覆之鄂君子晳親楚王母弟也官為令尹爵為執珪一榜枻越人猶得交歡盡意焉令尹何以踰於鄂君子晳臣獨何以不若榜枻之人願把君之手其不可何也襄成君乃奉手而進之曰吾少之時亦嘗以色稱於長者矣未嘗遇僇如此之卒也自今以後願以莊少之禮謹受命説苑善説按古詩紀未載前歌楚使使聘於齊齊王饗之梧宫使者曰大哉梧乎王曰江漢之魚吞舟大國之樹必巨使何怪焉使者曰昔燕攻齊遵雒路渡濟橋焚雍門擊齊左而虚其右王歜絶頸而死於杜山公孫差格死於龍門飲馬乎溜澠定獲乎琅邪王與太后奔於莒逃於城陽之山當此之時則梧之大何如乎王曰陳先生對之陳子曰臣不如刁㪍王曰刁先生應之刁㪍曰使者問梧之年耶昔者荆平王為無道加諸申氏殺子胥父與其兄子胥披髪乞食於吳闔閭以為將相三年將吳兵復仇乎楚戰勝乎栢舉級頭百萬囊瓦奔鄭王保於隨引師入郢軍雲行乎郢之都子胥親躬宫門掘平王冡笞其墳數以其罪曰吾先人無罪而子殺之士卒人加百焉然後止當若此時梧可以為其柎矣説苑奉使蔡使師强王堅使於楚楚王聞之曰人名多章章者獨為師强王堅乎趣見之無以次視其人狀疑其名而醜其聲又惡其形楚王大怒曰今蔡無人乎國可伐也有人不遣乎國可伐也端以此人誡寡人乎國可伐也故發二使見三謀伐者蔡也説苑奉使州侯相楚貴而主斷楚王疑之因問左右左右對曰無有如出一口也韓子内儲下楚王欲宦公子於四鄰戴歇曰不可宦公子於四鄰四鄰必重之曰子出者重重則必為所重之國黨則是教子於外市也不便韓子内儲下荆令公子將伐陳丈人送之曰晉彊不可不愼也公子曰丈人奚憂吾為丈人破晉丈人曰可吾方廬陳南門之外公子曰是何也曰我笑勾踐也為人之如是其易也已獨何為宻宻十年難乎韓子説林下伯牙學琴於成連先生三年不成至於精神寂寞情之専一尚未能也成連云吾師方子春今在東海中能移人情乃與伯牙俱往至蓬萊山留宿伯牙曰子居習之吾將迎師刺船而去旬時不返伯牙近望無人但聞海水洞滑崩折之聲山林窅冥羣鳥悲號捨然而歎曰先生將移我情乃援琴而歌曲終成連回刺船迎之而還伯牙遂為水僊操樂府解題琴苑要録水仙操伯牙之所作也伯牙學琴於成連三年而成至於精神寂寞情之専一未能得也成連曰吾之學不能移人之情吾師有方子春在東海中乃賫糧從之至蓬萊山留伯牙曰吾將迎吾師刺船而去旬時不返伯牙心悲延頸四望但聞海水汩没山林窅㝠羣鳥悲號仰天嘆曰先生將移我情乃援琴而作歌曰繄洞渭兮流澌濩舟楫逝兮仙不還移形素兮蓬萊山歍欽傷宫仙石還琴録楚王子無虧有琴曰青翻後質於秦不得歸因撫琴歌曰洞庭兮木秋涔陽兮草衰去千里之家國作咸陽之布衣伯牙鼓琴鍾子期聴之方鼓琴而志在太山鍾子期曰善哉乎鼓琴巍巍乎若太山少選之間而志在流水鍾子期又曰善哉乎鼓琴湯湯乎若流水鍾子期死伯牙破琴絶絃終身不復鼓琴二人皆楚人吕覽本味伯牙善鼓琴鍾子期善聴伯牙鼓琴志在登高山鍾子期曰善哉峩峩兮若泰山志在流水鍾子期曰善哉洋洋兮若江河伯牙所念鍾子期必得之伯牙游於泰山之隂卒逢暴雨止於巖下心悲乃援琴而鼓之初為霖雨之操更造崩山之音曲毎奏鍾子期輙窮其趣伯牙乃舍琴而嘆曰善哉善哉子之聴夫志想象猶吾心也吾於何逃聲哉列子湯問魚説文伯牙鼓琴鱏出聴鍾子期夜聞擊磬聲者而悲旦召問之曰何哉子之擊磬若此之悲也對曰臣之父殺人而不得臣之母得而為公家𨽻臣得而為公家擊磬臣不睹臣之母三年於此矣昨日為舍市而睹之意欲贖之無財身又公家之有也是以悲也鍾子期曰悲在心也非在手也非木非石也悲於心而木石應之以至誠故也新序卷四鍾子期夜聞擊磬者而悲鍾姓也子通稱期名也楚人鍾儀之族也使人召而問之曰子何擊磬之悲也答曰臣之父不幸而殺人不得生臣之母得生而為公家為酒臣之身得生而為公家擊磬臣不覩臣之母三年矣昔為舍氏覩臣之母量所以贖之則無財而身固公家之有也是故悲也鍾子期嘆嗟曰悲夫悲夫心非臂也臂非椎非石也悲存乎心而木石應之故君子誠乎此而諭乎彼感乎已而發乎人吕覽精通楚膏梁子出遊九皋之澤臨曲池而漁疾風雲暴雨電天火四起霹靂下臻𤣥鶴翔其前白虎吟其後乃援琴而起作霹靂引琴操楚商梁出逰九皋之澤或云商梁即莊王也聲之誤耳覽漸水之臺引罘罝周於荆山臨曲池而漁疾風霣雹雷電奄冥大水四起霹靂下臻矍然而驚其僕曰弧虚設張八宿相望熒惑於角五星失行此國之大變也君其返國矣於是商梁返室援琴嘆之韻聲激發象霹靂之聲曰疾雨盈河霹靂下臻洪水浩浩滔厥天鏗􅔨隆愧隠隠闐闐國將亡兮喪厥年琴苑要録鶡冠子或曰楚人隠居幽山衣被屢空以鶡為冠莫測其名因服其號著書言道家龎諼常師事之後顯於趙鶡冠子懼其薦已也乃與諼絶真隠傳子漢書道家鶡冠一篇荆有次非者得寳劍於干遂還反涉江至中流陽侯之波有兩蛟夾繞其船次非謂舟人曰子嘗見兩蛟夾船而能活者乎船人曰未之見也次非攘臂袪衣拔寳劍曰武士可以仁義之禮説也不可刼而奪也此江中之腐肉朽骨也棄劍而已余有奚愛焉於是赴江刺蛟殺之而復上船舟中之人皆得活荆王聞之仕之執圭吕覽知分道淮南子應博物志云荆軻字次非渡江鮫夾船次非不奏斷其頸而風波静除楚人有涉江者其劍自舟中墜於水遽契一作刻其舟曰是吾劍之所從墜舟止從其所契者入水求之舟已行矣求劍若此不已惑乎以故法為其國與此同時已徙矣而法不徙以此為治豈不難哉有過於江上者見人方引嬰兒而欲投之江中嬰兒啼人問其故曰此其父善游其父雖善游其子豈遽善游哉此任物亦不必悖矣楚國之為政有似於此吕覽察今荆人欲襲宋使人先表澭水澭水暴益楚人弗知循表而夜涉溺死者千有餘人軍驚而壤都舍向其先表之時可導也今水已變而益多矣楚人尚猶循表而導之此其所以敗也吕覽察今公叔文子為楚令尹三年民無敢入朝公叔子見曰嚴矣文子曰朝廷之嚴也寧云妨國家之治哉公叔子曰嚴則下喑下喑則上聾聾喑不能相通何國之治也蓋聞之也順針縷者成帷幕合升斗者實倉廩并小流而成江海明主者有所受命而不行未嘗有所不受也説苑政理楚令尹死景公遇成公乾曰令尹將焉歸成公乾曰殆於屈春乎景公怒曰國人以為歸於我成公乾曰子資少屈春資多子義獲天下之至憂也而子以為友鳴鶴與芻狗其知甚少而子玩之鴟夷子皮日侍於屈春損頗為友二人者之智足以為令尹不敢専其智而委之屈春故曰政其歸於屈春乎説苑臣術太宰子朱侍飯於令尹子國子朱子國皆楚大夫令尹子國啜羮而熱投巵漿而沃之明日太宰子朱辭官而歸其僕曰楚太宰未易得也辭官去之何也子朱曰令尹輕行而簡禮其辱人不難明年伏郎尹而笞之三百淮南子人間申喜楚人少亡母聞乞人行歌聲感而出視則其母也淮南子説山註秦侏儒善於楚王而隂有善楚王左右而内重於惠文君楚適有謀侏儒常先聞之以告惠文君韓子内儲下巴蔓子巴人周末國亂蔓子為將軍請師於楚許以三城楚已救巴遣使請城蔓子曰藉楚之靈克解國難誠許楚城可持吾頭往謝城不可得也遂自刎使者持其首歸報楚王曰使吾得臣如蔓子何用城為以上卿禮葬之地志重慶府羊角哀左伯桃二人聞楚王賢往歸之道經郃陽遇雪度不能俱生乃并衣與角哀伯桃入樹死角哀至楚為上大夫王備卿禮葬伯桃哀角自殺以殉地志西安府列士傳羊角哀左伯桃二人相與為死友欲仕於楚道遥山阻遇雨雪不得行饑寒無計自度不能俱生也伯桃謂角哀曰天不我與深山窮困併在一人可得生宦俱死之後骸骨莫收内手捫心知不如子生恐無益而棄子之能我樂在樹中角哀聴之伯桃入樹中而死得衣糧前至楚楚平王愛角哀之賢嘉伯桃之義以公卿禮葬之角哀夢見伯桃曰蒙子之恩而獲厚葬然正苦荆將軍冡相近欲役使吾吾不能聴也與連戰不勝今月十五日當大戰得子則勝否則負矣角哀至期日陳兵馬詣其冡上作三桐人自殺下而從之君子曰執義可以為世規楚王與凡君坐少焉楚王左右曰凡亡者三凡君曰凡之亡也不足以喪吾存夫凡之亡不足以喪吾存則楚之存不足以存存由是觀之則凡未始亡而楚未始存也莊子田子方楚㑹諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲淮南子繆稱訓注淮南子覽㝠訓魯陽公與韓搆難戰酣日暮援戈而撝之撝一作麾日反三舍魯陽楚人也司馬期之子楚僣號稱王其守縣大夫皆稱公故曰魯陽公今南陽是也又博物志楚相景陽淫酒被髪而御於婦人威服諸侯淮南子楚令尹薳子憑以疾辭官重繭衣裘鮮食而寢王使醫視之曰疾則甚矣而血氣未動白帖疾類楚有烹猴者而召其鄰人鄰人以為犬羮而甘之後聞其猴據地而盡吐㵼其所食此未知味者淮南子修務訓楚人握山雉者路人問何鳥也欺之曰鳳凰路人曰我聞鳳凰今始見矣請買千金弗與加倍乃與之方欲獻楚王經宿死路人不遑惜其金惟恨不得獻王王聞之感其欲獻也召厚賜之過買鳥之金十倍尹文子韓非子説林有獻不死之藥於荆王者謁者操之以入中射之士問曰可食乎曰可因奪而食之王大怒使人殺中射之士中射之士使人説王曰臣問謁者曰可食臣故食之是臣無罪而罪在謁者也且客獻不死之藥臣食之而王殺臣是死藥也是客欺王也夫殺無罪之臣而明人之欺王也不如釋臣王乃不殺韓非子説林有欲以御見荆王者衆騶妒之因曰臣能檄鹿見王王為御不及鹿自御及之王善其御也及言衆騶妒之春秋戰國異辭卷三十一
