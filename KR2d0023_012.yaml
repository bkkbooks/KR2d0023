body:
  text: 春秋戰國異辭卷十右春坊右諭德陳厚耀撰晉襄公晉襄公元年春秦師過周無禮王孫滿譏之詳左傳兵至滑鄭賈人弦高將市于周遇之以十二牛勞秦師秦師驚而還滅滑而去晉先軫曰秦伯不用蹇叔反其衆心此可擊欒枝曰未報先君施於秦擊之不可先軫曰秦侮吾孤伐吾同姓何德之報遂擊之襄公墨衰絰四月敗秦師於殽虜秦三將孟明視西乞秫白乙丙以歸遂墨以葬文公文公夫人秦女謂襄公曰秦欲得其三將戮之公許遣之先軫聞之謂襄公曰患生矣軫乃追秦將秦將渡河已在船中頓首謝卒不反後三年秦果使孟明伐晉報殽之敗取晉汪以歸四年秦繆公大興兵伐我渡河取王官封殽尸而去晉恐不敢出遂城守五年晉伐秦取新城報王官役也六年趙衰成子欒貞子咎季子犯霍伯皆卒趙盾代趙衰執政史晉世家晉襄公使人於周曰敝邑寡人寢疾卜以守龜曰三塗為祟敝邑寡君使下臣願藉途而祈福此見左昭十七年晉頃公事天子許之朝禮使者事畢客出萇𢎞謂劉康公曰夫祈福于三塗而受禮于天子此柔嘉之事也而客有武色殆有他事願公備之也康公乃警戎車卒士以待之晉果使祭事先令楊子將卒十二萬而隨之涉于棘津襲聊阮梁蠻氏滅三國焉呂覽精諭紀年晉襄公六年洛絶于泂七年八月襄公卒太子夷臯少晉人以難故欲立長君趙盾曰立襄公弟雍好善而長先君愛之且近於秦秦故好也立善則固事長則順奉愛則孝結舊好則安賈季曰不如其弟樂辰嬴嬖於二君立其子民必安之趙盾曰辰嬴賤班在九人下其子何震之有且為二君嬖淫也為先君子不能求大而出在小國僻也母淫子僻無威陳小而遠無援將何可乎使士會於秦迎公子雍賈季亦使人召公子樂於陳趙盾廢賈季以其殺陽處父十月葬襄公十一月賈季奔翟是嵗秦繆公亦卒史晉世家靈公靈公元年四月秦康公曰昔文公之入也無衛故有呂郤之患乃多與公子雍衛太子母繆嬴日夜抱太子以號泣於朝曰先君何罪其嗣亦何罪舍適而外求君將安置此出朝則抱以適趙盾所頓首曰先君奉此子而屬之子曰此子材吾受其賜不材吾怨子今君卒言猶在耳而棄之若何趙盾與諸大夫皆患繆嬴且畏誅乃背所迎而立太子夷臯是為靈公發兵以距秦送公子雍者趙盾為將往擊秦敗之令狐先蔑隨會亡奔秦秋齊宋衛鄭曹許君皆會趙盾盟於扈以靈公初立故也史晉世家晉襄公薨嗣君少趙宣子相謂大夫曰立少君懼多難請立雍雍長出在秦秦大足以為援賈季曰不若公子樂樂有寵于國先君愛而仕之翟翟足以為援穆嬴抱太子以呼于庭曰先君奚罪其嗣亦奚罪舍嫡嗣不立而外求君乎出朝抱以見宣子曰惡難也故欲立長君長君立而少君壯難乃至矣宣子患之遂立太子也説苑建本與左傳略同秦晉戰交綏晉靈公六年秦使人謂晉將軍曰三軍之士皆未息明日請復戰臾駢曰使者目動而言肆懼我將遁矣迫之河必敗之趙盾曰死傷未收而棄之不惠也不待期而迫人于險無勇也請待秦人夜遁説苑至公趙宣子言韓獻子于晉侯曰其為人不黨治衆不亂臨死不恐晉侯以為中軍尉河曲之役晉靈公七年趙宣子之車干行韓獻子戮其僕人皆曰韓獻子必死矣其主朝升之而暮戮其僕誰能待之役罷趙宣子觴大夫爵三行曰二三子可以賀我二三子曰不知所賀宣子曰我言韓厥于君言之而不當必受其刑今吾車失次而戮之僕可謂不黨矣是吾言當也二三子再拜稽首曰不惟晉國適享之乃唐叔是賴之敢不再拜稽首乎説苑至公四年伐秦取少梁秦亦取晉之殽史晉世家六年秦康公伐晉取羈馬晉侯怒使趙盾趙穿郤缺擊秦大戰河曲趙穿最有功七年晉六卿患隨會之在秦常為晉亂乃詐令魏壽餘反晉降秦秦使隨會之魏因執會以歸晉史晉世家八年周頃王崩公卿爭權故不赴晉使趙盾以車八百乘平周亂而立匡王是年楚莊王初即位十二年齊人弒其君懿公史晉世家宋人殺昭公晉靈公十年晉趙宣子請師於靈公而救之靈公曰非晉國之急也宣子曰不然夫大者天地其次君臣所以為順也今殺其君所以反天地逆人道也天將加災焉晉為盟主而不救天罰懼及矣詩云凡民有喪匍匐救之而况國君乎於是靈公乃興師而從之宋人聞之儼然感悅而晉國日昌韓詩卷一十四年靈公壯侈厚斂以雕牆從臺上彈人觀其避丸也宰夫胹熊蹯不熟靈公怒殺宰夫使婦人持其尸出棄之過朝趙盾隨會前數諌不聽已又見死人手二人前諌隨會先諫不聽靈公患之使鉏麑刺趙盾盾閨門開居處節鉏麑歎曰殺忠臣棄君命罪一也遂觸樹而死史晉世家晉靈公造九層臺廢用千億謂左右曰敢有諫者斬孫息乃諫曰臣能纍十三搏基加九雞子其上公曰吾少學未嘗見也子為寡人作之孫息即以棊子置其下加九雞子其上左右懾懼靈公扶伏氣息不續公曰危哉孫息曰臣謂是不危也復有危此者公曰願見之孫息曰九層之臺三年不成男不得耕女不得織國用空虗户口減少吏民叛亡鄰國謀議將興兵社稷將滅君何所望靈公曰寡人之過乃至于此即壞九層之臺説苑説苑孫息學悲歌引琴作鄭衛之音靈公大惑故作衛公之曲歌而和之白帖引琴清英晉王謂孫息曰子鼓琴能令寡人悲乎息曰今處高臺邃宇連屋重户藿肉漿酒倡樂在前難可使悲者乃謂少失父母長無兄嫂當道猶坐暮無所止於此者乃可悲耳乃援琴而鼓之晉王傷心哀涕曰何子來遲也繹史云是孟嘗雍門之事也稱王更誤趙宣孟將上之絳地志今山西絳州有哺飢坂見骫桑之下有餓人卧不能起者宣孟止車為之下食蠲而餔之再咽而後能視宣孟問之曰女何為而餓若是對曰臣宦於絳歸而絶糧羞行乞而憎自取故至於此宣孟與脯一朐拜受而弗敢食也問其故對曰臣有老母將以遺之宣孟曰斯食之吾更與汝乃復賜之脯二束與錢百而遂去之處二年晉靈公欲殺宣孟伏士於房中以待之因發酒於宣孟宣孟知之中飲而出靈公令房中之士疾追而殺之一人追疾先及宣孟之靣曰嘻君􅓅教宣孟使就車也吾請為君反死宣孟曰而名為誰反走對曰何以名為臣骫桑下之餓人也還鬬而死宣孟遂活呂覽報更又説苑復恩初盾常田首山見桑下有餓人餓人示眯明也盾與之食食其半問其故曰宦三年未知母之存不願遺毋盾義之益與之飯肉已而為晉宰夫趙盾弗復知也九月晉靈公十四年晉靈公飲趙盾酒伏甲將攻盾公宰示眯明知之恐盾醉不能起而進曰君賜臣觴三行可以罷欲以去趙盾令先毋及難盾既去靈公伏士未會先縱齧狗名敖明為盾搏殺狗盾曰棄人用狗雖猛何為然不知明之為隂德也已而靈公伏士出逐趙盾示眯明反擊伏士伏士不能進而竟脫盾盾問其故曰我桑下餓人問其名弗告明亦因亡去盾遂奔未出晉境乙丑盾昆弟趙穿襲殺靈公於桃園虞翻曰園名也而迎趙盾趙盾素貴得民和靈公少侈民不附故為弒易盾復位晉太史董狐書曰趙盾弒其君以視于朝盾曰弒者趙穿我無罪太史曰子為正卿而亡不出境反不誅國亂非子而誰孔子聞之曰董狐古之良史也書法不隱史晉世家與左氏稍異西京雜記廣川王發晉靈公冡得玉蟾蜍一枚大如拳腹空容五合水光潤如新玉取以盛書滴趙盾使趙穿迎襄公弟黑臀于周而立之是為成公成公者文公少子其母周女也壬申朝于武宫成公成公元年賜趙氏為公族伐鄭鄭倍晉故也三年鄭伯初立附晉而棄楚楚怒伐鄭晉往救之六年伐秦虜秦將赤七年成公與楚莊王爭強會諸侯于扈陳畏楚不會晉使中行桓子伐陳因救鄭與楚戰敗楚師是年成公卒子景公據立史晉世家景公景公元年春陳大夫夏徵舒弒其君靈公二年楚莊王伐陳誅徵舒三年楚莊王圍鄭鄭告急於晉晉使荀林父將中軍隨會將上軍趙朔將下軍郤克欒書先縠韓厥鞏朔佐之六月至河聞楚已服鄭鄭伯肉袒與盟而去荀林父欲還先縠曰凡來救鄭不至不可將率離心卒渡河楚已服鄭欲飲馬于河為名而去楚與晉軍大戰鄭新附楚畏之反助楚攻晉晉軍敗走河爭渡船中人指甚衆楚虜我將智罃歸而林父曰臣為督將軍敗當誅請死景公欲許之隨會曰昔文公之與楚戰城濮成王歸殺子玉而文公乃喜今楚已敗我師又誅其將是助楚殺仇也乃止史晉世家初晉趙盾舉韓厥晉君以為中軍尉趙盾死子朔嗣為卿至景公三年趙朔為晉將朔取成公姊為夫人大夫屠岸賈欲誅趙氏初趙盾在時夢見叔帶持要而哭甚悲已而笑拊手且歌盾卜之兆絶而後好趙史援占之曰此夢甚惡非君之身乃君之子然亦君之咎至孫趙將世益衰屠岸賈者始有寵于靈公及至于景公而賈為司冦將作難乃治靈公之賊以致趙盾遍告諸將曰盾雖不知猶為賊首以臣弒君子孫在朝何以懲罪請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今諸君將誅其後是非先君之意而妄誅謂之亂臣有大事而君不聞是無君也屠岸賈不聽韓厥告趙朔趣亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅與諸將攻趙氏于下宫殺趙朔趙同趙括趙嬰齊皆滅其族趙朔妻成公姊有遺腹走公宮匿趙朔客曰公孫杵臼謂朔友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索于宮中夫人置兒褲中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫程嬰謂公孫杵臼曰今一索不得後必且復索之奈何公孫杵臼曰立孤與死孰難程嬰曰死易立孤難耳公孫杵臼曰趙氏先君遇子厚子強為其難者吾為其易者請先死乃二人謀取他人嬰兒負之衣以文葆匿山中程嬰出謬謂諸將軍曰嬰不肖不能立趙孤誰能與我千金吾告趙氏孤處諸將皆喜許之發師隨程嬰攻公孫杵臼杵臼謬曰小人哉程嬰昔下宫之難不能死與我謀匿趙氏孤兒今又賣我縱不能立而忍賣之乎抱兒呼曰天乎天乎趙氏孤兒何罪請活之獨殺杵臼可也諸將不許遂殺杵臼與孤兒諸將以為趙氏孤兒良已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中十五年史趙世家皆又新序卷七及説苑復恩同但無程嬰杵臼事四年先縠以首計而敗晉軍河上恐誅乃奔翟與翟謀伐晉晉覺乃族縠縠先軫子也五年伐鄭為助楚故也是時楚莊王強以挫晉兵河上也六年楚伐宋宋來告急晉晉欲救之伯宗諫曰楚天方開之不可當乃使解揚紿為救宋鄭人執與楚楚厚賜使反其言令宋急下解揚紿許之卒致晉君言楚欲殺之或諫乃歸解揚史晉世家楚莊王伐宋宋告急于晉晉景公六年晉景公欲發兵救宋伯宗諌曰天方開楚未可伐也乃求壯士得霍人解揚字子虎誆楚令宋毋降過鄭鄭與楚親乃執解揚而獻楚楚王厚賜與約使反其言令宋趣降三要乃許於是楚登解揚樓車令呼宋遂負楚約而致其君命曰晉方悉國兵以救宋宋雖急慎毋降楚晉兵今至矣楚莊王大怒將殺之解揚曰君能制命為義臣能承命為信受吾君命以出有死無隕莊王曰若之許我已而背之其信安在解揚曰所以許王欲以成吾君命也將死顧謂楚軍曰為人臣無忘盡忠得死者楚王諸弟皆諌王赦之於是赦解揚使歸晉爵之為上卿史鄭世家一載楚晉國苦盜有郤雍者能視盜之貌察其眉睫之間而得其情晉侯使視盜千百無遺一焉晉侯喜告趙文子曰吾得一人而一國盜為盡矣奚用多為文子曰吾君恃伺察而得盜盜不盡矣且郤雍必不得其死焉俄而羣盜謀曰吾所窮者郤雍也遂共盜而殘之晉侯聞而大駭立召文子而告之曰果如子言郤雍死矣然取盜何方文子曰周諺有言察見淵魚者不祥智料隱匿者有殃且君欲無盜莫若舉賢而任之使教明于上化行于下民有耻心則何盜之為于是用隨會知政而羣盜奔秦焉列子説符公隨會執政當晉景七年范文子喜直言武子擊之以杖曰直議者不為人所容非徒危身又將危父韓子外儲左七年晉使隨會滅赤狄八年使郤克於齊齊頃公毋從樓上觀而笑之所以然者郤克僂而魯使蹇衛使眇故齊亦令人如之以道客郤克怒歸至河上曰不報齊者河伯視之至國請君欲伐齊景公問知其故曰子之怨安足以煩國弗聽魏文子請老休辟郤克克執政史晉世家左傳無魏文子請老者隨武子也九年楚莊王卒晉伐齊齊使太子強為質於晉晉兵罷史晉世家十一年春齊伐魯取隆魯告急衛衛與魯皆因郤克告急於晉晉乃使郤克欒書韓厥以兵車八百乘與魯衛共伐齊夏與頃公戰於鞍傷困頃公頃公乃與其右易位下取飲以得脫去齊師敗走晉追北至齊頃公獻寶器以求平不聽郤克曰必得蕭桐姪子為質齊使曰蕭桐姪子頃公母頃公母猶晉君母奈何必得之不義請復戰晉乃許與平而去史晉世家紀年晉景公十一年齊國佐來獻玉磬紀公之甗韓非子靡笄之役景公十一年韓獻子將斬人郤獻子聞之駕往救之比至則已斬之矣郤子因曰胡不以殉其僕曰曩不將救之乎郤子曰吾敢不分謗乎或曰郤子言不可不察也非分謗也韓子之所斬也若罪人則不可救救罪人法之所以敗也法敗則國亂若非罪人而勸之以殉勸之以殉是重不辜也重不辜民所以起怨者也民怨則國危郤子之言非危則亂不可不察也且韓子之所斬若罪人郤子何分焉斬若非罪人則已斬之矣而郤子乃至是韓子之謗已成而郤且後至也夫郤子曰以殉不足以分斬人之謗而又生殉之謗是何言分謗也昔者紂為炮烙崇侯惡來又曰斬涉者之脛也奚分於紂之謗且民之望於上也甚矣韓子弗得且望郤子之得之也今郤子俱弗得則民絶望於上矣故曰郤子之言非分謗也益謗也且郤子之往救罪也以韓子為非也不道其所以為非而勸之以殉是使韓子不知其過也夫下使民望絶於上又使韓子不知其失吾未得郤子之所以分謗者也楚申公巫臣盜夏姬以奔晉晉以巫臣為邢大夫史晉世家十二年冬齊頃公如晉欲上尊晉景公為王景公讓不敢晉始作六卿韓厥鞏朔趙穿荀騅趙括趙旃皆為卿智罃自楚歸十三年魯成公朝晉晉弗敬魯怒去倍晉晉伐鄭取汜史晉世家十四年梁山崩問伯宗伯宗以為不足怪也史晉世家梁山崩晉景公十四年晉君召大夫伯宗道逢輦者以其輦服於道伯宗使其右下欲鞭之輦者曰君趨道豈不逺矣不知事而行可乎伯宗喜問其居曰絳人也伯宗曰子亦有聞乎曰梁山崩壅河顧三日不流是以召子伯宗曰如之何曰天有山天崩之天有河天壅之伯宗將如之何伯宗私問之曰君其率羣臣素服而哭之既而祠焉河斯流矣伯宗問其姓名弗告伯宗至君問伯宗以其言對於是君素服率羣臣而哭之既而祠焉河乃流君問伯宗何以知之伯宗不言受輦者詐以自知與左氏别孔子聞之曰伯宗其無後攘人之善韓詩卷八十六年楚將子反怨巫臣滅其族巫臣怒遺子反書曰必令子罷於奔命乃請使吳令其子為吳行人教吳乘車用兵吳晉始通約伐楚史晉世家十七年誅趙同趙括族滅之韓厥曰趙衰趙盾之功豈可忘乎奈何絶祀乃復令趙庶子武為趙後復與之邑史晉世家晉景公疾卜大業之後不遂者為祟景公問韓厥厥知趙孤在乃曰大業之後在晉絶祠者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥獨降佐殷帝太戊及周天子皆有明德下及幽厲無道而叔𢃄去周適晉事先君文侯至于成公世有立功未嘗絶祠今吾君獨滅趙宗國人哀之故見龜策惟君圖之景公問趙尚有後乎韓厥具以實告于是景公乃以韓厥謀立趙孤兒召而匿之宫中諸將入問疾景公因韓厥之衆以脅諸將而見趙孤名曰武諸將不得已乃曰昔下宫之難屠岸賈為之矯以君命并命羣臣非然孰敢作難微君之疾羣臣固且請立趙後今君有命羣臣之願也于是召趙武程嬰遍拜諸將遂反與程嬰趙武攻屠岸賈滅其族復與趙武田邑如故景公十七年及趙武冠為成人程嬰乃辭諸大夫謂趙武曰昔下宫之難我非不能死我思立趙氏之後今趙武既立為成人復故位我將下報趙宣孟與公孫杵臼趙武啼泣頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先我死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋祠之世世勿絶史趙世家七又新序卷及説苑復恩繹史按左傳趙氏之難起自莊姫無屠岸賈其人者事在魯成公八年即晉景公之十七年於是年已有趙武無遺腹匿孤之説也史遷好竒每存異説而事與年推尋皆無據十九年夏景公病立太子壽曼為君是為厲公後月餘景公卒厲公厲公元年初立欲和諸侯與秦桓公夾河而盟歸而秦倍盟與翟謀伐晉三年使呂相讓秦詳左傳因與諸侯伐秦至涇敗秦于麻隧虜其將成差五年三郤讒伯宗殺之伯宗以好直諌得禍國人以是不附厲公以上史晉世家約左傳文六年春鄭倍晉與楚盟晉怒欒書曰不可以當吾世而失諸侯乃發兵厲公自將五月渡河聞楚兵來救范文子請公欲還郤至曰發兵誅逆見強辟之無以令諸侯遂與戰癸巳射中楚共王目楚兵敗于鄢陵子反收餘兵拊循欲復戰晉患之共王召子反其侍者豎陽榖進酒子反醉不能見王怒讓子反子反死王遂引兵歸晉由此威諸侯欲以令天下求霸史晉世家中行獻子將伐鄭范文子曰不可得志于鄭諸侯仇我憂必滋長郤至又曰得鄭是兼國也兼國則王王者固多憂乎文子曰王者盛其德而遠人歸故無憂今我寡德而有王者之功故多憂今子見無土而欲富者樂乎哉説苑貴德晉之三卿郤錡郤犨郤至從晉厲公會諸侯于柯陵周襄公在會晉厲公視遠步高郤錡見單子其語犯郤犨見其語訐郤至見其語伐齊國佐見其語盡單襄公告魯成公曰晉將有亂其君與三郤其當之乎魯侯成公曰寡人固晉而強其君今君曰將有亂敢問天道乎抑人故也對曰吾非瞽史也焉知天道吾見晉君之容而聽三郤之語豈殆必有禍矣君子目以正體足以從之是以觀容而知其心今晉侯視遠而足高目不在體而足不步目其心必異矣目體不相從何以能久夫合諸侯國之大事也于是觀存亡之徵焉故國將有福其君步言視聽必皆得適順善則可以知德矣視遠日絶其義足高日棄其德言爽日反其信聽淫日離其名目以處義足以踐德口以庇信耳以聽名者矣故不可不慎也偏亡者有咎既亡則國從之今晉侯無一可焉吾是以云夫郤氏晉之寵人也是族在晉有三卿五大夫貴矣亦可以戒懼矣今郤伯之語犯郤叔訐郤季伐犯則陵人訐則誣人伐則掩人有是寵也而益之以三怨其誰能忍之齊國武子亦將有禍齊亂國也立於淫亂之朝而好盡言以暴人過怨之本也惟善人能受盡言今齊既亂其能善乎居二年晉殺三卿晉厲公七年明年厲公弒于東門是歲也齊人果殺國武子新書卷十與國語略同厲公多外嬖姬歸欲盡去羣大夫而立諸姫兄弟寵姫兄曰胥童嘗與郤至有怨及欒書又怨郤至不用其計而遂敗楚乃使人間謝楚楚來詐厲公曰鄢陵之戰實至召楚欲作亂內子周立之會與國不俱是以事不成厲公告欒書欒書曰其殆有矣願公試使人之周微考之果使郤至於周欒書又使公子周見郤至郤至不知見賣也厲公驗之信然遂怨卻至史記晉世家傳言外嬖謂嬖臣非嬖姫也且妾之稱姬非當時語史記之誤多有如此者八年厲公獵與姬飲郤至殺豕奉進宦者奪之郤至射殺宦者公怒曰季子欺豫將誅三郤未發也郤錡欲攻公曰我雖死公亦病矣郤至曰信不反君智不害民勇不作亂失此三者誰與我我死耳十二月壬午公令胥童以兵八百人襲攻殺三郤胥童因以劫欒書中行偃于朝曰不殺二子患必及公公曰一旦殺三卿寡人不忍益也對曰人將忍君公弗聽謝欒書等以誅郤氏罪大夫復位二子頓首曰幸甚幸甚公使胥童為卿閏月乙卯厲公遊匠驪氏欒書中行偃以其黨襲捕厲公囚之殺胥童而使人迎公子周于周而立之是為悼公史晉世家晉厲公之時六卿貴胥童長魚矯諫曰大臣貴重敵主爭事外市樹黨下亂國法上以劫主而國不危者未嘗有也公曰善乃誅三卿胥童長魚矯又諌曰夫同罪之人偏誅而不盡是懷怨而借之間也公曰吾一朝而夷三卿豫不忍盡也長魚矯對曰公不忍之彼將忍公公不聽居三月諸卿作難遂殺厲公而分其地厲公八年韓子內儲下史記晉厲公殺其大夫三郤欒書畏及乃遂弒其君厲公更立襄公曽孫周是為悼公晉由此大夫稍強韓武子田獸已聚矣田車合矣傳來告曰晉公厲公也薨武子謂欒懷子曰子亦知君好田獵也獸亦聚矣田車合矣吾可以卒獵而後弔乎懷子對曰范氏之亡也多輔而少拂今臣於君輔也畾於君拂也君胡不問於畾也武子曰盈而欲拂我乎而拂我矣何必畾哉遂輟田説苑按欒盈之死前此百三十年矣悼公悼公元年正月庚申欒書中行偃弒厲公葬之以一乘車厲公囚六日死死十日庚午智罃迎公子周來至絳刑雞與大夫盟而立之是為悼公史晉世家正月辛巳朝武宫二月乙酉即位悼公周者其大父捷晉襄公少子也不得立號為桓叔桓叔最愛桓叔生惠伯談談生悼公周周之立年十四矣悼公曰大父父皆不得立而避難于周客死焉寡人自以踈遠毋幾為君今大夫不忘文襄之業而惠立桓叔之後賴宗廟大夫之靈得奉晉祀豈敢不戰戰乎大夫其亦佐寡人于是逐不臣者七人修舊功施德惠收文公入時功臣後史晉世家小與左氏異秋伐鄭鄭師敗遂至陳三年晉會諸侯悼公問羣臣可用者祁傒舉解狐解狐傒之仇復問舉其子祁午君子曰祁傒可謂不黨矣外舉不隱仇內舉不隱子史晉世家晉平公平公當作悼公問於祁黃羊曰南陽無令其誰可而為之祁黃羊對曰解狐可平公曰解狐非子之仇耶對曰君問可非問臣之仇也平公曰善遂用之國人稱善焉居有間平公又問祁黃羊曰國無尉其誰可而為之對曰午可平公曰午非子之子耶對曰君問可非問臣之子也平公曰善又遂用之國人稱善焉孔子聞之曰善哉祁黃羊之論也外舉不避仇內舉不避子可謂公矣呂覽去私祁左襄三年悼公問奚略同説苑趙宣子言韓獻子於晉侯曰其為人不黨治衆不亂臨死不恐晉侯以為中軍尉河曲之役趙宣子之車干行韓獻子戮其僕人皆曰韓獻子必死矣其主朝升之而暮戮其僕誰能待之役罷趙宣子觴大夫爵三行曰二三子可以賀我二三子曰不知所賀宣子曰我言韓厥於君言之而不當必受其刑今吾軍失次而戮之僕可謂不黨矣是吾言當也二三子再拜稽首曰不惟晉國適享之乃唐叔是賴之敢不再拜稽首乎此事在悼公四年方會諸侯悼公弟楊干亂行魏絳戮其僕悼公怒或諫公公卒賢絳任之政使和戎戎大親附十一年悼公曰自吾用魏絳九合諸侯和戎翟魏子之力也賜之樂三讓乃受之冬秦取我櫟史晉世家十四年晉使六卿率諸侯伐秦度涇大敗秦軍至棫林而去十五年悼公問治國於師曠師曠曰惟仁義為本冬悼公卒子平公彪立史晉世家平公平公元年伐齊齊靈公與戰靡下齊師敗走晏嬰曰君亦毋勇何不止戰遂去晉追遂圍臨災盡燒屠其郭中東至膠南至沂齊皆城守晉乃引兵歸六年魯襄公朝晉史晉世家叔向之弟羊舌虎善欒盈欒盈有罪於晉晉誅羊舌虎叔向為之奴而朡沒入為奴朡繫也祁奚曰吾聞􅘁人得位不爭不祥君子在憂不救不祥乃往見范宣子而説也曰聞善為國者賞不過而刑不慢賞過則懼及淫人刑慢則懼及君子與其不幸而過寧過而賞淫人毋過而刑君子故堯之刑也殛鮌於虞而用禹周之刑也戮管蔡而相周公不慢刑也宣子乃命吏出叔向呂覽開春説又説苑善欒盈作樂逹羊舌子之妻叔向叔魚之母也羊舌子好直不容于晉去而之三室之邑邑人攘羊而遺之羊舌子不受姬曰不如受而埋之羊舌子曰何不餉肸與鮒也叔向名肸叔魚名鮒姬曰不可南方有鳥曰吉乾食其子不擇肉子多不義今肸與鮒童子也隨大人而化不可食以不義之肉乃盛以甕埋壚隂後攘羊事敗吏至發而視之舌尚存吏曰君子哉羊舌子也國人異之遂以羊舌為族列女傳叔向欲娶於申公巫臣氏夏姬之女叔姬不欲平公強使娶之生楊食我號曰伯碩生時侍者謁之叔姬往視之及堂聞其號也而還曰豺狼之聲也狼子野心滅羊舌者必是子也及長與祁勝為亂晉人殺食我羊舌氏由是遂滅晉逐欒盈之族晉平公六年命其家臣有敢從者死其臣曰辛俞從之吏得而將殺之君曰命汝無得從敢從何也辛俞對曰臣聞三世仕於家者君之二世者主之事君以死事主以勤為其賜之多也今臣三世于欒氏受其賜多矣臣敢畏死而忘三世之恩哉晉君釋之説苑復恩與國語略同晉平公七年欒逞有罪奔齊明年齊莊公微遣欒逞于曲沃以兵隨之齊兵上大行欒逞從曲沃中反襲入絳絳不戒平公欲自殺范獻子止公以其徒擊逞逞敗走曲沃曲沃攻逞逞死遂滅欒氏宗逞者欒書孫也左氏逞作盈其入絳與魏氏謀齊莊公聞逞敗乃還取晉之朝歌去以報臨淄之役也史晉世家尸子范獻子遊河大夫皆在君曰知欒氏之子乎大夫莫答舟人清涓捨楫對曰君奚問欒氏之子君曰自吾亡欒氏也其老者未死少者壯矣清涓曰善修晉國之政內得大夫外不失百姓雖欒氏子其若君何若不修晉國之政內不得大夫而外失百姓則舟中之人皆欒氏子也君曰善十年齊崔杼弒莊公晉因齊亂伐敗齊于高唐報大行之役也史晉世家晉平公間居師曠侍坐平公曰子生無目聯甚矣子之墨墨也師曠對曰天下有五墨墨而臣不得與一焉平公曰何謂也師曠曰羣臣行賂以采名譽百姓侵田寃無所告訴而君不悟此一墨墨也忠臣不用用臣不忠下才處高不肖臨賢而君不悟此二墨墨也姦臣欺詐空虗府庫以其少才覆塞其惡賢人逐姦邪貴而君不悟此三墨墨也國貧民罷上下不和而好財用兵嗜欲無厭諂諛之人容容在旁而君不悟此四墨墨也至道不明法令不行吏民不正百姓不安而君不悟此五墨墨也國有五墨墨而不危者未之有也臣之墨墨者小耳何害乎國家哉新序卷一師曠者或出于晉靈之世以主樂官妙辨音律撰兵書萬篇時人莫知其原裔出沒難詳也晉平公之時以隂陽之學顯于當世燻目為瞽人以絶塞衆慮專心于星算音律之中考鐘呂以定四時無毫釐之異春秋不記師曠出何帝之時曠知命欲終乃述寶符百卷晉戰國時其書滅絶矣拾遺記篇漢書兵家師曠八周靈王淮南子昔者師曠奏白雪之音而神物為之下降風雨暴至平公癃病晉國赤地又淮南子師曠瞽而為太宰晉無亂政有貴于見者也宋符瑞志白燕者師曠時銜丹書來至河精人頭魚身師曠時所受識也玉羊師曠時來至晉平公出言而不當師曠舉琴而撞之趺祍宫壁左右欲塗之平公曰舍之以此為寡人失淮南子齊俗晉平公與羣臣飲飲酣乃喟然嘆曰莫樂為人君惟其言而莫之違師曠侍坐於前援琴撞之公披祍而避琴壞於壁公曰太師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰啞歎息之聲是非君人者之言也左右請除之公曰釋之以為寡人戒韓子難一晉平公鑄大鐘使工聽之皆以為調矣師曠曰不調請更鑄之平公曰工皆為調矣師曠曰後世有知音者將知鐘之不調也臣竊為君耻之至於師涓而果知鐘之不調也吕覽長見務又淮南子修古文瑣語師曠御晉平公鼓瑟輟而笑曰齊侯與其嬖戲墜于牀而傷其臂平公命人書之曰某月某日齊侯戲而傷問之於齊侯笑而然有之古文瑣語晉平公至澮上見人乘白驂八駟以來有貍身而狐尾去其車而隨公之車公問師曠師曠曰貍身而狐尾其名曰首陽之神飲酒於霍太山而歸其逢君於澮乎君其有喜有鳥飛從南方來質白五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西方有白質鳥五色皆備其名曰翬南方赤質五色備其名曰搖來為吾君臣其祥先至矣白帖晉平公時有鳥從南方來赤質五色皆備集于庭相讓叔向曰吾聞師曠曰西方有鳥白質五色曰翬南方有鳥赤質五色曰雉今來為君瑞也晉平公問於師曠曰人君之道如何對曰人君之道清淨無為務在慱愛趨在任賢廣開耳目以察萬方不固溺於流俗不拘繫於左右廓然遠見踔然獨立屢省考績以臨臣下此人君之操也平公曰善説苑君道説苑敬慎韓平子問於叔向曰剛與柔孰堅對曰臣年八十矣齒再墮而舌尚存老𥅆有言曰天下之至柔馳騁乎天下之至堅又曰人之生也柔弱其死也剛強萬物草木之生也柔脆其死也枯稿因此觀之柔弱者生之徒也剛強者死之徒也夫生者毁而必復死者破而愈亡吾是以知柔之堅於剛也平子曰善哉然則子之行何從叔向曰臣亦柔耳何以剛為平子曰柔無乃脆乎叔向曰柔者紐而不折亷而不缺何為脆也天之道微者勝是以兩軍相加而柔者克之兩仇爭利而弱者得焉易曰天道虧滿而益謙地道變滿而流謙鬼神害滿而福謙人道惡滿而好謙夫懷謙不足之柔弱而四道者助之則安往而不得其志乎平子曰善韓非子叔向賦獵功多者受多功少者受少晉平公問於叔向曰國家之患孰為大對曰大臣重祿而不極諫近臣畏罰而不敢言下情不上通此患之大者也公曰善於是令國曰欲進善言謁者不通罪當死新序卷二晉平公問叔向曰歲飢民疫翟人攻我我將若何對曰歲飢來年而反矣疾疫將止矣翟人不足患也公曰患有大于此者乎對曰夫大臣重祿而不極諌近臣畏罪而不敢言左右顧寵于小官而君不知此誠患之大者也公曰善于是令國中曰欲有諫者為隱左右言及國吏罪説苑善説晉平公問于叔向曰昔者齊桓公九合諸侯一匡天下不識其君之力乎其臣之力也叔向對曰管仲善制割賓胥無善削縫言損益若女工隰朋善純緣言增飾若女工衣成君舉而服之亦其臣之力也君何力之有師曠伏琴而笑之公曰太師奚笑也師曠對曰臣笑叔向之對君也凡為人臣者猶炮宰和五味而進之君君弗食孰敢強之也臣請譬之君者壤地也臣者草木也必壤地美然後草木碩大亦君之力也臣何力之有韓子難二新序卷四又師曠曰臣請譬之以五味管仲善割斷之隰朋善煎熬之賓須無善齊和之羮已熟矣奉而進之而君不食誰能強之亦君之力也新序叔向御平公請事公腓痛足痺轉筋而不敢壞坐晉國聞之皆曰叔向賢者平公禮之轉筋而不敢壞坐晉國之辭仕托慕叔向者國之甀矣韓子外儲左髙士傳亥唐晉人也髙恪寡素晉人憚之雖蔬食菜羮平公每為之欣飽公與亥唐坐有間亥唐出叔向入平公伸一足曰吾向時與亥子坐腓痛足疸不敢伸叔向勃然作色不説公曰子欲貴乎吾爵子欲富乎吾祿子夫亥先生乃無欲也吾非正坐無以飬之子何不説乎董叔娶于范氏曰將以求繫援也他日董祁訴于范獻子獻子執而縳之于庭槐叔向曰求繫既繫矣求援既援矣爾欲得之無所謂也白帖婚姻楚王弟在秦秦不出也中射之士曰資臣百金臣能出之因載百金之晉見叔向曰楚王弟在秦秦不出也請以百金委叔向受金而以見之晉平公曰可以城壺丘矣平公曰何也對曰楚王弟在秦秦不出也是秦惡楚也必不敢禁我城壺丘若禁之我曰為我出楚王之弟吾不城也彼如出之可以德楚彼不出是卒惡也必不敢禁我城壺丘矣公曰善乃城壺丘謂秦公曰為我出楚王之弟吾不城也秦因出之楚王大説以錬金百鎰遺晉韓子説林楚公子午使于秦秦囚之其弟獻三百金於叔向叔向謂平公曰何不城壺丘秦楚患壺丘之城若秦恐而歸公子午以止吾城也君乃止難亦未構楚必德君平公曰善乃城之秦恐遂歸公子午使之晉晉人輟城楚獻晉賦三百車説苑權謀晉平公春築臺叔向曰不可古者聖王貴德而務施緩刑辟而趨民時今春築臺是奪民時也夫德不施則民不歸刑不緩則百姓愁使不歸之民役愁怨之百姓而又奪其時是重竭也夫牧百姓飬育之而重竭之豈所以定命安存而稱為人君于後世哉平公曰善乃罷臺役説苑貴德晉平公使叔向聘于吳吳人拭舟以逆之左五百人右五百人有繡衣而豹裘者有錦衣而狐裘者叔向歸以告平公平公曰吳其亡乎奚以敬舟奚以敬民叔向對曰君為馳底之臺上可以發千兵下可以陳鐘鼓諸侯聞君者亦曰奚以敬臺奚以敬民所敬各異也於是平公乃罷臺説苑正諌延陵季子遊于晉左襄公二十九年當晉平公十四年入其境曰嘻暴哉國乎入其都曰嘻力屈哉國乎立其朝曰嘻亂哉國乎從者曰夫子之入晉境未久也何其名之不疑也延陵季子曰然吾入其境田畝荒穢而不休雜增崇高吾是以知其國之暴也吾入其都新室惡而故室美新墻卑而故墻髙吾是以知其民力之屈也吾立其朝君能視而不下問其臣善伐而不上諫吾是以知其國之亂也説苑正理十四年吳延陵季子來使與趙文子韓宣子魏獻子語曰晉國之政卒歸此三家矣十九年齊使晏嬰如晉與叔嚮語叔嚮曰晉季世也公厚賦為臺池而不恤政政在私門其可久乎晏子然之史晉世家趙文子問於叔向曰晉六卿孰先亡乎對曰其中行氏乎文子曰何故先亡對曰中行氏之為政也以苛為察以欺為明以刻為忠以計多為善以聚斂為良譬之鞟革大則大矣裂之道也當先亡新序卷一南子道應淮世本范氏晉大夫隰叔生世蒍蒍生成伯缺伯缺生武子會會生文叔燮燮生宣叔丐丐生獻子鞅鞅生吉射晉大夫逝遨生桓伯林父林父生宣伯庚庚生獻伯偃偃生穆伯吳吳生寅本姓荀自荀偃將中軍晉改中軍曰中行因氏焉元與智氏同祖逝遨按左傳僖公二十八年晉侯作三行以禦狄荀林父將中行此命氏之由中行非中軍所改也世本説非是杜氏云三行無佐疑大夫師葉公諸梁問樂王鮒曰晉大夫趙文子為人何若對曰好學而受諌葉公曰疑未盡之對曰好學智也受諫仁也江出汶山其源若甕口至楚國其廣十里無他其下流多也人而好學受諌宜哉其立也詩曰其惟哲人告之話言順德之行此之謂也新序卷四有家語孔子謂子路此語中牟無令晉平公問趙武曰中牟三國之股肱趙齊燕也邯鄲之肩髀也寡人欲得良令誰使而可武曰邢伯子可邢伯一作邢子公曰非子之讐耶曰私讐不入公門公又問曰中府之令空誰使而可曰臣子可趙武所薦四十六人外舉不避讐內舉不避子及武卒四十六人各就賓位其無私德若此韓子外儲左同與左氏祁奚事晉獻文子趙武也成室晉大夫發焉發禮往賀張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫于九京也北面再拜稽首君子謂之善頌善禱檀弓下趙文子與叔譽即叔向觀乎九京地志今平陽府絳州有九原山山産莞花又云遼州和順縣有九京山即文子與叔向觀處文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并植于晉國不沒其身其知不足稱也其舅犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉于晉國管庫之士七十有餘家生不交利死不屬其子焉檀弓下見國語略韓宣子曰吾馬菽粟多矣甚臞何也周市對曰使騶盡粟以食雖無肥不可得也名為多與之其實少雖無臞亦不可得也主不審其情實坐而患之馬猶不肥也韓子外儲左晉平公浮西河中流而嘆曰嗟乎安得賢士與共此樂者舟人固桑進對曰君言過矣夫劔産於越珠産江漢玉産昆山此三寶者皆無足而至今君茍好士則賢士至矣平公曰固桑來吾門下客食三千餘人朝食不足暮收市租暮食不足朝收市租吾尚可謂不好士乎固桑對曰今夫鴻鵠髙飛沖天然其所恃者六翮耳夫腹下之毳背上之毛增去一把飛不為髙下不知君之食客六翮耶將腹背之毳也平公默然而不應新序卷一又説苑簡子事略同韓詩晉平公遊於河而樂曰安得賢士與之樂此也船人盍胥跪而對曰主君亦不好士耳夫珠出於江海玉出於崑山無足而至者猶主君之好也士有足而不至者蓋主君無好士之意耳無患乎無士也平公曰吾食客門左千人門右千人朝食不足夕收市賦暮食不足朝收市賦吾可謂不好士乎盍胥對曰夫鴻鵠一舉千里所恃者六翮耳背上之毛腹下之毳益一把飛不為加髙損一把飛不為加下今君之食客門左門右各千人亦有六翮在其中矣將皆背上之毛腹下之毳耶詩曰謀夫孔多是用不集晉平公過九原而嘆曰嗟乎此地之藴吾良臣多矣若使死者起也吾將誰與歸乎叔向曰其趙武乎平公曰子黨於子之師也對曰臣敢言趙武之為人也立若不勝衣言若不出於口然其身舉士於白屋下者四十六人皆得其意而公家甚賴之及文子之死也四十六人皆就賓位是以無私德也臣故以為賢平公曰善新序卷四平公問叔向曰羣臣孰賢曰趙武子曰子黨於師人向武之屬大夫向曰武立如不勝衣言若不出口然所舉十數十人皆得其意而公家甚賴之及武子之生也不利其家死不託於孤臣敢以為賢也韓外儲左晉平公時藏寶之臺焚士大夫聞者趨車馳馬救火三日三夜乃勝之公子晏子一本作公子晏無子字獨束帛而賀曰甚善矣平公勃然作色曰珠玉之所藏也國之重寶也而天火之士大夫皆救之子獨賀何也公子晏子曰臣聞之王者藏於天下諸侯藏於百姓商賈藏於篋匱今百姓之於外短褐不蔽形糟粳不充口虗耗而賦斂無已王收大半而藏之臺是以天火之且臣聞之昔者桀殘賊海內賦斂無度萬民甚苦是故湯誅之為天下戮笑今皇天降災於藏臺是君之福也而不自知變悟亦恐君之為鄰國笑矣公曰善自今以往請藏於百姓之間韓詩卷十事説苑魏文侯同晉平公使弓冶治弓三年而弓始成平公射之不穿一札將殺之弓人之妻蔡女也一作繁人之女見平公曰妾之夫治此弓為亦勞矣其幹生於太山之阿一日三覩隂三覩陽傅以燕牛之角纒以荆麋之斤糊以阿魚之膠此四者天下之妙選也而不能穿一札是君不能射也而反欲殺妾夫乎妾聞射之道左手如拒右手如附枝右手發之左手不知此蓋射之道也平公使弓人如蔡女言射之連穿七札其夫遂免賜金三鎰列女傳事一作秦穆公又作齊景公事晉平公為馳逐之車龍旌衆色挂之以犀象錯之以羽芝車成題金千鎰立之於殿下令羣臣得觀焉田差三過而不一顧平公作色大怒問田差爾三過而不一顧何為也田差對曰臣聞説天子者以天下説諸侯者以國説大夫者以官説士者以事説農夫者以食説婦姑者以織桀以奢亡紂以淫敗是以不敢顧也平公曰善乃命左右曰去車説苑反質晉平公好樂多其賦斂下治城郭曰敢有諌者死國人憂之有咎犯者見門大夫曰臣聞主君好樂故以樂見門大夫入言曰咎犯也欲以樂見平公曰內之止坐殿上則出鐘磬竽瑟坐有頃平公曰客子為樂咎犯對曰臣不能為樂臣善隱平公召隱士十二人咎犯曰隱臣竊顧昧死御平公曰諾咎犯申其左臂而詘五指平公問於隱官曰占之為何隱官皆曰不知平公曰歸之咎犯則申其一指曰是一也便遊赭盡而峻城闕二也柱梁衣繡士民無褐三也侏儒有餘酒而死士渴四也民有飢色而馬有粟秩五也近臣不敢諫遠臣不敢逹平公曰善乃屏鐘鼓除竽瑟遂與咎犯參治國説苑正誎繹史咎犯在文公時又見於此故楊用修云有兩咎犯但劉中壘復稱介子推相荆欒盈事韓武子此類非一未有確據晉平公觴客少庶子進炙而髮繞之平公輒殺炮人炮人呼天曰嗟乎臣有三罪死而不自知乎平公曰何謂也對曰臣刀之利風靡骨斷而髮不斷是臣之一死也桑炭炙之肉紅白而髮不焦是臣之二死矣炙熟又重睫而視之髮繞炙而目不見是臣之三死也意者堂下其有翳憎臣者乎殺臣不亦蚤乎韓子內儲下作晉文公事一衛靈公將之晉至濮水之上稅車而放馬設舍以宿夜分而聞鼓新聲者而説之使人問左右盡報弗聞乃召師涓而告之曰有鼓新聲者使人問左右盡報弗聞其狀似鬼神子為聽而寫之師涓曰諾因靜坐撫琴而寫之師涓明日報曰臣得之矣而未習也請復一宿習之靈公曰諾因復留宿明日而習之遂去之晉晉平公二十四年晉平公觴之於施夷之臺酒酣靈公起公曰有新聲願請以示平公曰善乃召師涓令坐師曠之旁援琴鼓之未終師曠撫止之曰此亡國之聲不可遂也平公曰此道奚出師曠曰此師延之所坐與紂為靡靡之樂也及武王伐紂師延東走至於濮水而自投故聞此聲者必於濮水之上釋名上箜篌師延所作靡靡之樂後出桑間濮之地蓋空國之侯所作也師涓為晉平公鼓焉鄭衛分其地而有之遂號鄭衛之音為淫樂先聞此聲者其國必削不可遂平公曰寡人所好者音子其使遂之師涓鼓究之平公問師曠曰此所謂何聲也師曠曰此所謂清商也公曰清商固最悲乎師曠曰不如清徴公曰清徴可得而聞乎師曠曰不可古之聽清徵者皆有德義之君也今吾君德薄不足以聽平公曰寡人之所好者音也願試聽之師曠不得已援琴而鼓一奏之有玄鶴二八道南方來集於郎門之垝再奏之而列三奏之延頸而鳴舒翼而舞音中宫商之聲聲聞於天平公大説坐者皆喜平公提觴而起為師曠壽反坐而問曰音莫悲於清徴乎師曠曰不如清角公曰清角可得而聞乎師曠曰不可昔者黃帝合鬼神於泰山之上駕象車而六蛟龍畢方並轄畢方神名蚩尤居前風伯進掃雨師灑道虎狼在前鬼神在後螣蛇伏地鳯凰覆上大合鬼神作為清角今主君德薄不足聽之聽之將恐有敗平公曰寡人老矣所好者音也願遂聽之師曠不得已而鼓之一奏之有玄雲從西北方起再奏之大風至大雨隨之裂帷幕破爼豆隳廊瓦坐者散走平公恐懼伏於廊室之間晉國大旱赤地三年平公之身遂瘙病韓子十過古文瑣語晉平公二十三年夢朱熊窺其屏惡之而疾問於子産對曰昔共工之卿曰浮遊敗於顓頊自沈於淮其色赤其言善笑其行善顧其狀如熊為天王祟見之堂則王天下者死見之堂下則邦人駭見之門則近憂見之庭則無傷今窺君之屏病而無傷其祭顓頊共工乎從其言而病間太平御覽引齊景公之晉從平公飲師曠侍坐景公問政於師曠曰太師將奚以教寡人師曠曰君必惠民而已矣中坐酒酣將出又復問政於師曠曰太師奚以教寡人曰君必惠民而已矣景公出之舍師曠送之又問政於師曠師曠曰君必惠民而已矣景公歸思未醒而得師曠之所謂公子尾公子夏者景公之二弟也甚得齊民家富貴而民説之擬於公室此危吾位者也今謂我惠民者使我與二弟爭民耶於是反國發廩粟以賦衆貧散餘財以賜孤寡倉無陳粟府無餘財宫婦不御者出嫁之七十受祿米不與二弟爭民居二年二弟出走公子夏逃楚公子尾走晉韓子外儲右走公子夏公子尾出未聞晉平公問于師曠曰咎犯與趙衰孰賢對曰陽處父欲臣文公因咎犯三年不逹因趙衰三日而逹智不知其士衆不智也知而不言不忠也欲言之而不敢無勇也言之而不聽不賢也説苑善説知悼子卒晉平公二十五年未葬平公飲酒師曠李調侍與君飲也鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北靣坐飲之降趨而出平公呼而進之曰蕢曩者爾心或開豫是以不與爾言爾飲曠何也曰子邜不樂知悼子在堂斯其為子邜也大矣曠也大師也不以詔是以飲之也爾飲調何也曰調也君之褻臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫也非刀七是共又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必毋廢斯爵也至于今既畢獻斯揚觶謂之杜舉檀弓下晉平公問於師曠曰吾年七十欲學恐已暮矣師曠曰何不炳燭乎平公曰安有為人臣而戲其君乎師曠曰盲臣安敢戲其君乎臣聞之少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明炳燭之明孰與昧行乎平公曰善哉説苑建本傳又尚書大晉平公出畋見乳虎伏而不動顧謂師曠曰吾聞之也霸王之主出則猛獸伏不敢起今者寡人出見乳虎伏而不動此其猛獸乎師曠曰鵲食猬猬一作猖猬食鵔鸃鵔鸃食豹豹食駮駮食虎夫駮之狀有似駮馬今者君之出必驂駮馬而出畋乎公曰然師曠曰臣聞之一自誣者窮再自誣者辱三自誣者死今夫虎所以不動者為駮馬也固非主君之德義也君奈何一自誣乎平公異日出朝有鳥環平公不去平公顧謂師曠曰吾聞之也霸王之主鳯下之今者出朝有鳥環寡人終朝不去是其鳯鳥乎師曠曰東方有鳥名諌珂其為鳥也文身而朱足憎鳥而愛狐今者吾君必衣狐裘以出朝乎平公曰然師曠曰臣已嘗言之矣一自誣者窮再自誣者辱三自誣者死今鳥為狐裘之故非吾君之德義也君奈何而再自誣乎平公不悅異日置酒虒祁之臺使郎中馬章布蒺藜于階上令人召師曠師曠至履而上堂平公曰安有人臣履而上人主堂者乎師曠解履刺足伏刺膝仰天而嘆公起引之曰今者與叟戲叟遽憂乎對曰憂夫肉自生蟲而還自食也木自生蠧而還自刻也人自興妖而還自賊也五鼎之具不當生藜藿人主堂廟不當生蒺藜平公曰今為之奈何師曠曰妖已在前無可奈何入來月八日修百官立太子君將死矣至來月八日平旦謂師曠曰叟以今日為期寡人如何師曠不樂謁歸歸未幾而平公死乃知師矌神明矣説苑辨物二十二年伐燕史晉世家二十六年平公卒子昭公夷立史晉世家春秋戰國異辭卷十
