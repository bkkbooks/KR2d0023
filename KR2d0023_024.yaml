body:
  text: 春秋戰國異辭卷二十二右春坊右諭德陳厚耀撰秦史秦本紀秦之先帝顓頊之苖裔孫曰女修女修織玄鳥隕卵女修吞之生子大業大業取少典之子曰女華女華生大費與禹平水土已成帝錫玄圭禹受曰非豫能成亦大費為輔帝舜曰咨爾費贊禹功其賜爾皂遊爾後嗣將大出乃妻之以姚姓之玉女大費拜受佐舜調馴鳥獸鳥獸多馴服是為柏翳即伯益舜賜姓嬴氏大費生子二人一曰大亷實鳥俗氏二曰若木實費氏其玄孫曰費昌子孫或在中國或在夷狄費昌當夏桀之時去夏歸商為湯御以敗桀於鳴條大亷玄孫曰孟戲中衍鳥身人言帝太戊聞而卜之使御吉遂致使御而妻之自太戊以下中衍之後遂世有功以佐殷國故嬴姓多顯遂為諸侯其玄孫曰中潏在西戎保西垂生蜚亷蜚亷生惡來惡來有力蜚亷善走父子俱以才力事殷紂周武王之伐紂並殺惡來是時蜚亷為紂石北方還無所報為壇霍太山而報得石棺死遂葬於霍太山蜚亷有子曰季勝季勝生孟增孟增幸於周成王是為宅臯狼臯狼生衡父衡父生造父造父以善御幸於周穆王得騏驥溫驪驊騮騄耳之駟西巡狩樂而忘歸徐偃王作亂造父為穆王御長驅歸周以救亂繆王以趙城封造父造父族由此為趙氏自蜚亷以下五世至造父别居趙趙衰其後也惡來革者蜚亷子也蚤死有子曰女防女防生旁臯旁臯生大几大几生大駱大駱生非子以造父之寵皆蒙趙城姓趙氏非子居犬丘好馬及畜善養息之犬丘人言之周孝王孝王召使主馬於汧渭之間馬大蕃息孝王欲以為大駱適嗣申侯之女為大駱妻生子成為適申侯乃言孝王曰昔我先酈山之女申侯之先娶於酈山為戎胥軒妻胥軒蜚亷之祖生中潏以親故歸周保西垂西垂以其故和睦中潏蜚亷之父今我復與大駱妻生適子成申駱重婚西戎皆服所以為王王其圖之孝王曰昔伯翳為舜主畜畜多息故有土賜姓嬴今其後世亦為朕息馬朕其分土為附庸邑之秦今隴西縣秦亭使復續嬴氏祀號曰秦嬴亦不廢申侯之女子為駱適者以和西戎秦嬴生秦侯秦侯立十年卒生公伯公伯立三年卒生秦仲秦仲立三年周厲王無道諸侯或叛之西戎反王室滅犬丘大駱之族周宣王即位乃以秦仲為大夫誅西戎西戎殺秦仲秦仲立二十三年死於戎其長子曰莊公宣王與兵七千人使伐西戎破之於是復豫秦仲後及其先大駱地犬丘并有之為西垂大夫生子三人其長曰世父世父曰戎殺我大父仲我非殺戎王則不敢入邑遂將擊戎讓其弟襄公為太子莊公立四十四年卒太子襄公代立襄公襄公元年以女弟繆嬴為豐王妻襄公二年戎圍犬丘世父擊之為戎所虜嵗餘復歸世父史秦本紀秦襄公七年周幽王用褒姒廢太子立褒姒子為嫡數欺諸侯諸侯叛之西戎犬戎與申侯伐周殺幽王酈山下而襄公將兵救周戰甚力有功周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯賜之岐以西之地曰戎無道侵奪我岐豐之地秦能攻逐戎即有其地與誓封爵之襄公於是始國與諸侯通聘享之禮乃用騮駒黃牛羝羊各三祠上帝西畤史秦本紀秦襄公以王命征伐周人赴之賦無衣詩傳同詩説詩序無衣刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉繹史云令狐河曲秦晉亟戰鄭譜敘為康公詩似矣朱子云序與詩情不協詩傳謂襄公時詩然亦無稽襄公遣大夫征戎而勞之賦小戎詩傳同詩説詩序小戎美襄公也備其兵甲以討西戎西戎方強國人矜其車甲婦人能閔其君子焉襄公伐戎初命為秦伯國人榮之賦車粼詩傳詩説襄公初為諸侯周大夫與燕美之而作詩序車粼美秦仲也秦仲始大有車馬禮樂侍御之好焉襄公克戎始取周地秦人矜之賦終南詩傳詩説襄公初為諸侯秦人祝之而作詩序終南戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之襄公始有田園之事秦人喜之賦駟驖詩傳詩説秦人從狩而作詩序駟驖美襄公也始命有田狩之事園囿之樂焉辛氏三秦記秦有白鹿原周平王時白鹿出此原故名原上有狗枷堡秦襄公時有天狗來下其上有賊天狗吠而護之故一堡無懼心秦襄公既侯居西垂自以為主少皥之神作西畤祠白帝其牲用駵駒黃牛抵牛各一云史封禪書十二年伐戎而至岐卒生文公史秦本紀文公文公元年居西垂宫三年以兵七百人東獵四年至汧渭之會曰昔周邑我先秦嬴於此後卒獲為諸侯乃卜居之占曰吉即營邑之十年初為鄜畤用三牢十三年初有史以紀事民多化者十六年文公以兵伐戎戎敗走於是文公遂收周餘民有之地至岐岐以東獻之周十九年得陳寶以上史秦本紀秦文公東獵汧渭之間卜居之而吉文公夢黃蛇自天下屬地其口止於鄜衍文公問史敦敦曰此上帝之徴君其祠之於是作鄜畤用三牲郊祭白帝焉自未作鄜畤也而雍旁故有吳陽武畤雍東有好畤皆廢無祠或曰自古以雍州積髙神明之隩故立畤郊上帝諸神祠皆聚焉蓋黃帝時嘗用事雖晚周亦郊焉其語不經見搢紳者不道作鄜畤後九年文公獲若石云於陳倉北阪城祠之其神或嵗不至或嵗數來來常以夜光輝若流星從東南來集於祠城則若雄雞其聲殷殷云野雞夜雊以一牢祠命曰陳寶史封禪書秦文公獲若石於陳倉北坂城祠之其神來若雄雉其聲殷殷云野雞夜鳴以一牢祠之號曰陳寶漢書郊祀志神臣瓉云陳倉縣有寶夫人祠嵗與葉君會也蘇林云寶如石似肝云語辭秦文公時陳倉人獵得獸若彘不知名牽以獻之逢二童子童子曰此名為蝹常在地中食死人腦即欲殺之拍捶其首蝹亦語曰二童子名陳寶得雄者王得雌者霸陳倉人乃逐二童子化為雄雌上陳倉北坂為石秦祠之晉太康地志二十年法初有三族之罪二十七年伐南山大梓豐大特史秦本紀秦文公伐梓樹梓樹化為牛文公遣騎擊之騎墮地被髮牛畏之入沒豐水中秦乃立怒特嗣列異經秦文公時雍南山有大梓樹文公伐之有大風兩樹生合不斷時有一人病夜往山中聞有鬼語樹神曰秦若使人被髮以朱絲繞樹伐汝汝得不困耶樹神無言明日病人語文公如其言伐樹斷中有一青牛出走入豐水中其後牛出豐水中使騎擊之不勝有騎墮地復上髮解牛畏之入不出故置髦頭録異傳亦見搜神記始玄中記作秦皇時事四十八年文公太子卒賜諡為竫公竫公之長子為太子是文公孫也五十年文公卒葬西山竫公子立是為寧公寧公出子寧公二年公徙居平陽遣兵伐蕩社三年與亳戰亳王奔戎遂滅蕩社十二年伐蕩氏取之寧公生十嵗立立十二年卒葬西山寧公生子三人長男武公為太子武公同母弟德公魯姬子生出子寧公卒大庶長弗忌威壘三父廢太子而立出子為君出子六年三父等復共令人賊殺出子出子生五嵗立立六年卒三父等乃復立故太子武公以上史秦本紀武公武公元年伐彭戲氏至於華山下居平陽封宫三年誅三父等夷三族以其殺出子也十年伐邽冀戎初縣之十一年初縣杜鄭滅小虢十九年晉曲沃始為晉侯齊桓公霸於鄄二十年武公卒葬雍平陽初以人從死從死者六十六人有子一人名曰白白不立封平陽立其弟德公以上史秦本紀德公德公元年初居雍城大鄭宫以犧三百牢祠鄜畤卜居雍後子孫飲馬於河梁伯芮伯來朝二年初伏以狗禦蠱以上史秦本紀史封禪書德公卜居雍雍之諸祠自此興用三百牢於鄜畤作伏祠磔狗邑四門以禦蠱災德公生三十三嵗而立立二年卒生子三人長子宣公中子成公少子穆公長子宣公立史秦本紀宣公宣公四年作密畤於渭南祭青帝史封禪書與晉戰河陽勝之十二年宣公卒生子九人莫立立其弟成公以上史秦本紀成公成公元年梁伯芮伯來朝成公立四年卒子七人莫立立其弟穆公以上史秦本紀穆公穆公任好元年自將伐茅津勝之四年迎婦於晉晉太子申生姊也其嵗齊桓公伐楚至邵陵以上史秦本紀秦穆公立病卧五日不寤寤乃言夢見上帝上帝命穆公平晉亂史書記而藏之府而後世皆曰秦穆公上天史封禪書西京賦注秦穆公夢之天帝所奏鈞天樂賜以金䇿祚世之業當時有謠云天帝醉秦暴金誤隕石墜蓋憤亂疾世若詩所謂視天夢夢者尚書中候維天降秦穆公出狩至於咸陽天震大雷下有火化為白雀銜緑丹書集於公車公俯取書言穆公之霸也訖胡亥秦家世事文選昔者天帝説秦穆公而覲之饗以鈞天廣樂帝有醉焉乃為金䇿錫用此土而翦諸鶉首注云虞喜志林曰唁曰天帝醉秦暴金誤隕石墜謂秦穆公夢天帝奏鈞天樂已有此唁列仙傳讚曰秦穆公受金䇿祚世之業論衡秦穆公好淫樂華陽后為之不聽鄭衛之音五年晉獻公滅虞虢虜虞君與其大夫百里奚以璧馬賂於虞故也孔衍春秋後語秦穆公將兄子三人囚於內宫秋穆公自將伐晉戰於河曲晉滅虞既虜百里奚以為秦穆公夫人媵於秦百里奚亡秦走宛楚鄙人執之穆公聞百里奚賢欲重贖之恐楚人不與乃使人謂楚曰吾媵臣百里奚在焉請以五羖羊皮贖之楚人遂許與之當是時百里奚年已七十餘穆公釋其囚與語國事謝曰臣亡國之臣何足問穆公曰虞君不用子故亡非子罪也固問語三日穆公大説授之國政號曰五羖大夫百里奚讓曰臣不及臣友蹇叔蹇叔賢而世莫知臣嘗逰困於齊而乞食䬹人蹇叔收臣臣因而欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子穨好牛臣以養牛干之及穨欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脫一不用及虞君難是以知其賢於是穆公使人厚幣迎蹇叔以為上大夫以上史秦本紀百里奚之未遇也亡虢而虜晉飯牛於秦傳鬻以五羊之皮公孫枝得而説之獻諸穆公三日請屬事焉穆公曰買之五羊之皮而屬事焉毋乃天下笑乎公孫枝對曰信賢而任之君之明也讓賢而下之臣之忠也君為明君臣為忠臣境內將服敵國且畏夫誰暇笑哉繆公遂用之謀無不當舉必有功吕覽慎人秦穆公使賈人載鹽徴諸賈人賈人買百里奚以五羖羊之皮使將車之秦秦穆公觀鹽見百里奚牛肥曰任重道逺以險而牛何以肥也莊子百里奚爵祿不入於心故飯牛而牛肥對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也令有司具沐浴為衣冠與坐公大恱異日與公孫支論政公孫支大不寧曰君耳目聰明思慮審察君其得聖人乎公曰然吾恱夫奚之言彼類聖人也公孫支遂歸取雁以賀曰君得社稷之聖臣敢賀社稷之福公不辭再拜而受明日公孫支乃致上卿以讓百里奚曰秦國處僻民陋以愚無知危亡之本也臣自知不足以處其上請以讓之公不許公孫支曰君不用賔相而得社稷之聖臣君之祿也臣見賢而讓之臣之祿也今君既得其祿矣而使臣失祿可乎請終致之公不許公孫支曰臣不肖而處上位是臣失倫也不肖失倫臣之過進賢而退不肖君之明也今臣處位廢君之德而逆臣之行也臣將逃公乃受之故百里奚為上卿以制之公孫支為卿以佐之也説苑臣術秦穆公相百里奚晉使叔虎齊使東郭蹇如秦公孫枝請見之公曰請見客子之事歟對曰非也相國使子乎對曰不也公曰然則子事非子之事也秦國僻陋戎夷事服其任人事其事猶懼為諸侯笑今子為非子之事退將論而罪公孫枝出自敷於百里氏百里奚請之公曰此所聞於相國歟枝無罪奚請有罪何請焉百里奚歸辭公孫枝公孫枝徙自敷於街百里奚令吏行其罪定分官吕覽不茍百里奚字井伯平陸人諸賈以五羊皮傭井伯飯牛而牛肥穆公怪問故對曰飲食以時使之不暴故肥公即拜為上卿號五羖大夫嘗會客作樂有浣婦自言知音召至援琴而歌即扊扅歌即其妻也廣輿記山西風俗通百里奚為秦相堂上樂作所賃浣婦自言知音因援琴撫絃而歌問之乃其故妻還為夫婦也亦謂之扊扅歌歌曰百里奚五羊皮憶别時烹伏雌炊扊扅今日富貴忘我為百里奚初娶我時五羊皮臨相别時烹乳雞今適富貴忘我為百里奚百里奚母已死葬南溪墳以瓦覆以柴舂黃藜扼伏雞西入秦五羖皮今日富貴捐我為莊子百里奚爵祿不入於心故飯牛而牛肥使秦穆公忘其賤與之政也韓詩外傳禽息秦大夫薦百里奚不見納穆公出當車以頭擊闑腦乃精出曰臣生無補於國不如死也穆公感悟而用百里奚秦以大化論衡禽息薦百里奚穆公未聽禽息出門仆頭碎首穆公痛之乃用百里奚韓詩外傳禽息知百里奚之賢薦之於穆公以為私而加刑焉公後知百里奚之賢乃召禽息謝之禽息對曰臣聞忠臣進賢不私顯烈士憂國不喪志奚陷刑臣之罪也乃對使者以首觸楹而死以上卿之禮葬之文選注引與後漢注異九年晉獻公卒立驪姬子奚齊其臣里克殺奚齊荀息立卓子克又殺卓子及荀息夷吾使人請秦求入晉於是穆公許之秦穆公使百里奚將兵送夷吾夷吾謂曰誠得立請割晉之河西八城與秦及至已立而使丕鄭謝秦背約不與河西城而殺里克丕鄭聞之恐因與穆公謀曰晉人不欲夷吾實欲重耳今背秦約而殺里克皆吕甥卻芮之計也願君以利急召吕卻吕卻至則更立重耳便穆公許之使人與丕鄭歸召吕卻吕卻等疑丕鄭有間乃言夷吾殺丕鄭丕鄭子丕豹奔秦説穆公曰晉君無道百姓不親可伐也穆公曰百姓茍不便何故能誅其大臣能誅其大臣此其調也不聽而隂用豹以上史秦本紀十二年晉來請粟丕豹説穆公勿與因其飢而伐之穆公問公孫支支曰飢穰更事耳不可不與問百里奚奚曰夷吾得罪於君其百姓何罪於是用百里奚公孫支言卒與之粟以船漕車轉自雍相望至綘十四年秦飢請粟於晉晉君謀之羣臣虢射曰因其飢伐之可有大功晉君從之與左傳小異十五年晉惠公因秦飢興兵攻秦秦穆公發兵使丕豹將自往擊之九月壬戍與晉合戰於韓原晉君棄其軍與秦爭利還而馬騺穆公與麾下馳追之不能得晉君反為晉君所圍晉擊穆公穆公傷於是岐下食善馬者三百人馳冒晉軍晉軍解圍遂脫穆公而反生得晉君初穆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之穆公曰君子不以畜産害人吾聞善食馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從從而見穆公窘亦皆推鋒爭死以報食馬之德於是穆公虜晉君以歸令於國齋宿吾將以晉君祠上帝周天子聞之曰晉我同姓為請晉君夷吾姊亦為穆公夫人夫人聞之乃衰絰跣曰妾兄弟不能相救以辱君命穆公曰我得晉君以為功今天子為請夫人是憂乃與晉君盟許歸之更舍上舍而饋之七牢十一月歸晉君夷吾夷吾獻其河西地使太子圉質於秦秦妻子圉以宗女是時秦地東至河史秦本紀秦穆公將田而喪其馬求三日而得之於莖山之陽有鄙夫乃相與食之穆公曰此駿馬之肉不得酒者死穆公乃求酒遍飲之然後去明年晉師與穆公戰晉之左格右者圍穆公而擊之甲已墮者六矣食馬者三百餘人皆曰吾君仁而愛人不可不死還擊晉左格右免穆公之死韓詩卷十秦穆公嘗出而亡其駿馬自往求之見人已殺其馬方共食其肉穆公謂曰是吾駿馬也諸人皆懼而起穆公曰吾聞食駿馬肉不飲酒者殺人即以次飲之酒殺馬者皆慙而去居三年晉攻秦穆公圍之往時食馬肉者相謂曰可以出死報食馬得酒之恩矣遂潰圍繆公卒得以解難勝晉獲惠公以歸此德出而福反也説苑復恩秦繆公出遊而車敗右服失馬野人取之繆公追而及之岐山之陽見野人方屠而食之繆公嘆曰食駿馬之肉而不還飲酒者傷人余恐其傷汝也於是遍飲而去之處一年為韓原之戰晉人環繆公之車梁由靡已扣繆公之左驂矣晉惠公之右路石奮投而擊繆公之甲中之者已六札矣野人之嘗食馬於岐山之陽者三百有餘人畢力為繆公疾鬬於車下遂大克晉反獲惠公以歸淮南子汜論吕覽愛士十八年齊桓公卒二十年秦滅梁芮二十二年晉公子圉聞晉君病曰梁我母家也而秦滅之我兄弟多即君百嵗後秦必留我而晉輕亦更立他子子圉乃亡歸晉二十三年晉惠公卒子圉立為君是為懷公秦怨圉亡去乃迎晉公子重耳於楚而妻以故子圉妻重耳初謝後乃受繆公益禮厚遇之以上史秦本紀二十四年春秦使人告晉大臣欲入重耳晉許之於是使人送重耳二月重耳立為晉君是為文公文公使人殺子圉史秦本紀約左氏文晉重耳入於晉秦繆公送之賦渭陽繆公二十四年事詩傳詩説同詩序渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未反而秦姬卒穆公納文公康公時為太子送文公於渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩其秋周襄王弟帶以翟伐王王出居鄭二十五年周王使人告難於晉秦秦繆公將兵助晉文公入襄王殺王弟帶二十八年晉文公敗楚於城濮三十年繆公助晉文公圍鄭鄭使人言繆公曰亡鄭厚晉於晉則得矣而秦未有利晉之強秦之憂也繆公乃罷兵歸晉亦罷以上史秦本紀約左氏文三十二年冬晉文公卒鄭人有賣鄭於秦曰我主其城門鄭可襲也繆公問蹇叔百里奚對曰徑數國千里而襲人希有得利者且人賣鄭庸知我國人不有以我情告鄭者乎不可繆公曰子不知也吾已決矣遂發兵使百里奚子孟明視蹇叔子西乞術及白乙丙將兵行日百里奚蹇叔二人哭之繆公聞怒曰孤發兵而子沮哭吾軍何也二老曰臣非敢沮君軍軍行臣子與往臣老遲還恐不相見故哭耳二老退謂其子曰汝軍即敗必於殽厄矣三十三年春秦兵遂東更晉地過周北門周王孫滿曰秦師無禮不敗何待兵至滑鄭販賣賈人弦髙持十二牛將賣之周見秦兵恐死虜因獻其牛曰聞大國將誅鄭鄭君謹修守禦偹使臣以牛十二勞軍士秦三將軍相謂曰將襲鄭鄭今已覺之往無及已滅滑滑晉之邊邑也當是時晉文公喪尚未葬太子襄公怒曰秦侮我孤因喪破我滑遂墨衰絰發兵遮秦兵於殽擊之大破秦軍無一人得脫者虜秦三將以歸文公夫人秦女也為秦三囚將請曰我君之怨此三人入於骨髓願令此三人歸令我君得自快烹之晉君許之歸秦三將三將至繆公素服郊迎向三人哭曰孤以不用百里奚蹇叔言以辱三子三子何罪乎子其悉心雪耻毋怠遂復三子官秩如故愈益厚之史秦本紀約左氏文秦繆公興師以襲鄭蹇叔諫曰不可臣聞之襲國者以車不過百里以人不過三十里皆以其氣之趫與力之盛至是以犯敵能威去之能速今行數千里又絶諸侯之地以襲國臣不知其可也君其重圖之繆公不聽蹇叔送師於門外而哭曰師乎見其出而不見其入也蹇叔有子曰申與視申白乙丙也視孟明視也與師偕行蹇叔謂其子曰晉若遏師必於殽女死不於南方之岸必於北方之岸為吾尸女之易識之易也繆公聞之使人讓蹇叔曰寡人興師未知何如今哭而送之是哭吾師也蹇叔對曰臣不敢哭師也臣老矣有子二人皆與師行比其反也非彼死則臣必死矣是故哭師行過周王孫滿要門而窺之曰嗚呼是師必有疵若無疵吾不復言道矣夫秦非他周室之建國也過天子之城宜槖甲束兵左右皆下以為天子禮今初服回建左不軾而右之超乘者五百乘力則多矣然而寡禮安得無疵師過周而東鄭賈人弦髙奚施將西市於周道遇秦師曰嘻師所從來者逺矣此必襲鄭遽使奚施歸告乃矯鄭伯之命以勞之曰寡人固聞大國之將至也久矣大國不至寡君與士卒竊為大國憂日無所與焉惟恐士卒罷弊與糧糗匱乏何其久也使人臣犒勞以璧膳以十二牛秦三帥對曰寡君之無使也使其三臣丙也林也視也於東邊候晉之道過是以迷惑陷入大國之地不敢固辭再拜稽首受之三帥乃懼而謀曰我行數千里絶諸侯之地以襲人未至而人已先知之矣此其備必已盛矣還師去之當是時也晉文公適薨未葬先軫言於襄公曰秦師不可不擊也襄公曰先君薨尸在堂見秦師利而因擊之無乃非為人子之道歟先軫曰不弔吾喪不憂吾哀是死吾君而弱其孤也若是而擊可大強臣請擊之襄公不得已而許之先軫遏秦師於殽而擊之大敗之獲其三帥以歸繆公聞之素服廟臨以説於衆曰天不為秦國使寡人不用蹇叔之諫以至於此患吕覽悔過節淮南子道應稍數語淮南子秦繆公使孟明舉兵襲鄭過周以東鄭之賈人弦髙蹇他相與謀曰師行數千里數絶諸侯之地其勢必襲鄭凡襲國者以為無備也今示以知其情必不敢進乃矯鄭伯之命以十二牛勞之三率相與謀乃還師而反晉先軫舉兵擊之大破之殽鄭伯乃以存國之功賞弦髙弦髙辭之曰誕而得賞則鄰國之信廢矣為國而無信是俗敗也賞一人而敗國俗仁者弗為也以不信得厚賞義者弗為也遂以其屬徙東夷終身不反髙士傳弦髙者鄭人也鄭繆公時髙見鄭為秦晉所逼乃隱不仕為商人秦繆公伐鄭晉襄公帥師敗諸殽還歸作秦誓書序秦繆公明於聽獄斷刑曰寡人不敏教不至也尸子三十四年繆公復使孟明視等將兵伐晉戰於彭衙秦不利引兵歸史秦本紀三十六年繆公復益厚孟明等使將兵伐晉渡河焚船大敗晉人取王官及鄗左作郊以報殽之役晉人皆城守不敢出於是繆公乃自茅津渡河封殽中尸為發喪哭之三日乃誓於軍曰嗟士卒聽無譁余誓告汝古之人謀黃髮番番則無所過以申思不用蹇叔百里奚之謀故作此誓令後世以記余過君子聞之皆為垂涕曰嗟乎秦繆公之與人周也卒得孟明之慶史秦本紀戎王使由余於秦繆公三十四年由余其先晉人也亡入戎能晉言聞繆公賢故使由余觀秦秦繆公示以宫室積聚由余曰使鬼為之則勞神矣使人為之亦苦民矣繆公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治不亦難乎由余笑曰此乃中國所以亂也夫自上聖黃帝作為禮樂法度身以先之僅以小治及其後世日以驕淫阻法度之威以責督於下下罷極則以仁義怨望於上上下交爭怨而相篡弒至於滅宗皆以此類也夫戎夷不然上含淳德以遇其下下懷忠信以事其上一國之政猶一身之治不知所以治此真聖人之治也於是繆公退而問內史廖曰孤聞鄰國有聖人敵國之憂也今由余賢寡人之害將奈之何內史廖曰戎王處僻匿未聞中國之聲君試遺其女樂以奪其志為由余請以疏其間留而莫遣以失其期戎王怪之必疑由余君臣有間乃可虜也且戎王好樂必怠於政繆公曰善因與由余曲席而坐傳器而食問其地形與其兵勢盡察而後令內史廖以女樂二八遺戎王戎王受而悅之終年不還於是秦乃歸由余由余數諫不聽繆公又數使人間要由余由余遂去降秦繆公以客禮待之問伐戎之形史秦本紀史記秦繆公得由余西戎八國服於秦故自隴以西有綿諸緄戎翟獂之戎岐梁山涇漆之北有義渠大荔烏氏胊衍之戎而晉北有林胡樓煩之戎燕北有東胡山戎各分散居溪谷自有君長往往而聚者百有餘戎然莫能相一戎王使由余聘於秦繆公問之曰寡人嘗聞道而未得目見之也願聞古之明主得國失國何以由余對曰臣嘗得聞之矣常以儉得之以奢失之繆公曰寡人不辱而問道於子子以儉對寡人何也由余對曰臣聞昔者堯有天下飯於土簋飲於土鉶其地南至交趾北至幽都東西至日月之所出入者莫不賔服堯禪天下虞舜受之作為食器斬山木而財之削鋸修之迹磨其斧迹流漆墨其上輸之於宫以為食器諸侯以為益侈國之不服者十三舜禪天下而傳之於禹禹作為祭器墨染其外而朱畫其內縵帛為茵蔣席額緑蔣草名觴酌有采而樽俎有飾此彌侈矣而國之不服者三十三夏后氏沒殷人受之作為大輅而建九旒食器雕琢觴酌刻縷四壁堊墀茵席雕文此彌侈矣而國之不服者五十三君子皆知文章矣而欲服者彌少臣故曰儉其道也由余出公乃召內史廖而告之曰寡人聞鄰國有聖人敵國之憂也今由余聖人也寡人患之吾將奈何內史廖曰臣聞戎王之居僻陋而道逺未聞中國之聲君其遺之女樂以亂其政而後為由余請期以疏其諫彼君臣有間而後可圖也君曰諾乃使史廖以女樂二八遺戎王因為由余請期戎王許諾見其女樂而悅之設酒張飲日以聽樂終嵗不遷牛馬半死由余歸因諫戎王戎王弗聽由余遂去之秦秦繆公迎而拜之上卿問其兵勢與其地形既以得之舉兵而伐兼國十二開地千里韓子十過又説苑反質略同戎將由余使秦秦繆公問以得失之要對曰古有國者未嘗不以恭儉也失國者未嘗不以驕奢也由余因論五帝三王之所以衰及至布衣之所以亡繆公然之於是告內史王繆曰鄰國有聖人敵國之憂也由余聖人也將奈之何王繆曰夫戎王居僻陋之地未嘗見中國之聲色也君其遺之女樂以淫其志亂其政其臣下必疏因為由余請緩期使其君臣有間然後可圖繆公曰善乃使王繆以女樂二列遺戎王為由余請期戎王大悅許之於是張酒聽樂日夜不休終嵗淫縱卒馬多死由余歸數諫不聽去之秦秦繆公迎拜之上卿遂并國十二辟地千里秦繆公時戎強大秦繆公遺之女樂二八與良宰焉戎王大喜以故數飲宴日夜不休左右有言秦冦之至者因扞弓而射之扞引也秦冦果至戎王醉而卧於樽下卒生搏而擒之吕覽壅塞又墨子秦繆公見戎由余説而欲留之由余不肯繆公以告蹇叔蹇叔曰君以告內史廖內史廖對曰戎人不達於五音與五味君不若遺之繆公以女樂二八人與良宰遺之宰膳宰戎王喜迷惑大亂飲酒書夜不休由余驟諫不聽因怒而歸繆公吕覽不茍三十七年秦用由余謀伐戎王益國十二開地千里遂霸西戎天子使召公過賀繆公以金鼓史秦本紀秦繆公出狩至於咸陵天震大雷下有火化為白雀銜緑丹書集於公車尚書中候列異傳秦繆公時穆公誤陳倉人掘地得物若羊非羊若豕非豕牽以獻公道逢二童子童子曰此名為蝹常在地食死人腦若欲殺之以柏插其首蝹復曰彼二童子名為陳寶得雄者王得雌者霸陳倉人捨蝹逐二童子童子化為雉飛入平林陳倉人告公公發徒大獵果得雌又化為石置之汧渭之間至文公為立祠名陳寶雄飛南集今南陽雉縣其地也秦欲表其符故以名縣每陳倉祠時有赤光長十餘丈從雉縣來入陳倉祠中有聲如雄雉或作文公時事續博物志秦繆公時有人掘地得物若羊將獻之道逢二童子謂曰此名為蝹常在地中食死人腦若欲殺之以柏東南枝捶其首由是墓皆植柏又曰柏為鬼廷列仙傳蕭史者秦繆公時人也善吹簫能致孔雀白鶴於庭繆公有女字弄玉好之公遂以女妻焉日教弄玉作鳳鳴居數年吹似鳳聲鳳凰來止其屋公為作鳳臺夫婦居其上不下數年一旦皆隨鳳凰飛去故秦人為作鳳女祠於雍宫中時有簫聲而已列仙傳赤須子豐人秦繆公時主漁吏也數道豐界災害水旱十不失一臣下迎而師之從受業問所長好食松實天門冬石脂齒落更生髮墮再出服霞絶後遂去吳山下七十餘年莫知所之秦繆公使人造弓三年乃成繆公用射不穿一札欲殺弓士士有女求見公曰妾父造弓竟年辛苦此柘生在朝陽之山妾父一日三回而看其作者粘以秦膠被以麋斤箭之束簳必三年而始成王今射不穿一札是妾父合得死妾聞射之法左手如格虎右手如扶枝左手發右手不知王自不解射何故殺妾父公聞言乃取弓當虎圈而射之矢踰於山過於彭城東徑過石梁其矢沒羽猶未盡弓力也列女傳公一載晉平事又作齊景公事秦繆公謂伯樂曰子之年長矣子姓有可使求馬者乎對曰良馬者可以形容筋骨相也相天下之馬者若滅若失若亡其一若此馬者絶塵弭轍臣之子皆下材也可告以良馬而不可告以天下之馬臣有所與供儋纒采薪者九方堙堙一作臯此其於馬非臣之下也請見之繆公見之使之求馬三月而反報曰得馬矣在於沙丘繆公曰何馬也對曰牡牡一作牝而黃使人往取之牝牝一作牡而驪繆公不恱召伯樂而問之曰敗矣子之所使求者毛物牝牡弗能知又何馬之能知伯樂喟然太息曰一至此乎是乃其所以千萬臣而無數者也若堙之所觀者天機也得其精而忘其粗在內而忘其外見其所見而不見其所不見視其所視而不遺其所不視若堙之所相者乃有貴乎馬者馬至而果千里之馬淮南道應又列子説符新論因顯有賣良馬於市者已三旦矣而市人不顧乃謂伯樂曰吾賣良馬而市人莫賞子一顧請獻半馬之價於是伯樂造市來而迎睇之去而目送之一朝之價遂至千金韓子伯樂教其憎者相千里馬教其愛者相駑馬以千里馬世一有其利少駑馬多其利多也三十九年繆公卒葬雍從死者百七十七人秦之良臣子輿氏三人名曰奄息仲行針虎亦在從死之中秦人哀之為作黃鳥之詩史秦本紀應劭注漢書云秦繆公與羣臣飲酒酣公曰生共此樂死共此哀於是奄息仲行針虎許諾及公薨皆從死黃鳥詩所為作也康公葬繆公以子車氏三子殉秦人哀之賦黃鳥詩傳詩説亦同詩序黃鳥哀三良也國人刺繆公以人從死而作是詩穆公子四十人其太子罃代立是為康公史秦本紀康公康公元年往嵗繆公之卒晉襄公亦卒襄公之弟名雍秦出也在秦晉趙盾欲立之使隨會來迎雍秦以兵送至令狐晉立襄公子而反擊秦師秦師敗隨會來奔二年秦伐晉於武城報令狐之役四年晉伐秦取少梁六年秦伐晉取羈馬戰於河曲大敗晉軍晉人患隨會在秦為亂乃使魏讎餘佯反合謀會詐而得會會遂歸晉史秦本紀約左氏文秦康公築臺三年楚人起兵將欲以兵攻齊任妄曰飢召兵疾召兵勞召兵亂召兵君築臺三年今楚人起兵將攻齊臣恐其攻齊為聲而以襲秦為實也不如備之戍東邊楚人輟行韓子説林康公忘繆公之業始棄其賢臣國人作晨風以刺之詩序詩説秦君遇賢始勤終怠賢人譏之而作秦康公忘先君之舊臣與賢者有始而無終國人作權輿以刺之詩序風詩説云與晨同義康公立十二年卒子共公立史秦本紀春秋戰國異辭卷二十二
