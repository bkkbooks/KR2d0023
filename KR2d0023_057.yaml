body:
  text: 春秋戰國異辭卷五十四右春坊右諭徳陳厚耀撰曹史曹叔世家曹叔振鐸者周武王弟也武王已克殷紂封叔振鐸於曹叔振鐸卒子太伯脾立太伯卒子仲君平立仲君平卒子宫伯侯立宫伯侯卒子孝伯雲立孝伯雲卒子夷伯喜立夷伯二十三年周厲王奔于彘三十年卒弟幽伯彊立幽伯九年弟蘇殺幽伯代立是為戴伯戴伯元年周宣王已立三歲三十年戴伯卒子恵伯兕立恵伯二十五年周幽王為犬戎所殺因東徙益卑諸侯畔之秦始列為諸侯三十六年恵伯卒子石甫立其弟武殺之代立是為繆公繆公三十年卒子桓公終生立孔疏世本曹國伯爵姫姓文王之子叔振鐸之後也武王封之陶邱桓公桓公三十五年魯隠公立四十五年魯弑其君隠公四十六年宋華父督弑其君殤公及孔父五十五年桓公卒子荘公夕姑立以上史曹世家諸侯伐秦曹桓公卒于會諸侯請含使之襲檀弓下桓公立五十四年卒當魯桓公之十年荘公荘公二十三年齊桓公始覇三十一年荘公卒子釐公夷立釐公釐公九年卒子昭公班立昭公昭公六年齊桓公敗蔡遂至楚召陵以上史曹世家曹昭公國小而廹無法以自守好奢而任小人将無所依詩人作蜉蝣以刺之詩序詩說云君殆國危曹大夫閔之而作九年昭公卒子共公襄立共公曹共公逺君子而好近小人曹人作候人以刺之詩序詩說亦云曹君多任非人國人諷之共公昭公之子魯僖公八年立曹人疾共公侵刻下民不得其所憂而思明王之治作下泉詩序詩說云東遷之初曹人閔周而作共公十六年初晋公子重耳其亾過曹曹君無禮欲觀其駢脅釐負覊諫不聽私善於重耳二十一年晋文公重耳伐曹虜其公以歸令軍毋入釐負覊之宗族閭或説晋文公曰昔齊桓公㑹諸侯復異姓今君囚曹君滅同姓何以令於諸侯晋乃復歸共公三十五年共公卒子文公壽立文公文公二十三年卒子宣公彊立以上史曹世家宣公曹公子喜時字子臧曹宣公子也宣公與諸侯伐秦卒于師魯成公二年曹人使子臧迎喪使公子負芻與太子留守負芻殺太子而自立子臧見負芻之當立也宣公既葬子臧出亾國人皆從之負芻立是為曹成公成公懼告罪且請子臧子臧乃反成公遂為君其後晋侯㑹諸侯執曹成公歸之京師将見子臧於周天子而立之子臧曰記有之聖達節次守節下不失節為君非吾節也雖不能聖敢失守乎遂亾奔宋曹人數請晋侯謂子臧反國吾歸爾君於是子臧反國晋乃言天子歸成公於曹子臧遂以國致成公不出曹國乃安新序卷七宣公十七年卒弟成公負芻立成公成公三年晋厲公伐曹虜成公以歸已復釋之五年晋欒書中行偃使程滑弑其君厲公二十三年成公卒子武公勝立武公武公二十六年楚公子弃疾弑其君靈王代立二十七年武公卒子平公頃立平公平公四年卒子悼公午立是歳宋衛陳鄭皆火悼公悼公八年宋景公立九年悼公朝于宋宋囚之曹立其弟野是為聲公悼公死于宋歸葬聲公聲公五年平公弟通弑聲公代立是為隠公隠公隠公四年聲公弟露弑隠公代立是為靖公靖公伯陽靖公四年卒子伯陽立伯陽三年國人有夢衆君子立于社宫謀欲亾曹曹叔振鐸止之請待公孫疆許之旦求之曹無此人夢者戒其子曰我亾爾聞公孫疆為政必去曹無罹曹禍及伯陽即位好田弋之事六年曹野人公孫疆亦好田弋獲白鴈而獻之且言田弋之說因訪政事伯陽大說之有寵使為司城以聽政夢者之子乃亾去公孫疆言覇說於曹伯十四年曹伯從之乃背晋干宋宋景公伐之晋人不救十五年宋滅曹執曹伯陽及公孫疆以歸而殺之曹遂絶其祀以上史曹世家莒孔疏云莒嬴姓周武王封兹輿期于莒又世本云莒己姓文七年穆伯奔莒從已氏也柱厲叔事莒敖公莒國也敖謚也自以為不知不為敖公所知而去居於海上夏日則食菱芡冬日則食橡栗莒敖公有難柱厲叔辭其友而徃死之其友曰子自以為不知故去今又徃死之是知與不知無異别也柱厲叔曰不然自以為不知故去今死而弗徃死是果知我也今不死其難是敖公果知我為不良臣也吾将死之以醜後世人主之不知其臣者也所以激君人者之行而厲人主之節也吕覧恃君又列子說符又說苑立節柱厲作朱勵荘子叔文相莒三年歸其母自績謂母曰文相莒三年有馬千駟今母猶績文之所得事皆将棄之已母曰吾聞君子不學詩書射御必有博塞之心小人不好田作必有竊盜之心婦人不好紡績織紝必有淫佚之行好學為福也猶飛鳥之有羽翼也許孔疏云許姜姓四岳伯夷之後武王封其苗裔文叔于許杜註許穎川許昌縣春秋時逼于鄭遂遷于楚地許悼公疾瘧飲藥毒而卒太子止自責不嘗藥不立其位與其弟緯專哭泣啜餰粥嗌不容粒痛已之不嘗藥未逾年而死春秋義之新序卷七虢杜預曰虢仲虢叔王季之子文王之母弟也賈逵曰虢仲封東虢制是也虢叔封西虢虢公是也東虢近鄭西虢初封在秦之雍地後亦東徙史記扁鵲傳扁鵲者渤海郡鄭人也姓秦氏名越人少時為人舎長舎客長桑君過扁鵲獨奇之常謹遇之長桑君亦知扁鵲非常人也出入十餘年乃呼扁鵲私坐間與語曰我有禁方年老欲傳與公公毋泄扁鵲曰敬諾乃出其懐中藥予扁鵲飲是以上池之水三十日當知物矣乃悉取其禁方書盡與扁鵲忽然不見殆非人也扁鵲以其言飲藥三十日視見垣一方人以此視病盡見五藏癥結特以診脉為名耳為醫或在齊或在趙在趙者名扁鵲其後扁鵲過虢虢太子死扁鵲至虢宫門下問中庻子喜方者曰太子何病國中治穣過於衆事中庻子曰太子病血氣不時交錯而不得泄㬥發於外則為中害精神不能止邪氣邪氣畜積而不得泄是以陽緩而隂急故㬥蹷而死扁鵲曰其死何如時曰雞鳴至今曰収乎曰未也其死未能半日也言臣齊勃海秦越人也家在於鄭未嘗得望精光侍謁於前也聞太子不幸而死臣能生之中庻子曰先生得無誕之乎何以言太子可生也臣聞上古之時醫有俞跗治病不以湯液醴􅎈鑱石撟引案机毒熨一撥見病之應因五藏之輸乃割皮觧肌訣胍結筋搦髓腦揲荒爪幕湔洗腸胃潄滌五藏練精易形先生之方能若是則太子可生也不能若是而欲生之曽不可以告咳嬰之兒終日扁鵲仰天嘆曰夫子之為方也若以管窺天以郄視文越人之為方也不待切脈望色聽聲寫形言病之所在聞病之陽論得其隂聞病之隂論得其陽病應見於大表不出千里决者至衆不可曲止也子以吾言為不誠試入診太子當聞其耳鳴而鼻張循其兩股以至於隂當尚温也中庻子聞扁鵲言目眩然而不瞚舌撟然而不下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞高義之日乆矣然未嘗得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則棄捐填溝壑長終而不得反言未卒因噓唏服臆魂精泄横流涕長澘忽忽承䀹悲不能自止容貌變更扁鵲曰若太子病所謂尸蹷者也夫以陽入隂中動胃繵縁中經維絡别下於三焦膀胱是以陽脉下遂隂脉上爭㑹氣閉而不通隂上而陽内行下内鼓而不起上外絶而不為使上有絶陽之絡下有破隂之紐破隂絶陽之色已廢脉亂故形静如死状太子未死也夫以陽入隂支蘭藏者生以隂入陽支蘭藏者死凡此數事皆五藏蹷中之時㬥作也良工取之拙者疑殆扁鵲乃使弟子陽厲鍼砥石以取外三陽五㑹有間太子蘇乃使子豹為五分之熨以八減之齊和煑之以更熨兩脇下太子起坐更適隂陽但服湯二旬而復故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳扁鵲過虢侯世子㬥病而死扁鵲造宫曰吾聞國中卒有壌土之事得無有急乎曰世子㬥病而死扁鵲曰入言鄭醫秦越人能治之庶子之好方者出應之曰吾聞上古醫曰弟父弟父之為醫也以莞為席以芻為狗北面而祝之發十言耳諸扶輿而來者皆平復如故子之方豈能若是乎扁鵲曰不能又曰吾聞中古之為醫者曰踰跗踰跗之為醫也榒木為腦芷草為軀吹竅定腦死者復生子之方豈能若是乎扁鵲曰不能中庻子曰苟如子之方譬如以管窺天以錐刺地所窺者大所見者小所刺者巨所中者少如子之方豈足以變童子哉扁鵲曰不然事故有昧投而中蟁頭掩目而别白黒者夫世子之病所謂尸蹷者不以為然試入診太子股隂當温耳焦焦如有啼者聲若此者皆可治也中庻子遂入診世子以病報虢侯聞之足跣而起至門曰先生逺辱幸臨寡人先生幸而治之則糞土之息得蒙天地再長為人先生弗治則先犬馬填溝壑矣言未卒而涕泣沾襟扁鵲入砥鍼礪石取三陽五㑹為先軒之竈入拭之陽子同藥子明灸陽子游按磨子儀反神子越扶形於是世子復生天下聞之皆以扁鵲能起死人也扁鵲曰吾不能起死人直使夫當生者起死者猶可藥而况生乎悲夫罷君之治無可藥而生也韓詩卷十說苑作趙事虢太子死扁鵲曰臣能生之中庶子入報虢君曰寡人幸甚鵲使弟子陽厲鍼砥石以取外三陽五㑹有間太子蘇史記地志山東濟南府有鵲山相傳扁鵲鍊丹於此又云河南内丘蓬鵲山扁鵲同虢太子採藥于此列子湯問魯公扈趙齊嬰二人有疾同扁鵲治之既同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所已今有偕生之疾與體偕長今為汝攻之何如二人曰願先聞其騐扁鵲謂公扈曰汝志強而氣弱故足于謀而寡于斷齊嬰志弱而氣強故少于慮而傷于專若換汝之心則均于善矣扁鵲遂飲二人毒酒迷死三日剖胷探心易而置之投以神藥既悟如初二人辭歸於是公扈反齊嬰之室而有其妻子妻子弗識也齊嬰亦反公扈之室有其妻子妻子亦弗識二室因相與訟辨于扁鵲扁鵲辨其所由訟乃已虢君驕恣自伐謟䛕親貴諫臣誅逐政治蹖亂國人不復晋師伐之虢人不守虢君出走至於澤中曰吾渇而欲飲其御乃進清酒曰吾飢而欲食御進腵脯梁糗虢君喜曰何給也御曰儲之乆矣曰何故儲之對曰為君出亾而道飢渇也君曰知寡人亾耶對曰知之曰知之何以不諫對曰君好謟䛕而惡至言臣願諫恐先說亾虢君作色而怒御謝曰臣之言過也有間君曰吾之亾者誠何也其御曰君弗知耶君之所以亾者以大賢也虢君曰賢人之所以存也對曰天下之君皆不肖而疾君之獨賢也故亾虢君喜據式而嘆曰嗟乎賢固若是苦耶遂徒行即於山中居倦枕御膝而卧御以塊自易迯行而去君遂餓死為禽獸食新書卷七牽合陳轅頗齊閔王椘靈王之事而一之非實可知邾鄒孔疏云邾曹姓顓頊之後武王封其苗裔挾于邾今魯鄒縣公羊禮記亦稱邾婁邾人語聲其地在鄒山魯繆公時改國號曰鄒以山為名也邾婁定公之時有弑其父者有司以告公瞿然失席曰是寡人之罪也曰寡人嘗學斷斯獄矣臣弑君凡在官者殺無赦子弑父凡在宫者殺無赦殺其人壊其室洿其宫而瀦焉盖君踰月而後舉爵檀弓下邾婁考公之喪徐君使容居来弔含曰寡君使容居坐跪也含進侯玉其使容居以含有司曰諸侯之來辱敝邑者易則易于則于易簡易也于廣大也易于雜者未之有也容居對曰容居聞之事君不敢㤀其君亦不敢遺其祖昔我先君駒王西討濟于河無所不用斯言也容居魯人也魯鈍之人不敢忘其祖檀弓下鄒穆公有令食鳬雁必以粃無得以粟於是倉無粃而求易於民二石粟而得一石粃吏以為費請以粟食之穆公曰去非汝所知也夫百姓飽牛而耕􅀈背而耘勤而不惰者豈為鳥獸哉粟米人之上食奈何以之飬鳥且爾知小計不知大㑹周諺曰囊滿貯中而獨不聞歟夫君者民之父母取倉之粟移之於民此非吾之粟乎鳥苟食鄒之粃不害鄒之粟也粟之在倉與在民於我何擇鄒民聞之恱皆以私積與公家為一體也新序卷六新書卷七吕氏春秋邾之故法為甲裳以帛公息忌謂邾君曰不若以組凡甲之所以為固者以滿竅也今竅滿矣而任力者半耳且組則不然竅滿則盡任力矣邾君以為然曰將何所以得組也公息忌對曰上用之則民為之矣邾君曰善下令令官為甲必以組公息忌知說之行也因令其家皆為組人有傷之者曰公息忌之所欲用組者其家多為組也邾君不說於是復下令令官為甲無以組此邾君之有所尤也楚王欲淫鄒君乃遺之妓樂美女四人穆公朝觀而夕畢以妻死事之孤故婦人年弗稱者弗畜節于身而弗衆也王輿不衣皮帛御馬不食禾菽無淫僻之事無驕燕之行食不衆味衣不雜采自刻以廣民親賢以定國視民如子鄒國之治路不拾遺臣下順從若手之投心是故以鄒子之細魯衞不敢輕齊楚不能脅鄒穆公死鄒之百姓若失慈父行哭三月四境之隣于鄒者士民鄉方而道哭抱手而憂行酤家不售其酒屠者罷列而歸傲童不謳歌舂築者不相杵婦女抶珠瑱丈夫釋玦靬琴瑟無音朞年而後始復新書卷之六鄒君好服長纓左右皆服長纓甚貴鄒君患之問左右左右曰吾好服百姓亦多服是以貴君因先自斷其纓而出國中皆不服長纓韓子外儲左田駟欺鄒君鄒君将使人殺之田駟恐告恵子恵子見鄒君曰今有人見君則䀹其一目奚如君曰我必殺之恵子曰瞽兩目䀹君奚為不殺君曰不能勿䀹恵子曰田駟東慢齊侯南欺楚王駟之欺人瞽也君奚怨焉鄒君乃不殺韓子說林白圭問於鄒公子夏后啟曰踐繩之節四上之志三晋之事此天下之豪英錢繩之節正直也四上謂君也卿大夫士與君為四四者之中君處其上故曰四上志三晋韓趙魏以䖏於晉而迭聞晋事未嘗聞踐繩之節四上之志願得而聞之夏后啟曰鄙人也焉足以問白圭曰願公子之毋譲也夏后啟曰以為可為故為之為之天下不能禁矣以為不可為故釋之釋之天下弗能使矣白圭曰利弗能使乎威弗能禁乎夏后啟曰生不足以使之則利曷足以使之矣死不足以禁之則害曷足以禁之矣白圭無以應夏后啟辭而出吕覧知分郭左傳荘二十四年經言郭公胡氏曰郭亾也管子曰桓公遊於郊見亾國之墟焉訪諸野老謂故郭國之墟也惟善善不能用惡惡不能去是以亾也今東昌府聊城縣有郭水水之南㟁有郭城郭君出亾謂其御者曰吾渴欲飲御者進清酒曰吾飢欲食御者進乾脯梁糗曰何備也御者曰臣儲之曰奚儲之御者曰為君之出亾而道饑渴也曰子知吾且亾乎御者曰然曰何以不諫也御者曰君喜道腴而惡至言臣欲進諫恐先郭亾是以不諫也郭君作色而怒曰吾所以亾者誠何哉御轉其辭曰君之所以亾者太賢曰夫賢者所以不為存而亾者何也御曰天下無賢而獨賢是以亾也君伏軾而嘆曰嗟乎夫賢者如此乎於是身倦力觧枕御膝而卧御自易以備疎行而去身死中野為狼虎所食韓詩卷六同虢君事中山史趙獻侯十年中山武公初立徐廣曰西周桓公之子桓公者孝王弟而定王子也中山之相樂池以車百乘使趙選其客之有智能者以為将行将行官名中道而亂樂池曰吾以公為有智而使公為将行今中道而亂何也客因辭而去曰公不如治有威足以服人而利足以勸人故能治之今臣君之少客也夫從少正長從賤治貴而不得操其利害之柄以制之此所以亂也嘗試使臣彼之善者我能以為卿相彼不善者我得以斬其首何故而不治韓子内儲上司馬喜中山君之臣也而善於趙常以中山之謀微告趙王韓子内儲下季辛與爰騫相怨司馬喜新與季辛惡因微令人殺爰騫中山之君以為季辛也因誅之韓子内儲下司馬喜難墨者師於中山王前以非攻司馬喜趙相國曰先生之所術非攻夫墨者師曰然曰今王興兵而攻燕先生将非王乎墨者師對曰然則相國是攻之乎司馬喜曰然墨者師曰今趙興兵而攻中山相國将是之乎司馬喜無以應吕覧應言中山公子牟謂詹子曰身在江海之上心居乎魏闕之下奈何子牟魏公子也作書四篇魏得中山以封子牟詹子古得道者也心下巨闕言神内守也一說魏闕象魏也身雖在乎江海之上而心存王室也詹子曰重生重生則輕利中山公子牟曰雖知之猶不能自勝也詹子曰不能自勝則縱之縱之神無惡乎不能自勝而彊不縱者此之謂重傷重傷之人無壽類矣吕覧審為淮南子道應白圭之中山白圭周人中山之王欲留之白圭固辭乘輿而去又之齊齊王欲留之仕又辭而去人問其故曰之二國者皆将亾所舉有五盡何謂五盡曰莫之必則信盡矣莫之譽則名盡矣莫之愛則親盡矣行者無糧居者無食則財盡矣不能用人又不能自用則功盡矣國有此五者無幸必亾中山齊皆當此吕覧先識謀又說苑權魯丹三說中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出而不反舍遂去中山其御曰及見乃始善我何故反去之魯丹曰夫以人言善我必以人言罪我未出境而公子惡之曰為趙來問中山君因索而罪之韓子說林中山有賤公子馬甚瘦車甚弊左右有私不善者乃為之請王曰公子甚貧馬甚瘦王何不益之馬食王不許左右因微令夜燒芻廐王以為賤公子也乃誅之韓子説林巴蜀蜀與巴同囿黄帝為其子昌意娶蜀山氏之女生子帝嚳封其支庶於蜀為侯伯其地東接于巴南接于越北與秦分西奄峨嶓地稱天府原曰華陽有周之世限以秦巴雖奉王職不得與春秋盟㑹君長莫同書軌周失紀綱蜀先稱王有蜀侯蠶叢其目縱始稱王死作石棺石槨國人從之故俗以石棺槨為縱目人冡次王曰柏灌次王曰魚鳬魚鳬王田於湔山忽得仙道蜀人思之為立祠後有王曰杜宇教民務農一號杜主時朱提有梁氏女利遊江源宇恱之納以為妃移居郫邑或治瞿上七國稱王杜宇稱帝號曰望帝更名蒲卑自以功徳高諸王乃以褒斜為前門熊耳靈關為後户玊壘峨眉為城郭江濳綿洛為池澤以汶山為畜牧南中為園苑㑹有水災其相開明决玊壘山以除水害帝遂委以政事法堯舜禪授之義遂禅位于開明帝升西山隠焉時適二月子䳌鳥鳴故蜀人悲子䳌鳥鳴也說文云蜀王望帝淫其相妻慙亾去為子嶲烏故蜀人聞子嶲鳴皆起云望帝嶲巴亦化其教而力農務迄今巴蜀民農時先祀杜主君開明位號曰叢帝叢帝生盧帝盧帝攻秦至雍生保子帝帝攻青衣雄張獠僰九世有開明帝始立宗廟以酒曰醴樂曰荆人尚赤帝稱王時蜀有五丁力士能移山舉萬鈞每王薨輙立大石長三丈重千鈞為墓志今石笋是也號曰笋里未有謚列但以五色為主故其廟稱青赤黒黄白帝也開明王自夢廊移乃徙治成都周顯王之時蜀王有褒漢之地因獵谷中與秦恵王遇恵王以金一笥遺蜀王王報珍玩之物物化為土恵王怒群臣賀曰天奉我矣王将得蜀土也恵王喜乃作石牛五頭朝瀉金其後曰牛便金有養士百人蜀人恱之使使請石牛恵王許之乃遣五丁迎石牛既不便金怒遣還之乃嘲秦人曰東方牧犢兒秦人笑之曰吾雖牧犢當得蜀也武都有一丈夫化為女子美而艶盖山精也蜀王納為妃不習水土欲去王必留之乃為東平之歌以樂之無㡬物故蜀王哀之乃遣五丁之武都擔土為妃作冡盖地數畆高七尺上有石鏡今成都北角武擔山是也後王悲悼作臾邪歌龍歸之曲其親埋作冡者皆立方石以志其墓成都縣内有一方折石圍可六尺長三丈許去城北六十里曰毗橋亦有一折石亦如之長老傳言丁士擔土擔也顯王二十二年蜀侯使朝秦秦恵王數以美女進蜀王感之故朝焉恵王知蜀王好色許嫁五女于蜀蜀遣五丁迎之還到梓潼見一大蛇入穴中一人攬其尾掣之不禁至五人相助大呼抴蛇山崩時壓殺五人及秦五女并将從而山分為五嶺直頂上有平石蜀王痛傷乃登之因命曰五婦冡山平石上為望夫堠作思妻臺今其山或名五丁冡蜀王别封弟葭萌于漢中號苴侯命其邑曰葭萌焉苴侯與巴王為好巴與蜀仇故蜀王怒伐苴侯苴侯奔巴求救于秦秦恵王方欲謀楚群臣議曰夫蜀西僻之國戎狄為鄰不如伐楚司馬錯中尉田真黄曰蜀有桀紂之亂其國富饒得其布帛金銀足給於用水通於楚有巴之勁卒浮大舶以東向楚楚地可得得蜀則得楚楚亾則天下并矣恵王曰善周慎王五年秋秦大夫張儀司馬錯都尉墨等從石牛道伐蜀蜀王自於葭萌拒之敗績王逃走至武陽為秦軍所害其傅相及太子退至逄鄉死于白鹿山開明氏遂亾凡王蜀十二世冬十月蜀平司馬錯等因取苴與與巴周赧王元年秦恵王封子通國為蜀侯以陳壮為相置巴郡以張若為蜀國守戎伯尚强乃移秦民萬家實之三年分巴蜀置漢中郡六年陳壮反殺蜀侯通國秦遣庻長甘茂張儀司馬錯復伐蜀誅陳壮七年封子惲為蜀侯司馬錯率巴蜀衆十萬大舶舩萬艘米六百萬斛浮江伐楚取商於之地為黔中郡五年恵王二十七年儀與若城成都周廽十二里高七丈郫城周廽七里高六丈臨卭城周廽六里高五丈造作下倉上皆有屋而置觀樓射圃成都縣本治赤里街若徙置少城内城營廣府金置鹽鐡市官并長丞修整里闠市張列肆與咸陽同制其築城取土去城十里因以飬魚今萬歲池是也城北又有龍灞池城東有千秋池城西有栁池冬夏不竭其園囿因之平陽山亦有池澤蜀之漁畋之地也赧王十四年蜀侯惲祭山川獻饋于秦孝文王惲後母害其寵加毒以進王王将嘗之後母曰饋從二千里來當試之王與近臣近臣即斃文王大怒遣司馬錯賜惲劍使自裁惲懼夫婦自殺秦誅其臣郎中令嬰等二十七人蜀人葬惲郭外十五年王封其子綰為蜀侯十七年聞惲無罪寃死使使喪入葬之郭内初則炎旱三月後又霖雨七月車溺不得行喪車至城北門忽䧟入地中蜀人因名北門曰咸陽門為蜀侯惲立祠其神有靈能興雲致雨水旱禱之三十年疑蜀侯綰反王復誅之但置蜀守張若因取笮及其江南地焉華陽國志卷三地志四川杜宇號望帝古蜀主蜀嘗大水宇率居人避長平山後鱉靈開峽治水宇禅位與之入山得道戰國時巴嘗與楚婚及七國稱王巴亦稱王周之季世巴國有亂将軍蔓子請師于楚許以三城楚王救巴巴既寧楚使請城蔓子曰藉楚之靈克弭禍難請許楚王城将吾頭徃謝之城不可得也乃自刎以頭授楚使王嘆曰使吾得臣若巴蔓子用城何為乃以上卿禮葬其頭巴國葬其身亦以上卿禮周顯王時楚國衰弱秦恵文王與巴蜀為好蜀王弟苴私親于巴巴蜀世戰爭周慎王五年蜀王伐苴侯苴侯奔巴巴為求救于秦秦恵文王遣張儀司馬錯救苴巴遂伐蜀滅之儀貪巴苴之富因取巴執王以歸置巴蜀及漢中郡分其地為二縣儀城江州司馬錯自巴涪水取楚商於之地為黔中郡秦昭㐮王時白虎為害自秦蜀巴漢患之秦王乃重募國中有能殺虎者邑萬家金帛稱之于是夷朐忍廖仲藥何射虎秦精等乃作白竹弩于高樓上射虎中頭三節白虎常從群虎瞋恚盡摶殺群虎大呴而死秦王嘉之曰虎歴四郡害千二百人一朝患除功莫大焉乃刻石為盟要復夷人頃田不租十妻不筭傷人者論殺人者死倓錢盟曰秦犯夷人輸黄龍一䨇夷犯秦輸清酒一鍾夷人安之故世號白虎復夷一曰板楯蠻華陽志卷一南中在昔盖夷越之地滇濮句町夜廊葉榆桐師嶲唐侯王國以十數編髪在衽隨畜遷徙莫能相雄長周之季世楚威王遣将軍荘蹻泝沅水出且蘭以伐夜郎植牂牱繫船于是且蘭既尅夜郎又降而秦奪楚黔中地無路得反遂留王滇池楚荘王苗裔也以繫舩因名且蘭為牂牱分侯支黨傳數百年秦并蜀通五尺道置吏主之有竹王者興于遯水有一女子浣于水濱有三節大竹流入女子足間推之不肯去聞有兒聲取持歸破之得一男兒長飬有才武遂雄夷狄以竹為姓捐所破竹于野成竹林今竹王祠竹林是也王與從人嘗止大石上命作羮從者曰無水王以劍擊石水出今王水是也破石存焉後漢武帝開西南夷諸侯服從因斬竹王置牂牱郡華陽志卷四春秋戰國異辭卷五十四
