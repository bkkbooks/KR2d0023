body:
  text: 春秋戰國異辭卷二十四右春坊右諭德陳厚耀撰秦惠文君亦曰惠王惠文君元年楚韓趙蜀人來朝二年天子賀三年王冠四年天子致文武胙齊魏為王史秦本紀寒泉子對秦惠王曰客有自趙來以約從連橫事說大王者為誰惠王曰東周人蘇秦也寒泉子曰書十上王不聽有之乎曰然其道何如王耶霸耶曰黜出霸以躋王曰然則何上書之煩而用之疏乎惠王曰醯雞不能混雷霆嬰兒不能抗烏獲者響與力懸絶故也蘇子誠辨安能以三寸舌謀山東諸侯使西面朝秦者乎寡人非不知不破一領甲不折一隻矢之為利也顧其事猶捕風耳諸侯不可以一非一朝也齊桓晉文之伯也始若膠附終若冰折豈連雞不能俱止于棲而已哉寡人塞耳義弗聞也寒泉子曰不然夫齊荆三晉之人疾于兵久矣方城之金十九為兵一為鎛銚董澤之蒲十九為幹一為箕棬父子兄弟之血前後濺野草齊魂為燕氣趙骨化魏土悽痛之聲入金石出絃匏聞之者悄戚酸屑泣不自禁一旦有人謂曰朝與秦連橫暮得帖帖安卧秦亦厭戰雖鼓牙頰未能吞諸侯秦休而强吾亦勇而奮矣設有辨口奚能反覆乎大王不用秦詔一武士斷其頸無令車輪輾關下土使關東諸侯聞其言合從散橫東向以倍秦大王出則奪氣入則包羞及其殆也披土地以奉仇國獨不念秦仲之業艱難乎春秋記事何靣目見宗廟惠王卒弗用寒泉子耕于鄙趙即封蘇秦為武安君六國果拒秦秦閉關十五年天隨子惠國策有王謂寒泉子文甚略蓋陸龜蒙所擬作以其文類戰國姑録之春秋後語蘇秦上秦惠王書後詩云言語相結天下為一合從連橫兵革不藏文士並飭諸侯亂惑萬端俱起不可勝理科條既備民多僞態書䇿稠濁百姓不足上下相愁民無所聊明言章理甲兵愈起辨言偉服戰攻不息繁稱文辭天下不治舌敝耳聾不見成功行義約信天下不親謝子見于秦惠王惠王說之以問唐姑梁唐姑梁曰謝子山東辨士固權說以取少主惠王因藏怒而待之後日復見逆而弗聽淮南子修務作又見說苑雜言謝子祈射子吕覽志宥東方之墨者謝子將西見秦惠王惠王問秦之墨者唐姑果唐姑果恐王之親謝子賢于己也對曰謝子東方之辨士也其為人甚險將奮于說以取少主也王因藏怒以待之謝子至說王王弗聽謝子不說遂辭而行墨者有巨子腹䵍居秦其子殺人秦惠王曰先生之年長矣非有他子也寡人已令吏弗誅矣腹䵍對曰墨者之法曰殺人者死傷人者刑此所以禁殺傷人也夫禁殺傷人者天下之大義也王雖為之賜而令吏弗誅腹䵍不可以不行墨者之法不許惠王而遂殺之吕覽去私墨者有田鳩欲見秦惠王約車申轅留秦三年弗得見客有言之于楚王者往見楚王楚王說之與將軍之節以如秦至因見惠王惠王見而說之出舍喟然而歎告從者曰吾留秦三年不得見不識道之當由楚也物固有近之而逺逺之而近者吕覽首時合淮南子道應五年隂晉人犀首為大良造史秦本紀魏犀首姓公孫名衍人也六年魏納隂晉隂晉更名寧秦七年公子卬與魏戰虜其將龍賈斬首八萬八年魏納河西地九年渡河取汾隂皮氏與魏王㑹應圍焦降之史秦本紀紀年龍賈及秦師戰于雕隂我師敗逋秦惠王八年爵樗里子右更樗里子者名疾秦惠王之弟也與惠王異母母韓女也樗里子滑稽多智秦人號曰智囊使將而伐曲沃盡出其人取其城地入秦年表在惠文後元十一年史樗里傳犀首公孫衍天下之善將也梁王之臣也秦王惠王欲得之與治天下犀首曰衍人臣也不敢離主之國居期年犀首抵罪于梁王逃而入秦秦王甚善之樗里疾一曰甘茂秦之將也恐犀首之代之將也鑿穴于王之所常隱語者俄而王果與犀首計曰吾欲攻韓奚如犀首曰秋可矣王曰吾欲以國纍子子必勿泄也犀首反走再拜曰受命于是樗里已道穴聽之矣郎中皆曰兵秋起攻韓犀首為將于是境內盡知之王召樗里疾曰是何胸胸也何道出樗里疾曰似犀首也王曰吾無與犀首言也樗里疾曰犀首也羈旅新抵罪其心孤是言自嫁于衆王曰然使人召犀首已逃入諸侯矣韓子外儲右十年張儀相秦魏納上郡十五縣十一年縣義渠歸魏焦曲沃義渠君為臣更名少梁曰夏陽十二年初臘使張儀伐取陜出其人與魏十四年更為元年秦初稱王故改元年二年張儀與齊楚大臣㑹齧桑三年韓魏太子來朝張儀相魏五年王遊至北河七年樂池相秦韓趙魏燕齊帥丐奴共攻秦秦使庶長疾與戰修魚虜其將申差敗趙公子渴韓太子奐斬首八萬二千八年張儀復相秦以上史秦本紀史記張儀傳惠王之十年使公子華與張儀圍蒲陽降之儀因言秦復與魏因入上郡少梁謝秦秦惠王乃以張儀為相更名少梁曰夏陽儀相秦四嵗立惠王為王居一嵗為秦將取陕築上郡塞其後二年使與齊楚之相㑹齧桑東還而免相相魏以為秦欲令魏先事秦而諸侯效之魏王不肯聽儀秦王怒伐取魏之曲沃平周復隂厚張儀益甚張儀慚無以歸報留魏四嵗而魏襄王卒哀王立張儀復說哀王哀王不聽紀年魏惠王卒襄王立無哀王于是張儀隂令秦伐魏魏與秦戰敗明年齊又來敗魏于觀津秦復欲攻魏先敗韓申差軍斬首八萬諸侯震恐儀復說魏王曰魏地方不至千里卒不過三十萬地四平諸侯四通輻湊無名山大川之限從鄭至梁二百餘里車馳人走不待力而至梁南與楚境西與韓境北與趙境東與齊境卒戍四方守亭鄣者不下十萬梁之地勢固戰場也梁南與楚而不與齊則齊攻其東東與齊而不與趙則趙攻其北不合于韓則韓攻其西不親於楚則楚攻其南此所謂四分五裂之道也且夫諸侯之為從者將以安社稷尊主彊兵顯名也今從者一天下約為昆弟刑白馬以盟洹水之上以相堅也而親昆弟同父母尚有爭錢財而欲恃詐僞反覆蘇秦之餘謀其不可成亦明矣大王不事秦秦下兵攻河外據卷衍酸棗劫衛取陽晉則趙不南趙不南而梁不北梁不北則從道絶從道絶則大王之國欲毋危不可得也秦折韓而攻梁韓怯于秦秦韓為一梁之亡可立而須也此臣之所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王可髙枕而卧國必無憂矣且夫秦之所欲弱者莫如楚而能弱楚者莫如梁楚雖有富大之名而實空虛其卒雖多然而輕走易北不能堅戰悉梁之兵南面而伐楚勝之必矣割楚而益梁虧楚而適秦嫁禍安國此善事也大王不聽臣秦下甲士而東伐雖欲事秦不可得矣且夫從人多奢辭而少可信說一諸侯而成封侯是故天下之遊談士莫不日夜扼腕瞋目切齒以言從之便以說人主人主賢其辨而牽其說豈得無眩哉臣聞之積羽沈舟羣輕折軸衆口鑠金積毁銷骨故願大王審定計議且賜骸骨辟魏哀王于是乃倍從約而因儀請成于秦張儀歸復相秦在惠王後八年三嵗而魏復倍秦為從秦攻魏取曲沃明年魏復事秦史記齊湣王伐敗趙魏軍秦亦伐敗韓與齊爭長事當秦惠王後八年張儀已學而遊說諸侯嘗從楚相飲已而楚相亡璧門下意張儀曰儀貧無行必此盜相君之璧共執張儀掠笞數百不服醳之醳古釋字其妻曰嘻子毋讀書遊說安得此辱乎張儀謂其妻曰視吾舌尚在不其妻笑曰舌在也儀曰足矣張儀既相秦為文檄告楚相曰始吾從若飲我不盜爾璧若笞我若善守汝國我顧且盜而城史張儀傳陳軫者遊說之士與張儀俱事秦惠王皆貴重爭寵張儀惡陳軫于秦王語詳國策居期年秦惠王終相張儀而陳軫奔楚楚未之重也史陳軫傳韓魏相攻期年不解秦惠王欲救之問于左右左右或曰救之便或曰勿救便惠王未能為之决陳軫適至秦自楚至惠王曰子去寡人之楚亦思寡人不陳軫對曰王聞夫越人莊舄乎王曰不聞曰越人莊舄仕楚執圭有頃而病楚王曰舄故越之鄙細人也今事楚執圭貴富矣亦思越不中謝中謝侍御之官也對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人往聽之猶尚越聲也今臣雖弃逐之楚豈能無秦聲哉惠王曰善今韓魏相攻朞年不解或謂寡人救之便或曰勿救便寡人不能決願子為子主計之子主謂楚王也餘為寡人計之陳軫對曰亦嘗有以夫卞莊子刺虎聞于王者乎莊子欲刺虎館豎子止之曰兩虎方且食牛食甘必爭爭則必鬬鬬則大者傷小者死從傷而刺之一舉必有雙虎之名今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶莊子刺虎之類也臣主與王何異也惠王曰善卒弗救大國果傷小國亡秦興兵而伐大尅之史陳軫傳後九年司馬錯伐蜀滅之伐取趙中都西陽史秦本紀史張儀傳初苴蜀相攻擊各來告急於秦秦惠王欲發兵以伐蜀以為道險狹難至而韓又來侵秦秦惠王欲先伐韓後伐蜀恐不利欲先伐蜀恐韓襲秦之敝猶豫未能決司馬錯與張儀爭論于惠王之前司馬錯欲伐蜀張儀曰不如伐韓王曰請問其說儀曰親魏善楚下兵三川塞斜谷之口當屯留之道魏絶南陽楚臨南鄭秦攻新城宜陽以臨二周之郊誅周王之罪侵楚魏之地周自知不能救九鼎寶器必出據九鼎案圖籍挾天子以令于天下天下莫敢不聼此王業也今夫蜀西僻之國而戎翟之倫也敝兵勞衆不足以成名得其地不足以為利臣聞爭名者于朝爭利者于市今三川周室天下之朝市也而王不爭焉顧爭于戎翟去王業逺矣司馬錯曰不然臣聞之欲富國者務廣其地欲强兵者務富其民欲王者務博其德三資者備而王隨之矣今王地小民貧故臣願先從事于易夫蜀西僻之國也而戎翟之長也有桀紂之亂以秦攻之譬如使豺狼逐群羊得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉拔一國而天下不以為暴利盡西海而天下不以為貪是我一舉而名實附也而又有禁暴止亂之名今攻韓劫天子惡名也而未必利也又有不義之名而攻天下所不欲危矣臣請論其故周天下之宗室也齊韓之與國也周自知失九鼎韓自知亡三川將二國併力合謀以因乎齊趙而求解乎楚魏以鼎與楚以地與魏王弗能止也此臣之所謂危也不如伐蜀完惠王曰善寡人請聽子卒起兵伐蜀十月取之六國年表在惠王二十二年十月實後九年十月也遂定蜀貶蜀王更號為侯而使陳莊相蜀蜀既屬秦秦以益强富厚輕諸侯與國策小異新論貪愛蜀侯性貪秦惠王聞而欲伐之山澗峻嶮兵路不通乃琢石為牛多與金置牛後號牛糞之金以遺蜀侯蜀侯貪之乃塹山填谷使五丁力士以迎石牛秦人帥師隨後而至滅國亡身蜀記秦惠王欲伐蜀患山隘險乃刻五石牛置金尾後以遺蜀蜀人見之以為牛能便金牛下有養卒以為此天牛也蜀王負力而貪即發卒千人使五丁力士拖牛成道致三枚於成都秦得道通石牛力也秦因遣丞相張儀司馬錯等隨石牛道伐蜀地志今金牛峽在漢中府寧羌縣抱朴子秦惠王以美女五人與蜀王有五丁力士使迎秦女到梓潼見一大蛇入于山穴一丁引其尾不能止五丁乃共引蛇蛇不出山因崩壓秦五女及送女者化而成石人于今列于崩之側地志嘉定州秦惠王克蜀移秦人萬家於峨眉水上因名秦水後十年韓太子蒼來質當在破岸門之下伐取韓石章伐敗趙將泥伐取義渠二十五城十一年樗里疾攻魏焦降之敗韓岸門斬首萬其將犀首走公子通封于蜀以陳莊為相十二年王與梁王㑹臨晉庶長疾攻趙虜趙將莊即莊豹拔張儀相楚秦欲伐齊齊楚從親故使張儀往相楚十三年庶長章即魏章擊楚于丹陽虜其將屈丐斬首八萬又攻楚漢中取地六百里置漢中郡封樗里子號為嚴君楚圍雍氏楚圍雍氏有三此前役也當周赧王三年說見後秦使庶長疾助韓而東攻齊到滿助魏攻燕滿或作蒲秦將姓名也十四年伐楚取召陵丹犂臣蜀蜀相壯殺蜀侯來降壯一作狀惠王卒子武王立韓魏齊楚越皆賔從越一作趙史以上俱秦本紀楚懷王赦張儀厚禮之如故懷王初囚張儀後悔而赦之張儀既出在楚未去聞蘇秦死索隱曰此時當秦惠王之後元十四年乃說楚王曰秦地半天下兵敵四國被險帶河四塞以為固虎賁之士百餘萬車千乘騎萬匹積粟如丘山法令既眀士卒安難樂死主明以嚴將智以武雖無出甲席卷常山之險必折天下之脊天下有後服者先亡且夫為從者無以異于驅群羊而攻猛虎虎之與羊不格眀矣今王不與猛虎而與群羊臣竊以為大王之計過也凡天下强國非秦而楚非楚而秦兩國交爭其勢不兩立大王不與秦秦下甲據宜陽韓之上地不通下河東取成臯韓必入臣梁則從風而動秦攻楚之西韓梁攻其北社稷安得毋危且夫從者聚羣弱而攻至强不料敵而輕戰國貧而數舉兵危亡之術也臣聞之兵不如者勿與挑戰粟不如者勿與持久夫從人飾辨虗辭髙主之節言其利不言其害卒有秦禍無及為已是故願大王之熟計之秦西有巴蜀大船積粟起於汶山浮江以下至楚三千餘里舫船載卒一舫載五十人與三月之食下水而浮一日行三百餘里里數雖多然而不費牛馬之力不至十日而拒扦關扦關驚則從境以東盡城守矣黔中巫郡非王之有秦舉甲出武關南面而伐則北地絶秦兵之攻楚也危難在三月之內而楚待諸侯之救在半嵗之外此其勢不相及也夫待弱國之救忘强秦之禍此臣之所以為大王患也大王嘗與吳人戰五戰而三勝陳卒盡矣偏守新城存民苦矣臣聞功大者易危而民敝者怨上夫守易危之功而逆强秦之心臣竊為大王危之且夫秦之所以不出兵函谷十五年以攻齊趙者隂謀有合天下之心楚嘗與秦搆難戰於漢中楚人不勝列侯執圭死者七十餘人遂亡漢中楚王大怒興兵襲秦戰於藍田此所謂兩虎相搏者也夫秦楚相敝而韓魏以全制其後計無危於此者矣願大王熟計之秦下甲攻衛陽晉必大關天下之胸大王悉起兵以攻宋不至數月而宋可舉舉宋而東指則泗上十二諸侯盡王之有也凡天下而以信約從親相堅者蘇秦封武安君相燕即隂與燕王謀伐破齊而分其地乃詳有罪出走入齊齊王因受而相之居二年而覺齊王大怒車裂蘇秦於市夫以一詐僞之蘇秦而欲經營天下混一諸侯其不可成亦明矣今秦與楚接境壤界固形親之國也大王誠能聽臣臣請使秦太子入質於楚楚太子入質於秦請以秦女為大王箕帚之妾效萬室之都以為湯沐之邑長為昆弟之國終身無相攻伐臣以為計無便於此者於是楚王已得張儀而重出黔中地與秦欲許之屈原曰前大王見欺於張儀張儀至臣以為大王烹之今縱弗忍殺之又聽其邪說不可懷王曰許儀而得黔中美利也後而倍之不可故卒許張儀與秦親張儀去楚因遂之韓說韓王曰韓地險惡山居五榖所生非菽而麥民之食大抵飯菽藿羮一嵗不收民不厭糟糠地不過九百里無二嵗之食料大王之卒悉之不過三十萬而厮徒負養在其中矣除守徼亭鄣塞見卒不過二十萬而已矣秦帶甲百餘萬車千乘騎萬匹虎賁之士跿跔科頭貫頤奮㦸者至不可勝計秦馬之良戎兵之衆探前趹後蹄間三尋騰者不可勝數山東之士被甲䝉胄以㑹戰秦人捐甲徒裼以趨敵左手挈人頭右手挾生虜夫秦卒與山東之卒猶孟賁之與怯夫以重力相壓猶烏獲之與嬰兒夫戰孟賁烏獲之士以攻不服之弱國無異垂千鈞之重於鳥卵之上必無幸矣夫羣臣諸侯不料地之寡而聼從人之甘言好辭比周以自飾也皆奮曰聽吾計可以彊霸天下夫不顧社稷之長利而聽須臾之說詿誤人主無過此者大王不事秦秦下甲據宜陽斷韓之上地東取成臯滎陽則鴻臺之宫桑林之苑非王有之也夫塞成臯絶上地則王之國分矣先事秦則安不事秦則危夫造禍而求其福報計淺而怨深逆秦而順楚雖欲無亡不可得也故為大王計莫如為秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能强於楚也其地勢然也今王西面而事秦以攻楚秦王必喜夫攻楚以利其地轉禍而說秦計無便於此者韓王聽儀計張儀歸報秦惠王封儀五邑號曰武信君使張儀東說齊湣王曰天下强國無過齊者大臣父兄殷衆富樂然而為大王計者皆為一時之說不顧百世之利從人說大王者必曰齊西有强趙南有韓與梁齊負海之國也地廣民衆兵强士勇雖有百秦將無奈齊何大王賢其說而不計其實夫從人朋黨比周莫不以從為可臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有戰勝之名而有亡國之實是何也齊大而魯小也今秦之與齊也猶齊之與魯也秦趙戰於河漳之上再戰而趙再勝秦戰於畨吾之下再戰又勝秦四戰之後趙之亡卒數十萬邯鄲僅存雖有戰勝之名而國已破矣是何也秦强而趙弱今秦楚嫁女娶婦為昆弟之國韓獻宜陽梁效河外趙入朝澠池割河間以事秦大王不事秦秦驅韓梁攻齊之南地悉趙兵渡清河指博關臨菑即墨非王之有也國一日見攻雖欲事秦不可得也是故願大王孰計之也齊王曰齊僻陋隱居東海之上未嘗聞社稷之長利也乃許張儀張儀去西說趙王曰敝邑秦王使使臣效愚計於大王大王收率天下以擯秦秦兵不敢出函谷關十五年大王之威行於山東敝邑恐懼懾伏繕甲厲兵飾車騎習馳射力田積粟守四封之內愁居懾處不敢動搖惟大王有意督過之也今以大王之力舉巴蜀并漢中包兩周遷九鼎守白馬之津秦雖僻逺然而心忿含怒之日久矣今秦有敝甲凋兵軍於澠池願渡河踰漳據番吾㑹邯鄲之下願以甲子合戰以正殷紂之事敬使使臣先聞左右凡大王之所信為從者恃蘇秦蘇秦熒惑諸侯以是為非以非為是欲反齊國而自令車裂於市夫天下之不可一亦明矣今楚與秦為昆弟之國而韓梁稱為東藩之臣齊獻魚鹽之地此斷趙之右臂也夫斷右臂而與人鬬失其黨而孤居求欲毋危豈可得乎今秦發三將軍其一軍塞午道告齊使興師渡清河軍於邯鄲之東一軍軍成臯驅韓梁軍於河外一軍軍於澠池約四國為一以攻趙趙服必四分其地是故不敢匿意隱情先以聞於左右臣竊為大王計莫如與秦王遇於澠池面相見而口相結請案兵無攻願大王之定計趙王曰先王之時奉陽君専權擅勢蔽欺先王獨擅綰事寡人居屬師傅不與國謀計先王棄羣臣寡人年幼奉祀之日新心固竊疑焉以為一從不事秦非國之長利也乃且願變心易慮割地謝前過以事秦方將約車趨行適聞使者之明詔趙王許張儀張儀乃去北之燕說燕昭王曰大王之所親莫如趙昔趙襄子嘗以其姊為代王妻欲并代約與代王遇於句注之塞乃令工人作為金斗長其尾令可以擊人與代王飲隂告厨人曰即酒酣樂進熱啜反斗以擊之於是酒酣樂進熱啜厨人進斟因反斗以擊代王殺之王腦塗地其姊聞之因摩筓以自刺故至今有摩笄之山代王之亡天下莫不聞夫趙王之狼戾無親大王之所明見且以趙王為可親乎趙興兵攻燕再圍燕都而劫大王大王割十城以謝今趙王已入朝澠池效河間以事秦今大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非大王之有也且今時趙之於秦猶郡縣也不敢妄舉師以攻伐今王事秦秦王必喜趙不敢妄動是西有强秦之援而南無齊趙之患是故願大王孰計之燕王曰寡人蠻夷僻處雖大男子裁如嬰兒言不足以采正計今上客幸教之請西面而事秦獻恆山之尾五城燕王聽儀儀歸報未至咸陽而秦惠王卒武王立武王自為太子時不說張儀及即位羣臣多讒張儀曰無信左右賣國以取容秦必復用之恐為天下笑諸侯聞張儀有卻武王皆畔衡復合從史張儀傳異文與國策小武王秦武王元年羣臣日夜惡張儀未已而齊讓又至張儀懼誅乃因謂秦武王曰儀有愚計願效之王曰奈何對曰為秦社稷計者東方有大變然後王可以多割得地也今聞齊王甚憎儀儀之所在必興師伐之故儀願乞其不肖之身之梁齊必興師而伐梁梁齊之兵連於城下而不能相去王以其間伐韓入三川出兵函谷而毋伐以臨周祭器必出挾天子按圖籍此王業也秦王以為然乃具革車三十乘入儀之梁齊果興師伐之梁哀王恐張儀曰王勿患也請令罷齊兵乃使其舍人馮喜之楚借使之齊謂齊王曰王甚憎張儀雖然亦厚矣王之託儀於秦也齊王曰寡人憎儀儀之所在必興師伐之何以託儀對曰是乃王之託儀也夫儀之出也固與秦王約曰為王計者東方有大變然後王可以多割得地今齊王甚憎儀儀之所在必興師伐之故儀願乞其不肖之身之梁齊必興師伐之齊梁之兵連於城下而不能相去王以間伐韓入三川出兵函谷而無伐以臨周祭器必出挾天子按圖籍此王業也秦王以為然故具革車三十乘而入之梁也今儀入梁王果伐之是王內罷國而外伐與國廣鄰敵以內自臨而信儀於秦王也此臣之所謂託儀也齊王曰善乃使解兵史張儀傳與魏惠王㑹臨晉年表云哀王誅蜀相壯張儀魏章皆東出之魏伐義渠丹犂二年初置丞相樗里疾甘茂為左右丞相以上史秦本紀史樗里子傳秦武王以樗里疾為右丞相使以車百乘入周周以卒迎甚敬之史甘茂傳甘茂者下蔡人也事下蔡史舉先生學百家之說因張儀樗里子而求見秦惠王王見而說之使將而佐魏章略定漢中地惠王卒武王立張儀魏章去東之魏蜀侯輝相壯反輝秦之公子封蜀者壯姓陳秦使甘茂定蜀而以甘茂為左丞相說苑雜言甘茂茂或作戊使於齊渡大河船人曰河水間耳君不能自渡能為王者之說乎甘茂曰不然汝不知也物各有短長謹願敦厚可事主不施用兵騏驥騄駬足及千里置之宫室使之捕鼠曽不如小狸干將為利名聞天下匠以治木不如斤斧今持楫而上下隨流吾不如子說千乘之君萬乘之主子亦不如戊矣韓子說林秦武王令甘茂擇所欲為於僕與行事孟卯曰公不如為僕公所長者使也公雖為僕王猶使之於公也公佩僕璽而為行事是兼官也張儀死於魏史秦本紀通鑑張儀出復相魏儀詭說武王而相魏一嵗卒武王二年張儀卒於魏儀與蘇秦皆以縱橫之術逰說諸侯致位冨貴天下爭慕效之又有魏人公孫衍者號曰犀首亦以談說顯名其餘蘇代蘇厲俱秦之弟周最樓緩之徒紛紜遍於天下務以辨詐相髙不可勝紀而儀秦衍最著史犀首傳犀首者魏之隂晉人也犀首魏官名若今虎牙將軍名衍姓公孫氏與張儀不善張儀為秦之魏魏王相張儀犀首弗利故令人謂韓公叔曰張儀已合秦魏矣其言曰魏攻南陽秦攻三川魏王所以貴張子者欲得韓地也且韓之南陽已舉矣子何不少委焉以為衍功則秦魏之交可錯矣錯國策作廢然則魏必圖秦而棄儀收韓而相衍公叔以為便因委之犀首以為功果相魏張儀去復相秦義渠君朝於魏犀首聞張儀復相秦害之犀首乃謂義渠君曰道逺不可復過請謁事情曰中國無事秦得燒掇焚杅君之國有事無事謂六國共攻秦也有事謂六國共伐秦也秦將輕使重幣事君之國其後五國伐秦年表秦惠王後七年㑹陳軫謂秦王曰義渠者蠻夷之賢君也不如賂之以撫其志秦王曰善乃以文繡千純婦女百人遺義渠君義渠君致羣臣而謀曰此公孫衍所謂耶乃起兵襲秦大敗秦人於李伯之下張儀已卒之後犀首入相秦嘗佩五國之相印為約長三年與韓襄王㑹臨晉外南公揭卒樗里疾相韓武王謂甘茂曰寡人欲容車通三川窺周室死不恨矣其秋使甘茂庶長封伐宜陽四年拔宜陽斬首六萬涉河城武遂魏太子來朝史甘茂傳武王欲伐韓甘茂曰請之魏約以伐韓而令向壽輔行甘茂至謂向壽曰子歸言之於王曰魏聽臣矣然願王勿伐事成盡以為子功向壽歸以告王王迎甘茂於息壤甘茂至王問其故對曰宜陽大縣也上黨南陽積之久矣名曰縣其實郡也今王倍數險行千里攻之難矣昔曽參同姓名者殺人人告其母曰曽參殺人其母織自若也頃之一人又告之曰曽參殺人其母尚織自若也頃又一人告之曰曽參殺人其母投杼下機踰牆而走夫以曽參之賢與其母信之也三人疑之其母懼焉今臣之賢不若曾參王之信臣又不如曽參之母信曽參也疑臣者非特三人臣恐大王之投杼也始張儀西并巴蜀之地北開西河之外南取上庸天下不以多張子而以賢先王魏文侯令樂羊將而攻中山三年而拔之樂羊返而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功也主君之力也今臣羈旅之臣也樗里子公孫奭二人者奭國䇿作衍挾韓而議之王必聽之是王欺魏王而臣受公仲侈之怨也侈一作馮王曰寡人不聽也請與子盟卒使丞相甘茂將兵伐宜陽五月而不拔樗里子公孫奭果爭之武王召甘茂欲罷兵甘茂曰息壤在彼王曰有之因大悉起兵使甘茂擊之斬首六萬遂拔宜陽韓襄王使公仲侈入謝與秦平武王竟至周而卒於周其弟立為昭王與國䇿小異武王有力好戲力士任鄙烏獲孟說皆至大官王與孟說舉鼎絶臏八月武王死族孟說武王取魏女為后無子立異母弟是為昭襄王昭襄母楚人姓芋氏號宣太后武王死時昭襄王為質於燕燕人送歸得立以上史秦本紀史趙世家秦武王與孟說舉龍文赤鼎絶臏而死趙王使代相趙固迎公子稷於燕送歸立為秦王是為昭王吕覽必已孟賁齊人能生拔牛角秦武王好多力士賁往歸之孟賁過於河先其五船人怒而以楫虓其頭顧不知其孟賁也中河孟賁瞋目而視船人髮植目裂鬢指舟中之人盡揚播入於河又韓子帝王世紀秦武王好多力之士烏獲齊孟賁之徒並歸焉孟賁生拔牛角秦王於洛陽舉周鼎烏獲兩目血出論衡秦武王與孟說舉鼎不任絶胍而死鼎用力力由斤胍斤胍不堪絶傷而死史甘茂傳秦武王至周而卒於周其弟立為昭王王母宣太后楚女也楚懷王怒前秦敗楚於丹陽而韓不救乃以兵圍韓雍氏韓使公仲侈告急於秦秦昭王新立太后楚人不肯救公仲因甘茂甘茂為韓言於秦昭王曰公仲方有得秦救故敢扞楚也今雍氏圍秦師不下殽公仲且仰首而不朝公叔且以國南合於楚楚韓為一魏氏不敢不聽然則伐秦之形成矣不識坐而待伐孰與伐人之利秦王曰善乃下師於殽以救韓楚兵去春秋戰國異辭卷二十四
