body:
  text: 春秋戰國異辭卷九右春坊右諭德陳厚耀撰晉文公文公重耳自少好士年十七有賢士五人曰趙衰狐偃咎犯文公舅也賈他先軫魏武子自獻公為太子時重耳固已成人矣獻公即位重耳年二十一獻公二十一年殺太子申生驪姬讒之恐不辭獻公而守蒲城二十二年獻公使宦者履鞮趣殺重耳履鞮即勃鞮也重耳踰垣宦者逐斬其衣袪重耳奔狄狄其母國也是時重耳年四十三從者五士其餘不名者數十人至狄狄伐咎如得二女以長女妻重耳生伯倏叔劉以少女妻趙衰生盾居狄五嵗而晉獻公卒里克己殺奚齊悼子乃使人迎欲立重耳重耳畏殺因固謝不敢入已而晉更迎其弟夷吾立之是為惠公惠公七年畏重耳乃使宦者履鞮與壯士欲殺重耳重耳聞之乃謀趙衰等曰始吾奔狄非以為可用興以近易通故且休足休足久矣固願徙之大國夫齊桓公好善志在霸王收恤諸侯今聞管仲隰朋死此亦欲得賢佐盍往乎于是遂行重耳謂其妻曰待我二十五年不來乃嫁其妻笑曰犂二十五年吾冢上柏大矣雖然妾待子重耳居狄凡十二年而去過衛衛文公不禮去過五鹿饑而從野人乞食野人盛土器中進之重耳怒趙衰曰土者有土也君其拜受之至齊齊桓公厚禮而以宗女妻之有馬二十乘重耳安之重耳至齊二歲而桓公卒㑹竪刁等為內亂齊孝公之立諸侯兵數至留齊凡五歲重耳愛齊女毋去心趙衰咎犯乃于桑下謀行齊女侍者在桑上聞之以告其主其主乃殺侍者勸重耳趣行重耳曰人生安樂孰知其他必死于此不能去齊女曰子一國公子窮而來此數士者以子為命子不疾反國報勞臣而懷女德竊為子羞之且不求何時得功乃與趙衰等謀醉重耳載以行行逺而覺重耳大怒引戈欲殺咎犯咎犯曰殺臣成子偃之願也重耳曰事不成我食舅氏之肉咎犯曰事不成犯肉腥臊何足食乃止遂行符子臣公子重耳奔齊與五遊乎大澤之中見蜘蛛網曵繩執豸而食之公子重耳乃撫僕之手駐駟而觀之顧謂咎犯曰此蟲也知之德薄矣而猶役其智布其網曵其繩執豸以食之况乎人之智而不能廓垂天之網布絡地之繩以御方丈之御是曽不如蜘蛛之智也可謂之人乎咎犯曰公子愼勿言也君終行之則有邦有嗣也過曹曹共公不禮欲觀重耳駢脅淮南子重耳過曹曹君欲見其駢脅使之袒而捕魚曹大夫釐負羈曰晉公子賢又同姓窮來過我奈何不禮共公不從其謀負羈乃私遺重耳食置璧其下重耳受其食還其璧去過宋宋襄公新困兵于楚傷于泓聞重耳賢乃以國禮禮于重耳宋司馬公孫固善于咎犯曰宋小國新困不足以求入更之大國乃去過鄭鄭文公弗禮鄭叔瞻諫其君曰晉公子賢而其從者皆國相且又同姓鄭之出自厲王而晉之出自武王鄭君曰諸侯亡公子過此者衆安可盡禮叔曕曰君不禮不如殺之且後為國患鄭君不聼重耳去之楚楚成王以適諸侯禮待之重耳謝不敢當趙衰曰子亡在外十餘年小國輕子况大國乎今楚大國而固遇子子其母讓此天開子也遂以客禮見之成王厚遇重耳重耳甚卑成王曰子即反國何以報寡人重耳曰羽毛齒角玉帛君王所餘未知所以報王曰雖然何以報不榖重耳曰即不得已與君王以兵車㑹平原廣澤請辟王三舍楚將子玉怒曰王遇晉公子至厚今重耳言不孫請殺之成王曰晉公子賢而困于外久從者皆國器此天所置庸可殺乎且言何以易之居楚數月而晉太子圉亡秦秦怨之聞重耳在楚乃召之成王曰楚逺更數國乃至晉秦晉接境秦君賢子其勉行厚送重耳重耳至秦繆公以宗女五人妻重耳故子圉妻與往重耳不欲受司空季子曰其國且伐况其故妻乎且受以結秦親而求入子乃拘小禮忘大醜乎遂受繆公大歡與重耳飲趙衰歌黍苗詩繆公曰知子欲急反國矣趙衰與重耳下再拜曰孤臣之仰君如百榖之望時雨是時晉惠公十四年秋惠公以九月卒子圉立十一月葬惠公十二月晉國大夫欒卻等聞重耳在秦皆隂來勸重耳趙衰等反國為內應甚衆于是秦繆公乃發兵與重耳歸晉晉聞秦兵來亦發兵拒之然皆隂知公子重耳入也惟惠公之故貴臣吕郤之屬不欲立重耳重耳出亡凡十九歲而得入時年六十二矣晉人多附焉文公元年春秦送重耳至河咎犯曰臣從君周旋天下過亦多矣臣猶知之况于君乎請從此去矣重耳曰若反國所不與子犯共者河伯視之乃投璧河中以與子犯盟是時介子推從在船中乃笑曰天實開公子而子犯以為己功而要市于君固足羞也吾不忍與同位乃自隱渡河秦兵圍令狐晉軍于廬栁二月辛丑咎犯與秦晉大夫盟于郇壬寅重耳入于晉師丙午入于曲沃丁未朝于武宫文公之祖武公廟也即位為晉君羣臣皆往是為文公懷公圉奔高梁戊申使人殺懷公夏迎夫人于秦秦所與文公妻者卒為夫人秦送三千人為衛以備晉亂史晉世家間左氏文地志晉文公以蒲賂秦後秦還蒲因名其地曰蒲坂在今蒲州懷公故大臣吕省郤芮本不附文公文公立恐誅乃欲與其徒謀燒公宫殺文公文公不知始嘗欲殺文公宦者履鞮知其謀欲以告文公解前罪求見文公文公不見使人讓曰蒲城之事女斬豫袪其後我從狄君獵女為惠公來求殺我惠公與女期三日至而女一日至何速也女其念之宦者曰臣刀鋸之餘不敢以二心事君倍主故得罪于君君已反國其毋蒲翟乎且管仲射鈎桓公以霸今刑餘之人以事告而君不見禍又且及矣于是見之遂以吕郤等告文公文公欲召吕郤吕卻等黨多文公恐初入國國人賣已乃為微行㑹秦繆公于王城國人莫知三月己丑吕郤等果反焚公宫不得文公文公之衛徒與戰吕郤等引兵欲奔秦繆公誘吕郤等殺之河上晉國復而文公得歸史晉世家韓非子或曰齊晉絶祀不亦宜乎齊桓能用管仲之功而忘射鈎之怨文公能聼寺人之言而棄斬袪之罪桓公文公能容二子者也後世之君明不及二公後世之臣賢不如二子以不忠之臣事不明之君君不知則有燕操子罕田常之賊知之則以管仲寺人自解君必不誅而自以為有桓文之德是臣讎君而明不能燭多假之資自以為賢而不戒則雖無後嗣不亦可乎且寺人之言也直飾君令而不二者則是貞于君也死君後生臣不愧而後為貞今惠公朝卒而暮事文公寺人之不二何如晉公子重耳出亡過于曹曹君袒裼而觀之釐負羈與叔瞻侍于前又韓喻老篇亦載叔瞻事以為鄭人叔瞻謂曹君曰臣觀晉公子非常人也君遇之無禮彼若有時反國起兵即恐為曹傷君不如殺之曹君弗聼釐負羈歸而不樂其妻問之曰公從外來而有不樂之色何也負羈曰吾聞之有福不及禍來連我今日吾君召晉公子遇之無禮我與在前吾是以不樂其妻曰吾觀晉公子萬乘之主也其左右從者萬乘之相也今窮而出亡過于曹曹遇之無禮此若反國必誅無禮則曹其首也子奚不先自二焉負羈曰諾盛黃金于壺充之以餐加璧其上夜令人遺公子公子見使者再拜受其䬸而辭其璧公子自曹入楚自楚入秦入秦三年秦繆公召群臣而謀曰昔者晉獻公與寡人交諸侯莫弗聞獻公不幸離群臣出入十年矣其嗣子不善吾恐此將令其宗廟不祓除而社稷不血食也如是弗定則非與人交之道吾欲重耳而入之晉何如群臣皆曰善公因起卒革車五百乘疇騎三千疇精練也步卒五萬輔重耳入之于晉立為晉君重耳即位三年舉兵而伐曹令人告曹君曰懸叔瞻而出之我且以為大戮又令人告釐負羈曰軍旅薄城吾知子不違也其表子之閭寡人將以為令令軍勿敢犯曹人聞之率其親戚而保釐負羈之閭者七百餘家韓子十過晉文公重耳亡過曹里鳧須從一云里鳧須公子重耳之守府者也因盜從重耳資而亡重耳無糧餒不能行子推割股肉以食重耳然後能行及重耳反國國中多不附重耳者于是里鳧須造見曰臣能安晉國文公使人應之曰子尚何面目來見寡人欲安晉也里鳧須曰君沭耶使者曰否鳧須曰臣聞沐者其心倒倒一作覆下同心倒者其言悖今君不沐何言之悖也使者以聞文公見之里鳧須仰首曰離國久臣民多過君君反國而民皆自危臣之為賊亦大矣罪至十族未足塞責然君誠赦之罪與驂乘遊于國中百姓見之必知不念舊惡民自安矣文公大悅從其計使驂乘于國中百姓見之皆曰里鳧須且不誅而驂乘吾何懼也是以晉國大寧韓詩卷一又晉史乘又新序卷五小異文公出亡獻公使寺人披攻之蒲城披斬其袪文公奔翟惠公即位又使攻之惠竇不得也及文公反國披求見公曰蒲城之役君令一宿而汝即至惠竇之難君令三宿而汝一宿何其速也披對曰君令不二除君之惡惟恐不堪蒲人翟人余何有焉今公即位其無蒲翟乎君乃見之韓子難三詳左氏文公反國至河令籩豆捐之席蓐捐之手足胼胝面目黧黑者後之咎犯聞之而夜哭公曰寡人出亡二十年乃今得反國咎犯聞之不喜而哭意不欲寡人反國耶犯對曰籩豆所以食也席蓐所以臥也而君捐之手足胼胝面目黧黑勞有功者也而君後之今臣有與在後中不勝其哀故哭且臣為君行詐僞以反國者衆矣臣尚自惡也而况于君再拜而辭文公止之曰諺云築社者攓撅而置之端冕而祀之今子與我取之而不與我治之與我置之而不與我祀之焉可解左驂而盟于河文公棄荏席後黴黑咎犯辭歸徵音梅晉文棄其卧席之下黴黑者咎犯感其捐舊物故辭歸淮南子說山晉文公入國至于河令棄籩豆茵席顔色黧黑手足胼胝者在後咎犯聞之中夜而哭文公曰吾亡也十有九年矣今將反國夫子不喜而哭何也其不欲吾反國乎對曰籩豆茵席所以官者也而棄之顔色黧黑手足胼胝所以執勞苦而皆後之臣聞國君蔽士無所取忠臣大夫蔽遊無所取忠友今至于國臣在所蔽之中矣不勝其哀故哭也文公曰禍福利害不與咎氏同之者有如白水祝之乃沈璧而盟以上亦見晉史乘介子推曰獻公之子九人唯君在耳天未絶晉必將有主主晉祀者非君而何唯二三子者以為己力不亦誣乎文公即位賞不及推推母曰盍亦求之推曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之推曰言身之文也身將隱焉用文其母曰能如是與若相隱至死不復見推從者憐之乃懸書宫門曰有龍矯矯頃失其所五蛇從之周遍天下龍飢無食一蛇割股龍反其淵安其壤土四蛇入穴皆有處所一蛇無穴號于中野文公出見書曰嗟此介子推也吾方憂王室未圖其功使人召之則亡遂求其所在聞其入綿上山中于是文公表綿上山中而封之以為介推田號曰介山說苑復思文公修政施惠百姓賞從亡者及功臣大者封邑小者尊爵未盡行賞周襄王以弟帶難出居鄭地來告急于晉晉初定欲發兵恐他亂起是以賞從亡未至隱者介子推地志介子推姓王名尤山西臨晉人推亦不言祿祿亦不及推曰獻公子九人唯君在矣惠懷無親內外棄之天未絶晉必將有主主晉祀者非君而誰天實開之二三子以為己力不亦誣乎竊人之財猶曰是盜况貪天之功以為己力乎下冒其罪上賞其姦上下相蒙難與處矣其母曰盍亦求之以死誰懟推曰尤而效之罪有甚焉且出怨言不食其祿母曰亦使知之若何對曰言身之文也身欲隱安用文之文之是求顯也其母曰能如此乎與汝偕隱至死不復見史晉世家介子推從者憐之乃懸書宫門曰龍欲上天五蛇為輔龍已升雲四蛇各入其宇一蛇獨怨終不見處所文公出見其書曰此介子推也吾方憂王室未圖其功使人召之則亡遂求所在聞其入綿上山中于是文公環綿上山中而封之以為介推田號曰介山以記吾過且旌善人史晉世家晉文公反國酌士大夫酒召咎犯而將之召艾陵而相之授田百萬介子推無爵而就位觴三行介子推奉觴而起曰有龍矯矯將失其所有蛇從之周流天下龍既入淵得其安所蛇脂盡乾獨不得甘雨此何謂也文公曰嘻是寡人之過也吾為子爵與待旦之朝吾為子田與河東陽之間介子推曰推聞君子之道謁而得位逹士不居也爭而得財亷士不受也文公曰吾將以成子之名推曰推聞為人子而不能承其父者則不敢當其後為人臣而不見察于其君者則不敢立于其朝然推亦無索于天下矣遂去而之介山之上文公使人求之不得避寢三月號呼期待之不肯出以為焚其山冝出及焚其山遂不出而焚死新序卷七别又晉史乘以龍蛇之歌諸本各今備載之志異同晉文公出亡周流天下舟之僑去虞而從焉文公反國擇可爵而爵之擇可祿而祿之舟之僑獨不與焉文公酌諸大夫酒酒酣文公曰二三子盍為寡人賦乎舟之僑進曰君子為賦小人請陳其辭辭曰有龍矯矯頃失其所一蛇從之周流天下龍反其淵安寧其處一蛇耆乾獨不得其所文公瞿然曰子欲爵耶請待旦日之期子欲祿耶請今命廪人舟之僑曰請而得其賞亷者不受也言盡而名至仁者不為也今天油然作雲沛然下雨則苗草興起莫之能禦今為一人言施一人猶為一塊土下雨也土亦不生之矣遂歷階而去文公求之不得終身誦甫田之詩說苑復思子此亦介推之訛晉文公反國介子推不肯受賞自為賦詩曰有龍于飛周遍天下五蛇從之為之丞輔龍反其鄉得其處所四龍從之得其露雨一蛇羞之橋死于中野懸書公門而伏于山下文公聞之曰嘻此必介子推也避舍變服令士庶人曰有能得介子推者爵上卿田百萬或遇之山中負釜蓋䔲問焉曰請問介子推安在應之曰夫介子推茍不欲見而欲隱吾獨焉知之遂背而行終身不見吕覽介立琴操介子綏割其腓股以餌重耳重耳復國子綏獨無所得綏甚怨恨乃作龍蛇之歌以感之終匿于山文公令燔山求之子綏遂抱木而燒死文公令民五月五日不得發火拾遺記魯僖公晉文公焚林以求介子推有白鴉繞煙而噪或集之推之側火不能燒晉人嘉之起一髙臺名曰思烟臺種仁夀木木似柏而枝長柔軟其花堪食或云戒所焚之山數百里居人不得設網羅呼曰仁烏俗亦謂烏白臆者為慈烏則其類也列仙傳介子推者姓王名光晉人也隱而無名說趙成子與遊旦有黃雀在門上晉公子重耳異之與出居外十餘年勞苦不辭及還介山伯子常晨來呼推曰可去矣推辭母入山中從伯子遊後文公遣數千人以玉帛禮之不出後三十年見東海邊為王俗賣扇後數十年莫知所在晉文公亡時陶叔狐從文公反國行三賞而不及陶叔狐陶叔狐見咎犯曰吾從君而亡十有三年顔色黧黑手足胼胝今君反國行三賞而不及我也意者君忘我與我有大故與子試為我言之君咎犯言之文公文公曰嘻我豈忘是子哉夫高明至賢德行全誠耽我以道說我以仁暴浣我行昭明我名使我為成人者吾以為上賞防我以禮諫我以誼蕃援我使我不得為非數引我而請於賢人之門吾以為次賞夫勇莊强禦難在前則居前難在後則居後免我于患難之中者吾又以為之次且子獨不聞乎死人者不如存人之身亡人者不如存人之國三行賞之後而勞苦之士次之夫勞苦之士是子固為首矣豈敢忘子哉周內史叔輿輿一作興聞之曰文公其霸乎昔聖王先德而後力文公其當之矣說苑復恩卷三少異又韓詩又晋史乘賞又吕覽當篇稍略從亡賤臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補吾缺者此受次賞三賞之後故且及子晉人聞之皆說史晉世家晉文公欲合諸侯咎犯曰不可天下未知君之義也公曰何若咎犯曰天子避叔帶之難出居于鄭君奚不納之以定大義且以樹譽文公曰吾其能乎咎犯曰事若能成繼文之業定武之功闢土安疆于是乎在矣事若不成補周室之缺勤天子之難成教垂名于是乎在矣君其勿疑文公聼之遂興草中之戎驪土之翟定天子于成周于是天子賜之南陽之地遂霸諸侯吕覽不廣文公二年春秦軍河上將入王趙衰曰求霸莫如入王尊周周晉同姓晉不先入王後秦入之毋以令于天下方今尊王晉之資也三月晉乃發兵至陽樊圍溫入襄王于周四月殺王弟𢃄襄王賜晉河內陽樊之地為附庸晋於是始大史晉世家晉文公攻原裹十日糧遂與大夫期十日十日一作五日下同至原十日而原不下擊金而退罷兵而去士有從原中出者曰原三日即下矣羣臣左右諫曰夫原之食竭力盡矣君姑待之公曰吾與士期十日不去是亡吾信也得原失信吾不為也遂罷兵而去原人聞曰有君如彼其信也可無歸乎乃降衛人聞曰衛一作溫有君如彼其信也可無從乎乃降事見左僖二十五年而此較詳孔子聞而記之曰攻原得衛者信也韓子外儲左上四又晋史乘又新序卷略同晉文公出亡箕鄭挈壺餐而從迷而失道與公相失饑而道泣寢餓而不敢食及文公反國舉兵攻原而拔之文公曰夫輕忍饑餒之患而必全壺餐是將不以原叛乃舉以為原令大夫渾軒聞而非之曰以不動壺餐之故怙其不以原叛也不亦無術乎明主者不恃其不我叛也恃吾不可叛也不恃其不我欺也恃吾不可欺也韓子外儲左又晋史乘晉文公問于狐偃曰寡人甘肥周于堂巵酒豆肉集于宫壺酒不清生肉不布殺一牛遍于國中一歲之功盡以衣士卒其足以戰民乎狐子曰不足文公曰吾弛關市之征而緩刑罰其足以戰民乎狐子曰不足文公曰吾民之有喪資者寡人親使即中視事有罪者赦之貧窮不足者與之其足以戰民乎對曰不足此皆所以慎産也而戰之者殺之也民之從公為慎産公因而迎殺之失其所以為從公矣曰然則何如足以戰民乎狐子對曰令無得不戰公曰無得不戰奈何狐子對曰信賞必罰公曰刑罰之極安至對曰不辟親貴法行所愛文公曰善明日令田于圃陸圃陸當即被盧之誤聲相近耳期以日中後期者行軍法焉于是公有所愛者曰顚頡後期吏請其罪文公隕涕而憂吏曰請用事焉遂斬顛頡之脊以狥百姓此與傳大異百姓皆懼曰君于顚頡之貴重如彼也而君猶行法焉况于我則何有矣文公見民之可戰也于是遂興兵伐原克之伐衛東其畝取五鹿攻陽勝虢伐曹南圍鄭反之陴罷宋圍還與楚人戰城濮大敗楚人返為踐土之盟一舉而八有功韓子外儲右又晉史乘文公四年楚成王及諸侯圍宋宋公孫固如晉告急先軫曰報施定霸于今在矣狐偃曰楚新得曹而初婚于衛若伐曹衛楚必救之則宋免矣於是晉作三軍趙衰舉郤縠將中軍卻臻佐之使狐偃將上軍狐毛佐之命趙衰為卿欒枝將下軍先軫佐之荀林父御戎魏犨為右往伐冬十二月晉兵先下山東而以原封趙衰五年春晉文公欲伐曹假道于衛衛人弗許還自河南度侵曹伐衛正月取五鹿二月晉侯齊侯盟于斂盂衛侯請盟晉人不許衛侯欲與楚國人不欲故出其君以說晉衛侯居襄牛公子買守衛楚救衛不卒晉侯圍曹三月晉師入曹數之以不用釐負羈言而用美女乘軒者三百人也令軍毋入釐負羈宗家以報德楚圍宋宋復告急晉文公欲救則攻楚為楚嘗有德不欲伐也欲釋宋宋又嘗有德于晉患之先軫曰執曹伯分曹衛地以與宋楚急曹衛其勢宜釋宋文公從之而楚成王引兵歸楚將子玉曰王遇晉至厚今知楚急曹衛而故伐之是輕王王曰晉侯亡在外十九年困日久矣果得反國險厄盡知之能用其民天之所開不可當子玉請曰非敢必有功願以間執讒慝之口也楚王怒少與之兵于是子玉使宛春告晉請復衛侯而封曹臣亦釋宋咎犯曰子玉無禮矣君取一臣取二勿許先軫曰定人之謂禮楚一言定三國子一言而亡之我則無禮不許楚是弃宋也不如私許曹衛以誘之執宛春以怒楚既戰而後圖之晉侯乃囚宛春于衛且私許復曹衛曹衛告絶于楚楚得臣怒擊晉師晉師退軍吏曰為何退文公曰昔在楚約退三舍可倍乎楚師欲去得臣不肯四月宋公齊將秦將與晉侯兵次于城濮己巳與楚合戰楚兵敗得臣收餘兵去甲午晉師還至衡雍作王宫于踐土鄭懼使人請盟晉侯與鄭伯盟史晋世家五月丁未獻楚俘于周駟介百乘徒兵千天子使王子虎命晉侯為伯賜大輅彤弓矢百旅弓矢千秬鬯一卣圭瓚虎賁三千人晉侯三辭然後稽首受之史晉世家于是晉文公稱伯癸亥王子虎盟諸侯于王庭晉焚楚軍火數日不息文公嘆左右曰勝楚而君猶憂何文公曰吾聞能戰勝安者惟聖人是以懼且子玉猶在庸可喜乎子玉之敗而歸成王怒其不用言貪與晉戰讓之子玉自殺晉文公曰我擊其外楚誅其內內外相應于是乃喜六月晉人復入衛侯壬午晉渡河北歸國冬晉侯㑹諸侯于溫欲率之朝周力未能恐其有畔者乃使人言周襄王狩于河陽壬申遂率諸侯朝王于踐土史記晉世家異與左氏小孔子讀史記至文公曰諸侯無召王王狩河陽者春秋諱之也丁丑諸侯圍許曹伯臣或說晉侯曰齊桓公合諸侯而國異姓今君為㑹而滅同姓曹叔振鐸之後晉唐叔之後合諸侯而滅兄弟非禮晉侯說復曹伯于是晉始作三行荀林父將中行先縠將右行先蔑將左行史晉世家晉侯渡河北歸國行賞狐偃為首或曰城濮之戰先軫之謀文公曰城濮之事偃說我毋失信先軫曰軍事勝為右吾用之以勝然此一時之說偃言萬世之功奈何以一時之利而加萬世功乎是以先之史記晉世家文公伐宋乃先宣言曰吾聞宋君無道蔑侮長老分財不中教令不信余來為民誅之韓子外儲左又晉史乘晉文公伐衛入郭坐士令食曰今日必得大垣公子慮俯而笑之文公曰奚笑對曰臣之妻歸臣送之反見桑者而盼之顧臣之妻則亦有送之者矣文公懼還師而歸至國而貉人攻其地說苑權謀列子說符晉文公出㑹欲伐衛公子鋤仰天而笑公問何笑曰臣笑鄰之人有送其妻適私家者道見桑婦恱而與言然顧視其妻亦有招之者矣臣竊笑此也公寤其言乃止引師而還未至而貉人伐其北鄙又晉史乘晉文公將與楚人戰于城濮召咎犯而問曰楚衆我寡奈何而可咎犯對曰臣聞繁禮之君不足于文繁戰之君不足于詐一作仁義之事不厭忠信戰陳之事不厭詐僞君亦詐之而已足猶厭也文公以咎犯言告雍季雍季曰竭澤而漁豈不獲得而明年無魚焚藪而田豈不獲得而明年無獸詐僞之道雖今偷可後將無復非長術也文公用咎犯之言而敗楚人于城濮反而為賞雍季在上上首也左右諫曰城濮之功咎犯之謀也君用其言而賞後其身或者不可乎文公曰雍季之言百世之利也咎犯之言一時之務也焉有以一時之務先百世之利者乎孔子聞之曰臨難用詐足以却敵反而尊賢足以報德文公雖不始終足以霸矣吕覽義賞霸韓子難一略同末云仲尼聞之曰文公之也冝哉既知一時之權又知萬世之利人又淮南子間城濮之戰文公謂咎犯曰吾卜戰而龜熸我迎歲彼背歲彗星見彼操其柄我操其標吾又夢與荆王摶彼在上我在下吾欲無戰子以為何如咎犯對曰卜戰龜熸是荆人也我迎歲彼背歲彼去我從之也彗星見彼操其柄我操其標以掃則彼利以擊則我利君夢與荆王摶彼在上君在下則君見天而荆王伏其罪也且吾以宋衛為主齊秦輔我我合天道獨以人事固將勝之矣文公從之荆人大敗說苑權謀晉文公施舍振廢滯匡乏困救患災禁淫慝薄賦斂宥罪戾節器用用民以時敗楚於城濮吕覽原亂晉文公與楚人戰大勝之燒其軍火三日不滅文公退而有憂色侍者曰君大勝楚今有憂色何也文公曰吾聞能以戰勝而安者其唯聖人乎若夫詐勝之徒未嘗不危也吾是以憂說苑君道外又見晉史乘又韓詩傳卷七略同晉文公與楚戰至黃鳳之陵履繫解因自結之左右曰不可以使人乎公曰吾聞上君所與居皆其所畏也中君所與居皆其所愛也下君所與居皆其所侮也寡人雖不肖先君之人皆在是以難之也晉史乘又韓子外儲左文公七年晉秦共圍鄭以其無禮於文公亡過時及城濮時鄭助楚也圍鄭欲得叔瞻叔瞻聞之自殺鄭持叔瞻告晉晉曰必得鄭君而甘心焉鄭恐乃間令使謂秦繆公曰亡鄭厚晉于晉得矣而秦未為利君何不解鄭得為東道交秦伯說罷兵晉亦罷兵史晉世家初晉公子重耳自蒲奔翟去翟過衛衛文公無禮焉無禮不禮也過五鹿如齊齊桓公死去齊之曹曹共公欲視其駢脅使袒而捕池魚去曹過宋宋襄公加禮焉之鄭鄭文公不敬被瞻諫曰臣聞賢士不窮窮今晉公子之從者皆賢者也君不禮也不如殺之鄭君不聼去鄭之楚楚成王慢焉去楚之秦秦繆公入之納之晉也晉既定興師攻鄭求被瞻被瞻謂鄭君曰不若以臣與之鄭君曰此孤之過也被瞻曰殺臣以免國臣願之被瞻入晉軍文公將烹之被瞻據鑊而呼曰三軍之士皆聼瞻也自今以來無有忠于其君者忠於其君者將烹文公謝焉罷師歸之于鄭吕覽上德史記鄭世家晉于是欲得叔瞻為僇鄭文公恐不敢謂叔瞻言瞻聞言于鄭君曰臣謂君君不聼臣晉卒為患然晉所以圍鄭以瞻瞻死而赦鄭國瞻之願也乃自殺鄭人以瞻尸與晉晉文公曰必欲一見鄭君辱之而去鄭人患之乃使人私於秦曰破鄭益晉非秦之利也秦兵罷史云瞻自殺與國語異紀年晉文公七年齊師逐鄭太子齒奔城張南鄭晉文公合諸侯而盟曰吾聞國之昏不由聲色必由姦利好樂聲色者淫也貪姦者惑也夫淫惑之國不亡必殘自今以來無以美妾疑妻無以聲樂妨正無以姦情害公無以貨利示下其有之者是謂伐其根素流于華葉若此者有患無憂有冦勿弭不如言者盟示之于是君子聞之曰文公其知道乎其不王者猶無佐也說苑反質史又晉乘晉文公將伐鄴趙衰言所以勝鄴之術文公用之果勝還將行賞衰曰君將賞其本乎賞其末乎賞其末則騎乘者存賞其本則臣聞之郤子虎文公召㕁子虎曰衰言所以勝鄴鄴既勝將賞之曰蓋聞之于子子當賞子虎曰言之易行之難臣言之者也公曰子無辭郤子不敢固辭乃受賞吕覽不茍晋又新序卷四又史乘晉文公使李離為大理過聼殺人自拘于廷請死公曰官有貴賤罰有輕重下吏有罪非子之罪也李離對曰臣居官為長不與下吏讓位受爵為多不與下吏分利今過聼殺人而委下吏䝉其死非所聞也不受命公曰子以為罪則寡人亦有罪矣李離曰法失則刑刑失則死君以臣為能聼微决疑故使臣為理今過聼殺人使百姓怨天下聞之必議吾君諸侯聞之必輕吾國怨積于百姓惡揚于天下權輕于諸侯罪當死君曰棄位委官伏法亡國非所望也趣出無憂寡人之心李離對曰政亂國危君之憂也軍敗卒亂將之憂也夫無能以事君暗行以臨官是無功以食祿也臣不能以虛自誣遂伏劒而死韓詩卷二循又晉史乘又史記史傳稍略新序卷七李離曰君量能而授官臣奉職而任事臣受印綬之日君命曰必以仁義輔政寧過于生毋失于殺臣受命不稱壅惠蔽恩如臣之罪乃當死君何過乎今離刻深不顧仁義信文墨不察是非聼他辭不精事實掠服無罪使百姓怨怨積于百姓惡揚于天下權輕于諸侯如臣之罪是當重死文公曰吾聞之也直而不枉不可與往方而不圓不可與長存願子以此聼寡人也李離曰君以所私害公法殺無罪而生當死二者非所以教于國也離不敢受命文公見臼季其廟傅于西墻公曰孰處而西對曰君之老臣也公曰西益而宅對曰臣之忠不如老臣之力其牆壞而不築公曰何不築對曰一日不稼百日不食公出而告之僕僕頓首于軫曰吕刑云一人有慶兆民賴之君之明羣臣之福也乃令于國曰毋淫宫室以妨人宅板築以時無奪農功說苑建本又晉史乘晉文公問于咎犯曰誰可使為西河守者咎犯對曰虞子羔可也公曰非汝之讐耶對曰君問可為守者非問臣之讐也羔見咎犯而謝之曰幸赦臣之過薦之于君得為西河守咎犯曰薦子者公也怨子者私也吾不以私事害公義子其去矣顧吾射子也說苑至公又晋史乘文公得𤣥山之粟而美之欲種之宫中問于冀缺對曰臣嘗服稼穡之事矣凡五榖必以種今君所植者末也種之必不能生公曰寡人不慧不知稼穡微子之言惑其不解乎冀缺曰務農重榖國之本也君之言及此晉國之福也晉史乘文公種米曽子駕羊說苑臼季遇卻缺于冀薦于文公晉人美之賦野有蔓草子貢詩傳入唐風失詩說同詩序思遇時也男女時思不期而㑹晉文公好賢國人美之賦杕杜詩傳詩說同晉詩序云有杕之杜刺武公也武公兼其宗族而不求賢以自輔焉晉文君大布之衣牂羊之裘韋以帶劔威立于海內淮南子晉國苦奢文公以儉矯之乃衣不重帛食不兼肉無幾時國人皆大布之衣脫粟之飯尹文子又尸子晉文公問政于舅犯舅對曰分熟不如分腥分腥不如分地割以分民而益其爵祿是以上得地而民知富上失地而民知貧古之所謂致師而戰者其此之謂也說苑政理乘又晉史晉文公問于士文伯曰三月朔日有蝕之寡人學惛焉詩所謂彼日而蝕于何不臧者何也對曰不善政之謂也國無政不用善則自取謫于日月之災故不可不慎也政有三而已一曰因民二曰擇人三曰從時公曰善乃舉善政而行之國大治說苑政理又晋史乘文公問箕鄭曰救饑奈何對曰信公曰安信曰信名信名則群臣守職善惡不踰百事不怠信事則不失天時百姓不踰信義則近親勸勉而逺者歸之矣韓子外儲左較國語少略晉文公行地登隧大夫皆扶之隨㑹不扶文公曰㑹夫為人臣而忍其君者其罪奚如對曰其罪重死文侯曰何為重死對曰身死妻子為戮焉隨㑹曰君奚獨問為人臣忍其君者而不問為人君而忍其臣者耶文公曰為人君而忍其臣者其罪何如隨㑹對曰為人君而忍其臣者智士不為謀辨士不為言仁士不為行勇士不為死文侯授綏下車辭大夫曰寡人有腰髀之病願諸大夫勿罪也說苑尊賢又晉史乘晉文公出獵前驅曰前有大蛇如隄阻道竟之文公曰寡人聞之諸侯夢惡則修德大夫夢惡則修官士夢惡則修身今寡人有過天以戒寡人還車而反前驅曰臣聞之喜者無賞怒者無刑今禍福已在前矣不可變何不遂驅之文公曰不然夫神不勝道而妖亦不勝德禍福未發猶可化也還車反宿齊三日請于朝自今以後關市無征澤梁無賦斂赦罪人舊田半稅新田不稅行未半旬守蛇吏夢天帝殺蛇曰何故當聖主道而罪當死發視蛇臭腐矣謁之文公曰然夫神果不勝道而妖亦不勝德奈何其無究理而任天也應之以德而已新序卷二乘又晉史晉文公出畋前驅還曰前有大蛇高若堤橫道而處文公曰還車而歸其御曰臣聞祥則迎之妖則凌之今前有妖請以從吾者攻之文公曰不可吾聞之曰天子夢惡則修道諸侯夢惡則修政大夫夢惡則修官庶人夢惡則修身若是則禍不至今我有失行而天招以戒我若攻之是逆天命也乃歸齊宿而請于廟曰孤實不佞不能尊道吾罪一執政不賢左右不良吾罪二飭政不謹民人不信吾罪三本務不修以咎百姓吾罪四齊肅不莊粢盛不潔吾罪五請興賢遂能而章德行善以導百姓毋復前過乃退而修政居三日而夢天誅大蛇曰爾何敢當明君之路文公覺使人視之蛇已魚爛矣文公大悅信其道而行之不懈遂至于伯新書卷六稍又風俗通卷九略晉文公出獵逐獸碭入大澤迷不知所出其中有漁者文公謂曰我若君也道安從出我且厚賜若漁者曰臣願有獻公曰出澤而受之于是遂出澤公令曰子之教寡人者何也願受之漁者曰鴻鵠保河海之中厭而徙之小澤則必有九繒之憂黿鼉保深淵厭而出之淺渚則必有羅網釣射之憂今君逐獸碭入至此何行之太逺也文公曰善哉謂從者記漁者名漁者曰君何以名為君其尊天事地敬社稷固四國慈愛萬民薄賦斂輕租稅者臣亦與焉君不敬社稷不固四國外失禮于諸侯內逆民心一國流亡漁者雖得厚賜不能保也遂辭不受曰君亟歸國臣亦返吾漁所新序卷二又晉史乘晉文公田于虢遇一老夫而問曰虢亡亦有說乎對曰虢君斷則不能諫則無與也不能斷又不能用人此虢之所以亡文公輟田而歸遇趙衰而告之趙衰曰其人安在君曰吾未與之來也趙衰曰古之君子聼其言而用其人今之君子聼其言而棄其身哀哉晉之憂也文公乃召賞之新序卷四又晉史乘晉文公逐麋而失之問農夫老古曰吾麋何在老古以足指曰如是往公曰寡人問子以足指何也老古振衣而起曰一不意人君如此也虎豹之居也厭閒而近人故得魚鱉之居也厭深而之淺故得諸侯厭衆而亡其國詩云維鵲有巢維鳩居之君放不歸人將君之於是文公恐歸遇欒武子欒武子曰獵得獸乎而有悅色文公曰寡人逐麋而失之得善言故有恱色欒武子曰其人安在乎曰吾未與來也欒武子曰居上位而不恤其下驕也緩令急誅暴也取人之言而棄其身盜也文公曰善還載老古與俱歸新序卷二又晉史乘翟人有獻豐狐𤣥豹之皮于晉文公文公受客皮而嘆曰此以皮之美自為罪夫治國者則以名號為罪徐偃王是也以城與地為罪虞虢是也故曰罪莫大于可欲韓子喻老晉文公時翟人有獻封狐文豹之皮者文公喟然嘆曰封狐文豹何罪哉以其皮為罪也大夫欒枝曰地廣而不平財聚而不散獨非狐豹之罪乎文公曰善哉說之欒枝曰地廣而不平人將平之財聚而不散人將散之于是列地以分民散財以賑貧又說苑政理又晋史乘文公之時宰臣上炙而髮繞之文公召宰人而譙之曰女欲寡人之哽耶奚為以髮繞炙宰人頓首再拜請曰有死罪三援礪砥刀利猶干將切肉肉斷而髮不斷臣之罪一也援錐貫臠而不見髮臣之罪二也奉熾爐炭肉盡赤紅及炙熟而髮不燒臣之罪三也堂下得毋微有疾臣者乎公曰善乃召其堂下而譙之果然乃誅之韓子內儲下事一作晋平公九年冬文公卒子襄公歡立是嵗鄭伯亦卒鄭人或賣其國于秦秦繆公發兵往襲鄭十二月秦兵過我郊史晉世家淮南子昔齊桓公合諸侯以乘車退誅于國以斧鉞晉文公合諸侯以革車退行于國以禮義桓公前柔而後剛文公前剛而後柔然而令行乎天下權制諸侯鈞者審于勢之變也春秋戰國異辭卷九
