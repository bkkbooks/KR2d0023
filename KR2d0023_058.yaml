body:
  text: 春秋戰國異辭卷五十五右春坊右諭徳陳厚耀撰摭遺薛譚學謳于秦青未窮青之技自謂盡之遂辭歸秦青弗止餞于郊衢按節悲歌聲振林木響遏行雲薛譚乃謝求反終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食既去而餘音繞梁三日不絶左右以其人弗去過逆旅逆旅人辱之因曼聲哀哭一里老幼悲愁垂涕相對三日不食遽而追之娥還復為曼聲長歌一里老幼喜躍抃舞弗能自禁忘向之悲也乃厚賂發之發猶遣也故雍門之人至今善歌哭放娥之遺聲列子湯問列子瓠巴鼓琴而鳥舞魚躍鄭師文聞之棄家從師㐮游柱指鉤弦三年不成章師㐮曰子可以歸矣師文舍其琴嘆曰文非弦之不能鉤非章之不能成文所存者不在弦所志者不在聲内不得於心外不應於氣故不敢發手而動弦且小假之以觀其後無㡬何復見師㐮師㐮曰子之琴何如師文曰得之矣請嘗試之於是當春而叩商弦以召南吕凉風忽至草木成實及秋而叩角弦以激夾鐘温風徐囘草木發榮當夏而叩羽弦以召黄鐘霜雪交下川池㬥沍及冬而叩徴弦以激蕤賓陽光熾烈堅氷立㪚将終命宫而総四弦則景風翔慶雲浮甘露降澧泉涌師㐮乃撫心高蹈曰微矣子之弹也雖師曠之清角鄒衍之吹律亾以加之彼将挾琴執管而從子之後耳琴清英祝牧與妻偕隠作琴歌云天下有道我黼子佩天下無道我負子戴琴操别鶴操商陵牧子所作也娶妻五年而無子父兄将為之改娶妻聞之中夜而起倚户而悲嘯牧子聞之愴然而悲乃歌曰将乖比翼隔天端山川悠逺路漫漫攬衣不寝食㤀餐後人因為樂章焉吕氏春秋客有以吹籟見越王者上下宫商和而越王不喜也或為之野者而王反說之新論越王退吹籟之音而好鄙野之聲韓詩外傳水海有勇士曰葘邱訢以勇猛聞於天下遇神淵曰飲馬其僕曰飲馬於此者馬必死曰以訢之言飲之其馬果沈葘邱訢去朝服拔劍而入三日三夜殺三蛟一龍而出雷神隨而擊之十日十夜眇其左目要離聞之徃見之曰訢在乎曰送有喪者徃見訢於墓曰聞雷神擊子十日十夜眇子左目夫天怨不全日人怨不旋踵至今弗報何也叱而去墓上振憤者不可勝數要離歸謂門人曰葘邱訢天下之勇士也今日我辱之人中是其必來攻我暮無閉門寝無閉户葘丘訢果夜來拔劍住要離頸曰子有死罪三辱我以人中死罪一也暮不閉門死罪二也寝不閉户死罪三也要離曰子待我一言來謁不肖一也拔劍不刺不肖二也刃先辭後不肖三也能殺我者是毒藥之死耳葘邱訢引劍而去曰嘻所以不若者天下惟此子耳列子魏黒卵以暱嫌殺邱邴章邱邴章之子來丹謀報父之讎丹氣甚猛形甚露計粒而食順風而趨雖怒不能稱兵以報之耻假力於人誓手劍以屠黒卵黒卵悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔摧屈而體無痕撻負其材力視來丹猶雛鷇也來丹之友申他曰子怨黒卵至矣黒卵之易子過矣将奚謀焉來丹垂涕曰願子為我謀申他曰吾聞衛孔周其祖得殷帝之寳劍一童子服之却三軍之衆奚不請焉來丹遂適衛見孔周執僕御之禮請先納妻子後言所欲孔周曰吾有三劍惟子所擇皆不能殺人且先言其状一曰含光視之不可見運之不知其有所觸也泯然無際經物而物不覺二曰承影将旦昧爽之交日夕昏明之際北面而察之淡淡焉若有物存莫識其状其所觸焉竊竊然有聲經物而物不疾也三曰宵練方晝則見影而不見光方夜見光而不見形其觸物也騞然而過隨過隨合覺疾而不血刃焉此三寳者傳之十三世矣而無施於事匣而藏之未嘗啟封來丹曰雖然吾必請其下者孔周乃歸其妻子與齋七日晏隂之間跪而受其下劍來丹再拜受之以歸來丹遂執劍從黒卵時黒卵醉偃於牖下自頸至腰三斬之黒卵不覺來丹以黒卵之死趨而退遇黒卵之子於門擊之三下如投虗黒卵之子方笑曰汝何蚩而三招予來丹知劍之不能殺人也嘆而歸黒卵既醒謂其妻曰醉而露我使我嗌疾而腰急其子曰疇昔來丹之來遇我於門三招我亦使我體疾而支強彼其厭我哉列子甘蠅古之善射者彀弓而獸伏鳥下弟子名飛衛學射於甘蠅而巧過其師紀昌者又學射於飛衛飛衛曰爾先學不瞬而後可言射矣紀昌歸偃卧其妻之機下以目承牽挺二年之後雖錐末倒眥而不瞬也以告飛衞飛衛曰未也並學視而後可視小如大視㣲如著而後告我昌以氂懸蝨於牖南面而望之旬日之間浸大也三年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧朔篷之幹射之貫蝨之心而懸不絶以告飛衛飛衛高蹈拊膺曰汝得之矣紀昌既盡衛之術計天下之敵己者一人而已乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜于地而塵不揚飛衛之矢先窮紀昌遺一矢既發飛衛以棘刺之端扞之而無差焉於是二子泣而投弓相拜於塗請為父子尅臂以誓不得告術於人紀昌學射于飛衛飛衛曰爾先學不瞬而後能又使學視小如大紀昌以毛懸虱在牖南而望之三年之後如輪覩物皆山邱也乃以燕角之弧朔篷之幹射之貫虱之心而懸不絶列子說苑虞君問盆成子曰今工者乆而巧色者老而衰今人不及壮之時益積心技之術以備将衰之色色者必盡乎老之前知謀無以異乎幼之時可好之色彬彬乎且盡洋洋乎安託無能之軀哉故有技者不累身而未嘗滅而色不得以常茂楚人有鬻矛盾者譽之曰吾盾之堅物莫能䧟也又譽其矛曰吾矛之利於物無不䧟也或曰以子之矛䧟子之盾何如其人弗能應也韓子桓赫曰刻削之道鼻莫如大目莫如小鼻大可小小不可大也目小可大大不可小也舉事亦然為其不可復者也則事寡敗矣韓子說林下曾子之妻之市其子隨之而泣其母曰女還顧反為女殺彘適市來曾子欲捕彘殺之妻止之曰特與嬰兒戲耳曾子曰嬰兒勿與戲也嬰兒非有知待父母而學者也聽父母之教今子欺之是教子欺也夫欺子而不信其母非以成教也遂烹彘韓子外儲左說苑伯俞有過其母笞之泣其母曰他日笞子未嘗見泣今泣何也對曰他日俞得罪笞嘗痛今母之力不能使痛是以泣故曰父母怒之不作於意不見於色深受其罪使可哀憐上也父母怒之不作於意不見於色其次也父母怒之作於意見於色下也鮑焦衣弊膚見挈畚捋蔬遇子貢於道子貢曰吾子何以至此也焦曰天下之遺徳教衆矣吾何以不至於此也吾聞之世不已知而行之不已者是爽行也上不已知而干之不止者是毀亷也行爽亷毀然且不舎惑於利者也子貢曰吾聞之非其世者不生其利汙其君者不履其土今吾子汙其君而履其土非其世而捋其蔬此誰之有哉鮑焦曰嗚呼吾聞賢者重進而輕退亷者易醜而輕死乃棄其蔬而立槁死於洛水之上新序卷七風俗通鮑焦耕田而食穿井而飲于山中食棗或曰此棗子之所植耶焦遂強歐吐而死東方有士曰袁族目将有所適而飢於道孤父之盜邱人也見之下壺飱以與之袁族目三哺而能視仰而問焉曰子誰也曰我孤父之盜邱人也袁族目曰嘻汝乃盜也何為而食我以吾不食也両手據地而歐之不出喀喀然遂伏地而死新序卷七列子東方有人焉曰爰族目将有適也而餓於道孤父之盜曰邱見而下壺飱以餔之爰族目三餔而復能視曰子何為者也曰我孤父之人邱也爰族目曰譆汝非盜耶胡為而食我吾義不食汝之食也両手據地而歐之不出喀喀然遂伏而死孤父之人則盜矣而食非盜也以人之盜因謂食為盜而不敢食是失名實者也禽滑釐問於墨子曰錦繡絺紵将安用之墨子曰惡是非吾用務也古有無文者得之矣夏禹是也卑小宫室損薄飲食土階三等衣裳細布當此之時黻無所用而務在完堅殷之盤庚大其先王之室而改遷于殷茅茨不剪采椽不斵以變天下之視當此之時文采之帛将安所施夫品庶非有心也以人主為心苟上不為下惡用之二王者以化身先于天下故化隆于其時成名于今世也且夫錦繡絺紵亂君之所造也其本皆興于齊景公喜奢而㤀儉幸有晏子以劍鎸之然猶㡬不能勝夫奢安可窮哉紂為鹿臺糟丘酒池肉林宫墻文畵彫琢刻鏤錦繡被堂金玉珎瑋婦女優倡鐘鼔管絃流漫不禁而天下愈竭故卒身死國亾為天下戮非惟錦繡絺紵之用耶今當凶年有欲予子隨侯之珠者不得賣也珍寳而以為餙欲予子一鐘粟者得珠者不得粟得粟者不得珠子将何擇禽滑釐曰吾取粟耳可以救窮墨子曰誠然則惡在事夫奢也長無用好末淫非聖人之所急也故食必常飽然後求羙衣必常暖然後求麗居必常安然後求樂為可長行可乆先質而後文此聖人之務禽滑釐曰善說苑反質塞上之人有善術者馬無故亾而入胡人皆弔之其父曰此何遽不為福乎居數月其馬将胡駿馬而歸人皆賀之其父曰此何遽不為禍乎家富良馬其子好騎墮而折髀人皆弔之其父曰此何遽不為福乎居一年胡人大入塞丁壮者引弦而戰近塞之人死者十九此獨以跛之故父子相保淮南子人間自孔子之死也有子張之儒有子思之儒有顔氏之儒有孟氏之儒有漆雕氏之儒有孫氏之儒有樂正氏之儒自墨子之死也有相里氏之墨有相夫氏之墨有鄧陵氏之墨故孔墨之後儒分為八墨離為三取舎相反不同而皆自謂真孔墨韓子顯學宋未亾而東冡抇宋文公厚葬故冡被發冡在城東因謂之東冡齊未亾而荘公冡抇荘公名購僖公之父以厚葬而冡見發吕覧安死鄭子臧好鷸冠左傳楚荘王好獬冠淮南子屈到貊冠屈子宋康王為無頭之冠以示勇戰國策宋鈃尹文為華山之冠以示表荘子以上類函隋侯行見大蛇傷救而治之其後蛇銜珠以報之徑盈寸純白而夜光可以燭堂故世稱隋珠搜神記西閭過東渡河中流而溺船人接而出之問曰今者子欲安之西閭過曰欲東說諸侯王船人掩口而笑曰子渡河中流而溺不能自救安能說諸侯乎西閭過曰無以子之所能相傷為也子獨不聞和氏之璧乎價重千金然以之間紡曾不如瓦㙛隨侯之珠國之寳也然用之弹曾不如泥丸騏驥騄耳倚衡負軛而趨一日千里此至疾也然使捕鼠曾不如百錢之狸干将鏌鎁拂鐘不錚試物不知揚刃離金斬羽契鐵斧此至利也然以之捕履曽不如兩錢之錐今子持楫乘扁舟處廣水之中當陽侯之波而臨淵流適子所能耳若試與子東說諸侯王見一國之主子之蒙蒙無異夫未視之狗耳說苑雜言申徒狄非其世将自投於河崔嘉聞而止之曰吾聞聖人仁士之於天地之間也民之父母也今為濡足之故不救溺人可乎申徒狄曰不然桀殺關龍逢紂殺王子比干而亾天下呉殺子胥陳殺泄冶而滅其國故亾國殘家非無聖智也不用故也遂抱石而沉於河韓詩卷一又新序卷七王壽負書而行見徐馮於周塗馮曰事者為也為生於時知者無常事書者言也言生於知知者不藏書今子何獨負之而行於是王壽因焚其書而儛之故知者不以言談教而慧者不以藏書篋韓子喻老商太宰使少庶子之市顧反而問之曰何見之市對曰無見也太宰曰雖然何見也對曰市南門之外甚衆牛車僅可以行耳太宰因誡使者無敢告人吾所問於女因召市吏而謂之曰市門之外何多牛屎吏甚怪太宰知之疾也乃悚懼其所也韓子内儲上說苑昔隨侯行遇大蛇中斷疑其靈使人以藥封之蛇乃能去因號其處為斷蛇邱歲餘蛇銜明珠徑寸純白而有光因號隨珠史記注引韓非子右傳虞慶為屋謂匠人曰屋太尊匠人對曰此新屋也塗濡而椽生夫塗濡重而生椽撓以撓椽任重塗此宜卑虞慶曰不然更日乆則塗乾而椽燥塗乾則輕椽燥則直以直椽任輕塗此益尊匠人詘為之而屋壊一曰虞慶将為屋匠人曰材生而塗濡夫材生則撓塗濡則重以撓任重今雖成乆必壊虞慶曰材乾則直塗乾則輕今誠得乾日以輕直雖乆必不壊匠人詘作之成有間屋果壊范且曰弓之折必於其盡也不於其始也夫工人張弓也伏檠三旬而蹈弦一日犯機是節之其始而㬥之其盡也焉得無折虞慶曰不然伏檠一日而蹈弦三日而犯機是㬥之其始而節之其盡也工人窮也為之弓折范且虞慶之言皆文辯辭勝而反事之情人主說而不禁此所以敗也夫不謀治強之功而艷乎辯說文麗之聲是却有術之士而任壊屋折弓也故人主之於國事也皆不達乎工匠之搆屋張弓也然而士窮乎范且虞慶者為虚辭其無用而勝實事其無易而窮也人主多無用之辯而少無易之言此所以亂也今世之為范且虞慶者不輟而人主說之不止是貴敗折之類而以知術之人為工匠也不得施其技巧故屋壊弓折知治之人不得行其方術故國亂而主危田鮪教其子田章曰欲利而身先利而君欲富而家先富而國又曰主賣官爵臣賣智力故自恃無恃人韓子外儲右韓詩外傳南假子過程本本為之烹鱺魚南假子曰聞君子不食鱺魚本子曰此乃君子食也我何與焉假子曰夫高比所以廣徳也下比所以狹行也比於善者自進之階比於惡者自退之原也且詩不云乎高山仰止景行行止吾豈自比君子哉志慕之而已矣韓非子說林有與悍者鄰欲賣宅而避之人曰是其貫将滿也子姑待之荅曰吾恐其以我滿貫也遂去之故曰物之幾者非所靡也禮記顔丁善居喪始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其反而息杜橋之母之喪宫中無相以為沽也成子高寝疾慶遺入請曰子之病革矣如至乎大病則如之何子高曰吾聞之也生有益於人死不害於人吾縱生無益於人吾可以死害於人乎哉我死則擇不食之地而葬我焉國子高曰葬也者藏也藏也者欲人之弗得見也是故衣足以􅎖身棺周於衣椁周於棺土周於槨反壌樹之哉列女傳陶荅子治陶三年名譽不興家富三倍居五年從車百乘歸休宗人擊牛而賀之其妻獨抱兒而泣姑怒曰何其不祥也婦曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之治國也家貧國富君敬民戴故福結於子孫名傳於後世妾聞南山有𤣥豹霧雨七日而不下食者欲以澤其毛而成文章也故藏而逺害犬彘不擇食以肥其身坐而須死耳今夫子治陶家富國貧君不敬民不戴敗亾之徵見矣願與少子俱脫姑怒遂棄之處期年荅子果以盜誅婦乃與少子歸養姑終卒天年列仙傳江妃二女者不知何所人也出遊於江漢之湄逢鄭交甫見而說之不知其神人也謂其僕曰我欲下請其佩僕曰此間之人皆習於辭不得恐罹悔焉交甫不聽遂下與之言曰二女勞矣二女曰客子我二女何勞之有交甫曰橘是柚也我盛之以笥令附漢水将流而下我遵其旁采其芝而茹之以知吾為不遜也願請子之佩二女曰橘是柚也我盛之以筥令附漢水将流而下我遵其旁采其芝而茹之遂手解佩與交甫交甫說受而懐之中當心趨去數十步視佩空懐無佩顧二女忽然不見詩曰漢有遊女不可求思此之謂也春秋戰國異辭卷五十五
