body:
  text: 春秋戰國異辭卷三十六右春坊右諭德陳厚耀撰吳闔閭闔閭左傳閭作廬史世家同元年始任賢使能施恩行惠以仁義聞於諸矦舉伍子胥為行人以客禮事之而與謀國政謂子胥曰寡人欲強國霸王何由而可伍子胥膝進垂淚頓首曰臣楚國之亡虜也父兄棄捐骸骨不葬魂不血食蒙罪受辱來歸命于大王幸不加戮何敢與政事焉闔閭曰非夫子寡人不免於縶禦之使今幸奉一言之教乃至於斯何為中道生進退耶子胥曰臣聞謀義之臣何足處于危亡之地然憂除事定必不為君主所親闔閭曰不然寡人非子無所盡議何得讓乎吾國僻逺在東南之地險阻潤濕又有江海之害君無守禦民無所依倉庫不設田疇不墾為之奈何子胥良久對曰臣聞治國之道安君理民是其上者闔閭曰其術奈何子胥曰凡欲安君治民興霸成王從近制遠者必先立城郭設守備實倉廪治兵庫斯則其術也闔閭曰善夫築城郭立倉庫因地制宜豈有天氣之數以威鄰國者乎子胥曰有闔閭曰寡人委計于子子胥乃使相土嘗水象天法地造築大城周回四十七里陸門八以象天八風水門八以法地八聰築小城周十里陸門三不開東靣者以絶越也立閶門以象天門通閶闔風也立蛇門以象地户也闔閭欲西破楚楚在西北故立閶門以通天氣因復名破楚門吳地記閶闔門高樓閣道後由此出伐楚改曰破楚門欲東并大越越在東南故立蛇門以制敵國吳在辰其位龍也故小城南門上反羽為兩鯢鱙以象龍角越在已地其位蛇也故南大門上有木蛇北向首內示越屬于吳也城郭以成倉庫以具復使子胥習戰騎射御之巧未有所用請干將鑄名劔二枚吳越春秋巧漢書雜家伍子胥八篇兵技伍子胥十篇吳地記周敬王六年伍子胥築大城周四十二里三十步小城周八里二百六十步陸門八以象天之八風水門八以象地之八卦吳都賦云通門二八水道六衢是也西閭胥二門南盤蛇二門東婁匠二門北齊平二門不開東門者絶越之故也地志泰伯城在無錫縣梅里自太伯至王僚並都于此闔閭自梅里始徙都于姑蘇即今郡城曰閶門者夫差以天門通閶闔故名曰胥門者子胥死請抉其目懸此門以觀越兵之入曰盤門者吳嘗刻木為蟠桃以厭勝越或云水陸盤曲故名曰齊門者吳聘齊女女思齊而病乃起望齊門令女遊其上吳越春秋干將者吳人也列士傳干將子赤鼻睂廣三寸與歐冶子同師俱能為劍越前來獻三枚闔閭得而寶之以故使劍匠作為二枚一曰干將二曰莫邪莫邪干將之妻也干將作劍采五山之鐵精六合之金英候天伺地隂陽同光百神臨觀天氣下降而金鐵之精不銷於是干將不知其由莫邪曰子以善劍聞于王使子作劍三月不成其有意乎干將曰吾不知其理也莫耶曰夫神物之化須人而成今夫子作劍得毋得其人而後成乎干將曰昔吾師作冶金鐵不銷夫妻俱入冶罏中然後成物至今即山作冶麻絰葌服然後敢鑄金于山今吾作劍不變化者其若斯耶莫耶曰師知爍身以成物吾何難哉於是干將妻乃斷髮剪爪投於爐中使童男童女三百人鼓槖裝炭金鐵刀濡遂以成劍陽曰干將隂曰莫耶陽作龜文隂作漫理干將匿其陽出其隂而獻之闔閭甚重之會魯使季孫聘于吳闔閭使掌劍大夫以莫耶獻之季孫拔劍之鍔中缺者大如黍米嘆曰美哉劍也雖上國之師何能加之夫劍之成也吳霸有缺則亡矣我雖好之其可受乎不受而去闔閭既寶莫耶復命於國中作金鈎令曰能為善鈎者賞之百金吳作鈎者甚衆有貪王之重賞者殺其二子以血釁金遂成二鈎獻於闔閭詣宫門而求賞王曰為鈎者衆而子獨求賞何以異於衆子之鈎乎作鈎者曰吾之作鈎也貪而殺二子釁成二鈎王乃舉衆鈎以示之何者是也於是鈎師向鈎而呼二子之名吳鴻扈稽我在於此王不知汝之神也聲絶于口兩鈎俱飛著父之胸吳王大驚曰嗟乎寡人負子乃賞百金遂服之不離身越絶書千里廬虛者闔廬以鑄干將劔歐冶僮女三百人去縣二里南達江搜神記楚干將莫邪為楚王作劔三年乃成王怒欲殺之劔有雌雄其妻當産夫語妻曰汝若生男大告之曰出戶望南山松生石上劔在其背於是將雌劔往見楚王王殺之莫邪子名赤比後壯問其母曰吾父所在母曰汝父為楚王作劔三年乃成王怒殺之去時囑我語汝子出戶望南山松生石上劔在其背子出戶南望不見有山但覩堂前松柱下低石之上即以斧破其背得劔日夜思欲報楚王王夢見一兒眉間廣尺言欲報讎王購之千金兒亡去入山行歌客有逄者謂子年少何哭之悲耶曰干將莫邪子也客曰聞王購子千金子將頭與劔來為子報之兒曰幸甚即自刎立僵客曰不負子也於是尸乃仆客持頭往見楚王王大喜客曰此乃勇士頭也當於湯鑊煮之三日三夕不爛頭踔出湯中瞋目大怒王自往臨視之客以劔擬王王頭墮湯中客亦自擬已頭復墮湯中三首俱爛不可識别乃分其湯肉葬之故通名三王墓列士傳又云為晉君作劔若此等荒謬極矣王闔廬元年舉伍子胥為行人而與謀國事楚誅伯州犂其孫伯嚭亡奔吳吳以為大夫史吳世家繹史吳白喜即伯嚭也此書前曰白喜後曰伯嚭則似是兩人楚之伯喜史作伯嚭來奔吳吳王問子胥曰白喜何如人也子胥曰白喜者楚白州犂之孫平王誅州犂喜因出奔聞臣在吳而來也吳王曰州犂何罪子胥曰白州犂楚之左尹號曰郤宛按左傳昭元年楚公子圍殺太宰伯州犂昭二十九年楚殺其大夫卻宛自是二人此以伯州犂卻宛為一人矣徐廣曰州犂之子曰卻宛卻宛之子曰伯嚭宛亦姓伯俱非事平王平王幸之常與盡日而語襲朝而食費無忌望而妬之因謂平王曰王愛幸宛一國所知何不為酒一至宛家以示羣臣于宛之厚平王曰善乃具酒於郤宛之舍無忌教宛曰王甚猛而好兵子必故陳兵堂下宛信其言及王往大驚曰宛何為者無忌曰殆有篡弒之憂王急去之王大怒遂殺宛諸矦聞之莫不嘆息喜聞臣在吳故來請見之吳王見白喜而問曰寡人國僻逺東濱海側聞子前人為楚荆之暴怒費無忌之讒口不逺吾國而來將何以教寡人喜曰前人無罪橫被暴誅臣聞大王收伍子胥之窮厄不逺千里故來歸命惟太王賜其死吳王傷之以為大夫與謀國事吳大夫被離承宴問子胥曰何見而信喜子胥曰吾之怨與喜同子不聞河上歌乎同病相憐同憂相救驚翔之鳥相隨而集瀨下之水因復俱流胡馬望北風而立越燕向日而熙誰不愛其所近悲其所思者乎被離曰君之言外也豈有內意以決疑乎子胥曰吾不見也被離曰吾觀喜之為人鷹視虎步専功擅殺之性不可親也子胥不然其言與之俱事吳王吳越春秋越絶書紀策太宰者官號嚭者名也伯州當作宗之孫伯州為楚臣以過誅嚭以困奔于吳是時吳王闔廬伐楚悉召楚仇而近之嚭為人覽聞辨見目達耳通無所不知因其時自納于吳言伐楚之利闔廬用之伐楚令子胥孫武與嚭將師入郢有功還以嚭為太宰吳王闔廬為伍子胥興師復讐于楚子胥諫曰諸侯不為匹夫興師且事君猶事父也虧君之義復父之讐臣不為也于是止説苑至公吳王欲伐荆曰敢有諫者死舍子有少孺子者欲諫不敢乃懷丸操彈于後園露沾其衣如是者三日王曰子來何露沾衣如此對曰園中有榆其上有蟬髙居悲鳴飲露不知螳螂在其後也螳螂委身曲附欲取蟬而不知黃雀之在傍也黃雀延頸欲啄螳螂而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也吳王曰善哉乃罷兵説苑闔閭欲興師伐楚子胥諫曰不可臣聞之君子不為匹夫興師且事君猶父事也虧君之義復父之讎臣不為也於是止蔡昭公朝于楚有美裘楚令尹囊瓦求之昭公不豫於是拘昭公于郢數年而後歸之昭公濟漢水沉璧曰諸矦有伐楚者寡人請為前列楚人聞之怒於是興師伐蔡蔡請救于吳子胥諫曰蔡非有罪也楚人無道也君若有憂中國之心則若此時可矣於是興師伐楚遂敗楚人于柏舉新序卷九吳王欲殺王子慶忌而莫之能殺吳王闔廬光篡庶父僚而即位慶忌僚之子也故欲殺之慶忌有力捷疾無能殺之者吳王患之要離曰臣能之吳王曰汝惡能乎吾嘗以六馬逐之江上矣而不能及射之矢左右滿把而不能中今汝拔劔則不能舉臂上車則不能登軾汝惡能要離曰士患不勇耳奚患於不能王誠能助臣請必能吳王曰諾明旦加要離罪焉縶執妻子焚之而揚其灰吳王偽加要離罪要離走往見王子慶忌於衛王子慶忌喜曰吳王之無道也子之所見也諸矦之所知也今子得免而去之亦善矣要離與王子慶忌居有間謂王子慶忌曰吳之無道也愈甚請與王子往奪之國王子慶忌曰善乃與要離俱涉於江中將拔劍以刺王子慶忌王子慶忌捽之投之於江浮則又取而投之如此者三其卒曰汝天下之國士也幸汝以成而名幸活也而汝也要離得不死歸於吳吳王大説請與分國要離曰臣請必死吳王止之要離曰夫殺妻子焚之而揚其灰以便事也便成也臣以為不仁為故主殺新主臣以為不義夫捽而浮乎江三入三出特王子慶忌為之賜而不殺耳臣已為辱矣夫不仁不義又且已辱不可以生吳王不能止果伏劍而死吕覽忠亷博物志云要離刺慶忌彗星襲月専諸刺王僚鷹擊殿上淮南子王子慶忌足躡麋鹿手搏兕虎置之冥室之中不能搏龜鱉勢不便也吳越春秋闔閭二年前既殺王僚又憂慶忌之在鄰國恐合諸侯來伐問子胥曰昔專諸之事於寡人厚矣今聞公子慶忌有謀於諸矦吾食不甘味卧不安席以付於子子胥曰臣不忠無行而與大王圖王僚於私室之中今復討其子恐非天意吳王曰昔武王討紂後殺武庚周人無怨色今若斯議何乃天乎子胥曰臣事君王將遂吳統又何懼焉臣有所厚其人者細人也願從與謀吳王曰吾之憂者其敵有萬人力豈細人之所能謀乎子胥曰其細人之謀也而有萬人之力王曰何誰子以言之子胥曰姓要名離臣昔見其折辱壯士椒丘欣王曰辱之奈何子胥曰椒丘欣者東海上人也為齊王使於吳過淮津欲飲馬于津津吏曰水中有神見馬即出以害其馬君勿飲也欣曰壯士所當何神敢干乃使從者飲馬于津水神果取其馬馬沒椒丘欣大怒袒裼持劍入水求神決戰連日乃出眇其一目遂之吳會有友人之喪欣恃其與水神戰之勇也於友人喪席輕傲士大夫言辭不遜要離與之對坐乃挫欣曰吾聞勇士之鬪也與日戰不移表與神鬼戰者不旋踵與人戰者不達聲生往死還不受其辱今子與神鬪于水亡馬失御又受眇目之病形殘名勇勇士所恥不即喪命于敵而戀其生猶徽色于我哉於是椒丘欣恨怒並發暝即往攻要離于是要離席闌至舍誡其妻曰我辱壯士椒丘欣於大家之喪餘恨蔚恚暝必來也慎無閉吾門至夜椒丘欣果往見其門不閉登其堂不關入其室不守放髮僵卧無所懼欣乃手劍而捽要離曰子有當死之過三子知之乎離曰不知欣曰子辱我於大家之衆一死也歸不關閉二死也卧不守御三死也子有三死之過欲無得怨要離曰吾無三死之過子有三不肖之耻子知之乎欣曰不知要離曰吾辱子於千人之衆子無敢報一不肖也入門不咳登堂無聲二不肖也前拔子劍手挫捽吾頭乃敢大言三不肖也子有三不肖而乃威我豈不鄙哉於是椒丘欣投劍而嘆曰吾之勇也人莫敢眥者離乃加吾之上此天下壯士也臣聞要離若斯故以聞吳王曰願承宴而待焉子胥乃見要離曰吳王聞子高義惟一臨之乃與子胥見吳王王曰子何為者要離曰臣國東千里之人細小無力迎風則僵負風則伏大王有命臣敢不盡力吳王心非子胥進此人良久默然不言要離即進曰大王患慶忌乎臣能殺之王曰慶忌之勇世所聞也筋骨果徑萬人莫當走追奔獸手接飛鳥骨騰肉飛拊膝數百里吾嘗追之於江駟馬馳不及射之暗接矢不可中今子之力不如也要離曰王有意焉臣能殺之臣聞安妻子之樂不盡事君之義非忠也懷家室之愛而不除君之患者非義也臣詐以負罪出奔願王戮臣妻子斷臣右手慶忌必信臣矣王曰諾要離乃詐得罪出奔吳王乃取其妻子焚棄于市要離行怨言以無罪聞于天下遂如衛求見慶忌見曰闔閭無道王子所知今戮吾妻子焚之于市無罪見誅吳國之事吾知其情願因王子之勇闔閭可得也何不與我東之吳慶忌信其謀後三月揀練士卒遂之吳渡江中流要離力微坐上風因風勢以矛鈎其冠順風而刺慶忌慶忌顧而揮之三捽其頭于水中乃加于膝上曰嘻哉天下之勇士也乃敢加兵創於我左右欲殺之慶忌止之曰此天下勇士豈可一日殺天下勇士二人哉乃誡左右曰可令還吳以旌其忠於是慶忌死要離渡至江陵愍然不行從者曰君何不行要離曰殺妻子以事其君非仁也為新君而殺故君之子非義也重其死不貴無義今吾貪生棄行非義也夫人有三惡以立于世何面目視天下之士言訖遂投于江未絶從者出之要離曰吾寧能不死乎乃自斷手足伏劍而死地志吳遣要離刺慶忌離乃殺妻子奔衛慶忌信之遂與渡江投慶忌於水即自殺冡在姑蘇閶門內泰伯廟南闔廬立三年與子胥伯嚭將兵伐楚拔舒殺吳亡將二公子謀欲入郢將軍孫武曰民勞未可且待之乃歸史吳世家孫子武齊人漢書孫子兵法八十一篇圖九卷以兵法見於吳王闔廬闔廬曰子之十三篇吾盡觀之矣可以小試勒兵乎對曰可闔廬曰可試以婦人乎曰可於是出宫中美女得百八十人孫子分為二隊以王之寵姫二人各為隊長皆令持戟令之曰汝知而心與左右背乎婦人曰知之孫子曰前則視心左視左手右視右手後即視背婦人曰諾約束既布乃設鈇鉞即三令五申之於是鼓之右婦人大笑孫子曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃欲斬左右隊長吳王從臺上觀見且斬愛姫大駭趣使使下令曰寡人已知將軍能用兵矣寡人非此二姫食不甘味願勿斬也孫子曰臣既已受命為將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長於是復鼓之婦人左右前後跪起皆中規矩繩墨無敢出聲於是孫子使使報王曰兵既整齊王可試下觀之吳王曰將軍罷休就舍寡人不欲下觀孫子曰王徒好其言不能用其實於是闔廬知孫子能用兵卒以為將西破強楚入郢北威齊晉顯名諸矦孫武死後百餘嵗有孫臏史孫吳傳吳越春秋三年吳王欲伐楚未即行乃登臺向南風而嘯有頃而嘆羣臣莫有曉王意者子胥深知王志之不定乃薦孫子于王孫子名武吳人也善為兵法僻隱深居世人莫知其能胥知孫子可以折衝銷敵與吳王論兵七薦孫子吳王召孫子問以兵法每陳一篇王不知口之稱善其意大悅問曰兵法可以小試乎孫子曰可可小試於後宫之女王曰諾孫子曰得大王寵姫二人以為隊長各將一隊令三百人皆被甲兜鍪操劍盾而立告以軍法隨鼓進退左右回旋乃令曰一鼓皆振二鼓操進三鼓為戰形於是宫女皆掩口而笑孫子乃親自操枹擊鼓三令五申其笑如故孫子大怒兩目忽張聲如駭虎髮上衝冠項旁絶纓顧謂執法曰軍法如何執法曰斬武乃令斬隊長二人即吳王之寵姫也吳王登臺望見馳使下之令曰寡人已知將軍用兵矣二姫吾所愛勿斬之孫子曰臣已受命為將將法在軍君雖有令臣不受也孫子復撝鼓之左右進退回旋規矩不敢瞬目二隊寂然無敢顧者乃報吳王曰兵已整齊願王觀之惟所欲用使赴水火亦無難矣而可以定天下吳王忽然不悅曰寡人知子善用兵然而無所施也將軍罷兵就舍寡人不願子胥諌曰臣聞兵者凶事不可空試今大王虔心思士欲興兵以誅暴楚以霸天下而威諸矦非孫武之將而誰能涉淮踰泗越千里而戰者乎於是吳王大悅因會軍攻楚孫子為將拔舒殺吳亡將二公子蓋餘燭傭謀欲入郢孫武曰民勞未可恃也四年伐楚取六與灊史吳世家五年吳王以越不從伐楚南伐越越王元常曰吳不信前日之盟棄貢賜之貢而滅其交親乎吳王不然其言遂破檇李吳越春秋吳攻楚子胥使人宣言於楚曰子期用將擊之子常用將去之楚人聞之因用子常而退子期也吳人擊之遂勝之韓子內儲下吳越春秋闔閭聞楚淂湛盧之劍因使孫武伍胥白喜伐楚子胥隂令宣言于楚曰楚用子期為將吾即殺之子常用兵吾即去之楚聞之因用子常退子期吳拔六與潛二邑六年楚昭王使公子囊瓦將兵伐吳吳使伍員迎擊大破楚軍于豫章取楚之居巢史伍子胥傳六年楚昭王使公子囊瓦伐吳報潛六之役吳使伍胥孫武擊之圍豫章吳王曰吾欲乘危入楚都而破郢不得入郢二子何功於是圍楚師于豫章大破之遂圍巢克之獲楚公子繁以歸為質吳越春秋九年左定四年闔廬謂子胥孫武曰始子言郢未可入今果何如二子對曰楚將囊瓦貪而唐蔡皆怨之王必欲大伐之必先得唐蔡乃可闔廬聼之悉興師與唐蔡伐楚與楚夾漢水而陳吳王之弟夫概將兵請從王不聼遂以其屬五千人擊楚將子常子常敗走奔鄭於是吳乘勝而前五戰遂至郢己卯楚昭王出奔庚辰吳人入郢昭王出亡入雲夢盜擊王王走鄖鄖公弟懷曰平王殺我父我殺其子不亦可乎鄖公恐其弟殺王與王奔隨吳兵圍隨謂隨人曰周之子孫在漢川者楚盡滅之隨人欲殺王王子綦匿王已自為王以當之隨人卜與王于吳不吉乃謝吳不與王始伍員與申包胥為友員之亡也謂包胥曰我必覆楚包胥曰我必存之及吳兵入郢伍子胥求昭王不得乃掘楚平王墓出其尸鞭之三百然後己申包胥亡於山中使人謂子胥曰子之報仇其以甚乎吾聞之人衆者勝天天定亦能勝人今子故平王之臣親北面而事之今至于僇死人此豈其無天道之極乎伍子胥曰為我謝申包胥曰吾日暮途逺故倒行而逆施之于是申包胥走秦告急求救于秦秦不許包胥立于秦廷晝夜哭七日七夜不絶聲秦哀公憐之曰楚雖無道有臣若是可無存乎乃遣車五百乘救楚六月敗吳兵于稷史伍子胥傳少與左定四年傳别越絶書楚世子奔逃雲夢之山子胥兵笞平王之墓昭王遣大夫申包胥入秦請救干鑿漁子進諫子胥子胥適會秦救至因引兵還越見其榮於無道之楚興兵伐吳子胥以不得已迎之就李問曰笞墓何名乎子之復仇臣之討賊至誠感天矯枉過直乳狗捕虎不計禍福大道不誅誅首惡子胥笞墓不究也吳越春秋九年吳王謂子胥孫武曰始子言郢不可入今果何如二將曰楚天下強敵也臣與之爭鋒十亡存一而王入郢者天也臣不敢必吳王曰奈何伍胥孫武曰囊瓦者貪而多過于諸矦而唐蔡怨之深王必得唐蔡而後可伐楚吳王於是使使謂唐蔡曰楚為無道虐殺忠良侵食諸矦困辱二君寡人欲舉兵伐楚願二君謀之唐侯使其子乾為質于吳三國合謀伐楚舍兵于淮汭自豫章與楚夾漢水為陳子常遂濟漢而陳自小别山至於大别山三戰不利自知不可進欲奔亡史皇曰子無故與王殺忠臣三人天禍來下誰之所致子常不應十月楚二師陳於柏舉闔閭之弟夫槩晨起請于闔閭曰子常不仁貪而少恩其臣下莫有死志追之必破矣闔閭不許夫槩曰所謂臣行其志不待命者此也遂以其部五千人擊子常楚師大亂敗走奔鄭吳師乘之遂破楚衆楚人未濟漢會食吳因奔而擊破之雍滯左作澨五戰徑至于郢昭王迫于吳將亡與妹季芉出河濉之間大夫尹固與王同舟而去奔隨吳師遂入郢伍胥以不得昭王乃掘平王之墓出其尸鞭之三百左足踐腹右手抉其目誚之曰誰使汝用讒諛之口殺我父兄即令闔閭妻昭王夫人伍胥孫武白喜亦妻子常司馬成之妻以辱楚之君臣也遂引兵擊鄭鄭定公懼乃令國中曰有能還吳軍者吾與分國而治漁者之子應募曰臣能還之不用尺兵斗糧得一橈而行歌道中即還矣公乃與漁者之子橈子胥軍將至當道扣橈而歌曰蘆中人如是者再子胥聞之愕然大驚曰公為何誰曰漁父者子吾國君懼女令于國有能還吳軍者與之分國而治臣念前人與君相逄於途今從君乞鄭之國子胥嘆曰悲哉吾蒙子前人之恩自致于此上天蒼蒼豈敢忘也於是乃釋鄭國還軍守楚求昭王所在闔廬興師伐楚至于漢水楚亦發兵拒吳夾水陳吳王弟夫槩欲戰闔廬弗許夫槩曰王已屬臣兵兵以利為上尚何待焉遂以其部五千人襲楚楚兵大敗走于是吳王遂縱兵追之比至郢五戰楚五敗楚昭王亡出奔鄖而吳兵遂入郢史吳世家吳闔廬選多力者五百人利趾者三千人以為前陳與楚戰五戰五勝遂有郢東征至於庫廬西伐至於巴蜀北追齊晉令行中國吕覽簡選闔廬試其民於五湖劍皆加於肩地流血幾不可止勾踐試其民於寢宫民爭入水火死者千餘矣遽擊金而却之吕覽用民越絶書闔閭問子胥曰敢問船軍之備何如對曰船名大翼小翼突冒樓船橋船今船軍之教比陵軍之法乃可用之大翼者當陵軍之重車小翼者當陵軍之輕車突冒者當陵軍衝車樓船者當陵軍之行樓車也橋船者當陵車之輕足驃騎也闔廬攻郢戰三勝問子胥曰可以退乎子胥對曰溺人者一飲而止則無溺者以其不休也不如乘之以沈之韓子説林下吳王闔廬與荆人戰于柏舉大勝之至于郢郊五敗荆人闔廬之臣五人進諫曰夫深入遠報非王之利也王其返乎五將鍥頭闔廬未之應五人之頭墜于馬前闔廬懼召伍子胥而問焉子胥曰五臣者懼也夫五敗之人者其懼甚矣王姑少進遂入郢南至江北至方城方三千里皆服于吳説苑指武闔閭伐楚五戰入郢燒高府之粟破九龍之鐘鞭平王之墓舍昭王之宫昭王奔隨百姓擕幼扶老而隨之各致其死却吳兵復楚地淮南子泰族十年春越聞吳王之在郢國空乃伐吳吳使别兵擊越楚告急于秦秦遣兵救楚擊吳吳師敗闔廬弟夫槩見秦越交敗吳吳王留楚不去夫槩亡歸吳而自立闔廬聞之乃引兵歸攻夫槩夫槩敗奔楚楚昭王乃得以九月復入郢而封夫槩于堂溪為堂溪氏史吳世家吳王久留楚求昭王而闔廬弟夫槩乃亡歸自立為王闔廬聞之乃釋楚而歸擊其弟夫概敗走遂奔楚楚昭王見吳有內亂乃復入郢封夫概于堂溪為堂溪氏楚復與吳戰敗吳吳王乃歸史伍子胥傳詳左定五年十月秦師未出越王元常恨闔閭破之檇里興兵伐吳吳在楚越盜掩襲之吳越春秋六月申包胥以秦師至秦使公子子蒲子虎率車五百乘救楚擊吳二子曰吾未知吳道使楚師前與吳戰而即會之大敗夫槩七月楚司馬子成秦公子子蒲與吳王相守私以間兵伐唐滅之子胥久留楚求昭王不去夫槩師敗潛歸自立為吳王闔閭聞之乃釋楚欲殺夫槩夫槩奔楚楚封之於棠溪闔閭遂歸子胥孫武白喜留於淮澨吳越春秋吳越春秋申包胥之秦求救晝馳夜趨足踵跖劈裂裳裹膝鶴倚哭于秦庭七日七夜口不絶聲秦桓公左作哀公素沉湎不恤國事申包胥哭已歌曰吳為無道封豕長蛇以食上國欲有天下政從楚起寡君出在草澤使來告急如此七日桓公大驚曰楚有賢臣如是吳猶欲滅之寡人無若臣亡無日矣為賦無衣之詩曰豈曰無衣與子同袍王于興師與子同仇包胥曰臣聞戾德無厭王不憂鄰國之患逮吳之未定王其取分焉若楚遂亡于秦何利則亦亡君之土也願王以神靈存之世以事王秦伯使辭焉曰寡人聞命矣子且就館將圖之包胥曰寡君今在草野未獲所伏臣何敢即安復立于庭倚牆而哭日夜不絶聲水不入口秦伯為之垂涕即出師而送之史記始伍員與申包楚為友員之亡也謂包胥曰我必覆楚包胥曰我必存之及吳兵入郢伍子胥求昭王既不得乃掘楚平王墓出其尸鞭之三百然後己申包胥亡於山中使人謂子胥曰子之報讎其以甚乎吾聞之人衆者勝天天定亦能破人今子故平王之臣親北面而事之今至於僇死人此豈其無天道之極乎伍子胥曰為我謝申包胥曰吾日暮塗逺吾故倒行而逆施之於是申包胥走秦告急求救於秦秦不許包胥立於秦廷晝夜哭七日七夜不絶其聲秦哀公憐之曰楚雖無道有臣若是可無存乎乃遣車五百乘救楚擊吳吳越春秋申包胥亡在山中聞之乃使人謂子胥曰子之報讎其已甚乎子故平王之臣北面事之今於僇尸之辱豈道之極乎子胥曰為我謝申包胥曰日暮路逺倒行而逆施之於道也申包胥知不可乃之於秦求救楚晝馳夜趨足踵跖劈裂裳裹膝鶴倚哭於秦庭七日七夜口不絶聲秦桓公素沈湎不恤國事申包胥哭已歌曰吳為無道封豕長蛇以食上國欲有天下政從楚起寡君出在草野使來告急如此七日桓公大驚楚有賢臣如是吳猶欲滅之寡人無臣若斯者其亡無日矣為賦無衣之詩曰豈曰無衣與子同袍王于興師與子同讐秦伯為之垂涕即出師而送之秦師又敗吳師楚子期將焚吳軍子西曰吾國父兄身戰暴骨草野焉不收而又焚之其可乎子期曰亡國失衆存沒所在又何殺生以愛死死如有知必將乘煙而起助我如其無知何惜草中之骨而亡吳國遂焚而戰吳師大敗子胥等相謂曰楚雖敗我餘兵未有所損者孫武曰吾以干戈西破楚逐昭王而屠平王墓割戮其尸亦已足矣子胥曰自霸王以來未有人臣報仇如此者也行去矣吳軍去昭王反國吳越春秋吳越春秋子胥過溧陽瀨水之上乃長太息曰吾嘗飢于此乞食于一女子女子飼我遂投水而死將欲報以百金不知其家乃投金水中而去地志溧陽縣有投金瀨即繫漂女飯子胥處有頃一老嫗行哭而來人問曰何哭之悲嫗曰吾有女子守居三十不嫁往年擊綿于此遇一窮途君子而輒飯之恐事泄自投于瀨水今聞伍君來不得其償自傷虛死是故悲耳人曰子胥欲報百金不知其家投金水中而去矣嫗遂取金而歸吳越春秋子胥歸吳吳王聞三帥將至冶魚為鱠將到之日過時不至魚臭須臾子胥至闔閭出鱠而食不知其臭王復重為之其味如故吳人作鱠者自闔閭造之也諸將既從楚還因更名閶門曰破楚門博物志吳王江行食膾有餘棄于中流化為魚今魚中有名吳王膾餘者骨長數寸大者如箸猶有膾形越絶書楚昭王使使者報子胥于吳曰昔者吾先人殺子之父而非其罪也寡人尚少未有所識也今子大夫報寡人也特甚然寡人亦不敢怨子子大夫何不來歸子故墳墓丘冡為我邦雖小與子同有之民雖少與子同使之子胥曰以此為名名即章以此為利利即重矣前為父報仇後求其利賢者不為也父已死子食其祿非父之義也使者還報昭王曰子胥不入荆邦明矣吳地記吳太子終纍闔閭長子夫差兄也齊景公以女妻之終纍早亡每思家因號齊門後葬常熟海隅山隅一作虞東南嶺與仲雍周章等墳相近葬畢化白龍沖天而去今號為母塜墳又云海虞山有二洞穴穴側有石壇周回六十丈山東二里有石室太公吕望避紂之處吳越春秋闔閭復謀伐齊齊景使女為質于吳吳王因為太子波聘齊女女少思齊日夜號泣因病闔閭乃起北門名曰望齊門令女往遊其上女思不止病日益甚乃至殂落女曰令死者有知必葬我于虞山之巔寰宇記常熟虞山有齊女冡以望齊國闔閭傷之正如其言乃葬虞山之巔是時太子亦病而死吳越春秋吳王有女滕玉因謀伐楚與夫人及女會蒸魚王前嘗半而與女女怒曰王食魚辱我乃自殺吳王痛之葬于國西閶門外鑿池積土文石為椁題湊為中金鼎玉杯銀樽珠襦之寶皆以送女乃舞白鶴于吳市中今蘇州有鶴市令萬民隨而觀之還使男女與鶴俱入羡門因發機以掩之殺生以送死國人非之又列女傳地志閶門外鶴市吳王有女自殺王痛之厚其葬舞白鶴于市萬人聚觀遂使俱入墓閉之齊門外吳王有畜雞城吳越春秋又闔閭有女哀疑是夫差女怨王先食蒸魚乃自殺王痛之厚葬于閶門外越記云闔閭葬女于邽西名為三女墳其女化為白鶴舞于吳市千萬人隨觀之後陷成湖今號女墳湖在吳縣西北六里湖西二百步有流杯亭闔閭三月三日泛舟遊賞之處吳地記洞庭有二穴東南入洞幽邃莫測闔閭使令威丈人尋洞秉燭晝夜而行繼七十日不窮而返啓王曰初入洞口狹隘傴僂而入約數里忽遇一石室可髙二丈常垂津液內有石牀枕硯石几上有素書三卷持回上于闔閭不識乃請孔子辨之孔子曰此夏禹之書並神仙之事言大道也王又令再入經二十日却返云不似前也唯上聞風水波濤又有異蟲撓人撲火石燕蝙蝠大如鳥前去不得丈人姓毛名萇號曰毛公今洞庭有毛公宅石室并壇存焉靈寶要略吳王闔閭出遊包山見一人自言姓山名隱居闔閭扣之乃入洞庭取素書一卷呈闔閭其文不可識令人齎之問孔子孔子曰此洞庭禹書也丘聞童謡云吳王出遊觀震湖龍威丈人山隱居北上包山入靈墟乃入洞庭竊禹書天地大文不可舒此文長傳百六初若強取出喪國廬莊子吳王浮於江登乎狙之山衆狙見之恂然棄而走逃於深蓁有一狙焉委蛇攫抓見巧乎王王射之敏給摶捷矢王命相者趨射之狙執死王顧謂其友顔不疑曰之狙也伐其巧恃其便以敖豫以至此殛也戒之哉嗟乎無以女色驕人哉顔不疑歸而師董梧以鋤其色去樂辭顯三年而國人稱之越絶書闔廬宫在高平里述異記闔閭構水精宫尤極珍怪皆出自水府吳王欲從民飲酒伍子胥諌曰不可昔白龍下清泠之淵化為魚漁者豫且射中其目白龍上訴天帝天帝曰當是之時若安置而形白龍對曰我下清泠之淵化為魚天帝曰魚固人之所射也若是豫且何罪夫白龍天帝貴畜也豫且宋國賤臣也白龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止説苑正諌闔閭謀擇諸公子可立者未有定計波太子夫差日夜告于伍胥曰王欲立太子非我而誰當立者此計在君耳伍子胥曰我入則決有頃闔閭召子胥謀立太子子胥曰臣聞祀廢于絶後興于有嗣今太子不祿早失侍御王欲立太子莫大乎波秦之子夫差秦字衍闔閭曰夫差愚而不仁恐不能奉統于吳國子胥曰夫差信以愛人端于守莭敦于禮義父死子代經之明文闔閭曰寡人從子遂立夫差為太子使太子屯兵守楚國自治宫室立射臺于安里華池在平昌南城宫在長樂闔閭出入遊卧秋冬治于城中春夏治于城外治姑蘇之臺旦食鱔山晝遊蘇臺射于鷗陂馳于遊臺興樂石城走大長洲斯為闔閭之霸吳越春秋十一年闔廬使太子夫差將兵伐楚取畨楚懼吳復大來乃去郢徙于鄀史伍子胥傳少事見左定六年異吳越春秋太子定因伐楚破師拔番楚懼吳兵復往乃去郢徙于蒍若左傳蒍若作鄀當此之時吳以子胥白喜孫武之謀西破強楚北威齊晉南伐於越十九年夏吳伐越越王句踐迎擊之檇李越使死士挑戰三行造吳師呼自剄吳師觀之越因伐吳敗之姑蘇傷吳王闔廬指軍却七里吳王病傷而死闔廬使立太子夫差謂曰爾而忘句踐殺汝父乎對曰不敢三年乃報越史吳世家十九年吳伐越越王勾踐迎擊敗吳于姑蘇傷闔廬指軍卻闔廬病創將死謂太子夫差曰爾忘勾踐殺爾父乎夫差對曰不敢忘是夕闔廬死事詳左定十四年少别夫差既立為王以伯嚭為太宰習戰射史伍子胥傳越絶書吳地闔廬冡在閶門外名虎丘下池廣六十步水深丈五尺銅槨三重墳池六尺玉鳬之流扁諸之劍三千方圓之口三千時耗魚腸之劍在焉十萬人築治之取土臨湖口築三日而白虎居上故號虎丘吳地記云金精化為白虎蹲其上因號虎丘秦始皇東巡至虎丘求吳王寶劍其虎當墳而踞始皇以劍擊之不中誤中于石其虎西走二十五里忽失扲今虎疁唐諱虎錢氏諱疁改為滸墅劍無復獲乃陷成池今號劍池踞其上故名地志秦始皇將發闔閭塜有白虎皇覽冡墓記云闔閭墓鑄銅為槨述異記闔廬夫人墓中周回八里别館洞房迤邐相屬漆燈照爛如日月焉尤異者金蠶玉燕各千餘隻韓詩外傳吳王夫差為無道至驅一市之民以葬闔閭然所以不亡者有伍子胥之故也胥亡死越王句踐欲伐之范蠡諌曰子胥之計䇿尚未忘於吳王之腹心也子胥死後三年越乃能攻之春秋戰國異辭卷三十六
