body:
  text: 春秋戰國異辭巻三十四右春坊右諭徳陳厚耀撰蔡史蔡世家蔡叔度者周文王子而武王弟也武王同母兄弟十人武王已克殷紂平天下封功臣昆弟於是封叔鮮於管封叔度於蔡二人相紂子武庚禄父治殷遺民武王既崩成王少周公旦專王室管叔蔡叔疑周公之為不利於成王乃挾武庚以作亂周公旦承成王命伐誅武庚殺管叔而放蔡叔遷之與車十乗徒七十人蔡叔度既遷而死其子曰胡乃改行率徳馴善周公聞之而舉胡以為魯卿士魯國治於是周公言於成王復封胡於蔡以奉蔡叔之祀是為蔡仲蔡仲卒子蔡伯荒立蔡伯荒卒子宫侯立宫侯卒子厲侯立厲侯卒子武侯立武侯之時周厲王失國奔彘共和行政諸侯多叛周武侯卒子夷侯立夷侯十一年周宣王即位二十八年夷侯卒子釐侯所事立釐侯釐侯三十九年周幽王為犬戎所殺周室卑而東徙秦始得列為諸侯四十八年釐侯卒子共侯興立共侯共侯三年卒子戴侯立戴侯戴侯十年卒子宣侯措父立宣侯宣侯三十五年卒子桓公封人立桓侯二十年桓侯卒弟哀侯獻舞立以上史蔡世家哀侯哀侯十一年初哀侯娶陳息侯亦娶陳息夫人將歸過蔡蔡侯不敬息侯怒請楚文王來伐我我求救於蔡蔡必來楚因撃之可以有功文王從之虜蔡哀侯以歸哀侯留九嵗死於楚凡立二十年卒蔡人立其子肸是為繆侯史蔡世家約左氏文繆侯繆侯以其女弟為齊桓公夫人十八年齊桓公與蔡女戯船中夫人蕩舟桓公止之不止公怒歸蔡女而不絶也蔡侯怒嫁其弟齊桓公怒伐蔡遂虜繆侯南至楚邵陵已而諸侯為蔡謝齊齊歸蔡侯二十九年繆侯卒子莊侯甲午立史蔡世家約左氏文莊侯三十四年莊侯卒子文侯申立文侯二十年文侯卒子景侯同立景侯四十九年景侯為太子般娶婦於楚而景侯通焉太子殺景侯而自立是為靈侯以上史蔡世家靈侯蔡侯宋公鄭伯朝於晉蔡侯謂叔向曰子亦奚以語我對曰蔡言地計衆不若宋鄭其車馬衣裘侈於二國諸侯其有圖蔡者乎處期年荆伐蔡而殘之説苑權謀十二年楚靈王以靈侯殺其父誘蔡靈侯於申伏甲飲之醉而殺之刑其士卒七十人令公子弃疾圍蔡十一月滅蔡使弃疾為蔡公史蔡世家下蔡威公閉門而哭三日三夜泣盡而繼以血旁鄰窺墻而問之曰子何故而哭悲若此乎對曰吾國且亡曰何以知也應之曰吾聞病之將死也不可為良醫國之將亡也不可為計謀吾數諫吾君吾君不用是以知國之將亡也於是窺牆者聞其言則舉宗而去之於楚居數年楚王果舉兵伐蔡窺牆者為司馬將兵而往來虜甚衆問曰得無有昆弟故人乎見威公縛在虜中問曰若何以至於此應曰吾何不至於此且吾聞之也言之者行之役也行之者言之主也汝能行我能言汝為主我為役吾亦何以不至於此哉窺牆者乃言之於楚王遂解其縛與俱之楚説苑權謀楚滅蔡三嵗楚公子弃疾弑其君靈王代立為平王平王乃求蔡景侯少子廬立之是為平侯史蔡世家平侯平侯九年卒靈侯般之孫東國攻平侯子而自立是為悼侯悼侯父曰隱太子友者靈侯之太子平侯立而殺隱太子故平侯卒而隱太子之子東國攻平侯子而代立也史蔡世家悼侯悼侯三年卒弟昭侯甲立史蔡世家昭侯昭侯十年朝楚昭王持美裘二獻其一於昭王而自衣其一楚相子常欲之不與子常讒蔡侯留之楚三年蔡侯知之乃獻其裘於子常子常受之乃言歸蔡侯蔡侯歸而之晉請與晉伐楚十三年春與衛靈公㑹邵陵蔡侯私於周萇𢎞以求長於衛衛使史鰌言康叔之功徳乃長衛夏為晉滅沈楚怒攻蔡蔡昭侯使其子為質於吳以共伐楚冬與吳王闔閭遂破楚入郢蔡怨子常子常恐奔鄭十四年吳去而楚昭王復國十六年楚令尹為其民泣以謀蔡蔡昭侯懼二十六年孔子如蔡楚昭王伐蔡蔡恐告急於吳吳為蔡逺約遷以自近易以相救昭侯私許不與大夫計吳人來救蔡因遷蔡於州來州來在淮南下蔡縣二十八年左哀四年昭侯將朝於吳大夫恐其復遷乃令賊利殺昭侯利賊名也已而誅賊利以解過而立昭侯子朔是為成侯史蔡世家約左氏文成侯十九年成侯卒子聲侯産立聲侯聲侯十五年卒子元侯立元侯元侯六年卒子侯齊立侯齊侯齊四年楚惠王滅蔡蔡侯齊亡蔡遂絶祀後陳滅三十三年以上史蔡世家春秋戰國異辭巻三十四
