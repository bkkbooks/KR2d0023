body:
  text: 春秋戰國異辭巻三十七右春坊右諭徳陳厚耀撰呉夫差王夫差元年以大夫伯嚭為太宰習戰射常以報志二年呉王悉精兵以伐越敗之夫椒報姑蘇也越王句踐乃以甲兵五千人棲於㑹稽使大夫種因吴太宰嚭而行成請委國為臣妾吴王將許之伍子胥諫曰昔有過氏殺斟灌以伐斟尋滅夏后帝相帝相之妃后緡方娠逃於有仍而生少康少康為有仍牧正有過又欲殺少康少康奔有虞有虞思夏徳於是妻之以二女而邑之於綸有田一成有衆一旅後遂收夏衆撫其官職使人誘之遂滅有過氏復禹之績祀夏配天不失舊物今吴不如有過之彊而句踐大於少康今不因此而滅之又將寛之不亦難乎且句踐為人能辛苦今不滅後必悔之吴王不聴聴太宰嚭卒許越平與盟而罷兵去史吴世家越絶書紀䇿夫差興師伐越敗兵就李大風發狂日夜不止車敗馬失騎士墮死大船陵居小船没水吴王曰寡人晝卧夢見井溢與李争彗越將掃我軍其凶乎孰與師還此時越軍大號夫差恐子胥曰王其勉之哉越師敗矣臣聞井者人所飲溢者食有餘越在南火吴在北水水制火王何疑乎風北來助吴也昔者武王伐紂彗星出而興周太公曰臣聞以彗鬭倒之則勝胥聞災異或吉或凶物有相勝此乃其證願大王急行是越將凶吴將昌也地志就李一名檇李城在浙江嘉興府城西南地産嘉李因名又云呉王曽醉西施於此號醉里越絶書記地句踐與吴戰于浙江之上石買為將耆老壯長進諌曰夫石買人與為怨家與為仇貪而好利細人也無長䇿王用之國必不遂王不聴遂遣之石買行至浙江上斬殺無罪欲専威服軍士動揺士衆恐懼人不自聊子胥見之或北或南夜舉火擊皷晝陳詐兵越師潰墜背叛乖離還報其王王殺買謝其師號聲聞吴吴王恐子胥喜曰越軍敗矣胥聞之狐之將殺噆唇吸齒今越句踐敗矣君王安意越易兼也使人入問之越師請降子胥不聴越棲于㑹稽之山吴退而圍之句踐用種蠡計行成于吴句踐將降西至浙江待詔入吴故有鷄鳴墟其入辭曰亡臣句踐故將士衆入為臣虜民可得使地可得有吴王許之子胥大怒目若夜光聲若哮虎曰越未戰而服天以賜吴其逆天乎吴王不聴遂許之浙江越絶書請糴越大夫種謀曰夫差不顧義而媿吾王種觀吴甚富而財有餘其刑繁法逆民習于戰守其大臣好相傷莫能信也其徳衰而民好負善且夫吴王又喜安佚而不聴諫細誣而寡智信讒而逺士數傷人而亟亡之少明而不信人希須臾之名而不顧後患君王盍求卜焉越王曰卜之道何若種曰君王卑身重禮以請糴于吴天若棄之吴必許諾于是乃卑身重禮以請于吴吴將與之申胥進諫曰不可夫王與越接地鄰境道徑通達仇讎敵戰之邦三江環之其民無所移非吴有越越必有吴且夫君王兼利弗取而輸之粟與財財去而凶來凶來而民怨其上是養寇而貧邦家也與之不為徳不若止且越王有智臣曰范蠡勇而善謀將修士卒飾戰具以伺吾間也胥聞越王之謀非有忠素請糴也將以此試我以此卜要君王以求益親安君王之志我君王不知省也而救之是越之福也吴王曰句踐既服為臣為我駕舎却行馬前諸侯莫不聞知今以越之饑吾與之食我知句踐必不敢申胥曰越無罪吾君王急之不遂絶其命又聴其言此天之所反也忠諫者逆而諛諫者反親是狐雉之戱也狐體卑而雉懼之夫獸蟲尚以詐相就而況于人乎吴王曰句踐有急而寡人與之其徳章而未靡句踐其敢與諸侯反我乎申胥曰臣聞聖人有急則不羞為人臣僕今越王為吾蒲伏約辭服為臣下其執禮甚過吾君不知省也而故勝威之臣聞狼子野心仇讎之人不可親也夫鼠忘壁壁不忘鼠今越人不忘吴矣胥聞之拂勝則社稷固諛勝則社稷危胥先王之老臣不忠不信則不得為先王之老臣君王胡不覽夫武王之伐紂也今不出數年鹿豕遊于姑胥之臺矣太宰嚭従旁對曰武王非紂臣耶率諸侯以殺其君雖勝可謂義乎申胥曰武王則已成名矣太宰嚭曰親僇主以成名弗忍申胥曰美惡相入或甚美以亡或甚惡以昌嚭何惑吾君王也太宰嚭曰申胥人臣也辯其君何必翽翽乎申胥曰太宰嚭面諛以求親乗吾君王以求威諸侯以成富今我以忠辯譬浴嬰兒雖啼勿聴嚭毋乃諛吾君王之欲而不顧後患乎吴王曰嚭止子無乃向寡人之欲乎太宰嚭曰臣聞春日將至百草従時君王動大事臣竭力以佐謀也因遜遯之舍使人微告申胥于吴王曰申胥進諫外貎類親中情甚踈類有外心君王常親覩其言也胥無父子之親君臣之施矣吴王曰夫申胥先王之忠臣天下之健士也殆不然乎哉子毋以私相傷以動寡人太宰嚭對曰臣聞父子之親張尹别居贈臣妾牛馬其志加親若不與一錢其志斯䟽父子之親猶然而況於士乎且有知不竭是不忠竭而顧難是不勇下而令上是無法吴王乃聴太宰嚭之言果與越粟申胥遯之舍歎曰於乎君王不圖社稷之危而聴一日之説不聴輔弼之臣而信讒諛容身之徒以為不信胥願廓目于邦門以觀吴邦之大敗也越絶書紀䇿子胥直言見踈范蠡聞之以為知數不用知懼不去豈謂智歟胥聞嘆曰胥聞事君猶事父也愛同也嚴等也太古以來未嘗見人君虧恩為臣報仇也臣獲大譽功名顯著胥知分數終于不去先君之功且猶難忘吾願腐髮弊齒何去之有蠡見其外不知吾内今雖屈寃猶止死焉吾前獲功後遇戮非吾智衰先遇闔廬後遭夫差也吴越春秋吴王坐于殿上獨見四人向庭相背而倚王怪而視之羣臣問曰王何所見王曰吾見四人相背而倚聞人言則四分走矣子胥曰如王言將失衆矣吴王怒曰子言不祥子胥曰非惟不祥王亦亡矣後五日吴王復坐殿上望見兩人相對北向人殺南向人王問羣臣見乎曰無所見子胥曰王何見王曰前日所見四人今日又見二人相對北向人殺南向人子胥曰臣聞四人走叛也北向殺南向臣殺君也王不應子胥諫吴王王怒暮歸舉衣出宫宫中羣臣皆曰天無霖雨宫中無泥露相君舉衣行髙何為子胥曰吾以越諫王王心迷不聴吾言宫中生草棘霧露沾我衣羣臣聞之莫不悲傷吴越春秋夫差七年魯哀六年吴王聞齊景公死而大臣争寵新君弱乃興師北伐齊子胥諫曰越王句踐食不重味衣不重采弔死問疾且欲有所用其衆此人不死必為吴患今越在腹心疾而王不先而務齊不亦謬乎弗聴遂北伐齊左氏此年無伐齊事敗齊師于艾陵左傳載夫差十二年至繒召魯哀公而徴百牢季康子使子貢以周禮説太宰嚭乃得止因留略地于齊魯之南史吴世家傳又伍子胥九年為騶伐魯至與魯盟乃去十年因伐齊而歸史吴世家史記吴王將伐齊子胥諫曰未可臣聞句踐食不重味與百姓同苦樂此人不死必為國患吴有越腹心之疾齊與吴疥㿅也願王釋齊先越吴王弗聴遂伐齊敗之艾陵虜齊髙國以歸譲子胥子胥曰王毋喜王怒子胥欲自殺王聞而止之越大夫種曰臣觀吴王政驕矣請試嘗之貸粟以卜其事請貸吴王欲與子胥諫勿與王遂與之越乃私喜子胥言曰王不聴諫後三年吴其墟乎按此與吕覽小異十一年復北伐齊越王句踐率其衆以朝吴厚獻遺之吴王喜唯子胥懼曰是棄吴也諫曰越在腹心今得志於齊猶石田無所用且盤庚之誥有顛越勿遺商之以興吴王不聴使子胥於齊子胥屬其子於齊鮑氏還報吴王吴王聞之大怒賜子胥屬鏤之劔以死將死曰樹吾墓上以梓令可為器抉吾眼置之吴東門以觀越之滅吴也史吴世家齊鮑氏弑齊悼公吴王十一年聞之哭於軍門外三日乃従海上攻齊齊人敗吴王乃引兵歸史吴世家繹史按春秋經傳齊景公卒悼公立四年弑簡公立艾陵之戰在簡公元年吴王勝齊還殺子胥史叙艾陵在景公死後而殺子胥在弑悼公前失考甚矣淮南子艾陵之戰也夫差曰夷聲陽句呉其庶乎吳越春秋夫差十一年北伐齊齊謝吴師曰齊孤立寡國倉庫空虚民人離散以吴為彊輔今未往告急而吴見伐請伏國人於郊不敢陳戰争之辭惟吴哀齊之不濫也吴師乃還吴越春秋吴王伐齊伍子胥聞之諫曰臣聞興十萬之衆奉師千里百姓之費國家之出日數千金不念士民之死而争一日之勝臣以為危國亡身之甚且與賊居不知其禍外復求怨徼幸他國猶治瘑疥而棄心腹之疾發當死矣今齊陵遲千里之外更歴楚趙之界為疾之疥耳越之為病乃心腹也不發則傷動則有死願大王定越而後圖齊臣今年老耳目不聰以狂惑之心無能益國竊觀金匱第八其可傷也吴王曰何謂也子胥曰今年七月辛亥平旦大王以首事辛嵗位也亥隂前之辰也合壬子嵗前合也利以行武武決勝矣然徳在合斗撃丑丑辛之本也大吉為白虎而臨辛功曹為太常所臨亥大吉徳辛為九醜又與白虎並重有人若以此首事前雖小勝后必大敗天地行殃禍不久矣吴王不聴遂九月使太宰嚭伐齊軍臨北郊吴王謂嚭曰行矣無忘有功無赦有罪愛民養士視如赤子與智者謀與仁者友太宰嚭受命遂行吴王召大夫被離問曰汝常與子胥同心合志并慮一謀寡人興師伐齊子胥獨何言焉被離曰子胥欲盡誠于王前自謂老狂耳目不聰不知當世之所行無益于國王遂伐齊齊與吴戰于艾陵之上齊師敗績吴王既勝乃使行人成好于齊曰吴王聞齊有没水之慮帥軍來觀而齊興師蒲革吴不知所安集設陣為備不意頗傷齊師願結和親而去齊王曰寡人處北邊無出境之謀今吴乃濟江淮踰千里而來我壌土戮我衆庶賴上帝哀存不至顛隕王今譲以和親敢不如命吴齊遂盟而去吴王還乃譲子胥曰吾前王履徳明達於上帝垂功用力為子西結强仇于楚前王譬若農夫之艾殺四方蓬蒿以立名于荆蠻斯亦大夫之力今大夫昏耄而不自安生變起詐怨惡而出出則罪吾士衆亂吾法度欲以妖孽挫衂吾師賴天降哀齊師受服寡人豈敢自歸其功乃前王之遺徳神靈之祐福也若子於吴則何力焉伍子胥攘臂大怒釋劒而對曰昔吾前王有不庭之臣以能遂疑計不陷于大難今王播棄所患不憂此孤僮之謀天所未棄必趨其小喜而近其大憂王不覺寤吴國之命斯促矣貟不忍稱疾辟易乃見王之為擒員誠前死掛吾目于門以觀吴國之䘮吴王不聴越絶書請糴太宰嚭之交逢同謂太宰嚭曰子難人申胥請為卜焉因往見申胥胥方與被離坐申胥謂逢同曰子事太宰嚭又惑吾君王君王之不省也而聴衆彘之言君王忘邦嚭之罪也亡日不久矣逢同出造太宰嚭曰今日為子卜于申胥胥誹謗其君不用胥則無後而君王覺子勉事後矣吴王之情在子太宰嚭曰智之所生不在貴賤長少此相與之道也逢同出見吴王慚然有憂色逢同垂涕不對吴王曰子為寡人遊目長耳將誰怨乎逢同曰臣有患也臣言而君行之則無後憂若君王弗行臣言而死矣王曰子言寡人聴之逢同曰今日往見申胥申胥與被離坐共謀慙然類欲害我君王申胥進諫類忠然中情至惡内其身而心野狼君王親之不親逐之不逐親之乎彼聖人也將更有怨心不已逐之乎彼賢人也知能害我君王殺之為乎可殺之亦必有以也吴王曰今圖申胥將何以逢同對曰君王興兵伐齊申胥必諫曰不可王無聴而伐齊必大克乃可圖之于是吴王欲伐齊召申胥胥曰臣老矣耳無聞目無見不可與謀吴王召太宰嚭而謀嚭曰善哉王伐齊也越在我猶疥癬是無能為也吴王復召申胥謀者三對曰臣聞愚夫之言聖主擇焉胥聞句踐罷吴之年宫有五竈食不重味省妻妾不别所愛妻操斗身操概自量而食適饑不費衣服純素不袀不𤣥帶劔以布寝不安席食不求飽而善貴有道行慶賞不刑戮是人不死必為國害越在我猶心腹之有積聚不發則無傷動作者有死亡願釋齊以越為憂吴王不聴果興師伐齊大克還以申胥為不忠賜劒殺申胥髠被離申胥且死曰昔者桀殺闗龍逄紂殺王子比干今吴殺臣參桀紂而顯吴邦之亡也王孫駱聞之旦即不朝王召駱而問之子何非寡人而不朝王孫駱曰臣不敢有非臣恐矣吴王曰子何恐以吾殺胥為重乎王孫駱曰君王氣髙胥之殺不與羣臣謀之臣是以恐王曰我非聴嚭而殺胥胥乃謀圖寡人王孫駱曰臣聞君人者必有敢言之臣在上位者必有敢言之士胥先王之老臣不忠不信不得為先王臣矣王意欲殺太宰嚭王孫駱曰不可王若殺之是殺二胥矣王近駱如故吕覽知化吴王夫差將伐齊子胥曰不可夫齊之與吴也習俗不同言語不通我得其地不能處得其民不能使夫吴之與越也接土隣境壌交通屬習俗同言語通我得其地能處之得其民能使之越於我亦然夫吴越之勢不兩立越之與吴也譬若心腹之疾也雖無作其傷深而在内也齊之於吴也疥癬之病也不若其己也且其無傷也今釋越而伐齊譬之懼虎而刺猏雖勝之其患未央患虎患太宰嚭曰不可君王之令所以不行於上國者齊晉也君王若伐齊而勝之徙其兵以臨晉晉必聴命矣是君王一舉而服兩國也君王之令必行於上國夫差以為然不聴子胥之言子胥曰天將亡吴矣則使君王戰而勝天將不亡吴矣則使君王戰而不勝夫差不聴子胥兩袪髙蹶而出於廷曰嗟乎吴朝必生荆棘矣夫差興師伐齊戰於艾陵大敗齊師夫差十二年反而誅子胥子胥將死曰與吾安得一目以視越人之入吴也乃自殺夫差乃取其身而流之江抉其目著之東門曰女胡視越人之入我也史記伍子胥傳吴王將北伐齊越王句踐用子貢之謀乃率其衆以助吴而重寳以獻太宰嚭太宰嚭既數受越賂其愛信越殊甚日夜為言于吴王吴王信之伍子胥諫曰夫越心腹之病今信其浮辭詐偽而貪齊破齊譬猶石田無所用之且盤庚之誥曰有顛越不恭劓殄滅之俾無遺育無使易種於兹邑此商之所以興願王釋齊而先越若不然後將悔之無及而吴王不聴使子胥于齊通戰期子胥臨行謂其子曰吾數諫王王不用今見吴之亡矣汝與吴俱亡無益也乃屬其子於齊鮑牧改氏為王孫氏而還報吴吴太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩猜賊其怨望恐為深禍也前日王欲伐齊子胥以為不可王卒伐之而有大功子胥耻其計謀不用乃反怨望而今王又復伐齊子胥専愎彊諫沮毁用事徒幸吴之敗以自勝其計謀耳今王自行悉國中武力以伐齊而子胥諫不用因輟謝佯病不行王不可不備此起禍不難且嚭使人微伺之其使於齊也乃屬其子於齊之鮑氏夫為人臣内不得意外倚諸侯自以為先王之謀臣今不見用常鞅鞅怨望願王早圖之吴王曰微子之言吾亦疑之乃使使賜伍子胥屬鏤之劔曰子以此死伍子胥仰天歎曰嗟乎讒臣嚭為亂矣王乃反誅我我令若父霸自若未立時諸公子争立我以死争之于先王幾不得立若既得立欲分吴國予我我顧不敢望也然今若聴諛臣言以殺長者乃告其舎人曰必樹吾墓上以梓令可以為器而抉吾眼縣呉東門之上以觀越寇之入滅吴也乃自剄死事與左哀十年較詳吴王聞之大怒乃取子胥尸盛以鴟夷革浮之江中吴人憐之為立祠于江上因命曰胥山吴王既誅伍子胥遂伐齊越絶書子貢與夫子坐告夫子曰太宰死夫子曰不死也如是者再子貢再拜而問何以知之夫子曰天生宰嚭者欲以亡吴吴今未亡宰何病乎後人來言不死聖人不妄言是以明知越霸矣説苑正諫夫差十一年吴將復北伐齊越王句踐用子貢之謀乃率其衆以助吴而重寳以獻遺太宰嚭太宰嚭既數受越賂其愛信越殊甚日夜為言于吴王王信用嚭之計伍子胥諫曰夫越心腹之疾今信其遊辭偽詐而貪齊譬猶石田無所用之盤庚曰古人有顛越不恭是商所以興也願王釋齊而先越不然將悔之無及也已吴王不聴使子胥於齊子胥謂其子曰吾諫王王不我用吾今見吴之滅矣女與吴俱亡無為也乃屬其子于齊鮑氏而歸報吴王太宰嚭既與子胥有隙因讒曰子胥為人剛暴少恩其怨望猜賊為禍也深恨前日王欲伐齊子胥以為不可王卒伐之而有大功子胥計謀不用乃反怨望今王又復伐齊子胥専愎强諫沮毁用事惟幸吴之敗以自勝其計謀耳今王自行悉國中武力以伐齊而子胥諫不用因輟佯病不行王不可不備此起禍不難且臣使人微伺之其使齊也乃屬其子於鮑氏夫人臣内不得意外交諸侯自以先王謀臣今不用常怏怏願王早圖之吴王曰微子之言吾亦疑之乃使使賜子胥屬鏤之劔曰子以此死子胥曰嗟乎讒臣宰嚭為亂王顧反誅我我令若父霸又若立時諸子弟争立我以死争之於先王幾不得立若既立欲分吴國與我我顧不敢當然若之何聴讒臣殺長者乃告舎人曰必樹吾墓上以梓令可以為器而抉吾眼著之吴東門以觀越寇之滅吴也乃自刺殺吴王聞之大怒乃取子胥尸盛以鴟夷革浮之江中吴人憐之乃為立祠于江上因名曰胥山吴越春秋吴王置酒文臺之上羣臣悉在太宰嚭執政越王侍坐子胥在焉王曰寡人聞之君不賤有功之臣父不憎有力之子今太宰嚭為寡人有功吾將爵之上賞越王慈仁忠信以孝事于寡人吾將復其國以還助伐之功於衆大夫何如羣臣賀曰大王躬行至徳虚心養士羣臣並進見難争死名號顯著威震四海有功蒙賞亡國復存霸功王事咸被羣臣子胥據地垂淚曰於乎哀哉遭此嘿嘿忠臣掩口讒夫在側政敗道壊謟諛無極邪説偽辭以曲為直含讒攻忠將滅吴國宗廟既夷社稷不食城郭丘墟殿生荆棘吴王大怒曰老臣多詐為吴妖孽乃欲専權擅威獨傾吾國寡人以前王之故未忍行法今退自計無沮吾謀子胥曰今臣不忠不信不得為前王之臣臣不敢愛身恐吾國之亡矣昔者桀殺闗龍逄紂殺王子比干今大王誅臣參于桀紂大王勉之臣請辭矣子胥歸謂被離曰吾貫弓接矢于鄭楚之界越渡江淮自致于斯前王聴従吾計破楚見凌之仇報前王之恩而至於此吾非自惜禍將及汝被離曰既諫不聴自殺何益何如亡乎子胥曰亡臣安往吴王聞子胥之怨恨也乃使人賜屬鏤之劔十三年子胥受劔徒跣褰裳下堂中立仰天呼怨曰吾始為汝父忠臣設謀破楚南服勁越威加諸侯有霸王之功今汝不用吾言反賜我劔吾今日死吴宫為墟庭生蔓草越人掘汝社稷安忘我乎昔前王不欲立汝我以死争之卒得汝之願公子多怨于我我徒有功于吴今乃賜我死豈不謬哉吴王聞之大怒曰汝不忠信為寡人使齊託汝子于齊鮑氏有外我之心急令自裁孤不使汝得有所見子胥把劔仰天嘆曰我死後世必以我為忠上配夏殷亦得與龍逄比干為友遂伏劔以死吴王乃取子胥尸盛以鴟夷之器鴟夷榼投之于江中言曰胥汝死之後何能有知即㫁其頭置髙樓上謂之曰日月炙汝肉飄風飄汝眼炎光燒汝骨魚鼈食汝肉汝骨變形灰有何所見子胥因隨流揚波依潮來往一作成濤激岸隨潮來往蕩激崩岸於是吴王謂被離曰汝嘗與子胥論寡人之短乃髠被離而刑之王孫駱聞之不朝王召而問曰子何非寡人而不朝駱曰臣恐耳吴王曰子以我殺子胥為重乎駱曰大王氣髙子胥位下王之誅臣命何異於子胥臣以是恐也王曰非聴宰嚭以殺子胥胥圖寡人也駱曰臣聞君人者必有敢諫之臣在上位者必有敢言之交夫子胥先王之老臣也不忠不信不得為前王臣吴王中心悷然悔殺子胥非宰嚭之讒子胥而欲殺之駱曰不可王若殺嚭此為二子胥也于是不誅越絶書徳序子胥賜劔將自殺嘆曰嗟乎衆曲矯直一人固不能獨立吾挾弓矢以逸鄭楚之間自以為可復吾見凌之仇乃先王之功想得執焉自致于此吾先得榮後僇者非智衰也先遇明後遭險君之易移也已矣生不遇時復何言哉此吾命也亡將安之莫如早死従吾先王于地下葢吾之志也吴王將殺子胥使馮同徵之胥見馮同知為吴王來也洩言曰王不親輔弼之臣而親衆豕之言是吾命短也髙置吾頭必見越人入吴也我王親為禽哉捐我深江則亦已矣胥死之後吴王以為妖言使人捐子胥于大江口勇士執之乃有遺響發憤馳騰氣若奔馬威凌萬物歸神大海彷彿之間音兆常在後世稱之子胥葢水僊也論衡夫差殺子胥煮之于鑊盛以嚢投之于江子胥恚恨臨水為濤溺殺人吴地記云子胥死浮尸于江夫差悔焉與羣臣于江設祭置壇國人因為立廟夫差帥詣羣臣出國門祠子胥于江濱諸臣並在夫差乃言曰寡人蒙先王之遺恩為千乗之主昔不聴相國之言乃用讒佞之辭至令相國逺没江海自亡以來濛濛惑惑如霧蔽日莫誰與言泣下沾襟哀不自勝左右羣僚莫不悲傷吴越春秋新書子胥進争不聴忠言不用既得成稱善累聴以求民心於是上帝降禍絶吴命乎直江君臣乖而不調置社槁而分裂容臺振而掩敗犬羣嘷而入淵彘銜菹而失奥燕雀剖而蚖虵生食菹而蛭口浴清水而遇蠆伍子胥見事之不可為也乃籠而自投水目抉而掛東門身鴟夷而浮江吴王夫差立春宵宫為長夜之飲造千石酒鍾又作天池池中造青龍舟日與西施為水嬉又有别館在句容楸梧成林民歌曰梧宫秋吴王愁述異記地志蘇州府靈巖山吴王館娃宫故地上有西施洞浣花池採香徑及琴臺諸勝楞伽山一名上方山其北有吴王郊臺胥山在太湖口吴王殺子胥于此靈巖有響屧廊吴王建廊虚其下令西施步屧繞之則有聲地志蘇州府姑蘇臺在姑蘇山上一名胥臺闔閭築五年乃成石城在常熟吴地志云越獻西施于吴王王擇虞山北麓以石甃城為冶遊之所地志松江府五茸城華亭谷東吴夫差獵所吴地記夫差小女字㓜玉見父無道輕士重色其國必危遂願與書生韓重為偶不果結怨而死夫差思痛之金棺銅槨葬閶門外其女化形而歌曰南山有鳥北山張羅鳥既髙飛羅當奈何志欲従君讒言孔多悲怨成疾殁身黄坡搜神記吴王夫差小女名曰紫玉年十八童子韓重年十九有道術女説之私交信問許為之妻重學於齊魯之間屬其父母求婚王怒不與女玉結氣死葬閶門之外三年重歸哭泣哀慟具牲幣往弔於墓前玉魂従墓出見重流涕曰昔爾行之後二親從王相求度必克従大願不圖别後遭命奈何乃左顧宛頸而歌曰南山有鳥北山張羅鳥既髙飛羅將奈何意欲従君讒言孔多悲結生疾没命黄壚命之不造寃如之何羽族之長名為鳳凰一日失雄三年感傷雖有衆鳥不為匹雙故見鄙姿逢君輝光身逺心近何當暫忘歌畢歔欷流涕要重還冡與之飲讌晉三日三夜盡夫婦之禮取徑寸明珠以送重曰若至吾家致敬大王重遂詣王自説其事王大怒曰吾女既死而重造訛言此不過發冡取物託以鬼神趣收重重走至墓所訴之玉曰無憂今歸白王王粧梳忽見玉驚愕悲喜問曰爾縁何生玉跪而言曰昔韓重求玉大王不許重従逺還聞玉已死故詣冡弔唁感其篤終輒與相見因以珠遺之不為發冡願勿推治夫人聞之出而抱之玉如烟然夫差北伐齊掘為深溝通于商魯之間北屬之濟是為吴溝吴越春秋地志山東即墨縣海濱有勞山相𫝊吴王夫差登此得靈寳度人經漢逢萌浮海隠此吴越春秋合越絶書吴王將伐齊道出胥門因過姑胥之臺忽晝假寐于姑胥之臺而得夢及寐而起其心恬恬一作惆然悵焉乃召太宰嚭告曰寡人晝卧有夢覺而恬恬一作惆然悵焉請占之得無有憂哉夢入章明宫見兩䥶蒸而不炊一作炊而不蒸兩黒犬嘷以南嘷以北兩鋘鋘一作鏵殖吾宫牆流水湯湯越吾空堂後房鼔震篋篋有鍛工前園横生梧桐子為寡人占之太宰嚭曰美哉王之興師伐齊也臣聞章者徳鏘鏘也明者破敵聲聞功朗明也兩䥶蒸而不炊者大王聖徳氣有餘也兩黒犬嘷以南嘷以北者四夷已服朝諸侯也兩鋘殖宫牆者農夫就成田夫耕也流水湯湯越宫堂者鄰國貢獻財有餘也後房篋篋皷震有鍛工者宫女悦樂琴瑟和也前園横生梧桐者樂府皷聲也吴王大恱賜太宰嚭雜繒四十疋而其心不已召王孫駱問曰寡人忽晝夢為予陳之王孫駱曰臣智能鄙淺不能占夢臣知有東掖門亭長長城公弟子公孫聖公孫一作王孫為人少而好游長而好學多見博觀知鬼神之情狀願王問之王乃遣王孫駱移記往請公孫聖急詣姑胥之臺公孫聖得記發而讀之伏地而泣有頃不起其妻大君従旁接而起之謂聖曰子何性之鄙也希暏人主卒得急召涕泣如雨公孫聖仰天嘆曰悲乎非子所知也今日壬午時加南方命屬上天不可逃亡非但自哀誠傷吴王大君曰子以道自達于主有道當行上以諫王下以約身今聞急召憂惑潰亂非賢人所宜公孫聖曰愚哉女子之言也吾受道十年隠身避害欲紹夀命不意卒得急召中世自棄故悲與子相離耳遂去詣姑胥臺吴王曰寡人將北伐齊魯道出胥門過姑胥之臺忽然晝夢子為占之言其吉凶公孫聖伏地而起曰臣不言身名全言之必死于王前然忠臣不顧其軀乃仰天嘆曰悲哉臣聞好船者溺好騎者墮君子各以所好為禍臣好直言不顧于命願王圖之臣聞章者戰不勝敗走傽偟也明者去昭昭就㝠㝠也入門見䥶蒸而不炊者大王不得火食也兩黒犬嘷以南嘷以北者大王身死魂魄惑也兩鋘殖宫牆者越軍入吴國伐宗廟掘社稷也流水湯湯越宫堂者宫空虚也後房皷震篋篋者坐太息也前園横生梧桐者梧桐心空不為器用但為俑僮與死人俱𦵏也願大王按兵修徳無伐于齊則可銷也使太宰嚭王孫駱冠幘肉袒徒跣稽首謝于句踐國可存也身可不死矣吴王索然大怒乃曰吾天之所生神之所使顧力士石畨以鐵鎚擊殺之聖乃仰頭向天而言曰吁嗟蒼天知吾之寃乎忠而獲罪身死無辜令吾家無葬我提我至深山中後世為聲響於是吴王乃使人提之秦餘杭之山豺狼食其肉野火燒其骨東風數至飛揚汝灰骨肉糜爛汝何能為聲響哉太宰嚭趨進曰賀大王喜災已滅矣因舉行觴兵可以行吴王乃使太宰嚭為右校司馬王孫駱為左校司馬従句踐之師以伐齊十三年吴召魯衞之君會於橐臯史吴世家十四年春吴王北會諸侯於黄池欲霸中國以全周室六月戊子越王句踐伐吴乙酉越五千人與吴戰丙戌虜吴太子友丁亥入吴吴人告敗於王夫差夫差惡其聞也或泄其語吴王怒斬七人於幕下七月辛丑吴王與晉定公争長吴王曰於周氏我為長晉定公曰於姬姓我為伯趙鞅怒將伐吴乃長晉定公吴王已盟與晉别欲伐宋太宰嚭曰可勝而不能居也乃引兵歸國國亡太子内空王居外乆士皆罷敝於是乃使厚幣以與越平史吴世家吴越春秋十四年夫差既殺子胥連年不熟民多怨恨吴王復伐齊闕闕與掘同為闌溝於商魯之間北屬蘄西屬濟欲與魯晉合攻於黄池之上恐羣臣復諫乃令國中曰寡人伐齊有敢諫者死太子友知子胥忠而不用太宰嚭佞而専政欲切言之恐罹尤也乃以諷諫激于王清旦懐丸持弹従後園而來衣袷履濡王怪而問之曰子何為袷衣濡履體如斯也太子友曰適遊後園聞秋蜩之聲往而觀之夫秋蝉登髙樹飲清露隨風撝撓長吟悲鳴自以為安不知螳螂超枝縁條曳腰聳距而稷其形夫螳螂翕心而進志在有利不知黄雀盈緑林徘徊枝隂􅀈􅀈微進欲啄螳螂夫黄雀但知伺螳螂之有味不知臣挾弹危擲蹭蹬飛丸而集其背今臣志在黄雀不知空塪其旁闇忽塪於深井臣故袷體濡履幾為大王取笑王曰天下之愚莫過于斯但貪前利不覩后患太子曰天下之愚復有甚者魯承周公之末有孔子之敎守仁抱徳無欲于隣國而齊舉兵伐之不愛民命惟有所獲夫齊徒舉而伐魯不知吴悉境内之士盡府庫之財暴師千里而攻之夫吴徒知踰境征伐非吾之國不知越王將選死士出三江之口入五湖之中屠我吴國滅我吴宫天下之危莫過于斯也吴王不聴太子之諫遂北伐齊越王聞吴王伐齊使范蠡洩庸率師屯海通江以絶吴路敗太子友于始熊夷始當作姑通江淮轉襲吴遂入吴國燒姑胥臺徙其大舟即餘皇舟也吴敗齊師于艾陵之上還師臨晉與定公争長未合邉候吴王夫差大懼合諸侯謀曰吾道遼逺無㑹前進孰利王孫駱曰不如前進則執諸侯之柄以求其志請王屬士以明其令勸之以髙位辱之以不従令各盡其死夫差昏秣馬食士服兵被甲勒馬銜枚出火於造闇行而進吴師皆文犀長盾扁諸之劔闔閭既鑄成干將莫耶二劒餘鑄得三千並號扁諸之劔方陣而行中校之軍皆白裳白髦素甲素羽之矰望之若荼王親秉鉞戴旗以陣而立左軍皆赤裳赤髦丹甲朱羽之矰望之若火右軍皆𤣥裳𤣥輿黒甲烏羽之矰望之如墨帶甲三萬六千雞鳴而定陣去晉軍一里天尚未明王乃親鳴金皷三軍譁吟以振其旅其聲動天徙地晉大驚不出反距堅壘乃令童褐請軍國語作董褐請事曰兩軍邉國語作偃兵接好日中無期今大國越次而造弊邑之軍壘敢請辭故國語辭作亂吴王親對曰天子有命周室卑弱約諸侯貢獻莫入王府上帝鬼神不可以告無姬姓之所振懼遣使来告冠盖不絶於道始周攸負於晉故忽於夷狄㑹晉今反叛如斯吾是以蒲服就君不肯長弟徒以争彊孤進不敢去君不命長為諸侯笑孤之事君決在今其不得事君命命當作亦在今日矣敢煩使者往來孤躬親聴命于藩籬之外童褐將還吴王躡左足與褐決及報與諸侯大夫列坐于晉定公前既以通命乃造趙鞅曰臣觀吴王之色類有大憂小則嬖妾嫡子死否則吴國有難大則越人入不得還也其意有愁毒之憂進退兩難不可與戰主君宜許之以前期無以争行而危國也然不可徒許必明其信趙鞅許諾入謁定公曰姬姓于周吴為先老可長以盡國禮定公許諾命童褐復命于是吴王愧晉之義乃退幕而㑹二國君臣並在吴王稱公前晉侯次之羣臣畢盟吴既長晉而還未踰於黄池越聞吴王久留未歸乃悉士衆將踰章山濟三江而欲伐之吴又恐齊宋之為害乃命王孫駱告勞于周曰昔楚不承供貢僻逺兄弟之國吾前君闔閭不忍其惡帶劒挺鈹與楚昭王相逐于中原天舎其忠國語忠作衷楚師敗績今齊不監于楚又不恭王命以逺辟兄弟之國夫差不忍其惡被甲帶劒徑至艾陵天福于吴齊師還鋒而退夫差豈敢自多其功是文武之徳所祐助時歸吴不熟于嵗遂縁江泝淮開溝深水出于商魯之間而歸告于天子執事周王答曰父伯命子來乎盟國一人則依矣余實嘉之伯父若能輔予一人則兼受多福周室何憂焉乃賜弓弩玉阼以増號諡以上所記與國語大同小異惟太子友之諫國語不載吴王還歸自黄池息民散兵越絶書昔者吴王夫差之時其民殷衆禾稼登熟兵革堅利其民習於鬭戰夫差乃違子胥之敎行有日發有時道於姑胥之門晝卧姑胥之臺覺寤而起其心惆悵如有所悔即召太宰嚭而占之曰向者晝卧夢入章明之宫入門見兩䥶炊而不蒸見兩黒犬嘷以南嘷以北見兩鏵倚吾宫堂見流水湯湯越吾宫牆見前園横索生樹桐見後房鍛者扶挾皷小震子為寡人精占之吉則言吉凶則言凶無䛕寡人之心所従太宰嚭對曰善哉大王興師伐齊夫章明者伐齊克天下顯明也見兩䥶炊而不蒸者大王聖氣有餘也見兩黒犬嘷以南嘷以北四夷已服朝諸侯也兩鏵倚吾宫堂夾田夫也見流水湯湯越吾宫牆獻物已至則有餘也見前園索生樹桐樂府吹巧也見後房鍛者扶挾皷小震者宫女皷樂也吴王大説而賜太宰嚭雜繒四十疋王心不已召王孫駱而告之對曰臣智賤能薄無方術之事不能占大王夢臣知有東掖門亭長越公弟子公孫聖為人㓜而好學長而憙遊博聞彊識通於方來之事可占大王所夢臣請召之吴王曰諾王孫駱移記曰今日壬午左校司馬王孫駱受教告東掖門亭長公孫聖吴王晝卧覺寤而心中惆悵也如有悔記到車馳詣姑胥之臺聖得記發而讀之伏地而泣有頃不起其妻大君従旁接而起之曰何若子性之大也希見人主卒得急記流涕不止公孫聖仰天歎曰嗚呼悲哉此固非女子所能知也今日壬午時加南方命屬蒼天不可逃亡伏地而泣者不能自惜但吴王諛心而言師道不明正言直諫身死無功大君汝彊食自愛慎勿相忘伏地而書既成篇即與妻把臂而訣涕泣如雨上車不顧遂至姑胥之臺謁見吴王吴王勞曰越弟子公孫聖也寡人晝卧姑胥之臺夢入章明之宫入門見兩䥶炊而不蒸見兩黒犬嘷以北嘷以南見兩鏵倚吾宫堂見流水湯湯越吾宫牆見前園横索生樹桐見後房鍛者扶挾皷小震子為寡人精占之吉則言吉凶則言凶無諛寡人心所従公孫聖伏地有頃而起仰天歎曰悲哉夫好船者溺好騎者墮君子各以所好為禍諛讒申者師道不明正言切諫身死無功伏地而泣者非自惜因悲大王夫章者戰不勝走傽偟明者去昭昭就㝠㝠見兩䥶炊而不蒸者王且不得火食見兩黒犬嘷以北嘷以南者大王身死魂魄惑也見兩鏵倚吾宫堂者越人入吴邦伐宗廟掘社稷也見水流湯湯越吾宫牆者大王宫堂虚也前園横索生樹桐者桐不為器用但為俑當與人俱葬後房鍛者皷小震者大息也王毋自行使臣下可矣太宰嚭王孫駱惶怖解冠幘肉袒而謝吴王忿聖言不祥乃使其身自受其殃王乃使力士石畨以鐵杖擊聖中㫁之為兩頭聖仰天歎曰蒼天知寃乎直言正諫身死無功令吾家無葬我提我山中後世為聲響吴王使人提於秦餘杭之山虎狼食其肉野火燒其骨東風至飛揚汝灰汝更能為聲哉太宰嚭前載拜曰逆言以滅讒諛以亡因酌行觴時可以行矣吴王曰諾王孫駱為左校司馬太宰嚭為右校司馬王従騎三千旌旗羽葢自處中軍伐齊大尅師兵三月不去過伐晉晉知其兵革之罷倦糧食盡索興師撃之大尅吴兵三月不去浮尸者不可勝數十八年越益彊越王句踐率兵使伐敗吴師於笠澤楚滅陳二十年越王句踐復伐吴二十一年遂圍吴史吴世家吴有士曰張胥鄙譚夫吾前交而後絶張胥鄙有罪拘將死譚夫吾合徒而取之出至於道而後乃知其夫吾也輟行而辭曰義不同于子故前交而後絶吾聞之君子不以危易行今吾従子是危而易行也與吾因子而生不若反拘而死闔閭聞之令吏釋之張胥鄙曰吾義不同于譚夫吾故不受其任也今吏以是出我以譚夫吾故免也吾庸遽受之乎遂觸牆而死譚夫吾聞之曰我任而不受佞也不知而出之愚也佞不可以接士愚不可以事君吾行虚矣人惡以吾力生吾亦耻以此立於世乃絶頸而死新序巻七吴越春秋二十年越王興師伐吴吴與越戰于檇李吴師大敗死者不可勝計越追破吴吴王困急使王孫駱稽首請成如越之來也越王對曰昔天以越賜吴吴不受也今天以吴賜越其可逆乎吾請獻勾甬東之地與君為二君可乎吴王曰吾之在周禮前王一飯如越王不忘周室之義而使為附邑亦寡人之願也行人請成惟君王有意焉大夫種曰吴為無道今幸擒之願王制其命越王曰吾將殘汝社稷夷汝宗廟吴王黙然請成七反越王不聴二十三年十月越王復伐吴吴困不能戰士卒分散城門不守遂屠吴吴王率羣臣遁去晝馳夜走三日三夕達于秦餘杭山胸中愁憂目視茫茫行走猖狂腹餒口饑顧得生稻而食之伏地而飲水顧左右曰此何名也對曰是生稻也吴王曰悲哉是公孫聖所言不得火食走傽偟也王孫駱曰飽食而去前有胥山在吴縣西四十里吴王取子胥尸浮之江中吴人憐之為立祠于江上因命曰胥山西坂中可以匿止王行有頃得生𤓰已熟掇而食之謂左右曰冬而生𤓰近道人不食何也左右曰謂糞種之物人不食也吴王曰何謂糞種左右曰盛夏之時人食生𤓰起居道旁子復生秋霜惡之故不食吴王嘆曰子胥所謂且食者也且字疑悮至秦餘杭山謂太宰嚭曰吾嘗戮公孫聖于斯山吾畏天下之慚足不能進心不能往太宰嚭曰死與生敗與成敢有避乎王曰然曽無所知乎子試前呼之聖在當即有聲吴王止秦餘杭山太宰嚭上山呼公孫聖三呼聖三應吴王大怖足行屬腐面如死灰曰寡人豈可返乎須臾越進兵三圍吴范蠡在中行左手提皷右手操枹而皷之吴王書其矢而射種蠡之軍辭曰吾聞狡兔已死良犬就烹敵國如滅謀臣必亡今吴病矣大夫何慮乎大夫種書矢射之曰上天蒼蒼若存若亡昔天以越賜吴吴不肯受是天所反句踐既得返國上天之功敬而受之不敢忘也且吴有大過五以至于亡王知之乎忠臣伍子胥忠諫而身死大過一也公孫聖正言身死無功大過二也太宰嚭愚而佞輕而讒妄語恣口聴而用之大過三也齊晉無反逆行無僣侈而吴伐之辱君臣毁社稷大過四也且吴與越同音共律上合星宿句踐無罪恒使其芻莖秣馬比于奴虜大過五也越王謹上􅀈青天敢不如命吴王曰今日聞命矣大夫種謂越君曰仲冬氣定天將殺戮不行天殺反受其殃越王敬拜曰諾今圖吴王將為何如大夫種曰君被五勝之衣帶步光之劔仗屈盧之矛瞋目大言以執之越王曰諾乃如大夫種辭吴王曰誠以今日聞命言有頃吴王不自殺越王復使謂曰何王之忍辱厚耻也世無萬嵗之君死生一也今子尚有遺榮何必使吾師衆加刄于王吴王仍未肯自殺句踐謂種蠡曰二子何不誅之種蠡曰臣人臣之位不敢加誅于人主願王急命之天誅當行不可久留越王復瞋目怒曰死者人之所惡惡者無罪于天不負于人今君抱五過不知愧辱而欲求生豈不鄙哉吴王乃太息四顧而望曰諾乃引劔而伏死越王謂太宰嚭曰子為臣不忠亡國滅君乃誅嚭并妻子吴王臨伏劔顧謂左右曰吾生既慙死亦愧矣使死者有知吾羞前君地下不忍覩伍子胥及公孫聖使其無知吾負于生死必連繴組以罩吾目恐其不蔽願復重羅繡三幅以為掩生不昭我明死勿見我形吾何可哉越王乃葬吴王以禮于秦餘杭上卑猶吴地記餘杭山别山卑猶今陽山越王使軍士人一隰一作累土以葬之宰嚭亦葬卑猶之旁合越絶書二十三年魯哀二十二年越敗吴越王句踐欲遷吴王夫差于甬東地志甬東今浙江寜波府翁洲山予百家居之吴王曰孤老矣不能事君王也吾悔不用子胥之言自令陷此遂自剄死越王滅吴誅太宰嚭以為不忠而歸史吴世家説苑正諌越襲吴吴王還與戰不勝使大夫行成于越不許吴王將死曰吾以不用子胥之言至于此令死者無知則已死者有知吾何面目以見子胥也遂蒙絮覆面而自刎越絶書請糴太宰嚭曰圖越惟以我拜為事王無憂王曰寡人屬子拜請早暮無時太宰嚭曰臣聞駟馬方馳驚前者斬其數必正若是越難成矣王曰子制之㫁之居三年越興師伐吴至五湖太宰嚭率徒謂之曰請戰者五父越王不忍而欲許之范蠡曰君王圖之廟廊失之中野可乎謀之七年須臾棄之王勿許吴也越王曰諾居軍三月吴自罷太宰嚭遂亡王率其有禄與賢良者遯而去越追之至餘杭山禽夫差殺太宰嚭越王使范蠡殺吴王蠡曰臣不敢殺主王曰刑之蠡曰臣不敢刑主越王親謂吴王曰昔者上蒼以越賜吴吴不受也夫申胥無罪而殺之進讒諛容身之徒殺忠信之士大過者三以至滅亡子知之乎吴王曰知之越王與之劍使自圖吴王旬日乃自殺也越王葬之于卑猶之山殺太宰嚭逢同與其妻子越絶書吴王不忍率其餘兵相將至秦餘杭之山饑餓足行乏糧視瞻不明據地飲水持籠稻而餐之顧謂左右曰此何名羣臣對曰是籠稻也吴王曰悲哉此公孫聖所言王且不得火食太宰嚭曰秦餘杭山西坂閒燕可以休息大王亟飱而去尚有十數里耳吴王曰吾嘗戮公孫聖於斯山子試為寡人前呼之即尚在邪當有聲響太宰嚭即上山三呼聖三應吴王大怖足行屬腐面如死灰色曰公孫聖令寡人得邦誠世世相事言未畢越王追至兵三圍吴大夫種處中范蠡數吴王曰王有過者五寜之知乎殺忠臣伍子胥公孫聖胥為人先知忠信中㫁之入江聖正言直諫身死無功此非大過者二乎夫齊無罪空復伐之使鬼神不血食社稷廢蕪父子離散兄弟異居此非大過者三乎夫越王句踐雖東僻亦得繋於天皇之位無罪而王恒使其芻莖秣馬比於奴虜此非大過者四乎太宰嚭䜛諛佞諂㫁絶王世聴而用之此非大過者五乎吴王曰今日聞命矣越王撫歩光之劒仗屈盧之弓瞋目謂范蠡曰子何不早圖之乎范蠡曰臣不敢殺主臣存主若亡今日遜敬天報微功越王謂吴王曰世無千嵗之人死一耳范蠡左手持皷右手操枹而皷之曰上天蒼蒼若存若亡何須軍士㫁子之頸挫子之骸不亦繆乎吴王曰聞命矣以三寸之帛㝠吾兩目使死者有知吾慚見伍子胥公孫聖以為無知吾耻生越王則解綬以㝠其目遂伏劔而死越王殺太宰嚭戮其妻子以其不忠信㫁絶吴之世夫差冢在猶髙西卑猶山越王使干戈人一累土以葬之近太湖三臺者太宰嚭逢同妻子死所在也安城里髙庫者句踐伐吴禽夫差以為勝兵築庫髙閣之周二百三十步説苑石益謂孫伯曰吴将亡矣吾子亦知之乎孫伯曰晚矣子之知之也吾何為不知石益曰然則子何不以諫孫伯曰昔桀罪諫者紂焚聖人剖王子比干之心袁氏之婦絡而失其紀其妾告之怒棄之夫亡者豈斯人知其過哉吴越春秋吴亡後越浮西施於江令隨鴟夷以終修文御覽引今本無墨子曰西施之沈其美也按諸書不載西施所終翟去滅吴未逺此言當必有據新序趙㐮子問於王子維曰吴之所以亡者何也對曰吴君􅈔而不忍㐮子曰宜哉吴之亡也􅈔則不能賞賢不忍則不能罰姦賢者不賞有罪不能罰不亡何待雜録吴王欲伐荆告其左右曰敢有諫者死舍人有少孺子者欲諫不敢則懐丸操弹遊于後園露沾其衣如是者三旦吴王曰子來何苦沾衣如此對曰園中有樹其上有蝉蝉髙居悲鳴飲露不知螳螂在其後也螳螂委身曲附欲取蝉而不知黄雀在其旁也黄雀延頸欲啄螳螂而不知弹丸在其下也此三者皆務欲得其前利而不顧其後之有患也吴王曰善哉乃罷其兵説苑正諫楚人伐吴吴使沮衞蹶融犒於楚師楚將軍曰縳之將以釁鼔問之曰汝來卜乎答曰卜卜吉乎曰吉楚人曰今楚將以女釁皷其何吉也答曰是故其所以吉也吴使臣來也固視將軍將軍怒將深溝髙壘將軍不怒將懈怠今也將軍殺臣則呉必警守矣且國之卜非為一臣卜夫殺一臣而存一國其不言吉何也且死者無知則以臣釁皷無益也死者有知也臣將當戰之時使皷不鳴楚人因不殺韓子説林下吴地記唐陸廣微撰泰伯在位四十九年無子弟仲雍立周繇王在位三十七年子態遂立周繇王不知何人豈即仲雍耶態遂在位四十九年子早軫立早軫在位五十九年子叙吾立叙吾在位三十八年兄處立處在位三十九年侄璧羽立璧羽在位三十六年子齊𤣥立齊𤣥在位五十年子柯盧立柯盧在位二十七年弟柯轉立柯轉在位二十四年子嬌立嬌在位二十四年姪鴟立鴟在位三十年子界嗣立界嗣在位三十五年子知濟立知濟在位二十七年子諸樊立知濟豈即夀夢耶諸樊缺餘濟在位十七年弟餘昩立餘昩在位二十一年子僚立子僚在位十三年堂弟子光立子光在位二十年子夫差立夫差在位二十三年為越所滅以上計二十五王治國總六百二十四年春秋戰國異辭卷三十七
