body:
  text: 春秋戰國異辭卷四十九右春坊右諭徳陳厚耀撰趙襄子趙襄子元年越滅吴襄子降喪食使楚隆問吴王襄子姊前為代王夫人簡子既葬未除服北登夏屋請代王使厨人操銅枓以食代王及従者行斟隂令宰人各以枓擊殺代王及従官遂興兵平代地其姊聞之泣而呼天摩笄自殺代人憐之所死地名之為摩笄之山遂以代封伯魯子周為代成君伯魯者襄子兄故太子太子蚤死故封其子史趙世家列女傳昔趙簡子之女襄子之姊為代王夫人簡子死既葬襄子未除服即登夏屋誘代王使厨人持斗以食代王及従者行斟隂令厨人各以斗擊殺之因舉兵平代地而迎其姊趙夫人夫人曰我受先君命事代王今有十餘年矣代無大故而主殘之今代已亡吾將奚歸且吾聞之婦人執一無二欲迎我何之以弟慢夫非義也以夫怨弟非仁也吾不敢怨亦不歸遂泣而呼天自殺于摩笄之地一説摩笄以自刺也故至今有摩笄之山初趙簡子病召太子而告之曰我死已葬服衰而上夏屋之山以望太子襄子也夏屋山代之南山也觀望欲令取代也太子敬諾簡子死已葬服衰召大臣而告之曰願登夏屋以望大臣皆諫曰登夏屋以望是遊也服衰以遊不可襄子曰此先君之命也寡人弗敢廢羣臣敬諾襄子上於夏屋以望代俗其樂甚美襄子曰先君必以此教之也及歸慮所以取代乃先善之代君好色請以其弟姉妻之代君許諾弟姉已往所以善代者乃萬故馬郡宜馬代君以善馬奉襄子襄子謁於代君而請觴之馬郡請先令舞者置兵其羽中數百人先具大金斗代君至酒酣反斗而擊之一成一成一下也腦塗地舞者以鬭盡殺其従者因以代君之車迎其妻其妻道聞之狀摩笄以自刺故趙氏至今有刺笄之證一作山與反斗之號吕覽長攻水經注趙襄子既害代王迎姊姊代夫人夫人曰以弟慢夫非仁也以夫怨弟非義也磨笄自刺而死使者自殺民憐之而立神屋於山側因名之為磨笄之山趙簡子薨而未葬而中牟畔之畔之一作入齊葬五日襄子興師而次之次一作圍圍未匝而城自壊者十丈襄子擊金而退之吏諫曰君誅中牟之罪而城自壊者是天助之也君曷為退之襄子曰吾昔聞之於叔向曰君子不乗人於利不厄人於險使之城然後攻之中牟聞其義而請降韓詩卷六新又淮南子道應序卷六知伯率韓魏攻趙趙襄子懼奔保晉陽原過従後至於王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙毋䘏原過既至以告襄子襄子齋三日親自剖竹有朱書曰趙毋䘏余霍泰山山陽侯天使也三月丙戍余將使女反滅知氏女亦我立百邑余將賜女林胡之地至于後世且有伉王亦黒龍面而鳥噣鬢麋髭髯大膺大胷脩下而馮左袵介乗奄有河宗至于休溷諸貉南伐晉别北滅黑姑㐮子再拜受三神之令三國攻晉陽嵗餘汾水灌其城城不浸者三版城中懸釡而炊易子而食羣臣皆有外心禮益慢惟髙共一作赫不敢失禮㐮子懼乃夜使相張孟同私於韓魏韓魏與合謀以三月丙戌三國反滅知氏共分其地於是襄子行賞髙共為上張孟同曰晉陽之難唯共無功襄子曰方晉陽急羣臣皆懈惟共不失人臣禮是以先之於是趙北有代南并知氏彊於韓魏遂祠三神於百邑使原過主霍泰山祠祀史趙世家又風俗通趙襄子出圍知伯圍襄子于晉陽三月張孟談私與韓魏搆謀反知伯軍使趙襄子殺之故曰出圍賞有功者五人髙赦為首張孟談曰晉陽之中赦無大功賞而為首何也襄子曰寡人之國危社稷殆身在憂約之中與寡人交而不失君臣之禮者惟赦吾是以先之仲尼聞之曰襄子可謂善賞矣賞一人而天下之為人臣莫敢失禮吕覽義賞汜韓子難一畧同又淮南子論髙赦作髙赫豫譲事中行之君智伯滅中行氏豫譲徙事智伯及趙襄子破智伯豫譲劑而而變容吞炭而為啞淮南子云豫譲落其齒以易其貎乞其妻所而妻弗識乃伏刺襄子五起而弗中襄子患之食不甘味一夕五易卧見不全身人謂豫譲曰子不死中行而反事其讐何無可耻之甚也今必碎身糜軀以為智伯何其與前異也豫譲曰我事中行之君與帷而衣之與闗而枕之夫衆人畜我我故衆人事之及智伯分吾以衣服饀吾以鼎寔舉被而為禮是以國士遇我我故國士報之新書卷之七吕覽恃君豫譲欲殺趙襄子滅鬚去眉自刑以變其容為乞人而往乞於其妻之所其妻曰狀貎無似吾夫者其音何類吾夫之甚也又吞炭以變其音其友謂之曰子之所道甚難而無功謂子有志則然矣謂子智則不然以子之才而求事襄子襄子必近子子得近而求事襄子甚易而功必成豫讓笑而應之曰是先知報後知也為故君賊新君矣大亂君臣之義者凡吾所為此者所以明君臣之義也非従易也又序意趙襄子遊於囿中至於梁馬却不肯進青荓為驂乗襄子曰進視梁下類有人青荓進視梁下豫譲却寝佯為死人叱青荓曰去長者吾且有事言将殺㐮子青荓曰少而與子友子且為大事而我言之是失相與友之道子將賊吾君而我不言之是失為人臣之道如我者惟死乃可適乃退而自殺又不侵豫譲之友謂豫譲曰子之行何其惑也子嘗事范氏中行氏諸侯盡滅之而子不為之報何故豫譲曰范氏中行氏我寒而不我衣我飢而不我食而時使我與千人共其養是衆人畜我也夫衆人畜我者我亦衆人事之至於智氏則不然出則乗我以車入則足我以養衆人廣朝而必加禮於吾所謂國士畜我也夫國士畜我者我亦國士事之繹史引史記索隠戰國策曰衣盡血出㐮子迴車車輪未周而亡今本亦無此語也趙襄子率徒十萬狩于中山藉芿燔林煽赫百里有一人従石壁中出隨煙燼上下衆謂鬼物火過徐行而出若無所經涉者襄子怪而留之徐而察之形色七竅人也氣息音聲人也問奚道而處石奚道而入火其人曰奚物而謂石奚物而謂火襄子曰而向之所出者石也而向之所涉者火也其人曰不知也魏文侯聞之問子夏曰彼何人哉子夏曰以商所聞夫子之言和者大同于物物無得傷閡者遊金石踏水火皆可也文侯曰吾子何不為之子夏曰刳心去智商未之能雖然試語之有暇矣文侯曰夫子奚不為之子夏曰夫子能之而能不為者也文侯大説列子黄帝地志山西和順縣有鹿苑相傳趙襄子養鹿處又有趙王臺狀如伏虎即襄子避暑地趙襄子踰句注山在今雁門破戎杜氏通典趙襄子攻翟勝之取左人中人左一作尤中一作終使使者來謁之謁告也襄子方食搏飯有憂色左右曰一朝而兩城下此人之所以喜也今君有憂色何襄子曰江河之大也不過三日飄風暴雨日中不須臾今趙氏之徳行無所施於積一朝而兩城下亡其及我乎孔子聞之曰趙氏其昌乎夫憂所以為昌也而喜所以為亡也勝非其難者也持之其難者也吕覽慎大應又淮南子道列子趙襄子使新穉穆子攻翟勝之取左人中人使遽人來謁之襄子方食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰夫江河之大也不過三日飄風暴雨不終朝日中不須臾今趙氏之徳行無所施於積一朝而兩城下亡其及我哉孔子聞之曰趙氏其昌乎夫憂者所以為昌也喜者所以為亡也勝非其難者也持之其難者也賢主以此持勝故其福及後世齊楚吴越皆常勝矣然卒取亡焉不達乎持勝也唯有道之主為能持勝趙氏攻中山中山之人多力者曰吾丘鴪衣鐵甲操鐵杖以戰而所擊無不碎所衝無不陷以車投車以人投人也幾至將所而後死将趙氏之將也近至其將所然後死言吾丘鴪力有餘也吕覽貴卒趙襄子之時以任登為中牟令上計言於襄子曰中牟有士曰膽胥已請見之襄子見而以為中大夫相國曰意者君耳而未之目耶為中大夫若此其見也非晉國之故襄子曰吾舉登也已耳而目之矣登所舉吾又耳而目之矣謂登之所舉不復假耳目也是耳目人終無已也遂不復問而以為中大夫吕覽知度韓子外儲左王登為中牟令上言於襄主曰中牟有士曰中章胥已者其身甚脩其學甚博君何不舉之主曰子見之我將為中大夫相室諫曰中大夫晉重列也今無功而受非晉臣之意君其耳而未之目耶襄主曰我取登既耳而目之矣登之所取又耳而目之是耳目人絶無已也王登一日而見二中大夫予之田宅棄其田耘賣宅囿而隨文學者邑之半少室周者貞廉潔慤者也為趙襄主力士與中牟徐子角力不若也入言之襄主以自代襄子曰子之處人之所欲也何為言徐子以自代曰臣以力事君者也今徐子力多臣臣不以自代恐他人言之而為罪也一曰少室周為襄主驂乗至晉陽有力士牛子耕與角力而不勝周言於主曰主之所以使臣騎乗者以臣多力也今有多力於臣者願進之韓子外儲左趙襄子問於王子維曰吴之所以亡者何也對曰吴君􅈔而不忍襄子曰宜哉吴之亡也􅈔則不能賞賢不忍則不能罰姦賢者不賞有罪者不罰不亡何待新序卷五趙襄主學御於王子期俄而與子期逐三易馬而三後襄子曰子之教我御術未盡也對曰術已盡用之則過也凡御之所貴馬體安於車人心調於馬而後可以進速致逺今君後則欲逮臣先則恐逮於臣夫誘道争逺非先則後也而先後心皆在于臣尚何以調於馬此君之所以後也韓子喻老趙襄子飲酒五日五夜不廢酒謂侍者我誠邦士也夫已飲酒五日五夜矣而殊不病優莫曰君勉之不及紂二日耳紂七日七夜今君五日襄子懼謂優莫曰然則吾亡也優莫曰不亡襄子曰不及紂二日耳不亡何待優莫曰桀紂之亡也遇湯武今天下盡桀也而君紂也桀紂並世焉能相亡然亦殆矣新序卷六襄子娶空同氏生五子襄子為伯魯之不立也不肯立子且必欲傳位與伯魯子代成君成君先死乃取代成君子浣立為太子襄子立三十三年卒浣立是為獻侯獻侯少即位治中牟襄子弟桓子逐獻侯自立于代一年卒國人曰桓子立非襄子意乃共殺其子而復迎立獻侯史趙世家史記趙襄子遂以代封伯魯子周為代成君伯魯者襄子兄故太子太子蚤死故封其子於是趙北有代南并知氏彊於韓魏其後娶空同氏生五子襄子為伯魯之不立也不肯立子且必欲傳位與伯魯子代成君成君先死乃取代成君子浣立為太子襄子立三十三年卒浣立是為獻侯獻侯少即位治中牟紀年晉烈公四年趙氏城平邑五年田公子居思伐趙鄙圖平邑獻侯獻侯十年中山武公初立徐廣曰西周桓公之子桓公者孝王弟而定王子也十三年城平邑十五年獻侯卒子烈侯籍立史趙世家春秋戰國異辭卷四十九
