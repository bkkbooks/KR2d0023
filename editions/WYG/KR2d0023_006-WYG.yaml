body:
  text: 春秋戰國異辭卷四右春坊右諭徳陳厚耀撰魯定公陳懐君栁使其大夫禱行聘於魯叔孫卿私曰吾國有聖人若知之乎陳大夫曰奚以果明其聖叔孫卿曰能廢心而用形陳大夫曰敝邑雖小亦有聖人異扵所聞曰聖人謂誰陳大夫曰有亢倉子者即庚桑楚偏得老耼之道能用耳視目聽定公聞而異焉使叔孫氏報聘且致亢倉子待以上卿之禮亢倉子至賔於亞寝魯公卑辭以問之亢倉子曰吾䏻視聽不用耳目非能易耳目之所用告者過也公曰孰如是寡人増異矣其道若何寡人願聞之亢倉子曰我體合扵心心合扵氣氣合於神神合扵無其有介然之有唯然之音雖逺際八荒之表邇在眉睫之内來扵我者吾必盡知之乃不知為是我七竅手足之所覺六腑五臓心慮之所知其自知而已矣亢倉子全道陳大夫聘魯私見叔孫氏叔孫氏曰吾國有聖人曰非孔丘耶曰是也何以知其聖乎叔孫氏曰吾嘗聞之顔回曰孔丘能廢心而用形陳大夫曰吾國亦有聖人子弗知乎曰聖人孰謂曰老耼之弟子有亢倉子者得耼之道䏻以耳視而目聽魯侯亢倉子魯侯作定公聞之大驚使上卿厚禮而致之亢倉子應聘而至魯侯卑辭請問之亢倉子曰傳之者妄我能視聽不用耳目不能易耳目之用魯侯曰此増異矣其道奈何寡人終願聞之亢倉子曰我體合扵心心合於氣氣合於神神合扵無其有介然之有唯然之音雖逺在八荒之外近在眉睫之内來干我者我必知之乃不知是我七孔四支之所覺心腹六臟之所知其自知而已矣魯侯大悦他日以告仲尼仲尼笑而不答列子仲尼楚昭王渡江有物大如斗直觸王舟止扵舟中昭王大怪之使聘問孔子孔子曰此名萍實令剖而食之惟覇者䏻獲之此吉祥也其後齊有飛鳥一足來下止扵殿前舒翅而跳齊侯大怪之又使聘問孔子孔子曰此名商羊急告民趣治溝渠天将大雨扵是如之天果大雨諸國皆水齊獨以安孔子歸弟子請問孔子曰異哉小兒謠曰楚王渡江得萍實大如拳赤如日剖而食之美如蜜此楚之應也皃又有兩兩相牽屈一足而跳曰天将大雨商羊起舞今齊獲之亦其應也夫謠之後未嘗不有應隨者也故聖人非獨守道而已也睹物記也即得其應矣説苑辨物家語季平子卒定公五年将以君之璠璵歛贈以珠玉孔子為中都宰聞之歴級而救焉曰送死而以寳玉是猶曝尸扵中原也其示民以姦利之端而有害扵死者安用之且孝子不順情以危親忠臣不兆姦以陷君乃止定公立五年夏季平子卒桓子嗣立桓子嬖臣曰仲梁懐與陽虎有隙陽虎欲逐懐公山不狃止之懐益驕陽虎執懐桓子怒陽虎因囚桓子與盟而釋之陽虎由此益輕季氏史孔子世家約左氏文季平子卒陽虎私怒囚季桓子與盟乃捨之七年齊伐我取鄆以為陽虎邑以從政八年陽虎欲盡殺三桓適而更立其所善庶子以代之載季桓子将殺之桓子詐而得脱三桓共攻陽虎陽虎居陽闗九年魯伐陽虎陽虎奔齊已而奔晋趙氏史魯世家陽虎為亂扵魯魯君令人閉城門而捕之得者有重賞失者有重罪圍三匝陽虎将舉劍而伯頥伯廹也門者止之曰天下探之不窮我将出子陽虎因赴圍而逐揚劍提戈而走門者出之顧反取其出之者以戈推之攘袪薄腋出之者怨之曰我非故與子反也為之䝉死被罪而乃反傷我宜矣其有此難也魯君聞陽虎失大怒問所出之門使有司拘之以傷者受大賞而不傷者被重罪此害之而反利也淮南子人間訓卞莊子好勇母無恙時三戰而三北交㳺非之國君辱之卞莊子受命顔色不變及母死三年冬魯興師卞莊子請從見扵魯将軍曰前猶與母處是以戰而北也今母沒矣請塞責遂走敵而鬬獲其甲首而獻之者三曰請以此塞三北将軍止之曰請為兄弟莊子曰夫北以養母也今母沒矣吾責塞矣吾聞之節士不以辱生遂奔敵殺十人而死韓詩卷十魯又新序卷八敢新序齊人欲伐忌卞莊子不過卞卞莊子魯卞邑大夫也性好勇嘗刺虎管豎子止之曰兩虎方食牛牛甘必争鬬則大者傷小者亡從傷而刺一舉必有兩獲莊子然之果獲二虎戰國筞顔淵侍坐魯定公扵臺東野畢御馬扵臺下定公曰善哉東野畢之御馬也顔淵曰善則善矣其馬将佚矣定公不説以告左右曰聞君子不譖人君子亦譖人乎顔淵退俄而廐人以東野畢馬敗聞矣定公揭席而起曰趣駕召顔淵顔淵至定公曰鄉寡人曰善哉東野畢之御也吾子曰善則善矣然其馬将佚矣不識吾子何以知之顔淵曰臣以政知之昔者舜工於使人造父工扵使馬舜不窮其民造父不極其馬故舜無佚民造父無佚馬也今東野畢之御也上車執轡御體正矣周旋步驟朝禮畢矣歴險致逺馬力殫矣然猶筞之不已所以知其佚也定公曰善可少進顔淵曰獸窮則齧齧一作觸鳥窮則喙人窮則詐自古及今窮其下而䏻不危者未之有也詩曰執轡如組兩驂如舞善御之謂也定公曰寡人之過也韓詩卷二荀又新序卷五又子哀公宓子賤治亶父恐魯君之聽説人而令已不得行其術也将辭而行請近吏二人於魯君與之俱至亶父吏皆朝宓子賤令吏二人書吏方将書宓子賤從旁掣摇其肘吏書之不善宓子賤為之怒吏甚患之辭而請歸宓子賤曰子之書甚不善子勉歸矣二吏歸報扵君曰宓子不可為書君曰何故吏曰宓子使臣書而時掣摇臣之肘書惡而又甚怒吏皆笑宓子此臣所以辭而去也魯君太息而歎曰宓子以此諫寡人之不肖也寡人之亂子而使宓子不得行其術必數有之矣微二人寡人幾過遂發所愛而令之亶父告宓子曰自今以來亶父非寡人之有也子之有也有便扵亶父者子决為之矣五嵗而言其要宓子敬諾乃得行其術扵亶父三年巫馬期短褐衣敝裘而往觀化於亶父見夜漁者得則舎之巫馬期問焉曰漁為得也今子得而舎之何也對曰宓子不欲人之取小魚也所舎者小魚也巫馬期歸告孔子曰宓子之徳至矣使民闇行闇夜若有嚴刑於旁敢問宓子何以至於此孔子曰丘嘗與之言曰誠乎此者形乎彼宓子必行此術於亶父也吕覽具備宓子賤為單父宰辭於夫子夫子曰毋迎而距也毋望而許也許之則失守距之則蔽塞譬如髙山深淵仰之不可極度之不可測也子賤曰善敢不承命乎説苑政理宓子賤為單父宰過於陽晝曰子亦有以送僕乎陽晝曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道奈何陽晝曰夫扱綸錯餌迎而吸之者陽鱎也其為魚薄而不美若存若亡若食若不食者魴也其為魚也博而厚味宓子賤曰善於是未至單父冠葢迎之者交接於道子賤曰車驅之車驅之夫陽晝之所謂陽鱎者至矣於是至單父請其耆老尊賢者而與之共治單父説苑政理宓子賤治單父有若見之曰子何臞也宓子曰君不知賤不肖使治單父官事急心憂之故臞也有若曰昔者舜鼓五絃歌南風之詩而天下治今以單父之細也治之而憂治天下将奈何乎故有術而御之身坐於廟堂之上有處女子之色無害扵治無術而御之身雖瘁臞猶未有益韓子外儲左子賤治單父彈鳴琴地志今山東單縣有琴䑓即子賤鳴琴處身不下堂而單父治巫馬期以星出以星入日夜不處以身親之而單父亦治巫馬期問扵子賤子賤曰我任人子任力任人者佚任力者勞人謂子賤則君子矣佚四肢全耳目平心氣而百官理任其數而已巫馬期則不然乎然勞力教詔雖治猶未至也韓詩卷二吕覽察賢宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故於宓子宓子曰我之謂任人子之謂任力任力者故勞任人者故逸淮南道應季子治亶父三年季子子賤也而巫馬期絻衣短褐易容貎往觀化焉見得魚釋之巫馬期問曰凡子所為漁者欲得也今得而釋之何也漁者對曰季子不欲人取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰季子之徳至矣使人闇行若有嚴刑在其側者季子何以至於此孔子曰丘嘗問之以治言曰誠扵此者形扵彼季子必行此術也子賤治單父其民附孔子曰告丘所以治之者對曰不齊時發倉廩振困窮補不足孔子曰是小人附耳未也對曰賞有能招賢才退不肖孔子曰是士附耳未也對曰所父事者三人所兄事者五人所友者十有二人所師者一人孔子曰父事者三人兄事者五人足以教弟矣友者十有二人足以袪壅蔽矣師者一人足以慮無失筞舉無敗功矣惜乎不齊為之大功乃與堯舜叅矣韓詩八卷孔子謂宓子賤曰子治單父而衆説語丘所以為之者曰不齊父其父子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友者十一人孔子曰父事三人可以教孝矣兄事五人可以教弟矣友十一人可以教學矣中節也中民附矣猶未足也曰此地民有賢扵不齊者五人不齊事之皆教不齊所以治之術孔子曰欲其大者乃扵此在矣昔者堯舜清微其身以聽觀天下務來賢人夫舉賢者百福之宗也而神明之主也不齊之所治者小也不齊所治者大其與堯舜繼矣説苑政理賔有見人於宓子者賓出宓子曰子之賔獨有三過望我而笑是攓也攓慢談語而不稱師是返也交淺而言深是亂也賔曰望君而笑是公也談語而不稱師是通也交淺而言深是忠也淮南子齊俗訓宓子治亶父扵是齊人攻魯過亶父始父老請曰麥已熟矣今廹齊冦民不及刈穫請令民人出自刈附郭者歸可以益食且不資㓂三請宓子弗聽俄而麥畢資於齊冦季孫聞之怒使人讓宓子曰豈不可哀哉民乎寒耕熱耘曽弗得食也弗知猶可聞或以告而夫子弗聽宓子蹴然曰今年無麥明年可樹令不耕者得獲是樂有冦也且一嵗之麥扵魯不加彊喪之不加弱令民有自取之心其創必數年不息季孫聞之慙曰使穴可入吾豈忍見宓子哉新書卷之二子路治蒲三年孔子過之入境曰善哉由也恭敬以信矣入邑曰善哉由也忠信以寛矣至庭曰善哉由也明察以斷矣子貢執轡而問曰夫子未見由而三稱善可得聞乎孔子曰入其境田疇草萊甚闢此恭敬以信故民盡其力入其邑墉屋甚尊樹木甚茂此忠信以寛故其民不偷入其庭甚閒此明察以斷故其民不擾也韓詩卷六季桓子以粟千鍾餼夫子夫子受之而不辭既而以頒門人之無者子貢進曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之意乎子曰何對曰季孫以為恵也子曰然吾得千鍾所以受而不辭者為季孫之恵且以為寵也夫受人財不以成富與季孫之惠扵一人豈若惠數百人哉孔叢子上吕覽舉難季孫氏刼公家孔子欲諭術則見外扵是受養而便説魯國以訾孔子曰龍食乎清而㳺乎清螭食乎清而㳺乎濁魚食乎濁而㳺乎濁今丘上不及龍下不若魚丘其螭耶夫欲立功者豈得中繩哉救溺者濡追逃者趨孔子初仕為中都宰定公九年制為養生送死之節長幼異食强弱異任男女别塗路不拾遺器不雕偽為四寸之棺五寸之槨因丘陵為墳不封不樹行之一年而四方之諸侯則焉定公謂孔子曰學扵此法以治魯國何如孔子對曰雖天下可乎何但魯國而已哉扵是二年定公以為司空乃别五土之性而物各得其所生之宜咸得厥所家語符子魯侯欲以孔子為司徒将召三桓而議之乃謂左丘明曰寡人欲以孔子為司徒而授以魯政焉寡人将欲訽諸三子左丘明曰孔丘聖人與夫聖人在政過在離位焉君雖欲謀其弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珍羞者為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言未卒狐相率逃扵重丘之下羊相呼藏扵深林之中故周人十年不制一裘五年不具一牢何者用人之謀失之也今君欲以孔子為司徒召三桓而議之亦與狐謀裘與羊謀羞哉扵是魯侯不與三桓謀而用孔子定公十年孔子為司空十一年為大司㓂公羊傳疏孔子為魯司㓂見季康子康子當作桓子康子不悦孔子又見之宰予進曰昔予也嘗聞諸夫子曰王公不我聘則弗動今夫子之扵司冦也日少而屈節數矣不可以已乎孔子曰然魯國以衆相陵以兵相暴之日久矣而有司不治則将亂也其聘我者孰大扵是哉魯人聞之曰聖人将治何不先自逺刑罰自此之後國無争者孔子謂宰予曰違山十里蟪蛄之聲猶在扵耳故政事莫如應之孔子家語理又説苑政孔子為魯司㓂七日而誅少正夘於東觀之下門人聞之趨而進至者不言其意皆一也子貢後至趨而進曰夫少正夘者魯國之聞人也夫子始為政何以先誅之孔子曰賜也非爾所及也夫王者之誅有五而盜竊不與焉一曰心辨而險二曰言偽而辨三曰行辟而堅四曰志愚而博五曰順非而澤此五者皆有辨知聰達之名而非其真也茍行以偽則其知足以移衆强足以獨立此姦人之雄也不可不誅夫有五者之一則不免扵誅今少正夘兼之是以先誅之也昔者湯誅蠋沐太公誅潘阯管仲誅史附里子産誅鄧析此五子未有不誅也所謂誅之者非為其晝則攻盗暮則穿窬也皆傾覆之徒也此固君子之所疑愚者之所惑也詩云憂心悄悄愠于羣小此之謂也説苑指武孔子為魯攝相朝七日而誅少正夘門人進問曰夫少正夘魯之聞人也夫子為政而始誅之得毋失刑乎子曰居吾語女其故人有惡者五而盗竊不與焉一曰心達而險二曰行辟而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於人則不得免扵君子之誅而少正夘兼有之故居䖏足以聚徒成羣言談足以飾邪營衆彊足以反是獨立此小人之桀雄也不可不誅也是以湯誅尹諧文王誅潘止周公誅管叔太公誅華仕管仲誅付里乙子産誅鄧析史付淮南詮言鄧析巧辨而亂法子産誅之此七子者皆異世同心不可不誅也詩曰憂心悄悄愠于羣小小人成羣斯足憂矣茍子宥坐孔子攝行相事有喜色乃誅大夫亂政者少正夘與聞國政三月鬻羔豚者弗飾賈男女行者别扵塗塗不拾遺四方之客至乎邑者不求有司皆予之以歸淮南子初魯之販羊有沈猶氏者常朝飲其羊以詐市人有公慎氏者妻淫不制有慎潰氏奢侈踰法魯之鬻六畜者飾之以儲價及孔子之為政也沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏越境而徙三月則鬻牛馬者不儲價賣羊豚者不加飾男女行者别其塗道不拾遺男尚忠信女尚貞順四方客至扵邑者不求有司皆如歸焉家語孔子為魯司㓂斷獄訟皆進衆議者而問之曰子以為奚若某以為何若皆曰云云如是然後夫子曰當從某子幾是家語孔子為魯司㓂有父子訟者孔子拘之三月不别其父請止孔子舎之季孫聞之不悦曰是老也欺予語子曰為國家必以孝今殺一人以戮不孝又舎之冉子以告孔子慨然歎曰嗚呼上失之下殺之其可乎不教其民而聽其獄殺不辜也三軍大敗不可斬也獄犴不治不可刑也罪不在民故也嫚令謹誅賊也今有時歛也無時暴也不告而責成功虐也已此三者然後刑可即也書曰義刑義殺勿庸以即予維曰未有順事言先教也故先王既陳之以道上先服之若不可尚賢以綦之若不可廢不能以單之綦三年而百姓往矣邪民不從然後俟之以刑則民知罪矣詩曰尹氏太師維周之氐秉國之均四方是維天子是庳卑讀為俾民不迷是以威厲而不試刑錯而不用此之謂也今之世則不然亂其教繁其刑其民迷惑而墮焉則從而制之是以刑彌繁而邪不勝三尺之岸而虛車不能登也百仞之山任負車登焉何則陵遲故也數仞之牆而民不踰也百仭之山而豎子馮而㳺焉陵遲故也今夫世之陵遲亦久矣而能使民勿踰乎荀子宥坐與家語小異説苑政理魯有父子訟者康子曰殺之孔子曰未可殺也夫民不知子父訟之不善者久矣是則上過也上有道是人亡矣康子曰夫治民以孝為本今殺一人以戮不孝不亦可乎孔子曰不教而誅之是虐殺不辜也三軍大敗不可誅也獄訟不治不可刑也上陳之教而先服之則百姓從風矣躬行不從而後俟之以刑則民知罪矣夫一仭之牆民不能踰百仞之山童子升而㳺焉陵遲故也今仁義之陵遲久矣能謂民弗踰乎詩曰俾民不迷昔者君子𨗳其百姓不使迷是以威厲而不至刑錯而不用也扵是訟者聞之乃請無訟孔子退朝門人子路難曰父子訟道耶孔子曰非也子路曰然則夫子胡為免之也孔子曰不戒責成害也慢令致期暴也不教而誅賊也君子為政避此三者且詩曰載色載笑匪怒伊教韓詩卷三定公問曰周書所謂庸庸祗祗威威顯民何謂也孔子對曰不失其道明之於民之謂也夫能用可用則正治矣敬可敬則尚賢矣畏可畏則服刑恤矣君審此三者以示民而國不興未之有也孔叢子上孔子始用扵魯魯鷖誦之曰麛裘而鞞投之無戾鞞之麛裘投之無郵及三月政成化既行又誦之曰衮衣章甫實獲我所章甫衮衣恵我無私古詩紀引吕氏春秋今吕氏春秋無又誦數語定公十年齊大夫黎鉏言扵景公曰魯用孔丘其勢危齊乃使使告魯為好㑹㑹扵夾谷定公且以乗車往孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公從之至㑹所為壇位土階三等以遇禮相見揖讓而登獻酢既畢齊使菜人以兵鼓譟而至刼定公孔子歴階而進以公退曰士兵之吾兩君為好裔夷之俘敢以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好扵神為不祥扵徳為􅄽義扵人為失禮君必不然齊侯心怍麾而避之有頃齊奏宫中之樂俳優侏儒戲扵前孔子趨進歴階而上不盡一等曰匹夫熒惑諸侯者罪應誅請命司馬速加刑焉扵是斬侏儒手足異處齊侯懼有慙色與左定十年少别齊侯歸責其羣臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使寡人得罪扵魯君有司進對曰君子有過則謝以質小人有過則謝以文君若憚之則謝以實扵是齊侯乃歸所侵魯之鄆讙汶陽龜陰之田合史記及家語仲尼相魯景公患之謂晏子曰隣國有聖人敵國之憂也今孔子相魯若何晏子曰君其勿憂彼魯君弱主也孔子聖相也君不如陰重孔子設以相齊孔子强諫而不聽必驕魯而之齊君勿納也居朞年孔子去魯之齊景公不納晏子卷四十二年使仲由毁三桓城收其甲兵孟氏不肯墮城城當作郕伐之不克而止季桓子受齊女樂孔子去史魯世家孔子相魯齊人聞而懼曰孔子為政必覇覇則吾地近焉我之為先并矣盍致地焉犁鉏曰請先嘗沮之沮之而不可則致地庸遲乎扵是選齊國中女子好者八十人皆衣文衣而舞康樂康樂一作容璣文馬四十駟以遺魯君陳女樂列文馬於魯城南髙門外季桓子微服往觀再三將受乃語魯君為周道㳺往觀怠扵政事子路曰夫子可以行矣孔子曰魯今且郊如致膰肉扵大夫是則未廢其常吾猶可以止桓子卒受女樂三日不聽政郊又不致膰爼於大夫孔子遂行宿乎郭屯師已送曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口可以出走彼婦之謁可以死敗優哉㳺哉聊以卒嵗師已反桓子曰孔子亦何言師已以實告桓子喟然嘆曰夫子罪我以羣婢故也夫合史記及家語韓子内儲下仲尼為政扵魯道不拾遺齊景公患之黎且謂景公曰去仲尼猶吹毛耳君何不迎之以重禄髙位遺魯君女樂以驕其意魯君新樂之必怠扵政仲尼必諌諫必輕絶扵魯景公曰善乃令黎且以女樂六遺哀公哀公樂之果怠扵政仲尼諫不聽去而之楚此定公時事誤作哀公季桓子受齊女樂孔子欲諫不得退而望魯龜山作操以喻季氏之蔽魯也曰予欲望魯兮龜山蔽之手無斧柯奈龜山何琴操十五年定公卒子将立是為哀公史魯世家春秋戰國異辭卷四
