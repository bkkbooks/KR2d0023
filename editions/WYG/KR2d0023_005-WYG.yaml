body:
  text: 春秋戰國異辭卷三右春坊右諭徳陳厚耀撰魯史魯世家節文周公旦武王弟也佐武王破殷封于少昊之墟曲阜是為魯公周公不就封留佐武王武王既崩成王少在襁褓之中周公于是卒相成王而使其子伯禽代就封于魯魯有天子禮樂者以褒周公之徳也周公卒子伯禽固已前受封是為魯公伯禽即位之後淮夷徐戎並反於是伯禽率師伐之於肸作肸誓遂平徐戎定魯魯公伯禽卒徐廣曰皇甫謐云伯禽以成王元年封四十六年康王十六年卒子考公酋立考公四年卒弟熙立是為煬公煬公築茅闕門六年卒子幽公宰立幽公十四年弟㵒殺幽公而自立是為魏公魏公五十年卒子厲公擢立厲公三十七年卒魯人立其弟具是為獻公獻公三十二年卒子真公濞立真公十四年周厲王無道出奔彘共和行政二十九年周宣王即位三十年真公卒弟敖立是為武公武公九年春武公與長子括少子戯西朝周宣王宣王愛戱欲立戯為魯太子周之樊仲甫諫詳國語宣王弗聽卒立戯為魯太子夏武公歸而卒戯立是為懿公懿公九年懿公兄括之子伯御與魯人攻弑懿公而立伯御為君伯御即位十一年周宣王伐魯殺其君伯御而問魯公子能道順諸侯者以為魯後樊穆仲曰魯懿公弟稱肅恭明神敬事耆老賦事行刑必問於遺訓而咨於故實不干所問不犯所知宣王曰然能訓治其民矣乃立稱於夷宫是為孝公孝公魯公子稱之保母臧氏之黨也與子俱入宫養公子稱當懿公時伯御攻懿公自立求公子稱於宫將殺之母乃衣其子以稱衣卧於稱所伯御入殺之母乗間抱稱以出遇稱舅魯大夫於宫門舅問稱死乎母曰幸天之靈公子在此舅曰何以得免母曰以吾子代之母遂逃十一年魯大夫知稱在保母遂請於周殺伯御立公子稱是為孝公也列女傳二十七年孝公卒子弗湟立是為惠公史魯世家恵公魯恵公使宰讓請郊廟之禮於天子桓王使史角往賜所請也恵公止之止留也其後在魯學於墨子吕覽當染四十六年恵公卒長庶子息攝當國行君事是為隠公史魯世家隠公初恵公適夫人無子公賤妾聲子生子息息長為娶於宋宋女至而好恵公奪而自妻之生子允登宋女為夫人以允為太子及恵公卒為允少故魯人共令息攝政不言即位與左傳異隠公五年觀漁於棠八年與鄭易天子之太山之邑祊及許田君子譏之以上史魯世家十一年冬公子揮謟謂隠公曰百姓便君君其遂立吾請為君殺子允君以我為相隠公曰有先君命吾為允少故攝代今允長矣吾方營莬裘之地而老焉以授子允政揮懼子允聞而反誅之乃反譖隠公於子允曰隠公欲遂立去子子其圗之請為子殺隠公子允許諾十一月隠公祭鍾巫齋於社圃館於蒍氏揮使人弑隠公於蔿氏而立子允為君是為桓公史魯世家桓公桓公元年鄭以璧易天子之許田二年以宋之賂鼎入於太廟君子譏之以上史魯世家三年使揮迎婦於齊為夫人六年夫人生子與桓公同日故名曰同同長為太子史魯世家魯桓公㑹襄公於濼遂與夫人姜氏如齊齊人刺之賦敝笱子貢詩傳而詩説亦云魯桓與夫人文姜如齊襄公通焉故齊人刺之詩序敝笱刺文姜也齊人惡魯桓公微弱不能防閑文姜使至淫亂為二國患焉十八年春公將有行遂與夫人如齊申繻諌止公不聽遂如齊齊襄公通桓公夫人公怒夫人夫人以告齊侯夏四月丙子齊襄公饗公公醉使公子彭生抱魯桓公因命彭生摺其脅公死於車魯人告於齊曰寡君畏君之威不敢寜居來修好禮禮成而不反無所歸咎請得彭生以除醜於諸侯齊人殺彭生以説魯立太子同是為莊公莊公母夫人因留齊不敢歸魯史魯世家約左傳文管子魯桓公夫人文姜齊女也公将如齊與夫人皆行申俞諌公不聽文姜通於齊侯桓公聞責文姜文姜告齊侯齊侯怒饗公使公子彭生乗魯侯脅之公薨於車豎曼曰賢者死忠以振疑百姓寓焉智者究理而長慮身得免焉今彭生二於君無盡言而諛行以戯我君使我君失親戚之禮命又力成吾君之禍以搆二國之怨彭生其得免乎禍理屬焉夫君以怒遂禍不畏惡親聞容昏生無醜也豈及彭生而能止之哉魯若有誅必以彭生為説二月魯人告齊齊人為殺彭生以謝於魯魯連子展無所人名為魯君使遺齊襄君鴻至澠而浴鴻鴻失其装在御者曰鴻之毛物可使若一能買鴻耳無所曰吾非不能買鴻也上隠君下易弊無所不敢莊公齊榖告也王姬之喪莊公二年王姫襄公夫人魯莊公為之大功或曰由魯嫁故為之服姊妹之服或曰外祖母也故為之服檀弓下莊公五年冬伐衛内衛恵公史魯世家八年齊公子糾來奔九年魯欲內子糾於齊後桓公桓公發兵擊魯魯急殺子糾召忽死齊告魯生致管仲魯人施伯曰齊欲得管仲非殺之也将用之用之則為魯患不如殺以其尸與之莊公不聽遂囚管仲與齊齊人相管仲史魯世家約左氏文魯莊公及宋人戰於乗丘莊公十年縣賁父御􅁲國為右馬驚敗績公隊佐車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之士之有誄自此始也檀弓上驚魯勝乗丘而云馬公隊未足信也十三年魯莊公與曺沫㑹齊桓公於柯曹沫刼齊桓公求魯侵地已盟而釋桓公桓公欲背約管仲諫卒歸魯侵地史魯世家魯莊公好力曹沫為魯将與齊戰三敗北莊公懼乃獻遂邑之地以和猶復以為将齊桓公許與魯㑹於柯而盟盟柯在魯莊十三年桓公與莊公既盟於壇上曹沫執匕首刼齊桓公管子云莊公與曹翽並納劍於懐而求割地桓公左右莫敢動而問曰子将何欲曹沫曰齊强魯弱而大國侵魯亦以甚矣今魯城壊即壓齊境君其圗之桓公乃許盡歸魯之侵地既已言曹沫投其匕首下壇北面就羣臣之位顔色不變辭令如故桓公怒欲倍其約管仲曰不可夫貪小利以自快棄信於諸侯失天下之援不如與之於是桓公乃遂割魯侵地曹沫三戰所亡地盡復予魯史刺客傳事見公羊莊十三年而文少别十五年齊桓公始覇二十三年公如齊觀社以上史魯世家齊起兵攻魯魯患之栁下恵見齊侯齊侯曰魯君懼乎曰不懼齊侯忿然怒曰何也栁下惠曰臣之君所以不懼者以其先君出周南門刳羊相約曰自後子孫敢有鬪攻者令其罪若刳羊臣之君固以刳羊不懼矣不然百姓非不急也齊侯乃解兵三百里説苑說苑昔者齊無故起兵攻魯魯君患之召其相曰為之奈何相對曰夫柳下惠少好學長而嘉智主君試召使於齊魯君曰吾千乘主也身自致於齊齊不聽夫柳下惠特布衣韋帶之士也使之又何益乎相對曰臣聞之乞火不得不望其炮矣今使柳下惠於齊縱不解於齊兵終不愈益攻於魯矣魯君乃曰然乎相即使人召柳下惠來入門祛衣不趨魯君避席而立曰寡君所謂饑而求黍稷渇而穿井者未嘗能以歡喜見子今國事急百姓恐懼願藉子大夫使齊柳下惠曰諾乃東見齊侯齊侯曰魯君將懼乎柳下惠曰臣君不懼齊侯忿然怒曰吾望而魯城芒若類失亡國百姓發屋伐木以救城郭子曰不懼何也栁下惠曰臣之君所以不懼者以其先人出周封於魯君之先君亦出周封於齊相與出周南門刳羊而約曰自後子孫敢有相攻者令其罪若此刳羊矣臣之君固以刳羊不懼矣不然百姓非不急也齊侯乃解兵三百里夫栁下惠特布衣韋帶之士至解齊釋魯之難奈何無賢士聖人乎春秋繁露昔者魯君問於柳下惠曰我欲攻齊如何栁下惠曰不可退而有憂色曰吾聞之也謀伐國者不問於仁人也此何為至於我風俗通柳下惠不枉道以事人故三黜而不去孔子謂之不恭符子鄰人謂展禽曰魯聘夫子夫子三黜無憂何也禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯枯茂非四時之悲欣榮辱豈吾心之憂喜淮南子柳下惠見飴曰可以養老盜蹠見飴曰可以黏牡見物同而用之異韓詩外傳柳下惠殺身以成其信家語魯人有獨處室者鄰之嫠婦亦獨處於室夜暴風雨至嫠婦室壊趨而託焉魯人閉户而不納嫠婦自牖與之言子何不仁而不納我乎魯人曰吾聞男女不六十不同居今子㓜吾亦㓜是以不敢納爾也婦人曰子何不如柳下惠然嫗不建門之女國人不稱其亂魯人曰柳下惠則可吾固不可吾將以吾之不可學柳下惠之可孔子聞之曰善哉欲學柳下惠者未有似於此者期於至善而不䙝其為可謂智乎東野稷以御見莊公進退中繩左右旋中規莊公曰善以為造父不過也使之駒百而少及焉顔闔入見莊公曰子遇東野稷乎對曰然臣遇之顔闔在春秋後盖魯繆公時人莊公疑誤其馬必敗莊公曰将何敗少頃東野之馬敗而至莊公召顔闔而問之曰子何以知其敗也顔闔對曰夫進退中繩左右旋中規造父之御無以過焉向臣遇之猶求其馬臣是以知其敗也吕覽適威作又莊子達生小異又家語東野畢定公顔回魯君聞顔闔得道之人也使人以幣先焉顔闔守陋閭苴布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家耶顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之使者還反審之復來求之則不得矣莊子讓王生又呂覽貴慎子魯莊公鑄大鐘曹劌入見曰今國褊而鐘大君何不圖之説苑夏公如齊逆女莊公二十四年何以書親迎禮也其禮奈何曰諸侯以屨二兩加琮大夫庶人以屨二兩加束脩二曰某國寡小君使寡人奉不珍之琮不珎之屨禮夫人貞女夫人曰有幽室數辱之産未諭於傅母之教得承執衣裳之事敢不敬拜祝祝答拜夫人受琮取一兩屨以履女正笄衣裳而命之曰往矣善事爾舅姑以順為宫室無二爾心無敢回也女拜乃親引其手授夫手户夫引手出户夫行女從拜辭父於堂拜諸母於大門夫先升輿執轡女乃升輿轂三轉然後夫下先行大夫士庶人稱其父曰某之父某之師友使某執不珍之屨不珍之束脩敢不敬禮某氏貞女母曰有草茅之産未習於織紝紡績之事得奉執箕箒之事敢不敬拜三十二年公薨初莊公築臺臨黨氏見孟女説而愛之許立為夫人割臂以盟孟女生子斑斑長説梁氏女往觀圉人犖自牆外與梁氏女戯斑怒鞭犖莊公聞之曰犖有力焉遂殺之是未可鞭而置也斑未得殺左傳異莊公有三弟長曰慶父次曰叔牙次曰季友莊公取齊女為夫人曰哀姜無子哀姜娣曰叔姜生子開莊公無適嗣愛孟女欲立其子斑莊公病而問嗣於弟叔牙叔牙曰一繼一及魯之常也慶父在可為嗣君何憂莊公患叔牙欲立慶父退而問季友季友曰請以死立斑也莊公曰曩者叔牙欲立慶父奈何季友以莊公命命牙待於鍼巫氏使鍼季刼飲叔牙以鴆曰飲此則有後奉祀不然死且無後牙遂飲鴆而死魯立其子為叔孫氏八月莊三十二年莊公卒季友竟立子斑為君如莊公命侍喪舍於黨氏未至公宫止于舅氏先時慶父與哀姜私通欲立哀姜娣子開及莊公卒而季友立斑十月慶父使圉人犖殺魯公子斑於黨氏季友奔陳慶父竟立莊公子開是為湣公史魯世家約左氏文湣公湣仝閔魯莊公之喪既葬而絰不入庫内莊公薨子般弑慶父作亂閔公時年八嵗葬畢即除凶服扵庫門之外而以吉服嗣位故云絰不入庫門士大夫既卒哭麻不入檀弓下湣公二年慶父與哀姜通益甚哀姜與慶父謀殺湣公而立慶父慶父使卜齮襲殺湣公於武闈季友聞之自陳與湣公弟申如邾請魯求內之魯人欲誅慶父慶父恐奔莒於是季友奉子申入立之是為釐公釐同僖釐公亦莊公少子哀姜恐奔邾季友以賂如莒求慶父慶父歸使人殺慶父慶父請奔弗聽乃使大夫奚斯行哭而往慶父聞奚斯音乃自殺齊桓公聞哀姜與慶父亂以危魯乃召之邾而殺之以其尸歸戮之魯魯釐公請而葬之季友母陳女故亡在陳陳故佐送季友及子申季友之將生也父魯桓公使人􅁲之曰男也其名曰友間於兩社為公室輔季友亡則魯不昌及生有文在掌曰友遂以名之號為成季其後為季氏慶父後為孟氏也史魯世家僖公僖公元年以汶陽鄪封季友季友為相史魯世家魯僖公三年夏四月不雨六月雨公憂閔避舎釋更徭之府罷軍㓂之誅去苛刻峻文􅆭毒之教所蠲浮令三十五事禱已舍齋南郊雨大澍春秋考異春秋考異郵僖公三年春夏不雨於是僖公憂閔𤣥服避舎釋更徭之府罷軍㓂之誅去苛刻峻文慘毒之教所蠲浮令三十五事曰方今大旱野無生稼寡人當死百姓何罪不敢煩人請命願撫萬人害以身塞無狀禱已舍齋南郊雨大㴻僖公能遵伯禽之法儉以足用寛以愛民務農重榖牧於坰野魯人尊之於是季孫行父請命於周而史克作頌曰駉詩序詩説入魯風駉史克美僖公考牧之詩僖公城楚丘以備戎太史克頌之賦楚宫詩傳毛詩説同詩序作定之方中美衛文公也僖公獻㨗於太廟史克美之賦泮水詩傳入魯風詩説入魯風僖公作泮宫而落其成太史克頌禱之詞詩序泮水頌僖公能修泮宫也僖公八年始用郊禘史克頌之賦閟宫詩傳入魯風詩説入魯風魯僖公新作后稷文王之廟於太廟世室及孝恵桓莊四親廟之上而史克作詩以頌之非孔子所錄也詩序閟宫頌僖公能復周公之宇也僖公燕其臣史克頌之賦有駜詩傳入魯風詩序有駜頌僖公君臣之有道也詩説入魯風有駜燕飲而頌禱之詞臧文仲将為魯使至齊其母送之曰汝刻而無恩好盡人力窮人以威魯國不容子矣而使子之齊凡奸将作必於動變子其扵斯發事乎汝其戒之魯與齊通璧璧鄰之國也魯之寵臣多怨汝又皆通於齊髙子國子是必使齊圖魯而拘汝留之難乎其免也汝必施恩布恵而後出以求助焉後俱如母言列女傳彤管遺編臧文仲使齊其母送而戒之至齊果拘之齊欲伐魯文仲微使人遺魯公書恐齊得之乃謬辭辭魯公與諸大夫莫䏻知乃召其母問之母泣下襟曰吾子拘有木治矣魯以臧母之言軍於境上齊知有備乃還文仲而不伐魯列女傳臧文仲将為魯使齊其母送之曰汝刻而無恩好盡人力窮人以為威魯國不容子矣凡奸之作必於變動害子者其於斯𤼵事乎魯之寵臣多怨汝者又能通扵齊髙子國子是必使齊圖魯而拘汝留之難乎其免也汝必施恩布恵而後出以求助焉於是文仲託扵三家厚士大夫而後之齊齊果拘之而興兵欲襲魯文仲陰使人遺公書恐得其書乃謬其辭曰歛小器投諸台食獵犬組羊裘琴之合甚思之臧我羊羊有母食我以同魚冠纓不足帶有餘公與大夫莫能知之人有言臧孫母者世家子也君何不試召而問焉扵是召而語之臧孫母泣下霑襟曰吾子拘有木治矣公曰何以知之對曰歛􅘁器投諸台者言取郭外萌内之扵城中也食獵犬組羊裘者言趣饗戰鬭之士而繕甲兵也琴之合甚思之者言思妻也臧我羊羊有母者是善告妻善養母也食我以同魚魚者其文錯錯者所以治鋸鋸者所以治木也是有木治保扵獄矣冠纓不足帶有餘者頭亂不得梳饑不得食也故知吾子拘而有木治矣扵是以母之言軍扵境上齊方遣兵襲魯聞兵在境上乃還文仲而不伐魯禮記邾婁復之以矢蓋自戰扵升陘始也僖二十二年公伐邾敗于升陘齊攻魯求岑鼎魯君載他鼎以往齊侯弗信而反之使人告魯侯曰栁下季以為是請因受之魯君請扵栁下季栁下季答曰君之賂以欲岑鼎也以免國也臣亦有國扵此破臣之國以免君之國此臣之所難也扵是魯君乃以真岑鼎往吕覽審已七又新序卷四書人物考栁下恵者亦名栁下季魯公族展氏也名獲字季禽無駭之子盗跖之兄食邑栁下謚曰恵仕魯為士師初惠三黜於魯而不去也其妻謂之曰子無乃瀆乎吾聞之君子有二耻國無道而貴恥也國有道而賤恥也今當亂世三黜而不去亦近恥矣恵曰彼為彼我為我雖裸裎安能汙我由由然與之處列女傳栁下恵死卒在僖二十六年後門人将誄之妻曰将誄夫子之徳耶則二三子不如妾之知也乃誄曰夫子之不伐兮夫子之不竭兮夫子之誠信而與人無害兮柔屈從俗不强察兮蒙恥救民徳彌大兮雖遇三黜終不蔽兮豈弟君子永䏻厲兮嗟乎惜哉乃下世兮庶幾遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之謚宜曰恵兮門人從之莫䏻竄一字列女傳三十三年僖公卒子興立是為文公史魯世家文公文公元年楚太子商臣弑其父成王代立三年文公朝晉襄公十一年十月甲午魯敗翟于鹹獲長翟喬如富父終甥舂其喉以戈殺之埋其首於子駒之門以命宣伯初宋武公之世鄭瞞伐宋司徒皇父帥師禦之以敗翟扵長丘獲長翟縁斯晉之滅路獲喬如弟棼如齊恵公二年鄭瞞伐齊齊王子城父獲其弟榮如埋其首扵北門衛人獲其季弟簡如鄭瞞由是遂亡史魯世家魯孟獻子聘於晉宣子觴之三徙鐘石之懸不移而具獻子曰富哉家宣子曰子之家孰與我家富獻子曰吾家甚貧惟有二士曰顔回兹無靈者使吾邦家安平百姓和協惟此二者耳吾盡扵此矣客出宣子曰彼君子也以養賢為富我鄙人也以鐘石金玉為富新序卷六禮記孟獻子禫縣而不樂比御而不入夫子曰獻子加扵人一等矣十五年季文子使於晉十八年二月文公卒文公有二妃長妃齊女哀姜生子惡及視次妃敬嬴嬖愛生子俀俀私事襄仲襄仲欲立之叔仲曰不可襄仲請齊恵公恵公新立欲親魯許之冬十月襄公殺子惡及視而立俀是為宣公哀姜歸齊哭而過市曰天乎襄仲為不道殺適立庶市人皆哭魯人謂之哀姜魯由此公室卑三桓强史魯世家宣公仲遂卒於垂宣八年卒壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹檀弓下魯公子肹者宣公之同母弟也宣公殺文公子赤而自立公子肹非之宣公與之禄則曰我足矣何以兄之食為哉織屨而食終身不食宣公之食也新序卷七十八年宣公卒子黒肱立是為成公季文子曰使我殺適立庶失大援者襄仲也襄仲立宣公公孫歸父有寵歸父襄仲之子宣公欲去三桓與晉謀伐三桓㑹宣公卒季文子怨之歸父奔齊史魯世家成公成公二年春齊伐取我隆隆左氏作龍夏公與晉郤克敗齊頃公於鞌齊復歸我侵地四年成公如晉晉景公不敬魯魯欲背晉合扵楚或諫乃不十年成公如晉晉景公卒因留成公送塟魯諱之十五年始與吳王夀夢㑹鍾離十六年宣伯告晉欲誅季文子文子有義晉人弗許十八年成公卒子午立是為襄公是時襄公三嵗也史魯世家襄公季文子相魯妾不衣帛馬不食粟仲孫它諫曰子為魯上卿妾不衣帛馬不食粟人其以子為愛且不華國也文子曰然乎吾觀國人之父母衣麄食蔬吾是以不敢且吾聞君子以徳華國不聞以妾與馬夫徳者得扵我又得扵彼故可行若淫扵奢侈沈扵文章不能自反何以守國仲孫它一本作忌慙而退説苑反質詳較國語稍四年襄公朝晋季文子卒襄五年家無衣帛之妾廐無食粟之馬府無金玉以相三君君子曰季文子㢘忠矣史魯世家説苑衛将軍文子問子貢曰季文子三窮而三通何也子貢曰其窮事賢其通舉窮其富分貧其貴禮賤窮以事賢則不侮通而舉窮則忠於朋友富而分貧則宗族親之貴而禮賤則百姓戴之其得之固道也失之命也曰失而不得者何也曰其窮不事賢其通不舉窮其富不分貧其貴不禮賤其得之命也其失之固道也家語子路問於孔子曰臧武仲率師與邾人戰於狐鮐襄公四年遇敗焉師人多喪而無罰古之道然與孔子曰凡謀人之軍師敗則死之謀人之國邑危則亡之古之正也其君在焉者有詔則無討禮記魯婦人之髽而弔也自敗於臺鮐始也襄公四年九年與晋伐鄭晋悼公冠襄公扵衛季武子從相行禮十一年三桓分為三軍十三年朝晋十六年晋平公即位二十一年朝晋平公以上史魯世家孟獻伯相魯堂下生藿藜門外長荆棘食不二味坐不重席無衣帛之妾居不粟馬出不從車叔向聞之以告苖賁皇賁皇非之曰是出主之爵禄以附下也一曰孟獻伯拜上卿叔向往賀門有御馬不食禾向曰子無二馬二輿何也獻伯曰吾觀國人尚有饑色是以不秣馬斑白者多徒行故不二輿向曰吾始賀子之拜卿今賀子之儉也向出語苗賁皇曰助吾賀獻伯之儉也苗子曰何賀焉夫爵禄旂章所以異功伐别賢不肖也故晋國之法上大夫二輿二乗中大夫二輿一乗下大夫專乘此明等級也且夫卿必有軍事是故循車馬比卒乗以備戎事有難則以備不虞平夷則以給朝事今亂晉國之政乏不虞之備以成節儉以潔私名獻伯之儉也可歟又何賀韓子外儲左孟獻子曰正月日至可以有事於上帝七月日至可以有事扵祖七月而禘獻子為之也禮襍記孟獻子之喪襄十九年司徒旅歸四布夫子曰可也讀賵曽子曰非古也是再告也檀弓上襄公二十二年十一月庚子孔子生扵魯昌平鄉陬邑史孔子世家闕里世載孔子未生時有麒麟吐玉書扵闕里其文曰水精之子繼衰周而為素王顔氏異之孔子父叔梁紇母顔氏以繡紱繫麟之角信宿而去懐妊十一月生誕之夕有二龍繞室五老降庭五老者五星之精也顔氏之房聞鈞天之樂空中有聲云天感生聖子故降以和樂之音拾遺記周靈王襄公之世夜有二蒼龍自天而下来附孔母徴在之房因夢而生夫子有二神女擎香露扵空中而來以沐浴徴在天帝下奏鈞天之樂列扵孔母之房言天感生聖子故降以和樂之音又有五老列扵庭則五星之精也二十五年齊崔杼弑其君莊公立其弟景公齊人弑其君襄二十五年齊弑其君莊公魯襄公援戈而起曰孰臣而敢弑其君乎師懼曰夫齊君治之不能任之不肖縱一人之欲以虐萬夫之性非所以立君也其身死自取之也今君不愛萬夫之命而傷一人之死奚其過也其臣已無道矣其君亦不足惜也説苑君道師曠論衛人出君意同郈成子為魯聘於晋郈成子魯大夫郈敬子國之子郈青孫也過衛右宰榖臣止而觴之陳樂而不樂酒酣而送之以璧顧反過而弗辭其僕曰向者右宰榖臣之觴吾子也甚懽今侯渫過而弗辭侯何也重過為渫過郈成子曰夫止而觴我與我懽也陳樂而不樂告我憂也酒酣而送我以璧寄之我也若由是觀之衛其有亂乎倍衛三十里聞寗喜之亂作襄二十七年右宰榖臣死之還車而臨三舉而歸至使人迎其妻子隔宅而異之分禄而食之其子長而反其璧孔子聞之曰夫智可以微謀仁可以託財者其郈成子之謂乎吕覽觀表魯襄公朝荆至淮襄二十八年聞荆康王卒公欲還叔仲昭伯曰君之來也為其威也今其王死其威未去何為還大夫皆欲還子服景伯曰子之來也為國家之利也故不憚勤勞不逺道塗而聽扵荆也畏其威也夫義人者故将慶其喜而弔其憂况畏而聘焉者乎聞畏而往聞喪而還其誰曰非侮也芈姓是嗣王太子又長矣執政未易事君任政求説其侮以定嗣君而示後人其讐滋大以戰小國其誰䏻止之若從君而致患不若違君以避難且君子計而後行二三子其計乎有御楚之術有守國之備則可若未有也不如行乃遂行説苑正諫詳魯語襄公朝扵荆康王卒荆人曰必請襲魯人曰非禮也荆人強之巫先拂柩荆人悔之檀弓下二十九年吳延陵季子使魯問周樂盡知其意魯人敬焉三十一年六月襄公卒其九月太子卒魯人立齊歸之子裯為君是為昭公昭公年十九猶有童心穆叔不欲立曰太子死有母弟可立不即立長年鈞擇賢義鈞則􅁲之今禂非適嗣且又居喪意不在戚而有喜色若果立必為季氏憂季武子弗聽卒立之比及葬三易衰君子曰是不終也史魯世家昭約左傳文世本魯公作弁昭公昭公三年朝晋至河晋平公謝還之魯恥焉滕成公之喪昭三年使子叔敬叔弔進書子服恵伯為介及郊為懿伯之忌不入敬叔嘗殺懿伯為其家所怨恐恵伯殺已故不敢先惠伯曰政也不可以叔父之私不将公事遂入檀弓下四年楚靈公㑹諸侯扵申昭公稱病不往史魯世家叔孫僑如相魯貴而主斷其所愛者曰竪牛亦擅用叔孫之令叔孫有子曰壬竪牛妬而欲殺之因與壬㳺扵魯君所魯君賜之玉環壬拜受之而不敢佩使竪牛請之叔孫竪牛欺之曰吾已為爾請之矣使爾佩之壬因佩之竪牛因謂叔孫何不見壬於君乎叔孫曰孺子何足見也竪牛曰壬固已數見扵君矣君賜之玉環壬巳佩之矣叔孫召壬見之而果佩之叔孫怒而殺壬壬兄曰丙竪牛又妬而欲殺之叔孫為丙鑄鐘鐘成丙不敢擊使竪牛請之叔孫􅆆牛不為請又欺之曰吾已為爾請之矣使爾擊之丙因擊之叔孫聞之曰丙不請而擅擊鐘怒而逐之丙出走齊居一年竪牛為謝叔孫叔孫使竪牛召之又不召而報之曰吾已召之矣丙怒甚不肯來叔孫大怒使人殺之二子死叔孫有病竪牛獨養之而去左右不内人曰叔孫不欲聞人聲因不食而餓死昭四年竪牛不發喪徙其府庫重寳空之而奔齊韓子内儲上與左傳别季武子成寢杜氏之葬在西階之下請合葬焉許之入宫而不敢哭武子曰合葬非古也自周公以来始有合塟未之有改也吾許其大而不許其細何居命之哭檀弓上季武子寢疾昭七年蟜固不説音脱齊衰而入見曰斯道也将亡矣士唯公門説齊衰武子曰不亦善乎君子表微擅弓下七年季武子卒八年楚靈王就章華臺召昭公昭公往賀賜昭公寳器已而悔復詐取之以上史魯世家魯築郎囿昭九年季平子欲速成叔孫昭子曰安用其速成也以虐其民可乎無囿尚可乎惡聞嬉戯之㳺罷其所治之民乎説苑反質與左傳畧同魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服今也君為之服是逆古之禮而亂國法也若終行之則有司将書之以遺後世毋乃不可乎公曰古者天子練冠以厭居公弗忍也遂練冠以喪慈母喪慈母自昭公始也禮曽子問歸按昭公母齊十一年始薨少未喪母也慈母不見左傳禮記夫人之不命於天子自魯昭公始也十二年朝晋至河晋昭公謝還之十五年朝晉晋留之葬晉昭公魯恥之二十年齊景公與晏子狩竞因入魯問禮二十一年朝晉至河晋謝還之南宫敬叔言扵昭公曰臣受先臣之命云孔子聖人之後也滅扵宋其祖弗父何始有國而授厲公及正考父佐戴武宣三命滋益恭故其鼎銘曰一命而僂再命而傴三命而俯循墻而走亦莫敢余侮饘扵是粥於是以餬余口其恭儉也若此臧孫紇有言聖人之後若不當世則必有明徳而達者焉孔子少而好禮其将在矣屬臣曰汝必師之今孔子将適周觀先王之遺制考禮樂之所極斯大業也君盍以乗資之臣請與往公曰諾與孔子車一乗馬二疋䜿子侍御敬叔與俱至周昭二十四年問禮於老耼訪樂扵萇𢎞歴郊祀之所考明堂之則察廟朝之度扵是喟然曰吾乃今知周公之聖與周之所以王也及去周老子送之曰吾聞富貴者送人以財仁者送人以言吾雖不能富貴而竊仁者之號請送子以言可乎凡今之士聰明深察而近扵死者好譏議人者也博辨閎達而危其身好發人之惡者也無以有已為人子者無以惡已為人臣者孔子曰敬受教自周反魯道彌尊矣逺方弟子進盖三千焉家語子南宫敬叔孟僖之次子二十五年春鸜鵒來巢師已曰文成之世童謠曰鸜鵒來巢公在乾侯鸜鵒入䖏公在外野史魯世家初魯季氏與郈氏鬬雞郈氏介其雞季氏為之金距季氏之雞不勝季平子怒因侵郈氏之宫而益其宅郈昭伯怒譖之於昭公曰禘扵襄公之廟也舞者二人而已其餘盡舞扵季氏季氏之無上久矣弗誅必危社稷公怒以告子家駒子家駒曰季氏之得衆三家為一其徳厚其威强君胡得之公弗聽乃使郈昭伯将師徒以攻季氏遂入其宫仲孫氏叔孫氏相與謀曰無季氏則吾族死亡無日矣遂起甲以往陷西北隅以入三家為一郈昭伯不勝而死昭公懼遂出奔齊呂覽察微與又淮南子人間左傳畧同初郈昭伯以芥雞之故怒季平子而臧昭伯之弟㑹偽讒臧氏匿季氏臧昭伯囚季氏人季平子怒囚臧氏老故臧氏郈氏以難告昭公昭公二十五年九月伐季氏遂入平子登臺請曰君以讒不察臣罪誅之請遷沂上弗許請囚扵鄪弗許請以五乗亡弗許子家駒曰君其許之政自季氏久矣為徒者衆衆将合謀郈氏曰必殺之叔孫氏之臣謂其衆曰無季氏與有孰利皆曰無季氏是無叔孫氏曰然救季氏遂敗公師孟懿子聞叔孫勝亦殺郈昭伯郈昭伯為公使故孟氏得之三家共伐公公遂奔己亥公至於齊齊景公曰請致千社待君子家曰棄周公之業而臣於齊可乎乃止子家曰齊君無信不如早之晉弗從叔孫見公還見平子平子頓首初欲迎昭公孟孫季孫後悔乃止史魯世家昭公二十五年三家共攻昭公昭公師敗奔扵齊齊處昭公扵乾侯頃之魯亂孔子適齊主髙昭子以通乎景公與齊太師語樂聞韶音學之三月不知肉味史孔子世家魯昭公棄國走齊景公問焉曰君之年少矣奚道至扵此乎昭公曰吾少之時多愛我者吾體不親人多諫者吾忘不能用是内無弼外無輔輔弼無人諂諛者衆譬之猶秋蓬也孤其根本密其枝葉秋風一至根且㧞矣藝文類聚引晏子作魯哀公事二十六年春齊伐魯取鄆而居昭公焉夏齊景公将內公令無受魯賂申豐汝賈許齊臣髙齕子将粟五千庾子将言於齊侯曰羣臣不䏻事魯君有異焉宋元公為魯如晋求内之道卒叔孫昭子求內其君無病而死不知天棄魯乎抑魯君有罪於鬼神也願君且待齊景公從之二十八年昭公如晋求入季平子私扵晋六卿六卿受季氏賂諫晋君晉君乃止居昭公乾侯二十九年昭公如鄆齊景公使人賜昭公書自謂主君昭公恥之怒而去乾侯三十一年晋欲內昭公召季平子平子布衣徒跣因六卿謝罪六卿為言曰晋欲內君衆不從晋人止三十二年昭公卒於乾侯魯人共立昭公弟宋為君是為定公史魯世家春秋感精符魯昭公時雉衘環入雉之為言弟也喻昭公弟之入為君也定公立趙簡子問史墨曰季氏亡乎史墨對曰不亡季友有大功於魯受鄪為上卿至於武子文子世増其業魯文公卒東門遂殺適立庶魯君扵是失國政政在季氏扵今四君矣民不知君何以得國是以為君慎器與名不可以假人史魯世家昭公三十二年孔子自齊反乎魯孔子在齊凡八年斯時季子僭於公室陪臣執國政故孔子不仕退而修詩書禮樂弟子彌衆至自逺方莫不受業焉史孔子世家春秋戰國異辭卷三
