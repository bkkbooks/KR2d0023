body:
  text: 春秋戰國異辭卷十三右春坊右諭徳陳厚耀撰鄭桓公鄭桓公友者周厲王少子而宣王庶弟也宣王立二十二年友初封于鄭史鄭世家食紀年桓子作王子多父采於咸林鄭桓公東會封於鄭暮舎于宋東之逆旅逆旅之叟從外來曰客將焉之曰㑹封於鄭逆旅之叟曰吾聞之時難得而易失也今客之寢安殆非就封者也鄭桓公聞之援轡自駕其僕接淅而載之行十日夜而至釐何與之爭封故以鄭桓公之賢㣲逆旅之叟㡬不㑹封也説苑權謀而史記齊太公事同其文小異封三十三嵗百姓皆便愛之幽王以為司徒和集周民周民皆説河雒之間人便思之為司徒一嵗周幽王八年幽王以褒后故王室治多邪諸侯或畔之於是桓公問太史伯曰王室多故予安逃死乎太史伯對曰獨洛之東土河濟之間可居公曰何以對曰地近虢鄶虢鄶之君貪而好利百姓不附今公為司徒民皆愛公公誠請居之虢鄶之君見公方用事輕分公地公誠居之虢鄶之民皆公之民也公曰吾欲南之江上何如對曰昔祝融為髙辛氏火正其功大矣而其於周未有興者楚其後也周衰楚必興興非鄭之利也公曰吾欲居西方何如對曰其民貪而好利難久居公曰周衰何國興者對曰齊秦晉楚乎夫齊姜姓伯夷之後也伯夷佐堯典禮秦嬴姓伯繄益同之後也伯繄佐舜懷柔百物及楚之先皆嘗有功於天下而周武王克紂後成王封叔虞于唐其地阻險以此有徳與周衰並亦必興矣公曰善于是卒言王東徙其民雒東而虢鄶果獻十邑竟國之史鄭世家文約國語鄭桓公將欲襲鄶先問鄶之豪傑良臣辯智勇敢之士盡與其名姓擇鄶之良田賂之為官爵之名而書之因為設壇場郭門之外而埋之釁之以雞豭若盟狀鄶君以為内難也而盡殺其良臣桓公襲鄶遂取之韓子内儲下又説苑權謀二嵗犬戎殺幽王于驪山下并殺桓公鄭人共立其子掘突是為武公史鄭世家桓公為周司徒善于其職甚得周衆又死于犬戎之難平王于是復命其子掘突為司徒纉父之職紀事年表武公鄭武公從諸侯以兵送平王東遷于雒王命武公東取虢鄶十邑國之于是復施舊號于新邑謂之新鄭又鄭遺民自咸林避戎南入漢中謂之南鄭紀事年表鄭武公好賢賦緇衣子貢詩傳詩說同詩序緇衣美武公也父子並為周司徒善于其職國人宜之故美其徳以明有國善善之功焉鄭武公欲伐胡先以其女妻胡君以娛其意因問於羣臣吾欲用兵誰可伐者大夫闗其思對曰胡可伐武公怒而戮之曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親已遂不備鄭鄭人襲胡取之韓子説難鄭武公十年娶申侯女為夫人曰武姜生太子寤生生之難及生夫人弗愛後生少子叔段段生易夫人愛之二十七年武公疾夫人請公欲立段為太子公弗聽是嵗武公卒寤生立是為莊公史鄭世家異約左氏文稍莊公莊公元年封弟段于京號太叔祭仲曰京大于國非所以封庶也莊公曰武姜欲之我弗敢奪也段至京繕治甲兵與其母武姜謀襲鄭史鄭世家鄭莊公封弟叔段于京祭足諫之不聽大夫風之賦將仲子子貢詩傳詩序將仲子刺莊公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉詩説云莊公欲䧟弟段授以大邑祭仲諌陽拒之大夫原其情而刺之太叔段多才而好勇鄭人愛之賦叔于田詩傳夫詩説云大憂之而作此詩詩序叔于田刺莊公也叔處于京繕甲治兵以出于田國人説而歸之段不義而得衆鄭人歸之賦大叔詩傳而詩説云大夫憂之作詩序云刺莊公也二十二年段果襲鄭武姜為内應莊公發兵伐段段走伐京京人畔段段出走鄢鄢潰段出奔共於是莊公遷其母武姜於城潁誓言曰不至黄泉毋相見也居嵗餘已悔思母潁谷之考叔有獻于公公賜食考叔曰臣有母請君食賜臣母莊公曰我甚思母惡負盟奈何考叔曰穿地至黄泉則相見矣於是遂從之見母史鄭世家莊公失道君子去之國人思望焉作遵大路詩序説詩傳詩入鄶風為夫棄婦之詩地志河南洧川縣牛脾山即莊公築隧見母之處水經注洧水南有鄭莊公望母臺莊公居夫人于城潁故城臺以望母用伸在心之思二十四年宋繆公卒公子馮奔鄭鄭侵周地取禾二十五年衛州吁弑其君桓公自立與宋伐鄭以馮故也二十七年始朝周桓王桓王怒其取禾弗禮也二十九年莊公怒周弗禮與魯易祊許田三十七年莊公不朝周周桓王率陳蔡虢衛伐鄭莊公與祭仲髙渠彌發兵自救王師大敗祝瞻射中王臂祝瞻請從之鄭伯止之曰犯長且難之况敢陵天子乎乃止夜令祭仲問主疾史鄭世家約左氏文三十八年北戎伐齊齊使求救鄭遣太子忽將兵救齊齊釐公欲妻之忽謝曰我小國非齊敵也時祭仲與俱勸使取之曰君多内寵太子無大援將不立三公子皆君也所謂三公子者太子忽其弟突次弟子亹也史鄭世家鄭世子忽辭昏于齊祭仲諫之賦有女同車詩傳説同詩詩序有女同車刺忽也鄭人刺忽之不昏于齊也太子忽嘗有功于齊齊侯請妻之齊女賢而不取卒以無大國之助至于見逐故國人刺之四十三年莊公卒史鄭世家鄭莊公卒公子爭立齊楚交伐忠臣憂之欲相率獻謀以救其國故賦籜兮詩説同詩傳畧詩序籜兮刺忽也君弱臣强不倡而和也鄭公子五爭五疑作互兵革不息男女相棄民人思保其家室賦出其東門閔亂也詩序不詩説云鄭之貞士宜其室家染淫俗而作詩傳亦同昭公厲公子亹子嬰厲公初祭仲甚有寵於莊公莊公使為卿公使娶鄧女生太子忽故祭仲立之是為昭公莊公又娶宋雍氏女生厲公突雍氏有寵于宋宋莊公聞祭仲之立忽乃使人誘召祭仲而執之曰不立突將死亦執突以求賂焉祭仲許宋與宋盟以突歸立之昭公聞祭仲以宋要立其弟突九月辛亥忽出奔衛己亥突至鄭立是為厲公史鄭世家氏約左文厲公四年祭仲専國政厲公患之陰使其壻雍糾欲殺祭仲糾妻祭仲女也知之謂其母曰父與夫孰親母曰父一而已人盡夫也女乃告祭仲祭仲反殺雍糾戮之於市厲公無奈祭仲何怒糾曰謀及婦人死固宜哉夏厲公出居邊邑櫟祭仲迎昭公忽六月乙亥復入鄭即位秋鄭厲公突因櫟人殺其大夫單伯遂居之諸侯聞厲公出奔伐鄭弗克而去宋頗予厲公兵自守於櫟鄭以故亦不伐櫟史鄭世家約左氏文詩序狡童刺忽也不能與賢人圖事權臣擅命也昭公二年自昭公為太子時父莊公欲以高渠彌為卿昭公惡之莊公弗聽卒用渠彌為卿及昭公即位懼其殺已冬十月渠彌與昭公出獵射殺昭公于野祭仲與渠彌不敢入厲公乃更立昭公弟子亹為君是為子亹也無謚號子亹元年七月齊襄公㑹諸侯於首止鄭子亹徃㑹高渠彌相從祭仲稱疾不行所以然者子亹自齊襄公為公子之時嘗㑹鬭相仇及㑹諸侯祭仲請子亹無行子亹曰齊彊而厲公居櫟即不徃是率諸侯伐我内厲公我不如徃往何遽必辱且又何至是卒行於是祭仲恐齊並殺之故稱疾子亹至不謝齊侯齊侯怒遂伏甲而殺子亹高渠彌亡歸歸與祭仲謀召子亹弟公子嬰于陳而立之是為鄭子鄭子十二年祭仲死韓非子鄭伯將以高渠彌為卿昭公惡之固諫不聽及昭公即位懼其殺已也辛夘弑昭公而立公子亹也君子曰昭公知所惡矣公子圉曰高伯其為戮乎報惡已甚矣或曰公子圉之言也不亦反乎昭公之及於難者報惡晩也然則高伯之晩於死者報惡甚也明君不懸怒懸怒則臣懼罪輕舉以行計則人主危故靈臺之飲衛侯怒而不誅故禇師作難食黿之羮鄭君怒而不誅故子公殺君君子之舉知所惡非甚之也曰知之若是其明也而不行誅焉以及於死故曰知所惡以見其無權也今君非獨不足於見難而已或不足於斷制今昭公見惡稽罪而不誅使渠彌含憎懼死以徼幸故不免於殺是昭公之報惡不甚也或曰報惡甚者大誅報小罪大誅報小罪也者獄之至也獄之患故非在所以誅也以讐之衆也是以晉厲公滅三郄而欒中行作難鄭子都殺伯咺而食鼎起禍吳王誅子胥而越句踐成覇則衛侯之逐鄭靈之弑不以禇師之不死而子公之不誅也以未可以怒而有怒之色未可誅而有誅之心怒當其罪而誅不逆人心雖懸奚害夫未立有罪即位之後宿罪而誅齊胡之所以滅也君行之臣猶有後患况為臣而行之君乎誅既不當而以盡為心是與天下為讐也則雖為戮不亦可乎鄭之君子閔忽之無忠臣良士終以死亡作揚之水詩序詩傳詩説皆入鄶風以為鄶詞人兄弟相間而被讒訴之之十四年故厲公突在櫟者使人誘刼鄭大夫甫瑕要以求入瑕曰舎我我為君殺鄭子而入君厲公與盟乃舎之六月甲子瑕殺鄭子及其二子而迎厲公突突自櫟復入即位初内蛇與外蛇鬭于鄭南門中内蛇死居六年厲公果復入入而讓其伯父原曰我亡國外居伯父無意入我亦甚矣原曰事君無二心人臣之職也原知罪矣遂自殺厲公於是謂甫瑕曰子之事君有二心矣遂誅之瑕曰重徳不報誠然哉厲公後元年齊桓公始霸史鄭世家五年燕衛與周惠王弟頽伐王王出奔温立弟頽為王六年惠王告急鄭厲公發兵擊周王子頽弗勝於是與周惠王歸王居于櫟史鄭世家七年春鄭厲公與虢叔襲殺王子頽而入惠王于周史鄭世家七年秋厲公卒子文公踕立厲公初立四嵗亡居櫟居櫟十七嵗復入立七嵗與亡凡二十八年史鄭世家異與左氏稍文公鄭文公使高克禦狄于境不召師潰大夫憂之賦清人詩傳憂詩説云公子素之而作詩序清人刺文公也高克好利而不顧其君文公惡而欲逺之不能使高克將兵而禦狄于境陳其師旅翺翔河上久而不召衆散而歸高克奔陳公子素惡高克進之不以禮文公退之不以道危國亡師之本故作是詩高克見左閔二年當鄭文公十三年文公十七年齊桓公以兵破蔡遂伐楚至召陵二十四年文公之賤妾曰燕姞夢天與之蘭曰余為伯鯈余爾祖也以是為而子蘭有國香以夢告文公文公幸之而予之草蘭為符遂生子名曰蘭史鄭世家鄭文公三十六年晉公子重耳過文公弗禮文公弟叔詹曰重耳賢且又同姓窮而過君不可無禮文公曰諸侯亡公子過者多矣安能盡禮之詹曰君如弗禮遂殺之弗殺使即反國為鄭憂矣文公弗聽三十七年晉公子重耳反國是為文公史鄭世家鄭文公三十七年秋鄭入滑滑聽命已而反與衛於是鄭伐滑周襄王使伯犕請滑文公怨惠王之亡在櫟而文公父厲公入之而惠王不賜厲公爵禄又怨襄王之與衛滑故不聽襄王請而囚伯犕王怒與翟人伐鄭弗克冬翟攻襄王襄王出奔鄭鄭文公居王于氾三十八年晉文公入襄王成周史鄭世家文公四十一年鄭助楚擊晉自晉文公之過無禮故背晉助楚四十三年晉秦共圍鄭討其助楚攻晉者及文公過時之無禮也初鄭文公有三夫人寵子五人皆以罪蚤死公怒溉逐羣公子公子蘭奔晉從晉文公圍鄭時蘭事晉文公甚謹愛幸之乃私于晉以求入為太子晉于是欲得叔詹為僇鄭文公恐不敢謂叔詹言詹聞言于鄭君曰臣謂君君不聽臣晉卒為患然鄭所以圍鄭以詹詹死而赦鄭國詹之願也乃自殺鄭人以詹尸與晉晉文公曰必欲一見鄭君辱之而去鄭人患之乃使人私于秦曰破鄭益晉非秦之利也秦兵罷晉文公欲入蘭為太子以告鄭鄭大夫石葵曰吾聞姞姓乃后稷之元妃其後當有興者子蘭母其後也且夫人子盡已死餘庶子無如蘭賢今圍急晉以為請利孰大焉遂許晉與盟卒立子蘭為太子晉兵乃罷去史鄭世家四十五年文公卒子蘭是為穆公史鄭世家穆公穆史作繆繆公元年春秦繆公使三將將兵欲襲鄭至滑逢鄭賈人弦高詐以十二牛勞軍故秦兵不至而還晉敗之于崤初往年鄭文公之卒也鄭司城繒賀以鄭情賣之秦兵故來三年鄭發兵從晉伐秦敗秦兵於汪初晉文公與秦穆公伐鄭圍其都鄭人私與秦盟而晉師退秦又使大夫祀于等左傳祀于作把子三人戍鄭居三年晉文公卒襄公初立秦穆公方强使百里西乞白乙帥師襲鄭過周及滑鄭人不知時鄭之賈人弦高將市于周遇之謂其友蹇他曰師行數千里又數經諸侯之地其勢必襲鄭凡襲國者以無備也示以知其情也必不敢進矣于是乃矯鄭伯之命以十二牛犒秦師且使人告鄭為備祀于亡奔齊孟明等返至都晉人要擊大破秦師鄭賴以存鄭穆公以存國之功賞高高辭曰詐而得賞則鄭國之政廢矣為國而無信是敗俗也賞一人而敗國俗智者不為也遂以其屬徙東夷終身不返高士傳約與左傳文畧相同淮南子人間秦兵襲鄭鄭之賈人弦高蹇他蹇他弦高黨相與謀曰師行數千里數絶諸侯之地其勢必襲鄭凡襲國者以為無備也今示以知其情必不敢進乃矯鄭伯之命以十二牛勞之三帥相與謀曰凡襲人者以為弗知今已知之矣守備必固進必無功乃還師而反晉先軫舉兵擊之大破之殽鄭伯乃以存國之功賞弦高弦高辭之曰誕而得賞則鄭國之信廢矣為國而無信是俗敗也賞一人而敗國俗仁者弗為也以不信得厚賞義者弗為也遂以其屬徙東夷終身不返吕覽務大鄭君問於被瞻曰鄭君鄭文公竊聞先生之義不死君不亡君信有之乎被瞻對曰有之夫言不聽道不行則固不事君也固亦作故若言聽道行又何死亡哉二十一年楚成王與宋華元伐鄭華元殺羊食士不與其御羊斟怒以馳鄭鄭囚華元宋贖華元元亦亡去晉使趙穿以兵伐鄭史鄭世家墨子鄭穆公當晝日中處乎廟有神入門而左鳥身素服三絶面狀正方鄭繆公見之乃恐懼奔神曰帝享女明徳使予錫女夀十年有九使若國家蕃昌子孫茂毋失鄭穆公再拜稽首曰敢問神曰予為勾芒若以鄭穆公之所身見為儀則鬼神之有豈可疑哉二十二年鄭繆公卒子夷立是為靈公史鄭世家靈公靈公元年春楚獻黿于靈公子家子公將朝靈公子公之食指動謂子家曰他日指動必食異物及入見靈公進黿羮子公笑曰果然靈公問其笑故具告靈公靈公召之獨弗予羮子公怒染其指嘗之而出公怒欲殺子公子公與子家謀先夏弑靈公靈公元年子公子家弑靈公以食黿故詳左傳鄭人欲立靈公弟去疾去疾讓曰必以賢則去疾不肖必以順則公子堅長堅者靈公庶弟年表云靈公庶兄去疾之兄也於是乃立子堅是為襄公襄公立將盡去繆氏繆氏者弑靈公子公之族家也去疾曰必去繆氏我將去之乃止皆以為大夫史鄭世家約左氏文子良去國不忘諫君賦蹇裳詩傳詩説子良如晉作詩以寓靈公詩序云蹇裳思見正也狂童恣行國人思大國之正己也鄭靈公好倡國人化之君子譏之賦溱洧詩傳也詩序刺亂淫風大行莫之能救焉鄭靈公棄其世臣而任狂狡子良憂一作諫之賦扶胥即山有扶蘓狂氏狡名同以狂狡為嬖人詩傳云詩説亦詩序刺忽也子良諫用狂狡靈公不聽將去其國賦麥秀麥秀疑即狡童子貢詩傳章詩本三章首逸去詩説靈公不聽子良之謀將逐之故作是詩以責狂狡詩序云刺忽也不與賢人圖事權臣擅命也襄公襄公元年楚怒鄭受宋賂縱華元伐鄭鄭背楚與晉親五年楚復伐鄭晉來救之六年子家卒國人復逐其族以其弑靈公也七年鄭與晉盟鄢陵以上史鄭世家鄭襄公八年楚莊王以鄭與晉盟來伐圍鄭三月鄭以城降楚楚王入自皇門鄭襄公肉袒牽羊以迎曰孤不能事邊邑使君王懷怒以及敝邑孤之罪也敢不惟命是聽君王遷之江南及以賜諸侯亦惟命是聽若君王不忘厲宣王桓武公哀不忍絶其社稷錫不毛之地使復得改事君王孤之願也然非所敢望也敢布腹心惟命是聽莊王為却三十里而後舎楚羣臣曰自郢至此士大夫亦乆勞矣今得國舎之何故莊王曰所為伐伐不服也今已服尚何求乎卒去晉聞楚之伐鄭發兵救鄭其來持兩端故遲比至河楚兵已去晉將帥或欲渡或欲還卒渡河莊王聞還擊晉鄭反助楚大破晉軍于河上十年晉伐鄭以其反晉而親楚也史鄭世家約左氏文十八年襄公卒子悼公㵒立史鄭世家悼公悼公元年鄦音許公惡鄭於楚悼公使弟睔于楚自訟訟不直楚囚睔於是鄭悼公來與晉平遂親睔私于楚子反子反言歸睔于鄭史鄭世家二年楚伐鄭晉兵來救是嵗悼公卒立其弟睔是為成公史鄭世家成公鄭成公三年楚共王曰鄭伯孤有徳焉使人來與盟成公私與盟秋成公朝晉晉曰鄭私平于楚執之使欒書伐鄭四年春鄭患晉圍公子如乃立成公庶兄繻為君其四月晉聞鄭立君乃歸成公鄭人聞成公歸亦殺君繻迎成公晉兵去十年背晉盟盟于楚晉厲公怒發兵伐鄭楚共王救鄭晉楚戰鄢陵楚兵敗晉射傷楚共王目俱罷而去十三年晉悼公伐鄭兵于洧上鄭城守晉亦去十四年成公卒子惲立是為釐公史鄭世家釐公釐公五年子駟朝釐公公不禮子駟怒使厨人藥殺釐公赴諸侯曰釐公暴病卒立公子嘉嘉時年五嵗是為簡公史鄭世家簡公簡公元年諸公子謀欲誅子駟子駟覺之反盡誅諸公子二年晉伐鄭鄭與盟晉去冬又與楚盟子駟畏誅故兩親晉楚三年子駟欲自立為君公子子孔使尉止殺子駟而代之子孔又欲自立子産曰子駟為不可誅之今又效之是亂無止息也于是子孔從之而相鄭簡公四年晉怒鄭與楚盟伐鄭鄭與盟楚共王救鄭敗晉兵簡公欲與晉平楚又囚鄭使者十二年簡公怒相子孔專國權誅之而以子産為卿史鄭世家子産者子國之子也子産忠於鄭君子國譙怒之曰夫介異於人臣而獨忠於主主賢明能聽汝不明將不汝聽聽與不聽未可必知而汝已離於羣臣離于羣臣則必危汝身矣非徒危已也又且危父矣韓子外儲左子産相鄭簡公謂子産曰飲酒不樂也俎豆不大鐘鼓竽瑟不鳴寡人之事不一國家不定百姓不治耕戰不輯睦亦子之罪子有職寡人亦有職各守其職子産退而為政五年國無盜賊道不拾遺桃棗蔭于街者莫有援也錐刀遺道三日可反三年不變民無饑也韓子外儲左尸子鄭簡公謂子産曰飲酒之不樂鐘鼓之不鳴寡人之任也國家之不乂朝廷之不治與諸侯交之不得志子之任也子無入寡人之樂寡人無入子之朝自是以來子産治鄭城門不閉國無盜賊道無餓人孔子曰若鄭簡公之好樂雖抱鐘而朝可也子産為鄭相一年豎子不戲狎斑白不提挈僮子不犂畔二年市不貳賈三年門不夜關道不拾遺四年田器不歸五年土無尺籍喪期不令而治淮南子鄭簡公謂子産曰國小迫於荆晉之間今城郭不完兵甲不備不可以待不虞子産曰臣閉其外也已逺矣而守其内也已固矣雖小國猶不危也君其勿憂是以没簡公身無患韓子外儲左子産相鄭簡公謂子産曰内政毋出外政毋入夫衣裘之不美車馬之不飾子女之不潔寡人之醜也國家之不治封疆之不正夫子之醜也子産相鄭終簡公之身内無國中之亂外無諸侯之患也子産之從政也擇能而使之馮簡子善斷事子太叔善決而文公孫揮知四國之為而辨于其大夫之族姓變而立至又善為辭令禆諶善謀于野則獲於邑則否有事乃載禆諶與之適野使謀可否而告馮簡子斷之使公孫揮為之辭令成乃令子太叔行之以應對賓客是以鮮有敗事也説苑政理子産相鄭專國之政三年善者服其化惡者畏其禁鄭國以治諸侯憚之而有兄曰公孫朝有弟曰公孫穆朝好酒穆好色朝之室也聚酒千鐘積麴成封望門百步醴漿之氣逆于人鼻方其荒于酒也不知世道之安危人理之悔吝室内之有無九族之親疎存亡之安樂也雖水火兵刅交于前弗知也穆之後庭比房數十皆擇稚齒婑媠者以盈之方其聃于色也屏親昵絶交遊逃於後庭以晝足夜三月一出意猶未愜鄉有處子之娥姣者必賄而招之媒而挑之必獲而後己子産日夜以為戚宻造鄧析而謀之曰僑聞治身以及家治家以及國此言自近至於逺也僑為國則治矣而家則亂矣其道逆耶將奚方以救二子子其詔之鄧析曰吾怪之久矣未敢先言子奚不時其治也喻以性命之重誘以禮義之尊乎子産用鄧析之言因間以謁其兄弟而告之曰人之所以貴於禽獸者智慮智慮之所將者禮義禮義成則名位至矣若觸情而動耼于嗜欲則性命危矣子納僑之言則朝自悔而夕食禄矣朝穆曰吾知之久矣擇之亦久矣豈待若言而識之哉凡生之難遇而死之易及以難遇之生俟易及之死可孰念哉而欲尊禮義以誇人矯情性以招名吾以此為弗若死也為欲盡一生之歡窮當年之樂唯患腹溢而不得恣口之飲力憊而不得肆情于色不遑憂名聲之醜性命之危也且若以治國之能誇物欲以説辭亂我之心榮禄喜我之意不亦鄙而可矜哉我又欲與若别之夫善治外者物未必治而身交苦善治内者物未必亂而性交逸以若之治外其法可蹔行于一國未合于人心以我之治内可推之于天下君臣之道息矣吾嘗欲以此術而喻之若反以彼術而教我哉子産茫然無以應之他日以告鄧析鄧析曰子與眞人居而不知也孰謂子智者乎鄭國之治偶耳非子之功也列子楊朱鄭國多相縣以書者子産令無縣書鄧析致之子産令無致書洧水甚大鄭之富人有溺者人得其屍者富人請贖之其人求金甚多以告鄧析鄧析曰安之人必莫之買矣得屍者患之以告鄧析鄧析又答之曰安之此必無所更買矣子産治鄭鄧析務難之與民之有獄者約大獄一衣小獄襦袴民之獻衣襦袴而學訟者不可勝數以非為是以是為非是非無度而可與不可日變所欲勝因勝所欲罪因罪鄭國大亂民口讙譁子産患之於是殺鄧析而戮之民心乃服是非乃定法律乃行吕覽離謂鄧析操兩可之説設無窮之辭當子産執政作竹刑鄭國用之數難子産之治子産屈之子産執而戮之俄而誅之列子湯問有相與訟者子産離之而無使得通辭倒其言以告而知之韓子内儲上繹史諸書多言子産殺鄧析唯左氏云駟歂殺之獨異漢書名家鄧析二篇列子鄭之圃澤多賢東里多才圃澤之役有伯豐子者行過東里遇鄧析鄧析顧其徒而笑曰為若舞彼來者奚若其徒曰所願知也鄧析謂伯豐子曰汝知養養之義乎受人養而不能自養者犬豕之類也養物而物為我用者人之力也使汝之徒食而飽衣而息執政之功也長幼羣聚而為牢籍庖厨之物奚異犬豕之類乎伯豐子不應伯豐子之從者越次而進曰大夫不聞齊魯之多機乎有善治土木者有善治金革者有善治聲樂者有善書數者有善治軍旅者有善治宗廟者羣才備也而無相位者無能相使者而位之者無知使之者無能而知之與能為之使焉執政者乃吾之所使子奚矜焉鄧析無所應目其徒而退説苑衛有五丈夫俱負缶而入井灌韭終日一區鄧析過下車為教之曰為機重其後輕其前命曰橋終日溉韭百區不倦五丈夫曰吾師言曰有機知之巧必有機知之敗我非不知也不欲為也子其往矣我一心溉之不知改已鄧析去行數十里顔色不悦懌自病弟子曰是何人也而恨我君請為君殺之鄧析曰釋之是所謂眞人者也可令守國鄭子産晨出過東匠之閭聞婦人之哭撫其御之手而聽之有間遣吏執而問之則手絞其夫者也異日其御問曰夫子何以知之子産曰其聲懼凡人於其親愛也始病而憂臨死而懼已死而哀今哭已死不哀而懼是以知其有姦也韓子難三晉人欲攻鄭令叔向聘焉視其有人與無人子産為之詩曰子惠思我蹇裳涉洧子不我思豈無他士叔向歸曰鄭有人子産在焉不可攻也秦楚近其詩有異心不可攻也乃輟攻鄭呂覽求人簡公十九年簡公如晉請衛君還而封子産以六邑子産讓受其三邑二十二年吳使延陵季子于鄭見子産如舊交謂子産曰鄭之執政者侈難將至政將及子子為政必以禮不然鄭將敗子産厚遇季子二十三年諸公子爭寵相殺又欲殺子産公子或諫曰子産仁人鄭所以存者子産也勿殺乃止史鄭世家簡公二十五年鄭使子産於晉問平公疾平公曰卜而曰實沈臺駘為祟史官莫知敢問對曰高辛有二子長曰閼伯季曰實沈居曠林不相能也日操干戈以相征伐后帝弗臧遷閼伯于啇丘主辰啇人是因故辰為啇星遷實沈於大夏主參唐人是因服事夏商其季世曰唐叔虞當武王邑姜方娠大叔夢帝謂已余命而子曰虞乃與之唐屬之參而蕃育其子孫及生有文在其掌曰虞遂以命之及成王滅唐而國大叔焉故參為晉星由是觀之則實沈參神也昔金天氏有􅀢子曰昧為𤣥𡨕師生允格臺駘臺駘能業其官宣汾洮障大澤以處太原帝用嘉之國之汾川沈姒蓐黄實守其祀今晉主汾川而滅之由是觀之則臺駘汾洮神也然是二者不害君身山川之神則水旱之菑禜之日月星辰之神則雪霜風雨不時禜之若君疾飲食哀樂女色所生也平公及叔向曰善博物君子也厚為之禮於子産史鄭世家二十七年夏鄭簡公朝晉冬畏楚靈王之强又朝楚子産從史鄭世家二十八年鄭君病使子産㑹諸侯與楚靈王盟於申誅齊慶封史鄭世家三十六年簡公卒子定公寧立秋朝晉昭公史鄭世家定公子皮為政忠直文武子産美之賦羔裘詩傳詩説鄭子皮卒子産思之追頌焉詩序以為刺朝之詩子皮卒于鄭定公元年定公元年楚公子棄疾弑其君靈王而自立為平王欲行徳諸侯歸靈王所侵鄭地於鄭四年晉昭公卒其六卿强公室卑子産謂韓宣子曰為政必以徳毋􅁯所以立六年鄭火公欲禳之子産曰不如修徳八年楚太子建來奔十年太子建與晉謀襲鄭鄭殺建建子勝奔呉十一年定公如晉晉與鄭謀誅周亂臣王子朝之亂入敬王于周以上史鄭世家子産相鄭十八年刑三人殺二人桃李之垂於行者莫之援也援攀也錐刀之遺於道者莫之舉也吕覽下賢子産相鄭往見壺丘子林與其弟子坐必以年吕覽下賢申徒嘉兀者也與鄭子産同師于伯昬無人子産謂申徒嘉曰我先出則子止子先出則我止恥與刑餘同行其明日又與合堂同席而坐子産謂申徒嘉曰我先出則子止子先出則我止今我將出子可以止乎其未耶且子見執政而不違避也子齊執政乎申徒嘉曰先生之門固有執政焉如此哉子而説子之執政而後人者也聞之曰鑑明則塵垢不止止則不明也久與賢人處則無過今子之所取大者先生也取大取以培其徳而大之而猶出言若是不亦過乎子産曰子既若是矣猶與堯爭善堯比伯昬計子之徳不足以自反耶申徒嘉曰自狀其過以不當亡者衆不狀其過以不當存者寡知不可奈何而安之若命惟有徳者能之遊于羿之彀中中央者中地也然而不中者命也人以其全足笑吾不全足者衆矣我怫然而怒而適先生之所則廢然而返不知先生之洗我以善耶吾與夫子遊十九年而未嘗知吾兀者也今子與我逰于形骸之内而子索我於形骸之外不亦過乎子産蹵然改容更貌曰子無乃稱莊子徳充符國産問何由得人俗醇樸亢倉子曰政煩苛則人姦偽政省一則人醇樸夫人俗隨國政之方圓猶蠖屈之于葉也食黄則身黄食蒼則身蒼曰何為則人富亢倉子曰賦歛以時官上清約則人富賦歛無節官上奢縱則人貧勾粤之簳鏇以精金鷙為之羽以之棓箠則其與槁樸也無擇及夫蕩冦爭衝覿武決勝加之駭弩之上則三百步之外不立敵矣蜚景之劍威奪白日氣勝紫蜺以之刲穫則其與劂刅也無擇及夫凶邪流毒沸渭不靖加之運掌之上則千里之内不留行矣夫材有分而用有當所貴善因時而已耳昔者明王聖帝天下和平萬物茂暢羣性得極善因時而勿擾者也近古以來天下姦邪者衆正直者寡輕薄趨利者多敦方退靜者鱻姦者出言長于忠言遂使天下之人交相疑害悲夫作法貴于易避而難犯救弊貴于省事而一令除去豪横則官人安刑禁必行則官人不敢務私利而百姓富亢倉子政道鄭有胡之封珪戎弓異時失同于荆荆曰必得封珪戎弓不然臨兵于汝鄭君病之駕見亢倉子曰封珪戎弓先君得之于胡綿代功寶傳章翼嗣今荆恃大而曰必得不然則兵臨國危矣寡人欲以他封珪戎弓徃若之何亢倉子曰君其少安今是楚亦有寶于此飾楚之寶以貰罪于君楚所不能楚亢倉子名君必致夫眞今荆以淺鮮之過而負其威刑申逞不直以耗敓與國荆失諸侯於是乎在諸侯聞之將警勸備倫比勤明㑹同上義固存鄭其為首君姑待之豈必非福于是以胡珪戎弓往未至郢荆人聞之曰彼用聖人之訓辭吾焉取此以暴不直于天下而令諸侯實生心焉遽反其賂而益善之亢倉子政道子産相鄭病將死謂游吉曰我死後子必用鄭必以嚴蒞人夫火形嚴故人鮮灼水形懦人多溺子必嚴子之刑無令溺子之懦子産死游吉不忍嚴刑鄭少年相率為盜處于灌澤將遂以為鄭禍游吉率車騎與戰一日一夜而僅能尅之游吉喟然嘆曰吾蚤行夫子之教必不悔至於此矣韓子内儲上與左氏畧同十三年定公卒子獻公蠆立史鄭世家獻公獻公十三年卒子聲公勝立是時晉六卿强侵奪鄭鄭遂弱史鄭世家聲公鄭聲公五年鄭相子産卒子産卒於定公八年非聲公也鄭人皆哭泣悲之如亡親戚子産者鄭成公少子也子産七穆之後成公從弟此與左傳别為人仁愛人事君忠厚孔子嘗過鄭與子産如兄弟云及聞子産死孔子為泣曰古之遺愛也兄事子産史鄭世家家語子游問於孔子曰夫子之極言子産之惠也可得聞乎孔子曰惠在愛民而已矣子游曰愛民謂之徳教何翅施惠哉孔子曰夫子産者猶衆人之母也能食之弗能教也子游曰其事可言乎孔子曰子産以所乗之輿濟冬涉者是愛無教也説苑貴徳鄭子産死鄭定公八年鄭人丈夫舎玦珮婦人舎珠珥夫婦巷哭三月不聞竽瑟之聲韓子子産病死大夫哭於朝商賈哭于市史説苑子産死處女哭于室農人哭於野記丁壯號哭老人皃啼史記子産者鄭之列大夫也鄭昭君之時以所愛徐摯為相國亂上下不親父子不和大宫子期言之君以子産為相為相一年竪子不戲狎斑白不提挈僮子不犁畔二年市不豫賈三年門不夜闗道不拾遺四年田器不歸五年士無尺籍喪期不令而治治鄭二十六年而死丁壯號哭老人兒啼曰子産去我死乎民將安歸按子産不事昭公亦無徐摯為相事史異聞也聲公八年晉范中行氏反晉告急于鄭鄭救之晉伐鄭敗鄭軍于鐡十四年宋景公滅曹二十二年楚惠王滅陳孔子卒二十六年晉知伯伐鄭取九邑三十七年聲公卒子哀公易立以上史鄭世家哀公哀公八年鄭人弑哀公而立聲公弟丑是為共公史鄭世家共公三十年共公卒子幽公已立史鄭世家幽公幽公元年韓武子伐鄭弑幽公鄭人立幽公弟駘是為繻公史鄭世家繻公繻公十五年韓景侯伐鄭取雍丘鄭城京十六年鄭伐韓敗韓兵于負黍二十年韓趙魏列為諸侯二十三年鄭圍韓之陽翟二十五年鄭君殺其相子陽以上史鄭世家鄭子陽剛毅而好罰其于罰也執而無赦舎人有折弓者畏罪恐誅則因猘狗之驚以殺子陽舎人家臣也國人逐猘狗擾亂舎人因之殺子陽淮南子汜論子列子窮容貌有饑色客有言之于鄭子陽者曰子列禦冦蓋有道之士也居君之國而窮君毋乃為不好士乎鄭子陽令官遺之粟數十秉子列子出見使者再拜而辭使者去子列子入其妻望而拊心曰妾聞為有道者妻子皆得逸樂今妻子有饑色矣君過而遺先生食先生又弗受豈非命也哉子列子笑而謂之曰君非自知我也以人之言而知我以人之言而遺我粟也至其罪我也又將以人之言此吾所以不受也且受人之養不死其難不義也死其難是死無道之人也豈義哉其年民果作難殺子陽子陽嚴猛刑無所赦家人畏誅因國人逐猘狗之亂而殺子陽也吕覽觀世符又新序卷七列子說莊子譲王劉向别録列子者鄭人也與鄭繆公同時蓋有道者也其學本於黄帝老子號曰道家漢宜為繻公子書道家列八篇名御㓂列子天瑞子列子居鄭圃四十年人無識者國君卿大夫眎之猶衆庶也國不足將嫁于衛弟子曰先生往無反期弟子敢有所謁先生將何以教先生不聞壺丘子林之言乎子列子笑曰壺子何言哉雖然夫子嘗語伯昬瞀人吾側聞之試以告汝其言曰有生不生有化不化不生者能生生不化者能化化生者不能不生化者不能不化故常生常化常生常化者無時不生無時不化陰陽爾四時爾不生者疑獨不化者徃復往復其際不可終疑獨其道不可窮黄帝書曰谷神不死是謂𤣥牝𤣥牝之門是謂天地之根緜緜若存用之不勤故生物者不生化物者不化自生自化自形自色自智自力自消自息謂之生化形色智力消息者非也述異記列禦冦鄭人御風而行常以立春日歸乎八荒立秋日遊于風穴是風至則草木皆生去則草木皆落謂之離合風高士傳列禦冦鄭人隱居不仕鄭繆公時繆公當作繻公子陽為相專任刑法列禦冦乃絶迹窮巷面有饑色或告子陽曰列禦寇蓋有道之士也居君之國無乃為不好士乎子陽聞而悟使官載粟數十乗而與之禦寇出見使者再拜而辭之入見其妻妻望之而拊心曰妾聞為有道之妻子皆得佚樂今有饑色君過而遺先生食先生不受豈非命也哉禦寇笑曰君非自知我也以人之言而遺我粟至共罪我也又且以人之言此吾所以不受也居一年鄭人殺子陽共黨皆死禦寇安然獨全終身不仕著書八篇言道家之意號曰列子二十七年子陽之黨共殺繻公駘而立幽公弟乙為君是為鄭君史鄭世家康徐廣曰一本云立幽公弟乙陽為君是為公六國年表云立幽公子駘又以鄭君為鄭康公乙班固云鄭康公為韓所滅鄭君一作康公鄭君乙立二年鄭負黍反復歸韓初繻公十六年伐韓取負黍十一年韓伐鄭取陽城二十一年韓哀侯滅鄭併其國因徙都鄭史鄭世家雜録鄭君問鄭昭曰太子亦何如對曰太子未生也君曰太子已置而曰未生何也對曰太子雖置然而君之好色不已所愛有子君必愛之愛之則必欲以為後臣故曰太子未生也韓子内儲下鄭君已立太子矣而有所愛美女欲以其子為後夫人恐因用毒藥賊君殺之韓子内儲下國羊重于鄭君聞君之惡已也侍飲因先謂君曰臣適不幸而有過願君幸而告之臣請變更則臣免死罪矣韓子外儲右景差相鄭鄭人有冬涉水者出而脛寒後景差過之下陪乗而載之覆以上袵晉叔向聞之曰景子為人國相豈不固哉吾聞良吏居之三月而溝渠修十月而津梁成六畜且不濡足而况人乎説苑政理鄭人有相與爭年者其一人曰我與黄帝之兄同年訟此而不決以後息者為勝韓子外儲左魏王謂鄭君曰始鄭梁一國也已而别今願復得鄭而合之梁鄭君患之召羣臣而與之謀所以對魏鄭公子謂鄭君曰此甚易應也君對魏曰以鄭為故魏而可合也則敝邑亦願得梁而合之鄭魏王乃止韓子内儲上鄭人欲買履先自度足而置其坐往市而忘乃歸取之人曰何不試以足曰寧信度數無自信也韓子瓠巴鼔琴而鳥舞魚躍瓠巴古善琴者鄭師文聞之師文鄭國樂師棄家從師襄游拄指鈞絃三年而不成立早師襄曰子可以歸矣師文舎其琴嘆曰文非絃之不能鈞非章之不能成文所存者不在絃所志者不在聲内不得于心外不應于器故不敢發手而動絃且小假之以觀其後無㡬何復見師襄師襄曰子之琴何如師文曰得之矣請嘗試之于是當春而叩商絃以召南吕涼風忽至草木成實及秋而叩角絃以激夾鐘温風徐迴草木發榮當夏而叩羽絃以召黄鐘霜雪交下川池暴沍及冬而叩徵絃以激㽔賓陽光熾烈堅氷立散將終命宫而總四絃則景風翔慶雲浮甘露降醴泉湧師襄乃撫心高蹈曰㣲矣子之彈也雖師曠之清角鄒衍之吹律無以加之彼將挾琴執管而從子之後耳列子湯問春秋戰國異辭巻十三
