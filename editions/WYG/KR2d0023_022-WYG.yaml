body:
  text: 春秋戰國異辭卷二十右春坊右諭德陳厚耀撰齊景公下十二年景公如晉見平公欲與伐燕十八年公復如晉見昭公史齊世家齊景公為露寢之臺成而不通焉通一作踊下同柏常騫曰為臺甚急臺成君何為不通焉公曰然有梟昔者鳴其聲無不為也吾惡之甚是以不通焉柏常騫曰臣請禳而去之公曰何具對曰築新室為置白茅焉公使為室成置白茅焉柏常騫夜用事明日問公曰今其聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死公曰子之道若此其明也亦能益寡人壽乎對曰能公曰能益幾何對曰天子九諸侯七大夫五公曰亦有徴兆之見乎對曰得壽地且動公喜令百官趣具騫之所求柏常騫出遭晏子於途拜馬前辭曰騫為君禳梟而殺之君謂騫曰子之道若此其明也亦能益寡人壽乎騫曰能今且大祭為君請壽故將往以聞晏子曰嘻亦善矣能為君請壽也雖然吾聞之惟以政與德順乎神為可以益壽今徒祭可以益壽乎然則福兆有見乎對曰得壽地將動晏子曰騫昔吾見維星絶樞星散地其動汝以是乎柏常騫俯有間仰而對曰然晏子曰為之無益不為無損也薄賦歛毋費民且無令君知之説苑辨物卷又晏子三景公新成柏寢之臺使師開鼓琴師開左撫宫右彈商曰室夕公曰何以知之師開對曰東方之聲薄西方之聲揚公召大匠曰室何為夕西向曰夕大匠曰立室以宫短為之於是召司空曰立宫何為夕司空曰立宫以城短為之明日晏子朝公曰先君太公以營邱之封立城曷為夕晏子對曰古之立國者南望南斗北戴樞星彼安有朝夕哉然而今之夕者周之建國國之西方以尊周也公蹵然曰古之臣乎晏子卷三景公登露寢之臺不能終而息乎陛忿而作色不悦曰孰為髙臺病人之甚也晏子曰君欲節於身則勿髙使人髙之則勿罪今髙從之以罪卑亦從之以罪使人如此可乎古之為宫室也足以便生勿以為侈也故節於身謂於民夏之衰也桀背棄德行為璿室玉門殷之衰也紂作為傾宫靈臺卑狹者罪髙大者賞是以身及焉今君髙亦有罪卑亦有罪甚於夏殷之王民力殫矣而不免於罪臣恐國之流失而公不得享也公曰善寡人之罪非夫子之教豈能守社稷哉遂下不果登臺晏子卷一景公為長庲將欲美之有風雨作公與晏子入坐飲酒致堂上之樂酒酣晏子作歌曰穗乎不得穫秋風至兮殫零落風雨之弗殺也太上之靡弊也歌終顧而流涕張躬而舞公就晏子而止之曰今日夫子為賜而誡於寡人是寡人之罪遂廢酒罷役不果成長庲晏子卷一景公築露寢之臺三年未息又為長庲之役二年未息又為鄒之長塗晏子諫曰百姓之力勤矣公不息乎公曰塗將成矣請成而息之對曰明君不屈民財者不得其利不窮民力者不得其樂昔者楚靈王作頃宫三年未息也又為章華之臺五年又不息也乾溪之役八年百姓之力不足而不息也靈王死於乾谿而民不與君歸今君不遵明君之義而循靈王之跡嬰懼君有暴民之行而不睹長庲之樂也不若息之公曰善非夫子者寡人不知得罪於百姓深也於是令委壊餘財勿收斬板而去之晏子卷一景公築長庲之臺晏子侍坐觴三行晏子起舞曰嵗已暮矣而禾不穫忽忽矣若之何嵗已寒矣而役不罷惙惙矣如之何舞三而涕下沾襟景公慚焉為之罷長庲之役晏子卷四景公為臺臺成又欲為鐘晏子諫曰君不勝欲為臺今復欲為鐘是重歛於民民之哀矣夫歛民之哀而以為樂不祥景公乃止説苑正諫景公成路寢之臺逢於何遭喪遇晏子於途再拜乎馬前晏子下車揖之曰子何以命嬰也對曰於何之母死兆在路寢之臺牖下願請命合骨晏子曰嘻難哉雖然嬰將為子復之若不得子將若何對曰夫君子則有以如我者吾儕小人將左手擁膈右手捆心立餓枯槁而死以告四方之士曰於何不能𦵏其母者也晏子曰諾遂入見公曰有逢於何者母死兆在路寢當如之何願請合骨公作色不悦曰古之及今子亦嘗聞請𦵏人主之宫者乎晏子對曰古之人君其宫室節不侵生民之居臺榭儉不殘死者之墓故未聞請𦵏人主之宫者今君侈為宫室奪人之居廣為臺榭殘人之墓生者憂愁不得安處死者離易不得合骨遂欲滿求不顧細民非君人之道也且嬰聞之生者不得安命之曰蓄憂死者不得𦵏命之曰蓄哀蓄憂者怨蓄哀者危君不如許之公曰諾晏子出梁邱據曰自昔及今未嘗聞求𦵏公宫者也若何許之公曰削人之居殘人之墓凌人之喪而禁其𦵏於生者無施於死者無禮詩云穀則異室死則同穴吾敢不許乎逢於何遂𦵏其母路寢之牖下解衰去絰布衣縢履𤣥冠茈武踊而不哭躃而不拜已乃涕洟而去晏子卷一景公宿於路寢之宫夜分聞西方有男子哭者公悲之明日朝問於晏子曰寡人夜者聞西方有男子哭者聲甚哀氣甚悲是奚為者也寡人哀之晏子曰西郭徒居布衣之士盆成适也父之孝子兄之順弟也又嘗為孔子門人今其不幸而死祔柩未𦵏家貧身老子孺恐力不能合祔是以悲也公曰子為寡人弔之因問其偏祔何所在晏子奉命往弔而問偏之所在盆成适再拜稽首而不起曰偏祔寄於路寢得為地下之臣擁札修筆給事宫殿中右陛之下願以某日送未得君之意也窮困無以圖之布唇枯舌焦心熱中今君不辱而臨之願君圖之晏子曰然此人之甚重者也而恐君不許也盆成适蹷然曰凡在君耳臣聞之越王好勇其民輕死楚靈王好細腰其朝多餓死人子胥忠其君故天下皆願得以為子今為人子臣而離散其親戚孝乎哉足以為臣乎若此而得祔是生臣而安死母也若此而不得則臣請輓尸車而寄之於國門外宇溜之下身不敢飲食擁轅執輅木乾鳥栖袒肉暴骸以望愍之賤臣雖愚竊意明君哀而不忍也晏子入復乎公公忿然作色而怒曰子何必患若言而教寡人乎晏子對曰嬰聞之忠不避危愛無惡言且嬰固已難之矣今君營處為游觀既奪人所有又禁其𦵏非仁也肆心傲聴不恤民憂非義也若何勿聴因道盆成适之辭公喟然太息曰悲乎哉子勿復言乃使男子袒免女子髪笄者以百數為開凶門以迎盆成适适脱衰絰冠條纓墨縁以見乎公公曰吾聞之五子不滿隅一子可滿朝非乃子耶盆成适於是臨事不敢哭奉事以禮畢出門然後舉聲焉晏子卷四晉平公欲伐齊使范昭觀齊國之政景公錫之晏晏子在前酒酣范昭曰願君之倅樽以為壽景公顧左右曰酌寡人樽獻之客范昭已飲晏子曰徹樽更之范昭佯醉不説而起舞顧太師曰能為我調成周之樂乎吾為子舞太師曰盲臣不習范昭趨出景公謂晏子曰晉大國也使范昭來觀齊國之政今子怒大國之使者將奈何晏子曰夫范昭之為人非陋而不知也且欲試吾君嬰故絶之也景公謂太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也若調之必人主舞之今范昭人臣也而欲舞天子之樂臣故不為也范昭歸報平公曰齊未可伐也臣欲試其君而晏子知之臣欲犯其禮而太師知之孔子聞之曰善乎晏子不出俎豆之間折衝千里新序卷一刪晏子卷三合晏子使魯見昭公昭公説曰天下以子大夫語寡人者衆矣今得見而羡乎所聞寡人聞大國之君葢回曲之君也曷以子大夫事之晏子逡巡對曰嬰不肖嬰之族又不若嬰待嬰而祀先者五百家故嬰不敢擇君晏子出昭公語人曰晏子仁人也反亡君安危國而不私利焉使齊外無諸侯之憂内無國家之患不伐功焉鍖然不滿退托於族晏子可謂仁人矣晏子卷二晏子聘於魯魯昭公問曰夫子儼然辱臨敝邑竊甚嘉之請問安國衆民如何晏子對曰嬰聞傲大賤小則國危慢聴厚歛則民散事大養小安國之器也謹聴節儉衆民之術也晏子卷二晏子聘魯上堂則趨授玉則跪子貢怪之以問孔子曰晏子知禮乎孔子曰其有方矣待其見我我將問焉俄而晏子至孔子問之晏子對曰夫上堂之禮君行一臣行二今君行疾臣敢不趨乎今君之授幣也卑臣敢不跪乎孔子曰善禮中又有禮賜寡知也何足以識禮韓詩卷四卷又晏子三田桓子見晏子獨立於牆隂曰子何為獨立而不憂何不求四鄉之學士可者而與坐晏子曰共立似君子出言而非也嬰惡得學士之可者而與之坐且君子之難得也若美山然名山既多矣松柏既茂矣望之相相然盡目力不知厭而世有所美焉固欲登彼相相之上仡仡然不知厭小人者與此異若部婁之未登善登之無蹊雖有楚棘而已逺然無見也俛就則傷嬰惡能無獨立焉且人何憂静處逺慮見嵗若月學問不厭不知老之將至安用從酒田桓子曰何謂從酒晏子曰無客而飲謂之從酒今若子者晝夜守尊謂之從酒也晏子卷三景公疥且瘧朞年不已召㑹譴梁丘據晏子而問焉曰寡人之病病矣使史固與祝佗巡山川宗廟犧牲珪璧莫不備具數其常多先君桓公桓公一則寡人再病不已滋甚予欲殺二子者以説於上帝可乎㑹譴梁丘據曰可晏子不對公曰子何如晏子曰君以祝為有益乎公曰然晏子曰若以為有益則詛亦有損也君疏輔而逺拂忠臣諫言不出臣聞之近臣嘿逺臣瘖衆口鑠金今自聊攝以東姑尤以西者人民衆矣百姓之咎怨誹謗詛君於上帝者多矣一國詛兩人祝雖善祝者不能勝也且夫祝直言情則謗吾君隠匿過則欺上帝上帝神則不可欺不神祝亦無益願君察之也不然則無罪公曰善解余惑命㑹譴毋治齊國之政梁丘據毋治賔客之事兼屬之晏子晏子辭不得命受而退把政改月而君病悛公曰昔吾先君桓公以管子為有功邑狐與穀以共宗廟之鮮則是多忠臣者子今忠臣也寡人請賜子州款辭曰管子有一美嬰不如也有一惡嬰不忍為也其宗廟之養鮮也終辭而不受晏子卷一事景公二十六年與左傳别齊景公二十六年獵魯郊因入魯與晏嬰問魯禮史齊世家齊大旱景公召羣臣問曰天不雨久矣民且有饑色吾使人卜之祟在髙山廣水寡人欲少賦歛以祠靈山可乎羣臣莫對晏子進曰不可祠此無益也夫靈山固以石為身以草木為髪天久不雨髪將焦身將熱彼獨不欲雨乎祠之無益景公曰不然吾欲祠河伯可乎晏子曰祠此無益也夫河伯以水為國以魚鼈為民天久不雨水泉將下百川竭國將亡民將滅矣彼獨不用雨乎祠之何益景公曰今為之奈何晏子曰君誠避宫殿暴露與靈山河伯共憂其幸而雨乎於是景公出野暴露三日天果大雨民盡得種樹景公曰善哉晏子之言可無用乎其惟有德也説苑辨物晏子卷一又景公之時熒惑守於虚朞年不去公異之召晏子而問曰吾聞之人行善者天賞之行不善者天殃之熒惑天罰也今留虚其孰當之晏子曰齊當之公不説曰天下大國十二皆曰諸侯齊獨何以當晏子曰虚齊野也且天之下殃固於富强為善不用出政不行賢人使逺讒人反昌百姓疾怨自為祈祥碌碌彊食進死何傷是以列舍無次變星有芒熒惑退逆孽星在旁有德不用安得不亡公曰可去乎對曰可致者可去不可致者不可去公曰寡人為之奈何對曰盍去寃聚之獄使反田乎散百官之財施之民乎振孤寡而敬老人乎若是者百惡可去何獨是孽公曰善行之三月而熒惑退晏子卷一孔子適齊魯三昭公二十五年齊景公之十一年也孔子自魯適齊齊景公讓登夫子降一等景公三辭然後登既坐曰夫子降德辱臨寡人寡人以為榮也而降階以逺自絶於寡人寡人未知所以為罪孔子答曰君惠顧外臣君之賜也然以匹夫敵國君非所敢行也雖君私之其若義何孔叢子上三十一年魯昭公辟季氏難奔齊齊欲以千社封之子家止昭公昭公乃請齊伐魯取鄆以居昭公史齊世家孔子見齊景公梁丘據自外而至公曰何遲對曰陳氏戮其小臣臣有辭為是故遲公笑而目孔子曰周書所謂明德慎罰陳子明德也罰人而有辭非不慎矣孔子答曰昔康叔封衛統三監之地命為孟侯周公以成王之命作康誥焉稱述文王之德以成敇誡之文其書曰惟乃丕顯考文王克明德慎罰克明德者能顯用有德舉而任之也慎罰者并心而慮之衆平然後行之致刑錯也此言所任不失德所罰不失罪不謂己德之明也公曰寡人不有過言則安得聞吾子之教也孔叢子上景公問於孔子曰秦穆公其國小處僻而霸何也對曰其國小而志大雖處僻而其政中其舉果其謀和其令不偷親舉五羖大夫於係縲之中與之語三日而授之政以此取之雖王可也霸則小矣説苑尊賢景公問政於孔子孔子曰政在節財景公悦欲以尼谿田封孔子晏子進曰夫儒者滑稽而不可軌法倨傲自順不可以為下崇喪遂哀破産厚𦵏不可以為俗游説乞貸不可以為國自大賢之息周室既衰禮樂有缺今孔子盛容飾繁登降之禮趨蹌之節累世不能殫其學當年不能究其禮君欲用之以移齊俗非所以先細民也後景公敬見孔子不問其禮史孔子世家又晏子卷四少異景公為大鐘將懸之仲尼伯常騫晏子三人俱來朝皆曰鐘將毁撞之果毁公召三人問之晏子曰鐘大非禮是以曰將毁仲尼曰鐘大懸下其氣不得上薄是以曰將毁伯常騫曰今日庚申雷日也隂莫勝於雷是以曰將毁晏子初今本無見學記孔子與景公坐左右白曰周使來言周廟燔景公出問曰何廟也孔子曰是釐王廟也景公曰何以知之孔子曰詩云皇皇上帝其命不忒天之與人必報有德禍亦如之夫釐王變文武之制而作𤣥黄宫室輿馬奢侈不可振也故天殃其廟是以知之景公曰天何不殃其身曰天以文王之故也若殃其身文王之祀無乃絶乎故殃其廟以彰其過也左右入報曰周釐王廟也景公大驚起再拜曰善哉聖人之智豈不大哉説苑權謀又家語畧同夫子適齊晏子就其館既宴其私焉曰齊其危矣譬若載無轄之車以臨千仞之谷其不顛覆亦難冀也子吾心也子以齊為游息之館當或可救子幸不吾隠也夫子曰夫死病無可為毉夫政令者人君之御轡所以制下也今齊君失之已久矣子雖欲挾其輈而扶其輪良弗及也抑猶可以終齊君及子之身過此以往齊其田氏矣孔叢子上景公謂子貢曰先生何師對曰魯仲尼曰仲尼賢乎曰聖人也豈直賢哉景公嘻然而笑曰其聖何如子貢曰不知也景公勃然作色曰始言聖人今言不知何也子貢曰臣終身戴天不知天之髙也終身踐地不知地之厚也若臣之事仲尼譬猶渴操壺杓就江海而飲之腸滿而去又安知江海之深乎景公曰先生之譽得毋太甚乎子貢曰臣賜何敢甚言尚慮不及耳臣譽仲尼譬兩手捧土而附泰山其無益亦明矣使臣不譽仲尼譬猶兩手把泰山無損亦明矣景公曰善豈其然豈其然韓詩卷七説苑善説又齊東郭亥欲攻田氏執贄見夫子而訪焉夫子曰子為義也予不足與計事揖子貢使答之子貢謂之曰今子士也位卑而圖大位卑則人不附也圖大則人憚之殆非子之任也盍姑已乎夫以一縷之任繫千鈞之重上懸之於無極之髙下垂之於不測之深旁人皆知其絶而造之者不知其危子之謂乎馬方駭鼓而驚之繫方絶重而填之馬奔車覆六轡不禁繫絶於髙墜入於深其危必矣東郭亥色戰而跪曰吾已矣願子無言既而夫子告子貢曰東郭亥欲為義也子亦告之以難易則可矣奚至懼之哉孔叢子上曾子從孔子於齊齊景公以下卿禮聘曾子曾子固辭將行晏子送之曰吾聞君子贈人以財不若以言今夫蘭本三年湛之以鹿醢既成則易以匹馬非蘭本美也願子詳其所湛既得所湛亦求所湛吾聞君子居必擇處遊必擇士居必擇處所以求士也遊必擇士所以修道也吾聞反常移性者欲也故不可不慎也説苑雜言仲尼曰靈公汙晏子事之以整齊莊公壯晏子事之以宣武景公奢晏子事之以㳟儉君子也相三君而善不通下晏子細人也晏子聞之見仲尼曰嬰聞君子有譏於嬰是以來見如嬰者豈能以道食人者哉嬰之宗族待嬰而祀其先人者數百家與齊國之閑士待嬰而舉火者數百家臣為此仕者也如臣者豈能以道食人者哉晏子出仲尼送之以賔客之禮再拜其辱反命門弟子曰救民之姓而不夸行輔三君而不有晏子果君子也孔叢子詰墨墨子曰孔子見景公公曰先生素不見晏子乎對曰晏子事三君而得順焉是有三心所以不見也公告晏子晏子曰三君皆欲其國安是以嬰得順也聞君子獨立不慙於影今孔子伐樹削迹不自以為辱身窮陳蔡不自以為約始吾望儒貴之今則疑之詰之曰若是乎孔子晏子交相毁也小人有之君子則否梁丘據問晏子曰事三君而不同心而俱順焉仁人固多心乎晏子曰一心可以事百君百心不可以事一君故三君之心非一也而嬰之心非三也孔子聞之曰小子記之晏子以一心事三君君子也如此則孔子譽晏子非所謂毁而不見也景公問晏子曰若人之衆則有孔子乎對曰孔子者君子行有節者也晏子又曰盈成匡父之孝子兄之悌弟也其父尚為孔子門人門人且以為貴則其師亦不賤矣是則晏子亦譽孔子也夫德之不修已之罪也不幸而屈於人己之命也伐樹削迹絶糧七日何約乎哉晏子以此而疑儒則晏子亦不足賢矣又詰墨墨子曰景公祭路寢聞哭聲問梁丘據對曰魯孔子之徒也其母死服喪三年哭泣甚哀公曰豈不可哉晏子曰古者聖人非不能也而不為者知其無補於死者而深害生事故也詰之曰墨子欲以親死不服三日哭而已於意安者卒自行之偽引晏子之言而同乎已適證其非耳且晏子服父禮則無縁非行禮者也又詰墨墨子稱景公問晏子以孔子而不對又問三皆不對公曰以孔子語寡人者衆矣俱以為賢人今問子而不對何也晏子曰嬰聞孔子之楚知白公謀而奉之以石乞勸下亂上教臣弑君非聖賢之行也詰之曰楚昭王之世夫子應聘如楚不用而反周旋乎陳宋齊衛楚昭王卒惠王立十年令尹子西乃召王孫勝以為白公是時魯哀公十五年也夫子自衛反魯居五年矣白公立一年然後乃謀作亂亂作在哀公十六年秋也夫子已卒十旬矣墨子雖欲謗毁聖人虚造妄言奈此年世不相值何孔叢子墨子曰孔子怒景公之不封己乃樹鴟夷子皮於田常之門詰之曰夫樹人為信己也記曰孔子適齊惡陳常而終不見常病之亦惡孔子交相惡而又任事其然矣記又曰陳常弑其君孔子齋戒沐浴而朝請討之觀其終不樹子皮審矣景公三十二年彗星見公坐柏寢嘆曰堂堂誰有此乎羣臣皆泣晏子笑公怒晏子曰臣笑羣臣諛甚景公曰彗星出東北當齊分野寡人以為憂晏子曰君髙臺深池賦歛如弗得刑罰恐弗勝茀星將出茀音佩謂客星侵近邊側欲相害彗星何懼乎公曰可禳否晏子曰使神可祝而來亦可禳而去也百姓苦怨以萬數而君令一人禳之安能勝衆口乎是時景公好治宫室聚狗馬厚賦重刑故晏子以此諫之史齊世家與左昭二十六年迥别魯昭公棄國走齊齊景公問焉曰君何年之少而棄國之蚤昭公曰吾之少時人多愛我者吾體不能親人多諫我者吾志不能用是則内無拂而外無輔輔拂無一人諂諛我者甚衆譬之猶秋蓬也孤其根而美枝葉秋風一至根且拔去景公辯其言以語晏子曰使是人反國豈不為古之賢君乎晏子對曰不然夫愚者多悔不肖者自賢溺者不問墜迷者不問路溺而後問墜迷而後問路譬之臨難而遽鑄兵噎而遽掘井雖速亦無及也晏子卷三景公予魯君地山隂數百社使晏子致之魯使子叔昭伯受地不盡受也晏子曰寡君獻地忠廉也曷為不盡受子叔昭伯曰臣受命於君曰諸侯相見交讓争處其卑禮之文也交委多争受少行之實也禮成文於前行成章於後交之所以長久也且吾聞君子不盡人之歡不竭人之忠吾是以不盡受也晏子歸報公公笑曰魯君猶若是乎晏子曰臣聞大國貪於名小國貪於實此諸侯之通患也今魯處卑而不貪於尊辭實而不貪乎多行廉不為苟得道義不為茍合不盡人之歡不竭人之忠以全其交君之道義殊於世俗國免於患公曰寡人説魯君故予之地今行果若此吾將使人賀之晏子曰否君以驩予之地而賀其辭則交不親而地不為德矣公曰善於是重魯之幣毋比諸侯晏子卷三孔子見齊景公景公致廪丘以為養孔子辭不受入謂弟子曰吾聞君子當功以受禄今説景公景公未之行而賜之廩丘其不知予亦甚矣令弟子趣駕辭而行吕覽髙義立節又説苑又家語史記孔子世家初魯昭公出奔魯亂孔子於是適齊為髙昭子家臣語近誣以通乎景公時齊旱饑景公問曰如之何對曰凶年力役不興馳道不修祈以幣玉祀以下牲此賢君自貶以救民之禮也公欲封以尼谿之田晏子不可孔子遂行反乎魯反魯在魯昭三十二年齊景之三十八年也景公伐魯得東門無擇一作澤公問曰魯之年穀何如對曰隂水厥陽氷厚五寸公不知以告晏子晏子對曰君子也問年穀而對以氷禮也隂水厥陽氷厚五寸者寒温節也節則刑政平平則上下和和則年穀熟年充衆和而伐之臣恐罷民弊兵請禮魯以息吾怨遣其執以明吾德公曰善乃不伐魯晏子卷三齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏子乃薦田穰苴曰穰苴田完之苗裔也穰苴雖田氏庶孽然其人文能附衆武能威敵願君試之景公召穰苴與語兵事大悦之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓不信人微權輕願得君之寵臣國之所尊以監軍乃可於是景公許之使莊賈往穰苴既辭與莊賈約曰旦日日中㑹於軍門穰苴先馳至軍立表下漏待賈賈素驕貴以為將已之軍而已為監不甚急親戚左右送之留飲日中而賈不至穰苴則仆表決漏入行軍勒兵申明約束約束既定夕時莊賈乃至穰苴曰何後期為賈謝曰不佞大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身今敵國深侵邦内騷動士卒暴露於境君寢不安席食不甘味百姓之命皆懸於君何為相送乎召軍正問曰軍法期而後至者云何對曰當斬莊賈懼使人馳報景公請救既往未及反於是遂斬莊賈以狗三軍三軍之士皆振慄久之景公遣使者持節赦賈馳入軍中穰苴曰將在軍君令有所不受問軍正曰軍中不馳今使者馳云何曰當斬使者大懼穰苴曰君之使不可殺乃斬其僕車之左駙馬之左驂以狗三軍遣使者還報然後行士卒次舍井竈飲食問疾醫藥身自拊循之悉取將軍之資糧享士卒身與士卒平分糧食最比其羸弱者三日而後勒兵病者皆求行争奮出為之赴戰晉師聞之為罷去燕師聞之度水而解於是追擊之遂取所亡封内故境而引兵歸未至國釋兵旅解約束􅊎盟而後入邑景公與諸大夫郊迎勞師成禮然後反歸寢既見穰苴尊為大司馬田氏日以益尊於齊已而髙國之屬譖于景公穰苴發疾而死其後齊威王用兵行威使大夫追論古司馬兵法而附穰苴其中因曰司馬穰苴兵法史穰苴傳晏子景公信用讒佞賞無功罰不辜晏子諫曰臣聞明君望聖人而信其教不聞聴讒佞以誅賞今與左右相説頌也曰比死者勉為樂乎吾安能為仁而愈黥民耳矣故内寵之妾迫奪於國外寵之臣矯奪於鄙執法之吏竝荷百姓民愁苦約病而姦驅尤佚隠情奄惡蔽謟其上故雖有至聖大賢豈能勝若讒哉是以忠臣之常有災傷也臣聞古者之士可與得之不可與失之可與進之不可與退之臣請逃之矣遂鞭馬而出公使韓子休追之曰孤不仁不能順教以至此極夫子休國焉而往寡人將從而後晏子遂鞭馬而返其僕曰嚮之去何速今之返又何速晏子曰非子之所知也公之言至矣梁丘據死景公召晏子而告之曰據忠且愛我我欲豐厚其葬髙大其壟晏子曰敢問據之忠與愛於君者可得聞乎公曰吾有喜於玩好有司未能我具也則據以其所有共我是以知其忠也每有風雨暮夜求必存吾是以知其愛也晏子曰嬰對則為罪不對則無以事君敢不對乎嬰聞臣専其君謂之不忠子專其父謂之不孝妻專其夫謂之嫉事君之道導親於父兄有禮於羣臣有惠於百姓有信於諸侯謂之忠為子之道以鍾愛其兄弟施行於諸父慈惠於衆子誠信於朋友謂之孝為妻之道使其衆妾皆得歡忻於其夫謂之不嫉今四封之民皆君之臣也而維據盡力以愛君有闕文晏子齊景公伐宋至於岐隄之上登髙以望太息而嘆曰昔我先君桓公長轂八百乗以霸諸侯今我長轂三千乗而不敢久處於此者豈其無管仲歟弦章對曰臣聞之水廣則魚大君明而臣忠昔有桓公故有管仲今桓公在此則車下之臣盡管仲也説苑尊賢少又晏子卷二别齊景公將伐宋師過泰山公夢二丈人立而怒甚盛公告晏子晏子曰是宋之先湯與伊尹也公疑以為泰山神晏子曰公疑之則嬰請言湯伊尹之狀湯晢以長頎以髯鋭上而豐下据身而揚聲公曰然是已伊尹黒而短蓬而髯豐上而鋭下僂身而下聲公曰然是已今奈何晏子曰夫湯太甲武丁祖乙天下之盛君也不宜無後今唯宋耳而公伐之故湯伊尹怒請散師和於宋公不用終伐宋軍果敗論衡卷二十一晏子卷一景公將伐宋師過泰山公夢二丈夫立而怒怒甚盛公恐覺辟門召占夢者至公告之夢且曰吾不知其所言吾猶識其狀識其聲占夢者曰師過泰山而不用祀故泰山之神怒也請趣召祝史祠乎泰山公曰諾明日晏子朝公告之如占夢者之言晏子俯有間對曰此非泰山之神是宋之先湯與伊尹也公疑之晏子曰嬰請言湯伊尹之狀湯質晢而長頎以髯鋭上豐下据身而揚聲公曰然伊尹黑而短蓬而髯豐上鋭下僂身而下聲公曰然今若何晏子曰夫湯太甲武丁祖乙天下之盛君也不宜無後今惟宋耳而公伐之故湯伊尹怒請散師以平宋公不用終伐宋晏子曰伐無罪之國以怒明神師若果進軍必有殃軍進再舍鼓毁將殪公乃散師不果伐宋又博物志齊侯問於晏子曰當今之時諸侯孰危對曰莒其亡乎公曰奚故對曰地侵於齊貨竭於晉是以亡也説苑權謀又晏子卷二齊景公謂太卜曰子之道何能對曰能動地晏子往見公公曰寡人問太卜曰子之道何能對曰能動地地可動乎晏子黙然不對出見太卜曰昔吾見句星在房心之間地其動乎太卜曰然晏子出太卜走往見公曰臣非能動地地固將動也田子陽聞之曰晏子黙然不對者不欲太卜之死往見太卜者恐公之欺也晏子可謂忠於上而惠於下矣淮南子道應又晏子卷四景公與晏子遊於少海登柏寢之臺而還望其國曰美哉決決乎堂堂乎後世將孰有此晏子對曰其田成氏乎景公曰寡人有此國也而曰田成氏有之何也晏子對曰夫田成氏甚得齊民其於民也上之請爵禄行諸大臣下之私大斗斛區釡以出貸小斗斛區釜以收之殺一牛取一頭肉餘以食士終嵗布帛取二制焉餘以衣士故市木之價不加貴於山澤之魚鹽龜鼈蠃蚌不貴於海君重歛而田成氏厚施齊嘗大饑道旁餓死者不可勝數父子相牽而趨田成氏故周秦之民相與歌之曰謳乎其已乎苞乎其往歸田成子乎詩曰雖無德與女式歌且舞今田成氏之德而民歌舞之民德歸之矣故曰其田成氏乎公泫然出涕曰不亦悲乎寡人有國而田成氏有之今為之奈何晏子對曰君何患焉若君欲奪之則近賢而逺不肖治其煩亂緩其刑罰振貧窮而恤孤寡行恩惠而給不足民將歸君則雖有十田成氏其如君何韓子外儲左年與左昭二十六别孔叢子齊東郭亥欲攻田氏執贄見夫子而訪焉夫子曰子為義也予不足與計事揖子貢使答之子貢謂之曰今子士也位卑而圖大位卑則人不附也圖大則人憚之殆非子之任也盍姑已乎夫以一縷之任繫千鈞之重上懸之於無極之髙下垂之於不測之深旁人皆哀其絶而造之者不知其危子之謂乎馬方駭鼓而驚之繫方絶重而填之馬奔車覆六轡不禁繫絶於髙墜入於深其危必矣東郭亥色戰而跪曰吾已矣願子無言既而夫子告子貢曰東郭亥欲為義者也子亦告之以難易則可矣奚至懼之哉景公與晏子立曲潢之上望見齊國問晏子曰後世孰得踐有齊國者乎晏子對曰非賤臣之所敢議也公曰胡必然也得者無失則虞夏常存矣晏子對曰臣聞見不足以知之者智也先言而後當者惠也夫智與惠君子之事臣奚足以知之乎雖然臣請陳為政君强臣弱政之本也君唱臣和教之隆也刑罰在君民之紀也今田無宇二世有功於國而利取分寡公室兼之國權専之君臣易施能無衰乎由是觀之無宇之後無幾齊為田氏之國也嬰老不能待公之事公若即世政不在公室矣公曰然則奈何晏子對曰惟禮可以已之其在禮也家施不及國民不懈貨不移工賈不變士不濫官不諂大夫不收公利公曰善今知禮之可以為國也對曰禮之可以為國也久矣與天地並立君令臣忠父慈子孝兄愛弟敬夫和妻柔姑慈婦聴禮之經也君令而不違臣忠而不二父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而貞姑慈而從婦聴而婉禮之質也公曰善哉寡人乃今知禮之尚也晏子曰夫禮先王之所以臨天下也以為其民是故尚之晏子卷四年與左昭二十六傳畧同齊人甚好轂擊相犯以為樂禁之不止晏子患之乃為新車良馬出與人相犯也曰轂擊者不祥其祭祀不順居處不敬乎下車棄而去之然後國人乃不焉説苑政理又晏子卷三齊有北郭騷者結罘網捆蒲葦織葩履以養其母猶不足踵門見晏子曰願乞所以養母晏子之僕謂晏子曰此齊國之賢者也其人不臣乎天子不友乎諸侯於利不茍取於害不茍免今乞所以養母是悦夫子之義也必與之晏子使人分倉粟府金而遺之騷辭金而受粟有間晏子見疑於齊君出奔過北郭騷之門而辭北郭騷沐浴而出見晏子曰夫子將焉適晏子曰見疑於吾君將出奔北郭子曰夫子勉之矣晏子上車太息而嘆曰嬰之亡豈不宜哉亦不知士甚矣晏子行北郭子召其友而告之曰説晏子之義而常乞所以養母焉吾聞之養及親者身伉其難今晏子見疑吾將以身死白之著衣冠令其友操劍奉笥而從造於君庭求復曰晏子天下之賢者也去則齊國必侵矣必見國之侵也不若死請以頭託白晏子也因謂其友曰盛吾頭于笥中奉以託退而自刎也其友因奉以託謂觀者曰北郭子為國故死吾將為北郭子死也又退而自刎齊君聞之大駭乗驛而追晏子及之國郊請而返之晏子不得已而返聞北郭騷之以死白已也曰嬰之亡豈不宜哉亦愈不知士甚矣吕覽士節晏子卷三又説苑復恩北郭騷踵見晏子竊悦先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金而受粟有間晏子見疑於景公出奔北郭子召其友而告之曰吾悦晏子之義而嘗乞所以養母者吾聞之曰養及親者身更其難今晏子見疑吾將以身白之遂告公廷求復者曰晏子天下之賢者也今去齊國齊國必侵矣方必見國之侵也不若先死請絶頸以白晏子逡巡而退因自殺也公聞之大駭乗馳而自追晏子及之國郊請而反之晏子不得已而反聞北郭子之以死白已也太息而歎曰嬰不肖罪過固其所也而士以身明之哀哉燕之遊士有泯子午者南見晏子於齊言有文章術有條理巨可以補國細可以益晏子者三百篇見晏子恐懼而不能言晏子假之以悲色開之以禮顔然後能盡其復也客退晏子直席而坐廢朝移時在側者曰向者燕客侍夫子胡為憂也晏子曰燕萬乗之國也齊千里之途也泯子午以萬乗之國為不足説以千里之途為不足逺則是千里人之上也且猶不能殫其言於我况乎齊人之懐善而死者乎吾所不得睹者多矣然吾失此何之有也晏子卷三晏子為齊相出其御之妻從門間而闚其夫其夫為相御擁大葢策駟馬意氣揚揚甚自得也既而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常若有以自下者今子長八尺乃為人僕御然子之意自以為足妾是以求去也其後夫自抑損晏子怪而問之御以實對晏子薦以為大夫史晏子傳又列女傳髙繚仕於晏子晏子逐之左右諫曰髙繚之事夫子三年曾無以爵位而逐之其義可乎晏子曰嬰仄陋之人也四維之然後能直今此子事吾三年未嘗弼吾過是以逐之也説苑臣術晏子卷四晏子使髙糺糺音糾治家三年而辭焉儐者諫曰髙糺之事夫子三年曾無以爵位而逐之敢請其罪晏子曰夫方立之人惟聖人而已如嬰者仄陋之人也左嬰右嬰之人不舉曰維將不正今此子事吾三年未嘗弼吾過也吾是以辭之齊景公起大臺之役嵗寒不已國人望晏子晏子見公乃坐飲酒樂晏子曰君若賜臣臣請歌之歌曰庶民之言曰凍水洗我若之何太上糜散我若之何又歌曰庶民之餒我若之何奉上糜弊我若之何歌終喟然流涕公止之曰子殆為大臺之役夫寡人將速罷之晏子卷一晏子使於魯比其反也景公使國人起大臺之役嵗寒不已凍餒之者鄉有焉國人望晏子晏子至已復事公迺坐飲酒樂晏子曰君若賜臣臣請歌之曰凍水洗我若之何太上糜散我若之何歌終喟然歎而流涕公就止之曰夫子曷為至此殆為大臺之役夫寡人將速罷之晏子再拜出而不言遂如大臺執朴鞭其不務者曰吾細人也皆有葢廬以避燥濕君為一臺而不速成何為國人皆曰晏子助天為虐晏子歸未至而君出令趣罷役車馳而人趨仲尼聞之喟然歎曰古之善為人臣者聲名歸之君禍災歸之身入則切磋其君之不善出則髙譽其君之德義是以雖事惰君能使垂衣裳朝諸侯不敢伐其功其晏子是耶齊景公以其子妻闔閭齊嫁女於吴當在吴破楚之後景公之四十二三年送諸郊泣曰余死不汝見矣髙夢子曰齊負海而縣山縱不能全收天下誰干我君君愛則弗行公曰余有齊國之固不能以令諸侯又不能聴是生亂也寡人聞之不能令則莫若從且夫吴若蜂蠆然不弃毒於人則不静余恐弃毒於我也遂遣之説苑權謀四十七年魯陽虎攻其君不勝奔齊請齊伐魯鮑子諫景公乃囚陽虎陽虎亡奔晉史齊世家陽虎為難於魯走之齊請師攻魯景公四十七年齊侯許之鮑文子曰不可也陽虎欲齊師破齊師破大臣必多死於是欲奮其詐謀夫虎有寵於季氏而將殺季孫以不利魯國而容其求焉今君富於季氏而大於魯國兹陽虎所欲傾也魯免其疾而君又收之毋乃害乎齊君乃執之免而奔晉説苑權謀與左傳稍别景公遊於麥丘問其封人曰年幾何矣對曰鄙人之年八十五矣公曰壽哉子其祝我封人曰使君之年長於胡宜國家公曰善哉子其復之曰使君之嗣壽皆若鄙臣之年公曰善哉子其復之封人曰使君無得罪於民公曰誠有鄙民得罪於君則可安有君得罪於民者乎晏子諫曰君過矣彼疏者有罪戚者治之賤者有罪貴者治之君得罪於民誰則治之敢問桀紂君誅乎民誅乎公曰寡人固也於是賜封人麥丘以為邑晏子卷一齊景公遊於海上而樂之六月不歸令左右曰敢有先言歸者至死不赦顔燭韓非子作田成子趨進諫曰君樂治海上而六月不歸彼倘有治國者君且安得樂此海也景公援㦸欲斫之顔燭趨進撫衣待之曰君奚不斫也昔者桀殺闗龍逢紂殺王子比干君之賢非此二主也臣之材亦非此二子也君奚不斫以臣參此二人者不亦可乎景公説遂歸中道聞國人謀不内矣説苑正諫子華子見齊景公公問所以為國奈何而治子華子對曰臣愚以為國不足為也事不足治也有意於為則狹矣有意於治則陋矣夫有國者有大物也所以持之者大矣狹且陋者果不足以有為也公曰然則國不可為矣乎子華子曰非然也臣之所治者道也道之為治厚而不博敬守其一正性内足羣衆不周而務成一能盡能既成四境以平唯彼天符不周而同此神農之所以長也堯舜氏之所以章也夏后氏之所以勤也夫人主自智而愚人自巧而拙人若此則愚拙者請矣巧智者詔矣詔多則請者加多矣請者加多則是無不請也主雖巧智未無不知也以未無不知應無不請其道固窮為人主而數窮於其下將何以君人乎窮而不知其窮又將自以為多夫是之謂重塞之國上有諱言之君下有茍且之俗其禍起於欲為也其禍起於願治也夫有欲為願治之心而獲重塞之禍是以臣愚以為國不足為也事不足治也昔者有道之世因而不為責而不詔去想去意静處以待不伐之言不奪之事循名覈實官庀其司以不知為道以奈何為寳神農曰若何而和百物調三光堯曰若何而為日月之所燭舜曰若何而服四荒之外禹曰若何而治青北九陽竒怪之所際此王者天下以為功後世以為能以故記之所道而君之所知也臣戅而不知方始而至於朝也竊有疑焉齊之所以為齊者抑以異矣鐘鼓祝圉日以抎考而和聲不聞司空之刀鋸齗斷如也而罪罟滋長諸侯之賔客膏其唇吻而争進諛言左右在廷之人主為蔽䝉僮夫豎隷曉然皆知公上之有惂心也造為謌謡以蠱君心君曾不之知也冕旒清晨位宁以聴惄焉以古人自耦君之心則泰矣夫其誰而顧肯以其一介之鄙試嘗君之嗜好而以干其不測之禍夷考所由來以君之心勝故也心勝則道不集矣羣臣之不肖者又隨而揚之故其蔽日以深其固如性而君曾不之知也夫以君之明疏瀹其所底滞而開之以鄉道夫孰能禦之抑臣聞之萬物之變也萬事之化也不可為也不可究也因其然而推之則無不得其要者矣故臣愚以為國不足為也事不足治也公曰洋洋乎而之所以言吾欲以有説而無所措吾辭而之道博大而無倪吾所不能為也嘗日有以拂吾之陋心子華子退而食於晏氏子華子後孔子傾葢子華人偽託其書出近世姑存三則子華子謂晏子曰夫治有象大夫亦嘗聞之乎晏子曰嬰願聞之子華子曰治古之時其君之志也端以有修其臣同德比義而無有異心朝無幸位事無失業其民感而從法疏而弗失上下剪剪惟其君之聴盩氣伏息災疾不作四鄰寢兵而珪玉纁幣以承其懽此非治象而何今齊之正言不聞聰明不開朝茀而不除野荒而荐饑其去治象也逺矣無等級以寄言者矣本聞之下無言謂之瘖上無聞謂之聾聾瘖之朝上有於志而下多忌諱齊之謂也泰山之髙非一石之積也琅琊之東渤澥稽天非一水之鍾也所以治國家天下者非一士之言也今齊之執事者其悖矣乎墨以為明狐而為倉以一為二以二為三公不能禁也植黨與而獲其所同忌前而排孤媕婀脂韋者日至於君之前固寵而恃便公不能禁也猶之買馬者然不論其足力而以色物毛澤而為儀則廄無走馬矣猶之售玉者然不論其廉貞温粹而無瑕者而以大小徑廣為儀則篋無連城矣惟士亦然論士不以其才而以勢地為儀則伊尹仲父不立於朝矣且齊之為國也表海而負嵎輪廣隈澳其塗之所出四通而八達遊士之所凑也今齊君之所習而狎者非鮑國之私人則崔田之黨也遊士無所植其足矣遊士無所植其足則憑軾結轍而違之夫遊士之所以去則治象之所以不存也夫子之於齊君也朝夕進見而猶固惜自愛也獨不出其謦欬而規以振起之夫子之仁心抑已偏矣晏子曰善微吾子嬰無所聞之嬰之於君犬彘之臣也吾子之言之也嬰有罪矣子華子晏子問於子華子曰聖人尚儉於傳有之乎子華子曰有之夫儉聖人之所寳也所以御世之具也三皇五帝之所留察也晏子曰嬰聞之堯不以土階為陋而有虞氏怵戒於塗髹塗髹若今畫壁漆柱之類其尚儉之之謂歟子華子曰何哉大夫之所謂儉者夫儉在内不在外也儉在我不在物也心居中虚以治五官精氣動薄神化回潏嗇其所以出而謹節其所受然後神宇泰定而精不揺其格物也明其遇事也剛此之謂儉而聖人之所寳也所以御世之具也三皇五帝之所留察也何哉大夫之所謂儉者夫視入以為出庾氏之職業也操羸而制餘商賈子之所為也中人之家計口然後食閭里之志也乃若天子者大官也有天下者大器也臨萬品御萬民窮天之産罄地之毛無有不共無有不備此則古今常尊之勢也奈何而以閭里之所志商賈子之所為庾氏之職業仰而議夫堯舜之量哉此腐儒之所守而汙俗之所以相欺者也土階塗髹之説野人之所稱道而於傳所不傳者也本聞之堯居於衢室之宫垂衣而襞幅邃如神明之居輯五瑞以見羣后帶幅舄而入覲者如衆星之拱北堯則若固有之也舜遊於巖廊之上被袗衣而鼓五絃之琴畫日月於太常備十有二章黼黻𤣥黄爛如也出則有鸞和動則有珮環步趨中於莖韶之節舜亦若固有之也夫堯舜之備物也如此而惡有所謂土階三尺茅茨不剪者惡有所謂塗髹以自怵戒者此腐儒之所守而汙俗之所以相欺者也故記所不道也桀紂之亡天下也以不仁而不以奢也戒奢者有禮存焉禮之所存可約則殺可豐則腆豈有覽四海之賦受九陔之經入而土階以居欲有塗髹而不敢也其不然也必矣且先王之制也改玉則改行旂旒冕璪以示登降之品今汙世人不通於禮也處尊而偪賤居大而侵下夫以王公之尊而圉隷以自奉難為其下矣不惟以陋於厥躬也而又旁無以施其族黨上不豐其宗祧而曰吾以是為儉也不亦夷貊之人矣乎晏子曰善微吾子嬰無所聞之也終不敢以論儉子華子髙子問晏子曰子事靈公莊公景公皆敬子三君之心一耶夫子之心三也晏子對曰善哉問嬰聞一心可以事百君三心不可以事一君故三君之心非一也而嬰之心非三也且嬰之於靈公也盡復而不能立之政所謂僅全其四支以從其君者也及莊公陳武夫尚勇力欲辟勝於邪而嬰不能禁故退而野處嬰聞之言不用者不受其禄不治其事者不與其難吾於莊公行之矣今君輕國而重樂薄於民而厚於養籍歛過量使令過任而嬰不能禁康知其能全身以事君乎晏子卷四四十八年與魯定公好㑹夾谷犁鉏曰孔子知禮而怯請令萊人為樂因執魯君可得志景公害孔丘相魯懼其霸故從犁鉏之計方㑹進萊樂孔子厯階上使有司執萊人斬之以禮讓景公景公慙乃歸魯侵地以謝而罷去是嵗晏嬰卒史齊世家史記晏子傳晏平仲嬰者萊之夷維人也事齊靈公莊公景公以節儉力行重於齊既相齊食不重肉妾不衣帛其在朝君語及之即危言語不及之即危行國有道即順命無道即衡命以此三世顯名於諸侯淮南子昔齊景公内好聲色外好狗馬獵射忘歸好色無辯作為路寢之臺族鑄大鐘撞之庭下郊雉皆呴一朝用三千鍾贛梁丘據子家噲導於左右故晏子之諫生焉漢書藝文志儒家有晏子八篇禮記檀下弓曾子曰晏子可謂知禮也已恭敬之有焉有若曰晏子一狐裘三十年遣車一乗及墓而反國君七个遣奠牲醴之數遣車七乗大夫五个遣車五乗晏子焉知禮曾子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮晏子病將死斷楹内書焉謂其妻曰楹也語子壯而視之及壯發書書之言曰布帛不窮窮不可飾牛馬不窮窮不可服士不可窮窮不可任窮乎窮乎窮也説苑反質又晏子卷三末二句作國不可窮窮不可竊也變晏子病將死其妻曰夫子欲無言乎曰吾恐死而俗謹視爾家毋變爾俗也景公四十八年晏嬰卒史記齊景公遊於蔞聞晏子卒公乗輿素服驛而驅之自以為遲下車而趨知不若車之速則又乗比至於國者四下而趨行哭而往矣至伏屍而號曰子大夫日夜責寡人不遺尺寸寡人猶且淫泆而不收怨罪重積於百姓今天降禍於齊國不加寡人而加夫子齊國之社稷危矣百姓將誰告矣説苑韓子外儲左景公遊少海𫝊騎從中來謁曰嬰疾甚且死恐公後之景公遽起𫝊騎又至景公曰趨駕煩且之乗使騶子韓樞御之行數百里以騶為不疾奪轡代之御可數百步以馬為不進釋車而走晏子死景公操玉加於晏子而哭之涕沾襟章子諫曰非禮也公曰安用禮乎昔者吾與夫子遊於公邑之上一日而三不聴寡人今其孰能然乎吾失夫子則亡何禮之有免而哭哀盡而去晏子卷末水經注昔晏子之宅近市景公欲易之而嬰復更為誡曰吾生則近市死則易志乃葬故宅後人名之曰清節里説苑君道晏子没十有七年景公飲諸大夫酒公射出質堂上唱善若出一口公作色太息播弓矢弦章入公曰章自吾失晏子於今十有七年矣未嘗聞吾過不善今射出質而唱善者若出一口弦章對曰此諸臣之不肖也知不足以知君之不善勇不足以犯君之顔色然而有一焉臣聞之君好之則臣服之君嗜之則臣食之夫尺蠖食黄則其身黄食蒼則其身蒼君其猶有諂人言乎公曰善今日之言章為君我為臣是時海人入魚公以五十乗賜弦章歸魚乗塞塗撫其御之手曰曩之唱善哉皆欲若魚者也昔者晏子辭賞以正君故過失不掩今諸臣諂諛以干利故出質而唱善如出一口今所輔於君未見於衆而受若魚是反晏子之義而順諂䛕之欲也固辭魚不受君子曰弦章之廉乃晏子之遺行也按史齊世家晏子卒後十年而景公薨此云十七年未詳林既衣韋衣而朝齊景公公曰此君子之服耶小人之服也林既逡巡而作色曰夫服事何足以端士行乎昔者荆為長劍危冠令尹子西出焉齊短衣而遂偞之冠管仲隰朋出焉越文身鬋髦范蠡大夫種出焉西戎左衽而椎結由余亦出焉即如君言衣狗裘者當犬吠衣羊裘者當羊鳴且君衣狐裘而朝意者得毋為變乎景公曰子真為勇悍矣今未嘗見子之竒辯也一隣之鬭也千乗之勝也林既曰不知君之所謂者何也夫登髙臨危而目不眴而足不陵者此工匠之勇悍也入深淵刺蛟龍抱黿鼉而出者此漁夫之勇悍也入深山射虎豹抱熊羆而出者此獵夫之勇悍也不難斷頭裂腹暴骨流血中野者此武夫之勇悍也今臣居廣廷作色端辯以犯主君之怒前雖有乗軒之賞未為之動也後雖有斧鑕之威未為之恐也此既之所以為勇悍也説苑善説景公五十五年魯哀二年范中行反其君於晉初田釐子乞事齊景公為大夫其收賦税於民以小斗受之予民粟以大斗行隂徳於民而景公弗禁由此田氏得齊衆心宗族益强民思田氏晏子數諫景公景公弗聴晏子卒後范中行氏反晉晉攻之急范中行請粟於齊田乞欲為亂樹黨於逆臣乃説景公曰范中行數有德於齊齊不可不救齊使田乞救之而輸之粟史田齊世家陳無宇謂門客曰昔荆來伐無一人死何國之寡士也門客對曰君車衣文繡士不得以為縁鵝鴨有餘食士不足菽稗堂上有酒池士不得一嘗財者君所輕死者士所重不以所輕與人而欲得人所重不亦難乎魯連子齊景公太子死後有寵姬曰芮子生子荼景公病命其相國惠子與髙昭子以子荼為太子景公卒兩相髙國立荼是為晏孺子而田乞不説欲立景公他子陽生陽生素與乞歡晏孺子之立也陽生奔魯田乞偽事髙國每朝代驂乗言曰始諸大夫不欲立孺子孺子既立君相之大夫皆自危謀作亂又紿大夫曰髙昭子可畏也及未發先之諸大夫從之田乞鮑牧與大夫以兵入公室攻髙昭子昭子聞之與國恵子救公公師敗田乞之衆追國惠子惠子奔莒遂反殺髙昭子晏孺子奔魯田乞使人之魯迎陽生陽生至齊匿田乞家請諸大夫曰常之母有魚菽之祭幸而來㑹飲㑹飲田氏田乞盛陽生槖中置坐中央發槖出陽生曰此乃齊君矣大夫皆伏謁將盟立之田乞誣曰吾與鮑牧謀共立陽生也鮑牧怒曰大夫忘景公之命乎諸大夫欲悔陽生乃頓首曰可則立之不可則已鮑牧恐禍及已乃復曰皆景公之子何為不可遂立陽生於田乞之家是為悼公乃使人遷晏孺子於駘而殺之悼公既立田乞為相専齊政史田齊世家五十八年夏景公夫人燕姬適子死景公寵妾芮姬生子荼荼少其母賤無行諸大夫恐其為嗣乃言願擇諸子長賢者為太子景公老惡言嗣事又愛荼母欲立之憚發之口乃謂諸大夫曰為樂耳國何患無君乎秋景公病命國惠子髙昭子立少子荼為太子逐羣公子遷之萊景公卒太子荼立是為晏孺子冬未葬而羣公子畏誅皆出亡荼諸異母兄公子壽駒黔奔衛公子駔陽生奔魯萊人歌之曰景公死乎弗與埋三軍事乎弗與謀師乎師乎胡黨之乎史齊世家晏孺子元年春田乞偽事髙國者每朝乞驂乗言曰子得君大夫皆自危欲謀作亂又謂諸大夫曰髙昭子可畏及未發先之大夫從之六月田乞鮑牧乃與大夫以兵入公宫攻髙昭子昭子聞之與國惠子救公師敗田乞之徒追之國惠子奔莒遂反殺髙昭子晏圉奔魯八月齊秉意兹田乞敗二相乃使人之魯召公子陽生陽生至齊私匿田乞家十月戊子田乞請諸大夫曰常之母有魚菽之祭幸來㑹飲㑹飲田乞盛陽生槖中置坐中央發槖出陽生曰此乃齊君矣大夫皆伏謁將與大夫盟而立之鮑牧醉乞誣大夫曰吾與鮑牧謀共立陽生鮑牧怒曰子忘景公之命乎諸大夫相視欲悔陽生前頓首曰可則立之否則已鮑牧恐禍起乃復曰皆景公子也何為不可乃與盟立陽生是為悼公悼公入宫使人遷晏孺子於駘殺之幕下而逐孺子母芮子芮子故賤而孺子少故無權國人輕之史齊世家晏子卷一初淳于人納女於景公生孺子荼景公愛之與諸田謀欲廢公子陽生而立荼公以告晏子晏子曰不可夫以賤匹貴國之害也置大立少亂之本也陽生長國人戴之君其勿易夫服位有等故賤不陵貴立子有禮故孽不亂宗願君教荼以禮而勿陷於邪導之以義而勿湛於利長少行其道宗孽得其倫毋使荼饜粱肉之味玩金石之聲而有患乎廢長立少不可以教下尊孽卑宗不可以利所愛長少無等宗孽無别是設賊樹姦之本也古之明君非不知繁樂也以為樂淫則哀非不知立愛也以為義失則憂是故制樂以節立子以道若夫用讒人之謀廢長而立少臣恐後人有因君之過以資其邪而成其利者也君其圖之公不聴景公没田氏殺君荼立陽生殺陽生立簡公殺簡公而取齊國晏子景公有男五人所使傅之者皆有車百乗者也晏子為一焉公召其傅曰勉之將以而所傅為子及晏子晏子辭曰君命其臣據其肩以盡其力臣敢不勉乎今有之家此一國之權臣也人人以君命命之曰將以而所傅為子此離樹别黨傾國之道也嬰不敢受命願君圖之晏子録遺晏子莊公問晏子曰威當世而服天下時邪晏子對曰行也公曰何行對曰能愛邦内之民者能服境外之不善重士民之死力者能禁暴國之邪逆聴任賢者能威諸侯安仁義而樂利世者能服天下此其道也已公不用晏子退而窮處公任勇力之士而輕臣僕之死用兵無休國罷民害朞年百姓大亂而身及崔氏禍君子曰盡忠不豫交不用不懐禄其晏子可謂廉矣晏子景公藉重而獄多拘者滿圄怨者滿朝晏子諫公不聴公謂晏子曰夫獄國之重官也願託之夫子晏子對曰君將使嬰勅其功乎則嬰有壹妄能書足以治之矣君將使嬰勅其意乎夫民無欲殘其家室之生以奉暴上之僻者則君使吏比而焚之而已矣景公不説曰勅其功則使一妄勅其意則比焚如是夫子無所謂能治國乎晏子曰嬰聞與君異今夫胡貉戎狄之蓄狗也多者十有餘寡者五六然不相害傷今束雞豚妄投之其折骨决皮可立得也且夫上正其治下審其論則貴賤不相踰越今君舉千鍾爵禄而妄投之於左右左右争之甚於胡狗而公不知也寸之管無當天下不能足之以粟今齊國丈夫耕女子織夜以接日不足以奉上而君側皆雕文刻鏤之觀此無當之管也而君終不知五尺童子操寸之煙天下不能足以薪今君之左右皆操煙之徒而君終不知鐘鼓成肆干戚成舞雖禹不能禁民之觀且夫飾民之欲而嚴其聴禁其心聖人所難也而况奪其財而饑之勞其力而疲之常致其苦而嚴聴其獄痛誅其罪非嬰所知也晏子景公問晏子曰吾欲服聖王之服居聖王之室如此則諸侯其至乎晏子對曰法其節儉則可法其服居其室無益也三王不同服而王非以服致諸侯也誠於愛民果於行善天下懐其德而歸其義若其衣服節儉而衆説也夫冠足以修敬不務其飾衣足以掩形禦寒不務其美衣不務其美衣不務於隅肶之削冠無觚羸之理身服不雜綵首服不鏤刻且古者嘗有紩衣攣領而王天下者其義好生而惡殺節上而羡下天下不朝其服而共歸其仁及三代作服為益敬也首服足以修敬而不重也身服足以行潔而不害於動作服之輕重便於身用財之費順於民其不為櫓巢者以避風也其不為穴者以避濕也是故明堂之制下之潤濕不能及也上之寒暑不能入也土事不文木事不鏤示民之節也及其衰也衣服之侈過足以敬宫室之美過避潤濕用力甚多用財甚費與民為讎今君欲法聖王之服不法其制法其節儉也則雖未成治庶其有益也今君窮臺榭之髙極汙池之深而不止務於刻鏤之巧文章之觀而不厭則亦與民為讎矣若臣之慮恐國之危而公不平也公乃願致諸侯不亦難乎公之言過矣符子齊景公謂晏子曰寡人既得寳千乗聚萬駟矣方欲珍懸黎㑹金玉其得之即奚若晏子曰臣聞琬琰之外有鳥焉曰金翅民謂為羽豪其為鳥也非龍肝不食非鳳血不飲其食也常饑而不飽其飲常渴而不充生未幾何夭其天年珠玉之珍非乃為君之患也晏子景公問於晏子治國何患晏子對曰患夫社鼠公曰何謂也對曰夫社束木而塗之鼠因往託焉重之則恐燒其木灌之則恐敗其途此鼠所以不可得殺者以社故也夫國亦有焉人主左右是也内則蔽善惡於君上外則賣權重於百姓不誅之則為亂誅之則為人主所案據腹而有之此亦國之社鼠也人有酤酒者為器甚潔清置表甚長而酒酸不售問之里人其故里人云公之狗猛人挈器而入且酤公酒狗迎而噬之此酒所以酸而不售也夫國亦有猛狗用事者是也有道術之士欲干萬乗之主而用事者迎而齕之此亦國之猛狗也左右為社鼠用事者為猛狗主安得無壅國安得無患乎韓非子管仲對桓公語同景公問晏子廉政而長久其行何也晏子對曰其行水也美哉水乎清清其濁不無雩途其清不無灑除是以長久也公曰廉政而遬亡其行何也對曰其行石也堅哉石乎落落視之則堅循之則堅内外者堅無以為久是以遫亡也晏子景公問晏子曰臣之報其君何以晏子對曰臣雖不知必務報君以德士逢有道之君則順其令逢無道之君則争其不義故君者擇臣而使之臣雖賤亦得擇君而事之晏子景公問晏子曰人性有賢不肖可學乎晏子對曰詩云髙山仰止景行行止之者其人也故諸侯竝立善而不怠者為長列士竝學終善者為師韓詩外傳晏子之妻使人布衣紵表田無宇譏之曰出於室何為者也晏子曰家臣也田無宇曰位為中卿食田七十萬何用是人為畜之晏子曰棄老取少謂之瞽貴而忘賤謂之亂見色而説謂之逆吾豈以逆亂瞽之道哉晏子晏子相景公其為人也見賢而進之不同君所欲見不善則廢之不辟君所愛行已而無私直言而無諱有納書者曰廢置不周於君前謂之専出言不諱於君前謂之義専易之行存則君臣之道廢矣吾不知晏子之為忠臣也公以為然晏子入朝公色不説故晏子歸備載使人辭曰嬰故老悖無能毋敢服壯者事辭而不為臣退而窮處東耕海濵堂下生藜藿門外生荆棘七年燕魯分争百姓惛亂而家無積公自治權輕諸侯身弱髙國公恐復召晏子晏子至公一歸七年之禄而家無藏晏子立諸侯忌其威髙國服其政燕魯貢職小國時朝晏子没而後衰晏子景公外傲諸侯内輕百姓好勇力崇樂以從嗜欲諸侯不説百姓不親公患之問於晏子曰古之聖王其行若何晏子對曰其行公正而無邪故讒人不得入不阿黨不私色故羣徒之卒不得容薄身厚民故聚歛之人不得行不侵大國之地不耗小國之民故諸侯皆欲其尊不刦人以甲兵不威人以衆彊故天下皆欲其彊德行教訓加於諸侯慈愛利澤加於百姓故海内歸之若流水今衰世君人者辟邪阿黨故讒諂羣徒之卒繁厚身養薄視民故聚歛之人行侵大國之地耗小國之民故諸侯不欲其尊刦人以兵甲威人以衆彊故天下不欲其彊災害加於諸侯勞苦施於百姓故讎敵進伐天下不救貴戚離散百姓不興公曰然則何若對曰請卑辭重幣以説於諸侯輕罪省功以謝於百姓其可乎公曰諾於是卑辭重幣而諸侯附輕罪省功而百姓親故小國入朝燕魯共貢墨子聞之曰晏子知道道在為人而失為己為人者重自為者輕景公自為而小國不為與在為人而諸侯為役則道在為人而行在反己矣故晏子知道矣淮南子齊景公内好聲色外好狗馬獵射亡歸好色無辯作為路寢之臺族鑄大鐘撞之庭下郊雉皆呴一朝用三千鍾贛梁丘據子家噲導於左右故晏子之諫生焉晏子景公問晏子曰寡人意氣衰身病甚今吾欲具圭璋犧牲令祝宗薦之乎上帝宗廟意者禮可以干福乎晏子對曰嬰聞之古者先君之干福也政必合乎民行必順乎神節宫室不敢大斬伐以無偪山林節飲食無多畋漁以無偪川澤祝宗用事辭罪而不敢有所求也是以神民俱順而山川納禄今君政反乎民而行悖乎神大宫室多斬伐以偪山林羡飲食多畋漁以偪川澤是以民神俱怨而山川收禄司過薦罪而祝宗祈福意者逆乎公曰寡人非夫子無所聞此請革心易行於是廢公阜之遊止海食之獻斬伐者以時畋漁者有數居處飲食節之勿羡祝宗用事辭罪而不敢有所求也故鄰國忌之百姓親之晏子没而後衰晏子景公病疽在背髙子國子請公曰職當撫瘍髙子進而撫瘍公曰熱乎曰熱熱何如曰如火其色何如曰如未熟李大小何如曰如豆墮者何如曰如屨辦二子者出晏子請見公曰寡人有病不能勝衣冠以出見夫子夫子其辱寡人乎晏子入呼宰人具盥御者具巾刷手温之發席傅薦跪請撫瘍公曰其熱何如曰如日其色何如曰如蒼玉大小何如曰如璧其墮者何如曰如珪晏子出公曰吾不見君子不知野人之拙也晏子景公問晏子曰昔吾先君桓公從車三百乗九合諸侯一匡天下今吾從車千乗可以逮先君桓公之後乎晏子對曰桓公從車三百乗九合諸侯一匡天下者左有鮑叔右有仲父今君左為倡右為優讒人在前諛人在後又焉可逮桓公之後者乎晏子景公問晏子曰昔吾先君桓公有管仲夷吾保乂齊國能遂武功而立文德糺合兄弟撫存翌州吴越受令荆楚惛憂莫不賔服勤於周室天子加徳先君昭功管子之力也今寡人亦欲存齊國之政於夫子夫子以佐佑寡人彰先君之功烈而繼管子之業晏子對曰昔吾先君桓公能任用賢國有什伍治徧細民貴不凌賤富不傲貧功不遺罷佞不吐愚舉事不私聴訟不阿内妾無羡食外臣無羡禄鰥寡無饑色不以飲食之辟害民之財不以宫室之侈勞人之力節取於民而普施之府無藏倉無粟上無驕行下無諂德是以管子能以齊國免於難而以吾先君參乎天子今君欲彰先君之功烈而繼管子之業則無以多辟傷百姓無以嗜欲玩好怨諸侯臣孰不承善盡力以順君意今疏逺賢人而任讒諛使民若不勝籍歛若不得厚取於民而薄其施多求於諸侯而輕其禮府藏朽蠧而禮悖於諸侯菽粟藏深而怨積於百姓君臣交惡而政刑無常臣恐國之危失而公不得享也又惡能彰先君之功烈而繼管子之業乎晏子晏子使晉晉平公饗之文室既静矣平公問焉曰昔吾先君得衆若何晏子對曰君饗寡君施及使臣御在君側恐懼不知所以對平公曰聞子大夫數矣今迺得見願終聞之晏子對曰臣聞君子如美淵澤容之衆人歸之如魚有依極其游泳之樂若淵澤決竭其魚動流夫往者維雨乎不可復已公又問曰請問莊公與今孰賢晏子曰兩君之行不同臣不敢不知也公曰王室之正也諸侯之專制也是以欲聞子大夫之言也對曰先君莊公不安静處樂節飲食不好鐘鼓好兵作武士與同饑渴寒暑君之强過人之量有一過不能已焉是以不免於難今君大宫室美臺榭以辟饑渴寒暑畏禍敬鬼神君之善足以没身不足以及子孫矣史記齊景公使晏嬰於晉晏嬰與晉叔向語嬰曰齊之政後卒歸田氏叔向亦曰晉國之政將歸六卿六卿侈矣而吾君不能恤也景公使晏嬰之晉與叔向私語曰齊政卒歸田氏田氏雖無大德以公權私有德於民民愛之齊使晏嬰如晉與叔向語叔向曰晉季世也公厚賦為臺池而不恤政政在私門其可久乎晏子然之史記載此語見於趙齊晉世家各不同詳畧之宜也晏子叔向問晏子曰齊國之徳衰矣今子何若晏子對曰嬰聞事明君者竭心力以没其身行不逮則退不以誣持禄事惰君者優游其身以没其世力不能則去不以諛持危且嬰聞君子之事君也進不失忠退不失行不茍合以隠忠可謂不失忠不持利以傷㢘可謂不失行叔向曰善哉詩有之曰進退維谷此之謂歟晏子叔向問晏子曰事君之倫徒處之義奚如晏子對曰事君之倫知慮足以安國譽厚足以導民和柔足以懐衆不㢘上以為名不倍民以為行上也潔於治己不飾過以求先不讒諛以求進不阿久私不誣所能次也盡力守職不怠奉官從上不敢隋畏上故不茍忌罪故不辟下也三者事君之倫也及夫大賢則徒處與有事無擇也隨時宜者也有所謂君子者能不足以補上退處不順上治唐園考菲履共恤上令弟長鄉里不夸言不愧行君子也不以上為本不以民為憂内不恤其家外不顧其身游夸言愧行自勤於饑寒不及醜儕命之曰狂僻之民明上之所禁也進也不能及上退也不能徒處作窮於富利之門畢志於畎畝之業窮通行無常處之慮佚於心利通不能窮業不成命之曰處封之民明上之所誅也有智不足補君有能不足以勞民俞身徒處謂之傲上茍進不擇所道茍得不知所惡謂之亂賊身無以為君能無以勞民飾徒處之義揚輕上之名謂之亂國明君在上三者不免罪叔向曰賢不肖性夫吾每有問而未嘗有得也晏子晏子聘於吴王問君子之行何如晏子對曰君順懐之政治歸之不懐暴君之禄不居亂國之位君子見兆則退不與亂國俱滅不與暴君偕亡晏子景公伐魯傅許得東門無澤公問焉魯之年穀何如對隂水厥陽氷厚五寸不知以告晏子晏子對曰君子也問年穀而對以氷禮也隂水厥陽氷厚五寸者寒温節節則刑政平平則上下和和則年穀熟年充衆和而伐之臣恐罷民弊兵不成君之意請禮魯以息吾怨遣其執以明吾徳公曰善迺不伐魯晏子景公予魯君地山隂數百社使晏子致之魯使子叔昭伯受地不盡受也晏子曰寡君獻地忠廉也曷為不盡受子叔昭伯曰臣受命於君曰諸侯相見交讓争處其卑禮之文也交委多争受少行之實也禮成文於前行成章於後交之所以長久也且吾聞君子不盡人之歡不竭人之忠吾是以不盡受也晏子歸報公公喜笑曰魯君猶若是乎晏子曰臣聞大國貪於名小國貪於實此諸侯之通患也今魯處卑而不貪乎尊辭實而不貪乎多行廉不為茍得道義不為茍合不盡人之歡不竭人之忠以全其交君之道義殊於世俗國免於公患公曰寡人説魯君故予之地今行果若此吾將使人賀之晏子曰否君以驩予之地而賀其辭則交不親而地不為徳矣公曰善於是重魯之幣毋比諸侯厚其禮毋比賔客君子於魯而後明行廉辭地之可為重名也晏子晏子聘於魯魯昭公問焉吾聞之莫三人而迷今吾以魯一國迷慮之不免於亂何也晏子對曰君之所尊舉而富貴入所以與圖身出所以與圖國及左右偪邇皆同於君之心者也犒魯國化而為一心魯無與二其何暇有三夫偪邇於君之側者距本朝之勢國之所以治也左右讒諛相與塞善行之所以衰也士者持禄游者養交身之所以危也詩曰芃芃棫樸薪之槱之濟濟辟王左右趨之此言古者聖王明君之使以善也故外知事之情而内得心之誠是以迷也韓非子晏子聘魯哀公問曰語曰莫三人而迷今寡人與一國慮之魯不免於亂何也晏子曰古之所謂莫三人而迷者一人失之二人得之三人足以為衆矣故曰莫三人而迷今魯國之羣臣以千百數一言於季氏之私人數非不衆所言者一人也安得三哉晏子景公舉兵欲伐魯問於晏子晏子對曰不可魯公好義而民戴之好義者安見戴者和伯禽之治存焉故不可攻攻義者不祥危安者必困且嬰聞之伐人者徳足以安其國政足以和其民國安民和然後可以舉兵而征暴今君好酒而辟德無以安國厚籍歛急使令無以和民德無以安之則危政無以和之則亂未免乎危亂之理而欲伐安和之國不可不若修政而待其君之亂也其君離上怨其下然後伐之則義厚而利多義厚則敵寡利多則民歡公曰善遂不果伐魯晏子景公之時霖雨十有七日公飲酒日夜相繼晏子請發粟於民三請不見許公命伯遽巡國致能歌者晏子聞之不説遂分家粟於民氓致任器於陌徒行見公曰十有七日矣懐寳鄉有數十饑氓里有數家百姓老弱凍寒不得短褐饑餓不得糟糠敝撤無走四顧無告而君不䘏日夜飲酒令國致樂不已馬食府粟狗饜芻豢三保之妾俱足粱肉狗馬保妾不已厚乎民氓百姓不亦薄乎故里窮而無告無樂有上矣饑餓而無告無樂有君矣嬰奉數之莢以隨百官之吏民饑餓窮約而無告使上淫湎失本而不䘏嬰之罪大矣再拜稽首請身而去遂走而出公從之兼於塗而不能逮令趣駕追晏子其家不及粟米盡於氓任器存於陌公驅及之康内公下車從晏子曰寡人有罪夫子倍棄不援寡人不足以有約也夫子不顧社稷百姓乎願夫子之幸存寡人寡人請奉齊國之粟米財貨委之百姓多寡輕重惟夫子之令遂拜於塗晏子乃返命禀巡氓家有布縷之本而絶食者使有終月之委絶本之家使有朞年之食無委積之氓與之薪橑使足以畢霖雨令柏巡氓家室不能禦者予之金巡求氓寡用財乏者死三日而畢後者若不用令之罪公出舍損肉撤酒馬不食府粟狗不食飦肉辟拂嗛齊酒徒減賜三日吏告畢上貧民萬七千家用粟九十七萬鍾薪橑萬三千乗懐寳二千七百家金三千公然後就内退食琴瑟不張鐘鼓不陳晏子請左右與可令歌舞足以留思虞者退之辟拂三千謝於下陳人待三士待四出之闗外也晏子景公出遊於塞塗睹死胔黙然不問晏子諫曰昔吾先君桓公出遊睹饑者與之食睹疾者與之財使令不勞力藉歛不費民先君將遊百姓皆説曰君當幸遊吾鄉乎今君遊於塞塗據四十里之氓殫財不足以奉歛盡力不能周役民氓饑寒凍餒死胔相望而君不問失君道矣財屈力竭下無以親上驕泰奢侈上無以親下上下交離君臣無親此三代之所以衰也今君行之嬰懼公族之危以為異姓之福也公曰然為上而忘下厚藉歛而忘民吾罪大矣於是歛死胔發粟於民距四十里之氓不服政其年公三月不出遊晏子景公登東門防民單服然後上公曰此大傷牛馬蹄矣夫何不下六尺哉晏子對曰昔者吾先君桓公明君也而管仲賢相也夫以賢相佐明君而東門防全也古者不為殆有為也蚤嵗溜水至入廣門即下六尺耳鄉者防下六尺則無齊矣夫古之重變古常此之謂也春秋戰國異辭卷二十
