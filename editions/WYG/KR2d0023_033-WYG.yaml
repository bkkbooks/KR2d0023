body:
  text: 春秋戰國異辭卷三十右春坊右諭德陳厚耀撰楚惠王惠王二年子西召故平王太子建之子勝於吳以為巢大夫號曰白公白公好兵而下士欲報仇六年白公請兵令尹子西伐鄭初白公父建亡在鄭鄭殺之白公亡走吳子西復召之故以此怨鄭欲伐之子西許而未為發兵八年晉伐鄭鄭告急楚楚使子西救鄭受賂而去白公勝怒乃遂與勇力死士石乞等襲殺令尹子西子綦於朝因刼惠王置之髙府欲弑之惠王從者屈固負王亡走昭王夫人宫史楚世家説苑辨物初太子亡奔宋又避宋華氏之亂奔於鄭鄭人善之又適晉與晉人謀襲鄭鄭遂殺焉初建出守城父與成公乾遇於疇中問曰是何也成公乾曰疇也疇也者何也所以為麻也麻也者何也所以為衣也成公乾曰昔莊王伐陳舍於有蕭氏謂路室之人曰巷其不善乎何溝之不浚也莊王猶知巷之不善溝之不浚今吾子不知疇之為麻麻之為衣吾子其不主社稷乎建果不得立史伍子胥傳伍子胥初所與俱亡故楚太子建之子勝者在于吳吳王夫差之時楚惠王欲召勝歸楚葉公諫曰勝好勇而隂求死士殆有私乎惠王不聽遂召勝使居楚之邊邑鄢號為白公白公歸楚三年而吳誅子胥白公既歸楚怨鄭之殺其父乃隂養死士求報鄭歸楚五年請伐鄭楚令尹子西許之兵未發而晉伐鄭鄭請救於楚楚使子西徃救與盟而還惠王八年白公勝怒曰非鄭之仇乃子西也勝自礪劒人問曰何以為勝曰欲以殺子西子西聞之笑曰勝如卵耳何能為也其後四歳白公勝與石乞襲殺楚令尹子西司馬子綦於朝石乞曰不殺王不可乃刼之王如髙府石乞從者屈固負楚惠王亡走昭夫人之宫惠王十年新序卷八楚太子建以費無極之譖見逐有子曰勝在外子西召勝使治白號曰白公子西太子建之弟勝之叔父也勝怨楚逐其父將弑惠王及子西欲得易甲陳士勒兵以示易甲曰與我無患不富貴不吾與則此是也易甲笑曰賞言吾義矣子忘之乎立得天下不義吾不取威吾以兵不義吾不從今子將弑子之君而使我從子非吾義也子雖告我以利威我以兵吾不忍為也子行子之威則吾亦得明吾義也逆子以兵爭也應子以聲鄙也吾聞立義不爭行死不鄙拱而待兵顔色不變白公問於孔子曰人可與㣲言乎孔子不應白公欲作亂故問㣲言㣲言隂謀宻事也孔子知之故不應白公曰若以石投水奚若孔子曰吳越之善没者能取之白公曰若以水投水奚若孔子曰淄澠之合者易牙嘗而知之白公曰然則人不可與㣲言乎孔子曰胡為不可惟知言之謂者為可耳夫知言之謂者不以言言者也淮南子道應子吕覽精諭又列説符列子白公問孔子曰人可與㣲言乎孔子不應白公問曰若以石投水何如孔子曰吳之善没者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人固不可與㣲言乎孔子曰何為不可惟知言之謂者乎夫知言之謂者不以言言也爭魚者濡逐獸者趨非樂之也故至言去言至為無為夫淺知之所爭者末矣白公不得已遂死於浴室白公勝慮亂罷朝而立倒杖策鋭鋭一作鎡貫顊顊一作頤血流至於地而不知鄭人聞之曰顊之忘將何不忘哉韓子喻老淮南子道應又列子説符石乞侍坐於屈建屈建曰白公其為亂乎石乞曰是何言也白公至於室無營所下士者三人與已相若臣者五人所與同衣食者千人白公之行若此何故為亂屈建曰此建之所謂亂也以君子行則可於國家行過禮則國家疑之且茍不難下其臣必不難髙其君矣建是以知夫子將為亂也處十月白公果為亂説苑權謀屈建告石乞曰屈建楚大夫石乞白公黨白公勝將為亂石乞曰不然白公卑身下士不敢驕賢其家無筦籥之信闗楗之固大斗斛以出輕斤兩以内而乃論之以不宜也屈建曰此乃所以反也居三年白公勝果為亂殺令尹子椒司馬子期淮南子人間而韓非子司馬子期死浮於江白公勝將弑楚惠王王出亡令尹司馬皆死拔劍而屬之於屈廬曰子與我將舍子子不與我必殺子廬曰子殺叔父而求福於廬也可乎吾聞知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂人臣之禮故上知天命下知臣道其有可刼乎子胡不推之白公勝乃内其劒新序卷八説苑立節齊人有子蘭子者事白公勝勝將為難告子蘭子曰吾將舉大事於國願與子共之子蘭子曰我事子而與子殺君是助子不義也畏患而去子是遁子於難也故不與子殺君以成吾仁契頸於庭以遂吾行白公自立為王月餘㑹葉公來救楚楚惠王之徒與共攻白公殺之惠王乃復位是嵗也滅陳而縣之史楚世家白公勝既殺令尹司馬欲立王子閭以為王史楚世家白公自立為王月餘葉公來救殺白公惠王復位王子閭不肯刼之以刄王子閭曰王孫輔相楚國匡正王室而後自庇焉閭之願也今子假威以暴王室殺伐以亂國家吾雖死不子從也白公勝曰楚國之重天下無有天以與子子何不受也王子閭曰吾聞辭天下者非輕其利也以明其德也不為諸侯者非惡其位也以潔其行也今吾見國而忘主不仁也刼白刄而失義不勇也子雖告我以利威我以兵吾不為也白公强之不可遂殺之新序卷八葉公聞白公為亂率其國人攻白公白公之徒敗亡走山中自殺而虜石乞而問白公尸處不言將烹石乞曰事成為卿不成而烹固其職也終不肯告其尸處遂烹石乞而求惠王復立之史伍子胥傳年詳左哀十六葉公子髙姓沈名諸梁忠於社稷惠恤萬民方城之外莫不欣戴白公勝作亂殺子西子期刼惠王以兵葉公自葉而入至於北門或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君何為胄國人望君如望歳焉日日以幾若見君面是得艾也人知不死其亦無有奮心猶將旌君以狥於國而又掩面以絶民望不亦甚乎乃免胄而進之與國人攻白公奔山而縊生烹石乞迎反惠王整肅官司退而老於葉風俗通卷之二異與左哀十六年小葉公子髙㣲小短瘠其行若將不勝其衣然白公之亂也令尹子西司馬子期皆死焉葉公子髙入據楚誅白公定楚公如反手耳荀子非相白公勝得荆國不能以其府庫分人七日石乞曰患至矣石乞白公臣也不能分人則焚之毋令人以害我白公又不能九日葉公入乃發太府之貨以予衆出髙庫之兵以賦民因攻之十有九日而白公死吕覽分職應又淮南子道韓非子孔子謂弟子曰孰能導子西之釣名也子貢曰賜也能乃導之不復疑也孔子曰寛哉不被於利絜哉民性有恒曲為曲直為直孔子曰子西不免白公之難子西死焉故曰直於行者曲於欲莊子葉公子髙將使於齊問於仲尼曰王使諸梁也甚重齊之待使者盖將甚敬而不急匹夫猶未可動也而况諸侯乎吾甚慄之子嘗語諸梁也曰凡事若小若大寡不道以懽成事若不成則必有人道之患事若成則必有隂陽之患若成若不成而後無患者惟有徳者能之吾食也執麤而不臧爨無欲清之人今吾朝受命而夕飲氷我其内熱與吾未至乎事之情而既有隂陽之患矣事若不成必有人道之患是兩也為人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間是之謂大戒是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也為人臣子者固有所不得已行事之情而忘其身何暇至於説生而惡死夫子其行可矣丘請復以所聞凡交近則必相靡以信逺則必忠之以言言必或傳之夫傳兩喜兩怒之言天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言凡溢之類也妄妄則其信之也莫莫則傳言者殃故法言曰傳其常情無傳其溢言則幾乎全且以巧鬭力者始乎陽常卒乎隂泰至則多奇巧以禮飲酒者始乎治常卒乎亂泰至則多奇樂凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨言者風波也行者實喪也夫風波易以動實喪易以危故忿設無由巧言偏辭獸死不擇音氣息茀然於是並生心厲尅核太至則必有不肖之心應之而不知其然也茍為不知其然也孰知其所終故法言曰無遷令無勸成過度益也遷令勸成殆事美成在久惡成不及改可不慎與且夫乗物以遊心託不得已以養中至矣何作為報也莫若為致命此其難者新論貪愛楚白公勝性貪􅈔既殺子西據有荆國積斂財寶填之府庫不以分衆石乞諫曰今患至國將危不顧勝敗存亡之機固以形於胷中矣不能散財以求人心則不如焚之無令彼衆還以害我又不能從及葉公入乃發大府之財以與衆出府之寶以賜人因而攻之十有九日白公身滅白公之難楚人有莊善者莊一作社辭其母將徃死之其母曰棄其親而死其君可為義乎莊善曰吾聞事君者内其禄而外其身今所以養母者君之禄也身安得無死乎遂辭而行比至公門三廢車中其僕曰子懼矣曰懼曰既懼何不返莊善曰懼者吾私也死義吾公也聞君子不以私害公及公門刎頸而死新序卷八稍又韓詩卷一别楚有士曰申鳴治園以養父母孝聞於楚王召之申鳴辭不徃其父曰王欲用汝何謂辭之申鳴曰何舍為子乃為臣乎其父曰使汝有禄於國有位於廷汝樂而我不憂矣我欲汝之仕也申鳴曰諾遂之朝受命楚王以為左司馬其年遇白公之亂殺令尹子西司馬子期申鳴因以兵衛之白公謂石乞曰申鳴天下勇士也今將兵為之奈何石乞曰吾聞申鳴孝子也刼其父以兵使人謂申鳴曰子與我則與子共楚國不與我則殺乃父申鳴流涕而應曰始則父之子今則君之臣已不得為孝子矣安得不為忠臣乎援枹鼓之遂殺白公其父亦死王歸賞之申鳴曰受君之禄避君之難非忠臣也正君之法以殺其父又非孝子也行不兩全名不兩立若此而生何以示天下士哉遂自刎而死韓詩卷十篇又説苑立節畧同列女傳白公死其妻紡織不嫁吳王聞其美且有行使大夫持金百鎰白璧一雙以聘焉以輜軿三十乗迎之將以為夫人白妻辭之曰白公生之時妾幸得執箕帚掌衣履拂枕席託為妃匹白公不幸而死妾願守其墳墓以終天年今王賜金璧之聘夫人之位非愚妾之所聞也且夫棄義從欲者汚也見利忘死者貪也夫貪汚之人王何以為哉妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉於死者亦然妾既不仁不能從死今又去而嫁不亦太甚乎遂辭聘而不行吳王賢其守節有義號曰貞姬楚惠王食寒葅而得蛭因遂吞之腹有疾而不能食令尹入問曰王安得此疾也王曰我食寒葅而得蛭念譴之而不行其罪是法廢也譴而行其罪則庖宰食監法皆當死心又不忍也故吾恐蛭之見也遂吞之令尹避席再拜而賀曰臣聞天道無親惟徳是輔君有仁德天之所奉也病不為傷是夕也惠王之後蛭出其久病心腹之疾皆愈新序卷四六又新書卷十三年吳王夫差强陵齊晉來伐楚史楚世家十六年越滅吳史楚世家四十二年楚滅蔡史楚世家四十四年楚滅把與秦平是時越已滅吳而不能正江淮北楚東侵廣地至泗上史楚世家越破吳請師於楚以伐晉楚王與大夫皆懼將許之左史倚相曰此恐吾攻已故示我不病請為長轂千乗卒三萬與分吳地也莊王聽之此惠王時事非莊王也遂取東國説苑權謀越已勝吳又索卒於楚而攻晉左史倚相謂楚王曰夫越破吳豪士死鋭卒盡大甲傷今又索卒以攻晉示我不病也不如起師與分吳楚王曰善因起師而從越越王怒將擊之大夫種曰不可吾豪士盡大甲傷我與戰必不克不如賂之乃割露山之隂五百里賂之韓子説林下楚莊王莊王當作惠王欲伐越杜子諫曰王之伐越何也曰政亂兵弱杜子曰臣患之智如目也能見百步之外而不能自見其睫王之兵自敗於秦晉喪地數百里此兵之弱也莊蹻為盗於境内而吏不能禁此政之亂也王之弱亂非越之下也而欲伐越此智之如目也王乃止韓子喻老史又楚墨子南遊見楚惠王穆賀謂墨子曰言則善矣王無内曰賤人所為不用子墨子曰譬若藥焉夫子服之以療其病豈曰一草之本而不食之墨子五十七年惠王卒子簡王中立史楚世家簡王簡王元年北伐滅莒史楚世家二十四年簡王卒子聲王當立史楚世家聲王聲王六年盗殺聲王子悼王熊疑立史楚世家悼王悼王二年三晉來伐楚至乗邱而還史楚世家悼王四年楚伐周年表作伐鄭鄭殺子陽史楚世家九年伐韓取負黍史楚世家十一年三晉伐楚敗我大梁榆闗史楚世家楚厚賂秦與之平吳起為楚令尹適魏問屈宜若曰屈宜若楚大夫亡在魏王不知起之不肖而以為令尹先生試觀起之為人也屈子曰將奈何吳起曰將衰楚國之爵衰楚危反而平其制禄損其有餘而綏其不足砥礪甲兵時爭利於天下屈子曰宜若聞之昔善治國家者不變其故不易其常今子將衰楚國之爵而平其制禄損其有餘而綏其不足是變其故易其常也行之者不利宜若聞之曰怒者逆德也兵者凶器也爭者人之所本也今子隂謀逆徳好用凶器殆人之所本逆之至也且子用魯兵不宜得志於齊而得志焉子用魏兵不宜得志於秦而得志焉宜若聞之非禍人不能成禍吾固惑吾王之數逆天道戾人理至今無禍差須夫子也差須猶少待也吳起惕然曰尚可更乎屈子曰成形之徒不可更也成形禍形已成也子不若敦愛而篤行之老子曰挫其鋭解其紛和其光同其塵淮南子道應吳起為苑守行縣適息問屈宜臼曰王不知起不肖以為苑守先生將何以教之屈公不對居一年王以為令尹行縣適息問屈宜臼曰起問先生先生不教今王不知起不肖以為令尹先生試觀起為之也屈公曰子將奈何吳起曰將均楚國之爵而平其禄損其有餘而繼其不足厲甲兵以時爭於天下屈公曰吾聞昔善治國家者不變故不易常今子將均楚國之爵而平其禄損其有餘而繼其不足是變其故而易其常也且吾聞兵者凶器也爭者逆德也今子隂謀逆徳好用凶器殆人所棄逆之至也淫泆之事也行者不利且子用魯兵不宜得志於齊而得志焉子用魏兵不宜得志於秦而得志焉吾聞之曰非禍人不能成禍吾固怪吾王之數逆天道至今無禍嘻且待夫子也吳起惕然曰尚可更乎屈公曰不可吳起曰起之為人謀屈公曰成形之徒不可更已子不如敦處而篤行之楚國無貴於舉賢説苑指武吳起相楚悼王南并蠻越遂有洞庭蒼梧之地今長沙衡陽等郡地典杜氏通二十一年悼王卒子肅王臧立史楚世家吳起教楚悼王以楚國之俗曰大臣太重封君太衆若此則上偪主而下虐民此貪國弱兵之道也不如使封君之子孫三世而收爵禄絶滅百吏之禄秩損不急之枝官以奉選練之士悼王行之期年而薨吳起枝解於楚韓子和氏吳起自魏之楚楚悼王素聞起賢至則相楚明法審令損不急之官廢公族疏逺者以撫養戰鬭之士要在彊兵破馳説之言縱横者於是南平百越北并陳蔡却三晉西伐秦諸侯患楚之彊故楚之貴戚盡欲害吳起及悼王死宗室大臣作亂而攻吳起吳起走之王尸而伏之擊起之徒因射刺吳起并中悼王悼王既葬太子立太子肅王也乃使令尹盡誅射吳起而并中王尸者坐夷宗死者七十餘家史孫吳傳吳起謂楚王曰楚所有餘者地也所不足者民也今君王以所不足益所有餘臣不得而為也於是令貴人徃實廣虛之地皆甚苦之楚王死貴人皆來尸在堂上貴人相與射吳起吳起號呼曰吾示子吾用兵也拔矢而走伏尸挿矢而疾言曰羣臣亂王吳起死矣吳起拔人所射之矢以挿王尸因言曰羣臣謂王為亂而射王尸欲令羣臣被誅以自為報也楚國之法麗兵於王尸者盡加重罪連三族吳起之智可謂捷矣吕覽貴卒肅王肅王四年蜀伐楚取兹方於是楚為扞闗以距之史楚世家十年魏取我魯陽史楚世家墨者鉅子孟勝鉅子孟勝二人學墨道者善楚之陽城君陽城君令守於國毁璜以為符約曰符合聽之楚王薨羣臣攻吳起兵於喪所陽城君與焉楚罪之陽城君走楚收其國孟勝曰受人之國與之有符今不見符而力不能禁不能死不可弟子徐弱諫曰死而有益陽城君死之可矣無益也而絶墨者於世不可孟勝曰不然吾於陽城君也非師則友也非友則臣也不死自今以來求嚴師必不於墨者矣求賢友必不於墨者矣求良臣必不於墨者矣死之所以行墨者之義而繼其業者也我將屬鉅子於宋之田襄子田襄子賢者也何患墨者之絶世也徐弱曰若夫子之言弱請先死以除路還殁頭前於孟勝因使二人傳鉅子於田襄子傳送也孟勝死弟子死之者百八十三人以致令於田襄子欲反死孟勝於楚田襄子止之曰孟子已傳鉅子於我矣當聽遂反死之吕覽上德墨子見楚王錦衣吹笙因也墨子好儉非樂錦與笙而為之者因楚王之所欲也貴吕覽因楚王謂田鳩曰墨子者顯學也其身體則可其言多而不辯何也曰昔秦伯嫁其女於晉公子令晉為之飾裝從衣文之媵七十人至晉晉人愛其妾而賤公女此可謂善嫁妾而未可謂善嫁女也楚人有賣其珠於鄭者為木蘭之櫃薫桂椒之櫝綴以珠玉飾以玫瑰輯以羽翠鄭人買其櫝而還其珠此可謂善賣櫝矣未可謂善鬻珠也今世之談也皆道辯説文辭之言人主覽其文而忘有用墨子之説傳先王之道論聖人之言以宣告人若辯其辭則恐人懐其文忘其直以文害用也此與楚人鬻珠秦伯嫁女同類故其言多不辯嫁女鬻珠喻美其文而遺其質也左韓子外儲胡非子胡非子修墨以教有屈將子好勇聞墨者非鬭帶劒危冠徃見胡非子而問之曰將聞先生非鬭而將好勇有説則可無説則死胡非子曰吾聞勇有五等夫負長劒赴榛薄折兕豹搏熊羆此獵徒之勇也負長劒赴深淵斬蛟龍搏黿鼉此漁人之勇也登髙涉危鵠立四顧顔色不變此陶匠之勇也剽必刺視必殺此五刑之勇也齊桓公以魯為南境魯公憂之三日不食曹沬請擊頸以血濺桓公公懼不知所措管仲乃勸與之盟曹沬匹夫之士布衣柔履之人一怒屈萬乗之師有千乗之國此君子之勇也五勇不同公子將何處屈將説稱善乃辭長劒釋危冠而請為弟子焉論衡儒家之徒董無心墨家之徒纒子相見講道纒子稱墨家佑鬼神是引秦穆公有明德上帝賜之九十年董子難以堯舜不賜年桀紂不夭死十一年肅王卒無子立其弟熊良夫是為宣王史楚世家宣王子發攻蔡踰之子發楚將踰勝也宣王郊迎列田百頃而封之執圭楚爵功臣賜以圭謂之執圭比附庸子發辭不受曰治國立政諸侯入賓此君之德也發號施令師未合而敵遁此將軍之威也兵陳戰而勝敵者此庶民之力也夫乗民之功勞而取其爵禄者非仁義之道也故辭而弗受淮南子道應子發為上蔡令民有罪當刑獄㫁論定決於令尹前子發喟然有悽愴之心罪人已刑而不忘其恩其後子發盤罪威王而出奔刑者遂襲恩者恩者逃之於城下之廬追者至踹足而怒曰子發視決吾罪而被吾刑怨之憯之骨髓憯痛也使我得其肉而食之其知厭乎追者以為然而不索其内果活子發淮南子人間子發之戰進如激矢合如雷電解如風雨圓之中規方之中矩破敵陷陳莫能壅御澤戰必克攻城必下淮南子修務淮南子子發辯擊劇而勞佚齊楚國知其可以為兵主也説苑蔡使師强王堅使於楚楚王聞之曰人名多章章者獨為師强王堅乎趣見之無以次視其人狀疑其名而醜其聲又惡其形楚王大怒曰今蔡無人乎國可伐也有人不遣乎國可伐也端以此人誡寡人乎國可伐也故發二使見三謀伐者蔡也與陳使敦洽讎麋事最相類荀子公孫子曰子發將西伐蔡克蔡獲蔡侯歸致命曰蔡侯奉其社稷而歸之楚舍屬二三子而理其地既楚發其賞子發辭曰發誡布令而敵退是主威也徒舉相攻而敵退是將威也合戰用力而敵退是衆威也臣舍不宜以衆威受賞楚將子發攻秦類函將帥下子發作子反絶糧使人請於王因歸候其母母問使者曰士卒無恙乎對曰士卒并分菽粒而食之又問將軍無恙乎對曰將軍朝夕芻豢黍梁子發破秦而歸其母閉門不納使人數之曰子不聞越王勾踐伐吳乎客有獻醇酒一器者王使人注江之上流使士卒飲其下流味不加美而士卒戰自五也異日有獻糗糒者王又以賜軍士分食之甘不喻嗌而戰自十也今子為將士卒并分菽粒而食之子獨朝夕芻豢黍粱何也詩不云乎好樂無荒良士休休言不失和也夫使人入於死地而自康樂於上雖以得勝非其術也子非吾子也無入吾門子發於是謝其母然後納之列女傳美一作喙楚將子發好求技道之士楚有善為偷者徃見曰聞君求技道之士臣偷也願以技齎一卒子發聞之衣不給帶冠不暇正出見而禮之左右諌曰偷者天下之盗也何為之禮君曰此非左右之所得與後無幾何齊興兵伐楚子發將師以當之兵三却楚賢良大夫皆盡其計而齊師愈强於是市偷進請曰臣有薄技願為君行之子發曰諾不問其辭而遣之偷則夜解齊將軍之幬帳而獻之子發因使人歸之日卒有出薪者得將軍之帷使歸之於執事明日又復徃取其枕子發又使人歸之明日又復徃取其簪子發又使人歸之齊師聞之大駭將軍與軍吏謀曰今日不去楚君恐取吾頭乃還師而去淮南子道應宣王六年周天子賀秦獻公秦始復强而三晉益大魏惠王齊宣王尤强史楚世家秦欲伐楚使人徃觀楚之寳玉器楚王聞之召昭奚恤而問焉對曰此欲觀吾國之得失而圖之遂使昭奚恤應之奚恤稱曰吾國之所寳者賢臣也理百姓實倉廪使民各得其所令尹子西在此奉珪璋使諸侯解忿狷之難交兩國之忻使無兵革憂太宗子方在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師徒正兵戎以當强敵提桴鼔以動百萬之衆使赴湯火蹈白刃萬死不顧一生司馬子反在此若霸王之餘義撮治亂之遺風昭奚恤在此惟大國之所觀使者瞿然無以對反言於秦曰楚多賢臣未可謀也新序卷一昭奚恤之用楚也有燒倉廥􅀢者而不知其人昭奚恤令吏執販茅者而問之果燒者也韓子内儲下莊子音義楚宣王朝諸侯魯恭公後至而酒薄宣王怒欲辱之恭公不受命乃曰我周公之𦙍長於諸侯行天子禮樂勲在周室我送酒已失禮方責其薄無乃太甚遂不辭而還宣王怒乃發兵與齊攻魯梁惠王常欲擊趙而畏楚救楚以魯為事故梁得圍邯鄲言事相由也許慎注淮南云楚㑹諸侯魯趙侯獻酒於楚王魯酒薄而趙酒厚楚之主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄酒奏之楚王以趙酒薄故圍邯鄲也三十年秦封衛鞅於商南侵楚史楚世家宣王三十年卒子威王熊商立史楚世家威王楚威王聞莊周賢威王當周顯王三十年或作齊宣王莊子者䝉人也名周周嘗為䝉縣漆園吏與梁惠王齊宣王同時其學無所不關然其要本歸於老子之言故其著書十餘萬言大抵皆寓言也作漁父盗跖胠箧以詆訿孔子之徒以明老子之術畏累虛亢桑子之屬皆空語無事實然善屬書離辭指事類情用剽剥儒墨雖當時宿學不能自解免也其言洸洋自恣以適已故自王公大人不能器之使使厚幣迎之許以為相莊周笑謂楚使者曰千金重利卿相尊位也子獨不見郊祭之犧牛乎養食之數歳衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎子亟去無汚我我寧遊戲汚瀆之中自快無為有國者所羈終身不仕以快吾志焉史莊子傳即地志今山東曹縣有漆園城莊周為漆園吏處休又云周字子見歸德府髙士傳莊周宋之䝉人也梁惠王時為䝉縣漆園吏少學老子遺世自放不仕楚威王使大夫以百金聘周周方釣於濮水之上持竿不顧曰吾聞楚有神龜三千歳矣巾笥而藏之於廟堂之上此龜寧無為留骨而貴乎寧生而曳尾塗中乎大夫曰寧掉尾塗中耳莊子曰徃矣吾方掉尾於塗中以上又見莊子秋水篇或又以千金之幣迎周為相周曰子不見郊祭之犧牛乎衣以文繡食以芻菽及其牽入太廟欲為孤豚其可得乎遂終身不仕莊子莊子釣於濮水楚王使大夫二人徃先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歳矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾於塗中莊子曰徃矣吾將曳尾於塗中古今樂録莊周者齊人也隠於山岳湣王遣使齎金百鎰聘以相位周謝使者去引聲歌曰天地之道近在胸臆呼噏精神以養九德渴不求飲饑不索食避世守道志潔如玉卿相之位難可直當巖巖之石幽而清涼枕塊寢處樂在其央寒涼回固可以久長周䝉人屬宋不屬齊莊子莊周家貧故行貸粟於監河侯監河侯曰諾我將得邑金將貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何為者邪對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我且南遊吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所處吾得斗升之水然活耳君乃言此曽不如早索我於枯魚之肆説苑莊周貧者徃貸粟於魏文侯曰待吾邑粟之來而獻之周曰乃今者周之來見道旁牛蹄中有鮒魚焉太息謂周曰我尚可活也周曰須我為汝南見楚王決江淮以溉汝鮒魚曰今吾命在盆甕之中耳乃為我見楚王決江淮以溉我汝則求我枯魚之肆矣今周以貧故來貸粟而曰須我邑粟來也而賜臣即來亦求臣傭肆矣文侯於是乃發粟百鍾送之莊周之室莊子莊子將死弟子欲厚葬之莊子曰吾以天地為棺槨日月為連璧星辰為珠璣萬物為齎送吾𦵏具豈不備邪何以加此弟子曰吾恐烏鳶之食夫子也莊子曰在上為烏鳶食在下為螻蟻食奪彼與此何其偏也以不平平其平也不平以不徵徴其徵也不徴明者惟為之使神者徵之夫明之不勝神也久矣而愚者恃其所見入於人其功外也不亦悲乎新論莊子病劇弟子對之泣應曰我今死則誰先更百年生則誰後必不得免何貪於須㬰漢書道家莊子五十二篇名周宋人威王六年周顯王致文武胙於秦惠王七年齊孟嘗君父田嬰欺楚楚威王伐齊敗之於徐州而令齊必逐田嬰田嬰恐張丑偽謂楚王曰王所以戰勝於徐州者田盼子不用也盻子者有功於國而百姓為之用嬰子弗善而用申紀申紀者大臣不附百姓不為用故王勝之也今王逐嬰子嬰子逐盻子必用矣復搏其士卒以與王遇必不便於王矣楚王因弗逐也史楚世家史記鐸椒為楚威王傅為王不能盡觀春秋采取成敗卒四十章為鐸氏㣲楚威王學書於沈尹華威王懐王之父昭釐惡之威王好制制術數也有中謝佐制者中謝官名也佐王制法制也昭釐謂威王曰國人皆曰王乃沈尹華之弟子也王不説因疏沈尹華吕覽去宥莊此條一作楚王事見前楚王謂淳于髠曰吾有讎在吳子寧能為吾報之乎對曰臣來見道旁野民持一魚頭上田祝曰髙得萬束下得千斛臣竊笑之以為禮薄而望多也説苑楚威王使將軍莊蹻將兵循江上略巴黔以西莊蹻者楚莊王苗裔也蹻至滇池方三百里其澤在西北水源深廣末更淺狹如倒流故曰滇池旁平地肥饒數千里以兵威定屬楚欲歸報㑹秦擊楚巴黔中道塞不通因西以其衆王滇變服從其俗以長之漢書西南夷傳華陽國志楚頃襄王頃襄王當作威王遣將莊蹻從沅水伐夜郎將軍至且蘭㭬舩於岸而步戰既滅夜郎而秦奪楚黔中地無路得歸因留王滇池號為莊王以且蘭有㭬舩牂牱處乃改其名為牂牱牂牱地多雨潦俗好巫鬼禁忌又異物志云有一山在海内小而髙似繫船筏也俗人謂之越王牂牱逺望甚小而髙不似山近望之以為一株栢樹在水内也地志雲南楚威王命莊蹻定滇㑹秦擊楚道絶蹻因自王於滇建苴蘭城在今雲南府府城北十一年威王卒子懐王熊槐立魏聞楚喪伐楚取我陘山史楚世家春秋戰國異辭卷三十
