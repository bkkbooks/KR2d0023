body:
  text: 春秋戰國異辭卷二十九右春坊右諭德陳厚耀撰楚昭王昭王元年楚衆不説費無忌以其䜛亡太子建殺伍奢父子與郤宛宛之宗姓伯氏子嚭及子胥皆奔吳吳兵數侵楚楚人怨無忌甚令尹子常誅無忌以說衆衆乃喜史楚世家四年吳三公子奔楚楚封之以扞吳史楚世家五年吳伐取楚之六潛史楚世家七年楚使子常伐吳吳大敗楚於豫章史楚世家約左氏文晉人已勝智氏歸晉人平智氏在闔廬襲郢後當楚惠王時則智氏二字誤也而繕甲砥兵楚王恐召梁公𢎞曰晉人已勝智氏矣歸而繕甲兵其以我為事乎梁公曰不患害其在吳乎夫吳君恤民而同其勞使其民重上之令而人輕其死以從上使如虜之戰臣登山以望之見其用百姓之信必也勿已乎其備之若何不聽明年闔廬襲郢説苑權謀楚使囊瓦子囊之孫興師伐蔡蔡昭公聞子胥在吳請救蔡子胥於是報闔廬曰蔡公南朝被羔裘囊瓦求之蔡公不與拘蔡公三年然後歸之蔡公至河曰天下誰能伐楚者乎寡人願為前列楚聞之使囊瓦伐蔡蔡非有罪楚為無道君若有憂中國之心意者時可矣闔廬於是使子胥興師救蔡而伐楚越絶書年楚昭王十十年冬吳王闔閭伍子胥伯嚭與唐蔡俱伐楚楚大敗吳兵遂入郢辱平王之墓以伍子胥故也吳兵之來楚使子常以兵迎之夾漢水陣吳伐敗子常子常亡奔鄭楚兵奔吳乗勝逐之五戰及郢己夘昭王出奔庚辰吳人入郢昭王亡走至雲夢雲夢不知其王也射傷王王走鄖鄖公之弟懐曰平王殺吾父今我殺其子不亦可乎鄖公止之然恐其弑昭王乃與王出奔隨吳王聞昭王徃即進擊隨謂隨人曰周之子孫封於江漢之間者楚盡滅之欲殺昭王王從臣子綦乃深匿王自以為王謂隨人曰以我予吳隨人卜予吳不吉乃謝吳王曰昭王亡不在隨吳請入自索之隨不聽吳亦罷去史楚世家吳伐楚昭王奔鄖鄖公之弟懐將殺王鄖公辛止之懐曰平王殺吾父在國則君在外則仇見讐弗殺非人也鄖公曰夫事君者不為外内行不為豐約舉茍君之尊卑一也且夫自敵以下則有仇非是不讐下虐上為弑上虐下為討而况君乎君有討臣何讐之為若皆仇君則何上下之有吾先人以善事君成名於諸侯自伯比以來未之失也今爾以是殃之不可懐弗聽曰吾思吾父不能顧矣鄖公以王奔隨王歸而賞及懐子西曰君有二臣或可賞也或可戮也王均之羣臣懼矣王曰夫子期之二子耶吾知之矣或禮於父均之不亦可乎此見四書人物考注不知何本楚昭王與吳人戰楚軍敗昭王走而屨決背而行失之行三十步復旋取屨及至於隨左右問曰王何曽惜一踦屨乎昭王曰楚國雖貧豈愛一踦屨哉惡與偕出弗與偕反也自是之後楚國之俗無相棄者新書卷之七昭王之出郢也使申包胥請救於秦秦以車五百乗救楚楚亦收餘散兵與秦擊吳史楚世家申包胥者楚人也吳敗楚兵於栢舉遂入郢昭王出亡在隨申包胥不受命而赴秦乞師曰吳為無道行封豕長蛇蠶食天下從上國始於楚寡君失社稷越在草莽使下臣告急曰吳夷狄也夷狄之求無厭滅楚則西與君接境若隣於君疆場之患也逮吳未定君其圖之若得君之靈存撫楚國當世以事君秦伯使辭焉曰寡君聞命矣子其就館將圖而告子對曰寡君越在草莽未獲所休下臣何敢即安倚於庭牆立哭日夜不絶聲水漿不入口七日七夜秦哀公為賦無衣之詩言兵今出包胥九頓首而坐秦哀公曰楚有臣若此而亡吾無臣若此吾亡無日矣於是乃出師救楚申包胥以秦師至楚秦大夫子滿子虎帥車五百乗子滿曰吾未知吳道使楚人先與吳人戰而會之大敗吳師吳師既退昭王復國而賞始於包胥包胥曰輔君安國非為身也救急除害非為名也功成而受賞是賣勇也君既定又何求焉遂逃賞終身不見新序卷七異與左氏小淮南子修務訓申包胥贏糧跣走跋涉谷行贏裹也跣足不及著履也上峭山赴深谿游川水犯津闗躐䝉籠蹷沙石蹠達膝曽繭重胝七日七夜至於秦庭蹷僵蹠足達穿也鶴跱而不食跱音致晝吟宵哭面若死灰顔色黴墨鶴峙峙立不動黴音梅涕液交集以見秦王曰吳為封豨修蛇蠶食上國虐始於楚封修皆大也豨蛇喻貪也上國中國虐害始先也言將以次至秦也寡君失社稷越在草莽百姓離散夫婦男女不遑啓處遑暇啓跪處安也使下臣告急秦王乃發車千乗步卒七萬屬之子虎踰塞而東塞亟谷擊吳濁水之上濁水盖江水果大破之以存楚國申包胥一作棼冒勃蘇包胥與勃蘇聲近也見國策莫敖子華對威王語子胥之將之吳也辭其友申包胥曰後三年楚不亡吾不見子矣申包胥曰子其勉之吾未可以助子助子是伐宗廟也止子是無以為友雖然子亡之我存之於是乎觀楚一存一亡也後三年吳師伐楚昭王出走申包胥不受命西見秦伯曰吳無道兵强人衆將征天下始於楚寡君出走居雲夢使下臣告急哀公曰諾固將圖之申包胥不罷朝立於秦廷晝夜哭七日七夜不絶聲哀公曰有臣如此可不救乎興師救楚吳人聞之引兵而還説苑至公楚平王夫人伯嬴秦穆公之女穆當作哀吳入郢昭王亡國吳王闔廬盡妻其後宫次及伯嬴伯嬴持刀曰妾聞天子者天下之表也公侯者一國之儀也天子失制則天下亂諸侯失節則其國危夫婦之道固人倫之始王教之端今君王棄儀表之行縱亂亡之欲犯誅絶之事何以行令訓民且妾聞生而辱不若死而榮若使君王棄其儀表則無以臨國妾有淫行則無以生世一舉而兩辱妾以死守之不敢承命且君王所欲妾者為樂也近妾而死又何樂之有如先殺妾又何益於君王吳王慙遂退舍伯嬴與其保阿閉永巷之門皆不釋兵三旬秦救至昭王乃復列女傳越絶書紀策子胥笞平王墓久而不去楚乃購之千金莫能止之有野人謂子胥曰止吾是掩壺漿之子發簞飯於船中者子胥乃知是漁者也引兵而還十一年六月敗吳於稷會吳王弟夫概見吳王兵傷敗乃亡歸自立為王闔閭聞之引兵去楚歸擊夫概夫概敗奔楚楚封之堂谿楚昭王滅唐九月歸入郢史楚世家十二年吳復伐楚取畨楚恐去郢徙都鄀史楚世家二十年楚滅頓滅胡史楚世家二十一年吳王闔閭伐越越王勾踐射傷吳王遂死吳由此怨越而不西伐楚史楚世家初楚昭王當房而立愀然有寒色曰寡人朝饑饉時酒二􅀈重裘而立猶憯然有寒氣將奈我元元之百姓何是日也出府之裘以衣寒者出倉之粟以賑饑者居二年闔閭襲郢昭王奔隨諸當房之賜者請還戰至死之冦闔閭一日而五徙卧不能賴楚曳師而去昭王乃復當房之德也新書卷之七吳人伐楚昭王去國國有屠羊説從行昭王反國賞從者及説説辭曰君失國臣所失者屠君反國臣亦反其屠臣之禄既厚又何賞之辭不受命君强之説曰君失國非臣之罪故不伏誅君反國非臣之功故不受其賞吳師入郢臣畏冦避患君反國説何事焉君曰不受則見之説對曰楚國之法商人欲見於君者必有大獻重質然後得見今臣智不能存國節不能死君勇不能待冦然見之非國法也遂不受命入于澗中昭王謂司馬子期曰有人於此居處甚約議論甚髙為我求之願為兄弟請為三公司馬子期舍車徒求之五日五夜見之謂曰國危不救非仁也君命不從非忠也惡富貴於上甘貧苦於下意者過也今君願為兄弟請為三公不聽君何也說曰三公之位我知其貴於刀俎之肆矣萬鍾之禄我知其富於屠羊之利矣今見爵禄之利而忘辭受之禮非所聞也遂辭三公之位而反乎屠羊之肆韓詩卷八王又莊子譲小異越絶書昭王臣司馬子期令尹子西歸相與計謀子胥不死又不入荆邦猶未得安為之奈何莫若求之而與之同邦乎昭王乃使使者報子胥於吳曰昔者吾先人殺子之父而非其罪也寡人尚少未有所識也今子大夫報寡人也特甚然寡人亦不敢怨子今子大夫何不來歸子故墳墓丘冢為我邦雖小與子同有之民雖少與子同使之子胥曰以此為名名即章以此為利利即重矣前為父報仇後求其利賢者不為也父已死子食其禄非父之義也使者遂還乃報荆昭王曰子胥不入荆邦明矣越絶書子西歎於朝藍尹亹曰吾聞君子惟獨居思念前世之崇替與哀殯喪於是有歎其餘則不今吾子臨政而歎何也子西曰闔閭能敗吾師吾聞其嗣又甚焉吾是以嘆對曰子患政德之不修無患吳矣夫闔閭口不貪嘉味耳不樂逸聲目不淫於色身不懐於安朝夕勤志恤民之羸聞一善若驚得一士若賞有過必悛有不善必懼是故得民以濟其志今吾聞夫差好罷民力以成私好縱過而翳諌一夕之宿臺榭陂池必成六畜玩好必從夫先自敗也已焉能敗人子修德以待吳吳將斃矣吳越春秋昭王反國樂師扈子非荆王之信䜛殺賢以致辱楚君臣昭王困迫乃援琴作窮刼之曲以傷之其詞曰王耶王耶何乖劣不顧宗廟聽䜛孽任用無忌多所殺誅夷白氏族幾滅二子東奔適吳越吳王哀痛助忉怛垂涕舉兵將西伐伍胥白喜孫武決三戰破郢王奔發留兵縱騎虜荆闕楚荆骸骨遭發掘鞭辱腐尸恥難雪幾危宗廟社稷滅嚴王何罪國幾絶卿士悽愴民惻悷吳兵雖去怖不歇願王更隠撫忠節勿為讒口能謗䙝昭王垂涕深知琴曲之情扈子遂不復鼓楚昭王欲之荆臺遊司馬子綦進諌曰荆臺之逰左洞庭之波右彭蠡之水南望獵山下臨方淮其樂使人遺老而忘死人君遊者盡以亡其國願大王勿徃遊焉王曰荆臺乃吾地也有地而遊之子何為絶我遊乎怒而擊之於是令尹子西駕安車四馬徑於殿下曰今日荆臺之遊不可不觀也王登車而拊其背曰荆臺之遊與子共樂之矣步馬十里引轡而止曰臣不敢下車願得有道大王肯聽之乎王曰第言之令尹子西曰臣聞之為人臣而忠其君者爵禄不足以賞也為人臣而䛕其君者刑罰不足以誅也若司馬子綦者忠臣也若臣者諛臣也願大王殺臣之軀罰臣之家而禄司馬子綦王曰若何能止聽公子獨能禁我遊耳後世遊之無有極時奈何令尹子西曰欲禁後世易耳願大王山陵崩陁為陵於荆臺未嘗有持鐘鼓管弦之樂而遊於父之墓上者也於是王還車卒不遊荆臺令罷先置説苑正諌莊子徐無鬼子綦類函於子綦上加楚司馬三字有八子陳諸前召九方歅音因曰為我相吾子孰為祥九方歅曰梱也為祥子綦瞿然喜曰奚若曰梱也將與國君同食以終其身子綦索然出涕曰吾子何為以至於是極也九方歅曰夫與國君同食澤及三族而况於父母乎今夫子聞之而泣是禦福也子則祥矣父則不祥子綦曰歅汝何足以識之而梱祥耶盡於酒肉入於鼻口矣而何足以知其所自來吾未嘗為牧而牂生於奥未嘗好田而鶉生於窔若勿怪何耶牂牝羊也室西南隅為奥東北隅為窔吾所與吾子遊者遊於天地吾與之邀樂於天吾與之邀食於地吾不與之為事不與之為謀不與之為怪吾與之乗天地之誠而不以物與之相攖吾與之一委蛇而不與之為事所宜今也然有世俗之償焉凡有怪徵者必有怪行殆乎非我與吾子之罪幾天與之也吾是以泣也無何使梱於燕盗得之於道刖而鬻之於齊當渠公之街食肉而終渠公齊富室為街正芋尹文者荆之歐鹿彘者也司馬子期獵於雲夢載旗之長拖地芋尹文拔劒齊諸軫而㫁之貳車抽弓於韔援矢於筩引而未發也司馬子期伏軾而問曰吾有罪於夫子乎對曰臣以君旗拽地故也國君之旗齊於軫大夫之旗齊於軾今子荆國名大夫而滅三等文之㫁也不亦可乎子期悦載之王所王曰吾聞有㫁子之旗者其人安在吾將殺之子期以文之言告王悦使文為江南令而大治新序卷八兄子期昭王楚昭王燕遊越姬從王謂姬曰願與子生死共此姬曰君王樂遊要妾以死不敢聞命後王病太史請移於將相王不可曰將相猶股肱也姬曰大哉君王之德乎妾請從王死矣列女傳楚昭王燕遊蔡姬在左越姬參乗王親乗駟以逐登附莊之臺以望雲夢之右乃顧謂二女曰樂乎吾願與子生若此列女傳楚昭王出遊留夫人貞姜居漸臺忽江水大至王遣使迎夫人忘持符夫人曰王與宫人約召必以符使者曰水方大至還取符則恐後矣夫人曰吾與棄約而生不如留而死使者還取符水至臺崩夫人流水死王曰守義死節不為茍生處約持信以成其貞乃號之曰貞姜列女傳秦欲伐楚使使者徃觀楚之寶器楚昭王聞之召令尹子西而問焉曰秦欲徃觀楚之寶器吾和氏之璧隋侯之珠可以示諸令尹子西對曰不知也召昭奚恤而問焉昭奚恤對曰此欲觀吾國得失而圖之不在寶器在賢臣珠玉玩好之物非寶重者王遂使昭奚恤應之昭奚恤發精兵三百人陳於西門之内為東面之壇一為南面之壇一為西面之壇一秦使者至昭奚恤曰君客也請就上位東面令尹子西南面太宗子敖次之葉公子髙次之司馬子反次之昭奚恤自居西面之壇稱曰客欲觀楚之寶器乎楚之所寶者賢臣也理百姓實倉廪使民各得其所令尹子西在此奉珪璧使諸侯解忿悁之難交兩國之歡使無兵革之憂太宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師旅整兵戎以當强敵提枹鼓以動百姓之衆所使皆趨湯火蹈白刃出萬死不顧一生之難司馬子反在此懐霸王之餘議攝治亂之遺風昭奚恤在此惟大國之所觀秦使者戄然無以對昭奚恤遂揖而去秦使者反言於秦君曰楚多賢臣未可謀也遂不伐楚新序卷一繹史九十三卷子反昭奚恤前後異時人也此篇所載不可據以為信越絶書寶劒楚王召風胡子而問之曰寡人聞吳有干將越有歐冶子此二人甲世而生天下未嘗有精誠上通天下為烈士寡人願齎邦之重寶皆以奉子因吳王請此二人作鐵劍可乎風胡子曰善於是乃令風胡子之吳見歐冶子干將使人作鐵劒歐冶子干將鑿茨山洩其溪取鐵英作為鐵劒三枚一曰龍淵二曰泰阿三曰工布布一作市畢成風胡子奏之楚王楚王見三劒之精神大悦風胡子問曰此三物何物所象其名為何風胡子對曰一曰龍淵二曰泰阿三曰工布楚王曰何謂龍淵泰阿工布風胡子對曰欲知龍淵觀其狀如登髙山臨深淵欲知泰阿觀其鈲巍巍翼翼如流水之波欲知工布鈲從文起至脊而止如珠不可袵文若流水不絶晉鄭王聞而求之不得興師圍楚之城三年不解倉穀粟索庫無兵革左右羣臣賢士莫能禁止於是楚王聞之引泰阿之劒登城而麾之三軍破敗士卒迷惑流血千里猛獸􅇌除江水折揚晉鄭之頭畢白楚王於是大悦曰此劒威耶寡人力耶風胡子對曰劒之威也因大王之神楚王曰夫劒鐵耳固能有精神若此乎風胡子對曰時各有使然軒轅神農赫胥之時以石為兵㫁樹木為宫室死而龍藏夫神聖主使然至黄帝之時以玉為兵以伐樹木為宫室鑿地夫玉亦神物也又遇聖主使然死而龍藏禹穴之時以銅為兵以鑿伊闕通龍門決江導河東注於東海天下通平治為宫室豈非聖主之力哉當此之時作鐵兵威服三軍天下聞之莫敢不服此亦鐵兵之神大王有聖德楚王曰寡人聞命矣工布一曰工市鈲亦曰鍔吳越春秋湛盧之劒惡闔閭之無道也乃去而出水如楚楚昭王卧而寐得吳王湛盧之劒於牀昭王不知其故乃召風湖子而問曰寡人卧覺而得寶劒不知其名是何劒也風湖子曰此謂湛盧之劒昭王曰何以言之風湖子曰臣聞吳王得越所獻寶劒三枚一曰魚腸二曰磐郢三曰湛盧魚腸之劒已殺王僚磐郢以送其死女今湛盧入楚也昭王曰湛盧所以去者何也風湖子曰臣聞越王元常史作允常使歐冶造劒五枚以示薛燭燭對曰魚腸劒逆理不順不可服也臣以殺君子以殺父故闔閭以殺王僚一名磐郢亦曰豪曹不法之物無益於人故以送死一名湛盧五金之英大陽之精寄氣托靈出之有神服之有威可以折衝拒敵然人君有逆理之謀其劒即出故去無道以就有道今吳王無道殺君謀楚故湛盧入楚昭王曰其直幾何風湖子曰臣聞此劒在越之時客有酬其直者有市之鄉三十駿馬千匹萬户之都二是其一也薛燭對曰赤堇之山已令無雲若耶之溪深而莫測羣臣上天歐冶死矣雖傾城量金珠玉盈河猶不能得此寶而况有市之鄉駿馬千匹萬戸之都何足言也昭王大悦遂以為寶楚昭六年蘧伯玉使至楚逢公子晢濮水之上子晢接草而待曰敢問上客將何之蘧伯玉為之軾車公子晢曰吾聞上士可以託色中士可以託辭下士可以託財三者固可得而託耶蘧伯玉曰謹受命蘧伯玉見楚王使事畢坐談語從容言至於士楚王曰何國最多士蘧伯玉曰楚最多士楚王大悦蘧伯玉曰楚最多士而楚不能用王造然曰是何言也蘧伯玉曰伍子胥生於楚逃之吳吳受而相之發兵攻楚墮平王之墓伍子胥生於楚吳善用之釁蚠黄生於楚走之晉治七十二縣道不拾遺民不妄得城郭不閉國無盗賊蚠黄生於楚而晉善用之今者臣之來逢公子晢濮水之上辭言上士可以託色中士可以託辭下士可以託財三言者固可得而託身耶又不知公子晢將何治也於是楚王發使一駟副使二乗追公子晢濮水之上子晢還重於楚蘧伯玉之力也説苑善説楚昭王有士曰石奢其為人也公而好直王使為理於是道有殺人者石奢追之則父也還返於廷曰殺人者臣之父也以父成政非孝也不行君法非忠也弛罪廢法而伏其辜臣之所守也遂伏斧鑕曰命在君君曰追而不及庸有罪乎子其治事矣石奢曰不然不私其父非孝也不行君法非忠也以死罪生不亷也君欲赦之上之惠也臣不能夫法下之義也遂不去鐵鑕刎頸而死乎廷君子聞之曰貞夫法哉石先生乎韓詩卷二七又新序卷作又吕覽髙義畧同石奢石渚又史記循吏傳楚狂接輿躬耕以食其妻之市未返楚昭王聞其賢使使者賫金百鎰造門曰大王使臣奉金百鎰願請先生治河南接輿笑而不應使者遂不得辭而去妻從市而來曰先生少而為義豈將老而遺之哉門外車軼車一作轍何其深也接輿曰今者王使使者賫金百鎰欲使我治河南其妻曰豈許之乎曰未也妻曰君使不從非忠也從之是遺義也不如去之乃夫負釡甑妻戴織器變易姓字莫知其所之韓詩卷二楚王聞接輿賢致輿幣聘之接輿固辭焉其妻從外來顧曰始以夫子可事今不可事也門外轍迹何深也接輿曰楚王不以我為不肖重為聘我妻曰許之乎曰許矣妻曰噫夫子左琴右書躬耕而為食紡織而為衣據義而動其樂亦足矣今受人重禄乗人良駟食人肥濃將何以待之接輿曰吾固未許也遂偕深隠楚王復聘莫知所之列女傳髙士傳陸通字接輿楚人也好養性躬耕以為食楚昭王時通見楚政無常乃佯狂不仕故時人謂之楚狂孔子適楚楚狂接輿遊其門曰鳯兮鳯兮何如德之衰也來世不可待徃世不可追也天下有道聖人成焉天下無道聖人生焉方今之世僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避已乎已乎臨人以德殆乎殆乎畫地而趨迷陽迷陽迷陽伏陽也無傷無行郤曲郤曲無傷吾足山木自冦也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而不知無用之用也自孔子適楚至此見莊子孔子下車欲與之言趨而避之不得與之言楚王聞陸通賢遣使者持金百鎰車馬二駟徃聘通曰王請先生治江南通笑而不應使者去妻從市來曰先生少而為義豈老違之哉門外車跡何深也妾聞義士非禮不動妾事先生躬耕以自食親織以為衣食飽衣暖其樂自足矣不如去之於是夫負釡甑妻戴絍器變名易姓遊諸名山食桂櫨實服黄精子隠蜀峩睂山壽數百年俗傳以為仙云列仙傳陸通好養生食槖盧木實及蕪菁子遊諸名山在蜀峨眉山上見之孔子使宰予使於楚楚昭王以安車飾象因宰予以遺孔子焉宰我曰夫子無以此為也王曰何故對曰臣以其用思其所在觀之有以知其然王曰言之宰予對曰自臣侍從夫子以來竊見其言不離道動不違仁貴義尚德清素好儉仕而有禄不以為積不合則去退無吝心妻不服綵妾不衣帛車器不雕馬不食粟道行則樂其治不行則樂其身此所以為夫子也若夫絶目之麗靡窈窕之淫音夫子過之弗之視遇之弗之聽也故臣知夫子之無用此車也王曰然則夫子何欲而可對曰方今天下道德寢息其志欲興而行之天下誠有欲治之君能行其道則夫子雖使步以朝固猶為之何必逺辱君之重貺乎王曰乃今而後知孔子之德也大矣宰予歸以告孔子孔子曰二三子以予之言何如子貢對曰未盡夫子之美也夫子德髙則配天深則配海若予之言行事之實也夫子曰夫言貴實使人信之舍實何稱乎是賜之華不若予之實也孔叢子上楚王使使奉金幣聘夫子宰予冉有曰夫子之道至是行矣遂請見問夫子曰太公勤身苦志八十而遇文王孰與許由之賢夫子曰許由獨善其身者也太公兼利天下者也然今世無文王之君也雖有太公孰能識之乃歌曰太公隠兮禮為基賢人竄兮將待時天下如一欲何之孔叢子上孔子遷於蔡三歳吳伐陳楚救陳軍於城父聞孔子在陳蔡之間楚使人聘孔子楚迎夫子在昭王二十七年孔子將徃拜禮焉陳蔡大夫謀曰孔子賢者所刺譏皆中諸侯之疾今者久留陳蔡之間諸大夫所設行皆非孔子之意今楚大國也來聘孔子孔子用於楚則陳蔡用事大夫危矣乃相與發徒役圍孔子於野不得行絶糧七日外無所通藜藿不充從者皆病孔子愈講誦弦歌不衰孔子知弟子有愠心乃召子路而問曰詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子路曰意者吾未仁耶人之不我信也意者吾未知耶人之不我行也且由也聞諸夫子曰為善者天報之以福為不善者天降之以禍今夫子積善懐義久矣奚居之窮也子曰由未之識也汝以仁者而必信安有伯夷叔齊汝以知者而必行安有王子比干夫遇不遇者時也賢不肖者才也君子博學深謀而不遇時者衆矣何獨丘哉且芝蘭生於深谷不以無人而自芳君子修道立徳不以窮困而改節為之者人也生死者命也子路出子貢入見告如子路子貢曰夫子之道至大故天下莫能容夫子盍少貶焉子曰賜良農能稼而不能穡良工能巧而不能順君子能修其道綱而紀之統而理之而不能為容今爾不修爾道而求為容賜而志不逺矣子貢出顔回入見問亦如之顔回曰夫子之道至大故天下莫能容雖然夫子推而行之世不我用有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰於是使子貢至楚楚昭王興師迎孔子然後得免合家語及史記傳此事見於説苑吕覽莊子韓詩外皆大同小異不録仲尼適楚出於林中見痀僂者承蜩痀音居僂音吕曲背人也以竿黏蜩曰承猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月累丸二而不墜則失者錙銖累三而不墜則失者十一累五而不墜猶掇之也吾處身也若撅株拘吾執臂也若槁木之枝雖天地之大萬物之多而惟蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃凝於神其痀僂丈人之謂乎莊子達生仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已曰丘也聞不言之言矣未之嘗言於此乎言之市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵丘願有喙三尺二人皆以無為而解難息兵則言實用不著必喙三尺而後能言此事言其不能言之意莊子徐無鬼葉公子髙將使於齊奉命求成於齊問於仲尼曰王使諸梁也甚重葉公姓沈名諸梁齊之待使者盖將甚敬而不急匹夫猶未可動也而况諸侯乎吾甚慄之子嘗語諸梁曰凡事若小若大寡不道以懽成未有無術而使人懽然成事者事若不成則必有人道之患事若成則必有隂陽之患若成若不成而後無患者惟有德者能之吾食也執粗而不臧爨無欲清之人今吾朝受命而夕飲氷我其内熱歟必非外面苦熱所致吾未至乎事之情而既有隂陽之患矣若事不成必有人道之患是兩也為人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無所逃於天地之間是之謂大戒是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也為人臣子者固有所不得已行事之情而忘其身何暇至於悦生而惡死夫子其行可矣丘請復以所聞凡交近則必相靡以信逺則必忠之以言言必或傳之夫傳兩喜兩怒之言天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言凡溢之類也妄妄則其信之也莫無也莫則傳言者殃故法言曰傳其常情無傳其溢言則幾乎全且以巧鬭力者始乎陽常卒乎隂泰至則多奇巧以禮飲酒者始乎治常卒乎亂泰至則多竒樂凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨言者風波也行者實喪也夫風波易以動實喪易以危故忿設無由巧言偏辭獸死不擇音氣息茀然於是並生心厲尅核太至則必有不肖之心應之而不知其然也茍為不知其然也孰知其所終故法言曰無遷令無勸成過度益也遷令勸成殆事美成在久惡成不及改可不慎與且夫乗物以游心託不得已以養中至矣何作為報也莫若為致命此其難者莊子人間世自天下有大戒至德之至也答二患之問自為人臣至行可矣答不足以任之句自凡交近至幾乎全論使者傳言之道自且以巧鬭至可不慎歟答寡不道以懽成之句自且夫乗物至末答惟有德者能之問楚昭王將以書社地七百里封孔子楚令尹子西曰王之使使諸侯有如子貢者乎曰無有王之輔相有如顔回者乎曰無有王之將率有如子路者乎曰無有王之官尹有如宰予者乎曰無有且楚之祖封於周號為子男五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止其秋楚昭王卒於城父於是孔子自楚反乎衛史孔子世家説苑雜言楚昭王召孔子將使執政而封以書社七百子西謂楚王曰王之臣用兵有如子路者乎使諸侯有如宰予者乎長官五官有如子貢者乎昔文王處豐武王處鎬豐鎬之間百乗之地伐上殺主立為天子世皆曰聖王今以孔子之賢而有書社七百里之地而三子佐之非楚之利也楚王遂止韓非子荆令公子將伐陳丈人送之曰晉彊不可不慎也公子曰丈人奚憂吾為丈人破晉丈人曰可吾方廬陳南門之外公子曰是何也曰我笑勾踐也為人之如是其易也已獨何為宻宻十年難乎荆伐陳吳救之軍間三十里雨十日夜星左史倚相謂子期曰雨十日甲輯而兵聚吳人必至不如備之乃為陳陳未成也而吳人至見荆陳而反左史曰吾反復六十里其君子必休小人必食我行三十里擊之必可敗也乃從之遂破吳軍二十七年春吳伐陳楚昭王救之軍城父十月昭王病於軍中有赤雲如鳥夾日而蜚昭王問周太史太史曰是害於楚王然可移於將相將相聞是言乃請自以身禱於神昭王曰將相孤之股肱也今移禍庸去是身乎弗聽卜而河為祟大夫請禱河昭王曰自吾先王受封望不過江漢而河非所獲罪也止不許孔子在陳聞是言也楚昭王通大道矣其不失國宜哉史楚世家楚昭王之時有雲如飛鳥夾日而飛三日昭王患之使人乗驛東而問諸太史州黎州黎曰將虐於王身以令尹司馬説焉則可令尹司馬聞之宿齋沐浴將自以身禱之王曰止楚國之有不榖也由身之有胷脇也其有令尹司馬也由身之有股肱也胸脇有疾轉之股肱庸為去是人也説苑君道二十七年昭王病甚乃召諸大夫公子曰孤不佞再辱楚國之師今乃得以天夀終孤之幸也讓其弟公子申為王不可又讓次弟公子結亦不可又讓次弟公子閭五讓乃後許為王將戰昭王卒於軍中公子閭曰王病甚舍其子讓羣臣臣所以許王以廣王意也今王卒臣豈敢忘王之意乎乃與子西子綦謀伏師閉塗迎越女之子章立之是為惠王然後罷兵歸史楚世家列女傳楚昭越姬者越王勾踐之女昭王燕遊蔡姬在左越姬參右王親乗駟以馳逐遂登附社之臺以望雲夢之囿觀士大夫逐者既驩乃顧謂二姬曰樂乎蔡姬對曰樂王曰吾願與子生若此死又若此蔡姬曰昔敝邑寡君固以衆黎民之役事君王之馬足故以婢子之身為苞苴玩好今乃比於妃嬪固願生同樂死同時王顧謂史書之蔡姬許從孤死矣乃復謂越姬越姬對曰昔者吾先君莊王淫樂三年不聽政事終而能改卒霸天下妾以君王為能法吾先君將改斯樂而勤於政也今則不然而要婢子以死其可得乎且君王以束帛乗馬取婢子於敝邑寡君受之太廟也不約死妾聞之諸姑婦人以死彰君之善益君之寵不聞其以茍從其闇死為榮妾不敢聞命居二十五年王救陳二姬從王病在軍中有赤雲夾白如飛鳥王問周史周史曰是害王身然可移於將相將相聞之將請以身禱於神王曰將相之於孤猶股肱也今移禍焉庸為去是身乎不聽越姬曰大哉君王之德以是妾願從王矣請願先驅狐狸於地下王曰昔日之遊樂吾特戯之耳若將必死是益彰孤之不徳也越姬曰昔者妾雖口不言心既許之矣妾聞之信者不負其言義者不虛設其事妾死王之義不死王之好也遂自殺王薨於軍中蔡姬竟不能死弟子閭與子西子期謀曰母信者其子必仁乃伏師閉璧迎越姬之子熊章立為惠王然後罷兵歸葬昭王則據云前此二十五年越姬似非勾踐之女荆州圖記江陵縣東七十里有楚昭王墓髙四丈王仲宣登樓賦所謂西接昭丘者是也春秋戰國異辭卷二十九
