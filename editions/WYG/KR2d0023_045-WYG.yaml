body:
  text: 春秋戰國異辭卷四十二右春坊右諭徳陳厚耀撰魏史魏世家魏之先畢公髙之後也畢公髙與周同姓武王之伐紂而髙封於畢於是為畢姓其後絶封為庶人或在中國或在夷狄其苗裔曰畢萬事晉獻公獻公之十六年滅魏鄭𤣥詩譜云魏姫姓之國武王伐紂而封焉以封畢萬為大夫􅁲偃曰畢萬之後必大矣萬滿數也魏大名也以是始賞天開之矣天子曰兆民諸侯曰萬民今命之大以從滿數其必有衆畢萬封十一年晉獻公卒四子争更立晉亂而畢萬之世彌大從其國名為魏氏生武子名犨事晉公子重耳晉獻公之二十一年武子從重耳出亡十九年反重耳立為晉文公而令魏武子襲魏氏之後封列為大夫治於魏生悼子魏悼子徙治霍生魏絳魏絳事晉悼公悼公任魏絳政使和戎翟戎翟親附賜之樂三讓然後受之徙治安邑魏絳卒諡為昭子生魏嬴嬴生魏獻子獻子事晉昭公昭公卒而六卿强公室卑晉頃公之十二年韓宣子老魏獻子為國政晉宗室祁氏羊舌氏相惡六卿誅之盡取其邑為十縣六卿各令其子為之大夫獻子與趙簡子中行文子范獻子並為晉卿其後十四嵗而孔子相魯後四嵗趙簡子以晉陽之亂也而與韓魏共攻范中行氏魏獻子生魏侈襄子魏侈與趙鞅共攻范中行氏魏侈之孫曰魏桓子與魏康子趙襄子共伐滅知伯分其地桓子之孫曰文侯都都一作斯世本畢萬生芒季芒季生武仲州武仲生莊子絳莊子生獻子茶獻子生簡子取取生襄子多襄子生桓子駒桓子生文侯斯世次與史記不同文侯文侯元年秦靈公之元年也與韓武子趙桓子周威王同時史魏世家六年城少梁史魏世家八年復城少梁史記年表十三年使子擊圍繁龎出其民史魏世家十六年伐秦築臨晉元里史魏世家十七年伐中山使子擊守之趙倉唐傅之西攻秦至鄭而還築雒隂合陽史魏世家魏將樂羊攻中山其子執在城中城中縣其子以示樂羊樂羊曰君臣之義不得以子為私攻之愈急中山因烹其子而遺之鼎羮與其首樂羊循而泣之曰是吾子已為使者跪而啜三杯使者歸報中山曰是伏約死節者也不可忍也遂降之為魏文侯大開地有功自此之後日以不信淮南子人間與又説苑貴徳語稍畧國策小異地志靈夀樂羊為魏將伐中山文侯封之靈壽子孫因家焉樂毅其後也韓子説林樂羊為魏將而攻中山其子在中山中山之君烹其子而遺之羮樂羊坐於幕下而啜之盡一盃文侯謂堵師贊曰樂羊以我故而食其子之肉答曰其子而食之且誰不食樂羊罷中山文侯賞其功而疑其心魏攻中山樂羊將已得中山還反報文侯有貴功之色文侯知之命主書曰羣臣賓客所獻書者操以進之主書舉兩篋以進令將軍視之盡難攻中山之事也將軍還走北面再拜曰中山之舉非臣之力君之功也説苑復思覽又吕樂成史樂毅傳初樂羊為魏文侯將伐取中山魏文侯封樂羊以靈壽樂羊死𦵏於靈壽其後子孫因家焉中山復國至趙武靈王時復滅中山文侯受子夏經藝客段干木過其閭未嘗不軾也秦嘗欲伐衛或曰魏君賢人是禮國人稱仁上下和同未可圖也文侯由此得譽於諸侯任西門豹守鄴而河内稱治史魏世家魏文侯謂李克曰先生嘗教寡人曰家貧則思良妻國亂則思良相今所置非成則璜文矦弟名成璜一作黄二子何如李克對曰臣聞之卑不謀尊疎不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿讓李克曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍寡人之相定矣李克趨而出過翟璜之家翟璜曰今者聞君召先生而卜相果誰為之李克曰魏成子為相矣翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河之守臣之所進也君内以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已㧞無使守之臣進先生君之子無𫝊臣進屈侯鮒韓詩屈侯鮒作趙蒼臣何負於魏成子李克曰子之言克於子之君者豈將比周以求大官哉君問而置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣是以知魏成子之為相也且子安得與魏成子比乎魏成子食禄千鍾什九在外什一在内是以東得卜子夏田子方段干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡巡再拜曰璜鄙人也失對願卒為弟子史魏世家六又韓詩卷二畧同夏漢書儒家魏文侯篇李克七篇子弟子為魏文侯相説苑臣術魏文侯且置相召李克而問焉曰寡人將置相置於季成子與翟觸我孰置而可李克曰臣聞之賤不謀貴外不謀内疎不謀親如臣疎賤不敢聞命文侯曰此國事也願與先生臨事而勿辭李克曰君不察故也可知矣貴視其所舉富視其所與貧視其所不取窮視其所不為由此觀之可知矣文侯曰先生出矣寡人之相定矣李克出過翟璜翟璜問曰吾聞君問相於先生未知果孰為相李克曰季成子為相翟璜作色不悦曰觸失望於先生李克曰子何遽失望於我我於子之君也豈與我比周而求大官哉君問相於我臣對曰君不察故也貴視其所舉富視其所與貧視其所不取窮視其所不為由此觀之可知也君曰出矣寡人之相定矣以是知季成子為相翟璜不説曰觸何遽不為相乎西河之守觸所任也計事内史觸所任也王欲攻中山吾進樂羊無使治之臣吾進先生無使傅其子吾進屈侯附觸何負於季成子李克曰不知季成子季成子食采千鍾什九居外一居中是以東得卜子夏田子方段干木彼其所舉人主之師也子之所舉人臣之才也翟黄迮然而慚曰觸失對於先生請自修然後學言未卒而左右言季成子立為相矣於是翟璜黙然變色内慚不敢出三月吕覽舉難魏文侯弟曰季成友曰翟璜文侯欲相之而未決以問李克李克對曰君欲置相則問樂騰與王孫茍端孰賢文侯曰善以王孫茍端為不肖翟璜進之以樂騰為賢季成進之故相季成又新序卷四樂騰作樂商韓子内儲下翟璜魏王之臣也而善於韓乃召韓兵與之攻魏因請為魏王搆之以自重也二十一年魏韓趙列為諸侯二十四年秦伐我至陽􅈢二十五年子擊生子罃以上魏世家􅁲子夏衛人孔子没退居西河教授為魏文侯師梁之東北鄉有愛子鎮相傳即其哭子處廣輿記山西文又云今太原府水縣有隠泉山一名陶山卜子夏嘗隠此子夏作壤室編蓬户弹琴瑟其中以歌先王之風尚書大傳禮記魏文侯問於子夏曰吾端冕而聼古樂則唯恐卧聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今夫古樂進旅退旅和正以廣弦匏笙簧㑹守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也今夫新樂進俯退俯姦聲以濫溺而不止及優侏傅獶雜子女不知父子樂終不可以語不可以道古此新樂之發也今君之所問者樂也所好者音也夫樂者與音相近而不同文侯曰敢問何如子夏對曰夫古者天地順而四時當民有徳而五榖昌疾疢不作而無妖祥此之謂大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂徳音徳音之謂樂詩云莫其徳音其徳克明克明克類克長克君王此大邦克順克俾俾於文王其徳靡悔既受帝祉施于孫子此之謂也今君之所好者其溺音乎文侯曰敢問溺音何從出也子夏對曰鄭音好濫滛志宋音燕女溺志衛音趨數煩志齊音敖辟喬志此四者皆滛於色而害於徳是以祭祀弗用也詩云肅雝和鳴先祖是聽夫肅肅敬也雝雝和也夫敬以和何事不行為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也然後聖人作為鞉鼓椌楬壎篪此六者徳音之音也然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也鐘磬鏗鏗以立號號以立横横以立武君子聽鐘聲則思武臣石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立㑹㑹以聚衆君子聽竽笙簫管之聲則思畜聚之臣皷鼙之聲讙讙以立動動以進衆君子聽鼓鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而已也彼亦有所合之也魏文侯與田子方語有兩僮子衣青白衣青白衣一作錦衣而侍於君前子方曰此君之寵子乎文侯曰非也其父死於戰此其㓜孤也寡人收之子方曰臣以君之賊心為足矣今滋甚君之寵此子也又且以誰之父殺之乎文侯愍然曰寡人受令矣自是以後兵革不用説苑復恩公季成謂魏文侯曰田子方雖賢人然而非有土之君也君常與之齊禮假有賢於子方者君又何以加之文侯曰如子方者非成所得議也子方仁人也仁人也者國之寳也智士也者國之器也博通士也者國之尊也故國有仁人則羣臣不爭國有智士則無四隣諸侯之患國有􅀶通之士則人主尊固非成之所議也公季成自退於郊三日請罪新序卷四田子顔自大術至乎平陵城下見人子問其父見人父問其子田子方曰其以平陵反乎吾聞行於内然後施於外子顔欲使其衆甚矣後果以平陵叛説苑權謀髙士傳東郭順子魏人也修道守真田子方師事之而為魏文侯師友侍坐于文侯數稱谿工文侯曰谿工子之師耶子方曰非也無擇田子方名之里人也稱道數當故無擇稱之文侯曰然則子無師耶子方曰有文侯曰子師誰耶子方曰東郭順子也文侯曰然則夫子何故未嘗稱之子方曰其為人也真人貌而天虛縁而葆真清而容物物無道則正容以悟之使人之意自消無擇何足以稱之子方出文侯曰逺哉全徳之君子始吾以聖智之言仁義之行為至矣吾聞子方之師吾形解而不欲動口鉗而不欲言吾所學者真土梗耳夫魏直為我累耳又莊子田子方田子方從齊之魏望翟璜乘軒騎駕出方以為文侯也移車異路而避之則翟璜也方問曰子奚乘是車也曰君謀欲伐中山臣薦翟角而謀得果伐之臣薦樂羊而中山拔得中山憂欲治之臣薦李克而中山治是以君賜此車方曰寵之稱功尚薄田子方渡西河造翟璜翟璜乘軒車載華葢黄金之勒約鎮簟席如此者其駟八十乘子方望之以為人君也道狹下抵車而待之翟璜至而睹其子方也下車而趨自投下風曰觸田子方曰子與吾嚮者望子疑以為人君也子至而人臣也將何以至此乎翟璜對曰此皆君之所以賜臣也積三十嵗故至於此時以閒暇祖之曠野正逢先生子方曰何子賜車轝之厚也翟璜對曰昔者西河無守臣進吳起而西河之外寧鄴無令臣進西門豹而魏無趙患酸棗無令臣進北門可而魏無齊憂魏欲攻中山臣進樂羊而中山拔魏無使治之臣臣進李克而魏國大治是以進此五大夫者爵禄倍以故至於此子方曰可子勉之矣魏國之相不去子而之他矣翟璜對曰君母弟有公孫季成者進子夏而君師之進段干木而君友之進先生而君敬之彼其所進師也友也所敬者也臣之所進者皆守職守禄之臣也何以至魏國相乎子方曰吾聞身賢者賢也能進賢亦賢也子之五舉者盡賢子勉之矣子終其次也説苑臣術田子方出見老馬於道喟然有志焉以問於御者曰此何馬也曰故公家畜也罷而不為用故出而鬻之田子方曰少而貪其力老而棄其身仁者不為也束帛而贖之窮士聞之歸心焉韓詩卷八間淮南子人髙士傳段干木者晉人也少貧且賤心志不遂乃治清節遊西河師事卜子夏與田子方李克翟璜吳起等居於魏皆為將唯干木守道不仕魏文侯欲見就造其門段干木踰牆而避文侯文侯以客禮待之出過其廬而軾其僕問曰干木布衣也君軾其廬不亦甚乎文侯曰段干木賢者也不移勢利懐君子之道隠處窮巷聲馳千里吾敢不軾乎干木先乎徳寡人先乎勢干木富乎義寡人富乎財勢不若徳貴財不若義髙又請為相不肯後卑已固請見與語文侯立倦不敢息夫文侯名過齊桓公者葢能尊段干木敬卜子夏友田子方故也魏文侯過段干木之閭而軾之其僕曰君胡為軾曰此非段干木之閭歟段干木葢賢者也吾安敢不軾且吾聞段干木未嘗肯以已易寡人也吾安敢驕之段干木光乎徳寡人光乎地地一作勢段干木富乎義寡人富乎財地不如徳財不如義其僕曰然則君何不相之於是君請相之段干木不肯受乃致禄百萬而時往館之於是國人皆喜相與誦之曰吾君好正段干木之敬吾君好忠段干木之隆居無幾何秦興兵欲攻魏司馬唐且諌秦君曰段干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君以為然乃按兵輟不敢攻吕覽期賢五又新序卷别又淮南子修務語稍司馬唐且作司馬庾吕覽尊師段干木晉國之大駔也學於子夏子擊逢文侯之師田子方于朝歌引車避下謁田子方不為禮子擊因問曰富貴者驕人乎且貧賤者驕人乎子方曰亦貧賤者驕人耳夫諸侯而驕人則失其國大夫而驕人則失其家貧賤者行不合言不用則去之楚越若脱躧然奈何其同之哉子擊不懌而去史魏世家韓詩卷九田子方之魏魏太子從車百乘而迎之郊太子再拜謁田子方田子方不下車太子不悦曰敢問何如則可以驕人矣田子方曰吾聞以天下驕人而亡者有矣由此觀之則貧賤可以驕人矣夫志不得則授履而適秦楚耳安徃而不得貧賤乎於是太子再拜而後退田子方遂不下車説苑尊賢魏文侯從中山奔命安邑田子方從太子擊過之下車而趨子方坐乘如故告太子曰為我請君待我朝歌太子不説因謂子方曰不識貧窮者驕人富貴者驕人乎子方曰貧窮者驕人富貴者安敢驕人人主驕人而亡其國吾未見以國待亡者也大夫驕人而亡其家吾未見以家待亡者也貧賤者若不得意納履而去安往不得貧窮乎貧窮者驕人富貴者安敢驕人太子及文侯道田子方之語文侯嘆曰微吾子之故吾安得聞賢人之言吾下子方以行得而友之自吾友子方也君臣益親百姓益附吾是以得友士之功我欲伐中山吾以武下樂羊三年而中山為獻於我我是以得有武之功吾所以不少進於此者吾未見以智驕我者也若得以智驕我者豈不及古之人乎田子方侍魏文侯坐太子擊趨而入見賓客羣臣皆起田子方獨不起文侯有不悦之色太子亦然田子方稱曰為子起歟無如禮何不為子起歟無如罪何請為子誦楚恭王之為太子也將出之雲夢遇大夫工尹工尹遂趨避家人之門中太子下車從之曰子大夫何為其若是吾聞之敬其父者不兼其子兼其子者不祥莫大焉子大夫何為其若是工尹曰向吾望見子之面今而後識子之心審如此汝將何之文侯曰善令太子擊前誦恭王之言誦三遍而請習之説苑敬慎韓非子田子方問唐易鞠曰弋者何慎對曰鳥以數百目視子子以二目御之子謹周子廩田子方曰善子加之弋我加之國鄭長者聞之曰田子方知欲為廩而未得所以為廩夫虚無無見者廩也漢書道家鄭長者一篇魏文侯見段干木立倦而不敢息反見翟璜踞堂而與之言翟璜不説文侯曰段干木官之則不肯禄之則不受今汝欲官則相位欲禄則上卿既受吾實又責吾禮無乃難乎文侯可謂好禮士矣好禮士故南勝楚於連隄東勝齊於長城虜齊侯獻諸天子天子賞文侯以上卿吕覽下賢賢又説苑尊魏文侯封太子擊於中山三年使不往來舍人趙倉唐進稱曰為人子三年不聞父問不可謂孝為人父三年不問子不可謂慈君何不遣人使大國乎太子曰願之乆矣未得可使者倉唐曰臣願奉使侯何嗜好太子曰侯嗜晨鳬好北犬於是乃遣倉唐緤北犬奉晨鳬獻于文侯倉唐至上謁曰孽子擊之使者不敢當大夫之朝請以燕閒奉晨鳬敬獻庖廚緤北犬敬上涓人文侯悦曰擊愛我知吾所嗜知吾所好召倉唐而見之曰擊無恙乎倉唐曰唯唯如是者三乃曰君出太子而封之國君名之非禮也文侯怵然為之變容問曰子之君無恙乎倉唐曰臣來時拜送書於庭文侯顧指左右曰子之君長孰與是倉唐曰禮擬人必於其倫諸侯無偶無所擬之曰長大孰與寡人倉唐曰君賜之外府之裘則能勝之賜之斥帯則不更其造文侯曰子之君何業倉唐曰業詩文侯曰於詩何好倉唐曰好晨風黍離文侯自讀晨風曰鴥彼晨風欝彼北林未見君子憂心欽欽如何如何忘我實多文侯曰子之君以我忘之乎倉唐曰不敢時思耳文侯復讀黍離曰彼黍離離彼稷之苗行邁靡靡中心揺揺知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉文侯曰子之君怨乎倉唐曰不敢時思耳文侯於是遣倉唐賜太子衣一襲勑倉唐以雞鳴時至太子起拜受賜發篋視衣盡顛倒太子曰趣早駕君侯召擊也倉唐曰臣來時不受命太子曰君侯賜擊衣不以為寒也欲召擊無誰與謀故勑子以雞鳴時至詩曰東方未明顛倒衣裳顛之倒之自公召之遂西至謁文侯大喜乃置酒而稱曰夫逺賢而近所愛非社稷之長䇿也乃出少子摯封中山而復太子擊説苑奉使韓詩卷八魏文侯有子曰擊次曰訴訴少而立以為嗣封擊中山三年莫往來其傅趙倉唐曰父忘子子不可忘父何不遣使乎擊曰願之未有所使也倉唐曰臣請使擊曰諾於是乃問君之所好與所嗜曰君好北犬嗜晨雁遂求北犬晨雁賫行倉唐至曰北藩中山之君有北犬晨雁使倉唐再拜獻之文侯曰擊知吾好北犬嗜晨雁也遂見使者文侯曰擊無恙乎倉唐唯唯唯而不對三問而三不對文侯曰不對何也倉唐曰臣聞諸侯不名君既賜弊邑使得小國侯君問以名不敢對也文侯曰中山之君無恙乎倉唐曰今者臣之來拜送於郊文侯曰中山之君長短若何矣倉唐曰問諸侯比諸侯諸侯之朝列側者皆人臣無所比之然則所賜衣裘幾能勝之矣文侯曰中山之君亦何好乎對曰好詩文侯曰於詩何好曰好黍離與晨風文侯曰黍離何哉對曰彼黍離離彼稷之苗行邁靡靡中心揺揺知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉文侯曰怨乎曰非敢怨也時思也文侯曰晨風謂何對曰鴥彼晨風鬱彼北林未見君子憂心欽欽如何如何忘我實多於是文侯大悦曰欲知其子視其母欲知其君視其所使中山君不賢惡能得賢遂廢太子訴召中山君以為嗣魏文侯時西門豹為鄴令今相州豹往到鄴㑹長老問民所疾苦長老曰苦為河伯娶婦以故貧豹問其故對曰鄴三老廷掾常嵗賦斂百姓收取其錢得數百萬用其二三十萬為河伯娶婦與祝巫共分其餘錢當其時巫行視人家女好者云是當為河伯婦即聘取洗沐之為製新繒衣閒居齋戒為治齋宫河上張緹綘帷女居其中為具牛酒飯食行十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝取之多持女逺逃以故城中益空無人又困貧所從來乆矣民人俗語曰即不為河伯娶婦水來漂没溺其人民云西門豹曰至為河伯娶婦時願三老巫祝父老送女河上幸來告之吾亦往送女皆曰諾至其時豹往㑹河上三老官屬豪長者里父老皆㑹觀者二三千人其巫老女子也年七十從弟子女千人千一作十皆衣繒單衣立大巫後西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂父老曰是女不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何乆也弟子趣之復以弟子一人投河中有頃曰弟子何乆也復使一人趣之復投一弟子河中凡投三弟子西門豹曰巫嫗弟子是女子也不能白事煩三老為入白之復投三老河中西門豹簮筆磬折向河立待良乆長老吏傍觀者皆驚恐西門豹曰巫嫗三老不來還奈之何欲使廷掾與豪長者一人入趣之皆叩頭且破額血流地色如死灰西門豹曰諾且留待之須臾豹曰廷掾起矣狀河伯留客之乆若皆罷去歸矣鄴吏民大驚恐以後不敢復言為河伯娶婦西門豹即發民鑿十二渠引河水灌民田田皆溉當其時民治渠少煩苦不欲也豹曰民可樂成不可與慮始今父老子弟雖患苦我然百嵗後期令父老子孫思我言至今皆得水利民以足富史滑稽傳補史河渠書西門豹引漳水溉鄴以富魏之河内魏文侯使西門豹往治於鄴告之曰必全功成名布義豹曰敢問全功成名布義為之奈何文侯曰子往矣是無邑不有賢豪辨博者也無邑不有好揚人之惡蔽人之善者也往必問賢豪者因而親之其辨博者因而師之問其好揚人之惡蔽人之善者因而察之不可以特聞從事夫耳聞之不如目見之目見之不如足踐之足踐之不如手辨之人始入官如入晦室乆而愈明明乃治治乃行説苑政理西門豹治鄴廩無積粟府無儲錢庫無甲兵官無計㑹人數言其過於文侯文侯身行其縣果若人言文侯曰翟璜任子治鄴而大亂子能道則可不能將加誅於子西門豹曰臣聞王主富民霸主富武亡國富庫今王欲為霸王者也臣故稸積於民君以為不然臣請升城皷之一皷甲兵粟米可立具也於是乃升城而皷之一皷民被甲括矢操兵弩而出再皷負輦粟而至文侯曰罷之西門豹曰與民約信非一日之積也一舉而欺之後不可復用也燕常侵魏入城臣請北擊之以復侵地遂舉兵擊燕復地而後反淮南子人間西門豹為鄴令清尅潔慤秋毫無私利也而甚簡左右左右因相與比周而惡之居期年上計君收其璽豹自請曰臣昔者不知所以治鄴令臣得之矣願請璽復治鄴不當請伏斧躓之罪文侯不忍而復與之豹因重歛百姓急事左右期年上計文侯迎而拜之豹對曰往年臣為君治鄴而君奪臣璽今臣為左右治鄴而君拜臣臣不能治矣遂納璽而去文侯不受曰寡人曩不知子今知矣願子勉為寡人治之遂不受韓子外儲左西門豹為鄴令佯亡其車轄令吏求之不能得乃使人求之而得之家人屋間韓子内儲上西門豹之性急故佩韋以自緩董安于之心緩故佩弦以自急韓子觀行李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居三分去一為田六百萬畆治田勤謹則畆益三斗不勤則損亦如之地方百里之増減輒為粟百八十萬石又曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧善平糴者必謹觀嵗有上中下熟上熟其收自四餘四百石上糴三而舍一中熟自三餘三百石上糴二而舍一下熟自倍餘百石上則糴一使民適足賈平則止小饑則發下熟之所歛中饑則發中熟之所歛大饑則發上熟之所歛而糴之又撰次諸國法著法經以為政莫急於盜賊故始於盜律盜賊須劾捕故著囚捕二篇其輕狡越城博戲借假不亷滛侈踰制以為雜律一篇終以具律具其加減凡六篇商君受之以相秦具律今之名例律也前漢志魏文侯相李悝曰糶甚貴傷人甚賤傷農人傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使人無傷而農益勸今一夫挾五口治田百畆嵗收畆一石半為粟百五十碩除十一之税十五碩餘百三十五碩食人月一碩半五人終嵗為粟九十碩餘有四十五碩碩三十為錢千三百五十除社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五文終嵗用千五百不足四百五十不幸疾病死喪之費及上賦歛又未與此此農夫所以常困有不勸耕之心而今糶至於甚貴者也是故善平糶者必謹觀嵗有上中下熟上熟其收自四餘四百碩大熟四倍收六百碩計人終嵗長四百碩官糶三百碩此為糶三舍一也中熟自三餘三百碩自三四百五十碩也終嵗長三百碩官糶二百碩此為糶二而舍一也下熟自倍餘百碩自倍三百碩終嵗長百碩官糶其五十碩云下熟糶一謂之中分百碩之一也小饑則收百碩收三分之一中饑七十碩收二分之一大饑三十碩收五分之一故大熟則上糶三而舍一中熟則糶二下熟則糶一使人適足價平則止小饑則發小熟之所歛中饑則發中熟之所歛大饑則發大熟之所歛而糶之故雖遇饑饉水旱糶不貴而人不散取有餘而補不足也行之魏國國以富彊杜氏通典李悝為魏文侯上地守而欲人之善射也乃下令曰人之有狐疑之訟者令之射的中者勝不中者負令下而人皆疾習射日夜不休及與秦人戰大敗之以人之善戰射也韓子内儲上李悝警其兩和曰謹警敵人旦暮且至擊汝如是者再三而敵不至兩和懈怠不信李悝居數月秦人來襲之至幾奪其軍此不信之患也韓子外儲左二漢書法家李子三十篇名悝白圭周人也當魏文侯時李克務盡地力李克當作李悝而白圭樂觀時變故人棄我取人取我與嵗熟取榖予之絲漆蠒出取帛絮與之食太隂在卯穰明嵗衰惡至午旱明嵗美至酉穰明嵗衰惡至子大旱明嵗美至卯有水積著率嵗倍欲長錢取下糓長石斗取上種能薄飲食忍嗜慾節衣服與用事僮僕同苦樂趨時若猛獸摯鳥之發故曰吾治生産猶伊尹吕尚之謀孫吳用兵商鞅行法是也是故其智不足與權變勇不足以決斷仁不能以取予强不能有所守雖欲學吾術終不之告矣葢天下言治生者祖白圭史貨殖傳白圭顯於中山人惡之於魏文侯文侯投以夜光之璧不信人讒也鄒陽上梁王書魏文侯見宋陵子三仕不願文侯曰何貧乎曰臣見楚富者牧羊九十九而願百嘗訪邑里故人其鄰人貧有一羊者富拜之曰吾羊九十九今君之一盈成我百則牧數足矣鄰者與之從此觀焉富者非富貧者非貧也金樓子符子同魏文侯問於解􅈢曰寡人將立西河之守誰可用者對曰荆伯栁者賢人殆可文侯以荆伯栁為西河守荆伯栁問左右誰言我於吾君者左右曰解􅈢荆伯栁往見解􅈢而謝之曰子乃寛臣之過也言於君謹再拜謝解􅈢曰言子者公也怨子者吾私也公事已行怨子如故張弓射之走十歩而没韓詩卷九按此等語屢見轉相附㑹耳解扁為東封解扁魏臣治東封者上計而入三倍有司請賞之文侯曰吾土地非益廣也人民非益衆也入何以三倍對曰以冬伐木而積之於春浮之何而鬻之文侯曰民春以力耕暑以强耘秋以收歛冬閒無事以伐林而積之負軛而浮之河是用民不得休息也民以敝矣雖有三倍之入將焉用之此有功而可罪也淮南子人間魏文侯問李克曰刑罰之源安生李克曰生於奸邪滛佚之行凡奸邪之心饑寒而起滛佚者乆饑之詭也雕文刻鏤害農事者也錦繡纂組傷女工者也農事害則饑之本也女工傷則寒之原也饑寒並至而不能為奸邪者未之有也男女飾美以相矜而能無滛佚者未嘗有也故上不禁技巧則國貧民侈國貧窮者為奸邪而富足為滛佚則驅民而為邪也民以為邪因以法隨誅之不赦其罪則是為民設陥也刑罰之起有原人主不塞其本而替其末傷國之道乎文侯曰善以為法服也説苑反質魏文侯問於李克曰為國如何對曰臣聞為國之道食有勞而禄有功使有能而賞必行罰必當文侯曰吾賞罰皆當而民不與何也對曰國其有滛民乎臣聞之曰奪滛民之禄以來四方之士其父有功而禄其子無功而食之出則乘車馬衣美裘以為榮華入則修竽琴鍾石之聲而安其子女之樂以亂郷曲之教如此者奪其禄以求四方之士此之謂奪滛民也説苑政理魏文侯問李克曰人有惡乎李克曰有夫貴者則賤者惡之富者則貧者惡之智者則愚者惡之文侯曰善行此三者使人勿惡亦可乎李克曰可臣聞貴而下賤則衆弗惡也富能分貧則窮士弗惡也智而教愚則童䝉弗惡也文侯曰善哉言乎堯舜其猶病諸寡人雖不敏請守師語矣韓詩卷八魏文侯問里克曰吕覽適威篇文侯作武侯里克作李克吳之所以亡者何也里克對曰數戰而數勝文侯曰數戰數勝國之福也其獨亡何也里克對曰數戰則民疲數勝則主驕以驕主治疲民此其所以亡也驕則恣恣則極物罷則怨怨則極慮上下俱極吳之亡猶晚矣此夫差所以自喪於干遂也韓詩卷十南又新序卷五淮子道應吳起儒服以兵機見魏文侯文侯曰寡人不好軍旅之事起曰臣以見占隠以往察來主君何言與心違今君四時使斬離皮革掩以朱漆畵以丹青鑠以象犀冬日衣之則不温夏日衣之則不凉為長㦸二丈四尺短㦸一丈二尺革車掩戸縵輪籠轂觀之於目則不麗乘之於田則不輕不識主君安用此也若以備進戰退守而不求能用者譬猶伏雞之搏狸乳犬之犯虎雖有鬭心隨之死矣昔承桑氏之君修徳廢武以滅其國有扈氏之君恃衆好勇以喪其社稷明主鑒兹必内修文徳外治武備故當敵而不進無逮於義矣僵屍而失之無逮於仁矣於是文侯身自布席夫人捧觴酹吳起於廟立為大將守西河與諸侯大戰七十六全勝六十四餘則均解闢土四面拓地千里吳子圖國魏文侯問李克曰吳起何如人哉李克曰起貪而好色然用兵司馬穰苴不能過也於是文侯以為將擊秦拔五城起之為將與士卒最下者同衣食卧不設席行不騎乘親裹贏糧與士卒分勞苦卒有病疽者起為吮之卒母聞而哭之人曰子卒也而將軍自吮其疽何哭為母曰非然也往年吳公呪其父其父戰不旋踵遂死於敵吳公今又吮其子妾不知其死所矣是以哭之文侯以吳起善用兵亷平盡能得士心乃以為西河守以拒秦韓史孫吳傳魏置相相田文吳起不悦謂田文曰請與子論功可乎田文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百姓親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓趙賓從子孰與起文曰不如子起曰此子三者皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之於子乎屬之於我乎起黙然良乆曰屬之子矣文曰此乃吾所以居子之上也吳起乃自知弗如田文史孫吳傳魏文侯問狐卷子曰父賢足恃乎對曰不足子賢足恃乎曰不足兄賢足恃乎曰不足弟賢足恃乎曰不足臣賢足恃乎曰不足文侯勃然作色而怒曰寡人問此五者於子皆以為不足者何也曰父賢不過堯而丹朱放子賢不過舜而瞽䏂頑兄賢不過舜而象傲弟賢不過周公而管叔誅臣賢不過湯武而桀紂伐望人者不至恃人者不乆君欲治從身始人何可恃乎韓詩卷八魏文侯觴大夫於曲陽飲酣文侯喟然嘆曰吾獨無豫讓以為臣蹇重舉白而進之曰臣請浮君文侯曰何以對曰臣聞之有命之父母不知孝子有道之君不知忠臣夫豫讓之君亦何如哉文侯曰善受浮而飲之嚼而不讓曰無管仲鮑叔以為臣故有豫讓之功也説苑尊賢淮南子道應魏文侯與大夫飲酒使公乘不仁為觴政曰飲不釂者浮以大白文侯飲而不盡釂公乘不仁舉白浮君君視而不應侍者曰不仁退君已醉矣公乘不仁曰周書曰前車覆後車戒葢言其危為人臣者不易為君亦不易今君已設令令不行可乎君曰善舉白而飲飲畢曰以公乘不仁為上客説苑善説魏文侯燕飲皆令諸大夫論已或言君之智也至於任座任座曰君不肖主也得中山不以封君之弟而以封君之子是以知君之不肖也文侯不説知於顔色知猶見也任座趨而出次及翟璜翟璜曰君賢君也臣聞其主賢者其臣之言直今者任座之言直是以知君之賢也文侯喜曰可反歟翟璜對曰奚為不可臣聞忠臣畢其忠而不敢逺其死座尚在於門翟璜往視之任座在於門以君令召之任座入文侯下階而迎之終座以為上客文侯曰微翟璜則幾失忠臣矣吕覽自知新序卷一魏文侯與士大夫坐問曰寡人何如君也羣臣皆曰君仁君也翟璜曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而以封君之長子臣以此知君之非仁君文侯大怒而逐翟璜璜起而出次至任座文侯問我何如君也任座對曰君仁君也曰子何以言之對曰臣聞之君仁者其臣直向翟璜之言直臣是以知之文侯曰善復召翟璜入拜為上卿事同而二臣互異魏文侯與虞人期獵明日㑹天疾風左右止文侯不聽曰不可以風疾之故而失信遂自驅車往犯風而罷虞人韓子外儲左詳國䇿少異魏文侯見箕季其牆壊而不築文侯曰何為不築對曰不時其牆枉而不端問曰何不端曰固然從者食其園之桃箕季禁之少焉日晏進糲䬸之食𤓰瓠之羮文侯出其僕曰君亦何得於箕季乎文侯曰吾一見季而得四焉牆壊不築云待時者教我無奪農時也牆枉而不端云固然者教我無侵封疆也從者食園桃箕季禁之豈愛桃哉教我下無侵上也食我以糲餐者豈不能具五味哉教我無多歛于百姓以省飲食之養也吾何無得於季哉新序卷六師經皷琴魏文侯起舞賦曰使我言而無見違師經援琴而撞文侯不中中旒潰之文侯謂左右曰為人臣而撞其君其罪如何左右曰罪當烹提師經下堂一等師經曰臣可一言而死乎文侯曰可師經曰昔堯舜之為君也唯恐言而人不違桀紂之為君也唯恐言而人違之臣撞桀紂非撞吾君也文侯曰釋之是寡人之過也懸琴於城門以為寡人符不補旒以為寡人戒説苑君道平與師曠晉公事相類十二國史周師經仕魏文侯善皷琴文侯躭之起舞經怒以琴撞文侯文侯怒使人曳下殿將殺之經曰乞申一言而死文侯曰何經曰臣撞桀紂之君不撞堯舜之主文侯曰寡人過矣乃捨之懸琴於壁以為戒魏文侯出遊見路人反裘而負芻文侯曰胡為反裘而負芻對曰臣愛其毛文侯曰若不知其裏盡而毛無所恃耶明年東陽上計錢布十倍大夫畢賀文侯曰此非所以賀我也譬無異路人反裘而負芻也將愛其毛不知其裏盡毛無所恃也今吾田地不加廣士民不加衆而錢布十倍必取之士大夫也吾聞之下不安者上不可居此非所以賀我也新序卷二魏文侯御廩災文侯素服辟正殿五日羣臣皆素服而弔公子成父獨不弔文侯復殿公子成父趨而入賀曰甚大善矣夫御廩之災也文侯作色不悦曰夫御廩者寡人寳之所蔵也今火災寡人素服辟正殿羣臣皆素服而弔至於子大夫而不弔今已復辟矣猶入賀何為公子成父曰臣聞之天子蔵于四海之内諸侯蔵于境内大夫蔵于其家士庶人蔵于篋櫝非其所蔵者不有天災必有人患今幸無人患乃有天災不亦善乎文侯喟然嘆曰善説苑反質莊周貧者往貸粟于魏文侯曰待吾邑粟之來而獻之周曰乃今者周之來見道傍牛蹄中有鮒魚焉太息謂周曰我尚可活也周曰須我為汝南見楚王決江淮以溉汝鮒魚曰今吾命在盆甕之中耳乃為我見楚王決江淮以溉我汝則求我枯魚之肆矣今周以貧故來貸粟而曰須我邑粟來也而賜臣即來亦求臣傭肆矣文侯于是乃發粟百鍾送之莊周之室説苑善説説苑髙平王遣使者從魏文侯貸粟文侯曰須吾租收邑粟至乃得也使者曰臣初來時見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可為灌乎臣謂之曰待吾南見河堤之君決江淮之水灌汝口魚曰為命在須臾及須江淮之水比至還必求吾於枯魚之肆今髙平貧窮故遣臣詣君貸粟及須租收粟至者大王必求臣死人之墓藝文引亦莊子西江之説魏文侯使舍人毋擇獻鵠於齊侯毋擇行道失之徒獻空籠見齊侯曰寡君使臣毋擇獻鵠道饑渇臣出而飲食之而鵠飛沖天遂不復反念思非無錢以買鵠也惡有為其君使輕易其幣者乎念思非不能拔劔刎頭腐肉暴骨于中野也為吾君貴鵠而賤士也念思非不敢走陳蔡之間也惡絶兩君之使故不敢愛身逃死來獻空籠唯主君斧鑕之誅齊侯大悦曰寡人今者得茲言三賢于鵠逺矣寡人有都郊地百里願獻子大夫以為湯沐邑毋擇對曰惡有為其君使而輕易其幣而利諸侯之地乎遂出不反説苑奉使繹史褚少孫補史記云淳于髠獻鵠於楚又韓詩云齊使獻鴻於楚事俱相似殆相涉亂也二十六年虢山崩壅河三十二年伐鄭城酸棗敗秦於注三十五年齊伐取我襄陵三十六年秦侵我隂晉三十八年伐秦敗我武下得其將識是嵗文侯卒紀年云五十年卒子擊立是為武侯以上史魏世家紀年魏文侯卒大風晝昏在位五十年春秋戰國異辭卷四十二
