body:
  text: 春秋戰國異辭巻六右春坊右諭徳陳厚耀撰魯悼公有若之喪悼公弔焉子游擯由左檀弓下三十七年悼公卒子嘉立是爲元公史魯世家悼公之喪季昭子問于孟敬子曰爲君何食敬子曰食粥天下之達禮也吾三臣者之不能居公室也四方莫不聞矣勉而爲瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食檀弓下元公齊人攻魯魯欲將吴起吴起衛人好用兵嘗學于曾子吴起取齊女爲妻而魯疑之吴起於是欲就名遂殺其妻以明不與齊也魯卒以爲將將而攻齊大破之魯人或惡吴起曰起之爲人猜忍人也其少時家累千金游仕不遂遂破其家鄉黨笑之起殺其謗已者三十餘人而東出衛郭門與其母訣齧臂而盟曰起不爲卿相不復入衛遂事曽子其母死起終不歸曽子薄之而與起絶起乃之魯學兵法以事魯君疑之起殺妻以求將夫魯小國而有戰勝之名則諸侯圖魯矣且魯衛兄弟之國也而君用起則是棄衛魯君疑之謝吴起吴起於是聞魏文侯賢往事之史孫吴傳年按魏以吴起爲西河守在魯穆公元則起之仕魯當在元公時吴起衛左氏中人也使其妻織組而幅狹於度吴子使更之其妻曰諾及成復度之果不中度吴子大怒其妻對曰吾始經之而不可更也吴子出之其妻請於兄而索入其兄曰吴子爲法者也其爲法也且欲以與萬乗致功必先踐之妻妾然後行之子母幾索入矣幾望也其妻之弟又重於衛君乃因衛君之重請吴子吴子不聽遂去衛而入楚一曰吴子示其妻以組曰子爲我織組令之如是組已就而效之其組異善起曰使子爲組令之如是而今也異善何也其妻曰用財若一也加務善之吴起曰非語也使之衣歸其父往請之吴起曰起家無虚言韓子外儲右魯季孫新弑其君吴起仕焉或謂起曰夫死者始死而血已血而衂已衂而灰已灰而土反其土也無可爲者矣今季孫乃始血其毋乃未可知也吴起因去之晉韓子説林元公二十一年卒子顯立是爲穆公史魯世家穆公公儀潜魯人與子思爲友穆公因子思而致命欲以爲相子思曰公儀子所以不至也君若饑渴待賢納用其謀雖蔬食飲水伋亦願在下風如以高官厚禄爲釣餌而無信用之心公儀子智若魚者可也不爾則不踰君之庭且臣不侫又不能爲君操竿下釣以傷守節之士潛竟終身不屈高士傳魯人有公儀僭者數本皆作潛砥節礪行樂道好古恬于榮利不事諸侯子思與之友穆公因子思欲以爲相謂子思曰公儀子必輔寡人三分魯國而與之一子其言之子思對曰如君之言則公儀子愈所以不至也君若饑渴待賢納用其謀雖蔬食水飲伋亦願在下風今徒以高官厚禄釣餌君子無信用之意公儀子之智若魚鳥可也不然則彼將終身不躡乎君之庭矣且臣不侫又不任爲君操竿下釣以蕩守節之士也孔叢子上公儀休爲魯相奉法順理無所變更百官自正使食禄者不得與民下爭利受大者不得取小客有遺相魚者不受客曰聞君嗜魚何故不受相曰以嗜魚故不受也食茹而羙㧞其園葵而棄之見家織布好而逐出其婦燔其機曰欲令農夫女工安所售其貨乎淮南子史記公儀休者魯慱士也以高第爲魯相奉法循理無所變更百官自正使食禄者不得與下民爭利受大者不得取小客有遺相魚者相不受客曰聞君嗜魚遺君魚何故不受也相曰以嗜魚故不受也今爲相能自給魚今受魚而免誰復給我魚者吾故不受也食茹而羙㧞其園葵而棄之見其家織布好而疾出其家婦燔其機云欲令農士工女安所讎其貨乎公儀子相魯而嗜魚一國爭買魚而獻之公儀子不受其弟諫曰夫子嗜魚而不受者何也對曰夫惟嗜魚故不受也夫即受魚必有下人之色有下人之色將枉於法枉於法則免於相雖嗜魚必不能致我魚即無受魚而不免於相雖嗜魚我能長自給魚此明夫恃人不如自恃也明於人之爲已者不如己之自爲也韓子外儲右淮南道應稍節數語楚成王楚成王與公儀休不同時當是聲王賛諸屬諸侯使魯君爲僕魯君致大夫而謀曰我雖小亦周之建國也今成王以我爲僕可乎大夫皆曰不可公儀休曰不可不聽楚王身死國亡君之臣乃君之有也爲民君也魯君遂爲僕説苑權謀辛寛見魯繆公曰臣而今而後知吾先君周公之不若太公望之知也昔者太公望封於營丘之渚海阻山高險固之地也是故地日廣子孫彌隆吾先君周公封於魯無山林谿谷之險諸侯四面以達是故地日削子孫彌殺辛寛出南宫括入見公曰今者寛也非周公其辭若是也南宫括曰寛少者弗識也君獨不聞成王之定成周之説乎其辭曰惟余一人營居於成周惟余一人有善易得而見也有不善易得而誅也故曰善者得之不善者失之古之道也夫賢者豈欲其子孫之阻山林之險以長爲無道哉小人哉寛也今使燕爵爲鴻鵠鳯凰慮則必不得矣其所求者瓦之間隙屋之翳蔚也與一舉則有千里之志徳不盛義不大則不至其郊愚痺之民其爲賢者慮亦猶此也固妄誹訾豈不悲哉吕覽長利辛櫟見魯穆公曰周公不如太公之賢也穆公曰子何以言之辛櫟對曰周公擇地而封曲阜太公擇地而封營丘爵土等其地不若營丘之羙人民不如營丘之衆不徒若是營丘又有天固穆公心慙不能應也辛櫟趨而出南宫邉子入穆公具以辛櫟之言語南宫邉子南宫邉子曰昔周成王之卜居成周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜曰作邑乎山之陽賢則茂昌不賢則速亡季孫行父之戒其子也曰吾欲室之俠于兩社之間也使吾後世有不能事上者使其替之益速如是則曰賢則茂昌不賢則速亡安在擇地而封哉或示有天固也辛櫟之言小人也子無復道也説苑至公穆公之母卒使人問于魯子曰如之何對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達布幕衛也縿音綃慕魯也檀弓上子思見老萊子老萊子聞穆公將相子思老萊子曰若子事君將何以爲乎子思曰順吾性情以道輔之無死亡焉老萊子曰不可順子之性也子性剛而傲不肖又且無所死亡非人臣也子思曰不肖故人之所傲也夫事君道行言聽則何所死亡道不行言不聽則亦不能事君所謂無死亡也老莱子曰子不見夫齒乎齒堅剛卒盡相磨舌柔順終以不敝子思曰吾不能爲舌故不能事君孔叢子上穆公欲相子思子思不願將去魯魯君曰天下之王亦猶寡人也去將安之子思答曰盖聞君子猶鳥也疑之則舉今君既疑矣又以已限天下之君臣竊爲言之過也孔叢子上孔思請行孔思伯魚之子魯君曰天下主亦猶寡人也將焉之孔思對曰盖聞君子猶鳥也駭則舉魯君曰主不肖而皆以然也違不肖過不肖而自以爲能論天下之主乎凡鳥之舉也去駭從不駭去駭從不駭未可知也去駭從駭則鳥曷爲舉矣孔思之對魯君也亦過矣吕覽審應魯穆公訪于子思曰寡人不得嗣先君之業三年矣未知所以爲令名者且欲掩先君之惡以揚先君之善使談者有述焉爲之若何願先生敎之也子思答曰以伋所聞舜禹之于其父非勿欲也以爲私情之細不如公義之大故弗敢私之云耳責以虗飾之敎又非伋所得言公曰思之可以利民者子思曰願有惠百姓之心則莫如一切除非法之事也毁不居之室以賜窮民奪嬖寵之禄以賑困匱無令人有悲怨而後世有聞見抑亦可公曰諾孔叢子上穆公問子思曰吾國可興乎子思曰可公曰爲之奈何對曰茍君與大夫慕周公伯禽之治行其政化開公家之惠杜私門之利結恩百姓修禮鄰國其興也勃矣孔叢子上穆公謂子思曰縣子言子之爲善不欲人譽已信乎子思對曰非臣之情也臣之修善欲人知之知之而譽臣是臣之爲善有勸也此所願而不可得者也若臣之修善而人莫知莫知則必毁臣是臣之爲善而受毁也此臣所不願而不可避者也若夫雞鳴爲善孳孶以至夜半而曰不欲人之知恐人之譽已臣以爲斯人也者非虗則愚也孔叢子上穆公問于子思曰爲舊君反服古歟子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將墜諸淵毋爲戎首不亦善乎又何反服之禮之有檀弓下穆公謂子思曰子之書所記夫子之言或者以謂子之辭子思曰臣所記臣祖之言或親聞之者有聞之於人者雖非正其辭然猶不失其意焉且君之所疑者何公曰于事無非子思曰無非所以得臣祖之意也就如君言以爲臣之辭臣之辭無非則亦所宜貴矣事既不然又何疑焉孔叢子上魯穆公問於子思曰吾聞龎􅀈氏之子不孝其行奚如子思對曰君子尊賢以崇徳舉善以勸民若夫過行是細人之所識也臣不知也子思出子服厲伯入見問龎􅀈氏子子服厲伯對曰其過三皆君之所未甞聞自是之後君貴子思而賤子服厲伯韓子難三龎又孔叢子上語稍畧􅀈作龍􅀈穆公問於子思曰立太子有常乎答曰有之在周公之典公曰昔文王舍適而立其次微子舍孫而立其弟是何法也子思曰殷人質而尊其尊故立弟周人文而親其親故立子亦各其禮也文質不同其禮則異文王舍適立次權也公曰茍得行權豈惟聖人唯賢與愛立也子思曰聖人不以權敎故立制垂法順之爲貴若必欲犯何有于異公曰舍賢立聖舍愚立賢何如子思曰唯聖立聖其文王乎不及文王者則各賢其所愛不殊于適何以限之必不能審賢愚之分請父兄羣臣卜于祖廟亦權之可也孔叢子上閭丘温見田氏將必爲齊欲以其邑叛而適魯穆公聞之謂子思曰子能懷之則寡人割邑如其邑以常宗子思曰伋雖能之義所不爲也公曰何子思對曰彼爲人臣君將敗弗能扶而叛之逆臣制國弗能以其身死而逃之此罪誅之人也伋縱不能討而又要利以召姦弗忍行也孔叢子上子思之母死于衛栁若謂子思曰子聖人之後也四方于子乎觀禮子盍慎諸子思曰吾何慎哉吾聞之有其禮無其財君子弗行也有其禮有其財無其時君子弗行也吾何慎哉檀弓上子思之母死于衛赴于子思子思哭于廟門人至曰庶氏之母伯魚死其妻嫁于衛之庶氏死何爲哭于孔氏之廟乎子思曰吾過矣遂哭于他室檀弓下陳荘子死赴于魯魯人欲勿哭穆公召縣子而問焉縣子曰古之大夫束脩之問不出竟雖欲哭之安得而哭之今之大夫交政于中國雖欲勿哭焉得而弗哭且臣聞之哭有二道有愛而哭之有畏而哭之公曰然然則如之何而可縣子曰請哭諸異姓之廟於是與哭諸縣氏檀弓上歳旱穆公召縣子而問焉曰天久不雨吾欲暴尩而奚若曰天則不雨而暴人之疾子句虐句毋乃不可與然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疎乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日爲之徙市不亦可乎檀弓下魯穆公時有九子母寡臈日行禮畢悉召諸子謂曰婦中無故不出夫家然吾父母老矣欲往視之諸子諾復召諸婦謂曰婦有三從之義而無専制之行今諸子許我歸寧當與少子偕行以備婦人出入之制約至暮而返及還天未暮至閭外而止暮而後入魯大夫怪而問之對曰妾不幸早寡與九子居臈日歸視私家與諸婦約至夕而反妾恐其酺醵醉飽人情常有也故止閭外待暮而後入大夫羙之上其事于穆公賜號曰母師使夫人諸姬皆師之列女傳魯穆公使衆公子或宦於晉或宦於楚犁鉏曰假人於越而救溺子越人雖善游子必不生矣失火而取水於海海水雖多火必不滅矣逺水不救近火也今晉與楚雖强而齊近魯患其不救乎韓子説林上孟子車尚㓜請見子思子思見之甚恱其志命子上侍坐焉禮敬子車甚崇子上不願也客退子上請曰白子上名聞士無介不見女無媒不嫁孟孺子無介而見大人恱而敬之白也未諭敢問子思曰然吾昔從夫子於郯遇程子于塗傾盖而語終日而别命子路將束帛贈焉以其道同于君子也今孟子車孺子也言稱堯舜性樂仁義世所希有也事之猶可況加敬乎非爾所及也孔叢子即孟子車孟軻列女傳孟母其舍近墓孟子之少也嬉遊爲墓間之事踴躍築埋孟母曰此非吾所以居處子乃去舍市傍其嬉戲爲賈人衒賣之事孟母又曰此非吾所以居處子也復徙舍學宫之傍其嬉遊乃設爼豆揖讓進退孟母曰真可以居吾子矣遂居之及孟子長學六藝䘚成大儒之名君子謂孟母善以漸化風俗通孟子之母姓仉氏韓詩外傳孟子少時東家殺豚孟子問其母曰東家殺豚何爲母曰欲啖汝其母自悔而言曰吾懷妊是子席不正不坐割不正不食胎敎之也今適有知而欺之是敎之不信也乃買東家豚肉以食之明不欺也詩云宜爾子孫繩繩兮言賢母使子賢也列女傳孟子之少也既學而歸孟母方績問曰學所至矣孟子曰自若也孟母以刀斷其織孟子懼而問其故孟母曰子之廢學若吾斷斯織也夫君子學以立名問以廣知是以居則安寧動則逺害今而廢之是不免於厮役而無以􅄐於禍患也何以異於織績而食中道廢而不爲寧能衣其夫子而長不乏糧食哉女則廢其所食男則堕於修徳不爲竊盜則爲虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒韓詩外傳孟子少時誦其母方織孟子輟然中止乃復進其母知其諠也呼而問之曰何爲中止對曰有所失復得其母引刀裂其織以此誡之自是之後孟子不復諠矣列女傳孟子既娶將入私室其婦袒而在内孟子不説遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊堕在室而夫子見妾勃然不説是客妾也婦人之義蓋不客宿請歸父母於是孟母召孟子而謂之曰夫禮將入門問孰存所以致敬也將上堂聲必揚所以戒人也將入戸視必下恐見人過也今子不察於禮而責禮於人不亦逺乎孟子謝遂留其婦韓詩外傳孟子妻獨居踞孟子入戸視之白其母曰婦無禮請去之母曰何也曰踞母曰何知之孟子曰我親見之母曰乃汝無禮也非婦無禮禮不云乎將入門問孰存將上堂聲必揚將入戸視必下不掩人不備也今汝往燕私之處入戸不有聲令人踞而視之是汝之無禮也非婦無禮也於是孟子自責不敢去婦詩曰菜葑采菲無以下體荀子云孟子惡敗而出妻其事未聞孔叢子孟軻問子思曰堯舜文武之道可力而致乎子思曰彼人也我人也稱其言履其行夜思之書行之滋滋焉汲汲焉如農之赴時商之趣利惡有不至者乎孔叢子子思謂孟軻曰自大而不修其所以大不大矣自異而不修其所以異不異矣故君子高其行則人莫能階也逺其志則人莫能及也禮接於人人不敢慢辭交於人人不敢侮其唯高逺乎子思子孟軻問牧民之道何先子思子曰先利之孟軻曰君子之敎民者亦仁義而已何必曰利子思曰仁義者固所以利之也上不仁則不得其所上不義則樂爲詐此爲不利大矣故易曰利者義之和也又曰利用安身以崇徳也此皆利之大者也注文選子輿孟軻字也説苑孟子曰人皆知以食愈饑莫知以學愈愚縣子問子思曰縣子名瑣魯人吾聞同聲者相好子之先君見子産時則兄事之而世謂子産仁愛稱夫子聖人是謂聖道事仁愛乎吾未諭其人之孰先後也故質于子子思曰然子之問也昔季孫問子游亦若子之言也子游答曰以子産之仁愛譬夫子其猶浸水之與膏雨乎康子曰子産死鄭人丈夫舍玦珮婦女舍珠瑱巷哭三月竽琴不作夫子之死也吾未聞魯人之若是也奚故哉子游曰夫浸水之所及也則生其所不及則死故民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由來者上徳不徳是以無徳季孫曰善縣子曰其然孔叢子穆公三十三年卒子奮立是爲共公史魯世家子思居衛魯穆公卒縣子使乎衛聞喪而服謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何不服子思曰吾豈愛乎禮不得也縣子曰請問之答曰臣而出國君不掃其宗廟則爲之服寄公寓乎是國而爲國服吾既無列于魯而祭在衛吾何服哉是寄臣而服所寄之君則舊君無服明不二君之義也縣子曰善哉我未之思也孔叢子説苑公儀休相魯魯君死左右請閉門公儀休曰止池淵吾不税䝉山吾不賦苛令吾不布吾已閉心矣何閉于門哉共公黔婁先生齊人修身清節不求進于諸侯魯共公聞其贒遣使致禮賜粟三千鍾欲以爲相辭不受齊王又禮之以黄金百斤聘爲卿又不就著書四篇言道家之務號黔婁子終身不屈以夀終髙士傳魯黔婁先生死曽子曽子一作曽西下同與門人往弔之其妻出戸曽子弔之上堂見先生之尸在牗下枕塹席稾緼袍不表覆以布袍手足不盡歛覆頭則足見覆足則頭見曾子曰斜引其被則歛矣妻曰斜而有餘不若正而不足也先生以不斜之故能至于此生時不斜死而斜之非先生之意也曽子不能應遂哭之曰嗟乎先生之終也何以為謚其妻曰以康為謚曽子曰先生在時食不充口衣不盖形死則手足不歛旁無酒肉生不得其羙死不得其榮何樂於此而謚為康乎其妻曰昔者先生君欲授之政以為國相辭而不為是有餘貴也君嘗賜之粟三十鐘先生辭而不受是有餘富也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不忻忻於富貴求仁而得仁求義而得義其謚曰康不亦宜乎曾子曰斯人也而有斯婦列女傳地志黔婁臨淄人守道不屈威王師事之共公二十年卒子屯立是為康公康公康公九年卒子匽立是為景公景公景公二十九年卒子叔立是為平公是時六國皆稱王平公平公二十二年卒平公見孟子子賈立是為文公一作湣公廣文選曾平公與齊湣王㑹於鳬繹山下樂正克備道孟子於平公曰孟子私淑仲尼其德輔世長民其道發政施仁君何為不見乎文公文公七年楚懐王死于秦二十三年文公卒子讎立是為頃公頃公頃公二年秦㧞楚之郢楚頃王東徙于陳十九年楚伐我取徐州魯之薛縣六國時曰徐州二十四年楚考烈王伐滅魯頃公亡遷于卞邑為家人魯絶祀頃公卒于柯魯起周公至頃公凡三十四世以上史魯世家春秋戰國異辭卷六
