body:
  text: 春秋戰國異辭卷十七右春坊右諭徳陳厚耀撰齊桓公下桓公欲賞死事之後曰吾國者衢處之國饋食之都虎狼之所棲也今毎戰輿死扶傷如孤如字當作之荼首之孫茶首白首也仰倳㦸之寳倳㦸謂死事寳謂賞也吾無繇與之為之柰何管子對曰吾國之豪家遷封食邑而居者君章之以物則物重不章以物則物輕守之以物則物重不守以物則物輕故遷封食邑富商蓄賈積餘藏羡跱蓄之家此吾國之豪也故君請縞素而就士室朝功臣世家遷封食邑積餘藏羡跱蓄之家曰城脆致衝無委致圍天下有慮齊獨不與其謀子大夫有五榖菽粟者勿敢左右請以平賈取之子與之定其劵契之齒全驅之數不得為侈弇焉困窮之民聞而糴之釜鏂無止逺通不推國粟之賈坐長而四十倍君出四十倍之粟以振孤寡牧貧病視獨老窮而無子者靡得相鬻而養之勿使赴于溝澮之中若此則士爭前戰為顔行不偷而為用輿死扶傷死者過半此何故也士非好戰而輕死輕重之分使然也管子輕重甲桓公問于管子曰楚者山東之强國也其人民習戰鬬之道舉兵伐之恐力不能過兵弊于楚功不成于周為之柰何管子對曰即以戰鬬之道與之矣公曰何謂也管子曰公貴買其鹿桓公即為百里之城使人之楚買生鹿楚生鹿當一而八萬管子即令桓公與民通輕重藏榖什之六令左司馬伯公將白徒而鑄錢于莊山令中大夫王邑載錢二千萬求生鹿于楚楚王聞之告其相曰彼金錢人之所重也國之所以存明王之所以賞有功禽獸者羣害也明王之所棄逐也今齊以其重寳貴買吾羣害則是楚之福也天且以齊私楚也子告吾民急求生鹿以盡齊之寳楚民即釋其耕農而田鹿管子告楚之賈人曰子為我致生鹿二十賜子金百斤什至而金千斤也則是楚不賦于民而財用足也楚之男子居外女子居涂隰朋教民藏粟五倍楚以生鹿藏錢五倍管子曰楚可下矣公曰奈何管子對曰楚錢五倍其君且自得而修穀錢五倍是楚强也桓公曰諾因令人閉闗不與楚通使楚王果自得而修榖榖不可三月而得也楚糴四百齊因令人載粟處芋之南楚人降齊者十分之四三年而楚服管子輕重戊桓公問於管子曰代國之出何有管子對曰代出狐白之皮公其貴買之管子曰狐白應隂陽之變六月而壹見公貴買之代人忘其難得喜其貴買必相率而求之則是齊金錢不必出代民必去其本而居山林之中離枝聞之必侵其北離枝侵其北代必歸於齊公因令齊載金錢而往桓公曰諾即令中大夫王師北將人徒載金錢之代谷之上求狐白之皮代王聞之即告其相曰代之所以弱於離枝者以無金錢也今齊乃以金錢求狐白之皮是代之福也子急令民求狐白之皮以致齊之幣寡人將以來離枝之民代人果去其本處山林之中求狐白之皮二十四月而不得一離枝聞之則侵其北代王聞之大恐則將其士卒保於代谷之上離枝遂侵其北代王即將其士卒願以下齊齊未亡一錢幣脩使三年而代服管子輕重戊桓公問於管子曰吾欲制衡山之術為之奈何管子對曰公其令人貴買衡山之械器而賣之燕代必從公而買之秦趙聞之必與公爭之衡山之械器必倍其價天下爭之衡山械器必什倍以上公曰諾因令人之衡山求買械器不敢辯其貴賈齊修械器於衡山十月燕代聞之果令人之衡山求買械器燕代脩三月秦國聞之果令人之衡山求買械器衡山之君告其相曰天下爭吾械器令其買再什以上衡山之民釋其本修械器之巧齊即令隰朋漕粟於趙趙糴十五隰朋取之石五十天下聞之載粟而之齊齊修械器十七月修糶五月即閉闗不與衡山通使燕代秦趙即引其使而歸衡山械器盡魯削衡山之南齊削衡山之北内自量無械器以應二敵即奉國而歸齊矣管子輕重戊桓公問於管仲曰萊莒與柴田相併為之奈何管子對曰萊莒之山生柴君其率白徒之卒鑄莊山之金以為幣重萊之柴賈萊君聞之告左右曰金幣者人之所重也柴者吾國之竒出也以吾國之奇出盡齊之重寳則齊可并也萊即釋其耕農而治柴管子即令隰朋反農二年桓公止柴莱莒之糴三百七十齊糴十錢莱莒之民降齊者十分之七二十八月萊莒之君請服管子輕重戊桓公問管仲曰寡人欲覇以二三子之功既得覇矣今吾有欲王其可乎管仲對曰公當召叔牙而問焉鮑叔至公又問焉鮑叔對曰公當賔胥無而問焉賔胥無趨而進公又問焉賔胥無對曰古之王者其君豐其臣教今君之臣豐公遵遁繆然逺二三子遂徐行而進公曰昔者大王賢王季賢文王賢武王賢武王伐殷克之七年而崩周公旦輔成王而治天下僅能制於四海之内矣今寡人之子不若寡人寡人不若二三子以此觀之則吾不王必矣管子小問管仲勉齊桓公因遊遼口俱之其國㡬尅舉隰朋諌曰君舎齊國之廣人民之衆山川之觀殖物之阜禮義之盛章服之美妖靡盈庭忠良滿朝肆咤則徒卒百萬視撝則諸侯從命亦奚羡於彼而棄齊國之社稷從戎夷之國乎此仲父之耄柰何從之桓公乃止以隰朋之言告管仲仲曰此固非朋之所及也臣恐彼國之不可升之也齊國之富奚戀隰朋之言奚顧列子湯問齊桓公管仲鮑叔寗戚相與飲酒酣公謂鮑叔曰何不起為壽鮑叔奉杯而進曰使公毋忘出奔在莒管仲毋忘束縳在魯寗戚毋忘飯牛車下桓公避席再拜曰寡人與大夫能皆毋忘夫子之言則齊國之社稷幸於不殆矣吕覧直諌子又新序卷四管小稱桓公讀書於堂上輪扁斵輪於堂下釋其椎鑿而上問桓公曰敢問公之所讀者何書也桓公曰聖人之書輪扁曰聖人在乎公曰已死矣輪扁曰然則君之所讀者直聖人之糟粕耳桓公勃然怒曰寡人讀書工人焉得而譏之哉有説則生無説則死輪扁曰然有説臣試以臣之斵輪語之大疾則苦而不入大徐則甘而不固不徐不疾得於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪古之人與其不可傳也死矣然則君之所讀者古人之糟粕已夫莊子天道應語少别又淮南子道一作楚成王事齊桓公設庭燎為使人欲造見者朞年而士不至於是東野有以九九見者桓公使戯之曰九九足以見乎鄙人曰臣聞君設庭燎以待士朞年而士不至夫士之所以不至者君天下之賢君也四方之士皆自以不及君故不至也夫九九薄能耳而君猶禮之况賢於九九者乎夫泰山不譲礫石江海不辭細流所以成其大也詩曰先民有言詢於芻蕘言博謀也桓公曰善乃因禮之朞月四方之士相導而至韓詩卷三齊桓公見小臣三往不得見左右曰夫小臣國之賤臣也君三往而不得見其可已矣桓公曰惡是何言也吾聞布衣之士不欲富貴不輕身於萬乘之君萬乘之君不好仁義則無以下布衣之士縱夫子不欲富貴可也吾不好仁義不可也五往而得見天下諸侯聞之謂桓公猶下布衣之士而况國君乎於是相率而朝桓公韓詩卷六吕覧下賢齊桓公見一小臣稷一日三至弗得見從者曰萬乘之主見布衣之士一日三至而弗得見亦可以止矣桓公曰不然士驁祿爵者固輕其主其主驁覇王者亦輕其士縱夫子驁禄爵吾庸敢驁覇王乎五往遂見之又新序卷五士韓子難一又髙傳復藁之君朝齊桓公問治民焉復藁之君不對而循口操衿抑心公曰與民共甘苦飢寒乎夫以我為聖人也故不用言而諭因禮之千金説苑政理客或欲見於齊桓公請仕上官授禄千鍾公以告管仲曰君予之客聞之曰臣不仕矣公曰何故對曰臣聞取人以人者其去人也亦以人吾不仕矣管子小問桓公外舍而不鼎饋中婦諸子謂宫人盍不出從乎君將有行宫人皆出從公怒曰孰謂我有行者宫人曰賤妾聞之中婦諸子公召中婦諸子曰女焉聞吾有行也對曰妾聞之君外舎而不鼎饋非有内憂必有外患今君外舎而不鼎饋君非有内憂也妾是以知君之將有行也公曰善此非吾所與女及也而言乃至焉吾是以語女吾欲致諸侯而不至為之柰何中婦諸子曰自妾之身之不為人持接也未嘗得人之布織也意者更容不審耶明日管仲朝公告之管仲曰此聖人之言也君必行也管子戒篇人有設隠者謂桓公曰一難二難三難何也桓公不能對以告管仲管仲對曰一難也近優而逺士二難也去其國而數之海三難也君老而晩置太子桓公曰善不擇日而廟禮太子韓子難二齊桓公謂鮑叔曰寡人欲鑄大鐘昭寡人之名焉寡人之行豈避堯舜哉鮑叔曰敢問君之行公曰昔者吾圍譚三年得而不自與者仁也吾北伐孤竹剗令支而反者武也吾為葵丘之㑹以偃天下之兵者文也諸侯抱美玉而朝者九國寡人不受者義也然則文武仁義寡人盡有之矣寡人之行豈避堯舜哉鮑叔曰君直言臣直對昔者公子糾在上位而不譲非仁也背太公之言而侵魯境非義也壇塲之上詘於一劒非武也姪娣不離懷袵非文也凡為不善遍於物不自知者無天禍必有人害天處甚髙其聽甚下除君過言天且聞之公曰寡人有過乎幸記之是社稷之福也子不幸教㡬有大罪以辱社稷説苑正諌齊桓公之時霖雨十旬桓公欲伐漅陵其城之值雨也未合管仲隰朋以卒徒造於門桓公曰徒衆何以為管仲對曰臣聞之雨則有事夫漅陵不能雨臣請攻之公曰善遂興師伐之既至大卒間外士在内矣桓公曰其有聖人乎乃還旗而去之説苑指武桓公憂北郭之民貧召管子而問曰北郭者盡屨纓之甿也以唐園為本利為此有道乎管子對曰請以令禁百鍾之家不得事鞽千鍾之家不得為唐園去市三百歩者不得樹葵菜若此則空閒有以相給資北郭之民有所讎其手搔之功唐園之利故有十倍之利管子輕重甲齊之北澤燒火光照堂下管子入賀桓公曰吾田野辟農夫必有百倍之利矣是嵗租税九月而具粟又美桓公召管子而問曰此何故也管子對曰萬乘之國千乘之國不能無薪而炊今北澤燒莫之續則是農夫得居裝而賣其薪蕘一束十倍則春有倳耜夏有决芸此租税所以九月而具也管子輕重甲桓公觀於廐問廐吏曰廐何事最難廐吏未對管仲對曰夷吾嘗為圉人矣傅馬棧最難先傅曲木曲木又求曲木曲木已傅直木無所施矣先傅直木直木又求直木直木已傅曲木又無所施矣管子小問桓公放春三月觀於野公曰何物可比於君子之徳乎隰朋對曰夫粟内甲以處中有卷城外有兵刃未敢自恃自命曰粟此其可比於君子之徳乎管仲曰苖始其少也眴眴乎何其孺子也至其壯也莊莊乎何其士也至其成也繇繇乎茲免何其君子也天下得之則安不得則危故命之曰禾此其可比於君子之徳矣桓公曰善管子小問齊桓公微服以廵見民有年老而自飬者桓公問其故對曰臣有子五人家貧無以妻之傭未及反桓公歸以告管仲管仲曰畜積有腐棄之財則人飢餓宫中有怨女則民無妻桓公曰善乃論宫人有婦人而嫁之下令於民曰丈夫二十而室婦人十五而嫁一曰桓公微服而行於民間有鹿門稷者行年七十矣而無妻桓公問管仲曰有民老而無妻者乎管仲曰有鹿門稷者行年七十矣而無妻桓公曰何以令之有妻管仲曰臣聞之上有積財則民必匱乏於下宫中有怨女則有老而無妻者桓公曰善令於宫中女子未嘗御者出嫁之乃令男子年二十而室女年十五而嫁則内無怨女外無曠夫韓子外儲右説苑貴徳桓公之平陵見家人有年老而自養者公問其故對曰吾有子九人家貧無以妻之吾使傭而未返也桓公取外御者五人妻之管仲入見曰公之施恵不亦小乎公曰何也對曰公待所見而施恵焉則齊國之有妻者少矣公曰若何管仲曰令國丈夫三十而室女子十五而嫁齊桓公出遊於野見亡國故城郭氏之墟問於野人曰是為何墟野人曰是為郭氏之墟桓公曰郭氏者曷為墟野人曰郭氏善善而惡惡桓公曰善善而惡惡人之善行也其所以墟者何也野人曰善善而不能行惡惡而不能去是以為墟也桓公歸以語管仲曰其人為誰桓公曰不知也管仲曰君亦郭氏也於是桓公召野人而賞焉新序卷四齊桓公逐鹿至麥丘之邦遇老人公問之對曰臣麥丘之邦人也公曰叟年㡬何對曰臣年八十有三矣公曰美哉與之飲曰叟盍為寡人壽也對曰野人不知為君王之壽公曰盍以叟之壽祝寡人邦人奉觴再拜曰使吾君固壽金玉是賤人民是寳公曰善哉祝乎寡人聞之矣至徳不孤善言必再叟盍優之優一作復下同邦人奉觴再拜曰使吾君好學而不惡下問賢者在側諌者得入公曰善哉祝乎寡人聞之至徳不孤善言必三叟盍優之邦人奉觴再拜曰無使吾君得罪於羣臣百姓桓公不説曰吾聞子得罪於父臣得罪於君未聞君得罪於臣者也邦人澘然而涕下曰願君熟思之此一言者前二言之上也臣聞子得罪於父可因姑姊叔父謝也父乃赦之臣得罪於君可使便辟左右謝也君乃赦之昔者桀得罪於湯紂得罪於武王至今未有為謝也公曰善哉寡人頼宗廟之福社稷之靈使寡人得遇叟於此扶而載之自御以歸薦之於廟而斷政焉韓詩卷十又新序卷四小異作晏子春秋景公事齊桓公出獵逐鹿而走入山谷之中見一老公而問之曰是為何谷對曰愚公之谷公曰何故對曰以臣名之公曰今視公之儀狀非愚人也何為以公名對曰臣故畜㹀牛生犢而大賣之而買駒少年曰牛不能生馬遂持駒去傍鄰聞之以臣為愚故名此谷為愚公之谷地志今山東臨淄縣有愚公谷桓公曰公誠愚矣夫何為而與之公遂歸明日朝以告管仲管仲正衿再拜曰此夷吾之愚也使堯舜在上咎繇為理安有取人之駒者乎若有見暴如是叟者又必不與也叟知獄訟之不正故與之耳請退而修政孔子曰弟子記之桓公覇君也管仲賢佐也猶有以智為愚者也况不及桓公管仲者也説苑政理齊桓公出遊遇一丈夫裒衣應歩帶著桃殳桓公怪而問之曰是何名何經所在何篇所居何以斥逐何以避余丈夫曰是名二桃桃之為言亡也夫日日慎桃何患之有故亡國之社以戒諸侯庶人之戒在於桃殳桓公説其言與之共載來年正月庶人皆佩之韓詩卷十周容子夏以侈靡見桓公桓公曰侈靡可以為天下乎子夏曰可夫雕橑然後炊之雕卵然後瀹之所發積藏散萬物也管子今本無齊國好厚塟布帛盡於衣衾材木盡於棺槨桓公告管仲曰布帛盡則無以為幣材木盡則無以為守而人厚塟之不休禁之柰何管仲對曰凡人之有為也非名之則利之也於是乃下令曰棺槨過度者戮其尸罪夫當䘮者夫戮死無名罪當䘮者無利人何故為之也韓子内儲上齊桓公好服紫一國盡服紫當是時五素不得一紫桓公患之謂管仲曰紫貴甚柰何管仲曰君何不試勿衣紫也左右有衣紫而進者公必曰少却吾惡紫臭公曰諾是日郎中莫衣紫其明日國中莫衣紫三日境内無衣紫者韓子外儲左墨子齊桓公髙冠博帶以治其國楚莊王鮮冠組纓絳衣博袍以治其國論衡齊桓公負婦人以朝諸侯管仲曰吾君背疽不得婦人不愈此疾也韓子難二桓公宫中二市婦閭二百被髮而御婦人得管仲為五伯長初學記河注齊桓公塞九河以廣田居故館陶貝丘廣川信都東光河間以東城池九河舊跡猶存管仲觴桓公日暮矣桓公樂之而徵燭管仲曰臣􅁲其晝未卜其夜君可以出矣公不説曰仲父年老矣寡人與仲父為樂將㡬之請夜之管仲曰君過矣夫厚於味者薄於徳沈於樂者反於憂壯而怠則失時老而懈則無名臣乃今將為君勉之若何其沈於酒也吕覧逹鬱齊桓公為大臣具酒期以日中管仲後至桓公舉觴以飲之管仲半棄酒桓公曰期而後至飲而半棄於禮可乎管仲對曰臣聞酒入者舌出舌出者言失言失者身棄臣計棄身不如棄酒桓公笑曰仲父起就坐說苑敬慎韓詩卷十齊桓公置酒令諸侯大夫曰後者飲一經程管仲後當飲一經程飲其半桓公曰仲父當飲一經程而棄之何也管仲曰臣聞之酒入口者舌出舌出者棄身與其棄身不寧棄酒乎桓公曰善桓公謂管仲曰請致仲父公與管仲父而將飲之掘新井而柴焉新井以柴覆之取其㓗也十日齋戒召管仲管仲至公執爵夫人執尊觴三行管仲趨出公怒曰寡人齋戒十日而飲仲父寡人自以為修矣仲父不告寡人而出其故何也鮑叔隰朋趨而出及管仲於途曰公怒管子反入背屏而立公不與言少進中庭公不與言少進𫝊堂公曰寡人齋戒十日而飲仲父自以為脱於罪矣仲父不告寡人而出未知其故也對曰臣聞之沈於樂者洽於憂厚於味者薄於行慢於朝者緩於政害於國家者危於社稷臣是以敢出也公遽下堂曰寡人非敢自為修也仲父年長雖寡人亦衰矣吾願一朝安仲父也對曰臣聞壯者無怠老者無偷順天之道必以善終者也三王失之也非一朝之萃君柰何其偷乎管仲走出君以賔客之禮再拜送之管子中匡管仲父出朱葢青衣置鼓而歸庭有陳鼎家有三歸孔子曰良大夫也其侈偪上孫叔敖相楚棧車牝馬糲餅菜羮枯魚之膳冬羔裘夏葛衣面有飢色則良大夫也其儉偪下韓子外儲左孟簡子相梁并衛有罪而走齊管仲迎而問之曰吾子相梁并衛之時門下使者㡬何人矣孟簡子曰門下使者有三千餘人管子曰今與㡬何人来對曰臣與三人俱仲曰是何也對曰其一人父死無以塟我為塟之一人母死無以塟亦為塟之一人兄有獄我為出之是以得三人来管仲上車曰嗟茲乎我窮必矣吾不能以春風風人吾不能以夏雨雨人吾窮必矣說苑貴徳列子管仲勉齊桓公因遊遼口俱之其國㡬尅舉隰朋諌曰君舎齊國之廣人民之衆山川之觀殖物之阜禮義之盛章服之美妖靡盈庭忠良滿朝肆咤則徒卒百萬視撝則諸侯從命亦奚羡於彼而棄齊國之社稷從戎夷之國乎此仲父之耄柰何從之桓公乃止以隰朋之言告管仲仲曰此固非朋之所及也臣恐彼國之不可知之也齊國之富奚戀隰朋之言奚顧白虹貫牛山管仲諌曰毋近妃宫恐失權齊侯大懼去色黨更立賢輔使后出望上牛山四聽之以厭神春秋文耀鉤桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見公反誒詒為病數日不出齊士有皇子告敖者曰公則自傷鬼惡能傷公夫忿滀之氣散而不反則為不足上而不下則使人善怒下而不上則使人善忘不上不下中身當心則為病公曰然則有鬼乎曰有沈有履竈有髻户内之煩壌雷霆處之東北方之下者陪阿鮭蠪躍之西北方之下者則泆陽處之水有象罔丘有崒山有䕫野有方皇澤有委蛇公曰請問委蛇之狀何如皇子曰委蛇其大如轂其長如轅紫衣而朱冠其為物也惡聞雷車之聲則捧其首而立見之者殆乎覇桓公囅然而笑曰此寡人所見者也於是正衣冠與之坐不終日而不知病之去也莊子風俗通卷九齊桓公出於澤見衣紫衣大如轂長如轅拱手而立還歸寢疾數月不出有皇士者見公語驚曰物惡能傷公公自傷也此所謂澤神委蛇者也唯覇乃得見之於是桓公欣然笑不終日而病愈桓公乘馬虎望見之而伏公問管仲曰今者寡人乘馬虎望見而不敢行其故何也管仲對曰意者君乘駮馬而洀桓迎日而馳乎公曰然管仲對曰此駮象也駮食虎豹故虎疑焉管子小問説苑作晉平公事桓公獵得一鳴鵠宰之得一人長三寸三分執圭著白袍帶劒馳車詈罵瞋目又得一折齒方員二尺問羣臣曰天下有此及小兒否陳章答曰昔秦胡乞一舉渡河與齊魯戰折傷板齒昔李子昂敖於鳴鵠素中遊長三寸三分慱物志本御覧引此今無金樓子齊桓公卧於栢寢謂仲父曰吾國富民殷吾餘憂矣一物失所寡人猶為於邑白鳥營肌而求飽寡人因之開翠紗之幬進蚊子焉其蚊有知禮者不食公之肉而退有知足者㗱公之肉而退有不知足者遂長嘘短吸而食之及其飽也腸腹為之破潰公曰嗟乎民生亦猶是矣語殊淺鄙金樓子梁元帝所作今其書已亡管仲病桓公往問之曰仲父之病矣漬甚國人弗諱寡人將誰屬國管仲對曰昔者臣盡力竭智猶未足以知之也今病在於朝夕之中臣奚能言桓公曰此大事也願仲父之教寡人也管仲敬諾曰公欲誰相公曰鮑叔牙可乎管仲對曰不可臣善鮑叔牙鮑叔牙之為人也清㢘㓗直視不己若者不比於人一聞人之過終身不忘勿以則隰朋其可乎隰朋之為人也上志而下求醜不若黄帝而哀不已若者自醜其徳不若黄帝哀不已若者欲訓厲之使與己齊以徳分人謂之聖人以才分人謂之賢人以賢臨人未有得人者也以賢下人者未有不得人者也其於國有不聞也其於家有不見也勿己則隰朋可吕覧貴公徐合列子力命莊子無鬼管仲病桓公問曰羣臣誰可相者管仲曰知臣莫如君公曰易牙如何對曰殺子以適君非人情不可公曰開方如何對曰倍親以適君非人情難近公曰豎刀如何對曰自宫以適君非人情難親管仲死而桓公不用管仲言卒近用三子三子専權史齊世家管子戒篇管仲寢疾桓公往問之曰仲父之疾甚矣若不可諱也彼政我將安移之管仲未對桓公曰鮑叔之為人何如管子對曰鮑叔君子也千乘之國不以其道予之不受也雖然不可以為政其為人也好善而惡惡已甚見一惡終身不忘桓公曰然則孰可管仲對曰隰朋可朋之為人好上識而下問臣聞之以徳予人者謂之仁以財予人者謂之良以善勝人者未有能服人者也以善養人者未有不服人者也於國有所不知政於家有所不知事必隰朋乎且朋之為人也居其家不忘公門居公門不忘其家事君不二其心亦不忘其身舉齊國之幣握路家五十室其人不知也大仁也哉其朋乎公又問曰不幸而失仲父也二三大夫者其猶能以國寧乎管仲對曰君請矍已乎鮑叔牙之為人也好直賔胥無之為人也好善寗戚之為人也能事孫在之為人也善言公曰此四子者其孰能一人之上也寡人并而臣之則其不以國寧何也對曰鮑叔之為人好直而不能以國詘賔胥無之為人也好善而不能以國詘寗戚之為人能事而不能以足息孫在之為人善言而不能以信黙臣聞之消息盈虛與百姓詘信然後能以國寧勿己者朋其可乎朋之為人也動必量力舉必量技言終喟然而歎曰天之生朋以為夷吾舌也其身死舌焉得生哉管子曰夫江黄之國近於楚為臣死乎君必歸之楚而寄之君不歸楚必私之私之而不救也則不可以救之則亂自此始矣桓公曰諾管子戒篇鮑叔有疾管仲為之不食不内漿寗戚患之管仲曰生我者父母知我者鮑子士為知己者死馬為知己者良鮑子死天下莫吾知安用食為雖為之死亦何傷哉韓詩今初學記引韓詩無鮑叔死管仲舉上袵而哭之泣下如雨從者曰非君臣父子也此亦有説乎管仲曰非夫子所知也吾嘗與鮑子負販於南陽吾三辱於市鮑子不以我為怯知我之欲有所明也鮑子嘗與我有所説王者而三不見聴鮑子不以我為不肖知我之不遇明君也鮑子嘗與我臨財分貨吾自取多者三鮑子不以我為貪知我之不足於財也生我者父母知我者鮑子也士為知己者死而况為之哀乎説苑復恩列子力命管夷吾鮑叔牙二人相友管仲曰吾少窮困時嘗與鮑叔賈分財多自與鮑叔不以我為貪知我貧也吾嘗與鮑叔謀事而大窮困鮑叔不以我為愚知時有不利也吾嘗三仕三見逐鮑叔不以我為不肖知我不遭時也吾嘗三戰三北鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不修小節而恥名不顯於天下也生我者父母知我者鮑子也四十二年戎伐周周告急於齊齊令諸侯發卒戍周是嵗晉公子重耳來桓公以女妻之史齊世家桓公問於寗戚曰管子今年老矣為棄寡人而就世也吾恐法令不行人多失職百姓疾怨國多盗賊吾何如而使姦邪不起民衣食足乎寗戚對曰要在得賢而任之桓公曰得賢柰何寗戚對曰開其道路察而用之尊其位重其祿顯其名則天下之士騷然舉足而至矣桓公曰既以舉賢士而用之矣微夫子幸而臨之則未有布衣出竒之士踵門而求見寡人者寗戚對曰是君察之不明舉之不顯而用之疑官之卑祿之薄也且夫國之所以不得士者有五阻焉主不好士諂諛在傍一阻也言便事者未嘗見用二阻也壅塞掩蔽必因近習然後見察三阻也訊獄詰窮其辭以法過之四阻也執事適欲擅國權命五阻也去此五阻則豪俊並興賢智求處五阻不去則上蔽吏民之情下塞賢士之路是故明王聖主之治若夫江海無不受故長為百川之主明王聖君無不容故安樂而長久因此觀之則安主利人者非獨一士也桓公曰善吾將著夫五阻以為戒本也説苑君道管仲疾史記桓公四十一年管仲隰朋皆卒桓公往問之曰仲父之疾病矣將何以教寡人管仲曰齊鄙人有諺曰居者無載行者無埋今臣將有逺行胡可以問桓公曰願仲父之無譲也管仲對曰願君之逺易牙竪刁常之巫衛公子啓方公曰易牙烹其子以慊寡人猶尚可疑耶管仲對曰人之情非不愛其子也其子之忍又將何有於君公又曰竪刁自宫以近寡人猶尚可疑耶管仲對曰人之情非不愛其身也其身之忍又將何有於君公又曰常之巫審於死生能去苛病猶尚可疑耶管仲對曰死生命也苛病失也君不任其命守其本而恃常之巫彼將以此無不為也公又曰衛公子啓方事寡人十五年矣其父死而不敢歸哭猶尚可疑耶管子對曰人之情非不愛其父也韓子其父作其母其父之忍又將何有於君公曰諾管仲死盡逐之食不甘宫不治苛病起朝不肅居三年公曰仲父不亦過乎孰謂仲父盡之乎於是皆復召而反管子知接畧又韓子難一同管仲夷吾者頴上人也少時常與鮑叔牙遊鮑叔知其賢管仲貧困常欺鮑叔鮑叔終善遇之不以為言已而鮑叔事齊公子小白管仲事公子糾及小白立為桓公公子糾死管仲囚焉鮑叔遂進管仲管仲既用任政於齊齊桓公以覇九合諸侯一匡天下管仲之謀也管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯於天下也生我者父母知我者鮑子也鮑叔既進管仲以身下之子孫世祿於齊有封邑者十餘世世本云莊仲山産敬仲夷吾夷吾産武子鳴嗚産桓子啓方啓方産成子孺孺産莊子盧盧産悼子其夷其夷産㐮子武武産景子耐歩耐歩産微凡十代常為名大夫天下不多管仲之賢而多鮑叔能知人也史管子傳桓公實怒少姫南襲蔡管仲因而伐楚責包茅不入貢於周室桓公實北征山戎而管仲因而令燕修召公之政於柯之㑹桓公欲背曹沬之約管仲因而信之諸侯由是歸齊故曰知與之為取政之寳也管仲富擬於公室有三歸反坫齊人不以為侈管仲卒齊國遵其政常彊於諸侯史齊世家括地志管仲冡在青州臨淄縣南二十一里牛山之阿管子小稱管仲病桓公往問之曰仲父之病甚矣若不可諱而不起也仲父將何以詔寡人管仲對曰微君之命臣也故臣且謁之雖然君猶不能行也公曰仲父命東寡人東令西寡人西仲父之命於寡人寡人敢不從乎管仲攝衣冠起對曰臣願君之逺易牙竪刁堂巫公子開方夫易牙以調和事公公曰惟烝嬰兒之未嘗於是烝其首子而獻之公人情非不愛其子也於子之不愛將何有於公公喜宫而妬竪刁自刑而為公治内人情非不愛其身也於身之不愛將何有於公公子開方事公十五年不歸視其親齊衛之間不容數日之行臣聞之務為不久葢虚不長其生不長者其死必不終桓公曰善管仲死已塟公憎四子者廢之官逐堂巫而苛病起逐易牙而味不至逐竪刁而宫中亂逐公子開方而朝不至公曰嗟聖人固有悖乎乃復四子者禮記雜記下初管仲遇盗取二人焉上以為公臣曰其所與遊辟也言其所與遊之邪僻故誘為盗耳可人也管仲死桓公使為之服宦於大夫者之為之服也自管仲始也有君命焉爾也韓非子管仲有病桓公往問之曰仲父病不幸卒於大命將奚以告寡人管仲曰微君言臣故將謁之願君去竪刁除易牙逺衛公子開方易牙為君主味君惟人肉未嘗易牙烝其首子而進之夫人情莫不愛其子今弗愛其子安能愛君君妒而好内竪刁自宫以治内人情莫不愛其身身且不愛安能愛君開方事君十五年齊衛之間不容數日行棄其母久官不歸其母不愛安能愛君臣聞之矜偽不長葢虚不久願君去此三子者也管仲卒死桓公弗行及桓公死蟲出尸不塟或曰管仲所以見告桓公者非有度者之言也所以去豎刁易牙者以不愛其身適君之欲也曰不愛其身安能愛君然則臣有盡死力以為其主者管仲將弗用也曰不愛其死力安能愛君是君去忠臣也且以不愛其身度其不愛其君是將以管仲之不能死公子糾度其不死桓公也是管仲亦在所去之域矣明主之道不然設民所欲以求其功故為爵祿以勸之設民所惡以禁其姦故為刑罰以威之慶賞信而刑罰必故君舉功於臣而姦不用於上雖有豎刁其柰君何且臣盡死力以與君市君垂爵祿以與臣市君臣之際非父子之親也計數之所出也君有道則臣盡力而姦不生無道則臣上塞主明而下成私管仲非明此度數於桓公也使去豎刁一豎刁又至非絶姦之道也且桓公所以身死蟲流出尸不塟者是臣重也臣重之實擅主也有擅主之臣則君令不下究臣情不上通一人之力能隔君臣之間使善敗不聞禍福不通故有不塟之患也明主之道一人不兼官一官不兼事卑賤不待尊賢而進大臣不因左右而見百官修通羣臣輻凑有賞者君見其功有罰者君知其罪見知不悖於前賞罰不弊於後安有不塟之患管仲非明此言於桓公也使去三子故曰管仲無度矣諸家所記意同辭異各有其長韓非設難深刻管子卒卒十月隰朋亦卒管子戒篇明年公有病常之巫從中出曰公將以某日薨易牙豎刁常之巫相與作亂塞宫門築髙牆不通人矯以公命有一婦人踰垣入至公所公曰我欲食婦人曰吾無所得公又曰我欲飲婦人曰吾無所得公曰何故對曰常之巫從中出曰公將以某日薨易牙豎刁常之巫相與作亂塞宫門築髙牆不通人故無所得衛公子啓方以書社四十下衛下降也公慨焉嘆涕出曰聖人之所見豈不逺哉若死者有知我將何面目以見仲父乎蒙衣袂而絶乎壽宫蟲流出於尸上葢以楊門之扇三月不殯吕子知接又韓子難一畧同又管子小稱畧同桓公四十三年冬十月乙亥公薨初公病五公子各樹黨爭立及公卒遂相攻以故宫中空莫敢棺桓公尸在牀上六十七日尸蟲出於户十二月乙亥無詭立乃棺赴辛巳夜歛殯桓公十有餘子要其後立者五人無詭立三月死無諡次孝公史齊世家初齊桓公之夫人三曰王姬徐姬蔡姬皆無子桓公好内多内寵如夫人者六人長衛姬生無詭少衛姬生惠公元鄭姬生孝公昭葛嬴生昭公潘密姬生懿公商人宋華子生公子雍桓公與管仲屬孝公於宋㐮公以為太子雍巫有寵於衛共姬因宦者豎刁以厚獻於桓公亦有寵桓公許之立無詭管仲卒五公子皆求立史齊世家管子戒篇公薨六子皆求立易牙與衛公子開方豎刁因共殺羣吏而立公子無虧故公死七日不歛九月不塟孝公奔宋宋㐮公率諸侯以伐齊戰於甗大敗齊師殺公子無虧立孝公而還韓子十過齊桓公九合諸侯一匡天下為五覇長管仲佐之管仲老不能用事休居於家桓公從而問之曰仲父家居有病即不幸而不起政安遷之管仲曰臣老矣不可問也雖然知臣莫若君知子者莫若父君其試以心决之公曰鮑叔牙何如管仲曰不可夫鮑叔牙為人剛愎而上悍剛則犯民以暴愎則不得君心悍則下不為用其心不懼非覇者之佐也公曰然則豎刁何如管仲曰不可夫人之情莫不愛其身公妬而好内豎刁自獖虧勢也以為公治内其身不愛又安能愛君曰然則衛公子開方何如管仲曰不可齊衛之間不過十日之行開方為事君欲適君之故十五年不歸見其父母此非人情也其父母之不親也又能親君乎公曰然則易牙何如管仲曰不可夫易牙為君主味君之所未嘗食惟人肉耳易牙蒸其首子而進之君所知也人之情莫不愛其子今蒸其子以為膳於君其子弗愛又安能愛君乎公曰然則孰可管仲曰隰朋可其為人也堅中而㢘外少欲而多信夫堅中則足以為表亷外則可以大任少欲則能臨其衆多信則能親鄰國此覇者之佐也君其用之公曰諾居一年餘管仲死桓公四十一年公遂不用隰朋而與豎刁刁涖事三年桓公南遊堂阜豎刁率易牙衛公子開方及大臣為亂桓公渇餒而死南門之寢公守之室身死三月不收蟲出於户不用管仲之過也淮南子俞兒易牙淄澠之水合者嘗一哈水而甘苦知矣孟子䟽引左傳云淄澠二水為食易牙亦知二水之味桓公不信數試始驗今按左傳無此語荀子仲尼篇仲尼之門人五尺之豎子言羞稱五覇是何也齊桓五覇之盛者也前事則殺兄而爭國内行則姑姊妹之不嫁者七人閨門之内般樂奢侈以齊之分奉之而不足外事則詐邾襲莒并國三十五其行事也若是其險汚滛汰也曷足稱乎大君子之門哉若是而不亡乃覇何也曰夫齊桓公有天下之大節焉夫孰能亡之倓然見管仲之能足以托國也是天下之大知也安忘其怒出忘其讐遂立以為仲父是天下之大决也立以為仲父而貴賤莫之敢妬也與之髙國之位而本朝之臣莫之敢惡也與之書社三百而富人莫之敢距也貴賤長少莫不秩秩焉從桓公而貴敬之是天下之大節也諸侯有一節如是則莫之能亡也桓公兼此數節者而盡有之夫又何可亡也其覇也宜哉括地志齊桓公墓在臨淄縣南二十一里牛山上亦名鼎足山一名牛首堈一所三墳晉永嘉末人發之初得板次得水銀池有氣不得入經數日乃牽犬入中得金蠶數十簿珠襦玉匣繒綵軍器不可勝數又以人殉塟骸骨狼藉也唐類亟塜墓下引此齊地記云桓公冡塟牛山之阿山西八里有仲父冡春秋戰國異辭卷十七
