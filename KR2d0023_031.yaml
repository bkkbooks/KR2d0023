body:
  text: 春秋戰國異辭卷二十八右春坊右諭德陳厚耀撰楚共王共王十六年晉伐鄭鄭告急共王救鄭與晉戰鄢陵晉敗楚射中共王目共王召將軍子反子反嗜酒從者豎陽榖進酒醉王怒射殺子反遂罷兵歸史楚世家荆共王與晉厲王戰於鄢陵共王十六年荆師敗共王傷臨戰司馬子反渴而求飲豎陽榖操黍酒而進之酒器受三升曰黍子反叱曰訾一作嘻退酒也豎陽榖對曰非酒也子反曰亟退却也豎陽榖又曰非酒也子反受而飲之子反之為人也嗜酒甘而不能絶於口以醉戰既罷共王欲復戰而謀使召子反子反辭以心疾共王駕而往視之入幄中聞酒臭而還曰今日之戰不榖親傷所恃者司馬也而司馬又若此是亡荆國之社稷而不恤吾衆也不榖無與復戰矣於是罷師去之斬司馬子反以為戮吕覽權勳榖作穀陽又韓子十過陽又淮南子人間楚恭王戰於隂陵恭王與晉厲戰於隂陵吕錡射恭王中目因而擒之潘尫養由基黃衰微公孫丙相與篡之恭王懼而失體威儀不能常坐不能起也黃衰微舉足蹴其體恭王乃覺怒其失禮奮體而起四大夫載而行淮南子汛論安陵纒以顔色美壯得幸於楚共王江乙往見安陵纒曰子之先人豈有矢石之功於王乎曰無有江乙曰子之身豈亦有乎曰無有江乙曰子之貴何以至於此乎曰僕不知所以江乙曰吾聞之以財事人者財盡而交疏以色事人者華落而愛衰今子之華有時而落子何以長幸無解於王乎安陵纒曰臣年少愚陋願委質於先生江乙曰獨從為殉可耳安陵纒曰敬聞命矣江乙去居期年逢安陵纒謂曰前日所諭子者通之於王乎曰未可也居期年江乙復見安陵纒曰子豈諭王乎安陵纒曰臣未得王之間也江乙曰子出與王同車入與王同坐居三年言未得王之間乎以吾之説未可耳不悅而去其年共王獵江渚之野野火之起若雲霓虎狼之嘷若雷霆有狂兕從南方來正觸王左驂王舉旌旄而使善射者射之一發兕死車下王大喜拊手而笑顧謂安陵纒曰吾萬歲之後子將誰與斯樂乎安陵纒乃逡巡而却泣下沾襟抱王曰萬歲之後臣將從為殉安知樂此者誰於是共王乃封安陵纒於車下三百户故曰江乙善謀安陵纒知時説苑權謀楚大夫江乙之母當共王時乙為郢大夫有入王宫盜者令尹以罪乙請於王而黜之處家無幾其母亡布八尋言令尹盜之王方在小曲臺令尹侍焉王謂母曰令尹信盜也寡人不為其富貴不行法也若不盜而誣之楚國有常法母曰令尹非身盜之也乃使人盜之王曰奈何對曰昔孫叔敖之為令尹也道不拾遺民不閉戶而盜賊自禁今令尹之法治也耳目不明盜賊縱橫是故盜妾之布是與使之何異王曰令尹在上冦盜在下令尹不知有何罪焉母曰昔者妾子為郢大夫人盜王宫中之物妾子坐而黜之妾子亦豈知之乎然終坐之令尹獨何以不坐是為過也王曰善非徒譏令尹又譏寡人令吏償母之布因賜金十鎰母讓金布曰妾豈貪貨而干王哉王召江乙而用之列女傳惡按江乙宣王時人即昭奚恤者楚共王出獵而遺其弓左右請求之共王曰止楚人遺弓楚人得之又何求焉仲尼聞之曰惜乎其不大亦曰人遺弓人得之而已何必楚也説苑至公楚共王有疾召令尹曰常侍管蘇與我處常忠我以道正我以義吾與處不安也不見不思也雖然吾有得也其功不細必厚爵之申侯伯與處常縱恣吾吾所樂者勸吾為之吾所好者先吾服之吾與處歡樂之不見戚戚也雖然吾終無得也其過不細必亟遣之令尹曰諾明日王薨令尹即拜管蘇為上卿而逐申侯出之境新序卷一事與前楚文王略同楚恭王多寵子而世子之位不定屈建曰楚必多亂夫一兔走於街萬人追之一人得之萬人不復夫分未定則萬人擾分已定則雖貪夫知止今楚多寵子而嫡位無主亂自是生矣夫世太子者國之基也而百姓之望也國既無基又使百姓失望絶其本矣本絶則撓亂猶兔走也恭王聞之立康王為太子其後猶有令尹圍公子棄疾之亂説苑建本三十一年共王卒子康王招立史楚世家康王楚人與吳人將戰楚師寡吳師衆楚將軍子囊曰我與吳人戰必敗敗王師辱王名􅯻壤土忠臣不忍為也不復於王而遁至於郊使人復於王曰臣請死王曰將軍之遁也以其為利也今誠利將軍何死子囊曰遁者無罪則後世之為王臣者將皆依不利之名而效臣遁若是則楚國終為天下撓遂伏劒而死據左傳子囊還自伐吳還卒非自殺也在楚康王元年王曰請成將軍義乃為桐棺三寸加斧鑕其上吕覽髙義節又説苑立十五年卒子員立是為郟敖史楚世家郟敖康王寵弟公子圍子比子晢棄疾郟敖三年以其季父公子圍為令尹主兵事史楚世家四年圍使鄭道聞王疾而還十二月圍入問王疾絞而弒之遂殺其子莫及平史楚世家夏使使赴於鄭伍舉問曰誰為後對曰寡大夫圍伍舉更曰共王之子圍為長子比奔晉而圍立是為靈王史楚世家韓子姦劫以其冠纓絞王而殺之遂自立也靈王靈王三年六月楚使使告晉欲會諸侯諸侯皆會楚於申伍舉曰昔夏啓有鈞臺之饗商湯有景亳之命周武王有盟津之誓成王有岐陽之搜康王有豐宫之朝穆王有塗山之會齊桓有召陵之師晉文有踐土之盟君其何用靈王曰用桓公時鄭子産在焉於是晉宋魯衛不往靈王已盟有驕色伍舉曰桀為有仍之會有緡叛之紂為黎山之會東夷叛之幽王為太室之盟戎翟叛之君其慎終七月楚以諸侯兵伐吳圍朱方八月克之囚慶封滅其族以封徇曰無效齊慶封弒其君而弱其孤以盟諸大夫封反曰莫如楚共王庶子圍弒其君兄之子員而代之立於是靈王使棄疾殺之史楚世家楚靈王為申之會宋太子後至執而囚之狎徐君拘齊慶封中射士諌曰合諸侯不可無禮此存亡之機也昔者桀為有戎之會而有緡叛之紂為黎丘之搜而戎狄叛之由無禮也君其圖之君不聽遂行其意居未期年靈王南逰羣臣從而劫之靈王餓而死乾溪之上韓子十過靈王建章華之臺靈王六年與伍舉登焉王曰臺美夫舉曰臣聞國君服寵以為美安民以為樂克聽以為聰致逺以為明不聞以土木之崇髙蟲鏤之刻畫金石之清音絲竹之凄淚以之為美前莊王為抱居之臺髙不過望國氛大不過容宴豆木不妨守備用不煩官府民不敗時務官不易朝常今君為此臺七年國人怨焉財用盡焉年穀敗焉百姓煩焉諸侯忿怨卿士訕謗此前王之所盛人君之美者耶臣誠愚不知所謂也靈王即除工去飾不遊於臺由是伍氏三世為楚忠臣吳越春秋國語更詳七年就章華臺下令內亡人實之史楚世家楚靈王坐章華之臺侍御數百隋珠照日羅衣從風孫叔敖入諌曰孫叔敖非楚靈王時人昔桀紂行此而亡今四境內侵諸侯加兵土地日削百姓乖離今君內寵母乃太盛歟靈王再拜曰寡人過矣微子之言社稷幾傾於是出宫女之不進者數百人百姓大悅王孫子新書楚成章華之臺酌諸侯酒魯君先至楚王悅之與大曲之弓不琢之璧已而悔之逺啓疆聞之見魯君曰夫此大曲之弓不琢之璧楚之上寶也齊與晉越欲此久矣寡君不與也而獨與君君其備禦三鄰慎守寶矣公懼反之魯連子小與左昭七年異述異記楚中有宫人草狀如金䔲而甚氛氲花色紅翠可説楚靈王時宫人數千皆多愁曠有囚死於宫中者葬之後墓上悉生此花墨子楚靈王好士細腰故靈王之臣皆以一飯為節肱息然後帶扶牆然後起比期年朝有黧黑之色翟王使使至楚楚王誇使者以章華之臺地志章華臺在今湖廣華容縣臺甚髙三休乃至楚王曰翟國亦有此臺乎使者曰否翟窶國也惡見此臺也翟王之自為室也堂髙三尺壤陛三絫茆茨弗剪采椽弗刮且翟王猶以作之者太苦居之者太佚翟國惡見此臺也楚王愧新書卷七子發將西伐蔡子發楚令尹克蔡獲蔡侯史記蔡侯為楚惠王所滅戰國策莊辛諌楚襄王云子發受令於靈王與史記不同歸致命曰蔡侯奉其社稷而歸之楚舍屬二三子而理其地舍子發名既而楚發其賞子發辭曰發誠布令而敵退是主威也徙舉相攻而敵退是將威也合衆用力而敵退是衆威也臣舍不宜以衆威受賞荀子強國篇荆君熊圉問水旱理亂亢倉子曰水旱由天理亂由人若人事和理雖有水旱無能為害堯湯是也故周之秩官云人強勝天若人事壞亂縱無水旱日益崩離且桀紂之滅豈惟水旱荆君北面遵循稽首曰天不棄不榖及此言也乃以𢎞璧十朋為亢倉子壽拜為亞尹曰庶吾國有瘳乎亢倉子不得已中宿微服違之他邦亢倉子政道楚靈王問范無宇曰我欲大城陳蔡葉與不羮賦車各千乘焉亦足以當晉矣又加之以楚諸侯其來朝乎范無宇曰不可臣聞大都疑國大臣疑主亂之謀也都疑則交爭臣疑則並令禍之深者也今大城陳蔡葉與不羮或不充不足以威晉若充之資財實之以重祿之臣是輕本而重末也臣聞尾大不掉末大不折此豈不施威諸侯之心哉然終為楚國大患者必此四城也靈王弗聽果城陳蔡葉與不羮實之以兵革充之以大臣是歲也諸侯果朝居數年陳蔡葉與不羮或奉公子棄疾內作難楚國雲亂王遂死於乾溪新書卷一與國語别工尹商陽與陳棄疾楚公子追吳師及之陳棄疾謂工尹商陽曰王事也子手弓而可句手弓句子射諸射之斃一人韔弓又及謂之又斃二人每斃一人掩其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉檀弓下八年使公子棄疾將兵滅陳史楚世家十年召蔡侯醉而殺之使棄疾定蔡因為陳蔡公史楚世家十一年伐徐以恐吳靈王次於乾溪以待之王曰齊晉魯衛其封皆受寶器我獨不今吾使使周求鼎以為分其豫我乎析父對曰其豫君王哉昔我先王熊繹辟在荆山蓽路藍蔞以處草莽跋涉山林以事天子惟是桃弧棘矢以共王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有周今與四國服事君王將惟命是從豈敢愛鼎靈王曰昔我皇祖伯父昆吾舊許是宅今鄭人貪其田不我豫今我求之其豫我乎對曰周不愛鼎鄭安敢愛田靈王曰昔諸侯逺我而畏晉今吾大城陳蔡不羮賦皆千乘諸侯畏我乎對曰畏哉靈王喜曰析父善言古事焉史楚世家楚靈王十二年樂乾溪不能去也陸賈新語曰靈王作乾溪之臺五百仭之髙欲登浮雲窺天文國人苦役初靈王會兵於申僇越大夫常壽過殺蔡大夫觀起起子從亡在吳與左傳稍别乃勸吳王伐楚為間越大夫常壽過而作亂為吳間使矯公子棄疾命召公子比於晉至蔡與吳越兵欲襲蔡令公子比見棄疾與盟於鄧遂入殺靈王太子祿立子比為王公子子晢為令尹棄疾為司馬先除王宫觀從從師於乾溪令楚衆曰國有王矣先歸復爵邑田室後者遷之楚衆皆潰去靈王而歸王聞太子祿之死也自投車下而曰人之愛子亦如是乎侍者曰甚是王曰余殺人之子多矣能無及此乎右尹曰右尹子革請待於郊以聽國人王曰衆怒不可犯曰且入大縣而乞師於諸侯王曰皆叛矣又曰且奔諸侯以聽大國之慮王曰大福不再祇取辱耳於是王乘舟將欲入鄢右尹度王不用其計懼俱死亦去王亡王於是獨倣徨山中野人莫敢入王王行遇其故鋗人鋗當作涓謂曰為我求食我已不食三日矣鋗人曰新王下法有敢餉王從王者罪及三族且又無得食王因枕其股而卧鋗人又以土自代逃去王覺而弗見遂飢弗能起芉尹申無宇之子申亥曰吾父再犯王命王弗誅恩孰大焉乃求王遇王飢於釐澤奉之以歸夏五月癸丑王死申亥家左氏云自縊申亥以二女從死并葬之是時楚國雖已立比為王畏靈王復來又不聞其死故觀從謂初王比曰不殺棄疾雖得國猶受禍王曰余不忍從曰人將忍王王不聽乃去棄疾歸國人每夜驚曰靈王入矣乙卯夜棄疾使船人從江上走呼曰靈王至矣國人愈驚又使蔓成然告初王比及令尹子晢曰王至矣國人將殺君司馬將至矣司馬謂棄疾君早自圖無取辱焉衆怒如水火不可救也初王及子晢遂自殺丙辰棄疾即位為王改名熊居是為平王平王以詐弒兩王而自立恐國人及諸侯叛之乃施惠百姓復陳蔡之地而立其後如故歸鄭之侵地存恤國中修政教吳以楚亂故獲五率以歸平王謂觀從恣爾所欲欲為卜尹王許之初共王有寵子五人無適立乃望祭羣神請神決之使主社稷而隂與巴姬埋璧於室內召五公子齋而入康王跨之靈王肘加之子比子晢皆逺之平王幼抱而入再拜壓紐故康王以長立至其子失之圍為靈王及身而弒子比為王十餘日子晢不得立又俱誅四子皆絶無後惟棄疾後立為平王竟續楚祀如其神符史楚世家桓子新論楚靈王驕逸輕下簡賢務鬼信巫祝之道齋戒潔鮮以祀上帝羣神躬執羽紱起舞壇前吳人來攻其國人告急左傳無此而靈王鼓舞自若顧應之曰寡人方祭上帝樂明神當蒙福祐焉不赴救而吳兵遂至俘獲其太子及后姬以下春秋繁露楚靈王行強乎陳蔡意廣以武不顧其行慮所美內罷其衆乾溪有物女水盡則女見水滿則不見靈國舉發其國而役三年不罷楚國大怒有行暴意殺無罪臣成然楚國大悶公子棄疾卒令靈王父子自殺而取其國虞不離津澤農不去疇土而民相愛也此非盈意之過耶初子比自晉歸韓宣子問叔向曰子比其濟乎對曰不就宣子曰同惡相求如市賈焉何為不就對曰無與同好誰與同惡取國有五難有寵無人一也有人無主二也有主無謀三也有謀而無民四也有民而無德五也子比在晉十三年矣晉楚之從不聞通者可謂無人矣族盡親叛可謂無主矣無釁而動可謂無謀矣為羇終世可謂無民矣亡無愛徴可謂無德矣王虐而不忌子比涉五難以弒君誰能濟之有楚國者其棄疾乎君陳蔡方城外屬焉苛慝不作盜賊伏隱私欲不逞民無怨心先神命之國民信之芉姓有亂必季實立楚之常也子比之官則右尹也數其貴寵則庶子也以神所命則又逺之民無懷焉將何以立宣子曰齊桓晉文不亦是乎對曰齊桓衛姬之子也有寵於釐公有鮑叔牙賓須無隰朋以為輔有莒衛以為外主有髙國以為內主從善如流施惠不倦有國不亦宜乎昔我文公狐季姬之子也有寵於獻公好學不倦生十七年有士五人有先大夫子餘子犯以為腹心有魏犫賈他以為股肱有齊宋秦楚以為外主有欒郤狐先以為內主亡十九年守志彌篤惠懷棄民民從而與之故文公有國不亦宜乎子比無施於民無援於外去晉晉不送歸楚楚不迎何以有國子比果不終焉卒立者棄疾如叔向言也史楚世家平王楚平王有太子名曰建使伍奢為太傅費無忌為少傅無忌不忠於太子故無寵平王二年使費無忌為太子取婦於秦秦女好無忌先歸説平王曰秦女絶美王可自取為太子更求平王聽之卒自娶秦女絶愛幸之生子珍一作熊珍更為太子娶婦齊女無忌既以秦女自媚於平王因去太子而事平王恐一旦平王卒而太子立殺已乃因讒太子建建時年十五矣其母蔡女也無寵於平王王稍益疏建六年使建守城父備邊兵無忌又日夜言太子短於王曰太子以秦女之故不能無怨望願王少自備也自太子居城父將兵外交諸侯且欲入為亂矣平王召其傅伍奢責之伍奢知無忌讒乃曰王奈何以讒賊小臣疏骨肉無忌曰王今不制其事成矣王且見禽於是平王怒囚伍奢而使城父司馬奮揚往殺太子行未至奮揚使人先告太子太子急去不然將誅太子建亡奔宋無忌言於平王曰伍奢有二子皆賢不誅且為楚患盍以免其父召之必至王乃使人謂奢曰能致汝二子則生不能則死奢曰尚至員不至王曰何也奢曰尚為人亷死節慈孝而仁聞召而免父必至不顧其死員為人智而好謀勇而矜功知來必死必不來然為楚國憂者必此子王使人召二子曰來吾生爾父不來今殺奢也伍尚欲往員曰楚之召我兄弟非欲以生我父也恐有脫者後生患故以父為質詐召二子二子到則父子俱死何益父之死往而令讎不得報耳不如奔他國借力以雪父之恥俱滅無為也伍尚曰我知往終不能全父命然恨父召我以求生而不往後不能雪恥終為天下笑耳子其行矣子能報殺父之仇我其歸死尚既就執使者捕伍員伍員彎弓屬矢出見使者曰父有罪何以召其子為將射使者還走伍員遂出奔聞太子建之在宋往從之奢聞員之亡也曰楚國君臣其苦兵乎楚人遂殺伍員伍尚平王七年伍子胥傳史楚世家合伍奢之先曰伍舉以直諌事楚莊王故其後世有名於楚奢子員字子胥員兄曰伍尚地志伍尚為棠邑宰多惠政民稱棠君今江浦縣無事見左昭二十年詳略各異費忌作費無極吕覽慎行楚平王有臣曰費無極害太子建欲去之王為建取妻於秦而美無極勸王奪之王奪之而疏太子無極説王曰晉之霸也近於諸夏而楚僻也故不能與爭不若大城城父而置太子焉以求北方城父楚北境邑王收南方是得天下也王説使太子居於城父居一年乃惡之曰建與連尹連尹伍奢子胥之父將以方城外反王曰已為我子矣又尚奚求對曰以妻事怨且自以為猶宋也齊晉又輔之將以害楚其事已集矣王信之使執連尹太子建出奔左尹郤宛國人説之無極又欲殺之謂令尹子常曰郤宛欲飲令尹酒又謂郤宛曰令尹欲飲酒於子之家郤宛曰我賤人也不足以辱令尹令尹必來辱我且何以給待之無極曰令尹好甲兵子出而置之門令尹至必觀之已因以為酬及饗曰帷門左右而置甲兵焉無極因謂令尹曰吾幾禍令尹郤宛將殺令尹甲在門矣令尹使人覘之信遂攻郤宛殺之國人大怨動作者莫不非令尹沈尹戍謂令尹曰夫無極楚之讒人也亡夫太子建殺連尹奢屏王之耳目今令尹又用之殺衆不辜以興大謗患幾及令尹令尹子常曰是吾罪也敢不良圖乃殺費無極在昭公元年盡滅其族以説於國説苑辨物王子建出守於城父與成公乾遇於疇中問曰是何也成公乾曰疇也疇也者何也所以為麻也麻也者何也曰所以為衣也成公乾曰昔者莊王伐陳舍於有蕭氏謂路室之人曰巷其不善乎何溝之不浚也莊王猶知巷之不善溝之不浚今吾子不知疇之為麻麻之為衣吾子其不主社稷乎王子果不立淮南子人間楚平王使太子建守城父命伍子奢傅之居一年伍子奢遊人於王側遣人説王言太子甚仁且勇能得民心王以告費無忌無忌曰臣固聞之太子內撫百姓外約諸侯齊晉又輔之將以害楚其事已構矣王曰為我太子又尚何求曰以秦女之事怨王王因殺太子建而誅伍子奢吳越春秋平王遣使者駕駟馬封函印綬往召子尚子胥令曰賀二子父奢以忠信慈仁去難就免王內慚囚繫忠臣外愧諸侯之恥反以奢為國相封二子為侯尚賜鴻都侯胥賜蓋侯相去不逺三百餘里奢久囚繫憂思二子故遣臣來奉進印綬尚曰父繫三年中心忉怛食不甘味嘗苦飢渴晝夜感思憂父不活惟父獲免何敢貪印綬哉使者曰父囚三年王今幸赦無以賞賜封二子為侯一言當至何所辭哉尚乃入報子胥曰父幸免死二子為侯使者在門兼封印綬汝可見使子胥曰兄且安坐為兄卦之今日甲子時加於已支傷日下氣不相受君欺其臣父欺其子今往方死何侯之有尚曰豈貪於侯思見父耳一面而别雖死而生子胥曰兄且無往父當我活楚畏我勇勢不敢殺若誤往必死尚曰父子之愛恩從中出徼幸相見以自濟逹子胥嘆曰與父俱誅何明於世寃仇不除恥辱日大兄從是往我從是決尚泣曰吾之生也為世所笑終老地上而亦何之不能報仇畢為廢物汝懷文武勇於策謀父兄之仇汝可復也倘吾得反是天佑之其遂沉埋亦吾所喜胥曰兄且行矣吾去不顧旋泣辭行與使俱往楚得子尚執而囚之復遣追捕子胥胥乃貫弓執矢去楚楚追之見其妻曰胥亡矣去三百里使者追及無人之野胥乃張弓布矢欲害使者子胥長一丈睂間一尺使者俯伏而走胥曰報汝平王欲國不滅釋吾父兄若不爾者楚為墟矣使返報平王平王聞之即發大軍追子胥至江失其所在不獲而返越絶書伍子奢得罪於平王且殺之其二子出走子尚奔吳子胥奔鄭王使使者召子尚於吳子胥聞之使人告子尚母入子尚曰愛身之死絶父之望賢士不為也子其居尚請入平王復使使召子胥於鄭子胥介胄彀弓出見使者曰介胄之士固不拜矣請有道於使者王以奢為無罪赦而蓄之其子又何適乎使者還報王知子胥不入也殺子奢并殺子尚子胥聞之從橫嶺上泰山北望齊晉謂其舍人曰去此邦堂堂被山帶河其民重移乃南奔吳吳越春秋子胥行至大江仰天行哭林澤之中言楚王無道殺吾父兄願吾因於諸侯以報仇聞太子建在宋奔之道遇申包胥謂曰楚王殺吾父兄為之奈何申包胥曰嗚呼吾欲教子報楚則為不忠教子不報則為無親友也子其行矣吾不容言子胥曰吾聞父母之仇不與戴天履地兄弟之仇不與同域接壤朋友之仇不與鄰鄉共里今吾將復楚辜以雪父兄之恥申包胥曰子能亡之吾能存之子能危之吾能安之胥遂奔宋宋元公無信於國國人惡之大夫華氏謀殺元公國人與華氏因作大亂見左昭二十年子胥乃與太子建俱奔鄭鄭人甚禮之伍胥既至宋宋有華氏之亂乃與太子建俱奔於鄭鄭甚善之太子建又適晉晉頃公曰太子既善鄭鄭信太子太子能為我內應而我攻其外滅鄭必矣滅鄭而封太子太子乃還鄭事未會會自私欲殺其從者從者知其謀乃告之於鄭鄭定公與子産誅殺太子建建有子名勝伍胥懼乃與勝俱奔吳到昭關昭關欲執之韓子説林云珠子胥出走邊侯得之子胥曰上索我者以我有美也今我已亡之矣我且曰子取吞之侯因釋之伍胥遂與勝獨身步走幾不得脫追者在後至江江上有一漁父乘船知伍胥之急乃渡伍胥伍胥既渡解其劒曰此劒直百金以與父父曰楚國之法若得伍胥者賜粟五萬石爵執圭豈徒百金劒耶不受史伍子胥傳伍員亡荆急求之登太行而望鄭曰是國也地險而民多知其主俗主也不足與舉去鄭而之許見許公而問所之許公不應東南向而唾伍員載拜受賜曰知所之矣因如吳過於荆至江上欲涉見一丈人刺小船方將漁從而請焉丈人渡之絶江問其名族則不肯告解其劒以與丈人曰此千金之劒也願獻之丈人丈人不受曰荆國之法得伍員者爵執圭祿萬擔金千鎰昔者子胥過吾猶不取今我何以子之千金劒為乎伍員至於吳使人求之江上則不能得也每食必祭之祝曰江上之丈人吕覽異寶輒髙士傳云員至吳為相求丈人不能得每食祭之曰名可得聞而不可得見其惟江上丈人乎吳越春秋鄭定公與子産誅殺太子建建有子名勝伍員與勝奔吳到昭關關吏欲執之伍員因詐曰上所以索我者美珠也今我已亡矣將去取之關吏因舍之與勝行去追者在後幾不能脫至吳江上有漁父乘船從下方泝水而上子胥呼之謂曰漁父渡我如是者再漁父欲渡之會旁有人窺之因而歌曰日月昭昭乎侵已馳與子期乎蘆之漪子胥即止蘆之漪漁父又歌曰日已夕兮豫心憂悲月已馳兮何不渡為事寖急兮當奈何子胥入船漁父知其意也乃渡之千潯之津子胥既渡漁父視之有飢色乃謂曰子俟我此樹下為子取餉魚去後子胥疑之乃潛身於深葦之中有頃父來持麥飯鮑魚羮盎漿求之樹下不見因歌而呼之曰蘆中人蘆中人豈非窮士乎如是至再子胥乃出蘆中而應漁父曰吾見子有飢色為子取餉子何嫌哉子胥曰性命屬天今屬丈人豈敢有嫌哉二人飲食畢欲去胥乃解百金之劒以與漁者曰此吾先君之劒中有七星價值百金以此相答漁父曰吾聞楚之法令得伍胥者賜粟五萬石爵執圭豈圖百金之劒乎遂辭不受謂子胥曰子急去勿留且為楚所得子胥曰請丈人姓字漁父曰今日凶凶兩賊相逢吾所謂渡楚賊也兩賊相得得形於默何用姓字為子為蘆中人吾為漁丈人富貴莫相忘也子胥曰諾既去誡漁父曰掩子之盎漿無令其露漁父諾子胥行數步顧視漁者已覆船自沉於江水之中矣子胥默然遂行至吳疾於中道乞食溧陽會女子擊綿於瀨水之上筥中有飯子胥遇之謂曰夫人可得一餐乎女子曰妾獨與母居三十未嫁飯不可得子胥曰夫人賑窮途少飯亦何嫌哉女子知非恆人遂許之發其簞筥飯其盎漿長跪而與之子胥再餐而止女子曰君有逺行何不飽而餐之子胥餐而去謂其女子曰掩夫人之壺漿毋令其露女子嘆曰嗟乎妾獨與母居三十年自守貞明不願從適何宜饋飯而與丈夫越虧禮儀妾不忍也子行矣子胥行反顧女子已自投於瀨水矣子胥歎曰嗚呼貞明執操其丈夫女哉末三句見烈女傳越絶書子胥奔吳至江上見漁者曰來渡我漁者知其非常人也欲往渡之恐人知之歌而往過之曰日月昭昭乎侵以施與子期乎蘆之漪子胥即從漁者之蘆漪日入漁者復歌往曰心中目施子可渡河何為不出船到即載入船而伏半江而仰謂漁者曰子之姓為誰還得報子之厚德漁者曰縱荆邦之賊者我也報荆邦之仇者子也兩而不仁何相問姓名為子胥即解其劒以與漁者曰吾先人之劒直百金請以與子漁者曰吾聞荆平王有令曰得伍子胥者購千金吾奈何以百金之劒為渡子於斧之津乃發其簞飯清其壺漿而食曰亟食而去毋令追者及子也子胥曰諾食已而去顧謂漁者曰掩爾壺漿無令之露漁者曰諾子胥行即覆船挾匕首自刎而死於江明無泄也子胥遂行至溧陽界中見一女子擊絮於瀨水之中地志女子史氏溧陽人子胥曰可託食乎女子曰諾即發簞飯清其壺漿而食之子胥食而去謂女子曰掩爾壺漿毋令之露女子曰諾子胥行五步還顧女子自縱於瀨水之中而死子胥遂行地志揚州府胥浦在儀真縣相傳為子胥解劒渡江處浣紗女廟亦在儀真女馬氏也子胥亡楚見女浣紗囑曰追兵至勿言女投江死平王十年楚太子建母在居巢開吳吳使公子光伐楚遂敗陳蔡取太子建母而去楚恐城郢初吳之邊邑卑梁與楚邊邑鍾離小童爭桑兩家交怒相攻滅卑梁人卑梁大夫怒發邑兵攻鍾離楚王聞之怒發國兵滅卑梁吳王聞之大怒亦發兵使公子光因建母家攻楚遂滅鍾離居巢楚乃恐而城郢史楚世家按左傳城郢在吳滅巢之前年史誤楚之邊邑曰卑梁其處女與吳之邊邑處女桑於境上戲而傷卑梁氏之處女卑梁人操其傷子以讓吳人吳人應之不恭怒殺而去之吳人往報之盡屠其家卑梁公怒公卑梁大夫也楚邑大夫皆僭稱公曰吳人焉敢攻吾邑舉兵反攻之老弱盡殺之矣吳王夷昧聞之怒夷昧當作王僚使人舉兵侵楚之邊邑克夷而後去之吳楚以此大隆隆當作格鬭也吳公子光又率師與楚人戰於雞父平王十二年大敗楚人獲其師潘子臣小帷子陳夏齧又反伐郢得荆平王之夫人以歸實為雞父之戰吕覽察微十三年平王卒將軍子常曰太子珍少且其母乃前太子建所當娶也欲立令尹子西子西平王之庶弟也有義子西曰國有常法更立則亂言之則致誅乃立太子珍是為昭王史楚世家春秋戰國異辭卷二十八
